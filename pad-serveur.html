<style>
        /* 1. Masquer le bouton CARTE rouge sans effacer ta ligne de code HTML */
        button[onclick*="carte.html"] {
            display: none !important;
        }

        /* 2. Signalement couleur renforcé dès qu'une commande est prise (Table Bleue/Lumineuse) */
        .table-obj.ordered {
            background: rgba(41, 121, 255, 0.25) !important;
            border: 2px solid #2979ff !important;
            box-shadow: 0 0 20px rgba(41, 121, 255, 0.8) !important;
        }

        /* 3. Clignotement OR / NOIR quand le serveur imprime le ticket (Encaissement) */
        @keyframes print-blink {
            0% { background: #000; border-color: var(--gold); transform: scale(1); }
            50% { background: var(--gold); border-color: #fff; color: #000; transform: scale(1.15); box-shadow: 0 0 30px var(--gold); z-index: 100;}
            100% { background: #000; border-color: var(--gold); transform: scale(1); }
        }
        .table-obj.printing {
            animation: print-blink 0.4s ease-in-out 4; /* Clignote 4 fois très vite */
        }
    </style>

    <script>
        // 4. Interception du clic sur "ENCAISSER" pour déclencher le clignotement de la table
        // On conserve ta fonction d'origine intacte, on ajoute juste l'animation par-dessus.
        if (typeof executePayment === "function") {
            const encaissementOriginal = executePayment;
            
            executePayment = async function(paymentType) {
                const tableEnCours = currentTable;
                
                // Trouve la table sur le plan et la fait clignoter
                if (tableEnCours) {
                    const floor = document.getElementById('floor-plan');
                    const tablesDOM = floor.getElementsByClassName('table-obj');
                    for(let i = 0; i < tablesDOM.length; i++) {
                        if(tablesDOM[i].innerText === tableEnCours) {
                            tablesDOM[i].classList.add('printing');
                            // Retire la classe après le clignotement (1.6 secondes)
                            setTimeout(() => {
                                tablesDOM[i].classList.remove('printing');
                            }, 1600);
                        }
                    }
                }

                // Exécute ton code d'encaissement habituel
                await encaissementOriginal(paymentType);
            };
        }
    </script>
