<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCHEF Network - Base de donnees Reseau</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #0A0A0A;
            --border: rgba(255, 255, 255, 0.05);
            --border-strong: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.05);
            --accent: #10b981;
            --accent-dim: rgba(16, 185, 129, 0.08);
            --alert: #ef4444;
            --shadow: 0 20px 50px rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            letter-spacing: 0.5px;
        }

        header {
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .header-title {
            font-size: 1.2rem;
            font-weight: 900;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .header-title span {
            color: var(--gold);
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .container {
            max-width: 1400px;
            width: 100%;
            margin: 40px auto;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .page-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-top: 0;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* TABLEAU LUXE RESEAU */
        .table-container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            font-size: 0.9rem;
        }

        th {
            background: rgba(255, 255, 255, 0.02);
            border-bottom: 1px solid var(--border-strong);
            padding: 18px 20px;
            color: var(--text-muted);
            font-weight: 600;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        td {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border);
            color: var(--text-main);
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: rgba(255, 255, 255, 0.01);
        }

        /* CONTRÔLES INTERACTIFS */
        .establishment-name {
            font-weight: 700;
            font-size: 1rem;
        }

        .license-id {
            font-family: monospace;
            color: var(--text-dim);
            font-size: 0.95rem;
        }

        .contact-info {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.85rem;
        }

        .contact-info span:first-child {
            color: var(--text-main);
        }

        .contact-info span:last-child {
            color: var(--text-muted);
        }

        select.plan-selector {
            background: var(--bg) !important;
            color: var(--gold) !important;
            border: 1px solid var(--border-strong) !important;
            padding: 8px 12px;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
        }

        select.plan-selector:focus {
            border-color: var(--gold) !important;
        }

        .editable-field {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        .btn-edit-inline {
            background: transparent;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 4px;
            font-size: 0.8rem;
            transition: 0.2s;
        }

        .btn-edit-inline:hover {
            color: var(--gold);
        }

        /* BADGES */
        .status-badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            text-transform: uppercase;
            border: 1px solid transparent;
        }

        .status-badge.active {
            border-color: var(--accent);
            color: var(--accent);
            background: var(--accent-dim);
        }

        .status-badge.suspended {
            border-color: var(--alert);
            color: var(--alert);
            background: rgba(239, 68, 68, 0.05);
        }

        /* BOUTONS ACTIONS */
        .actions-cell {
            display: flex;
            flex-direction: column;
            gap: 6px;
            align-items: flex-start;
        }

        .action-link {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
            transition: 0.2s;
            border: none;
            background: transparent;
            padding: 0;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .action-link.suspend {
            color: var(--alert);
        }

        .action-link.delete {
            color: var(--text-muted);
        }

        .action-link.delete:hover {
            color: var(--alert);
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title"><span>iCHEF</span> NETWORK</div>
        <div class="subtitle">Portail Createur</div>
    </header>

    <div class="container">
        <h1 class="page-title">Base de donnees Reseau</h1>

        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>Etablissement</th>
                        <th>ID Licence</th>
                        <th>Contact</th>
                        <th>Forfait</th>
                        <th>Mot de passe (PIN)</th>
                        <th>Ecrans actifs / Max</th>
                        <th>Staff Max</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="network-table-body">
                    <tr>
                        <td style="grid-column: 1/-1; text-align:center; color:var(--text-muted); font-style:italic; padding:40px;">
                            Chargement des etablissements reseau...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        // Simulation ou recuperation reelle des donnees de la base
        async function loadNetworkDatabase() {
            const tbody = document.getElementById('network-table-body');
            try {
                const res = await fetch(`${SERVER_URL}/api/admin/get-all-clients`);
                const data = await res.json();
                
                if (!data.success || !data.clients || data.clients.length === 0) {
                    tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:var(--text-muted); padding:40px; font-style:italic;">Aucun etablissement enregistre.</td></tr>`;
                    return;
                }

                tbody.innerHTML = data.clients.map(client => {
                    const statusClass = client.status === 'SUSPENDU' ? 'suspended' : 'active';
                    const statusText = client.status === 'SUSPENDU' ? 'Suspendu' : 'Actif';
                    
                    return `
                    <tr>
                        <td><span class="establishment-name">${client.name || 'Sans nom'}</span></td>
                        <td><span class="license-id">${client.tenantID}</span></td>
                        <td>
                            <div class="contact-info">
                                <span>${client.email || 'Pas d email'}</span>
                                <span>${client.phone || 'Pas de telephone'}</span>
                            </div>
                        </td>
                        <td>
                            <select class="plan-selector" onchange="updateClientPlan('${client.tenantID}', this.value)">
                                <option value="CHEF_CUISINE" ${client.plan === 'CHEF_CUISINE' || client.plan === 'CHEF' ? 'selected' : ''}>Chef Cuisine (19€)</option>
                                <option value="CHEF_PATISSERIE" ${client.plan === 'CHEF_PATISSERIE' || client.plan === 'PATISSIER' ? 'selected' : ''}>Chef Patissier (19€)</option>
                                <option value="CHEF_BAR" ${client.plan === 'CHEF_BAR' || client.plan === 'BAR' ? 'selected' : ''}>Chef Barman (19€)</option>
                                <option value="BUSINESS" ${client.plan === 'BUSINESS' || client.plan === 'RENTABILITE' || client.plan === 'ECO' ? 'selected' : ''}>Business (49€)</option>
                                <option value="EMPIRE" ${client.plan === 'EMPIRE' || client.plan === 'BRIGADE' || client.plan === 'BRIGADES' || client.plan === 'PREMIUM' ? 'selected' : ''}>Empire (99€)</option>
                            </select>
                        </td>
                        <td>
                            <div class="editable-field">
                                <span>${client.masterPin || '999999'}</span>
                                <button class="btn-edit-inline" onclick="editClientPin('${client.tenantID}', '${client.masterPin}')">Modifier</button>
                            </div>
                        </td>
                        <td>
                            <div class="editable-field">
                                <span>${client.activeDevices || 0} / ${client.deviceLimit || 1}</span>
                                <button class="btn-edit-inline" onclick="editDeviceLimit('${client.tenantID}', ${client.deviceLimit})">Modifier</button>
                            </div>
                        </td>
                        <td>
                            <div class="editable-field">
                                <span>${client.maxStaff || 1}</span>
                                <button class="btn-edit-inline" onclick="editStaffLimit('${client.tenantID}', ${client.maxStaff})">Modifier</button>
                            </div>
                        </td>
                        <td><span class="status-badge ${statusClass}">${statusText}</span></td>
                        <td>
                            <div class="actions-cell">
                                <button class="action-link" onclick="autologinClient('${client.tenantID}')">Acceder</button>
                                <button class="action-link suspend" onclick="toggleClientStatus('${client.tenantID}', '${client.status}')">
                                    ${client.status === 'SUSPENDU' ? 'Activer' : 'Suspendre'}
                                </button>
                                <button class="action-link delete" onclick="deleteClientLicense('${client.tenantID}')">Supprimer</button>
                            </div>
                        </td>
                    </tr>`;
                }).join('');

            } catch (e) {
                console.error("Erreur de chargement de la base réseau", e);
                tbody.innerHTML = `<tr><td colspan="9" style="text-align:center; color:var(--alert); padding:40px; font-weight:500;">Erreur de liaison avec le serveur MongoDB.</td></tr>`;
            }
        }

        // FONCTIONS APIS LIEES AUX ACTIONS DU TABLEAU DE BORD
        async function updateClientPlan(tenantID, newPlan) {
            try {
                const res = await fetch(`${SERVER_URL}/api/admin/update-plan`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID, plan: newPlan })
                });
                const data = await res.json();
                if(data.success) console.log(`Forfait de ${tenantID} mis a jour sur ${newPlan}`);
                else alert("Erreur lors du changement de forfait.");
            } catch(e) { alert("Erreur reseau."); }
        }

        async function toggleClientStatus(tenantID, currentStatus) {
            const nextStatus = currentStatus === 'SUSPENDU' ? 'ACTIF' : 'SUSPENDU';
            if(!confirm(`Changer le statut de ${tenantID} vers : ${nextStatus} ?`)) return;
            try {
                const res = await fetch(`${SERVER_URL}/api/admin/toggle-status`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID, status: nextStatus })
                });
                const data = await res.json();
                if(data.success) loadNetworkDatabase();
            } catch(e) { alert("Erreur de communication."); }
        }

        function autologinClient(tenantID) {
            window.open(`administration.html?tenantID=${tenantID}`, '_blank');
        }

        async function editClientPin(tenantID, oldPin) {
            const newPin = prompt(`Nouveau code PIN pour ${tenantID} :`, oldPin);
            if(!newPin || isNaN(newPin)) return;
            try {
                await fetch(`${SERVER_URL}/api/admin/update-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID, pin: newPin })
                });
                loadNetworkDatabase();
            } catch(e) { console.error(e); }
        }

        async function editDeviceLimit(tenantID, currentLimit) {
            const newLimit = prompt(`Nombre maximal d écrans pour ${tenantID} :`, currentLimit);
            if(!newLimit || isNaN(newLimit)) return;
            try {
                await fetch(`${SERVER_URL}/api/admin/update-device-limit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID, limit: parseInt(newLimit) })
                });
                loadNetworkDatabase();
            } catch(e) { console.error(e); }
        }

        async function editStaffLimit(tenantID, currentLimit) {
            const newLimit = prompt(`Nombre maximal de staff pour ${tenantID} :`, currentLimit);
            if(!newLimit || isNaN(newLimit)) return;
            try {
                await fetch(`${SERVER_URL}/api/admin/update-staff-limit`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID, limit: parseInt(newLimit) })
                });
                loadNetworkDatabase();
            } catch(e) { console.error(e); }
        }

        async function deleteClientLicense(tenantID) {
            if(!confirm(`ATTENTION : Supprimer definitivement la licence de ${tenantID} ? Cette action est irreversible.`)) return;
            try {
                const res = await fetch(`${SERVER_URL}/api/admin/delete-license`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID })
                });
                const data = await res.json();
                if(data.success) loadNetworkDatabase();
            } catch(e) { console.error(e); }
        }

        window.addEventListener('load', loadNetworkDatabase);
    </script>
</body>
</html>
