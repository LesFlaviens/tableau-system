<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCHEF OS - Tour de Contrôle</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --panel: #0A0A0A; --border: rgba(255, 255, 255, 0.08); --border-strong: rgba(255, 255, 255, 0.2);
            --text-main: #f8fafc; --text-muted: #64748b; --gold: #d4af37;
            --accent: #10b981; --danger: #ef4444; --surface-hover: #141414;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; padding: 25px; box-sizing: border-box; display: flex; flex-direction: column; gap: 20px; }
        
        header { background: var(--panel); border: 1px solid var(--border-strong); padding: 20px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { margin: 0; font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; color: var(--gold); text-transform: uppercase; }
        
        .search-bar { width: 100%; max-width: 400px; background: #000; border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 6px; font-size: 0.95rem; outline: none; }
        .search-bar:focus { border-color: var(--gold); }

        .table-wrapper { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        table { width: 100%; border-collapse: collapse; text-align: left; font-size: 0.9rem; }
        th { background: rgba(255,255,255,0.02); color: var(--text-muted); font-weight: 700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; padding: 15px 20px; border-bottom: 1px solid var(--border); }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--surface-hover); }

        .status-badge { font-size: 0.7rem; font-weight: 900; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; display: inline-block; }
        .status-actif { background: rgba(16,185,129,0.1); color: var(--accent); border: 1px solid rgba(16,185,129,0.2); }
        .status-suspendu { background: rgba(239,68,68,0.1); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }

        select { background: #000; border: 1px solid var(--border-strong); color: var(--gold); padding: 8px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; outline: none; }
        select:focus { border-color: var(--gold); }

        .btn-action { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-main); padding: 8px 12px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-action:hover { background: #000; border-color: var(--text-main); }
        .btn-danger { color: var(--danger); border-color: rgba(239,68,68,0.3); }
        .btn-danger:hover { background: var(--danger); color: #000; border-color: var(--danger); }
        .btn-success { color: var(--accent); border-color: rgba(16,185,129,0.3); }
        .btn-success:hover { background: var(--accent); color: #000; border-color: var(--accent); }
        .btn-edit { color: var(--gold); border-color: rgba(212,175,55,0.3); }
        .btn-edit:hover { background: var(--gold); color: #000; border-color: var(--gold); }

        .flex-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1>🏰 iCHEF NETWORK : BASE DE DONNÉES RÉSEAU</h1>
        </div>
        <input type="text" id="admin-search" class="search-bar" placeholder="🔍 Rechercher un restaurant (ID, Nom, Email)..." onkeyup="filtrerRestos()">
    </header>

    <div class="table-wrapper">
        <table>
            <thead>
                <tr>
                    <th>Établissement</th>
                    <th>Contact</th>
                    <th>Forfait Actuel</th>
                    <th>Écrans Actifs / Max</th>
                    <th>Mot de passe (PIN)</th>
                    <th>Statut</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="tenants-list-container">
                <tr>
                    <td colspan="7" style="text-align: center; color: var(--text-muted); padding: 40px; font-style: italic;">Connexion atomique à la base MongoDB en cours...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script>
        const ADMIN_PASS = "Empire2026"; 
        const SERVER_URL = "https://tableau-system.onrender.com";

        let allTenants = [];

        async function loadAllTenants() {
            try {
                let res = await fetch(`${SERVER_URL}/api/get-all-tenants-admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ masterKey: ADMIN_PASS })
                });
                let data = await res.json();
                if (data.success) {
                    allTenants = data.tenants || [];
                    renderTenantsTable();
                } else {
                    alert("Erreur d'authentification SuperAdmin.");
                }
            } catch(e) { console.error("Erreur BDD:", e); }
        }

        function renderTenantsTable() {
            const container = document.getElementById('tenants-list-container');
            if (allTenants.length === 0) {
                container.innerHTML = `<tr><td colspan="7" style="text-align:center; color:var(--text-muted); padding:40px;">Aucun restaurant enregistré sous licence actuellement.</td></tr>`;
                return;
            }

            container.innerHTML = allTenants.map(t => {
                let statusClass = t.status === 'ACTIF' ? 'status-actif' : 'status-suspendu';
                let toggleStatusBtn = t.status === 'ACTIF' 
                    ? `<button class="btn-action btn-danger" onclick="executerAction('${t.id}', 'suspend')">Suspendre</button>`
                    : `<button class="btn-action btn-success" onclick="executerAction('${t.id}', 'activate')">Activer</button>`;

                return `
                    <tr class="resto-row" data-search="${String(t.id + ' ' + t.name + ' ' + t.email).toLowerCase()}">
                        <td>
                            <span style="font-weight:900; font-size:1rem; color:var(--text-main);">${t.name}</span><br>
                            <small style="color:var(--text-muted); font-weight:600;">ID: ${String(t.id).toLowerCase()}</small>
                        </td>
                        <td>
                            <span style="color:var(--text-main); font-weight:600;">${t.email}</span><br>
                            <small style="color:var(--text-muted);">${t.phone || 'Pas de tél'}</small>
                        </td>
                        <td>
                            <select onchange="changerForfait('${t.id}', this.value)">
                                <option value="PACK_A" ${t.pack === 'PACK_A' ? 'selected' : ''}>Pack A (49€)</option>
                                <option value="BUSINESS" ${t.pack === 'BUSINESS' ? 'selected' : ''}>Business (49€)</option>
                                <option value="CHEF_CUISINE" ${t.pack === 'CHEF_CUISINE' ? 'selected' : ''}>Chef Cuisine (19€)</option>
                                <option value="CHEF_PATISSERIE" ${t.pack === 'CHEF_PATISSERIE' ? 'selected' : ''}>Chef Patissier (19€)</option>
                                <option value="CHEF_BAR" ${t.pack === 'CHEF_BAR' ? 'selected' : ''}>Chef Barman (19€)</option>
                                <option value="EMPIRE" ${t.pack === 'EMPIRE' ? 'selected' : ''}>Empire (99€)</option>
                            </select>
                        </td>
                        <td>
                            <div style="display: flex; align-items: center; gap: 8px;">
                                <b style="font-size:1.1rem; color: ${t.activeScreens >= t.maxScreens ? 'var(--danger)' : 'var(--text-main)'};">${t.activeScreens}</b> 
                                <span style="color:var(--text-muted);">/</span>
                                <b style="font-size:1.1rem; color:var(--gold);">${t.maxScreens}</b>
                                
                                <div style="display: flex; flex-direction: column; gap: 4px; margin-left: 10px;">
                                    <button class="btn-action btn-edit" style="padding:4px 8px; font-size:0.6rem;" onclick="modifierNombreEcrans('${t.id}', ${t.maxScreens})">Modifier</button>
                                    <button class="btn-action btn-danger" style="padding:4px 8px; font-size:0.6rem;" onclick="executerAction('${t.id}', 'reset_devices')">Reset</button>
                                </div>
                            </div>
                        </td>
                        <td>
                            <span style="font-family:monospace; font-size:1.1rem; font-weight:bold; letter-spacing:1px;">${t.pin}</span>
                            <button class="btn-action btn-edit" style="margin-left:10px; padding:4px 8px; font-size:0.65rem;" onclick="modifierPinManuel('${t.id}')">Modifier</button>
                        </td>
                        <td>
                            <span class="status-badge ${statusClass}">${t.status}</span>
                        </td>
                        <td>
                            <div class="flex-actions" style="flex-direction:column; gap:5px;">
                                <a href="administration.html?tenantID=${t.id}" target="_blank" class="btn-action btn-success" style="text-align:center; text-decoration:none;">Accéder</a>
                                ${toggleStatusBtn}
                                <button class="btn-action btn-danger" onclick="supprimerCompteDefinitif('${t.id}')">Supprimer</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');
        }

        async function executerAction(tenantID, action, payload = {}) {
            try {
                let bodyData = { masterKey: ADMIN_PASS, tenantID, action, ...payload };
                let res = await fetch(`${SERVER_URL}/api/admin-action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });
                if (res.ok) {
                    loadAllTenants(); // Rechargement synchrone de la grille
                }
            } catch(e) { alert("Erreur de communication avec le serveur central."); }
        }

        function changerForfait(tenantID, nouveauPack) {
            if(confirm(`⚠️ Confirmer le changement de forfait vers [${nouveauPack}] ?`)) {
                executerAction(tenantID, 'set_plan', { newPlan: nouveauPack });
            } else {
                loadAllTenants(); // Annule visuellement le changement
            }
        }

        // 🔥 NOUVELLE FONCTION : MODIFIER LE NOMBRE MAX D'ÉCRANS 🔥
        function modifierNombreEcrans(tenantID, currentMax) {
            let nouveauMax = prompt(`🖥️ Saisissez le NOUVEAU nombre maximum d'écrans autorisés pour le restaurant ${tenantID.toUpperCase()} :`, currentMax);
            if (nouveauMax === null) return; // Le gars a annulé
            
            let val = parseInt(nouveauMax);
            if (isNaN(val) || val < 1) {
                return alert("Veuillez saisir un nombre valide (minimum 1).");
            }

            executerAction(tenantID, 'set_max_screens', { maxScreens: val });
        }

        function modifierPinManuel(tenantID) {
            let nouveauPin = prompt("🔢 Saisissez le nouveau Code PIN Master pour ce restaurant (4 chiffres minimum) :");
            if (!nouveauPin || nouveauPin.trim().length < 4) return;
            executerAction(tenantID, 'set_pin', { manualPin: nouveauPin.trim() });
        }

        function supprimerCompteDefinitif(tenantID) {
            if (confirm(`🚨 ATTENTION CRITIQUE ! Vous allez détruire définitivement le restaurant ${tenantID.toUpperCase()}.\nConfirmer la suppression définitive ?`)) {
                executerAction(tenantID, 'delete');
            }
        }

        function filtrerRestos() {
            let query = document.getElementById('admin-search').value.toLowerCase().trim();
            document.querySelectorAll('.resto-row').forEach(row => {
                let searchTxt = row.getAttribute('data-search');
                row.style.display = searchTxt.includes(query) ? '' : 'none';
            });
        }

        window.addEventListener('load', loadAllTenants);
    </script>
</body>
</html>
