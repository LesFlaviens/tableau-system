<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#030712" />
  <title>iCHEF — Pass Serveur / Runner</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

  <style>
    :root {
      --bg: #030712;
      --panel: rgba(17, 24, 39, 0.82);
      --panel-strong: rgba(15, 23, 42, 0.96);
      --border: rgba(55, 65, 81, 0.55);
      --border-strong: rgba(255,255,255,0.14);
      --text-main: #f9fafb;
      --text-muted: #9ca3af;
      --accent: #f59e0b;
      --ready: #10b981;
      --taken: #38bdf8;
      --late: #f43f5e;
      --warning: #a855f7;
      --danger: #ef4444;
      --font-mono: 'JetBrains Mono', monospace;
      --radius: 16px;
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      height: 100vh;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at 50% 0%, #111827 0%, var(--bg) 80%);
      color: var(--text-main);
      user-select: none;
      -webkit-user-select: none;
    }

    header {
      height: 74px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 22px;
      background: rgba(3, 7, 18, 0.86);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(14px);
      z-index: 100;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    .brand { display: flex; align-items: center; gap: 18px; min-width: 0; }
    .logo {
      font-weight: 900;
      letter-spacing: 3px;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .logo span { color: var(--accent); }

    .kpis { display: flex; gap: 10px; flex-wrap: wrap; }
    .kpi {
      min-width: 92px;
      padding: 7px 10px;
      border-radius: 10px;
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--border);
    }
    .kpi small {
      display: block;
      color: var(--text-muted);
      font-size: 0.58rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 3px;
    }
    .kpi strong {
      font-family: var(--font-mono);
      font-size: 0.92rem;
      color: #fff;
    }

    .header-actions { display: flex; gap: 9px; align-items: center; }
    .btn-top {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--text-main);
      border-radius: 9px;
      padding: 9px 13px;
      font-size: 0.72rem;
      font-weight: 900;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-top:hover { border-color: var(--accent); color: var(--accent); }

    .saturation-banner {
      display: none;
      padding: 12px 18px;
      background: var(--late);
      color: white;
      font-weight: 900;
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      box-shadow: inset 0 -4px 12px rgba(0,0,0,0.25);
    }
    .saturation-banner.show { display: block; }

    .layout {
      height: calc(100vh - 74px);
      display: grid;
      grid-template-columns: 1.2fr 1fr 0.85fr;
      gap: 0;
    }

    .column {
      min-width: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .column:last-child { border-right: none; }

    .column-head {
      padding: 17px 20px;
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
    }
    .column-title {
      font-size: 0.9rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 2px;
    }
    .badge {
      font-family: var(--font-mono);
      font-size: 0.75rem;
      font-weight: 900;
      color: #fff;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.05);
      border-radius: 999px;
      padding: 4px 10px;
      white-space: nowrap;
    }

    .scroll {
      flex: 1;
      overflow-y: auto;
      padding: 18px;
      scrollbar-width: none;
    }
    .scroll::-webkit-scrollbar { display: none; }

    .table-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 16px;
      overflow: hidden;
      box-shadow: 0 15px 35px rgba(0,0,0,0.26);
      animation: spawn 0.25s ease-out;
    }
    @keyframes spawn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .table-card.complete { border-color: var(--ready); box-shadow: 0 0 22px rgba(16,185,129,0.12); }
    .table-card.late { border-color: var(--late); box-shadow: 0 0 30px rgba(244,63,94,0.20); }
    .table-card.taken { border-color: var(--taken); }

    .card-top {
      padding: 14px 16px;
      background: rgba(0,0,0,0.3);
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }
    .table-name {
      font-weight: 900;
      font-size: 1.12rem;
      letter-spacing: 1px;
    }
    .table-meta {
      margin-top: 5px;
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      line-height: 1.5;
    }
    .table-wait {
      font-family: var(--font-mono);
      color: var(--accent);
      font-weight: 900;
      font-size: 0.84rem;
      text-align: right;
      white-space: nowrap;
    }
    .late .table-wait { color: var(--late); }

    .status-strip {
      padding: 8px 14px;
      font-size: 0.7rem;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1.2px;
      background: rgba(16,185,129,0.13);
      color: var(--ready);
      border-bottom: 1px solid rgba(16,185,129,0.16);
    }
    .late .status-strip { background: rgba(244,63,94,0.12); color: var(--late); border-color: rgba(244,63,94,0.2); }
    .taken .status-strip { background: rgba(56,189,248,0.12); color: var(--taken); border-color: rgba(56,189,248,0.2); }

    .items { padding: 12px 16px 6px; }
    .item-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 11px 0;
      border-bottom: 1px solid rgba(255,255,255,0.05);
      align-items: center;
    }
    .item-row:last-child { border-bottom: none; }
    .item-main { min-width: 0; }
    .item-name {
      font-size: 0.95rem;
      line-height: 1.35;
      font-weight: 800;
      color: #fff;
    }
    .qty {
      color: var(--accent);
      font-family: var(--font-mono);
      font-weight: 900;
      margin-right: 8px;
    }
    .item-sub {
      margin-top: 4px;
      color: var(--text-muted);
      font-size: 0.72rem;
      line-height: 1.45;
    }
    .obs {
      color: var(--late);
      background: rgba(244,63,94,0.08);
      border: 1px solid rgba(244,63,94,0.18);
      width: fit-content;
      padding: 3px 7px;
      border-radius: 6px;
      margin-top: 5px;
      font-size: 0.72rem;
      font-weight: 800;
    }

    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 14px 16px 16px;
      border-top: 1px solid var(--border);
      background: rgba(0,0,0,0.16);
    }
    .action-btn {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 10px;
      color: #fff;
      font-weight: 900;
      font-size: 0.74rem;
      text-transform: uppercase;
      letter-spacing: 0.9px;
      cursor: pointer;
      background: rgba(255,255,255,0.04);
      transition: 0.18s;
    }
    .action-btn:active { transform: scale(0.97); }
    .action-btn.take { border-color: var(--taken); color: var(--taken); background: rgba(56,189,248,0.08); }
    .action-btn.serve { border-color: var(--ready); color: var(--ready); background: rgba(16,185,129,0.08); }
    .action-btn.problem { border-color: var(--late); color: var(--late); background: rgba(244,63,94,0.08); }
    .action-btn.full { grid-column: 1 / -1; }
    .action-btn:hover.take { background: var(--taken); color: #001018; }
    .action-btn:hover.serve { background: var(--ready); color: #00170f; }
    .action-btn:hover.problem { background: var(--late); color: #fff; }

    .empty {
      color: var(--text-muted);
      text-align: center;
      padding: 75px 15px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border: 1px dashed var(--border-strong);
      border-radius: 16px;
      background: rgba(255,255,255,0.02);
    }

    .toast {
      position: fixed;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%) translateY(90px);
      background: #fff;
      color: #000;
      padding: 14px 28px;
      border-radius: 999px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 1px;
      z-index: 9999;
      opacity: 0;
      transition: 0.28s;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
    }
    .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
    .toast.alert { background: var(--late); color: #fff; }

    .modal {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(3,7,18,0.86);
      backdrop-filter: blur(12px);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .modal.show { display: flex; }
    .modal-box {
      width: 100%;
      max-width: 460px;
      background: var(--panel-strong);
      border: 1px solid var(--border-strong);
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.6);
    }
    .modal-box h3 { margin: 0 0 12px 0; color: var(--late); font-weight: 900; text-transform: uppercase; letter-spacing: 1.4px; }
    textarea {
      width: 100%;
      min-height: 110px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(0,0,0,0.25);
      color: #fff;
      padding: 12px;
      font-family: inherit;
      resize: none;
      outline: none;
    }
    .modal-actions { display: flex; gap: 10px; margin-top: 14px; justify-content: flex-end; }

    @media (max-width: 1180px) {
      header { height: auto; min-height: 74px; flex-wrap: wrap; gap: 12px; }
      .layout { height: calc(100vh - 120px); grid-template-columns: 1fr; }
      .column { min-height: 45vh; border-right: none; border-bottom: 1px solid var(--border); }
      .column:last-child { border-bottom: none; }
    }

    @media (max-width: 680px) {
      .kpis { width: 100%; display: grid; grid-template-columns: repeat(2, 1fr); }
      .header-actions { width: 100%; overflow-x: auto; }
      .card-actions { grid-template-columns: 1fr; }
      .action-btn.full { grid-column: auto; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand">
      <div class="logo">iCHEF <span>RUNNER PASS</span></div>
      <div class="kpis">
        <div class="kpi"><small>Assiettes prêtes</small><strong id="kpi-ready">0</strong></div>
        <div class="kpi"><small>Tables complètes</small><strong id="kpi-complete">0</strong></div>
        <div class="kpi"><small>Attente max</small><strong id="kpi-maxwait">--</strong></div>
        <div class="kpi"><small>Serveurs actifs</small><strong id="kpi-staff">0</strong></div>
      </div>
    </div>

    <div class="header-actions">
      <button class="btn-top" onclick="forceRefresh()">🔄 Sync</button>
      <button class="btn-top" onclick="window.location.href='production.html?tenantID=' + tenantID">🍳 Pass Cuisine</button>
      <button class="btn-top" onclick="window.location.href='pack-eco.html?tenantID=' + tenantID">🧾 Caisse Salle</button>
      <button class="btn-top" onclick="window.location.href='admin.html?tenantID=' + tenantID">⚙️ Admin</button>
    </div>
  </header>

  <div id="saturation-banner" class="saturation-banner">
    ⚠️ PASS SATURÉ — priorité aux tables complètes, appel runner / serveur.
  </div>

  <main class="layout">
    <section class="column">
      <div class="column-head">
        <div class="column-title" style="color: var(--ready);">🟢 Prêt au pass</div>
        <span id="count-ready" class="badge">0</span>
      </div>
      <div id="ready-list" class="scroll"></div>
    </section>

    <section class="column">
      <div class="column-head">
        <div class="column-title" style="color: var(--taken);">🔵 Pris par serveur</div>
        <span id="count-taken" class="badge">0</span>
      </div>
      <div id="taken-list" class="scroll"></div>
    </section>

    <section class="column">
      <div class="column-head">
        <div class="column-title" style="color: var(--accent);">✅ Servi récemment</div>
        <span id="count-served" class="badge">0</span>
      </div>
      <div id="served-list" class="scroll"></div>
    </section>
  </main>

  <div id="problem-modal" class="modal">
    <div class="modal-box">
      <h3>Signaler un problème</h3>
      <p style="color: var(--text-muted); margin-top:0; line-height:1.5;">Le plat repassera en cuisine avec la mention “À refaire”.</p>
      <textarea id="problem-text" placeholder="Exemple : mauvaise cuisson, plat tombé, erreur de siège, allergène oublié..."></textarea>
      <div class="modal-actions">
        <button class="btn-top" onclick="closeProblemModal()">Annuler</button>
        <button class="action-btn problem" onclick="confirmProblem()">Envoyer en cuisine</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    let tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id') || 'MASTER_STATE';
    const SERVER_URL = (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
      ? 'http://localhost:10000'
      : 'https://tableau-system.onrender.com';

    let activeOrders = {};
    let staffAccess = [];
    let lastRenderHash = '';
    let selectedProblem = null;
    let audioCtx = null;
    let knownReadyKeys = new Set();
    let firstScan = true;

    const READY_STATUSES = ['PRET_AU_PASS', 'PRÊT_AU_PASS', 'READY_AT_PASS', 'READY'];
    const TAKEN_STATUSES = ['PRIS_PAR_SERVEUR', 'TAKEN_BY_WAITER', 'RUNNER_TAKEN'];
    const SERVED_STATUSES = ['SERVI', 'SERVED'];

    document.addEventListener('click', initAudio, { once: true });
    document.addEventListener('touchstart', initAudio, { once: true });

    function initAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }

    function beep(type = 'normal') {
      if (!audioCtx) return;
      try {
        const now = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type === 'alert' ? 'sawtooth' : 'sine';
        osc.frequency.setValueAtTime(type === 'alert' ? 220 : 880, now);
        osc.frequency.linearRampToValueAtTime(type === 'alert' ? 620 : 1180, now + 0.16);
        gain.gain.setValueAtTime(type === 'alert' ? 0.35 : 0.22, now);
        gain.gain.exponentialRampToValueAtTime(0.001, now + 0.28);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(now);
        osc.stop(now + 0.3);
      } catch(e) {}
    }

    function escapeHTML(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function getItemName(item) {
      return item.n || item.name || item.label || item.title || 'Article sans nom';
    }

    function getItemDestination(item) {
      return String(item.dest || item.destination || item.category || '').toLowerCase();
    }

    function isMasterKey(key) {
      return key.includes('MASTER') || key.includes('ARCHIVE') || key.includes('CATEGORIES') || key.includes('ARCHITECTURE') || key.includes('HACCP') || key.includes('INVENTORY');
    }

    function normalizeOrder(raw, tableId) {
      if (!raw) return null;
      const order = raw.data && !Array.isArray(raw.data) ? raw.data : raw;
      if (!order || !Array.isArray(order.items)) return null;
      order.tableKey = tableId;
      return order;
    }

    function itemStatus(item) {
      return String(item.status || item.productionStatus || '').toUpperCase();
    }

    function isItemServed(item) {
      const st = itemStatus(item);
      return item.served === true || SERVED_STATUSES.includes(st);
    }

    function isItemTaken(item) {
      const st = itemStatus(item);
      return item.pickedByServer === true || item.takenByServer === true || TAKEN_STATUSES.includes(st);
    }

    function isItemReadyForRunner(item) {
      const st = itemStatus(item);

      // Compatibilité avec ton pass cuisine actuel : quand il clique “ÉJECTER”, item.done devient true.
      // En version PRO, on préfère aussi item.status = "PRET_AU_PASS".
      return !isItemServed(item) && (
        READY_STATUSES.includes(st) ||
        item.readyAt ||
        item.done === true
      );
    }

    function getReadyTime(item, order) {
      const raw = item.readyAt || item.doneAt || item.itemId || order.time || Date.now();
      const n = Number(raw);
      return isNaN(n) ? Date.now() : n;
    }

    function getTableLabel(tableId) {
      const raw = String(tableId || '').replace(/^WEB_/i, '').replace(/^order_/i, '');
      if (/^\d{13}$/.test(raw) || raw.toLowerCase().includes('apercu')) return 'CLIENT WEB';
      return 'TABLE ' + raw;
    }

    function getSource(order) {
      return order.source || order.zone || order.room || 'SALLE';
    }

    function getRunnerName() {
      const stored = localStorage.getItem('ichef_runner_name');
      if (stored) return stored;
      const active = staffAccess.find(s => s.onDuty && String(s.dept || s.role || '').toLowerCase().includes('salle')) || staffAccess.find(s => s.onDuty);
      return active ? active.name : 'Serveur';
    }

    function collectRunnerData() {
      const readyGroups = {};
      const takenGroups = {};
      const servedGroups = {};
      let readyPlateCount = 0;
      let maxWait = 0;
      let completeTables = 0;
      let newlyReady = false;

      for (const tableId in activeOrders) {
        if (isMasterKey(tableId)) continue;
        const order = normalizeOrder(activeOrders[tableId], tableId);
        if (!order || order.status === 'reserved' || order.status === 'EN ATTENTE PAIEMENT') continue;

        const sentItems = order.items
          .map((item, index) => ({ item, index }))
          .filter(({ item }) => item.isSent !== false && getItemName(item));

        const readyItems = [];
        const takenItems = [];
        const servedItems = [];
        let hasPendingKitchen = false;

        sentItems.forEach(({ item, index }) => {
          if (isItemServed(item)) {
            const servedAt = Number(item.servedAt || 0);
            if (!servedAt || Date.now() - servedAt < 25 * 60000) servedItems.push({ item, index });
            return;
          }

          if (isItemTaken(item)) {
            takenItems.push({ item, index });
            return;
          }

          if (isItemReadyForRunner(item)) {
            readyItems.push({ item, index });
            const key = tableId + '_' + (item.itemId || index) + '_' + getItemName(item);
            if (!knownReadyKeys.has(key)) {
              knownReadyKeys.add(key);
              if (!firstScan) newlyReady = true;
            }
            return;
          }

          if (!item.done) hasPendingKitchen = true;
        });

        if (readyItems.length) {
          const oldest = Math.min(...readyItems.map(({ item }) => getReadyTime(item, order)));
          const waitMin = Math.floor((Date.now() - oldest) / 60000);
          if (waitMin > maxWait) maxWait = waitMin;
          readyPlateCount += readyItems.reduce((sum, ref) => sum + Number(ref.item.qty || 1), 0);

          const tableComplete = !hasPendingKitchen && sentItems.length > 0;
          if (tableComplete) completeTables++;

          readyGroups[tableId] = {
            tableId,
            order,
            items: readyItems,
            oldest,
            waitMin,
            tableComplete,
            source: getSource(order)
          };
        }

        if (takenItems.length) {
          const oldest = Math.min(...takenItems.map(({ item }) => Number(item.pickedAt || item.takenAt || Date.now())));
          takenGroups[tableId] = { tableId, order, items: takenItems, oldest, source: getSource(order) };
        }

        if (servedItems.length) {
          const newest = Math.max(...servedItems.map(({ item }) => Number(item.servedAt || Date.now())));
          servedGroups[tableId] = { tableId, order, items: servedItems, newest, source: getSource(order) };
        }
      }

      firstScan = false;
      if (newlyReady) beep('normal');

      const ready = Object.values(readyGroups).sort((a,b) => {
        if (a.tableComplete && !b.tableComplete) return -1;
        if (!a.tableComplete && b.tableComplete) return 1;
        return a.oldest - b.oldest;
      });

      const taken = Object.values(takenGroups).sort((a,b) => a.oldest - b.oldest);
      const served = Object.values(servedGroups).sort((a,b) => b.newest - a.newest).slice(0, 12);

      return { ready, taken, served, readyPlateCount, completeTables, maxWait };
    }

    function renderAll() {
      const data = collectRunnerData();
      const hash = JSON.stringify({
        ready: data.ready.map(g => [g.tableId, g.items.length, g.waitMin, g.tableComplete]),
        taken: data.taken.map(g => [g.tableId, g.items.length]),
        served: data.served.map(g => [g.tableId, g.items.length])
      });

      if (hash !== lastRenderHash) {
        renderColumn('ready-list', data.ready, 'ready');
        renderColumn('taken-list', data.taken, 'taken');
        renderColumn('served-list', data.served, 'served');
        lastRenderHash = hash;
      }

      document.getElementById('count-ready').innerText = data.ready.length + ' TABLES';
      document.getElementById('count-taken').innerText = data.taken.length + ' TABLES';
      document.getElementById('count-served').innerText = data.served.length + ' TABLES';

      document.getElementById('kpi-ready').innerText = data.readyPlateCount;
      document.getElementById('kpi-complete').innerText = data.completeTables;
      document.getElementById('kpi-maxwait').innerText = data.maxWait > 0 ? data.maxWait + ' min' : '--';
      document.getElementById('kpi-staff').innerText = staffAccess.filter(s => s.onDuty).length;

      const saturated = data.readyPlateCount >= 10 || data.ready.length >= 5 || data.maxWait >= 5;
      document.getElementById('saturation-banner').classList.toggle('show', saturated);
      if (saturated && data.maxWait >= 5) beep('alert');
    }

    function renderColumn(containerId, groups, mode) {
      const container = document.getElementById(containerId);
      if (!container) return;

      if (!groups.length) {
        container.innerHTML = '<div class="empty">Aucune assiette à traiter</div>';
        return;
      }

      container.innerHTML = groups.map(group => renderTableCard(group, mode)).join('');
    }

    function renderTableCard(group, mode) {
      const tableLabel = getTableLabel(group.tableId);
      const isLate = mode === 'ready' && group.waitMin >= 5;
      const isComplete = mode === 'ready' && group.tableComplete;
      const cls = mode === 'taken' ? 'taken' : (isLate ? 'late' : (isComplete ? 'complete' : ''));
      const statusText = mode === 'ready'
        ? (isComplete ? 'Table complète — à envoyer' : 'Assiettes prêtes — table partielle')
        : mode === 'taken'
          ? 'Pris par serveur — à déposer'
          : 'Servi récemment';

      const waitText = mode === 'ready'
        ? `${group.waitMin || 0} min au pass`
        : mode === 'taken'
          ? `${Math.floor((Date.now() - group.oldest) / 60000)} min en main`
          : 'OK';

      const itemsHtml = group.items.map(({ item, index }) => {
        const seat = item.seat && Number(item.seat) > 0 ? `Siège ${escapeHTML(item.seat)}` : '';
        const obs = item.obs ? `<div class="obs">⚠️ ${escapeHTML(item.obs)}</div>` : '';
        const runner = item.pickedBy || item.runnerName ? `<br>Pris par : ${escapeHTML(item.pickedBy || item.runnerName)}` : '';
        return `
          <div class="item-row">
            <div class="item-main">
              <div class="item-name"><span class="qty">${escapeHTML(item.qty || 1)}x</span>${escapeHTML(getItemName(item))}</div>
              <div class="item-sub">${seat}${runner}</div>
              ${obs}
            </div>
          </div>`;
      }).join('');

      let actions = '';
      if (mode === 'ready') {
        actions = `
          <button class="action-btn take full" onclick="takeTable('${escapeHTML(group.tableId)}')">Pris en charge — table</button>
          <button class="action-btn serve" onclick="serveTable('${escapeHTML(group.tableId)}')">Servi direct</button>
          <button class="action-btn problem" onclick="openProblemModal('${escapeHTML(group.tableId)}')">Problème</button>
        `;
      } else if (mode === 'taken') {
        actions = `
          <button class="action-btn serve full" onclick="serveTable('${escapeHTML(group.tableId)}')">Servi à table</button>
          <button class="action-btn problem full" onclick="openProblemModal('${escapeHTML(group.tableId)}')">Problème / à refaire</button>
        `;
      }

      return `
        <div class="table-card ${cls}">
          <div class="status-strip">${statusText}</div>
          <div class="card-top">
            <div>
              <div class="table-name">${escapeHTML(tableLabel)}</div>
              <div class="table-meta">${escapeHTML(group.source)} — ${group.items.length} ligne(s)</div>
            </div>
            <div class="table-wait">${escapeHTML(waitText)}</div>
          </div>
          <div class="items">${itemsHtml}</div>
          ${actions ? `<div class="card-actions">${actions}</div>` : ''}
        </div>
      `;
    }

    async function updateOrder(tableId, order) {
      await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tableId, order })
      });
    }

    async function takeTable(tableId) {
      const order = normalizeOrder(activeOrders[tableId], tableId);
      if (!order) return;
      const runner = getRunnerName();

      order.items.forEach(item => {
        if (isItemReadyForRunner(item) && !isItemTaken(item) && !isItemServed(item)) {
          item.status = 'PRIS_PAR_SERVEUR';
          item.pickedByServer = true;
          item.pickedBy = runner;
          item.pickedAt = Date.now();
        }
      });

      await updateOrder(tableId, order);
      showToast('Pris en charge');
      await forceRefresh();
    }

    async function serveTable(tableId) {
      const order = normalizeOrder(activeOrders[tableId], tableId);
      if (!order) return;
      const runner = getRunnerName();

      order.items.forEach(item => {
        if ((isItemReadyForRunner(item) || isItemTaken(item)) && !isItemServed(item)) {
          item.status = 'SERVI';
          item.served = true;
          item.servedBy = runner;
          item.servedAt = Date.now();
        }
      });

      const allServed = order.items.filter(i => i.isSent !== false).every(i => isItemServed(i));
      if (allServed) order.status = 'SERVI';

      await updateOrder(tableId, order);
      showToast('Servi à table');
      await forceRefresh();
    }

    function openProblemModal(tableId) {
      selectedProblem = tableId;
      document.getElementById('problem-text').value = '';
      document.getElementById('problem-modal').classList.add('show');
    }

    function closeProblemModal() {
      selectedProblem = null;
      document.getElementById('problem-modal').classList.remove('show');
    }

    async function confirmProblem() {
      if (!selectedProblem) return;
      const tableId = selectedProblem;
      const order = normalizeOrder(activeOrders[tableId], tableId);
      if (!order) return;
      const reason = document.getElementById('problem-text').value.trim() || 'Problème signalé par la salle';

      order.items.forEach(item => {
        if ((isItemReadyForRunner(item) || isItemTaken(item)) && !isItemServed(item)) {
          item.status = 'A_REFAIRE';
          item.done = false;
          item.served = false;
          item.pickedByServer = false;
          item.obs = item.obs ? `${item.obs} | À REFAIRE : ${reason}` : `À REFAIRE : ${reason}`;
          item.readyAt = null;
          item.pickedAt = null;
        }
      });

      order.status = 'EN COURS';
      await updateOrder(tableId, order);
      closeProblemModal();
      showToast('Retour cuisine envoyé', true);
      await forceRefresh();
    }

    function applyState(state) {
      if (!state) return;
      const aO = state.activeOrders || state || {};
      activeOrders = aO;
      if (aO['STAFF_ACCESS'] && aO['STAFF_ACCESS'].data) staffAccess = aO['STAFF_ACCESS'].data;
      renderAll();
    }

    async function forceRefresh() {
      try {
        const r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}&_t=${Date.now()}`, { cache: 'no-store' });
        if (r.ok) {
          const state = await r.json();
          applyState(state);
        }
      } catch(e) {
        console.error('Erreur sync runner pass', e);
        showToast('Réseau instable', true);
      }
    }

    function showToast(msg, alert = false) {
      const t = document.getElementById('toast');
      t.innerText = msg;
      t.classList.toggle('alert', alert);
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2200);
    }

    try {
      const socket = io(SERVER_URL, { transports: ['websocket', 'polling'] });
      socket.emit('joinTenant', tenantID);
      socket.on('updateState', (state) => applyState(state));
      socket.on('connect', () => forceRefresh());
    } catch(e) {
      console.warn('Socket indisponible, fallback fetch actif');
    }

    document.addEventListener('visibilitychange', () => {
      if (!document.hidden) forceRefresh();
    });

    setInterval(forceRefresh, 15000);
    forceRefresh();
  </script>
</body>
</html>
