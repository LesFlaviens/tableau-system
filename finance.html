<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire Finance - Pilotage Stratégique</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --panel: #111; --gold: #ffb300; --blue: #00b0ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 25px; }
        header { border-bottom: 2px solid #222; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 40px; }
        .card { background: var(--panel); border: 1px solid #222; padding: 25px; border-radius: 15px; }
        .card-label { font-size: 0.7rem; color: #666; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }
        .card-val { font-size: 2.2rem; font-weight: 900; margin-top: 10px; }
        .table-fin { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 12px; overflow: hidden; }
        .table-fin th { background: #1a1a1a; padding: 15px; text-align: left; font-size: 0.75rem; color: #555; text-transform: uppercase; }
        .table-fin td { padding: 15px; border-bottom: 1px solid #222; font-weight: bold; }
        .badge-hs { background: rgba(255, 23, 68, 0.1); color: var(--alert); padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <h1 style="color:var(--gold); margin:0; letter-spacing:3px;">DIRECTION FINANCIÈRE</h1>
        <input type="date" id="fin-date" style="background:#111; color:#fff; border:1px solid #333; padding:10px; border-radius:8px;">
    </header>

    <div class="grid">
        <div class="card" style="border-top: 5px solid var(--accent);"><div class="card-label">Actif (Revenus Jour)</div><div class="card-val" id="ca-val">0.00 €</div></div>
        <div class="card" style="border-top: 5px solid var(--alert);"><div class="card-label">Passif (Main d'œuvre)</div><div class="card-val" id="staff-val">0.00 €</div></div>
        <div class="card" style="border-top: 5px solid var(--blue);"><div class="card-label">Passif (Achats/Food)</div><div class="card-val" id="food-val">0.00 €</div></div>
        <div class="card" style="border-top: 5px solid var(--gold);"><div class="card-label">EBITDA (Bénéfice Net)</div><div class="card-val" id="net-val">0.00 €</div></div>
    </div>

    <h2 style="text-transform:uppercase; font-size:1rem; margin-bottom:20px;">⏱️ RÉCAPITULATIF STAFF & HEURES SUPPLÉMENTAIRES</h2>
    <table class="table-fin">
        <thead><tr><th>Employé</th><th>Poste</th><th>Heures Contrat</th><th>Heures Réelles</th><th>Heures Supp.</th><th>Coût Jour</th></tr></thead>
        <tbody id="staff-body"></tbody>
    </table>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('key') !== 'ICHEF2026') document.body.innerHTML = "Accès Interdit";

        document.getElementById('fin-date').valueAsDate = new Date();

        function updateFinance() {
            const date = document.getElementById('fin-date').value;
            const sales = JSON.parse(localStorage.getItem('kds_archives_10ans')) || {};
            const daySales = sales[date] || {};
            
            // Calcul CA (Actif)
            let ca = 0;
            Object.entries(daySales).forEach(([n, q]) => ca += (q * 25)); // Moyenne 25€/plat
            document.getElementById('ca-val').innerText = ca.toFixed(2) + " €";

            // Calcul Staff (Passif)
            const staff = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            let totalStaffCost = 0;
            document.getElementById('staff-body').innerHTML = staff.map(s => {
                const hourlyRate = 25; 
                const realH = 8.5; // Simulé
                const hs = realH - 8;
                const cost = realH * hourlyRate;
                totalStaffCost += cost;
                return `<tr><td>${s.name}</td><td>${s.dept}</td><td>8.0h</td><td>${realH}h</td><td><span class="badge-hs">+${hs}h</span></td><td>${cost.toFixed(2)}€</td></tr>`;
            }).join('');
            document.getElementById('staff-val').innerText = totalStaffCost.toFixed(2) + " €";

            // Food Cost (Estimé 30%)
            const foodCost = ca * 0.30;
            document.getElementById('food-val').innerText = foodCost.toFixed(2) + " €";

            // Net
            const net = ca - totalStaffCost - foodCost - 150; // -150€ frais fixes jour
            document.getElementById('net-val').innerText = net.toFixed(2) + " €";
            document.getElementById('net-val').style.color = net > 0 ? 'var(--accent)' : 'var(--alert)';
        }

        document.getElementById('fin-date').onchange = updateFinance;
        updateFinance();
    </script>
</body>
</html>
