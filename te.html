<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Serveur</title>
    <style>
        /* 🚫 CACHER LES FLÈCHES DES NOMBRES 🚫 */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none !important; margin: 0 !important; }
        input[type="number"] { -moz-appearance: textfield !important; appearance: textfield !important; }

        /* 💎 DESIGN LUXE 💎 */
        :root { 
            --bg: #050505;          
            --panel: #0a0a0a;        
            --border: rgba(255, 255, 255, 0.15);        
            --text-main: #ffffff;    
            --text-muted: #777777;   
            --gold: #d4af37;         
            --gold-dim: rgba(212, 175, 55, 0.05);
            --accent: #10b981;       
            --alert: #ef4444;        
            --ordered: #ffffff;      
            --purple: #d4af37;       
            --service: #ffffff;      
            --blur: blur(20px);
        }
        
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; -webkit-tap-highlight-color: transparent;}
        
        header { background: rgba(5,5,5,0.85); backdrop-filter: var(--blur); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .nav-btns { display: flex; gap: 10px; align-items: center; }
        
        .btn-mini { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 16px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s;}
        .btn-mini:active { transform: scale(0.95); }
        .btn-mini.gold { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

        #archi-btn-bar { display: none; background: var(--panel); padding: 15px; border-bottom: 1px solid var(--border); justify-content: center; gap: 15px; z-index: 50; }
        .edit-mode #archi-btn-bar { display: flex; }

        /* PLAN DE SALLE & TABLES */
        .floor-plan-wrapper { flex: 1; overflow: auto; background: var(--bg); position: relative;}
        .floor-plan { position: relative; width: 2000px; height: 1500px; }
        .edit-mode .floor-plan { background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 40px 40px; }

        .table-wrapper { position: absolute; display: flex; justify-content: center; align-items: center; }
        .table-obj { position: relative; width: 100%; height: 100%; background: var(--panel); border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.2rem; color: var(--text-main); cursor: pointer; z-index: 10; transition: 0.2s;}
        .table-obj:active { transform: scale(0.95); border-color: var(--gold); }
        
        /* Formes */
        .shape-oval { border-radius: 50%; }
        .shape-rect { border-radius: 4px; }
        .shape-losange { transform: rotate(45deg); }
        .shape-losange .table-content { transform: rotate(-45deg); }

        /* Statuts */
        .status-hold .table-obj { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
        .status-cooking .table-obj { border-color: #f97316; color: #f97316; }
        .status-ready .table-obj { border-color: var(--accent); background: rgba(16, 185, 129, 0.2); color: var(--accent); animation: pulse 2s infinite;}
        .status-reserved .table-obj { border-style: dashed; color: var(--text-muted); }
        
        @keyframes pulse { 0% { box-shadow: 0 0 0 rgba(16, 185, 129, 0); } 50% { box-shadow: 0 0 15px rgba(16, 185, 129, 0.5); } 100% { box-shadow: 0 0 0 rgba(16, 185, 129, 0); } }

        .edit-mode .table-wrapper { cursor: move; }
        .table-resizer { position: absolute; bottom: -5px; right: -5px; width: 20px; height: 20px; background: var(--gold); display: none; cursor: se-resize; z-index: 100; border-radius: 50%;}
        .edit-mode .table-resizer { display: block; }

        /* TIROIR COMMANDE */
        .drawer { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: none; flex-direction: column; }
        .drawer.open { display: flex; }
        .drawer-body { display:flex; flex:1; overflow:hidden; }
        
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; padding: 20px; overflow-y: auto; align-content: start; }
        .btn-item { background: var(--panel); border: 1px solid var(--border); color: var(--text-main); padding: 15px; border-radius: 8px; font-weight: bold; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; cursor: pointer; }
        .btn-item:active { transform: scale(0.95); border-color: var(--gold); }
        .btn-item .price { color: var(--gold); }

        .ticket-view { flex: 0 0 350px; background: var(--panel); border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column;}
        .ticket-item-row { display:flex; justify-content:space-between; align-items:center; padding:12px 10px; border-bottom: 1px solid var(--border); }
        
        /* SEAT BAR (Qui mange quoi) */
        #seat-bar-container { display:flex; gap:10px; padding:15px; background:var(--panel); border-bottom:1px solid var(--border); overflow-x: auto; align-items:center; }
        .seat-btn { border-radius: 20px; padding: 8px 15px; font-size: 0.85rem; }
        .seat-badge { background: #fff; color: #000; padding: 2px 6px; border-radius: 4px; font-size: 0.75rem; margin-right: 8px; font-weight: 900;}

        /* MODALES */
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: var(--blur); }
        .modal.open { display: flex; }
        .modal-box { background: var(--panel); padding: 30px; border-radius: 12px; border: 1px solid var(--border); width: 90%; max-width: 500px; text-align: center; }
        
        .pay-btn { background: var(--panel); border: 2px solid var(--accent); color: var(--accent); padding: 15px; font-size: 1.1rem; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; margin-bottom: 10px; }
        .pay-btn:active { background: var(--accent); color: #000; }

        @media (max-width: 800px) {
            .drawer-body { flex-direction: column; }
            .ticket-view { flex: none; height: 40vh; border-left: none; border-top: 2px solid var(--border); }
            header { flex-direction: column; padding: 10px; }
            .nav-btns { width: 100%; justify-content: center; }
        }
    </style>
</head>
<body>

    <div id="archi-btn-bar">
        <button class="btn-mini" onclick="addNewTable()">+ Nouvelle Table</button>
        <button class="btn-mini gold" onclick="saveArchitecture()">💾 Sauvegarder le Plan</button>
        <button class="btn-mini" style="border-color:var(--alert); color:var(--alert);" onclick="closeArchiMode()">❌ Quitter Archi</button>
    </div>

    <header>
        <div class="header-left">
            <div style="font-weight:900; letter-spacing:2px; font-size: 1.3rem; color: var(--gold);">EMPIRE PAD</div>
            <div id="user-badge" style="background:var(--panel); padding:6px 12px; border-radius:6px; font-size:0.85rem; border:1px solid var(--border);">Serveur: Caisse</div>
        </div>
        <div class="nav-btns">
            <button class="btn-mini gold" onclick="unlockArchiMode()">🏗️ MODIFIER SALLE</button>
            <button class="btn-mini" style="border-color: var(--accent); color: var(--accent);" onclick="openQuickOrder()">📝 COMMANDE RAPIDE</button>
        </div>
    </header>

    <div class="floor-plan-wrapper">
        <div id="floor-plan" class="floor-plan"></div>
    </div>

    <div id="order-drawer" class="drawer">
        <div style="padding:15px 25px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background: var(--panel);">
            <h2 id="table-label" style="margin:0; font-size: 1.5rem; color: var(--gold);">TABLE</h2>
            <button class="btn-mini" onclick="closeOrder()">FERMER ✕</button>
        </div>

        <div class="drawer-body">
            <div style="flex:1; display:flex; flex-direction:column;">
                <div id="seat-bar-container"></div>

                <div style="display:flex; gap:10px; padding:10px; background:var(--panel); border-bottom:1px solid var(--border); overflow-x: auto;">
                    <button class="btn-mini" onclick="renderMenu('entrees')">🥗 ENTRÉES</button>
                    <button class="btn-mini" onclick="renderMenu('plats')">🔥 PLATS</button>
                    <button class="btn-mini" onclick="renderMenu('desserts')">🍰 DESSERTS</button>
                    <button class="btn-mini" onclick="renderMenu('boissons', 'bar')">🍸 BOISSONS</button>
                </div>

                <div id="menu" class="menu-grid"></div>
            </div>

            <div id="ticket" class="ticket-view">
                <div id="ticket-items" style="flex:1; overflow-y:auto;"></div>
                <div id="ticket-total" style="font-size: 1.5rem; font-weight: 900; color: var(--gold); text-align: right; margin-top: 15px; padding-top: 15px; border-top: 1px solid var(--border);">0.00€</div>
                
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="pay-btn" style="flex:2; margin:0;" onclick="sendOrder()">🚀 ENVOYER EN CUISINE</button>
                    <button class="pay-btn" style="flex:1; margin:0; border-color:var(--alert); color:var(--alert);" onclick="clearTicket()">🗑️ VIDER</button>
                </div>
            </div>
        </div>
    </div>

    <div id="table-config-modal" class="modal">
        <div class="modal-box">
            <h2 style="color:var(--gold); margin-top:0;">Configuration Table</h2>
            <input type="text" id="config-table-name" placeholder="Nom (ex: T1)" style="width: 100%; padding: 15px; margin-bottom: 15px; background: var(--bg); border: 1px solid var(--border); color: #fff; text-align:center; font-size:1.2rem;">
            
            <label style="color:var(--text-muted); display:block; margin-bottom:10px;">Couverts :</label>
            <input type="number" id="config-table-pax" value="2" style="width: 100px; padding: 15px; margin-bottom: 15px; text-align:center; font-size:1.2rem; background: var(--bg); color: #fff; border: 1px solid var(--border);">
            
            <label style="color:var(--text-muted); display:block; margin-bottom:10px;">Forme :</label>
            <select id="config-table-shape" style="width: 100%; padding: 15px; margin-bottom: 20px; background: var(--bg); color: #fff; border: 1px solid var(--border); font-size:1.1rem;">
                <option value="rect">Carré / Rectangle</option>
                <option value="oval">Rond / Ovale</option>
                <option value="losange">Losange</option>
            </select>

            <button class="pay-btn" style="margin-bottom:10px;" onclick="saveTableConfig()">✅ VALIDER</button>
            <button class="pay-btn" style="border-color:var(--alert); color:var(--alert); margin-bottom:10px;" onclick="deleteCurrentTable()">🗑️ SUPPRIMER</button>
            <button class="btn-mini" style="width: 100%; padding: 15px;" onclick="document.getElementById('table-config-modal').classList.remove('open')">Annuler</button>
        </div>
    </div>

    <script>
        // ----------------------------------------------------
        // 📡 MOTEUR RÉSEAU & DONNÉES
        // ----------------------------------------------------
        const tenantID = 'MASTER_STATE';
        const SERVER_URL = "https://tableau-system.onrender.com";

        let activeOrders = {}; 
        let currentTable = null; 
        let ticketItems = []; 
        let isArchiMode = false;
        let isDraggingTable = false;
        let configTableId = null;
        let currentSeat = 0; // 0 = Centre de table, 1 = Convive 1, etc.

        // EXEMPLES DE MENUS (Pour test si serveur vide)
        let menuCuisine = { 
            entrees: [{id:1, name: "Salade César", price: 12}, {id:2, name: "Foie Gras", price: 18}], 
            plats: [{id:3, name: "Entrecôte 300g", price: 28}, {id:4, name: "Risotto Truffe", price: 24}], 
            desserts: [{id:5, name: "Tiramisu", price: 9}] 
        };
        let menuBar = { boissons: [{id:6, name: "Mojito", price: 10}, {id:7, name: "Coca Cola", price: 4}] };

        // CHARGEMENT DE L'ARCHITECTURE SAUVEGARDÉE
        let tables = [];
        try {
            tables = JSON.parse(localStorage.getItem('empire_architecture')) || [
                {label:"T1", l:100, t:100, w:80, h:80, shape:"rect", pax: 2},
                {label:"T2", l:250, t:100, w:120, h:80, shape:"oval", pax: 4}
            ];
        } catch(e) { tables = []; }

        const API = {
            getState: async () => {
                try {
                    let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                    if(r.ok) {
                        let state = await r.json();
                        if(state.activeOrders) activeOrders = state.activeOrders;
                    }
                } catch(e) { console.log("Mode Hors Ligne"); }
            },
            update: async (key, data) => {
                let payload = { data: data };
                activeOrders[key] = payload;
                try {
                    await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ tableId: key, order: payload }) 
                    });
                } catch(e) {}
            }
        };

        // ----------------------------------------------------
        // 🏗️ GESTION ARCHITECTURE & PLAN DE SALLE
        // ----------------------------------------------------
        function unlockArchiMode() {
            isArchiMode = true;
            document.body.classList.add('edit-mode');
            renderFloor();
        }

        function closeArchiMode() {
            isArchiMode = false;
            document.body.classList.remove('edit-mode');
            renderFloor();
        }

        function addNewTable() {
            let nextNum = tables.length + 1;
            tables.push({ label: "T" + nextNum, l: 50, t: 50, w: 80, h: 80, shape: "rect", pax: 2 }); 
            renderFloor();
        }

        function saveArchitecture() {
            localStorage.setItem('empire_architecture', JSON.stringify(tables));
            API.update('ARCHITECTURE_MASTER', { tables: tables });
            closeArchiMode();
            alert("✅ Plan de salle sauvegardé !");
        }

        function openTableConfigModal(id) {
            let t = tables.find(x => x.label === id);
            if(!t) return;
            configTableId = id;
            document.getElementById('config-table-name').value = t.label;
            document.getElementById('config-table-pax').value = t.pax || 2;
            document.getElementById('config-table-shape').value = t.shape || 'rect';
            document.getElementById('table-config-modal').classList.add('open');
        }

        function saveTableConfig() {
            let t = tables.find(x => x.label === configTableId);
            if(t) {
                t.label = document.getElementById('config-table-name').value;
                t.pax = parseInt(document.getElementById('config-table-pax').value) || 2;
                t.shape = document.getElementById('config-table-shape').value;
            }
            document.getElementById('table-config-modal').classList.remove('open');
            renderFloor();
        }

        function deleteCurrentTable() {
            tables = tables.filter(t => t.label !== configTableId);
            document.getElementById('table-config-modal').classList.remove('open');
            renderFloor();
        }

        // LE MOTEUR DE DESSIN ET DRAG & DROP
        function makeInteractive(elmnt, tableObj, resizerElnt) {
            let p1=0, p2=0, p3=0, p4=0, iW, iH, iX, iY;
            elmnt.onmousedown = dragMD; elmnt.ontouchstart = dragTS;
            resizerElnt.onmousedown = resMD; resizerElnt.ontouchstart = resTS;

            function dragMD(e) { if(!isArchiMode || e.target === resizerElnt) return; e.preventDefault(); p3=e.clientX; p4=e.clientY; document.onmouseup=close; document.onmousemove=drag; }
            function dragTS(e) { if(!isArchiMode || e.target === resizerElnt) return; p3=e.touches[0].clientX; p4=e.touches[0].clientY; document.ontouchend=close; document.ontouchmove=tDrag; }
            function drag(e) { e.preventDefault(); isDraggingTable=true; p1=p3-e.clientX; p2=p4-e.clientY; p3=e.clientX; p4=e.clientY; updatePos(); }
            function tDrag(e) { isDraggingTable=true; p1=p3-e.touches[0].clientX; p2=p4-e.touches[0].clientY; p3=e.touches[0].clientX; p4=e.touches[0].clientY; updatePos(); }
            function updatePos() { elmnt.style.top = (elmnt.offsetTop-p2)+"px"; elmnt.style.left = (elmnt.offsetLeft-p1)+"px"; tableObj.t = elmnt.offsetTop; tableObj.l = elmnt.offsetLeft; }
            
            function resMD(e) { if(!isArchiMode) return; e.preventDefault(); e.stopPropagation(); iW=elmnt.offsetWidth; iH=elmnt.offsetHeight; iX=e.clientX; iY=e.clientY; document.onmouseup=close; document.onmousemove=res; }
            function resTS(e) { if(!isArchiMode) return; e.stopPropagation(); iW=elmnt.offsetWidth; iH=elmnt.offsetHeight; iX=e.touches[0].clientX; iY=e.touches[0].clientY; document.ontouchend=close; document.ontouchmove=tRes; }
            function res(e) { e.preventDefault(); isDraggingTable=true; updateDim(e.clientX, e.clientY); }
            function tRes(e) { isDraggingTable=true; updateDim(e.touches[0].clientX, e.touches[0].clientY); }
            function updateDim(cX, cY) { let nW = Math.max(40, iW+(cX-iX)); let nH = Math.max(40, iH+(cY-iY)); elmnt.style.width=nW+"px"; elmnt.style.height=nH+"px"; tableObj.w=nW; tableObj.h=nH; }
            function close() { document.onmouseup=null; document.onmousemove=null; document.ontouchend=null; document.ontouchmove=null; setTimeout(()=>{isDraggingTable=false; renderFloor(); }, 50); } 
        }

        function renderFloor() {
            let floor = document.getElementById('floor-plan');
            floor.innerHTML = '';

            tables.forEach(t => {
                let wrapper = document.createElement('div');
                wrapper.className = 'table-wrapper';
                wrapper.style.left = (t.l||0)+'px'; 
                wrapper.style.top = (t.t||0)+'px'; 
                wrapper.style.width = (t.w||80)+'px'; 
                wrapper.style.height = (t.h||80)+'px';

                // GESTION COULEUR SI COMMANDE EN COURS
                let orderData = activeOrders[t.label] ? activeOrders[t.label].data : null;
                if(orderData && orderData.items && orderData.items.length > 0) wrapper.classList.add('status-cooking');

                // DESSIN DU CORPS DE LA TABLE
                let d = document.createElement('div'); 
                d.className = 'table-obj shape-' + (t.shape || 'rect');
                d.innerHTML = `<div class="table-content">${t.label}</div>`;
                
                // BOUTON REDIMENSIONNEMENT OR
                let r = document.createElement('div'); 
                r.className = 'table-resizer'; 

                wrapper.appendChild(d);
                wrapper.appendChild(r);

                // CLIC SUR LA TABLE
                d.onclick = (e) => { 
                    if(isArchiMode) { 
                        if(!isDraggingTable && e.target !== r) openTableConfigModal(t.label); 
                    } else {
                        openOrder(t.label); 
                    }
                };

                makeInteractive(wrapper, t, r); 
                floor.appendChild(wrapper);
            });
        }

        // ----------------------------------------------------
        // 📝 GESTION DU "QUI MANGE QUOI" & PRISE DE COMMANDE
        // ----------------------------------------------------
        function renderSeatBar() {
            let tObj = tables.find(t => t.label === currentTable);
            let pax = tObj ? (tObj.pax || 2) : 2;

            let html = `<span style="color:var(--text-muted); font-size:0.8rem; font-weight:bold;">SÉLECTIONNER :</span>`;
            html += `<button class="btn-mini seat-btn ${currentSeat===0?'gold':''}" onclick="setSeat(0)">🍽️ À PARTAGER</button>`;
            
            for(let i=1; i<=pax; i++) {
                html += `<button class="btn-mini seat-btn ${currentSeat===i?'gold':''}" onclick="setSeat(${i})">👤 CONVIVE ${i}</button>`;
            }
            
            document.getElementById('seat-bar-container').innerHTML = html;
        }

        function setSeat(s) {
            currentSeat = s;
            renderSeatBar(); 
        }

        function renderMenu(categoryKey, type = 'cuisine') {
            let source = type === 'bar' ? menuBar : menuCuisine;
            let items = source[categoryKey] || [];
            
            let container = document.getElementById('menu');
            if(items.length === 0) {
                container.innerHTML = `<div style="color:var(--text-muted); width:100%; text-align:center;">Catégorie vide.</div>`;
                return;
            }

            container.innerHTML = items.map(item => `
                <button class="btn-item" onclick="addToTicket('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${type}')">
                    <span>${item.name}</span>
                    <span class="price">${item.price.toFixed(2)} €</span>
                </button>
            `).join('');
        }

        function addToTicket(name, price, dest) {
            // VERIFIE SI L'ITEM EXISTE DEJA POUR CETTE PERSONNE PRÉCISE
            let existing = ticketItems.find(i => i.n === name && i.seat === currentSeat && !i.fired);
            if (existing) {
                existing.qty += 1;
            } else {
                ticketItems.push({ 
                    id: Date.now(), 
                    n: name, 
                    price: price, 
                    qty: 1, 
                    dest: dest, 
                    fired: false, 
                    seat: currentSeat // 🟢 ASSOCIATION DU CONVIVE ICI
                });
            }
            renderTicket();
        }

        function renderTicket() {
            const container = document.getElementById('ticket-items');
            container.innerHTML = '';
            let total = 0;

            ticketItems.forEach((item, index) => {
                total += (item.price * item.qty);
                
                // 🟢 AFFICHAGE DU BADGE CONVIVE 🟢
                let seatBadge = item.seat > 0 
                    ? `<span class="seat-badge">👤 ${item.seat}</span>` 
                    : `<span class="seat-badge" style="background:var(--bg); color:var(--text-muted);">🍽️ TABLE</span>`;
                
                let fireStatus = item.fired ? `<span style="color:var(--accent); font-size:0.7rem; margin-left:10px;">(ENVOYÉ)</span>` : '';

                container.innerHTML += `
                    <div class="ticket-item-row" style="${item.fired ? 'opacity:0.6;' : ''}">
                        <div>
                            ${seatBadge}
                            <span style="color:var(--gold); font-weight:900;">${item.qty}x</span> 
                            ${item.n} ${fireStatus}
                        </div>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <span>${(item.price * item.qty).toFixed(2)}€</span>
                            ${!item.fired ? `<button class="btn-mini" style="padding:5px 8px; border-color:var(--alert); color:var(--alert);" onclick="removeTicketItem(${index})">X</button>` : ''}
                        </div>
                    </div>
                `;
            });

            document.getElementById('ticket-total').innerText = `Total TTC: ${total.toFixed(2)}€`;
        }

        function removeTicketItem(idx) {
            ticketItems.splice(idx, 1);
            renderTicket();
        }

        function openQuickOrder() {
            currentTable = "DIRECT_" + Date.now();
            ticketItems = [];
            document.getElementById('table-label').innerText = "COMMANDE DIRECTE";
            currentSeat = 0;
            renderSeatBar();
            renderMenu('plats');
            renderTicket();
            document.getElementById('order-drawer').classList.add('open');
        }

        function openOrder(tableLabel) {
            currentTable = tableLabel;
            document.getElementById('table-label').innerText = "TABLE " + tableLabel;
            
            // Charge les items existants s'ils existent sur le serveur
            if(activeOrders[tableLabel] && activeOrders[tableLabel].data && activeOrders[tableLabel].data.items) {
                ticketItems = JSON.parse(JSON.stringify(activeOrders[tableLabel].data.items));
            } else {
                ticketItems = [];
            }
            
            currentSeat = 0;
            renderSeatBar();
            renderMenu('plats');
            renderTicket();
            
            document.getElementById('order-drawer').classList.add('open');
        }

        function closeOrder() {
            document.getElementById('order-drawer').classList.remove('open');
            currentTable = null;
        }

        function clearTicket() {
            if(confirm("Voulez-vous vraiment vider tout ce qui n'a pas été envoyé ?")) {
                ticketItems = ticketItems.filter(i => i.fired);
                renderTicket();
            }
        }

        async function sendOrder() {
            if(ticketItems.length === 0) return alert("Le ticket est vide.");
            
            // Marque tout comme "Envoyé"
            ticketItems.forEach(i => { if(!i.fired) i.fired = true; });
            
            let data = {
                status: 'cooking',
                time: new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'}),
                items: ticketItems
            };

            await API.update(currentTable, data);
            closeOrder();
            renderFloor(); // Met à jour la couleur de la table sur le plan
        }

        // ----------------------------------------------------
        // 🚀 DÉMARRAGE DU SYSTÈME
        // ----------------------------------------------------
        function initApp() {
            renderFloor();
            API.getState(); // Lance la 1ère connexion réseau
            setInterval(API.getState, 3000); // Boucle de synchro
        }

        window.onload = initApp;

    </script>
</body>
</html>
