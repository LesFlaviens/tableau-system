<!DOCTYPE html>
<html lang="fr">
<head>
    <script>
    // 🛡️ GARDE DU CORPS iCHEF : CONTRÔLE STRICT DES ACCÈS B2B
        (async function checkAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";
            
            // S'il n'a pas d'ID, on le jette dehors
            if(!tenantID) return window.location.href = 'vitrine.html';

            try {
                const res = await fetch(`${SERVER_URL}/api/check-license?tenantID=${tenantID}`);
                const data = await res.json();
                
                // Si le compte est effacé ou suspendu par toi
                if(!data.success || data.status === 'SUSPENDU') {
                    alert("⛔ LICENCE SUSPENDUE OU INVALIDE.");
                    return window.location.href = 'vitrine.html';
                }

                const plan = data.plan; // 'CHEF', 'BUSINESS', ou 'PREMIUM'
                const currentPage = window.location.pathname.split('/').pop().toLowerCase();

                // Les pages autorisées selon le forfait
                let allowedPages = [];

                if (plan === 'CHEF') {
                    // Pack à 14€ (1 écran)
                    allowedPages = ['administration.html', 'portail-client.html', 'chef.html', 'chef-pastisser.html', 'chef-bar.html'];
                
                } else if (plan === 'BUSINESS') {
                    // Pack à 45€ (5 écrans)
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'menu-pure.html', 'menu-bar.html', 'bar.html'];
                
                } else if (plan === 'PREMIUM') {
                    // Pack à 129€ (50 écrans) -> TOUT EST AUTORISÉ
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'chef.html', 'chef-pastisser.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'bar.html', 'cuisinie.html', 'planning-cuisine.html'];
                }

                // Vérification : si la page actuelle n'est pas dans la liste autorisée de son forfait
                if (currentPage !== '' && !allowedPages.includes(currentPage)) {
                    alert(`⛔ ACCÈS REFUSÉ :\nVotre forfait actuel (${plan}) n'inclut pas ce module.\nVeuillez upgrader votre offre pour y accéder.`);
                    // On le renvoie sur son espace client principal
                    window.location.href = `portail-client.html?tenantID=${tenantID}`;
                }

            } catch(e) {
                console.log("Mode hors-ligne actif. Vérification des accès retardée.");
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE OS - Super Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&family=Playfair+Display:wght@600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #050505; --panel: #111; --gold: #d4af37; --text: #fff; --alert: #D9534F; }
        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; margin: 0; padding: 40px; }
        .header { text-align: center; margin-bottom: 40px; border-bottom: 1px solid #333; padding-bottom: 20px; }
        .header h1 { font-family: 'Playfair Display', serif; color: var(--gold); letter-spacing: 4px; font-size: 2.5rem; margin: 0; }
        
        table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #333; }
        th { background: #000; color: var(--gold); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        tr:hover { background: #1a1a1a; }
        
        .badge { padding: 5px 10px; border-radius: 4px; font-size: 0.75rem; font-weight: 800; }
        .badge.actif { background: rgba(16, 185, 129, 0.2); color: #10B981; }
        .badge.suspendu { background: rgba(217, 83, 79, 0.2); color: var(--alert); }
        .badge.plan { border: 1px solid var(--gold); color: var(--gold); }

        .btn { background: transparent; border: 1px solid #555; color: var(--text); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: 0.2s; margin-right: 5px; }
        .btn:hover { border-color: var(--gold); color: var(--gold); }
        .btn-danger:hover { border-color: var(--alert); color: var(--alert); }
    </style>
</head>
<body>

    <div class="header">
        <h1>CONTRÔLE DE L'EMPIRE</h1>
        <p style="color: #888; font-size: 0.9rem;">Gestion globale des infrastructures iCHEF</p>
    </div>

    <table>
        <thead>
            <tr>
                <th>Identifiant (ID)</th>
                <th>Nom du Client</th>
                <th>Forfait</th>
                <th>Code PIN</th>
                <th>Écrans</th>
                <th>Statut</th>
                <th style="text-align: right;">Actions Administratives</th>
            </tr>
        </thead>
        <tbody id="tenants-body">
            <tr><td colspan="7" style="text-align: center;">Chargement des données sécurisées...</td></tr>
        </tbody>
    </table>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const masterKey = urlParams.get('pass');

        async function fetchTenants() {
            try {
                const res = await fetch('/api/get-all-tenants-admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ masterKey })
                });
                const data = await res.json();
                
                if (data.success) {
                    renderTable(data.tenants);
                } else {
                    document.getElementById('tenants-body').innerHTML = `<tr><td colspan="7" style="text-align:center; color: red;">${data.error}</td></tr>`;
                }
            } catch (err) {
                document.getElementById('tenants-body').innerHTML = `<tr><td colspan="7" style="text-align:center; color: red;">Erreur de connexion au serveur.</td></tr>`;
            }
        }

        function renderTable(tenants) {
            const tbody = document.getElementById('tenants-body');
            if (tenants.length === 0) {
                tbody.innerHTML = `<tr><td colspan="7" style="text-align:center;">Aucun client enregistré dans la base de données.</td></tr>`;
                return;
            }

            tbody.innerHTML = tenants.map(t => `
                <tr>
                    <td style="font-weight: 800;">${t.id}</td>
                    <td>${t.name}</td>
                    <td><span class="badge plan">${t.pack}</span></td>
                    <td style="font-family: monospace; font-size: 1.1rem; color: var(--gold);">${t.pin}</td>
                    <td>${t.activeScreens} / ${t.maxScreens}</td>
                    <td><span class="badge ${t.status.toLowerCase()}">${t.status}</span></td>
                    <td style="text-align: right;">
                        <button class="btn" onclick="adminAction('${t.id}', 'set_pin')">Modifier PIN</button>
                        <button class="btn" onclick="adminAction('${t.id}', 'set_plan')">Changer Forfait</button>
                        <button class="btn" onclick="adminAction('${t.id}', '${t.status === 'ACTIF' ? 'suspend' : 'activate'}')">
                            ${t.status === 'ACTIF' ? 'Suspendre' : 'Réactiver'}
                        </button>
                        <button class="btn btn-danger" onclick="adminAction('${t.id}', 'delete')">Supprimer</button>
                    </td>
                </tr>
            `).join('');
        }

        async function adminAction(tenantID, action) {
            let payload = { masterKey, tenantID, action };

            if (action === 'set_plan') {
                const newPlan = prompt("Nouveau forfait (ECO, BUSINESS, EXCUTIF, PREMIUM) :");
                if (!newPlan) return;
                payload.newPlan = newPlan.toUpperCase();
            } else if (action === 'set_pin') {
                const newPin = prompt("Nouveau code PIN (4 chiffres) :");
                if (!newPin) return;
                payload.manualPin = newPin;
            } else if (action === 'delete') {
                if (!confirm(`⚠️ ATTENTION : Es-tu sûr de vouloir supprimer DÉFINITIVEMENT le client ${tenantID} et toutes ses données ?`)) return;
            } else {
                if (!confirm("Confirmer cette action ?")) return;
            }

            const res = await fetch('/api/admin-action', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            
            if (data.success) {
                fetchTenants(); // Recharge la table instantanément
            } else {
                alert("Erreur lors de l'exécution de l'action.");
            }
        }

        // Lancement initial
        fetchTenants();
    </script>
</body>
</html>
