<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de Prix iCHEF</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;700;900&family=Playfair+Display:ital,wght@0,600;0,700;1,700&display=swap" rel="stylesheet">
    
    <style>
        /* Styles de base pour centrer la carte sur la page (à adapter selon votre site) */
        body {
            background-color: #000; /* Fond noir pour faire ressortir la carte */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Montserrat', sans-serif;
        }

        /* --- CONTENEUR DE LA CARTE --- */
        .pricing-card {
            background-color: #0c0b0a; /* Noir très légèrement chaud */
            border: 1px solid rgba(212, 175, 55, 0.4); /* Bordure dorée subtile */
            border-radius: 12px;
            padding: 40px;
            max-width: 380px;
            color: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        /* --- EN-TÊTE (Logo + Badge) --- */
        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .logo .dot {
            color: #d4af37; /* Point doré */
        }

        .badge {
            border: 1px solid #d4af37;
            color: #d4af37;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        /* --- TITRE ET DESCRIPTION --- */
        .card-title {
            font-size: 38px;
            font-weight: 900; /* Texte très gras */
            line-height: 1.1;
            margin: 0 0 20px 0;
            text-transform: uppercase;
        }

        .card-desc {
            color: #9e9e9e; /* Gris clair */
            font-size: 15px;
            line-height: 1.5;
            margin: 0 0 30px 0;
            font-weight: 400;
        }

        /* --- BLOC PRIX --- */
        .price-container {
            display: flex;
            align-items: center;
            margin-bottom: 35px;
            gap: 12px;
        }

        .price-value {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 700;
            color: #d4af37; /* Doré */
            line-height: 0.8;
            font-style: italic; /* Pour le style élégant du chiffre */
        }

        .price-details {
            display: flex;
            flex-direction: column;
            justify-content: center;
            margin-top: 5px;
        }

        .per-month {
            font-size: 18px;
            font-weight: 700;
        }

        .commitment {
            color: #555555; /* Gris plus foncé */
            font-size: 12px;
            margin-top: 4px;
            font-weight: 500;
        }

        /* --- LISTE DES FONCTIONNALITÉS --- */
        .features-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .features-list li {
            display: flex;
            align-items: flex-start;
            font-size: 14px;
            color: #e0e0e0;
            line-height: 1.4;
        }

        .check {
            color: #00d28a; /* Vert vif */
            font-weight: bold;
            margin-right: 12px;
            font-size: 15px;
        }
    </style>
</head>
<body>

    <div class="pricing-card">
        
        <div class="card-top">
            <div class="logo">iCHEF<span class="dot">.</span></div>
            <div class="badge">Pack Essentiel</div>
        </div>

        <h2 class="card-title">Digitalisez<br>votre salle.</h2>
        
        <p class="card-desc">
            La puissance d'un système de commande et de paiement de dernière génération. Sans commission.
        </p>

        <div class="price-container">
            <div class="price-value">29€</div>
            <div class="price-details">
                <span class="per-month">/ mois</span>
                <span class="commitment">Sans engagement</span>
            </div>
        </div>

        <ul class="features-list">
            <li><span class="check">✓</span> Menu QR interactif illimité</li>
            <li><span class="check">✓</span> Paiement Stripe (0% de commission iCHEF)</li>
            <li><span class="check">✓</span> Caisse rapide & Synchronisation Cloud</li>
        </ul>

    </div>
    </body>
</html>
