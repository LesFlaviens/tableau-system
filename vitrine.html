<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infrastructure iCHEF</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg-color: #050505; 
            --panel-bg: rgba(20, 20, 20, 0.6); 
            --border-color: rgba(255, 255, 255, 0.1); 
            --text-main: #ffffff; 
            --text-muted: #888888; 
            --gold: #d4af37;
        }
        body { background-color: var(--bg-color); color: var(--text-main); font-family: 'Montserrat', sans-serif; margin: 0; padding: 0; min-height: 100vh; background-image: radial-gradient(circle at 50% 0%, #1a1a1a 0%, #050505 70%); }
        
        .top-bar { height: 8vh; padding: 0 2vw; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); background: rgba(0,0,0,0.5); }
        .logo { font-family: 'Playfair Display', serif; font-size: 24px; letter-spacing: 3px; }
        
        .page-header { text-align: center; margin: 30px 0; }
        .page-header h1 { font-family: 'Playfair Display', serif; font-size: 2rem; margin-bottom: 10px; }

        /* --- CONTENEUR VERTICAL POUR LES 4 CASES --- */
        .vertical-stack {
            display: flex;
            flex-direction: column;
            gap: 20px;
            width: 90%;
            max-width: 400px;
            margin: 0 auto 50px auto;
        }

        .card { 
            background: var(--panel-bg); border: 1px solid var(--border-color); border-radius: 12px; 
            padding: 20px; display: flex; align-items: center; justify-content: space-between;
            transition: 0.3s;
        }
        .card:hover { border-color: var(--gold); background: rgba(30,30,30,0.8); }

        .card-info { display: flex; flex-direction: column; gap: 5px; }
        .pack-name { font-size: 0.9rem; font-weight: 800; text-transform: uppercase; color: var(--gold); }
        .price { font-family: 'Playfair Display', serif; font-size: 1.2rem; }
        
        .btn { 
            background: transparent; color: var(--text-main); border: 1px solid var(--text-main); 
            padding: 10px 20px; font-weight: 800; text-transform: uppercase; border-radius: 6px; cursor: pointer; transition: 0.3s;
        }
        .btn:hover { background: var(--text-main); color: #000; }

        /* --- Pour les autres cards (si tu en as d'autres) --- */
        .other-cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; padding: 20px; }
    </style>
</head>
<body>

    <header class="top-bar">
        <div class="logo">iCHEF<span style="color:var(--gold)">.</span></div>
    </header>

    <div class="page-header">
        <h1>L'intelligence au service du goût</h1>
    </div>

    <div class="vertical-stack">
        
        <div class="card">
            <div class="card-info">
                <span class="pack-name">Chef (Labo)</span>
                <span class="price">29€ HT / mois</span>
            </div>
            <button class="btn">Accéder</button>
        </div>

        <div class="card">
            <div class="card-info">
                <span class="pack-name">Serveur (Prise de commande)</span>
                <span class="price">29€ HT / mois</span>
            </div>
            <button class="btn">Accéder</button>
        </div>

        <div class="card">
            <div class="card-info">
                <span class="pack-name">Pass Cuisine</span>
                <span class="price">29€ HT / mois</span>
            </div>
            <button class="btn">Accéder</button>
        </div>

        <div class="card">
            <div class="card-info">
                <span class="pack-name">Menu QR Client</span>
                <span class="price">29€ HT / mois</span>
            </div>
            <button class="btn">Accéder</button>
        </div>

    </div>

</body>
</html>
