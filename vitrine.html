<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Offres sur-mesure - iCHEF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* --- VARIABLES & BASE LUXE ÉPURÉ --- */
:root { 
    --bg-dark: #030303; /* Noir absolu ultra profond */
    --card-bg: #0a0a0c; /* Noir légèrement teinté pour les cartes */
    --gold: #d4af37; 
    --gold-dim: rgba(212, 175, 55, 0.1); 
    --text-white: #ffffff; 
    --text-grey: #9ca3af; 
    --border-light: rgba(255, 255, 255, 0.03); 
    --border-hover: rgba(255, 255, 255, 0.1);
}

/* --- ARCHITECTURE "NO-SCROLL" ABSOLUE --- */
body {
    background-color: var(--bg-dark);
    color: var(--text-white);
    font-family: 'Montserrat', sans-serif;
    margin: 0;
    padding: 2vh 1.5vw; 
    height: 100vh; /* VERROUILLÉ À 100% DE L'ÉCRAN */
    display: flex;
    flex-direction: column;
    box-sizing: border-box;
    overflow: hidden; /* INTERDIT LE SCROLL GLOBAL */
    background-image: radial-gradient(circle at 50% 0%, #1a1a1f 0%, transparent 40%); /* Léger halo de lumière en haut */
}

/* --- EN-TÊTE ÉPURÉ --- */
.section-header { 
    text-align: center; 
    flex: 0 0 11vh; 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    margin-bottom: 2.5vh;
}
.sur-titre { color: var(--gold); font-size: clamp(0.6rem, 1.4vh, 0.8rem); font-weight: 600; text-transform: uppercase; letter-spacing: 4px; display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 0.8vh; }
.sur-titre::before, .sur-titre::after { content: ""; height: 1px; width: 30px; background: linear-gradient(90deg, transparent, var(--gold), transparent); }
.section-header h2 { font-family: 'Playfair Display', serif; font-size: clamp(1.6rem, 3.8vh, 2.5rem); font-weight: 500; margin: 0 0 0.5vh 0; letter-spacing: 1px;}
.section-header p { color: var(--text-grey); font-weight: 300; font-size: clamp(0.75rem, 1.5vh, 0.95rem); margin: 0; letter-spacing: 1.5px; text-transform: uppercase; }

/* --- CONTENEUR DES CARTES FLEXIBLE --- */
.cards-container {
    display: flex;
    flex-direction: row;
    gap: 1vw; 
    flex: 1; 
    min-height: 0; 
    width: 100%;
    align-items: stretch;
    justify-content: center;
}

/* --- STRUCTURE D'UNE CARTE PRO ACTIVE --- */
.card {
    flex: 1;
    display: flex;
    flex-direction: column;
    background-color: var(--card-bg);
    border: 1px solid var(--border-light);
    border-top: 1px solid rgba(255, 255, 255, 0.08); /* Effet de lumière rasante */
    border-radius: 16px; /* Coins plus doux */
    padding: 2vh 1.2vw;
    box-sizing: border-box;
    transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); /* Animation fluide */
    min-height: 0; 
    max-width: 300px;
    position: relative;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
/* 🔥 L'EFFET PRO-ACTIF AU SURVOL 🔥 */
.card:hover { 
    transform: translateY(-8px); 
    border-color: var(--border-hover);
    box-shadow: 0 20px 40px rgba(0,0,0,0.8), 0 0 20px rgba(212, 175, 55, 0.05); 
}

/* --- CARTE GOLD SPÉCIFIQUE --- */
.card.card-gold { border-color: rgba(212, 175, 55, 0.3); box-shadow: 0 10px 30px rgba(212, 175, 55, 0.08); transform: scale(1.02); z-index: 2; }
.card.card-gold:hover { transform: scale(1.03) translateY(-5px); box-shadow: 0 20px 40px rgba(212, 175, 55, 0.15); border-color: rgba(212, 175, 55, 0.6); }
.badge-bestseller { position: absolute; top: -1px; left: -1px; right: -1px; background: linear-gradient(90deg, #b8860b, #d4af37, #b8860b); color: #000; text-align: center; font-size: clamp(0.55rem, 1.1vh, 0.7rem); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; padding: 0.8vh 0; border-radius: 16px 16px 0 0; }
.card.card-gold .card-header { margin-top: 2vh; } 

/* --- HAUT DE CARTE (Icône, Prix, Titre) --- */
.card-header { text-align: center; flex-shrink: 0; display: flex; flex-direction: column; align-items: center; }
.
