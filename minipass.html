<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0f172a">
    
    <title>Empire OS - Pass Production KDS</title>
    
    <script>
        // 1. SÉCURITÉ : Générateur d'empreinte numérique
        function getDeviceFingerprint() {
            let deviceId = localStorage.getItem('ichef_device_fingerprint');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('ichef_device_fingerprint', deviceId);
            }
            return deviceId;
        }

        // 2. MAÎTRE DE SÉCURITÉ (AUTORISATION STRICTE DU PACK_A 🔒)
        (async function enforceSecurity() {
            const urlParams = new URLSearchParams(window.location.search);
            let urlTenantID = urlParams.get('tenantID');
            let storedTenantID = localStorage.getItem('ichef_tenant_id');

            if (urlTenantID && urlTenantID !== storedTenantID) {
                localStorage.removeItem('EMPIRE_GLOBAL_SYNC');
                localStorage.removeItem('ichef_master_pin');
                if (urlTenantID) localStorage.setItem('ichef_tenant_id', urlTenantID);
                storedTenantID = urlTenantID;
            }

            let tenantID = urlTenantID || storedTenantID;
            let pin = localStorage.getItem('ichef_master_pin'); 
            
            if(!tenantID) {
                window.location.href = 'connexionpartenaire.html';
                return;
            }

            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";

            const accessMatrix = {
                'CHEF': ['chef.html', 'administration.html'],
                'CHEF_CUISINE': ['chef.html', 'administration.html'],
                'PATISSIER': ['chef-patissier.html', 'administration.html'],
                'CHEF_PATISSERIE': ['chef-patissier.html', 'administration.html'],
                'BAR': ['chef-bar.html', 'administration.html'],
                'CHEF_BAR': ['chef-bar.html', 'administration.html'],
                'ICHEF_OS': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'ECO': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'BUSINESS': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'RENTABILITE': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'PACK_A': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html', 'caissetactile.html', 'haccp.html'],
                'EMPIRE': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html'],
                'BRIGADE': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html'],
                'BRIGADES': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html'],
                'PREMIUM': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html']
            };

            try {
                const res = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, pin: pin || "0000", deviceId: getDeviceFingerprint() })
                });
                const data = await res.json();

                if(!data.success) {
                    alert(data.error || "ACCÈS REFUSÉ (Session expirée ou compte invalide).");
                    window.location.href = 'connexionpartenaire.html';
                    return;
                }

                const currentPlan = data.plan ? data.plan.toUpperCase() : 'CHEF';
                let currentPage = window.location.pathname.split('/').pop().toLowerCase();
                if(currentPage === '') currentPage = 'index.html';

                const allowedPages = accessMatrix[currentPlan] || [];
                if (!allowedPages.includes(currentPage) && currentPage !== 'minipass.html') {
                    alert(`ACCÈS REFUSÉ : Votre forfait (${currentPlan}) n'inclut pas ce module.`);
                    window.location.href = `administration.html?tenantID=${tenantID}`;
                }
            } catch (e) { console.error("Erreur réseau sécurité", e); }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000; --panel: #0A0A0A; --border: rgba(250, 240, 230, 0.15);
            --text-main: #FAF0E6; --text-muted: #8A857D; --gold: #C5A059;
            --accent: #10b981; --danger: #ef4444; --shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        header { background: rgba(0,0,0,0.9); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); letter-spacing: 2px; }
        .btn-top { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: 4px; font-weight: 600; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; letter-spacing: 1px; }
        .btn-top:hover { border-color: var(--gold); color: var(--gold); }

        /* ÉCRAN DE TRAVAIL EXTENSIBLE */
        .pass-container { flex: 1; display: flex; flex-wrap: wrap; gap: 20px; padding: 25px; overflow-y: auto; align-content: flex-start; box-sizing: border-box; }

        /* DESIGN DE CHAQUE FICHE COMMANDE (BON DE PRODUCTION) */
        .ticket-card { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; width: calc(33.333% - 14px); display: flex; flex-direction: column; box-shadow: var(--shadow); border-top: 4px solid var(--gold); min-width: 280px; box-sizing: border-box; animation: popIn 0.3s ease forwards; }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* ALERTE ROUGE SI COMMANDE WEB QR NON VALIDÉE */
        .ticket-card.needs-validation { border-top-color: var(--danger); }
        .validation-banner { background: var(--danger); color: #000; text-align: center; padding: 6px; font-weight: 900; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; }

        .ticket-header { padding: 15px; border-bottom: 1px dashed var(--border); display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.01); }
        .t-title { font-size: 1.2rem; font-weight: 800; color: var(--text-main); font-family: 'Playfair Display', serif; }
        .t-time { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }

        .ticket-body { padding: 15px; flex: 1; display: flex; flex-direction: column; gap: 10px; overflow-y: auto; max-height: 250px; }
        .item-line { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(250,240,230,0.05); }
        .item-line:last-child { border-bottom: none; }
        .item-qty { font-weight: 900; color: var(--gold); font-size: 1.1rem; margin-right: 12px; }
        .item-name { flex: 1; font-weight: 600; font-size: 0.95rem; }
        .item-obs { font-size: 0.75rem; color: var(--gold); display: block; margin-top: 2px; font-weight: 500; }

        /* BOUTON D'ACTION DU BON */
        .ticket-footer { padding: 12px; border-top: 1px solid var(--border); background: #000; }
        .btn-action { width: 100%; border: 1px solid var(--gold); background: transparent; color: var(--gold); padding: 12px; border-radius: 4px; font-weight: 800; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s; }
        .btn-action:hover { background: var(--gold); color: #000; }
        .btn-action.btn-validate-web { border-color: var(--accent); color: var(--accent); }
        .btn-action.btn-validate-web:hover { background: var(--accent); color: #000; }

        .empty-state { text-align: center; width: 100%; padding: 100px 20px; color: var(--text-muted); font-size: 1.1rem; font-style: italic; }

        /* 📱 RESPONSIVE : ADAPTATION SMARTPHONES */
        @media (max-width: 900px) {
            .ticket-card { width: calc(50% - 10px); }
        }
        @media (max-width: 600px) {
            .pass-container { padding: 15px; gap: 15px; }
            .ticket-card { width: 100%; }
            header { padding: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">ICHEF OS — <span style="color:#fff;">Pass Production</span></div>
        <button class="btn-top" onclick="retourAccueil()">Retour Menu</button>
    </header>

    <div class="pass-container" id="pass-container">
        <div class="empty-state">Liaison hertzienne avec la base de données iCHEF...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        let currentOrders = {};

        function retourAccueil() {
            window.location.href = 'administration.html?tenantID=' + tenantID;
        }

        // 🍳 CHARGEMENT ET FILTRAGE DES BONS DE CUISINE / BAR
        async function fetchPassOrders() {
            if(!tenantID) return;
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}&_t=${Date.now()}`);
                let state = await r.json();
                let activeOrders = state.activeOrders || {};

                // On filtre pour ne garder que les tables qui ont des vrais plats à préparer
                let ordersWithItems = {};
                for (let tableKey in activeOrders) {
                    let order = activeOrders[tableKey];
                    // On exclut les réglages ou les nœuds techniques de l'historique
                    if (order && order.items && Array.isArray(order.items) && order.items.length > 0) {
                        ordersWithItems[tableKey] = order;
                    }
                }

                if (JSON.stringify(ordersWithItems) !== JSON.stringify(currentOrders)) {
                    currentOrders = ordersWithItems;
                    renderPassTableau();
                }
            } catch(e) { console.error("Erreur de synchro KDS", e); }
        }

        // 🖼️ RENDU GRAPHIQUE DES BONS TACTILES
        function renderPassTableau() {
            const container = document.getElementById('pass-container');
            let tablesKeys = Object.keys(currentOrders);

            if (tablesKeys.length === 0) {
                container.innerHTML = `<div class="empty-state">🛎️ Aucune commande en attente. Le Pass Production est propre !</div>`;
                return;
            }

            container.innerHTML = tablesKeys.map(tableKey => {
                let order = currentOrders[tableKey];
                let isWebAValider = (order.status === "À VALIDER PAR LA CAISSE" || order.status === "EN ATTENTE PAIEMENT");
                let cardClass = isWebAValider ? 'ticket-card needs-validation' : 'ticket-card';
                let isQr = String(tableKey).startsWith('WEB_');
                
                let titleLabel = isQr ? `📱 TABLE ${tableKey.replace('WEB_','')}` : `🍽️ TABLE ${tableKey}`;
                let timeLabel = order.time || '--:--';

                // Génération des lignes de plats du bon
                let linesHtml = order.items.map(item => {
                    let obsHtml = item.obs ? `<span class="item-obs">⚠️ ${item.obs}</span>` : '';
                    return `
                        <div class="item-line">
                            <div style="flex:1;">
                                <span class="item-name"><span class="item-qty">${item.qty || 1}x</span>${item.name || item.n}</span>
                                ${obsHtml}
                            </div>
                        </div>
                    `;
                }).join('');

                // Bouton dynamique selon le statut (Validation caisse ou Envoi de l'envoi)
                let footerBtn = '';
                if(isWebAValider) {
                    footerBtn = `<button class="btn-action btn-validate-web" onclick="validerBonCaisse('${tableKey}')">Encaisser & Lancer</button>`;
                } else {
                    footerBtn = `<button class="btn-action" onclick="cloturerBon('${tableKey}')">Servi ✓ Enlever le bon</button>`;
                }

                return `
                    <div class="${cardClass}">
                        ${isWebAValider ? `<div class="validation-banner">Alerte : Commande smartphone à valider</div>` : ''}
                        <div class="ticket-header">
                            <span class="t-title">${titleLabel}</span>
                            <span class="t-time">${timeLabel}</span>
                        </div>
                        <div class="ticket-body">
                            ${linesHtml}
                        </div>
                        <div class="ticket-footer">
                            ${footerBtn}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // 🚀 EFFACER LE BON APRÈS LE SERVICE (ENVOI À L'ARCHIVE SECRÈTE)
        async function cloturerBon(tableKey) {
            if(!confirm(`Confirmer l'envoi de la Table ${tableKey} ? Le bon disparaîtra de l'écran.`)) return;
            
            try {
                let order = currentOrders[tableKey];
                
                // Archivage Financier Automatique pour le Gérant si ce n'est pas déjà fait
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                let stateData = await r.json();
                
                let historyNode = stateData.activeOrders['FINANCIAL_HISTORY'] || { data: [] };
                
                // Évite les doublons d'archivage
                if(!historyNode.data.some(tx => tx.id === 'TX_' + order.time + tableKey)) {
                    historyNode.data.push({
                        id: 'TX_' + Date.now() + tableKey,
                        date: new Date().toISOString(),
                        method: order.typePaiement || 'À Table',
                        totalTTC: order.total || 0,
                        source: 'Caisse Cuisine (Table ' + tableKey + ')',
                        items: order.items
                    });
                    
                    await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ tableId: 'FINANCIAL_HISTORY', order: historyNode })
                    });
                }

                // Suppression du bon sur les écrans
                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: tableKey, order: null })
                });

                fetchPassOrders();
            } catch(e) { alert("Erreur de connexion."); }
        }

        // ⚡ FORCE LA VALIDATION D'UNE COMMANDE EN LIGNE REÇUE
        async function validerBonCaisse(tableKey) {
            try {
                let order = currentOrders[tableKey];
                order.status = "NOUVELLE COMMANDE (VALIDÉE)";
                delete order.alerteRouge;

                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: tableKey, order: order })
                });
                fetchPassOrders();
            } catch(e) {}
        }

        // Moteur de rafraîchissement atomique (toutes les 3 secondes)
        fetchPassOrders();
        setInterval(fetchPassOrders, 3000);
    </script>
</body>
</html>
