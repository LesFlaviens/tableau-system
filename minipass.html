<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCHEF - Écran de Contrôle Production</title>
    
    <script>
      // 2. GARDE DU CORPS SECURITE UNIVERSEL (VERSION ISOLATION STRICTE 🔒)
        (async function enforceSecurity() {
            const urlParams = new URLSearchParams(window.location.search);
            let urlTenantID = urlParams.get('tenantID');
            let storedTenantID = localStorage.getItem('ichef_tenant_id');

            // 🚨 SÉCURITÉ ANTI-FUITE : Si l'URL demande un nouveau resto, on écrase l'ancien !
            if (urlTenantID && urlTenantID !== storedTenantID) {
                // On nettoie la mémoire de l'ancien restaurant pour éviter les mélanges
                localStorage.removeItem('EMPIRE_GLOBAL_SYNC');
                localStorage.removeItem('ichef_master_pin');
                localStorage.setItem('ichef_tenant_id', urlTenantID);
                storedTenantID = urlTenantID;
            }

            let tenantID = urlTenantID || storedTenantID;
            let pin = localStorage.getItem('ichef_master_pin'); 
            
            if(!tenantID) {
                window.location.href = 'connexionpartenaire.html';
                return;
            }

            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";

            const accessMatrix = {
               'CHEF': ['chef.html', 'administration.html'],
                'CHEF_CUISINE': ['chef.html', 'administration.html'],
                'PATISSIER': ['chef-patissier.html', 'administration.html'],
                'CHEF_PATISSERIE': ['chef-patissier.html', 'administration.html'],
                'BAR': ['chef-bar.html', 'administration.html'],
                'CHEF_BAR': ['chef-bar.html', 'administration.html'],
                'ICHEF_OS': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'ECO': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'BUSINESS': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'RENTABILITE': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'EMPIRE': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html', 'production.html', 'chef-production.html'],
                'BRIGADE': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html', 'production.html', 'chef-production.html'],
                'BRIGADES': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html', 'production.html', 'chef-production.html'],
                'PREMIUM': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html', 'production.html', 'chef-production.html']
            };

            try {
                const res = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, pin: pin || "0000", deviceId: getDeviceFingerprint() })
                });
                const data = await res.json();

                if(!data.success) {
                    alert(data.error || "ACCÈS REFUSÉ (Limite d'écrans atteinte ou compte invalide).");
                    window.location.href = 'connexionpartenaire.html';
                    return;
                }

                const currentPlan = data.plan ? data.plan.toUpperCase() : 'CHEF';
                let currentPage = window.location.pathname.split('/').pop().toLowerCase();
                if(currentPage === '') currentPage = 'index.html';

                const allowedPages = accessMatrix[currentPlan] || [];
                if (!allowedPages.includes(currentPage)) {
                    alert(`ACCÈS REFUSÉ : Votre forfait (${currentPlan}) n'inclut pas ce module.`);
                    window.location.href = `administration.html?tenantID=${tenantID}`;
                }
            } catch (e) { console.error("Erreur de sécurité réseau", e); }
        })();
    </script>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --panel: #0A0A0A;
            --border: rgba(250, 240, 230, 0.12);
            --text-main: #FAF0E6;
            --text-muted: #8A857D;
            --gold: #C5A059;
            --gold-dim: rgba(197, 160, 89, 0.08);
            --cuisine-color: #ff7675;
            --bar-color: #74b9ff;
            --ready-color: #10b981;
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); letter-spacing: 1px; }
        .status-badge { font-size: 0.75rem; color: var(--gold); border: 1px solid var(--border); padding: 6px 12px; border-radius: 4px; letter-spacing: 1px; }
        
        /* BOUTONS DE VUE PLEIN ÉCRAN ET ADMIN */
        .view-controls { display: flex; gap: 10px; }
        .view-btn { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 15px; border-radius: 4px; cursor: pointer; font-size: 0.8rem; font-weight: 600; transition: 0.2s; letter-spacing: 1px; text-transform: uppercase;}
        .view-btn:hover { border-color: var(--gold); color: var(--text-main); }
        .view-btn.active { border-color: var(--gold); color: #000; background: var(--gold); }

        #clock { font-family: 'Playfair Display', serif; color: var(--text-main); font-size: 1.2rem; letter-spacing: 1px; }

        .pass-container { flex: 1; display: flex; overflow: hidden; width: 100vw; }
        .pass-column { flex: 1; display: flex; flex-direction: column; height: 100%; overflow: hidden; box-sizing: border-box; transition: 0.3s; }
        
        .column-header { padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); font-family: 'Playfair Display', serif; font-size: 1.3rem; letter-spacing: 2px; }
        .cuisine-header { background: rgba(255, 118, 117, 0.04); color: var(--cuisine-color); border-right: 1px solid var(--border); }
        .bar-header { background: rgba(116, 185, 255, 0.04); color: var(--bar-color); }
        
        .ticket-counter { font-size: 0.85rem; font-family: 'Inter', sans-serif; background: rgba(255,255,255,0.05); color: var(--text-main); padding: 4px 10px; border-radius: 20px; border: 1px solid var(--border); }

        .tickets-scroll { flex: 1; overflow-y: auto; padding: 20px; display: flex; align-content: flex-start; flex-wrap: wrap; gap: 15px; background: rgba(0,0,0,0.2); }
        .tickets-scroll::-webkit-scrollbar { display: none; }
        
        #col-cuisine .tickets-scroll { border-right: 1px solid var(--border); }

        .ticket-card { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; display: flex; flex-direction: column; animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 100%; max-width: 400px; height: fit-content;}
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .ticket-top { padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); background: rgba(255,255,255,0.01); }
        .ticket-table { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 600; color: var(--text-main); }
        .ticket-time { font-size: 0.8rem; color: var(--text-muted); }
        .ticket-source { font-size: 0.65rem; padding: 3px 6px; border-radius: 3px; font-weight: bold; background: var(--gold); color: #000; letter-spacing: 0.5px; }

        .ticket-middle { padding: 15px 20px; display: flex; flex-direction: column; gap: 10px; flex: 1; }
        .ticket-item-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 0; border-bottom: 1px dashed rgba(255,255,255,0.05); }
        .ticket-item-row:last-child { border-bottom: none; }
        
        .item-info { display: flex; flex-direction: column; gap: 4px; }
        .item-title { font-size: 1rem; color: var(--text-main); font-weight: 500; }
        .item-obs { font-size: 0.8rem; color: var(--gold); font-weight: 500; }
        .item-seat { font-size: 0.75rem; color: var(--text-muted); }
        
        .item-qty { color: var(--gold); font-weight: bold; font-size: 1.1rem; margin-right: 12px; }

        .btn-ready { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 14px; border-radius: 4px; font-size: 0.8rem; font-weight: 600; text-transform: uppercase; cursor: pointer; transition: 0.2s; letter-spacing: 0.5px; }
        .btn-ready:hover { background: var(--gold); color: #000; }
        .btn-ready:active { transform: scale(0.96); }

        .empty-msg { color: var(--text-muted); text-align: center; padding: 60px 20px; font-style: italic; font-weight: 300; font-size: 0.95rem; width: 100%; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <button class="view-btn" style="border-color: #f43f5e; color: #f43f5e;" onclick="retourAdmin()">🔙 ADMIN</button>
            <div class="logo-title"></div>
        </div>
        
        <div class="view-controls">
            <button class="view-btn active" id="btn-mixte" onclick="setView('mixte')">⚖️ Vue Mixte</button>
            <button class="view-btn" id="btn-cuisine" onclick="setView('cuisine')">🔥 Plein Écran Cuisine</button>
            <button class="view-btn" id="btn-bar" onclick="setView('bar')">🍸 Plein Écran Bar</button>
        </div>

        <div style="display: flex; gap: 20px; align-items: center;">
            <div id="clock">00:00:00</div>
            <div class="status-badge">● LIVE</div>
        </div>
    </header>

    <div class="pass-container">
        <div class="pass-column" id="col-cuisine">
            <div class="column-header cuisine-header">
                <span>🔥 PASS CUISINE</span>
                <span id="counter-cuisine" class="ticket-counter">0 Bons</span>
            </div>
            <div id="scroll-cuisine" class="tickets-scroll"></div>
        </div>

        <div class="pass-column" id="col-bar">
            <div class="column-header bar-header">
                <span>🍸 PASS BAR</span>
                <span id="counter-bar" class="ticket-counter">0 Bons</span>
            </div>
            <div id="scroll-bar" class="tickets-scroll"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id') || 'MASTER_STATE';

        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        let activeOrders = {};
        
        // 🧠 MEMOIRE ANTI-CLIGNOTEMENT
        let lastCuisineHash = "";
        let lastBarHash = "";

        // 🔄 RETOUR ADMIN
        function retourAdmin() {
            window.location.href = `administration.html?tenantID=${tenantID}`;
        }

        // 👁️ GESTION DE LA VUE PLEIN ÉCRAN
        function setView(view) {
            document.getElementById('btn-mixte').classList.remove('active');
            document.getElementById('btn-cuisine').classList.remove('active');
            document.getElementById('btn-bar').classList.remove('active');
            document.getElementById('btn-' + view).classList.add('active');

            const colCuisine = document.getElementById('col-cuisine');
            const colBar = document.getElementById('col-bar');

            if (view === 'mixte') {
                colCuisine.style.display = 'flex';
                colBar.style.display = 'flex';
            } else if (view === 'cuisine') {
                colCuisine.style.display = 'flex';
                colBar.style.display = 'none';
            } else if (view === 'bar') {
                colCuisine.style.display = 'none';
                colBar.style.display = 'flex';
            }
        }

        setInterval(() => {
            const clockEl = document.getElementById('clock');
            if(clockEl) clockEl.innerText = new Date().toLocaleTimeString('fr-FR');
        }, 1000);

        async function fetchProductionState() {
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}&_t=${Date.now()}`, { cache: 'no-store' });
                if(r.ok) {
                    let state = await r.json();
                    let nO = state.activeOrders || {};

                    for (let key in nO) { 
                        if (nO[key] && nO[key].data !== undefined && !Array.isArray(nO[key].data)) {
                            nO[key] = nO[key].data; 
                        }
                        if (nO[key] && nO[key].items) {
                            if (!Array.isArray(nO[key].items)) nO[key].items = [];
                            nO[key].items.forEach(i => {
                                if (i.name && !i.n) i.n = i.name;
                                if (i.price && !i.p) i.p = i.price;
                                if (i.category && !i.dest) i.dest = i.category;
                                if (!i.dest) i.dest = "cuisine";
                            });
                        }
                    }

                    activeOrders = nO;
                    dispatchTickets();
                }
            } catch(e) { console.error("Erreur Synchro KDS"); }
        }

        function dispatchTickets() {
            let cuisineTickets = [];
            let barTickets = [];

            for (let tableId in activeOrders) {
                if (tableId.includes('MASTER') || tableId.includes('ARCHIVE') || tableId.includes('CATEGORIES') || tableId.includes('ARCHITECTURE')) continue;

                let order = activeOrders[tableId];
                if (!order || !order.items || order.items.length === 0 || order.status === 'reserved' || order.status === 'EN ATTENTE PAIEMENT') continue;

                // 📌 ASTUCE INFAILLIBLE : On attache l'index d'origine au plat pour que le bouton "PRÊT" ne se trompe jamais.
                order.items.forEach((i, idx) => i.originalIndex = idx);

                // Détecte les commandes WEB ou les vieux formats buggés avec des numéros à 13 chiffres
                let isWebOrder = tableId.toLowerCase().startsWith('web_') || tableId.toLowerCase().includes('apercu') || tableId.toLowerCase().startsWith('order_') || /^\d{13}$/.test(tableId);

                let pendingCuisine = order.items.filter(i => i.dest.toLowerCase() === 'cuisine' && !i.done && (i.isSent !== false || isWebOrder));
                if (pendingCuisine.length > 0) {
                    let rawTime = order.time;
                    let timeDisplay = rawTime;
                    if (rawTime && !isNaN(rawTime) && rawTime.toString().length > 10) {
                        timeDisplay = new Date(parseInt(rawTime)).toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
                    } else if (!rawTime) {
                        timeDisplay = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
                    }
                    cuisineTickets.push({ tableId: tableId, time: timeDisplay, source: order.source || 'Salle', items: pendingCuisine });
                }

                let pendingBar = order.items.filter(i => i.dest.toLowerCase() === 'bar' && !i.done && (i.isSent !== false || isWebOrder));
                if (pendingBar.length > 0) {
                    let rawTime = order.time;
                    let timeDisplay = rawTime;
                    if (rawTime && !isNaN(rawTime) && rawTime.toString().length > 10) {
                        timeDisplay = new Date(parseInt(rawTime)).toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
                    } else if (!rawTime) {
                        timeDisplay = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
                    }
                    barTickets.push({ tableId: tableId, time: timeDisplay, source: order.source || 'Salle', items: pendingBar });
                }
            }

            cuisineTickets.sort((a, b) => a.tableId.localeCompare(b.tableId));
            barTickets.sort((a, b) => a.tableId.localeCompare(b.tableId));

            // 🛑 MOTEUR ANTI-CLIGNOTEMENT
            let newCuisineHash = JSON.stringify(cuisineTickets);
            if (newCuisineHash !== lastCuisineHash) {
                renderColumn('scroll-cuisine', 'counter-cuisine', cuisineTickets);
                lastCuisineHash = newCuisineHash;
            }

            let newBarHash = JSON.stringify(barTickets);
            if (newBarHash !== lastBarHash) {
                renderColumn('scroll-bar', 'counter-bar', barTickets);
                lastBarHash = newBarHash;
            }
        }

        function renderColumn(scrollId, counterId, tickets) {
            document.getElementById(counterId).innerText = `${tickets.length} Bon${tickets.length > 1 ? 's' : ''}`;
            const container = document.getElementById(scrollId);
            
            if (tickets.length === 0) {
                container.innerHTML = '<div class="empty-msg">Aucun bon en attente pour le moment. ✨</div>';
                return;
            }

            container.innerHTML = tickets.map(ticket => {
                let tableTitle = (ticket.tableId.toLowerCase().includes('apercu') || /^\d{13}$/.test(ticket.tableId)) ? `📱 CLIENT WEB` : `TABLE ${ticket.tableId}`;
                
                let itemsHtml = ticket.items.map(item => {
                    let obsHtml = item.obs ? `<span class="item-obs">⚠️ ${item.obs}</span>` : '';
                    let seatHtml = (item.seat && item.seat > 0) ? `<span class="item-seat">👤 Siège ${item.seat}</span>` : '';
                    
                    // ON NETTOIE L'AFFICHAGE DU [BR] POUR LE KDS
                    let cleanName = (item.n || "").replace(/\[BR\]/g, '<br><span style="color:var(--gold); font-size:0.8rem; margin-left: 10px;">↳</span> ');

                    // LA SOLUTION INFAILLIBLE : On utilise originalIndex !
                    return `
                        <div class="ticket-item-row">
                            <div class="item-info">
                                <div class="item-title"><span class="item-qty">${item.qty || 1}x</span>${cleanName}</div>
                                ${obsHtml}${seatHtml}
                            </div>
                            <button class="btn-ready" onclick="markItemAsReady('${ticket.tableId}', ${item.originalIndex})">✔ PRÊT</button>
                        </div>
                    `;
                }).join('');

                return `
                    <div class="ticket-card">
                        <div class="ticket-top">
                            <span class="ticket-table">${tableTitle}</span>
                            <span class="ticket-time">🛎️ ${ticket.time}</span>
                            <span class="ticket-source">${ticket.source}</span>
                        </div>
                        <div class="ticket-middle">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            }).join('');
        }

        // LE MOTEUR DE VALIDATION INFAILLIBLE
        async function markItemAsReady(tableId, itemIndex) {
            let order = activeOrders[tableId];
            if (!order || !order.items) return;

            let targetItem = order.items[itemIndex];
            if (targetItem && !targetItem.done) {
                targetItem.done = true;

                // Rafraîchissement visuel instantané
                dispatchTickets(); 

                let totalRestant = order.items.filter(i => !i.done).length;
                let isWebOrder = tableId.toLowerCase().startsWith('web_') || tableId.toLowerCase().includes('apercu') || tableId.toLowerCase().startsWith('order_') || /^\d{13}$/.test(tableId);

                // Si c'est un ticket Web et qu'il n'y a plus aucun plat à faire, on supprime de la BD.
                if(isWebOrder && totalRestant === 0) {
                    await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ tableId: tableId, order: null })
                    });
                } else {
                    await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ tableId: tableId, order: order })
                    });
                }
                
                fetchProductionState();
            }
        }

        fetchProductionState();
        setInterval(fetchProductionState, 3000);
    </script>
    // ... Tout le reste de ton code JavaScript actuel (fonctions, boutons, etc.) ...
        
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {
                    console.log('✅ Moteur iCHEF PWA activé avec succès !', registration.scope);
                })
                .catch(err => {
                    console.error('❌ Erreur de sécurité PWA :', err);
                });
            });
        }
    </script>
</body>
