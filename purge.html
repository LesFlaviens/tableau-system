<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Recovery Tool</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .btn-danger { background: #ff1744; color: #fff; border: none; padding: 30px 60px; font-size: 2rem; font-weight: 900; border-radius: 12px; cursor: pointer; text-transform: uppercase; box-shadow: 0 0 50px rgba(255, 23, 68, 0.5); }
        .log { margin-top: 30px; background: #111; padding: 20px; border-radius: 8px; width: 80%; max-height: 200px; overflow-y: auto; font-family: monospace; color: #00e676; border: 1px solid #333; }
    </style>
</head>
<body>

    <h1 style="letter-spacing: 5px;">EMPIRE RECOVERY SYSTEM</h1>
    <p style="color: #aaa; margin-bottom: 40px;">Cette action va effacer TOUTES les commandes et TOUTES les données du serveur Render.</p>
    
    <button class="btn-danger" onclick="startMegaPurge()">🔥 NETTOYAGE NUCLÉAIRE</button>

    <div id="log" class="log">En attente d'ordre...</div>

    <script>
        async function startMegaPurge() {
            if(!confirm("ES-TU SÛR ? Cela va vider tout le restaurant (commandes, stocks, alertes).")) return;
            
            const logger = document.getElementById('log');
            logger.innerHTML = "Début du nettoyage...<br>";

            try {
                // 1. Récupérer toutes les données actuelles du serveur
                const res = await fetch('/get-current-state');
                const data = await res.json();
                const keys = Object.keys(data.activeOrders || {});

                logger.innerHTML += `Cibles identifiées : ${keys.length}<br>`;

                // 2. Envoyer un signal de suppression (null) pour CHAQUE clé sur le serveur
                for (let key of keys) {
                    logger.innerHTML += `Nettoyage de : ${key}... `;
                    await fetch('/update-order', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tableId: key, order: null })
                    });
                    logger.innerHTML += "OK<br>";
                }

                // 3. Vider la mémoire locale du navigateur (planning, recettes locales)
                localStorage.clear();
                logger.innerHTML += "Mémoire locale vidée.<br>";
                
                logger.innerHTML += "<br><b style='color:white;'>TERMINÉ. Ton Empire est maintenant 100% propre.</b><br>";
                logger.innerHTML += "Tu peux maintenant ouvrir la Cuisine et la Salle.";

            } catch (err) {
                logger.innerHTML += `<br><b style="color:red;">ERREUR : ${err.message}</b>`;
            }
        }
    </script>
</body>
</html>
