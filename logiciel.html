<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChef OS | Centre de Commande</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #FFD700;
            --text-dim: #888;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            font-weight: 800;
            font-size: 3rem;
            letter-spacing: -2px;
            margin: 0;
        }
        p {
            color: var(--text-dim);
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 600;
        }
        /* Bouton Mode Kiosque */
        #btn-fullscreen {
            background: var(--accent);
            color: #000;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.9rem;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }
        #btn-fullscreen:hover {
            transform: scale(1.05);
        }
        /* Bouton Réglages */
        .btn-settings {
            display: inline-block;
            margin-top: 15px;
            color: #888;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.8rem;
            border: 1px solid #333;
            padding: 8px 15px;
            border-radius: 5px;
            transition: 0.2s;
        }
        .btn-settings:hover {
            border-color: var(--accent);
            color: white;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }
        .card {
            background: var(--card);
            border: 1px solid #333;
            padding: 30px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: #1f1f1f;
        }
        .card h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }
        .card span {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .badge {
            background: #222;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            width: fit-content;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="security-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0a; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h2 style="color:white; font-family:sans-serif; margin-bottom:20px;">iCHEF OS - ACCÈS RESTREINT</h2>
        <input type="password" id="pin-input" placeholder="Entrez le code PIN" style="padding:15px; border-radius:8px; border:none; width:200px; text-align:center; font-size:1.2rem; margin-bottom:15px; outline:none;">
        <button onclick="checkPin()" style="padding:12px 30px; border-radius:8px; border:none; background:white; color:black; font-weight:bold; cursor:pointer;">DÉVERROUILLER</button>
        <p id="error-msg" style="color:#ff4444; margin-top:15px; font-family:sans-serif; display:none;">Code incorrect. Accès refusé.</p>
    </div>

    <div class="header">
        <h1>iCHEF<span style="color: #FFD700;">OS</span></h1>
        <p id="restaurant-name">Chargement de l'infrastructure...</p>
        <button id="btn-fullscreen">⛶ Activer le Mode Kiosque</button>
        <br>
        <a href="/reglages.html" class="btn-settings">⚙️ Paramètres du restaurant</a>
    </div>

    <div class="grid">
        <a href="pack-eco.html" class="card">
            <div class="badge" style="color: #00ff88;">Opérationnel</div>
            <h2>Prise de Commande</h2>
            <span>Terminal serveur (Pad)</span>
        </a>
    </div>

    <script>
        // 🛡️ 1. VÉRIFICATION D'IDENTITÉ STRICTE (MÉMOIRE SAAS)
        const currentTenantID = localStorage.getItem('ichef_tenant_id');
        const currentClientName = localStorage.getItem('ichef_client_name');

        if (!currentTenantID) {
            window.location.href = '/connexion.html';
        } else {
            document.getElementById('restaurant-name').innerText = `Espace de travail : ${currentClientName}`;
        }

        // 🔒 2. VÉRIFICATION DU CODE PIN VIA LE SERVEUR
        async function checkPin() {
            const pin = document.getElementById('pin-input').value;
            const msgError = document.getElementById('error-msg');

            try {
                const response = await fetch('/api/verify-pin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: currentTenantID, pin: pin })
                });
                
                const result = await response.json();

                if (result.success) {
                    document.getElementById('security-overlay').style.display = 'none';
                    msgError.style.display = 'none';
                } else {
                    msgError.innerText = "Code incorrect. Accès refusé.";
                    msgError.style.display = 'block';
                    document.getElementById('pin-input').value = '';
                }
            } catch (err) {
                msgError.innerText = "Erreur de communication avec le serveur.";
                msgError.style.display = 'block';
            }
        }

        document.getElementById('pin-input').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') checkPin();
        });

        // ⛶ 3. LOGIQUE DU MODE PLEIN ÉCRAN (KIOSQUE)
        document.getElementById('btn-fullscreen').addEventListener('click', () => {
            const elem = document.documentElement;
            const btn = document.getElementById('btn-fullscreen');

            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen(); 
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen(); 
                btn.innerText = "Quitter le Mode Kiosque";
                btn.style.background = "#fff";
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                btn.innerText = "⛶ Activer le Mode Kiosque";
                btn.style.background = "var(--accent)";
            }
        });
    </script>
</body>
</html>
