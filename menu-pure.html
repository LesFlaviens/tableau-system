<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Carte - Maison d'Exception</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* 🟢 DESIGN HAUTE COUTURE - ÉCRAN CHEVALET A4 🟢 */
        :root { 
            --bg-color: #070707;           
            --text-main: #f5f5f5;    
            --text-muted: #888888;   
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.1);
            --border-color: #222222;
            
            --font-title: 'Cormorant Garamond', serif;
            --font-text: 'Montserrat', sans-serif;
        }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Le conteneur format A4 / Chevalet Vertical */
        .kiosk-wrapper {
            width: 100%;
            max-width: 1080px; /* Largeur idéale pour un écran portrait 1080x1920 */
            min-height: 100vh;
            background: #0a0a0a;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
        }

        /* La bordure intérieure élégante */
        .menu-border {
            margin: 20px;
            padding: 40px 60px 80px 60px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 4px;
            min-height: calc(100vh - 40px);
            box-sizing: border-box;
            background: radial-gradient(circle at center, #111111 0%, #0a0a0a 100%);
        }

        header { 
            text-align: center; 
            padding-bottom: 50px; 
            margin-bottom: 50px;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
            position: relative;
        }

        /* Petit losange décoratif au centre de la ligne */
        header::after {
            content: "♦";
            color: var(--gold);
            font-size: 1.2rem;
            position: absolute;
            bottom: -14px;
            left: 50%;
            transform: translateX(-50%);
            background: #0a0a0a;
            padding: 0 15px;
        }
        
        .logo-text { 
            font-family: var(--font-title);
            color: var(--gold); 
            font-size: 4rem; 
            font-weight: 300; 
            letter-spacing: 12px; 
            margin: 0; 
            text-transform: uppercase; 
        }
        
        .subtitle {
            font-family: var(--font-text);
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 4px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* 🟢 MISE EN SCÈNE DU MENU DU JOUR 🟢 */
        .tasting-menu-box {
            border: 1px solid var(--gold);
            padding: 40px;
            margin: 40px 0 60px 0;
            text-align: center;
            background: var(--gold-dim);
            position: relative;
        }

        .tasting-title {
            font-family: var(--font-title);
            font-size: 2.5rem;
            color: var(--gold);
            margin: 0 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 4px;
        }

        .tasting-price {
            font-family: var(--font-text);
            font-size: 1.2rem;
            color: var(--text-main);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .tasting-course {
            font-family: var(--font-title);
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 15px;
            font-style: italic;
        }

        .tasting-course-label {
            font-family: var(--font-text);
            font-size: 0.8rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            display: block;
            margin-bottom: 5px;
            font-style: normal;
        }

        /* 🟢 SECTIONS CLASSIQUES (Entrées, Plats...) 🟢 */
        .category-section {
            margin-bottom: 60px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .category-title {
            font-family: var(--font-title);
            color: var(--gold);
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        /* Style Ligne Pointillée "Menu Papier" */
        .menu-item {
            margin-bottom: 35px;
        }

        .item-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .item-name {
            font-family: var(--font-title);
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--text-main);
            margin: 0;
            white-space: nowrap;
        }

        /* Les pointillés qui relient le plat au prix */
        .item-dots {
            flex-grow: 1;
            border-bottom: 2px dotted rgba(255, 255, 255, 0.2);
            margin: 0 15px;
            position: relative;
            top: -8px;
        }

        .item-price {
            font-family: var(--font-text);
            font-size: 1.3rem;
            color: var(--gold);
            font-weight: 400;
            white-space: nowrap;
        }

        .item-desc {
            font-family: var(--font-text);
            color: var(--text-muted);
            font-size: 1.1rem;
            line-height: 1.6;
            font-weight: 300;
            max-width: 85%;
        }

        .loading-screen {
            font-family: var(--font-title);
            text-align: center;
            padding: 100px 20px;
            font-size: 2rem;
            color: var(--gold);
            font-style: italic;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .footer {
            text-align: center;
            padding-top: 40px;
            margin-top: 40px;
            font-family: var(--font-text);
            color: rgba(255,255,255,0.3);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Adaptation pour les écrans plus petits ou mobiles */
        @media (max-width: 800px) {
            .menu-border { padding: 20px 15px; }
            .logo-text { font-size: 2.5rem; }
            .category-title { font-size: 2rem; }
            .item-name { font-size: 1.5rem; white-space: normal; }
            .item-dots { display: none; }
            .item-row { flex-direction: column; gap: 5px; }
            .item-price { align-self: flex-start; }
            .tasting-menu-box { padding: 20px; }
            .tasting-course { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="kiosk-wrapper">
        <div class="menu-border">
            
            <header>
                <h1 class="logo-text">NOTRE MAISON</h1>
                <div class="subtitle">La Carte</div>
            </header>

            <div id="menu-container">
                <div class="loading-screen">Mise à jour des créations du Chef...</div>
            </div>

            <div class="footer">
                Prix nets en euros — Service compris<br>
                <span style="font-size: 0.6rem; opacity: 0.5; margin-top: 10px; display: block;">Empire OS Kiosk</span>
            </div>

        </div>
    </div>

    <script>
        // -----------------------------------------
        // MOTEUR DE SYNCHRONISATION
        // -----------------------------------------
        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    if (window.location.protocol !== 'file:') {
                        let r = await fetch('/get-current-state');
                        if(r.ok) state = await r.json();
                    } else throw new Error("Local");
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'EMPIRE_GLOBAL_SYNC') fetchMenu();
        });

        // Structure d'affichage stricte et élégante
        const categoriesMap = [
            { id: 'menuJour', label: 'Menu du Jour', isTasting: true },
            { id: 'suggestions', label: 'Suggestions du Chef', isTasting: false },
            { id: 'entrees', label: 'Entrées', isTasting: false },
            { id: 'plats', label: 'Plats', isTasting: false },
            { id: 'desserts', label: 'Desserts', isTasting: false }
        ];

        let currentMenuData = null;

        async function fetchMenu() {
            try {
                const state = await API.getState();
                if (state && state.activeOrders && state.activeOrders['MENU_MASTER']) {
                    let newDataStr = JSON.stringify(state.activeOrders['MENU_MASTER'].data);
                    
                    if (newDataStr !== JSON.stringify(currentMenuData)) {
                        currentMenuData = JSON.parse(newDataStr);
                        renderClientMenu();
                    }
                } else if (!currentMenuData) {
                    document.getElementById('menu-container').innerHTML = '<div class="loading-screen">La carte n\'est pas encore disponible.</div>';
                }
            } catch(e) {
                console.error("Erreur de synchronisation:", e);
            }
        }

        // Formateur pour le Menu du Jour façon "Dégustation"
        function renderTastingMenu(item) {
            let cleanName = item.name.replace('🌟 ', '');
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} €` : '';
            
            // Si le chef a utilisé les sauts de ligne [BR]
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let html = `
                <div class="tasting-menu-box">
                    <h2 class="tasting-title">Menu du Jour</h2>
                    <div class="tasting-price">${priceStr}</div>
                `;
                
                let labels = ['Entrée', 'Plat', 'Dessert', 'Fromage / Suite'];
                
                parts.forEach((part, index) => {
                    if (part.trim() !== '') {
                        let label = labels[index] || '';
                        html += `
                        <div class="tasting-course">
                            <span class="tasting-course-label">${label}</span>
                            ${part.trim()}
                        </div>`;
                    }
                });
                
                html += `</div>`;
                return html;
            }
            
            // Si c'est un menu tapé sur une seule ligne
            return `
            <div class="tasting-menu-box">
                <h2 class="tasting-title">Menu du Jour</h2>
                <div class="tasting-price">${priceStr}</div>
                <div class="tasting-course">${cleanName}</div>
            </div>`;
        }

        // Formateur pour les plats normaux façon "A la carte"
        function renderStandardItem(item) {
            let cleanName = item.name.replace('🌟 ', '');
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} €` : '';
            
            let mainName = cleanName;
            let description = '';

            // Si le chef a mis un saut de ligne, on l'utilise comme description en italique
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                mainName = parts[0].trim();
                description = parts.slice(1).join(' ').trim();
            }

            let descHtml = description ? `<div class="item-desc">${description}</div>` : '';

            return `
            <div class="menu-item">
                <div class="item-row">
                    <div class="item-name">${mainName}</div>
                    <div class="item-dots"></div>
                    <div class="item-price">${priceStr}</div>
                </div>
                ${descHtml}
            </div>`;
        }

        function renderClientMenu() {
            const container = document.getElementById('menu-container');
            if (!currentMenuData) return;

            let htmlContent = '';

            categoriesMap.forEach((cat, index) => {
                let items = currentMenuData[cat.id];
                
                // On cache automatiquement les plats à stock "0"
                if (items && Array.isArray(items)) {
                    let availableItems = items.filter(item => item.stock !== 0);

                    if (availableItems.length > 0) {
                        
                        // Si c'est la catégorie Menu du Jour, affichage spécial
                        if (cat.isTasting) {
                            availableItems.forEach(item => {
                                htmlContent += renderTastingMenu(item);
                            });
                        } 
                        // Sinon, affichage classique avec les pointillés
                        else {
                            htmlContent += `
                            <div class="category-section" style="animation-delay: ${index * 0.15}s;">
                                <h2 class="category-title">${cat.label}</h2>
                            `;

                            availableItems.forEach(item => {
                                htmlContent += renderStandardItem(item);
                            });

                            htmlContent += `</div>`;
                        }
                    }
                }
            });

            if (htmlContent === '') {
                htmlContent = '<div class="loading-screen">Le service est actuellement terminé.</div>';
            }

            container.innerHTML = htmlContent;
        }

        // Lancement immédiat
        fetchMenu();
        // Vérification discrète en arrière-plan toutes les 3 secondes
        setInterval(fetchMenu, 3000);

    </script>
</body>
</html>
