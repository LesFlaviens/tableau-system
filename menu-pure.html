<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Carte - Maison d'Exception</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* 🟢 DESIGN HAUTE COUTURE - ÉCRAN CHEVALET A4 🟢 */
        :root { 
            --bg-color: #050505;           
            --text-main: #f5f5f5;    
            --text-muted: #888888;   
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --border-color: #1a1a1a;
            
            --font-title: 'Cormorant Garamond', serif;
            --font-text: 'Montserrat', sans-serif;
        }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
        }

        /* Le conteneur format A4 / Chevalet Vertical */
        .kiosk-wrapper {
            width: 100%;
            max-width: 1080px; 
            min-height: 100vh;
            background: #080808;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
        }

        header { 
            text-align: center; 
            padding: 60px 20px 40px; 
            background: radial-gradient(circle at center, #111111 0%, #080808 100%);
            border-bottom: 1px solid var(--border-color);
        }
        
        .logo-text { 
            font-family: var(--font-title);
            color: var(--gold); 
            font-size: 3.5rem; 
            font-weight: 300; 
            letter-spacing: 12px; 
            margin: 0; 
            text-transform: uppercase; 
        }
        
        .subtitle {
            font-family: var(--font-text);
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 6px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* 🟢 NAVIGATION RAPIDE POUR LES CLIENTS 🟢 */
        .nav-categories {
            display: flex;
            overflow-x: auto;
            padding: 20px;
            gap: 25px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(8,8,8,0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .nav-categories::-webkit-scrollbar { display: none; }
        
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-family: var(--font-text);
            font-size: 0.9rem;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            white-space: nowrap;
            transition: color 0.3s;
        }
        .nav-link:active, .nav-link.active { color: var(--gold); }

        /* Conteneur de la carte */
        .menu-container {
            padding: 40px;
        }

        /* 🟢 LES CADRES POUR CHAQUE CATÉGORIE 🟢 */
        .category-section, .tasting-menu-box {
            position: relative;
            background: #0a0a0a;
            border: 1px solid var(--border-color);
            padding: 50px 60px;
            margin-top: 20px;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out forwards;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        .category-section::before, .tasting-menu-box::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid var(--gold-dim);
            pointer-events: none;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Titre encastré sur le haut du cadre */
        .category-title {
            font-family: var(--font-title);
            color: var(--gold);
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-align: center;
            text-transform: uppercase;
            margin: 0;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: #080808;
            padding: 0 30px;
            white-space: nowrap;
        }

        /* 🟢 SÉPARATEUR DE PÔLES (Cuisine -> Bar) 🟢 */
        .pole-separator {
            text-align: center;
            margin: 60px 0 40px 0;
            font-family: var(--font-title);
            color: var(--text-muted);
            font-size: 1.5rem;
            letter-spacing: 8px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .pole-separator::before, .pole-separator::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
            margin: 0 20px;
        }

        /* 🟢 MISE EN SCÈNE SPÉCIFIQUE AU MENU DU JOUR 🟢 */
        .tasting-menu-box {
            background: linear-gradient(180deg, #0f0f0f 0%, #0a0a0a 100%);
            border-color: rgba(212, 175, 55, 0.3);
            text-align: center;
        }

        .tasting-menu-box::before {
            border: 1px solid rgba(212, 175, 55, 0.4);
        }

        .tasting-price {
            font-family: var(--font-text);
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        .tasting-course {
            font-family: var(--font-title);
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 25px;
            font-style: italic;
        }

        .tasting-course-label {
            font-family: var(--font-text);
            font-size: 0.85rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 8px;
            font-style: normal;
        }

        /* 🟢 LIGNES DE PLATS & BOISSONS (A la carte) 🟢 */
        .menu-item {
            margin-bottom: 30px;
            position: relative;
            z-index: 2;
        }

        .menu-item:last-child {
            margin-bottom: 0;
        }

        .item-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .item-name {
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--text-main);
            margin: 0;
            white-space: nowrap;
        }

        .item-dots {
            flex-grow: 1;
            border-bottom: 2px dotted rgba(255, 255, 255, 0.15);
            margin: 0 15px;
            position: relative;
            top: -8px;
        }

        .item-price {
            font-family: var(--font-text);
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 400;
            white-space: nowrap;
        }

        .item-desc {
            font-family: var(--font-text);
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 300;
            max-width: 90%;
        }

        .loading-screen {
            font-family: var(--font-title);
            text-align: center;
            padding: 100px 20px;
            font-size: 2rem;
            color: var(--gold);
            font-style: italic;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .footer {
            text-align: center;
            padding: 40px;
            font-family: var(--font-text);
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 800px) {
            .menu-container { padding: 20px; }
            .category-section, .tasting-menu-box { padding: 40px 20px; margin-bottom: 40px; margin-top: 30px; }
            .logo-text { font-size: 2.5rem; }
            .category-title { font-size: 1.5rem; padding: 0 15px; top: -15px; }
            .item-name { font-size: 1.4rem; white-space: normal; }
            .item-dots { display: none; }
            .item-row { flex-direction: column; gap: 5px; }
            .item-price { align-self: flex-start; }
            .tasting-course { font-size: 1.4rem; }
            .pole-separator { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="kiosk-wrapper">
        <header>
            <h1 class="logo-text">NOTRE MAISON</h1>
            <div class="subtitle">La Carte</div>
        </header>

        <div class="nav-categories" id="nav-categories">
            </div>

        <div class="menu-container" id="menu-container">
            <div class="loading-screen">Mise à jour des créations du Chef...</div>
        </div>

        <div class="footer">
            Prix nets en euros — Service compris<br>
            <span style="font-size: 0.6rem; opacity: 0.5; margin-top: 10px; display: block;">Empire OS Kiosk</span>
        </div>
    </div>

    <script>
        // -----------------------------------------
        // MOTEUR DE SYNCHRONISATION
        // -----------------------------------------
        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    if (window.location.protocol !== 'file:') {
                        let r = await fetch('/get-current-state');
                        if(r.ok) state = await r.json();
                    } else throw new Error("Local");
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'EMPIRE_GLOBAL_SYNC') fetchMenu();
        });

        // 🟢 FUSION DES DEUX CARTES (CUISINE + BAR) 🟢
        const categoriesMap = [
            // LA CUISINE
            { id: 'menuJour', label: 'Menu du Jour', isTasting: true, pole: 'cuisine' },
            { id: 'suggestions', label: 'Suggestions du Chef', isTasting: false, pole: 'cuisine' },
            { id: 'entrees', label: 'Entrées', isTasting: false, pole: 'cuisine' },
            { id: 'plats', label: 'Plats', isTasting: false, pole: 'cuisine' },
            { id: 'desserts', label: 'Desserts', isTasting: false, pole: 'cuisine' },
            
            // LE BAR
            { id: 'cocktails', label: 'Cocktails', isTasting: false, pole: 'bar' },
            { id: 'vins', label: 'Vins & Bulles', isTasting: false, pole: 'bar' },
            { id: 'spiritueux', label: 'Spiritueux', isTasting: false, pole: 'bar' },
            { id: 'bieres', label: 'Bières', isTasting: false, pole: 'bar' },
            { id: 'chaudes', label: 'Boissons Chaudes', isTasting: false, pole: 'bar' },
            { id: 'froides', label: 'Softs & Eaux', isTasting: false, pole: 'bar' }
        ];

        let currentMenuDataStr = "";

        async function fetchMenu() {
            try {
                const state = await API.getState();
                let combinedData = {};

                // On récupère et fusionne la Cuisine et le Bar
                if (state && state.activeOrders) {
                    if (state.activeOrders['MENU_MASTER'] && state.activeOrders['MENU_MASTER'].data) {
                        Object.assign(combinedData, state.activeOrders['MENU_MASTER'].data);
                    }
                    if (state.activeOrders['MENU_MASTER_BAR'] && state.activeOrders['MENU_MASTER_BAR'].data) {
                        Object.assign(combinedData, state.activeOrders['MENU_MASTER_BAR'].data);
                    }
                }

                let newDataStr = JSON.stringify(combinedData);
                
                // Redessiner uniquement s'il y a un changement
                if (newDataStr !== currentMenuDataStr && Object.keys(combinedData).length > 0) {
                    currentMenuDataStr = newDataStr;
                    renderClientMenu(combinedData);
                } else if (Object.keys(combinedData).length === 0 && currentMenuDataStr === "") {
                    document.getElementById('menu-container').innerHTML = '<div class="loading-screen">La carte n\'est pas encore disponible.</div>';
                }
            } catch(e) {
                console.error("Erreur de synchronisation:", e);
            }
        }

        // Formateur pour le Menu du Jour façon "Dégustation"
        function renderTastingMenu(item) {
            let cleanName = item.name.replace('🌟 ', '');
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} €` : '';
            
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let html = `
                <div class="tasting-menu-box" id="section-menuJour">
                    <h2 class="category-title">Menu du Jour</h2>
                    <div class="tasting-price">${priceStr}</div>
                `;
                
                let labels = ['Entrée', 'Plat', 'Dessert', 'Fromage / Suite'];
                
                parts.forEach((part, index) => {
                    if (part.trim() !== '') {
                        let label = labels[index] || '';
                        html += `
                        <div class="tasting-course">
                            <span class="tasting-course-label">${label}</span>
                            ${part.trim()}
                        </div>`;
                    }
                });
                
                html += `</div>`;
                return html;
            }
            
            return `
            <div class="tasting-menu-box" id="section-menuJour">
                <h2 class="category-title">Menu du Jour</h2>
                <div class="tasting-price">${priceStr}</div>
                <div class="tasting-course">${cleanName}</div>
            </div>`;
        }

        // Formateur pour les plats et boissons "A la carte"
        function renderStandardItem(item) {
            let cleanName = item.name.replace('🌟 ', '');
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} €` : '';
            
            let mainName = cleanName;
            let description = '';

            // Si le chef/barman a mis un saut de ligne, on l'utilise comme description
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                mainName = parts[0].trim();
                description = parts.slice(1).join(' ').trim();
            }

            let descHtml = description ? `<div class="item-desc">${description}</div>` : '';

            return `
            <div class="menu-item">
                <div class="item-row">
                    <div class="item-name">${mainName}</div>
                    <div class="item-dots"></div>
                    <div class="item-price">${priceStr}</div>
                </div>
                ${descHtml}
            </div>`;
        }

        function renderClientMenu(menuData) {
            const container = document.getElementById('menu-container');
            const nav = document.getElementById('nav-categories');
            
            let htmlContent = '';
            let navHtml = '';
            let hasShownBarSeparator = false;

            categoriesMap.forEach((cat, index) => {
                let items = menuData[cat.id];
                
                if (items && Array.isArray(items)) {
                    // On filtre automatiquement les ruptures de stock
                    let availableItems = items.filter(item => item.stock !== 0);

                    if (availableItems.length > 0) {
                        
                        // Séparateur visuel élégant entre la Cuisine et le Bar
                        if (cat.pole === 'bar' && !hasShownBarSeparator) {
                            htmlContent += `<div class="pole-separator" id="section-bar">Côté Bar</div>`;
                            hasShownBarSeparator = true;
                        }

                        // Navigation
                        navHtml += `<a href="#section-${cat.id}" class="nav-link">${cat.label}</a>`;

                        // Menu Dégustation
                        if (cat.isTasting) {
                            availableItems.forEach(item => {
                                htmlContent += renderTastingMenu(item);
                            });
                        } 
                        // Cadre classique
                        else {
                            htmlContent += `
                            <div class="category-section" id="section-${cat.id}" style="animation-delay: ${index * 0.1}s;">
                                <h2 class="category-title">${cat.label}</h2>
                            `;

                            availableItems.forEach(item => {
                                htmlContent += renderStandardItem(item);
                            });

                            htmlContent += `</div>`;
                        }
                    }
                }
            });

            if (htmlContent === '') {
                htmlContent = '<div class="loading-screen">Le service est actuellement terminé.</div>';
            }

            nav.innerHTML = navHtml;
            container.innerHTML = htmlContent;

            // Animation de la navigation
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        fetchMenu();
        setInterval(fetchMenu, 3000); // Check les nouveautés/ruptures toutes les 3 secondes

    </script>
</body>
</html>
