<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="theme-color" content="#050505">
    <title>La Carte - Maison d'Exception</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Amatic+SC&family=Anton&family=Arvo&family=Bebas+Neue&family=Bitter&family=Bodoni+Moda&family=Caveat&family=Cinzel&family=Cormorant+Garamond&family=Crimson+Text&family=Dancing+Script&family=EB+Garamond&family=Fira+Sans&family=Great+Vibes&family=Inter:wght@400;600&family=Jost&family=Lato&family=Libre+Baskerville&family=Lobster&family=Lora&family=Merriweather&family=Montserrat:wght@400;600&family=Noto+Serif&family=Nunito&family=Open+Sans&family=Oswald&family=PT+Serif&family=Pacifico&family=Playfair+Display:wght@400;600&family=Poppins:wght@400;600&family=Quicksand&family=Raleway&family=Righteous&family=Roboto&family=Rubik&family=Satisfy&family=Ubuntu&family=Work+Sans&family=Zilla+Slab&display=swap" rel="stylesheet">
    
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>

    <script>
        // BOUCLIER 1 : DOMAIN LOCK (Empêche le vol du code)
        if (window.location.hostname !== "os.ichef.ch" && window.location.hostname !== "localhost" && window.location.hostname !== "127.0.0.1" && !window.location.hostname.includes("render.com")) {
            document.documentElement.innerHTML = "<h1 style='color:red; text-align:center; margin-top:20%; font-family:sans-serif;'>🛑 VIOLATION DE LICENCE iCHEF OS</h1>";
            throw new Error("Exécution non autorisée hors du domaine officiel.");
        }

        // BOUCLIER 2 : ANTI-SNOOPING (Protège ton design)
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.onkeydown = function(e) {
            if(e.keyCode == 123) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; 
            if(e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; 
        }
    </script>

    <style>
        :root { 
            --bg-color: #050505;            
            --text-main: #f5f5f5;   
            --text-muted: #aaaaaa;   
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --border-color: #1a1a1a;
            --font-title: 'Playfair Display', serif;
            --font-text: 'Inter', sans-serif;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            -webkit-font-smoothing: antialiased; 
            transition: background-color 0.5s, color 0.5s; 
            font-family: var(--font-text);
        }

        .kiosk-wrapper { width: 100%; max-width: 800px; min-height: 100vh; background: var(--bg-color); position: relative; padding-bottom: 120px; }
        
        header { text-align: center; padding: 60px 20px 30px; border-bottom: 1px solid var(--border-color); position: relative; background-position: center; background-size: cover; }
        .header-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(transparent, var(--bg-color, #050505)); display: none; z-index: 1; }
        .logo-text { font-family: var(--font-title); color: var(--gold); font-size: 3rem; font-weight: 600; letter-spacing: 8px; margin: 0; text-transform: uppercase; position: relative; z-index: 2; transition: color 0.3s; }
        .subtitle { font-family: var(--font-text); color: var(--text-muted); font-size: 0.9rem; letter-spacing: 4px; margin-top: 15px; text-transform: uppercase; font-weight: 500; position: relative; z-index: 2; }
        
        .menu-container { padding: 40px 20px 10px 20px; }
        .category-section, .tasting-menu-box { position: relative; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); padding: 50px 30px; margin-bottom: 50px; border-radius: 12px; }
        .category-title { font-family: var(--font-title); color: var(--gold); font-size: 2rem; font-weight: 400; letter-spacing: 4px; text-align: center; text-transform: uppercase; margin: 0; position: absolute; top: -20px; left: 50%; transform: translateX(-50%); background: var(--bg-color); padding: 0 20px; white-space: nowrap; }
        
        .tasting-menu-box { text-align: center; }
        .tasting-price { font-family: var(--font-text); font-size: 1.3rem; color: var(--gold); margin-bottom: 40px; letter-spacing: 3px; font-weight: bold;}
        .tasting-course { font-family: var(--font-title); font-size: 1.6rem; margin-bottom: 25px; font-style: italic; }
        .tasting-course-label { font-family: var(--font-text); font-size: 0.85rem; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 8px; font-style: normal; font-weight: 600;}
        
        .menu-item { margin-bottom: 30px; padding: 15px; border-radius: 8px; transition: background 0.3s, transform 0.2s; border-bottom: 1px dashed var(--border-color); }
        .menu-item:last-child { border-bottom: none; margin-bottom: 0; }
        .menu-item.sold-out { opacity: 0.4; filter: grayscale(100%); }
        .menu-item.sold-out .item-name { text-decoration: line-through; color: #ff4757; }

        .item-row { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 4px; flex-wrap: wrap; gap: 10px;}
        .item-name { font-family: var(--font-title); font-size: 1.4rem; color: var(--text-main); margin: 0; font-weight: 600; flex: 1; min-width: 60%; letter-spacing: 0.5px;}
        .item-price { font-family: var(--font-text); font-size: 1.1rem; color: var(--gold); font-weight: bold; white-space: nowrap;}
        
        .item-desc { 
            font-family: var(--font-text); 
            color: var(--text-muted); 
            font-size: 0.95rem; 
            line-height: 1.5; 
            margin-top: 6px; 
            font-style: italic; 
            padding-right: 20px;
        }
        
        .sold-out-badge { font-size: 0.7rem; color: #fff; background: #ff4757; padding: 5px 12px; border-radius: 20px; font-weight: bold; text-transform: uppercase; margin-left: 15px; display: inline-block; vertical-align: middle;}

        .loading-screen { text-align: center; padding: 100px 20px; font-size: 1.2rem; color: var(--gold); font-style: italic; font-family: var(--font-title); }
        
        /* --- NOUVEAU BOUTON AVIS CLIENT --- */
        .review-section { text-align: center; padding: 20px; margin-bottom: 20px; }
        .btn-review {
            display: inline-flex; align-items: center; justify-content: center; gap: 8px;
            background: transparent; border: 1px solid var(--gold); color: var(--gold);
            padding: 12px 25px; border-radius: 30px; font-family: var(--font-text);
            font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;
            text-decoration: none; transition: all 0.3s ease;
        }
        .btn-review:hover {
            background: var(--gold); color: var(--bg-color);
            box-shadow: 0 5px 20px var(--gold-dim);
            transform: translateY(-2px);
        }

        .footer { text-align: center; padding: 30px 20px; color: var(--text-muted); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid var(--border-color);}

        @media (max-width: 600px) {
            .logo-text { font-size: 2rem; letter-spacing: 4px;}
            .category-title { font-size: 1.4rem; padding: 0 10px; top: -14px; }
            .item-name { font-size: 1.1rem; }
            .tasting-course { font-size: 1.3rem; }
        }
    </style>
</head>

<body>
    <div class="kiosk-wrapper">
        <header id="menu-header">
            <div class="header-overlay"></div>
            <h1 id="restaurant-name" class="logo-text">NOTRE MAISON</h1>
            <div class="subtitle">La Carte</div>
        </header>

        <div class="menu-container" id="menu-container">
            <div class="loading-screen">Mise à jour des créations du Chef...</div>
        </div>

        <div class="review-section" id="review-section" style="display: none;">
            <a href="#" id="btn-review-link" target="_blank" class="btn-review">
                ⭐ Laissez-nous un avis
            </a>
        </div>

        <div class="footer">
            Prix nets en <span id="footer-currency">Euros</span> — Service compris<br>
            <span style="font-size: 0.6rem; opacity: 0.5;">Propulsé par iCHEF OS</span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID'); // Le menu dépend de l'URL du QR Code
        
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        if (!tenantID) {
            document.getElementById('menu-container').innerHTML = '<div class="loading-screen" style="color:#ff4757;">Erreur. Identifiant établissement manquant. Veuillez scanner à nouveau le QR Code.</div>';
        }

        let currentCurrency = "€"; 
        let currencyName = "Euros";
        let systemSettings = {}; 
        let currentMenuData = null; 
        let lastDesignHash = "";

        function isTimeInSlot(current, start, end) {
            if (!start || !end) return false;
            if (start > end) { return current >= start || current <= end; }
            return current >= start && current <= end;
        }

        // -------------------------------------------------------------
        // FONCTION CENTRALE SYNC : HORAIRES & POLICES SÉPARÉES 🎨🕰️
        // -------------------------------------------------------------
        async function fetchMenu() {
            if(!tenantID) return;

            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}&_t=${Date.now()}`, { cache: 'no-store' });
                let state = await r.json();
                let activeOrders = state.activeOrders || {};
                
                if (activeOrders['SETTINGS_MASTER'] && activeOrders['SETTINGS_MASTER'].data) {
                    systemSettings = activeOrders['SETTINGS_MASTER'].data;
                    
                    if (systemSettings.name) document.getElementById('restaurant-name').innerText = systemSettings.name;

                    // 🔗 GESTION DU LIEN D'AVIS (GOOGLE / TRUSTPILOT)
                    if (systemSettings.reviewLink && systemSettings.reviewLink.trim() !== "") {
                        document.getElementById('review-section').style.display = 'block';
                        document.getElementById('btn-review-link').href = systemSettings.reviewLink;
                    } else {
                        document.getElementById('review-section').style.display = 'none';
                    }

                    // 🛑 MOTEUR DU PILOTE AUTOMATIQUE (4 SERVICES)
                    let isAutoOpen = true;
                    let isManualClosed = (systemSettings.qrActive === false);

                    if (systemSettings.schedule && systemSettings.schedule.auto) {
                        let now = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Paris"}));
                        let currentDay = now.getDay(); 
                        let currentHour = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                        let sched = systemSettings.schedule;

                        if (!sched.days.includes(currentDay)) { isAutoOpen = false; }
                        else {
                            let inMatin = isTimeInSlot(currentHour, sched.matin?.s, sched.matin?.e);
                            let inMidi  = isTimeInSlot(currentHour, sched.midi?.s, sched.midi?.e);
                            let inAprem = isTimeInSlot(currentHour, sched.aprem?.s, sched.aprem?.e);
                            let inSoir  = isTimeInSlot(currentHour, sched.soir?.s,  sched.soir?.e);
                            if (!inMatin && !inMidi && !inAprem && !inSoir) isAutoOpen = false;
                        }
                    }

                    if (isManualClosed || !isAutoOpen) {
                        let motif = isManualClosed ? "suite à une forte affluence" : "car nous sommes en dehors de nos heures de service";
                        let titre = isManualClosed ? "Service Suspendu" : "Fermé";
                        let icone = isManualClosed ? "🛎️" : "🕰️";

                        document.getElementById('menu-container').innerHTML = `
                            <div style="text-align:center; padding:100px 20px;">
                                <div style="font-size:4rem; margin-bottom:20px;">${icone}</div>
                                <h2 style="font-family: var(--font-title); font-size:2rem; color: var(--gold); letter-spacing: 2px; text-transform:uppercase;">${titre}</h2>
                                <p style="font-family: var(--font-text); font-size: 1rem; color: var(--text-muted); line-height: 1.6; margin-top:20px;">
                                    La consultation de la carte est désactivée ${motif}.<br><br>
                                </p>
                            </div>`;
                        document.getElementById('review-section').style.display = 'none'; // Cache le bouton avis si fermé
                        return; 
                    }

                    if (systemSettings.currency && systemSettings.currency !== currentCurrency) {
                        currentCurrency = systemSettings.currency;
                        currencyName = {"€": "Euros", "CHF": "Francs Suisses", "$": "Dollars", "C$": "Dollars", "£": "Livres", "¥": "Yens"}[currentCurrency] || currentCurrency;
                        document.getElementById('footer-currency').innerText = currencyName;
                        currentMenuData = null; 
                    }

                    // 🎨 SYMBIOSE PARFAITE : POLICES & COULEURS
                    if (systemSettings.design) {
                        let designHash = JSON.stringify(systemSettings.design);
                        if(designHash !== lastDesignHash) {
                            document.documentElement.style.setProperty('--bg-color', systemSettings.design.bgColor || '#050505');
                            document.documentElement.style.setProperty('--text-main', systemSettings.design.textColor || '#f5f5f5');
                            if (systemSettings.design.btnColor) {
                                document.documentElement.style.setProperty('--gold', systemSettings.design.btnColor);
                                document.documentElement.style.setProperty('--gold-dim', systemSettings.design.btnColor + '33');
                            }
                            if (systemSettings.design.font) {
                                document.documentElement.style.setProperty('--font-text', systemSettings.design.font);
                            }
                            if (systemSettings.design.titleFont) {
                                document.documentElement.style.setProperty('--font-title', systemSettings.design.titleFont);
                            }
                            
                            let logoText = document.querySelector('.logo-text');
                            if(logoText) {
                                logoText.style.color = systemSettings.design.titleColor || systemSettings.design.btnColor || '#d4af37';
                            }

                            let headerEl = document.getElementById('menu-header');
                            let overlayEl = headerEl?.querySelector('.header-overlay');
                            if (headerEl && systemSettings.design.bannerUrl) {
                                headerEl.style.backgroundImage = `url('${systemSettings.design.bannerUrl}')`;
                                if (overlayEl) {
                                    overlayEl.style.display = 'block';
                                    overlayEl.style.background = `linear-gradient(transparent, ${systemSettings.design.bgColor || '#050505'})`;
                                }
                            } else if (headerEl) {
                                headerEl.style.backgroundImage = 'none';
                                if (overlayEl) overlayEl.style.display = 'none';
                            }

                            if(systemSettings.design.bgColor === '#ffffff') {
                                document.documentElement.style.setProperty('--border-color', '#e2e8f0');
                                document.documentElement.style.setProperty('--bg-color', '#f8fafc');
                            }
                            lastDesignHash = designHash;
                        }
                    }
                }

                let rawCuisine = activeOrders['MENU_MASTER']?.data || {};
                let rawBar = activeOrders['MENU_MASTER_BAR']?.data || {};

                let newMenuData = {};
                for(let cat in rawCuisine) newMenuData[cat] = rawCuisine[cat].map(i => ({...i, destination: 'cuisine'}));
                for(let cat in rawBar) newMenuData[cat] = rawBar[cat].map(i => ({...i, destination: 'bar'}));
                
                for(let cat in newMenuData) if(!newMenuData[cat] || newMenuData[cat].length === 0) delete newMenuData[cat];

                if (Object.keys(newMenuData).length > 0) {
                    if (JSON.stringify(newMenuData) !== JSON.stringify(currentMenuData)) {
                        currentMenuData = newMenuData;
                        renderClientMenu();
                    }
                } else { 
                    currentMenuData = null;
                    document.getElementById('menu-container').innerHTML = '<div class="loading-screen">La carte n\'est pas encore disponible.</div>'; 
                }
            } catch(e) { console.error("Erreur Sync:", e); }
        }

        function renderTastingMenu(item) {
            let cleanName = item.name ? item.name.replace('🌟 ', '') : "Plat inconnu";
            let mainName = cleanName.includes('[BR]') ? cleanName.split('[BR]')[0].trim() : cleanName;
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
            
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let html = `<div class="tasting-menu-box"><h2 class="category-title">${parts[0].trim()}</h2><div class="tasting-price">${priceStr}</div>`;
                let labels = ['Entrée', 'Plat', 'Dessert', 'Fromage / Suite'];
                for(let i = 1; i < parts.length; i++) if (parts[i].trim() !== '') html += `<div class="tasting-course"><span class="tasting-course-label">${labels[i-1]||''}</span>${parts[i].trim()}</div>`;
                return html + `</div>`;
            }
            return `<div class="tasting-menu-box"><h2 class="category-title">Menu du Jour</h2><div class="tasting-price">${priceStr}</div><div class="tasting-course">${cleanName}</div></div>`;
        }

        function renderStandardItem(item) {
            let cleanName = item.name ? item.name.replace('🌟 ', '') : "Plat inconnu";
            let mainName = cleanName.includes('[BR]') ? cleanName.split('[BR]')[0].trim() : cleanName;
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
            
            let isSoldOut = (item.stock === 0 || item.stock === "0");
            let soldOutClass = isSoldOut ? 'sold-out' : '';
            let soldOutBadge = isSoldOut ? `<span class="sold-out-badge">Épuisé</span>` : '';

            let descText = item.description || item.desc || "";
            if (!descText && cleanName.includes('[BR]')) {
                descText = cleanName.split('[BR]').slice(1).join('<br>').trim();
            }
            let descriptionHTML = descText ? `<div class="item-desc">${descText}</div>` : '';
            
            return `
            <div class="menu-item ${soldOutClass}">
                <div class="item-row">
                    <div class="item-name">${mainName}</div>
                    <div class="item-price">${priceStr} ${soldOutBadge}</div>
                </div>
                ${descriptionHTML}
            </div>`;
        }

        function renderClientMenu() {
            const container = document.getElementById('menu-container');
            if (!currentMenuData) return;
            
            let htmlContent = '';
            let categories = Object.keys(currentMenuData);
            
            categories.sort((a, b) => {
                let isMenuA = a.toLowerCase().includes('jour') || a.toLowerCase().includes('sugg');
                let isMenuB = b.toLowerCase().includes('jour') || b.toLowerCase().includes('sugg');
                if (isMenuA && !isMenuB) return -1;
                if (!isMenuA && isMenuB) return 1;
                return 0;
            });

            let activeCategories = [];
            categories.forEach(catKey => {
                let items = currentMenuData[catKey];
                if (items && Array.isArray(items)) {
                    let visibleItems = items.filter(item => item.hidden !== true);
                    if (visibleItems.length > 0) activeCategories.push(catKey);
                }
            });

            // LA VITRINE : TOUT AFFICHER D'UN COUP
            activeCategories.forEach((catKey) => {
                let visibleItems = currentMenuData[catKey].filter(item => item.hidden !== true);
                let isTasting = catKey.toLowerCase().includes('jour') || catKey.toLowerCase().includes('sugg');
                
                if (isTasting) {
                    visibleItems.forEach(item => htmlContent += renderTastingMenu(item));
                } else {
                    htmlContent += `<div class="category-section"><h2 class="category-title"><span>${catKey}</span></h2>`;
                    visibleItems.forEach(item => htmlContent += renderStandardItem(item));
                    htmlContent += `</div>`;
                }
            });
            
            container.innerHTML = htmlContent || '<div class="loading-screen" style="font-style:normal;">Aucun plat trouvé dans cette catégorie.</div>';
        }

        // ==========================================
        // WEBSOCKET (Live Refresh pour le Menu Client)
        // ==========================================
        function initWebSocket() {
            if(typeof io === 'undefined' || !tenantID) return;
            const socket = io(SERVER_URL);
            socket.emit('joinTenant', tenantID);
            
            // Si le gérant cache un plat (Rupture), on recharge la page du client instantanément
            socket.on('updateState', (state) => {
                fetchMenu();
            });
        }

        fetchMenu(); 
        initWebSocket();
    </script>
</body>
</html>
