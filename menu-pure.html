<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ichef.ch - La Carte (Digital Easel Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        /* 🎨 DÉFINITION DE LA PALETTE PREMIUM SOUHAITÉE */
        :root {
            --bg: #1F1F1F;          /* FOND DE COULEUR : Deep Charcoal Grey (Mat, pas noir absolu) */
            --text-luxe: #F5F5F0;   /* ÉCRITURE : Soft Cream (moins stark que le blanc, pour un rendu "purée") */
            --accent-mat: #C9A76E;  /* DORÉ/BRONZE MAT (plus sobre, pour prix et titres) */
            --dot-color: #555550;   /* Couleur des points, très subtile */
        }
        
        body {
            background: var(--bg);
            color: var(--text-luxe);
            font-family: 'Montserrat', sans-serif; /* Police Pure et Moderne */
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow: hidden; /* Empêche tout scroll sur un chevalet numérique */
            justify-content: center; /* Centre verticalement tout le menu */
        }
        
        /* HEADER ULTRA-MINIMALISTE */
        .header {
            background: transparent;
            padding: 20px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .logo-img { height: 40px; margin-bottom: 5px; opacity: 0.8; }
        .brand-name { color: var(--accent-mat); font-size: 1.8rem; font-weight: 900; letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        .subtitle { font-size: 0.7rem; color: #777; letter-spacing: 2px; margin-top: 5px; text-transform: uppercase; font-weight: 400;}

        /* INDICATEUR DE SYNCHRONISATION H24 TOTALEMENT DISCRET (Juste un point gris) */
        .sync-status { position: absolute; top: 10px; right: 10px; display: flex; align-items: center; }
        .sync-dot { width: 5px; height: 5px; border-radius: 50%; background: #444; } /* Gris par défaut */
        .sync-dot.online { background: var(--dot-color); } /* Gris à peine plus clair pour sync OK */

        /* STRUCTURE DU MENU (Grid 3 colonnes) */
        .menu-container {
            flex: 1;
            padding: 30px 50px;
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* 3 colonnes fixes */
            gap: 50px; /* Grand espacement pour la clarté */
            max-width: 1600px;
            margin: 0 auto;
            width: 100%;
            box-sizing: border-box;
            align-content: start; /* Les colonnes se remplissent par le haut */
        }
        
        .menu-section { display: flex; flex-direction: column; }
        .section-title { font-size: 1.3rem; color: var(--accent-mat); text-align: center; font-weight: 700; letter-spacing: 2px; margin-bottom: 20px; text-transform: uppercase; border-bottom: 1px dashed var(--dot-color); padding-bottom: 8px; }
        
        /* LISTE DES PLATS PUR & ÉPURÉ */
        .item-list { display: flex; flex-direction: column; gap: 12px; }
        .menu-item { display: flex; justify-content: space-between; align-items: baseline; }
        .item-name { font-size: 0.95rem; font-weight: 400; color: var(--text-luxe); flex: 1; }
        .item-dots { flex: 1; border-bottom: 1px dotted var(--dot-color); margin: 0 15px; position: relative; top: -4px; opacity: 0.6;}
        .item-price { font-size: 0.95rem; color: var(--accent-mat); font-weight: 700; text-align: right;}
        
        /* Animation discrète lors du refresh */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .menu-item { animation: fadeIn 0.5s ease-in; }
    </style>
</head>
<body>

    <div class="sync-status"><div id="sync-dot" class="sync-dot"></div></div>

    <div class="header">
        <img src="logo.png" alt="iChef Logo" class="logo-img" onerror="this.style.display='none';">
        <h1 class="brand-name">ichef.ch</h1>
        <div class="subtitle">La Carte</div>
    </div>

    <div class="menu-container">
        <div class="menu-section">
            <div class="section-title">Entrées</div>
            <div class="item-list" id="list-entrees">
                <div style="text-align:center; color:#555; font-size:0.8rem;">Réception de la carte...</div>
            </div>
        </div>

        <div class="menu-section">
            <div class="section-title">Plats</div>
            <div class="item-list" id="list-plats">
                <div style="text-align:center; color:#555; font-size:0.8rem;">Réception de la carte...</div>
            </div>
        </div>

        <div class="menu-section">
            <div class="section-title">Desserts</div>
            <div class="item-list" id="list-desserts">
                <div style="text-align:center; color:#555; font-size:0.8rem;">Réception de la carte...</div>
            </div>
        </div>
    </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json())
        };

        // Données de secours (toujours présentes pour H24 7/7)
        const DEFAULT_MENU = {
            entrees: [ { id: 1, name: "Œuf Parfait aux Champignons", price: 12 }, { id: 2, name: "Foie Gras Maison", price: 18 }, { id: 3, name: "Carpaccio de Bœuf Charolais", price: 14 }, { id: 4, name: "Tartare de Saumon à l'Aneth", price: 15 }, { id: 5, name: "Velouté de Butternut de Saison", price: 10 }, { id: 6, name: "Salade César iChef Signature", price: 13 }, { id: 7, name: "Escargots de Bourgogne", price: 11 }, { id: 8, name: "Ceviche de Saint-Jacques", price: 17 }, { id: 9, name: "Os à Moelle Rôti au Sel", price: 12 }, { id: 10, name: "Burrata Crémeuse Truffée", price: 16 } ],
            plats: [ { id: 11, name: "Filet de Bœuf Rossini", price: 32 }, { id: 12, name: "Magret de Canard au Miel", price: 26 }, { id: 13, name: "Risotto Crémeux aux Morilles", price: 24 }, { id: 14, name: "Saumon Unilatéral Mi-cuit", price: 22 }, { id: 15, name: "Burger iChef Double Steak", price: 21 }, { id: 16, name: "Suprême de Volaille Jaune", price: 20 }, { id: 17, name: "Côte de Veau au Jus", price: 34 }, { id: 18, name: "Bar Entier Rôti au Thym", price: 28 }, { id: 19, name: "Tartare de Bœuf Préparé", price: 20 }, { id: 20, name: "Pluma Ibérique Grillée", price: 27 } ],
            desserts: [ { id: 21, name: "Mi-cuit Chocolat Noir", price: 10 }, { id: 22, name: "Tarte Citron Meringuée", price: 9 }, { id: 23, name: "Crème Brûlée Vanille Bourbon", price: 8 }, { id: 24, name: "Tiramisu Café Classique", price: 9 }, { id: 25, name: "Pavlova Minute aux Fruits", price: 11 }, { id: 26, name: "Café Gourmand de l'Empire", price: 12 }, { id: 27, name: "Baba au Rhum Ambré", price: 10 }, { id: 28, name: "Mousse au Chocolat Maison", price: 7 }, { id: 29, name: "Profiteroles Artisanales", price: 11 }, { id: 30, name: "Assiette de Fromages Affinés", price: 14 } ]
        };

        let menuData = { entrees: [], plats: [], desserts: [] };

        async function bootPullSystem() {
            await pullData();
            // Polling discret toutes les 10 secondes (plus lent pour un chevalet)
            setInterval(pullData, 10000); 
        }

        async function pullData() {
            try {
                const state = await API.getState();
                if (state.activeOrders && state.activeOrders['MENU_MASTER']) {
                    menuData = state.activeOrders['MENU_MASTER'].data;
                } else {
                    menuData = DEFAULT_MENU;
                }
                document.getElementById('sync-dot').classList.add('online');
                renderMinimalistMenu();
            } catch (error) {
                document.getElementById('sync-dot').classList.remove('online');
                if (menuData.entrees.length === 0) {
                    menuData = DEFAULT_MENU;
                    renderMinimalistMenu();
                }
            }
        }

        function renderMinimalistMenu() {
            ['entrees', 'plats', 'desserts'].forEach(category => {
                const listEl = document.getElementById(`list-${category}`);
                
                if (menuData[category] && menuData[category].length > 0) {
                    // Limiter à 10 pour un rendu parfait sur chevalet
                    listEl.innerHTML = menuData[category].slice(0, 10).map(item => `
                        <div class="menu-item">
                            <span class="item-name">${item.name}</span>
                            <div class="item-dots"></div>
                            <span class="item-price">${parseFloat(item.price).toFixed(2)} €</span>
                        </div>
                    `).join('');
                } else {
                    listEl.innerHTML = `<div style="text-align:center; color:#444; font-size:0.8rem;">Carte en cours de préparation</div>`;
                }
            });
        }

        bootPullSystem();
    </script>
</body>
</html>
