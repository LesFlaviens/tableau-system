<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ichef.ch - La Carte (Digital Easel Edition)</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1F1F1F; --text-luxe: #F5F5F0; --accent-mat: #C9A76E; --dot-color: #555550; }
        body { background: var(--bg); color: var(--text-luxe); font-family: 'Montserrat', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; padding-bottom: 50px;}
        
        .header { background: transparent; padding: 40px 0 20px 0; display: flex; flex-direction: column; align-items: center; }
        .logo-img { height: 50px; margin-bottom: 5px; opacity: 0.9; }
        .brand-name { color: var(--accent-mat); font-size: 2rem; font-weight: 900; letter-spacing: 6px; margin: 0; text-transform: uppercase; }
        .subtitle { font-size: 0.75rem; color: #888; letter-spacing: 4px; margin-top: 5px; text-transform: uppercase; font-weight: 300;}

        .sync-status { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; }
        .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: #444; } 
        .sync-dot.online { background: var(--dot-color); } 

        .specials-container { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; max-width: 1200px; margin: 20px auto 40px auto; width: 100%; box-sizing: border-box; padding: 0 40px; }
        .menu-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 50px; max-width: 1600px; margin: 0 auto; width: 100%; box-sizing: border-box; padding: 0 40px; }
        .menu-divider { text-align: center; color: var(--dot-color); font-size: 1.5rem; letter-spacing: 15px; margin: 10px 0 40px 0; opacity: 0.5;}

        .menu-section { display: flex; flex-direction: column; }
        .section-title { font-size: 1.3rem; color: var(--accent-mat); text-align: center; font-weight: 700; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; border-bottom: 1px dashed var(--dot-color); padding-bottom: 8px; }
        .specials-title { font-size: 1.5rem; font-weight: 900; letter-spacing: 3px; color: #fff; border-bottom-style: solid; } 
        
        .item-list { display: flex; flex-direction: column; gap: 20px; }
        
        /* 🟢 MISE EN PAGE ADAPTÉE AU TEXTE MULTILIGNE */
        .menu-item { display: flex; justify-content: space-between; align-items: flex-end; animation: fadeIn 0.5s ease-in; }
        .item-name { font-size: 1rem; font-weight: 400; color: var(--text-luxe); flex: 1; white-space: pre-wrap; line-height: 1.6; padding-right: 15px;}
        .item-dots { flex: 1; border-bottom: 1px dotted var(--dot-color); margin: 0 15px; position: relative; top: -6px; opacity: 0.6;}
        .item-price { font-size: 1rem; color: var(--accent-mat); font-weight: 700; text-align: right; white-space: nowrap;}
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="sync-status"><div id="sync-dot" class="sync-dot"></div></div>

    <div class="header">
        <img src="logo.png" alt="iChef Logo" class="logo-img" onerror="this.style.display='none';">
        <h1 class="brand-name">ichef.ch</h1>
        <div class="subtitle">La Carte</div>
    </div>

    <div class="specials-container">
        <div class="menu-section"><div class="section-title specials-title">Menu du Jour</div><div class="item-list" id="list-menuJour"></div></div>
        <div class="menu-section"><div class="section-title specials-title">Suggestions</div><div class="item-list" id="list-suggestions"></div></div>
    </div>

    <div class="menu-divider">✦ ✦ ✦</div>

    <div class="menu-container">
        <div class="menu-section"><div class="section-title">Entrées</div><div class="item-list" id="list-entrees"></div></div>
        <div class="menu-section"><div class="section-title">Plats</div><div class="item-list" id="list-plats"></div></div>
        <div class="menu-section"><div class="section-title">Desserts</div><div class="item-list" id="list-desserts"></div></div>
    </div>

    <script>
        const API = { getState: () => fetch('/get-current-state').then(r => r.json()) };

        const DEFAULT_MENU = {
            menuJour: [], suggestions: [],
            entrees: [ { id: 1, name: "Œuf Parfait aux Champignons", price: 12 }, { id: 2, name: "Foie Gras Maison", price: 18 } ],
            plats: [ { id: 11, name: "Filet de Bœuf Rossini", price: 32 }, { id: 12, name: "Magret de Canard au Miel", price: 26 } ],
            desserts: [ { id: 21, name: "Mi-cuit Chocolat Noir", price: 10 }, { id: 22, name: "Tarte Citron Meringuée", price: 9 } ]
        };

        let menuData = { menuJour: [], suggestions: [], entrees: [], plats: [], desserts: [] };

        async function bootPullSystem() {
            await pullData();
            setInterval(pullData, 8000); 
        }

        async function pullData() {
            try {
                const state = await API.getState();
                if (state.activeOrders && state.activeOrders['MENU_MASTER']) {
                    menuData = { menuJour: [], suggestions: [], entrees: [], plats: [], desserts: [], ...state.activeOrders['MENU_MASTER'].data };
                } else {
                    menuData = DEFAULT_MENU;
                }
                document.getElementById('sync-dot').classList.add('online');
                renderMinimalistMenu();
            } catch (error) {
                document.getElementById('sync-dot').classList.remove('online');
                if (menuData.entrees.length === 0) { menuData = DEFAULT_MENU; renderMinimalistMenu(); }
            }
        }

        function renderMinimalistMenu() {
            ['menuJour', 'suggestions', 'entrees', 'plats', 'desserts'].forEach(category => {
                const listEl = document.getElementById(`list-${category}`);
                
                if (menuData[category]) {
                    // EXCLUSION AUTOMATIQUE DES RUPTURES DE STOCK (86)
                    const availableItems = menuData[category].filter(item => item.stock === "" || item.stock === undefined || item.stock > 0);
                    
                    if (availableItems.length > 0) {
                        listEl.innerHTML = availableItems.map(item => `
                            <div class="menu-item">
                                <span class="item-name">${item.name}</span><div class="item-dots"></div><span class="item-price">${parseFloat(item.price).toFixed(2)} €</span>
                            </div>
                        `).join('');
                    } else {
                        listEl.innerHTML = `<div style="text-align:center; color:#444; font-size:0.8rem; font-style:italic;">Indisponible actuellement</div>`;
                    }
                }
            });
        }

        bootPullSystem();
    </script>
</body>
</html>
