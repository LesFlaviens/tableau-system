<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Carte - Maison d'Exception</title>

    <script>
        // GARDE DU CORPS SECURITE UNIVERSEL
        function getDeviceFingerprint() {
            let deviceId = localStorage.getItem('ichef_device_fingerprint');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('ichef_device_fingerprint', deviceId);
            }
            return deviceId;
        }

        (async function enforceSecurity() {
            const urlParams = new URLSearchParams(window.location.search);
            let tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
            let pin = localStorage.getItem('ichef_master_pin'); 
            
            if(!tenantID) {
                window.location.href = 'connexionpartenaire.html';
                return;
            }

            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";

            const accessMatrix = {
                'CHEF': ['chef.html', 'minipass.html', 'menu-pure.html', 'administration.html'],
                'CHEF_CUISINE': ['chef.html', 'minipass.html', 'menu-pure.html', 'administration.html'],
                'PATISSIER': ['chef-patissier.html', 'minipass.html', 'menu-pure.html', 'administration.html'],
                'CHEF_PATISSERIE': ['chef-patissier.html', 'minipass.html', 'menu-pure.html', 'administration.html'],
                'BAR': ['chef-bar.html', 'minipass.html', 'menu-pure.html', 'administration.html'],
                'CHEF_BAR': ['chef-bar.html', 'minipass.html', 'menu-pure.html', 'administration.html'],
                'ICHEF_OS': ['chef.html', 'chef-patissier.html', 'chef-bar.html', 'minipass.html', 'menu-pure.html', 'administration.html'],
                'BUSINESS': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'RENTABILITE': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'ECO': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'EMPIRE': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html'],
                'BRIGADE': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html'],
                'BRIGADES': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html'],
                'PREMIUM': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html']
            };

            try {
                const res = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tenantID: tenantID, 
                        pin: pin || "0000", 
                        deviceId: getDeviceFingerprint() 
                    })
                });
                const data = await res.json();

                if(!data.success) {
                    alert(data.error || "ACCES REFUSE (Limite d'ecrans atteinte ou licence invalide).");
                    window.location.href = 'connexionpartenaire.html';
                    return;
                }

                const currentPlan = data.plan ? data.plan.toUpperCase() : 'CHEF';
                let currentPage = window.location.pathname.split('/').pop().toLowerCase();
                if(currentPage === '') currentPage = 'index.html';

                const allowedPages = accessMatrix[currentPlan] || [];
                
                if (!allowedPages.includes(currentPage)) {
                    alert(`ACCES REFUSE : Votre forfait (${currentPlan}) n'inclut pas ce module.`);
                    window.location.href = `administration.html?tenantID=${tenantID}`;
                }

            } catch (e) {
                console.error("Erreur de securite reseau", e);
            }
        })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #050505;            
            --text-main: #f5f5f5;   
            --text-muted: #888888;   
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --border-color: #1a1a1a;
            
            --font-title: 'Cormorant Garamond', serif;
            --font-text: 'Montserrat', sans-serif;
        }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s, color 0.5s;
        }

        .kiosk-wrapper {
            width: 100%;
            max-width: 1080px; 
            min-height: 100vh;
            background: var(--bg-color);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
        }

        header { 
            text-align: center; 
            padding: 60px 20px 40px; 
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .btn-kiosk {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            font-family: var(--font-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 100;
        }
        .btn-kiosk:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }
        
        .logo-text { 
            font-family: var(--font-title);
            color: var(--gold); 
            font-size: 3.5rem; 
            font-weight: 300; 
            letter-spacing: 12px; 
            margin: 0; 
            text-transform: uppercase; 
        }
        
        .subtitle {
            font-family: var(--font-text);
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 6px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        .menu-container {
            padding: 40px;
        }

        .category-section, .tasting-menu-box {
            position: relative;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            padding: 50px 60px;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out forwards;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        .category-section::before, .tasting-menu-box::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid var(--gold-dim);
            pointer-events: none;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .category-title {
            font-family: var(--font-title);
            color: var(--gold);
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-align: center;
            text-transform: uppercase;
            margin: 0;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-color);
            padding: 0 30px;
            white-space: nowrap;
        }

        .tasting-menu-box {
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            border-color: rgba(212, 175, 55, 0.3);
            text-align: center;
        }

        .tasting-menu-box::before {
            border: 1px solid rgba(212, 175, 55, 0.4);
        }

        .tasting-price {
            font-family: var(--font-text);
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        .tasting-course {
            font-family: var(--font-title);
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 25px;
            font-style: italic;
        }

        .tasting-course-label {
            font-family: var(--font-text);
            font-size: 0.85rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 8px;
            font-style: normal;
        }

        .menu-item {
            margin-bottom: 30px;
            position: relative;
            z-index: 2; 
        }

        .menu-item:last-child {
            margin-bottom: 0;
        }

        .item-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .item-name {
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--text-main);
            margin: 0;
            white-space: nowrap;
        }

        .item-dots {
            flex-grow: 1;
            border-bottom: 2px dotted rgba(255, 255, 255, 0.15);
            margin: 0 15px;
            position: relative;
            top: -8px;
        }

        .item-price {
            font-family: var(--font-text);
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 400;
            white-space: nowrap;
        }

        .item-desc {
            font-family: var(--font-text);
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 300;
            max-width: 90%;
        }

        .loading-screen {
            font-family: var(--font-title);
            text-align: center;
            padding: 100px 20px;
            font-size: 2rem;
            color: var(--gold);
            font-style: italic;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .footer {
            text-align: center;
            padding: 40px;
            font-family: var(--font-text);
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 800px) {
            .menu-container { padding: 20px; }
            .category-section, .tasting-menu-box { padding: 40px 20px; margin-bottom: 40px; }
            .logo-text { font-size: 2.5rem; }
            .category-title { font-size: 1.8rem; padding: 0 15px; top: -18px; }
            .item-name { font-size: 1.4rem; white-space: normal; }
            .item-dots { display: none; }
            .item-row { flex-direction: column; gap: 5px; }
            .item-price { align-self: flex-start; }
            .tasting-course { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="kiosk-wrapper">
        <header>
            <button id="btn-kiosk" class="btn-kiosk">Plein Ecran</button>
            <h1 class="logo-text">NOTRE MAISON</h1>
            <div class="subtitle">La Carte</div>
        </header>

        <div class="menu-container" id="menu-container">
            <div class="loading-screen">Mise a jour des creations du Chef...</div>
        </div>

        <div class="footer">
            Prix nets en <span id="footer-currency">Euros</span> — Service compris<br>
            <span style="font-size: 0.6rem; opacity: 0.5; margin-top: 10px; display: block;">Propulse par Empire OS</span>
        </div>
    </div>

    <script>
        const fontsToLoad = [
            'Playfair Display', 'Montserrat', 'Roboto', 'Cinzel', 'Oswald', 
            'Lato', 'Great Vibes', 'Lora', 'Cormorant Garamond', 'Josefin Sans', 
            'Nunito', 'PT Serif', 'Merriweather', 'Abril Fatface'
        ];
        const fontLink = document.createElement('link');
        fontLink.rel = 'stylesheet';
        fontLink.href = `https://fonts.googleapis.com/css2?${fontsToLoad.map(f => `family=${f.replace(/ /g, '+')}:wght@400;500;600;900`).join('&')}&display=swap`;
        document.head.appendChild(fontLink);

        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
        ? "http://localhost:10000" 
        : "https://tableau-system.onrender.com";

        let currentCurrency = "€";
        let currencyName = "Euros";

        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                    if(r.ok) state = await r.json();
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            }
        };

        let currentMenuData = null;
        let customCategories = [];
        let lastCustomCatsStr = "";
        let lastDesignHash = "";

        async function fetchMenu() {
            try {
                const state = await API.getState();
                
                if (state.activeOrders && state.activeOrders['SETTINGS_MASTER'] && state.activeOrders['SETTINGS_MASTER'].data) {
                    let settings = state.activeOrders['SETTINGS_MASTER'].data;
                    
                    if (settings.currency && settings.currency !== currentCurrency) {
                        currentCurrency = settings.currency;
                        let nameMap = {"€": "Euros", "CHF": "Francs Suisses", "$": "Dollars", "C$": "Dollars", "£": "Livres", "¥": "Yens", "MAD": "Dirhams", "CFA": "Francs CFA"};
                        currencyName = nameMap[currentCurrency] || currentCurrency;
                        document.getElementById('footer-currency').innerText = currencyName;
                        currentMenuData = null;
                    }

                    if (settings.design) {
                        let designHash = JSON.stringify(settings.design);
                        if(designHash !== lastDesignHash) {
                            document.documentElement.style.setProperty('--bg-color', settings.design.bgColor || '#050505');
                            document.documentElement.style.setProperty('--text-main', settings.design.textColor || '#f5f5f5');
                            
                            if (settings.design.fontFamily) {
                                document.documentElement.style.setProperty('--font-title', settings.design.fontFamily);
                                document.documentElement.style.setProperty('--font-text', settings.design.fontFamily);
                            }
                            lastDesignHash = designHash;
                        }
                    }
                }

                let fetchedCats = [];
                if (state.activeOrders && state.activeOrders['CATEGORIES_CUISINE']?.data) {
                    fetchedCats.push(...state.activeOrders['CATEGORIES_CUISINE'].data);
                }
                if (state.activeOrders && state.activeOrders['CATEGORIES_BAR']?.data) {
                    fetchedCats.push(...state.activeOrders['CATEGORIES_BAR'].data);
                }
                customCategories = fetchedCats;

                let mCuisine = state.activeOrders?.['MENU_MASTER']?.data || {};
                let mBar = state.activeOrders?.['MENU_MASTER_BAR']?.data || {};
                let consolidatedMenu = { ...mCuisine, ...mBar };
                
                let newDataStr = JSON.stringify(consolidatedMenu);
                let newCatsStr = JSON.stringify(customCategories);
                
                if (newDataStr !== JSON.stringify(currentMenuData) || newCatsStr !== lastCustomCatsStr) {
                    currentMenuData = JSON.parse(newDataStr);
                    lastCustomCatsStr = newCatsStr;
                    renderClientMenu();
                } else if (!currentMenuData || Object.keys(currentMenuData).length === 0) {
                    document.getElementById('menu-container').innerHTML = '<div class="loading-screen">La carte n\'est pas encore disponible.</div>';
                }
            } catch(e) {
                console.error("Erreur de synchronisation:", e);
            }
        }

        function renderTastingMenu(item) {
            if (!item || !item.name || item.name.trim() === '') return '';

            let cleanName = item.name.trim();
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
            
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let html = `
                <div class="tasting-menu-box">
                    <h2 class="category-title">Menu du Jour</h2>
                    <div class="tasting-price">${priceStr}</div>
                `;
                
                let labels = ['Entree', 'Plat', 'Dessert', 'Fromage / Suite'];
                
                parts.forEach((part, index) => {
                    if (part.trim() !== '') {
                        let label = labels[index] || '';
                        html += `
                        <div class="tasting-course">
                            <span class="tasting-course-label">${label}</span>
                            ${part.trim()}
                        </div>`;
                    }
                });
                
                html += `</div>`;
                return html;
            }
            
            return `
            <div class="tasting-menu-box">
                <h2 class="category-title">Menu du Jour</h2>
                <div class="tasting-price">${priceStr}</div>
                <div class="tasting-course">${cleanName}</div>
            </div>`;
        }

        function renderStandardItem(item) {
            if (!item || !item.name || item.name.trim() === '') return '';

            let cleanName = item.name.trim();
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
            
            let mainName = cleanName;
            let description = '';

            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                mainName = parts[0].trim();
                description = parts.slice(1).join(' ').trim();
            }

            let descHtml = description ? `<div class="item-desc">${description}</div>` : '';

            return `
            <div class="menu-item">
                <div class="item-row">
                    <div class="item-name">${mainName}</div>
                    <div class="item-dots"></div>
                    <div class="item-price">${priceStr}</div>
                </div>
                ${descHtml}
            </div>`;
        }

        function renderClientMenu() {
            const container = document.getElementById('menu-container');
            if (!currentMenuData) return;

            let htmlContent = '';
            let categoriesToProcess = [];

            // LECTURE ABSOLUE DE TOUTES LES DONNEES (Meme si non declarees dans Admin)
            Object.keys(currentMenuData).forEach(key => {
                let items = currentMenuData[key];
                if (items && items.length > 0) {
                    
                    let customCat = customCategories.find(c => c.id === key || c.label.toLowerCase() === key.toLowerCase());
                    let label = customCat ? customCat.label : key.toUpperCase();
                    
                    // Traductions propres par defaut
                    if (!customCat) {
                        if (key.toLowerCase() === 'entree' || key.toLowerCase() === 'entrees') label = 'ENTREES';
                        if (key.toLowerCase() === 'plat' || key.toLowerCase() === 'plats') label = 'PLATS';
                        if (key.toLowerCase() === 'dessert' || key.toLowerCase() === 'desserts') label = 'DESSERTS';
                        if (key.toLowerCase() === 'menujour' || key.toLowerCase() === 'menu') label = 'MENU DU JOUR';
                    }

                    categoriesToProcess.push({ 
                        id: key, 
                        label: label, 
                        isTasting: label.toLowerCase().includes('menu') || key.toLowerCase().includes('menu') 
                    });
                }
            });

            // ORDRE LOGIQUE CLASSIQUE
            const orderMap = { 'entrees': 1, 'entree': 1, 'plats': 2, 'plat': 2, 'desserts': 3, 'dessert': 3 };
            categoriesToProcess.sort((a, b) => {
                let weightA = orderMap[a.id.toLowerCase()] || 99;
                let weightB = orderMap[b.id.toLowerCase()] || 99;
                return weightA - weightB;
            });

            categoriesToProcess.forEach((cat, index) => {
                let items = currentMenuData[cat.id];
                
                if (items && Array.isArray(items)) {
                    
                    let availableItems = items.filter(item => 
                        item && 
                        item.name && 
                        item.name.trim() !== '' && 
                        item.stock !== 0 && 
                        item.stock !== "0" && 
                        item.hidden !== true
                    );

                    if (availableItems.length > 0) {
                        
                        if (cat.isTasting) {
                            availableItems.forEach(item => {
                                htmlContent += renderTastingMenu(item);
                            });
                        } 
                        else {
                            htmlContent += `
                            <div class="category-section" style="animation-delay: ${index * 0.15}s;">
                                <h2 class="category-title"><span>${cat.label}</span></h2>
                            `;

                            availableItems.forEach(item => {
                                htmlContent += renderStandardItem(item);
                            });

                            htmlContent += `</div>`;
                        }
                    }
                }
            });

            if (htmlContent === '') {
                htmlContent = '<div class="loading-screen">Le service est actuellement termine.</div>';
            }

            container.innerHTML = htmlContent;
        }

        fetchMenu();
        setInterval(fetchMenu, 3000);

        document.getElementById('btn-kiosk').addEventListener('click', () => {
            const elem = document.documentElement;
            const btn = document.getElementById('btn-kiosk');
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen(); 
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen(); 
                btn.innerText = "X";
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                btn.innerText = "Plein Ecran";
            }
        });

    </script>
</body>
</html>
