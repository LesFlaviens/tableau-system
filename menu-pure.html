<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Carte - Notre Sélection</title>
    <style>
        /* 🟢 DESIGN LUXE ÉPURÉ (Noir & Or) 🟢 */
        :root { 
            --bg-color: #050505;           
            --text-main: #f8fafc;    
            --text-muted: #888888;   
            --gold: #d4af37;         
            --border-color: #222222;
        }
        
        body { 
            font-family: 'Helvetica Neue', Optima, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* En-tête de la carte */
        header { 
            text-align: center; 
            padding: 50px 20px 30px; 
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to bottom, #111 0%, var(--bg-color) 100%);
        }
        
        .logo-text { 
            color: var(--gold); 
            font-size: 2rem; 
            font-weight: 300; 
            letter-spacing: 6px; 
            margin: 0; 
            text-transform: uppercase; 
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Navigation Rapide */
        .nav-categories {
            display: flex;
            overflow-x: auto;
            padding: 15px 20px;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .nav-categories::-webkit-scrollbar { display: none; }
        
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            transition: color 0.3s;
        }
        .nav-link:active, .nav-link.active { color: var(--gold); }

        /* Conteneur principal */
        .menu-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Section de catégorie */
        .category-section {
            margin-top: 40px;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .category-title {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-title::before, .category-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
            margin: 0 15px;
        }

        /* Style d'un plat */
        .menu-item {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 15px;
        }

        .item-name {
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: var(--text-main);
            margin: 0;
            line-height: 1.4;
        }

        .item-price {
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: bold;
            white-space: nowrap;
        }

        .item-desc {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-top: 6px;
            line-height: 1.5;
            font-style: italic;
        }

        /* Mise en forme spéciale pour le Menu du Jour découpé */
        .menu-course {
            display: block;
            margin-top: 5px;
            color: #d1d5db;
        }
        .menu-course-label {
            color: var(--gold);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 5px;
        }

        .loading-screen {
            text-align: center;
            padding: 100px 20px;
            color: var(--gold);
            font-style: italic;
            letter-spacing: 2px;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">NOTRE MAISON</h1>
        <div class="subtitle">La Carte</div>
    </header>

    <div class="nav-categories" id="nav-categories">
        </div>

    <div class="menu-container" id="menu-container">
        <div class="loading-screen">Chargement de la sélection du Chef...</div>
    </div>

    <div class="footer">
        Prix nets en euros - Service compris<br>
        <span style="font-size: 0.6rem; opacity: 0.5;">Propulsé par Empire OS</span>
    </div>

    <script>
        // -----------------------------------------
        // MOTEUR DE SYNCHRONISATION
        // -----------------------------------------
        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    if (window.location.protocol !== 'file:') {
                        let r = await fetch('/get-current-state');
                        if(r.ok) state = await r.json();
                    } else throw new Error("Local");
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            }
        };

        // On n'écoute que les mises à jour, le client ne peut rien modifier
        window.addEventListener('storage', (e) => {
            if (e.key === 'EMPIRE_GLOBAL_SYNC') fetchMenu();
        });

        // Les catégories que l'on veut afficher sur la carte client
        const categoriesMap = [
            { id: 'menuJour', label: 'Menu du Jour', icon: '⭐' },
            { id: 'suggestions', label: 'Suggestions', icon: '💡' },
            { id: 'entrees', label: 'Entrées', icon: '' },
            { id: 'plats', label: 'Plats', icon: '' },
            { id: 'desserts', label: 'Desserts', icon: '' }
        ];

        let currentMenuData = null;

        async function fetchMenu() {
            try {
                const state = await API.getState();
                if (state && state.activeOrders && state.activeOrders['MENU_MASTER']) {
                    let newDataStr = JSON.stringify(state.activeOrders['MENU_MASTER'].data);
                    
                    // On ne redessine la page que s'il y a eu un vrai changement (évite les clignotements sur le tel du client)
                    if (newDataStr !== JSON.stringify(currentMenuData)) {
                        currentMenuData = JSON.parse(newDataStr);
                        renderClientMenu();
                    }
                } else if (!currentMenuData) {
                    document.getElementById('menu-container').innerHTML = '<div class="loading-screen">La carte est en cours de création.</div>';
                }
            } catch(e) {
                console.error(e);
            }
        }

        function formatItemName(rawName) {
            // Nettoyage de l'étoile technique et formatage du menu à étapes
            let cleanName = rawName.replace('🌟 ', '');
            
            // Si le chef a utilisé des sauts de ligne pour un menu
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let html = '';
                
                let labels = ['Entrée', 'Plat', 'Dessert', 'Fromage'];
                
                parts.forEach((part, index) => {
                    if (part.trim() !== '') {
                        let label = labels[index] || 'Suite';
                        html += `<span class="menu-course"><span class="menu-course-label">${label}</span> ${part.trim()}</span>`;
                    }
                });
                return html;
            }
            
            // Si c'est un plat normal
            return cleanName;
        }

        function renderClientMenu() {
            const container = document.getElementById('menu-container');
            const nav = document.getElementById('nav-categories');
            
            if (!currentMenuData) return;

            let htmlContent = '';
            let navHtml = '';

            categoriesMap.forEach((cat, index) => {
                let items = currentMenuData[cat.id];
                
                // On filtre les plats en rupture de stock ! (Le client ne doit pas les voir)
                if (items && Array.isArray(items)) {
                    let availableItems = items.filter(item => item.stock !== 0);

                    if (availableItems.length > 0) {
                        // Création du lien d'ancre pour la navigation
                        navHtml += `<a href="#section-${cat.id}" class="nav-link">${cat.label}</a>`;

                        // Création de la section
                        htmlContent += `
                        <div class="category-section" id="section-${cat.id}" style="animation-delay: ${index * 0.1}s;">
                            <h2 class="category-title">${cat.icon} ${cat.label}</h2>
                        `;

                        availableItems.forEach(item => {
                            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} €` : '';
                            let formattedContent = formatItemName(item.name);

                            htmlContent += `
                            <div class="menu-item">
                                <div class="item-header">
                                    <h3 class="item-name">${formattedContent}</h3>
                                    <span class="item-price">${priceStr}</span>
                                </div>
                            </div>
                            `;
                        });

                        htmlContent += `</div>`;
                    }
                }
            });

            if (htmlContent === '') {
                htmlContent = '<div class="loading-screen">La carte n\'est pas encore disponible pour ce service.</div>';
            }

            nav.innerHTML = navHtml;
            container.innerHTML = htmlContent;

            // Logique simple pour le highlight de la barre de navigation
            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        // Lancement et rafraîchissement auto
        fetchMenu();
        setInterval(fetchMenu, 3000); // Check les nouveautés ou ruptures toutes les 3 secondes

    </script>
</body>
</html>
