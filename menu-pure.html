<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>La Carte - Maison d'Exception</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    
    <style>
        /* 🟢 DESIGN HAUTE COUTURE - Variables Dynamiques 🟢 */
        :root { 
            --bg-color: #050505;            
            --text-main: #f5f5f5;    
            --text-muted: #888888;   
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --border-color: #1a1a1a;
            
            --font-title: 'Cormorant Garamond', serif;
            --font-text: 'Montserrat', sans-serif;
        }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s, color 0.5s;
        }

        /* Le conteneur format A4 / Chevalet Vertical */
        .kiosk-wrapper {
            width: 100%;
            max-width: 1080px; 
            min-height: 100vh;
            background: var(--bg-color);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
        }

        header { 
            text-align: center; 
            padding: 60px 20px 40px; 
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        /* ⛶ BOUTON KIOSQUE DISCRET ⛶ */
        .btn-kiosk {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            font-family: var(--font-text);
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 100;
        }
        .btn-kiosk:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }
        
        .logo-text { 
            font-family: var(--font-title);
            color: var(--gold); 
            font-size: 3.5rem; 
            font-weight: 300; 
            letter-spacing: 12px; 
            margin: 0; 
            text-transform: uppercase; 
        }
        
        .subtitle {
            font-family: var(--font-text);
            color: var(--text-muted);
            font-size: 1rem;
            letter-spacing: 6px;
            margin-top: 15px;
            text-transform: uppercase;
        }

        /* Conteneur de la carte */
        .menu-container {
            padding: 40px;
        }

        /* 🟢 LES CADRES POUR CHAQUE CATÉGORIE 🟢 */
        .category-section, .tasting-menu-box {
            position: relative;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            padding: 50px 60px;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.8s ease-out forwards;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        /* Le liseré intérieur façon menu imprimé */
        .category-section::before, .tasting-menu-box::before {
            content: '';
            position: absolute;
            top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid var(--gold-dim);
            pointer-events: none;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Titre encastré sur le haut du cadre */
        .category-title {
            font-family: var(--font-title);
            color: var(--gold);
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 6px;
            text-align: center;
            text-transform: uppercase;
            margin: 0;
            position: absolute;
            top: -25px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-color);
            padding: 0 30px;
            white-space: nowrap;
        }

        /* 🟢 MISE EN SCÈNE SPÉCIFIQUE AU MENU DU JOUR 🟢 */
        .tasting-menu-box {
            background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%);
            border-color: rgba(212, 175, 55, 0.3);
            text-align: center;
        }

        .tasting-menu-box::before {
            border: 1px solid rgba(212, 175, 55, 0.4);
        }

        .tasting-price {
            font-family: var(--font-text);
            font-size: 1.3rem;
            color: var(--gold);
            margin-bottom: 40px;
            letter-spacing: 3px;
        }

        .tasting-course {
            font-family: var(--font-title);
            font-size: 1.8rem;
            color: var(--text-main);
            margin-bottom: 25px;
            font-style: italic;
        }

        .tasting-course-label {
            font-family: var(--font-text);
            font-size: 0.85rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 3px;
            display: block;
            margin-bottom: 8px;
            font-style: normal;
        }

        /* 🟢 LIGNES DE PLATS (A la carte) 🟢 */
        .menu-item {
            margin-bottom: 30px;
            position: relative;
            z-index: 2; /* Garde le texte au-dessus du liseré */
        }

        .menu-item:last-child {
            margin-bottom: 0;
        }

        .item-row {
            display: flex;
            align-items: baseline;
            margin-bottom: 8px;
        }

        .item-name {
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 1px;
            color: var(--text-main);
            margin: 0;
            white-space: nowrap;
        }

        /* Les pointillés qui relient le plat au prix */
        .item-dots {
            flex-grow: 1;
            border-bottom: 2px dotted rgba(255, 255, 255, 0.15);
            margin: 0 15px;
            position: relative;
            top: -8px;
        }

        .item-price {
            font-family: var(--font-text);
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: 400;
            white-space: nowrap;
        }

        .item-desc {
            font-family: var(--font-text);
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.6;
            font-weight: 300;
            max-width: 90%;
        }

        .loading-screen {
            font-family: var(--font-title);
            text-align: center;
            padding: 100px 20px;
            font-size: 2rem;
            color: var(--gold);
            font-style: italic;
            letter-spacing: 2px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }

        .footer {
            text-align: center;
            padding: 40px;
            font-family: var(--font-text);
            color: rgba(255,255,255,0.2);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Adaptation si l'écran est plus étroit */
        @media (max-width: 800px) {
            .menu-container { padding: 20px; }
            .category-section, .tasting-menu-box { padding: 40px 20px; margin-bottom: 40px; }
            .logo-text { font-size: 2.5rem; }
            .category-title { font-size: 1.8rem; padding: 0 15px; top: -18px; }
            .item-name { font-size: 1.4rem; white-space: normal; }
            .item-dots { display: none; }
            .item-row { flex-direction: column; gap: 5px; }
            .item-price { align-self: flex-start; }
            .tasting-course { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="kiosk-wrapper">
        <header>
            <button id="btn-kiosk" class="btn-kiosk">⛶</button>
            <h1 class="logo-text">NOTRE MAISON</h1>
            <div class="subtitle">La Carte</div>
        </header>

        <div class="menu-container" id="menu-container">
            <div class="loading-screen">Mise à jour des créations du Chef...</div>
        </div>

        <div class="footer">
            Prix nets en <span id="footer-currency">Euros</span> — Service compris<br>
            <span style="font-size: 0.6rem; opacity: 0.5; margin-top: 10px; display: block;">Propulsé par I CHEF</span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        
        // 🚀 CONNEXION À TON SERVEUR RENDER ICI 🚀
       const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
    ? "http://localhost:10000" 
    : "https://tableau-system.onrender.com";

        // 🌍 VARIABLE MULTIDEVISE GLOBALE
        let currentCurrency = "€";
        let currencyName = "Euros";

        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                    if(r.ok) state = await r.json();
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            }
        };

        const categoriesMap = [
            { id: 'menuJour', label: 'Menu du Jour', isTasting: true },
            { id: 'suggestions', label: 'Suggestions', isTasting: false },
            { id: 'entrees', label: 'Entrées', isTasting: false },
            { id: 'plats', label: 'Plats', isTasting: false },
            { id: 'desserts', label: 'Desserts', isTasting: false }
        ];

        let currentMenuData = null;
        let lastDesignHash = "";

        async function fetchMenu() {
            try {
                const state = await API.getState();
                
                // 🌍 LECTURE DE LA DEVISE ET DU DESIGN SAAS
                if (state.activeOrders && state.activeOrders['SETTINGS_MASTER'] && state.activeOrders['SETTINGS_MASTER'].data) {
                    let settings = state.activeOrders['SETTINGS_MASTER'].data;
                    
                    if (settings.currency && settings.currency !== currentCurrency) {
                        currentCurrency = settings.currency;
                        let nameMap = {"€": "Euros", "CHF": "Francs Suisses", "$": "Dollars", "C$": "Dollars", "£": "Livres", "¥": "Yens", "MAD": "Dirhams", "CFA": "Francs CFA"};
                        currencyName = nameMap[currentCurrency] || currentCurrency;
                        document.getElementById('footer-currency').innerText = currencyName;
                        currentMenuData = null; // Force le rafraîchissement
                    }

                    if (settings.design) {
                        let designHash = JSON.stringify(settings.design);
                        if(designHash !== lastDesignHash) {
                            document.documentElement.style.setProperty('--bg-color', settings.design.bgColor || '#050505');
                            document.documentElement.style.setProperty('--text-main', settings.design.textColor || '#f5f5f5');
                            
                            // Appliquer les polices personnalisées si sélectionnées
                            if (settings.design.fontFamily) {
                                document.documentElement.style.setProperty('--font-title', settings.design.fontFamily);
                                document.documentElement.style.setProperty('--font-text', settings.design.fontFamily);
                            }
                            lastDesignHash = designHash;
                        }
                    }
                }

                // 🟢 LECTURE DU MENU CUISINE
                if (state && state.activeOrders && state.activeOrders['MENU_MASTER']) {
                    let newDataStr = JSON.stringify(state.activeOrders['MENU_MASTER'].data);
                    
                    if (newDataStr !== JSON.stringify(currentMenuData)) {
                        currentMenuData = JSON.parse(newDataStr);
                        renderClientMenu();
                    }
                } else if (!currentMenuData) {
                    document.getElementById('menu-container').innerHTML = '<div class="loading-screen">La carte n\'est pas encore disponible.</div>';
                }
            } catch(e) {
                console.error("Erreur de synchronisation:", e);
            }
        }

        function renderTastingMenu(item) {
            let cleanName = item.name.replace('🌟 ', '');
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
            
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let html = `
                <div class="tasting-menu-box">
                    <h2 class="category-title">Menu du Jour</h2>
                    <div class="tasting-price">${priceStr}</div>
                `;
                
                let labels = ['Entrée', 'Plat', 'Dessert', 'Fromage / Suite'];
                
                parts.forEach((part, index) => {
                    if (part.trim() !== '') {
                        let label = labels[index] || '';
                        html += `
                        <div class="tasting-course">
                            <span class="tasting-course-label">${label}</span>
                            ${part.trim()}
                        </div>`;
                    }
                });
                
                html += `</div>`;
                return html;
            }
            
            return `
            <div class="tasting-menu-box">
                <h2 class="category-title">Menu du Jour</h2>
                <div class="tasting-price">${priceStr}</div>
                <div class="tasting-course">${cleanName}</div>
            </div>`;
        }

        function renderStandardItem(item) {
            let cleanName = item.name.replace('🌟 ', '');
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
            
            let mainName = cleanName;
            let description = '';

            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                mainName = parts[0].trim();
                description = parts.slice(1).join(' ').trim();
            }

            let descHtml = description ? `<div class="item-desc">${description}</div>` : '';

            return `
            <div class="menu-item">
                <div class="item-row">
                    <div class="item-name">${mainName}</div>
                    <div class="item-dots"></div>
                    <div class="item-price">${priceStr}</div>
                </div>
                ${descHtml}
            </div>`;
        }

        function renderClientMenu() {
            const container = document.getElementById('menu-container');
            if (!currentMenuData) return;

            let htmlContent = '';

            categoriesMap.forEach((cat, index) => {
                let items = currentMenuData[cat.id];
                
                if (items && Array.isArray(items)) {
                    // 🛡️ Filtre les ruptures de stock ET les plats masqués par le Chef
                    let availableItems = items.filter(item => item.stock !== 0 && item.stock !== "0" && item.hidden !== true);

                    if (availableItems.length > 0) {
                        
                        if (cat.isTasting) {
                            availableItems.forEach(item => {
                                htmlContent += renderTastingMenu(item);
                            });
                        } 
                        else {
                            htmlContent += `
                            <div class="category-section" style="animation-delay: ${index * 0.15}s;">
                                <h2 class="category-title"><span>${cat.label}</span></h2>
                            `;

                            availableItems.forEach(item => {
                                htmlContent += renderStandardItem(item);
                            });

                            htmlContent += `</div>`;
                        }
                    }
                }
            });

            if (htmlContent === '') {
                htmlContent = '<div class="loading-screen">Le service est actuellement terminé.</div>';
            }

            container.innerHTML = htmlContent;
        }

        // Lancement au démarrage et rafraîchissement toutes les 3 secondes
        fetchMenu();
        setInterval(fetchMenu, 3000);

        // ⛶ LOGIQUE DU MODE KIOSQUE
        document.getElementById('btn-kiosk').addEventListener('click', () => {
            const elem = document.documentElement;
            const btn = document.getElementById('btn-kiosk');
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen(); 
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen(); 
                btn.innerText = "✕";
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                btn.innerText = "⛶";
            }
        });

    </script>
</body>
</html>
