<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCHEF - Master Control Panel</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:wght@600;700&display=swap');

        :root {
            --bg: #F4F4F9;
            --panel: #FFFFFF;
            --text-main: #1A202C;
            --text-muted: #718096;
            --border: #E2E8F0;
            --gold: #D4AF37;
            --accent: #10B981;
            --alert: #EF4444;
            --blue: #3B82F6;
        }

        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); }

        /* SAS DE SÉCURITÉ ABSOLU */
        #master-security-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #000000; z-index: 999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        .master-lock-box {
            background: #111; border: 1px solid #333; padding: 40px; border-radius: 12px;
            text-align: center; width: 100%; max-width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        }

        .master-lock-box h1 { color: var(--gold); font-family: 'Playfair Display', serif; letter-spacing: 4px; margin-top: 0; margin-bottom: 30px; font-size: 2rem; }
        .master-lock-box input {
            width: 100%; padding: 15px; background: #000; border: 1px solid #333; color: #FFF;
            border-radius: 6px; font-size: 1.2rem; text-align: center; margin-bottom: 20px;
            box-sizing: border-box; outline: none; letter-spacing: 5px; font-family: monospace;
        }
        .master-lock-box input:focus { border-color: var(--gold); }
        .master-lock-box button {
            width: 100%; padding: 15px; background: var(--gold); color: #000; font-weight: 800;
            border: none; border-radius: 6px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s;
        }
        .master-lock-box button:hover { background: #E5C158; }

        /* DESIGN DU DASHBOARD MAÎTRE */
        #master-dashboard { display: none; padding: 30px; max-width: 1400px; margin: 0 auto; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; background: var(--panel); padding: 20px 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid var(--border); }
        .header h2 { margin: 0; color: var(--text-main); font-weight: 900; letter-spacing: -0.5px; }
        
        table { width: 100%; border-collapse: collapse; background: var(--panel); border-radius: 12px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.02); border: 1px solid var(--border); }
        th { background: #F8FAFC; padding: 15px 20px; text-align: left; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); font-weight: 800; letter-spacing: 1px; border-bottom: 2px solid var(--border); }
        td { padding: 15px 20px; border-bottom: 1px solid var(--border); vertical-align: middle; }
        tr:hover { background: #F8FAFC; }

        .client-name { font-weight: 800; font-size: 1.1rem; color: var(--text-main); }
        .client-id { font-size: 0.8rem; color: var(--text-muted); font-weight: 600; margin-top: 4px; }
        
        .badge { padding: 6px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; display: inline-block; }
        .badge.eco { background: rgba(59, 130, 246, 0.1); color: var(--blue); border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge.chef { background: rgba(16, 185, 129, 0.1); color: var(--accent); border: 1px solid rgba(16, 185, 129, 0.2); }

        .pin-display { font-size: 1.5rem; font-weight: 900; color: var(--accent); font-family: monospace; letter-spacing: 2px; }
        .screen-count { font-size: 1.1rem; font-weight: 800; background: #F1F5F9; padding: 6px 15px; border-radius: 6px; border: 1px solid var(--border); }

        .controls { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
        .controls select, .controls input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-size: 0.85rem; font-weight: 600; outline: none; }
        .controls select { min-width: 120px; }
        .controls input[type="number"] { width: 60px; text-align: center; }
        
        .btn { padding: 8px 15px; border-radius: 6px; font-weight: 800; font-size: 0.75rem; text-transform: uppercase; cursor: pointer; border: none; letter-spacing: 0.5px; transition: 0.2s;}
        .btn:active { transform: scale(0.95); }
        .btn-orange { background: var(--orange); color: #FFF; }
        .btn-green { background: var(--accent); color: #FFF; }
        .btn-blue { background: #E2E8F0; color: var(--slate); border: 1px solid var(--border); }
        .btn-red { background: rgba(239, 68, 68, 0.1); color: var(--alert); border: 1px solid rgba(239, 68, 68, 0.3); }
        .btn-delete { background: var(--alert); color: #FFF; padding: 8px 12px; font-size: 1rem; }

    </style>
</head>
<body>

    <div id="master-security-overlay">
        <div class="master-lock-box">
            <h1>EMPIRE CONTROL</h1>
            <p style="color: #666; font-size: 0.85rem; margin-top: -20px; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px;">Accès Super-Administrateur</p>
            <input type="password" id="master-pwd" placeholder="CLÉ MAÎTRE">
            <button onclick="unlockMasterPanel()">Vérifier & Connecter</button>
            <p id="master-error" style="color: var(--alert); display: none; font-weight: bold; font-size: 0.85rem; margin-top: 15px;">❌ Clé incorrecte.</p>
        </div>
    </div>

    <div id="master-dashboard">
        <div class="header">
            <h2>iCHEF - PILOTAGE MONDIAL</h2>
            <button class="btn btn-blue" onclick="loadAllTenants()">🔄 Rafraîchir les données</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>Restaurant / Identifiant</th>
                    <th>Pack Actuel</th>
                    <th>Code PIN en direct</th>
                    <th>Écrans (Actifs / Max)</th>
                    <th>Pilotage Commercial & Sécurité</th>
                </tr>
            </thead>
            <tbody id="tenant-list">
                </tbody>
        </table>
    </div>

    <script>
        const SERVER_URL = "https://tableau-system.onrender.com";
        // REMPLACE "Empire2026" PAR LE MOT DE PASSE DE TON CHOIX.
        // Seule cette page connaît ce mot de passe.
        const REAL_MASTER_PASS = "Empire2026"; 

        // 1. FONCTION DE VERROUILLAGE FRONT-END
        function unlockMasterPanel() {
            const pwdInput = document.getElementById('master-pwd').value;
            if (pwdInput === REAL_MASTER_PASS) {
                document.getElementById('master-security-overlay').style.display = 'none';
                document.getElementById('master-dashboard').style.display = 'block';
                // On ne charge les données QU'APRÈS avoir passé la sécurité
                loadAllTenants();
            } else {
                const err = document.getElementById('master-error');
                err.style.display = 'block';
                document.getElementById('master-pwd').value = "";
                setTimeout(() => err.style.display = 'none', 3000);
            }
        }

        // Permet de valider avec la touche "Entrée"
        document.getElementById('master-pwd').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') unlockMasterPanel();
        });

        // 2. CHARGEMENT DES CLIENTS (RESTREINT)
        async function loadAllTenants() {
            const tbody = document.getElementById('tenant-list');
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:40px;">⏳ Récupération sécurisée des données en cours...</td></tr>';
            
            try {
                // Remplacer par ta vraie route backend qui liste les locataires
                const response = await fetch(`${SERVER_URL}/api/get-all-tenants-admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ masterKey: REAL_MASTER_PASS }) // Sécurité supplémentaire côté serveur requise
                });

                if(response.ok) {
                    const data = await response.json();
                    renderTable(data.tenants || []);
                } else {
                    // MOCK DATA POUR LA DÉMO VISUELLE SI LE BACKEND N'EST PAS ENCORE PRÊT
                    renderMockData();
                }
            } catch(e) {
                console.warn("Erreur API, chargement des données de secours.");
                renderMockData();
            }
        }

        function renderMockData() {
            const mockTenants = [
                { id: "7981", name: "rest leman", pack: "eco", pin: "5042", maxScreens: 1, activeScreens: 0 },
                { id: "ichef", name: "ichefvd", pack: "eco", pin: "8160", maxScreens: 1, activeScreens: 0 },
                { id: "con", name: "dupon", pack: "chef", pin: "1738", maxScreens: 1, activeScreens: 0 },
                { id: "154", name: "84", pack: "chef", pin: "4297", maxScreens: 1, activeScreens: 0 },
                { id: "restotradicional", name: "Le beau soleil", pack: "chef", pin: "7525", maxScreens: 1, activeScreens: 0 }
            ];
            renderTable(mockTenants);
        }

        function renderTable(tenants) {
            const tbody = document.getElementById('tenant-list');
            if(tenants.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align:center; padding:30px; font-weight:bold; color:#888;">Aucun client trouvé.</td></tr>';
                return;
            }

            tbody.innerHTML = tenants.map(t => {
                let badgeClass = t.pack.toLowerCase() === 'eco' ? 'eco' : 'chef';
                let packName = t.pack.toUpperCase();
                
                return `
                <tr>
                    <td>
                        <div class="client-name">${t.name}</div>
                        <div class="client-id">${t.id}</div>
                    </td>
                    <td><span class="badge ${badgeClass}">${packName}</span></td>
                    <td><span class="pin-display">${t.pin}</span></td>
                    <td><span class="screen-count">${t.activeScreens} / ${t.maxScreens}</span></td>
                    <td>
                        <div class="controls">
                            <select id="pack-${t.id}">
                                <option value="Essentiel" ${t.pack==='eco'?'selected':''}>Essentiel</option>
                                <option value="Chef IA" ${t.pack==='chef'?'selected':''}>Chef IA</option>
                                <option value="Business">Business</option>
                                <option value="Palace">Palace</option>
                            </select>
                            <input type="number" id="screens-${t.id}" value="${t.maxScreens}" min="1">
                            <button class="btn btn-orange" onclick="updateClient('${t.id}')">Écrans</button>
                            
                            <input type="text" id="newpin-${t.id}" value="${t.pin}" style="width:70px; text-align:center;">
                            <button class="btn btn-green" onclick="forcePin('${t.id}')">PIN</button>
                            
                            <div style="width: 100%; height: 5px;"></div> <button class="btn btn-blue" onclick="resetDevices('${t.id}')">Reset Appareils</button>
                            <button class="btn btn-red" onclick="blockClient('${t.id}')">Bloquer</button>
                            <button class="btn btn-delete" onclick="deleteClient('${t.id}')">✖</button>
                        </div>
                    </td>
                </tr>
                `;
            }).join('');
        }

        // FONCTIONS D'ACTIONS ADMINISTRATIVES (À relier à ton backend backend.js)
        async function updateClient(id) {
            let pack = document.getElementById(`pack-${id}`).value;
            let screens = document.getElementById(`screens-${id}`).value;
            alert(`✅ Client ${id} mis à jour.\nPack: ${pack} | Max Écrans: ${screens}`);
            // TODO: call fetch API
        }

        async function forcePin(id) {
            let newPin = document.getElementById(`newpin-${id}`).value;
            if(confirm(`Forcer le code PIN du client ${id} à ${newPin} ?`)) {
                alert(`✅ Code PIN du client ${id} forcé à ${newPin}`);
                // TODO: call fetch API
            }
        }

        async function resetDevices(id) {
            if(confirm(`Déconnecter tous les appareils du client ${id} ?`)) {
                alert(`✅ Appareils réinitialisés.`);
                // TODO: call fetch API
            }
        }

        async function blockClient(id) {
            if(prompt(`Taper OUI pour bloquer l'accès au client ${id}`) === "OUI") {
                alert(`🚫 Client ${id} bloqué.`);
                // TODO: call fetch API
            }
        }

        async function deleteClient(id) {
            if(prompt(`Taper SUPPRIMER pour détruire définitivement le compte ${id}`) === "SUPPRIMER") {
                alert(`🗑️ Client ${id} supprimé de la base de données.`);
                // TODO: call fetch API
            }
        }
    </script>
</body>
</html>
