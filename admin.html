<div class="modal" id="staff-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>👥 Fiche Employé</h3>
                <button class="btn-outline" style="border:none; padding:8px; font-size: 1.2rem; background:transparent;" onclick="closeModals()">✕</button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="staff-edit-original-pin">
                
                <div class="grid-2">
                    <div class="input-group">
                        <label>Prénom ou Pseudo</label>
                        <input type="text" id="staff-name" class="input-field" placeholder="Ex: Paul">
                    </div>
                    <div class="input-group">
                        <label>Poste / Titre (Texte libre)</label>
                        <input type="text" id="staff-title" class="input-field" placeholder="Ex: Chef de Rang, Barman...">
                    </div>
                </div>
                
                <div class="grid-2">
                    <div class="input-group">
                        <label>Code PIN Personnel</label>
                        <input type="password" id="staff-pin" class="input-field" placeholder="Ex: 4321">
                    </div>
                    <div class="input-group">
                        <label>Droits Système (Sécurité)</label>
                        <select id="staff-role" class="input-field">
                            <option value="salle">Caisse uniquement (Restreint)</option>
                            <option value="admin">Manager (Accès Total)</option>
                        </select>
                    </div>
                </div>

                <div class="toggle-row" style="margin-top: 15px; margin-bottom: 0;">
                    <div class="toggle-info">
                        <strong>Accès Activé</strong>
                        <span>Suspendre bloque immédiatement le code PIN de cet employé.</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="staff-active" checked>
                        <span class="slider"></span>
                    </label>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" style="flex:1;" onclick="closeModals()">Annuler</button>
                <button class="btn-save-green" onclick="saveStaff()">✔ ENREGISTRER</button>
            </div>
        </div>
    </div>
