<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChef - Business Control Center</title>
    <style>
        :root { 
            --bg: #050505; 
            --panel: #111; 
            --gold: #d4af37; 
            --text: #ffffff; 
            --text-muted: #888888;
            --border: rgba(255,255,255,0.08); 
            --success: #00ff00;
            --danger: #ff4d4d;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            margin: 0; 
            padding: 20px; 
            line-height: 1.6;
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding-bottom: 20px; 
            border-bottom: 1px solid var(--border);
            margin-bottom: 30px;
        }

        .logo { font-size: 1.5rem; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }
        .logo span { color: var(--gold); font-weight: 800; }

        .section { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 16px; 
            padding: 25px; 
            margin-bottom: 30px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h2 { 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            color: var(--gold); 
            margin-top: 0; 
            margin-bottom: 20px;
        }

        /* OUTIL QR CODE */
        .qr-tool { display: flex; gap: 10px; margin-bottom: 20px; }
        input { 
            background: #000; 
            border: 1px solid var(--border); 
            color: #fff; 
            padding: 15px; 
            border-radius: 8px; 
            flex: 1; 
            font-size: 1rem;
            outline: none;
        }
        input:focus { border-color: var(--gold); }
        
        .btn-gold { 
            background: var(--gold); 
            color: #000; 
            border: none; 
            padding: 15px 25px; 
            border-radius: 8px; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.2s;
        }
        .btn-gold:active { transform: scale(0.95); }

        #qr-display { 
            display: none; 
            text-align: center; 
            background: #fff; 
            padding: 30px; 
            border-radius: 12px; 
            margin-top: 20px;
        }
        #qr-display img { max-width: 200px; margin-bottom: 15px; }
        .qr-link-text { color: #666; font-size: 0.75rem; word-break: break-all; margin-bottom: 15px; }

        /* GESTION STOCK */
        .category-title { 
            background: rgba(255,255,255,0.03); 
            padding: 10px 15px; 
            border-radius: 8px; 
            font-weight: 600; 
            margin: 25px 0 10px 0;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        .item-card { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 15px; 
            border-bottom: 1px solid var(--border); 
        }
        .item-info h3 { margin: 0; font-size: 1rem; font-weight: 400; }
        .item-info span { font-size: 0.8rem; color: var(--text-muted); }

        .toggle-container { display: flex; align-items: center; gap: 15px; }
        
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
        .dot-online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot-offline { background: var(--danger); box-shadow: 0 0 10px var(--danger); }

        .btn-status { 
            background: transparent; 
            border: 1px solid var(--border); 
            color: var(--text); 
            padding: 8px 15px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.75rem;
            text-transform: uppercase;
        }
        .btn-status.active { border-color: var(--danger); color: var(--danger); }
        .btn-status.inactive { border-color: var(--success); color: var(--success); }

        @media print {
            body * { visibility: hidden; }
            #qr-display, #qr-display * { visibility: visible; }
            #qr-display { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">iCHEF<span>.</span> ADMIN</div>
        <div id="sync-status" style="font-size: 0.7rem; color: var(--success);">● SYNC LIVE</div>
    </header>

    <div class="section">
        <h2>Déploiement de Table</h2>
        <div class="qr-tool">
            <input type="number" id="table-input" placeholder="Numéro de table (ex: 24)">
            <button class="btn-gold" onclick="generateQR()">Générer QR</button>
        </div>
        <div id="qr-display">
            <div id="qr-img-container"></div>
            <div class="qr-link-text" id="qr-url-text"></div>
            <button onclick="window.print()" style="padding:10px; cursor:pointer;">Imprimer pour la table</button>
        </div>
    </div>

    <div class="section">
        <h2>Contrôle des Stocks & Disponibilité</h2>
        <div id="menu-management-container">
            <p style="color:var(--text-muted)">Synchronisation du menu...</p>
        </div>
    </div>

    <script>
        const SERVER_URL = "https://tableau-system.onrender.com";
        // REMPLACE CETTE URL PAR TON URL FINALE DE DEPLOIEMENT (ex: https://flavien-ichef.netlify.app/menu-qr.html)
        const CLIENT_APP_URL = window.location.href.replace('admin.html', 'menu-qr.html');

        let fullState = {};

        // 1. CHARGEMENT INITIAL ET SYNCHRONISATION
        async function loadMenu() {
            try {
                const response = await fetch(`${SERVER_URL}/get-current-state`);
                fullState = await response.json();
                renderManager();
            } catch (e) {
                document.getElementById('sync-status').innerText = "○ ERREUR CONNEXION";
                document.getElementById('sync-status').style.color = "var(--danger)";
            }
        }

        // 2. AFFICHAGE DU GESTIONNAIRE
        function renderManager() {
            const container = document.getElementById('menu-management-container');
            container.innerHTML = "";

            // On traite Cuisine (MENU_MASTER) et Bar (MENU_MASTER_BAR)
            const sources = [
                { id: 'MENU_MASTER', label: 'CUISINE' },
                { id: 'MENU_MASTER_BAR', label: 'BAR' }
            ];

            sources.forEach(source => {
                const data = fullState.activeOrders[source.id] ? fullState.activeOrders[source.id].data : {};
                
                if (Object.keys(data).length > 0) {
                    const sourceHeader = document.createElement('h3');
                    sourceHeader.style.color = "var(--gold)";
                    sourceHeader.style.borderBottom = "1px solid var(--border)";
                    sourceHeader.style.paddingBottom = "5px";
                    sourceHeader.innerText = source.label;
                    container.appendChild(sourceHeader);

                    for (let category in data) {
                        const catDiv = document.createElement('div');
                        catDiv.className = "category-title";
                        catDiv.innerText = category.toUpperCase();
                        container.appendChild(catDiv);

                        data[category].forEach((item, idx) => {
                            const isAvailable = (item.stock !== 0 && item.stock !== "0");
                            const itemRow = document.createElement('div');
                            itemRow.className = "item-card";
                            itemRow.innerHTML = `
                                <div class="item-info">
                                    <h3>${item.name}</h3>
                                    <span>${item.price} €</span>
                                </div>
                                <div class="toggle-container">
                                    <div class="status-dot ${isAvailable ? 'dot-online' : 'dot-offline'}"></div>
                                    <button class="btn-status ${isAvailable ? 'active' : 'inactive'}" 
                                            onclick="toggleItemStock('${source.id}', '${category}', ${idx})">
                                        ${isAvailable ? 'Mettre en Épuisé' : 'Réactiver'}
                                    </button>
                                </div>
                            `;
                            container.appendChild(itemRow);
                        });
                    }
                }
            });
        }

        // 3. ACTION : BASCULER LE STOCK
        async function toggleItemStock(sourceId, category, index) {
            // Modification locale
            let items = fullState.activeOrders[sourceId].data[category];
            let currentStock = items[index].stock;
            
            // Si stock = 0 on remet à 99, sinon on met à 0
            items[index].stock = (currentStock === 0 || currentStock === "0") ? 99 : 0;

            // Update UI immédiate
            renderManager();

            // Push au serveur
            try {
                await fetch(`${SERVER_URL}/update-order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tableId: sourceId, 
                        order: { data: fullState.activeOrders[sourceId].data } 
                    })
                });
                console.log("Stock mis à jour sur le serveur");
            } catch (e) {
                alert("Erreur de synchronisation. Vérifiez votre connexion.");
            }
        }

        // 4. GÉNÉRATEUR DE QR
        function generateQR() {
            const table = document.getElementById('table-input').value;
            if (!table) return alert("Indiquez un numéro de table");

            const finalUrl = `${CLIENT_APP_URL}?table=${table}`;
            const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${encodeURIComponent(finalUrl)}`;

            document.getElementById('qr-display').style.display = "block";
            document.getElementById('qr-img-container').innerHTML = `<img src="${qrApi}" alt="QR Table ${table}">`;
            document.getElementById('qr-url-text').innerText = finalUrl;
            
            // Scroll auto vers le QR
            document.getElementById('qr-display').scrollIntoView({ behavior: 'smooth' });
        }

        // Lancement
        window.onload = loadMenu;
        // Refresh auto toutes les 30 secondes pour être sûr que l'admin est à jour
        setInterval(loadMenu, 30000);
    </script>
</body>
</html>
