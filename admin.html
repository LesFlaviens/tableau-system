<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChef - Admin Business Control</title>
    <style>
        :root { 
            --bg: #050505; --panel: #111; --gold: #d4af37; --text: #ffffff; 
            --text-muted: #888888; --border: rgba(255,255,255,0.08); 
            --success: #00ff00; --danger: #ff4d4d;
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .logo { font-size: 1.5rem; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }
        .logo span { color: var(--gold); font-weight: 800; }
        #sync-status { font-size: 0.7rem; color: var(--success); letter-spacing: 1px; }

        .btn-back { background: var(--danger); color: white; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-back:hover { filter: brightness(1.2); transform: scale(0.98); }

        .section { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 30px; }
        h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-top: 0; margin-bottom: 20px; }

        /* QR GENERATOR */
        .grid-tool { display: flex; gap: 10px; margin-bottom: 20px; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 8px; flex: 1; outline: none; font-size: 1rem; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px 25px; border-radius: 8px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        #qr-preview { display: none; text-align: center; background: #fff; padding: 20px; border-radius: 12px; margin-top: 20px; color: #000; }
        #qr-preview img { max-width: 150px; }

        /* TABLE REGISTRY */
        .table-list { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table-list th { text-align: left; font-size: 0.7rem; color: var(--text-muted); padding: 10px; border-bottom: 1px solid var(--border); }
        .table-list td { padding: 15px 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .btn-action { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 0.7rem; margin-right: 5px; transition: 0.2s; }
        .btn-action:hover { border-color: var(--gold); color: var(--gold); }

        /* STOCK MANAGEMENT */
        .stock-grid { display: grid; gap: 10px; }
        .stock-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid var(--border); }
        .item-name { font-size: 1rem; font-weight: 400; }
        .btn-toggle { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-size: 0.75rem; min-width: 110px; }
        .btn-toggle.sold-out { border-color: var(--danger); color: var(--danger); }

        @media print { body * { visibility: hidden; } .print-area, .print-area * { visibility: visible; } .print-area { position: absolute; left: 0; top: 0; width: 100%; text-align: center; } }
    </style>
</head>
<body>

    <header>
        <div>
            <div class="logo">iCHEF<span>.</span> ADMIN</div>
            <div id="sync-status">● SYNC SERVEUR LIVE</div>
        </div>
        <button class="btn-back" onclick="backToPad()">🔙 Retour au Service (PAD)</button>
    </header>

    <div class="section">
        <h2>Déploiement de Table</h2>
        <div class="grid-tool">
            <input type="number" id="table-num" placeholder="Numéro de table">
            <button class="btn-gold" onclick="previewQR()">Générer</button>
        </div>
        <div id="qr-preview">
            <div id="qr-img"></div>
            <p id="qr-link-display" style="font-size: 0.7rem; color: #888; margin: 10px 0;"></p>
            <button class="btn-gold" onclick="registerTable()" style="font-size: 0.7rem; padding: 10px;">Enregistrer dans le parc</button>
        </div>
    </div>

    <div class="section">
        <h2>Parc de Tables Enregistrées</h2>
        <table class="table-list">
            <thead>
                <tr>
                    <th>TABLE</th>
                    <th>ID / LIEN</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="table-registry-body"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Gestion des Stocks (Cuisine & Bar)</h2>
        <div id="stock-control-list" class="stock-grid">Chargement du menu...</div>
    </div>

    <script>
        // --- CONFIGURATION CLIENT (MULTI-TENANT) ---
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        const SERVER_URL = "https://tableau-system.onrender.com";
        
        // Base URL propre sans les paramètres existants pour créer le lien du QR Code
        const BASE_CLIENT_URL = window.location.origin + window.location.pathname.replace('admin.html', 'menu-qr.html');

        let fullState = {};
        let currentTableNum = null;
        let currentQrUrlObj = null;
        
        // Séparation des données QR Codes par restaurant
        const registryKey = 'ichef_registry_' + tenantID;
        let tableRegistry = JSON.parse(localStorage.getItem(registryKey) || '[]');

        // --- NAVIGATION ---
        function backToPad() {
            window.location.href = 'gestionnaire.html?tenantID=' + tenantID;
        }

        // --- 1. GESTION DU PARC ---
        function previewQR() {
            currentTableNum = document.getElementById('table-num').value;
            if(!currentTableNum) return alert("Numéro requis");

            // Création de l'URL du QR Code attachée au compte du client
            currentQrUrlObj = `${BASE_CLIENT_URL}?tenantID=${tenantID}&table=${currentTableNum}`;
            const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(currentQrUrlObj)}`;
            
            document.getElementById('qr-preview').style.display = 'block';
            document.getElementById('qr-img').innerHTML = `<img src="${qrUrl}">`;
            document.getElementById('qr-link-display').innerText = currentQrUrlObj;
        }

        function registerTable() {
            if(tableRegistry.find(t => t.num == currentTableNum)) return alert("Déjà enregistrée");
            tableRegistry.push({ num: currentTableNum, url: currentQrUrlObj });
            localStorage.setItem(registryKey, JSON.stringify(tableRegistry));
            renderRegistry();
            document.getElementById('qr-preview').style.display = 'none';
        }

        function renderRegistry() {
            const tbody = document.getElementById('table-registry-body');
            tbody.innerHTML = tableRegistry.sort((a,b) => a.num - b.num).map((t, idx) => `
                <tr>
                    <td style="font-weight:bold; color:var(--gold);">TABLE ${t.num}</td>
                    <td style="font-size:0.65rem; color:var(--text-muted);">${t.url}</td>
                    <td>
                        <button class="btn-action" onclick="printTable('${t.url}', '${t.num}')">🖨️ Imprimer</button>
                        <button class="btn-action" style="color:var(--danger)" onclick="deleteTable(${idx})">Supprimer</button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteTable(idx) {
            if(confirm("Supprimer cette table ?")) {
                tableRegistry.splice(idx, 1);
                localStorage.setItem(registryKey, JSON.stringify(tableRegistry));
                renderRegistry();
            }
        }

        function printTable(url, num) {
            const qr = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
            const win = window.open('', '_blank');
            win.document.write(`
                <div style="text-align:center; font-family:sans-serif; padding:50px; border:1px solid #ddd;">
                    <h1 style="letter-spacing:5px;">iCHEF</h1>
                    <p style="font-size:2rem; font-weight:bold;">TABLE ${num}</p>
                    <img src="${qr}" style="margin:20px 0;">
                    <p>Scannez pour commander</p>
                </div>
            `);
            win.document.close();
            win.document.title = `Imprimer QR_Table_${num}`;
            setTimeout(() => { win.print(); }, 500); // Laisse le temps à l'image de charger
        }

        // --- 2. GESTION DES STOCKS ---
        async function fetchLiveStocks() {
            try {
                // On récupère uniquement l'état du restaurant en cours (tenantID)
                const r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                fullState = await r.json();
                renderStocks();
            } catch(e) { console.error("Erreur sync"); }
        }

        function renderStocks() {
            const container = document.getElementById('stock-control-list');
            let html = "";
            const sources = [
                { id: 'MENU_MASTER', label: 'CUISINE' },
                { id: 'MENU_MASTER_BAR', label: 'BAR' }
            ];

            sources.forEach(src => {
                const data = fullState.activeOrders[src.id]?.data || {};
                if(Object.keys(data).length > 0) {
                    html += `<div style="color:var(--gold); font-size:0.75rem; margin-top:20px; border-bottom:1px solid var(--border);">${src.label}</div>`;
                    for(let cat in data) {
                        data[cat].forEach((item, idx) => {
                            const isOut = (item.stock === 0 || item.stock === "0");
                            html += `
                                <div class="stock-item">
                                    <div class="item-name">${item.name} <br><span style="font-size:0.7rem; color:#666;">${cat}</span></div>
                                    <button class="btn-toggle ${isOut ? 'sold-out' : ''}" 
                                            onclick="updateStock('${src.id}', '${cat}', ${idx}, ${isOut})">
                                        ${isOut ? 'ÉPUISÉ' : 'EN STOCK'}
                                    </button>
                                </div>`;
                        });
                    }
                }
            });
            container.innerHTML = html;
        }

        async function updateStock(sourceId, cat, idx, currentlyOut) {
            // Modification locale immédiate
            fullState.activeOrders[sourceId].data[cat][idx].stock = currentlyOut ? 99 : 0;
            renderStocks(); // Feedback visuel instantané

            // Push au serveur sur le compte du client
            try {
                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tableId: sourceId, 
                        order: { data: fullState.activeOrders[sourceId].data } 
                    })
                });
                console.log("🔥 Serveur mis à jour pour " + tenantID);
            } catch(e) { alert("Erreur de synchronisation"); }
        }

        window.onload = () => {
            renderRegistry();
            fetchLiveStocks();
            setInterval(fetchLiveStocks, 10000); // Sync toutes les 10s
        };
    </script>
</body>
</html>
