<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Carte - Portail Client</title>
    <style>
        /* 🟢 DESIGN LUXE ÉPURÉ 🟢 */
        :root { 
            --bg-color: #050505;           
            --text-main: #f8fafc;    
            --text-muted: #888888;   
            --gold: #d4af37;         
            --accent: #38bdf8; 
            --border-color: #222222;
        }
        
        body { 
            font-family: 'Helvetica Neue', Optima, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        header { 
            text-align: center; 
            padding: 50px 20px 30px; 
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to bottom, #0a0f16 0%, var(--bg-color) 100%);
        }
        
        .logo-text { 
            color: var(--gold); 
            font-size: 2rem; 
            font-weight: 300; 
            letter-spacing: 6px; 
            margin: 0; 
            text-transform: uppercase; 
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .menu-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .category-section {
            margin-top: 40px;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s forwards;
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .category-title {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-title::before, .category-title::after {
            content: ""; flex: 1; height: 1px; background: var(--border-color); margin: 0 15px;
        }

        .menu-item {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
        }
        .menu-item:last-child { border-bottom: none; }

        .item-header { display: flex; justify-content: space-between; align-items: baseline; gap: 15px; }

        .item-name-main { font-size: 1.15rem; font-weight: 500; letter-spacing: 1px; color: var(--text-main); margin: 0; line-height: 1.4; }
        .item-price { font-size: 1.1rem; color: var(--gold); font-weight: bold; white-space: nowrap; }
        .item-desc { color: var(--text-muted); font-size: 0.85rem; margin-top: 6px; line-height: 1.5; font-style: italic; display: block; }

        .loading-screen { text-align: center; padding: 100px 20px; color: var(--gold); font-style: italic; letter-spacing: 2px; }

        .footer { text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--border-color); letter-spacing: 1px; text-transform: uppercase; }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">NOTRE CARTE</h1>
        <div id="service-subtitle" class="subtitle">Sélection du moment</div>
    </header>

    <div class="menu-container" id="menu-container">
        <div class="loading-screen">Synchronisation avec l'établissement en cours...</div>
    </div>

    <div class="footer">
        Prix nets en <span id="footer-currency">Euros</span> - Service compris<br>
        <span style="font-size: 0.6rem; opacity: 0.5;">Propulsé par Empire OS</span>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        const SERVER_URL = "https://tableau-system.onrender.com";

        let currentCurrency = "€";

        const API = {
            getState: async () => {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                if (!r.ok) throw new Error("Serveur injoignable");
                return await r.json();
            }
        };

        let lastDataHash = "";

        async function fetchMenu() {
            try {
                const state = await API.getState();
                let activeOrders = state.activeOrders || {};
                
                if (activeOrders['SETTINGS_MASTER'] && activeOrders['SETTINGS_MASTER'].data) {
                    let savedCurrency = activeOrders['SETTINGS_MASTER'].data.currency;
                    if (savedCurrency) {
                        currentCurrency = savedCurrency;
                        let nameMap = {"€": "Euros", "CHF": "Francs Suisses", "$": "Dollars", "C$": "Dollars", "£": "Livres", "¥": "Yens", "MAD": "Dirhams", "CFA": "Francs CFA"};
                        document.getElementById('footer-currency').innerText = nameMap[currentCurrency] || currentCurrency;
                    }
                }

                let routing = {
                    activeService: "MIDI",
                    endpoints: { menuQR: { cuisine: true, bar: true } }
                };
                if (activeOrders['ROUTING_MASTER'] && activeOrders['ROUTING_MASTER'].data) {
                    routing = activeOrders['ROUTING_MASTER'].data;
                }

                let catCuisine = activeOrders['CATEGORIES_CUISINE']?.data || [];
                let catBar = activeOrders['CATEGORIES_BAR']?.data || [];
                let menuCuisine = activeOrders['MENU_MASTER']?.data || {};
                let menuBar = activeOrders['MENU_MASTER_BAR']?.data || {};

                let currentHash = JSON.stringify({ routing, catCuisine, catBar, menuCuisine, menuBar, currentCurrency });
                if(currentHash === lastDataHash) return; 
                lastDataHash = currentHash;

                renderClientMenu(routing, catCuisine, catBar, menuCuisine, menuBar);

            } catch(e) {
                console.error(e);
            }
        }

        function formatItemName(rawName) {
            let cleanName = rawName.replace('🌟 ', '');
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let mainName = parts[0].trim();
                let description = parts.slice(1).join(' - ').trim(); 
                return `<div class="item-name-main">${mainName}</div><div class="item-desc">${description}</div>`;
            }
            return `<div class="item-name-main">${cleanName}</div>`;
        }

        function renderClientMenu(routing, catCuisine, catBar, menuCuisine, menuBar) {
            const container = document.getElementById('menu-container');
            const subtitle = document.getElementById('service-subtitle');
            
            let htmlContent = '';
            
            const serviceNames = { "MATIN": "Petit-Déjeuner", "MIDI": "Déjeuner", "APREM": "Après-Midi / Tea Time", "SOIR": "Dîner" };
            subtitle.innerText = "Service : " + (serviceNames[routing.activeService] || routing.activeService);

            // CUISINE
            if (routing.endpoints.menuQR.cuisine) {
                catCuisine.forEach((catObj, index) => {
                    let items = menuCuisine[catObj.id] || [];
                    let categoryRouting = catObj.routing || ['MIDI', 'SOIR'];
                    let categoryTargets = catObj.targets || ['qr', 'bar', 'resto', 'pad'];
                    
                    let availableItems = items.filter(item => {
                        if (item.stock === 0 || item.stock === "0" || item.hidden === true) return false;
                        
                        let itemRouting = item.routing || categoryRouting;
                        let itemTarget = item.targets || categoryTargets;

                        // On vérifie le TEMPS (Matin/Soir) ET L'ENDROIT (Doit inclure "qr" pour s'afficher ici)
                        return itemRouting.includes(routing.activeService) && itemTarget.includes('qr');
                    });

                    if (availableItems.length > 0) {
                        htmlContent += `
                        <div class="category-section" style="animation-delay: ${index * 0.1}s;">
                            <h2 class="category-title">${catObj.label}</h2>
                        `;

                        availableItems.forEach(item => {
                            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
                            htmlContent += `
                            <div class="menu-item">
                                <div class="item-header">
                                    <div style="flex:1;">${formatItemName(item.name)}</div>
                                    <span class="item-price">${priceStr}</span>
                                </div>
                            </div>`;
                        });
                        htmlContent += `</div>`;
                    }
                });
            }

            // BAR
            if (routing.endpoints.menuQR.bar) {
                catBar.forEach((catObj, index) => {
                    let items = menuBar[catObj.id] || [];
                    let categoryRouting = catObj.routing || ['MIDI', 'SOIR'];
                    let categoryTargets = catObj.targets || ['qr', 'bar', 'resto', 'pad'];
                    
                    let availableItems = items.filter(item => {
                        if (item.stock === 0 || item.stock === "0" || item.hidden === true) return false;
                        
                        let itemRouting = item.routing || categoryRouting;
                        let itemTarget = item.targets || categoryTargets;

                        // On vérifie le TEMPS (Matin/Soir) ET L'ENDROIT (Doit inclure "qr" pour s'afficher ici)
                        return itemRouting.includes(routing.activeService) && itemTarget.includes('qr');
                    });

                    if (availableItems.length > 0) {
                        htmlContent += `
                        <div class="category-section" style="animation-delay: ${(catCuisine.length + index) * 0.1}s;">
                            <h2 class="category-title" style="color: var(--accent);">${catObj.label}</h2>
                        `;

                        availableItems.forEach(item => {
                            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
                            htmlContent += `
                            <div class="menu-item">
                                <div class="item-header">
                                    <div style="flex:1;">${formatItemName(item.name)}</div>
                                    <span class="item-price">${priceStr}</span>
                                </div>
                            </div>`;
                        });
                        htmlContent += `</div>`;
                    }
                });
            }

            if (htmlContent === '') {
                htmlContent = '<div class="loading-screen">Le service est actuellement fermé ou la carte est en cours de mise à jour.</div>';
            }

            container.innerHTML = htmlContent;
        }

        fetchMenu();
        setInterval(fetchMenu, 3000);

    </script>
</body>
</html>
