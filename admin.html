<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChef - Business Control Center</title>
    <style>
        :root { 
            --bg: #050505; 
            --panel: #111; 
            --gold: #d4af37; 
            --text: #ffffff; 
            --text-muted: #888888;
            --border: rgba(255,255,255,0.08); 
            --success: #00ff00;
            --danger: #ff4d4d;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text); margin: 0; padding: 20px;
        }

        header { display: flex; justify-content: space-between; align-items: center; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 30px; }
        .logo { font-size: 1.5rem; font-weight: 300; letter-spacing: 5px; text-transform: uppercase; }
        .logo span { color: var(--gold); font-weight: 800; }

        .section { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 25px; margin-bottom: 30px; }
        h2 { font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; color: var(--gold); margin-top: 0; margin-bottom: 20px; }

        .qr-tool { display: flex; gap: 10px; margin-bottom: 20px; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 8px; flex: 1; outline: none; }
        .btn-gold { background: var(--gold); color: #000; border: none; padding: 15px 25px; border-radius: 8px; font-weight: 800; text-transform: uppercase; cursor: pointer; }

        #qr-display { display: none; text-align: center; background: #fff; padding: 20px; border-radius: 12px; margin-top: 20px; color: #000; }
        #qr-display img { max-width: 150px; }

        .table-list { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .table-list th { text-align: left; font-size: 0.7rem; color: var(--text-muted); padding: 10px; border-bottom: 1px solid var(--border); }
        .table-list td { padding: 15px 10px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }
        .btn-action { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; margin-right: 5px; }
        .btn-action:hover { border-color: var(--gold); color: var(--gold); }

        .item-card { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
        .btn-status { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; min-width: 80px;}
        .btn-status.sold-out { border-color: var(--danger); color: var(--danger); }
        
        #sync-indicator { font-size: 0.7rem; color: var(--success); }
    </style>
</head>
<body>

    <header>
        <div class="logo">iCHEF<span>.</span> ADMIN</div>
        <div id="sync-indicator">● SYNC LIVE</div>
    </header>

    <div class="section">
        <h2>Déploiement de Table</h2>
        <div class="qr-tool">
            <input type="number" id="table-input" placeholder="Numéro (ex: 12)">
            <button class="btn-gold" onclick="generateAndShow()">Générer</button>
        </div>
        
        <div id="qr-display">
            <div id="qr-img-container"></div>
            <p id="qr-url-text" style="font-size: 0.7rem; margin: 10px 0; color: #666;"></p>
            <button class="btn-gold" onclick="saveCurrentTable()" style="font-size: 0.7rem; padding: 10px;">Enregistrer dans le parc</button>
        </div>
    </div>

    <div class="section">
        <h2>Parc de Tables iChef</h2>
        <table class="table-list">
            <thead>
                <tr>
                    <th>TABLE</th>
                    <th>LIEN GÉNÉRÉ</th>
                    <th>ACTIONS</th>
                </tr>
            </thead>
            <tbody id="registered-tables-body"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Disponibilité Carte (Cuisine & Bar)</h2>
        <div id="stock-container">Chargement du menu...</div>
    </div>

    <script>
        const SERVER_URL = "https://tableau-system.onrender.com";
        // On récupère l'URL de base pour le menu (en remplaçant admin.html par menu-qr.html)
        const CLIENT_APP_URL = window.location.href.replace('admin.html', 'menu-qr.html');
        
        let fullState = {}; 
        let currentTableNum = null;
        let registeredTables = JSON.parse(localStorage.getItem('ichef_tables') || '[]');

        // --- FONCTIONS DU PARC (QR CODES) ---
        function generateAndShow() {
            currentTableNum = document.getElementById('table-input').value;
            if(!currentTableNum) return alert("Numéro requis");

            const finalUrl = `${CLIENT_APP_URL}?table=${currentTableNum}`;
            const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(finalUrl)}`;

            document.getElementById('qr-display').style.display = "block";
            document.getElementById('qr-img-container').innerHTML = `<img src="${qrApi}">`;
            document.getElementById('qr-url-text').innerText = finalUrl;
        }

        function saveCurrentTable() {
            if(!currentTableNum) return;
            if(registeredTables.find(t => t.num == currentTableNum)) return alert("Table déjà enregistrée.");

            registeredTables.push({
                num: currentTableNum,
                url: `${CLIENT_APP_URL}?table=${currentTableNum}`
            });

            localStorage.setItem('ichef_tables', JSON.stringify(registeredTables));
            renderTableList();
            document.getElementById('qr-display').style.display = "none";
            document.getElementById('table-input').value = "";
        }

        function renderTableList() {
            const body = document.getElementById('registered-tables-body');
            body.innerHTML = registeredTables.sort((a,b) => a.num - b.num).map((t, index) => `
                <tr>
                    <td style="font-weight:bold; color:var(--gold);">TABLE ${t.num}</td>
                    <td style="color:var(--text-muted); font-size:0.65rem; max-width:200px; overflow:hidden;">${t.url}</td>
                    <td>
                        <button class="btn-action" onclick="printOneTable('${t.url}', '${t.num}')">🖨️ Imprimer</button>
                        <button class="btn-action" style="color:var(--danger);" onclick="deleteTable(${index})">Supprimer</button>
                    </td>
                </tr>
            `).join('');
        }

        function deleteTable(index) {
            if(confirm("Supprimer cette table ?")) {
                registeredTables.splice(index, 1);
                localStorage.setItem('ichef_tables', JSON.stringify(registeredTables));
                renderTableList();
            }
        }

        function printOneTable(url, num) {
            const qrApi = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(url)}`;
            const printWin = window.open('', '_blank');
            printWin.document.write(`
                <div style="text-align:center; font-family:sans-serif; padding:40px; border:2px solid #000; display:inline-block;">
                    <h1 style="margin:0; letter-spacing:5px;">iCHEF</h1>
                    <p style="font-size:1.5rem; font-weight:bold; margin:10px 0;">TABLE ${num}</p>
                    <img src="${qrApi}">
                    <p style="margin-top:10px;">Scannez pour commander</p>
                </div>
            `);
            printWin.document.close();
            setTimeout(() => { printWin.print(); }, 500);
        }

        // --- FONCTIONS DE GESTION DES STOCKS ---
        async function loadEverything() {
            try {
                const r = await fetch(`${SERVER_URL}/get-current-state`);
                fullState = await r.json();
                renderStocks();
            } catch(e) { 
                document.getElementById('sync-indicator').innerText = "○ ERREUR RESEAU";
                document.getElementById('sync-indicator').style.color = "var(--danger)";
            }
        }

        function renderStocks() {
            const container = document.getElementById('stock-container');
            let html = "";

            const sources = [
                { id: 'MENU_MASTER', label: 'CUISINE' },
                { id: 'MENU_MASTER_BAR', label: 'BAR' }
            ];

            sources.forEach(source => {
                const data = fullState.activeOrders[source.id]?.data || {};
                if(Object.keys(data).length > 0) {
                    html += `<h3 style="color:var(--gold); border-bottom:1px solid var(--border); margin-top:25px; padding-bottom:5px; font-size:0.9rem;">${source.label}</h3>`;
                    for(let cat in data) {
                        html += `<div style="color:var(--text-muted); font-size:0.7rem; margin-top:15px; font-weight:bold;">${cat.toUpperCase()}</div>`;
                        data[cat].forEach((item, idx) => {
                            const isOut = (item.stock === 0 || item.stock === "0");
                            html += `
                                <div class="item-card">
                                    <span style="font-size:0.9rem;">${item.name}</span>
                                    <button class="btn-status ${isOut ? 'sold-out' : ''}" onclick="toggleItemStock('${source.id}', '${cat}', ${idx}, ${isOut})">
                                        ${isOut ? 'ÉPUISÉ' : 'EN STOCK'}
                                    </button>
                                </div>`;
                        });
                    }
                }
            });
            container.innerHTML = html;
        }

        async function toggleItemStock(sourceId, category, index, currentlyOut) {
            // 1. On modifie l'objet localement
            let items = fullState.activeOrders[sourceId].data[category];
            items[index].stock = currentlyOut ? 99 : 0;

            // 2. On rafraîchit l'interface admin tout de suite
            renderStocks();

            // 3. On envoie au serveur
            try {
                await fetch(`${SERVER_URL}/update-order`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tableId: sourceId, 
                        order: { data: fullState.activeOrders[sourceId].data } 
                    })
                });
                console.log("🔥 Serveur mis à jour");
            } catch (e) {
                alert("Erreur de synchronisation avec le serveur.");
                loadEverything(); // Recharger en cas d'échec
            }
        }

        window.onload = () => {
            renderTableList();
            loadEverything();
            // On recharge les données toutes les 30s pour être sûr que l'admin est à jour
            setInterval(loadEverything, 30000); 
        };
    </script>
</body>
</html>
