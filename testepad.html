<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Serveur Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');

        :root { 
            --bg-base: #080808; 
            --bg-panel: rgba(18, 18, 18, 0.85);
            --text-main: #ffffff; 
            --text-muted: #888888; 
            --gold: #d4af37; 
            --accent-green: #00e676; 
            --accent-red: #ff1744; 
            --accent-blue: #2979ff;
            --border-subtle: #2a2a2a;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-base); 
            color: var(--text-main); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            touch-action: manipulation;
            user-select: none;
        }
        
        header { 
            background: #000; 
            border-bottom: 2px solid var(--gold); 
            padding: 12px 24px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            gap: 15px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            z-index: 100;
        }
        .header-left { display: flex; align-items: center; gap: 24px; }
        .logo { font-weight: 900; letter-spacing: 2px; font-size: 1.2rem; text-transform: uppercase; }
        .nav-btns { display: flex; gap: 10px; }
        
        .btn-mini { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border-subtle); 
            color: var(--text-main); 
            padding: 10px 16px; 
            border-radius: 6px; 
            font-size: 0.75rem; 
            font-weight: 600; 
            cursor: pointer; 
            text-transform: uppercase;
            transition: all 0.2s ease;
        }
        .btn-mini.gold { border-color: var(--gold); color: var(--gold); }
        .btn-mini.sync { border-color: var(--accent-red); color: var(--accent-red); }

        .floor-plan { flex: 1; position: relative; background-image: radial-gradient(var(--border-subtle) 1px, transparent 1px); background-size: 40px 40px; padding: 20px; overflow: auto; }
        
        .table-obj { 
            position: absolute; 
            background: linear-gradient(145deg, #161616, #0a0a0a);
            border: 1px solid var(--border-subtle); 
            border-radius: 12px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            font-weight: 900; 
            font-size: 1.2rem;
            color: var(--text-muted); 
            cursor: pointer; 
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }
        .table-obj.ordered { border-color: var(--accent-blue); color: #fff; box-shadow: 0 0 15px rgba(41, 121, 255, 0.3); }

        .drawer { 
            position: fixed; top: 0; right: -100%; width: 100%; height: 100%; 
            background: var(--bg-base); z-index: 10000; display: flex; 
            flex-direction: column; transition: right 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .drawer.open { right: 0; }
        .drawer-header { padding: 20px 30px; border-bottom: 1px solid var(--border-subtle); display: flex; justify-content: space-between; align-items: center; background: #000; }

        .obs-container { padding: 15px 30px; background: #0a0a0a; border-bottom: 1px solid var(--border-subtle); }
        #order-obs { width: 100%; padding: 15px; background: rgba(255, 23, 68, 0.05); color: var(--gold); border: 1px solid rgba(212, 175, 55, 0.3); border-radius: 8px; font-weight: 600; box-sizing: border-box; outline: none; }

        .ticket-view { flex: 0 0 35%; background: linear-gradient(to bottom, #050505, #0a0a0a); padding: 20px 30px; display: flex; flex-direction: column; }
        .ticket-items-container { flex: 1; overflow-y: auto; }
        .ticket-item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border-subtle); font-size: 1.1rem; }
        .ticket-total { padding-top: 15px; font-size: 2rem; font-weight: 900; color: var(--gold); text-align: right; }

        .category-tabs { display: flex; gap: 8px; padding: 15px 30px; background: #000; border-bottom: 1px solid #111; }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; padding: 20px 30px; overflow-y: auto; background: #080808; }
        .btn-item { background: #151515; border: 1px solid var(--border-subtle); color: #fff; padding: 20px; border-radius: 10px; font-weight: 600; display: flex; justify-content: space-between; cursor: pointer; }
        .btn-item:active { border-color: var(--gold); background: #1a1a1a; }
        
        .action-bar { padding: 20px 30px; background: #000; border-top: 1px solid var(--border-subtle); display: flex; gap: 15px; }
        .btn-action { flex: 2; padding: 20px; font-size: 1.1rem; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; border: none; }
        .btn-send { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); }
        .btn-pay { flex: 1; background: rgba(0, 230, 118, 0.1); border: 1px solid var(--accent-green); color: var(--accent-green); }

        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 50000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 90px); gap: 20px; }
        .pin-btn { background: #111; border: 1px solid #333; color: #fff; font-size: 1.8rem; width: 90px; height: 90px; border-radius: 50%; cursor: pointer; }
        .pin-btn:active { background: var(--gold); color: #000; }
        .pin-display { font-size: 3rem; color: var(--gold); margin-bottom: 30px; letter-spacing: 15px; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        
        #print-area { display: none; }
        @media print { body > *:not(#print-area) { display: none; } #print-area { display: block; } }
    </style>
</head>
<body>

    <div id="print-area"></div>

    <div id="login-screen">
        <h1 style="color:var(--gold); letter-spacing: 5px;">EMPIRE OS</h1>
        <div id="pin-display" class="pin-display"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="appendPin(1)">1</button><button class="pin-btn" onclick="appendPin(2)">2</button><button class="pin-btn" onclick="appendPin(3)">3</button>
            <button class="pin-btn" onclick="appendPin(4)">4</button><button class="pin-btn" onclick="appendPin(5)">5</button><button class="pin-btn" onclick="appendPin(6)">6</button>
            <button class="pin-btn" onclick="appendPin(7)">7</button><button class="pin-btn" onclick="appendPin(8)">8</button><button class="pin-btn" onclick="appendPin(9)">9</button>
            <button class="pin-btn" onclick="clearPin()" style="color:var(--accent-red)">C</button><button class="pin-btn" onclick="appendPin(0)">0</button><button class="pin-btn" onclick="submitPin()" style="background:var(--accent-green); color:#000;">OK</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <div class="logo">EMPIRE PAD</div>
            <div id="stock-tag" style="color:var(--accent-green); font-weight:900; font-size:0.75rem;">● SYNC H24</div>
            <div id="user-badge" style="background:#111; padding:6px 12px; border-radius:6px; font-size:0.8rem; color:var(--gold); border:1px solid #333;">Badge: Aucun</div>
        </div>
        <div class="nav-btns">
            <button class="btn-mini gold" onclick="unlockArchiMode()">🏗️ ARCHI</button>
            <button class="btn-mini sync" onclick="logout()">🔒 LOGOUT</button>
        </div>
    </header>

    <div id="floor-plan" class="floor-plan"></div>

    <div id="order-drawer" class="drawer">
        <div class="drawer-header">
            <h2 id="table-label" style="margin:0; font-size: 1.8rem; color:var(--gold);">TABLE</h2>
            <button class="btn-mini" onclick="closeOrder()">FERMER ✕</button>
        </div>
        <div class="obs-container">
            <input type="text" id="order-obs" placeholder="⚠️ OBSERVATIONS (VIP, ALLERGIES, CUISSONS...)">
        </div>
        <div class="ticket-view">
            <div id="ticket-items" class="ticket-items-container"></div>
            <div id="ticket-total" class="ticket-total">0.00€</div>
        </div>
        <div class="category-tabs">
            <button class="btn-mini" onclick="renderMenu('Entrées')">🥗 ENTRÉES</button>
            <button class="btn-mini gold" onclick="renderMenu('Plats de résistance')">🔥 PLATS</button>
            <button class="btn-mini" style="border-color:#ea80fc; color:#ea80fc;" onclick="renderMenu('Desserts')">🍰 DESSERTS</button>
            <button class="btn-mini" style="border-color:#00e5ff; color:#00e5ff;" onclick="renderMenu('Boissons')">🍸 BOISSONS</button>
        </div>
        <div id="menu" class="menu-grid"></div>
        <div class="action-bar">
            <button class="btn-action btn-send" onclick="sendToKitchen()">🚀 ENVOYER AU CHEF</button>
            <button class="btn-action btn-pay" onclick="openPaymentModal()">💳 ENCAISSER</button>
        </div>
    </div>

    <div id="payment-modal" class="modal-overlay">
        <h2 style="color:var(--gold); font-size: 2.5rem;" id="pay-title">ENCAISSEMENT</h2>
        <h3 style="color:#fff; font-size: 2rem; margin-bottom: 40px;" id="pay-amount">0.00€</h3>
        <button class="btn-action btn-pay" style="width:350px; margin-bottom:10px;" onclick="executePayment('CB')">CARTE BANCAIRE</button>
        <button class="btn-action btn-pay" style="width:350px; margin-bottom:10px;" onclick="executePayment('ESPECES')">ESPÈCES</button>
        <button class="btn-action btn-send" style="width:350px; margin-top:30px; border-color:var(--accent-red); color:var(--accent-red);" onclick="cancelPayment()">ANNULER</button>
    </div>

    <script>
        // --- BASE DE DONNÉES MAÎTRE (CONNEXION 24/7) ---
        const MASTER_MENU = [
            {n: "Caviar Beluga & Blinis", c: "Entrées", p: 85, d: "cuisine"},
            {n: "Foie Gras mi-cuit", c: "Entrées", p: 24, d: "cuisine"},
            {n: "Carpaccio St-Jacques", c: "Entrées", p: 28, d: "cuisine"},
            {n: "Tartare Wagyu", c: "Entrées", p: 32, d: "cuisine"},
            {n: "Saumon Fumé", c: "Entrées", p: 22, d: "cuisine"},
            {n: "Huîtres Gillardeau", c: "Entrées", p: 26, d: "cuisine"},
            {n: "Velouté de Homard", c: "Entrées", p: 25, d: "cuisine"},
            {n: "Œuf Parfait Cèpes", c: "Entrées", p: 19, d: "cuisine"},
            {n: "Burrata des Pouilles", c: "Entrées", p: 18, d: "cuisine"},
            {n: "Ceviche Daurade", c: "Entrées", p: 21, d: "cuisine"},
            {n: "Filet Bœuf Rossini", c: "Plats de résistance", p: 45, d: "cuisine"},
            {n: "Homard Bleu", c: "Plats de résistance", p: 55, d: "cuisine"},
            {n: "Côte de Veau", c: "Plats de résistance", p: 38, d: "cuisine"},
            {n: "Bar de Ligne", c: "Plats de résistance", p: 42, d: "cuisine"},
            {n: "Risotto Truffe Blanche", c: "Plats de résistance", p: 35, d: "cuisine"},
            {n: "Magret de Canard", c: "Plats de résistance", p: 32, d: "cuisine"},
            {n: "St-Jacques Poireaux", c: "Plats de résistance", p: 36, d: "cuisine"},
            {n: "Pigeon Rôti", c: "Plats de résistance", p: 40, d: "cuisine"},
            {n: "Sole Meunière", c: "Plats de résistance", p: 48, d: "cuisine"},
            {n: "Volaille aux Morilles", c: "Plats de résistance", p: 39, d: "cuisine"},
            {n: "Sphère Chocolat", c: "Desserts", p: 15, d: "cuisine"},
            {n: "Millefeuille Vanille", c: "Desserts", p: 14, d: "cuisine"},
            {n: "Soufflé Grand Marnier", c: "Desserts", p: 16, d: "cuisine"},
            {n: "Tarte Tatin", c: "Desserts", p: 13, d: "cuisine"},
            {n: "Baba au Rhum", c: "Desserts", p: 15, d: "cuisine"},
            {n: "Dôme Citron Yuzu", c: "Desserts", p: 14, d: "cuisine"},
            {n: "Paris-Brest", c: "Desserts", p: 15, d: "cuisine"},
            {n: "Pavlova", c: "Desserts", p: 14, d: "cuisine"},
            {n: "Macaron Géant", c: "Desserts", p: 16, d: "cuisine"},
            {n: "Assiette Fromages", c: "Desserts", p: 18, d: "cuisine"},
            {n: "Dom Pérignon", c: "Boissons", p: 250, d: "bar"},
            {n: "Château Margaux", c: "Boissons", p: 450, d: "bar"},
            {n: "Meursault 1er Cru", c: "Boissons", p: 120, d: "bar"},
            {n: "Cocktail L'Empire", c: "Boissons", p: 22, d: "bar"},
            {n: "Old Fashioned Japonais", c: "Boissons", p: 24, d: "bar"},
            {n: "Martini Dry", c: "Boissons", p: 18, d: "bar"},
            {n: "Eau Voss", c: "Boissons", p: 9, d: "bar"},
            {n: "Café Blue Mountain", c: "Boissons", p: 7, d: "bar"},
            {n: "Thé Matcha Impérial", c: "Boissons", p: 10, d: "bar"},
            {n: "Jus Pressé à froid", c: "Boissons", p: 12, d: "bar"}
        ];

        let activeOrders = {}; let currentTable = null; let ticketItems = [];
        let currentUser = null; let currentPin = "";
        const USERS = { "1234": { name: "Flavien", role: "Serveur" }, "9999": { name: "Directeur", role: "Manager" } };

        // --- AUTH & LOGIN ---
        function appendPin(num) { currentPin += num; document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length); }
        function clearPin() { currentPin = ""; document.getElementById('pin-display').innerText = ""; }
        function submitPin() {
            if(USERS[currentPin]) {
                currentUser = USERS[currentPin];
                document.getElementById('user-badge').innerText = `Badge: ${currentUser.name}`;
                document.getElementById('login-screen').style.display = 'none';
                renderFloor(); connectEmpireH24();
            } else { alert("Code incorrect"); clearPin(); }
        }
        function logout() { location.reload(); }

        // --- RENDU MENU (TOUCHES CONNECTÉES) ---
        function renderMenu(category) {
            const grid = document.getElementById('menu');
            const items = MASTER_MENU.filter(i => i.c === category);
            grid.innerHTML = items.map(i => `
                <div class="btn-item" onclick="addToTicket('${i.n.replace(/'/g, "\\'")}', ${i.p}, '${i.d}')">
                    <span>${i.n}</span>
                    <span style="color:var(--gold); font-weight:900;">${i.p.toFixed(2)}€</span>
                </div>
            `).join('');
        }

        function addToTicket(name, price, dest) {
            ticketItems.push({ id: Date.now(), n: name, p: price, d: dest });
            renderTicket();
        }

        function renderTicket() {
            let total = 0;
            document.getElementById('ticket-items').innerHTML = ticketItems.map(i => {
                total += i.p;
                return `<div class="ticket-item-row"><span>${i.n}</span><span>${i.p.toFixed(2)}€</span></div>`;
            }).join('');
            document.getElementById('ticket-total').innerText = total.toFixed(2) + "€";
        }

        // --- SYNCHRONISATION RÉSEAU ---
        let ws;
        function connectEmpireH24() {
            ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
            ws.onopen = () => { document.getElementById('stock-tag').style.color = "var(--accent-green)"; };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                if(msg.type === 'UPDATE_ALL' || msg.type === 'SYNC') {
                    activeOrders = msg.orders || {};
                    renderFloor();
                }
            };
            ws.onclose = () => { 
                document.getElementById('stock-tag').style.color = "var(--accent-red)";
                setTimeout(connectEmpireH24, 3000); 
            };
        }

        async function sendToKitchen() {
            if(ticketItems.length === 0) return;
            const order = { tableId: currentTable, items: ticketItems, obs: document.getElementById('order-obs').value };
            try {
                await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId: currentTable, order: order}) });
                alert("🚀 COMMANDE ENVOYÉE");
                ticketItems = []; closeOrder();
            } catch(e) { alert("Erreur réseau"); }
        }

        // --- PLAN DE SALLE ---
        function renderFloor() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            for(let i=1; i<=10; i++) {
                const div = document.createElement('div');
                div.className = 'table-obj' + (activeOrders["T"+i] ? ' ordered' : '');
                div.style.width = "100px"; div.style.height = "120px";
                div.style.left = ((i-1)%5 * 150 + 50) + "px";
                div.style.top = (Math.floor((i-1)/5) * 180 + 50) + "px";
                div.innerText = "T" + i;
                div.onclick = () => openOrder("T"+i);
                floor.appendChild(div);
            }
        }

        function openOrder(id) {
            currentTable = id;
            document.getElementById('table-label').innerText = "TABLE " + id;
            document.getElementById('order-drawer').classList.add('open');
            renderMenu('Plats de résistance');
        }
        function closeOrder() { document.getElementById('order-drawer').classList.remove('open'); }
        function openPaymentModal() { document.getElementById('payment-modal').style.display = 'flex'; document.getElementById('pay-amount').innerText = document.getElementById('ticket-total').innerText; }
        function cancelPayment() { document.getElementById('payment-modal').style.display = 'none'; }
        async function executePayment(type) { alert("Paiement " + type + " validé"); ticketItems = []; activeOrders[currentTable] = null; logout(); }

    </script>
</body>
</html>
