<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - KDS (Le Pass Cuisine)</title>
    <style>
        /* 💎 DESIGN PALACE MAIS HAUT CONTRASTE 💎 */
        :root { 
            --bg: #05080f; /* Fond très sombre */
            --panel: #162032; /* Tickets bien visibles */
            --border: rgba(255, 255, 255, 0.12); /* Bordures nettes */
            --border-strong: rgba(255, 255, 255, 0.25);
            --text-main: #ffffff; /* Blanc pur pour la lecture */
            --text-muted: #94a3b8; 
            --gold: #fbbf24; 
            --accent: #34d399; 
            --alert: #ef4444; 
            --ordered: #60a5fa; 
            --purple: #a78bfa; 
            --orange: #fb923c; 
            --shadow-subtle: 0 4px 15px rgba(0, 0, 0, 0.3);
            --shadow-deep: 0 10px 30px rgba(0, 0, 0, 0.7);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 10px 15px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            touch-action: manipulation; 
            box-sizing: border-box; 
            gap: 15px; 
            letter-spacing: 0.5px;
        }

        /* EN-TÊTE FLAT & ÉPURÉ */
        header { 
            background: transparent; 
            border-bottom: 1px solid var(--border-strong); 
            padding: 10px 10px 15px 10px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100; 
            flex-wrap: nowrap; 
            overflow-x: auto; 
            gap: 15px;
            flex-shrink: 0;
        }
        header::-webkit-scrollbar { display: none; }
        
        .header-left { display: flex; align-items: center; gap: 15px; flex-wrap: nowrap; flex-shrink: 1; }
        
        .logo-text { color: var(--gold); font-size: 1.3rem; font-weight: 900; letter-spacing: 4px; margin: 0; text-transform: uppercase; white-space: nowrap;}
        .clock { font-family: monospace; font-size: 1rem; color: var(--text-main); font-weight: bold; background: rgba(255,255,255,0.1); padding: 4px 10px; border-radius: 6px; white-space: nowrap;}

        .btn-call-salle { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--alert); color: var(--alert); padding: 6px 12px; border-radius: 4px; font-size: 0.8rem; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: all 0.2s ease; white-space: nowrap;}
        .btn-call-salle:hover { background: var(--alert); color: #fff; }
        .btn-call-salle:active { transform: scale(0.95); }

        .resa-ticker { background: transparent; border: none; color: var(--text-muted); padding: 4px 10px; font-size: 0.85rem; font-weight: 600; display: flex; align-items: center; gap: 6px; cursor: pointer; transition: 0.2s; white-space: nowrap; border-left: 1px solid var(--border-strong);}
        .resa-ticker:hover { color: var(--text-main); }
        .ticker-text { transition: opacity 0.5s ease-in-out; opacity: 1;}

        .nav-btns { display: flex; gap: 15px; flex-wrap: nowrap; align-items: center; flex-shrink: 1; }
        .nav-btn { background: transparent; border: none; color: var(--text-muted); padding: 6px 0; font-size: 0.8rem; font-weight: 800; cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; display: flex; align-items: center; gap: 6px; white-space: nowrap; border-bottom: 2px solid transparent;}
        .nav-btn:hover { color: var(--text-main); }
        .nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
        
        .nav-btn.recap { color: var(--accent); border: 1px solid var(--accent); padding: 6px 12px; border-radius: 4px; }
        .nav-btn.recap:hover { background: var(--accent); color: #000; }

        .module { display: none; flex: 1; overflow: hidden; }
        .module.active { display: flex; flex-direction: column; }

        /* 🚀 ARCHITECTURE KDS DYNAMIQUE 🚀 */
        #mod-kds { gap: 10px; padding: 0; }
        .kds-scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; padding-bottom: 50px; }
        .kds-scroll-area::-webkit-scrollbar { width: 6px; }
        .kds-scroll-area::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px; }
        
        .lane-wrapper { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            min-height: 0; 
            background: transparent; 
            border: none; 
            overflow: hidden; 
        }
        
        .lane-header { 
            font-size: 0.9rem; 
            font-weight: 900; 
            padding: 5px 10px; 
            margin: 0; 
            background: transparent; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            flex-shrink: 0;
            border-bottom: 2px solid; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timer-input {
            width: 35px; 
            padding: 0; 
            text-align: right; 
            background: transparent; 
            border: none; 
            font-weight: bold;
            font-family: inherit;
            transition: 0.2s;
            -moz-appearance: textfield;
            color: inherit;
            font-size: 0.9rem;
        }
        .timer-input::-webkit-outer-spin-button, .timer-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .timer-input:focus { outline: none; border-bottom: 1px solid var(--text-main); }

        .kds-grid { 
            display: flex; 
            flex-wrap: nowrap; 
            overflow-x: auto; 
            overflow-y: hidden; 
            gap: 15px; 
            padding: 15px 5px; 
            flex: 1; 
            align-items: flex-start; 
            scroll-behavior: smooth;
        }
        .kds-grid::-webkit-scrollbar { height: 8px;}
        .kds-grid::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px;}
        .kds-grid::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px;}
        .kds-grid::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

        /* TICKETS HAUT CONTRASTE */
        .ticket { 
            min-width: 290px; 
            max-width: 290px; 
            flex-shrink: 0; 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
            box-shadow: var(--shadow-subtle); 
            transition: transform 0.2s;
        }

        .ticket-header { background: rgba(0,0,0,0.4); padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .ticket-table { color: #ffffff; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px;}
        .ticket-time { font-size: 0.8rem; color: #ffffff; font-weight: bold; background: rgba(255,255,255,0.1); padding: 4px 8px; border-radius: 4px;}
        
        .ticket-obs { background: rgba(251, 191, 36, 0.1); color: var(--gold); padding: 8px 15px; font-size: 0.85rem; font-weight: bold; border-bottom: 1px solid var(--border); }

        .ticket-item { padding: 12px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        .ticket-item:last-child { border-bottom: none; }
        .ticket-item:hover { background: rgba(255,255,255,0.05); }

        .item-details { display: flex; flex-direction: column; gap: 4px; pointer-events: none; flex: 1;}
        .item-name { font-size: 1rem; font-weight: 800; color: #ffffff; line-height: 1.3;}
        .item-qty { color: var(--accent); font-weight: 900; margin-right: 8px; font-size: 1.1rem; }
        .item-sub-obs { font-size: 0.8rem; color: var(--gold); font-style: italic; font-weight: 700;}

        /* Bouton "Prêt" */
        .btn-ready { background: transparent; border: 2px solid var(--border-strong); color: var(--text-muted); width: 32px; height: 32px; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 1rem; cursor: pointer; transition: all 0.2s; pointer-events: auto; z-index: 10; font-weight: bold;}
        .btn-ready:hover { border-color: var(--accent); color: var(--accent); background: rgba(52, 211, 153, 0.1);}
        .btn-ready:active { transform: scale(0.90); }
        
        .ticket-item.done { opacity: 0.4 !important; text-decoration: line-through; pointer-events: none; background: transparent !important; border-left: none !important;}
        .ticket-item.done .btn-ready { background: var(--accent); border-color: var(--accent); color: #000; pointer-events: none; }

        /* Lignes d'état claires */
        .fired-static { border-left: 4px solid var(--alert) !important; background: rgba(239, 68, 68, 0.05) !important;}
        .fired-late { animation: alert-reclam 1.5s infinite; border-left: 4px solid var(--alert) !important; }
        .suite-static { border-left: 4px solid var(--purple) !important; background: rgba(167, 139, 250, 0.05) !important;}
        .suite-late { animation: alert-suite 1.5s infinite; border-left: 4px solid var(--purple) !important; }

        @keyframes alert-reclam {
            0% { background-color: rgba(239, 68, 68, 0.05); }
            50% { background-color: rgba(239, 68, 68, 0.2); }
            100% { background-color: rgba(239, 68, 68, 0.05); }
        }
        @keyframes alert-suite {
            0% { background-color: rgba(167, 139, 250, 0.05); }
            50% { background-color: rgba(167, 139, 250, 0.2); }
            100% { background-color: rgba(167, 139, 250, 0.05); }
        }

        .priority-badge { position: absolute; top: -6px; left: -6px; background: var(--bg); width: 28px; height: 28px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; border: 2px solid; z-index: 50; font-size: 0.9rem; box-shadow: var(--shadow-subtle); color: #fff;}

        .clickable-title { cursor: pointer; transition: color 0.2s; position: relative; padding-right: 25px; display: inline-block; }
        .clickable-title::after { content: "⚠️"; position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: 0.9rem; opacity: 0.3; transition: 0.2s; }
        .clickable-title:hover { color: var(--alert); }
        .clickable-title:hover::after { opacity: 1; filter: drop-shadow(0 0 5px rgba(239,68,68,0.8)); }

        .drag-handle { font-size: 1.2rem; color: var(--border-strong); padding-right: 12px; cursor: grab; touch-action: none; transition: 0.2s;}
        .drag-handle:active { color: var(--text-main); cursor: grabbing;}

        .ticket.paused { border: 2px dashed var(--alert); opacity: 0.8; background: rgba(239, 68, 68, 0.05);}
        .ticket.paused .ticket-item { pointer-events: none; filter: grayscale(100%); }
        .pause-banner { background: var(--alert); color: #fff; text-align: center; font-weight: 900; padding: 6px; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; animation: pulse-pause 2s infinite; }
        @keyframes pulse-pause { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }

        .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-effect-heavy 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); background-color: rgba(255, 255, 255, 0.3); pointer-events: none; z-index: 9999; }
        @keyframes ripple-effect-heavy { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(6); opacity: 0; } }

        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(6, 9, 15, 0.9); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.open { display: flex !important; }
        .btn-alerte-massive { width: 100%; padding: 15px; margin-bottom: 12px; font-size: 1rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; border-radius: 6px; cursor: pointer; border: 1px solid; transition: all 0.2s; background: var(--panel); color: var(--text-main); }
        .btn-alerte-massive:hover { filter: brightness(1.2); transform: translateY(-1px); }
        .btn-alerte-massive:active { transform: scale(0.98); }

        #toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 999999; display: flex; flex-direction: column; gap: 10px; pointer-events: none; }
        .kds-toast { background: var(--accent); color: #000; padding: 12px 25px; border-radius: 8px; font-weight: 900; font-size: 1rem; box-shadow: var(--shadow-deep); animation: dropDownToast 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94), fadeOutToast 0.5s ease-in 2.5s forwards; text-transform: uppercase; letter-spacing: 1px;}
        @keyframes dropDownToast { from { transform: translateY(-100px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        @keyframes fadeOutToast { to { opacity: 0; transform: translateY(-20px); } }

        .undo-bar { background: transparent; display: flex; gap: 10px; overflow-x: auto; white-space: nowrap; margin-bottom: 15px; flex-shrink: 0;}
        .undo-bar::-webkit-scrollbar { display: none; }
        .undo-item { background: var(--panel); border: 1px solid var(--border); color: var(--text-main); padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: 0.2s; }
        .undo-item:hover { color: var(--alert); border-color: var(--alert); }

        /* INPUTS SOBRES */
        input[type="text"], input[type="number"], textarea, select { background: var(--bg); border: 1px solid var(--border-strong); color: var(--text-main); padding: 10px 15px; border-radius: 6px; outline: none; font-family: 'Inter', sans-serif; transition: all 0.2s; font-size: 1rem;}
        input:focus, textarea:focus, select:focus { border-color: var(--gold); }
        .btn-del { background: transparent; border: none; color: var(--text-muted); width: 35px; height: 35px; border-radius: 4px; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: all 0.2s;}
        .btn-del:hover { color: var(--alert); }
        .btn-add { background: var(--text-main); color: var(--bg); border: none; padding: 12px 20px; font-weight: 800; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}

        @media (max-width: 850px) {
            body { overflow-y: auto; height: auto; }
            .header-left { flex-wrap: wrap; justify-content: center; width: 100%; gap: 10px;}
            .nav-btns { flex-wrap: nowrap; overflow-x: auto; padding-bottom: 2px; justify-content: flex-start; gap: 10px; width: 100%;}
            .nav-btn { font-size: 0.75rem; }
            .lane-wrapper { min-height: 250px; } 
        }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="recap-modal" class="modal">
        <div style="background:var(--panel); padding:25px; border-radius:12px; width: 600px; max-width: 95%; max-height: 90vh; display: flex; flex-direction: column; border: 1px solid var(--border-strong); box-shadow: var(--shadow-deep);">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border-strong); padding-bottom: 15px; margin-bottom: 15px;">
                <h2 style="color:var(--text-main); font-size: 1.3rem; margin: 0; text-transform: uppercase; letter-spacing: 1px;">🧮 SYNTHÈSE DE PRODUCTION</h2>
                <button class="nav-btn" style="color: var(--text-muted);" onclick="closeRecapModal()">✕ FERMER</button>
            </div>
            <div id="recap-content" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:10px; padding-right: 5px;"></div>
        </div>
    </div>

    <div id="kds-config-modal" class="modal">
        <div style="background:var(--panel); padding:25px; border-radius:12px; width: 550px; max-width: 95%; border: 1px solid var(--border-strong); box-shadow: var(--shadow-deep); max-height: 90vh; display: flex; flex-direction: column;">
            <h2 style="color:var(--text-main); margin-top:0; border-bottom: 1px solid var(--border-strong); padding-bottom: 15px; font-size: 1.3rem; text-transform: uppercase; letter-spacing: 1px;">⚙️ Configuration du Pass</h2>
            
            <div style="margin-bottom: 15px; padding: 10px 0;">
                <label style="color:var(--text-muted); font-weight:800; display:block; margin-bottom:8px; text-transform: uppercase; font-size: 0.8rem;">Sens d'arrivée des Suites :</label>
                <select id="cfg-direction" style="width:100%; cursor: pointer;">
                    <option value="ltr">⬅️ Urgences à GAUCHE</option>
                    <option value="rtl">Urgences à DROITE ➡️</option>
                </select>
            </div>

            <h3 style="color:var(--text-main); font-size:1rem; margin-bottom:10px;">Vos Étages</h3>
            <div id="kds-config-list" style="flex: 1; overflow-y: auto; padding-right: 5px; margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px;"></div>
            
            <button class="btn-alerte-massive" style="background: transparent; border-color: var(--border-strong); color: var(--text-muted);" onclick="addKdsConfigLane()">+ AJOUTER UN ÉTAGE</button>
            
            <div style="display:flex; gap:10px; margin-top:15px;">
                <button class="btn-alerte-massive" style="margin:0; flex:1; background: var(--text-main); color: var(--bg);" onclick="saveKdsConfig()">ENREGISTRER</button>
                <button class="btn-alerte-massive" style="margin:0; flex:1; background: transparent; border-color: var(--border-strong);" onclick="closeKdsConfig()">ANNULER</button>
            </div>
        </div>
    </div>

    <div id="chef-alert-modal" class="modal">
        <div class="modal-shake" style="background:var(--panel); padding:35px; border-radius:12px; width: 90%; max-width: 450px; text-align: center; border: 2px solid var(--alert); box-shadow: var(--shadow-deep);">
            <h2 style="color:var(--alert); font-size: 1.6rem; margin-top:0; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px;">⚠️ URGENCE TABLE <span id="alert-table-id"></span></h2>
            <button class="btn-alerte-massive" style="border-color:var(--alert); color:var(--alert);" onclick="sendAlertToSalle('🚨 VIENS AU PASSE')">VIENS AU PASSE</button>
            <button class="btn-alerte-massive" style="border-color:var(--orange); color:var(--orange);" onclick="sendAlertToSalle('❓ INFO MANQUANTE')">INFO MANQUANTE</button>
            <button class="btn-alerte-massive" style="border-color:var(--purple); color:var(--purple);" onclick="sendAlertToSalle('❌ RUPTURE DE STOCK')">RUPTURE DE STOCK</button>
            <button class="btn-alerte-massive" style="border-color:transparent; color:var(--text-muted); margin-top:15px;" onclick="closeAlertModal()">ANNULER</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <h1 class="logo-text">LE PASS</h1>
            <div id="clock" class="clock">00:00</div>
            
            <button class="btn-call-salle" onclick="callService()">🛎️ Appel Salle</button>
            <button class="nav-btn recap" onclick="openRecapModal()">Synthèse</button>
            
            <div id="resa-ticker" class="resa-ticker" onclick="openResaDetailsModal()">
                <span id="resa-text" class="ticker-text">...</span>
            </div>
        </div>
        <div class="nav-btns">
            <button class="nav-btn active" id="tab-kds" onclick="switchTab('kds')">BONS</button>
            <button class="nav-btn" id="tab-history" onclick="switchTab('history')">HISTO</button>
            <button class="nav-btn" id="tab-menu" onclick="switchTab('menu')">STOCKS</button>
            <button class="nav-btn" id="tab-staff" onclick="switchTab('staff')">STAFF</button>
            <button class="nav-btn" onclick="openKdsConfig()">CONFIG</button>
        </div>
    </header>

    <div id="mod-kds" class="module active">
        <div class="kds-scroll-area" id="kds-lanes-container"></div>
    </div>

    <div id="mod-history" class="module" style="padding: 20px;">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border-strong); padding-bottom: 15px; margin-bottom: 20px;">
            <h2 style="color:var(--text-main); font-size: 1.2rem; letter-spacing: 1px; margin:0; text-transform: uppercase;">Historique</h2>
        </div>
        <div class="undo-bar" id="undo-bar" style="display: none;"></div>
        <div id="history-container" style="display: flex; flex-direction: column; gap: 15px; flex: 1; overflow-y: auto;">
            <div style="color: var(--text-muted); font-size:0.9rem;">Synchronisation...</div>
        </div>
    </div>

    <div id="mod-menu" class="module" style="padding: 20px;">
        <h2 style="color:var(--text-main); font-size: 1.2rem; letter-spacing: 1px; margin:0; border-bottom: 1px solid var(--border-strong); padding-bottom: 15px; text-transform: uppercase;">Stocks Minute</h2>
        <div id="menu-stock-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; align-content: start; overflow-y: auto; padding-bottom: 50px;"></div>
    </div>

    <div id="mod-staff" class="module" style="padding: 20px;">
        <h2 style="color:var(--text-main); font-size: 1.2rem; letter-spacing: 1px; margin:0; border-bottom: 1px solid var(--border-strong); padding-bottom: 15px; text-transform: uppercase;">Staff</h2>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px; overflow-y: auto; padding-bottom: 20px;">
            <textarea id="staff-lun" style="min-height: 100px;"></textarea><textarea id="staff-mar" style="min-height: 100px;"></textarea><textarea id="staff-mer" style="min-height: 100px;"></textarea><textarea id="staff-jeu" style="min-height: 100px;"></textarea><textarea id="staff-ven" style="min-height: 100px;"></textarea><textarea id="staff-sam" style="min-height: 100px;"></textarea><textarea id="staff-dim" style="min-height: 100px;"></textarea>
        </div>
        <button class="btn-add" style="width: 100%; margin-top: 15px;" onclick="saveStaffPlanning()">Sauvegarder</button>
    </div>

    <script>
        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    let url = (window.location.protocol === 'file:') ? 'https://tableau-system.onrender.com/get-current-state' : '/get-current-state';
                    let r = await fetch(url);
                    if(r.ok) state = await r.json();
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            },
            update: async (key, data) => {
                let isOrder = !key.includes('MASTER') && !key.includes('ARCHIVE') && !key.includes('SUPPLIER') && !key.includes('PLANNING') && !key.includes('MENU');
                let payload = isOrder ? data : { data: data };
                
                let state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                if (data === null) delete state.activeOrders[key];
                else state.activeOrders[key] = payload;
                localStorage.setItem('EMPIRE_GLOBAL_SYNC', JSON.stringify(state));
                
                let url = (window.location.protocol === 'file:') ? 'https://tableau-system.onrender.com/update-order' : '/update-order';
                try {
                    await fetch(url, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ tableId: key, order: data === null ? null : payload }) 
                    });
                } catch(e) {}
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'EMPIRE_GLOBAL_SYNC') {
                fetchSystemState();
                renderKDS();
            }
        });

        // 🟢 CONFIGURATION DES RAILS & DIRECTION
        const DEFAULT_LANE_COLORS = ['#34d399', '#fbbf24', '#a78bfa', '#60a5fa', '#f87171', '#fb923c', '#e879f9'];
        
        let kdsConfig = JSON.parse(localStorage.getItem('empire_kds_config')) || [
            { id: 1, name: "ENTRÉES", color: "#34d399", timer: 15 },
            { id: 2, name: "PLATS", color: "#fbbf24", timer: 20 },
            { id: 3, name: "DESSERTS", color: "#a78bfa", timer: 10 }
        ];
        
        let kdsDirection = localStorage.getItem('empire_kds_direction') || 'ltr';
        let tempKdsConfig = [];

        function buildKdsLanesDOM() {
            const container = document.getElementById('kds-lanes-container');
            if(!container) return;
            let flexDir = kdsDirection === 'rtl' ? 'row-reverse' : 'row';

            container.innerHTML = kdsConfig.map(lane => `
                <div class="lane-wrapper">
                    <div class="lane-header" style="border-bottom-color: ${lane.color};">
                        <span style="color: ${lane.color};">${lane.name}</span>
                        <span style="font-size:0.8rem; color:var(--text-muted); display:flex; align-items:center; gap:8px; text-transform:none; letter-spacing:0;">
                            <input type="number" onchange="updateLaneTimerInline(${lane.id}, this.value)" class="timer-input" value="${lane.timer}"> min
                        </span>
                    </div>
                    <div id="kds-grid-${lane.id}" class="kds-grid" style="flex-direction: ${flexDir};"></div>
                </div>
            `).join('');
        }

        function updateLaneTimerInline(id, val) {
            let num = parseInt(val);
            if (!isNaN(num) && num > 0) {
                let lane = kdsConfig.find(l => l.id === id);
                if (lane) {
                    lane.timer = num;
                    localStorage.setItem('empire_kds_config', JSON.stringify(kdsConfig));
                    renderKDS();
                }
            }
        }

        function openKdsConfig() {
            tempKdsConfig = JSON.parse(JSON.stringify(kdsConfig)); 
            document.getElementById('cfg-direction').value = kdsDirection; 
            renderKdsConfigList();
            document.getElementById('kds-config-modal').classList.add('open');
        }

        function closeKdsConfig() {
            document.getElementById('kds-config-modal').classList.remove('open');
        }

        function renderKdsConfigList() {
            let html = '';
            tempKdsConfig.forEach((cfg, index) => {
                html += `
                <div style="display:flex; gap:10px; align-items:center; border-bottom: 1px solid var(--border-strong); padding-bottom: 10px;">
                    <span style="color:var(--text-muted); font-size: 0.9rem; font-weight:bold;">${index+1}.</span>
                    <input type="text" id="cfg-name-${index}" value="${cfg.name}" style="flex:2;" onchange="tempKdsConfig[${index}].name = this.value">
                    <div style="display:flex; align-items:center; gap:5px;">
                        <input type="number" id="cfg-timer-${index}" value="${cfg.timer}" style="width:60px;" onchange="tempKdsConfig[${index}].timer = parseInt(this.value) || 15">
                        <span style="font-size:0.8rem; color:var(--text-muted);">min</span>
                    </div>
                    <button class="btn-del" onclick="removeKdsConfigLane(${index})">✖</button>
                </div>`;
            });
            document.getElementById('kds-config-list').innerHTML = html;
        }

        function addKdsConfigLane() {
            if (tempKdsConfig.length >= 7) return alert("Maximum atteint.");
            let newId = tempKdsConfig.length > 0 ? Math.max(...tempKdsConfig.map(l => l.id)) + 1 : 1;
            let color = DEFAULT_LANE_COLORS[tempKdsConfig.length % DEFAULT_LANE_COLORS.length];
            tempKdsConfig.push({ id: newId, name: `ÉTAGE ${tempKdsConfig.length + 1}`, color: color, timer: 15 });
            renderKdsConfigList();
        }

        function removeKdsConfigLane(index) {
            if (tempKdsConfig.length <= 1) return alert("Au moins 1 étage requis.");
            tempKdsConfig.splice(index, 1);
            renderKdsConfigList();
        }

        function saveKdsConfig() {
            kdsDirection = document.getElementById('cfg-direction').value;
            localStorage.setItem('empire_kds_direction', kdsDirection);

            tempKdsConfig.forEach((cfg, index) => {
                let nameInput = document.getElementById(`cfg-name-${index}`);
                let timerInput = document.getElementById(`cfg-timer-${index}`);
                if(nameInput) cfg.name = nameInput.value || `ÉTAGE ${index+1}`;
                if(timerInput) cfg.timer = parseInt(timerInput.value) || 15;
            });
            
            kdsConfig = JSON.parse(JSON.stringify(tempKdsConfig));
            localStorage.setItem('empire_kds_config', JSON.stringify(kdsConfig));
            closeKdsConfig();
            
            buildKdsLanesDOM(); 
            renderKDS(); 
            showToast("Configuration enregistrée");
        }


        let activeOrders = {};
        let tableInAlert = null;
        let isDragging = false;
        let dragItemData = null;
        let dragClone = null;
        let recentlyDoneItems = [];
        try { recentlyDoneItems = JSON.parse(localStorage.getItem('empire_recently_done')) || []; } catch(e){}
        let reservationsData = [];

        setInterval(() => { 
            let d = new Date();
            document.getElementById('clock').innerText = d.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}); 
            if (!isDragging && document.getElementById('mod-kds').classList.contains('active')) {
                renderKDS(); 
            }
        }, 1000);

        setInterval(fetchSystemState, 2000); 

        async function fetchSystemState() {
            if (isDragging) return; 
            try {
                const state = await API.getState();
                if (state && state.activeOrders) {
                    activeOrders = state.activeOrders;
                    if (activeOrders['RESERVATIONS_MASTER']) {
                        reservationsData = Array.isArray(activeOrders['RESERVATIONS_MASTER'].data) ? activeOrders['RESERVATIONS_MASTER'].data : [];
                        updateResaTicker();
                    }
                }
            } catch (e) {}
        }

        function updateResaTicker() {
            let coversMidi = 0, coversSoir = 0;
            let todayStr = new Date().toISOString().split('T')[0];
            reservationsData.forEach(r => {
                if(r.date === todayStr && r.status !== 'rejected') {
                    let pax = parseInt(r.couverts) || parseInt(r.pax) || 0;
                    if((r.time||"00:00") < "16:00") coversMidi += pax; else coversSoir += pax;
                }
            });
            document.getElementById('resa-text').innerText = `MIDI: ${coversMidi} | SOIR: ${coversSoir}`;
        }

        // 🧮 RÉCAPITULATIF PROD
        function openRecapModal() { buildRecap(); document.getElementById('recap-modal').classList.add('open'); }
        function closeRecapModal() { document.getElementById('recap-modal').classList.remove('open'); }

        function buildRecap() {
            let totals = {}; kdsConfig.forEach(c => totals[c.id] = {});

            for (let tableId in activeOrders) {
                if (tableId.includes('MASTER') || tableId.includes('ARCHIVE') || tableId.includes('BAR') || tableId.includes('CUISINE') || tableId.includes('ALERTS')) continue;
                let orderData = activeOrders[tableId];
                if (!orderData || !orderData.items) continue;

                orderData.items.forEach(item => {
                    if (!item.done && (!item.dest || item.dest.toLowerCase() !== 'bar')) {
                        let cId = determineCourse(item);
                        if (!totals[cId]) totals[cId] = {};
                        let name = item.n.replace(/\[BR\]/g, ' ').trim();
                        let qty = parseInt(item.qty) || 1;
                        if (!totals[cId][name]) totals[cId][name] = 0;
                        totals[cId][name] += qty;
                    }
                });
            }

            let html = '';
            kdsConfig.forEach(cfg => {
                let itemsKeys = Object.keys(totals[cfg.id] || {});
                if (itemsKeys.length > 0) {
                    html += `<h3 style="color:${cfg.color}; margin: 10px 0 5px 0; border-bottom: 1px solid var(--border-strong); padding-bottom: 5px; font-size:1rem; text-transform:uppercase;">${cfg.name}</h3>`;
                    itemsKeys.sort((a, b) => totals[cfg.id][b] - totals[cfg.id][a]); 
                    itemsKeys.forEach(k => {
                        html += `
                        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border); padding: 8px 0; margin-bottom: 2px;">
                            <span style="font-size: 1rem; color:var(--text-main); font-weight:bold;">${k}</span>
                            <span style="color:var(--accent); font-weight:900; font-size: 1.1rem; background:rgba(52,211,153,0.1); padding:2px 8px; border-radius:4px;">${totals[cfg.id][k]}x</span>
                        </div>`;
                    });
                }
            });

            if(html === '') html = '<div style="text-align:center; color:var(--text-muted); font-style:italic; padding: 20px; font-size: 1rem;">Cuisine vide.</div>';
            document.getElementById('recap-content').innerHTML = html;
        }

        // ALERTE TABLE
        function openAlertModal(tableLabel) {
            tableInAlert = tableLabel;
            document.getElementById('alert-table-id').innerText = tableLabel;
            document.getElementById('chef-alert-modal').classList.add('open');
        }
        function closeAlertModal() { tableInAlert = null; document.getElementById('chef-alert-modal').classList.remove('open'); }

        async function sendAlertToSalle(message) {
            if (!tableInAlert) return;
            let order = activeOrders[tableInAlert];
            if (order) {
                order.alerteRouge = message; 
                await API.update(tableInAlert, order); 
                renderKDS(); 
            }
            closeAlertModal();
        }

        async function clearAlert(tableId) {
            let order = activeOrders[tableId];
            if (order) {
                order.alerteRouge = null; 
                await API.update(tableId, order);
                renderKDS(); 
            }
        }

        async function callService() {
            showToast("APPEL ENVOYÉ À LA SALLE");
            try { await API.update('ALERTS_MASTER', { type: 'RING', message: 'LE CHEF DEMANDE LA SALLE AU PASSE', timestamp: Date.now() }); } catch(e) {}
        }

        function markItemReady(tableId, itemIndex, currentEvent) {
            currentEvent.stopPropagation(); 
            setTimeout(async () => {
                if (!activeOrders[tableId] || !activeOrders[tableId].items[itemIndex]) return;
                let item = activeOrders[tableId].items[itemIndex];
                item.done = true; 
                recentlyDoneItems.unshift({ tableId, itemIndex, name: item.n, time: Date.now() });
                if (recentlyDoneItems.length > 10) recentlyDoneItems.pop(); 
                localStorage.setItem('empire_recently_done', JSON.stringify(recentlyDoneItems));
                await API.update(tableId, activeOrders[tableId]);
                renderKDS();
            }, 50);
        }

        function determineCourse(item) {
            if (item.course !== undefined && item.course !== null && item.course !== "") {
                let pCourse = parseInt(item.course);
                if (kdsConfig.find(c => c.id === pCourse)) return pCourse;
            }
            let n = (item.n || "").toLowerCase();
            let firstLaneId = kdsConfig[0].id;
            let lastLaneId = kdsConfig[kdsConfig.length - 1].id;
            let middleLaneId = kdsConfig.length > 1 ? kdsConfig[1].id : firstLaneId; 
            
            if (/\b(entrée|entree|salade|soupe|planche|tapas|tartare|carpaccio|foie gras|huitres|huîtres|amuse|mise en bouche)\b/i.test(n)) return firstLaneId;
            if (/\b(dessert|glace|gâteau|gateau|tarte|tiramisu|mousse|fondant|crème|creme|sorbet|café gourmand|cafe gourmand)\b/i.test(n)) return lastLaneId;
            return middleLaneId;
        }

        function renderKDS() {
            let lanes = {};
            kdsConfig.forEach(c => lanes[c.id] = []);

            for (let tableId in activeOrders) {
                if (tableId.includes('MASTER') || tableId.includes('ARCHIVE') || tableId.includes('BAR') || tableId.includes('CUISINE') || tableId.includes('ALERTS')) continue;
                let orderData = activeOrders[tableId];
                if (!orderData || !orderData.items) continue;

                let pendingItems = orderData.items.filter(item => !item.done && (!item.dest || item.dest.toLowerCase() !== 'bar'));
                if (pendingItems.length === 0) continue;

                let groupedItems = {}; kdsConfig.forEach(c => groupedItems[c.id] = []);
                
                pendingItems.forEach(item => {
                    let targetId = determineCourse(item);
                    if(!groupedItems[targetId]) targetId = kdsConfig[0].id; 
                    groupedItems[targetId].push(item);
                });

                kdsConfig.forEach((cfg, index) => {
                    let cList = groupedItems[cfg.id];
                    if (cList.length === 0) return;
                    
                    let hasFired = cList.some(i => i.fired);
                    let oldestTime = Math.min(...cList.map(i => i.itemId || Date.now()));
                    let priorityLevel = 1; let isSuite = false; let isDirect = false;

                    if (index > 0) {
                        let prevLaneId = kdsConfig[index-1].id;
                        let prevItemsTotal = orderData.items.filter(i => (!i.dest || i.dest.toLowerCase() !== 'bar') && determineCourse(i) === prevLaneId);
                        let prevDone = prevItemsTotal.length > 0 && prevItemsTotal.every(i => i.done);
                        let isDirectly = prevItemsTotal.length === 0;

                        if (prevDone) { priorityLevel = 4; isSuite = true; }
                        else if (isDirectly) { priorityLevel = 2; isDirect = true; }
                        else if (hasFired) { priorityLevel = 3; }
                    } else {
                        if (hasFired) priorityLevel = 3;
                    }
                    lanes[cfg.id].push({ tableId, orderData, items: cList, priorityLevel, time: oldestTime, isDirect, isSuite });
                });
            }

            kdsConfig.forEach(cfg => { lanes[cfg.id].sort((a, b) => { if (b.priorityLevel !== a.priorityLevel) return b.priorityLevel - a.priorityLevel; return a.time - b.time; }); });

            let buildLaneHtml = (laneData, laneConfig) => {
                let html = '';
                let thresholdMs = (laneConfig.timer || 15) * 60000;

                laneData.forEach((ticket, idx) => {
                    let { tableId, orderData, items, priorityLevel, isDirect, isSuite } = ticket;
                    let isWeb = orderData.isWeb || tableId.startsWith('order_');
                    let tableTitle = isWeb ? `📱 WEB #${orderData.id || ''}` : `T.${tableId}`;
                    let isPaused = !!orderData.alerteRouge;
                    let badgeColor = priorityLevel === 4 ? '#ec4899' : (priorityLevel === 3 ? 'var(--alert)' : (priorityLevel === 2 ? 'var(--ordered)' : 'var(--text-muted)'));

                    let tHtml = `<div class="ticket ${isPaused ? 'paused' : ''}">
                        <div class="ticket-header" style="${isWeb ? 'background:rgba(248,113,113,0.1);' : ''}">
                            <span class="ticket-table clickable-title" onclick="${isPaused ? `clearAlert('${tableId}')` : `openAlertModal('${tableId}')`}">${tableTitle}</span>
                            <span class="ticket-time">${orderData.time || ''}</span>
                        </div>`;
                    
                    if (isPaused) tHtml += `<div class="pause-banner">${orderData.alerteRouge}</div>`;
                    else if (orderData.observations) tHtml += `<div class="ticket-obs">${orderData.observations}</div>`;

                    tHtml += `<div class="priority-badge" style="color:${badgeColor}; border-color:${badgeColor};">${idx+1}</div>`;

                    items.forEach((item) => {
                        let realIndex = orderData.items.findIndex(i => i.id === item.id);
                        let isFired = item.fired === true;
                        let timeWaiting = isFired ? (Date.now() - (item.firedTime || item.itemId || Date.now())) : (Date.now() - (item.itemId || Date.now()));
                        
                        let isLate = timeWaiting > thresholdMs;
                        let isFirstLane = laneConfig.id === kdsConfig[0].id;
                        let isActive = isFired || isDirect || isSuite || isFirstLane;
                        
                        let rowClass = "";
                        if (isActive) {
                            if (isSuite) rowClass = isLate ? "suite-late" : "suite-static";
                            else rowClass = isLate ? "fired-late" : "fired-static";
                        }
                        
                        tHtml += `
                        <div class="ticket-item ${rowClass}" style="${!isActive ? 'opacity:0.4;':''}">
                            <div class="drag-handle" onmousedown="startTouchDrag(event, '${tableId}', ${item.id})" ontouchstart="startTouchDrag(event, '${tableId}', ${item.id})">☰</div>
                            <div class="item-details">
                                <div class="item-name"><span class="item-qty">${item.qty||1}x</span>${item.n.replace(/\[BR\]/g, '<br>')}</div>
                                ${item.obs ? `<div class="item-sub-obs">${item.obs}</div>` : ''}
                            </div>
                            <div class="btn-ready" onclick="markItemReady('${tableId}', ${realIndex}, event)">✓</div>
                        </div>`;
                    });
                    tHtml += `</div>`; html += tHtml;
                });
                return html;
            };

            kdsConfig.forEach(cfg => {
                let gridEl = document.getElementById(`kds-grid-${cfg.id}`);
                if(gridEl) {
                    gridEl.innerHTML = buildLaneHtml(lanes[cfg.id], cfg) || `<div style="width:100%; text-align:center; color:var(--text-muted); font-style:italic; padding:20px; font-size:0.9rem; align-self: center;">Vide</div>`;
                }
            });
            renderUndoBar();
        }

        async function undoItemReady(idx) {
            let data = recentlyDoneItems[idx];
            if (activeOrders[data.tableId] && activeOrders[data.tableId].items[data.itemIndex]) {
                activeOrders[data.tableId].items[data.itemIndex].done = false;
                recentlyDoneItems.splice(idx, 1);
                localStorage.setItem('empire_recently_done', JSON.stringify(recentlyDoneItems));
                await API.update(data.tableId, activeOrders[data.tableId]);
                renderKDS();
            }
        }

        function renderUndoBar() {
            const bar = document.getElementById('undo-bar'); if(!bar) return;
            recentlyDoneItems = recentlyDoneItems.filter(i => (Date.now() - i.time) < 300000);
            if (recentlyDoneItems.length === 0) { bar.style.display = 'none'; return; }
            bar.style.display = 'flex';
            bar.innerHTML = recentlyDoneItems.map((it, idx) => `<div class="undo-item" onclick="undoItemReady(${idx})">↩️ T.${it.tableId} : ${it.name.replace(/\[BR\]/g, ' ')}</div>`).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => !b.classList.contains('haccp') && !b.classList.contains('recap') && b.classList.remove('active'));
            document.getElementById('mod-'+tab)?.classList.add('active');
            document.getElementById('tab-'+tab)?.classList.add('active');
        }

        function showToast(msg) {
            let t = document.createElement('div'); t.className = 'kds-toast'; t.innerText = msg;
            document.getElementById('toast-container').appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        function startTouchDrag(e, tableId, itemId) {
            isDragging = true; dragItemData = { tableId, itemId };
            let target = e.currentTarget.closest('.ticket-item');
            dragClone = target.cloneNode(true);
            dragClone.style.position = 'fixed'; dragClone.style.zIndex = '999999'; dragClone.style.opacity = '0.9'; dragClone.style.width = target.offsetWidth + 'px'; dragClone.style.pointerEvents = 'none';
            document.body.appendChild(dragClone); moveTouchDrag(e);
        }
        function moveTouchDrag(e) {
            if (!isDragging || !dragClone) return;
            let touch = e.touches ? e.touches[0] : e;
            dragClone.style.left = (touch.clientX - 30) + 'px'; dragClone.style.top = (touch.clientY - 30) + 'px';
            document.querySelectorAll('.kds-grid').forEach(g => g.classList.remove('drag-over'));
            let dropZone = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.kds-grid');
            if(dropZone) dropZone.classList.add('drag-over');
        }
        async function endTouchDrag(e) {
            if (!isDragging || !dragClone) return;
            let touch = e.changedTouches ? e.changedTouches[0] : e;
            let dropZone = document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.kds-grid');
            
            if (dropZone && dragItemData) {
                let newCourseId = parseInt(dropZone.id.replace('kds-grid-', ''));
                if (!isNaN(newCourseId)) {
                    let order = activeOrders[dragItemData.tableId];
                    let item = order?.items.find(i => i.id == dragItemData.itemId);
                    if (item) { 
                        item.course = newCourseId; 
                        await API.update(dragItemData.tableId, order); 
                        renderKDS(); 
                    }
                }
            }
            dragClone.remove(); dragClone = null; isDragging = false;
            document.querySelectorAll('.kds-grid').forEach(g => g.classList.remove('drag-over'));
        }
        document.addEventListener('mousemove', moveTouchDrag); document.addEventListener('touchmove', moveTouchDrag, {passive:false});
        document.addEventListener('mouseup', endTouchDrag); document.addEventListener('touchend', endTouchDrag);

        async function boot() { 
            buildKdsLanesDOM();
            await fetchSystemState(); 
            renderKDS(); 
        }
        boot();
    </script>
</body>
</html>
