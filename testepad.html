<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChef - Centre de Commandement (Chef)</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; --ordered: #2979ff;}
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .nav-master { background: var(--panel); padding: 15px 20px; display: flex; gap: 15px; border-bottom: 2px solid #333; align-items: center; z-index: 100; justify-content: space-between; flex-wrap: wrap;}
        .logo-text { color: var(--gold); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .nav-btn { background: transparent; border: 1px solid #333; color: #ccc; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.8rem; text-transform: uppercase; transition: 0.2s;}
        .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255, 179, 0, 0.05); }
        .nav-btn.export { border-color: var(--ordered); color: var(--ordered); background: rgba(41, 121, 255, 0.1); }
        .nav-btn.export:active { background: var(--ordered); color: #fff; }
        
        .module { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .module.active { display: flex; }
        
        /* GRID 5 COLONNES POUR LE MENU COMPLET */
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; width: 100%; align-items: start; }
        
        .menu-category { background: var(--panel); border-radius: 8px; border: 1px solid #222; display: flex; flex-direction: column; max-height: 100%; }
        .category-header { background: #1a1a1a; padding: 15px; border-bottom: 2px solid var(--gold); font-weight: 900; font-size: 1rem; text-transform: uppercase; text-align: center; color: var(--gold); display: flex; justify-content: space-between; align-items: center;}
        .category-header.special { border-color: var(--accent); color: var(--accent); background: rgba(0, 230, 118, 0.05); }
        
        .item-list { padding: 10px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; max-height: 400px; }
        
        .menu-item { background: #0a0a0a; border: 1px solid #333; padding: 12px 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .item-name { font-weight: bold; font-size: 0.9rem; color: #eee; flex: 1; }
        .item-price { color: var(--accent); font-weight: 900; margin-left: 10px; margin-right: 10px; }
        .btn-del { background: rgba(255, 23, 68, 0.1); border: none; color: var(--alert); width: 30px; height: 30px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s;}
        .btn-del:active { background: var(--alert); color: #fff; }
        
        .add-row { display: flex; flex-wrap: wrap; gap: 5px; padding: 15px; background: #0a0a0a; border-top: 1px solid #222; border-radius: 0 0 8px 8px;}
        input, select, textarea { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 4px; outline: none; font-size: 0.9rem; font-family: 'Inter', sans-serif; box-sizing: border-box;}
        input:focus, select:focus, textarea:focus { border-color: var(--gold); }
        .add-btn { background: #222; color: var(--gold); border: 1px solid #444; padding: 10px; font-weight: 900; border-radius: 4px; cursor: pointer; flex-grow: 1; transition: 0.2s; }
        .add-btn:active { background: var(--gold); color: #000; }
        
        /* MICROPHONE CSS */
        .btn-mic { background: #1a1a1a; border: 1px solid #444; color: #ccc; border-radius: 4px; padding: 0 15px; font-weight: bold; cursor: pointer; transition: 0.2s; white-space: nowrap; display: flex; align-items: center; justify-content: center;}
        .btn-mic:hover { border-color: var(--gold); color: var(--gold); }
        .btn-mic.recording { background: rgba(255, 23, 68, 0.2); border-color: var(--alert); color: var(--alert); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0.4); } 70% { box-shadow: 0 0 0 10px rgba(255, 23, 68, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 23, 68, 0); } }

        .sync-status { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .sync-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--alert); box-shadow: 0 0 8px var(--alert); }
        .sync-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        #print-zone { display: none; }
        @media print { body { background:#fff!important; color:#000!important; display:block; margin: 0; padding: 0;} body > *:not(#print-zone) { display: none !important; } #print-zone { display: block !important; width: 100%; font-family: sans-serif; } }
    </style>
</head>
<body>
    <div id="print-zone"></div>

    <div class="nav-master">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="logo.png" alt="iChef" style="height: 35px; filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.5));" onerror="this.style.display='none';">
            <h1 class="logo-text">ichef.ch</h1>
            <span style="color:#555; font-weight:bold; font-size:0.8rem; border-left: 1px solid #333; padding-left:20px;">BACK-OFFICE CHEF</span>
        </div>
        <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
            <button class="nav-btn active" id="tab-menu" onclick="switchTab('menu')">📋 ORGANISER LA CARTE</button>
            <button class="nav-btn" style="border-color: #ffb300; color: #ffb300;" id="tab-recettes" onclick="switchTab('recettes')">🍳 FICHES & DICTÉE</button>
            <div class="sync-status" style="margin: 0 15px;"><div id="sync-dot" class="sync-dot"></div> <span id="sync-text">Déconnecté</span></div>
            <button class="nav-btn export" id="btn-print-menu" onclick="exportToMobile()">📱 EXPORTER PDF</button>
        </div>
    </div>

    <div id="mod-menu" class="module active">
        <div class="grid-menu">
            
            <div class="menu-category">
                <div class="category-header special">MENU DU JOUR <span id="count-menuJour">0</span></div>
                <div class="item-list" id="list-menuJour"></div>
                <div class="add-row">
                    <input type="text" id="add-name-menuJour" placeholder="Plat ou Formule..." style="width:100%;">
                    <input type="number" id="add-price-menuJour" placeholder="Prix €" step="0.5" style="width:40%;">
                    <button class="add-btn" onclick="addMenuItem('menuJour')">➕ AJOUTER</button>
                </div>
            </div>

            <div class="menu-category">
                <div class="category-header special">SUGGESTIONS <span id="count-suggestions">0</span></div>
                <div class="item-list" id="list-suggestions"></div>
                <div class="add-row">
                    <input type="text" id="add-name-suggestions" placeholder="Plat suggéré..." style="width:100%;">
                    <input type="number" id="add-price-suggestions" placeholder="Prix €" step="0.5" style="width:40%;">
                    <button class="add-btn" onclick="addMenuItem('suggestions')">➕ AJOUTER</button>
                </div>
            </div>

            <div class="menu-category">
                <div class="category-header">ENTRÉES <span id="count-entrees">0</span></div>
                <div class="item-list" id="list-entrees"></div>
                <div class="add-row">
                    <input type="text" id="add-name-entrees" placeholder="Nom de l'entrée..." style="width:100%;">
                    <input type="number" id="add-price-entrees" placeholder="Prix €" step="0.5" style="width:40%;">
                    <button class="add-btn" onclick="addMenuItem('entrees')">➕</button>
                </div>
            </div>

            <div class="menu-category">
                <div class="category-header">PLATS <span id="count-plats">0</span></div>
                <div class="item-list" id="list-plats"></div>
                <div class="add-row">
                    <input type="text" id="add-name-plats" placeholder="Nom du plat..." style="width:100%;">
                    <input type="number" id="add-price-plats" placeholder="Prix €" step="0.5" style="width:40%;">
                    <button class="add-btn" onclick="addMenuItem('plats')">➕</button>
                </div>
            </div>

            <div class="menu-category">
                <div class="category-header">DESSERTS <span id="count-desserts">0</span></div>
                <div class="item-list" id="list-desserts"></div>
                <div class="add-row">
                    <input type="text" id="add-name-desserts" placeholder="Nom du dessert..." style="width:100%;">
                    <input type="number" id="add-price-desserts" placeholder="Prix €" step="0.5" style="width:40%;">
                    <button class="add-btn" onclick="addMenuItem('desserts')">➕</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mod-recettes" class="module" style="flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px;">
            <h2 style="color:var(--gold); margin:0;">📚 LE GRIMOIRE DU CHEF</h2>
            <div style="display:flex; gap:10px;">
                <input type="file" id="upload-recipes" style="display:none;" accept=".json" onchange="importRecipes(this)">
                <button class="nav-btn" style="border-color:var(--accent); color:var(--accent);" onclick="document.getElementById('upload-recipes').click()">📥 IMPORTER DOSSIER</button>
                <button class="nav-btn export" style="background:#222; color:#fff; border-color:#555;" onclick="exportRecipes()">💾 EXPORTER DOSSIER</button>
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: minmax(350px, 1fr) 2fr; gap: 20px; align-items: start;">
            <div class="menu-category" style="padding:20px;">
                <h3 style="margin-top:0; color:#fff; font-size:1.1rem; border-bottom: 1px dashed #444; padding-bottom: 10px;">Création de Fiche (Clavier ou Dictée)</h3>
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <input type="text" id="rec-name" placeholder="Nom de la recette (ex: Magret)...">
                    <select id="rec-cat">
                        <option value="menuJour" style="color:var(--accent); font-weight:bold;">🔥 Mettre dans : MENU DU JOUR</option>
                        <option value="suggestions" style="color:var(--accent); font-weight:bold;">⭐ Mettre dans : SUGGESTIONS</option>
                        <option value="entrees">Mettre dans : ENTRÉES</option>
                        <option value="plats" selected>Mettre dans : PLATS</option>
                        <option value="desserts">Mettre dans : DESSERTS</option>
                    </select>
                    <input type="number" id="rec-price" placeholder="Prix de vente au menu (€)..." step="0.5">
                    
                    <div style="display:flex; gap:10px; align-items:stretch;">
                        <textarea id="rec-ing" placeholder="Ingrédients..." style="flex:1; min-height: 80px;"></textarea>
                        <button id="mic-ing" class="btn-mic" onclick="startDictation('rec-ing', 'mic-ing')">🎙️ DICTER</button>
                    </div>
                    <div style="display:flex; gap:10px; align-items:stretch;">
                        <textarea id="rec-prep" placeholder="Préparation..." style="flex:1; min-height: 120px;"></textarea>
                        <button id="mic-prep" class="btn-mic" onclick="startDictation('rec-prep', 'mic-prep')">🎙️ DICTER</button>
                    </div>
                    <button class="add-btn" style="width:100%; padding:15px; font-size:0.9rem; margin-top:10px;" onclick="saveRecipe()">➕ SAUVEGARDER & INJECTER AU MENU</button>
                </div>
            </div>
            
            <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px; align-content:start;" id="recipes-list"></div>
        </div>
    </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json()).catch(() => ({activeOrders: {}})),
            update: (key, data) => fetch('/update-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: key, order: { data } }) })
        };

        let menuData = { menuJour: [], suggestions: [], entrees: [], plats: [], desserts: [] };
        let recipesData = [];

        // 🎙️ SYSTÈME DE DICTÉE VOCALE
        function startDictation(inputId, btnId) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SpeechRecognition) return alert("Votre navigateur ne supporte pas la dictée vocale native. Utilisez Chrome ou Safari.");
            const recognition = new SpeechRecognition(); 
            recognition.lang = 'fr-FR'; 
            recognition.interimResults = false;
            
            const btn = document.getElementById(btnId); 
            const input = document.getElementById(inputId);
            
            recognition.start();
            
            recognition.onstart = function() { 
                btn.classList.add('recording'); 
                btn.innerText = "🛑 ÉCOUTE..."; 
            };
            recognition.onresult = function(e) { 
                input.value += (input.value ? " " : "") + e.results[0][0].transcript; 
            };
            recognition.onspeechend = function() { recognition.stop(); };
            recognition.onend = function() { 
                btn.classList.remove('recording'); 
                btn.innerText = "🎙️ DICTER"; 
            };
            recognition.onerror = function() { 
                btn.classList.remove('recording'); 
                btn.innerText = "🎙️ DICTER"; 
                alert("Erreur microphone. Vérifiez vos autorisations."); 
            };
        }

        function switchTab(tab) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { if(b.id.startsWith('tab-')) b.classList.remove('active'); });
            document.getElementById('mod-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            document.getElementById('btn-print-menu').style.display = (tab === 'menu') ? 'block' : 'none';
        }

        async function bootSystem() { 
            await syncMenu(); 
            setInterval(syncMenu, 5000); 
        }

        async function syncMenu() {
            try {
                const state = await API.getState();
                if (state.activeOrders && state.activeOrders['MENU_MASTER']) {
                    menuData = { menuJour: [], suggestions: [], entrees: [], plats: [], desserts: [], ...state.activeOrders['MENU_MASTER'].data };
                }
                if (state.activeOrders && state.activeOrders['RECIPES_MASTER']) {
                    recipesData = state.activeOrders['RECIPES_MASTER'].data;
                }
                
                document.getElementById('sync-dot').classList.add('online');
                document.getElementById('sync-text').innerText = "En Ligne";
                renderMenu(); renderRecipes();
            } catch (error) { 
                document.getElementById('sync-dot').classList.remove('online'); 
                document.getElementById('sync-text').innerText = "Connexion perdue..."; 
            }
        }

        // 📋 GESTION DE LA CARTE
        function renderMenu() {
            ['menuJour', 'suggestions', 'entrees', 'plats', 'desserts'].forEach(category => {
                const listEl = document.getElementById(`list-${category}`);
                document.getElementById(`count-${category}`).innerText = menuData[category].length;
                listEl.innerHTML = menuData[category].map(item => `
                    <div class="menu-item">
                        <span class="item-name">${item.name}</span>
                        <span class="item-price">${parseFloat(item.price).toFixed(2)} €</span>
                        <button class="btn-del" onclick="deleteMenuItem('${category}', ${item.id})">✖</button>
                    </div>
                `).join('');
            });
        }

        async function addMenuItem(category) {
            const nameInput = document.getElementById(`add-name-${category}`); 
            const priceInput = document.getElementById(`add-price-${category}`);
            const name = nameInput.value.trim(); const price = parseFloat(priceInput.value);
            if (!name || isNaN(price)) return;
            menuData[category].push({ id: Date.now(), name: name, price: price });
            nameInput.value = ''; priceInput.value = '';
            renderMenu(); await API.update('MENU_MASTER', menuData);
        }

        async function deleteMenuItem(category, id) {
            menuData[category] = menuData[category].filter(item => item.id !== id);
            renderMenu(); await API.update('MENU_MASTER', menuData);
        }

        // 🍳 GESTION DES FICHES RECETTES
        function renderRecipes() {
            const container = document.getElementById('recipes-list');
            if(recipesData.length === 0) { container.innerHTML = "<p style='grid-column: 1/-1; text-align:center; color:#555;'>Aucune fiche technique enregistrée.</p>"; return; }
            container.innerHTML = recipesData.map(r => `
                <div class="menu-item" style="flex-direction:column; align-items:flex-start; gap:8px; background:#111; padding: 15px; border-color: #222;">
                    <div style="display:flex; justify-content:space-between; width:100%; border-bottom:1px solid #333; padding-bottom:8px;">
                        <span style="color:var(--gold); font-weight:900;">${r.name}</span>
                        <button class="btn-del" style="width:25px; height:25px;" onclick="deleteRecipe(${r.id})">✖</button>
                    </div>
                    <div style="font-size:0.8rem; color:#aaa; width:100%; display:flex; justify-content:space-between;">
                        <span>CAT: <b style="color:#fff;">${r.cat.toUpperCase()}</b></span>
                        <span style="color:var(--accent); font-weight:bold;">${r.price} €</span>
                    </div>
                    <div style="font-size:0.75rem; color:#ccc; background:#000; padding:10px; border-radius:4px; width:100%; box-sizing:border-box;">
                        <b style="color:#888;">Ingrédients clés :</b><br>
                        ${r.ing ? r.ing.substring(0, 80) + (r.ing.length > 80 ? '...' : '') : '<i>Non renseignés</i>'}
                    </div>
                </div>
            `).join('');
        }

        async function saveRecipe() {
            const name = document.getElementById('rec-name').value.trim(); const cat = document.getElementById('rec-cat').value;
            const price = parseFloat(document.getElementById('rec-price').value);
            const ing = document.getElementById('rec-ing').value.trim(); const prep = document.getElementById('rec-prep').value.trim();
            
            if(!name || isNaN(price)) return alert("Le nom et le prix sont obligatoires.");

            const newRecipe = { id: Date.now(), name, cat, price, ing, prep };
            recipesData.unshift(newRecipe);

            // Injection auto
            const existsInMenu = menuData[cat].find(item => item.name.toLowerCase() === name.toLowerCase());
            if(!existsInMenu) { 
                menuData[cat].push({ id: Date.now() + 1, name: name, price: price }); 
                await API.update('MENU_MASTER', menuData); 
                renderMenu(); 
            }

            await API.update('RECIPES_MASTER', recipesData); 
            renderRecipes();
            
            // Reset
            document.getElementById('rec-name').value = ''; document.getElementById('rec-price').value = ''; 
            document.getElementById('rec-ing').value = ''; document.getElementById('rec-prep').value = '';
            alert(`✅ Recette archivée et ajoutée automatiquement au rayon [${cat.toUpperCase()}].`);
        }

        async function deleteRecipe(id) {
            if(confirm("Supprimer cette fiche technique ? (Elle restera sur le Menu public)")) { 
                recipesData = recipesData.filter(r => r.id !== id); 
                renderRecipes(); 
                await API.update('RECIPES_MASTER', recipesData); 
            }
        }

        // 💾 IMPORT / EXPORT
        function exportRecipes() {
            const blob = new Blob([JSON.stringify(recipesData, null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); 
            a.download = `iCHEF_GRIMOIRE_${new Date().toLocaleDateString('fr-FR').replace(/\//g, '-')}.json`; 
            a.click();
        }

        function importRecipes(input) {
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(Array.isArray(imported)) {
                        const existingIds = new Set(recipesData.map(x => x.id));
                        imported.forEach(item => { if(!existingIds.has(item.id)) recipesData.push(item); });
                        await API.update('RECIPES_MASTER', recipesData); 
                        renderRecipes();
                        alert("✅ Grimoire importé avec succès.");
                    }
                } catch(err) { alert("Erreur fichier JSON."); }
            };
            if(input.files[0]) reader.readAsText(input.files[0]); 
            input.value = '';
        }

        function exportToMobile() {
            let html = `<style>body{font-family:sans-serif;} .cat{color:#ffb300; text-transform:uppercase; border-bottom:1px solid #000;} .item{display:flex; justify-content:space-between; margin-bottom:5px;}</style>`;
            html += `<div style="text-align:center; margin-bottom:20px;"><h2>ichef.ch</h2><p>CARTE - ${new Date().toLocaleDateString('fr-FR')}</p></div>`;
            const categories = [{ id: 'menuJour', title: 'Menu du Jour' }, { id: 'suggestions', title: 'Suggestions' }, { id: 'entrees', title: 'Entrées' }, { id: 'plats', title: 'Plats' }, { id: 'desserts', title: 'Desserts' }];
            categories.forEach(cat => {
                if (menuData[cat.id].length > 0) {
                    html += `<h3 class="cat">${cat.title}</h3>`;
                    menuData[cat.id].forEach(item => { html += `<div class="item"><span>${item.name}</span><span>${parseFloat(item.price).toFixed(2)} €</span></div>`; });
                }
            });
            document.getElementById('print-zone').innerHTML = html; window.print();
        }

        bootSystem();
    </script>
</body>
</html>
