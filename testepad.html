<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMPIRE OS - Portail Master</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; --blue: #2979ff; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        .portal-title { color: var(--gold); letter-spacing: 5px; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 50px; text-align: center; }

        /* ÉTAPE 1 : CHOIX */
        #dept-section { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        .dept-card { background: var(--panel); border: 2px solid #333; border-radius: 16px; width: 220px; height: 220px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.2s; }
        .dept-card:active { transform: scale(0.95); border-color: var(--gold); }
        .dept-icon { font-size: 4rem; margin-bottom: 15px; }
        .dept-name { font-size: 1.5rem; font-weight: 900; letter-spacing: 1px; }

        /* ÉTAPE 2 : PIN */
        #pin-section { display: none; flex-direction: column; align-items: center; }
        .pin-display { font-size: 3rem; letter-spacing: 15px; margin-bottom: 30px; color: var(--gold); min-height: 60px; text-align: center; border-bottom: 2px solid #333; width: 200px; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 90px); gap: 15px; }
        .pin-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 2rem; font-weight: bold; width: 90px; height: 90px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center;}
        .pin-btn:active { background: var(--gold); color: #000; }

        /* ÉTAPE 3 : NAVIGATION POST-LOGIN */
        #nav-section { display: none; flex-direction: column; align-items: center; gap: 20px; }
        .nav-choice-btn { width: 350px; padding: 30px; border-radius: 12px; border: 3px solid; background: #111; color: #fff; font-size: 1.5rem; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .nav-choice-btn.work { border-color: var(--gold); color: var(--gold); }
        .nav-choice-btn.haccp { border-color: var(--accent); color: var(--accent); }
        .nav-choice-btn:active { transform: scale(0.98); background: #222; }

        .btn-back { margin-top: 30px; background: transparent; border: none; color: #888; cursor: pointer; font-weight: bold; text-decoration: underline; }
    </style>
</head>
<body>

    <h1 class="portal-title">EMPIRE OS</h1>

    <div id="dept-section">
        <div class="dept-card" onclick="selectDept('CUISINE')"><div class="dept-icon">🔪</div><div class="dept-name">CUISINE</div></div>
        <div class="dept-card" onclick="selectDept('BAR')"><div class="dept-icon">🍸</div><div class="dept-name">BAR</div></div>
        <div class="dept-card" onclick="selectDept('SERVICE')"><div class="dept-icon">🛎️</div><div class="dept-name">SERVICE</div></div>
    </div>

    <div id="pin-section">
        <h2 id="pin-title" style="margin-bottom: 10px; color: var(--gold);">PIN CUISINE</h2>
        <div id="pin-display" class="pin-display"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="addPin(1)">1</button><button class="pin-btn" onclick="addPin(2)">2</button><button class="pin-btn" onclick="addPin(3)">3</button>
            <button class="pin-btn" onclick="addPin(4)">4</button><button class="pin-btn" onclick="addPin(5)">5</button><button class="pin-btn" onclick="addPin(6)">6</button>
            <button class="pin-btn" onclick="addPin(7)">7</button><button class="pin-btn" onclick="addPin(8)">8</button><button class="pin-btn" onclick="addPin(9)">9</button>
            <button class="pin-btn" onclick="clearPin()" style="background:#333;">C</button><button class="pin-btn" onclick="addPin(0)">0</button><button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
        </div>
        <button class="btn-back" onclick="resetPortal()">🔙 Retour au choix</button>
    </div>

    <div id="nav-section">
        <h2 id="nav-welcome" style="margin-bottom: 30px; letter-spacing: 2px;">ACCÈS RECONNU : CUISINE</h2>
        <button id="btn-pad" class="nav-choice-btn work" onclick="goTo('pad')">🚀 Ouvrir mon Pad</button>
        <button class="nav-choice-btn haccp" onclick="goTo('haccp')">📋 Faire mon HACCP</button>
        <button class="btn-back" onclick="resetPortal()">🔒 Déconnexion</button>
    </div>

    <script>
        let currentDept = "";
        let pin = "";
        const CODES = { "SERVICE": "1234", "CUISINE": "5678", "BAR": "4321", "MANAGER": "9999" };
        const FILES = { "SERVICE": "gestionnaire.html", "CUISINE": "production.html", "BAR": "production.html" };

        function selectDept(d) {
            currentDept = d;
            document.getElementById('dept-section').style.display = 'none';
            document.getElementById('pin-section').style.display = 'flex';
            document.getElementById('pin-title').innerText = "PIN " + d;
        }

        function addPin(n) { pin += n; updatePin(); }
        function clearPin() { pin = ""; updatePin(); }
        function updatePin() { document.getElementById('pin-display').innerText = "*".repeat(pin.length); }

        function resetPortal() {
            location.reload();
        }

        function submitPin() {
            if (pin === CODES[currentDept] || pin === CODES["MANAGER"]) {
                document.getElementById('pin-section').style.display = 'none';
                document.getElementById('nav-section').style.display = 'flex';
                document.getElementById('nav-welcome').innerText = "ACCÈS : " + currentDept;
                
                // On ajuste le texte du bouton selon le service
                const btnPad = document.getElementById('btn-pad');
                if(currentDept === 'SERVICE') btnPad.innerText = "🚀 Pad Serveur";
                else if(currentDept === 'BAR') btnPad.innerText = "🚀 Pad Bar";
                else btnPad.innerText = "🚀 Pad Cuisine";
            } else {
                alert("❌ CODE PIN INCORRECT");
                clearPin();
            }
        }

        function goTo(type) {
            if (type === 'haccp') {
                window.location.href = "haccp.html";
            } else {
                window.location.href = FILES[currentDept];
            }
        }
    </script>
</body>
</html>
