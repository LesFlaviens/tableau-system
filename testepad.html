<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACCP EMPIRE - Audit Master</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; --dept-bg: #1a1a1a; --ordered: #2979ff;}
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        /* NAVIGATION */
        .nav-haccp { background: var(--panel); padding: 10px 20px; display: flex; gap: 10px; border-bottom: 1px solid #333; align-items: center; z-index: 100; }
        .nav-btn { background: transparent; border: 1px solid #333; color: #888; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase;}
        .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255, 179, 0, 0.05); }

        /* BOUTON PAD UNIQUE */
        .pad-link { display: none; padding: 10px 20px; border-radius: 4px; border: 2px solid; font-weight: 900; font-size: 0.8rem; cursor: pointer; background: #000; text-transform: uppercase; animation: pulse-border 2s infinite; }
        @keyframes pulse-border { 0% { opacity: 0.8; } 50% { opacity: 1; } 100% { opacity: 0.8; } }

        .content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .module { display: none; flex-direction: column; gap: 20px; height: 100%; }
        .module.active { display: flex; }
        
        .card { background: var(--panel); border-radius: 8px; padding: 15px; border: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; font-size: 1rem; }
        
        /* DICTÉE VOCALE */
        .input-with-mic { display: flex; gap: 5px; }
        .mic-btn { background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .mic-btn.recording { background: var(--alert); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #555; font-size: 0.7rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #111; font-size: 0.85rem; vertical-align: top; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; }
        .status-ok { color: var(--accent); border: 1px solid var(--accent); }
        .status-danger { color: var(--alert); border: 1px solid var(--alert); }

        /* DLC ALERTES */
        .dlc-alert { background: rgba(255, 23, 68, 0.15); border-left: 4px solid var(--alert); }
        .dlc-warning { color: var(--gold); font-weight: bold; }

        .btn-empire { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .btn-rectify { background: transparent; border: 1px solid #444; color: #888; padding: 5px 10px; font-size: 0.65rem; border-radius: 3px; cursor: pointer; }

        /* PORTAIL */
        #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 60000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dept-choice-btn { background: #111; border: 2px solid #333; border-radius: 12px; padding: 30px; font-size: 1.3rem; font-weight: 900; color: #fff; cursor: pointer; width: 200px; text-align: center; transition: 0.2s;}
        .dept-choice-btn:active { transform: scale(0.95); }
        .dept-choice-btn.cuisine { border-color: var(--gold); color: var(--gold); }
        .dept-choice-btn.bar { border-color: #00e5ff; color: #00e5ff; }
        .dept-choice-btn.service { border-color: #2979ff; color: #2979ff; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 85px); gap: 15px; margin-top: 20px; }
        .pin-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 1.8rem; font-weight: bold; width: 85px; height: 85px; border-radius: 50%; cursor: pointer; }
        .pin-display { font-size: 2.5rem; letter-spacing: 12px; margin-bottom: 20px; color: var(--gold); min-height: 45px;}

        /* MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 50000; display: none; align-items: center; justify-content: center; }
        .modal.open { display: flex !important; }
        .history-box { background: #111; border: 2px solid var(--gold); padding: 25px; border-radius: 8px; width: 500px; max-width: 90%; max-height: 70vh; overflow-y: auto; }
    </style>
</head>
<body>

    <audio id="beep-dlc" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="login-screen">
        <h1 style="color:var(--gold); letter-spacing: 5px; margin-bottom: 40px; text-align: center;">EMPIRE OS<br><span style="font-size: 1rem; color: #555;">AUDIT HACCP</span></h1>
        <div id="login-step-1" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
            <button class="dept-choice-btn cuisine" onclick="showPinPad('CUISINE')">🔪 CUISINE</button>
            <button class="dept-choice-btn bar" onclick="showPinPad('BAR')">🍸 BAR</button>
            <button class="dept-choice-btn service" onclick="showPinPad('SERVICE')">🛎️ SERVICE</button>
        </div>
        <div id="login-step-2" style="display: none; flex-direction: column; align-items: center;">
            <div id="login-instruction" style="color:#aaa; margin-bottom: 20px; font-weight: 900; text-transform: uppercase;"></div>
            <div id="pin-display" class="pin-display"></div>
            <div class="pin-pad">
                <button class="pin-btn" onclick="addPin(1)">1</button><button class="pin-btn" onclick="addPin(2)">2</button><button class="pin-btn" onclick="addPin(3)">3</button>
                <button class="pin-btn" onclick="addPin(4)">4</button><button class="pin-btn" onclick="addPin(5)">5</button><button class="pin-btn" onclick="addPin(6)">6</button>
                <button class="pin-btn" onclick="addPin(7)">7</button><button class="pin-btn" onclick="addPin(8)">8</button><button class="pin-btn" onclick="addPin(9)">9</button>
                <button class="pin-btn" onclick="clearPin()" style="background:#333;">C</button><button class="pin-btn" onclick="addPin(0)">0</button><button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
            </div>
            <button style="margin-top: 30px; background: transparent; border: 1px solid #444; color: #444; padding: 10px 20px; border-radius: 4px; cursor: pointer;" onclick="backToStep1()">🔙 RETOUR AU CHOIX</button>
        </div>
    </div>

    <div class="nav-haccp">
        <button id="link-cuisine" class="pad-link" style="border-color: var(--gold); color: var(--gold);" onclick="window.location.href='production.html'">🔪 PAD CUISINE</button>
        <button id="link-bar" class="pad-link" style="border-color: #00e5ff; color: #00e5ff;" onclick="window.location.href='bar.html'">🍸 PAD BAR</button>
        <button id="link-service" class="pad-link" style="border-color: #2979ff; color: #2979ff;" onclick="window.location.href='gestionnaire.html'">🛎️ PAD SERVICE</button>
        
        <div style="flex-grow: 1;"></div>
        <button class="nav-btn active" onclick="showModule('temp')">🌡️ TEMP</button>
        <button class="nav-btn" onclick="showModule('cleaning')">🧼 NETTOYAGE</button>
        <button class="nav-btn" onclick="showModule('trace')">🏷️ DLC</button>
        <button class="nav-btn" style="border-color:var(--alert); color:var(--alert);" onclick="location.reload()">🔒 FERMER</button>
    </div>

    <div class="content">
        <div id="mod-temp" class="module active">
            <div class="card">
                <h2 style="margin:0 0 15px 0; font-size: 0.8rem; color: var(--gold); text-transform: uppercase;">RELEVÉ : <span id="display-dept-temp"></span></h2>
                <div class="grid">
                    <div class="input-group"><label>Équipement</label>
                        <div class="input-with-mic">
                            <input type="text" id="temp-eq" placeholder="Frigo 1...">
                            <button class="mic-btn" onclick="startVoice('temp-eq', this)">🎤</button>
                        </div>
                    </div>
                    <div class="input-group"><label>Valeur (°C)</label><input type="number" id="temp-val" step="0.1"></div>
                    <div class="input-group" style="justify-content: flex-end;"><button class="btn-empire" onclick="save('temp')">ENREGISTRER</button></div>
                </div>
            </div>
            <div class="card" style="flex:1; overflow:auto;">
                <table><thead><tr><th>Heure</th><th>Équipement</th><th>°C</th><th>Statut</th><th>Audit</th><th>Action</th></tr></thead><tbody id="logs-temp"></tbody></table>
            </div>
        </div>

        <div id="mod-cleaning" class="module">
            <div class="card">
                <h2 style="margin:0 0 15px 0; font-size: 0.8rem; color: var(--gold); text-transform: uppercase;">NETTOYAGE : <span id="display-dept-clean"></span></h2>
                <div class="grid">
                    <div class="input-group"><label>Zone / Matériel</label>
                        <div class="input-with-mic">
                            <input type="text" id="clean-zone" placeholder="Plan de travail...">
                            <button class="mic-btn" onclick="startVoice('clean-zone', this)">🎤</button>
                        </div>
                    </div>
                    <div class="input-group"><label>Observation</label>
                        <div class="input-with-mic">
                            <input type="text" id="clean-obs" placeholder="Conforme...">
                            <button class="mic-btn" onclick="startVoice('clean-obs', this)">🎤</button>
                        </div>
                    </div>
                    <div class="input-group" style="justify-content: flex-end;"><button class="btn-empire" onclick="save('cleaning')">VALIDER</button></div>
                </div>
            </div>
            <div class="card" style="flex:1; overflow:auto;">
                <table><thead><tr><th>Heure</th><th>Zone</th><th>Obs</th><th>Audit</th><th>Action</th></tr></thead><tbody id="logs-cleaning"></tbody></table>
            </div>
        </div>

        <div id="mod-trace" class="module">
            <div class="card">
                <h2 style="margin:0 0 15px 0; font-size: 0.8rem; color: var(--gold); text-transform: uppercase;">TRAÇABILITÉ : <span id="display-dept-trace"></span></h2>
                <div class="grid">
                    <div class="input-group"><label>Produit</label>
                        <div class="input-with-mic">
                            <input type="text" id="trace-name" placeholder="Saumon...">
                            <button class="mic-btn" onclick="startVoice('trace-name', this)">🎤</button>
                        </div>
                    </div>
                    <div class="input-group"><label>DLC</label><input type="date" id="trace-dlc"></div>
                    <div class="input-group" style="justify-content: flex-end;"><button class="btn-empire" onclick="save('trace')">ARCHIVER</button></div>
                </div>
            </div>
            <div class="card" style="flex:1; overflow:auto;">
                <table><thead><tr><th>Heure</th><th>Produit</th><th>Compte à rebours</th><th>Audit</th><th>Action</th></tr></thead><tbody id="logs-trace"></tbody></table>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal">
        <div class="history-box">
            <h2 style="color:var(--gold); margin-top:0;">📜 HISTORIQUE</h2>
            <div id="history-content" style="margin-bottom:20px;"></div>
            <button class="btn-empire" style="width:100%; background:#333; color:#fff;" onclick="document.getElementById('history-modal').classList.remove('open')">FERMER</button>
        </div>
    </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json()).catch(() => ({activeOrders: {}})),
            update: (key, data) => fetch('/update-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: key, order: { data } }) })
        };

        let db = { temp: [], trace: [], cleaning: [] };
        let selectedDept = ""; let currentPin = ""; let rectifiedId = null;
        const USERS = { "1234": "Serveur", "5678": "Cuisinier", "4321": "Barman", "9999": "Manager" };

        function showPinPad(d) { selectedDept = d; document.getElementById('login-step-1').style.display = 'none'; document.getElementById('login-step-2').style.display = 'flex'; document.getElementById('login-instruction').innerText = d; }
        function backToStep1() { document.getElementById('login-step-2').style.display = 'none'; document.getElementById('login-step-1').style.display = 'flex'; clearPin(); }
        function addPin(n) { currentPin += n; document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length); }
        function clearPin() { currentPin = ""; document.getElementById('pin-display').innerText = ""; }

        async function submitPin() {
            if(USERS[currentPin]) {
                document.getElementById('display-dept-temp').innerText = selectedDept;
                document.getElementById('display-dept-clean').innerText = selectedDept;
                document.getElementById('display-dept-trace').innerText = selectedDept;
                document.querySelectorAll('.pad-link').forEach(l => l.style.display = 'none');
                document.getElementById('link-' + selectedDept.toLowerCase()).style.display = 'block';
                document.getElementById('login-screen').style.display = 'none';
                await load();
            } else { alert("PIN FAUX"); clearPin(); }
        }

        function showModule(id) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.getElementById('mod-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function load() {
            const state = await API.getState();
            if(state.activeOrders) {
                db.temp = state.activeOrders['HACCP_TEMP']?.data || [];
                db.trace = state.activeOrders['HACCP_TRACE']?.data || [];
                db.cleaning = state.activeOrders['HACCP_CLEANING']?.data || [];
            }
            render();
        }

        function render() {
            const filter = (l) => l.dept === selectedDept;
            
            // Temp
            document.getElementById('logs-temp').innerHTML = db.temp.filter(filter).map(l => `<tr>
                <td>${l.time}</td><td>${l.eq}</td><td style="color:${l.status==='OK'?'var(--accent)':'var(--alert)'}">${l.val}°C</td>
                <td><span class="status-badge ${l.status==='OK'?'status-ok':'status-danger'}">${l.status}</span></td>
                <td style="font-size:0.6rem; color:#666;">${l.audit}</td>
                <td><button class="btn-rectify" onclick="rectify('temp', ${l.id})">✏️</button></td>
            </tr>`).join('');

            // Clean
            document.getElementById('logs-cleaning').innerHTML = db.cleaning.filter(filter).map(l => `<tr>
                <td>${l.time}</td><td>${l.zone}</td><td>${l.obs}</td>
                <td style="font-size:0.6rem; color:#666;">${l.audit}</td>
                <td><button class="btn-rectify" onclick="rectify('cleaning', ${l.id})">✏️</button></td>
            </tr>`).join('');

            // DLC
            let alarm = false;
            document.getElementById('logs-trace').innerHTML = db.trace.filter(filter).map(l => {
                const diff = Math.ceil((new Date(l.dlc) - new Date().setHours(0,0,0,0)) / 86400000);
                let txt = diff < 0 ? "⚠️ PÉRIMÉ" : (diff === 0 ? "⚠️ AUJOURD'HUI" : "J-" + diff);
                if(diff <= 0) alarm = true;
                return `<tr class="${diff <= 0 ? 'dlc-alert' : ''}">
                    <td>${l.time}</td><td>${l.name}</td><td class="${diff <= 2 ? 'dlc-warning' : ''}">${txt}</td>
                    <td style="font-size:0.6rem; color:#666;">${l.audit}</td>
                    <td><button class="btn-rectify" onclick="rectify('trace', ${l.id})">✏️</button></td>
                </tr>`;
            }).join('');
            if(alarm) document.getElementById('beep-dlc').play().catch(()=>{});
        }

        async function save(type) {
            let entry = { 
                id: rectifiedId || Date.now(), 
                time: new Date().toLocaleTimeString('fr-FR'), 
                dept: selectedDept, 
                audit: "Signé par " + USERS[currentPin] + (rectifiedId ? " (MODIFIÉ)" : ""),
                history: []
            };

            if(type === 'temp') {
                entry.eq = document.getElementById('temp-eq').value;
                entry.val = document.getElementById('temp-val').value;
                entry.status = entry.val <= 4 ? 'OK' : 'ALERTE';
            } else if(type === 'cleaning') {
                entry.zone = document.getElementById('clean-zone').value;
                entry.obs = document.getElementById('clean-obs').value;
            } else if(type === 'trace') {
                entry.name = document.getElementById('trace-name').value;
                entry.dlc = document.getElementById('trace-dlc').value;
            }

            if(rectifiedId) {
                const idx = db[type].findIndex(x => x.id === rectifiedId);
                db[type][idx] = entry;
                rectifiedId = null;
                document.querySelector(`#mod-${type} .btn-empire`).innerText = "ENREGISTRER";
            } else {
                db[type].unshift(entry);
            }

            await API.update(`HACCP_${type.toUpperCase()}`, db[type]);
            render();
            // Reset inputs
            document.querySelectorAll('input').forEach(i => i.value = "");
        }

        function rectify(type, id) {
            if(USERS[currentPin] !== "Manager") return alert("MANAGER REQUIS");
            const item = db[type].find(x => x.id === id);
            rectifiedId = id;
            if(type === 'temp') { document.getElementById('temp-eq').value = item.eq; document.getElementById('temp-val').value = item.val; }
            else if(type === 'cleaning') { document.getElementById('clean-zone').value = item.zone; document.getElementById('clean-obs').value = item.obs; }
            else if(type === 'trace') { document.getElementById('trace-name').value = item.name; document.getElementById('trace-dlc').value = item.dlc; }
            document.querySelector(`#mod-${type} .btn-empire`).innerText = "CORRIGER";
            window.scrollTo(0,0);
        }

        function startVoice(id, btn) {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            rec.lang = 'fr-FR';
            rec.onstart = () => btn.classList.add('recording');
            rec.onresult = (e) => document.getElementById(id).value = e.results[0][0].transcript;
            rec.onend = () => btn.classList.remove('recording');
            rec.start();
        }
    </script>
</body>
</html>
