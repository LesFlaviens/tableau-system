<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChef - Menu & Fiches Techniques</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; --ordered: #2979ff;}
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* NAVIGATION */
        .nav-master { background: var(--panel); padding: 15px 20px; display: flex; gap: 15px; border-bottom: 2px solid #333; align-items: center; z-index: 100; justify-content: space-between; flex-wrap: wrap;}
        .logo-text { color: var(--gold); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; margin: 0; }
        .nav-btn { background: transparent; border: 1px solid #333; color: #ccc; padding: 10px 20px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.8rem; text-transform: uppercase; transition: 0.2s;}
        .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255, 179, 0, 0.05); }
        .nav-btn.export { border-color: var(--ordered); color: var(--ordered); background: rgba(41, 121, 255, 0.1); }
        .nav-btn.export:active { background: var(--ordered); color: #fff; }

        /* MODULES (ONGLETS) */
        .module { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .module.active { display: flex; }
        
        /* GRID CONTENT (MENU) */
        .grid-menu { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; align-items: start; }
        
        .menu-category { background: var(--panel); border-radius: 8px; border: 1px solid #222; display: flex; flex-direction: column; max-height: 100%; }
        .category-header { background: #1a1a1a; padding: 15px; border-bottom: 2px solid var(--gold); font-weight: 900; font-size: 1.2rem; text-transform: uppercase; text-align: center; color: var(--gold); display: flex; justify-content: space-between; align-items: center;}
        
        .item-list { padding: 10px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 8px; }
        
        .menu-item { background: #0a0a0a; border: 1px solid #333; padding: 12px 15px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .menu-item:hover { border-color: #555; }
        .item-name { font-weight: bold; font-size: 1rem; color: #eee; flex: 1; }
        .item-price { color: var(--accent); font-weight: 900; margin-left: 15px; margin-right: 15px; }
        
        .btn-del { background: rgba(255, 23, 68, 0.1); border: none; color: var(--alert); width: 30px; height: 30px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s;}
        .btn-del:active { background: var(--alert); color: #fff; }

        /* FORMS */
        .add-row { display: flex; gap: 10px; padding: 15px; background: #0a0a0a; border-top: 1px solid #222; border-radius: 0 0 8px 8px;}
        input, select, textarea { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; outline: none; font-size: 1rem; font-family: 'Inter', sans-serif;}
        input:focus, select:focus, textarea:focus { border-color: var(--gold); }
        textarea { resize: vertical; min-height: 80px; }
        .add-btn { background: #222; color: var(--gold); border: 1px solid #444; padding: 10px 15px; font-weight: 900; border-radius: 4px; cursor: pointer; transition: 0.2s;}
        .add-btn:active { background: var(--gold); color: #000; transform: scale(0.98);}

        /* SYNC INDICATOR */
        .sync-status { display: flex; align-items: center; gap: 8px; font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: bold; }
        .sync-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--alert); box-shadow: 0 0 8px var(--alert); }
        .sync-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        /* 🟢 CSS D'IMPRESSION (OPTIMISÉ SMARTPHONE / PDF) */
        #print-zone { display: none; }
        @media print {
            body { background: #fff !important; color: #000 !important; margin: 0; padding: 0; display: block; }
            body > *:not(#print-zone) { display: none !important; }
            
            @page { margin: 10mm; size: A5 portrait; } 
            
            #print-zone { display: block !important; width: 100%; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; }
            .p-header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #000; padding-bottom: 10px; display: flex; flex-direction: column; align-items: center;}
            .p-logo-img { height: 40px; margin-bottom: 5px; }
            .p-logo { font-size: 24px; font-weight: 900; letter-spacing: 2px; margin: 0; }
            .p-date { font-size: 10px; color: #666; text-transform: uppercase; margin-top: 5px;}
            
            .p-category { margin-bottom: 20px; page-break-inside: avoid; }
            .p-cat-title { font-size: 16px; text-transform: uppercase; font-weight: 900; text-align: center; border-bottom: 1px solid #ddd; margin-bottom: 10px; padding-bottom: 5px; letter-spacing: 1px;}
            
            .p-item { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 12px; }
            .p-name { font-weight: bold; color: #111; }
            .p-price { font-weight: bold; }
            .p-dots { flex: 1; border-bottom: 1px dotted #ccc; margin: 0 8px; position: relative; top: -4px; }
        }
    </style>
</head>
<body>

    <div id="print-zone"></div>

    <div class="nav-master">
        <div style="display: flex; align-items: center; gap: 20px;">
            <img src="logo.png" alt="iChef" style="height: 35px; filter: drop-shadow(0px 2px 5px rgba(0,0,0,0.5));" onerror="this.style.display='none';">
            <h1 class="logo-text">ichef.ch</h1>
            <span style="color:#555; font-weight:bold; font-size:0.8rem; border-left: 1px solid #333; padding-left:20px;">MENU & FICHES</span>
        </div>
        <div style="display: flex; align-items: center; gap: 15px; flex-wrap: wrap;">
            <button class="nav-btn active" id="tab-menu" onclick="switchTab('menu')">📋 LE MENU</button>
            <button class="nav-btn" style="border-color: #ffb300; color: #ffb300;" id="tab-recettes" onclick="switchTab('recettes')">🍳 FICHES RECETTES</button>
            <div class="sync-status" style="margin: 0 15px;"><div id="sync-dot" class="sync-dot"></div> <span id="sync-text">Déconnecté</span></div>
            <button class="nav-btn export" id="btn-print-menu" onclick="exportToMobile()">📱 EXPORTER MENU (PDF)</button>
        </div>
    </div>

    <div id="mod-menu" class="module active">
        <div class="grid-menu">
            <div class="menu-category">
                <div class="category-header">ENTRÉES <span style="font-size:0.8rem; color:#888;" id="count-entrees">0</span></div>
                <div class="item-list" id="list-entrees"></div>
                <div class="add-row">
                    <input type="text" id="add-name-entrees" placeholder="Nom de l'entrée..." style="flex:2;">
                    <input type="number" id="add-price-entrees" placeholder="Prix (€)" style="flex:1;" step="0.5">
                    <button class="add-btn" onclick="addMenuItem('entrees')">➕</button>
                </div>
            </div>

            <div class="menu-category">
                <div class="category-header">PLATS <span style="font-size:0.8rem; color:#888;" id="count-plats">0</span></div>
                <div class="item-list" id="list-plats"></div>
                <div class="add-row">
                    <input type="text" id="add-name-plats" placeholder="Nom du plat..." style="flex:2;">
                    <input type="number" id="add-price-plats" placeholder="Prix (€)" style="flex:1;" step="0.5">
                    <button class="add-btn" onclick="addMenuItem('plats')">➕</button>
                </div>
            </div>

            <div class="menu-category">
                <div class="category-header">DESSERTS <span style="font-size:0.8rem; color:#888;" id="count-desserts">0</span></div>
                <div class="item-list" id="list-desserts"></div>
                <div class="add-row">
                    <input type="text" id="add-name-desserts" placeholder="Nom du dessert..." style="flex:2;">
                    <input type="number" id="add-price-desserts" placeholder="Prix (€)" style="flex:1;" step="0.5">
                    <button class="add-btn" onclick="addMenuItem('desserts')">➕</button>
                </div>
            </div>
        </div>
    </div>

    <div id="mod-recettes" class="module" style="flex-direction: column;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px;">
            <h2 style="color:var(--gold); margin:0;">📚 LE GRIMOIRE DU CHEF (FICHES TECHNIQUES)</h2>
            <div style="display:flex; gap:10px;">
                <input type="file" id="upload-recipes" style="display:none;" accept=".json" onchange="importRecipes(this)">
                <button class="nav-btn" style="border-color:var(--accent); color:var(--accent);" onclick="document.getElementById('upload-recipes').click()">📥 IMPORTER RECETTES</button>
                <button class="nav-btn export" style="background:#222; color:#fff; border-color:#555;" onclick="exportRecipes()">💾 SAUVEGARDER GRIMOIRE</button>
            </div>
        </div>
        
        <div style="display: grid; grid-template-columns: minmax(300px, 1fr) 2fr; gap: 20px; align-items: start;">
            <div class="menu-category" style="padding:20px;">
                <h3 style="margin-top:0; color:#fff; font-size:1.1rem; border-bottom: 1px dashed #444; padding-bottom: 10px;">Nouvelle Fiche Technique</h3>
                <div style="display:flex; flex-direction:column; gap:12px;">
                    <input type="text" id="rec-name" placeholder="Nom de la recette (ex: Magret au Miel)...">
                    <select id="rec-cat">
                        <option value="entrees">Appartient aux : ENTRÉES</option>
                        <option value="plats" selected>Appartient aux : PLATS</option>
                        <option value="desserts">Appartient aux : DESSERTS</option>
                    </select>
                    <input type="number" id="rec-price" placeholder="Prix de vente au menu (€)..." step="0.5">
                    <textarea id="rec-ing" placeholder="Ingrédients (ex: Magret, Miel, Vinaigre balsamique...)"></textarea>
                    <textarea id="rec-prep" placeholder="Étapes de préparation..."></textarea>
                    <button class="add-btn" style="width:100%; padding:15px; font-size:0.9rem; margin-top:10px;" onclick="saveRecipe()">➕ SAUVEGARDER & INJECTER AU MENU</button>
                </div>
            </div>
            
            <div style="display:grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap:15px; align-content:start;" id="recipes-list">
                </div>
        </div>
    </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json()).catch(() => ({activeOrders: {}})),
            update: (key, data) => fetch('/update-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: key, order: { data } }) })
        };

        const DEFAULT_MENU = {
            entrees: [ { id: 1, name: "Œuf Parfait aux Champignons", price: 12 }, { id: 2, name: "Foie Gras Maison", price: 18 }, { id: 3, name: "Carpaccio de Bœuf", price: 14 } ],
            plats: [ { id: 11, name: "Filet de Bœuf façon Rossini", price: 32 }, { id: 12, name: "Magret de Canard au Miel", price: 26 }, { id: 13, name: "Risotto aux Truffes", price: 24 } ],
            desserts: [ { id: 21, name: "Mi-cuit Chocolat Noir", price: 10 }, { id: 22, name: "Tarte Citron Meringuée", price: 9 }, { id: 23, name: "Crème Brûlée Vanille", price: 8 } ]
        };

        let menuData = { entrees: [], plats: [], desserts: [] };
        let recipesData = []; // La base de données du Grimoire

        // 🟢 SYSTÈME D'ONGLETS
        function switchTab(tab) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => { if(b.id.startsWith('tab-')) b.classList.remove('active'); });
            
            document.getElementById('mod-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
            
            // Cacher le bouton Export Menu si on est dans les recettes
            document.getElementById('btn-print-menu').style.display = (tab === 'menu') ? 'block' : 'none';
        }

        // 🟢 DÉMARRAGE ET SYNCHRONISATION
        async function bootSystem() {
            await syncMenu();
            setInterval(syncMenu, 5000); 
        }

        async function syncMenu() {
            try {
                const state = await API.getState();
                // Sync Menu
                if (state.activeOrders && state.activeOrders['MENU_MASTER']) {
                    menuData = state.activeOrders['MENU_MASTER'].data;
                } else {
                    menuData = JSON.parse(JSON.stringify(DEFAULT_MENU));
                    await API.update('MENU_MASTER', menuData);
                }
                // Sync Recettes
                if (state.activeOrders && state.activeOrders['RECIPES_MASTER']) {
                    recipesData = state.activeOrders['RECIPES_MASTER'].data;
                } else {
                    recipesData = [];
                }
                
                document.getElementById('sync-dot').classList.add('online');
                document.getElementById('sync-text').innerText = "En Ligne";
                
                renderMenu();
                renderRecipes();
            } catch (error) {
                document.getElementById('sync-dot').classList.remove('online');
                document.getElementById('sync-text').innerText = "Connexion perdue...";
            }
        }

        // ----------------------------------------------------
        // LOGIQUE MODULE : MENU MASTER
        // ----------------------------------------------------
        function renderMenu() {
            ['entrees', 'plats', 'desserts'].forEach(category => {
                const listEl = document.getElementById(`list-${category}`);
                document.getElementById(`count-${category}`).innerText = `${menuData[category].length} PLATS`;
                listEl.innerHTML = menuData[category].map(item => `
                    <div class="menu-item">
                        <span class="item-name">${item.name}</span>
                        <span class="item-price">${parseFloat(item.price).toFixed(2)} €</span>
                        <button class="btn-del" onclick="deleteMenuItem('${category}', ${item.id})">✖</button>
                    </div>
                `).join('');
            });
        }

        async function addMenuItem(category) {
            const nameInput = document.getElementById(`add-name-${category}`);
            const priceInput = document.getElementById(`add-price-${category}`);
            const name = nameInput.value.trim(); const price = parseFloat(priceInput.value);

            if (!name || isNaN(price)) return alert("Veuillez indiquer un nom et un prix valide.");

            menuData[category].push({ id: Date.now(), name: name, price: price });
            nameInput.value = ''; priceInput.value = '';
            
            renderMenu();
            await API.update('MENU_MASTER', menuData);
        }

        async function deleteMenuItem(category, id) {
            menuData[category] = menuData[category].filter(item => item.id !== id);
            renderMenu();
            await API.update('MENU_MASTER', menuData);
        }

        function exportToMobile() {
            let html = `<div class="p-header"><img src="logo.png" alt="Logo" class="p-logo-img" onerror="this.style.display='none';"><h1 class="p-logo">ichef.ch</h1><div class="p-date">CARTE OFFICIELLE - MIS À JOUR LE ${new Date().toLocaleDateString('fr-FR')}</div></div>`;
            const categories = [{ id: 'entrees', title: 'Entrées' }, { id: 'plats', title: 'Plats Principals' }, { id: 'desserts', title: 'Desserts' }];
            categories.forEach(cat => {
                if (menuData[cat.id].length > 0) {
                    html += `<div class="p-category"><div class="p-cat-title">${cat.title}</div>`;
                    menuData[cat.id].forEach(item => {
                        html += `<div class="p-item"><span class="p-name">${item.name}</span><div class="p-dots"></div><span class="p-price">${parseFloat(item.price).toFixed(2)} €</span></div>`;
                    });
                    html += `</div>`;
                }
            });
            document.getElementById('print-zone').innerHTML = html;
            window.print();
        }

        // ----------------------------------------------------
        // LOGIQUE MODULE : FICHES RECETTES
        // ----------------------------------------------------
        function renderRecipes() {
            const container = document.getElementById('recipes-list');
            if(recipesData.length === 0) {
                container.innerHTML = "<p style='color:#555; grid-column: 1/-1; text-align:center; padding: 50px 0;'>Aucune fiche technique enregistrée dans le grimoire.</p>";
                return;
            }
            container.innerHTML = recipesData.map(r => `
                <div class="menu-item" style="flex-direction:column; align-items:flex-start; gap:10px; background:#111; padding: 15px; border-color: #222;">
                    <div style="display:flex; justify-content:space-between; width:100%; border-bottom:1px solid #333; padding-bottom:8px;">
                        <span style="color:var(--gold); font-weight:900; font-size:1.1rem;">${r.name}</span>
                        <button class="btn-del" style="width:25px; height:25px; font-size:0.7rem;" onclick="deleteRecipe(${r.id})">✖</button>
                    </div>
                    <div style="font-size:0.8rem; color:#aaa; width:100%; display:flex; justify-content:space-between;">
                        <span><b>Type:</b> ${r.cat.toUpperCase()}</span>
                        <span><b>Menu:</b> <span style="color:var(--accent); font-weight:bold;">${r.price} €</span></span>
                    </div>
                    <div style="font-size:0.75rem; color:#ccc; background:#000; padding:10px; border-radius:4px; width:100%; box-sizing:border-box;">
                        <b style="color:#888;">Ingrédients clés :</b><br>
                        ${r.ing ? r.ing.substring(0, 80) + (r.ing.length > 80 ? '...' : '') : '<i>Non renseignés</i>'}
                    </div>
                </div>
            `).join('');
        }

        async function saveRecipe() {
            const name = document.getElementById('rec-name').value.trim();
            const cat = document.getElementById('rec-cat').value;
            const price = parseFloat(document.getElementById('rec-price').value);
            const ing = document.getElementById('rec-ing').value.trim();
            const prep = document.getElementById('rec-prep').value.trim();

            if(!name || isNaN(price)) return alert("⚠️ Le nom de la recette et son prix de vente sont obligatoires.");

            const newRecipe = { id: Date.now(), name, cat, price, ing, prep, date: new Date().toLocaleDateString('fr-FR') };
            recipesData.unshift(newRecipe);

            // 🟢 INJECTION AUTOMATIQUE DANS LE MENU
            const existsInMenu = menuData[cat].find(item => item.name.toLowerCase() === name.toLowerCase());
            if(!existsInMenu) {
                menuData[cat].push({ id: Date.now() + 1, name: name, price: price });
                await API.update('MENU_MASTER', menuData);
                renderMenu();
            }

            await API.update('RECIPES_MASTER', recipesData);
            renderRecipes();

            // Reset Form
            document.getElementById('rec-name').value = ''; document.getElementById('rec-price').value = '';
            document.getElementById('rec-ing').value = ''; document.getElementById('rec-prep').value = '';
            
            alert(`✅ La recette "${name}" a été archivée ET ajoutée automatiquement au menu !`);
        }

        async function deleteRecipe(id) {
            if(confirm("Supprimer cette fiche technique du grimoire ? (Cela ne l'effacera pas du Menu)")) {
                recipesData = recipesData.filter(r => r.id !== id);
                renderRecipes();
                await API.update('RECIPES_MASTER', recipesData);
            }
        }

        function exportRecipes() {
            const blob = new Blob([JSON.stringify(recipesData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `iCHEF_GRIMOIRE_RECETTES_${new Date().toLocaleDateString('fr-FR').replace(/\//g, '-')}.json`;
            a.click();
        }

        function importRecipes(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const imported = JSON.parse(e.target.result);
                    if(Array.isArray(imported)) {
                        const existingIds = new Set(recipesData.map(x => x.id));
                        imported.forEach(item => { if(!existingIds.has(item.id)) recipesData.push(item); });
                        await API.update('RECIPES_MASTER', recipesData);
                        renderRecipes();
                        alert("✅ Fiches techniques importées avec succès !");
                    }
                } catch(err) { alert("Erreur fichier JSON."); }
                input.value = '';
            };
            reader.readAsText(file);
        }

        // INIT
        bootSystem();
    </script>
</body>
</html>
