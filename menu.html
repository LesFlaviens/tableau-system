<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Serveur Master</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap');
        :root { --bg: #080808; --gold: #d4af37; --accent: #00e676; --alert: #ff1744; --blue: #2979ff; --text: #fff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }
        
        .floor-plan { flex: 1; position: relative; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 40px 40px; }
        .table-obj { position: absolute; background: #111; border: 1px solid #333; border-radius: 12px; display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .table-obj.ordered { border-color: var(--blue); box-shadow: 0 0 15px rgba(41, 121, 255, 0.3); }

        .drawer { position: fixed; top: 0; right: -100%; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: flex; flex-direction: column; transition: 0.3s cubic-bezier(0.25, 1, 0.5, 1); }
        .drawer.open { right: 0; }
        
        .ticket-view { flex: 0 0 30%; background: #050505; padding: 20px; border-bottom: 1px solid #222; overflow-y: auto; }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 12px; padding: 20px; overflow-y: auto; background: #080808; }
        .btn-item { background: #151515; border: 1px solid #333; color: #fff; padding: 18px; border-radius: 8px; display: flex; justify-content: space-between; cursor: pointer; }
        .btn-item:active { background: #222; border-color: var(--gold); }
        
        .cat-bar { display: flex; gap: 10px; padding: 15px 20px; background: #000; }
        .btn-cat { flex: 1; padding: 12px; background: transparent; border: 1px solid #444; color: #fff; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        .btn-cat.gold { border-color: var(--gold); color: var(--gold); }

        .action-bar { padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid #222; }
        .btn-main { flex: 1; padding: 20px; border-radius: 8px; border: none; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 1rem; }
        .btn-send { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); }
        .btn-pay { background: rgba(0, 230, 118, 0.1); border: 1px solid var(--accent); color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="logo">EMPIRE PAD</div>
        <div id="status" style="color:var(--accent); font-weight:900; font-size:0.8rem;">● SYNC H24 ACTIF</div>
    </header>

    <div id="floor-plan" class="floor-plan">
        </div>

    <div id="order-drawer" class="drawer">
        <div style="padding:20px; background:#000; display:flex; justify-content:space-between; align-items:center;">
            <h2 id="table-label" style="margin:0; color:var(--gold);">TABLE</h2>
            <button onclick="closeOrder()" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">✕</button>
        </div>
        
        <div class="ticket-view">
            <div id="ticket-items"></div>
            <div id="ticket-total" style="text-align:right; font-size:1.8rem; font-weight:900; color:var(--gold); margin-top:15px;">0.00€</div>
        </div>

        <div class="cat-bar">
            <button class="btn-cat" onclick="renderMenu('Entrées')">🥗 ENTRÉES</button>
            <button class="btn-cat gold" onclick="renderMenu('Plats de résistance')">🔥 PLATS</button>
            <button class="btn-cat" style="border-color:#ea80fc; color:#ea80fc;" onclick="renderMenu('Desserts')">🍰 DESSERTS</button>
            <button class="btn-cat" style="border-color:#00e5ff; color:#00e5ff;" onclick="renderMenu('Boissons')">🍸 BOISSONS</button>
        </div>

        <div id="menu" class="menu-grid"></div>

        <div class="action-bar">
            <button class="btn-main btn-send" onclick="sendToKitchen()">🚀 ENVOYER AU CHEF</button>
            <button class="btn-main btn-pay" onclick="alert('Module paiement')">💳 ENCAISSER</button>
        </div>
    </div>

    <script>
        // --- BASE DE DONNÉES MAÎTRE (H24 7/7) ---
        const MASTER_MENU = [
            {n: "Caviar Beluga & Blinis", c: "Entrées", p: 85, d: "cuisine"},
            {n: "Foie Gras mi-cuit", c: "Entrées", p: 24, d: "cuisine"},
            {n: "Carpaccio St-Jacques", c: "Entrées", p: 28, d: "cuisine"},
            {n: "Tartare Wagyu", c: "Entrées", p: 32, d: "cuisine"},
            {n: "Saumon Fumé", c: "Entrées", p: 22, d: "cuisine"},
            {n: "Huîtres Gillardeau", c: "Entrées", p: 26, d: "cuisine"},
            {n: "Velouté de Homard", c: "Entrées", p: 25, d: "cuisine"},
            {n: "Œuf Parfait Cèpes", c: "Entrées", p: 19, d: "cuisine"},
            {n: "Burrata des Pouilles", c: "Entrées", p: 18, d: "cuisine"},
            {n: "Ceviche Daurade", c: "Entrées", p: 21, d: "cuisine"},
            {n: "Filet Bœuf Rossini", c: "Plats de résistance", p: 45, d: "cuisine"},
            {n: "Homard Bleu", c: "Plats de résistance", p: 55, d: "cuisine"},
            {n: "Côte de Veau", c: "Plats de résistance", p: 38, d: "cuisine"},
            {n: "Bar de Ligne", c: "Plats de résistance", p: 42, d: "cuisine"},
            {n: "Risotto Truffe Blanche", c: "Plats de résistance", p: 35, d: "cuisine"},
            {n: "Magret de Canard", c: "Plats de résistance", p: 32, d: "cuisine"},
            {n: "St-Jacques Poireaux", c: "Plats de résistance", p: 36, d: "cuisine"},
            {n: "Pigeon Rôti", c: "Plats de résistance", p: 40, d: "cuisine"},
            {n: "Sole Meunière", c: "Plats de résistance", p: 48, d: "cuisine"},
            {n: "Volaille aux Morilles", c: "Plats de résistance", p: 39, d: "cuisine"},
            {n: "Sphère Chocolat", c: "Desserts", p: 15, d: "cuisine"},
            {n: "Millefeuille Vanille", c: "Desserts", p: 14, d: "cuisine"},
            {n: "Soufflé Grand Marnier", c: "Desserts", p: 16, d: "cuisine"},
            {n: "Tarte Tatin", c: "Desserts", p: 13, d: "cuisine"},
            {n: "Baba au Rhum", c: "Desserts", p: 15, d: "cuisine"},
            {n: "Dôme Citron Yuzu", c: "Desserts", p: 14, d: "cuisine"},
            {n: "Paris-Brest", c: "Desserts", p: 15, d: "cuisine"},
            {n: "Pavlova", c: "Desserts", p: 14, d: "cuisine"},
            {n: "Macaron Géant", c: "Desserts", p: 16, d: "cuisine"},
            {n: "Assiette Fromages", c: "Desserts", p: 18, d: "cuisine"},
            {n: "Dom Pérignon", c: "Boissons", p: 250, d: "bar"},
            {n: "Château Margaux", c: "Boissons", p: 450, d: "bar"},
            {n: "Meursault 1er Cru", c: "Boissons", p: 120, d: "bar"},
            {n: "Cocktail L'Empire", c: "Boissons", p: 22, d: "bar"},
            {n: "Eau Voss", c: "Boissons", p: 9, d: "bar"}
        ];

        let currentTable = null;
        let ticketItems = [];

        // --- LOGIQUE DE RENDU ---
        function renderMenu(category) {
            const grid = document.getElementById('menu');
            const items = MASTER_MENU.filter(i => i.c === category);
            
            grid.innerHTML = items.map(i => `
                <div class="btn-item" onclick="addToTicket('${i.n}', ${i.p}, '${i.d}')">
                    <span>${i.n}</span>
                    <span style="color:var(--gold); font-weight:900;">${i.p.toFixed(2)}€</span>
                </div>
            `).join('');
        }

        function addToTicket(name, price, dest) {
            ticketItems.push({ id: Date.now(), n: name, p: price, d: dest });
            renderTicket();
        }

        function renderTicket() {
            const container = document.getElementById('ticket-items');
            let total = 0;
            container.innerHTML = ticketItems.map((i, idx) => {
                total += i.p;
                return `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222;">
                    <span>${i.n}</span>
                    <span>${i.p.toFixed(2)}€</span>
                </div>`;
            }).join('');
            document.getElementById('ticket-total').innerText = total.toFixed(2) + "€";
        }

        // --- ENVOI AU CHEF ---
        async function sendToKitchen() {
            if(ticketItems.length === 0) return;
            
            const payload = {
                table: currentTable,
                items: ticketItems,
                timestamp: new Date().toLocaleTimeString()
            };

            try {
                // Cette ligne connecte le PAD au CHEF via le serveur
                const res = await fetch('/update-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tableId: currentTable, order: payload })
                });
                
                if(res.ok) {
                    alert("🚀 COMMANDE ENVOYÉE AU CHEF");
                    ticketItems = [];
                    closeOrder();
                }
            } catch (e) {
                alert("🚨 ERREUR RÉSEAU : Commande sauvegardée localement.");
                // Logique offline ici
            }
        }

        function openOrder(id) {
            currentTable = id;
            document.getElementById('table-label').innerText = "TABLE " + id;
            document.getElementById('order-drawer').classList.add('open');
            renderMenu('Plats de résistance');
        }

        function closeOrder() {
            document.getElementById('order-drawer').classList.remove('open');
        }

        // Initialisation tables (Exemple)
        const floor = document.getElementById('floor-plan');
        for(let i=1; i<=10; i++) {
            const t = document.createElement('div');
            t.className = 'table-obj';
            t.style.width = "80px"; t.style.height = "80px";
            t.style.left = (i * 100) % 800 + "px";
            t.style.top = (Math.floor(i/5) * 150) + 100 + "px";
            t.innerText = "T" + i;
            t.onclick = () => openOrder("T"+i);
            floor.appendChild(t);
        }
    </script>
</body>
</html>
