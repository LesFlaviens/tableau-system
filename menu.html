<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu Live - EMPIRE OS</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --text: #fff; --panel: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; padding-bottom: 50px;}
        
        .header { background: var(--panel); padding: 30px 20px; text-align: center; border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100;}
        .logo { font-weight: 900; color: #fff; letter-spacing: 4px; font-size: 1.5rem; text-transform: uppercase; }
        .subtitle { color: #888; font-size: 0.8rem; margin-top: 5px; text-transform: uppercase; letter-spacing: 2px;}

        .container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        .category-title { color: var(--accent); font-size: 1.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; margin-top: 40px; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .menu-item { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; border-bottom: 1px dashed #222; animation: fadeIn 0.5s ease; }
        .item-details { display: flex; flex-direction: column; flex: 1; padding-right: 10px; }
        .item-name { font-size: 1.1rem; font-weight: bold; color: #fff; }
        .item-desc { font-size: 0.75rem; color: #666; margin-top: 4px; font-style: italic; }
        .item-price { font-size: 1.1rem; font-weight: 900; color: var(--accent); white-space: nowrap; }

        .footer { text-align: center; padding: 40px 20px; color: #444; font-size: 0.7rem; letter-spacing: 1px; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Status de connexion discret */
        #sync-status { position: fixed; bottom: 10px; right: 10px; width: 8px; height: 8px; border-radius: 50%; background: #333; z-index: 1000; }
        #sync-status.online { background: var(--accent); box-shadow: 0 0 5px var(--accent); }
    </style>
</head>
<body>

    <div id="sync-status"></div>

    <div class="header">
        <div class="logo">TABLEAU</div>
        <div class="subtitle">La Carte en Direct</div>
    </div>

    <div class="container" id="menu-container">
        <div style="text-align:center; padding-top:50px; color:#555;">Initialisation de la carte...</div>
    </div>

    <div class="footer">
        PROPULSÉ PAR LE SYSTÈME TABLEAU © 2026<br>
        MISE À JOUR EN TEMPS RÉEL
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let menuData = [];

        // 1. Écoute du serveur (Télécommunication H24)
        ws.onopen = () => document.getElementById('sync-status').classList.add('online');
        ws.onclose = () => document.getElementById('sync-status').classList.remove('online');

        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                // Si le Chef envoie une mise à jour globale du menu
                if (msg.type === 'ORDER_UPDATE' && msg.activeOrders['GLOBAL_MENU']) {
                    renderMenu(msg.activeOrders['GLOBAL_MENU'].data);
                }
            } catch(err) { console.error("Erreur Sync:", err); }
        };

        // 2. Chargement initial forcé
        async function loadInitialMenu() {
            try {
                const res = await fetch('/get-current-state');
                const state = await res.json();
                if (state.activeOrders['GLOBAL_MENU']) {
                    renderMenu(state.activeOrders['GLOBAL_MENU'].data);
                } else {
                    // Si le serveur est vide, on affiche un message pro
                    document.getElementById('menu-container').innerHTML = '<div style="text-align:center; padding-top:50px; color:var(--accent);">CARTE EN COURS DE MISE À JOUR...</div>';
                }
            } catch(e) { console.log("Mode hors-ligne"); }
        }

        // 3. Rendu visuel chirurgical
        function renderMenu(data) {
            const container = document.getElementById('menu-container');
            container.innerHTML = '';
            
            // On regroupe par catégories
            const categories = ['Entrées', 'Plats de résistance', 'Desserts', 'Boissons & Bar'];
            
            categories.forEach(cat => {
                const items = data.filter(i => i.category === cat);
                if (items.length > 0) {
                    const catTitle = document.createElement('div');
                    catTitle.className = 'category-title';
                    catTitle.innerText = cat;
                    container.appendChild(catTitle);

                    items.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'menu-item';
                        div.innerHTML = `
                            <div class="item-details">
                                <span class="item-name">${item.name}</span>
                                <span class="item-desc">${item.desc || ''}</span>
                            </div>
                            <div class="item-price">${parseFloat(item.price).toFixed(2)} €</div>
                        `;
                        container.appendChild(div);
                    });
                }
            });
        }

        loadInitialMenu();
        // Vérification toutes les 30 secondes pour garantir le H24
        setInterval(loadInitialMenu, 30000);
    </script>
</body>
</html>
