<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Caisse Autonome</title>
    <style>
        /* 💎 DESIGN LUXE & PREMIUM HYBRID 💎 */
        :root { 
            --bg: #050505;          
            --panel: #0a0a0a;        
            --border: rgba(255, 255, 255, 0.15);        
            --text-main: #ffffff;    
            --text-muted: #777777;   
            --gold: #d4af37;         
            --gold-dim: rgba(212, 175, 55, 0.05);
            --accent: #10b981;       
            --accent-dim: rgba(16, 185, 129, 0.05);
            --alert: #ef4444;        
            --alert-dim: rgba(239, 68, 68, 0.05);
            --ordered: #ffffff;      
            --ordered-dim: rgba(255, 255, 255, 0.05);
            --purple: #d4af37;       
            --service: #ffffff;      
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.9);
            --info-zen: #aaaaaa;
            --blur: blur(5px);
        }

        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: var(--bg); color: var(--text-main); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; -webkit-tap-highlight-color: transparent;}

        header { background: rgba(5,5,5,0.85); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; gap: 15px; z-index: 100; }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .nav-btns { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; justify-content: flex-end;}

        .btn-mini { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 10px 16px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; position: relative;}
        .btn-mini:hover { background: rgba(255,255,255,0.05); color: var(--text-main); border-color: rgba(255,255,255,0.3); }
        .btn-mini.gold { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
        .btn-mini.sync { border-color: var(--alert); color: var(--alert); background: var(--alert-dim); }
        .btn-mini.admin { border-color: var(--gold); color: var(--gold); display: none; } 

        #archi-btn-bar { display: none; background: var(--panel); padding: 15px; border-bottom: 1px solid var(--border); justify-content: center; gap: 15px; flex-wrap: wrap; z-index: 50; position: relative;}
        .edit-mode #archi-btn-bar { display: flex; }

        #room-tabs-container { display: flex; background: var(--bg); overflow-x: auto; border-bottom: 1px solid var(--border); padding: 0 25px; gap: 20px; align-items: center; }
        #room-tabs-container::-webkit-scrollbar { display: none; }
        .room-tab { padding: 15px 5px; font-weight: bold; border-bottom: 1px solid transparent; border-radius: 0; cursor: pointer; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; transition: 0.3s; white-space: nowrap; color: var(--text-muted); background: transparent;}
        .room-tab.active { color: var(--gold); border-bottom: 1px solid var(--gold); background: transparent; }
        .room-tab.inactive { background: transparent; color: var(--text-muted); border-bottom: 1px solid transparent; }
        .room-tab.inactive:hover { color: var(--text-main); background: transparent;}

        .floor-plan-wrapper { flex: 1; overflow: auto; background: var(--bg); touch-action: auto; position: relative; display: flex; justify-content: center;}
        .floor-plan { position: relative; width: 2000px; height: 1500px; transition: background-color 0.3s; background-image: none; margin-top: 20px;}

        .table-wrapper { position: absolute; box-sizing: border-box; touch-action: none; display: flex; justify-content: center; align-items: center; }
        .chair { position: absolute; width: 14px; height: 14px; border-radius: 0; border: 1px solid var(--border); z-index: 1; transition: all 0.3s; pointer-events: none; display: flex; justify-content: center; align-items: center; font-size: 8px; font-weight: bold; color: var(--text-muted); background: var(--bg);}

        .table-obj { position: relative; width: 100%; height: 100%; background: var(--panel); border: 1px solid var(--border); display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.1rem; color: var(--text-main); cursor: pointer; transition: 0.3s; box-sizing: border-box; touch-action: none; z-index: 10; letter-spacing: 1px; box-shadow: none;}
        .table-obj:active { transform: scale(0.98); border-color: var(--gold); }
        
        .table-obj.extra { border: 1px dashed var(--gold); background: transparent; color: var(--gold); }
        .shape-oval { border-radius: 50%; }
        .shape-rect { border-radius: 4px; }
        
        .table-content { width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; border-radius: inherit; flex-direction: column;}

        /* STATUTS DE TABLES LUXE */
        .table-wrapper.status-hold .table-obj { border-color: var(--gold); background: var(--gold-dim); color: var(--gold); }
        .table-wrapper.status-cooking .table-obj { border-color: #f97316; background: rgba(249, 115, 22, 0.05); color: #f97316; }
        .table-wrapper.status-ready .table-obj { border-color: var(--accent) !important; background: var(--accent-dim) !important; color: var(--accent) !important; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3) !important; z-index: 50 !important;}

        .edit-mode .table-wrapper { cursor: move; }
        .edit-mode .table-obj { border-style: dashed; border-color: var(--text-muted); background: transparent; color: var(--text-muted); }
        .table-resizer { position: absolute; bottom: -8px; right: -8px; width: 16px; height: 16px; background: var(--gold); border: none; display: none; justify-content: center; align-items: center; cursor: se-resize; z-index: 100; pointer-events: auto; border-radius: 0; color: #000; font-size: 10px;}
        .edit-mode .table-resizer { display: flex; }

        /* MODE RUSH */
        .rush-mode .floor-plan { display: flex; flex-wrap: wrap; gap: 15px; align-content: flex-start; padding: 25px; background: none; height: auto; min-height: 100%; width: 100%; box-sizing: border-box; }
        .rush-mode .table-wrapper { position: relative !important; left: 0 !important; top: 0 !important; width: 120px !important; height: 120px !important; margin: 0; }
        .rush-mode .chair { display: none !important; }
        .rush-mode .table-obj { border-radius: 4px !important; clip-path: none !important; transform: none !important; font-size: 1.2rem; border-width: 1px; }
        .rush-mode .table-resizer { display: none !important; }

        /* ====================================================================== */
        /* 🔥 CORRECTION DU BUG TIROIR : STRUCTURE FIXE ET SPLIT SCREEN FORCÉ 🔥  */
        /* ====================================================================== */
        .drawer { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 10000; display: none; flex-direction: column; }
        .drawer.open { display: flex !important; }
        
        /* DÉFAUT PC & TABLETTE (CÔTE À CÔTE) */
        .drawer-body { display: flex; flex: 1; overflow: hidden; flex-direction: row; }
        
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 15px; padding: 20px; overflow-y: auto; align-content: start; background: var(--bg); }
        
        .ticket-view { flex: 0 0 400px; width: 400px; background: var(--panel); border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; box-shadow: -5px 0 15px rgba(0,0,0,0.5); z-index: 10; box-sizing: border-box;}
        
        .drawer-resizer { display: none; } /* On cache la poignée sur PC */

        .btn-item { position: relative; background: var(--panel); border: 1px solid var(--border); color: var(--text-main); padding: 18px 15px; border-radius: 8px; font-weight: bold; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px; font-size: 0.95rem; transition: all 0.2s ease; cursor: pointer; }
        .btn-item:hover { border-color: var(--gold); background: var(--gold-dim); }
        .btn-item:active { transform: scale(0.98); }
        .btn-item .price { color: var(--gold); font-weight: bold; font-size: 1.1rem; background: transparent; padding: 0;}

        .ticket-items-container { flex: 1; overflow-y: auto; padding-right: 5px; }
        .ticket-items-container::-webkit-scrollbar { display: none; }
        .ticket-total { padding-top: 15px; border-top: 1px solid var(--border); margin-top: 15px; font-size: 1.5rem; font-weight: bold; color: var(--gold); text-align: right; letter-spacing: 1px; }

        .ticket-item-row { display:flex; justify-content:space-between; align-items:center; padding:12px; border:1px solid transparent; border-bottom-color: var(--border); background: transparent; transition: 0.2s; border-radius: 0;}
        .ticket-item-row:hover { background: rgba(255,255,255,0.02); border-color: transparent; border-bottom-color: var(--border);}

        /* MODALES */
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.9); z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: var(--blur); }
        .modal.open { display: flex !important; }

        #login-screen { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; background: var(--bg) !important; z-index: 9999999 !important; display: flex; flex-direction: column; align-items: center; justify-content: center; pointer-events: auto !important; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 30px; position: relative; z-index: 99999999 !important; pointer-events: auto !important; }
        .pin-btn { background: var(--panel); border: 1px solid var(--border); color: var(--gold); font-size: 1.5rem; font-weight: bold; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; transition: 0.1s; pointer-events: auto !important; position: relative; z-index: 99999999 !important; }
        .pin-btn:active { background: var(--gold); color: #000; border-color: var(--gold); transform: scale(0.95); }
        .pin-display { font-size: 2.5rem; letter-spacing: 15px; margin-bottom: 20px; color: var(--gold); min-height: 50px; font-weight: bold; z-index: 99999999 !important; position: relative;}

        .pay-btn { background: transparent; border: 1px solid var(--border); color: var(--text-main); padding: 15px 30px; font-size: 0.9rem; font-weight: bold; letter-spacing: 1px; cursor: pointer; width: 300px; margin-bottom: 10px; text-transform: uppercase; transition: 0.3s; border-radius: 4px; box-shadow: none;}
        .pay-btn:hover { border-color: var(--gold); color: var(--gold); background: transparent;}
        .pay-btn:active { transform: scale(0.98); background: var(--gold-dim); }

        .cancel-btn { background: transparent; border: 1px solid var(--gold); color: var(--gold); padding: 15px 30px; font-size: 0.9rem; font-weight: bold; border-radius: 4px; cursor: pointer; width: 350px; margin-bottom: 15px; text-transform: uppercase; transition: 0.2s;}
        .cancel-btn:hover { background: var(--gold-dim); }

        .edit-input { width: 300px; padding: 12px; margin-bottom: 15px; background: transparent; border: 1px solid var(--border); color: var(--text-main); font-size: 1rem; text-align: center; outline: none; font-weight: bold; border-radius: 4px;}
        .edit-input:focus { border-color: var(--gold); }

        .btn-archi-luxe { background: transparent; border: 1px solid rgba(255, 255, 255, 0.15); color: var(--text-main); padding: 12px 20px; font-size: 0.75rem; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; transition: 0.3s; cursor: pointer; border-radius: 4px; }
        .btn-archi-luxe:hover { border-color: var(--gold); color: var(--gold); }

        /* ======================================================== */
        /* 📱 FORMATAGE OPTIMISÉ POUR MOBILE (RESPONSIVE)           */
        /* ======================================================== */
        @media (max-width: 900px) {
            header { padding: 10px; flex-direction: column; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); background: rgba(5,5,5,0.95); }
            .header-left { justify-content: space-between; width: 100%; }
            .nav-btns { flex-wrap: nowrap; overflow-x: auto; justify-content: flex-start; width: 100%; gap: 8px;}
            .nav-btns::-webkit-scrollbar { display: none; }
            
            .drawer-body { flex-direction: column !important; } /* Force la superposition */
            
            .menu-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)) !important; padding: 10px !important; padding-bottom: 20px !important; }
            .btn-item { padding: 12px 10px !important; font-size: 0.85rem !important; min-height: 80px; }
            
            /* TICKET MOBILE RÉGLABLE */
            .ticket-view { flex: none !important; height: var(--ticket-h, 45vh) !important; width: 100% !important; border-left: none !important; border-top: 1px solid var(--border) !important; padding: 15px 10px !important; background: var(--bg) !important; }
            
            /* POIGNÉE MOBILE */
            .drawer-resizer { display: flex !important; height: 24px; background: var(--panel); cursor: ns-resize; justify-content: center; align-items: center; border-top: 1px solid var(--border); flex-shrink: 0; z-index: 101; }
            .resizer-dash { width: 40px; height: 4px; background: var(--text-muted); border-radius: 4px; }
            
            #ticket-action-buttons { display: grid !important; grid-template-columns: repeat(2, 1fr) !important; gap: 8px !important; }
            #ticket-action-buttons button { width: 100% !important; min-height: 60px !important; padding: 8px !important; font-size: 0.8rem !important; margin: 0 !important; }
        }
    </style>
</head>
<body>

    <!-- 🚨 CLAVIER PIN 🚨 -->
    <div id="login-screen">
        <h1 style="color:var(--gold); letter-spacing: 4px; font-size: 2.5rem; margin-bottom: 10px;">IDENTIFICATION</h1>
        <div style="color:var(--text-muted); margin-bottom: 30px; font-size: 1.1rem;">Entrez votre code d'accès personnel</div>
        <div id="pin-display" class="pin-display"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="appendPin(1)">1</button><button class="pin-btn" onclick="appendPin(2)">2</button><button class="pin-btn" onclick="appendPin(3)">3</button>
            <button class="pin-btn" onclick="appendPin(4)">4</button><button class="pin-btn" onclick="appendPin(5)">5</button><button class="pin-btn" onclick="appendPin(6)">6</button>
            <button class="pin-btn" onclick="appendPin(7)">7</button><button class="pin-btn" onclick="appendPin(8)">8</button><button class="pin-btn" onclick="appendPin(9)">9</button>
            <button class="pin-btn" onclick="clearPin()" style="background:var(--alert-dim); color:var(--alert); border-color:transparent;">C</button>
            <button class="pin-btn" onclick="appendPin(0)">0</button>
            <button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000; border-color:var(--accent);">OK</button>
        </div>
    </div>

    <!-- HEADER -->
    <header>
        <div class="header-left">
            <div style="font-weight:900; letter-spacing:2px; font-size: 1.3rem; color: var(--gold);">EMPIRE PAD</div>
            <div id="stock-tag" style="color:var(--accent); font-weight:bold; font-size:0.7rem; background: var(--accent-dim); padding: 4px 8px; border-radius: 4px; border: 1px solid var(--accent); transition: 0.3s;">● LIAISON SÉCURISÉE</div>
            <div id="user-badge" style="background:var(--panel); padding:6px 12px; border-radius:6px; font-size:0.85rem; color:var(--text-main); border:1px solid var(--border); font-weight: bold;">Utilisateur: Aucun</div>
        </div>
        <div class="nav-btns">
            <button class="btn-mini" style="border-color: var(--accent); color: var(--accent); background: var(--accent-dim);" onclick="openQuickOrder()">📝 NOUV. COMMANDE</button>
            <button id="btn-rush-toggle" class="btn-mini gold" style="border-color: #f59e0b; color: #f59e0b; background: rgba(245, 158, 11, 0.1);" onclick="toggleRushMode()">⚡ MODE RUSH</button>
            <button class="btn-mini" style="border-color: var(--service); color: var(--service); background: rgba(244, 114, 182, 0.1);" onclick="addExtraTable()">➕ TABLE EXTRA</button>
            <button class="btn-mini admin" onclick="unlockArchiMode()">🏗️ ARCHITECTURE</button>
            <button class="btn-mini sync" style="background: var(--alert-dim);" onclick="logout()">🔒</button>
        </div>
    </header>

    <!-- ARCHITECTURE BAR -->
    <div id="archi-btn-bar">
        <button class="btn-archi-luxe" onclick="addNewRoom()">+ Nouvelle Salle</button>
        <div style="width: 2px; height: 30px; background: var(--border); margin: 0 10px;"></div>
        <button class="btn-archi-luxe" onclick="addNewTable()">+ Nouvelle Table</button>
        <div style="width: 2px; height: 30px; background: var(--border); margin: 0 10px;"></div>
        <button class="btn-archi-luxe" style="color:var(--gold); border-color:var(--gold);" onclick="saveArchitecture()">💾 Sauvegarder Plan</button>
        <button class="btn-archi-luxe" onclick="closeArchiMode()">❌ Quitter</button>
    </div>

    <!-- SALLES ET TABLES -->
    <div class="room-tabs" id="room-tabs-container"></div>
    <div class="floor-plan-wrapper"><div id="floor-plan" class="floor-plan"></div></div>

    <!-- TIROIR DE COMMANDE -->
    <div id="order-drawer" class="drawer">
        <div style="padding:15px 25px; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background: var(--panel);">
            <div style="display: flex; align-items: center; gap: 15px;">
                <h2 id="table-label" style="margin:0; font-size: 1.5rem; color: var(--text-main); letter-spacing: 1px;">TABLE</h2>
                <button class="btn-mini" style="border-color: var(--info-zen); color: var(--info-zen); background: rgba(56, 189, 248, 0.1);" onclick="modifyTableCovers()">👤 MODIFIER COUVERTS</button>
            </div>
            <button class="btn-mini" style="font-size: 0.9rem; padding: 8px 15px;" onclick="closeOrder()">FERMER ✕</button>
        </div>
        
        <div style="padding:10px 25px; background:var(--bg); border-bottom:1px solid var(--border);">
            <input type="text" id="order-obs" placeholder="⚠️ OBSERVATIONS POUR LA TABLE (VIP, Allergies...)" style="width:100%; padding:10px; background:var(--alert-dim); color:var(--alert); border:1px solid var(--alert); border-radius:4px; font-weight:bold; box-sizing:border-box; font-size: 1rem;">
        </div>

        <div class="drawer-body" id="drawer-main-body">
            
            <!-- COLONNE GAUCHE : MENU -->
            <div style="flex:1; display:flex; flex-direction:column; background: var(--bg); overflow: hidden;">
                <div id="menu-tabs-container" style="display:flex; gap:10px; padding:10px; background:var(--panel); border-bottom:1px solid var(--border); overflow-x: auto;">
                    <span style="color:var(--text-muted); font-size:0.8rem; padding:10px; align-self:center;">⏳ Chargement de la carte...</span>
                </div>
                
                <div id="seat-bar-container" style="display:flex; gap:10px; padding:10px; background:var(--panel); border-bottom:1px solid var(--border); overflow-x: auto; align-items:center;"></div>
                <div id="menu" class="menu-grid"></div>
            </div>

            <!-- 🔥 LE CURSEUR COULISSANT MOBILE 🔥 -->
            <div id="drawer-resizer" class="drawer-resizer">
                <div class="resizer-dash"></div>
            </div>

            <!-- COLONNE DROITE : TICKET -->
            <div id="ticket" class="ticket-view">
                <div id="ticket-items" class="ticket-items-container"></div>
                <div id="ticket-total" class="ticket-total">Total TTC: 0.00€</div>
                <div id="ticket-tva" style="text-align: right; color: var(--text-muted); font-size: 0.85rem; margin-top: 5px;">Dont TVA (10%) : 0.00€</div>
                
                <!-- 💳 BOUTONS D'ACTION (ECO PACK) -->
                <div id="ticket-action-buttons" style="display:flex; flex-direction:column; gap:10px; margin-top:20px;">
                    <button class="pay-btn" style="background: var(--accent); color: #000; width:100%; padding:20px; font-size:1.2rem; border: none; font-weight: 900; box-shadow: 0 4px 15px rgba(16,185,129,0.3);" onclick="directPay()">
                        💳 ENCAISSER LA TABLE
                    </button>
                    <div style="display:flex; gap:10px;">
                        <button class="btn-mini gold" style="flex:1; padding:15px; font-size:1rem; border:1px solid var(--gold);" onclick="saveStandaloneOrder()">
                            💾 METTRE EN ATTENTE
                        </button>
                        <button class="btn-mini sync" style="flex:1; padding:15px; font-size:1rem; border:1px solid var(--alert);" onclick="confirmClearTicket()">
                            🗑️ ANNULER
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALE EDIT PLAT -->
    <div id="edit-item-modal" class="modal">
        <div style="background:var(--panel); padding:30px; border-radius:12px; width: 400px; max-width: 95%;">
            <h2 style="color:var(--gold);">✏️ Ajuster le Plat</h2>
            <h3 id="edit-item-title" style="color:var(--text-main); margin-bottom:20px;">Nom</h3>
            
            <div style="display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom: 15px;">
                <label style="color:var(--text-main); font-weight:bold;">Convive :</label>
                <div id="edit-item-seat-display" style="background:var(--bg); color:var(--gold); border:2px solid var(--gold); padding:5px 15px; border-radius:6px; font-weight:bold;">TOUS</div>
                <input type="hidden" id="edit-item-seat" value="0">
                <button class="btn-mini" onclick="cycleEditSeat()" style="padding: 10px 15px;">CHANGER</button>
            </div>

            <input type="number" id="edit-item-price" class="edit-input" step="0.01" style="width:100%; box-sizing:border-box;">
            <input type="text" id="edit-item-obs" class="edit-input" placeholder="Observation..." style="width:100%; box-sizing:border-box;">
            
            <button class="pay-btn" style="width:100%; margin-top:10px;" onclick="saveItemEdit()">✅ VALIDER</button>
            <button class="pay-btn cancel" style="width:100%;" onclick="closeEditModal()">❌ ANNULER</button>
        </div>
    </div>

    <!-- MODALE VIDER TICKET -->
    <div id="clear-ticket-modal" class="modal">
        <div style="background:var(--panel); padding:30px; border-radius:12px; text-align:center;">
            <h2 style="color:var(--alert); font-size: 2rem; margin-bottom: 10px;">⚠️ TOUT EFFACER ?</h2>
            <button class="cancel-btn" style="width:100%; background:var(--bg); color:var(--alert); border-color:var(--alert);" onclick="executeClearTicket('Erreur')">❌ OUI, SUPPRIMER COMMANDE</button>
            <button class="cancel-btn abort" style="width:100%; margin-top:10px;" onclick="document.getElementById('clear-ticket-modal').classList.remove('open')">🔙 RETOUR</button>
        </div>
    </div>

    <!-- MODALE PAIEMENT (NATIVE) -->
    <div id="payment-modal" class="modal">
        <div style="background:var(--panel); padding:30px; border-radius:16px; border:2px solid var(--accent); display:flex; flex-direction:column; width: 550px; max-width: 95%; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
                <h2 style="color:var(--text-main); font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px;" id="pay-modal-title">TABLE X</h2>
                <button class="btn-mini" style="border-color: var(--border); color: var(--text-muted);" onclick="cancelPayment()">✕ FERMER</button>
            </div>
            
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <div style="flex: 1; background: var(--bg); padding: 20px; border-radius: 12px; text-align: center; border: 1px solid var(--border); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">
                    <div style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px;">Total Addition</div>
                    <div id="pay-modal-total" style="font-size: 1.8rem; font-weight: 900; color: var(--text-main);">0.00 €</div>
                </div>
                <div style="flex: 1.5; background: var(--bg); padding: 20px; border-radius: 12px; text-align: center; border: 2px solid var(--accent); box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">
                    <div style="color: var(--text-muted); font-size: 0.85rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px;">Reste à payer</div>
                    <div id="pay-modal-remaining" style="font-size: 2.5rem; font-weight: 900; color: var(--accent); letter-spacing: -1px;">0.00 €</div>
                </div>
            </div>

            <div id="pay-action-zone">
                <div style="display: flex; gap: 10px; margin-bottom: 15px; align-items: stretch;">
                    <input type="number" id="pay-custom-amount" step="0.01" style="flex: 1; font-size: 2rem; font-weight: 900; text-align: center; color: var(--gold); border: 2px solid var(--gold); background: var(--bg); border-radius: 8px;" placeholder="0.00">
                    <button class="btn-mini gold" style="flex:0.5;" onclick="setRemainderAmount()">LE RESTE</button>
                </div>
                <div id="pay-methods-container" style="display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    <button class="pay-btn" style="flex: 1; min-width: 30%; padding: 15px 5px; font-size: 1rem; border-color: var(--accent); color: var(--accent); background: var(--accent-dim); margin:0;" onclick="processPartialPayment('CB')">💳 CB</button>
                    <button class="pay-btn" style="flex: 1; min-width: 30%; padding: 15px 5px; font-size: 1rem; border-color: var(--gold); color: var(--gold); background: var(--gold-dim); margin:0;" onclick="processPartialPayment('ESPÈCES')">💶 ESPÈCES</button>
                    <button class="pay-btn" style="flex: 1; min-width: 30%; padding: 15px 5px; font-size: 1rem; border-color: var(--info-zen); color: var(--info-zen); background: rgba(56, 189, 248, 0.1); margin:0;" onclick="processPartialPayment('TR')">🎟️ TICKETS RESTO</button>
                </div>
            </div>

            <div style="background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 15px; margin-bottom: 20px; max-height: 120px; overflow-y: auto;">
                <div style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 10px; font-weight: bold; text-transform: uppercase;">Déjà encaissé :</div>
                <div id="pay-history-list" style="display: flex; flex-direction: column; gap: 5px;"></div>
            </div>

            <button id="btn-finalize-table" class="pay-btn" style="width: 100%; display: none; background: var(--accent); color: #000; border-color: var(--accent); margin: 0; font-size: 1.3rem;" onclick="finalizeTablePayment()">
                ✅ CLÔTURER LA TABLE
            </button>
        </div>
    </div>

    <!-- NOTIFICATIONS -->
    <div id="notification-center" style="pointer-events:none; z-index:999999; position:fixed; top:20px; left:50%; transform:translateX(-50%);"></div>

    <script>
        // ==========================================
        // 🚀 CONFIGURATION & VARIABLES GLOBALES
        // ==========================================
        const tenantID = 'MASTER_STATE';
        const SERVER_URL = "https://tableau-system.onrender.com";
        
        let activeOrders = {};
        let currentTable = null;
        let ticketItems = [];
        let isArchiMode = false;
        let isRushMode = false;
        let isDraggingTable = false;
        
        let rooms = JSON.parse(localStorage.getItem('empire_rooms')) || ['Salle Principale'];
        let tables = JSON.parse(localStorage.getItem('empire_architecture')) || [ {label:"T1", l:100, t:100, w:80, h:120, shape:"rect", pax: 4, room: "Salle Principale"} ];
        let currentRoom = rooms[0] || 'Salle Principale';
        
        let menuCuisine = {};
        let menuBar = {};
        let categoriesCuisine = []; 
        let categoriesBar = [];     
        
        let currentSeat = 0;
        let pendingEditIndex = null;
        let currentPayTotal = 0;
        let currentPayRemaining = 0;
        let currentPayHistory = [];

        // ==========================================
        // 🔐 CLAVIER PIN & INITIALISATION
        // ==========================================
        var myRealPin = "";
        window.appendPin = function(n) { if(myRealPin.length < 6) { myRealPin += n; document.getElementById('pin-display').innerText = '*'.repeat(myRealPin.length); } };
        window.clearPin = function() { myRealPin = ""; document.getElementById('pin-display').innerText = ""; };
        
        window.submitPin = function() {
            if(myRealPin === "9999" || myRealPin === "1234") {
                window.currentUser = { name: myRealPin === "9999" ? "Directeur" : "Serveur", role: "Manager" };
                document.getElementById('user-badge').innerText = `Utilisateur: ${window.currentUser.name}`;
                if (window.currentUser.name === "Directeur") document.querySelectorAll('.admin').forEach(e => e.style.display = 'flex');
                
                document.getElementById('login-screen').style.display = 'none';
                renderRooms();
                renderFloor();
                connectEmpireH24();
                setupMobileDrawer();
            } else {
                alert("❌ PIN Incorrect."); clearPin();
            }
        };

        function logout() {
            window.currentUser = null; myRealPin = "";
            document.getElementById('login-screen').style.display = 'flex';
            clearPin();
            closeOrder();
        }

        window.onload = () => {
            console.log("🚀 Empire OS Eco Pad : Démarrage...");
        };

        // ==========================================
        // 🔄 MOTEUR RÉSEAU & SYNCHRONISATION
        // ==========================================
        const API = {
            getState: async () => {
                try {
                    let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                    if(r.ok) {
                        document.getElementById('stock-tag').innerHTML = '● LIAISON SÉCURISÉE';
                        document.getElementById('stock-tag').style.color = 'var(--accent)';
                        document.getElementById('stock-tag').style.borderColor = 'var(--accent)';
                        return await r.json();
                    }
                } catch(e) {
                    document.getElementById('stock-tag').innerHTML = '🔴 DÉCONNECTÉ';
                    document.getElementById('stock-tag').style.color = 'var(--alert)';
                    document.getElementById('stock-tag').style.borderColor = 'var(--alert)';
                    return JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
            },
            update: async (key, data) => {
                let state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                if (data === null) delete state.activeOrders[key];
                else state.activeOrders[key] = { data: data };
                localStorage.setItem('EMPIRE_GLOBAL_SYNC', JSON.stringify(state));
                
                try {
                    await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ tableId: key, order: data === null ? null : { data: data } }) 
                    });
                } catch(e) { console.error("Erreur Sync"); }
            }
        };

        async function connectEmpireH24() { await syncData(); setInterval(syncData, 3000); }

        async function syncData() {
            if (isArchiMode) return; 
            try {
                const state = await API.getState();
                if (state && state.activeOrders) {
                    let nO = state.activeOrders;
                    for (let key in nO) {
                        if (nO[key] && nO[key].data !== undefined) nO[key] = nO[key].data; 
                    }
                    
                    if(nO['MENU_MASTER']) menuCuisine = nO['MENU_MASTER'];
                    if(nO['MENU_MASTER_BAR']) menuBar = nO['MENU_MASTER_BAR'];
                    if(nO['CATEGORIES_CUISINE']) categoriesCuisine = nO['CATEGORIES_CUISINE'];
                    if(nO['CATEGORIES_BAR']) categoriesBar = nO['CATEGORIES_BAR'];
                    
                    updateMenuTabs();
                    
                    if (nO['ARCHITECTURE']) {
                        let archiData = nO['ARCHITECTURE'];
                        if (!isDraggingTable && archiData && archiData.tables) {
                            if (JSON.stringify(archiData.tables) !== JSON.stringify(tables)) {
                                rooms = archiData.rooms || ['Salle Principale'];
                                tables = archiData.tables || [];
                                localStorage.setItem('empire_architecture', JSON.stringify(tables));
                                localStorage.setItem('empire_rooms', JSON.stringify(rooms));
                                renderRooms(); renderFloor();
                            }
                        }
                    }
                    activeOrders = nO;
                    if(!isDraggingTable) renderFloor();
                }
            } catch(e) {}
        }

        // ==========================================
        // 🏗️ INTERFACE SALLE & TABLES
        // ==========================================
        function renderRooms() {
            document.getElementById('room-tabs-container').innerHTML = rooms.map(r => 
                `<div class="room-tab ${r === currentRoom ? 'active' : 'inactive'}" onclick="currentRoom='${r}'; renderRooms(); renderFloor();">${r}</div>`
            ).join('');
        }

        function renderFloor() {
            let floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.filter(t => t.room === currentRoom).forEach(t => {
                let orderData = activeOrders[t.label];
                let tStatus = '';
                
                if (orderData && orderData.items && orderData.items.length > 0) tStatus = 'cooking';
                
                let wrapper = document.createElement('div');
                wrapper.className = `table-wrapper ${tStatus ? 'status-'+tStatus : ''} ${t.isExtra ? 'extra' : ''}`;
                wrapper.style.cssText = `left:${t.l}px; top:${t.t}px; width:${t.w}px; height:${t.h}px;`;

                let d = document.createElement('div'); 
                d.className = `table-obj shape-${t.shape || 'rect'}`;
                
                let contentHtml = `<span style="text-align:center; display:block;">${t.label}</span>`;
                if(orderData && orderData.observations) {
                    let m = orderData.observations.match(/(\d+) Couvert/);
                    if(m) contentHtml += `<span style="font-size:0.75rem; color:var(--text-muted); margin-top:5px;">👤 ${m[1]}</span>`;
                }
                d.innerHTML = `<div class="table-content">${contentHtml}</div>`;
                
                let r = document.createElement('div'); 
                r.className = 'table-resizer';
                
                wrapper.appendChild(d);
                wrapper.appendChild(r);
                
                d.onclick = (e) => { if(e.target !== r && !isDraggingTable) openOrder(t.label); };
                
                if(isArchiMode) makeInteractive(wrapper, t, r); 
                floor.appendChild(wrapper);
            });
        }

        // ==========================================
        // 📝 GESTION DES COMMANDES (TIROIR)
        // ==========================================
        function openQuickOrder() {
            openOrder("ATTENTE_" + Date.now());
            document.getElementById('table-label').innerText = "NOUVELLE COMMANDE";
        }

        function openOrder(tableLabel) {
            currentTable = tableLabel;
            document.getElementById('table-label').innerText = "TABLE " + tableLabel;
            
            let order = activeOrders[tableLabel];
            ticketItems = (order && order.items) ? JSON.parse(JSON.stringify(order.items)) : [];
            document.getElementById('order-obs').value = (order && order.observations) ? order.observations : `🍽️ ${tables.find(t=>t.label===tableLabel)?.pax || 2} Couvert(s)`;
            
            currentSeat = 0;
            renderSeatBar();
            
            if(categoriesCuisine.length > 0) renderMenu(categoriesCuisine[0].id, 'cuisine');
            else if(categoriesBar.length > 0) renderMenu(categoriesBar[0].id, 'bar');
            else document.getElementById('menu').innerHTML = '';
            
            renderTicket();
            document.getElementById('order-drawer').classList.add('open');
        }

        function closeOrder() { 
            try {
                if (currentTable && !String(currentTable).startsWith("ATTENTE_")) {
                    let tObj = tables.find(t => t && String(t.label) === String(currentTable) && t.isExtra);
                    if (tObj && ticketItems.length === 0) {
                        tables = tables.filter(t => t && String(t.label) !== String(currentTable));
                        pushArchitecture(); renderFloor();
                    }
                }
            } catch(e) {}
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
            currentTable = null; 
        }

        // ==========================================
        // 🍽️ MENU DYNAMIQUE (PACK ÉCO ADMIN)
        // ==========================================
        function updateMenuTabs() {
            const container = document.getElementById('menu-tabs-container');
            if(!container) return;
            let html = '';
            
            categoriesCuisine.forEach(cat => {
                html += `<button class="btn-mini menu-tab" onclick="renderMenu('${cat.id}', 'cuisine')">${cat.label.toUpperCase()}</button>`;
            });
            categoriesBar.forEach(cat => {
                html += `<button class="btn-mini menu-tab" style="color:var(--info-zen); border-color:var(--info-zen);" onclick="renderMenu('${cat.id}', 'bar')">🍸 ${cat.label.toUpperCase()}</button>`;
            });
            
            if(html === '') html = `<span style="color:var(--text-muted); font-size:0.8rem; padding:10px; align-self:center;">⚠️ Carte vide. Créez-la dans l'Admin.</span>`;
            if(container.innerHTML !== html) container.innerHTML = html;
        }

        function renderMenu(catId, type) {
            let items = type === 'cuisine' ? (menuCuisine[catId] || []) : (menuBar[catId] || []);

            document.querySelectorAll('.menu-tab').forEach(b => {
                b.style.background = 'transparent'; 
                b.style.color = b.innerText.includes('🍸') ? 'var(--info-zen)' : 'var(--text-main)';
            });
            let activeBtn = Array.from(document.querySelectorAll('.menu-tab')).find(b => b.getAttribute('onclick').includes(catId));
            if(activeBtn) {
                activeBtn.style.background = 'var(--gold-dim)'; 
                activeBtn.style.color = 'var(--gold)';
            }

            const container = document.getElementById('menu');
            container.innerHTML = items.map(item => {
                let nEscaped = item.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                let p = parseFloat(item.price||0);
                return `<button class="btn-item" onclick="addToTicket('${nEscaped}', ${p})">
                    <span>${item.name.replace(/\[BR\]/g, '<br>')}</span>
                    <span class="price">${p.toFixed(2)} €</span>
                </button>`;
            }).join('') || '<div style="color:var(--text-muted); padding:20px;">Catégorie vide.</div>';
        }

        function addExtraSeatToBar() {
            let maxC = 0; let obsInput = document.getElementById('order-obs').value;
            let match = obsInput.match(/🍽️ (\d+) Couvert\(s\)/);
            if(match) maxC = parseInt(match[1]);
            let newPax = maxC + 1;
            let baseObs = obsInput.replace(/🍽️ \d+ Couvert\(s\)( \| )?/, '').replace(/ \| $/, '').trim();
            document.getElementById('order-obs').value = baseObs === "" ? `🍽️ ${newPax} Couvert(s)` : `🍽️ ${newPax} Couvert(s) | ${baseObs}`;

            let tObj = tables.find(t => t && t.label === currentTable);
            if (tObj) { tObj.pax = newPax; pushArchitecture(); }
            setSeat(newPax);
        }

        function renderSeatBar() {
            let pax = 2; let match = document.getElementById('order-obs').value.match(/🍽️ (\d+) Couvert\(s\)/);
            if(match) pax = parseInt(match[1]);
            let html = `<span style="color:var(--text-muted); font-size:0.8rem; font-weight:bold; align-self:center;">Cibler :</span>`;
            html += `<button class="btn-mini ${currentSeat===0?'gold':''}" onclick="setSeat(0)">🍽️ CENTRE</button>`;
            for(let i=1; i<=pax; i++) html += `<button class="btn-mini ${currentSeat===i?'gold':''}" onclick="setSeat(${i})">👤 ${i}</button>`;
            document.getElementById('seat-bar-container').innerHTML = html;
        }

        function setSeat(s) { currentSeat = s; renderSeatBar(); }

        // ==========================================
        // 🎟️ GESTION DU TICKET (SIMPLIFIÉE)
        // ==========================================
        function addToTicket(n, p) {
            let realName = n.replace(/\[BR\]/g, ' ');
            let e = ticketItems.find(i => i.n === realName && !i.obs && i.seat === currentSeat);
            if(e) {
                e.qty = (e.qty||1)+1;
            } else {
                ticketItems.push({ id: Date.now()+Math.random(), n: realName, p:p, qty: 1, obs: "", seat: currentSeat, fired: false });
            }
            renderTicket();
        }

        function removeTicketItem(idx) { ticketItems.splice(idx, 1); renderTicket(); }

        function renderTicket() {
            let t = 0; 
            document.getElementById('ticket-items').innerHTML = ticketItems.map((i, idx) => {
                let q = i.qty || 1; t += (parseFloat(i.p)||0)*q;
                let seatBadge = i.seat > 0 ? `👤 ${i.seat}` : `🍽️ CTRE`;
                let status = i.fired ? '💾 Enregistré' : '✏️ En saisie';
                
                return `
                <div class="ticket-item-row">
                    <div style="flex:1; cursor:pointer;" onclick="openEditItem(${idx})">
                        <div style="font-weight:bold;">
                            <span style="color:var(--gold); font-size:0.75rem; margin-right:5px;">[${seatBadge}]</span> 
                            ${q>1 ? `<span style="color:var(--accent);">${q}x </span>` : ''}${i.n}
                        </div>
                        <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px;">${status} ${i.obs ? `| ⚠️ ${i.obs}` : ''}</div>
                    </div>
                    <div style="font-weight:bold; margin-right:15px;">${((parseFloat(i.p)||0)*q).toFixed(2)}€</div>
                    <button class="btn-mini sync" onclick="removeTicketItem(${idx}); event.stopPropagation();">✕</button>
                </div>`;
            }).join('') || '<div style="text-align:center; padding:20px; color:var(--text-muted);">Ticket vide</div>';
            
            document.getElementById('ticket-total').innerText = `Total TTC: ${t.toFixed(2)}€`;
            let tva = t - (t / 1.10);
            document.getElementById('ticket-tva').innerText = `Dont TVA (10%) : ${tva.toFixed(2)}€`;
        }

        // ==========================================
        // 🚀 ENREGISTREMENT ET CAISSE DIRECTE (ECO PAD)
        // ==========================================
        async function saveToDB() {
            ticketItems.forEach(i => { if(!i.fired) { i.fired = true; i.firedTime = Date.now(); } });
            await API.update(currentTable, {
                items: ticketItems,
                observations: document.getElementById('order-obs').value,
                status: 'cooking',
                time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})
            });
        }

        async function saveStandaloneOrder() {
            if(ticketItems.length === 0) return alert("Le ticket est vide.");
            await saveToDB();
            closeOrder();
            showToast("✅ Commande mise en attente !");
            renderFloor();
        }

        async function directPay() {
            if(ticketItems.length === 0) return alert("Le ticket est vide.");
            await saveToDB(); // Sauvegarde avant d'encaisser
            
            currentPayTotal = ticketItems.reduce((acc, i) => acc + (parseFloat(i.p) * (i.qty || 1)), 0);
            currentPayRemaining = currentPayTotal;
            currentPayHistory = [];
            
            document.getElementById('pay-modal-title').innerText = "TABLE " + currentTable; 
            document.getElementById('pay-modal-total').innerText = currentPayTotal.toFixed(2) + " €";
            
            updatePaymentUI();
            document.getElementById('payment-modal').classList.add('open');
        }

        // --- FONCTIONS DE PAIEMENT NATIVES ---
        function updatePaymentUI() {
            document.getElementById('pay-modal-remaining').innerText = currentPayRemaining.toFixed(2) + " €";
            document.getElementById('pay-custom-amount').value = currentPayRemaining.toFixed(2);
            
            let histList = document.getElementById('pay-history-list');
            if(currentPayHistory.length === 0) {
                histList.innerHTML = '<span style="color:var(--text-muted); font-style:italic;">Aucun paiement</span>';
            } else {
                histList.innerHTML = currentPayHistory.map(p => `
                    <div style="display:flex; justify-content:space-between; color:var(--text-main); font-weight:bold; background:var(--panel); padding:8px; border-radius:6px; border:1px solid var(--border);">
                        <span>${p.method}</span>
                        <span style="color:var(--accent);">${p.amount.toFixed(2)} €</span>
                    </div>
                `).join('');
            }
            
            if(currentPayRemaining <= 0) {
                document.getElementById('pay-action-zone').style.display = 'none';
                document.getElementById('btn-finalize-table').style.display = 'block';
            } else {
                document.getElementById('pay-action-zone').style.display = 'block';
                document.getElementById('btn-finalize-table').style.display = 'none';
            }
        }

        function setRemainderAmount() { document.getElementById('pay-custom-amount').value = currentPayRemaining.toFixed(2); }

        function processPartialPayment(method) {
            let amtInput = document.getElementById('pay-custom-amount').value;
            let amt = parseFloat(amtInput.replace(',', '.'));
            if(isNaN(amt) || amt <= 0) return alert("⚠️ Saisissez un montant valide.");
            
            let isVoucher = (method === 'TR' || method === 'CV');
            if(!isVoucher && amt > currentPayRemaining + 0.05) return alert("⚠️ Le montant saisi dépasse le reste à payer.");

            if (method === 'ESPÈCES') {
                let cashGivenStr = prompt(`💵 Le client vous donne combien en espèces ?\n(Reste à payer : ${amt.toFixed(2)}€)`);
                if (!cashGivenStr) return;
                let cashGiven = parseFloat(cashGivenStr.replace(',', '.'));
                if (isNaN(cashGiven) || cashGiven < amt) return alert("⚠️ Montant insuffisant.");
                let changeDue = cashGiven - amt;
                if (changeDue > 0) alert(`💰 MONNAIE À RENDRE : ${changeDue.toFixed(2)} €`);
            }

            currentPayHistory.push({ method: method, amount: amt });
            currentPayRemaining -= amt;
            if(currentPayRemaining < 0) currentPayRemaining = 0;
            
            updatePaymentUI();
        }

        function cancelPayment() { 
            if(currentPayHistory.length > 0 && currentPayRemaining > 0) {
                if(!confirm("⚠️ Encaissements partiels en cours. Fermer quand même ?")) return;
            }
            document.getElementById('payment-modal').classList.remove('open'); 
        }

        async function finalizeTablePayment() {
            document.getElementById('payment-modal').classList.remove('open');
            showToast("🖨️ Impression du ticket...");
            // Simulate print: window.print(); 
            setTimeout(async () => {
                await API.update(currentTable, null); // Vide la table
                closeOrder(); 
                renderFloor();
                showToast("✅ Table clôturée.");
            }, 500);
        }

        // ==========================================
        // ✏️ EDITION PLAT (MODALE)
        // ==========================================
        function openEditItem(idx) {
            pendingEditIndex = idx;
            let item = ticketItems[idx];
            document.getElementById('edit-item-title').innerText = item.n;
            document.getElementById('edit-item-price').value = item.p;
            document.getElementById('edit-item-obs').value = item.obs || "";
            document.getElementById('edit-item-seat').value = item.seat || 0;
            document.getElementById('edit-item-seat-display').innerText = item.seat === 0 ? '🍽️ CENTRE' : '👤 C' + item.seat;
            document.getElementById('edit-item-modal').classList.add('open');
        }

        function closeEditModal() { document.getElementById('edit-item-modal').classList.remove('open'); }

        function cycleEditSeat() {
            let input = document.getElementById('edit-item-seat');
            let next = (parseInt(input.value)||0) + 1; if(next > 8) next = 0;
            input.value = next;
            document.getElementById('edit-item-seat-display').innerText = next === 0 ? '🍽️ CENTRE' : '👤 C' + next;
        }

        function saveItemEdit() {
            if(pendingEditIndex === null) return;
            let i = ticketItems[pendingEditIndex];
            i.p = parseFloat(document.getElementById('edit-item-price').value) || 0;
            i.obs = document.getElementById('edit-item-obs').value;
            i.seat = parseInt(document.getElementById('edit-item-seat').value) || 0;
            closeEditModal(); renderTicket();
        }

        // ==========================================
        // 🗑️ VIDER TICKET
        // ==========================================
        function confirmClearTicket() { document.getElementById('clear-ticket-modal').classList.add('open'); }
        async function executeClearTicket(raison) {
            ticketItems = [];
            await API.update(currentTable, null);
            document.getElementById('clear-ticket-modal').classList.remove('open');
            closeOrder(); renderFloor();
        }

        // ==========================================
        // 🏗️ ARCHITECTURE LOGIC
        // ==========================================
        function unlockArchiMode() { isArchiMode = true; document.body.classList.add('edit-mode'); renderFloor(); }
        function closeArchiMode() { isArchiMode = false; document.body.classList.remove('edit-mode'); renderFloor(); }
        function addNewTable() { tables.push({ label: "T"+(tables.length+1), l: 200, t: 200, w: 80, h: 120, room: currentRoom }); renderFloor(); }
        function addNewRoom() { let n = prompt("Nom salle:"); if(n) { rooms.push(n); currentRoom=n; renderRooms(); renderFloor(); } }
        async function pushArchitecture() {
            await API.update('ARCHITECTURE', { rooms: rooms, tables: tables });
            localStorage.setItem('empire_architecture', JSON.stringify(tables));
        }
        function saveArchitecture() { pushArchitecture(); closeArchiMode(); showToast("✅ Plan Sauvegardé"); }

        function makeInteractive(el, obj, resizer) {
            let p1=0, p2=0, p3=0, p4=0, iW, iH, iX, iY;
            el.onmousedown = (e) => { if(e.target===resizer||!isArchiMode) return; e.preventDefault(); p3=e.clientX; p4=e.clientY; document.onmouseup=close; document.onmousemove=drag; };
            el.ontouchstart = (e) => { if(e.target===resizer||!isArchiMode) return; p3=e.touches[0].clientX; p4=e.touches[0].clientY; document.ontouchend=close; document.ontouchmove=tDrag; };
            resizer.onmousedown = (e) => { if(!isArchiMode) return; e.preventDefault(); e.stopPropagation(); iW=el.offsetWidth; iH=el.offsetHeight; iX=e.clientX; iY=e.clientY; document.onmouseup=close; document.onmousemove=res; };
            resizer.ontouchstart = (e) => { if(!isArchiMode) return; e.stopPropagation(); iW=el.offsetWidth; iH=el.offsetHeight; iX=e.touches[0].clientX; iY=e.touches[0].clientY; document.ontouchend=close; document.ontouchmove=tRes; };
            
            function drag(e) { isDraggingTable=true; p1=p3-e.clientX; p2=p4-e.clientY; p3=e.clientX; p4=e.clientY; updateP(); }
            function tDrag(e) { isDraggingTable=true; p1=p3-e.touches[0].clientX; p2=p4-e.touches[0].clientY; p3=e.touches[0].clientX; p4=e.touches[0].clientY; updateP(); }
            function res(e) { isDraggingTable=true; updateD(e.clientX, e.clientY); }
            function tRes(e) { isDraggingTable=true; updateD(e.touches[0].clientX, e.touches[0].clientY); }
            
            function updateP() { el.style.top=(el.offsetTop-p2)+"px"; el.style.left=(el.offsetLeft-p1)+"px"; obj.t=el.offsetTop; obj.l=el.offsetLeft; }
            function updateD(cx, cy) { let nW=Math.max(40, iW+(cx-iX)), nH=Math.max(40, iH+(cy-iY)); el.style.width=nW+"px"; el.style.height=nH+"px"; obj.w=nW; obj.h=nH; }
            function close() { document.onmouseup=null; document.onmousemove=null; document.ontouchend=null; document.ontouchmove=null; setTimeout(()=>isDraggingTable=false, 50); }
        }

        // ==========================================
        // 📱 MOBILE RESIZER TIROIR
        // ==========================================
        function setupMobileDrawer() {
            const resizer = document.getElementById('drawer-resizer');
            const ticketView = document.getElementById('ticket');
            if(!resizer || !ticketView) return;
            let isRes = false, startY = 0, startH = 0;
            
            const start = (y) => { isRes = true; startY = y; startH = ticketView.getBoundingClientRect().height; document.body.style.overflow = 'hidden'; };
            const move = (y) => { if(!isRes) return; let nh = startH + (startY - y); nh = Math.max(window.innerHeight*0.15, Math.min(nh, window.innerHeight*0.8)); ticketView.style.setProperty('--ticket-h', nh + 'px'); };
            const stop = () => { isRes = false; document.body.style.overflow = ''; };

            resizer.addEventListener('touchstart', e => start(e.touches[0].clientY), {passive:false});
            document.addEventListener('touchmove', e => move(e.touches[0].clientY), {passive:false});
            document.addEventListener('touchend', stop);
            
            resizer.addEventListener('mousedown', e => { if(window.innerWidth<=900) start(e.clientY); });
            document.addEventListener('mousemove', e => { if(window.innerWidth<=900) move(e.clientY); });
            document.addEventListener('mouseup', stop);
        }

        function showToast(msg) {
            let c = document.getElementById('notification-center');
            let t = document.createElement('div'); t.className = 'toast-ready'; 
            t.style.cssText = "background:rgba(0,0,0,0.9); color:var(--gold); padding:15px 30px; font-weight:bold; border:1px solid var(--gold); border-radius:4px; margin-bottom:10px;";
            t.innerText = msg;
            c.appendChild(t); setTimeout(() => t.remove(), 3000);
        }

        function toggleRushMode() {
            isRushMode = !isRushMode;
            document.body.classList.toggle('rush-mode', isRushMode);
            let btn = document.getElementById('btn-rush-toggle');
            if (isRushMode) {
                btn.innerHTML = '🏗️ VUE ARCHI'; btn.style.borderColor = 'var(--text-main)'; btn.style.color = 'var(--text-main)'; btn.style.background = 'var(--panel)';
            } else {
                btn.innerHTML = '⚡ MODE RUSH'; btn.style.borderColor = '#f59e0b'; btn.style.color = '#f59e0b'; btn.style.background = 'rgba(245, 158, 11, 0.1)';
            }
        }
    </script>
