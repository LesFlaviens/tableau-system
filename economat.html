<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Portail d'Accès</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --ordered: #2979ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        
        /* 1. ÉCRAN DU PORTAIL (HUB) */
        #hub-screen {
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle at center, #111 0%, #000 100%);
            padding: 20px;
        }

        .hub-title { color: var(--gold); font-size: 3rem; font-weight: 900; letter-spacing: 5px; margin-bottom: 10px; text-transform: uppercase; text-align: center; }
        .hub-sub { color: #888; font-size: 1.2rem; letter-spacing: 3px; margin-bottom: 50px; text-transform: uppercase; text-align: center; }

        .service-grid {
            display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; max-width: 1000px; width: 100%;
        }

        .btn-service {
            background: #0a0a0a; border: 2px solid #333; border-radius: 12px;
            width: 250px; height: 200px; display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        
        .btn-service .icon { font-size: 4rem; margin-bottom: 15px; transition: 0.3s; }
        .btn-service .label { font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; color: #ccc; transition: 0.3s; }

        /* Couleurs au survol/clic selon le service */
        .btn-service.cuisine:hover { border-color: var(--alert); background: rgba(255, 23, 68, 0.05); }
        .btn-service.cuisine:hover .icon, .btn-service.cuisine:hover .label { color: var(--alert); transform: scale(1.1); }

        .btn-service.salle:hover { border-color: var(--ordered); background: rgba(41, 121, 255, 0.05); }
        .btn-service.salle:hover .icon, .btn-service.salle:hover .label { color: var(--ordered); transform: scale(1.1); }

        .btn-service.bar:hover { border-color: #00e5ff; background: rgba(0, 229, 255, 0.05); }
        .btn-service.bar:hover .icon, .btn-service.bar:hover .label { color: #00e5ff; transform: scale(1.1); }

        .admin-lock {
            position: absolute; bottom: 20px; right: 20px; font-size: 1.5rem; color: #333; cursor: pointer; transition: 0.3s;
        }
        .admin-lock:hover { color: var(--gold); }

        /* 2. ÉCRAN DU PIN PAD */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 999999; 
            display: none; flex-direction: column; align-items: center; justify-content: center; 
        }
        #login-title { color: var(--gold); font-size: 2.5rem; font-weight: 900; letter-spacing: 3px; margin-bottom: 5px; text-transform: uppercase; }
        .login-sub { color: #aaa; margin-bottom: 30px; font-size: 1.2rem; }
        
        .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 20px; }
        .pin-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 1.5rem; font-weight: bold; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; transition: 0.1s; }
        .pin-btn:active { background: var(--gold); color: #000; }
        .pin-display { font-size: 2.5rem; letter-spacing: 15px; margin-bottom: 20px; color: var(--gold); min-height: 50px;}

        .btn-back { margin-top: 40px; background: transparent; border: 1px solid #555; color: #888; padding: 10px 30px; border-radius: 4px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-back:hover { border-color: #fff; color: #fff; }
    </style>
</head>
<body>

    <div id="hub-screen">
        <h1 class="hub-title">EMPIRE OS</h1>
        <div class="hub-sub">Sélectionnez votre poste de travail</div>

        <div class="service-grid">
            <div class="btn-service cuisine" onclick="selectService('cuisine', '#ff1744')">
                <div class="icon">👨‍🍳</div>
                <div class="label">CUISINE</div>
            </div>
            
            <div class="btn-service salle" onclick="selectService('salle', '#2979ff')">
                <div class="icon">🛎️</div>
                <div class="label">SALLE</div>
            </div>
            
            <div class="btn-service bar" onclick="selectService('bar', '#00e5ff')">
                <div class="icon">🍸</div>
                <div class="label">BAR</div>
            </div>
        </div>

        <div class="admin-lock" onclick="selectService('admin', '#ffb300')">🔒</div>
    </div>

    <div id="login-screen">
        <h1 id="login-title">ACCÈS RESTREINT</h1>
        <div class="login-sub">Saisissez votre code d'identification</div>
        
        <div id="pin-display" class="pin-display"></div>
        
        <div class="pin-pad">
            <button class="pin-btn" onclick="appendPin(1)">1</button><button class="pin-btn" onclick="appendPin(2)">2</button><button class="pin-btn" onclick="appendPin(3)">3</button>
            <button class="pin-btn" onclick="appendPin(4)">4</button><button class="pin-btn" onclick="appendPin(5)">5</button><button class="pin-btn" onclick="appendPin(6)">6</button>
            <button class="pin-btn" onclick="appendPin(7)">7</button><button class="pin-btn" onclick="appendPin(8)">8</button><button class="pin-btn" onclick="appendPin(9)">9</button>
            <button class="pin-btn" onclick="clearPin()" style="background:#333;">C</button><button class="pin-btn" onclick="appendPin(0)">0</button><button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
        </div>

        <button class="btn-back" onclick="goBackToHub()">🔙 RETOUR</button>
    </div>

    <script>
        // -----------------------------------------
        // MATRICE DES CODES ET DES REDIRECTIONS
        // -----------------------------------------
        const ACCESS_MATRIX = {
            'cuisine': { pin: '1111', url: 'chef.html', name: 'CUISINE' },
            'salle':   { pin: '2222', url: 'serveur.html', name: 'SALLE' },
            'bar':     { pin: '3333', url: 'bar.html', name: 'BAR' },
            'admin':   { pin: '9999', url: 'economat.html', name: 'ÉCONOMAT & FINANCE' }
        };

        let selectedService = '';
        let currentPin = '';

        function selectService(serviceKey, color) {
            selectedService = serviceKey;
            
            // Mise à jour de l'interface du PIN Pad
            document.getElementById('login-title').innerText = "ACCÈS " + ACCESS_MATRIX[serviceKey].name;
            document.getElementById('login-title').style.color = color;
            document.getElementById('pin-display').style.color = color;

            // Bascule des écrans
            document.getElementById('hub-screen').style.display = 'none';
            document.getElementById('login-screen').style.display = 'flex';
        }

        function goBackToHub() {
            clearPin();
            selectedService = '';
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('hub-screen').style.display = 'flex';
        }

        function appendPin(n) { 
            currentPin += n; 
            document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length); 
        }

        function clearPin() { 
            currentPin = ""; 
            document.getElementById('pin-display').innerText = ""; 
        }

        function submitPin() {
            if (!selectedService) return;

            const correctPin = ACCESS_MATRIX[selectedService].pin;
            const targetUrl = ACCESS_MATRIX[selectedService].url;

            if (currentPin === correctPin) {
                // LE CODE EST BON : Redirection vers le poste de travail
                window.location.href = targetUrl;
            } else {
                // LE CODE EST MAUVAIS
                alert("⛔ CODE INCORRECT. ACCÈS REFUSÉ.");
                clearPin();
            }
        }
    </script>
</body>
</html>
