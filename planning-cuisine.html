<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Live Planning Cuisine</title>
    <style>
        :root { 
            --bg: #090e17; 
            --panel: #141c2f; 
            --border: rgba(255, 255, 255, 0.05); 
            --border-strong: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; 
            --text-muted: #64748b; 
            --gold: #fbbf24; 
            --hr: #2979ff;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }

        header { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding-bottom: 20px; 
            border-bottom: 2px solid var(--gold); 
            margin-bottom: 20px;
        }

        .logo-text { color: var(--gold); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        
        .btn-retour { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid var(--border-strong); 
            color: var(--text-main); 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: 800; 
            text-transform: uppercase; 
            text-decoration: none;
            transition: 0.2s;
        }
        .btn-retour:hover { background: var(--text-main); color: #000; }

        /* ⛶ BOUTON KIOSQUE ⛶ */
        .btn-kiosk {
            background: transparent;
            border: 1px solid var(--border-strong);
            color: var(--text-muted);
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 0.8rem;
            transition: 0.2s;
        }
        .btn-kiosk:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(251, 191, 36, 0.1);
        }

        .table-container { flex: 1; overflow: auto; background: var(--panel); border-radius: 12px; border: 1px solid var(--border-strong); }

        table { width: 100%; border-collapse: collapse; table-layout: fixed; }
        th, td { border: 1px solid var(--border-strong); text-align: center; padding: 12px 5px; min-width: 45px;}
        th { background: rgba(0,0,0,0.3); color: var(--text-muted); font-size: 0.7rem; text-transform: uppercase; }
        
        .sticky-col { 
            position: sticky; 
            left: 0; 
            background: var(--panel); 
            z-index: 10; 
            width: 150px; 
            text-align: left; 
            padding-left: 15px; 
            font-weight: 900; 
            color: var(--hr);
            border-right: 2px solid var(--gold);
        }

        .day-num { font-size: 1.1rem; color: #fff; font-weight: 900; }
        .day-name { font-size: 0.6rem; opacity: 0.6; }

        .status-cell { font-size: 1.4rem; vertical-align: middle; }
        
        .sync-status { font-size: 0.7rem; color: var(--accent); display: flex; align-items: center; gap: 6px; font-weight: bold; }
        .dot { width: 8px; height: 8px; background: #34d399; border-radius: 50%; box-shadow: 0 0 10px #34d399; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; flex-direction:column; gap:5px;">
            <h1 class="logo-text">📅 LIVE PLANNING CUISINE</h1>
