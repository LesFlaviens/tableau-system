<!DOCTYPE html>
<html lang="fr">
<head>
   <script>
        // 🛡️ GARDE DU CORPS iCHEF : CONTRÔLE STRICT DES ACCÈS B2B
        (async function checkAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";
            
            // S'il n'a pas d'ID, on le jette dehors
            if(!tenantID) return window.location.href = 'vitrine.html';

            try {
                const res = await fetch(`${SERVER_URL}/api/check-license?tenantID=${tenantID}`);
                const data = await res.json();
                
                // Si le compte est effacé ou suspendu
                if(!data.success || data.status === 'SUSPENDU') {
                    alert("⛔ LICENCE SUSPENDUE OU INVALIDE.");
                    return window.location.href = 'vitrine.html';
                }

                const plan = data.plan; // 'CHEF', 'BUSINESS', ou 'PREMIUM'
                const currentPage = window.location.pathname.split('/').pop().toLowerCase();

                // Les pages autorisées selon le forfait
                let allowedPages = [];

                if (plan === 'CHEF') {
                    allowedPages = ['administration.html', 'portail-client.html', 'chef.html', 'chef-patissier.html', 'chef-bar.html'];
                } else if (plan === 'BUSINESS') {
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'menu-pure.html', 'menu-bar.html', 'bar.html', 'chef-bar.html'];
                } else if (plan === 'PREMIUM') {
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'chef.html', 'chef-patissier.html', 'menu-pure.html', 'chef-bar.html', 'bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'cuisinie.html', 'planning-cuisine.html', 'production.html'];
                }

                if (currentPage !== '' && !allowedPages.includes(currentPage)) {
                    alert(`⛔ ACCÈS REFUSÉ :\nVotre forfait actuel (${plan}) n'inclut pas ce module.\nVeuillez upgrader votre offre pour y accéder.`);
                    
                    // Tente de fermer l'onglet (utile s'il a été ouvert via target="_blank")
                    try {
                        window.close();
                    } catch(e) {}
                    
                    // Si l'onglet refuse de se fermer, on le renvoie de force à l'administration
                    setTimeout(() => {
                        window.location.href = `administration.html?tenantID=${tenantID}`;
                    }, 100);
                }

            } catch(e) {
                console.log("Mode hors-ligne actif. Vérification des accès retardée.");
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>iChef OS | Centre de Commande</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #ffffff;
            --text-dim: #888;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            font-weight: 800;
            font-size: 3rem;
            letter-spacing: -2px;
            margin: 0;
        }
        p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }
        .card {
            background: var(--card);
            border: 1px solid #333;
            padding: 30px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: #1f1f1f;
        }
        .card h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }
        .card span {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .badge {
            background: #222;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            width: fit-content;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div id="security-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:#0a0a0a; z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h2 style="color:white; font-family:sans-serif; margin-bottom:20px;">iCHEF OS - ACCÈS RESTREINT</h2>
        <input type="password" id="pin-input" placeholder="Entrez le code PIN" style="padding:15px; border-radius:8px; border:none; width:200px; text-align:center; font-size:1.2rem; margin-bottom:15px; outline:none;">
        <button onclick="checkPin()" style="padding:12px 30px; border-radius:8px; border:none; background:white; color:black; font-weight:bold; cursor:pointer;">DÉVERROUILLER</button>
        <p id="error-msg" style="color:#ff4444; margin-top:15px; font-family:sans-serif; display:none;">Code incorrect. Accès refusé.</p>
    </div>

    <div class="header">
        <h1>iCHEF<span style="color: #FFD700;">OS</span></h1>
        <p>Système de gestion haute performance</p>
    </div>

    <div class="grid">
        <a onclick="window.location.href='pack-eco.html?tenantID=fra1'" class="card">
            <div class="badge" style="color: #00ff88;">Opérationnel</div>
            <h2>Prise de Commande</h2>
            <span>Terminal serveur (Pad)</span>
        </a>
    </div>

    <script>
    function checkPin() {
        const pin = document.getElementById('pin-input').value;
        const MASTER_PIN = "9999";

        if (pin === MASTER_PIN) {
            document.getElementById('security-overlay').style.display = 'none';
        } else {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('pin-input').value = '';
        }
    }

    // Permet de valider avec la touche "Entrée"
    document.getElementById('pin-input').addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            checkPin();
        }
    });
    </script>

</body>
</html>
