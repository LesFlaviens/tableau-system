<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChef OS | Centre de Commande</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --card: #161616;
            --accent: #ffffff;
            --text-dim: #888;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .header {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            font-weight: 800;
            font-size: 3rem;
            letter-spacing: -2px;
            margin: 0;
        }
        p {
            color: var(--text-dim);
            font-size: 1.1rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            width: 90%;
            max-width: 1000px;
        }
        .card {
            background: var(--card);
            border: 1px solid #333;
            padding: 30px;
            border-radius: 12px;
            text-decoration: none;
            color: white;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }
        .card:hover {
            border-color: var(--accent);
            transform: translateY(-5px);
            background: #1f1f1f;
        }
        .card h2 {
            margin: 0 0 10px 0;
            font-size: 1.5rem;
        }
        .card span {
            color: var(--text-dim);
            font-size: 0.9rem;
        }
        .badge {
            background: #222;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            width: fit-content;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>iCHEF<span style="color: #444;">OS</span></h1>
        <p>Système de gestion haute performance</p>
    </div>

    <div class="grid">
        <a href="pack-eco.html" class="card">
            <div class="badge" style="color: #00ff88;">Opérationnel</div>
            <h2>Prise de Commande</h2>
            <span>Terminal serveur (Pad)</span>
        </a>

        <a href="production.html" class="card">
            <div class="badge" style="color: #ffaa00;">Direct</div>
            <h2>Poste Cuisine</h2>
            <span>Pass de production plats</span>
        </a>

        <a href="bar.html" class="card">
            <div class="badge" style="color: #00ccff;">Direct</div>
            <h2>Poste Bar</h2>
            <span>Pass de production boissons</span>
        </a>

        <a href="portail-client.html" class="card">
            <div class="badge" style="color: #ff4444;">Finance</div>
            <h2>Encaissement</h2>
            <span>Gestion des tables et facturation</span>
        </a>
    </div>

</body>
</html>
