<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Borne de Pointage</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --hr: #2979ff; --warning: #ffb300; --bar: #00e5ff; --purple: #ea80fc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        header { padding: 20px; text-align: center; border-bottom: 2px solid #333; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .clock { font-size: 3rem; font-weight: 900; color: var(--hr); font-variant-numeric: tabular-nums; letter-spacing: 2px; }
        .date { font-size: 1.2rem; color: var(--sub); font-weight: bold; text-transform: uppercase; }

        .main-container { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 40px 20px; position: relative; overflow-y: auto; }

        /* ÉCRAN 1 : SÉLECTION DU STAFF (TIROIRS) */
        #screen-staff { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 900px; }
        .staff-intro { text-align: center; margin-bottom: 30px; }
        
        .dept-section { width: 100%; margin-bottom: 15px; }
        .dept-header { background: #161616; border: 2px solid #333; padding: 25px; font-size: 1.5rem; font-weight: 900; color: #fff; border-radius: 12px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; transition: 0.2s; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        .dept-header:active { transform: scale(0.98); }
        .dept-header:hover { background: #1c1c1c; border-color: #555; }
        
        .dept-content { display: none; padding: 20px 0; flex-direction: column; animation: slideDown 0.3s ease; }
        .dept-content.open { display: flex; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        .staff-buttons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; width: 100%; }
        .staff-btn { background: #0a0a0a; border: 2px solid #333; color: #fff; padding: 20px 15px; border-radius: 8px; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; text-align: center; }
        .staff-btn:active { transform: scale(0.95); border-color: var(--hr); background: #111; }

        /* ÉCRAN 2 : PAVÉ NUMÉRIQUE (PIN) */
        #screen-pin { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 400px; background: #0a0a0a; padding: 40px; border-radius: 16px; border: 1px solid #333; box-shadow: 0 20px 50px rgba(0,0,0,0.8); margin: auto; }
        .pin-name { font-size: 1.8rem; font-weight: 900; color: var(--hr); margin-bottom: 5px; text-transform: uppercase; }
        .pin-dots { display: flex; gap: 15px; margin: 20px 0 30px 0; }
        .dot { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #555; background: transparent; transition: 0.2s; }
        .dot.filled { background: var(--text); border-color: var(--text); }
        
        .numpad { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; }
        .num-key { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 2rem; font-weight: 900; padding: 20px 0; border-radius: 12px; cursor: pointer; transition: 0.1s; display: flex; justify-content: center; align-items: center; }
        .num-key:active { background: #333; transform: scale(0.95); }
        .num-key.action { font-size: 1.2rem; background: #222; }
        .num-key.cancel { color: var(--alert); }

        /* ÉCRAN 3 : ACTIONS DE POINTAGE + PLANNING PERSONNEL */
        #screen-action { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 800px; margin: auto; }
        .action-title { font-size: 2rem; font-weight: 900; color: #fff; margin-bottom: 30px; text-transform: uppercase; text-align: center; }
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; width: 100%; margin-bottom: 30px; }
        .action-btn { padding: 40px 20px; border-radius: 16px; font-size: 1.5rem; font-weight: 900; color: #fff; border: none; cursor: pointer; text-transform: uppercase; transition: 0.2s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .action-btn:active { transform: scale(0.98); }
        
        .btn-in { background: linear-gradient(135deg, #00bfa5, #00e676); }
        .btn-out { background: linear-gradient(135deg, #d50000, #ff1744); }
        .btn-break-start { background: linear-gradient(135deg, #f57c00, #ffb300); color: #000; }
        .btn-break-end { background: linear-gradient(135deg, #2962ff, #448aff); }

        /* PLANNING PERSONNEL AU SEIN DE L'ACTION */
        #personal-planning-container { width: 100%; background: #0a0a0a; padding: 20px; border-radius: 12px; border: 1px solid #333; text-align: center; }
        .planning-section-title { color: #888; font-size: 1rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .mini-day { background: #000; padding: 8px 2px; border-radius: 4px; text-align: center; border: 1px solid #222; display: flex; flex-direction: column; justify-content: flex-start; min-height: 55px;}
        .mini-day b { display: block; color: #555; margin-bottom: 5px; font-size: 0.6rem; text-transform: uppercase;}
        .mini-day.is-off { border-color: #444; opacity: 0.8;}
        .mini-day.is-half { border-color: #444; }
        .shift-time { font-weight: 900; color: var(--accent); font-size: 0.65rem; letter-spacing: -0.3px; line-height: 1.3; }

        .btn-back { position: absolute; top: 20px; left: 20px; background: #111; border: 1px solid #333; color: #ccc; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 10; }
        .btn-back:active { background: #222; }

        /* NOTIFICATION SUCCESS */
        #screen-success { display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; margin: auto; }
        .success-icon { font-size: 5rem; margin-bottom: 20px; }
        .success-text { font-size: 2rem; font-weight: 900; color: #fff; }
        .success-time { font-size: 1.5rem; color: var(--sub); margin-top: 10px; }

    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color:var(--hr); margin:0; text-transform:uppercase; letter-spacing:2px; font-size: 1.5rem;">⏱️ POINTEUSE</h1>
        </div>
        <div style="text-align: right;">
            <div class="clock" id="live-clock">00:00:00</div>
            <div class="date" id="live-date">LUNDI 1 JANVIER 2026</div>
        </div>
    </header>

    <div class="main-container">
        
        <div id="screen-staff">
            <div class="staff-intro">
                <h2 style="color:#fff; font-size: 2rem; margin:0;">SÉLECTIONNEZ VOTRE DÉPARTEMENT</h2>
                <p style="color:var(--sub); margin-top:5px; font-size: 1.1rem;">Touchez votre équipe pour vous identifier.</p>
            </div>
            
            <div id="departments-container" style="width: 100%;">
                </div>
        </div>

        <div id="screen-pin">
            <button class="btn-back" onclick="showScreen('staff')">◀ RETOUR</button>
            <div class="pin-name" id="pin-user-name">NOM</div>
            <div style="color:var(--sub); font-size:0.9rem; text-align:center;" id="pin-instructions">Entrez votre code secret à 4 chiffres</div>
            
            <div class="pin-dots">
                <div class="dot" id="dot-1"></div>
                <div class="dot" id="dot-2"></div>
                <div class="dot" id="dot-3"></div>
                <div class="dot" id="dot-4"></div>
            </div>

            <div class="numpad">
                <div class="num-key" onclick="pressPin('1')">1</div>
                <div class="num-key" onclick="pressPin('2')">2</div>
                <div class="num-key" onclick="pressPin('3')">3</div>
                <div class="num-key" onclick="pressPin('4')">4</div>
                <div class="num-key" onclick="pressPin('5')">5</div>
                <div class="num-key" onclick="pressPin('6')">6</div>
                <div class="num-key" onclick="pressPin('7')">7</div>
                <div class="num-key" onclick="pressPin('8')">8</div>
                <div class="num-key" onclick="pressPin('9')">9</div>
                <div class="num-key action cancel" onclick="clearPin()">CORRIGER</div>
                <div class="num-key" onclick="pressPin('0')">0</div>
                <div class="num-key action" style="color:var(--sub);" onclick="showScreen('staff')">ANNULER</div>
            </div>
        </div>

        <div id="screen-action">
            <button class="btn-back" onclick="showScreen('staff')">◀ DÉCONNEXION</button>
            <div class="action-title">BONJOUR <span id="action-user-name" style="color:var(--hr);"></span>,<br>QUE VOULEZ-VOUS FAIRE ?</div>
            
            <div class="action-grid">
                <button class="action-btn btn-in" onclick="registerPunch('IN')">✅ ARRIVÉE</button>
                <button class="action-btn btn-break-start" onclick="registerPunch('BREAK_START')">☕ DÉBUT COUPURE</button>
                <button class="action-btn btn-break-end" onclick="registerPunch('BREAK_END')">🔙 FIN COUPURE</button>
                <button class="action-btn btn-out" onclick="registerPunch('OUT')">🛑 DÉPART</button>
            </div>

            <div id="personal-planning-container">
                </div>
        </div>

        <div id="screen-success">
            <div class="success-icon" id="success-icon">✅</div>
            <div class="success-text" id="success-message">POINTAGE ENREGISTRÉ</div>
            <div class="success-time" id="success-time">14:05:00</div>
        </div>

    </div>

    <script>
        // HORLOGE TEMPS RÉEL
        function updateClock() {
            const now = new Date();
            document.getElementById('live-clock').textContent = now.toLocaleTimeString('fr-FR');
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            document.getElementById('live-date').textContent = now.toLocaleDateString('fr-FR', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // GESTION D'ÉTAT
        let currentStaff = null;
        let currentDeptColor = 'var(--hr)';
        let enteredPin = "";
        
        function getDirectory() { return JSON.parse(localStorage.getItem('empire_hr_directory')) || []; }
        function getPins() { return JSON.parse(localStorage.getItem('empire_staff_pins')) || {}; }
        function savePin(id, pin) {
            const pins = getPins();
            pins[id] = pin;
            localStorage.setItem('empire_staff_pins', JSON.stringify(pins));
        }

        // --- GESTION DES TIROIRS ---
        function toggleDept(deptId) {
            document.querySelectorAll('.dept-content').forEach(content => {
                if(content.id !== `content-${deptId}`) content.classList.remove('open');
            });
            document.querySelectorAll('.dept-header span:last-child').forEach(icon => {
                if(icon.id !== `icon-${deptId}`) icon.textContent = '▼';
            });

            const content = document.getElementById(`content-${deptId}`);
            const icon = document.getElementById(`icon-${deptId}`);
            
            if (content.classList.contains('open')) {
                content.classList.remove('open');
                icon.textContent = '▼';
            } else {
                content.classList.add('open');
                icon.textContent = '▲';
            }
        }

        // INITIALISATION DES TIROIRS (UNIQUEMENT LES BOUTONS NOMS)
        function renderStaffGrid() {
            const dir = getDirectory();
            const container = document.getElementById('departments-container');
            const pins = getPins();

            if(dir.length === 0) {
                container.innerHTML = "<p style='color:#888; text-align:center;'>Aucun employé configuré par les RH.</p>";
                return;
            }

            const depts = [
                { id: 'cuisine', title: '🍳 BRIGADE DE CUISINE', color: '#00e676' }, 
                { id: 'service', title: '🍷 ÉQUIPE DE SALLE', color: '#ea80fc' },   
                { id: 'bar', title: '🍸 COMPTOIR & BAR', color: '#00e5ff' }       
            ];

            let html = "";

            depts.forEach(dept => {
                const staffInDept = dir.filter(s => (s.dept || 'cuisine') === dept.id);
                
                if(staffInDept.length > 0) {
                    const buttonsHtml = staffInDept.map(s => {
                        const isNew = !pins[s.id] ? `<br><span style="font-size:0.7rem; color:var(--warning);">⚠️ CRÉER PIN</span>` : '';
                        return `<button class="staff-btn" style="border-bottom: 4px solid ${dept.color};" onclick="selectStaff(${s.id}, '${s.name.replace(/'/g, "\\'")}', '${dept.color}')">
                            ${s.name} ${isNew}
                        </button>`;
                    }).join('');

                    html += `
                    <div class="dept-section">
                        <div class="dept-header" onclick="toggleDept('${dept.id}')" style="border-left: 5px solid ${dept.color};">
                            <span>${dept.title} <span style="font-size:1rem; color:#888; margin-left:10px;">(${staffInDept.length})</span></span>
                            <span id="icon-${dept.id}" style="color:${dept.color};">▼</span>
                        </div>
                        <div class="dept-content" id="content-${dept.id}">
                            <div class="staff-buttons-grid">
                                ${buttonsHtml}
                            </div>
                        </div>
                    </div>`;
                }
            });

            container.innerHTML = html;
        }

        // NAVIGATION ENTRE LES ÉCRANS
        function showScreen(screenName) {
            document.getElementById('screen-staff').style.display = 'none';
            document.getElementById('screen-pin').style.display = 'none';
            document.getElementById('screen-action').style.display = 'none';
            document.getElementById('screen-success').style.display = 'none';
            
            document.getElementById(`screen-${screenName}`).style.display = 'flex';

            if(screenName === 'staff') {
                currentStaff = null;
                clearPin();
                renderStaffGrid(); 
            }
        }

        // SÉLECTION D'UN EMPLOYÉ
        function selectStaff(id, name, color) {
            currentStaff = { id, name };
            currentDeptColor = color;
            document.getElementById('pin-user-name').textContent = name;
            document.getElementById('pin-user-name').style.color = color;
            
            const pins = getPins();
            if(!pins[id]) {
                document.getElementById('pin-instructions').textContent = "🔒 PREMIÈRE CONNEXION : CRÉEZ VOTRE CODE PIN À 4 CHIFFRES";
                document.getElementById('pin-instructions').style.color = "var(--warning)";
            } else {
                document.getElementById('pin-instructions').textContent = "Entrez votre code secret à 4 chiffres";
                document.getElementById('pin-instructions').style.color = "var(--sub)";
            }

            showScreen('pin');
        }

        // LOGIQUE DU PAVÉ NUMÉRIQUE
        function pressPin(digit) {
            if(enteredPin.length < 4) {
                enteredPin += digit;
                updatePinDisplay();
            }
            if(enteredPin.length === 4) {
                setTimeout(verifyPin, 100); 
            }
        }

        function clearPin() {
            enteredPin = "";
            updatePinDisplay();
        }

        function updatePinDisplay() {
            for(let i=1; i<=4; i++) {
                const dot = document.getElementById(`dot-${i}`);
                if(i <= enteredPin.length) dot.classList.add('filled');
                else dot.classList.remove('filled');
            }
        }

        // VÉRIFICATION ANTI-TRICHE
        function verifyPin() {
            const pins = getPins();
            
            if(!pins[currentStaff.id]) {
                savePin(currentStaff.id, enteredPin);
                alert("✅ Votre code secret a été enregistré avec succès ! Ne l'oubliez pas.");
                proceedToActionScreen();
                return;
            }

            if(pins[currentStaff.id] === enteredPin) {
                proceedToActionScreen();
            } else {
                alert("❌ CODE INCORRECT. Réessayez.");
                clearPin();
            }
        }

        // PRÉPARATION DE L'ÉCRAN D'ACTION ET DU PLANNING PERSONNEL
        function proceedToActionScreen() {
            document.getElementById('action-user-name').textContent = currentStaff.name;
            document.getElementById('action-user-name').style.color = currentDeptColor;
            
            renderPersonalPlanning(currentStaff.id);
            showScreen('action');
        }

        // FONCTION : AFFICHER UNIQUEMENT LE PLANNING DE L'EMPLOYÉ CONNECTÉ
        function renderPersonalPlanning(staffId) {
            const kdsSync = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            const staffData = kdsSync.find(s => s.id === staffId);
            const container = document.getElementById('personal-planning-container');
            const jours = ["LUN", "MAR", "MER", "JEU", "VEN", "SAM", "DIM"];

            if(!staffData || !staffData.plan || staffData.plan.length === 0) {
                container.innerHTML = "<div style='color:#555;'>Aucun planning configuré pour cette semaine.</div>";
                return;
            }

            const daysHTML = staffData.plan.map((p, i) => {
                let content = ""; let classN = "";
                if (p.status === "off") { content = `<span style="color:#555; font-weight:900; font-size:0.7rem; margin-top:10px;">OFF</span>`; classN = "is-off"; }
                else if (p.status === "conge") { content = `<span style="color:var(--accent); font-weight:900; font-size:0.7rem; margin-top:10px;">CONGÉ</span>`; }
                else if (p.status === "maladie") { content = `<span style="color:var(--alert); font-weight:900; font-size:0.65rem; margin-top:10px;">MALADIE</span>`; classN = "is-off"; }
                else if (p.status === "present") { content = `<div class="shift-time">${p.s1 || '-'}</div><div class="shift-time" style="color:#ea80fc; margin-top:4px;">${p.s2 || '-'}</div>`; }
                else if (p.status === "off_matin") { content = `<div class="shift-time" style="color:#555; text-decoration:line-through;">Matin OFF</div><div class="shift-time" style="color:#ea80fc; margin-top:4px;">${p.s2 || '-'}</div>`; classN = "is-half"; }
                else if (p.status === "off_soir") { content = `<div class="shift-time">${p.s1 || '-'}</div><div class="shift-time" style="color:#555; text-decoration:line-through; margin-top:4px;">Soir OFF</div>`; classN = "is-half"; }
                return `<div class="mini-day ${classN}"><b>${jours[i]}</b>${content}</div>`;
            }).join('');

            container.innerHTML = `
                <div class="planning-section-title">VOTRE PLANNING PERSONNEL</div>
                <div class="mini-grid" style="border-top: 3px solid ${currentDeptColor}; padding-top: 15px;">
                    ${daysHTML}
                </div>
            `;
        }

        // ENREGISTREMENT DU POINTAGE (HORODATAGE)
        function registerPunch(type) {
            const now = new Date();
            const dateStr = now.toLocaleDateString('fr-FR');
            const timeStr = now.toLocaleTimeString('fr-FR');
            const timestamp = now.getTime();

            const logs = JSON.parse(localStorage.getItem('empire_pointeuse_logs')) || [];
            
            let actionText = "";
            let icon = "";
            let color = "";

            if(type === 'IN') { actionText = "ARRIVÉE ENREGISTRÉE"; icon = "✅"; color = "var(--accent)"; }
            if(type === 'OUT') { actionText = "DÉPART ENREGISTRÉ"; icon = "🛑"; color = "var(--alert)"; }
            if(type === 'BREAK_START') { actionText = "DÉBUT COUPURE"; icon = "☕"; color = "var(--warning)"; }
            if(type === 'BREAK_END') { actionText = "RETOUR COUPURE"; icon = "🔙"; color = "var(--hr)"; }

            logs.push({
                staffId: currentStaff.id,
                staffName: currentStaff.name,
                type: type,
                actionText: actionText,
                date: dateStr,
                time: timeStr,
                timestamp: timestamp
            });
            localStorage.setItem('empire_pointeuse_logs', JSON.stringify(logs));

            document.getElementById('success-icon').textContent = icon;
            document.getElementById('success-message').textContent = actionText;
            document.getElementById('success-message').style.color = color;
            document.getElementById('success-time').textContent = timeStr;
            
            showScreen('success');

            setTimeout(() => {
                showScreen('staff');
            }, 3000);
        }

        // Écoute des mises à jour RH
        window.addEventListener('storage', function(e) {
            if (e.key === 'kds_hr_master_v9' && document.getElementById('screen-staff').style.display !== 'none') {
                renderStaffGrid();
            }
        });

        renderStaffGrid();

    </script>
</body>
</html>
