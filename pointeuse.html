<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire - Terminal de Pointage</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --panel: #111; --blue: #00b0ff; --sub: #666; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; user-select: none; }

        /* HORLOGE CENTRALE */
        #clock { font-size: 5rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 5px; }
        #date { font-size: 1.2rem; color: var(--sub); text-transform: uppercase; letter-spacing: 3px; margin-bottom: 40px; }

        /* AFFICHAGE CODE */
        .code-display { display: flex; gap: 15px; margin-bottom: 40px; }
        .dot { width: 25px; height: 25px; border-radius: 50%; border: 3px solid #333; transition: 0.2s; }
        .dot.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 0 15px var(--accent); }
        .dot.error { background: var(--alert); border-color: var(--alert); }

        /* PAVÉ NUMÉRIQUE */
        .numpad { display: grid; grid-template-columns: repeat(3, 90px); gap: 20px; }
        .num-btn { width: 90px; height: 90px; background: var(--panel); border: 2px solid #222; border-radius: 50%; font-size: 2rem; font-weight: 900; color: #fff; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; }
        .num-btn:active { background: #222; transform: scale(0.9); border-color: var(--accent); }
        .num-btn.clear { color: var(--alert); border-color: rgba(255, 23, 68, 0.2); }

        /* MESSAGE FEEDBACK */
        #msg-box { position: fixed; top: 20px; padding: 20px 40px; border-radius: 12px; font-weight: 900; text-transform: uppercase; transform: translateY(-150%); transition: 0.4s; z-index: 1000; }
        #msg-box.show { transform: translateY(0); }

        /* LISTE ACTUELLE (DISCRET) */
        .active-staff { position: fixed; bottom: 20px; right: 20px; background: #0a0a0a; padding: 15px; border-radius: 10px; border: 1px solid #222; width: 200px; }
        .staff-title { font-size: 0.7rem; color: var(--sub); font-weight: 900; text-transform: uppercase; margin-bottom: 10px; }
        .staff-list { font-size: 0.8rem; font-weight: bold; color: var(--accent); }
    </style>
</head>
<body>

    <div id="msg-box">MESSAGE</div>

    <div id="clock">00:00</div>
    <div id="date">MERCREDI 25 MARS</div>

    <div class="code-display" id="dots">
        <div class="dot"></div><div class="dot"></div><div class="dot"></div><div class="dot"></div>
    </div>

    <div class="numpad">
        <div class="num-btn" onclick="press(1)">1</div>
        <div class="num-btn" onclick="press(2)">2</div>
        <div class="num-btn" onclick="press(3)">3</div>
        <div class="num-btn" onclick="press(4)">4</div>
        <div class="num-btn" onclick="press(5)">5</div>
        <div class="num-btn" onclick="press(6)">6</div>
        <div class="num-btn" onclick="press(7)">7</div>
        <div class="num-btn" onclick="press(8)">8</div>
        <div class="num-btn" onclick="press(9)">9</div>
        <div class="num-btn clear" onclick="clearCode()">✕</div>
        <div class="num-btn" onclick="press(0)">0</div>
        <div class="num-btn" style="border-color: var(--blue); color: var(--blue);" onclick="validate()">OK</div>
    </div>

    <div class="active-staff">
        <div class="staff-title">En poste actuellement</div>
        <div id="staff-on-duty" class="staff-list">Personne</div>
    </div>

    <script>
        let inputCode = "";
        const DOTS = document.querySelectorAll('.dot');

        // 1. HORLOGE
        function updateClock() {
            const now = new Date();
            document.getElementById('clock').textContent = now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'});
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            document.getElementById('date').textContent = now.toLocaleDateString('fr-FR', options).toUpperCase();
        }
        setInterval(updateClock, 1000);
        updateClock();

        // 2. LOGIQUE CLAVIER
        function press(num) {
            if(inputCode.length < 4) {
                inputCode += num;
                updateDots();
            }
            if(inputCode.length === 4) {
                setTimeout(validate, 200);
            }
        }

        function updateDots() {
            DOTS.forEach((dot, i) => {
                if(i < inputCode.length) dot.classList.add('active');
                else dot.classList.remove('active');
            });
        }

        function clearCode() {
            inputCode = "";
            updateDots();
        }

        // 3. VALIDATION ET POINTAGE
        function validate() {
            const staff = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            // Le code est stocké dans le profil employé (champ 'code')
            const employee = staff.find(s => s.code === inputCode);

            if(!employee) {
                feedback("CODE INVALIDE", "var(--alert)");
                return;
            }

            processPunch(employee);
            clearCode();
        }

        function processPunch(emp) {
            let logs = JSON.parse(localStorage.getItem('empire_attendance_logs')) || [];
            const now = new Date();
            const today = now.toISOString().split('T')[0];
            
            // On cherche si l'employé est déjà badgé (Punch In sans Punch Out)
            const lastLogIdx = logs.findLastIndex(l => l.empId === emp.id);
            const lastLog = lastLogIdx !== -1 ? logs[lastLogIdx] : null;

            let type = "IN";
            if(lastLog && lastLog.type === "IN") {
                type = "OUT";
            }

            const newEntry = {
                id: Date.now(),
                empId: emp.id,
                empName: emp.name,
                time: now.getTime(),
                displayTime: now.toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
                date: today,
                type: type
            };

            logs.push(newEntry);
            localStorage.setItem('empire_attendance_logs', JSON.stringify(logs));

            // Log de sécurité pour le Chef
            const globalLogs = JSON.parse(localStorage.getItem('empire_salle_logs')) || [];
            globalLogs.unshift({
                time: newEntry.displayTime,
                msg: `${emp.name} : Pointage ${type}`
            });
            localStorage.setItem('empire_salle_logs', JSON.stringify(globalLogs));

            const color = type === "IN" ? "var(--accent)" : "var(--blue)";
            feedback(`${emp.name} : ${type === 'IN' ? 'SERVICE DÉBUTÉ' : 'SERVICE TERMINÉ'}`, color);
            renderOnDuty();
        }

        function feedback(text, color) {
            const box = document.getElementById('msg-box');
            box.textContent = text;
            box.style.background = color;
            box.style.color = "#000";
            box.classList.add('show');
            setTimeout(() => box.classList.remove('show'), 3000);
        }

        function renderOnDuty() {
            const logs = JSON.parse(localStorage.getItem('empire_attendance_logs')) || [];
            const staff = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            
            let active = [];
            staff.forEach(s => {
                const empLogs = logs.filter(l => l.empId === s.id);
                if(empLogs.length > 0 && empLogs[empLogs.length - 1].type === "IN") {
                    active.push(s.name);
                }
            });

            document.getElementById('staff-on-duty').innerHTML = active.length > 0 ? active.join('<br>') : "Personne";
        }

        renderOnDuty();
        // Synchro si modif sur un autre écran
        window.addEventListener('storage', renderOnDuty);
    </script>
</body>
</html>
