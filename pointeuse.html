<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Pad Commande - Terminal Sécurisé</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #050505; color: #fff; margin: 0; overflow: hidden; }
        
        /* --- STYLE DU MUR DE SÉCURITÉ --- */
        #pad-lock-screen {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: #050505; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .pin-input {
            font-size: 2.5rem; text-align: center; padding: 15px; width: 250px; 
            border-radius: 8px; border: 2px solid #333; background: #111; color: #fff; 
            margin-bottom: 20px; letter-spacing: 15px;
        }
        .pin-input:focus { border-color: #2979ff; outline: none; }
        .unlock-btn {
            background: #00e676; color: #000; font-weight: 900; font-size: 1.2rem; 
            padding: 15px 40px; border: none; border-radius: 8px; cursor: pointer; 
            text-transform: uppercase; transition: 0.2s;
        }
        .unlock-btn:hover { transform: scale(1.05); }

        /* --- STYLE DE TON APPLICATION PAD (CACHÉE PAR DÉFAUT) --- */
        #main-pad-app {
            display: none; /* C'est le mur de sécurité qui rendra ça visible */
            padding: 50px; text-align: center;
        }
    </style>
</head>
<body>

    <div id="pad-lock-screen">
        <h1 style="color:#2979ff; letter-spacing:4px;">TERMINAL DE COMMANDE</h1>
        <h3 style="color:#888; margin-bottom:30px;">IDENTIFICATION STAFF REQUISE</h3>
        
        <input type="password" id="pad-pin-input" class="pin-input" maxlength="6" placeholder="******" autocomplete="off">
        <button class="unlock-btn" onclick="attemptPadLogin()">DÉVERROUILLER</button>
    </div>

    <div id="main-pad-app">
        <h1 style="color: #00e676;">✅ SESSION OUVERTE</h1>
        <h2 id="waiter-name-display" style="text-transform: uppercase; color: #2979ff;"></h2>
        <p>C'est ici que tu placeras tout le code visuel de ta prise de commande (tables, plats, boissons...)</p>
        
        <button onclick="lockPad()" style="margin-top: 50px; padding: 15px; background: #ff1744; color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: bold;">🔒 VERROUILLER LA CAISSE</button>
    </div>

    <script>
        // Fonction déclenchée par le bouton "DÉVERROUILLER"
        function attemptPadLogin() {
            const enteredPin = document.getElementById('pad-pin-input').value;
            
            if(enteredPin.length !== 6) {
                alert("❌ ACCÈS REFUSÉ : Le code tapé ne fait pas 6 chiffres.");
                return;
            }

            // Vérification si la base de données existe sur cet appareil
            const directoryStr = localStorage.getItem('empire_hr_directory');
            if (!directoryStr) {
                alert("❌ ERREUR MÉMOIRE : Aucune base RH trouvée sur ce navigateur. Créez d'abord un employé dans le système RH.");
                return;
            }

            const directory = JSON.parse(directoryStr);
            
            // Recherche du collaborateur
            const staff = directory.find(s => s.pin === enteredPin);

            if (!staff) {
                alert(`❌ ACCÈS REFUSÉ : Code inconnu.`);
                document.getElementById('pad-pin-input').value = '';
                return;
            }

            // Barrière de sécurité par département
            if (staff.dept !== 'service' && staff.dept !== 'bar') {
                alert(`❌ ALERTE SÉCURITÉ : [${staff.name.toUpperCase()}] appartient à la section [${staff.dept.toUpperCase()}]. Accès aux terminaux de commande strictement interdit.`);
                document.getElementById('pad-pin-input').value = '';
                return;
            }

            // SUCCÈS : On cache le mur, on affiche le Pad, et on affiche le nom du serveur
            document.getElementById('pad-lock-screen').style.display = 'none';
            document.getElementById('main-pad-app').style.display = 'block';
            document.getElementById('waiter-name-display').innerText = `Serveur Actif : ${staff.name}`;
            
            document.getElementById('pad-pin-input').value = '';
        }

        // Fonction pour reverrouiller le Pad quand le serveur a fini
        function lockPad() {
            document.getElementById('main-pad-app').style.display = 'none';
            document.getElementById('pad-lock-screen').style.display = 'flex';
            document.getElementById('waiter-name-display').innerText = '';
        }
    </script>
</body>
</html>
