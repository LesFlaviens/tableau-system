<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Carte - EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --border: #333;
            --text-main: #f8fafc;
            --text-muted: #888;
            --gold: #fbbf24;
            --alert: #f87171;
            --accent: #34d399;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        header {
            text-align: center;
            padding: 40px 20px 20px 20px;
            border-bottom: 1px dashed var(--border);
            background: linear-gradient(to bottom, #1a1a1a 0%, var(--bg) 100%);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .brand-name {
            color: var(--gold);
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 10px;
            margin: 0 0 5px 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .menu-container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        .category-title {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 40px 0 20px 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .category-title::before, .category-title::after {
            content: '';
            height: 1px;
            background: var(--gold);
            flex: 1;
            opacity: 0.3;
        }

        .item {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
        }

        .item-info {
            flex: 1;
            padding-right: 15px;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 5px;
            line-height: 1.4;
        }

        .item-price {
            font-size: 1.2rem;
            font-weight: 900;
            color: var(--text-main);
            background: rgba(255,255,255,0.1);
            padding: 8px 15px;
            border-radius: 8px;
            white-space: nowrap;
        }

        /* 🟢 LE MODE RUPTURE DE STOCK (SOLD OUT) 🟢 */
        .item.sold-out {
            opacity: 0.4;
            border-color: var(--alert);
            background: rgba(248, 113, 113, 0.05);
        }

        .item.sold-out .item-name {
            text-decoration: line-through;
            color: var(--text-muted);
        }

        .item.sold-out .item-price {
            background: transparent;
            color: var(--alert);
            font-size: 0.9rem;
            border: 1px solid var(--alert);
        }

        .loader {
            text-align: center;
            color: var(--text-muted);
            padding: 50px;
            font-style: italic;
        }

        .footer-note {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.8rem;
            margin-top: 40px;
            border-top: 1px solid var(--border);
            padding-top: 20px;
        }

        /* Navigation par ancres (Rapide) */
        .quick-nav {
            display: flex;
            overflow-x: auto;
            gap: 10px;
            padding: 15px 20px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 110px; /* S'accroche juste sous le header */
            z-index: 99;
        }

        .quick-nav::-webkit-scrollbar { display: none; }

        .nav-chip {
            background: var(--bg);
            color: var(--text-muted);
            border: 1px solid var(--border);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            white-space: nowrap;
        }

        .nav-chip:hover, .nav-chip:active {
            border-color: var(--gold);
            color: var(--gold);
        }

    </style>
</head>
<body>

    <header>
        <h1 class="brand-name">EMPIRE</h1>
        <div class="subtitle">La Carte</div>
    </header>

    <div class="quick-nav">
        <a href="#cat-suggestions" class="nav-chip">Suggestions</a>
        <a href="#cat-entrees" class="nav-chip">Entrées</a>
        <a href="#cat-plats" class="nav-chip">Plats</a>
        <a href="#cat-desserts" class="nav-chip">Desserts</a>
        <a href="#cat-boissons" class="nav-chip">Boissons & Bar</a>
    </div>

    <div class="menu-container" id="menu-content">
        <div class="loader">Synchronisation avec la cuisine en cours...</div>
    </div>

    <div class="footer-note">
        Prix nets en euros, service compris.<br>
        L'Empire met à jour sa carte en temps réel.<br>
        <span id="sync-indicator" style="color: var(--accent); font-weight: bold;">● En ligne</span>
    </div>

    <script>
        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    if (window.location.protocol !== 'file:') {
                        let r = await fetch('/get-current-state');
                        if(r.ok) state = await r.json();
                    } else throw new Error("Local");
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            }
        };

        const CATEGORY_TITLES = {
            "menuJour": "Menu du Jour",
            "suggestions": "Suggestions du Chef",
            "entrees": "Entrées",
            "plats": "Plats",
            "desserts": "Desserts",
            "vins": "Vins",
            "cocktails": "Cocktails Créations",
            "bieres": "Bières",
            "spiritueux": "Spiritueux",
            "chaudes": "Boissons Chaudes",
            "froides": "Softs & Jus"
        };

        function cleanItemName(name) {
            // Retire l'étoile technique utilisée par le système interne
            return name.replace('🌟 ', '').replace(/\n/g, '<br>');
        }

        function renderCategory(catId, items) {
            if (!items || items.length === 0) return '';
            
            let html = `<div id="cat-${catId}"><h2 class="category-title">${CATEGORY_TITLES[catId] || catId}</h2>`;
            
            items.forEach(item => {
                let isSoldOut = (item.stock === 0);
                let priceDisplay = isSoldOut ? "ÉPUISÉ" : `${parseFloat(item.price).toFixed(2)} €`;
                
                html += `
                    <div class="item ${isSoldOut ? 'sold-out' : ''}">
                        <div class="item-info">
                            <div class="item-name">${cleanItemName(item.name)}</div>
                        </div>
                        <div class="item-price">${priceDisplay}</div>
                    </div>
                `;
            });
            
            html += `</div>`;
            return html;
        }

        async function syncClientMenu() {
            try {
                const state = await API.getState();
                let cuisineData = {};
                let barData = {};

                if (state && state.activeOrders) {
                    if (state.activeOrders['MENU_MASTER']) cuisineData = state.activeOrders['MENU_MASTER'].data || {};
                    if (state.activeOrders['MENU_MASTER_BAR']) barData = state.activeOrders['MENU_MASTER_BAR'].data || {};
                    
                    document.getElementById('sync-indicator').style.color = "var(--accent)";
                    document.getElementById('sync-indicator').innerText = "● En direct de la cuisine";
                }

                let fullHtml = '';
                
                // Ordre d'affichage de la carte
                fullHtml += renderCategory('suggestions', cuisineData.suggestions);
                fullHtml += renderCategory('menuJour', cuisineData.menuJour);
                fullHtml += renderCategory('entrees', cuisineData.entrees);
                fullHtml += renderCategory('plats', cuisineData.plats);
                fullHtml += renderCategory('desserts', cuisineData.desserts);
                
                // Section Bar regroupée
                let hasDrinks = Object.values(barData).some(arr => arr && arr.length > 0);
                if (hasDrinks) {
                    fullHtml += `<div id="cat-boissons">`;
                    fullHtml += renderCategory('cocktails', barData.cocktails);
                    fullHtml += renderCategory('vins', barData.vins);
                    fullHtml += renderCategory('bieres', barData.bieres);
                    fullHtml += renderCategory('spiritueux', barData.spiritueux);
                    fullHtml += renderCategory('froides', barData.froides);
                    fullHtml += renderCategory('chaudes', barData.chaudes);
                    fullHtml += `</div>`;
                }

                if (fullHtml === '') {
                    fullHtml = '<div class="loader">Le menu est en cours de création par le Chef...</div>';
                }

                document.getElementById('menu-content').innerHTML = fullHtml;

            } catch (e) {
                console.error("Erreur de synchronisation", e);
                document.getElementById('sync-indicator').style.color = "var(--alert)";
                document.getElementById('sync-indicator').innerText = "● Mode hors-ligne";
            }
        }

        // Lancement initial
        syncClientMenu();
        
        // Rafraîchissement automatique toutes les 5 secondes (pour les ruptures de stock en direct)
        setInterval(syncClientMenu, 5000);

    </script>
</body>
</html>
