<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL BAR - Empire COMMAND</title>
    <style>
        :root { --bg: #050505; --accent: #00b0ff; --text: #fff; }
        /* Style identique à la cuisine mais avec --accent bleu */
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .view-salle { width: 40%; border-right: 2px solid #222; background: #000; position: relative; }
        .view-orders { flex: 1; padding: 25px; overflow-y: auto; }
        .ticket { background: #121212; border-left: 8px solid var(--accent); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .btn-ready { width: 100%; padding: 15px; background: var(--accent); border: none; color: black; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="view-salle" id="canvas-mirror">
        <div style="padding:20px; color:#444; font-weight:900;">🧊 MIROIR SALLE (FROID)</div>
    </div>
    <div class="view-orders">
        <h1 style="color:var(--accent); text-transform:uppercase;">Bons de Boissons</h1>
        <div id="zone-tickets"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('order-received', (order) => {
            const boissons = order.articles.filter(a => a.includes('[Boisson]'));
            if (boissons.length > 0) {
                const div = document.createElement('div');
                div.className = 'ticket';
                div.innerHTML = `
                    <h3>${order.table}</h3>
                    <ul>${boissons.map(b => `<li>${b.replace('[Boisson] ', '')}</li>`).join('')}</ul>
                    <button class="btn-ready" onclick="this.parentElement.remove()">Servi au Bar</button>
                `;
                document.getElementById('zone-tickets').prepend(div);
            }
        });
    </script>
</body>
</html>
