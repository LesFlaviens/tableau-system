<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Bar</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .ticket { background: #111; border-left: 10px solid #00b0ff; padding: 20px; border-radius: 10px; }
        .btn { width: 100%; padding: 15px; background: #00b0ff; border: none; color: black; font-weight: 900; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <h1 style="color:#00b0ff;">🧊 BAR (BOISSONS)</h1>
    <div class="grid" id="container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('order-received', (order) => {
            const items = order.articles.filter(a => a.includes('[Boisson]'));
            if (items.length > 0) {
                const div = document.createElement('div');
                div.className = 'ticket';
                div.innerHTML = `<h2>${order.table}</h2><ul>${items.map(i => `<li>${i.replace('[Boisson] ', '')}</li>`).join('')}</ul><button class="btn" onclick="this.parentElement.remove()">PRÊT</button>`;
                document.getElementById('container').prepend(div);
            }
        });
        <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('order-received', (order) => {
            const items = order.articles.filter(a => a.includes('[Boisson]'));
            if (items.length > 0) {
                const div = document.createElement('div');
                div.className = 'ticket';
                div.innerHTML = `<h2>${order.table}</h2><ul>${items.map(i => `<li>${i.replace('[Boisson] ', '')}</li>`).join('')}</ul>
                <button class="btn" onclick="validerTicket(this, '${order.table}')">PRÊT</button>`;
                document.getElementById('container').prepend(div);
            }
        });

        // La fonction qui renvoie le signal en salle
        function validerTicket(btn, tableId) {
            socket.emit('order-ready', { table: tableId, poste: 'Bar' });
            btn.parentElement.remove();
        }
    </script>
    </script>
</body>
</html>
