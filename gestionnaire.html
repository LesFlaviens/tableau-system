<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Serveur Mobile</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; --gold: #ffb300; --paying: #ffeb3b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        header { border-bottom: 1px solid #333; padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #000; }
        .room-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #0a0a0a; }
        .room-tab { background: transparent; border: 1px solid #444; color: #aaa; padding: 8px 15px; border-radius: 20px; white-space: nowrap; font-size: 0.8rem; }
        .room-tab.active { background: #fff; color: #000; border-color: #fff; }
        .floor-plan { flex: 1; position: relative; overflow: auto; padding: 10px; }
        .table-obj { position: absolute; background: #000; border: 2px solid #fff; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 8px; font-size: 1.2rem; }
        .table-obj.occupied { border-color: var(--alert); color: var(--alert); }
        .table-obj.paying { border-color: var(--paying); color: var(--paying); }
        @keyframes blink { 0% { background: #000; } 100% { background: var(--accent); color: #000; } }
        .table-obj.ready { animation: blink 0.5s infinite alternate; }
        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; }
        .drawer.open { transform: translateX(0); }
        .ticket-area { flex: 0 0 30vh; overflow-y: auto; padding: 15px; border-bottom: 1px solid #333; }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px; overflow-y: auto; }
        .btn-item { background: #000; border: 1px solid #444; color: #fff; padding: 10px; text-align: center; border-radius: 4px; font-size: 0.75rem; font-weight: bold; min-height: 60px; display: flex; align-items: center; justify-content: center; }
        .footer { padding: 15px; background: #000; border-top: 1px solid #333; }
        .btn-main { width: 100%; padding: 15px; border-radius: 6px; font-weight: 900; border: none; text-transform: uppercase; margin-bottom: 8px;}
        #facture-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 20000; padding: 20px; box-sizing: border-box; flex-direction: column; }
        #facture-modal.active-modal { display: flex; }
    </style>
</head>
<body>
    <header><div style="font-weight:900;">EMPIRE SERVEUR</div><button onclick="location.reload()">🔄</button></header>
    <div id="room-bar" class="room-bar"></div>
    <div id="floor-plan" class="floor-plan"></div>

    <div id="caisse-drawer" class="drawer">
        <div style="padding:15px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h2 id="table-title" style="margin:0;">T1</h2><button onclick="document.getElementById('caisse-drawer').classList.remove('open')" style="background:none; border:1px solid #fff; color:#fff; border-radius:50%; width:30px; height:30px;">✕</button>
        </div>
        <div class="ticket-area" id="ticket-list"></div>
        <div id="cat-tabs" style="display:flex; gap:5px; padding:10px; overflow-x:auto;"></div>
        <div class="menu-grid" id="menu-items"></div>
        <div class="footer">
            <div style="text-align:right; margin-bottom:10px;">
                <div style="font-size:0.8rem; color:var(--sub);">PAYÉ: <span id="paid-val">0</span>€</div>
                <div style="font-size:1.5rem; font-weight:900;">RESTE: <span id="remain-val">0</span>€</div>
            </div>
            <button class="btn-main" style="background:var(--gold); color:#000;" onclick="ouvrirAddition()">🧾 ADDITION / SPLIT</button>
            <button class="btn-main" style="background:#fff; color:#000;" onclick="syncServer()">ENVOYER CUISINE</button>
        </div>
    </div>

    <div id="facture-modal">
        <h2 style="color:var(--gold); text-align:center;">PAIEMENT</h2>
        <div id="f-items" style="flex:1; overflow-y:auto; background:#fff; color:#000; padding:15px; border-radius:4px; font-family:monospace;"></div>
        <div style="margin:20px 0;">
            <div style="margin-bottom:10px;">DIVISER LE RESTE PAR :</div>
            <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:8px;">
                <button class="room-tab" onclick="calcSplit(1)">1</button>
                <button class="room-tab" onclick="calcSplit(2)">2</button>
                <button class="room-tab" onclick="calcSplit(3)">3</button>
                <button class="room-tab" onclick="calcSplit(4)">4</button>
            </div>
        </div>
        <div id="split-display" style="font-size:1.5rem; font-weight:900; text-align:right; margin-bottom:20px;">PART : 0.00 €</div>
        <button class="btn-main" style="background:var(--accent); color:#000;" onclick="validerPaiement()">💰 ENCAISSER PART</button>
        <button class="btn-main" style="background:#333; color:#fff;" onclick="document.getElementById('facture-modal').classList.remove('active-modal')">ANNULER</button>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = []; let currentPaid = 0; let splitN = 1;
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];
        let rooms = JSON.parse(localStorage.getItem('EMPIRE_ROOMS')) || [{id:'r_main', name:'SALLE'}];
        let currentRoomId = rooms[0].id;

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type==='ORDER_UPDATE'||d.type==='PLAN_UPDATE') { 
                activeOrders = d.activeOrders || activeOrders; 
                renderFloorPlan();
                if(currentTableId && activeOrders[currentTableId]) {
                    currentPaid = activeOrders[currentTableId].paidAmount || 0;
                    currentTicket = activeOrders[currentTableId].items || [];
                    renderTicket();
                }
            }
        };

        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                if(t.roomId !== currentRoomId) return;
                const div = document.createElement('div'); div.className = 'table-obj';
                const o = activeOrders[t.label];
                if(o) {
                    if(o.status==='ready') div.classList.add('ready');
                    else if(o.status==='paying') div.classList.add('paying');
                    else div.classList.add('occupied');
                }
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = t.label; div.onclick = () => openCaisse(t.label); floor.appendChild(div);
            });
        }

        function openCaisse(label) {
            currentTableId = label; document.getElementById('table-title').innerText = label;
            const o = activeOrders[label]; currentTicket = o ? o.items : []; currentPaid = o ? (o.paidAmount||0) : 0;
            renderTicket(); renderMenu('Entrée'); document.getElementById('caisse-drawer').classList.add('open');
        }

        function renderTicket() {
            let total = 0;
            document.getElementById('ticket-list').innerHTML = currentTicket.map(i => { total+=i.p; return `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #222; padding:5px 0;"><span>${i.n}</span><span>${i.p}€</span></div>`; }).join('');
            document.getElementById('paid-val').innerText = currentPaid.toFixed(2);
            document.getElementById('remain-val').innerText = (total - currentPaid).toFixed(2);
        }

        function renderMenu(cat) {
            const recipes = JSON.parse(localStorage.getItem('empire_recipes')) || [];
            const cats = ['Entrée', 'Plat', 'Dessert', 'Boisson'];
            document.getElementById('cat-tabs').innerHTML = cats.map(c => `<button class="room-tab ${c===cat?'active':''}" onclick="renderMenu('${c}')">${c}</button>`).join('');
            document.getElementById('menu-items').innerHTML = recipes.filter(r => r.category === cat).map(r => `<div class="btn-item" onclick="addItem('${r.name}', ${r.price})">${r.name}</div>`).join('');
        }

        function addItem(n, p) { currentTicket.push({id:Date.now(), n, p, done:false}); renderTicket(); syncServer(); }

        async function syncServer() {
            const order = { table: currentTableId, items: currentTicket, paidAmount: currentPaid, status: activeOrders[currentTableId]?.status || 'pending', time: new Date().toLocaleTimeString() };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('caisse-drawer').classList.remove('open');
        }

        function ouvrirAddition() {
            document.getElementById('f-items').innerHTML = document.getElementById('ticket-list').innerHTML;
            calcSplit(1); document.getElementById('facture-modal').classList.add('active-modal');
            activeOrders[currentTableId].status = 'paying';
            fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order: activeOrders[currentTableId] }) });
        }

        function calcSplit(n) { splitN = n; const total = currentTicket.reduce((acc, i) => acc+i.p, 0); const reste = total - currentPaid; document.getElementById('split-display').innerText = `PART : ${(reste/n).toFixed(2)} €`; }

        async function validerPaiement() {
            const total = currentTicket.reduce((acc, i) => acc+i.p, 0); const reste = total - currentPaid; const part = reste / splitN;
            if(!confirm(`Encaisser ${part.toFixed(2)}€ ?`)) return;
            currentPaid += part;
            if(currentPaid >= total - 0.05) {
                await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order: null }) });
                document.getElementById('facture-modal').classList.remove('active-modal');
                document.getElementById('caisse-drawer').classList.remove('open');
            } else {
                const order = { table: currentTableId, items: currentTicket, paidAmount: currentPaid, status: 'paying', time: new Date().toLocaleTimeString() };
                await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
                calcSplit(1); renderTicket();
            }
        }

        renderFloorPlan(); setInterval(() => { fetch('/get-current-state').then(r => r.json()).then(d => { activeOrders = d.activeOrders; renderFloorPlan(); }); }, 3000);
    </script>
</body>
</html>
