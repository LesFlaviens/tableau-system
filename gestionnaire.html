<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire COMMAND - Système Intégral</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --blue: #00b0ff; --text: #fff; --panel: #161616; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        .header { background: #111; padding: 0 30px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; height: 65px; align-items: center; z-index: 5000; position: relative; }
        .logo { font-weight: 900; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        .btn-chef { background: var(--accent); color: #000; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; margin-right: 10px; transition: 0.2s; }
        .btn-lock { background: #333; color: #fff; }
        .architect-mode .btn-lock { background: var(--alert); }
        .room-tabs { display: flex; background: #111; border-bottom: 2px solid #333; height: 50px; }
        .room-tab { background: #1a1a1a; color: #888; border: none; padding: 0 25px; cursor: pointer; font-weight: 900; text-transform: uppercase; border-right: 1px solid #333; }
        .room-tab.active { background: var(--accent); color: #000; }
        #viewport { width: 100vw; height: calc(100vh - 115px); overflow: auto; background: #000; position: relative; }
        #canvas { width: 3000px; height: 3000px; position: relative; background: radial-gradient(#222 0.5px, transparent 0.5px); background-size: 50px 50px; transform-origin: 0 0; }
        .table { position: absolute; border: 2px solid #444; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; border-radius: 8px; color: #fff; background: #2a2a2a; z-index: 10; }
        .table.selected { border-color: var(--accent) !important; box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); }
        .status-occupee { background: #b71c1c; border-color: #f44336; }
        .zone { position: absolute; border: 3px dashed rgba(255, 255, 255, 0.5); z-index: 1; pointer-events: none; display: flex; padding: 10px; }
        .architect-mode .zone { pointer-events: all; cursor: move; border-color: var(--blue); background: rgba(0, 176, 255, 0.05); }
        .zone-label { color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
        .resize-handle { position: absolute; bottom: -6px; right: -6px; width: 16px; height: 16px; background: var(--accent); border-radius: 50%; cursor: se-resize; display: none; }
        .selected .resize-handle { display: block; }
        #order-pad { position: fixed; right: 0; top: 0; width: 400px; height: 100vh; background: #121212; border-left: 2px solid #333; padding: 25px; z-index: 7000; transform: translateX(100%); transition: 0.3s; box-shadow: -10px 0 30px rgba(0,0,0,0.8); overflow-y: auto; }
        #order-pad.open { transform: translateX(0); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .menu-item { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; font-size: 0.8rem; }
        .zoom-controls { position: fixed; left: 20px; top: 80px; z-index: 4000; display: flex; flex-direction: column; gap: 5px; }
        .btn-zoom { width: 40px; height: 40px; background: #111; color: white; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div class="header">
        <div style="display:flex; align-items:center;">
            <div class="logo">EMPIRE COMMAND</div>
            <button class="btn-chef btn-lock" onclick="toggleChefMode()" id="lock-status">🔓 ACCÈS CHEF</button>
            <div id="architect-btns" style="display:none; gap:10px; margin-left:15px;">
                <button class="btn-chef" onclick="addItem('table')">+ TABLE</button>
                <button class="btn-chef" onclick="addItem('zone')">+ ZONE</button>
                <button class="btn-chef" onclick="save()">💾 ENREGISTRER</button>
            </div>
        </div>
        <div id="clock" style="font-weight:900; color:#555;">--:--</div>
    </div>
    <div class="room-tabs"><button class="room-tab active">RESTAURANT</button></div>
    <div id="viewport"><div id="canvas"></div></div>
    <div class="zoom-controls">
        <button class="btn-zoom" onclick="changeZoom(0.1)">+</button>
        <button class="btn-zoom" onclick="changeZoom(-0.1)">-</button>
    </div>
    <div id="order-pad">
        <button onclick="closePad()" style="float:right; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">✕</button>
        <h2 id="pad-table-id" style="color:var(--accent); font-size:2rem; margin-top:0;">Table --</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="addToBasket('Burger Empire', 19.50, 'Cuisine')">Burger Empire <br><b style="color:var(--accent)">19.50€</b></div>
            <div class="menu-item" onclick="addToBasket('Fondue Savoyarde', 24.00, 'Cuisine')">Fondue Savoyarde <br><b style="color:var(--accent)">24.00€</b></div>
            <div class="menu-item" onclick="addToBasket('Mojito', 12.00, 'Bar')">Mojito <br><b style="color:var(--accent)">12.00€</b></div>
            <div class="menu-item" onclick="addToBasket('Bière Pression', 8.00, 'Bar')">Bière Pression <br><b style="color:var(--accent)">8.00€</b></div>
        </div>
        <div id="basket" style="margin-top:20px; background:#000; padding:15px; border-radius:8px; border:1px solid #222; min-height:100px;"></div>
        <button class="btn-chef" style="width:100%; padding:15px; background:var(--accent); margin-top:15px;" onclick="submitOrder()">ENVOYER COMMANDE</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socketIO = io(); 
        const SCALE = 50; let currentZoom = 1.0;
        let isChef = false; let currentTable = null; let localBasket = [];
        let layouts = { "RESTAURANT": { tables: [{id:"T1", x:150, y:150, w:2, h:2}, {id:"T2", x:350, y:150, w:2, h:2}], zones: [{id:"SALLE", x:50, y:50, w:27, h:19}] } };

        function toggleChefMode() {
            if (!isChef) { if (prompt("CODE CHEF :") === "8888") { isChef = true; document.body.classList.add('architect-mode'); document.getElementById('architect-btns').style.display='flex'; document.getElementById('lock-status').textContent="🔒 MODE CHEF"; } }
            else { isChef = false; document.body.classList.remove('architect-mode'); document.getElementById('architect-btns').style.display='none'; document.getElementById('lock-status').textContent="🔓 ACCÈS CHEF"; }
            render();
        }

        function render() {
            const canvas = document.getElementById('canvas'); canvas.innerHTML = "";
            let l = layouts["RESTAURANT"];
            l.zones.forEach(z => {
                const div = document.createElement('div'); div.className = "zone";
                div.style.left = z.x+'px'; div.style.top = z.y+'px'; div.style.width = (z.w*SCALE)+'px'; div.style.height = (z.h*SCALE)+'px';
                div.innerHTML = `<span class="zone-label">${z.id}</span>`;
                canvas.appendChild(div);
            });
            l.tables.forEach(t => {
                const div = document.createElement('div'); div.className = "table";
                div.style.left = t.x+'px'; div.style.top = t.y+'px'; div.style.width = (t.w*SCALE)+'px'; div.style.height = (t.h*SCALE)+'px';
                div.innerHTML = t.id;
                div.onclick = () => openPad(t.id);
                canvas.appendChild(div);
            });
        }

        function openPad(id) {
            currentTable = id; document.getElementById('pad-table-id').textContent = "Table " + id;
            document.getElementById('order-pad').classList.add('open');
        }

        function addToBasket(n, p, d) { localBasket.push({n, p, d}); updateBasket(); }
        function updateBasket() {
            document.getElementById('basket').innerHTML = localBasket.map(i => `<div style="padding:5px 0; border-bottom:1px solid #111;">• ${i.n} (${i.d})</div>`).join('');
        }

        async function submitOrder() {
            if (localBasket.length > 0) {
                // Envoi à la cuisine et au bar
                socketIO.emit('new-order', {
                    table: "Table " + currentTable,
                    heure: new Date().toLocaleTimeString('fr-FR'),
                    articles: localBasket.map(i => `${i.d === 'Bar' ? '[Boisson]' : '[Plat]'} 1x ${i.n}`)
                });
                alert("Signal envoyé en production !");
                localBasket = []; updateBasket(); closePad();
            }
        }

        function changeZoom(d) { currentZoom += d; document.getElementById('canvas').style.transform = `scale(${currentZoom})`; }
        function closePad() { document.getElementById('order-pad').classList.remove('open'); }
        function addItem(type) { /* Logique simplifiée pour l'exemple */ alert("Ajouté !"); }
        function save() { alert("Plan enregistré !"); }
        setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
        window.onload = render;
    </script>
</body>
</html>
