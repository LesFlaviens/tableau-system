<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire COMMAND - Salle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --text: #fff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; height: 100vh; }
        #canvas { flex: 1; position: relative; background: radial-gradient(#222 0.5px, transparent 0.5px); background-size: 30px 30px; }
        
        /* Les Tables par défaut */
        .table { position: absolute; width: 100px; height: 100px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-weight: 900; background: #1a1a1a; cursor: pointer; border-radius: 10px; transition: 0.2s; font-size: 1.2rem; }
        
        /* L'EFFET D'ALERTE VISUELLE (Clignotement) */
        @keyframes pulse-ready {
            0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); border-color: var(--accent); background: #113322; color: #fff; }
            50% { box-shadow: 0 0 0 20px rgba(0, 230, 118, 0); border-color: #fff; background: var(--accent); color: #000; }
            100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); border-color: var(--accent); background: #113322; color: #fff; }
        }
        .table.ready { animation: pulse-ready 1.5s infinite; z-index: 50; }

        /* Le Tiroir de Commande */
        #order-pad { width: 400px; background: #111; border-left: 2px solid #333; padding: 25px; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: fixed; right: 0; height: 100vh; z-index: 100; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        #order-pad.open { transform: translateX(0); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .menu-item { background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; transition: 0.1s; }
        .menu-item:active { transform: scale(0.95); border-color: var(--accent); }
        .btn-send { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; margin-top: 20px; transition: 0.2s; font-size: 1.1rem; }
        
        /* Notifications Web (Toast) */
        #toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 5000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #111; border-left: 5px solid var(--accent); padding: 15px 20px; border-radius: 8px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s forwards; cursor: pointer; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="canvas">
        <div class="table" id="table-1" style="left:100px; top:100px;" onclick="openPad('1')">T1</div>
        <div class="table" id="table-2" style="left:250px; top:100px;" onclick="openPad('2')">T2</div>
        <div class="table" id="table-3" style="left:400px; top:100px;" onclick="openPad('3')">T3</div>
    </div>

    <div id="toast-container"></div>

    <div id="order-pad">
        <h2 id="pad-title" style="color:var(--accent); margin-top:0; font-size: 2.5rem;">Table --</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="add('Burger', 'Cuisine')">🍔 Burger</div>
            <div class="menu-item" onclick="add('Mojito', 'Bar')">🍹 Mojito</div>
        </div>
        <div id="basket" style="margin-top:20px; height:250px; background:#000; padding:15px; overflow-y:auto; border-radius:8px; border:1px solid #333;"></div>
        <button class="btn-send" onclick="send()">ENVOYER EN PRODUCTION</button>
        <button onclick="closePad()" style="width:100%; margin-top:15px; background:none; border:none; color:#888; cursor:pointer; font-weight:bold; padding: 10px;">FERMER LE TIROIR</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentTable = null; let basket = [];

        // 🎵 L'ALERTE SONORE (Générée sans fichier audio pour éviter les blocages de navigateur)
        function playServiceBell() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const playTone = (freq, time) => {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(1, ctx.currentTime + time);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + time + 0.5);
                osc.start(ctx.currentTime + time); osc.stop(ctx.currentTime + time + 0.5);
            };
            playTone(783.99, 0);     // Première note
            playTone(1046.50, 0.15); // Seconde note plus aiguë
        }

        // 🚨 RÉCEPTION DU SIGNAL "PRÊT"
        socket.on('notify-ready', (data) => {
            playServiceBell();
            
            // On extrait le numéro de la table (ex: "Table 1" -> "1")
            const tableMatch = data.table.match(/Table (\d+)/i);
            
            if (tableMatch && tableMatch[1]) {
                const tableElement = document.getElementById('table-' + tableMatch[1]);
                if (tableElement) {
                    // Si la table existe sur le plan, on la fait clignoter
                    tableElement.classList.add('ready');
                } else {
                    // Si c'est une commande Web avec un numéro de table qui n'est pas sur l'écran
                    showToast(`🚀 ${data.table} : Commande prête au ${data.poste}`);
                }
            } else {
                // Si c'est une commande purement Web (ex: WEB-2122)
                showToast(`🚀 ${data.table} : Commande prête au ${data.poste}`);
            }
        });

        // NOTIFICATION NON-BLOQUANTE POUR LES COMMANDES WEB
        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = msg + " <span style='float:right;color:#888;margin-left:15px;'>✕</span>";
            toast.onclick = () => toast.remove();
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 10000); // Disparaît après 10s
        }

        function openPad(id) { 
            currentTable = id; 
            document.getElementById('pad-title').innerText = "Table " + id; 
            document.getElementById('order-pad').classList.add('open');
            
            // Coupe l'alarme visuelle dès qu'on clique sur la table
            const tableElement = document.getElementById('table-' + id);
            if(tableElement) tableElement.classList.remove('ready');
        }
        
        function closePad() { document.getElementById('order-pad').classList.remove('open'); }
        function add(n, d) { basket.push({n, d}); render(); }
        function render() { document.getElementById('basket').innerHTML = basket.map(i => `<div style="padding:10px 0; border-bottom:1px solid #222;">• ${i.n} <span style="color:#666;font-size:0.8rem;">(${i.d})</span></div>`).join(''); }

        function send() {
            if(basket.length === 0) return;
            const payload = {
                table: "Table " + currentTable,
                heure: new Date().toLocaleTimeString('fr-FR'),
                articles: basket.map(i => `${i.d === 'Bar' ? '[Boisson]' : '[Plat]'} 1x ${i.n}`)
            };
            socket.emit('new-order', payload);
            
            // Remplacement de l'alerte bloquante par une validation visuelle rapide sur le bouton
            const btn = document.querySelector('.btn-send');
            const oldText = btn.innerText;
            btn.innerText = "✓ ORDRE TRANSMIS";
            btn.style.background = "#fff";
            
            setTimeout(() => { 
                btn.innerText = oldText; 
                btn.style.background = "var(--accent)"; 
                basket = []; render(); closePad();
            }, 800);
        }
    </script>
</body>
</html>
