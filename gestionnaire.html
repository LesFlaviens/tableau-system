<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire - Gestionnaire de Salle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --purple: #ea80fc; --blue: #00b0ff; --warning: #ffb300; --sub: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        #security-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--alert); }
        
        header { border-bottom: 1px solid #333; padding: 15px 25px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { color: var(--accent); font-size: 1.8rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        
        .header-controls { display: flex; gap: 15px; }
        .btn-top { background: #111; font-weight: 900; border-radius: 6px; padding: 12px 20px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 1rem; border: 2px solid transparent; color: #fff; }
        .btn-top:active { transform: scale(0.95); }
        .btn-plan { border-color: #888; color: #ccc; }
        .btn-res { border-color: var(--purple); color: var(--purple); }
        .btn-admin { border-color: var(--warning); color: var(--warning); }

        #archi-toolbar { display: none; background: var(--blue); padding: 10px 25px; justify-content: space-between; align-items: center; color: #000; font-weight: 900; text-transform: uppercase; box-shadow: 0 5px 20px rgba(0, 176, 255, 0.3); }
        .btn-archi-action { background: rgba(0,0,0,0.5); border: none; color: #fff; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer;}

        .zones-bar { display: flex; border-bottom: 1px solid #222; background: #050505; }
        .zone-tab { padding: 15px 30px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #555; border-right: 1px solid #222; }
        .zone-tab.active { background: var(--accent); color: #000; }

        .main-workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* RADAR WOOCOMMERCE (FLUX WEB) */
        .radar-panel { width: 350px; background: #0a0a0a; border-right: 1px solid #222; padding: 20px; display: flex; flex-direction: column; overflow-y: auto; }
        .radar-title { color: var(--blue); font-size: 1rem; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid #222; padding-bottom: 10px;}
        
        .web-order-card { background: #111; border: 1px solid #333; border-left: 4px solid var(--blue); padding: 15px; border-radius: 8px; margin-bottom: 15px; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }
        
        .web-order-header { display: flex; justify-content: space-between; font-weight: bold; margin-bottom: 10px; }
        .web-order-items { font-size: 0.9rem; color: #ccc; margin-bottom: 10px; list-style: none; padding: 0; }
        .web-order-items li { border-bottom: 1px dashed #222; padding: 4px 0; }
        .btn-archive { background: transparent; border: 1px solid #444; color: #888; width: 100%; padding: 8px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase; }

        .floor-plan { flex: 1; position: relative; background: #050505; overflow: hidden; }
        .floor-plan.archi-active { background: radial-gradient(circle, #333 2px, #050505 2px); background-size: 30px 30px; }
        
        .table-obj { position: absolute; display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); padding: 5px; box-sizing: border-box; background: #161616; border: 2px solid #555; color: #fff; font-size: 1.2rem; z-index: 20; border-radius: 8px; transition: 0.2s;}
        
        /* TIROIRS */
        .drawer { position: absolute; top: 0; right: 0; width: 500px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 30px; z-index: 9000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -20px 0 50px rgba(0,0,0,0.9);}
        .drawer.open { transform: translateX(0); }
        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: #aaa; font-size: 1.5rem; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div id="security-block">
        <h1 style="font-size: 3rem;">🛑 ACCÈS REFUSÉ</h1>
        <p>Clé ICHEF2026 requise.</p>
    </div>

    <header id="main-header" style="display:none;">
        <h1 class="header-title">SUPERVISION EMPIRE</h1>
        <div class="header-controls">
            <button class="btn-top btn-res" onclick="openDrawer('res-drawer')">📅 RÉSERVATIONS</button>
            <button class="btn-top btn-admin" onclick="openDrawer('admin-drawer')">🔒 SUPERVISION</button>
        </div>
    </header>

    <div id="archi-toolbar" style="display:none;">
        <div style="display:flex; gap:10px;">
            <button class="btn-archi-action" onclick="addTable()">+ NOUVELLE TABLE</button>
            <button class="btn-archi-action" onclick="saveArchitecture()" style="background:var(--accent); color:#000;">💾 SAUVEGARDER</button>
        </div>
    </div>

    <div class="zones-bar" id="zones-bar" style="display:none;"></div>

    <div class="main-workspace" id="workspace" style="display:none;">
        
        <div class="radar-panel" id="radar-web">
            <div class="radar-title">🌐 RADAR WOOCOMMERCE</div>
            <div id="web-orders-container">
                <div style="color:#444; text-align:center; margin-top:40px; font-style:italic;">En attente de commandes web...</div>
            </div>
        </div>

        <div class="floor-plan" id="floor-plan"></div>

        <div id="res-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('res-drawer')">✕</button>
            <h2 style="color:var(--purple); margin: 30px 0 20px 0; font-size: 1.8rem; text-transform: uppercase;">📅 RÉSERVATIONS</h2>
            <div id="res-list-container"></div>
        </div>

        <div id="admin-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('admin-drawer')">✕</button>
            <h2 style="color:var(--warning); margin: 30px 0 30px 0; font-size: 1.8rem; text-transform: uppercase;">ADMINISTRATION</h2>
            <button onclick="enableArchitecture()" style="width:100%; padding:20px; background:#111; border:1px solid #333; color:#fff; font-weight:bold; cursor:pointer;">🛠️ MODE ARCHITECTURE</button>
            <button onclick="window.location.href='rh.html'" style="width:100%; padding:20px; background:#111; border:1px solid #333; color:var(--purple); font-weight:bold; cursor:pointer; margin-top:10px;">👔 ACCÈS RH</button>
        </div>
    </div>

    <script>
        // SÉCURITÉ ET BOOT
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('key') === 'ICHEF2026') {
            document.getElementById('security-block').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('zones-bar').style.display = 'flex';
            document.getElementById('workspace').style.display = 'flex';
            initApp();
        }

        // --- MOTEUR RADAR WEB (ICHEF.CH/CARTE) ---
        function renderWebRadar() {
            const queue = JSON.parse(localStorage.getItem('empire_kds_queue')) || [];
            const container = document.getElementById('web-orders-container');
            
            // On ne filtre que les commandes venant du WEB
            const webOrders = queue.filter(o => o.id && o.id.toString().startsWith('WEB_'));

            if (webOrders.length === 0) {
                container.innerHTML = '<div style="color:#333; text-align:center; margin-top:40px; font-style:italic;">En attente de commandes web...</div>';
                return;
            }

            container.innerHTML = webOrders.map(order => {
                const allItems = [...order.ticket.entrees, ...order.ticket.plats, ...order.ticket.desserts, ...order.ticket.boissons];
                return `
                    <div class="web-order-card">
                        <div class="web-order-header">
                            <span style="color:var(--blue);">${order.table}</span>
                            <span style="font-size:0.8rem; color:#666;">${order.time}</span>
                        </div>
                        <ul class="web-order-items">
                            ${allItems.map(i => `<li>1x ${i.name.replace(' [WEB]', '')}</li>`).join('')}
                        </ul>
                        <button class="btn-archive" onclick="archiveWebOrder('${order.id}')">Marquer comme remis ✓</button>
                    </div>
                `;
            }).join('');
        }

        function archiveWebOrder(id) {
            let queue = JSON.parse(localStorage.getItem('empire_kds_queue')) || [];
            queue = queue.filter(o => o.id !== id);
            localStorage.setItem('empire_kds_queue', JSON.stringify(queue));
            renderWebRadar();
        }

        // --- GESTION DU PLAN DE SALLE ---
        let currentZoneId = 'z1';

        function loadFloorPlan() {
            const floor = document.getElementById('floor-plan');
            floor.innerHTML = '';
            const tables = JSON.parse(localStorage.getItem('empire_salle_tables')) || [];
            
            tables.filter(t => t.zoneId === currentZoneId).forEach(t => {
                const div = document.createElement('div');
                div.className = 'table-obj';
                div.innerHTML = t.label || t.id;
                div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                div.style.top = t.t + 'px'; div.style.left = t.l + 'px';
                floor.appendChild(div);
            });
        }

        // SYNCHRONISATION
        window.addEventListener('storage', (e) => {
            if (e.key === 'empire_kds_queue') renderWebRadar();
            if (e.key === 'empire_salle_tables') loadFloorPlan();
        });

        function openDrawer(id) { document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        function initApp() {
            loadFloorPlan();
            renderWebRadar();
            // Rafraîchissement forcé toutes les 10 secondes au cas où
            setInterval(renderWebRadar, 10000);
        }

        // ARCHITECTURE SIMPLE
        function enableArchitecture() {
            document.getElementById('archi-toolbar').style.display = 'flex';
            document.getElementById('floor-plan').classList.add('archi-active');
            closeDrawer('admin-drawer');
        }
        function saveArchitecture() {
            document.getElementById('archi-toolbar').style.display = 'none';
            document.getElementById('floor-plan').classList.remove('archi-active');
        }
    </script>
</body>
</html>
