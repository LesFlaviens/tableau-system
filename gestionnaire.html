<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io(); // On utilise "socket" partout pour être cohérent
    let currentTable = null;
    let localBasket = [];

    // Indique visuellement si on est connecté
    socket.on('connect', () => console.log("✅ Connecté au serveur Empire"));

    function openPad(id) {
        currentTable = id;
        document.getElementById('pad-title').innerText = "Table " + id;
        document.getElementById('order-pad').classList.add('open');
    }

    function addToBasket(n, p, d) {
        localBasket.push({n, p, d});
        renderBasket();
    }

    function renderBasket() {
        document.getElementById('basket').innerHTML = localBasket.map(i => 
            `<div style="padding:10px; border-bottom:1px solid #222;">• ${i.n} (${i.d})</div>`
        ).join('');
    }

    function submitOrder() {
        if (localBasket.length === 0) return alert("Le panier est vide !");

        const payload = {
            table: "Table " + currentTable,
            heure: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
            articles: localBasket.map(i => `${i.d === 'Bar' ? '[Boisson]' : '[Plat]'} 1x ${i.n}`)
        };

        // ENVOI RADIAL
        socket.emit('new-order', payload);
        
        console.log("Ordre émis :", payload);
        alert("COMMANDE ENVOYÉE EN SALLE !");
        
        localBasket = [];
        renderBasket();
        document.getElementById('order-pad').classList.remove('open');
    }

    function closePad() { document.getElementById('order-pad').classList.remove('open'); }
    
    // Initialisation rapide des tables pour le test
    window.onload = () => {
        const canvas = document.getElementById('canvas');
        [1, 2, 3, 4, 5].forEach(num => {
            const t = document.createElement('div');
            t.className = "table";
            t.style.left = (num * 120) + "px"; t.style.top = "150px";
            t.style.width = "80px"; t.style.height = "80px";
            t.innerText = "T" + num;
            t.onclick = () => openPad(num);
            canvas.appendChild(t);
        });
    };
</script>
