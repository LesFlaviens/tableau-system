<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Serveur (Terrain)</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        
        header { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; position: relative; background: #000; flex-wrap: wrap; gap:10px;}
        .header-title { color: var(--text); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; margin: 0; display: flex; align-items: center;}
        .brand-watermark { position: absolute; left: 50%; transform: translateX(-50%); font-family: 'Arial', sans-serif; font-style: italic; font-size: 1.1rem; color: rgba(255,255,255,0.8); font-weight: bold; pointer-events: none; }
        
        .btn-top { background: transparent; border: 1px solid var(--line); color: var(--text); padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s; white-space: nowrap; text-align: center; position: relative;}
        .btn-top:active { background: #fff; color: #000; }
        .radar-badge { position: absolute; top: -8px; right: -8px; background: var(--text); color: #000; border-radius: 50%; width: 22px; height: 22px; font-size: 0.8rem; display: flex; justify-content: center; align-items: center; animation: blink 1s infinite; font-weight: bold;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .room-bar { background: #0a0a0a; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 12px 15px; display: flex; gap: 10px; overflow-x: auto; z-index: 999; }
        .room-tab { background: transparent; border: 1px solid var(--sub); color: var(--sub); padding: 10px 20px; border-radius: 25px; font-weight: 900; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; white-space: nowrap; transition: 0.2s; }
        .room-tab.active { background: #fff; color: #000; border-color: #fff; }

        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; padding: 15px; box-sizing: border-box;}
        
        .floor-plan { flex: 1; position: relative; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: auto; background: transparent; }
        
        .table-obj { position: absolute; background: #000; border: 2px solid var(--line); color: var(--text); display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; border-radius: 8px; cursor: pointer; z-index: 50; font-size: 1.5rem; transition: 0.1s; }
        .table-obj:active { transform: scale(0.92); }
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,23,68,0.1); color: var(--alert); }
        
        /* CLIGNOTEMENT AGRESSIF "COMMANDE PRÊTE" */
        .table-obj.ready { border-color: var(--accent); animation: table-ready-blink 0.6s infinite alternate; z-index: 60; }
        @keyframes table-ready-blink { 
            0% { background-color: #000; color: var(--accent); box-shadow: 0 0 0 transparent; } 
            100% { background-color: var(--accent); color: #000; box-shadow: 0 0 25px var(--accent); } 
        }

        .drawer { position: absolute; top: 0; right: 0; height: 100%; width: 100%; max-width: 500px; background: #050505; border-left: 1px solid var(--line); padding: 15px; z-index: 10000; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-sizing: border-box; }
        .drawer.open { transform: translateX(0); }
        #radar-drawer { right: auto; left: 0; border-left: none; border-right: 1px solid var(--line); transform: translateX(-100%); }
        #radar-drawer.open { transform: translateX(0); }
        
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--line); padding-bottom: 10px; flex-shrink: 0;}
        .btn-close { background: transparent; border: 1px solid var(--line); color: var(--line); width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s;}
        .btn-close:active { background: #fff; color: #000; }

        .ticket-area { flex: 0 0 30%; background: #000; border: 1px solid var(--line); border-radius: 4px; padding: 10px; overflow-y: auto; margin-bottom: 10px; }
        .obs-input-container { flex-shrink: 0; margin-bottom: 10px; }
        .input-field { width: 100%; background: #000; border: 1px solid var(--line); color: var(--text); padding: 12px; border-radius: 4px; font-size: 1rem; box-sizing: border-box; font-family: inherit; font-weight: bold; }
        
        .pos-keyboard { flex: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 5px; background: #0a0a0a;}
        .cat-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; flex-shrink: 0; margin-bottom: 5px;}
        .cat-tab { padding: 12px 15px; background: #000; border: 1px solid var(--line); border-radius: 4px; font-size: 0.85rem; color: var(--sub); font-weight: 900; cursor: pointer; text-transform: uppercase; white-space: nowrap; flex: 1; text-align: center;}
        .cat-tab.active { background: #fff; color: #000; border-color: #fff;}
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; overflow-y: auto; align-content: start; padding-right: 5px;}
        .btn-item { background: #000; border: 1px solid var(--sub); color: var(--line); padding: 12px; border-radius: 4px; font-weight: bold; text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 75px; font-size: 0.9rem; transition: 0.1s;}
        .btn-item:active { background: #fff; color: #000; transform: scale(0.95);}
        .btn-item span:last-child { color: var(--sub); font-size: 0.8rem; margin-top: 5px; }
        
        .total-section { flex-shrink: 0; margin-top: 10px; display: flex; flex-direction: column; gap: 10px;}
        .btn-action { width: 100%; padding: 18px; background: transparent; color: #fff; border: 1px solid #fff; border-radius: 4px; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; letter-spacing: 1px;}
        .btn-action:active { background: #fff; color: #000; }

        .alert-card { border: 1px solid var(--line); padding: 15px; border-radius: 4px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; background: #000;}
        .input-group { margin-bottom: 15px; }
        .input-label { display: block; color: var(--sub); font-size: 0.8rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px;}

        @media (max-width: 500px) { .brand-watermark { display: none; } .drawer { max-width: 100%; } }
    </style>
</head>
<body>

    <header>
        <div class="header-title">SERVEUR</div>
        <div class="brand-watermark">ichef.ch</div>
        <div style="display:flex; gap:10px; flex:1; justify-content: flex-end;">
            <button class="btn-top" style="max-width:100px;" onclick="openDrawer('resa-drawer')">📅 RÉSA</button>
            <button class="btn-top" style="max-width:120px;" onclick="openDrawer('radar-drawer')">
                📡 RADAR<div id="radar-badge" class="radar-badge" style="display:none;">0</div>
            </button>
            <button class="btn-top" style="max-width:50px;" onclick="window.location.reload(true)">🔄</button>
        </div>
    </header>

    <div id="room-bar" class="room-bar"></div>

    <div class="main-workspace">
        <div class="floor-plan" id="floor-plan"></div>

        <div id="radar-drawer" class="drawer">
            <div class="drawer-header"><h2 style="margin:0; font-size: 1.5rem;">ALERTES</h2><button class="btn-close" onclick="closeDrawer('radar-drawer')">✕</button></div>
            <div id="radar-list" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
        </div>

        <div id="caisse-drawer" class="drawer">
            <div class="drawer-header">
                <h2 id="table-title" style="margin:0; font-size:1.8rem; color: #fff;">TABLE</h2>
                <button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button>
            </div>
            <div class="ticket-area" id="ticket-list"></div>
            <div class="obs-input-container">
                <input type="text" id="order-obs" class="input-field" placeholder="⚠️ OBSERVATIONS (Ex: Sans sel, VIP...)">
            </div>
            <div class="pos-keyboard">
                <div class="cat-tabs" id="cat-tabs"></div>
                <div class="menu-grid" id="menu-items"></div>
            </div>
            <div class="total-section">
                <div id="total-val" style="font-size:2rem; font-weight:900; text-align:right;">0.00 €</div>
                <button class="btn-action" style="background:#fff; color:#000;" onclick="sendOrder()">VALIDER LA COMMANDE</button>
            </div>
        </div>

        <div id="resa-drawer" class="drawer">
            <div class="drawer-header"><h2 style="margin:0; font-size: 1.5rem;">NOUVELLE RÉSA</h2><button class="btn-close" onclick="closeDrawer('resa-drawer')">✕</button></div>
            <div style="flex:1; overflow-y:auto; padding-right:5px;">
                <div class="input-group"><span class="input-label">Date</span><input type="date" id="resa-date" class="input-field"></div>
                <div class="input-group"><span class="input-label">Heure</span><input type="time" id="resa-time" class="input-field" value="20:00"></div>
                <div class="input-group"><span class="input-label">Nom du Client</span><input type="text" id="resa-name" class="input-field" placeholder="Ex: Dupont"></div>
                <div class="input-group"><span class="input-label">Téléphone</span><input type="tel" id="resa-tel" class="input-field" placeholder="06..."></div>
                <div class="input-group"><span class="input-label">Couverts</span><input type="number" id="resa-pax" class="input-field" value="2" min="1"></div>
            </div>
            <button class="btn-action" style="background:#fff; color:#000;" onclick="saveResa()">SÉCURISER</button>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];
        
        let isEditMode = false;
        let savedRooms = JSON.parse(localStorage.getItem('EMPIRE_ROOMS'));
        let rooms = (savedRooms && savedRooms.length > 0) ? savedRooms : [{id: 'r_main', name: 'SALLE PRINCIPALE'}];
        let currentRoomId = rooms[0].id;
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];

        const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
        document.getElementById('resa-date').value = tmrw.toISOString().split('T')[0];

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE' || msg.type === 'PLAN_UPDATE') {
                activeOrders = msg.activeOrders || activeOrders;
                
                if (activeOrders['GLOBAL_PLAN'] && !isEditMode) {
                    if(activeOrders['GLOBAL_PLAN'].rooms) { rooms = activeOrders['GLOBAL_PLAN'].rooms; localStorage.setItem('EMPIRE_ROOMS', JSON.stringify(rooms)); }
                    if(activeOrders['GLOBAL_PLAN'].tables) { tables = activeOrders['GLOBAL_PLAN'].tables; localStorage.setItem('EMPIRE_TABLES', JSON.stringify(tables)); }
                }
                
                if (!rooms.find(r => r.id === currentRoomId)) currentRoomId = rooms[0].id;
                renderRooms(); renderFloorPlan(); renderRadar(); 
            }
        };

        window.addEventListener('storage', (e) => { if (e.key === 'empire_recipes' && document.getElementById('caisse-drawer').classList.contains('open')) { renderMenu('Plat'); } });

        async function forceSync() { 
            try { 
                const res = await fetch('/get-current-state'); const data = await res.json(); 
                activeOrders = data.activeOrders; 
                if (activeOrders['GLOBAL_PLAN'] && !isEditMode) {
                    if(activeOrders['GLOBAL_PLAN'].rooms) { rooms = activeOrders['GLOBAL_PLAN'].rooms; localStorage.setItem('EMPIRE_ROOMS', JSON.stringify(rooms)); }
                    if(activeOrders['GLOBAL_PLAN'].tables) { tables = activeOrders['GLOBAL_PLAN'].tables; localStorage.setItem('EMPIRE_TABLES', JSON.stringify(tables)); }
                }
                renderRooms(); renderFloorPlan(); renderRadar(); 
            } catch(e) {} 
        }

        function openDrawer(id) { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open')); document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        function renderRooms() {
            const container = document.getElementById('room-bar');
            container.innerHTML = rooms.map(r => `<button class="room-tab ${r.id === currentRoomId ? 'active' : ''}" onclick="switchRoom('${r.id}')">${r.name}</button>`).join('');
        }
        function switchRoom(id) { currentRoomId = id; renderRooms(); renderFloorPlan(); }

        function saveResa() {
            const date = document.getElementById('resa-date').value; const time = document.getElementById('resa-time').value;
            const name = document.getElementById('resa-name').value.trim(); const pax = document.getElementById('resa-pax').value; const tel = document.getElementById('resa-tel').value.trim();
            if(!date || !name) return alert("Date et Nom obligatoires.");
            let resas = JSON.parse(localStorage.getItem('empire_reservations')) || {}; if(!resas[date]) resas[date] = [];
            resas[date].push({ id: Date.now(), time, name, pax, tel, status: 'confirmed' }); localStorage.setItem('empire_reservations', JSON.stringify(resas));
            if(ws.readyState === WebSocket.OPEN) { fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: 'GLOBAL_RESAS', order: { status: 'system', items: [], reservations: resas } }) }); }
            document.getElementById('resa-name').value = ''; document.getElementById('resa-tel').value = ''; closeDrawer('resa-drawer');
        }

        function renderRadar() {
            const container = document.getElementById('radar-list'); let html = ''; let alertsCount = 0;
            for (const tableId in activeOrders) {
                const order = activeOrders[tableId]; if (!order.items || order.items.length === 0) continue;
                if (order.status === 'ready') { alertsCount++; html += `<div class="alert-card"><b>🔥 COMMANDE PRÊTE</b><span style="font-size:1.1rem;">Table : ${tableId.replace('WEB_','')}</span></div>`; }
            }
            container.innerHTML = html || '<div style="color:#555; text-align:center; padding-top:20px;">Aucune alerte.</div>';
            const badge = document.getElementById('radar-badge'); if (alertsCount > 0) { badge.style.display = 'flex'; badge.textContent = alertsCount; } else { badge.style.display = 'none'; }
        }

        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                if(t.roomId !== currentRoomId) return; 
                
                const div = document.createElement('div'); div.className = 'table-obj'; div.style.borderRadius = t.shape === 'round' ? '50%' : '8px';
                const order = activeOrders[t.id] || activeOrders[t.label];
                
                // LIAISON CUISINE : Vérification du statut 'ready'
                if(order && order.status !== 'system') { 
                    if (order.status === 'ready') div.classList.add('ready'); 
                    else div.classList.add('occupied'); 
                }
                
                div.innerHTML = `<span>${t.label}</span>`; div.style.left = t.l + 'px'; div.style.top = t.t + 'px'; div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                div.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); openCaisse(t.label || t.id); }); 
                floor.appendChild(div);
            });
        }

        function openCaisse(label) { 
            currentTableId = label; document.getElementById('table-title').innerText = label; 
            currentTicket = activeOrders[label]?.items || []; 
            document.getElementById('order-obs').value = activeOrders[label]?.observation || '';
            renderTicket(); renderMenu('Entrée'); openDrawer('caisse-drawer'); 
        }

        function renderMenu(activeCategory = 'Entrée') {
            const testMenu = [
                {name: 'Salade César', price: 12, category: 'Entrée'}, {name: 'Soupe Oignon', price: 9, category: 'Entrée'}, {name: 'Carpaccio Bœuf', price: 14, category: 'Entrée'}, {name: 'Tartare Saumon', price: 15, category: 'Entrée'}, {name: 'Foie Gras', price: 18, category: 'Entrée'}, {name: 'Escargots (x6)', price: 10, category: 'Entrée'}, {name: 'Œufs Mayo', price: 7, category: 'Entrée'}, {name: 'Bruschetta', price: 11, category: 'Entrée'}, {name: 'Saumon Fumé', price: 16, category: 'Entrée'}, {name: 'Salade Chèvre', price: 13, category: 'Entrée'},
                {name: 'Entrecôte 300g', price: 28, category: 'Plat'}, {name: 'Filet de Bar', price: 24, category: 'Plat'}, {name: 'Risotto Truffes', price: 22, category: 'Plat'}, {name: 'Magret Canard', price: 26, category: 'Plat'}, {name: 'Burger Empire', price: 19, category: 'Plat'}, {name: 'Tartare Bœuf', price: 20, category: 'Plat'}, {name: 'Côte de Bœuf', price: 65, category: 'Plat'}, {name: 'Lasagnes', price: 18, category: 'Plat'}, {name: 'Poke Bowl', price: 17, category: 'Plat'}, {name: 'Poulet Rôti', price: 19, category: 'Plat'},
                {name: 'Tiramisu', price: 8, category: 'Dessert'}, {name: 'Fondant Choco', price: 9, category: 'Dessert'}, {name: 'Crème Brûlée', price: 8, category: 'Dessert'}, {name: 'Tarte Citron', price: 7, category: 'Dessert'}, {name: 'Profiteroles', price: 10, category: 'Dessert'}, {name: 'Coupe Glacée', price: 7, category: 'Dessert'}, {name: 'Café Gourmand', price: 11, category: 'Dessert'}, {name: 'Macarons', price: 9, category: 'Dessert'}, {name: 'Éclair Café', price: 6, category: 'Dessert'}, {name: 'Millefeuille', price: 8, category: 'Dessert'}
            ];
            let menu = JSON.parse(localStorage.getItem('empire_recipes'));
            if (!menu || menu.length < 5) { menu = testMenu; localStorage.setItem('empire_recipes', JSON.stringify(testMenu)); }
            const categories = ['Entrée', 'Plat', 'Dessert'];
            document.getElementById('cat-tabs').innerHTML = categories.map(cat => `<div class="cat-tab ${cat === activeCategory ? 'active' : ''}" onclick="renderMenu('${cat}')">${cat}</div>`).join('');
            document.getElementById('menu-items').innerHTML = menu.filter(m => (m.category || 'Autre') === activeCategory).map(m => `<div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price}, '${m.category}')"><span>${m.name}</span><span style="color:var(--sub);">${parseFloat(m.price).toFixed(2)}€</span></div>`).join('');
        }

        function addItem(n, p, c) { currentTicket.push({id: Date.now(), n: n, p: p, category: c, done: false}); renderTicket(); }
        function removeItem(targetIndex) { currentTicket.splice(targetIndex, 1); renderTicket(); }

        function renderTicket() {
            const list = document.getElementById('ticket-list'); let total = 0; const itemCounts = {};
            currentTicket.forEach((i, idx) => { total += i.p || 0; const name = i.n; if (!itemCounts[name]) itemCounts[name] = { item: i, count: 0, indices: [], price: i.p || 0 }; itemCounts[name].count++; itemCounts[name].indices.push(idx); });
            let html = '';
            for (const key in itemCounts) {
                const g = itemCounts[key]; const lastIndex = g.indices[g.indices.length - 1]; const statusIcon = g.item.done ? '✅' : '⏳';
                html += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed rgba(255,255,255,0.2); align-items:center;"><span style="font-weight:bold; font-size:1rem; flex:1; display:flex; align-items:center;"><span style="display:inline-block; min-width:30px; font-weight:900; color:#fff;">${g.count}x</span> <span style="margin-right:6px; font-size:0.8rem;">${statusIcon}</span> ${key}</span><span style="font-weight:bold; font-size:1rem; display:flex; align-items:center;">${(g.price * g.count).toFixed(2)}€ <button onclick="removeItem(${lastIndex})" style="background:transparent; border:1px solid var(--alert); color:var(--alert); border-radius:4px; padding:4px 10px; margin-left:10px; cursor:pointer; font-weight:bold; transition:0.2s;">✕</button></span></div>`;
            }
            list.innerHTML = html || '<div style="color:#555; text-align:center; padding:40px; font-size:0.9rem; font-weight:bold; font-style:italic;">-- TICKET VIDE --</div>'; 
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return; 
            const obs = document.getElementById('order-obs').value.trim();
            // Quand on envoie, on remet le statut en attente
            const order = { table: currentTableId, items: currentTicket, observation: obs, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), status: 'pending' };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('order-obs').value = ''; 
            closeDrawer('caisse-drawer');
        }

        forceSync(); setInterval(forceSync, 3000); 
    </script>
</body>
</html>
