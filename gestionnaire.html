<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire COMMAND - Système Intégral</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --blue: #00b0ff; --text: #fff; --panel: #161616; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        
        .header { background: #111; padding: 0 30px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; height: 65px; align-items: center; z-index: 5000; position: relative; }
        .logo { font-weight: 900; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        
        .btn-chef { background: #333; color: #fff; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; transition: 0.2s; }
        .architect-mode .btn-chef-active { background: #ff3d00; color: #fff; }

        #architect-tools { display: none; gap: 10px; align-items: center; }
        .architect-mode #architect-tools { display: flex; }

        .room-tabs { display: flex; background: #111; border-bottom: 2px solid #333; height: 50px; }
        .room-tab { background: #1a1a1a; color: #888; border: none; padding: 0 25px; cursor: pointer; font-weight: 900; text-transform: uppercase; border-right: 1px solid #333; }
        .room-tab.active { background: var(--accent); color: #000; }

        #viewport { width: 100vw; height: calc(100vh - 115px); overflow: auto; background: #000; position: relative; }
        #canvas { width: 3000px; height: 3000px; position: relative; background: radial-gradient(#222 0.5px, transparent 0.5px); background-size: 50px 50px; transform-origin: 0 0; }

        .table { position: absolute; border: 2px solid #444; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; z-index: 10; border-radius: 8px; color: #fff; transition: 0.3s; background: #2a2a2a; }
        .table.selected { border-color: var(--accent) !important; box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); }
        .table.circle { border-radius: 50%; }
        .table.occupee { background: #b71c1c; border-color: #f44336; }

        .zone { position: absolute; border: 3px dashed rgba(255, 255, 255, 0.5); z-index: 1; pointer-events: none; padding: 10px; }
        .architect-mode .zone { pointer-events: all; cursor: move; border-color: var(--blue); background: rgba(0, 176, 255, 0.05); }
        .zone-label { color: #fff; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }

        .resize-handle { position: absolute; bottom: -5px; right: -5px; width: 15px; height: 15px; background: var(--accent); border-radius: 50%; cursor: se-resize; display: none; }
        .selected .resize-handle { display: block; }

        #config-panel { position: fixed; left: 20px; bottom: 20px; width: 280px; background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 20px; display: none; z-index: 4000; }
        
        #order-pad { position: fixed; right: 0; top: 0; width: 400px; height: 100vh; background: #121212; border-left: 2px solid #333; padding: 25px; z-index: 7000; transform: translateX(100%); transition: 0.3s; box-shadow: -10px 0 30px rgba(0,0,0,0.8); overflow-y: auto; }
        #order-pad.open { transform: translateX(0); }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .menu-item { background: #1a1a1a; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; font-size: 0.8rem; }
        .menu-item:hover { border-color: var(--accent); }
        .item-price { color: var(--accent); float: right; font-weight: bold; }

        .basket-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
        .btn-action { width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-order { background: var(--accent); color: #000; }
    </style>
</head>
<body class="">

    <div class="header">
        <div style="display:flex; align-items:center; gap:20px;">
            <div class="logo">EMPIRE COMMAND</div>
            <button class="btn-chef" id="chef-btn" onclick="toggleChefMode()">🔓 ACCÈS CHEF</button>
            <div id="architect-tools">
                <button class="btn-chef" onclick="addItem('table')" style="background:var(--accent); color:#000;">+ TABLE</button>
                <button class="btn-chef" onclick="addItem('zone')" style="background:var(--blue); color:#000;">+ ZONE</button>
                <button class="btn-chef" onclick="saveLayout()">ENREGISTRER PLAN</button>
            </div>
        </div>
        <div id="clock" style="font-weight:900; color:#555;">--:--</div>
    </div>

    <div class="room-tabs">
        <button class="room-tab active">RESTAURANT</button>
        <button class="room-tab">TERRASSE</button>
    </div>

    <div id="viewport"><div id="canvas"></div></div>

    <div id="config-panel">
        <label style="font-size:0.7rem; color:#666;">NOM / NUMÉRO</label>
        <input type="text" id="ed-id" style="width:100%; background:#000; color:#fff; border:1px solid #444; padding:8px; margin-bottom:10px;" oninput="applyConfig()">
        <button onclick="deleteItem()" style="width:100%; background:#ff3d00; border:none; color:#fff; padding:10px; border-radius:6px; cursor:pointer;">SUPPRIMER</button>
    </div>

    <div id="order-pad">
        <h2 id="pad-title" style="color:var(--accent); font-size:2rem; margin-top:0;">Table --</h2>
        <div id="menu-cats" style="display:flex; gap:5px; overflow-x:auto; margin-bottom:15px;">
            <button class="room-tab" style="height:35px; font-size:0.7rem;" onclick="renderMenu('Plats')">PLATS</button>
            <button class="room-tab" style="height:35px; font-size:0.7rem;" onclick="renderMenu('Boissons')">BOISSONS</button>
        </div>
        <div id="menu-items" class="menu-grid"></div>
        <div id="basket" style="margin-top:20px; background:#000; padding:15px; border-radius:8px; min-height:150px; border:1px solid #222;"></div>
        <div style="display:flex; justify-content:space-between; font-size:1.2rem; font-weight:900; margin:15px 0;">
            <span>TOTAL</span><span id="total">0.00 €</span>
        </div>
        <button class="btn-action btn-order" onclick="submitOrder()">ENVOYER EN PRODUCTION</button>
        <button onclick="closePad()" style="width:100%; background:transparent; color:#666; border:none; margin-top:10px; cursor:pointer;">FERMER</button>
    </div>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    const SCALE = 50;
    let isChef = false;
    let selected = null;
    let currentTableId = null;
    let basket = [];

    // STRUCTURE DE DONNÉES DU PLAN
    let layout = JSON.parse(localStorage.getItem('empire_layout')) || {
        tables: [{id: "T1", x: 100, y: 100, w: 2, h: 2}, {id: "T2", x: 250, y: 100, w: 2, h: 2}],
        zones: [{id: "SALLE", x: 50, y: 50, w: 20, h: 15}]
    };

    const MENU = {
        "Plats": [{n: "Burger Empire", p: 19.50, d: "Cuisine"}, {n: "Entrecôte 300g", p: 28.00, d: "Cuisine"}, {n: "Salade César", p: 16.00, d: "Cuisine"}],
        "Boissons": [{n: "Coca-Cola", p: 4.50, d: "Bar"}, {n: "Bière Pression", p: 7.00, d: "Bar"}, {n: "Verre de Vin", p: 6.00, d: "Bar"}]
    };

    function toggleChefMode() {
        if (!isChef) {
            if (prompt("CODE CHEF :") === "8888") {
                isChef = true;
                document.body.classList.add('architect-mode');
                document.getElementById('chef-btn').textContent = "🔒 MODE CHEF ACTIF";
                document.getElementById('chef-btn').style.background = "#ff3d00";
            }
        } else {
            isChef = false;
            document.body.classList.remove('architect-mode');
            document.getElementById('chef-btn').textContent = "🔓 ACCÈS CHEF";
            document.getElementById('chef-btn').style.background = "#333";
            document.getElementById('config-panel').style.display = "none";
        }
        render();
    }

    function render() {
        const canvas = document.getElementById('canvas');
        canvas.innerHTML = "";
        
        layout.zones.forEach(z => {
            const div = document.createElement('div');
            div.className = "zone";
            div.style.left = z.x + "px"; div.style.top = z.y + "px";
            div.style.width = (z.w * SCALE) + "px"; div.style.height = (z.h * SCALE) + "px";
            div.innerHTML = `<span class="zone-label">${z.id}</span>`;
            if(isChef) div.onmousedown = (e) => startDrag(e, z);
            canvas.appendChild(div);
        });

        layout.tables.forEach(t => {
            const div = document.createElement('div');
            div.className = `table ${selected === t ? 'selected' : ''}`;
            div.style.left = t.x + "px"; div.style.top = t.y + "px";
            div.style.width = (t.w * SCALE) + "px"; div.style.height = (t.h * SCALE) + "px";
            div.innerHTML = `<span>${t.id}</span><div class="resize-handle"></div>`;
            
            if(isChef) {
                div.onmousedown = (e) => startDrag(e, t);
                div.querySelector('.resize-handle').onmousedown = (e) => startResize(e, t);
            } else {
                div.onclick = () => openPad(t.id);
            }
            canvas.appendChild(div);
        });
    }

    function openPad(id) {
        currentTableId = id;
        document.getElementById('pad-title').textContent = "Table " + id;
        document.getElementById('order-pad').classList.add('open');
        renderMenu('Plats');
        updateBasket();
    }

    function renderMenu(cat) {
        const container = document.getElementById('menu-items');
        container.innerHTML = MENU[cat].map(item => `
            <div class="menu-item" onclick="addToBasket('${item.n}', ${item.p}, '${item.d}')">
                ${item.n} <span class="item-price">${item.p.toFixed(2)}€</span>
            </div>
        `).join('');
    }

    function addToBasket(n, p, d) {
        basket.push({n, p, d});
        updateBasket();
    }

    function updateBasket() {
        const container = document.getElementById('basket');
        container.innerHTML = basket.map((item, index) => `
            <div class="basket-item">
                <span>${item.n}</span>
                <span>${item.p.toFixed(2)}€ <b style="color:red; cursor:pointer;" onclick="basket.splice(${index},1); updateBasket();">X</b></span>
            </div>
        `).join('');
        const total = basket.reduce((s, i) => s + i.p, 0);
        document.getElementById('total').textContent = total.toFixed(2) + " €";
    }

    function submitOrder() {
        if(basket.length === 0) return;
        
        // FORMATAGE POUR TRI AUTOMATIQUE
        const articlesFormates = basket.map(item => {
            const tag = (item.d === 'Cuisine') ? '[Plat]' : '[Boisson]';
            return `${tag} 1x ${item.n}`;
        });

        const ticket = {
            table: "Table " + currentTableId,
            articles: articlesFormates,
            heure: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'})
        };

        socket.emit('new-order', ticket);
        alert("COMMANDE ENVOYÉE !");
        basket = [];
        closePad();
    }

    function closePad() { document.getElementById('order-pad').classList.remove('open'); }

    // --- LOGIQUE ARCHITECTE ---
    function startDrag(e, item) {
        e.stopPropagation();
        selected = item;
        document.getElementById('config-panel').style.display = "block";
        document.getElementById('ed-id').value = item.id;
        let startX = e.clientX, startY = e.clientY, origX = item.x, origY = item.y;
        document.onmousemove = (ev) => {
            item.x = origX + (ev.clientX - startX);
            item.y = origY + (ev.clientY - startY);
            render();
        };
        document.onmouseup = () => document.onmousemove = null;
    }

    function startResize(e, item) {
        e.stopPropagation();
        let startX = e.clientX, startW = item.w;
        document.onmousemove = (ev) => {
            item.w = Math.max(1, startW + (ev.clientX - startX) / SCALE);
            item.h = item.w; // Garde carré pour le test
            render();
        };
        document.onmouseup = () => document.onmousemove = null;
    }

    function addItem(type) {
        if(type === 'table') layout.tables.push({id: "T?", x: 200, y: 200, w: 2, h: 2});
        else layout.zones.push({id: "ZONE", x: 100, y: 100, w: 10, h: 10});
        render();
    }

    function deleteItem() {
        layout.tables = layout.tables.filter(t => t !== selected);
        layout.zones = layout.zones.filter(z => z !== selected);
        selected = null;
        render();
    }

    function saveLayout() {
        localStorage.setItem('empire_layout', JSON.stringify(layout));
        alert("PLAN ENREGISTRÉ DANS LE NAVIGATEUR");
    }

    function applyConfig() { if(selected) { selected.id = document.getElementById('ed-id').value; render(); } }

    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
    render();
</script>
</body>
</html>
