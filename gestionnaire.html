<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire COMMAND - Salle Intégrale</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --blue: #00b0ff; --text: #fff; --panel: #161616; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh;}
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 20px 40px; font-size: 1.5rem; font-weight: 900; background: var(--accent); color: #000; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,230,118,0.7); } 50% { transform: scale(1.05); box-shadow: 0 0 0 20px rgba(0,230,118,0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0,230,118,0); } }

        .header { background: #111; padding: 0 30px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; height: 65px; align-items: center; z-index: 5000; position: relative; flex-shrink: 0;}
        .logo { font-weight: 900; color: var(--accent); letter-spacing: 2px; margin-right: 30px; text-transform: uppercase; }
        
        .btn-chef { background: var(--accent); color: #000; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; margin-right: 10px; transition: 0.2s; }
        .btn-chef:hover { filter: brightness(1.1); transform: scale(1.02); }
        .btn-blue { background: var(--blue); color: #000; }
        .btn-lock { background: #333; color: #fff; }
        .architect-mode .btn-lock { background: var(--alert); color: #fff; }

        .room-tabs { display: flex; background: #111; border-bottom: 2px solid #333; overflow-x: auto; height: 50px; flex-shrink: 0;}
        .room-tab { background: #1a1a1a; color: #888; border: none; padding: 0 25px; cursor: pointer; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; border-right: 1px solid #333; display: flex; align-items: center; justify-content: center; }
        .room-tab.active { background: var(--accent); color: #000; }
        .btn-add-room { background: #ff9800; color: #000; }

        .main-container { display: flex; flex: 1; overflow: hidden; position: relative;}
        
        #web-orders-column { width: 320px; background: #0a0a0a; border-right: 2px solid #222; overflow-y: auto; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; z-index: 2000; }
        .web-ticket { background: #111; border: 1px solid #333; border-left: 5px solid var(--accent); border-radius: 8px; padding: 15px; cursor: pointer; transition: 0.2s; position: relative;}
        .web-ticket:hover { border-color: var(--accent); transform: translateY(-2px);}
        .web-ticket h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 1.2rem; }
        .web-ticket .time { position: absolute; top: 15px; right: 15px; font-size: 0.7rem; color: #666; }
        .web-ticket ul { padding-left: 20px; margin: 0; color: #ccc; font-size: 0.9rem;}
        .web-ticket.ready { border-left-color: var(--blue); box-shadow: 0 0 15px rgba(0, 176, 255, 0.2); }
        .web-ticket.ready h3 { color: var(--blue); }

        #viewport { flex: 1; overflow: auto; background: #000; position: relative; }
        #canvas { width: 3000px; height: 3000px; position: relative; background: radial-gradient(#222 0.5px, transparent 0.5px); background-size: 50px 50px; transform-origin: 0 0; transition: transform 0.1s ease-out; }

        .table { position: absolute; border: 2px solid #444; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; z-index: 10; border-radius: 8px; box-sizing: border-box; color: #fff; transition: all 0.3s ease; }
        .table.selected { border-color: var(--accent) !important; box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); z-index: 100; }
        .table.circle { border-radius: 50%; }

        .status-libre { background-color: #2a2a2a; border-color: #555; }
        .status-reservee { background-color: #4a148c; border-color: #9c27b0; }
        .status-occupee { background-color: #b71c1c; border-color: #f44336; }
        .status-prete { background-color: #0d47a1; border-color: #2196f3; animation: pulseBleu 1.5s infinite; }
        .status-addition { background-color: #1b5e20; border-color: #4caf50; animation: pulseVert 1.5s infinite; }

        @keyframes pulseBleu { 0% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(33, 150, 243, 0); } 100% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); } }
        @keyframes pulseVert { 0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); } }

        .zone { position: absolute; border: 3px dashed rgba(255, 255, 255, 0.7); background: transparent; z-index: 1; pointer-events: none; display: flex; padding: 15px; box-sizing: border-box; }
        .architect-mode .zone { pointer-events: all; cursor: move; border-color: var(--blue); background: rgba(0, 176, 255, 0.05); }
        .zone-label { color: rgba(255, 255, 255, 0.9); font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; }
        .resize-handle { position: absolute; bottom: -6px; right: -6px; width: 16px; height: 16px; background: var(--accent); border: 2px solid #000; border-radius: 50%; cursor: se-resize; z-index: 200; display: none; }
        .selected .resize-handle { display: block; }

        #config-panel { position: fixed; left: 340px; bottom: 20px; width: 300px; background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 20px; display: none; z-index: 4000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .prop-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        input, select { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 8px; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.8rem; }
        label { font-size: 0.6rem; color: #666; text-transform: uppercase; font-weight: 900; margin-bottom: 4px; display: block; }

        /* TIROIR PAD COMMANDE */
        #order-pad { position: fixed; right: 0; top: 0; width: 420px; height: 100vh; background: #121212; border-left: 2px solid #333; padding: 25px; z-index: 7000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column;}
        #order-pad.open { transform: translateX(0); }
        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: #aaa; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-close-drawer:hover { color: var(--accent); transform: scale(1.2); }

        .menu-cat-btn { background: #222; color: #aaa; border: 1px solid #333; padding: 10px 15px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; border-radius: 6px; white-space: nowrap; }
        .menu-cat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .menu-item-btn { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; transition: 0.2s; font-size: 0.8rem; }
        .menu-item-btn:hover { border-color: var(--accent); }
        
        /* ZONES DU PANIER */
        #basket-ui { flex: 1; background: #000; margin: 15px 0; padding: 15px; border-radius: 8px; overflow-y: auto; border: 1px solid #222; }
        .section-title { font-size: 0.75rem; color: #888; text-transform: uppercase; margin: 15px 0 5px 0; border-bottom: 1px solid #333; padding-bottom: 5px; font-weight: bold; letter-spacing: 1px; }
        .basket-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px dashed #222; font-size: 0.9rem; align-items: center; }
        
        .btn-del { color: var(--alert); cursor: pointer; font-weight: bold; margin-left: 10px; padding: 0 5px; }
        .item-encours { color: #ff9800; font-size: 0.65rem; text-transform: uppercase; font-weight: bold; border: 1px solid #ff9800; padding: 2px 6px; border-radius: 4px;}
        .btn-servir { background: var(--blue); color: #000; border: none; padding: 5px 12px; border-radius: 4px; font-weight: 900; cursor: pointer; font-size: 0.7rem; text-transform: uppercase; animation: pulseBleu 1.5s infinite; }
        .btn-renvoyer { background: transparent; border: 1px solid var(--alert); color: var(--alert); padding: 4px 8px; border-radius: 4px; font-size: 0.6rem; cursor: pointer; margin-left: 10px; font-weight: bold; text-transform: uppercase;}
        .btn-renvoyer:hover { background: rgba(255, 23, 68, 0.1); }

        .action-btn { width: 100%; padding: 15px; color: white; border: none; font-weight: 900; cursor: pointer; border-radius: 8px; margin-bottom: 10px; text-transform: uppercase; }
        .btn-green { background: var(--accent); color: black; }
        .btn-orange { background: #ff9800; color: black; }
        .btn-purple { background: #4a148c; }
        .btn-red { background: #b71c1c; }
        .btn-gray { background: #555; }
        .btn-alert { background: var(--alert); border: 2px dashed #fff; animation: pulseBleu 1s infinite;}
        
        #audit-drawer { position: fixed; right: 0; top: 0; width: 650px; height: 100vh; background: #121212; border-left: 2px solid #333; padding: 25px; z-index: 8000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -15px 0 50px rgba(0,0,0,0.9); }
        #audit-drawer.open { transform: translateX(0); }
        .audit-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .audit-table th { text-align: left; padding: 12px; border-bottom: 2px solid #444; color: #aaa; text-transform: uppercase; font-size: 0.7rem; }
        .audit-table td { padding: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color:var(--accent); margin-bottom:20px; letter-spacing: 3px;">CENTRE DE COMMANDEMENT</h1>
        <p style="color:#aaa; margin-bottom: 30px;">Activation du radar réseau et du système audio de la salle.</p>
        <button onclick="initSystem()">DÉMARRER LE RADAR</button>
    </div>

    <div class="header">
        <div style="display:flex; align-items: center;">
            <div class="logo">TABLEAU DU SERVICE</div>
            <button class="btn-chef btn-lock" onclick="toggleChefMode()" id="lock-status">🔓 ACCÈS CHEF</button>
            <button class="btn-chef" onclick="openAuditDrawer()" id="btn-audit" style="display:none; margin-left:10px; background:#1a1a1a; color:#fff; border: 1px solid #444;">👁️ REGISTRE OPÉRATIONS</button>
            <button class="btn-chef btn-blue" onclick="toggleArchitectMode()" id="architect-toggle" style="display:none; margin-left:10px;">🛠️ MODE ARCHITECTURE</button>
            
            <div id="architect-btns" style="display:none; align-items: center; gap: 10px; padding-left: 15px; margin-left: 15px; border-left: 2px solid #333;">
                <button class="btn-chef" onclick="addItem('table')">+ TABLE</button>
                <button class="btn-chef btn-blue" onclick="addItem('zone')">+ ZONE</button>
                <button class="btn-chef" style="background:var(--alert); color:white;" onclick="deleteCurrentRoom()">- SUPPRIMER SALLE</button>
                <button class="btn-chef" onclick="save()">💾 ENREGISTRER</button>
            </div>
        </div>
        <div id="clock" style="font-weight:900; color:#555;">--:--</div>
    </div>

    <div class="room-tabs" id="room-tabs-container"></div>

    <div class="main-container">
        <div id="web-orders-column">
            <h3 style="color:#888; text-transform:uppercase; font-size:0.8rem; margin:0 0 10px 0; border-bottom:1px solid #333; padding-bottom:10px;">🌐 RADAR WOOCOMMERCE</h3>
            <div id="web-orders-list"></div>
        </div>

        <div id="viewport"><div id="canvas"></div></div>
    </div>

    <div class="zoom-controls" style="position: absolute; left: 340px; bottom: 20px;">
        <button onclick="changeZoom(0.1)" style="width: 40px; height: 40px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; cursor: pointer; font-size: 1.2rem; font-weight: bold;">+</button>
        <button onclick="changeZoom(-0.1)" style="width: 40px; height: 40px; background: #222; color: #fff; border: 1px solid #444; border-radius: 5px; cursor: pointer; font-size: 1.2rem; font-weight: bold; margin-left: 5px;">-</button>
        <div id="zoom-level" style="text-align:center; font-size:0.7rem; color:#666; font-weight:bold; margin-top: 5px;">100%</div>
    </div>

    <div id="config-panel">
        <h3 style="margin:0 0 15px 0; font-size:0.8rem; color:var(--accent);">ÉDITION</h3>
        <div class="prop-row"><div><label>ID</label><input type="text" id="ed-id" oninput="applyChange()"></div><div><label>FORME</label><select id="ed-shape" onchange="applyChange()"><option value="square">Carré</option><option value="circle">Rond</option></select></div></div>
        <div class="prop-row"><div><label>L</label><input type="number" step="0.1" id="ed-w" oninput="applyChange()"></div><div><label>H</label><input type="number" step="0.1" id="ed-h" oninput="applyChange()"></div></div>
        <button onclick="deleteItem()" style="width:100%; background:var(--alert); border:none; color:white; padding:10px; border-radius:6px; cursor:pointer; font-weight:bold; margin-top:10px;">SUPPRIMER</button>
    </div>

    <div id="order-pad">
        <button class="btn-close-drawer" onclick="closePad()">✕</button>
        <h2 id="pad-table-id" style="margin-top:0; color:var(--accent); font-size: 2rem;">Table --</h2>
        
        <div style="margin-bottom: 15px;">
            <label style="color:#fff; font-size:0.8rem;">COUVERTS</label>
            <input type="number" id="covers" style="width:100%; padding:10px; background:#000; color:var(--blue); border:1px solid #333; font-size:1.2rem; font-weight:bold; text-align:center;" value="1" min="1">
        </div>

        <div id="menu-area">
            <div id="menu-categories" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:5px; margin-bottom: 10px;"></div>
            <div id="menu-items" class="menu-grid"></div>
        </div>

        <div id="basket-ui"></div>
        
        <div style="display:flex; justify-content:space-between; font-size:1.3rem; font-weight:900; margin-bottom:15px; border-top: 1px solid #333; padding-top: 15px;">
            <span>TOTAL ESTIMÉ</span>
            <span id="basket-total" style="color:var(--accent);">0.00 €</span>
        </div>

        <div id="action-buttons">
            <button id="btn-order" class="action-btn btn-green" onclick="submitOrder()">ENVOYER COMMANDE</button>
            <button id="btn-assign" class="action-btn btn-blue" onclick="assignerTable()" style="display:none; animation: pulseBleu 1.5s infinite;">🔗 ASSIGNER À UNE TABLE PHYSIQUE</button>
            <hr style="border: 1px solid #333; margin: 20px 0;">
            <button id="btn-bill" class="action-btn btn-blue" onclick="demanderAddition()" style="display:none;">IMPRIMER ADDITION</button>
            <button id="btn-pay" class="action-btn btn-red" onclick="validerEncaissement()" style="display:none;">VALIDER L'ENCAISSEMENT</button>
            <button id="btn-reserve" class="action-btn btn-purple" onclick="marquerReservee()">RÉSERVER TABLE</button>
            <button id="btn-cancel-res" class="action-btn btn-gray" onclick="annulerReservation()" style="display:none;">ANNULER RÉSERVATION</button>
        </div>
    </div>

    <div id="audit-drawer">
        <button class="btn-close-drawer" onclick="closeAuditDrawer()" style="color:#aaa;">✕</button>
        <h2 style="margin-top:0; color:#fff; font-size: 1.8rem; border-bottom: 1px solid #333; padding-bottom: 10px;">👁️ REGISTRE COMPLET</h2>
        <div class="filter-group" style="display:flex; gap:8px; margin-bottom: 20px; padding-bottom: 15px; border-bottom:1px solid #333;">
            <button class="filter-btn" style="background:#222; color:#fff; border:none; padding:8px; border-radius:4px; cursor:pointer;" onclick="applyAuditFilter('all')">Tout</button>
        </div>
        <table class="audit-table"><tbody id="audit-table-body"></tbody></table>
    </div>

<script>
    const SCALE = 50; let currentZoom = 1.0;
    let layouts = { "RESTAURANT": { tables: [{ id: "T1", x: 150, y: 150, w: 2, h: 2, shape: "square" }, { id: "T2", x: 350, y: 150, w: 2, h: 2, shape: "square" }], zones: [] } };
    let currentRoom = "RESTAURANT"; let activeOrders = {}; let tableStates = {}; let previousTableState = null;
    let isChef = false; let isArchitect = false; let selected = null; let selectedType = null;
    let lastClosedTableId = null; let lastClosedOrderData = null; let previousOrdersState = {}; let isFirstLoad = true;
    let audioCtx;

    function initSystem() {
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        audioCtx = new AudioContext();
        audioCtx.resume();
        document.getElementById('start-overlay').style.display = 'none';
        renderTabs(); render(); renderWebOrders();
    }

    function logAudit(level, source, action, detail) {
        let logs = JSON.parse(localStorage.getItem('tableau_audit') || '[]');
        logs.push({ timestamp: Date.now(), time: new Date().toLocaleTimeString('fr-FR'), date: new Date().toLocaleDateString('fr-FR'), level: level, source: source, action: action, detail: detail });
        localStorage.setItem('tableau_audit', JSON.stringify(logs));
    }

    const MENU = {
        "Entrées": [{ n: "Salade César", p: 14.00, dest: "Cuisine", step: 1 }, { n: "Os à Moelle", p: 16.00, dest: "Cuisine", step: 1 }],
        "Plats": [{ n: "Fondue Savoyarde", p: 24.00, dest: "Cuisine", step: 2 }, { n: "Burger Tableau", p: 19.50, dest: "Cuisine", step: 2 }, { n: "Entrecôte 300g", p: 28.00, dest: "Cuisine", step: 2 }],
        "Desserts": [{ n: "Tiramisu Maison", p: 9.00, dest: "Dessert", step: 3 }, { n: "Café Gourmand", p: 10.50, dest: "Bar", step: 3 }],
        "Boissons": [{ n: "Bière Pression", p: 8.00, dest: "Bar", step: 0 }, { n: "Verre de Vin", p: 6.50, dest: "Bar", step: 0 }, { n: "Soda", p: 4.50, dest: "Bar", step: 0 }]
    };

    let currentCategory = "Entrées"; let localBasket = []; let currentTable = null;

    function playReadySound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        const now = audioCtx.currentTime;
        osc.type = 'sine'; osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1046.5, now + 0.2);
        gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.6, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.6);
        osc.start(now); osc.stop(now + 0.6);
    }

    // LE CÂBLE DE COMMUNICATION BLINDÉ
    const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
    
    ws.onmessage = (e) => {
        try {
            const msg = JSON.parse(e.data);
            if (msg.type === 'SYNC_LAYOUT') { 
                if (msg.data && Object.keys(msg.data).length > 0) layouts = msg.data.tables ? { "RESTAURANT": msg.data } : msg.data;
                if (!layouts[currentRoom]) currentRoom = Object.keys(layouts)[0]; 
                renderTabs(); render(); 
            }
            if (msg.type === 'ORDER_UPDATE') { 
                const newOrders = msg.activeOrders;
                if (!isFirstLoad) {
                    for (const tableId in newOrders) {
                        const newOrder = newOrders[tableId]; const prevOrder = previousOrdersState[tableId]; let shouldRing = false;
                        
                        // Sonner si de nouveaux articles sont passés à "done" et ne sont pas encore "served"
                        let prevReadyToServe = prevOrder && prevOrder.items ? prevOrder.items.filter(i => i.done && !i.served).length : 0;
                        let newReadyToServe = newOrder && newOrder.items ? newOrder.items.filter(i => i.done && !i.served).length : 0;
                        
                        if (newReadyToServe > prevReadyToServe) shouldRing = true;
                        if (shouldRing) playReadySound();
                    }
                }
                isFirstLoad = false; previousOrdersState = JSON.parse(JSON.stringify(newOrders)); activeOrders = newOrders; 
                render(); renderWebOrders();
                
                if (currentTable && document.getElementById('order-pad').classList.contains('open')) { 
                    const serverOrder = activeOrders[currentTable];
                    if (serverOrder && serverOrder.items) {
                        const unsentItems = localBasket.filter(i => !i.sent);
                        localBasket = JSON.parse(JSON.stringify(serverOrder.items));
                        localBasket.push(...unsentItems); updateBasket(); 
                    } else {
                        localBasket = localBasket.filter(i => !i.sent);
                        if (localBasket.length === 0) closePad(); else updateBasket();
                    }
                }
            }
        } catch (err) { console.error("Erreur WebSocket:", err); }
    };

    function renderTabs() { document.getElementById('room-tabs-container').innerHTML = Object.keys(layouts).map(room => `<button class="room-tab ${room === currentRoom ? 'active' : ''}" onclick="switchRoom('${room}')">${room}</button>`).join('') + (isArchitect ? `<button class="room-tab btn-add-room" onclick="addRoom()">+ NOUVELLE SALLE</button>` : ''); }
    function switchRoom(room) { currentRoom = room; selected = null; document.getElementById('config-panel').style.display = 'none'; closePad(); renderTabs(); render(); renderWebOrders();}

    function render() {
        const canvas = document.getElementById('canvas'); if(!canvas) return; canvas.innerHTML = ""; if (!layouts[currentRoom]) return;
        (layouts[currentRoom].zones || []).forEach(z => {
            const div = document.createElement('div'); div.className = `zone ${selected === z ? 'selected' : ''}`; div.style.left = z.x+'px'; div.style.top = z.y+'px'; div.style.width = (z.w * SCALE)+'px'; div.style.height = (z.h * SCALE)+'px'; div.innerHTML = `<span class="zone-label">${z.id}</span>`;
            if(isArchitect) { div.onmousedown = (e) => startDrag(e, z, 'zone'); if(selected === z) addResizeHandle(div, z, 'zone'); } canvas.appendChild(div);
        });
        (layouts[currentRoom].tables || []).forEach(t => {
            const order = activeOrders[t.id]; const div = document.createElement('div'); let statusClass = 'status-libre'; 
            if (tableStates[t.id]) statusClass = `status-${tableStates[t.id]}`; 
            if (order) { 
                // La table clignote bleu SEULEMENT s'il y a un plat 'done' (prêt) qui n'est pas encore 'served' (servi)
                let hasReadyToServe = (order.items && order.items.some(i => i.done && !i.served));
                if (tableStates[t.id] === 'addition') statusClass = 'status-addition'; 
                else if (hasReadyToServe) statusClass = 'status-prete'; 
                else statusClass = 'status-occupee';
            }
            div.className = `table ${t.shape || 'square'} ${statusClass} ${selected === t ? 'selected' : ''}`; div.style.left = t.x+'px'; div.style.top = t.y+'px'; div.style.width = (t.w * SCALE)+'px'; div.style.height = (t.h * SCALE)+'px';
            div.innerHTML = `<div style="font-size:1.2rem;">${t.id}</div><div style="font-size:0.7rem; color:var(--blue); margin-top:2px;">${order ? order.covers+'p' : ''}</div>`;
            if (isArchitect) { div.onmousedown = (e) => startDrag(e, t, 'table'); if(selected === t) addResizeHandle(div, t, 'table'); } else { div.onclick = () => openPad(t.id); } canvas.appendChild(div);
        });
    }

    // LE RADAR WOOCOMMERCE
    function renderWebOrders() {
        const container = document.getElementById('web-orders-list'); if(!container) return;
        container.innerHTML = ''; let count = 0;
        for (const tableId in activeOrders) {
            const isWeb = tableId.includes('WEB'); let isDrawn = false;
            if (layouts[currentRoom] && layouts[currentRoom].tables) isDrawn = layouts[currentRoom].tables.some(t => t.id === tableId);
            
            if (isWeb || !isDrawn) {
                count++; const order = activeOrders[tableId]; 
                let hasReadyToServe = (order.items && order.items.some(i => i.done && !i.served));
                
                const div = document.createElement('div'); div.className = `web-ticket ${hasReadyToServe ? 'ready' : ''}`; div.onclick = () => openPad(tableId);
                div.innerHTML = `<h3>${tableId}</h3><div class="time">${order.time || '--:--'}</div><ul>${order.items.slice(0,3).map(i => `<li>${i.n.replace(' [WEB]','')}</li>`).join('')}${order.items.length > 3 ? `<li>... (+${order.items.length - 3})</li>` : ''}</ul>`;
                container.appendChild(div);
            }
        }
        if (count === 0) container.innerHTML = '<div style="color:#444; font-size:0.9rem; text-align:center; padding-top:20px;">Le radar est vide.</div>';
    }

    function renderMenu() {
        document.getElementById('menu-categories').innerHTML = Object.keys(MENU).map(cat => `<button class="menu-cat-btn ${cat === currentCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>`).join('');
        document.getElementById('menu-items').innerHTML = MENU[currentCategory].map(item => `<button class="menu-item-btn" onclick="addToBasket('${item.n}', '${item.dest}', ${item.p}, ${item.step})">${item.n} <span class="item-price">${item.p.toFixed(2)}€</span></button>`).join('');
    }
    function setCategory(cat) { currentCategory = cat; renderMenu(); }

    function openPad(id) {
        if (tableStates[id] === 'reservee' && !isChef) { if (!confirm(`La table ${id} est RÉSERVÉE. L'ouvrir ?`)) return; }
        previousTableState = tableStates[id]; currentTable = id; const o = activeOrders[id];
        localBasket = o ? JSON.parse(JSON.stringify(o.items)) : [];
        document.getElementById('covers').value = o ? o.covers : 1;
        document.getElementById('pad-table-id').textContent = id; document.getElementById('order-pad').classList.add('open');
        if (!o && tableStates[id] !== 'reservee') { tableStates[id] = 'commande'; render(); }
        renderMenu(); updateBasket();
    }
    function closePad() { document.getElementById('order-pad').classList.remove('open'); if (!activeOrders[currentTable] && tableStates[currentTable] !== 'addition') { tableStates[currentTable] = (previousTableState === 'reservee') ? 'reservee' : 'libre'; render(); } }

    async function assignerTable() {
        let num = prompt("Numéro de la table physique pour cette commande Web (ex: 3) :");
        if (!num) return;
        num = num.trim().toUpperCase(); if (!num.startsWith('T')) num = 'T' + num;
        
        const orderToMove = activeOrders[currentTable];
        orderToMove.tableId = num;
        await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: num, order: orderToMove }) });
        await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTable, order: null }) });
        
        closePad();
    }

    function addToBasket(n, dest, p, step) { localBasket.push({ n, dest: (dest === 'Dessert' && new Date().getHours() >= 18) ? 'Cuisine' : dest, p, sent: false, step: step, done: false, served: false }); updateBasket(); }

    // LE NOUVEAU TIROIR INTELLIGENT (TRI PAR STATUT)
    function updateBasket() {
        let total = 0; 
        let htmlPanier = ''; let htmlEnCours = ''; let htmlHistorique = '';

        [...localBasket].forEach((i, originalIndex) => { 
            total += i.p; 
            const nameClean = i.n.replace(' [WEB]','');
            const destBadge = `<span style="color:#666; font-size:0.6rem;">(${i.dest})</span>`;

            if (!i.sent) {
                // Zone 1: Panier (A envoyer)
                htmlPanier += `<div class="basket-row"><span>${nameClean} ${destBadge}</span><span>${i.p.toFixed(2)}€ <span class="btn-del" onclick="localBasket.splice(${originalIndex}, 1); updateBasket();">X</span></span></div>`; 
            } else if (i.sent && !i.served) {
                // Zone 2: En production ou Prêt
                let actionHtml = '';
                if (i.done) {
                    actionHtml = `<button class="btn-servir" onclick="marquerServi(${originalIndex})">🔔 SERVIR</button>`;
                } else {
                    actionHtml = `<span class="item-encours">⏳ EN COURS</span>`;
                }
                htmlEnCours += `<div class="basket-row"><span>${nameClean} ${destBadge}</span><span>${actionHtml}</span></div>`;
            } else if (i.served) {
                // Zone 3: Historique (Servi)
                htmlHistorique += `<div class="basket-row" style="opacity: 0.5;"><span><span style="text-decoration: line-through;">${nameClean}</span> ${destBadge}</span><span>✔️ Servi <button class="btn-renvoyer" onclick="renvoyerProduction(${originalIndex})">↺ ERREUR</button></span></div>`;
            }
        });

        let finalHtml = '';
        if (htmlHistorique) finalHtml += `<div class="section-title">✔️ HISTORIQUE (SERVIS)</div>${htmlHistorique}`;
        if (htmlEnCours) finalHtml += `<div class="section-title">🔥 EN PRODUCTION / PRÊTS</div>${htmlEnCours}`;
        if (htmlPanier) finalHtml += `<div class="section-title">🛒 NOUVELLE COMMANDE</div>${htmlPanier}`;
        if (!finalHtml) finalHtml = '<div style="color:#444; font-size:0.9rem; text-align:center; padding-top:20px;">Le tiroir est vide.</div>';

        document.getElementById('basket-ui').innerHTML = finalHtml; 
        document.getElementById('basket-total').textContent = total.toFixed(2) + " €"; 
        updateActionButtons();
    }

    // ACTIONS MAGIQUES DU SERVEUR
    async function marquerServi(index) {
        localBasket[index].served = true;
        updateBasket();
        await syncOrder();
    }

    async function renvoyerProduction(index) {
        if(confirm("Erreur signalée : Renvoyer ce plat en production ?")) {
            localBasket[index].served = false;
            localBasket[index].done = false; // Remet à zéro pour que la cuisine le re-prépare
            updateBasket();
            await syncOrder();
        }
    }

    async function syncOrder() {
        const existingOrder = activeOrders[currentTable] || {};
        let updatedReadyPostes = existingOrder.readyPostes || []; 
        localBasket.forEach(i => { if (!i.done) updatedReadyPostes = updatedReadyPostes.filter(p => p !== i.dest); });
        
        // La table est globalement prête si TOUS les items sont done OU served
        let allDoneOrServed = localBasket.length > 0 && localBasket.every(i => i.done || i.served);
        let globalStatus = allDoneOrServed ? 'ready' : 'pending';

        const order = { ...existingOrder, tableId: currentTable, covers: document.getElementById('covers').value, items: localBasket, time: new Date().toLocaleTimeString('fr-FR'), status: globalStatus, readyPostes: updatedReadyPostes };
        await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTable, order }) });
        render(); renderWebOrders();
    }

    function updateActionButtons() {
        let hasUnsent = localBasket.some(i => !i.sent); let hasSent = localBasket.some(i => i.sent);
        ['btn-order', 'btn-assign', 'btn-bill', 'btn-pay', 'btn-reserve', 'btn-cancel-res'].forEach(el => document.getElementById(el).style.display = 'none');

        if (currentTable && currentTable.includes('WEB')) document.getElementById('btn-assign').style.display = 'block';

        if (hasUnsent) { 
            document.getElementById('btn-order').style.display = 'block'; document.getElementById('btn-order').innerText = hasSent ? "ENVOYER LA SUITE" : "ENVOYER COMMANDE";
        } else if (hasSent) {
            if (tableStates[currentTable] === 'addition') document.getElementById('btn-pay').style.display = 'block'; else document.getElementById('btn-bill').style.display = 'block';
        } else {
            if (tableStates[currentTable] === 'reservee') document.getElementById('btn-cancel-res').style.display = 'block'; else document.getElementById('btn-reserve').style.display = 'block';
        }
    }

    async function submitOrder() {
        localBasket.forEach(i => i.sent = true);
        await syncOrder();
        tableStates[currentTable] = 'occupee'; document.getElementById('order-pad').classList.remove('open');
    }

    function demanderAddition() { tableStates[currentTable] = 'addition'; document.getElementById('order-pad').classList.remove('open'); render(); }
    
    async function validerEncaissement() {
        if(confirm("Confirmer le paiement ?")) {
            lastClosedTableId = currentTable; lastClosedOrderData = JSON.parse(JSON.stringify(localBasket));
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTable, order: null }) });
            tableStates[currentTable] = 'libre'; document.getElementById('order-pad').classList.remove('open'); render(); renderWebOrders();
        }
    }
    
    setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}); }, 1000);
</script>
</body>
