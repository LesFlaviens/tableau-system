<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire COMMAND - Salle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --text: #fff; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; height: 100vh; }
        #canvas { flex: 1; position: relative; background: radial-gradient(#222 0.5px, transparent 0.5px); background-size: 30px 30px; }
        
        .table { position: absolute; width: 100px; height: 100px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; background: #1a1a1a; cursor: pointer; border-radius: 10px; transition: 0.2s; font-size: 1.5rem; font-weight: 900; }
        
        @keyframes pulse-ready {
            0% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0.7); border-color: var(--accent); background: #113322; color: #fff; }
            50% { box-shadow: 0 0 0 15px rgba(0, 230, 118, 0); border-color: #fff; background: var(--accent); color: #000; }
            100% { box-shadow: 0 0 0 0 rgba(0, 230, 118, 0); border-color: var(--accent); background: #113322; color: #fff; }
        }
        .table.ready { animation: pulse-ready 1.5s infinite; z-index: 50; }

        #order-pad { width: 420px; background: #111; border-left: 2px solid #333; padding: 25px; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); position: fixed; right: 0; height: 100vh; z-index: 100; box-shadow: -10px 0 30px rgba(0,0,0,0.8); display: flex; flex-direction: column; box-sizing: border-box; }
        #order-pad.open { transform: translateX(0); }
        
        .history-section { background: #181818; padding: 15px; border-radius: 8px; border: 1px solid #333; margin-bottom: 20px; min-height: 80px; max-height: 250px; overflow-y: auto; }
        .history-title { font-size: 0.8rem; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; font-weight: bold; }
        .history-item { font-size: 0.95rem; color: #eee; padding: 8px 0; border-bottom: 1px dashed #333; display: flex; justify-content: space-between; align-items: center; }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .menu-item { background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; font-weight: bold; transition: 0.1s; }
        .menu-item:active { transform: scale(0.95); border-color: var(--accent); }
        
        #basket { flex: 1; background: #000; padding: 15px; overflow-y: auto; border-radius: 8px; border: 1px solid #333; }
        .btn-send { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; margin-top: 15px; font-size: 1.1rem; transition: 0.2s; }
        
        .actions-bas { margin-top: 15px; display: flex; gap: 10px; }
        .btn-clear { flex: 1; padding: 15px; background: #331111; border: 1px solid var(--alert); color: var(--alert); font-weight: bold; border-radius: 8px; cursor: pointer; }
        .btn-close { flex: 1; padding: 15px; background: #222; border: none; color: #888; font-weight: bold; border-radius: 8px; cursor: pointer; }

        #toast-container { position: fixed; bottom: 20px; left: 20px; z-index: 5000; display: flex; flex-direction: column; gap: 10px; }
        .toast { background: #111; border-left: 5px solid var(--accent); padding: 15px 20px; border-radius: 8px; font-weight: bold; box-shadow: 0 5px 15px rgba(0,0,0,0.5); animation: slideIn 0.3s forwards; cursor: pointer; }
        @keyframes slideIn { from { transform: translateX(-100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>
    <div id="canvas">
        <div class="table" id="table-1" style="left:100px; top:100px;" onclick="openPad('1')">T1</div>
        <div class="table" id="table-2" style="left:250px; top:100px;" onclick="openPad('2')">T2</div>
        <div class="table" id="table-3" style="left:400px; top:100px;" onclick="openPad('3')">T3</div>
    </div>

    <div id="toast-container"></div>

    <div id="order-pad">
        <h2 id="pad-title" style="color:var(--accent); margin-top:0; font-size: 2.5rem;">Table --</h2>
        
        <div class="history-section">
            <div class="history-title">Déjà en production / Servi</div>
            <div id="history-content">Aucune commande.</div>
        </div>

        <div class="menu-grid">
            <div class="menu-item" onclick="add('Burger', 'Cuisine')">🍔 Burger</div>
            <div class="menu-item" onclick="add('Mojito', 'Bar')">🍹 Mojito</div>
        </div>
        
        <div class="history-title" style="margin-bottom: 5px;">Nouvelle commande (À envoyer)</div>
        <div id="basket"></div>
        
        <button class="btn-send" onclick="send()">ENVOYER EN PRODUCTION</button>
        
        <div class="actions-bas">
            <button class="btn-clear" onclick="freeTable()">LIBÉRER TABLE</button>
            <button class="btn-close" onclick="closePad()">FERMER</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentTable = null; 
        let basket = [];
        let tableHistory = { '1': [], '2': [], '3': [] }; 

        function playServiceBell() {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const playTone = (freq, time) => {
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.connect(gain); gain.connect(ctx.destination);
                osc.type = 'sine'; osc.frequency.value = freq;
                gain.gain.setValueAtTime(1, ctx.currentTime + time);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + time + 0.5);
                osc.start(ctx.currentTime + time); osc.stop(ctx.currentTime + time + 0.5);
            };
            playTone(783.99, 0); playTone(1046.50, 0.15);
        }

        // 🚨 NOUVEAU : INTERCEPTION DES COMMANDES WEB
        socket.on('order-received', (order) => {
            const tableMatch = order.table.match(/Table (\d+)/i);
            if (tableMatch && tableMatch[1]) {
                const tId = tableMatch[1];
                if (!tableHistory[tId]) tableHistory[tId] = [];
                
                // Nettoyage et ajout à l'historique
                order.articles.forEach(art => {
                    const cleanName = art.replace(/\[.*?\] /, ''); // Enlève le tag [Plat] ou [Boisson]
                    tableHistory[tId].push(cleanName + " <span style='color:var(--accent); font-size:0.75rem; border:1px solid var(--accent); padding:2px 4px; border-radius:4px;'>WEB</span>");
                });
                
                // Mise à jour en direct si le tiroir est ouvert
                if (currentTable === tId) renderHistory();
            }
        });

        socket.on('notify-ready', (data) => {
            playServiceBell();
            const tableMatch = data.table.match(/Table (\d+)/i);
            
            if (tableMatch && tableMatch[1]) {
                const tableElement = document.getElementById('table-' + tableMatch[1]);
                if (tableElement) tableElement.classList.add('ready');
                else showToast(`🚀 ${data.table} : Prête au ${data.poste}`);
            } else {
                showToast(`🚀 ${data.table} : Prête au ${data.poste}`);
            }
        });

        function showToast(msg) {
            const toast = document.createElement('div'); toast.className = 'toast';
            toast.innerHTML = msg + " <span style='float:right;color:#888;margin-left:15px;'>✕</span>";
            toast.onclick = () => toast.remove();
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => toast.remove(), 10000);
        }

        function renderHistory() {
            const historyDiv = document.getElementById('history-content');
            const history = tableHistory[currentTable] || [];
            if (history.length === 0) {
                historyDiv.innerHTML = "<span style='color:#666;'>Aucune commande.</span>";
            } else {
                historyDiv.innerHTML = history.map(item => `<div class="history-item"><span>✓ ${item}</span></div>`).join('');
            }
        }

        function openPad(id) { 
            currentTable = id; 
            document.getElementById('pad-title').innerText = "Table " + id; 
            renderHistory();
            document.getElementById('order-pad').classList.add('open');
            
            const tableElement = document.getElementById('table-' + id);
            if(tableElement) tableElement.classList.remove('ready');
        }
        
        function closePad() { document.getElementById('order-pad').classList.remove('open'); }
        function add(n, d) { basket.push({n, d}); renderBasket(); }
        function renderBasket() { 
            document.getElementById('basket').innerHTML = basket.map(i => `<div style="padding:10px 0; border-bottom:1px solid #222;">• ${i.n} <span style="color:#666;font-size:0.8rem;">(${i.d})</span></div>`).join(''); 
        }

        function send() {
            if(basket.length === 0) return;
            
            if(!tableHistory[currentTable]) tableHistory[currentTable] = [];
            basket.forEach(item => tableHistory[currentTable].push(item.n));
            renderHistory();

            const payload = {
                table: "Table " + currentTable,
                heure: new Date().toLocaleTimeString('fr-FR'),
                articles: basket.map(i => `${i.d === 'Bar' ? '[Boisson]' : '[Plat]'} 1x ${i.n}`)
            };
            socket.emit('new-order', payload);
            
            const btn = document.querySelector('.btn-send');
            const oldText = btn.innerText;
            btn.innerText = "✓ ORDRE TRANSMIS"; btn.style.background = "#fff";
            
            setTimeout(() => { 
                btn.innerText = oldText; btn.style.background = "var(--accent)"; 
                basket = []; renderBasket(); 
            }, 800);
        }

        function freeTable() {
            if(confirm("Libérer la Table " + currentTable + " et effacer ses commandes ?")) {
                tableHistory[currentTable] = [];
                renderHistory();
                document.getElementById('table-' + currentTable).classList.remove('ready');
                basket = []; renderBasket(); closePad();
            }
        }
    </script>
</body>
</html>
