<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire OS - Supervision Master</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --blue: #00b0ff; --warning: #ffb300; --sub: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #security-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--alert); }
        
        header { border-bottom: 2px solid #222; padding: 15px 25px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { color: var(--accent); font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 3px; }
        
        .btn-top { background: #111; border: 1px solid #333; color: #fff; padding: 10px 18px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; }
        .btn-top:hover { border-color: var(--accent); }

        /* TOOLBAR ARCHITECTURE */
        #archi-toolbar { background: var(--blue); padding: 12px 25px; display: flex; justify-content: space-between; align-items: center; color: #000; font-weight: 900; text-transform: uppercase; }
        .btn-archi { background: rgba(0,0,0,0.8); color: #fff; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: 900; font-size: 0.7rem; margin-left: 10px; }

        .main-workspace { display: flex; flex: 1; overflow: hidden; }
        
        /* RADAR WEB */
        .radar-panel { width: 320px; background: #080808; border-right: 1px solid #222; display: flex; flex-direction: column; padding: 20px; }
        .radar-title { color: var(--blue); font-size: 0.8rem; font-weight: 900; text-transform: uppercase; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        .web-card { background: #111; border: 1px solid #333; border-left: 4px solid var(--blue); padding: 15px; border-radius: 8px; margin-bottom: 15px; }

        /* PLAN DE SALLE EDITABLE */
        .floor-plan { flex: 1; position: relative; background: #050505; overflow: hidden; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; }
        .table-edit { position: absolute; background: #161616; border: 2px solid #555; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 900; border-radius: 10px; cursor: move; }
        .table-edit.selected { border-color: var(--accent); box-shadow: 0 0 20px rgba(0, 230, 118, 0.3); }

        /* TIROIR RESAS */
        .drawer { position: absolute; top: 0; right: 0; width: 450px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 30px; transform: translateX(100%); transition: 0.3s; z-index: 5000; }
        .drawer.open { transform: translateX(0); }
    </style>
</head>
<body>

    <div id="security-block"><h1>🛑 ACCÈS DIRECTION</h1><p>Clé ICHEF2026 requise.</p></div>

    <header id="main-header" style="display:none;">
        <div class="header-title">EMPIRE SUPERVISION</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-top" onclick="window.location.href='finance.html?key=ICHEF2026'">📊 FINANCE</button>
            <button class="btn-top" onclick="openDrawer('res-drawer')" style="color:var(--purple);">📅 RÉSERVATIONS</button>
            <button class="btn-top" onclick="toggleArchi()" id="btn-archi-toggle">🛠️ ARCHITECTURE</button>
        </div>
    </header>

    <div id="archi-toolbar" style="display:none;">
        <span>Mode Édition Plan de Salle</span>
        <div>
            <button class="btn-archi" onclick="addTable()">+ AJOUTER TABLE</button>
            <button class="btn-archi" onclick="savePlan()" style="background:var(--accent); color:#000;">💾 SAUVEGARDER & SYNCHRONISER</button>
        </div>
    </div>

    <div class="main-workspace" id="workspace" style="display:none;">
        <div class="radar-panel">
            <div class="radar-title">🛰️ RADAR WOOCOMMERCE</div>
            <div id="web-list"></div>
        </div>

        <div class="floor-plan" id="floor-plan">
            </div>
    </div>

    <div id="res-drawer" class="drawer">
        <h2 style="color:var(--accent);">RÉSERVATIONS JOUR</h2>
        <div id="res-list"></div>
        <button onclick="closeDrawer('res-drawer')" style="margin-top:20px; width:100%; padding:15px; background:#222; color:#fff; border:none; border-radius:8px; cursor:pointer;">FERMER</button>
    </div>

    <script>
        // 1. SÉCURITÉ
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('key') === 'ICHEF2026') {
            document.getElementById('security-block').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('workspace').style.display = 'flex';
            initSupervision();
        }

        let tables = [];
        let archiMode = false;
        let selectedTable = null;

        function initSupervision() {
            loadData();
            renderRadar();
            setInterval(renderRadar, 5000); // Check web orders every 5s
        }

        function loadData() {
            tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [
                {id:'T1', l:100, t:100, w:100, h:100, label:'T1', zoneId:'z1'}
            ];
            renderFloorPlan();
        }

        // 2. MOTEUR RADAR WEB
        function renderRadar() {
            const queue = JSON.parse(localStorage.getItem('EMPIRE_QUEUE')) || [];
            const web = queue.filter(o => o.id && o.id.toString().startsWith('WEB_'));
            const container = document.getElementById('web-list');
            container.innerHTML = web.map(o => `
                <div class="web-card">
                    <b style="color:var(--blue);">${o.table}</b><br>
                    <small>${o.time}</small>
                </div>
            `).join('') || '<div style="color:#333; text-align:center;">Aucun flux web...</div>';
        }

        // 3. ARCHITECTURE & DRAG
        function toggleArchi() {
            archiMode = !archiMode;
            document.getElementById('archi-toolbar').style.display = archiMode ? 'flex' : 'none';
            document.getElementById('btn-archi-toggle').style.borderColor = archiMode ? 'var(--accent)' : '#333';
            renderFloorPlan();
        }

        function addTable() {
            const newT = { id: 'T'+(tables.length+1), l:50, t:50, w:100, h:100, label: 'T'+(tables.length+1), zoneId: 'z1' };
            tables.push(newT);
            renderFloorPlan();
        }

        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan');
            floor.innerHTML = '';
            tables.forEach((t, index) => {
                const div = document.createElement('div');
                div.className = 'table-edit' + (archiMode ? ' archi' : '');
                div.innerHTML = t.label;
                div.style.left = t.l + 'px'; div.style.top = t.t + 'px';
                div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                
                if(archiMode) {
                    div.onmousedown = (e) => startDrag(e, index, div);
                }
                floor.appendChild(div);
            });
        }

        function startDrag(e, index, el) {
            let startX = e.clientX - el.offsetLeft;
            let startY = e.clientY - el.offsetTop;
            
            document.onmousemove = (e) => {
                tables[index].l = e.clientX - startX;
                tables[index].t = e.clientY - startY;
                el.style.left = tables[index].l + 'px';
                el.style.top = tables[index].t + 'px';
            };
            
            document.onmouseup = () => {
                document.onmousemove = null;
                document.onmouseup = null;
            };
        }

        function savePlan() {
            localStorage.setItem('EMPIRE_TABLES', JSON.stringify(tables));
            // --- HEARTBEAT : On envoie le signal de synchro à salle.html ---
            localStorage.setItem('EMPIRE_SYNC_HEARTBEAT', Date.now());
            alert("PLAN SAUVEGARDÉ ET ENVOYÉ À LA SALLE !");
            toggleArchi();
        }

        function openDrawer(id) { document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        window.addEventListener('storage', (e) => {
            if(e.key === 'EMPIRE_QUEUE') renderRadar();
        });
    </script>
</body>
