<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Terminal Serveur Responsive</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --blue: #00b0ff; --warning: #ffb300; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        /* HEADER ADAPTATIF */
        header { border-bottom: 2px solid #222; padding: 15px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; z-index: 1000; flex-wrap: wrap; gap: 10px; }
        .header-title { color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; display: flex; align-items: center; gap: 10px; }
        .live-badge { background: var(--blue); color: #000; font-size: 0.6rem; padding: 4px 8px; border-radius: 4px; font-weight: bold; white-space: nowrap; }
        
        .btn-top { background: #111; border: 1px solid #333; color: #fff; padding: 12px 15px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.9rem; transition: 0.2s; position: relative; white-space: nowrap; flex: 1; text-align: center; }
        .btn-top:active { transform: scale(0.95); background: #222; }
        .radar-badge { position: absolute; top: -8px; right: -8px; background: var(--alert); color: #fff; border-radius: 50%; width: 24px; height: 24px; font-size: 0.8rem; display: flex; justify-content: center; align-items: center; animation: blink 1s infinite; box-shadow: 0 0 10px var(--alert); }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        /* PLAN DE SALLE SCROLLABLE AU DOIGT */
        .floor-plan { flex: 1; position: relative; background: #050505; z-index: 10; overflow: auto; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; padding: 20px; }
        .table-obj { position: absolute; background: #1a1a1a; border: 3px solid #444; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; border-radius: 12px; cursor: pointer; z-index: 50; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 1.5rem; transition: 0.1s; }
        .table-obj:active { transform: scale(0.92); }
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,23,68,0.1); color: var(--alert); }
        .table-obj.ready { border-color: var(--accent); background: rgba(0,230,118,0.15); color: var(--accent); animation: pulse-border 1.2s infinite; }
        @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 0 rgba(0,230,118,0); } 50% { box-shadow: 0 0 20px rgba(0,230,118,0.8); } }

        /* TIROIRS "LIQUID UI" : 100% sur mobile, 450px max sur tablette */
        .drawer { position: absolute; top: 0; right: 0; height: 100%; width: 100%; max-width: 480px; background: #0a0a0a; border-left: 2px solid #333; padding: 20px; z-index: 10000; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-sizing: border-box; }
        .drawer.open { transform: translateX(0); }
        #radar-drawer { right: auto; left: 0; border-left: none; border-right: 2px solid var(--blue); transform: translateX(-100%); }
        #radar-drawer.open { transform: translateX(0); }
        
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .btn-close { background: #222; border: none; color: #fff; width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        /* ALERTES (Grosses polices pour lecture rapide) */
        .alert-card { background: #111; border: 1px solid #333; padding: 18px; border-radius: 8px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 8px; }
        .alert-card.cuisine { border-left: 6px solid var(--accent); background: rgba(0,230,118,0.05); }
        .alert-card.bar { border-left: 6px solid #ea80fc; background: rgba(234,128,252,0.05); }
        .alert-card.web { border-left: 6px solid var(--blue); }
        .alert-title { font-weight: 900; font-size: 1rem; text-transform: uppercase; }

        /* CAISSE & MENU FLUIDE */
        .ticket-area { flex: 1; background: #000; border: 1px solid #222; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 10px; min-height: 150px; }
        .cat-tabs { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .cat-tab { padding: 12px 18px; background: #1a1a1a; border: 1px solid #333; border-radius: 8px; font-size: 0.9rem; color: #888; font-weight: 900; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .cat-tab.active { background: var(--blue); color: #000; border-color: var(--blue); }
        
        /* GRILLE AUTO-AJUSTABLE : 1 colonne si < 140px, sinon 2, 3, etc. */
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; overflow-y: auto; max-height: 35vh; padding-right: 5px; }
        .btn-item { background: #161616; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-weight: bold; text-align: left; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 80px; font-size: 1rem; }
        .btn-item:active { background: #333; }
        
        .input-field { width: 100%; background: #000; border: 1px solid var(--warning); color: var(--warning); padding: 15px; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; font-family: 'Inter', sans-serif; font-weight: bold; margin-bottom: 10px; }
        .btn-action { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; box-shadow: 0 4px 15px rgba(0,230,118,0.3); }

        /* CORRECTIONS POUR TRÈS PETITS ÉCRANS (iPhones) */
        @media (max-width: 400px) {
            .header-title { font-size: 1rem; }
            .live-badge { display: none; } /* On cache le badge pour gagner de la place */
            .btn-top { padding: 10px; font-size: 0.8rem; }
            #table-title { font-size: 1.8rem !important; }
            .btn-item { min-height: 70px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">SALLE <span class="live-badge">SYNC</span></div>
        <div style="display:flex; gap:10px; flex:1; justify-content: flex-end;">
            <button class="btn-top" style="border-color:var(--blue); color:var(--blue); max-width: 150px;" onclick="openDrawer('radar-drawer')">
                📡 RADAR
                <div id="radar-badge" class="radar-badge" style="display:none;">0</div>
            </button>
            <button class="btn-top" style="border-color:#555; color:#aaa; max-width: 100px;" onclick="window.location.reload(true)">🔄 REFRESH</button>
        </div>
    </header>

    <div class="main-workspace">
        <div class="floor-plan" id="floor-plan"></div>

        <div id="radar-drawer" class="drawer">
            <div class="drawer-header">
                <h2 style="margin:0; color:var(--blue); font-size: 1.5rem;">📡 ALERTES</h2>
                <button class="btn-close" onclick="closeDrawer('radar-drawer')">✕</button>
            </div>
            <div id="radar-list" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
        </div>

        <div id="caisse-drawer" class="drawer">
            <div class="drawer-header">
                <h2 id="table-title" style="margin:0; color:var(--accent); font-size:2.2rem;">TABLE</h2>
                <button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button>
            </div>
            
            <div class="ticket-area" id="ticket-list"></div>
            <input type="text" id="order-obs" class="input-field" placeholder="⚠️ OBSERVATIONS CLIENT...">
            <div class="cat-tabs" id="cat-tabs"></div>
            <div class="menu-grid" id="menu-items"></div>
            
            <div id="total-val" style="font-size:2rem; font-weight:900; text-align:right; margin:15px 0; color:var(--accent);">0.00 €</div>
            <button class="btn-action" onclick="sendOrder()">🚀 ENVOYER CUISINE</button>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE' || msg.type === 'PLAN_UPDATE') {
                activeOrders = msg.activeOrders || activeOrders;
                renderFloorPlan(); renderRadar(); 
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'empire_recipes' && document.getElementById('caisse-drawer').classList.contains('open')) {
                renderMenu('Plat'); 
            }
        });

        async function forceSync() {
            try {
                const res = await fetch('/get-current-state');
                const data = await res.json();
                activeOrders = data.activeOrders;
                renderFloorPlan(); renderRadar();
            } catch(e) {}
        }

        function openDrawer(id) { 
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
            document.getElementById(id).classList.add('open'); 
        }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        // --- MOTEUR RADAR ---
        function renderRadar() {
            const container = document.getElementById('radar-list');
            let html = ''; let alertsCount = 0;

            for (const tableId in activeOrders) {
                const order = activeOrders[tableId];
                if (!order.items || order.items.length === 0) continue;

                const isWeb = tableId.includes('WEB');
                const foodItems = order.items.filter(i => i.category !== 'Boisson');
                const drinkItems = order.items.filter(i => i.category === 'Boisson');
                
                const foodReady = foodItems.length > 0 && foodItems.every(i => i.done);
                if (foodReady) {
                    alertsCount++;
                    html += `<div class="alert-card cuisine"><span class="alert-title" style="color:var(--accent);">🔥 PLATS PRÊTS</span><span style="font-size:1.2rem; font-weight:bold;">Aller à la Table : ${tableId.replace('WEB_','')}</span></div>`;
                }

                const drinksReady = drinkItems.length > 0 && drinkItems.every(i => i.done);
                if (drinksReady && !foodReady) { 
                    alertsCount++;
                    html += `<div class="alert-card bar"><span class="alert-title" style="color:#ea80fc;">🧊 BOISSONS PRÊTES</span><span style="font-size:1.2rem; font-weight:bold;">Aller à la Table : ${tableId.replace('WEB_','')}</span></div>`;
                }

                if (isWeb && order.items.every(i => !i.done)) {
                    alertsCount++;
                    html += `<div class="alert-card web"><span class="alert-title" style="color:var(--blue);">🌐 COMMANDE QR</span><span style="font-size:1.2rem; font-weight:bold;">Table : ${tableId.replace('WEB_','')}</span></div>`;
                }
            }

            container.innerHTML = html || '<div style="color:#555; text-align:center; padding-top:20px;">Aucune alerte.</div>';
            
            const badge = document.getElementById('radar-badge');
            if (alertsCount > 0) { badge.style.display = 'flex'; badge.textContent = alertsCount; } 
            else { badge.style.display = 'none'; }
        }

        // --- MOTEUR PLAN DE SALLE ---
        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan');
            floor.innerHTML = '';
            const tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [ {id:'T1', l:50, t:50, w:100, h:100, label:'T1'}, {id:'T2', l:200, t:50, w:100, h:100, label:'T2'} ];

            tables.forEach(t => {
                const div = document.createElement('div');
                div.className = 'table-obj';
                
                const order = activeOrders[t.id] || activeOrders[t.label];
                if(order) {
                    const foodItems = order.items.filter(i => i.category !== 'Boisson');
                    const foodReady = foodItems.length > 0 && foodItems.every(i => i.done);
                    if (foodReady) div.classList.add('ready');
                    else div.classList.add('occupied');
                }

                div.innerHTML = `<span>${t.label}</span>`;
                div.style.left = t.l + 'px'; div.style.top = t.t + 'px';
                div.style.width = t.w + 'px'; div.style.height = t.h + 'px';

                div.addEventListener('pointerdown', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    openCaisse(t.label || t.id);
                });
                floor.appendChild(div);
            });
        }

        // --- MOTEUR CAISSE & MENU ---
        function openCaisse(label) {
            currentTableId = label; document.getElementById('table-title').innerText = label;
            currentTicket = activeOrders[label]?.items || [];
            renderTicket(); renderMenu('Plat'); openDrawer('caisse-drawer');
        }

        function renderMenu(activeCategory = 'Plat') {
            const menu = JSON.parse(localStorage.getItem('empire_recipes')) || [{name:'Plat Test', price:20, category:'Plat'}];
            const categories = [...new Set(menu.map(item => item.category || 'Autre'))];
            
            document.getElementById('cat-tabs').innerHTML = categories.map(cat => `<div class="cat-tab ${cat === activeCategory ? 'active' : ''}" onclick="renderMenu('${cat}')">${cat}</div>`).join('');
            
            document.getElementById('menu-items').innerHTML = menu.filter(m => (m.category || 'Autre') === activeCategory).map(m => `
                <div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price}, '${m.category}')">
                    <span>${m.name}</span><span style="color:var(--blue); font-size:1.1rem; margin-top:5px;">${parseFloat(m.price).toFixed(2)}€</span>
                </div>`).join('');
        }

        function addItem(n, p, c) { currentTicket.push({id: Date.now(), n: n, p: p, category: c, done: false}); renderTicket(); }
        function removeItem(idx) { currentTicket.splice(idx, 1); renderTicket(); }

        function renderTicket() {
            const list = document.getElementById('ticket-list'); let total = 0;
            list.innerHTML = currentTicket.map((i, idx) => {
                total += i.p || 0;
                let statusIcon = i.done ? '✅' : '⏳';
                return `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #111; font-weight:bold; font-size:1.1rem;">
                    <span>${statusIcon} 1x ${i.n}</span>
                    <span style="color:var(--accent);">${(i.p || 0).toFixed(2)}€ <span onclick="removeItem(${idx})" style="color:red; margin-left:15px; cursor:pointer; padding:5px;">✕</span></span>
                </div>`;
            }).join('') || '<div style="color:#444; text-align:center; padding:20px; font-size:1rem;">Ticket vierge</div>';
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return;
            const obs = document.getElementById('order-obs').value.trim();
            const order = { table: currentTableId, items: currentTicket, observation: obs, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), status: 'pending' };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('order-obs').value = ''; closeDrawer('caisse-drawer');
        }

        forceSync();
        setInterval(forceSync, 3000); 
    </script>
</body>
</html>
