<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iServe - Pad Serveur</title>
    <style>
        /* 🟢 PALETTE ULTRA PREMIUM DARK MODE */
        :root { 
            --bg-deep: #050505;
            --panel-bg: rgba(20, 25, 35, 0.9);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;    
            --text-muted: #64748b;   
            --gold: #fbbf24;         
            --accent: #10b981; 
            --alert: #ef4444;        
            --purple: #8b5cf6;       
            --cyan: #06b6d4;
        }
        
        body { background: var(--bg-deep); color: var(--text-main); font-family: 'Inter', -apple-system, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        /* HEADER ÉPURÉ */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 12px 20px; border-bottom: 1px solid var(--panel-border); background: #0a0a0a; z-index: 100; }
        .brand { display: flex; align-items: center; gap: 15px; }
        .logo-text { color: var(--ordered); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; margin: 0; text-transform: uppercase; color: #2979ff; }
        
        .header-controls { display: flex; gap: 10px; align-items: center; }
        .sync-badge { display: flex; align-items: center; gap: 8px; background: rgba(16, 185, 129, 0.1); border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; border-radius: 20px; font-size: 0.7rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }

        /* VIEW CONTAINERS */
        .view { display: none; flex: 1; height: calc(100vh - 60px); }
        .view.active { display: flex; }

        /* ================== VUE PLAN DE SALLE ================== */
        .tables-container { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; align-content: start; width: 100%; overflow-y: auto; }
        .table-btn { background: var(--panel-bg); border: 2px solid #333; border-radius: 12px; height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.1s; box-shadow: 0 4px 10px rgba(0,0,0,0.3);}
        .table-btn:active { transform: scale(0.95); }
        .table-btn.free { border-color: var(--text-muted); color: var(--text-main); }
        .table-btn.occupied { border-color: var(--gold); background: rgba(251, 191, 36, 0.1); color: var(--gold); }
        .table-number { font-size: 2.5rem; font-weight: 900; line-height: 1; }
        .table-status { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; margin-top: 5px; }

        /* ================== VUE PRISE DE COMMANDE ================== */
        .order-layout { display: flex; width: 100%; height: 100%; }
        
        /* Sidebar Catégories */
        .categories-sidebar { width: 220px; background: #0a0a0a; border-right: 1px solid #222; display: flex; flex-direction: column; overflow-y: auto; padding: 10px; gap: 8px;}
        .cat-group-title { color: #555; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; margin: 10px 0 5px 5px; border-bottom: 1px solid #222; padding-bottom: 5px;}
        .cat-btn { background: #111; border: 1px solid #333; color: #ccc; padding: 15px 10px; border-radius: 8px; font-weight: bold; font-size: 0.9rem; text-align: left; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.1s;}
        .cat-btn:active { background: #333; }
        .cat-btn.active.cuisine { background: rgba(251, 191, 36, 0.15); border-color: var(--gold); color: var(--gold); }
        .cat-btn.active.bar { background: rgba(6, 182, 212, 0.15); border-color: var(--cyan); color: var(--cyan); }

        /* Zone Grille de Produits */
        .products-area { flex: 1; padding: 15px; overflow-y: auto; background: var(--bg-deep); display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; align-content: start; }
        .prod-btn { background: var(--panel-bg); border: 1px solid #333; border-radius: 10px; padding: 15px; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; gap: 10px; min-height: 100px; box-shadow: 0 4px 6px rgba(0,0,0,0.2); transition: 0.1s;}
        .prod-btn:active { transform: scale(0.95); background: #222; border-color: var(--text-main); }
        .prod-name { font-size: 1rem; font-weight: bold; color: var(--text-main); line-height: 1.3; }
        .prod-price { font-size: 1.2rem; font-weight: 900; color: var(--accent); }

        /* Panneau du Ticket (Cart) */
        .ticket-sidebar { width: 350px; background: #0a0a0a; border-left: 1px solid #222; display: flex; flex-direction: column; }
        .ticket-header { padding: 15px; background: #111; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .ticket-table-name { font-size: 1.5rem; font-weight: 900; color: var(--gold); margin: 0; }
        .btn-back { background: transparent; border: 1px solid #555; color: #aaa; padding: 5px 10px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        
        .ticket-items { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        .t-item { background: #111; border: 1px solid #333; padding: 10px; border-radius: 6px; display: flex; flex-direction: column; gap: 8px; }
        .t-item-top { display: flex; justify-content: space-between; align-items: flex-start; }
        .t-item-name { font-weight: bold; font-size: 0.95rem; color: #fff; width: 60%; line-height: 1.2;}
        .t-item-price { font-weight: 900; color: var(--accent); font-size: 1rem; }
        .t-item-controls { display: flex; justify-content: space-between; align-items: center; background: #000; border-radius: 6px; padding: 4px; border: 1px solid #222;}
        .t-btn { background: #222; border: none; color: #fff; width: 35px; height: 35px; border-radius: 4px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
        .t-btn:active { background: var(--gold); color: #000; }
        .t-qty { font-size: 1.1rem; font-weight: 900; width: 30px; text-align: center; }

        .ticket-footer { padding: 15px; background: #111; border-top: 1px solid #333; display: flex; flex-direction: column; gap: 10px; }
        .t-total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .t-total-label { font-size: 1.2rem; font-weight: 900; color: #fff; }
        .t-total-val { font-size: 2rem; font-weight: 900; color: var(--accent); }
        
        .action-btn { width: 100%; padding: 18px; border-radius: 8px; font-weight: 900; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; border: none; transition: 0.1s; letter-spacing: 1px; display: flex; justify-content: center; align-items: center; gap: 10px;}
        .action-btn:active { transform: scale(0.98); }
        .btn-send { background: rgba(251, 191, 36, 0.1); border: 2px solid var(--gold); color: var(--gold); }
        .btn-pay { background: var(--accent); color: #000; }

        /* SCROLLBAR CUSTOM */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="brand">
            <h1 class="logo-text">iserve.ch</h1>
        </div>
        <div class="header-controls">
            <div class="sync-badge">
                <div id="sync-dot" class="sync-dot"></div> <span id="sync-text">CONNEXION...</span>
            </div>
        </div>
    </div>

    <div id="view-tables" class="view active">
        <div class="tables-container" id="tables-grid">
            </div>
    </div>

    <div id="view-order" class="view">
        <div class="order-layout">
            
            <div class="categories-sidebar">
                <div class="cat-group-title">🔪 CUISINE</div>
                <button class="cat-btn cuisine" onclick="renderProducts('menuJour', 'cuisine')">👨‍🍳 Menu du Jour</button>
                <button class="cat-btn cuisine" onclick="renderProducts('suggestions', 'cuisine')">⭐ Suggestions</button>
                <button class="cat-btn cuisine" onclick="renderProducts('entrees', 'cuisine')">🥗 Entrées</button>
                <button class="cat-btn cuisine" onclick="renderProducts('plats', 'cuisine')">🥩 Plats</button>
                <button class="cat-btn cuisine" onclick="renderProducts('desserts', 'cuisine')">🍰 Desserts</button>

                <div class="cat-group-title" style="margin-top:20px;">🍸 BAR</div>
                <button class="cat-btn bar" onclick="renderProducts('cocktails', 'bar')">🍸 Cocktails</button>
                <button class="cat-btn bar" onclick="renderProducts('mocktails', 'bar')">🍹 Sans Alcool</button>
                <button class="cat-btn bar" onclick="renderProducts('vins', 'bar')">🍷 Vins</button>
                <button class="cat-btn bar" onclick="renderProducts('bieres', 'bar')">🍺 Bières</button>
                <button class="cat-btn bar" onclick="renderProducts('chaudes', 'bar')">☕ Chaudes</button>
                <button class="cat-btn bar" onclick="renderProducts('froides', 'bar')">🥤 Froides</button>
                <button class="cat-btn bar" onclick="renderProducts('spiritueux', 'bar')">🥃 Spiritueux</button>
            </div>

            <div class="products-area" id="products-grid">
                </div>

            <div class="ticket-sidebar">
                <div class="ticket-header">
                    <h2 class="ticket-table-name" id="current-table-title">TABLE 1</h2>
                    <button class="btn-back" onclick="closeTable()">🔙 PLAN</button>
                </div>
                <div class="ticket-items" id="ticket-items">
                    </div>
                <div class="ticket-footer">
                    <div class="t-total-row">
                        <span class="t-total-label">TOTAL</span>
                        <span class="t-total-val" id="ticket-total">0.00 €</span>
                    </div>
                    <button class="action-btn btn-send" onclick="sendToProd()">🔥 ENVOYER EN PROD</button>
                    <button class="action-btn btn-pay" onclick="payTicket()">💶 ENCAISSER</button>
                </div>
            </div>

        </div>
    </div>

    <script>
        const API = {
            getState: async () => {
                try {
                    if (window.location.protocol !== 'file:') {
                        let r = await fetch('/get-current-state');
                        if(r.ok) return await r.json();
                    } else throw new Error("Local");
                } catch(e) {
                    return JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
            },
            update: async (key, data) => {
                let state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                if (data === null) delete state.activeOrders[key];
                else state.activeOrders[key] = { data: data };
                localStorage.setItem('EMPIRE_GLOBAL_SYNC', JSON.stringify(state));
                if (window.location.protocol !== 'file:') {
                    try { await fetch('/update-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: key, order: data === null ? null : { data: data } }) }); } catch(e) {}
                }
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'EMPIRE_GLOBAL_SYNC') fetchSystemState();
        });

        // Bases de données locales du Pad
        let menuCuisine = {};
        let menuBar = {};
        let activeTables = {}; // Pour stocker les commandes de chaque table
        let currentTableId = null;
        let cart = []; // Panier actif

        const TOTAL_TABLES = 20;

        // ==========================================
        // INITIALISATION & UI
        // ==========================================
        function initTables() {
            const grid = document.getElementById('tables-grid');
            let html = '';
            for(let i=1; i<=TOTAL_TABLES; i++) {
                let isOccupied = activeTables[`TABLE_${i}`] && activeTables[`TABLE_${i}`].data && activeTables[`TABLE_${i}`].data.items && activeTables[`TABLE_${i}`].data.items.length > 0;
                html += `
                <div class="table-btn ${isOccupied ? 'occupied' : 'free'}" onclick="openTable(${i})">
                    <span class="table-number">${i}</span>
                    <span class="table-status">${isOccupied ? 'Occupée' : 'Libre'}</span>
                </div>`;
            }
            grid.innerHTML = html;
        }

        function openTable(id) {
            currentTableId = id;
            document.getElementById('current-table-title').innerText = `TABLE ${id}`;
            
            // Charger le panier si existant
            let savedOrder = activeTables[`TABLE_${id}`];
            cart = (savedOrder && savedOrder.data && savedOrder.data.items) ? JSON.parse(JSON.stringify(savedOrder.data.items)) : [];
            
            updateCartUI();
            
            // Switch View
            document.getElementById('view-tables').classList.remove('active');
            document.getElementById('view-order').classList.add('active');
            
            // Ouvrir les Plats par défaut
            renderProducts('plats', 'cuisine');
        }

        function closeTable() {
            currentTableId = null;
            cart = [];
            document.getElementById('view-order').classList.remove('active');
            document.getElementById('view-tables').classList.add('active');
            initTables(); // Refresh status
        }

        // ==========================================
        // MOTEUR DE PRISE DE COMMANDE
        // ==========================================
        function renderProducts(categoryKey, dept) {
            // UI Button styling
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');

            const grid = document.getElementById('products-grid');
            let items = [];
            
            if (dept === 'cuisine' && menuCuisine[categoryKey]) items = menuCuisine[categoryKey];
            if (dept === 'bar' && menuBar[categoryKey]) items = menuBar[categoryKey];

            if (items.length === 0) {
                grid.innerHTML = `<div style="color:var(--text-muted); padding:20px; font-style:italic;">Aucun produit disponible dans cette catégorie.</div>`;
                return;
            }

            grid.innerHTML = items.map(item => `
                <div class="prod-btn" onclick="addToCart('${item.name.replace(/'/g, "\\'")}', ${item.price}, '${dept}')">
                    <span class="prod-name">${item.name}</span>
                    <span class="prod-price">${parseFloat(item.price).toFixed(2)} €</span>
                </div>
            `).join('');
        }

        function addToCart(name, price, dept) {
            let existing = cart.find(i => i.n === name);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({ id: Date.now() + Math.random(), n: name, price: price, qty: 1, dest: dept });
            }
            updateCartUI();
        }

        function updateCartQty(id, delta) {
            let item = cart.find(i => i.id === id);
            if(item) {
                item.qty += delta;
                if(item.qty <= 0) cart = cart.filter(i => i.id !== id);
                updateCartUI();
            }
        }

        function updateCartUI() {
            const list = document.getElementById('ticket-items');
            if(cart.length === 0) {
                list.innerHTML = `<div style="color:#555; text-align:center; margin-top:20px; font-style:italic;">Ticket vide</div>`;
                document.getElementById('ticket-total').innerText = "0.00 €";
                return;
            }

            let total = 0;
            list.innerHTML = cart.map(item => {
                let lineTotal = item.price * item.qty;
                total += lineTotal;
                let destColor = item.dest === 'cuisine' ? 'var(--gold)' : 'var(--cyan)';
                return `
                <div class="t-item">
                    <div class="t-item-top">
                        <span class="t-item-name"><span style="color:${destColor}; font-size:0.6rem; vertical-align:top;">⬤</span> ${item.n}</span>
                        <span class="t-item-price">${lineTotal.toFixed(2)} €</span>
                    </div>
                    <div class="t-item-controls">
                        <button class="t-btn" onclick="updateCartQty(${item.id}, -1)">-</button>
                        <span class="t-qty">${item.qty}</span>
                        <button class="t-btn" onclick="updateCartQty(${item.id}, 1)">+</button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('ticket-total').innerText = total.toFixed(2) + " €";
        }

        // ==========================================
        // FLUX DE DONNÉES (ENVOI & ENCAISSEMENT)
        // ==========================================
        async function sendToProd() {
            if(cart.length === 0) return alert("Le ticket est vide.");
            
            // Sauvegarder la commande sur la table (Le fichier production.html lira ça)
            let orderData = { 
                id: Date.now(), 
                table: currentTableId, 
                timestamp: new Date().toISOString(), 
                items: cart 
            };
            
            await API.update(`TABLE_${currentTableId}`, orderData);
            
            // Petit feedback visuel
            const btn = document.querySelector('.btn-send');
            const originalText = btn.innerText;
            btn.innerText = "✅ ENVOYÉ !";
            btn.style.background = "var(--accent)";
            btn.style.color = "#000";
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "rgba(251, 191, 36, 0.1)";
                btn.style.color = "var(--gold)";
                closeTable();
            }, 1000);
        }

        async function payTicket() {
            if(cart.length === 0) return alert("Le ticket est vide.");
            if(!confirm(`Encaisser la Table ${currentTableId} et archiver les ventes ?`)) return;

            // 1. Séparer la Cuisine et le Bar pour l'archivage financier
            let cuisineItems = cart.filter(i => i.dest === 'cuisine');
            let barItems = cart.filter(i => i.dest === 'bar');

            const state = await API.getState();
            let archiveCuisine = state.activeOrders['SALES_ARCHIVE_CUISINE']?.data || [];
            let archiveBar = state.activeOrders['SALES_ARCHIVE_BAR']?.data || [];

            const now = new Date();
            const dateStr = now.toLocaleDateString('fr-FR');
            const timeStr = now.toLocaleTimeString('fr-FR');

            // 2. Injecter dans les archives du Directeur
            if(cuisineItems.length > 0) {
                archiveCuisine.push({ id: Date.now(), date: dateStr, time: timeStr, items: cuisineItems });
                await API.update('SALES_ARCHIVE_CUISINE', archiveCuisine);
            }
            if(barItems.length > 0) {
                archiveBar.push({ id: Date.now()+1, date: dateStr, time: timeStr, items: barItems });
                await API.update('SALES_ARCHIVE_BAR', archiveBar);
            }

            // 3. Libérer la table
            await API.update(`TABLE_${currentTableId}`, null);
            
            alert(`✅ Table ${currentTableId} encaissée. Le Chiffre d'Affaires a été mis à jour dans le Cockpit Direction.`);
            closeTable();
        }

        // ==========================================
        // SYNCHRONISATION SYSTÈME
        // ==========================================
        async function fetchSystemState() {
            try {
                const state = await API.getState();
                if (state && state.activeOrders) {
                    
                    // Récupérer les menus
                    if (state.activeOrders['MENU_MASTER']) menuCuisine = state.activeOrders['MENU_MASTER'].data || {};
                    if (state.activeOrders['MENU_MASTER_BAR']) menuBar = state.activeOrders['MENU_MASTER_BAR'].data || {};

                    // Récupérer l'état des tables
                    activeTables = {};
                    for(let i=1; i<=TOTAL_TABLES; i++) {
                        let key = `TABLE_${i}`;
                        if(state.activeOrders[key]) {
                            activeTables[key] = state.activeOrders[key];
                        }
                    }

                    // Rafraichir les vues si on n'est pas en train de prendre une commande
                    if(currentTableId === null) {
                        initTables();
                    }

                    const dot = document.getElementById('sync-dot');
                    dot.classList.add('online'); 
                    document.getElementById('sync-text').innerText = "CONNECTÉ (DIRECT)";
                }
            } catch(e) {
                document.getElementById('sync-dot').classList.remove('online'); 
                document.getElementById('sync-text').innerText = "HORS LIGNE"; 
            }
        }

        async function bootSystem() {
            initTables();
            await fetchSystemState();
            setInterval(fetchSystemState, 3000); // Pulse toutes les 3s pour voir les tables occupées
        }

        bootSystem();
    </script>
</body>
</html>
