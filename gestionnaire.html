        async function acknowledgeChefAlert() {
            if (!currentTable) return;
            
            let order = activeOrders[currentTable];
            if (order) {
                delete order.alerteRouge; // Supprime l'alerte
                await API.update(currentTable, order, true); // Sync avec Render
                
                checkTableAlertState(currentTable); // Débloque l'interface
                showToast("✅ Alerte traitée");
                logAction("ALERTE RÉGLÉE", `Table ${currentTable} par ${currentUser.name}`);
            }
        }

        function openOrder(tableLabel) {
            currentTable = tableLabel;
            document.getElementById('table-label').innerText = "TABLE " + tableLabel;
            
            if(activeOrders[tableLabel] && activeOrders[tableLabel].status === 'reserved') {
                ticketItems = [];
                document.getElementById('order-obs').value = activeOrders[tableLabel].observations || '';
            } else {
                ticketItems = (activeOrders[tableLabel] && activeOrders[tableLabel].items) ? JSON.parse(JSON.stringify(activeOrders[tableLabel].items)) : [];
                document.getElementById('order-obs').value = (activeOrders[tableLabel] && activeOrders[tableLabel].observations) ? activeOrders[tableLabel].observations : '';
            }
            
            let tObj = tables.find(t => t && t.label === tableLabel && t.isExtra);
            if (tObj && ticketItems.length === 0 && document.getElementById('order-obs').value === '') {
                document.getElementById('order-obs').value = `🍽️ ${tObj.pax || 1} Couvert(s)`;
            }
            
            let needsUpdate = false;
            ticketItems.forEach(i => {
                if (i.done && !i.served) {
                    i.served = true;
                    needsUpdate = true;
                }
            });
            if (needsUpdate && activeOrders[currentTable]) {
                let updatedOrder = activeOrders[currentTable];
                updatedOrder.items = ticketItems;
                API.update(currentTable, updatedOrder, true);
            }

            renderSeatBar();
            renderMenu('MenuJour'); 
            renderTicket();
            checkTableAlertState(currentTable); 
            document.getElementById('order-drawer').classList.add('open');
        }

        function renderMenu(category) {
            currentCategory = category;
            let itemsToDisplay = [];
            
            if (category === 'MenuJour') {
                currentCourseDefault = 2;
                if(menuCuisine.menuJour) itemsToDisplay.push(...menuCuisine.menuJour.map(i => ({...i, dest: 'cuisine', isMenuJour: true})));
                if(menuCuisine.suggestions) itemsToDisplay.push(...menuCuisine.suggestions.map(i => ({...i, dest: 'cuisine', isMenuJour: false})));
            }
            else if (category === 'Entrées') {
                currentCourseDefault = 1;
                if(menuCuisine.entrees) itemsToDisplay.push(...menuCuisine.entrees.map(i => ({...i, dest: 'cuisine'})));
            } 
            else if (category === 'Plats') {
                currentCourseDefault = 2;
                if(menuCuisine.plats) itemsToDisplay.push(...menuCuisine.plats.map(i => ({...i, dest: 'cuisine'})));
            } 
            else if (category === 'Desserts') {
                currentCourseDefault = 3;
                if(menuCuisine.desserts) itemsToDisplay.push(...menuCuisine.desserts.map(i => ({...i, dest: 'cuisine'})));
            } 
            else if (category === 'Boissons') {
                currentCourseDefault = 0;
                for(let key in menuBar) {
                    if(menuBar[key]) itemsToDisplay.push(...menuBar[key].map(i => ({...i, dest: 'bar'})));
                }
            }

            document.querySelectorAll('.drawer .menu-tab').forEach(b => {
                b.classList.remove('gold');
                b.style.background = 'transparent';
                b.style.borderColor = 'var(--border)';
                b.style.color = 'var(--text-main)';
                
                if(b.innerText.includes(category.toUpperCase()) || (category === 'MenuJour' && b.innerText.includes('MENU JOUR'))) {
                    b.classList.add('gold');
                    b.style.background = 'var(--gold-dim)';
                    b.style.borderColor = 'var(--gold)';
                    b.style.color = 'var(--gold)';
                }
            });

            const container = document.getElementById('menu');
            if (itemsToDisplay.length === 0) {
                container.innerHTML = `<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:20px; font-size:1.1rem;">La carte est vide. Le chef n'a rien publié dans cette section.</div>`;
                return;
            }

            container.innerHTML = itemsToDisplay.map(item => {
                let isSoldOut = (item.stock === 0);
                let cleanName = item.name.replace(/\n/g, '<br>');
                let escapedName = escapeQuotes(item.name);
                let price = parseFloat(item.price) || 0;
                
                let stockHtml = '';
                if (item.stock !== "" && item.stock !== undefined && item.stock > 0) {
                    let badgeClass = 'stock-badge';
                    if (item.stock <= stockAlerts.red) badgeClass += ' alert-red';
                    else if (item.stock <= stockAlerts.orange) badgeClass += ' alert-orange';
                    else if (item.stock <= stockAlerts.yellow) badgeClass += ' alert-yellow';
                    else if (item.stock <= stockAlerts.green) badgeClass += ' alert-green';

                    stockHtml = `<div class="${badgeClass}">${item.stock}</div>`;
                }

                let clickAction = (item.isMenuJour) 
                    ? `addMenuToTicket('${escapedName}', ${price}, '${item.dest}')` 
                    : `addToTicket('${escapedName}', ${price}, '${item.dest}')`;

                return `
                    <button class="btn-item ${isSoldOut ? 'sold-out' : ''}" onclick="${clickAction}">
                        ${stockHtml}
                        <span>${cleanName}</span>
                        <span class="price">${price.toFixed(2)} €</span>
                    </button>
                `;
            }).join('');
        }

        function openSurMesureModal() {
            document.getElementById('sm-name').value = '';
            document.getElementById('sm-price').value = '';
            document.getElementById('sur-mesure-modal').classList.add('open');
        }

        function closeSurMesureModal() {
            document.getElementById('sur-mesure-modal').classList.remove('open');
        }

        function addSurMesure() {
            let n = document.getElementById('sm-name').value.trim();
            let p = parseFloat(document.getElementById('sm-price').value) || 0;
            let c = parseInt(document.getElementById('sm-course').value);
            
            if(!n) return alert("Veuillez entrer un nom pour la demande.");
            
            let dest = (c === 0) ? 'bar' : 'cuisine';
            
            executeAddToCart("✏️ " + n, p, dest, c);
            closeSurMesureModal();
        }

        function addMenuToTicket(n, p, dest) {
            let parts = n.split('[BR]');
            
            if (parts.length <= 1) {
                let cleanN = n.replace('🌟 ', '').trim();
                executeAddToCart("🥗 Entrée (" + cleanN + ")", 0, dest, 1, n);
                executeAddToCart("🔥 Plat (" + cleanN + ")", p, dest, 2, n);
                executeAddToCart("🍰 Dessert (" + cleanN + ")", 0, dest, 3, n);
                return;
            }

            let entree = parts[0] ? "🥗 " + parts[0].trim() : null;
            let plat = parts[1] ? "🔥 " + parts[1].trim() : null;
            let dessert = parts[2] ? "🍰 " + parts[2].trim() : null;

            if (entree) executeAddToCart(entree, 0, dest, 1, n); 
            if (plat) executeAddToCart(plat, p, dest, 2, n);     
            if (dessert) executeAddToCart(dessert, 0, dest, 3, n); 
            
            for(let i=3; i<parts.length; i++) {
                if(parts[i].trim() !== '') executeAddToCart("🍰 " + parts[i].trim(), 0, dest, 3, n);
            }
        }

        function getItemStock(name) {
            let pureName = name.replace('🌟 ', '').trim().toLowerCase();
            let foundStock = null;
            ['entrees', 'plats', 'desserts', 'menuJour', 'suggestions'].forEach(cat => {
                if(menuCuisine[cat]) {
                    let match = menuCuisine[cat].find(i => i.name.replace('🌟 ', '').trim().toLowerCase() === pureName);
                    if(match && match.stock !== "" && match.stock !== undefined) foundStock = match.stock;
                }
            });
            for(let cat in menuBar) {
                if(menuBar[cat]) {
                    let match = menuBar[cat].find(i => i.name.replace('🌟 ', '').trim().toLowerCase() === pureName);
                    if(match && match.stock !== "" && match.stock !== undefined) foundStock = match.stock;
                }
            }
            return foundStock;
        }

        function showCriticalStockAlert(name, stock) {
            document.getElementById('critical-stock-msg').innerHTML = `Il ne reste que <br><span style="color:var(--alert); font-size:4rem; font-weight:900;">${stock}</span><br> ${name}`;
            document.getElementById('stock-critical-modal').classList.add('open');
            if(navigator.vibrate) navigator.vibrate([200, 100, 200]); 
        }

        function closeCriticalStockAlert() {
            document.getElementById('stock-critical-modal').classList.remove('open');
        }

        let pendingCuissonItem = null;
        function addToTicket(n, p, dest) { 
            let realName = n.replace(/\[BR\]/g, ' ');
            let currentStock = getItemStock(realName);
            
            if (currentStock !== null && currentStock <= 3 && currentStock > 0) {
                showCriticalStockAlert(realName, currentStock);
            }

            if(['entrecôte', 'entrecote', 'bœuf', 'boeuf', 'steak', 'burger', 'filet', 'canard', 'agneau', 'viande', 'tartare', 'onglet', 'bavette', 'côte', 'cote'].some(m => realName.toLowerCase().includes(m))) {
                pendingCuissonItem = { n: realName, p, dest }; 
                document.getElementById('cuisson-item-name').innerText = realName; 
                document.getElementById('cuisson-modal').classList.add('open'); 
                return;
            }
            executeAddToCart(realName, p, dest);
        }

        function confirmCuisson(niv) { 
            if(pendingCuissonItem) { 
                executeAddToCart(`${pendingCuissonItem.n} (${niv})`, pendingCuissonItem.p, pendingCuissonItem.dest); 
                cancelCuisson(); 
            } 
        }
        function cancelCuisson() { pendingCuissonItem = null; document.getElementById('cuisson-modal').classList.remove('open'); }
        
        function executeAddToCart(n, p, dest, courseOverride, originalName) { 
            let cId = courseOverride !== undefined ? courseOverride : currentCourseDefault;
            let seatId = currentSeat; 
            
            let e = ticketItems.find(i => i.n === n && !i.done && !i.fired && i.course === cId && !i.obs && !i.isOffered && (i.seat || 0) === seatId); 
            if(e) e.qty = (e.qty||1)+1; 
            else ticketItems.push({ 
                id: Date.now()+Math.random(), 
                itemId: Date.now(), 
                n: n.replace(/\[BR\]/g, ' '), 
                originalName: (originalName || n).replace(/\[BR\]/g, '\n'),
                p, 
                qty: 1, 
                done: false, 
                dest, 
                fired: false, 
                firedTime: null, 
                savedToDB: false, 
                isOffered: false, 
                course: cId, 
                obs: "",
                seat: seatId
            }); 
            renderTicket(); 
        }
        
        let pendingCancelIndex = null;

        function offerItem() {
            if(pendingEditIndex === null) return;
            let item = ticketItems[pendingEditIndex];
            let maxQty = item.qty || 1;

            let qtyToOfferStr = prompt(`Combien de "${item.n.replace(/\n/g, ' ')}" voulez-vous offrir ? (Max: ${maxQty})`, "1");
            if (!qtyToOfferStr) return; 
            
            let qtyToOffer = parseInt(qtyToOfferStr);
            if (isNaN(qtyToOffer) || qtyToOffer <= 0 || qtyToOffer > maxQty) {
                return alert("⚠️ Quantité invalide.");
            }

            if (qtyToOffer === maxQty) {
                item.originalPrice = item.originalPrice !== undefined ? item.originalPrice : item.p; 
                item.p = 0; 
                item.isOffered = true;
                item.obs = (item.obs ? item.obs + " | " : "") + "🎁 Geste Co.";
                logAction("GESTE COMMERCIAL TOTAL", `Table: ${currentTable} | Plat: ${item.n} (${qtyToOffer}x)`);
            } else {
                item.qty = maxQty - qtyToOffer; 
                
                let offeredItem = JSON.parse(JSON.stringify(item)); 
                offeredItem.id = Date.now() + Math.random(); 
                offeredItem.qty = qtyToOffer;
                offeredItem.originalPrice = offeredItem.originalPrice !== undefined ? offeredItem.originalPrice : offeredItem.p;
                offeredItem.p = 0;
                offeredItem.isOffered = true;
                offeredItem.obs = (offeredItem.obs ? offeredItem.obs + " | " : "") + "🎁 Geste Co.";
                
                ticketItems.push(offeredItem);
                logAction("GESTE COMMERCIAL PARTIEL", `Table: ${currentTable} | Plat: ${item.n} (${qtyToOffer}x offerts sur ${maxQty})`);
            }

            renderTicket();
        }

        async function fireCourse(courseId) {
            let hasChanges = false;
            ticketItems.forEach(i => {

                if (c === courseId && !i.fired) { 
                    i.fired = true;

        async function executeSaveTableState(fireAllNew = false, keepOpen = false) {
            if(ticketItems.length === 0 && !keepOpen) return;
            
            const state = await API.getState();
            let centralMenu = (state && state.activeOrders && state.activeOrders['MENU_MASTER']) ? state.activeOrders['MENU_MASTER'].data : null;
            let barMenu = (state && state.activeOrders && state.activeOrders['MENU_MASTER_BAR']) ? state.activeOrders['MENU_MASTER_BAR'].data : null;
            
            let menuChanged = false;
            let barMenuChanged = false;

            ticketItems.forEach(tItem => {
                if(!tItem.savedToDB) { 
                    let pureName = (tItem.originalName || tItem.n).replace('🌟 ', ''); 

                    if(centralMenu && tItem.dest === 'cuisine') {
                        for (let cat in centralMenu) {
                            if(centralMenu[cat] && Array.isArray(centralMenu[cat])) {
                                let mItem = centralMenu[cat].find(i => i.name && i.name.replace('🌟 ', '') === pureName);
                                if (mItem && mItem.stock !== "" && mItem.stock !== undefined && mItem.stock > 0) {
                                    mItem.stock = Math.max(0, mItem.stock - (tItem.qty || 1));
                                    menuChanged = true;
                                }
                            }
                        }
                    }
                    
                    if(barMenu && tItem.dest === 'bar') {
                        for (let cat in barMenu) {
                            if(barMenu[cat] && Array.isArray(barMenu[cat])) {
                                let mItem = barMenu[cat].find(i => i.name && i.name.replace('🌟 ', '') === pureName);
                                if (mItem && mItem.stock !== "" && mItem.stock !== undefined && mItem.stock > 0) {
                                    mItem.stock = Math.max(0, mItem.stock - (tItem.qty || 1));
                                    barMenuChanged = true;
                                }
                            }
                        }
                    }
                    tItem.savedToDB = true; 
                }
                if (fireAllNew && !tItem.fired) {
                    tItem.fired = true;
                    tItem.firedTime = Date.now(); 
                }
            });

            if (menuChanged && centralMenu) await API.update('MENU_MASTER', centralMenu);
            if (barMenuChanged && barMenu) await API.update('MENU_MASTER_BAR', barMenu);

            await API.update(currentTable, { items: ticketItems, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), status: 'pending', observations: document.getElementById('order-obs').value.trim() }, true);
            
            if (fireAllNew) {
                logAction("ENVOI MASSIF", `Table: ${currentTable}`, ticketItems); 
            } else {
                logAction("SAUVEGARDE COMMANDE", `Table: ${currentTable}`, ticketItems);
            }
            
            if(!keepOpen) {
                closeOrder(); 
                renderFloor();
            }
        }

        async function processPartialPayment(method) {
            let amtInput = document.getElementById('pay-custom-amount').value;
            let amt = parseFloat(amtInput.replace(',', '.'));
            
            if(isNaN(amt) || amt <= 0) return alert("⚠️ Saisissez un montant valide.");
            
            let isVoucher = (method === 'TR' || method === 'CV');
            if(!isVoucher && amt > currentPayRemaining + 0.05) return alert("⚠️ Le montant saisi dépasse le reste à payer.");

            if (isVoucher && amt > currentPayRemaining) {
                if (!confirm(`Montant supérieur au reste (${amt.toFixed(2)}€). On ne rend pas la monnaie sur les ${method}. Valider ?`)) return;
            }

            // 💶 GESTION SÉCURISÉE DES ESPÈCES (RENDU MONNAIE)
            if (method === 'ESPÈCES') {
                let cashGivenStr = prompt(`💵 Le client vous donne combien en espèces ?\n(Reste à payer : ${amt.toFixed(2)}€)`);
                if (!cashGivenStr) return; // Le serveur a annulé
                
                let cashGiven = parseFloat(cashGivenStr.replace(',', '.'));
                if (isNaN(cashGiven) || cashGiven < amt) {
                    return alert("⚠️ ERREUR : Le montant donné par le client est invalide ou insuffisant.");
                }
                
                let changeDue = cashGiven - amt;
                if (changeDue > 0) {
                    alert(`💰 MONNAIE À RENDRE AU CLIENT : ${changeDue.toFixed(2)} €\n\nValidation de l'encaissement en cours...`);
                }
            }

            // 📱 GESTION DU QR CODE (Lien vers Portail Client)
            if (method === 'QR/TEL') {
                let serverUrl = window.location.origin; 
                let lienPaiement = `${serverUrl}/portail-client?table=${currentTable}&montant=${amt.toFixed(2)}`;
                let qrData = encodeURIComponent(lienPaiement);
                let qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=250x250&data=${qrData}`;

                document.getElementById('qr-code-img').src = qrUrl;
                document.getElementById('qr-amount-display').innerText = amt.toFixed(2);

                document.getElementById('pay-action-zone').style.display = 'none';

                document.getElementById('qr-pay-zone').dataset.amt = amt;
                return;

           // 💳 GESTION TPE (TERMINAL CLASSIQUE DU CLIENT)
            if (method === 'CB') {
                // Le système demande au serveur de confirmer qu'il a bien encaissé sur la machine externe
                const go = confirm(`Avez-vous bien passé la carte de ${amt.toFixed(2)}€ sur le terminal bancaire du restaurant ?`);
                if (!go) return; // Le serveur annule s'il y a eu un refus de carte
                
                // Note pour plus tard : Si ton client décide de passer chez SumUp un jour, 
                // tu n'auras qu'à décommenter les deux lignes ci-dessous pour réactiver le Bluetooth :
                // const success = await triggerSumUpPayment(amt);
                // if (!success) return; 
            }

            // ENREGISTREMENT STANDARD DU PAIEMENT
            currentPayHistory.push({ method: method, amount: amt });
            currentPayRemaining -= amt;
            if(currentPayRemaining < 0) currentPayRemaining = 0;
            
            updatePaymentUI();
            logAction("ENCAISSEMENT", `${method} : ${amt.toFixed(2)}€ | Table: ${currentTable}`);
        }

        async function triggerSumUpPayment(montant) {
            try {
                // IMPORTANT : Remplace 'TON_TOKEN_API' par ton jeton secret SumUp
                const API_TOKEN = 'TON_TOKEN_API'; 
                
                const response = await fetch('https://api.sumup.com/v1.0/checkouts', {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_TOKEN}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        amount: montant,
                        currency: 'EUR',
                        checkout_reference: `EMPIRE-${currentTable}-${Date.now()}`,
                        description: `Table ${currentTable}`
                    })
                });

                if (response.ok) {
                    showToast("📡 TERMINAL ACTIVÉ...");
                    return true;
                } else {
                    const err = await response.json();
                    alert("❌ ERREUR SUMUP : " + (err.message || "Vérifiez la connexion"));
                    return false;
                }
            } catch (error) {
                alert("❌ ERREUR RÉSEAU : Impossible de joindre SumUp.");
                return false;
            }
        }

        function cancelPayment() { 
            if(currentPayHistory.length > 0 && currentPayRemaining > 0) {
                if(!confirm("⚠️ ATTENTION : Des encaissements partiels ont été faits.\nÊtes-vous sûr de vouloir fermer et laisser la table ouverte ?")) return;
            }
            document.getElementById('payment-modal').classList.remove('open'); 
        }

        async function finalizeTablePayment() {
            document.getElementById('payment-modal').classList.remove('open');
            let methodsUsed = currentPayHistory.map(p => p.method).join(' + ');

            let receiptHtml = `
                <div style="font-family: monospace; font-size: 14px; text-align: center; width: 100%;">
                    <h2 style="margin: 0 0 10px 0; font-size: 20px;">EMPIRE OS</h2>
                    <p style="margin: 0 0 15px 0;">Table : ${currentTable}<br>${new Date().toLocaleString('fr-FR')}</p>
                    <div style="border-bottom: 1px dashed black; margin-bottom: 15px;"></div>
            `;
            
            ticketItems.forEach(item => {
                let q = item.qty || 1;
                let p = item.isOffered ? 0 : (parseFloat(item.p) || 0);
                receiptHtml += `
                    <div style="display: flex; justify-content: space-between; margin-bottom: 5px;">
                        <span style="text-align: left;">${q}x ${item.n}</span>
                        <span>${(p * q).toFixed(2)}€</span>
                    </div>
                `;
            });

            let tvaTotal = currentPayTotal - (currentPayTotal / 1.10);
            receiptHtml += `
                    <div style="border-bottom: 1px dashed black; margin: 15px 0;"></div>
                    <div style="display: flex; justify-content: space-between; font-weight: bold; font-size: 16px;">
                        <span>TOTAL TTC</span>
                        <span>${currentPayTotal.toFixed(2)}€</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 15px;">
                        <span>Dont TVA 10%</span>
                        <span>${tvaTotal.toFixed(2)}€</span>
                    </div>
                    <div style="text-align: left; font-size: 12px; margin-bottom: 20px;">
                        <strong>Paiements :</strong><br>
                        ${currentPayHistory.map(p => `${p.method} : ${p.amount.toFixed(2)}€`).join('<br>')}
                    </div>
                    <p style="margin: 0;">Merci de votre visite !</p>
                </div>
            `;

            document.getElementById('print-zone').innerHTML = receiptHtml;
            window.print(); 

           // --- 🏁 CLÔTURE DE TABLE ET ARCHIVAGE DES VENTES ---
            setTimeout(async () => {
                const state = await API.getState();
                
                let cuisineItems = ticketItems.filter(i => i.dest === 'cuisine');
                let barItems = ticketItems.filter(i => i.dest === 'bar');

                // Récupération sécurisée des archives
                let archiveCuisine = (state && state.activeOrders && state.activeOrders['SALES_ARCHIVE_CUISINE']) ? state.activeOrders['SALES_ARCHIVE_CUISINE'].data || [] : [];
                let archiveBar = (state && state.activeOrders && state.activeOrders['SALES_ARCHIVE_BAR']) ? state.activeOrders['SALES_ARCHIVE_BAR'].data || [] : [];
                
                let timeStr = new Date().toISOString();

                // Archivage Cuisine
                if (cuisineItems.length > 0) {
                    let cTotal = cuisineItems.reduce((acc, i) => acc + ((parseFloat(i.p)||0)*(i.qty||1)), 0);
                    archiveCuisine.push({ 
                        id: Date.now(), 
                        table: currentTable, 
                        time: timeStr, 
                        total: cTotal.toFixed(2), 
                        tva: (typeof tvaTotal !== 'undefined' ? tvaTotal.toFixed(2) : "0.00"), 
                        typePaiement: (typeof methodsUsed !== 'undefined' ? methodsUsed : "N/A"), 
                        splitDetails: (typeof currentPayHistory !== 'undefined' ? currentPayHistory : []), 
                        items: cuisineItems 
                    });
                    await API.update('SALES_ARCHIVE_CUISINE', archiveCuisine);
                }

                // Archivage Bar
                if (barItems.length > 0) {
                    let bTotal = barItems.reduce((acc, i) => acc + ((parseFloat(i.p)||0)*(i.qty||1)), 0);
                    archiveBar.push({ 
                        id: Date.now() + 1, 
                        table: currentTable, 
                        time: timeStr, 
                        total: bTotal.toFixed(2), 
                        tva: (typeof tvaTotal !== 'undefined' ? tvaTotal.toFixed(2) : "0.00"), 
                        typePaiement: (typeof methodsUsed !== 'undefined' ? methodsUsed : "N/A"), 
                        splitDetails: (typeof currentPayHistory !== 'undefined' ? currentPayHistory : []), 
                        items: barItems 
                    });
                    await API.update('SALES_ARCHIVE_BAR', archiveBar);
                }

                // Nettoyage de la table sur le serveur
                await API.update(currentTable, null, true);
                
                logAction("TABLE CLÔTURÉE", `Table: ${currentTable} | Total: ${currentPayTotal.toFixed(2)}€`, ticketItems); 
                
                // Gestion des tables éphémères (Extras)
                let isExtra = tables.find(t => t && t.label === currentTable && t.isExtra);
                if (isExtra) {
                    tables = tables.filter(t => !(t && t.label === currentTable && t.isExtra));
                    pushArchitecture();
                }

                // Réinitialisation de l'interface
                ticketItems = []; 
                const obsField = document.getElementById('order-obs');
                if(obsField) obsField.value = ''; 
                
                let drawer = document.getElementById('order-drawer');
                if (drawer) drawer.classList.remove('open'); 
                currentTable = null; 
                renderFloor();
            }, 300);
        }

        // --- 🖱️ INTERFACE & DRAG (ORGANISATION DU TICKET) ---
        let isTicketDragging = false;
        function dragItem(ev, idx) { isTicketDragging = true; ev.dataTransfer.setData("text/plain", idx); }
        document.addEventListener('dragend', () => isTicketDragging = false);
        function allowDrop(ev) { ev.preventDefault(); ev.currentTarget.classList.add('drag-over'); }
        function dragLeave(ev) { ev.currentTarget.classList.remove('drag-over'); }
        function dropItem(ev, targetCourse) {
            ev.preventDefault(); ev.currentTarget.classList.remove('drag-over'); isTicketDragging = false;
            let idx = ev.dataTransfer.getData("text/plain");
            if(idx !== "" && ticketItems[idx]) { ticketItems[idx].course = targetCourse; renderTicket(); }
        }

        // --- 🔔 SYSTÈME DE NOTIFICATIONS VISUELLES ---
        function showToast(msg) {
            let center = document.getElementById('notification-center');
            if(!center) return;
            let t = document.createElement('div');
            t.className = 'toast-ready';
            t.innerText = msg;
            center.appendChild(t);
            setTimeout(() => t.remove(), 5000);
        }

        // --- 🔊 MOTEUR AUDIO (SYSTÈME EMPIRE) ---
        let sysAudioCtx = null;
        function unlockAudio() {
            try {
                if (!sysAudioCtx) {
                    sysAudioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (sysAudioCtx.state === 'suspended') sysAudioCtx.resume();
            } catch(e) { console.error("Audio unlock failed", e); }
        }
        document.body.addEventListener('touchstart', unlockAudio, {passive: true});
        document.body.addEventListener('mousedown', unlockAudio, {passive: true});

        function playReadySound() {
            try {
                unlockAudio();
                let osc = sysAudioCtx.createOscillator();
                let gain = sysAudioCtx.createGain();
                osc.connect(gain); gain.connect(sysAudioCtx.destination);
                osc.type = 'sine'; 
                osc.frequency.setValueAtTime(880, sysAudioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(1760, sysAudioCtx.currentTime + 0.1); 
                gain.gain.setValueAtTime(0.3, sysAudioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, sysAudioCtx.currentTime + 0.5);
                osc.start(); osc.stop(sysAudioCtx.currentTime + 0.5);
            } catch(e) {}
        }

        function playKlaxon() {
            try {
                unlockAudio();
                let osc = sysAudioCtx.createOscillator();
                let gain = sysAudioCtx.createGain();
                osc.connect(gain); gain.connect(sysAudioCtx.destination);
                osc.type = 'sawtooth'; 
                osc.frequency.setValueAtTime(300, sysAudioCtx.currentTime); 
                osc.frequency.exponentialRampToValueAtTime(100, sysAudioCtx.currentTime + 1);
                gain.gain.setValueAtTime(0.5, sysAudioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, sysAudioCtx.currentTime + 1);
                osc.start(); osc.stop(sysAudioCtx.currentTime + 1);
            } catch(e) { console.log("Klaxon error:", e); }
        }

        // --- 🕰️ HORLOGE & RAFRAÎCHISSEMENT TEMPS RÉEL ---
        setInterval(() => { 
            let c = document.getElementById('empire-clock'); 
            if(c) c.innerText = new Date().toLocaleTimeString('fr-FR', { hour12: false }); 
            
            if(typeof currentTable !== 'undefined' && currentTable && document.getElementById('order-drawer')?.classList.contains('open')) {
                if(!isTicketDragging) renderTicket();
            }
        }, 1000);

        // --- 🛰️ MOTEUR DE SYNCHRONISATION PRINCIPAL ---
        async function syncData() {
            if (typeof isArchiMode !== 'undefined' && isArchiMode) return; 

            try {
                const state = await API.getState();
                if (state && state.activeOrders) {
                    let nO = state.activeOrders; 

                    // Pont Menu Cuisine
                    if(nO['MENU_MASTER']?.data) {
                        let newMenu = nO['MENU_MASTER'].data;
                        if (JSON.stringify(menuCuisine) !== JSON.stringify(newMenu)) {
                            menuCuisine = newMenu;
                            if (document.getElementById('order-drawer')?.classList.contains('open')) renderMenu(currentCategory);
                        }
                    }

                    // Radar Alertes & Plats Prêts
                    for (let t in nO) {
                        if (t.includes('MASTER') || t.includes('ARCHIVE')) continue;
                        
                        // Détection plats finis
                        let tableData = nO[t];
                        if (tableData?.items) {
                            let hasNewReady = tableData.items.some(item => {
                                let prevItem = previousOrdersState[t]?.items?.find(i => i.id === item.id);
                                return item.done && (!prevItem || !prevItem.done);
                            });
                            if (hasNewReady) {
                                playReadySound();
                                showToast(`✅ TABLE ${t} : PLAT PRÊT !`);
                            }
                        }
                    }

                    previousOrdersState = JSON.parse(JSON.stringify(nO));
                    activeOrders = nO; 
                    if(!isDraggingTable) renderFloor();
                }
            } catch(e) { console.error("Sync Error:", e); }
        }

        function connectEmpireH24() {
            syncData(); 
            setInterval(syncData, 3000);
        }
    </script>
</body>
