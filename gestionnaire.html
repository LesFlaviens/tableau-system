<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Head Waiter</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --blue: #00b0ff; --warning: #ffb300; --purple: #ea80fc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 20px 40px; font-size: 1.5rem; font-weight: 900; background: var(--blue); color: #000; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }

        header { border-bottom: 2px solid #222; padding: 15px 25px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .header-title { color: var(--warning); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }
        .live-badge { background: var(--alert); color: #fff; font-size: 0.6rem; padding: 2px 6px; border-radius: 4px; animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        
        .btn-top { background: #111; border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s; position: relative;}
        .btn-top:active { transform: scale(0.95); }
        .radar-badge { position: absolute; top: -8px; right: -8px; background: var(--alert); color: #fff; border-radius: 50%; width: 22px; height: 22px; font-size: 0.75rem; display: flex; justify-content: center; align-items: center; animation: blink 1s infinite; }

        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        .floor-plan { flex: 1; position: relative; background: #050505; z-index: 10; overflow: auto; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; }
        .table-obj { position: absolute; background: #161616; border: 2px solid #555; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; border-radius: 10px; cursor: pointer; z-index: 50; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 1.3rem; }
        .table-obj:active { transform: scale(0.95); border-color: var(--warning); }
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,0,0,0.1); }
        .table-obj.ready { border-color: var(--accent); background: rgba(0,230,118,0.1); animation: pulse-border 1.5s infinite; }
        @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 0 rgba(0,230,118,0); } 50% { box-shadow: 0 0 15px rgba(0,230,118,0.6); } }

        .drawer { position: absolute; top: 0; right: 0; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 30px; z-index: 10000; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-sizing: border-box; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        .drawer.open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .btn-close { background: #222; border: none; color: #fff; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; font-weight: bold; }

        .alert-card { background: #111; border: 1px solid #333; padding: 15px; border-radius: 8px; margin-bottom: 12px; display: flex; flex-direction: column; gap: 5px; }
        .alert-card.web { border-left: 5px solid var(--blue); }
        .alert-card.cuisine { border-left: 5px solid var(--accent); background: rgba(0,230,118,0.05); }
        .alert-card.bar { border-left: 5px solid var(--purple); background: rgba(234,128,252,0.05); }
        .alert-title { font-weight: 900; font-size: 0.9rem; text-transform: uppercase; }
        .alert-detail { font-size: 1.1rem; font-weight: bold; color: #fff; }

        .ticket-area { flex: 1; background: #000; border: 1px solid #222; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 15px; }
        .cat-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .cat-tab { padding: 10px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; font-size: 0.8rem; color: #888; font-weight: 900; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .cat-tab.active { background: var(--warning); color: #000; border-color: var(--warning); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; max-height: 250px; padding-right: 5px; }
        .btn-item { background: #161616; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-weight: bold; text-align: left; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 70px; }
        
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; color: #888; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; }
        .input-field { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        .btn-action { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; }
        
        .audit-log { background: #111; border: 1px solid #222; border-left: 4px solid var(--alert); padding: 15px; border-radius: 6px; margin-bottom: 10px; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="color:var(--blue); margin-bottom:20px;">ACTIVATION PAD GESTIONNAIRE</h1>
        <button onclick="initPad()">DÉMARRER (ACTIVER SON)</button>
    </div>

    <header>
        <div class="header-title">👑 HEAD WAITER <span class="live-badge">SYNC LIVE</span></div>
        <div style="display:flex; gap:12px;">
            <button class="btn-top" style="border-color:var(--blue); color:var(--blue);" onclick="openDrawer('radar-drawer')">📡 RADAR<div id="radar-badge" class="radar-badge" style="display:none;">0</div></button>
            <button class="btn-top" style="border-color:var(--purple); color:var(--purple);" onclick="openDrawer('resa-drawer')">⚡ RÉSA</button>
            <button class="btn-top" style="border-color:var(--alert); color:var(--alert);" onclick="checkChefSecurity()">🔐 AUDIT</button>
        </div>
    </header>

    <div class="main-workspace">
        <div class="floor-plan" id="floor-plan"></div>

        <div id="radar-drawer" class="drawer" style="width: 450px;">
            <div class="drawer-header"><h2 style="margin:0; color:var(--blue);">📡 RADAR DES FLUX</h2><button class="btn-close" onclick="closeDrawer('radar-drawer')">✕</button></div>
            <div id="radar-list" style="flex:1; overflow-y:auto; padding-right:10px;"></div>
        </div>

        <div id="caisse-drawer" class="drawer" style="width: 480px;">
            <div class="drawer-header"><h2 id="table-title" style="margin:0; color:var(--warning); font-size:2rem;">TABLE</h2><button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button></div>
            <div class="ticket-area" id="ticket-list"></div>
            <input type="text" id="order-obs" class="input-field" style="border-color:var(--warning); color:var(--warning);" placeholder="⚠️ OBSERVATIONS (VIP, Allergies...)">
            <div class="cat-tabs" id="cat-tabs"></div>
            <div class="menu-grid" id="menu-items"></div>
            <div id="total-val" style="font-size:2.2rem; font-weight:900; text-align:right; margin:15px 0; color:var(--accent);">0.00 €</div>
            <button class="btn-action" onclick="sendOrder()">🚀 ENVOYER EN PRODUCTION</button>
            <button class="btn-action" style="background:#222; color:#fff; margin-top:10px; border: 1px solid #444;" onclick="clearTable()">💳 ENCAISSER / LIBÉRER TABLE</button>
        </div>

        <div id="resa-drawer" class="drawer" style="width: 400px;">
            <div class="drawer-header"><h2 style="margin:0; color:var(--purple);">NOUVELLE RÉSA</h2><button class="btn-close" onclick="closeDrawer('resa-drawer')">✕</button></div>
            <div style="flex:1; overflow-y:auto; padding-right:10px;">
                <div class="input-group"><span class="input-label">Date (Jusqu'à +3 ans)</span><input type="date" id="resa-date" class="input-field" style="border-color:var(--purple); color:var(--purple);"></div>
                <div class="input-group"><span class="input-label">Heure</span><input type="time" id="resa-time" class="input-field" value="20:00" style="border-color:var(--purple); color:var(--purple);"></div>
                <div class="input-group"><span class="input-label">Nom du Client</span><input type="text" id="resa-name" class="input-field" placeholder="Ex: M. Dupont" style="border-color:var(--purple); color:var(--purple);"></div>
                <div class="input-group"><span class="input-label">Téléphone</span><input type="tel" id="resa-tel" class="input-field" placeholder="06 XX XX XX XX" style="border-color:var(--purple); color:var(--purple);"></div>
                <div class="input-group"><span class="input-label">Couverts</span><input type="number" id="resa-pax" class="input-field" value="2" min="1" style="border-color:var(--purple); color:var(--purple);"></div>
            </div>
            <button class="btn-action" style="background:var(--purple); color:#fff;" onclick="saveResa()">✅ SÉCURISER LA TABLE</button>
        </div>

        <div id="audit-drawer" class="drawer" style="width: 500px;">
            <div class="drawer-header"><h2 style="margin:0; color:var(--alert);">HISTORIQUE PAD (AUDIT)</h2><button class="btn-close" onclick="closeDrawer('audit-drawer')">✕</button></div>
            <div id="audit-list" style="flex:1; overflow-y:auto; padding-right:10px;"></div>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];
        let audioCtx; let previousAlertsCount = 0;

        function initPad() {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); audioCtx.resume(); } catch(e){}
            document.getElementById('start-overlay').style.display = 'none';
            
            // Initialisation Calendrier 3 ans
            const dateInput = document.getElementById('resa-date');
            const today = new Date(); const maxDate = new Date(); maxDate.setFullYear(today.getFullYear() + 3);
            dateInput.min = today.toISOString().split('T')[0]; dateInput.max = maxDate.toISOString().split('T')[0];
            dateInput.value = today.toISOString().split('T')[0];
            
            forceSync();
        }

        function playAlertSound() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            osc.type = 'square'; osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1200, now + 0.1);
            gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.2, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
            osc.start(now); osc.stop(now + 0.3);
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE' || msg.type === 'PLAN_UPDATE') {
                activeOrders = msg.activeOrders || activeOrders;
                
                if (activeOrders['GLOBAL_RESAS'] && activeOrders['GLOBAL_RESAS'].reservations) {
                    localStorage.setItem('empire_reservations', JSON.stringify(activeOrders['GLOBAL_RESAS'].reservations));
                }
                
                if (msg.tables) localStorage.setItem('EMPIRE_TABLES', JSON.stringify(msg.tables));
                
                renderFloorPlan(); renderRadar(); 
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'empire_recipes' && document.getElementById('caisse-drawer').classList.contains('open')) { renderMenu('Plat'); }
            if (e.key === 'EMPIRE_TABLES') { renderFloorPlan(); }
        });

        async function forceSync() {
            try {
                const res = await fetch('/get-current-state'); const data = await res.json();
                activeOrders = data.activeOrders; renderFloorPlan(); renderRadar();
            } catch(e) {}
        }

        function openDrawer(id) { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open')); document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        function renderRadar() {
            const container = document.getElementById('radar-list'); let html = ''; let alertsCount = 0;
            for (const tableId in activeOrders) {
                const order = activeOrders[tableId];
                if (!order.items || order.items.length === 0) continue;
                const isWeb = tableId.includes('WEB');
                const foodItems = order.items.filter(i => i.category !== 'Boisson');
                const drinkItems = order.items.filter(i => i.category === 'Boisson');
                
                const foodReady = foodItems.length > 0 && foodItems.every(i => i.done);
                if (foodReady) { alertsCount++; html += `<div class="alert-card cuisine"><span class="alert-title" style="color:var(--accent);">🔥 CUISINE À L'ENVOI</span><span class="alert-detail">Table : ${tableId.replace('WEB_','')}</span></div>`; }
                const drinksReady = drinkItems.length > 0 && drinkItems.every(i => i.done);
                if (drinksReady && !foodReady) { alertsCount++; html += `<div class="alert-card bar"><span class="alert-title" style="color:var(--purple);">🧊 BAR À L'ENVOI</span><span class="alert-detail">Table : ${tableId.replace('WEB_','')}</span></div>`; }
                if (isWeb && order.items.every(i => !i.done)) { alertsCount++; html += `<div class="alert-card web"><span class="alert-title" style="color:var(--blue);">🌐 COMMANDE QR</span><span class="alert-detail">Table : ${tableId.replace('WEB_','')}</span></div>`; }
            }
            container.innerHTML = html || '<div style="color:#555; text-align:center; padding-top:20px;">Aucune alerte. Le service est fluide.</div>';
            
            const badge = document.getElementById('radar-badge');
            if (alertsCount > 0) { badge.style.display = 'flex'; badge.textContent = alertsCount; if (alertsCount > previousAlertsCount) playAlertSound(); } else { badge.style.display = 'none'; }
            previousAlertsCount = alertsCount;
        }

        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            const tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [ {id:'T1', l:100, t:100, w:120, h:120, label:'T1'}, {id:'T2', l:300, t:100, w:120, h:120, label:'T2'} ];
            tables.forEach(t => {
                const div = document.createElement('div'); div.className = 'table-obj';
                const order = activeOrders[t.id] || activeOrders[t.label];
                if(order && order.status !== 'system') {
                    const foodItems = order.items.filter(i => i.category !== 'Boisson');
                    const foodReady = foodItems.length > 0 && foodItems.every(i => i.done);
                    if (foodReady) div.classList.add('ready'); else div.classList.add('occupied');
                }
                div.innerHTML = `<span>${t.label}</span>`;
                div.style.left = t.l + 'px'; div.style.top = t.t + 'px';
                div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                div.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); openCaisse(t.label || t.id); });
                floor.appendChild(div);
            });
        }

        function openCaisse(label) { currentTableId = label; document.getElementById('table-title').innerText = label; currentTicket = activeOrders[label]?.items || []; renderTicket(); renderMenu('Plat'); openDrawer('caisse-drawer'); }

        function renderMenu(activeCategory = 'Plat') {
            const menu = JSON.parse(localStorage.getItem('empire_recipes')) || [{name:'Plat Test', price:20, category:'Plat'}];
            const categories = [...new Set(menu.map(item => item.category || 'Autre'))];
            document.getElementById('cat-tabs').innerHTML = categories.map(cat => `<div class="cat-tab ${cat === activeCategory ? 'active' : ''}" onclick="renderMenu('${cat}')">${cat}</div>`).join('');
            document.getElementById('menu-items').innerHTML = menu.filter(m => (m.category || 'Autre') === activeCategory).map(m => `
                <div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price}, '${m.category}')">
                    <span>${m.name}</span><span style="color:var(--warning); font-size:1.1rem; margin-top:5px;">${parseFloat(m.price).toFixed(2)}€</span>
                </div>`).join('');
        }

        function addItem(n, p, c) { currentTicket.push({id: Date.now(), n: n, p: p, category: c, done: false}); renderTicket(); }
        function removeItem(idx) { currentTicket.splice(idx, 1); renderTicket(); }

        function renderTicket() {
            const list = document.getElementById('ticket-list'); let total = 0;
            list.innerHTML = currentTicket.map((i, idx) => {
                total += i.p || 0; let statusIcon = i.done ? '✅' : '⏳';
                return `<div style="display:flex; justify-content:space-between; padding:12px 0; border-bottom:1px solid #111; font-weight:bold; font-size:1.1rem;">
                    <span>${statusIcon} 1x ${i.n}</span>
                    <span style="color:var(--blue);">${(i.p || 0).toFixed(2)}€ <span onclick="removeItem(${idx})" style="color:red; margin-left:15px; cursor:pointer; padding:5px;">✕</span></span>
                </div>`;
            }).join('') || '<div style="color:#444; text-align:center; padding:20px; font-size:1rem;">Ticket vierge</div>';
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return;
            const obs = document.getElementById('order-obs').value.trim();
            const order = { table: currentTableId, items: currentTicket, observation: obs, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), status: 'pending' };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            logAudit(`COMMANDE - Table ${currentTableId} - Total: ${document.getElementById('total-val').innerText}`);
            document.getElementById('order-obs').value = ''; closeDrawer('caisse-drawer');
        }

        // --- LA NOUVELLE FONCTION D'ENCAISSEMENT FINANCE ---
        async function clearTable() {
            if(!confirm("Encaisser et libérer cette table ?")) return;
            
            const totalStr = document.getElementById('total-val').innerText.replace(' €', '');
            const total = parseFloat(totalStr);
            
            // On enregistre uniquement si le montant est supérieur à 0
            if (total > 0) {
                const today = new Date().toISOString().split('T')[0];
                const time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                
                let transacs = JSON.parse(localStorage.getItem('empire_transactions')) || [];
                transacs.push({ date: today, time: time, table: currentTableId, total: total });
                localStorage.setItem('empire_transactions', JSON.stringify(transacs));
            }

            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order: { status: 'ready' } }) });
            logAudit(`ENCAISSEMENT - Table ${currentTableId} libérée. Montant: ${totalStr}€`);
            closeDrawer('caisse-drawer');
        }

        function saveResa() {
            const date = document.getElementById('resa-date').value; const time = document.getElementById('resa-time').value;
            const name = document.getElementById('resa-name').value.trim(); const pax = document.getElementById('resa-pax').value;
            const tel = document.getElementById('resa-tel').value.trim();
            if(!date || !name) return alert("⚠️ Date et Nom obligatoires.");

            let resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(!resas[date]) resas[date] = [];
            resas[date].push({ id: Date.now(), time, name, pax, tel, status: 'confirmed' });
            localStorage.setItem('empire_reservations', JSON.stringify(resas));
            
            if(ws.readyState === WebSocket.OPEN) {
                fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: 'GLOBAL_RESAS', order: { status: 'system', items: [], reservations: resas } }) });
            }
            logAudit(`RÉSA - ${name} le ${date}`);
            document.getElementById('resa-name').value = ''; document.getElementById('resa-tel').value = ''; closeDrawer('resa-drawer');
            alert(`✅ Réservation sécurisée. Mises à jour en cours sur le réseau.`);
        }

        function logAudit(action) {
            let logs = JSON.parse(localStorage.getItem('EMP_LOCAL_AUDIT')) || [];
            logs.unshift({ time: new Date().toLocaleString('fr-FR'), action: action });
            if(logs.length > 50) logs.pop(); localStorage.setItem('EMP_LOCAL_AUDIT', JSON.stringify(logs));
        }

        function checkChefSecurity() {
            const pin = prompt("🔒 CODE CHEF :");
            if (pin === "7777" || pin === "ICHEF2026") {
                document.getElementById('audit-list').innerHTML = (JSON.parse(localStorage.getItem('EMP_LOCAL_AUDIT')) || []).map(l => `<div class="audit-log"><div class="audit-time">${l.time}</div><div style="color:${l.action.includes('ALERTE') ? 'var(--alert)' : '#fff'}">${l.action}</div></div>`).join('');
                openDrawer('audit-drawer');
            } else if (pin !== null) { logAudit("ALERTE : Tentative d'accès Chef échouée."); alert("❌ Code incorrect."); }
        }
        
        forceSync(); setInterval(forceSync, 3000); 
    </script>
</body>
</html>
