<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Serveur Mobile</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        
        /* HEADER ULTRA COMPACT POUR MOBILE */
        header { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 10px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: #000; gap:5px;}
        .header-title { font-weight: 900; text-transform: uppercase; letter-spacing: 1px; font-size: 1rem; margin: 0; }
        
        .btn-top { background: transparent; border: 1px solid var(--line); color: var(--text); padding: 8px 10px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; white-space: nowrap; text-align: center; }
        .btn-top:active { background: #fff; color: #000; }
        
        /* ONGLETS DES SALLES SCROLLABLES AU POUCE */
        .room-bar { background: #0a0a0a; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 10px; display: flex; gap: 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;}
        .room-bar::-webkit-scrollbar { display: none; }
        .room-tab { background: transparent; border: 1px solid var(--sub); color: var(--sub); padding: 8px 15px; border-radius: 20px; font-weight: 900; font-size: 0.8rem; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .room-tab.active { background: #fff; color: #000; border-color: #fff; }
        
        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; padding: 10px; box-sizing: border-box;}
        
        .floor-plan { flex: 1; position: relative; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: auto; }
        
        .table-obj { position: absolute; background: #000; border: 2px solid var(--line); display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; font-size: 1.2rem; transition: 0.1s; border-radius: 8px; }
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,23,68,0.1); color: var(--alert); }
        
        /* ALERTE HAUTE PRIORITÉ */
        @keyframes table-ready-blink { 
            0% { background-color: #000; color: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 transparent; } 
            100% { background-color: var(--accent); color: #000; border-color: #fff; box-shadow: 0 0 30px var(--accent); } 
        }
        .table-obj.ready { animation: table-ready-blink 0.4s infinite alternate !important; z-index: 99; transform: scale(1.1); }
        
        /* TIROIR MOBILE : 100% DE L'ÉCRAN */
        .drawer { position: absolute; top: 0; right: 0; height: 100%; width: 100%; background: #050505; z-index: 10000; transform: translateX(100%); transition: 0.3s ease-out; display: flex; flex-direction: column; box-sizing: border-box; padding: 10px;}
        .drawer.open { transform: translateX(0); }
        
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--line); padding-bottom: 10px; flex-shrink: 0;}
        .btn-close { background: transparent; border: 1px solid var(--line); color: var(--line); width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; font-weight: bold; display: flex; justify-content: center; align-items: center;}
        
        /* ARCHITECTURE DE LA CAISSE MOBILE */
        .ticket-area { flex: 0 0 35vh; background: #000; border: 1px solid var(--line); border-radius: 4px; padding: 10px; overflow-y: auto; margin-bottom: 10px; }
        
        .obs-input-container { flex-shrink: 0; margin-bottom: 10px; }
        .input-field { width: 100%; background: #000; border: 1px solid var(--line); color: var(--text); padding: 10px; border-radius: 4px; font-size: 0.9rem; box-sizing: border-box; font-weight: bold; }
        
        .pos-keyboard { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .cat-tabs { display: flex; gap: 5px; overflow-x: auto; padding-bottom: 5px; flex-shrink: 0; margin-bottom: 5px;}
        .cat-tab { padding: 10px 12px; background: #000; border: 1px solid var(--line); border-radius: 4px; font-size: 0.8rem; color: var(--sub); font-weight: 900; cursor: pointer; flex: 1; text-align: center;}
        .cat-tab.active { background: #fff; color: #000; }
        
        /* Boutons ajustés pour les pouces */
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; overflow-y: auto; padding-right: 5px; align-content: start;}
        .btn-item { background: #000; border: 1px solid var(--sub); color: var(--line); padding: 8px; border-radius: 4px; font-weight: bold; text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 65px; font-size: 0.75rem;}
        .btn-item:active { background: #fff; color: #000; transform: scale(0.95);}
        
        .total-section { flex-shrink: 0; margin-top: 5px; display: flex; flex-direction: column; gap: 5px; padding-bottom: 10px;}
        .btn-action { width: 100%; padding: 15px; background: transparent; color: #fff; border: 1px solid #fff; border-radius: 4px; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase;}
        .btn-action:active { background: #fff; color: #000; }
        
        .step-badge { background: #222; border: 1px solid #555; border-radius: 4px; font-size: 0.65rem; padding: 2px 4px; cursor: pointer; margin-right: 6px; font-weight: bold; width: 55px; text-align: center; display: inline-block;}
        
        .audit-log { background: #000; border: 1px solid var(--line); padding: 10px; border-radius: 4px; margin-bottom: 8px; font-family: monospace; font-size: 0.8rem; }
    </style>
</head>
<body>
    <header>
        <div class="header-title">SERVEUR</div>
        <div style="display:flex; gap:8px;">
            <button class="btn-top" onclick="openDrawer('resa-drawer')">📅 RÉSA</button>
            <button class="btn-top" onclick="openHistory()">📜 HISTO</button>
            <button class="btn-top" onclick="window.location.reload(true)" style="background:transparent; border:1px solid #fff; color:#fff;">🔄 MAJ</button>
        </div>
    </header>
    
    <div id="room-bar" class="room-bar"></div>
    
    <div class="main-workspace">
        <div class="floor-plan" id="floor-plan"></div>
        
        <div id="caisse-drawer" class="drawer">
            <div class="drawer-header">
                <h2 id="table-title" style="margin:0; font-size:1.5rem;">TABLE</h2>
                <button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button>
            </div>
            
            <div class="ticket-area" id="ticket-list"></div>
            
            <div class="obs-input-container">
                <input type="text" id="order-obs" class="input-field" placeholder="⚠️ OBSERVATIONS">
            </div>
            
            <div class="pos-keyboard">
                <div class="cat-tabs" id="cat-tabs"></div>
                <div class="menu-grid" id="menu-items"></div>
            </div>
            
            <div class="total-section">
                <div id="total-val" style="font-size:1.8rem; font-weight:900; text-align:right;">0.00 €</div>
                <button class="btn-action" style="background:#fff; color:#000;" onclick="sendOrder()">VALIDER ET ENVOYER</button>
            </div>
        </div>

        <div id="audit-drawer" class="drawer">
            <div class="drawer-header">
                <h2 style="margin:0; font-size:1.5rem;">HISTORIQUE</h2>
                <button class="btn-close" onclick="closeDrawer('audit-drawer')">✕</button>
            </div>
            <div id="audit-list" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
        </div>

        <div id="resa-drawer" class="drawer">
            <div class="drawer-header"><h2 style="margin:0; font-size:1.5rem;">RÉSA</h2><button class="btn-close" onclick="closeDrawer('resa-drawer')">✕</button></div>
            <div style="flex:1; overflow-y:auto; padding-right:5px;">
                <div style="margin-bottom:10px;"><input type="date" id="resa-date" class="input-field"></div>
                <div style="margin-bottom:10px;"><input type="time" id="resa-time" class="input-field" value="20:00"></div>
                <div style="margin-bottom:10px;"><input type="text" id="resa-name" class="input-field" placeholder="Nom du Client"></div>
                <div style="margin-bottom:10px;"><input type="tel" id="resa-tel" class="input-field" placeholder="Téléphone"></div>
                <div style="margin-bottom:10px;"><input type="number" id="resa-pax" class="input-field" value="2" min="1"></div>
            </div>
            <button class="btn-action" style="background:#fff; color:#000; margin-bottom:10px;" onclick="saveResa()">SÉCURISER</button>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];
        
        let savedRooms = JSON.parse(localStorage.getItem('EMPIRE_ROOMS'));
        let rooms = (savedRooms && savedRooms.length > 0) ? savedRooms : [{id: 'r_main', name: 'SALLE PRINCIPALE'}];
        let currentRoomId = rooms[0].id;
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];

        // MOTEUR AUDIO & VIBREUR (MOBILE-FIRST)
        let audioCtx = null;
        let previousStatus = {};

        // Déverrouillage strict pour les navigateurs mobiles
        const unlockAudio = () => {
            if (!audioCtx) {
                try { const AudioContext = window.AudioContext || window.webkitAudioContext; audioCtx = new AudioContext(); audioCtx.resume(); } catch(e){}
            }
        };
        document.addEventListener('touchstart', unlockAudio, { once: true });
        document.addEventListener('pointerdown', unlockAudio, { once: true });

        function triggerAlert() {
            // VIBREUR POUR SMARTPHONE (La magie est ici)
            if (navigator.vibrate) { navigator.vibrate([200, 100, 200, 100, 300]); }
            
            // ALARME SONORE
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(1108.73, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.5, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.0);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 1.0);
        }

        function checkAlerts(newOrders) {
            for(let tid in newOrders) {
                if(newOrders[tid] && newOrders[tid].status === 'ready' && previousStatus[tid] !== 'ready') {
                    triggerAlert();
                }
                previousStatus[tid] = newOrders[tid] ? newOrders[tid].status : null;
            }
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE' || msg.type === 'PLAN_UPDATE') {
                activeOrders = msg.activeOrders || activeOrders;
                checkAlerts(activeOrders);
                if (activeOrders['GLOBAL_PLAN']) {
                    if(activeOrders['GLOBAL_PLAN'].rooms) rooms = activeOrders['GLOBAL_PLAN'].rooms;
                    if(activeOrders['GLOBAL_PLAN'].tables) tables = activeOrders['GLOBAL_PLAN'].tables;
                }
                if (!rooms.find(r => r.id === currentRoomId)) currentRoomId = rooms[0].id;
                renderRooms(); renderFloorPlan();
            }
        };

        async function forceSync() { try { const res = await fetch('/get-current-state'); const data = await res.json(); activeOrders = data.activeOrders; checkAlerts(activeOrders); renderRooms(); renderFloorPlan(); } catch(e) {} }
        
        function openDrawer(id) { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open')); document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
        
        function renderRooms() { document.getElementById('room-bar').innerHTML = rooms.map(r => `<button class="room-tab ${r.id === currentRoomId ? 'active' : ''}" onclick="switchRoom('${r.id}')">${r.name}</button>`).join(''); }
        function switchRoom(id) { currentRoomId = id; renderRooms(); renderFloorPlan(); }

        function openHistory() {
            const logs = JSON.parse(localStorage.getItem('EMP_LOCAL_AUDIT')) || [];
            document.getElementById('audit-list').innerHTML = logs.length === 0 ? '<div style="color:#555; text-align:center; padding:20px;">Aucune action.</div>' : logs.map(l => `<div class="audit-log"><div>${l.time}</div><div>${l.action}</div></div>`).join('');
            openDrawer('audit-drawer');
        }

        function saveResa() {
            const date = document.getElementById('resa-date').value; const time = document.getElementById('resa-time').value; const name = document.getElementById('resa-name').value.trim(); const pax = document.getElementById('resa-pax').value; const tel = document.getElementById('resa-tel').value.trim();
            if(!date || !name) return alert("Date/Nom obligatoires.");
            let resas = JSON.parse(localStorage.getItem('empire_reservations')) || {}; if(!resas[date]) resas[date] = [];
            resas[date].push({ id: Date.now(), time, name, pax, tel, status: 'confirmed' }); localStorage.setItem('empire_reservations', JSON.stringify(resas));
            if(ws.readyState === WebSocket.OPEN) { fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: 'GLOBAL_RESAS', order: { status: 'system', items: [], reservations: resas } }) }); }
            closeDrawer('resa-drawer');
        }

        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                if(t.roomId !== currentRoomId) return; 
                const div = document.createElement('div'); div.className = 'table-obj'; div.style.borderRadius = t.shape === 'round' ? '50%' : '8px';
                const order = activeOrders[t.id] || activeOrders[t.label];
                if(order && order.status !== 'system') { 
                    if (order.status === 'ready') div.classList.add('ready'); 
                    else div.classList.add('occupied'); 
                }
                div.innerHTML = `<span>${t.label}</span>`; div.style.left = t.l + 'px'; div.style.top = t.t + 'px'; div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                div.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); openCaisse(t.label || t.id); }); 
                floor.appendChild(div);
            });
        }

        function openCaisse(label) { 
            currentTableId = label; document.getElementById('table-title').innerText = label; 
            currentTicket = activeOrders[label]?.items || []; 
            document.getElementById('order-obs').value = activeOrders[label]?.observation || '';
            
            if(activeOrders[label] && activeOrders[label].status === 'ready') {
                activeOrders[label].status = 'pending';
                fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: label, order: activeOrders[label] }) });
            }
            renderTicket(); renderMenu('Entrée'); openDrawer('caisse-drawer'); 
        }

        function renderMenu(activeCategory = 'Entrée') {
            let menu = JSON.parse(localStorage.getItem('empire_recipes')) || [{name: 'Salade', price: 10, category: 'Entrée'}];
            const categories = ['Entrée', 'Plat', 'Dessert'];
            document.getElementById('cat-tabs').innerHTML = categories.map(cat => `<div class="cat-tab ${cat === activeCategory ? 'active' : ''}" onclick="renderMenu('${cat}')">${cat}</div>`).join('');
            document.getElementById('menu-items').innerHTML = menu.filter(m => (m.category || 'Autre') === activeCategory).map(m => `<div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price}, '${m.category}')"><span>${m.name}</span><span style="color:var(--sub);">${parseFloat(m.price).toFixed(2)}€</span></div>`).join('');
        }

        function addItem(n, p, c) { let step = c === 'Entrée' ? 1 : c === 'Dessert' ? 3 : 2; currentTicket.push({id: Date.now(), n: n, p: p, category: c, step: step, done: false}); renderTicket(); }
        function removeItem(targetIndex) { currentTicket.splice(targetIndex, 1); renderTicket(); }
        function cycleStep(targetIndex) { let s = currentTicket[targetIndex].step || 1; currentTicket[targetIndex].step = s === 1 ? 2 : s === 2 ? 3 : 1; renderTicket(); }

        function renderTicket() {
            const list = document.getElementById('ticket-list'); let total = 0; const itemCounts = {};
            currentTicket.forEach((i, idx) => { 
                let step = i.step || (i.category === 'Entrée' ? 1 : i.category === 'Dessert' ? 3 : 2);
                total += i.p || 0; const key = i.n + '_' + step; 
                if (!itemCounts[key]) itemCounts[key] = { item: i, count: 0, indices: [], price: i.p || 0, step: step }; 
                itemCounts[key].count++; itemCounts[key].indices.push(idx); 
            });
            let html = '';
            for (const key in itemCounts) {
                const g = itemCounts[key]; const lastIdx = g.indices[g.indices.length - 1]; 
                const stepName = g.step === 1 ? 'ENTRÉE' : g.step === 2 ? 'PLAT' : 'DESSERT';
                const stepColor = g.step === 1 ? '#aaa' : g.step === 2 ? '#fff' : '#ffb300';
                
                html += `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px dashed rgba(255,255,255,0.2); align-items:center;">
                    <span style="font-weight:bold; font-size:0.85rem; flex:1; display:flex; align-items:center;">
                        <span style="display:inline-block; min-width:20px; font-weight:900;">${g.count}x</span> 
                        <button class="step-badge" style="color:${stepColor}; border-color:${stepColor};" onclick="cycleStep(${lastIdx})">${stepName}</button>
                        ${g.item.done ? '✅' : '⏳'} ${g.item.n}
                    </span>
                    <span style="font-weight:bold; font-size:0.9rem; display:flex; align-items:center;">
                        ${(g.price * g.count).toFixed(2)}€ 
                        <button onclick="removeItem(${lastIdx})" style="background:transparent; border:1px solid var(--alert); color:var(--alert); border-radius:4px; padding:2px 8px; margin-left:5px; cursor:pointer; font-weight:bold;">✕</button>
                    </span>
                </div>`;
            }
            list.innerHTML = html || '<div style="color:#555; text-align:center; padding:15px; font-style:italic; font-size:0.8rem;">-- VIDE --</div>'; 
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return; 
            const obs = document.getElementById('order-obs').value.trim();
            const order = { table: currentTableId, items: currentTicket, observation: obs, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), status: 'pending' };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('order-obs').value = ''; closeDrawer('caisse-drawer');
        }

        forceSync(); setInterval(forceSync, 3000); 
    </script>
</body>
</html>
