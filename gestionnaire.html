<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Gestionnaire</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --blue: #00b0ff; --warning: #ffb300; --purple: #ea80fc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        header { border-bottom: 2px solid #222; padding: 15px 25px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .header-title { color: var(--warning); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem; }
        
        .btn-top { background: #111; border: 1px solid #333; color: #fff; padding: 10px 20px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s; }
        .btn-top:active { transform: scale(0.95); }

        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        /* PLAN DE SALLE */
        .floor-plan { flex: 1; position: relative; background: #050505; z-index: 10; overflow: auto; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; }
        .table-obj { position: absolute; background: #161616; border: 2px solid #555; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; border-radius: 10px; cursor: pointer; z-index: 50; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 1.3rem; }
        .table-obj:active { transform: scale(0.95); border-color: var(--warning); }
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,0,0,0.1); }

        /* TIROIRS ESCAMOTABLES (RÉSA, AUDIT, CAISSE) */
        .drawer { position: absolute; top: 0; right: 0; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 30px; z-index: 10000; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; box-sizing: border-box; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        .drawer.open { transform: translateX(0); }
        
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        .btn-close { background: #222; border: none; color: #fff; width: 45px; height: 45px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; font-weight: bold; }

        /* FORMULAIRES & INPUTS */
        .input-group { margin-bottom: 20px; }
        .input-label { display: block; color: #888; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; margin-bottom: 8px; }
        .input-field { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 8px; font-size: 1.1rem; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        .btn-action { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; }

        /* LISTE AUDIT */
        .audit-log { background: #111; border: 1px solid #222; border-left: 4px solid var(--alert); padding: 15px; border-radius: 6px; margin-bottom: 10px; font-family: monospace; font-size: 0.9rem; }
        .audit-time { color: #666; font-size: 0.8rem; margin-bottom: 5px; }

        /* CAISSE */
        .ticket-area { flex: 1; background: #000; border: 1px solid #222; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 15px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; max-height: 250px; }
        .btn-item { background: #161616; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-weight: bold; text-align: left; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">👑 HEAD WAITER - PAD</div>
        <div style="display:flex; gap:12px;">
            <button class="btn-top" style="border-color:var(--purple); color:var(--purple);" onclick="openDrawer('resa-drawer')">⚡ FAST-RÉSA</button>
            <button class="btn-top" style="border-color:var(--alert); color:var(--alert);" onclick="checkChefSecurity()">🔐 AUDIT CHEF</button>
        </div>
    </header>

    <div class="main-workspace">
        <div class="floor-plan" id="floor-plan"></div>

        <div id="caisse-drawer" class="drawer" style="width: 480px;">
            <div class="drawer-header">
                <h2 id="table-title" style="margin:0; color:var(--warning); font-size:2rem;">TABLE</h2>
                <button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button>
            </div>
            <div class="ticket-area" id="ticket-list"></div>
            <input type="text" id="order-obs" class="input-field" style="border-color:var(--warning); color:var(--warning);" placeholder="⚠️ OBSERVATIONS (Allergies...)">
            <div class="menu-grid" id="menu-items"></div>
            <div id="total-val" style="font-size:2.2rem; font-weight:900; text-align:right; margin:15px 0; color:var(--accent);">0.00 €</div>
            <button class="btn-action" onclick="sendOrder()">🚀 ENVOYER EN PRODUCTION</button>
        </div>

        <div id="resa-drawer" class="drawer" style="width: 400px;">
            <div class="drawer-header">
                <h2 style="margin:0; color:var(--purple);">NOUVELLE RÉSA</h2>
                <button class="btn-close" onclick="closeDrawer('resa-drawer')">✕</button>
            </div>
            <div style="flex:1; overflow-y:auto; padding-right:10px;">
                <div class="input-group">
                    <span class="input-label">Date</span>
                    <input type="date" id="resa-date" class="input-field">
                </div>
                <div class="input-group">
                    <span class="input-label">Heure</span>
                    <input type="time" id="resa-time" class="input-field" value="20:00">
                </div>
                <div class="input-group">
                    <span class="input-label">Nom du Client</span>
                    <input type="text" id="resa-name" class="input-field" placeholder="Ex: M. Dupont">
                </div>
                <div class="input-group">
                    <span class="input-label">Nombre de Couverts</span>
                    <input type="number" id="resa-pax" class="input-field" value="2" min="1">
                </div>
                <div class="input-group">
                    <span class="input-label">Téléphone (Optionnel)</span>
                    <input type="tel" id="resa-tel" class="input-field" placeholder="06 XX XX XX XX">
                </div>
            </div>
            <button class="btn-action" style="background:var(--purple); color:#fff;" onclick="saveResa()">✅ BLOQUER LA TABLE</button>
        </div>

        <div id="audit-drawer" class="drawer" style="width: 500px;">
            <div class="drawer-header">
                <h2 style="margin:0; color:var(--alert);">HISTORIQUE PAD (AUDIT)</h2>
                <button class="btn-close" onclick="closeDrawer('audit-drawer')">✕</button>
            </div>
            <div style="margin-bottom: 20px; font-size: 0.9rem; color: #888;">Ce journal consigne de manière indélébile toutes les transactions effectuées depuis cette tablette.</div>
            <div id="audit-list" style="flex:1; overflow-y:auto; padding-right:10px;"></div>
        </div>
    </div>

    <script>
        // --- WEBSOCKET & VARIABLES ---
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {};
        let currentTableId = null;
        let currentTicket = [];

        // Initialisation Date demain par défaut pour la résa
        const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
        document.getElementById('resa-date').value = tmrw.toISOString().split('T')[0];

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') {
                activeOrders = msg.activeOrders;
                renderFloorPlan();
            }
        };

        async function forceSync() {
            try {
                const res = await fetch('/get-current-state');
                const data = await res.json();
                activeOrders = data.activeOrders;
                renderFloorPlan();
            } catch(e) {}
        }

        // --- GESTION DES TIROIRS ---
        function openDrawer(id) { 
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
            document.getElementById(id).classList.add('open'); 
        }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        // --- 1. MOTEUR PLAN DE SALLE & CAISSE ---
        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan');
            floor.innerHTML = '';
            const tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [
                {id:'T1', l:100, t:100, w:120, h:120, label:'T1'}, {id:'T2', l:300, t:100, w:120, h:120, label:'T2'}
            ];

            tables.forEach(t => {
                const div = document.createElement('div');
                div.className = 'table-obj';
                const order = activeOrders[t.id] || activeOrders[t.label];
                if(order && order.status === 'pending') div.classList.add('occupied');

                div.innerHTML = `<span>${t.label}</span>`;
                div.style.left = t.l + 'px'; div.style.top = t.t + 'px';
                div.style.width = t.w + 'px'; div.style.height = t.h + 'px';

                div.addEventListener('pointerdown', (e) => {
                    e.preventDefault(); e.stopPropagation();
                    openCaisse(t.label || t.id);
                });
                floor.appendChild(div);
            });
        }

        function openCaisse(label) {
            currentTableId = label;
            document.getElementById('table-title').innerText = label;
            currentTicket = activeOrders[label]?.items || [];
            renderTicket();
            renderMenu();
            openDrawer('caisse-drawer');
        }

        function renderMenu() {
            const menu = JSON.parse(localStorage.getItem('empire_recipes')) || [{name:'Plat Signature', price:35}];
            document.getElementById('menu-items').innerHTML = menu.map(m => `
                <div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price})">
                    ${m.name}<br><span style="color:var(--warning)">${m.price}€</span>
                </div>`).join('');
        }

        function addItem(n, p) {
            currentTicket.push({id: Date.now(), n: n, p: p, done: false});
            renderTicket();
        }

        function renderTicket() {
            const list = document.getElementById('ticket-list');
            let total = 0;
            list.innerHTML = currentTicket.map((i, idx) => {
                total += i.p || 0;
                return `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #111; font-weight:bold;">
                    <span>1x ${i.n}</span><span>${(i.p || 0).toFixed(2)}€</span>
                </div>`;
            }).join('');
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return;
            const obs = document.getElementById('order-obs').value;
            const timeStr = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            
            const order = {
                table: currentTableId,
                items: currentTicket,
                observation: obs,
                time: timeStr,
                status: 'pending'
            };

            await fetch('/update-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tableId: currentTableId, order })
            });

            logAudit(`COMMANDE ENVOYÉE - Table ${currentTableId} - ${currentTicket.length} articles. Total: ${document.getElementById('total-val').innerText}`);

            document.getElementById('order-obs').value = '';
            closeDrawer('caisse-drawer');
            alert("COMMANDÉ !");
        }

        // --- 2. MOTEUR FAST-RÉSA ---
        function saveResa() {
            const date = document.getElementById('resa-date').value;
            const time = document.getElementById('resa-time').value;
            const name = document.getElementById('resa-name').value.trim();
            const pax = document.getElementById('resa-pax').value;
            const tel = document.getElementById('resa-tel').value.trim();

            if(!date || !name) return alert("⚠️ Date et Nom du client obligatoires.");

            let resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(!resas[date]) resas[date] = [];
            
            resas[date].push({ time, name, pax, tel, status: 'confirmed' });
            localStorage.setItem('empire_reservations', JSON.stringify(resas));

            logAudit(`RÉSERVATION AJOUTÉE - ${name} - ${pax}p le ${date} à ${time}`);
            
            document.getElementById('resa-name').value = '';
            document.getElementById('resa-tel').value = '';
            closeDrawer('resa-drawer');
            
            // Force l'événement storage pour mettre à jour les compteurs de la cuisine
            window.dispatchEvent(new Event('storage'));
            alert(`✅ Réservation confirmée pour ${name}. Les compteurs de cuisine sont à jour.`);
        }

        // --- 3. MOTEUR SÉCURITÉ & AUDIT CHEF ---
        function logAudit(action) {
            let logs = JSON.parse(localStorage.getItem('EMP_LOCAL_AUDIT')) || [];
            const timestamp = new Date().toLocaleString('fr-FR');
            logs.unshift({ time: timestamp, action: action });
            if(logs.length > 50) logs.pop(); // Garde les 50 dernières actions du Pad
            localStorage.setItem('EMP_LOCAL_AUDIT', JSON.stringify(logs));
        }

        function checkChefSecurity() {
            const pin = prompt("🔒 IDENTIFICATION REQUISE\nVeuillez entrer le code Chef :");
            if (pin === "7777" || pin === "ICHEF2026") {
                renderAudit();
                openDrawer('audit-drawer');
            } else if (pin !== null) {
                alert("❌ Code incorrect. Tentative consignée.");
                logAudit("ALERTE : Tentative d'accès Chef échouée.");
            }
        }

        function renderAudit() {
            const logs = JSON.parse(localStorage.getItem('EMP_LOCAL_AUDIT')) || [];
            const container = document.getElementById('audit-list');
            container.innerHTML = logs.map(l => `
                <div class="audit-log">
                    <div class="audit-time">${l.time}</div>
                    <div style="color:${l.action.includes('ALERTE') ? 'var(--alert)' : '#fff'}">${l.action}</div>
                </div>
            `).join('') || '<div style="color:#555; text-align:center;">Aucune transaction enregistrée sur ce pad.</div>';
        }

        // Démarrage
        forceSync();
        setInterval(forceSync, 3000); // Polling de sécurité
    </script>
</body>
</html>
