<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire COMMAND</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --text: #fff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; display: flex; height: 100vh; }
        #canvas { flex: 1; position: relative; background: radial-gradient(#222 0.5px, transparent 0.5px); background-size: 30px 30px; }
        .table { position: absolute; width: 100px; height: 100px; border: 2px solid #444; display: flex; align-items: center; justify-content: center; font-weight: 900; background: #1a1a1a; cursor: pointer; border-radius: 10px; }
        #order-pad { width: 400px; background: #111; border-left: 2px solid #333; padding: 25px; transform: translateX(100%); transition: 0.3s; position: fixed; right: 0; height: 100vh; z-index: 100; }
        #order-pad.open { transform: translateX(0); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .menu-item { background: #222; border: 1px solid #444; color: white; padding: 15px; border-radius: 8px; cursor: pointer; text-align: center; }
        .btn-send { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; font-weight: 900; border-radius: 10px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="canvas">
        <div class="table" style="left:100px; top:100px;" onclick="openPad('1')">T1</div>
        <div class="table" style="left:250px; top:100px;" onclick="openPad('2')">T2</div>
    </div>

    <div id="order-pad">
        <h2 id="pad-title">Table --</h2>
        <div class="menu-grid">
            <div class="menu-item" onclick="add('Burger', 'Cuisine')">🍔 Burger</div>
            <div class="menu-item" onclick="add('Mojito', 'Bar')">🍹 Mojito</div>
        </div>
        <div id="basket" style="margin-top:20px; height:200px; background:#000; padding:10px; overflow-y:auto;"></div>
        <button class="btn-send" onclick="send()">ENVOYER EN PRODUCTION</button>
        <button onclick="closePad()" style="width:100%; margin-top:10px; background:none; border:none; color:#666; cursor:pointer;">FERMER</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        let currentTable = null; let basket = [];

        function openPad(id) { currentTable = id; document.getElementById('pad-title').innerText = "Table " + id; document.getElementById('order-pad').classList.add('open'); }
        function closePad() { document.getElementById('order-pad').classList.remove('open'); }
        function add(n, d) { basket.push({n, d}); render(); }
        function render() { document.getElementById('basket').innerHTML = basket.map(i => `<div>• ${i.n}</div>`).join(''); }

        function send() {
            if(basket.length === 0) return;
            const payload = {
                table: "Table " + currentTable,
                heure: new Date().toLocaleTimeString('fr-FR'),
                articles: basket.map(i => `${i.d === 'Bar' ? '[Boisson]' : '[Plat]'} 1x ${i.n}`)
            };
            socket.emit('new-order', payload);
            alert("ORDRE TRANSMIS");
            basket = []; render(); closePad();
        }
    </script>
</body>
</html>
