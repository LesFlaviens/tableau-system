<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire MANAGER - Statistiques</title>
    <style>
        :root { --bg: #050505; --card: #121212; --accent: #00e676; --blue: #00b0ff; --text: #fff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); padding: 40px; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-bottom: 40px; }
        .stat-card { background: var(--card); padding: 30px; border-radius: 15px; border: 1px solid #222; text-align: center; }
        .stat-val { font-size: 3rem; font-weight: 900; display: block; margin-top: 10px; }
        .label { color: #666; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 2px; }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 15px; overflow: hidden; }
        th { background: #1a1a1a; padding: 20px; text-align: left; color: #666; font-size: 0.8rem; }
        td { padding: 20px; border-bottom: 1px solid #222; }
        .total-row { color: var(--accent); font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="margin-bottom: 40px; letter-spacing: -1px;">TABLEAU DE BORD EMPIRE</h1>

    <div class="stats-grid">
        <div class="stat-card">
            <span class="label">Chiffre d'Affaires</span>
            <span class="stat-val" id="total-ca" style="color: var(--accent);">0.00€</span>
        </div>
        <div class="stat-card">
            <span class="label">Total Couverts</span>
            <span class="stat-val" id="total-covers" style="color: var(--blue);">0</span>
        </div>
        <div class="stat-card">
            <span class="label">Moyenne / Table</span>
            <span class="stat-val" id="avg-table">0.00€</span>
        </div>
    </div>

    <h2>Historique des Ventes</h2>
    <table>
        <thead>
            <tr>
                <th>HEURE</th>
                <th>TABLE</th>
                <th>COUVERTS</th>
                <th>ARTICLES</th>
                <th>TOTAL</th>
            </tr>
        </thead>
        <tbody id="history-table">
            </tbody>
    </table>

<script>
    async function loadStats() {
        const res = await fetch('/get-history');
        const data = await res.json();
        
        let ca = 0;
        let covers = 0;
        const tableBody = document.getElementById('history-table');
        tableBody.innerHTML = "";

        data.reverse().forEach(sale => {
            const totalSale = sale.items.reduce((acc, i) => acc + i.p, 0);
            ca += totalSale;
            covers += parseInt(sale.covers);

            tableBody.innerHTML += `
                <tr>
                    <td>${new Date(sale.closedAt).toLocaleTimeString('fr-FR')}</td>
                    <td>Table ${sale.tableId}</td>
                    <td>${sale.covers}</td>
                    <td>${sale.items.length}</td>
                    <td class="total-row">${totalSale.toFixed(2)}€</td>
                </tr>
            `;
        });

        document.getElementById('total-ca').textContent = ca.toFixed(2) + "€";
        document.getElementById('total-covers').textContent = covers;
        document.getElementById('avg-table').textContent = (data.length > 0 ? (ca / data.length) : 0).toFixed(2) + "€";
    }

    loadStats();
    // Refresh auto toutes les 30 secondes
    setInterval(loadStats, 30000);
</script>
</body>
</html>
