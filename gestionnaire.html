<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire COMMAND - Système Intégral</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --blue: #00b0ff; --text: #fff; --panel: #161616; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        
        .header { background: #111; padding: 0 30px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; height: 65px; align-items: center; z-index: 5000; position: relative; }
        .logo { font-weight: 900; color: var(--accent); letter-spacing: 2px; margin-right: 30px; text-transform: uppercase; }
        
        .btn-chef { background: var(--accent); color: #000; border: none; padding: 10px 18px; border-radius: 6px; cursor: pointer; font-weight: 900; font-size: 0.75rem; text-transform: uppercase; margin-right: 10px; transition: 0.2s; }
        .btn-chef:hover { filter: brightness(1.1); transform: scale(1.02); }
        .btn-blue { background: var(--blue); color: #000; }
        .btn-lock { background: #333; color: #fff; }
        .architect-mode .btn-lock { background: var(--alert); color: #fff; }

        .room-tabs { display: flex; background: #111; border-bottom: 2px solid #333; overflow-x: auto; height: 50px; }
        .room-tab { background: #1a1a1a; color: #888; border: none; padding: 0 25px; cursor: pointer; font-weight: 900; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; border-right: 1px solid #333; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .room-tab:hover { background: #222; color: #fff; }
        .room-tab.active { background: var(--accent); color: #000; }
        .btn-add-room { background: #ff9800; color: #000; }
        .btn-add-room:hover { background: #ffb74d; color: #000; }

        #viewport { width: 100vw; height: calc(100vh - 115px); overflow: auto; background: #000; position: relative; }
        #canvas { width: 3000px; height: 3000px; position: relative; background: radial-gradient(#222 0.5px, transparent 0.5px); background-size: 50px 50px; transform-origin: 0 0; transition: transform 0.1s ease-out; }

        .table { position: absolute; border: 2px solid #444; display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; z-index: 10; border-radius: 8px; box-sizing: border-box; color: #fff; transition: all 0.3s ease; }
        .table.selected { border-color: var(--accent) !important; box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); z-index: 100; }
        .table.circle { border-radius: 50%; }

        .status-libre { background-color: #2a2a2a; border-color: #555; }
        .status-reservee { background-color: #4a148c; border-color: #9c27b0; }
        .status-commande { background-color: #e65100; border-color: #ff9800; }
        .status-occupee { background-color: #b71c1c; border-color: #f44336; }
        .status-prete { background-color: #0d47a1; border-color: #2196f3; animation: pulseBleu 1.5s infinite; }
        .status-addition { background-color: #1b5e20; border-color: #4caf50; animation: pulseVert 1.5s infinite; }

        @keyframes pulseBleu { 0% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(33, 150, 243, 0); } 100% { box-shadow: 0 0 0 0 rgba(33, 150, 243, 0); } }
        @keyframes pulseVert { 0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(76, 175, 80, 0); } 100% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0); } }

        .zone { position: absolute; border: 3px dashed rgba(255, 255, 255, 0.7); background: transparent; z-index: 1; pointer-events: none; display: flex; padding: 15px; align-items: flex-start; justify-content: flex-start; box-sizing: border-box; }
        .architect-mode .zone { pointer-events: all; cursor: move; border-color: var(--blue); background: rgba(0, 176, 255, 0.05); }
        .zone-label { color: rgba(255, 255, 255, 0.9); font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: 4px; }
        .resize-handle { position: absolute; bottom: -6px; right: -6px; width: 16px; height: 16px; background: var(--accent); border: 2px solid #000; border-radius: 50%; cursor: se-resize; z-index: 200; display: none; }
        .selected .resize-handle { display: block; }

        #config-panel { position: fixed; left: 20px; bottom: 20px; width: 300px; background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 20px; display: none; z-index: 4000; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .prop-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
        input, select { width: 100%; background: #000; border: 1px solid #333; color: white; padding: 8px; border-radius: 4px; font-family: 'Inter', sans-serif; font-size: 0.8rem; }
        label { font-size: 0.6rem; color: #666; text-transform: uppercase; font-weight: 900; margin-bottom: 4px; display: block; }

        #order-pad { position: fixed; right: 0; top: 0; width: 400px; height: 100vh; background: #121212; border-left: 2px solid #333; padding: 25px; z-index: 7000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        #order-pad.open { transform: translateX(0); }
        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: #aaa; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-close-drawer:hover { color: var(--accent); transform: scale(1.2); }

        .menu-cat-btn { background: #222; color: #aaa; border: 1px solid #333; padding: 10px 15px; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; font-weight: bold; border-radius: 6px; white-space: nowrap; }
        .menu-cat-btn.active { background: var(--accent); color: #000; border-color: var(--accent); }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .menu-item-btn { background: #111; border: 1px solid #333; color: white; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; transition: 0.2s; font-size: 0.8rem; }
        .menu-item-btn:hover { border-color: var(--accent); }
        .item-price { color: var(--accent); font-weight: bold; float: right; }
        .basket-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #222; font-size: 0.9rem; align-items: center; }
        .btn-del { color: var(--alert); cursor: pointer; font-weight: bold; margin-left: 10px; padding: 0 5px; }
        .status-sent { color: var(--accent); font-size: 0.6rem; font-weight: bold; text-transform: uppercase; margin-left: 10px; background: rgba(0,230,118,0.1); padding: 2px 6px; border-radius: 4px;}

        .action-btn { width: 100%; padding: 15px; color: white; border: none; font-weight: 900; cursor: pointer; border-radius: 8px; margin-bottom: 10px; text-transform: uppercase; }
        .btn-green { background: var(--accent); color: black; }
        .btn-orange { background: #ff9800; color: black; }
        .btn-blue { background: var(--blue); color: black; }
        .btn-red { background: #b71c1c; }
        .btn-gray { background: #555; }
        #architect-btns { display:none; align-items: center; gap: 10px; padding-left: 15px; margin-left: 15px; border-left: 2px solid #333; }
        #pending-warning { display:none; background:#ff9800; color:black; padding:12px; text-align:center; font-weight:bold; border-radius:6px; margin-bottom:15px; font-size:0.85rem; border: 2px solid #e65100; }
        
        /* ZOOM CONTROLS */
        .zoom-controls { position: fixed; left: 20px; top: 80px; z-index: 6000; display: flex; flex-direction: column; gap: 5px; }
        .btn-zoom { width: 40px; height: 40px; background: #111; color: white; border: 1px solid #444; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
        .btn-zoom:hover { background: #222; }

        /* AUDIT DRAWER */
        #audit-drawer { position: fixed; right: 0; top: 0; width: 650px; height: 100vh; background: #121212; border-left: 2px solid #333; padding: 25px; z-index: 8000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: 0.3s; box-shadow: -15px 0 50px rgba(0,0,0,0.9); }
        #audit-drawer.open { transform: translateX(0); }
        .audit-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
        .audit-table td { padding: 12px; border-bottom: 1px solid #222; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display:flex; align-items: center;">
            <div class="logo">EMPIRE COMMAND</div>
            <button class="btn-chef btn-lock" onclick="toggleChefMode()" id="lock-status">🔓 ACCÈS CHEF</button>
            <button class="btn-chef" onclick="openAuditDrawer()" id="btn-audit" style="display:none; margin-left:10px; background:#1a1a1a; color:#fff; border: 1px solid #444;">👁️ REGISTRE</button>
            <button class="btn-chef btn-blue" onclick="toggleArchitectMode()" id="architect-toggle" style="display:none; margin-left:10px;">🛠️ ARCHITECTURE</button>
            
            <div id="architect-btns">
                <button class="btn-chef" onclick="addItem('table')">+ TABLE</button>
                <button class="btn-chef btn-blue" onclick="addItem('zone')">+ ZONE</button>
                <button class="btn-chef" onclick="save()">💾 SAUVEGARDER</button>
            </div>
        </div>
        <div id="clock" style="font-weight:900; color:#555;">--:--</div>
    </div>

    <div class="room-tabs" id="room-tabs-container"></div>

    <div id="viewport"><div id="canvas"></div></div>

    <div class="zoom-controls">
        <button class="btn-zoom" onclick="changeZoom(0.1)">+</button>
        <button class="btn-zoom" onclick="changeZoom(-0.1)">-</button>
        <div id="zoom-level" style="text-align:center; font-size:0.7rem; color:#666; font-weight:bold;">100%</div>
    </div>

    <div id="config-panel">
        <label>NUMÉRO / NOM</label><input type="text" id="ed-id" oninput="applyChange()">
        <label>FORME</label><select id="ed-shape" onchange="applyChange()"><option value="square">Carré</option><option value="circle">Rond</option></select>
        <label>LARGEUR (M)</label><input type="number" step="0.1" id="ed-w" oninput="applyChange()">
        <label>HAUTEUR (M)</label><input type="number" step="0.1" id="ed-h" oninput="applyChange()">
        <button onclick="deleteItem()" style="width:100%; background:var(--alert); border:none; color:white; padding:10px; border-radius:6px; cursor:pointer; font-weight:bold; margin-top:10px;">SUPPRIMER</button>
    </div>

    <div id="order-pad">
        <button class="btn-close-drawer" onclick="closePad()">✕</button>
        <h2 id="pad-table-id" style="margin-top:0; color:var(--accent); font-size: 2rem;">Table --</h2>
        
        <div id="lock-warning" style="display:none; background:var(--alert); color:white; padding:12px; text-align:center; font-weight:bold; border-radius:6px; margin-bottom:15px; font-size:0.85rem; border: 2px solid #b71c1c;">
            🔒 TICKET SCELLÉ
        </div>

        <div style="margin-bottom: 15px;">
            <label style="color:#fff;">COUVERTS</label>
            <input type="number" id="covers" style="width:100%; padding:10px; background:#000; color:var(--blue); border:1px solid #333; font-size:1.2rem; font-weight:bold; text-align:center;" value="1">
        </div>

        <div id="menu-area">
            <div id="menu-categories" style="display:flex; gap:8px; overflow-x:auto; padding-bottom:5px; margin-bottom: 10px;"></div>
            <div id="menu-items" class="menu-grid"></div>
        </div>

        <div id="basket-ui" style="background:#000; height:200px; margin:15px 0; padding:10px; border-radius:8px; overflow-y:auto; border: 1px solid #222;"></div>
        
        <div style="display:flex; justify-content:space-between; font-size:1.3rem; font-weight:900; margin-bottom:15px;">
            <span>TOTAL</span>
            <span id="basket-total" style="color:var(--accent);">0.00 €</span>
        </div>

        <div id="pending-warning">⏳ EN PRODUCTION</div>

        <div id="action-buttons">
            <button id="btn-order" class="action-btn btn-green" onclick="submitOrder()">ENVOYER COMMANDE</button>
            <button id="btn-correction" class="action-btn btn-orange" onclick="submitOrder()" style="display:none;">⚠️ CORRECTION</button>
            <hr style="border: 1px solid #333; margin: 20px 0;">
            <button id="btn-bill" class="action-btn btn-blue" onclick="demanderAddition()" style="display:none;">IMPRIMER ADDITION</button>
            <button id="btn-pay" class="action-btn btn-red" onclick="validerEncaissement()" style="display:none;">VALIDER L'ENCAISSEMENT</button>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>

<script>
    const socketIO = io(); // Liaison Temps Réel Cuisine/Bar
    const SCALE = 50; let currentZoom = 1.0;
    
    let layouts = { 
        "RESTAURANT": {
            tables: [
                { id: "T1", x: 150, y: 150, w: 2, h: 2, shape: "square" }, { id: "T2", x: 350, y: 150, w: 2, h: 2, shape: "square" }
            ],
            zones: [{ id: "SALLE", x: 50, y: 50, w: 27, h: 19, shape: "square" }]
        }
    };

    let currentRoom = "RESTAURANT"; let activeOrders = {}; let tableStates = {}; 
    let isChef = false; let isArchitect = false; let selected = null; 
    let currentTable = null; let localBasket = [];

    const MENU = {
        "Plats": [{ n: "Burger Tableau", p: 19.50, dest: "Cuisine" }, { n: "Entrecôte 300g", p: 28.00, dest: "Cuisine" }],
        "Boissons": [{ n: "Bière Pression", p: 8.00, dest: "Bar" }, { n: "Soda", p: 4.50, dest: "Bar" }]
    };

    let currentCategory = "Plats";

    // --- WEBSOCKET PLAN DE TABLE (ANCIEN MOTEUR) ---
    const ws = new WebSocket(`ws://${window.location.host}`);
    ws.onmessage = (e) => {
        const msg = JSON.parse(e.data);
        if (msg.type === 'SYNC_LAYOUT') { 
            layouts = msg.data; renderTabs(); render(); 
        }
        if (msg.type === 'ORDER_UPDATE') { 
            activeOrders = msg.activeOrders; render(); 
            if (currentTable && document.getElementById('order-pad').classList.contains('open')) updateBasket();
        }
    };

    function renderTabs() {
        const container = document.getElementById('room-tabs-container');
        container.innerHTML = Object.keys(layouts).map(room => `<button class="room-tab ${room === currentRoom ? 'active' : ''}" onclick="switchRoom('${room}')">${room}</button>`).join('') + (isArchitect ? `<button class="room-tab btn-add-room" onclick="addRoom()">+</button>` : '');
    }

    function switchRoom(room) { currentRoom = room; renderTabs(); render(); }

    function toggleChefMode() {
        if (!isChef) { if (prompt("CODE CHEF :") === "8888") { isChef = true; document.getElementById('lock-status').textContent = "🔒 SUPERVISION"; document.getElementById('architect-toggle').style.display = 'inline-block'; document.getElementById('btn-audit').style.display = 'inline-block'; } }
        else { isChef = false; isArchitect = false; document.getElementById('architect-btns').style.display = 'none'; document.getElementById('architect-toggle').style.display = 'none'; document.getElementById('lock-status').textContent = "🔓 ACCÈS CHEF"; }
        render(); renderTabs();
    }

    function toggleArchitectMode() {
        isArchitect = !isArchitect;
        document.getElementById('architect-btns').style.display = isArchitect ? 'flex' : 'none';
        document.body.classList.toggle('architect-mode', isArchitect);
        render(); renderTabs();
    }

    function render() {
        const canvas = document.getElementById('canvas'); canvas.innerHTML = "";
        (layouts[currentRoom].zones || []).forEach(z => {
            const div = document.createElement('div'); div.className = "zone";
            div.style.left = z.x+'px'; div.style.top = z.y+'px'; div.style.width = (z.w * SCALE)+'px'; div.style.height = (z.h * SCALE)+'px';
            div.innerHTML = `<span class="zone-label">${z.id}</span>`;
            if(isArchitect) div.onmousedown = (e) => startDrag(e, z, 'zone');
            canvas.appendChild(div);
        });
        (layouts[currentRoom].tables || []).forEach(t => {
            const order = activeOrders[t.id]; const div = document.createElement('div');
            let status = order ? (order.status === 'ready' ? 'status-prete' : 'status-occupee') : 'status-libre';
            if (tableStates[t.id] === 'addition') status = 'status-addition';
            div.className = `table ${t.shape || 'square'} ${status} ${selected === t ? 'selected' : ''}`;
            div.style.left = t.x+'px'; div.style.top = t.y+'px'; div.style.width = (t.w * SCALE)+'px'; div.style.height = (t.h * SCALE)+'px';
            div.innerHTML = `${t.id}`;
            if (isArchitect) div.onmousedown = (e) => startDrag(e, t, 'table');
            else div.onclick = () => openPad(t.id);
            canvas.appendChild(div);
        });
    }

    function openPad(id) {
        currentTable = id; const o = activeOrders[id];
        localBasket = o ? JSON.parse(JSON.stringify(o.items)).map(item => ({...item, sent: true})) : [];
        document.getElementById('pad-table-id').textContent = "Table " + id;
        document.getElementById('order-pad').classList.add('open');
        renderMenu(); updateBasket();
    }

    function renderMenu() {
        const cats = document.getElementById('menu-categories');
        cats.innerHTML = Object.keys(MENU).map(c => `<button class="menu-cat-btn ${c === currentCategory ? 'active' : ''}" onclick="currentCategory='${c}';renderMenu()">${c}</button>`).join('');
        const items = document.getElementById('menu-items');
        items.innerHTML = MENU[currentCategory].map(i => `<button class="menu-item-btn" onclick="addToBasket('${i.n}','${i.dest}',${i.p})">${i.n} <span class="item-price">${i.p}€</span></button>`).join('');
    }

    function addToBasket(n, dest, p) { localBasket.push({ n, dest, p, sent: false }); updateBasket(); }

    function updateBasket() {
        let total = 0; let html = '';
        localBasket.forEach((i, idx) => {
            total += i.p;
            let del = i.sent ? `<span class="status-sent">✔️</span>` : `<span class="btn-del" onclick="localBasket.splice(${idx},1);updateBasket()">X</span>`;
            html += `<div class="basket-row"><span>${i.n}</span><span>${i.p}€ ${del}</span></div>`;
        });
        document.getElementById('basket-ui').innerHTML = html;
        document.getElementById('basket-total').textContent = total.toFixed(2) + " €";
        document.getElementById('btn-order').style.display = localBasket.some(i => !i.sent) ? 'block' : 'none';
        if (localBasket.some(i => i.sent)) {
            document.getElementById(tableStates[currentTable]==='addition'?'btn-pay':'btn-bill').style.display = 'block';
        }
    }

    async function submitOrder() {
        // --- TRANSMISSION SOCKET.IO (CUISINE/BAR) ---
        const unsent = localBasket.filter(i => !i.sent);
        if (unsent.length > 0) {
            socketIO.emit('new-order', {
                table: "Table " + currentTable,
                heure: new Date().toLocaleTimeString('fr-FR'),
                articles: unsent.map(i => `${i.dest === 'Bar' ? '[Boisson]' : '[Plat]'} ${i.n}`)
            });
        }

        // --- SAUVEGARDE WEBSOCKET (PLAN DE TABLE) ---
        localBasket.forEach(i => i.sent = true);
        const order = { tableId: currentTable, items: localBasket, covers: document.getElementById('covers').value, status: 'pending' };
        await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTable, order }) });
        document.getElementById('order-pad').classList.remove('open');
    }

    function closePad() { document.getElementById('order-pad').classList.remove('open'); }
    function changeZoom(d) { currentZoom += d; document.getElementById('canvas').style.transform = `scale(${currentZoom})`; }
    function save() { fetch('/save-full-layout', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(layouts) }); alert("ENREGISTRÉ"); }
</script>
</body>
</html>
