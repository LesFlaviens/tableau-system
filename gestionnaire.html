<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire - Terminal Salle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --blue: #00b0ff; --warning: #ffb300; --sub: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        header { border-bottom: 1px solid #333; padding: 10px 20px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { color: var(--accent); font-size: 1.2rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .btn-top { background: #111; border: 1px solid #333; color: #fff; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; }
        
        .main-workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* RADAR WOOCOMMERCE PLIABLE */
        #radar-container { 
            position: relative; 
            width: 300px; 
            background: #080808; 
            border-right: 1px solid #222; 
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), width 0.4s;
            display: flex;
            flex-direction: column;
            z-index: 100;
        }
        #radar-container.folded { width: 0; transform: translateX(-100%); border-right: none; }
        
        /* ONGLET DE PLIAGE AVEC ANIMATION ALERTE */
        .radar-toggle {
            position: absolute;
            top: 50%;
            right: -30px;
            width: 30px;
            height: 60px;
            background: var(--blue);
            color: #000;
            border-radius: 0 8px 8px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-weight: 900;
            font-size: 1.2rem;
            transform: translateY(-50%);
            z-index: 101;
            box-shadow: 5px 0 15px rgba(0,0,0,0.5);
            transition: 0.3s;
        }

        /* ANIMATION CLIGNOTANTE SI COMMANDE WEB */
        @keyframes alert-pulse {
            0% { background-color: var(--blue); box-shadow: 0 0 0 0 rgba(0, 176, 255, 0.7); }
            50% { background-color: #fff; box-shadow: 0 0 20px 10px rgba(0, 176, 255, 0); }
            100% { background-color: var(--blue); box-shadow: 0 0 0 0 rgba(0, 176, 255, 0); }
        }
        .alert-active { animation: alert-pulse 1s infinite !important; }

        .radar-content { width: 300px; padding: 15px; box-sizing: border-box; overflow-y: auto; flex: 1; }
        .radar-title { color: var(--blue); font-size: 0.8rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; }
        .web-order-card { background: #111; border: 1px solid #333; border-left: 4px solid var(--blue); padding: 12px; border-radius: 6px; margin-bottom: 10px; font-size: 0.85rem; }
        
        .floor-plan { flex: 1; position: relative; background: #050505; overflow: hidden; }
        .table-obj { position: absolute; background: #161616; border: 2px solid #555; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 900; border-radius: 8px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 1rem; }
        .table-badge { position: absolute; top: -8px; right: -8px; background: var(--warning); color: #000; font-size: 0.6rem; padding: 2px 5px; border-radius: 10px; font-weight: 900; border: 1px solid #000; }

        .drawer { position: absolute; top: 0; right: 0; width: 100%; max-width: 450px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 20px; z-index: 9000; box-sizing: border-box; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .drawer.open { transform: translateX(0); }
        .ticket-area { flex: 1; background: #000; border: 1px solid #222; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 15px; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .btn-item { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; cursor: pointer; font-size: 0.9rem; }
        .btn-send { background: var(--accent); color: #000; padding: 15px; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 100%; }
        .cat-tab { padding: 8px 12px; background: #1a1a1a; border: 1px solid #333; border-radius: 20px; font-size: 0.65rem; color: #aaa; font-weight: 900; cursor: pointer; white-space: nowrap;}
        .cat-tab.active { background: var(--blue); color: #000; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">EMPIRE - TERMINAL</div>
        <button class="btn-top" onclick="alert('Réservations sync')">📅 RÉSERVATIONS</button>
    </header>

    <div class="main-workspace">
        <div id="radar-container" class="folded">
            <div class="radar-toggle" id="radar-icon" onclick="toggleRadar()">🌐</div>
            <div class="radar-content">
                <div class="radar-title">COMMANDES EN LIGNE</div>
                <div id="radar-web-list"></div>
            </div>
        </div>

        <div class="floor-plan" id="floor-plan"></div>

        <div id="order-drawer" class="drawer">
            <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                <h2 id="drawer-table-name" style="margin:0; color:var(--accent);">TABLE</h2>
                <button onclick="closeDrawer()" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">✕</button>
            </div>
            <div class="ticket-area" id="ticket-list"></div>
            <div id="cat-tabs" style="display:flex; gap:5px; margin-bottom:10px; overflow-x:auto;"></div>
            <div class="menu-grid" id="menu-items"></div>
            <div id="total-val" style="font-size:1.5rem; font-weight:900; text-align:right; margin:15px 0;">0.00 €</div>
            <button class="btn-send" onclick="sendOrder()">🔥 ENVOYER CUISINE/BAR</button>
        </div>
    </div>

    <script>
        let currentTableId = null;
        let currentTicket = [];

        function toggleRadar() {
            const radar = document.getElementById('radar-container');
            const icon = document.getElementById('radar-icon');
            radar.classList.toggle('folded');
            icon.innerHTML = radar.classList.contains('folded') ? '🌐' : '✕';
            if(!radar.classList.contains('folded')) icon.classList.remove('alert-active');
        }

        function renderRadar() {
            const queue = JSON.parse(localStorage.getItem('empire_kds_queue')) || [];
            const container = document.getElementById('radar-web-list');
            const webOrders = queue.filter(o => o.id && o.id.toString().startsWith('WEB_'));
            
            // Logique d'alerte
            const radarBox = document.getElementById('radar-container');
            const icon = document.getElementById('radar-icon');
            if(webOrders.length > 0 && radarBox.classList.contains('folded')) {
                icon.classList.add('alert-active');
            } else {
                icon.classList.remove('alert-active');
            }

            if(webOrders.length === 0) {
                container.innerHTML = '<div style="color:#333; text-align:center; margin-top:30px;">Aucune commande web.</div>';
                return;
            }

            container.innerHTML = webOrders.map(o => `
                <div class="web-order-card">
                    <div style="display:flex; justify-content:space-between;">
                        <b style="color:var(--blue);">${o.table}</b>
                        <span style="color:#555; font-size:0.7rem;">${o.time}</span>
                    </div>
                </div>
            `).join('');
        }

        function loadFloorPlan() {
            const floor = document.getElementById('floor-plan');
            floor.innerHTML = '';
            const tables = JSON.parse(localStorage.getItem('empire_salle_tables')) || [{id:'T1', l:50, t:50, w:80, h:80, label:'T1'}];

            tables.forEach(t => {
                const div = document.createElement('div');
                div.className = 'table-obj';
                div.innerHTML = t.label;
                div.style.left = t.l+'px'; div.style.top = t.t+'px';
                div.style.width = t.w+'px'; div.style.height = t.h+'px';
                
                const saved = JSON.parse(localStorage.getItem('empire_order_'+t.id));
                if(saved && saved.length > 0) {
                    div.style.borderColor = 'var(--warning)';
                    div.innerHTML += '<div class="table-badge">🍽️</div>';
                }
                div.onclick = () => openOrder(t.id);
                floor.appendChild(div);
            });
        }

        function openOrder(id) {
            currentTableId = id;
            document.getElementById('drawer-table-name').innerText = "TABLE " + id;
            currentTicket = JSON.parse(localStorage.getItem('empire_order_'+id)) || [];
            renderTicket();
            renderMenu('Entrée');
            document.getElementById('order-drawer').classList.add('open');
        }

        function closeDrawer() { document.getElementById('order-drawer').classList.remove('open'); }

        function renderMenu(cat) {
            const menu = JSON.parse(localStorage.getItem('empire_recipes')) || [{name:'Salade', price:14, category:'Entrée'}];
            const cats = ['Entrée', 'Plat', 'Dessert', 'Boisson'];
            document.getElementById('cat-tabs').innerHTML = cats.map(c => `<div class="cat-tab ${c === cat ? 'active' : ''}" onclick="renderMenu('${c}')">${c}s</div>`).join('');
            document.getElementById('menu-items').innerHTML = menu.filter(m => m.category === cat).map(m => `<div class="btn-item" onclick="addItem('${m.name}', ${m.price}, '${m.category}')"><b>${m.name}</b><br>${m.price}€</div>`).join('');
        }

        function addItem(n, p, c) {
            currentTicket.push({id: Date.now(), name: n, price: p, category: c});
            renderTicket();
            localStorage.setItem('empire_order_'+currentTableId, JSON.stringify(currentTicket));
            loadFloorPlan();
        }

        function renderTicket() {
            const list = document.getElementById('ticket-list');
            let total = 0;
            list.innerHTML = currentTicket.map(i => { total += i.price; return `<div style="display:flex; justify-content:space-between; margin-bottom:5px;"><span>1x ${i.name}</span><span>${i.price}€</span></div>`; }).join('');
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        function sendOrder() {
            if(currentTicket.length === 0) return;
            const queue = JSON.parse(localStorage.getItem('empire_kds_queue')) || [];
            const ticketStruct = { entrees:[], plats:[], desserts:[], boissons:[] };
            currentTicket.forEach(i => {
                if(i.category === 'Entrée') ticketStruct.entrees.push(i);
                else if(i.category === 'Plat') ticketStruct.plats.push(i);
                else if(i.category === 'Dessert') ticketStruct.desserts.push(i);
                else ticketStruct.boissons.push(i);
            });
            queue.push({ id: 'ORD_' + Date.now(), table: currentTableId, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), ticket: ticketStruct, status: 'pending' });
            localStorage.setItem('empire_kds_queue', JSON.stringify(queue));
            alert("Envoyé en cuisine !");
            closeDrawer();
        }

        window.addEventListener('storage', () => { renderRadar(); loadFloorPlan(); });
        renderRadar(); loadFloorPlan();
    </script>
</body>
</html>
