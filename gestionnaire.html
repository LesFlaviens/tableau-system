<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Serveur Mobile Sync</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; --gold: #ffb300; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        header { border-bottom: 1px solid #333; padding: 10px; display: flex; justify-content: space-between; align-items: center; background: #000; }
        .room-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .room-tab { background: transparent; border: 1px solid #444; color: #aaa; padding: 8px 15px; border-radius: 20px; white-space: nowrap; font-size: 0.8rem; font-weight: bold;}
        .room-tab.active { background: #fff; color: #000; border-color: #fff; }
        .floor-plan { flex: 1; position: relative; overflow: auto; padding: 10px; }
        .table-obj { position: absolute; background: #000; border: 2px solid #fff; display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 8px; font-size: 1.1rem; }
        .table-obj.occupied { border-color: var(--alert); color: var(--alert); }
        @keyframes blink { 0% { background: #000; } 100% { background: var(--accent); color: #000; } }
        .table-obj.ready { animation: blink 0.5s infinite alternate; }
        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; }
        .drawer.open { transform: translateX(0); }
        .ticket-area { flex: 0 0 30vh; overflow-y: auto; padding: 15px; border-bottom: 1px solid #333; }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px; overflow-y: auto; align-content: start;}
        .btn-item { background: #000; border: 1px solid #444; color: #fff; padding: 10px; text-align: center; border-radius: 4px; font-size: 0.75rem; font-weight: bold; min-height: 60px; display: flex; flex-direction: column; justify-content: center; }
        .btn-main { width: 100%; padding: 15px; border-radius: 6px; font-weight: 900; border: none; text-transform: uppercase; margin-top: 10px;}
    </style>
</head>
<body>
    <header><div style="font-weight:900; letter-spacing:1px;">EMPIRE SERVEUR</div><button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; border-radius:4px; padding:5px 10px;">🔄 SYNC</button></header>
    <div id="room-bar" class="room-bar"></div>
    <div id="floor-plan" class="floor-plan"></div>

    <div id="caisse-drawer" class="drawer">
        <div style="padding:15px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h2 id="table-title" style="margin:0;">T1</h2><button onclick="document.getElementById('caisse-drawer').classList.remove('open')" style="background:none; border:1px solid #fff; color:#fff; border-radius:50%; width:35px; height:35px;">✕</button>
        </div>
        <div class="ticket-area" id="ticket-list"></div>
        <div id="cat-tabs" style="display:flex; gap:5px; padding:10px; overflow-x:auto;"></div>
        <div class="menu-grid" id="menu-items"></div>
        <div style="padding:15px; background:#000; border-top:1px solid #333;">
            <div id="total-val" style="font-size:1.5rem; font-weight:900; text-align:right; margin-bottom:10px;">0.00 €</div>
            <button class="btn-main" style="background:#fff; color:#000;" onclick="sendOrder()">ENVOYER CUISINE</button>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];
        let rooms = JSON.parse(localStorage.getItem('EMPIRE_ROOMS')) || [{id:'r_main', name:'SALLE'}];
        let currentRoomId = rooms[0].id;
        let currentCategory = "Entrées";

        // --- ECOUTEUR TELECOMMUNICATION MASTER ---
        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'ORDER_UPDATE') {
                    // 1. Si mise à jour de la carte par le Chef
                    if (msg.activeOrders['GLOBAL_MENU']) {
                        const newMenu = msg.activeOrders['GLOBAL_MENU'].data;
                        localStorage.setItem('empire_recipes', JSON.stringify(newMenu));
                        if(document.getElementById('caisse-drawer').classList.contains('open')) renderMenu(currentCategory);
                    }
                    // 2. Mise à jour des tables
                    activeOrders = msg.activeOrders;
                    renderFloorPlan();
                }
            } catch(e) {}
        };

        async function forceLoad() {
            try {
                const res = await fetch('/get-current-state');
                const data = await res.json();
                if(data.activeOrders['GLOBAL_MENU']) {
                    localStorage.setItem('empire_recipes', JSON.stringify(data.activeOrders['GLOBAL_MENU'].data));
                }
                activeOrders = data.activeOrders;
                renderFloorPlan();
            } catch(e){}
        }

        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                if(t.roomId !== currentRoomId) return;
                const div = document.createElement('div'); div.className = 'table-obj';
                const o = activeOrders[t.label];
                if(o) { if(o.status==='ready') div.classList.add('ready'); else div.classList.add('occupied'); }
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = t.label; div.onclick = () => openCaisse(t.label);
                floor.appendChild(div);
            });
            document.getElementById('room-bar').innerHTML = rooms.map(r => `<button class="room-tab ${r.id===currentRoomId?'active':''}" onclick="currentRoomId='${r.id}';renderFloorPlan();">${r.name}</button>`).join('');
        }

        function openCaisse(label) {
            currentTableId = label; document.getElementById('table-title').innerText = label;
            const o = activeOrders[label]; currentTicket = o ? (o.items || []) : [];
            renderTicket(); renderMenu('Entrées'); document.getElementById('caisse-drawer').classList.add('open');
        }

        function renderMenu(cat) {
            currentCategory = cat;
            const menu = JSON.parse(localStorage.getItem('empire_recipes')) || [];
            const cats = ['Entrées', 'Plats de résistance', 'Desserts', 'Boissons & Bar'];
            document.getElementById('cat-tabs').innerHTML = cats.map(c => `<button class="room-tab ${c===cat?'active':''}" onclick="renderMenu('${c}')">${c.split(' ')[0]}</button>`).join('');
            document.getElementById('menu-items').innerHTML = menu.filter(r => r.category === cat).map(r => `<div class="btn-item" onclick="addItem('${r.name}', ${r.price})"><span>${r.name}</span><span style="color:var(--accent)">${parseFloat(r.price).toFixed(2)}€</span></div>`).join('');
        }

        function addItem(n, p) { currentTicket.push({id:Date.now(), n, p, done:false}); renderTicket(); }
        function renderTicket() {
            let total = 0;
            document.getElementById('ticket-list').innerHTML = currentTicket.map((i, idx) => { total+=i.p; return `<div style="display:flex; justify-content:space-between; border-bottom:1px solid #222; padding:5px 0;"><span>${i.n}</span><span>${i.p.toFixed(2)}€ <button onclick="currentTicket.splice(${idx},1);renderTicket()" style="color:red;background:none;border:none;">✕</button></span></div>`; }).join('');
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return;
            const order = { table: currentTableId, items: currentTicket, status: 'pending', time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('caisse-drawer').classList.remove('open');
        }

        forceLoad();
        setInterval(forceLoad, 5000);
    </script>
</body>
</html>
