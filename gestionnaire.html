<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Serveur</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: manipulation; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        header { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: #000; flex-wrap: wrap; gap:10px;}
        .header-title { font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; margin: 0; }
        .room-bar { background: #0a0a0a; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 12px 15px; display: flex; gap: 10px; overflow-x: auto; }
        .room-tab { background: transparent; border: 1px solid var(--sub); color: var(--sub); padding: 10px 20px; border-radius: 25px; font-weight: 900; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .room-tab.active { background: #fff; color: #000; border-color: #fff; }
        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; padding: 15px; box-sizing: border-box;}
        .floor-plan { flex: 1; position: relative; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: auto; }
        
        .table-obj { position: absolute; background: #000; border: 2px solid var(--line); display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; font-size: 1.5rem; transition: 0.1s; border-radius: 8px; }
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,23,68,0.1); color: var(--alert); }
        
        /* CLIGNOTEMENT HAUTE PRIORITÉ */
        @keyframes table-ready-blink { 
            0% { background-color: #000; color: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 transparent; } 
            100% { background-color: var(--accent); color: #000; border-color: #fff; box-shadow: 0 0 35px var(--accent); } 
        }
        .table-obj.ready { animation: table-ready-blink 0.4s infinite alternate !important; z-index: 99; transform: scale(1.05); }
        
        .drawer { position: absolute; top: 0; right: 0; height: 100%; width: 100%; max-width: 500px; background: #050505; border-left: 1px solid var(--line); padding: 15px; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; box-sizing: border-box; }
        .drawer.open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; border-bottom: 1px solid var(--line); padding-bottom: 10px; flex-shrink: 0;}
        .btn-close { background: transparent; border: 1px solid var(--line); color: var(--line); width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; font-weight: bold; }
        
        .ticket-area { flex: 0 0 35%; background: #000; border: 1px solid var(--line); border-radius: 4px; padding: 10px; overflow-y: auto; margin-bottom: 10px; }
        .obs-input-container { flex-shrink: 0; margin-bottom: 10px; }
        .input-field { width: 100%; background: #000; border: 1px solid var(--line); color: var(--text); padding: 12px; border-radius: 4px; font-size: 1rem; box-sizing: border-box; font-weight: bold; }
        .pos-keyboard { flex: 1; display: flex; flex-direction: column; overflow: hidden; border: 1px solid rgba(255,255,255,0.2); border-radius: 4px; padding: 5px; background: #0a0a0a;}
        .cat-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; flex-shrink: 0; margin-bottom: 5px;}
        .cat-tab { padding: 12px 15px; background: #000; border: 1px solid var(--line); border-radius: 4px; font-size: 0.85rem; color: var(--sub); font-weight: 900; cursor: pointer; flex: 1; text-align: center;}
        .cat-tab.active { background: #fff; color: #000; }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; overflow-y: auto; padding-right: 5px;}
        .btn-item { background: #000; border: 1px solid var(--sub); color: var(--line); padding: 10px; border-radius: 4px; font-weight: bold; text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 70px; font-size: 0.85rem;}
        .btn-item:active { background: #fff; color: #000; transform: scale(0.95);}
        .total-section { flex-shrink: 0; margin-top: 10px; display: flex; flex-direction: column; gap: 10px;}
        .btn-action { width: 100%; padding: 18px; background: transparent; color: #fff; border: 1px solid #fff; border-radius: 4px; font-weight: 900; font-size: 1.1rem; cursor: pointer;}
        
        .step-badge { background: #222; border: 1px solid #555; border-radius: 4px; font-size: 0.7rem; padding: 3px 6px; cursor: pointer; margin-right: 8px; font-weight: bold; width: 60px; text-align: center; display: inline-block;}
        @media (max-width: 500px) { .drawer { max-width: 100%; } }
    </style>
</head>
<body>
    <header>
        <div class="header-title">SERVEUR</div>
        <div style="display:flex; gap:10px; flex:1; justify-content: flex-end;">
            <button class="btn-top" onclick="window.location.reload(true)" style="background:transparent; border:1px solid #fff; color:#fff; padding:10px; border-radius:4px; font-weight:bold;">🔄 RAFRAÎCHIR</button>
        </div>
    </header>
    <div id="room-bar" class="room-bar"></div>
    <div class="main-workspace">
        <div class="floor-plan" id="floor-plan"></div>
        <div id="caisse-drawer" class="drawer">
            <div class="drawer-header"><h2 id="table-title" style="margin:0; font-size:1.8rem;">TABLE</h2><button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button></div>
            <div class="ticket-area" id="ticket-list"></div>
            <div class="obs-input-container"><input type="text" id="order-obs" class="input-field" placeholder="⚠️ OBSERVATIONS"></div>
            <div class="pos-keyboard"><div class="cat-tabs" id="cat-tabs"></div><div class="menu-grid" id="menu-items"></div></div>
            <div class="total-section"><div id="total-val" style="font-size:2rem; font-weight:900; text-align:right;">0.00 €</div><button class="btn-action" style="background:#fff; color:#000;" onclick="sendOrder()">VALIDER LA COMMANDE</button></div>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];
        let savedRooms = JSON.parse(localStorage.getItem('EMPIRE_ROOMS'));
        let rooms = (savedRooms && savedRooms.length > 0) ? savedRooms : [{id: 'r_main', name: 'SALLE PRINCIPALE'}];
        let currentRoomId = rooms[0].id;
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];

        // MOTEUR AUDIO (CARILLON)
        let audioCtx = null;
        let previousStatus = {};

        // Déverrouille l'audio à la première touche sur l'écran
        document.addEventListener('pointerdown', () => {
            if (!audioCtx) {
                try { const AudioContext = window.AudioContext || window.webkitAudioContext; audioCtx = new AudioContext(); audioCtx.resume(); } catch(e){}
            }
        }, { once: true });

        function playBell() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); // Note aigue pour transpercer le bruit
            osc.frequency.setValueAtTime(1108.73, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 1.5);
        }

        function checkAlerts(newOrders) {
            for(let tid in newOrders) {
                if(newOrders[tid] && newOrders[tid].status === 'ready' && previousStatus[tid] !== 'ready') {
                    playBell(); // SONNERIE
                }
                previousStatus[tid] = newOrders[tid] ? newOrders[tid].status : null;
            }
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE' || msg.type === 'PLAN_UPDATE') {
                activeOrders = msg.activeOrders || activeOrders;
                checkAlerts(activeOrders);
                if (activeOrders['GLOBAL_PLAN']) {
                    if(activeOrders['GLOBAL_PLAN'].rooms) rooms = activeOrders['GLOBAL_PLAN'].rooms;
                    if(activeOrders['GLOBAL_PLAN'].tables) tables = activeOrders['GLOBAL_PLAN'].tables;
                }
                if (!rooms.find(r => r.id === currentRoomId)) currentRoomId = rooms[0].id;
                renderRooms(); renderFloorPlan();
            }
        };

        async function forceSync() { try { const res = await fetch('/get-current-state'); const data = await res.json(); activeOrders = data.activeOrders; checkAlerts(activeOrders); renderRooms(); renderFloorPlan(); } catch(e) {} }
        
        function openDrawer(id) { document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
        function renderRooms() { document.getElementById('room-bar').innerHTML = rooms.map(r => `<button class="room-tab ${r.id === currentRoomId ? 'active' : ''}" onclick="switchRoom('${r.id}')">${r.name}</button>`).join(''); }
        function switchRoom(id) { currentRoomId = id; renderRooms(); renderFloorPlan(); }

        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                if(t.roomId !== currentRoomId) return; 
                const div = document.createElement('div'); div.className = 'table-obj'; div.style.borderRadius = t.shape === 'round' ? '50%' : '8px';
                const order = activeOrders[t.id] || activeOrders[t.label];
                if(order && order.status !== 'system') { 
                    if (order.status === 'ready') div.classList.add('ready'); // Animation CSS
                    else div.classList.add('occupied'); 
                }
                div.innerHTML = `<span>${t.label}</span>`; div.style.left = t.l + 'px'; div.style.top = t.t + 'px'; div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                div.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); openCaisse(t.label || t.id); }); 
                floor.appendChild(div);
            });
        }

        function openCaisse(label) { 
            currentTableId = label; document.getElementById('table-title').innerText = label; 
            currentTicket = activeOrders[label]?.items || []; 
            document.getElementById('order-obs').value = activeOrders[label]?.observation || '';
            
            // Acquittement de l'alerte dès l'ouverture de la table
            if(activeOrders[label] && activeOrders[label].status === 'ready') {
                activeOrders[label].status = 'pending';
                fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: label, order: activeOrders[label] }) });
            }
            
            renderTicket(); renderMenu('Entrée'); openDrawer('caisse-drawer'); 
        }

        function renderMenu(activeCategory = 'Entrée') {
            let menu = JSON.parse(localStorage.getItem('empire_recipes')) || [{name: 'Salade', price: 10, category: 'Entrée'}, {name: 'Steak', price: 25, category: 'Plat'}, {name: 'Glace', price: 8, category: 'Dessert'}];
            const categories = ['Entrée', 'Plat', 'Dessert'];
            document.getElementById('cat-tabs').innerHTML = categories.map(cat => `<div class="cat-tab ${cat === activeCategory ? 'active' : ''}" onclick="renderMenu('${cat}')">${cat}</div>`).join('');
            document.getElementById('menu-items').innerHTML = menu.filter(m => (m.category || 'Autre') === activeCategory).map(m => `<div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price}, '${m.category}')"><span>${m.name}</span><span style="color:var(--sub);">${parseFloat(m.price).toFixed(2)}€</span></div>`).join('');
        }

        function addItem(n, p, c) { let step = c === 'Entrée' ? 1 : c === 'Dessert' ? 3 : 2; currentTicket.push({id: Date.now(), n: n, p: p, category: c, step: step, done: false}); renderTicket(); }
        function removeItem(targetIndex) { currentTicket.splice(targetIndex, 1); renderTicket(); }
        function cycleStep(targetIndex) { let s = currentTicket[targetIndex].step || 1; currentTicket[targetIndex].step = s === 1 ? 2 : s === 2 ? 3 : 1; renderTicket(); }

        function renderTicket() {
            const list = document.getElementById('ticket-list'); let total = 0; const itemCounts = {};
            currentTicket.forEach((i, idx) => { 
                let step = i.step || (i.category === 'Entrée' ? 1 : i.category === 'Dessert' ? 3 : 2);
                total += i.p || 0; const key = i.n + '_' + step; 
                if (!itemCounts[key]) itemCounts[key] = { item: i, count: 0, indices: [], price: i.p || 0, step: step }; 
                itemCounts[key].count++; itemCounts[key].indices.push(idx); 
            });
            let html = '';
            for (const key in itemCounts) {
                const g = itemCounts[key]; const lastIdx = g.indices[g.indices.length - 1]; 
                const stepName = g.step === 1 ? 'ENTRÉE' : g.step === 2 ? 'PLAT' : 'DESSERT';
                const stepColor = g.step === 1 ? '#aaa' : g.step === 2 ? '#fff' : '#ffb300';
                html += `<div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed rgba(255,255,255,0.2); align-items:center;">
                    <span style="font-weight:bold; font-size:0.95rem; flex:1; display:flex; align-items:center;">
                        <span style="display:inline-block; min-width:25px; font-weight:900;">${g.count}x</span> 
                        <button class="step-badge" style="color:${stepColor}; border-color:${stepColor};" onclick="cycleStep(${lastIdx})">${stepName}</button>
                        ${g.item.done ? '✅' : '⏳'} ${g.item.n}
                    </span>
                    <span style="font-weight:bold; font-size:1rem; display:flex; align-items:center;">${(g.price * g.count).toFixed(2)}€ <button onclick="removeItem(${lastIdx})" style="background:transparent; border:1px solid var(--alert); color:var(--alert); border-radius:4px; padding:4px 10px; margin-left:10px; cursor:pointer; font-weight:bold;">✕</button></span>
                </div>`;
            }
            list.innerHTML = html || '<div style="color:#555; text-align:center; padding:20px; font-style:italic;">-- TICKET VIDE --</div>'; 
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return; 
            const obs = document.getElementById('order-obs').value.trim();
            const order = { table: currentTableId, items: currentTicket, observation: obs, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), status: 'pending' };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('order-obs').value = ''; closeDrawer('caisse-drawer');
        }

        forceSync(); setInterval(forceSync, 3000); 
    </script>
</body>
</html>
