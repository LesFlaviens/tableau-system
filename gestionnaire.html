<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Serveur Master</title>
    <style>
        :root { --bg: #050505; --text: #fff; --sub: #aaa; --accent: #00e676; --gold: #ffb300; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        header { border-bottom: 1px solid #333; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; background: #000; }
        .room-bar { display: flex; gap: 8px; overflow-x: auto; padding: 10px; background: #0a0a0a; border-bottom: 1px solid #222; }
        .room-tab { background: transparent; border: 1px solid #444; color: #aaa; padding: 8px 15px; border-radius: 20px; white-space: nowrap; font-size: 0.8rem; font-weight: bold;}
        .room-tab.active { background: #fff; color: #000; border-color: #fff; }
        .floor-plan { flex: 1; position: relative; overflow: auto; padding: 10px; }
        .table-obj { position: absolute; background: #000; border: 2px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 1.1rem; }
        .table-obj.occupied { border-color: var(--alert); color: var(--alert); }
        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; }
        .drawer.open { transform: translateX(0); }
        .ticket-area { flex: 0 0 25vh; overflow-y: auto; padding: 15px; border-bottom: 1px solid #333; background: #0a0a0a; }
        .cat-bar { display: flex; gap: 5px; padding: 10px; overflow-x: auto; background: #111; }
        .cat-btn { background: #222; border: 1px solid #444; color: #fff; padding: 8px 15px; border-radius: 5px; font-size: 0.8rem; font-weight: bold; white-space: nowrap; }
        .cat-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 10px; overflow-y: auto; align-content: start;}
        .btn-item { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; display: flex; flex-direction: column; justify-content: space-between; min-height: 60px; }
        .btn-main { width: 100%; padding: 18px; border-radius: 8px; font-weight: 900; border: none; text-transform: uppercase; font-size: 1rem;}
    </style>
</head>
<body>
    <header><div style="font-weight:900;">EMPIRE PAD</div><button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; border-radius:4px; padding:5px 10px;">SYNC 🔄</button></header>
    <div id="room-bar" class="room-bar"></div>
    <div id="floor-plan" class="floor-plan"></div>

    <div id="caisse-drawer" class="drawer">
        <div style="padding:15px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h2 id="table-title" style="margin:0;">T1</h2><button onclick="document.getElementById('caisse-drawer').classList.remove('open')" style="color:#fff; background:none; border:none; font-size:1.5rem;">✕</button>
        </div>
        <div class="ticket-area" id="ticket-list"></div>
        <div class="cat-bar" id="cat-tabs"></div>
        <div class="menu-grid" id="menu-items"></div>
        <div style="padding:15px; background:#000; border-top:1px solid #333;">
            <div id="total-val" style="font-size:1.5rem; font-weight:900; text-align:right; margin-bottom:10px;">0.00 €</div>
            <button class="btn-main" style="background:#fff; color:#000;" onclick="sendOrder()">🚀 ENVOYER CUISINE</button>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];
        let currentRoomId = "r_main";
        let currentCategory = "Entrées";

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') {
                if (msg.activeOrders['GLOBAL_MENU']) {
                    localStorage.setItem('kds_menu_empire', JSON.stringify(msg.activeOrders['GLOBAL_MENU'].data));
                    if(document.getElementById('caisse-drawer').classList.contains('open')) renderMenu(currentCategory);
                }
                activeOrders = msg.activeOrders; renderFloorPlan();
            }
        };

        async function forceSync() {
            const res = await fetch('/get-current-state');
            const data = await res.json();
            if(data.activeOrders['GLOBAL_MENU']) localStorage.setItem('kds_menu_empire', JSON.stringify(data.activeOrders['GLOBAL_MENU'].data));
            activeOrders = data.activeOrders; renderFloorPlan();
        }

        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                const div = document.createElement('div'); div.className = 'table-obj';
                const o = activeOrders[t.label];
                if(o) div.classList.add('occupied');
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = t.label; div.onclick = () => openCaisse(t.label);
                floor.appendChild(div);
            });
            // Barre de salle simple
            document.getElementById('room-bar').innerHTML = '<button class="room-tab active">SALLE PRINCIPALE</button>';
        }

        function openCaisse(label) {
            currentTableId = label; document.getElementById('table-title').innerText = "TABLE " + label;
            const o = activeOrders[label]; currentTicket = o ? (o.items || []) : [];
            renderTicket(); renderMenu("Entrées");
            document.getElementById('caisse-drawer').classList.add('open');
        }

        function renderMenu(cat) {
            currentCategory = cat;
            const menu = JSON.parse(localStorage.getItem('kds_menu_empire')) || [];
            const cats = ["Entrées", "Plats de résistance", "Desserts", "Boissons & Bar"];
            
            document.getElementById('cat-tabs').innerHTML = cats.map(c => `
                <button class="cat-btn ${c===cat?'active':''}" onclick="renderMenu('${c}')">${c.split(' ')[0]}</button>
            `).join('');

            const filtered = menu.filter(i => i.category === cat);
            document.getElementById('menu-items').innerHTML = filtered.map(i => `
                <div class="btn-item" onclick="addItem('${i.name}', ${i.price})">
                    <span>${i.name}</span>
                    <span style="color:var(--accent)">${parseFloat(i.price).toFixed(2)}€</span>
                </div>
            `).join('') || '<div style="grid-column:span 2; text-align:center; padding:20px;">Aucun plat. Cliquez sur PROPULSER dans chef.html</div>';
        }

        function addItem(n, p) { currentTicket.push({n, p, done:false}); renderTicket(); }
        function renderTicket() {
            let total = 0;
            document.getElementById('ticket-list').innerHTML = currentTicket.map((i, idx) => {
                total += i.p;
                return `<div style="display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid #222;">
                    <span>${i.n}</span>
                    <span>${i.p.toFixed(2)}€ <button onclick="currentTicket.splice(${idx},1);renderTicket()" style="color:red; background:none; border:none;">✕</button></span>
                </div>`;
            }).join('');
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return;
            const order = { table: currentTableId, items: currentTicket, status: 'pending', time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('caisse-drawer').classList.remove('open');
        }

        forceSync();
    </script>
</body>
</html>
