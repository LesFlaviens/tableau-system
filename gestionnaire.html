<script>
    // ... ton code actuel ...
    async function submitOrder() {
        // Envoi au serveur pour le plan de table
        const order = { tableId: currentTable, items: localBasket, status: 'pending' };
        await fetch('/update-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: currentTable, order }) });

        // NOUVEAU : Envoi instantané aux écrans Cuisine et Bar
        const articlesFormates = localBasket.filter(i => !i.sent).map(item => {
            const tag = (item.dest === 'Bar') ? '[Boisson]' : '[Plat]';
            return `${tag} 1x ${item.n}`;
        });
        
        if(articlesFormates.length > 0) {
            socketIO.emit('new-order', {
                table: "Table " + currentTable,
                heure: new Date().toLocaleTimeString('fr-FR'),
                articles: articlesFormates
            });
        }
        // ... reste de ta fonction ...
    }
</script>
