<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire - Terminal Salle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --blue: #00b0ff; --warning: #ffb300; --sub: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: manipulation; }
        header { border-bottom: 1px solid #333; padding: 15px 20px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { color: var(--accent); font-size: 1.4rem; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .btn-top { background: #111; border: 2px solid #333; color: #fff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        
        .main-workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        /* RADAR WOOCOMMERCE (GAUCHE) */
        .radar-panel { width: 300px; background: #080808; border-right: 1px solid #222; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; }
        .radar-title { color: var(--blue); font-size: 0.8rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .web-order-card { background: #111; border: 1px solid #333; border-left: 4px solid var(--blue); padding: 12px; border-radius: 6px; margin-bottom: 10px; font-size: 0.9rem; }
        
        /* PLAN DE SALLE (CENTRE) */
        .floor-plan { flex: 1; position: relative; background: #050505; overflow: hidden; }
        .table-obj { position: absolute; background: #161616; border: 2px solid #555; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 900; border-radius: 8px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 1.1rem; }
        .table-badge { position: absolute; top: -8px; right: -8px; background: var(--warning); color: #000; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; font-weight: 900; border: 2px solid #000; }

        /* TIROIR CAISSE (DROITE) */
        .drawer { position: absolute; top: 0; right: 0; width: 100%; max-width: 450px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 20px; z-index: 9000; box-sizing: border-box; transform: translateX(100%); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        .drawer.open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 1px solid #222; }
        
        .ticket-area { flex: 1; background: #000; border: 1px solid #222; border-radius: 8px; padding: 15px; overflow-y: auto; margin-bottom: 15px; }
        .menu-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 15px; }
        .btn-item { background: #111; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; cursor: pointer; text-align: left; }
        .btn-send { background: var(--accent); color: #000; padding: 15px; font-weight: 900; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 100%; }

        .cat-tabs { display: flex; gap: 5px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .cat-tab { padding: 8px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 20px; font-size: 0.7rem; color: #aaa; font-weight: 900; cursor: pointer; text-transform: uppercase; white-space: nowrap;}
        .cat-tab.active { background: var(--blue); color: #000; border-color: var(--blue); }
    </style>
</head>
<body>

    <header>
        <div class="header-title">TABLEAU DU SERVICE</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-top" onclick="alert('Cahier Resas')">📅 CAHIER RÉSERVATIONS</button>
            <button class="btn-top" id="btn-chef" style="display:none; border-color:var(--warning); color:var(--warning);">🔐 ACCÈS CHEF</button>
        </div>
    </header>

    <div class="main-workspace">
        <div class="radar-panel">
            <div class="radar-title">🌐 RADAR WOOCOMMERCE</div>
            <div id="radar-web-list">
                <div style="color:#333; text-align:center; margin-top:30px; font-size:0.8rem;">Le radar est vide.</div>
            </div>
        </div>

        <div class="floor-plan" id="floor-plan"></div>

        <div id="order-drawer" class="drawer">
            <div class="drawer-header">
                <h2 id="drawer-table-name" style="margin:0; color:var(--accent);">TABLE --</h2>
                <button onclick="closeDrawer()" style="background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer;">✕</button>
            </div>
            <div class="ticket-area" id="ticket-list"></div>
            <div class="cat-tabs" id="cat-tabs"></div>
            <div class="menu-grid" id="menu-items"></div>
            <div id="total-val" style="font-size:1.5rem; font-weight:900; text-align:right; margin-bottom:15px;">0.00 €</div>
            <button class="btn-send" onclick="sendOrder()">🔥 ENVOYER CUISINE/BAR</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const isMaster = urlParams.get('key') === 'ICHEF2026';
        if(isMaster) document.getElementById('btn-chef').style.display = 'block';

        let currentTableId = null;
        let currentTicket = [];

        // --- 1. MOTEUR RADAR WEB (ICHEF.CH/CARTE) ---
        function renderRadar() {
            const queue = JSON.parse(localStorage.getItem('empire_kds_queue')) || [];
            const container = document.getElementById('radar-web-list');
            const webOrders = queue.filter(o => o.id && o.id.toString().startsWith('WEB_'));

            if(webOrders.length === 0) {
                container.innerHTML = '<div style="color:#333; text-align:center; margin-top:30px; font-size:0.8rem;">Le radar est vide.</div>';
                return;
            }

            container.innerHTML = webOrders.map(o => `
                <div class="web-order-card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                        <b style="color:var(--blue);">${o.table}</b>
                        <span style="color:#555; font-size:0.7rem;">${o.time}</span>
                    </div>
                    <div style="font-size:0.8rem; color:#888;">${o.id}</div>
                </div>
            `).join('');
        }

        // --- 2. PLAN DE SALLE ---
        function loadFloorPlan() {
            const floor = document.getElementById('floor-plan');
            floor.innerHTML = '';
            const tables = JSON.parse(localStorage.getItem('empire_salle_tables')) || [
                {id:'T1', l:100, t:100, w:80, h:80, label:'T1'},
                {id:'T2', l:200, t:100, w:80, h:80, label:'T2'}
            ];

            tables.forEach(t => {
                const div = document.createElement('div');
                div.className = 'table-obj';
                div.innerHTML = t.label;
                div.style.left = t.l+'px'; div.style.top = t.t+'px';
                div.style.width = t.w+'px'; div.style.height = t.h+'px';
                
                // Badge si commande en cours
                const saved = JSON.parse(localStorage.getItem('empire_order_'+t.id));
                if(saved && saved.length > 0) {
                    div.style.borderColor = 'var(--warning)';
                    div.innerHTML += '<div class="table-badge">🍽️</div>';
                }

                div.onclick = () => openOrder(t.id);
                floor.appendChild(div);
            });
        }

        // --- 3. CAISSE ---
        function openOrder(id) {
            currentTableId = id;
            document.getElementById('drawer-table-name').innerText = "TABLE " + id;
            currentTicket = JSON.parse(localStorage.getItem('empire_order_'+id)) || [];
            renderTicket();
            renderMenu('Entrée');
            document.getElementById('order-drawer').classList.add('open');
        }

        function closeDrawer() { document.getElementById('order-drawer').classList.remove('open'); }

        function renderMenu(cat) {
            const menu = JSON.parse(localStorage.getItem('empire_recipes')) || [
                {name:'Salade César', price:14, category:'Entrée'},
                {name:'Bavette', price:24, category:'Plat'},
                {name:'Mousse Choco', price:8, category:'Dessert'},
                {name:'Mojito', price:12, category:'Boisson'}
            ];
            
            // Tabs
            const cats = ['Entrée', 'Plat', 'Dessert', 'Boisson'];
            document.getElementById('cat-tabs').innerHTML = cats.map(c => `
                <div class="cat-tab ${c === cat ? 'active' : ''}" onclick="renderMenu('${c}')">${c}s</div>
            `).join('');

            // Items
            document.getElementById('menu-items').innerHTML = menu.filter(m => m.category === cat).map(m => `
                <div class="btn-item" onclick="addItem('${m.name}', ${m.price}, '${m.category}')">
                    <b>${m.name}</b><br><span style="color:var(--accent);">${m.price}€</span>
                </div>
            `).join('');
        }

        function addItem(n, p, c) {
            currentTicket.push({id: Date.now(), name: n, price: p, category: c});
            renderTicket();
            localStorage.setItem('empire_order_'+currentTableId, JSON.stringify(currentTicket));
            loadFloorPlan();
        }

        function renderTicket() {
            const list = document.getElementById('ticket-list');
            let total = 0;
            list.innerHTML = currentTicket.map(i => {
                total += i.price;
                return `<div style="display:flex; justify-content:space-between; margin-bottom:8px;">
                    <span>1x ${i.name}</span>
                    <span>${i.price}€</span>
                </div>`;
            }).join('');
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        function sendOrder() {
            if(currentTicket.length === 0) return;
            const queue = JSON.parse(localStorage.getItem('empire_kds_queue')) || [];
            
            const ticketStruct = { entrees:[], plats:[], desserts:[], boissons:[] };
            currentTicket.forEach(i => {
                if(i.category === 'Entrée') ticketStruct.entrees.push(i);
                else if(i.category === 'Plat') ticketStruct.plats.push(i);
                else if(i.category === 'Dessert') ticketStruct.desserts.push(i);
                else ticketStruct.boissons.push(i);
            });

            queue.push({
                id: 'ORD_' + Date.now(),
                table: currentTableId,
                time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
                ticket: ticketStruct,
                status: 'pending'
            });

            localStorage.setItem('empire_kds_queue', JSON.stringify(queue));
            alert("Bon envoyé !");
            closeDrawer();
        }

        window.addEventListener('storage', () => { renderRadar(); loadFloorPlan(); });
        renderRadar(); loadFloorPlan();
    </script>
</body>
</html>
