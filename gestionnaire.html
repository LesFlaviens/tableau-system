<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire COMMAND - Poste de Contrôle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --blue: #00b0ff; --text: #fff; --panel: #161616; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow: hidden; }
        .header { background: #111; padding: 0 30px; display: flex; justify-content: space-between; border-bottom: 1px solid #333; height: 65px; align-items: center; z-index: 5000; position: relative; }
        .logo { font-weight: 900; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
        #viewport { width: 100vw; height: calc(100vh - 65px); overflow: auto; background: #000; position: relative; }
        #canvas { width: 3000px; height: 3000px; position: relative; background: radial-gradient(#222 0.5px, transparent 0.5px); background-size: 50px 50px; }
        .table { position: absolute; border: 2px solid #444; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; border-radius: 8px; color: #fff; background: #2a2a2a; }
        .status-occupee { background-color: #b71c1c; border-color: #f44336; }
        #order-pad { position: fixed; right: 0; top: 0; width: 400px; height: 100vh; background: #121212; border-left: 2px solid #333; padding: 25px; z-index: 7000; transform: translateX(100%); transition: 0.3s; box-shadow: -10px 0 30px rgba(0,0,0,0.8); }
        #order-pad.open { transform: translateX(0); }
        .btn-order { width: 100%; padding: 15px; background: var(--accent); color: #000; border: none; font-weight: 900; cursor: pointer; border-radius: 8px; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header"><div class="logo">EMPIRE COMMAND</div><div id="clock"></div></div>
    <div id="viewport"><div id="canvas"></div></div>

    <div id="order-pad">
        <h2 id="pad-title">Table --</h2>
        <div id="items-list" style="height: 300px; border: 1px solid #333; padding: 10px; overflow-y: auto;">
            <p>1x Burger Empire [Plat]</p>
            <p>1x Coca-Cola [Boisson]</p>
        </div>
        <button class="btn-order" onclick="envoyerTest()">ENVOYER EN PRODUCTION</button>
        <button onclick="document.getElementById('order-pad').classList.remove('open')" style="width:100%; margin-top:10px; background:#333; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer;">FERMER</button>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        const canvas = document.getElementById('canvas');

        // Création d'une table test
        const t = document.createElement('div');
        t.className = 'table';
        t.style.left = '100px'; t.style.top = '100px'; t.style.width = '100px'; t.style.height = '100px';
        t.innerText = 'T1';
        t.onclick = () => { document.getElementById('order-pad').classList.add('open'); document.getElementById('pad-title').innerText = "Table 1"; };
        canvas.appendChild(t);

        function envoyerTest() {
            const ticket = {
                table: "Table 1",
                articles: ["[Plat] 1x Burger Empire", "[Boisson] 1x Coca-Cola"],
                heure: new Date().toLocaleTimeString('fr-FR')
            };
            socket.emit('new-order', ticket);
            alert("Commande envoyée à la Cuisine et au Bar !");
            document.getElementById('order-pad').classList.remove('open');
        }

        setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }, 1000);
    </script>
</body>
</html>
