<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire - Gestionnaire de Salle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --purple: #ea80fc; --blue: #00b0ff; --warning: #ffb300; --sub: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        /* SÉCURITÉ */
        #security-block { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 99999; display: flex; flex-direction: column; justify-content: center; align-items: center; color: var(--alert); }
        
        /* HEADER EXACT DE LA CAPTURE */
        header { border-bottom: 1px solid #333; padding: 15px 25px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { color: var(--accent); font-size: 1.8rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 3px; }
        
        .header-controls { display: flex; gap: 15px; }
        .btn-top { background: #111; font-weight: 900; border-radius: 6px; padding: 12px 20px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 1rem; border: 2px solid transparent; color: #fff; }
        .btn-top:active { transform: scale(0.95); }
        .btn-plan { border-color: #888; color: #ccc; }
        .btn-res { border-color: var(--purple); color: var(--purple); }
        .btn-admin { border-color: var(--warning); color: var(--warning); }

        /* BARRE ARCHITECTURE (CACHÉE) */
        #archi-toolbar { display: none; background: var(--blue); padding: 10px 25px; justify-content: space-between; align-items: center; color: #000; font-weight: 900; text-transform: uppercase; box-shadow: 0 5px 20px rgba(0, 176, 255, 0.3); }
        .btn-archi-action { background: rgba(0,0,0,0.5); border: 1px solid #000; color: #fff; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; border:none;}

        /* ZONES */
        .zones-bar { display: flex; border-bottom: 1px solid #222; background: #050505; }
        .zone-tab { padding: 15px 30px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #555; border-right: 1px solid #222; }
        .zone-tab.active { background: var(--accent); color: #000; }

        /* WORKSPACE & RADAR WOOCOMMERCE */
        .main-workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        .floor-plan { flex: 1; position: relative; background: #050505; overflow: hidden; }
        .floor-plan.archi-active { background: radial-gradient(circle, #333 2px, #050505 2px); background-size: 30px 30px; }
        
        .radar-panel { width: 280px; background: #0a0a0a; border-left: 1px solid #222; padding: 15px; display: flex; flex-direction: column; z-index: 50;}
        .radar-title { color: var(--blue); font-size: 0.9rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }

        /* OBJETS SALLE */
        .table-obj, .decor-obj { position: absolute; display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); padding: 5px; box-sizing: border-box; }
        .table-obj { background: #161616; border: 2px solid #fff; color: #fff; font-size: 1.2rem; z-index: 20; border-radius: 8px;}
        .decor-obj { z-index: 10; font-size: 1rem; }
        
        .floor-plan.archi-active .table-obj, .floor-plan.archi-active .decor-obj { border-style: dashed; }
        .floor-plan.archi-active .resize-handle { display: block; }
        .resize-handle { display: none; position: absolute; bottom: -10px; right: -10px; width: 25px; height: 25px; background: var(--accent); border: 3px solid #000; border-radius: 50%; cursor: se-resize; z-index: 2000; }

        .table-badge { position: absolute; top: -10px; right: -10px; background: var(--purple); color: #000; font-size: 0.8rem; padding: 4px 8px; border-radius: 12px; font-weight: 900; border: 2px solid #000; }
        
        .decor-zone { background: rgba(255, 255, 255, 0.05); border: 2px dashed #555; color: #888; text-transform: uppercase; letter-spacing: 2px;}
        .decor-window { background: rgba(0, 176, 255, 0.15); border: 2px solid var(--blue); color: var(--blue); }
        .decor-wall { background: #222; border: 1px solid #111; color: transparent; }
        .decor-bar { background: #3e2723; border: 2px solid #212121; color: #d7ccc8; }

        /* TIROIRS COULISSANTS */
        .drawer { position: absolute; top: 0; right: 0; width: 500px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 30px; z-index: 9000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -20px 0 50px rgba(0,0,0,0.9);}
        .drawer.open { transform: translateX(0); }
        .btn-close-drawer { position: absolute; top: 20px; left: 20px; background: transparent; border: none; color: #aaa; font-size: 2rem; font-weight: bold; cursor: pointer; }
        .btn-close-drawer:hover { color: var(--alert); }

        .admin-menu-btn { width: 100%; padding: 18px; margin-bottom: 15px; background: #111; border: 1px solid #333; border-radius: 8px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 15px; color: #fff;}
        .admin-menu-btn:hover { background: #1a1a1a; }
        
        .input-base { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 1rem; margin-bottom: 10px;}

        /* PLANNING STAFF */
        .staff-plan-card { background: #161616; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 15px; border-left: 5px solid var(--purple); }
        .staff-plan-name { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; color: #fff; margin-bottom: 10px; display: block; }
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
        .mini-day { background: #000; padding: 8px 2px; border-radius: 4px; text-align: center; border: 1px solid #222; display: flex; flex-direction: column; min-height: 55px;}
        .mini-day b { display: block; color: #555; margin-bottom: 5px; font-size: 0.6rem; text-transform: uppercase;}
        .shift-time { font-weight: 900; color: var(--accent); font-size: 0.65rem; }

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 400px; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; margin-bottom: 5px; font-weight: bold;}
    </style>
</head>
<body>

    <div id="security-block">
        <h1 style="font-size: 3rem;">🛑 ACCÈS REFUSÉ</h1>
        <p>Clé ICHEF2026 requise pour le poste Gestionnaire.</p>
    </div>

    <header id="main-header" style="display:none;">
        <h1 class="header-title">TABLEAU DE SALLE</h1>
        <div class="header-controls">
            <button class="btn-top btn-plan" onclick="openDrawer('plan-drawer')">📅 PLANNING SEMAINE</button>
            <button class="btn-top btn-res" onclick="openDrawer('res-drawer')">📅 CAHIER RÉSERVATIONS</button>
            <button class="btn-top btn-admin" onclick="openDrawer('admin-drawer')">🔒 SUPERVISION</button>
        </div>
    </header>

    <div id="archi-toolbar">
        <div style="display:flex; gap:10px;">
            <button class="btn-archi-action" onclick="addTable()">+ NOUVELLE TABLE</button>
            <button class="btn-archi-action" onclick="addDecor()">+ DÉCOR / ZONE</button>
            <button class="btn-archi-action" onclick="openZoneManager()">⚙️ GÉRER LES SALLES</button>
        </div>
        <button class="btn-archi-action" style="background:var(--accent); color:#000;" onclick="saveArchitecture()">💾 QUITTER ARCHITECTURE</button>
    </div>

    <div class="zones-bar" id="zones-bar" style="display:none;"></div>

    <div class="main-workspace" id="workspace" style="display:none;">
        <div class="floor-plan" id="floor-plan"></div>
        
        <div class="radar-panel">
            <div class="radar-title">🌐 RADAR WOOCOMMERCE</div>
            <div style="color:#555; text-align:center; font-size:0.8rem; margin-top:20px; font-style:italic;">En attente de commandes web...</div>
        </div>

        <div id="plan-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('plan-drawer')">✕</button>
            <h2 style="color:#fff; margin: 30px 0 20px 0; font-size: 1.8rem; text-transform: uppercase;">📅 PLANNING ÉQUIPE</h2>
            <div id="service-planning-container"></div>
        </div>

        <div id="res-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('res-drawer')">✕</button>
            <h2 style="color:var(--purple); margin: 30px 0 20px 0; font-size: 1.8rem; text-transform: uppercase;">📅 RÉSERVATIONS</h2>
            <div style="background: #161616; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <input type="date" id="res-date-filter" class="input-base" onchange="renderReservations()">
            </div>
            <div id="res-list-container"></div>
        </div>

        <div id="admin-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('admin-drawer')">✕</button>
            <h2 style="color:var(--warning); margin: 30px 0 30px 0; font-size: 1.8rem; text-transform: uppercase;">⚙️ SUPERVISION</h2>
            <div>
                <button class="admin-menu-btn" style="border-left: 5px solid var(--blue);" onclick="enableArchitecture()">
                    <span>🛠️</span> MODE ARCHITECTURE (MODIFIER LE PLAN)
                </button>
                <button class="admin-menu-btn" style="border-left: 5px solid #fff;" onclick="openDrawer('logs-drawer')">
                    <span>👁️</span> REGISTRE DES OPÉRATIONS
                </button>
                <button class="admin-menu-btn" style="border-left: 5px solid var(--purple);" onclick="window.location.href='rh.html'">
                    <span style="color:var(--purple);">👔</span> ALLER AU BUREAU RH
                </button>
            </div>
        </div>

        <div id="logs-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('logs-drawer')">✕</button>
            <h2 style="color:#fff; margin: 30px 0 20px 0; font-size: 1.8rem; text-transform: uppercase;">👁️ REGISTRE</h2>
            <div id="logs-container" style="background:#111; border:1px solid #333; border-radius:8px; padding:15px; max-height: 70vh; overflow-y:auto; color:#ccc; font-size:0.9rem;"></div>
        </div>
    </div>

    <div id="table-edit-modal" class="modal">
        <div class="modal-content" style="border-top-color: var(--blue);">
            <h2 style="color:var(--blue); margin-top:0;">ÉDITER LA TABLE</h2>
            <input type="hidden" id="edit-table-id">
            <div class="input-group"><label>Nom affiché</label><input type="text" id="edit-table-label" class="input-base"></div>
            <div class="input-group"><label>Forme</label>
                <select id="edit-table-radius" class="input-base"><option value="8px">Carrée/Rectangulaire</option><option value="50%">Ronde/Ovale</option></select>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="deleteTable()" style="flex:1; padding:10px; background:transparent; border:1px solid var(--alert); color:var(--alert); border-radius:6px; cursor:pointer;">SUPPRIMER</button>
                <button onclick="saveTableEdit()" style="flex:2; padding:10px; background:var(--blue); border:none; color:#000; border-radius:6px; font-weight:bold; cursor:pointer;">VALIDER</button>
            </div>
        </div>
    </div>

    <div id="decor-edit-modal" class="modal">
        <div class="modal-content" style="border-top-color: var(--accent);">
            <h2 style="color:var(--accent); margin-top:0;">ÉDITER LE DÉCOR</h2>
            <input type="hidden" id="edit-decor-id">
            <div class="input-group"><label>Texte affiché</label><input type="text" id="edit-decor-label" class="input-base"></div>
            <div class="input-group"><label>Type d'élément</label>
                <select id="edit-decor-style" class="input-base">
                    <option value="decor-zone">Zone Délimitée</option>
                    <option value="decor-window">Fenêtre / Baie vitrée</option>
                    <option value="decor-wall">Mur / Cloison</option>
                    <option value="decor-bar">Comptoir de Bar</option>
                </select>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="deleteDecor()" style="flex:1; padding:10px; background:transparent; border:1px solid var(--alert); color:var(--alert); border-radius:6px; cursor:pointer;">SUPPRIMER</button>
                <button onclick="saveDecorEdit()" style="flex:2; padding:10px; background:var(--accent); border:none; color:#000; border-radius:6px; font-weight:bold; cursor:pointer;">VALIDER</button>
            </div>
        </div>
    </div>

    <div id="zone-manager-modal" class="modal">
        <div class="modal-content" style="border-top-color: #fff;">
            <h2 style="color:#fff; margin-top:0;">GÉRER LES SALLES</h2>
            <div id="zone-manager-list" style="margin-bottom:15px;"></div>
            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <input type="text" id="new-zone-name" class="input-base" placeholder="Nouvelle salle (ex: Étage)" style="margin:0;">
                <button onclick="addNewZone()" style="background:var(--accent); color:#000; border:none; padding:0 15px; border-radius:6px; font-weight:bold; cursor:pointer;">AJOUTER</button>
            </div>
            <button onclick="closeZoneManager()" style="width:100%; padding:10px; background:#222; border:none; color:#fff; border-radius:6px; font-weight:bold; cursor:pointer;">FERMER</button>
        </div>
    </div>

    <script>
        // SÉCURITÉ
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('key') === 'ICHEF2026') {
            document.getElementById('security-block').style.display = 'none';
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('zones-bar').style.display = 'flex';
            document.getElementById('workspace').style.display = 'flex';
        }

        // SYNCHRO
        window.addEventListener('storage', function(e) {
            if (e.key === 'empire_reservations') { loadFloorPlan(); if(document.getElementById('res-drawer').classList.contains('open')) renderReservations(); }
            if (e.key === 'empire_salle_tables') { loadFloorPlan(); }
            if (e.key === 'kds_hr_master_v9') { renderStaffPlanning(); }
        });

        // TIROIRS
        function openDrawer(id) {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
            document.getElementById(id).classList.add('open');
            if(id === 'plan-drawer') renderStaffPlanning();
            if(id === 'res-drawer') renderReservations();
            if(id === 'logs-drawer') renderLogs();
        }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        // LOGS
        function addLog(msg) {
            const logs = JSON.parse(localStorage.getItem('empire_salle_logs')) || [];
            logs.unshift({ time: new Date().toLocaleTimeString('fr-FR'), msg });
            if(logs.length > 100) logs.pop();
            localStorage.setItem('empire_salle_logs', JSON.stringify(logs));
        }
        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('empire_salle_logs')) || [];
            document.getElementById('logs-container').innerHTML = logs.map(l => `<div style="border-bottom:1px dashed #222; padding:8px 0;">[${l.time}] ${l.msg}</div>`).join('');
        }
        function clearLogs() { if(confirm("Purger ?")) { localStorage.removeItem('empire_salle_logs'); renderLogs(); } }

        // ZONES & PLAN
        let currentZoneId = 'z1';
        let isArchiMode = false;

        function getZones() {
            let zones = JSON.parse(localStorage.getItem('empire_salle_zones'));
            if(!zones || zones.length === 0) zones = [{ id: 'z1', name: 'RESTAURANT' }];
            return zones;
        }
        function loadZonesUI() {
            const zones = getZones();
            if(!zones.find(z => z.id === currentZoneId)) currentZoneId = zones[0].id;
            document.getElementById('zones-bar').innerHTML = zones.map(z => `<div class="zone-tab ${z.id === currentZoneId ? 'active' : ''}" onclick="switchZone('${z.id}')">${z.name}</div>`).join('');
            loadFloorPlan();
        }
        function switchZone(id) { currentZoneId = id; loadZonesUI(); }
        
        function enableArchitecture() {
            isArchiMode = true; closeDrawer('admin-drawer');
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('archi-toolbar').style.display = 'flex';
            document.getElementById('floor-plan').classList.add('archi-active');
            addLog("Mode Architecture activé");
        }
        function saveArchitecture() {
            isArchiMode = false;
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('archi-toolbar').style.display = 'none';
            document.getElementById('floor-plan').classList.remove('archi-active');
            addLog("Architecture sauvegardée");
        }

        // DRAG & RESIZE
        let currentDrag = null; let startClickX = 0, startClickY = 0, startX = 0, startY = 0, startW = 0, startH = 0; let hasMoved = false; let isResizing = false;

        function startDrag(e, elem) {
            if(!isArchiMode) return;
            hasMoved = false; currentDrag = elem; const rect = currentDrag.getBoundingClientRect();
            startClickX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            startClickY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            startX = startClickX - rect.left; startY = startClickY - rect.top;
            currentDrag.style.zIndex = 1000;
        }
        function startResize(e) {
            if(!isArchiMode) return;
            e.stopPropagation(); hasMoved = false; isResizing = true; currentDrag = this.parentElement; 
            const rect = currentDrag.getBoundingClientRect(); startW = rect.width; startH = rect.height;
            startClickX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            startClickY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            currentDrag.style.zIndex = 1000;
        }

        document.onmousemove = dragAction; document.ontouchmove = dragAction;
        function dragAction(e) {
            if(!currentDrag || !isArchiMode) return;
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            if (Math.abs(clientX - startClickX) > 10 || Math.abs(clientY - startClickY) > 10) hasMoved = true;
            if(isResizing) {
                currentDrag.style.width = Math.max(40, startW + (clientX - startClickX)) + 'px';
                currentDrag.style.height = Math.max(40, startH + (clientY - startClickY)) + 'px';
            } else if (hasMoved) {
                const floor = document.getElementById('floor-plan').getBoundingClientRect();
                currentDrag.style.left = Math.max(0, Math.round((clientX - floor.left - startX) / 20) * 20) + 'px';
                currentDrag.style.top = Math.max(0, Math.round((clientY - floor.top - startY) / 20) * 20) + 'px';
            }
        }

        document.onmouseup = stopDrag; document.ontouchend = stopDrag;
        function stopDrag() {
            if(!currentDrag || !isArchiMode) return;
            const id = currentDrag.getAttribute('data-id'); const isDecor = currentDrag.getAttribute('data-type') === 'decor';
            if(!hasMoved && !isResizing) {
                if (isDecor) openDecorEdit(id); else openTableEdit(id);
            } else {
                let items = JSON.parse(localStorage.getItem(isDecor ? 'empire_salle_decor' : 'empire_salle_tables')) || [];
                const idx = items.findIndex(i => i.id === id);
                if(idx > -1) {
                    items[idx].l = parseInt(currentDrag.style.left); items[idx].t = parseInt(currentDrag.style.top);
                    items[idx].w = parseInt(currentDrag.style.width); items[idx].h = parseInt(currentDrag.style.height);
                    localStorage.setItem(isDecor ? 'empire_salle_decor' : 'empire_salle_tables', JSON.stringify(items));
                }
            }
            currentDrag.style.zIndex = ''; currentDrag = null; isResizing = false;
        }

        // LOAD ITEMS
        function getTables() { return JSON.parse(localStorage.getItem('empire_salle_tables')) || [{ id: 'T1', zoneId: 'z1', label: 'T1', w: 80, h: 80, t: 100, l: 50, color: '#fff', radius: '8px' }]; }
        function getDecors() { return JSON.parse(localStorage.getItem('empire_salle_decor')) || []; }
        function isTableReservedToday(label) { const today = new Date().toISOString().split('T')[0]; const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {}; return (resas[today] || []).some(r => r.table === label); }
        
        function loadFloorPlan() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            getDecors().filter(d => d.zoneId === currentZoneId).forEach(d => {
                const div = document.createElement('div'); div.className = `decor-obj ${d.styleType}`; div.setAttribute('data-id', d.id); div.setAttribute('data-type', 'decor');
                div.innerHTML = d.label || ''; div.style.width = d.w + 'px'; div.style.height = d.h + 'px'; div.style.top = d.t + 'px'; div.style.left = d.l + 'px';
                div.onmousedown = function(e){ startDrag(e, this); }; div.ontouchstart = function(e){ startDrag(e, this); };
                const handle = document.createElement('div'); handle.className = 'resize-handle'; handle.onmousedown = startResize; handle.ontouchstart = startResize; div.appendChild(handle);
                floor.appendChild(div);
            });
            getTables().filter(t => t.zoneId === currentZoneId).forEach(t => {
                const label = t.label || t.id; const div = document.createElement('div'); div.className = 'table-obj'; div.setAttribute('data-id', t.id); div.setAttribute('data-type', 'table');
                div.innerHTML = label; div.style.width = t.w + 'px'; div.style.height = t.h + 'px'; div.style.top = t.t + 'px'; div.style.left = t.l + 'px'; div.style.borderRadius = t.radius || '8px';
                if(isTableReservedToday(label)) div.innerHTML += `<div class="table-badge">📅</div>`;
                div.onmousedown = function(e){ startDrag(e, this); }; div.ontouchstart = function(e){ startDrag(e, this); };
                const handle = document.createElement('div'); handle.className = 'resize-handle'; handle.onmousedown = startResize; handle.ontouchstart = startResize; div.appendChild(handle);
                floor.appendChild(div);
            });
        }

        // ARCHI MODALS
        function addTable() {
            let tables = getTables(); let maxNum = 0; tables.filter(t => t.zoneId === currentZoneId).forEach(t => { const match = (t.label||'').match(/^T?(\d+)$/i); if(match) maxNum = Math.max(maxNum, parseInt(match[1], 10)); });
            tables.push({ id: 't_' + Date.now(), zoneId: currentZoneId, label: 'T' + (maxNum + 1), w: 80, h: 80, t: 50, l: 50, color: '#fff', radius: '8px' });
            localStorage.setItem('empire_salle_tables', JSON.stringify(tables)); loadFloorPlan();
        }
        function addDecor() {
            let decors = getDecors(); decors.push({ id: 'd_' + Date.now(), zoneId: currentZoneId, label: 'ZONE', w: 150, h: 100, t: 50, l: 50, styleType: 'decor-zone' });
            localStorage.setItem('empire_salle_decor', JSON.stringify(decors)); loadFloorPlan();
        }
        function openTableEdit(id) { const t = getTables().find(x => x.id === id); if(t) { document.getElementById('edit-table-id').value = t.id; document.getElementById('edit-table-label').value = t.label; document.getElementById('edit-table-radius').value = t.radius; document.getElementById('table-edit-modal').style.display = 'flex'; } }
        function saveTableEdit() { const id = document.getElementById('edit-table-id').value; let tables = getTables(); const idx = tables.findIndex(t => t.id === id); if(idx > -1) { tables[idx].label = document.getElementById('edit-table-label').value || "Tx"; tables[idx].radius = document.getElementById('edit-table-radius').value; localStorage.setItem('empire_salle_tables', JSON.stringify(tables)); loadFloorPlan(); document.getElementById('table-edit-modal').style.display='none'; } }
        function deleteTable() { const id = document.getElementById('edit-table-id').value; localStorage.setItem('empire_salle_tables', JSON.stringify(getTables().filter(t => t.id !== id))); loadFloorPlan(); document.getElementById('table-edit-modal').style.display='none'; }
        
        function openDecorEdit(id) { const d = getDecors().find(x => x.id === id); if(d) { document.getElementById('edit-decor-id').value = d.id; document.getElementById('edit-decor-label').value = d.label; document.getElementById('edit-decor-style').value = d.styleType; document.getElementById('decor-edit-modal').style.display = 'flex'; } }
        function saveDecorEdit() { const id = document.getElementById('edit-decor-id').value; let decors = getDecors(); const idx = decors.findIndex(d => d.id === id); if(idx > -1) { decors[idx].label = document.getElementById('edit-decor-label').value; decors[idx].styleType = document.getElementById('edit-decor-style').value; localStorage.setItem('empire_salle_decor', JSON.stringify(decors)); loadFloorPlan(); document.getElementById('decor-edit-modal').style.display='none'; } }
        function deleteDecor() { const id = document.getElementById('edit-decor-id').value; localStorage.setItem('empire_salle_decor', JSON.stringify(getDecors().filter(d => d.id !== id))); loadFloorPlan(); document.getElementById('decor-edit-modal').style.display='none'; }
        
        function openZoneManager() { document.getElementById('zone-manager-list').innerHTML = getZones().map(z => `<div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #333; color:#fff;"><b>${z.name}</b> <button onclick="deleteZone('${z.id}')" style="background:none; border:none; color:red; cursor:pointer;">✕</button></div>`).join(''); document.getElementById('zone-manager-modal').style.display='flex'; }
        function closeZoneManager() { document.getElementById('zone-manager-modal').style.display='none'; }
        function addNewZone() { const name = document.getElementById('new-zone-name').value; if(name) { let zones = getZones(); zones.push({id: 'z'+Date.now(), name}); localStorage.setItem('empire_salle_zones', JSON.stringify(zones)); document.getElementById('new-zone-name').value=''; openZoneManager(); loadZonesUI(); } }
        function deleteZone(id) { if(confirm("Supprimer ?")) { let zones = getZones().filter(z => z.id !== id); localStorage.setItem('empire_salle_zones', JSON.stringify(zones)); openZoneManager(); loadZonesUI(); } }

        // RESAS
        document.getElementById('res-date-filter').valueAsDate = new Date();
        function renderReservations() {
            const date = document.getElementById('res-date-filter').value; const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            const dayResas = resas[date] || []; const container = document.getElementById('res-list-container');
            if(dayResas.length === 0) { container.innerHTML = '<div style="color:#555; text-align:center;">Vide.</div>'; return; }
            container.innerHTML = dayResas.sort((a,b) => a.time.localeCompare(b.time)).map(r => `<div style="background:#111; border-left:4px solid var(--purple); padding:15px; margin-bottom:10px; display:flex; justify-content:space-between; border-radius:8px;"><div><div style="font-size:1.1rem; font-weight:900; color:#fff;">${r.time} - ${r.name}</div><div style="font-size:0.85rem; color:#aaa;">👥 ${r.pax} Pax | 📍 <span style="color:var(--accent);">${r.table || 'Libre'}</span></div></div><button onclick="deleteReservation('${date}', ${r.id})" style="background:none; border:none; color:var(--alert); cursor:pointer; font-size:1.5rem; font-weight:bold;">✕</button></div>`).join('');
        }
        function deleteReservation(date, id) { if(confirm("Annuler ?")) { const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {}; resas[date] = resas[date].filter(r => r.id !== id); localStorage.setItem('empire_reservations', JSON.stringify(resas)); renderReservations(); loadFloorPlan(); } }

        // PLANNING RH
        function renderStaffPlanning() {
            const staff = (JSON.parse(localStorage.getItem('kds_hr_master_v9')) || []).filter(s => s.dept === 'service');
            const c = document.getElementById('service-planning-container'); const jours = ["LUN", "MAR", "MER", "JEU", "VEN", "SAM", "DIM"];
            if(staff.length === 0) { c.innerHTML = "<p style='color:#555; text-align:center;'>Aucun personnel.</p>"; return; }
            c.innerHTML = staff.map(s => `<div class="staff-plan-card"><span class="staff-plan-name">${s.name}</span><div class="mini-grid">${s.plan.map((p, i) => `<div class="mini-day"><b>${jours[i]}</b>${p.status==='present' ? `<div class="shift-time">${p.s1||'-'}</div><div class="shift-time">${p.s2||'-'}</div>` : `<span style="color:#555; font-size:0.8rem; margin-top:5px; font-weight:bold;">${p.status}</span>`}</div>`).join('')}</div></div>`).join('');
        }

        // INIT
        loadZonesUI();
    </script>
</body>
</html>
