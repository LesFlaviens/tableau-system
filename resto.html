<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu & Réservation</title>
    
    <!-- Polices Élégantes -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">

    <style>
        /* CSS VARIABLES - Modifiables par l'IA selon les paramètres du restaurant */
        :root {
            --bg-color: #050505;
            --text-color: #FAF0E6;
            --accent-color: #D4AF37;
            --panel-color: #111111;
            --border-color: rgba(255, 255, 255, 0.1);
            --font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* --- EN-TÊTE DU RESTAURANT --- */
        .hero {
            text-align: center;
            padding: 50px 20px 30px;
            background: linear-gradient(to bottom, var(--panel-color), var(--bg-color));
            border-bottom: 1px solid var(--border-color);
        }
        .hero h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            margin: 0;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .hero p {
            font-size: 0.9rem;
            opacity: 0.8;
            margin-top: 10px;
        }

        /* --- NAVIGATION --- */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
            position: sticky;
            top: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid var(--border-color);
        }
        .nav-tabs button {
            background: transparent;
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-tabs button.active {
            background: var(--accent-color);
            color: #000;
            border-color: var(--accent-color);
        }

        /* --- CONTENU --- */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            width: 100%;
            box-sizing: border-box;
            flex: 1;
        }
        .section { display: none; animation: fadeIn 0.4s ease; }
        .section.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- MENU --- */
        .category-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--accent-color);
            border-bottom: 1px dashed var(--border-color);
            padding-bottom: 10px;
            margin-top: 30px;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            margin-bottom: 10px;
        }
        .menu-item-info h4 { margin: 0; font-size: 1rem; font-weight: 600; }
        .menu-item-info p { margin: 5px 0 0; font-size: 0.8rem; opacity: 0.7; }
        .menu-item-price {
            font-weight: 800;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        /* --- FORMULAIRE DE RÉSERVATION --- */
        .reservation-box {
            background: var(--panel-color);
            border: 1px solid var(--border-color);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.8;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px;
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            border-radius: 6px;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--accent-color);
        }
        .btn-submit {
            width: 100%;
            padding: 15px;
            background: var(--accent-color);
            color: #000;
            border: none;
            border-radius: 6px;
            font-weight: 800;
            font-size: 1rem;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-submit:hover { transform: translateY(-2px); opacity: 0.9; }

        /* --- FOOTER --- */
        footer {
            text-align: center;
            padding: 20px;
            font-size: 0.7rem;
            opacity: 0.5;
            border-top: 1px solid var(--border-color);
            margin-top: 40px;
        }
    </style>
</head>
<body>

    <div class="hero">
        <h1 id="resto-name">Chargement...</h1>
        <p id="resto-desc">Bienvenue sur notre espace en ligne</p>
    </div>

    <div class="nav-tabs">
        <button class="active" onclick="switchTab('menu')">La Carte</button>
        <button onclick="switchTab('reservation')">Réserver</button>
    </div>

    <div class="container">
        
        <!-- SECTION 1 : LE MENU -->
        <div id="sec-menu" class="section active">
            <div id="menu-container">
                <p style="text-align: center; opacity: 0.5;">Chargement de la carte en cours...</p>
            </div>
        </div>

        <!-- SECTION 2 : LA RÉSERVATION -->
        <div id="sec-reservation" class="section">
            <div class="reservation-box">
                <h3 style="text-align: center; margin-top: 0; color: var(--accent-color); font-family: 'Playfair Display', serif; font-size: 1.5rem;">Réserver une table</h3>
                <p style="text-align: center; font-size: 0.85rem; opacity: 0.8; margin-bottom: 25px;">Recevez une confirmation rapide de notre équipe.</p>
                
                <div class="form-group">
                    <label>Nom & Prénom</label>
                    <input type="text" id="res-name" placeholder="Ex: Flavien Iché" required>
                </div>
                
                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Date</label>
                        <input type="date" id="res-date" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Heure</label>
                        <input type="time" id="res-time" required>
                    </div>
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Personnes</label>
                        <input type="number" id="res-pax" min="1" max="20" value="2" required>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Téléphone</label>
                        <input type="tel" id="res-phone" placeholder="Votre numéro" required>
                    </div>
                </div>

                <button class="btn-submit" onclick="submitReservation()">Demander une Réservation</button>
            </div>
        </div>

    </div>

    <footer>
        Propulsé par <b>iCHEF OS</b>
    </footer>

    <script>
        // 1. IDENTIFICATION DU RESTAURANT (via l'URL)
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID');
        const SERVER_URL = "https://tableau-system.onrender.com";

        let currentCurrency = "€";
        let restaurantReservations = []; // Pour stocker et ajouter la nouvelle réservation

        // GESTION DES ONGLETS
        function switchTab(tabId) {
            document.querySelectorAll('.nav-tabs button').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.section').forEach(sec => sec.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById('sec-' + tabId).classList.add('active');
        }

        // 2. TÉLÉCHARGEMENT DES DONNÉES DU RESTAURANT
        async function bootSystem() {
            if (!tenantID) {
                document.getElementById('resto-name').innerText = "Erreur";
                document.getElementById('resto-desc').innerText = "Identifiant de restaurant manquant dans l'URL.";
                return;
            }

            document.getElementById('resto-name').innerText = tenantID.toUpperCase();

            try {
                const res = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                if (!res.ok) throw new Error("Serveur injoignable");
                
                const state = await res.json();
                const activeOrders = state.activeOrders || {};

                // A. Application du Design du client
                if (activeOrders['SETTINGS_MASTER'] && activeOrders['SETTINGS_MASTER'].data) {
                    let settings = activeOrders['SETTINGS_MASTER'].data;
                    if(settings.currency) currentCurrency = settings.currency;
                    
                    if (settings.design) {
                        const r = document.querySelector(':root');
                        if (settings.design.bgColor) r.style.setProperty('--bg-color', settings.design.bgColor);
                        if (settings.design.textColor) r.style.setProperty('--text-color', settings.design.textColor);
                        // On pourrait aussi rajouter des polices personnalisées ici
                    }
                }

                // B. Récupération des Réservations existantes (pour pouvoir en ajouter une sans tout écraser)
                if (activeOrders['RESERVATIONS'] && activeOrders['RESERVATIONS'].data) {
                    restaurantReservations = activeOrders['RESERVATIONS'].data;
                }

                // C. Génération du Menu (Fusion Cuisine + Bar)
                let fullMenu = {};
                if (activeOrders['MENU_MASTER'] && activeOrders['MENU_MASTER'].data) {
                    Object.assign(fullMenu, activeOrders['MENU_MASTER'].data);
                }
                if (activeOrders['MENU_MASTER_BAR'] && activeOrders['MENU_MASTER_BAR'].data) {
                    Object.assign(fullMenu, activeOrders['MENU_MASTER_BAR'].data);
                }

                renderMenu(fullMenu);

            } catch (e) {
                console.error("Erreur de chargement", e);
                document.getElementById('menu-container').innerHTML = "<p style='text-align:center; color:red;'>Impossible de charger la carte de ce restaurant actuellement.</p>";
            }
        }

        // 3. AFFICHAGE DU MENU
        function renderMenu(menuData) {
            const container = document.getElementById('menu-container');
            let html = '';

            for (let cat in menuData) {
                let items = menuData[cat];
                if (!items || items.length === 0) continue; // On ignore les catégories vides

                html += `<div class="category-title">${cat}</div>`;
                
                items.forEach(item => {
                    // On gère la description si elle existe (si le nom contient des sauts de ligne)
                    let parts = item.name.split('\n');
                    let nomPrincipal = parts[0];
                    let description = parts.length > 1 ? parts.slice(1).join('<br>') : '';
                    let prix = parseFloat(item.price || 0).toFixed(2);

                    // Si le produit est en rupture de stock
                    let isRupture = (item.stock !== undefined && item.stock <= 0);
                    let opacityStyle = isRupture ? 'opacity: 0.4;' : '';
                    let ruptureBadge = isRupture ? '<span style="color: red; font-size: 0.7rem; font-weight: bold; margin-left: 10px;">RUPTURE</span>' : '';

                    html += `
                    <div class="menu-item" style="${opacityStyle}">
                        <div class="menu-item-info">
                            <h4>${nomPrincipal} ${ruptureBadge}</h4>
                            ${description ? `<p>${description}</p>` : ''}
                        </div>
                        <div class="menu-item-price">${prix} ${currentCurrency}</div>
                    </div>`;
                });
            }

            if(html === '') html = "<p style='text-align:center;'>Le menu est en cours de mise à jour.</p>";
            container.innerHTML = html;
        }

        // 4. ENVOI DE LA RÉSERVATION AU SERVEUR iCHEF
        async function submitReservation() {
            const name = document.getElementById('res-name').value.trim();
            const date = document.getElementById('res-date').value;
            const time = document.getElementById('res-time').value;
            const pax = document.getElementById('res-pax').value;
            const phone = document.getElementById('res-phone').value.trim();

            if (!name || !date || !time || !pax || !phone) {
                alert("Veuillez remplir tous les champs.");
                return;
            }

            // Création de l'objet réservation
            const newRes = {
                id: Date.now(),
                clientName: name,
                date: date,
                time: time,
                guests: pax,
                phone: phone,
                status: "NOUVELLE", // Apparaîtra en clignotant sur l'iCHEF OS du restaurateur
                timestamp: new Date().toISOString()
            };

            // Ajout à la liste existante
            restaurantReservations.unshift(newRes);

            // Envoi furtif au serveur Render
            try {
                const btn = document.querySelector('.btn-submit');
                btn.innerText = "Envoi en cours...";
                btn.disabled = true;

                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tableId: 'RESERVATIONS',
                        order: { data: restaurantReservations }
                    })
                });

                alert(`🎉 Réservation envoyée ! Le restaurant ${tenantID.toUpperCase()} vous confirmera très vite.`);
                
                // Reset du formulaire
                document.getElementById('res-name').value = '';
                document.getElementById('res-phone').value = '';
                
                btn.innerText = "Demander une Réservation";
                btn.disabled = false;

            } catch (e) {
                alert("Erreur de connexion. Veuillez réessayer ou contacter le restaurant par téléphone.");
                document.querySelector('.btn-submit').innerText = "Demander une Réservation";
                document.querySelector('.btn-submit').disabled = false;
            }
        }

        // Démarrage
        window.addEventListener('DOMContentLoaded', bootSystem);
    </script>
</body>
</html>
