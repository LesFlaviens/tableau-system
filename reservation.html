<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conciergerie - EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --panel: #111; --border: #333; --text-main: #f8fafc;
            --text-muted: #888; --gold: #fbbf24; --gold-dim: rgba(251, 191, 36, 0.1);
            --accent: #34d399; --alert: #f87171;
        }

        body {
            background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px; box-sizing: border-box;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, var(--bg) 100%);
        }

        .booking-container { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 30px; width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-top: 60px; }
        .logo-area { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed var(--border); }
        .brand-name { color: var(--gold); font-size: 2.2rem; font-weight: 900; letter-spacing: 8px; text-transform: uppercase; margin: 0; }
        
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        input, textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; }
        
        .btn-submit { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.2s;}
        .btn-submit:active { transform: scale(0.98); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="booking-container" id="form-container">
        <div class="logo-area">
            <h1 class="brand-name">EMPIRE</h1>
            <div id="concierge-tag" style="color:var(--text-muted); letter-spacing:4px; text-transform:uppercase; font-size:0.7rem; margin-top:10px;">Conciergerie Officielle</div>
        </div>

        <div id="booking-form">
            <div class="form-group"><label>Date prévue</label><input type="date" id="res-date" required></div>
            <div class="form-group"><label>Heure</label><input type="time" id="res-time" required></div>
            <div class="form-group"><label>Nom du Client</label><input type="text" id="res-name" placeholder="M. Dupont" required></div>
            <div class="form-group"><label>Téléphone</label><input type="tel" id="res-phone" placeholder="06XXXXXXXX" required></div>
            <div class="form-group"><label>Nombre de couverts</label><input type="number" id="res-pax" value="2" min="1" required></div>
            <div class="form-group"><label>Notes (Allergies, anniversaire...)</label><textarea id="res-obs" rows="3"></textarea></div>
            <button class="btn-submit" id="main-btn" onclick="submitReservation()">Soumettre la demande</button>
        </div>
    </div>

    <script>
        // LE MÊME IDENTIFIANT QUE SUR ADMIN.HTML
        const tenantID = 'MASTER_STATE'; 
        const RENDER_URL = "https://tableau-system.onrender.com";

        async function submitReservation() {
            const btn = document.getElementById('main-btn');
            const date = document.getElementById('res-date').value;
            const time = document.getElementById('res-time').value;
            const name = document.getElementById('res-name').value.trim();
            const phone = document.getElementById('res-phone').value.trim();
            const pax = document.getElementById('res-pax').value;
            const obs = document.getElementById('res-obs').value.trim();

            if (!date || !time || !name || !phone || !pax) {
                return alert("Veuillez remplir tous les champs obligatoires.");
            }

            btn.innerText = "Envoi en cours...";
            btn.disabled = true;

            const resaData = {
                id: Date.now(),
                date: date,
                time: time,
                name: name,
                phone: phone,
                couverts: pax,
                obs: obs,
                status: 'pending',
                timestamp: new Date().toISOString()
            };

            try {
                // 1. Récupérer l'état actuel des réservations sur le serveur
                let response = await fetch(`${RENDER_URL}/get-current-state?tenantID=${tenantID}`);
                if (!response.ok) throw new Error("Erreur de connexion au serveur");
                let state = await response.json();
                
                let resas = [];
                // On fouille dans la structure de données pour trouver le coffre "RESERVATIONS_MASTER"
                if (state.activeOrders && state.activeOrders['RESERVATIONS_MASTER']) {
                    let rawData = state.activeOrders['RESERVATIONS_MASTER'];
                    // On gère les deux formats possibles (avec ou sans ".data")
                    if(rawData.data && Array.isArray(rawData.data)) {
                        resas = rawData.data;
                    } else if (Array.isArray(rawData)) {
                        resas = rawData;
                    }
                }

                // 2. Ajouter la nouvelle réservation
                resas.push(resaData);

                // 3. Sauvegarder sur le serveur, DANS LE MÊME FORMAT QUE L'ADMIN
                await fetch(`${RENDER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ 
                        tableId: 'RESERVATIONS_MASTER', 
                        order: { data: resas } 
                    })
                });

                // Confirmation client
                document.getElementById('booking-form').innerHTML = `
                    <div style="text-align:center; padding: 20px 0;">
                        <div style="font-size: 3rem; margin-bottom: 20px;">✅</div>
                        <h2 style="color:var(--gold); margin-bottom: 10px;">Demande transmise</h2>
                        <p style="color:var(--text-muted); line-height: 1.5;">Votre demande a bien été envoyée à notre direction. Vous recevrez une confirmation (ou un refus si nous sommes complets) par SMS très prochainement.</p>
                    </div>
                `;
            } catch (e) { 
                console.error("Erreur d'envoi", e);
                alert("Erreur serveur, veuillez réessayer plus tard.");
                btn.innerText = "Soumettre la demande";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
