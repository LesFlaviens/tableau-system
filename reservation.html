<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conciergerie - EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --bg: #050505; --panel: #111; --border: #333; --text-main: #f8fafc;
            --text-muted: #888; --gold: #fbbf24; --gold-dim: rgba(251, 191, 36, 0.1);
            --accent: #34d399; --alert: #f87171;
        }

        body {
            background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif;
            margin: 0; display: flex; justify-content: center; align-items: flex-start;
            min-height: 100vh; padding: 40px 20px; box-sizing: border-box;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, var(--bg) 100%);
        }

        /* 🟢 BOUTON RÉSERVÉ AU STAFF (GÉRANCE) 🟢 */
        #staff-back-btn {
            display: none; /* Masqué pour les clients */
            position: fixed; top: 20px; left: 20px;
            background: var(--panel); color: var(--gold); border: 2px solid var(--gold);
            padding: 12px 20px; border-radius: 8px; font-weight: 900;
            cursor: pointer; z-index: 9999; text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .booking-container { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 40px 30px; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .logo-area { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed var(--border); }
        .brand-name { color: var(--gold); font-size: 2.2rem; font-weight: 900; letter-spacing: 8px; text-transform: uppercase; margin: 0; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.85rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        input, textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text-main); padding: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; }
        .btn-submit { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <button id="staff-back-btn" onclick="window.location.href='gestionnaire.html'">⬅️ Retour Gestion</button>

    <div class="booking-container" id="main-content">
        <div class="logo-area">
            <h1 class="brand-name">EMPIRE</h1>
            <div style="color:var(--text-muted); letter-spacing:4px; text-transform:uppercase; font-size:0.7rem; margin-top:10px;">Conciergerie Officielle</div>
        </div>

        <div id="booking-form">
            <div class="form-group"><label>Date prévue</label><input type="date" id="res-date"></div>
            <div class="form-group"><label>Heure</label><input type="time" id="res-time"></div>
            <div class="form-group"><label>Nom du Client</label><input type="text" id="res-name" placeholder="M. Dupont"></div>
            <div class="form-group"><label>Téléphone de suivi</label><input type="tel" id="res-phone" placeholder="06XXXXXXXX"></div>
            <div class="form-group"><label>Couverts</label><input type="number" id="res-pax" value="2"></div>
            <div class="form-group"><label>Notes & Allergies</label><textarea id="res-obs"></textarea></div>
            <button class="btn-submit" onclick="submitReservation()">Valider la demande</button>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://tableau-system.onrender.com";
        const urlParams = new URLSearchParams(window.location.search);
        const IS_STAFF = urlParams.get('mode') === 'staff';

        // 🧠 AFFICHAGE DU BOUTON SI STAFF
        if (IS_STAFF) {
            document.getElementById('staff-back-btn').style.display = 'block';
        }

        async function submitReservation() {
            const resaData = {
                id: Date.now(),
                date: document.getElementById('res-date').value,
                time: document.getElementById('res-time').value,
                name: document.getElementById('res-name').value,
                phone: document.getElementById('res-phone').value,
                couverts: document.getElementById('res-pax').value,
                obs: document.getElementById('res-obs').value,
                status: 'pending',
                timestamp: new Date().toISOString()
            };

            if (!resaData.date || !resaData.name || !resaData.phone) return alert("Champs obligatoires manquants.");

            try {
                // Récupération des résas actuelles
                let response = await fetch(`${RENDER_URL}/get-current-state`);
                let state = await response.json();
                let resas = state.activeOrders['RESERVATIONS_MASTER'] ? state.activeOrders['RESERVATIONS_MASTER'].data : [];

                resas.push(resaData);

                // Envoi vers Render
                await fetch(`${RENDER_URL}/update-order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: 'RESERVATIONS_MASTER', order: {data: resas} })
                });

                alert("Demande enregistrée avec succès !");

                // 🚀 REDIRECTION DIFFÉRENCIÉE
                if (IS_STAFF) {
                    window.location.href = 'gestionnaire.html';
                } else {
                    window.location.reload();
                }

            } catch (e) {
                alert("Erreur de connexion au serveur Empire.");
            }
        }
    </script>
</body>
</html>
