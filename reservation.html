<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conciergerie - EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --border: #333;
            --text-main: #f8fafc;
            --text-muted: #888;
            --gold: #fbbf24;
            --gold-dim: rgba(251, 191, 36, 0.1);
            --accent: #34d399;
            --alert: #f87171;
            --shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, var(--bg) 100%);
        }

        /* 🟢 BOUTON RÉSERVÉ AUX COLLABORATEURS 🟢 */
        #staff-back-btn {
            display: none; /* Caché par défaut pour les clients */
            position: fixed;
            top: 20px;
            left: 20px;
            background: var(--panel);
            color: var(--gold);
            border: 2px solid var(--gold);
            padding: 12px 20px;
            border-radius: 8px;
            font-weight: 900;
            cursor: pointer;
            z-index: 9999;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .booking-container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: var(--shadow);
        }

        .logo-area { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed var(--border); }
        .brand-name { color: var(--gold); font-size: 2.2rem; font-weight: 900; letter-spacing: 8px; text-transform: uppercase; }
        
        /* [Tes styles de formulaire, tabs et boutons conservés à l'identique...] */
        .client-tabs { display: flex; gap: 10px; margin-bottom: 25px; }
        .client-tab { flex: 1; background: var(--bg); color: var(--text-muted); border: 1px solid var(--border); padding: 12px; text-align: center; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; }
        .client-tab.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        input, select, textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text-main); padding: 15px; border-radius: 8px; width: 100%; box-sizing: border-box; }
        .btn-submit { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>

    <button id="staff-back-btn" onclick="window.location.href='pad-serveur.html'">⬅️ Retour Service</button>

    <div class="booking-container">
        <div class="logo-area">
            <h1 class="brand-name">EMPIRE</h1>
            <div style="color:var(--text-muted); letter-spacing:4px; text-transform:uppercase; font-size:0.8rem; margin-top:10px;">Service Conciergerie</div>
        </div>

        <div class="client-tabs">
            <div class="client-tab active" onclick="switchView('book')" id="tab-book">Faire une demande</div>
            <div class="client-tab" onclick="switchView('track')" id="tab-track">Suivre ma demande</div>
        </div>

        <div id="view-book">
            <div class="form-group"><label>Date prévue</label><input type="date" id="res-date"></div>
            <div class="form-group"><label>Heure</label><input type="time" id="res-time"></div>
            <div class="form-group"><label>Nom</label><input type="text" id="res-name" placeholder="M. Dupont"></div>
            <div class="form-group"><label>Téléphone</label><input type="tel" id="res-phone" placeholder="06XXXXXXXX"></div>
            <div class="form-group"><label>Couverts</label><input type="number" id="res-pax" value="2"></div>
            <div class="form-group"><label>Notes spéciales</label><textarea id="res-obs"></textarea></div>
            <button class="btn-submit" onclick="submitReservation()">Soumettre la demande</button>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://tableau-system.onrender.com";

        // 🧠 LOGIQUE DE DÉTECTION STAFF
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('mode') === 'staff') {
            document.getElementById('staff-back-btn').style.display = 'block';
        }

        const API = {
            getState: async () => {
                let r = await fetch(`${RENDER_URL}/get-current-state`);
                return r.ok ? await r.json() : { activeOrders: {} };
            },
            update: async (key, data) => {
                await fetch(`${RENDER_URL}/update-order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: key, order: {data: data} })
                });
            }
        };

        async function submitReservation() {
            const state = await API.getState();
            let resas = state.activeOrders['RESERVATIONS_MASTER'] ? state.activeOrders['RESERVATIONS_MASTER'].data : [];
            
            const newResa = {
                id: Date.now(),
                date: document.getElementById('res-date').value,
                time: document.getElementById('res-time').value,
                name: document.getElementById('res-name').value,
                phone: document.getElementById('res-phone').value,
                couverts: document.getElementById('res-pax').value,
                obs: document.getElementById('res-obs').value,
                status: 'pending'
            };

            resas.push(newResa);
            await API.update('RESERVATIONS_MASTER', resas);
            alert("Demande envoyée au Maître d'Hôtel !");
            
            // Si c'est le staff qui a pris la résa, on le ramène au pad, sinon on recharge pour le client
            if (urlParams.get('mode') === 'staff') {
                window.location.href = 'gestionnaire.html';
            } else {
                window.location.reload();
            }
        }

        function switchView(view) { /* Ta logique de switch view conservée */ }
    </script>
</body>
</html>
