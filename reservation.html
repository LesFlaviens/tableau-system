<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Réserver - EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --border: #333;
            --text-main: #f8fafc;
            --text-muted: #888;
            --gold: #fbbf24;
            --gold-dim: rgba(251, 191, 36, 0.1);
            --accent: #34d399;
            --alert: #f87171;
        }

        body {
            background: var(--bg);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 20px;
            box-sizing: border-box;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, var(--bg) 100%);
        }

        .booking-container {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px 30px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .logo-area {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px dashed var(--border);
        }

        .brand-name {
            color: var(--gold);
            font-size: 2.2rem;
            font-weight: 900;
            letter-spacing: 8px;
            margin: 0;
            text-transform: uppercase;
        }

        .subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .form-group {
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label {
            font-size: 0.85rem;
            color: var(--text-muted);
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        input, select, textarea {
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 15px;
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
            width: 100%;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 2px var(--gold-dim);
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .row-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .btn-submit {
            background: var(--gold);
            color: #000;
            border: none;
            padding: 20px;
            width: 100%;
            font-size: 1.2rem;
            font-weight: 900;
            border-radius: 8px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 10px;
            transition: all 0.2s ease;
            box-shadow: 0 4px 15px rgba(251, 191, 36, 0.2);
        }

        .btn-submit:active {
            transform: scale(0.98);
            box-shadow: 0 2px 5px rgba(251, 191, 36, 0.2);
        }

        .btn-submit:disabled {
            background: var(--border);
            color: var(--text-muted);
            cursor: not-allowed;
            box-shadow: none;
        }

        .success-overlay {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: var(--bg);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }

        .success-overlay h2 {
            color: var(--gold);
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin-bottom: 10px;
        }

        .success-overlay p {
            color: var(--text-muted);
            font-size: 1.2rem;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="booking-container" id="booking-form">
        <div class="logo-area">
            <h1 class="brand-name">EMPIRE</h1>
            <div class="subtitle">Demande de Réservation</div>
        </div>

        <div class="row-group">
            <div class="form-group">
                <label>Date</label>
                <select id="res-date">
                    <option value="today" id="opt-today">Aujourd'hui</option>
                    <option value="tomorrow" id="opt-tomorrow">Demain</option>
                </select>
            </div>
            <div class="form-group">
                <label>Heure</label>
                <input type="time" id="res-time" required>
            </div>
        </div>

        <div class="form-group">
            <label>Nom de réservation</label>
            <input type="text" id="res-name" placeholder="Ex: Jean Dupont" required>
        </div>

        <div class="row-group">
            <div class="form-group">
                <label>Téléphone</label>
                <input type="tel" id="res-phone" placeholder="06 12 34 56 78" required>
            </div>
            <div class="form-group">
                <label>Personnes</label>
                <input type="number" id="res-pax" min="1" max="20" value="2" required>
            </div>
        </div>

        <div class="form-group">
            <label>Demandes Spéciales (Optionnel)</label>
            <textarea id="res-obs" placeholder="Allergies, anniversaire, poussette..."></textarea>
        </div>

        <button class="btn-submit" id="btn-submit" onclick="submitReservation()">CONFIRMER LA DEMANDE</button>
    </div>

    <div class="success-overlay" id="success-screen">
        <h2>CONFIRMÉ</h2>
        <p>Votre demande a été transmise à la direction.<br>L'Empire vous attend.</p>
        <button class="btn-submit" style="width: auto; padding: 15px 40px; margin-top: 30px;" onclick="window.location.reload()">NOUVELLE DEMANDE</button>
    </div>

    <script>
        // Initialisation des dates dans le menu déroulant
        const today = new Date();
        const tomorrow = new Date(today);
        tomorrow.setDate(tomorrow.getDate() + 1);

        const formatDateStr = (dateObj) => {
            const options = { weekday: 'long', day: 'numeric', month: 'long' };
            let str = dateObj.toLocaleDateString('fr-FR', options);
            return str.charAt(0).toUpperCase() + str.slice(1);
        };

        document.getElementById('opt-today').innerText = `Aujourd'hui (${formatDateStr(today)})`;
        document.getElementById('opt-today').value = today.toISOString().split('T')[0];
        
        document.getElementById('opt-tomorrow').innerText = `Demain (${formatDateStr(tomorrow)})`;
        document.getElementById('opt-tomorrow').value = tomorrow.toISOString().split('T')[0];

        // -----------------------------------------
        // API HYBRIDE (RÉSEAU + SYNCHRO LOCALE)
        // -----------------------------------------
        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    if (window.location.protocol !== 'file:') {
                        let r = await fetch('/get-current-state');
                        if(r.ok) state = await r.json();
                    } else throw new Error("Local");
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            },
            update: async (key, data) => {
                let payload = { data: data };
                
                // Sauvegarde Locale (Pont de Secours)
                let state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                if (data === null) delete state.activeOrders[key];
                else state.activeOrders[key] = payload;
                localStorage.setItem('EMPIRE_GLOBAL_SYNC', JSON.stringify(state));
                
                // Sauvegarde Serveur
                if (window.location.protocol !== 'file:') {
                    try {
                        await fetch('/update-order', { 
                            method: 'POST', 
                            headers: {'Content-Type': 'application/json'}, 
                            body: JSON.stringify({ tableId: key, order: data === null ? null : payload }) 
                        });
                    } catch(e) {}
                }
            }
        };

        async function submitReservation() {
            const btn = document.getElementById('btn-submit');
            
            // Récupération des valeurs
            const targetDate = document.getElementById('res-date').value;
            const time = document.getElementById('res-time').value;
            const name = document.getElementById('res-name').value.trim();
            const phone = document.getElementById('res-phone').value.trim();
            const pax = parseInt(document.getElementById('res-pax').value) || 2;
            const obs = document.getElementById('res-obs').value.trim();

            // Vérifications de base
            if (!time) return alert("Veuillez indiquer l'heure de votre arrivée.");
            if (!name) return alert("Veuillez indiquer un nom de réservation.");
            if (!phone) return alert("Veuillez indiquer un numéro de téléphone.");

            btn.disabled = true;
            btn.innerText = "TRAITEMENT...";

            try {
                // Récupère l'état actuel de l'Empire
                const state = await API.getState();
                
                // Vérification Blacklist (Optionnelle, préparée pour l'avenir)
                const blacklist = (state.activeOrders && state.activeOrders['GLOBAL_BLACKLIST']) ? state.activeOrders['GLOBAL_BLACKLIST'].data : [];
                if(blacklist.includes(name.toUpperCase())) {
                    btn.disabled = false;
                    btn.innerText = "CONFIRMER LA DEMANDE";
                    return alert("Désolé, nous ne pouvons pas accepter de réservation à ce nom actuellement.");
                }

                // Récupère les réservations existantes dans la base "Cerveau" du Pad
                let currentResas = (state.activeOrders && state.activeOrders['RESERVATIONS_MASTER']) ? state.activeOrders['RESERVATIONS_MASTER'].data : [];

                // Format de l'objet Réservation
                const newResa = {
                    id: Date.now(),
                    date: targetDate,
                    time: time,
                    name: name,
                    phone: phone,
                    couverts: pax,
                    obs: obs,
                    timestamp: new Date().toISOString()
                };

                // Ajout à la base
                currentResas.push(newResa);

                // Envoi de la mise à jour (Ciblage de la clé lue par les Pads Serveurs)
                await API.update('RESERVATIONS_MASTER', currentResas);

                // Affichage du succès
                document.getElementById('booking-form').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';

            } catch (error) {
                console.error(error);
                alert("Une erreur de communication est survenue. Veuillez réessayer.");
                btn.disabled = false;
                btn.innerText = "CONFIRMER LA DEMANDE";
            }
        }
    </script>
</body>
</html>
