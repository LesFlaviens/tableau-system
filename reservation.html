<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Réservation - EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; 
            --panel: rgba(20, 20, 20, 0.7); 
            --border: rgba(255, 255, 255, 0.1); 
            --text-main: #ffffff;
            --text-muted: #888888; 
            --gold: #d4af37; 
            --gold-dim: rgba(212, 175, 55, 0.15);
            --accent: #10b981; 
            --alert: #ef4444;
            --blur: blur(12px);
        }

        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at top, #1a1a1a 0%, #000000 100%);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 15px;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
        }

        /* ⚙️ BOUTON RETOUR ADMIN DISCRET ⚙️ */
        .admin-back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 15px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: 0.3s;
            z-index: 100;
        }
        .admin-back-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--gold);
            border-color: var(--gold);
        }

        /* ⛶ BOUTON KIOSQUE DISCRET ⛶ */
        .kiosk-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 100;
        }
        .kiosk-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: var(--gold);
            border-color: var(--gold);
        }

        .header { text-align: center; margin-bottom: 30px; margin-top: 20px; }
        .header h1 { color: var(--gold); font-size: 2.5rem; font-weight: 900; letter-spacing: 10px; text-transform: uppercase; margin: 0; }
        .header p { color: var(--text-muted); letter-spacing: 4px; text-transform: uppercase; font-size: 0.75rem; margin-top: 10px; font-weight: 600; }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--panel);
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 30px;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .section-title {
            font-size: 0.9rem;
            color: var(--text-main);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }

        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px; }
        input[type="text"], input[type="tel"], input[type="date"], input[type="time"], input[type="number"], select, textarea {
            width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--border);
            color: var(--text-main); border-radius: 12px; font-size: 1rem; font-family: 'Inter', sans-serif;
            box-sizing: border-box; outline: none; transition: 0.3s;
            appearance: none;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }

        .flex-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .flex-row > div { flex: 1; margin-bottom: 0; }

        .btn-submit {
            background: var(--gold); color: #000; border: none; padding: 20px; width: 100%;
            font-weight: 900; font-size: 1.1rem; border-radius: 12px; cursor: pointer;
            text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; margin-top: 10px;
            box-shadow: 0 10px 20px var(--gold-dim);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 15px 25px rgba(212, 175, 55, 0.3); }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .success-view { text-align: center; padding: 40px 10px; display: none; flex-direction: column; align-items: center; }
        .success-icon { width: 80px; height: 80px; background: var(--gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 40px; color: #000; margin-bottom: 20px; box-shadow: 0 0 30px var(--gold-dim); animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes popIn { 0% { transform: scale(0); } 100% { transform: scale(1); } }
        
        @media (max-width: 480px) {
            .app-container { padding: 20px; border-radius: 16px; border: none; box-shadow: none; background: transparent; }
            body { background: var(--bg); }
            .admin-back-btn { top: 10px; left: 10px; padding: 8px 12px; font-size: 0.7rem; }
            .kiosk-btn { top: 10px; right: 10px; padding: 8px 12px; font-size: 0.7rem; }
        }
    </style>
</head>
<body>

    <a href="admin.html" class="admin-back-btn">⚙️ Admin</a>
    <button id="btn-kiosk" class="kiosk-btn">⛶ Kiosque</button>

    <div class="header">
        <h1>EMPIRE</h1>
        <p>Conciergerie</p>
    </div>

    <div class="app-container" id="app-box">
        <div id="booking-form">
            
            <div class="section-title">👤 Vos Couverts</div>
            <div class="input-group">
                <label>Nombre de convives :</label>
                <input type="number" id="res-pax" value="2" min="1" required>
            </div>

            <div class="section-title" style="margin-top: 30px;">📅 Date et Heure</div>
            
            <div class="flex-row">
                <div class="input-group">
                    <label>Date</label>
                    <input type="date" id="res-date" required>
                </div>
                <div class="input-group">
                    <label>Heure exacte</label>
                    <input type="time" id="res-time" value="20:00" required>
                </div>
            </div>

            <div class="section-title" style="margin-top: 30px;">📝 Vos Informations</div>
            
            <div class="input-group">
                <label>Nom et Prénom</label>
                <input type="text" id="res-name" placeholder="Ex: Jean Dupont" required>
            </div>
            
            <div class="input-group">
                <label>Numéro de Téléphone (Pour confirmation SMS)</label>
                <input type="tel" id="res-phone" placeholder="06 XX XX XX XX" required>
            </div>

            <div class="input-group">
                <label>Occasion (Optionnel)</label>
                <select id="res-event">
                    <option value="">-- Réservation Classique --</option>
                    <option value="Petit-déjeuner">🥐 Petit-déjeuner</option>
                    <option value="Anniversaire">🎂 Anniversaire</option>
                    <option value="Rendez-vous Romantique">🥂 Rendez-vous Romantique</option>
                    <option value="Repas d'Affaires">💼 Repas d'Affaires</option>
                    <option value="Événement Spécial">✨ Autre événement</option>
                </select>
            </div>

            <div class="input-group">
                <label>Demande spéciale / Allergies</label>
                <textarea id="res-obs" rows="2" placeholder="Une allergie ? Une préférence de table ? Dites-nous tout..."></textarea>
            </div>

            <button class="btn-submit" id="main-btn" onclick="submitReservation()">Demander ma table</button>
        </div>

        <div id="success-screen" class="success-view">
            <div class="success-icon">✓</div>
            <h2 style="color:var(--gold); font-size: 2rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;">Demande Envoyée</h2>
            <p style="color:var(--text-muted); line-height: 1.6; font-size: 1.1rem; max-width: 400px; margin: 0 auto;">
                L'équipe de l'Empire a bien reçu votre demande de réservation.<br><br>
                Notre Maître d'Hôtel va traiter votre demande. <b>Vous recevrez très vite un SMS de confirmation.</b>
            </p>
        </div>
    </div>

    <script>
        const tenantID = 'MASTER_STATE'; 
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
    ? "http://localhost:10000" 
    : "https://tableau-system.onrender.com";

        // Moteur de communication standardisé de l'Empire
        const API = {
            getState: async () => {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                if (!r.ok) throw new Error("Serveur injoignable");
                return await r.json();
            },
            update: async (key, data) => {
                try { 
                    await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ tableId: key, order: { data: data } }) // Standardisation { data: ... }
                    }); 
                } catch(e) { console.error("Erreur Sync:", e); }
            }
        };

        // Initialisation de la date au jour même
        document.getElementById('res-date').valueAsDate = new Date();
        document.getElementById('res-date').min = new Date().toISOString().split("T")[0];

        async function submitReservation() {
            const btn = document.getElementById('main-btn');
            const date = document.getElementById('res-date').value;
            const time = document.getElementById('res-time').value;
            const name = document.getElementById('res-name').value.trim();
            const phone = document.getElementById('res-phone').value.trim();
            const pax = document.getElementById('res-pax').value;
            const eventType = document.getElementById('res-event').value;
            const rawObs = document.getElementById('res-obs').value.trim();

            if (!date || !time || !name || !phone || pax <= 0) {
                return alert("Veuillez renseigner votre Nom, votre Téléphone, le nombre de couverts et choisir une Date.");
            }

            btn.innerText = "Validation en cours...";
            btn.disabled = true;

            let finalObs = rawObs;
            if (eventType) {
                finalObs = `[${eventType.toUpperCase()}] ${rawObs}`;
            }

            const resaData = {
                id: Date.now(),
                date: date,
                time: time,
                name: name,
                phone: phone,
                couverts: pax,
                obs: finalObs.trim(),
                status: 'pending',
                timestamp: new Date().toISOString()
            };

            try {
                let state = await API.getState();
                
                let resas = [];
                if (state.activeOrders && state.activeOrders['RESERVATIONS_MASTER']) {
                    let rawData = state.activeOrders['RESERVATIONS_MASTER'];
                    if (Array.isArray(rawData)) resas = rawData;
                    else if (rawData.data && Array.isArray(rawData.data)) resas = rawData.data;
                }

                resas.push(resaData);

                // Envoi des données via le moteur API standard
                await API.update('RESERVATIONS_MASTER', resas);

                document.getElementById('booking-form').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';
                
            } catch (e) { 
                console.error("Erreur détaillée :", e);
                alert("Une erreur de communication est survenue. Veuillez réessayer.");
                btn.innerText = "Demander ma table";
                btn.disabled = false;
            }
        }

        // ⛶ LOGIQUE DU MODE KIOSQUE
        document.getElementById('btn-kiosk').addEventListener('click', () => {
            const elem = document.documentElement;
            const btn = document.getElementById('btn-kiosk');
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen(); 
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen(); 
                btn.innerText = "Quitter Kiosque";
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                btn.innerText = "⛶ Kiosque";
            }
        });

        document.addEventListener('fullscreenchange', () => {
            const btn = document.getElementById('btn-kiosk');
            if (!document.fullscreenElement) {
                btn.innerText = "⛶ Kiosque";
            }
        });
    </script>
</body>
</html>
