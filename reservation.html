<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Conciergerie - EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --panel: #111; --border: #333; --text-main: #f8fafc;
            --text-muted: #888; --gold: #fbbf24; --gold-dim: rgba(251, 191, 36, 0.1);
            --accent: #34d399; --alert: #f87171;
        }

        body {
            background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif;
            margin: 0; display: flex; flex-direction: column; align-items: center;
            min-height: 100vh; padding: 20px; box-sizing: border-box;
            background-image: radial-gradient(circle at top, #1a1a1a 0%, var(--bg) 100%);
        }

        #staff-back-btn {
            display: none; position: fixed; top: 20px; left: 20px;
            background: var(--panel); color: var(--gold); border: 2px solid var(--gold);
            padding: 12px 20px; border-radius: 8px; font-weight: 900;
            cursor: pointer; z-index: 9999; text-transform: uppercase;
        }

        .booking-container { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 30px; width: 100%; max-width: 500px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); margin-top: 60px; }
        .logo-area { text-align: center; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px dashed var(--border); }
        .brand-name { color: var(--gold); font-size: 2.2rem; font-weight: 900; letter-spacing: 8px; text-transform: uppercase; margin: 0; }
        
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        input, textarea { background: var(--bg); border: 1px solid var(--border); color: var(--text-main); padding: 12px; border-radius: 8px; width: 100%; box-sizing: border-box; outline: none; }
        
        .btn-submit { background: var(--gold); color: #000; border: none; padding: 15px; width: 100%; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; }

        /* --- VUE STAFF : TABLEAU DE BORD --- */
        #staff-dashboard { display: none; width: 100%; max-width: 800px; margin-top: 20px; }
        .resa-card { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 15px; border-left: 4px solid var(--gold); position: relative; }
        .resa-card.confirmed { border-left-color: var(--accent); }
        .resa-card.rejected { border-left-color: var(--alert); opacity: 0.6; }
        
        .resa-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .resa-name { font-size: 1.2rem; font-weight: 900; color: var(--gold); text-transform: uppercase; }
        .resa-status { font-size: 0.7rem; font-weight: 900; padding: 4px 8px; border-radius: 4px; background: var(--gold-dim); }
        
        .resa-details { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px; line-height: 1.5; }
        .resa-actions { display: flex; gap: 10px; }
        
        .btn-action { flex: 1; padding: 10px; border-radius: 6px; font-weight: bold; cursor: pointer; border: 1px solid; text-transform: uppercase; font-size: 0.7rem; transition: 0.2s; }
        .btn-ok { background: rgba(52, 211, 153, 0.1); color: var(--accent); border-color: var(--accent); }
        .btn-ok:hover { background: var(--accent); color: #000; }
        .btn-no { background: rgba(248, 113, 113, 0.1); color: var(--alert); border-color: var(--alert); }
        .btn-no:hover { background: var(--alert); color: #000; }
        .btn-wa { background: #25D366; color: #fff; border: none; }
    </style>
</head>
<body>

    <button id="staff-back-btn" onclick="window.location.href='gestionnaire.html'">⬅️ Retour Gestion</button>

    <div class="booking-container" id="form-container">
        <div class="logo-area">
            <h1 class="brand-name">EMPIRE</h1>
            <div id="concierge-tag" style="color:var(--text-muted); letter-spacing:4px; text-transform:uppercase; font-size:0.7rem; margin-top:10px;">Conciergerie Officielle</div>
        </div>

        <div id="booking-form">
            <div class="form-group"><label>Date prévue</label><input type="date" id="res-date"></div>
            <div class="form-group"><label>Heure</label><input type="time" id="res-time"></div>
            <div class="form-group"><label>Nom du Client</label><input type="text" id="res-name" placeholder="M. Dupont"></div>
            <div class="form-group"><label>Téléphone</label><input type="tel" id="res-phone" placeholder="06XXXXXXXX"></div>
            <div class="form-group"><label>Couverts</label><input type="number" id="res-pax" value="2"></div>
            <div class="form-group"><label>Notes & Allergies</label><textarea id="res-obs"></textarea></div>
            <button class="btn-submit" id="main-btn" onclick="submitReservation()">Valider la demande</button>
        </div>
    </div>

    <div id="staff-dashboard">
        <h2 style="color:var(--gold); text-align:center; text-transform:uppercase; letter-spacing:4px;">Registre des Demandes</h2>
        <div id="resa-list"></div>
    </div>

    <script>
        const RENDER_URL = "https://tableau-system.onrender.com";
        const urlParams = new URLSearchParams(window.location.search);
const IS_STAFF = urlParams.get('mode') === 'staff';

// Si c'est le Chef, on affiche le bouton retour et le tableau de bord secret
if (IS_STAFF) {
    document.getElementById('staff-back-btn').style.display = 'block';
    // On peut aussi masquer le formulaire client pour gagner de la place
    document.getElementById('booking-form').style.display = 'none'; 
    document.getElementById('staff-dashboard').style.display = 'block';
    loadStaffDashboard();
}

        async function submitReservation() {
            const resaData = {
                id: Date.now(),
                date: document.getElementById('res-date').value,
                time: document.getElementById('res-time').value,
                name: document.getElementById('res-name').value,
                phone: document.getElementById('res-phone').value,
                couverts: document.getElementById('res-pax').value,
                obs: document.getElementById('res-obs').value,
                status: 'pending',
                timestamp: new Date().toISOString()
            };

            if (!resaData.date || !resaData.name || !resaData.phone) return alert("Champs obligatoires manquants.");

            try {
                let state = await (await fetch(`${RENDER_URL}/get-current-state`)).json();
                let resas = state.activeOrders['RESERVATIONS_MASTER'] ? state.activeOrders['RESERVATIONS_MASTER'].data : [];
                resas.push(resaData);

                await fetch(`${RENDER_URL}/update-order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: 'RESERVATIONS_MASTER', order: {data: resas} })
                });

                alert("Opération réussie.");
                location.reload();
            } catch (e) { alert("Erreur serveur."); }
        }

        async function loadStaffDashboard() {
            const list = document.getElementById('resa-list');
            try {
                let state = await (await fetch(`${RENDER_URL}/get-current-state`)).json();
                let resas = state.activeOrders['RESERVATIONS_MASTER'] ? state.activeOrders['RESERVATIONS_MASTER'].data : [];

                if (resas.length === 0) {
                    list.innerHTML = "<p style='text-align:center; color:var(--text-muted);'>Aucune demande.</p>";
                    return;
                }

                // Tri : Pending en premier, puis par date
                resas.sort((a,b) => (a.status === 'pending' ? -1 : 1));

                list.innerHTML = resas.map(r => `
                    <div class="resa-card ${r.status}">
                        <div class="resa-header">
                            <span class="resa-name">${r.name}</span>
                            <span class="resa-status">${r.status.toUpperCase()}</span>
                        </div>
                        <div class="resa-details">
                            📅 ${r.date} à ${r.time} — 👥 ${r.couverts} Pers.<br>
                            📞 ${r.phone} <br>
                            ${r.obs ? `⚠️ ${r.obs}` : ''}
                        </div>
                        <div class="resa-actions">
                            ${r.status === 'pending' ? `
                                <button class="btn-action btn-ok" onclick="updateStatus(${r.id}, 'confirmed')">Confirmer</button>
                                <button class="btn-action btn-no" onclick="updateStatus(${r.id}, 'rejected')">Refuser</button>
                            ` : ''}
                            <button class="btn-action btn-wa" onclick="sendWhatsApp('${r.phone}', '${r.name}', '${r.date}', '${r.time}', '${r.status}')">WhatsApp</button>
                            <button class="btn-action" style="flex:0.3; border-color:var(--border);" onclick="deleteResa(${r.id})">🗑️</button>
                        </div>
                    </div>
                `).join('');
            } catch(e) { console.error("Sync error"); }
        }

        async function updateStatus(id, newStatus) {
            let state = await (await fetch(`${RENDER_URL}/get-current-state`)).json();
            let resas = state.activeOrders['RESERVATIONS_MASTER'].data;
            let idx = resas.findIndex(r => r.id === id);
            if (idx > -1) {
                resas[idx].status = newStatus;
                await fetch(`${RENDER_URL}/update-order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: 'RESERVATIONS_MASTER', order: {data: resas} })
                });
                loadStaffDashboard();
            }
        }

        async function deleteResa(id) {
            if(!confirm("Supprimer définitivement ?")) return;
            let state = await (await fetch(`${RENDER_URL}/get-current-state`)).json();
            let resas = state.activeOrders['RESERVATIONS_MASTER'].data.filter(r => r.id !== id);
            await fetch(`${RENDER_URL}/update-order`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tableId: 'RESERVATIONS_MASTER', order: {data: resas} })
            });
            loadStaffDashboard();
        }

        function sendWhatsApp(phone, name, date, time, status) {
            let msg = status === 'confirmed' 
                ? `Bonjour ${name}, votre réservation à l'EMPIRE pour le ${date} à ${time} est validée. À très bientôt !`
                : `Bonjour ${name}, nous ne pouvons malheureusement pas confirmer votre table pour le ${date}. Merci de votre compréhension.`;
            let cleanPhone = phone.replace(/\s+/g, '').replace(/^0/, '+33');
            window.open(`https://wa.me/${cleanPhone}?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
