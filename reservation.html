<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Réserver - EMPIRE</title></head>
<body style="background:#050505; color:#fff; font-family:sans-serif; text-align:center; padding:50px;">
    <h1>RÉSERVATION LIVE</h1>
    <input type="text" id="res-name" placeholder="VOTRE NOM" style="padding:15px; width:80%; margin-bottom:10px;"><br>
    <input type="time" id="res-time" style="padding:15px; width:80%; margin-bottom:10px;"><br>
    <button onclick="submitRes()" style="padding:20px; width:85%; background:#ffb300; border:none; font-weight:900;">RÉSERVER MA TABLE</button>
    <script>
        async function submitRes() {
            const name = document.getElementById('res-name').value.toUpperCase().trim();
            const time = document.getElementById('res-time').value;
            const res = await fetch('/get-current-state'); const state = await res.json();
            const blacklist = state.activeOrders['GLOBAL_BLACKLIST'] ? state.activeOrders['GLOBAL_BLACKLIST'].data : [];
            if(blacklist.includes(name)) return alert("Complet pour cette période.");
            
            const date = new Date().toISOString().split('T')[0];
            let currentResas = state.activeOrders['GLOBAL_RESERVATIONS'] ? state.activeOrders['GLOBAL_RESERVATIONS'].data : {};
            if(!currentResas[date]) currentResas[date] = [];
            currentResas[date].push({ name, time, pax: 2 });

            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:'GLOBAL_RESERVATIONS', order:{status:'system', data:currentResas}})});
            alert("Confirmé. L'Empire vous attend.");
        }
    </script>
</body>
</html>
