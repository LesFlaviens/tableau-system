<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Empire OS - Portail Équipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        /* 💎 DESIGN SOMBRE & ÉLÉGANT (EMPIRE OS) 💎 */
        :root { 
            --bg: #050505; 
            --panel: #0a0a0a; 
            --border: rgba(250, 240, 230, 0.15); 
            --text-main: #FAF0E6; 
            --text-muted: #8A857D; 
            --gold: #C5A059; 
            --gold-dim: rgba(197, 160, 89, 0.15);
            --alert: #D9534F;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            background-image: radial-gradient(circle at 50% 0%, var(--panel) 0%, var(--bg) 100%);
        }

        .login-card {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold);
            margin: 0 0 5px 0;
            letter-spacing: 3px;
        }

        .logo-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 15px;
            border-radius: 6px;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            text-align: center;
            letter-spacing: 2px;
        }

        .input-field:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 2px var(--gold-dim);
        }

        .btn-submit {
            background: linear-gradient(135deg, #C5A059, #a3803f);
            color: #000;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
            margin-top: 10px;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        #error-msg {
            color: var(--alert);
            font-size: 0.85rem;
            margin-top: 15px;
            min-height: 20px;
            font-weight: 500;
        }

        .loader {
            display: none;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <div class="login-card">
        <h1 class="logo-title">iCHEF</h1>
        <div class="logo-subtitle">Portail Équipe</div>

        <div class="input-group">
            <label>Identifiant Restaurant</label>
            <input type="text" id="tenant-id" class="input-field" placeholder="Ex: MONRESTO24" autocomplete="off" autocorrect="off" autocapitalize="off">
        </div>

        <div class="input-group">
            <label>Code PIN Employé</label>
            <input type="password" id="pin-code" class="input-field" placeholder="••••" pattern="[0-9]*" inputmode="numeric" maxlength="6">
        </div>

        <button class="btn-submit" id="btn-login" onclick="attemptLogin()">
            <span id="btn-text">Se Connecter</span>
            <div id="btn-loader" class="loader"></div>
        </button>

        <div id="error-msg"></div>
    </div>

    <script>
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        // Pré-remplir l'ID du restaurant s'il est déjà connu dans la mémoire de l'appareil
        window.onload = () => {
            let savedTenant = localStorage.getItem('ichef_tenant_id');
            if (savedTenant) {
                document.getElementById('tenant-id').value = savedTenant;
                document.getElementById('pin-code').focus();
            }
        };

        // Permettre de valider avec la touche "Entrée" du clavier
        document.getElementById('pin-code').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') attemptLogin();
        });

        async function attemptLogin() {
            const tenantID = document.getElementById('tenant-id').value.trim().toUpperCase();
            const pin = document.getElementById('pin-code').value.trim();
            const errorBox = document.getElementById('error-msg');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');

            errorBox.innerText = "";

            if (!tenantID || !pin) {
                errorBox.innerText = "Veuillez remplir les deux champs.";
                return;
            }

            // Animation de chargement
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';

            try {
                // 1. On va chercher la base de données de l'établissement
                let rState = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                
                if (!rState.ok) {
                    throw new Error("Restaurant introuvable.");
                }

                let stateData = await rState.json();
                
                // Si la base est vide (le restaurant n'existe pas vraiment)
                if (!stateData || Object.keys(stateData).length === 0) {
                    throw new Error("Identifiant Restaurant incorrect.");
                }

                // 2. On récupère la Brigade et le Planning
                let staffList = (stateData.activeOrders && stateData.activeOrders['STAFF_ACCESS']) ? stateData.activeOrders['STAFF_ACCESS'].data : [];
                let timesheets = (stateData.activeOrders && stateData.activeOrders['TIMESHEETS_MASTER']) ? stateData.activeOrders['TIMESHEETS_MASTER'].data : {};

                // Vérification si c'est le code MASTER du Patron
                let isMasterPin = false;
                try {
                    const resVerify = await fetch(`${SERVER_URL}/api/verify-pin`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ tenantID: tenantID, pin: pin })
                    });
                    const dataVerify = await resVerify.json();
                    if(dataVerify.success) isMasterPin = true;
                } catch(e) {}

                let targetPage = '';

                if (isMasterPin) {
                    // Si c'est le patron, on l'envoie sur le panneau d'administration total
                    targetPage = 'administration.html';
                } else {
                    // 3. On cherche l'employé dans la liste
                    let matchedStaff = staffList.find(s => s.pin === pin);

                    if (!matchedStaff) {
                        throw new Error("Code PIN invalide.");
                    }
                    if (matchedStaff.active === false) {
                        throw new Error("Votre compte est actuellement suspendu.");
                    }

                    // 4. On vérifie son rôle pour AUJOURD'HUI dans le planning
                    let dailyPoste = matchedStaff.dept; // Son poste de base (Cuisine, Salle, etc.)
                    const today = new Date();
                    const monthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
                    const day = today.getDate();
                    
                    if (timesheets && timesheets[monthStr] && timesheets[monthStr][matchedStaff.id] && timesheets[monthStr][matchedStaff.id][day]) {
                        if (timesheets[monthStr][matchedStaff.id][day].poste) {
                            dailyPoste = timesheets[monthStr][matchedStaff.id][day].poste;
                        }
                    }

                    // 5. L'AIGUILLEUR : On le redirige vers le bon écran selon son poste du jour
                    if (dailyPoste === 'admin') targetPage = 'administration.html';
                    else if (dailyPoste === 'salle') targetPage = 'pack-eco.html';
                    else if (dailyPoste === 'cuisine') targetPage = 'chef.html';
                    else if (dailyPoste === 'patisserie') targetPage = 'chef-patissier.html';
                    else if (dailyPoste === 'bar') targetPage = 'chef-bar.html';
                    else targetPage = 'pack-eco.html'; // Sécurité par défaut
                }

                // 6. Succès ! On sauvegarde les accès dans son téléphone et on le redirige
                localStorage.setItem('ichef_tenant_id', tenantID);
                localStorage.setItem('ichef_master_pin', pin);

                window.location.href = `${targetPage}?tenantID=${tenantID}`;

            } catch (error) {
                // Remettre le bouton à la normale en cas d'erreur
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
                errorBox.innerText = error.message || "Erreur de connexion. Réessayez.";
            }
        }
    </script>
</body>
</html>
