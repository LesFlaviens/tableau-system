<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine (Monochrome)</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 20px 40px; font-size: 1.5rem; font-weight: 900; background: #fff; color: #000; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #production-area { flex: 1; padding: 30px; overflow-y: auto; position: relative; width: 100%; box-sizing: border-box;}
        
        .header-container { position: relative; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px; margin-bottom: 30px; }
        .header-title { color: var(--text); font-size: 2rem; font-weight: 900; text-transform: uppercase; margin: 0; display: flex; align-items: center;}
        #pending-count { color: var(--sub); font-weight: 400; font-size: 1.2rem; margin-left: 20px; text-transform: none; }
        
        .brand-watermark { position: absolute; left: 50%; transform: translateX(-50%); font-family: 'Arial', sans-serif; font-style: italic; font-size: 1.4rem; color: #fff; font-weight: bold; pointer-events: none; }
        
        .top-nav { display: flex; gap: 15px; }
        .btn-top { background: transparent; border: 1px solid var(--line); color: var(--text); border-radius: 6px; padding: 8px 15px; cursor: pointer; text-transform: uppercase; font-weight: 600; font-size: 0.75rem; display: flex; flex-direction: column; align-items: center; gap: 5px; transition: 0.2s; min-width: 80px; }
        .btn-top i { font-size: 1.2rem; font-style: normal; }
        .btn-top:hover { background: #fff; color: #000; }

        .grid-wrapper { border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        .ticket-wire { border: 1px solid var(--line); border-radius: 8px; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: #050505; }
        .tw-header { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
        .tw-head-title { background: var(--line); color: #000; font-weight: 900; text-align: center; padding: 6px; border-right: 1px solid #000; font-size: 0.85rem;}
        .tw-head-title:last-child { border-right: none; }
        .tw-head-val { text-align: center; padding: 10px; font-weight: bold; font-size: 1.1rem; border-top: 1px solid var(--line); border-right: 1px solid var(--line);}
        .tw-head-val:last-child { border-right: none; }

        .tw-section { display: flex; flex-direction: column; }
        .tw-sec-title { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 1px;}
        .tw-sec-box { border: 1px solid var(--line); min-height: 40px; border-radius: 4px; padding: 5px; display: flex; flex-direction: column; justify-content: center;}
        
        .tw-item { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(255,255,255,0.3); padding: 6px 4px; font-size: 1rem; font-weight: bold;}
        .tw-item:last-child { border-bottom: none; }
        .qty-badge { display: inline-block; min-width: 25px; text-align: right; margin-right: 8px; font-size: 1.2rem; font-weight: 900; }

        .tw-total { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-top: 5px; }
        .tw-total span { font-weight: bold; font-size: 0.8rem; }
        .tw-total-val { border: 1px solid var(--line); padding: 5px 25px; border-radius: 4px; font-weight: bold; }

        .btn-wire { background: transparent; border: 1px solid var(--line); color: var(--line); padding: 8px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; font-size: 0.8rem; transition: 0.2s;}
        .btn-wire:hover { background: #fff; color: #000; }
        .btn-wire.send { grid-column: 1 / -1; background: #fff; color: #000; font-weight: 900;}
        .btn-wire.send:active { transform: scale(0.98); }
        .obs-banner { border: 1px solid #fff; padding: 8px; font-weight: bold; font-size: 0.8rem; text-align: center; margin-bottom: -5px; text-transform: uppercase; }

        /* TIROIRS ET SECTIONS DATA */
        .drawer { position: absolute; left: 0; top: 0; width: 450px; height: 100%; background: #050505; border-right: 1px solid #fff; padding: 30px; z-index: 8000; box-sizing: border-box; overflow-y: auto; transform: translateX(-100%); transition: 0.3s; }
        .drawer.open { transform: translateX(0); }
        #gestion-drawer, #cmd-drawer { width: 100vw; max-width: 100%; z-index: 8500; border-right: none; padding: 40px; }
        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: transparent; border: 1px solid #fff; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
        .btn-close-drawer:hover { background: #fff; color: #000; }
        
        .input-field { width: 100%; background: #000; border: 1px solid #fff; color: #fff; padding: 12px; border-radius: 4px; margin-bottom: 15px; font-family: inherit; box-sizing: border-box;}
        .btn-action { padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; border: 1px solid #fff; background: transparent; color: #fff;}
        .btn-action:hover { background: #fff; color: #000;}
        
        .res-card, .haccp-card, .history-ticket, .cmd-supp-card, .staff-plan-card { border: 1px solid #fff; padding: 15px; margin-bottom: 12px; border-radius: 4px; background: #000; }
        .history-ticket h3 { margin: 0 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .history-items { list-style: none; padding: 0; margin: 0 0 15px 0; color: #aaa; text-decoration: line-through; font-size: 0.9rem;}
        .history-items li { margin-bottom: 5px; }

        /* Grilles internes tiroirs */
        .mega-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; height: calc(100vh - 180px); overflow-y: auto; padding-right: 10px; }
        #cmd-list-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; align-items: start; }
        
        /* Planning */
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-top: 10px; }
        .mini-day { background: #000; padding: 8px 2px; border-radius: 4px; text-align: center; border: 1px solid #555; display: flex; flex-direction: column; justify-content: flex-start; min-height: 55px;}
        .mini-day b { display: block; color: #aaa; margin-bottom: 5px; font-size: 0.6rem; text-transform: uppercase;}
        
        /* Recipe Modal */
        #recipe-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; padding: 40px; box-sizing: border-box; align-items: center;}
        .recipe-paper { background: #000; width: 100%; max-width: 800px; height: 100%; border-radius: 4px; padding: 40px; box-sizing: border-box; overflow-y: auto; border: 1px solid #fff; position: relative; }
        
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding: 12px 0; font-size: 1.1rem; font-weight: bold; align-items: center; }
        .stat-count { border: 1px solid #fff; padding: 4px 12px; border-radius: 4px; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px;">Kitchen Display System</h1>
        <button onclick="initSystem()">Démarrer le Service</button>
    </div>

    <div id="recipe-modal">
        <div class="recipe-paper">
            <button class="btn-close-drawer" style="top:20px; right:20px; position:absolute;" onclick="closeRecipeModal()">✕</button>
            <h2 id="modal-recipe-title" style="color:#fff; font-size:2.5rem; margin-top:0; text-transform:uppercase; border-bottom:2px solid #fff; padding-bottom:15px;">Titre</h2>
            <pre id="modal-recipe-content" style="white-space: pre-wrap; font-family: 'Inter', sans-serif; font-size: 1.2rem; line-height: 1.6; color: #ccc;">Contenu</pre>
        </div>
    </div>

    <div id="production-area">
        
        <div id="history-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('history-drawer')">✕</button>
            <h2 style="border-bottom: 1px solid #fff; padding-bottom: 10px;">HISTORIQUE</h2>
            <div id="history-container"></div>
        </div>

        <div id="staff-drawer" class="drawer" style="width: 550px;">
            <button class="btn-close-drawer" onclick="closeDrawer('staff-drawer')">✕</button>
            <h2 style="border-bottom: 1px solid #fff; padding-bottom: 10px; text-transform: uppercase;">PLANNING BRIGADE</h2>
            <div id="staff-planning-container"></div>
        </div>

        <div id="res-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('res-drawer')">✕</button>
            <h2 style="border-bottom: 1px solid #fff; padding-bottom: 10px;">PRÉVISIONS</h2>
            <input type="date" id="kitchen-resa-date" class="input-field" onchange="renderResDrawer()">
            <div id="res-list-container"></div>
        </div>

        <div id="cmd-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('cmd-drawer')">✕</button>
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #fff; padding-bottom: 15px; margin-bottom: 20px;">
                <h2 style="margin:0; text-transform: uppercase;">GESTION DES ACHATS</h2>
                <button onclick="clearCommandes()" class="btn-action" style="border-style:dashed;">PURGER</button>
            </div>
            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <textarea id="cmd-text" class="input-field" style="height:60px; resize:none; margin:0;" placeholder="Dictez ou tapez votre liste..."></textarea>
                <button onclick="addCommande()" class="btn-action" style="height:60px;">+ AJOUTER</button>
            </div>
            <div id="cmd-list-container"></div>
        </div>

        <div id="gestion-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('gestion-drawer')">✕</button>
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid #fff; padding-bottom: 15px; margin-bottom: 20px;">
                <h2 style="margin:0; text-transform: uppercase;">DASHBOARD HACCP & DATA</h2>
                <button id="btn-unlock-gestion" class="btn-action" onclick="enableGestionMode()">🔒 DÉVERROUILLER</button>
            </div>
            <div id="chef-secure-zone" style="display:none; margin-bottom:20px;">
                <button onclick="window.location.href='rh.html'" class="btn-action" style="width:100%; background:#fff; color:#000;">ACCÈS BUREAU DU CHEF</button>
            </div>
            
            <div class="mega-grid">
                <div>
                    <h3 style="text-transform: uppercase; font-size: 1.2rem;">RELEVÉS SANITAIRES</h3>
                    <div class="haccp-card">
                        <h3 style="margin-top:0; border-bottom:1px solid #333; padding-bottom:10px; font-size:0.9rem;">Températures</h3>
                        <input type="text" id="haccp-equip" class="input-field" placeholder="Ex: Chambre Froide...">
                        <input type="number" id="haccp-temp" class="input-field" step="0.1" placeholder="Ex: 3.5 (°C)">
                        <button onclick="saveHaccpLog('Température')" class="btn-action" style="width:100%;">ENREGISTRER</button>
                    </div>
                    <div style="border: 1px solid #fff; padding: 15px; border-radius: 4px;">
                        <input type="date" id="haccp-date-picker" class="input-field" style="margin:0 0 10px 0; padding:5px;" onchange="renderHaccpLogs(this.value)">
                        <div id="haccp-log-container" style="max-height: 200px; overflow-y: auto; font-size:0.85rem;"></div>
                    </div>
                </div>
                <div>
                    <h3 style="text-transform: uppercase; font-size: 1.2rem;">GRIMOIRE RECETTES</h3>
                    <div id="library-container" style="max-height: 600px; overflow-y: auto;"></div>
                </div>
                <div>
                    <h3 style="text-transform: uppercase; font-size: 1.2rem;">ARCHIVES PLATS</h3>
                    <input type="date" id="stats-date-picker" class="input-field" style="margin-bottom: 15px;" onchange="renderStatsDrawer(this.value)">
                    <div id="stats-list-container" style="border: 1px solid #fff; padding: 15px; border-radius: 4px; max-height: 600px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>

        <div class="header-container">
            <h2 class="header-title">GESTION DE LA CUISINE <span id="pending-count">0 plats à envoyer</span></h2>
            <div class="brand-watermark">ichef.ch</div>
            
            <div class="top-nav">
                <button class="btn-top" onclick="openDrawer('history-drawer')"><i>✓</i> HISTORIQUE</button>
                <button class="btn-top" onclick="openStaffPlanning()"><i>📅</i> PLANNING</button>
                <button class="btn-top" onclick="openResDrawer()"><i>📅</i> RÉSA</button>
                <button class="btn-top" onclick="openCommandesDrawer()"><i>🛒</i> COURSES</button>
                <button class="btn-top" onclick="openGestionDrawer()"><i>⚙️</i> HACCP</button>
            </div>
        </div>

        <div class="grid-wrapper">
            <div class="grid" id="pending-container"></div>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let previousPendingCount = 0; let audioCtx; let isChefMode = false;

        function initSystem() {
            try { const AudioContext = window.AudioContext || window.webkitAudioContext; if (AudioContext) { audioCtx = new AudioContext(); audioCtx.resume(); } } catch (error) {}
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('stats-date-picker').value = getTodayString();
            document.getElementById('haccp-date-picker').value = getTodayString();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;
            if (type === 'new') { osc.type = 'square'; osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1046, now + 0.15); gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.3, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3); } 
            else if (type === 'send') { osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.5, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4); }
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') {
                activeOrders = msg.activeOrders;
                if (activeOrders['GLOBAL_RESAS'] && activeOrders['GLOBAL_RESAS'].reservations) { localStorage.setItem('empire_reservations', JSON.stringify(activeOrders['GLOBAL_RESAS'].reservations)); }
                renderKDS();
                if(document.getElementById('res-drawer').classList.contains('open')) renderResDrawer();
                if(document.getElementById('gestion-drawer').classList.contains('open')) renderStatsDrawer();
            }
        };

        window.addEventListener('storage', (e) => { if(e.key === 'empire_reservations') { if(document.getElementById('res-drawer').classList.contains('open')) renderResDrawer(); } });

        function getTodayString() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
        function getTimeString() { const d = new Date(); return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'); }

        // --- GESTION DES TIROIRS ---
        function closeAllDrawers() { 
            ['res-drawer', 'cmd-drawer', 'history-drawer', 'staff-drawer', 'gestion-drawer'].forEach(d => { if(document.getElementById(d)) document.getElementById(d).classList.remove('open'); }); 
            isChefMode = false;
            if(document.getElementById('chef-secure-zone')) document.getElementById('chef-secure-zone').style.display = 'none';
            if(document.getElementById('btn-unlock-gestion')) document.getElementById('btn-unlock-gestion').style.display = 'block';
        }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
        function openDrawer(id, callback) { closeAllDrawers(); document.getElementById(id).classList.add('open'); if(callback) callback(); }

        // --- PLANNING RH ---
        function openStaffPlanning() { renderStaffPlanning(); openDrawer('staff-drawer'); }
        function renderStaffPlanning() {
            const staff = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            const container = document.getElementById('staff-planning-container');
            const jours = ["LUN", "MAR", "MER", "JEU", "VEN", "SAM", "DIM"];
            if(staff.length === 0) { container.innerHTML = "<p style='color:#aaa; text-align:center;'>Aucun planning RH configuré.</p>"; return; }
            container.innerHTML = staff.map(s => {
                const daysHTML = s.plan.map((p, i) => {
                    let content = ""; let classN = "";
                    if (p.status === "off") { content = `<span style="color:#555; font-weight:900; font-size:0.8rem; margin-top:10px;">OFF</span>`; classN = "is-off"; }
                    else if (p.status === "present") { content = `<div style="font-weight:bold; font-size:0.7rem; margin-top:5px;">${p.s1 || '-'}</div><div style="font-weight:bold; font-size:0.7rem;">${p.s2 || '-'}</div>`; }
                    return `<div class="mini-day ${classN}"><b>${jours[i]}</b>${content}</div>`;
                }).join('');
                return `<div class="staff-plan-card"><strong style="font-size:1.2rem; display:block; margin-bottom:10px; text-transform:uppercase;">${s.name}</strong><div class="mini-grid">${daysHTML}</div></div>`;
            }).join('');
        }

        // --- PRÉVISIONS RÉSA ---
        function openResDrawer() { openDrawer('res-drawer', renderResDrawer); }
        function renderResDrawer() {
            const container = document.getElementById('res-list-container'); const dateInput = document.getElementById('kitchen-resa-date');
            if(!dateInput.value) { const today = new Date(); dateInput.value = today.toISOString().split('T')[0]; }
            const dayResas = (JSON.parse(localStorage.getItem('empire_reservations')) || {})[dateInput.value] || [];
            if(dayResas.length === 0) { container.innerHTML = '<div style="color:#aaa; text-align:center;">Aucune réservation.</div>'; return; }
            let totalPax = 0;
            let html = dayResas.map(r => { totalPax += parseInt(r.pax || 0); return `<div class="res-card"><div style="display:flex; justify-content:space-between; margin-bottom:5px;"><b>${r.time} - ${r.name}</b><span style="border:1px solid #fff; padding:2px 8px; border-radius:4px;">${r.pax}p</span></div>${r.tel ? `<small>${r.tel}</small>` : ''}</div>`; }).join('');
            container.innerHTML = `<div style="margin-bottom:15px; font-size:1.2rem; font-weight:bold;">Total prévisionnel : ${totalPax} couverts</div>` + html;
        }

        // --- ACHATS COURSES ---
        function openCommandesDrawer() { renderCommandes(); openDrawer('cmd-drawer'); }
        function addCommande() {
            const text = document.getElementById('cmd-text').value.trim(); if(!text) return;
            const cmds = JSON.parse(localStorage.getItem('kds_commandes_v1')) || [];
            text.split(/\s+et\s+|\s+puis\s+|,|\n/i).forEach(phrase => { if(phrase.trim() !== "") cmds.push({ id: Date.now() + Math.random(), text: phrase.trim(), done: false }); });
            localStorage.setItem('kds_commandes_v1', JSON.stringify(cmds)); document.getElementById('cmd-text').value = ''; renderCommandes();
        }
        function clearCommandes() { if(confirm('Purger la liste ?')) { localStorage.removeItem('kds_commandes_v1'); renderCommandes(); } }
        function renderCommandes() {
            const cmds = JSON.parse(localStorage.getItem('kds_commandes_v1')) || [];
            document.getElementById('cmd-list-container').innerHTML = cmds.length === 0 ? '<div style="color:#aaa; text-align:center; grid-column: 1 / -1;">Liste vide.</div>' : cmds.map(c => `<div class="cmd-supp-card" style="font-weight:bold;">${c.text}</div>`).join('');
        }

        // --- HACCP & GESTION ---
        function openGestionDrawer() { openDrawer('gestion-drawer', () => { renderHaccpLogs(); renderLibrary(); renderStatsDrawer(); }); }
        function enableGestionMode() {
            const code = prompt("CODE SÉCURITÉ CHEF (Taper 7777) :");
            if(code === "7777") { 
                isChefMode = true; document.getElementById('chef-secure-zone').style.display = 'block'; document.getElementById('btn-unlock-gestion').style.display = 'none';
            } else { alert("Code incorrect."); }
        }

        function saveHaccpLog(type) {
            let val = "", equip = document.getElementById('haccp-equip').value;
            const temp = parseFloat(document.getElementById('haccp-temp').value);
            if(!equip || isNaN(temp)) return window.alert("Champs invalides.");
            val = temp + " °C";
            const logEntry = { type: type, equip: equip, value: val, time: getTimeString() };
            const today = getTodayString();
            let allLogs = JSON.parse(localStorage.getItem('kds_haccp_archives') || '{}');
            if(!allLogs[today]) allLogs[today] = [];
            allLogs[today].unshift(logEntry); localStorage.setItem('kds_haccp_archives', JSON.stringify(allLogs));
            renderHaccpLogs(today);
        }
        function renderHaccpLogs(date) {
            const targetDate = date || document.getElementById('haccp-date-picker').value || getTodayString();
            const allLogs = JSON.parse(localStorage.getItem('kds_haccp_archives') || '{}');
            document.getElementById('haccp-log-container').innerHTML = (allLogs[targetDate] || []).map(l => `<div style="border-bottom: 1px solid #333; padding: 10px 0; display: flex; justify-content: space-between;"><div><b>${l.type} : ${l.equip}</b><br><small style="color:#aaa;">${l.time}</small></div><div>${l.value}</div></div>`).join('') || '<div style="color:#aaa;">Aucun relevé.</div>';
        }

        function renderLibrary() {
            const recipes = JSON.parse(localStorage.getItem('kds_grimoire_v2') || '[]');
            document.getElementById('library-container').innerHTML = recipes.map((r, i) => `<button class="btn-action" style="width:100%; margin-bottom:10px; text-align:left;" onclick="openRecipeModal(${i})">📄 ${r.nom}</button>`).join('') || '<div style="color:#aaa;">Grimoire vide.</div>';
        }
        function openRecipeModal(index) {
            const r = JSON.parse(localStorage.getItem('kds_grimoire_v2'))[index];
            document.getElementById('modal-recipe-title').textContent = r.nom; document.getElementById('modal-recipe-content').textContent = r.content;
            document.getElementById('recipe-modal').style.display = 'flex';
        }
        function closeRecipeModal() { document.getElementById('recipe-modal').style.display = 'none'; }

        function renderStatsDrawer(date) {
            const targetDate = date || document.getElementById('stats-date-picker').value || getTodayString();
            const allStats = JSON.parse(localStorage.getItem('kds_archives_10ans') || '{}');
            const sortedStats = Object.entries(allStats[targetDate] || {}).sort((a, b) => b[1] - a[1]).slice(0, 20);
            document.getElementById('stats-list-container').innerHTML = sortedStats.map(([name, count], index) => count > 0 ? `<div class="stat-row"><span>#${index + 1} ${name}</span><span class="stat-count">${count}</span></div>` : '').join('') || '<div style="color:#aaa; text-align:center;">Aucun plat servi.</div>';
        }

        // --- MOTEUR D'AGRÉGATION ET D'AFFICHAGE KDS ---
        function renderKDS() {
            const pendingContainer = document.getElementById('pending-container');
            const historyContainer = document.getElementById('history-container');
            pendingContainer.innerHTML = ''; historyContainer.innerHTML = '';
            let currentPendingCount = 0;

            for (const tableId in activeOrders) {
                if (tableId === 'GLOBAL_RESAS') continue; 
                
                const order = activeOrders[tableId];
                const myItems = order.ticket ? [...order.ticket.entrees, ...order.ticket.plats, ...order.ticket.desserts] : (order.items || []);
                if (myItems.length === 0) continue;
                
                const titreTable = tableId.includes('WEB') ? tableId : tableId.replace('T', '');
                const pendingItems = myItems.filter(i => !i.done);
                
                if (pendingItems.length > 0) {
                    currentPendingCount += pendingItems.length;
                    const ticketDiv = document.createElement('div'); ticketDiv.className = 'ticket-wire';

                    let obsHtml = order.observation ? `<div class="obs-banner">${order.observation}</div>` : '';

                    const grouped = { 1: [], 2: [], 3: [] };
                    pendingItems.forEach(i => { 
                        let step = i.step || 0;
                        if (step === 0) { if (i.category === 'Entrée') step = 1; else if (i.category === 'Dessert') step = 3; else step = 2; }
                        if (grouped[step]) grouped[step].push(i);
                    });
                    
                    const renderSection = (title, items) => {
                        if (items.length === 0) return `<div class="tw-section"><div class="tw-sec-title">${title}</div><div class="tw-sec-box"><div style="color:#333; text-align:center; font-size:0.8rem;">-</div></div></div>`;
                        
                        const itemCounts = {};
                        items.forEach(i => {
                            const name = (i.n || i.name).replace(' [WEB]', '');
                            const isWeb = (i.n || i.name).includes('[WEB]');
                            const key = name + (isWeb ? '_web' : '');
                            if (!itemCounts[key]) itemCounts[key] = { name: name, count: 0, isWeb: isWeb };
                            itemCounts[key].count++;
                        });

                        const html = Object.values(itemCounts).map(g => 
                            `<div class="tw-item">
                                <span><span class="qty-badge">${g.count}x</span> ${g.name}</span> 
                                ${g.isWeb ? '<span style="border:1px solid #fff; padding:2px 6px; border-radius:4px; font-size:0.7rem;">WEB</span>' : ''}
                            </div>`
                        ).join('');

                        return `<div class="tw-section"><div class="tw-sec-title">${title}</div><div class="tw-sec-box">${html}</div></div>`;
                    };

                    ticketDiv.innerHTML = `
                        ${obsHtml}
                        <div class="tw-header">
                            <div class="tw-head-title">TABLE</div>
                            <div class="tw-head-title">HEURE</div>
                            <div class="tw-head-val">${titreTable}</div>
                            <div class="tw-head-val">${order.time}</div>
                        </div>
                        ${renderSection('ENTRÉES', grouped[1])}
                        ${renderSection('PLATS', grouped[2])}
                        ${renderSection('DESSERTS', grouped[3])}
                        <div class="tw-total">
                            <span>TOTAL PLATS</span>
                            <div class="tw-total-val">${pendingItems.length}</div>
                        </div>
                        <button class="btn-wire send" onclick="modifierStatutCours('${tableId}', 0, true)">VALIDER TICKET</button>
                    `;
                    pendingContainer.appendChild(ticketDiv);
                }

                // TICKET HISTORIQUE
                const doneItems = myItems.filter(i => i.done);
                if (doneItems.length > 0) {
                    const historyDiv = document.createElement('div'); historyDiv.className = 'history-ticket';
                    
                    const itemCountsHist = {};
                    doneItems.forEach(i => {
                        const name = (i.n || i.name).replace(' [WEB]', '');
                        if (!itemCountsHist[name]) itemCountsHist[name] = 0;
                        itemCountsHist[name]++;
                    });
                    const histHtml = Object.entries(itemCountsHist).map(([name, count]) => `<li><b>${count}x</b> ${name}</li>`).join('');

                    historyDiv.innerHTML = `
                        <h3>Table ${titreTable}</h3>
                        <ul class="history-items">${histHtml}</ul>
                        <button class="btn-wire" style="width:100%" onclick="modifierStatutCours('${tableId}', 0, false)">↺ ANNULER</button>
                    `;
                    historyContainer.appendChild(historyDiv);
                }
            }
            if (currentPendingCount > previousPendingCount) { playSound('new'); }
            previousPendingCount = currentPendingCount; document.getElementById('pending-count').textContent = currentPendingCount + " plats à envoyer";
        }

        async function modifierStatutCours(tableId, step, isDone) {
            const order = activeOrders[tableId]; if (!order) return;
            if (isDone) playSound('send');

            const myItems = order.ticket ? [...order.ticket.entrees, ...order.ticket.plats, ...order.ticket.desserts] : (order.items || []);
            myItems.forEach(i => { i.done = isDone; });

            if(isDone) {
                const today = getTodayString(); let allStats = JSON.parse(localStorage.getItem('kds_archives_10ans') || '{}');
                if(!allStats[today]) allStats[today] = {};
                myItems.forEach(i => { if(i.done) allStats[today][i.n || i.name] = (allStats[today][i.n || i.name] || 0) + 1; });
                localStorage.setItem('kds_archives_10ans', JSON.stringify(allStats));
            }

            if (myItems.every(i => i.done)) { order.status = 'ready'; } else { order.status = 'pending'; }
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId, order }) });
        }
    </script>
</body>
</html>
