<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - CUISINE MASTER ULTIMATE</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --web: #00e5ff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 25px 50px; font-size: 1.5rem; font-weight: 900; background: #fff; color: #000; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        #production-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .btn-nav { background: transparent; border: 1px solid #fff; color: #fff; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .btn-nav.gold { border-color: var(--gold); color: var(--gold); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket-wire { border: 1px solid var(--line); border-radius: 8px; padding: 15px; background: #050505; display: flex; flex-direction: column; gap: 10px; }
        .tw-header { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; text-align: center; }
        .tw-head-title { background: var(--line); color: #000; font-weight: 900; padding: 5px; font-size: 0.7rem; text-transform: uppercase;}
        .tw-head-val { padding: 10px; font-weight: 900; font-size: 1.3rem; border-top: 1px solid var(--line); border-right: 1px solid #333;}
        .tw-section { margin-bottom: 10px; border: 1px solid #222; border-radius: 4px; padding: 8px; }
        .tw-sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .tw-sec-title { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; color: var(--gold); }
        .tw-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #333; font-weight: bold; font-size: 1.1rem; }
        .qty { color: var(--gold); margin-right: 10px; }
        .btn-send { background: var(--accent); color: #000; border: none; padding: 8px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; font-size: 0.8rem; }

        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .drawer.open { display: flex; flex-direction: column; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #fff; padding-bottom: 20px; margin-bottom: 30px; }
        .btn-close { background: #fff; color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: 900; font-size: 1.2rem; }

        .read-only-box { border: 1px solid #333; padding: 20px; border-radius: 8px; background: #0a0a0a; margin-bottom: 15px; }
        .protected-tag { color: var(--alert); font-size: 0.7rem; font-weight: bold; text-transform: uppercase; margin-bottom: 10px; display: block;}

        .haccp-nav { display: flex; border-bottom: 1px solid #333; margin-bottom: 20px; gap: 10px; }
        .haccp-tab { flex: 1; background: transparent; border: 1px solid #444; color: #aaa; padding: 15px; cursor: pointer; font-weight: 900; text-transform: uppercase; }
        .haccp-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
        
        .res-card { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #222; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom:30px; letter-spacing:5px;">EMPIRE KDS MASTER</h1>
        <button onclick="initSystem()">DÉMARRER LE SERVICE</button>
    </div>

    <div id="production-area">
        <div class="nav-bar">
            <button class="btn-nav" onclick="openDrawer('recipe-drawer')">📖 RECETTES</button>
            <button class="btn-nav" onclick="openDrawer('staff-drawer')">📅 PLANNING</button>
            <button class="btn-nav" onclick="openDrawer('res-drawer')">⚡ RÉSERVATIONS</button>
            <button class="btn-nav gold" onclick="openDrawer('haccp-drawer')">⚙️ ePack HACCP</button>
            <button class="btn-nav" style="border-color:red; color:red;" onclick="safePurge()">🧹 PURGE</button>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 id="pending-count" style="margin:0;">0 PLATS À ENVOYER</h2>
            <div style="font-style:italic; opacity:0.5;">ichef.ch | Télétransmission Active</div>
        </div>
        <div class="grid" id="pending-container"></div>
    </div>

    <div id="recipe-drawer" class="drawer">
        <div class="drawer-header"><h2>📖 GRIMOIRE (LECTURE SEULE)</h2><button class="btn-close" onclick="closeDrawer('recipe-drawer')">✕</button></div>
        <div id="recipe-list-content"></div>
    </div>

    <div id="staff-drawer" class="drawer">
        <div class="drawer-header"><h2>📅 PLANNING (LECTURE SEULE)</h2><button class="btn-close" onclick="closeDrawer('staff-drawer')">✕</button></div>
        <div id="staff-content"></div>
    </div>

    <div id="res-drawer" class="drawer">
        <div class="drawer-header"><h2>⚡ RADAR RÉSERVATIONS</h2><button class="btn-close" onclick="closeDrawer('res-drawer')">✕</button></div>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:15px; margin-bottom:30px;">
            <div class="read-only-box" style="text-align:center;">AUJOURD'HUI<br><b id="res-today" style="font-size:2rem; color:var(--gold);">0</b></div>
            <div class="read-only-box" style="text-align:center;">DEMAIN<br><b id="res-tomorrow" style="font-size:2rem; color:var(--gold);">0</b></div>
            <div class="read-only-box" style="text-align:center;">CETTE SEMAINE<br><b id="res-week" style="font-size:2rem; color:var(--gold);">0</b></div>
        </div>
        <div id="res-list-full"></div>
    </div>

    <div id="haccp-drawer" class="drawer">
        <div class="drawer-header"><h2 style="color:var(--gold);">⚙️ ePack HACCP CUISINE</h2><button class="btn-close" onclick="closeDrawer('haccp-drawer')">✕</button></div>
        <div class="haccp-nav">
            <button class="haccp-tab active" onclick="switchH(this,'temp')">🌡️ Températures</button>
            <button class="haccp-tab" onclick="switchH(this,'clean')">🧹 Nettoyage</button>
        </div>
        <div id="h-view-temp">
            <input type="text" id="h-eq" class="btn-nav" style="width:250px; background:#000;" placeholder="Frigo Viande...">
            <input type="number" id="h-val" class="btn-nav" style="width:80px; background:#000;" placeholder="°C">
            <button class="btn-nav gold" onclick="saveH('Temp')">Valider</button>
            <div id="h-log-temp" style="margin-top:20px;"></div>
        </div>
        <div id="h-view-clean" style="display:none;">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px;">
                <button class="btn-nav" onclick="saveH('Clean','Sols Cuisine OK')">🧹 Sols Cuisine</button>
                <button class="btn-nav" onclick="saveH('Clean','Plonge/Inox OK')">🧼 Plonge & Inox</button>
            </div>
            <div id="h-log-clean" style="margin-top:20px;"></div>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let audioCtx = null; let prevCount = 0;

        function initSystem() {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
            document.getElementById('start-overlay').style.display = 'none';
            forceSync();
        }

        function beep(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square';
            osc.frequency.setValueAtTime(type === 'in' ? 880 : 440, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        }

        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'ORDER_UPDATE') {
                    activeOrders = msg.activeOrders;
                    const newCount = Object.keys(activeOrders).length;
                    if(newCount > prevCount) beep('in');
                    prevCount = newCount;
                    renderKDS();
                }
            } catch(e){}
        };

        async function forceSync() {
            try {
                const res = await fetch('/get-current-state');
                const data = await res.json();
                activeOrders = data.activeOrders;
                renderKDS();
            } catch(e){}
        }

        function renderKDS() {
            const container = document.getElementById('pending-container'); container.innerHTML = '';
            let countTotal = 0;
            for (let tid in activeOrders) {
                const o = activeOrders[tid]; if(!o || o.status === 'system') continue;
                const pending = (o.items || []).filter(i => !i.done);
                if (pending.length === 0) continue;
                countTotal += pending.length;

                const div = document.createElement('div');
                div.className = 'ticket-wire' + (tid.includes('WEB_') ? ' web-ticket' : '');
                const grouped = { 1: [], 2: [], 3: [] };
                pending.forEach(i => { let s = i.step || (i.category === 'Entrée' ? 1 : i.category === 'Dessert' ? 3 : 2); grouped[s].push(i); });

                const renderSec = (title, items, step) => {
                    if (items.length === 0) return '';
                    const counts = {}; items.forEach(i => { const n = i.n || i.name; counts[n] = (counts[n] || 0) + 1; });
                    let h = `<div class="tw-section"><div class="tw-sec-header"><span class="tw-sec-title">${title}</span><button class="btn-send" onclick="valider('${tid}',${step})">ENVOYER</button></div>`;
                    for(let n in counts) h += `<div class="tw-item"><span><span class="qty">${counts[n]}x</span> ${n}</span></div>`;
                    return h + `</div>`;
                };

                div.innerHTML = `
                    <div class="tw-header">
                        <div class="tw-head-title">TABLE</div><div class="tw-head-title">PAX</div><div class="tw-head-title">HEURE</div>
                        <div class="tw-head-val">${tid.replace('WEB_','')}</div><div class="tw-head-val">${o.pax || '1'}</div><div class="tw-head-val">${o.time || '--:--'}</div>
                    </div>
                    ${o.observation ? `<div class="obs-banner">${o.observation}</div>` : ''}
                    ${renderSec('Entrées', grouped[1], 1)} ${renderSec('Plats', grouped[2], 2)} ${renderSec('Desserts', grouped[3], 3)}
                `;
                container.appendChild(div);
            }
            document.getElementById('pending-count').innerText = countTotal + " PLATS À ENVOYER";
        }

        async function valider(tid, step) {
            const o = activeOrders[tid];
            o.items.forEach(i => { let s = i.step || (i.category === 'Entrée' ? 1 : i.category === 'Dessert' ? 3 : 2); if(s === step) i.done = true; });
            o.status = 'ready';
            beep('out');
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: tid, order: o }) });
        }

        function openDrawer(id) { 
            document.getElementById(id).classList.add('open'); 
            if(id === 'recipe-drawer') renderRecipes();
            if(id === 'staff-drawer') renderStaff();
            if(id === 'res-drawer') renderResas();
        }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        function renderRecipes() {
            const r = JSON.parse(localStorage.getItem('kds_grimoire_v2')) || [];
            document.getElementById('recipe-list-content').innerHTML = r.map(i => `<div class="read-only-box"><span class="protected-tag">Lecture seule</span><h3>${i.nom}</h3><pre style="white-space:pre-wrap; color:#aaa;">${i.content}</pre></div>`).join('');
        }

        function renderStaff() {
            const s = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            document.getElementById('staff-content').innerHTML = s.map(i => `<div class="read-only-box"><span class="protected-tag">Lecture seule</span><h3>${i.name}</h3>${i.plan.map((p,idx)=>`<div>Jour ${idx+1}: <b>${p.status==='off'?'OFF':p.s1}</b></div>`).join('')}</div>`).join('');
        }

        function renderResas() {
            const res = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            const d = new Date().toISOString().split('T')[0];
            const count = (date) => (res[date] || []).reduce((a,b)=>a+parseInt(b.pax||0),0);
            document.getElementById('res-today').innerText = count(d);
            document.getElementById('res-list-full').innerHTML = (res[d] || []).map(r=>`<div class="res-card"><span>${r.time} - ${r.name}</span><span>${r.pax} PAX</span></div>`).join('');
        }

        function switchH(btn, view) {
            document.querySelectorAll('.haccp-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
            document.getElementById('h-view-temp').style.display = view==='temp'?'block':'none';
            document.getElementById('h-view-clean').style.display = view==='clean'?'block':'none';
        }

        function saveH(type, val=null) {
            const date = new Date().toISOString().split('T')[0];
            const log = { type, eq: val || document.getElementById('h-eq').value, val: val ? 'OK' : document.getElementById('h-val').value + '°C', time: new Date().toLocaleTimeString() };
            let db = JSON.parse(localStorage.getItem('kds_haccp_v2') || '{}'); if(!db[date]) db[date] = []; db[date].unshift(log);
            localStorage.setItem('kds_haccp_v2', JSON.stringify(db)); alert("Validé.");
        }

        async function safePurge() { if(confirm("Vider l'écran ?")) { for(let k in activeOrders) { if(k!=='GLOBAL_PLAN') await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:k, order:null}) }); } } }
        setInterval(forceSync, 3000);
    </script>
</body>
</html>
