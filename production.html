<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL CUISINE - Empire COMMAND</title>
    <style>
        :root { --bg: #050505; --accent: #ff1744; --text: #ffffff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px; }
        
        .header-bar { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #222; padding-bottom: 20px; margin-bottom: 40px; }
        .title { text-transform: uppercase; letter-spacing: 5px; margin: 0; font-size: 2rem; color: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 25px; }
        
        .ticket { background: #121212; border-left: 10px solid var(--accent); padding: 25px; border-radius: 15px; box-shadow: 0 15px 35px rgba(0,0,0,0.6); animation: slideIn 0.3s ease-out; position: relative; }
        .ticket h2 { margin: 0 0 10px 0; font-size: 2.2rem; text-transform: uppercase; }
        .ticket .time { color: #666; font-weight: bold; font-size: 1.1rem; }
        
        .ticket ul { font-size: 1.9rem; font-weight: 900; margin: 25px 0; padding-left: 20px; color: #eeeeee; list-style-type: square; }
        .ticket li { margin-bottom: 12px; }
        
        .btn-done { width: 100%; padding: 20px; background: var(--accent); border: none; color: white; font-weight: 900; border-radius: 10px; cursor: pointer; font-size: 1.3rem; text-transform: uppercase; transition: transform 0.1s; }
        .btn-done:active { transform: scale(0.95); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    </style>
</head>
<body>

    <div class="header-bar">
        <h1 class="title">🔥 File Cuisine (Plats)</h1>
        <div id="clock" style="font-weight: 900; font-size: 1.5rem; opacity: 0.5;"></div>
    </div>

    <div class="grid" id="container"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        
        socket.on('order-received', (order) => {
            // FILTRE CHIRURGICAL SUR LES PLATS
            const items = order.articles.filter(a => a.includes('[Plat]')); 
            
            if (items.length > 0) {
                const div = document.createElement('div');
                div.className = 'ticket';
                
                // Nettoyage du tag [Plat] pour l'affichage
                const listHtml = items.map(i => `<li>${i.replace('[Plat] ', '')}</li>`).join('');
                
                div.innerHTML = `
                    <div class="time">${order.heure}</div>
                    <h2>${order.table}</h2>
                    <ul>${listHtml}</ul>
                    <button class="btn-done" onclick="this.parentElement.remove()">Envoyer en salle</button>
                `;
                document.getElementById('container').prepend(div);
                playNotification();
            }
        });

        function playNotification() {
            const audio = new AudioContext();
            const osc = audio.createOscillator();
            const gain = audio.createGain();
            osc.connect(gain); gain.connect(audio.destination);
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, audio.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.0001, audio.currentTime + 0.5);
            osc.start(); osc.stop(audio.currentTime + 0.5);
        }

        setInterval(() => { document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR'); }, 1000);
    </script>
</body>
</html>
