<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 20px 40px; font-size: 1.5rem; font-weight: 900; background: var(--alert); color: #fff; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #production-area { flex: 3; padding: 20px; overflow-y: auto; border-right: 2px solid #333; position: relative;}
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .header-title { color: var(--alert); text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        
        .btn-top { background: #1a1a1a; font-weight: bold; border-radius: 4px; padding: 8px 15px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 0.85rem; }
        .btn-top:hover { filter: brightness(1.3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket { background: var(--panel); border: 1px solid #333; border-top: 8px solid var(--alert); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .ticket-header { background: #1a1a1a; padding: 15px; font-size: 1.3rem; font-weight: 900; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
        .ticket-covers { background: #333; padding: 4px 10px; border-radius: 6px; font-size: 1rem; color: #fff; }
        .ticket-body { padding: 15px; flex: 1; }
        
        .course-section { margin-bottom: 15px; background: #0a0a0a; border-radius: 6px; overflow: hidden; border: 1px solid #222; }
        .course-title { background: #222; padding: 8px 12px; font-size: 0.8rem; color: #aaa; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .course-items { padding: 10px 12px; list-style: none; margin: 0; font-size: 1.1rem; font-weight: bold; }
        .course-items li { margin-bottom: 8px; display: flex; justify-content: space-between; }
        
        .btn-send { width: 100%; padding: 15px; background: var(--accent); border: none; color: #000; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: 0.1s; }
        .btn-send:active { transform: scale(0.98); }

        #history-area { flex: 1; background: #0a0a0a; padding: 20px; overflow-y: auto; }
        .history-ticket { background: #111; border: 1px solid #333; border-left: 5px solid #555; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
        .history-ticket-header { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .history-ticket h3 { margin: 0; color: #888; font-size: 1.1rem; }
        .history-items { list-style: none; padding: 0; margin: 0 0 15px 0; color: #666; font-size: 0.9rem; text-decoration: line-through; }
        
        .btn-undo { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--alert); color: var(--alert); font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-undo:hover { background: rgba(255, 23, 68, 0.1); }
        .web-badge { background: var(--accent); color: #000; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-left: 10px; font-weight: bold; display: inline-block;}

        /* TIROIRS GAUCHE (Réservations, Stats, Bibliothèque) */
        #res-drawer, #stats-drawer, #library-drawer { position: absolute; left: 0; top: 0; width: 420px; height: 100%; background: #0a0a0a; border-right: 2px solid #333; padding: 25px; z-index: 8000; box-sizing: border-box; overflow-y: auto; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: 15px 0 50px rgba(0,0,0,0.9); }
        #res-drawer.open, #stats-drawer.open, #library-drawer.open { transform: translateX(0); }
        #stats-drawer { z-index: 8001; }
        #library-drawer { z-index: 8002; width: 450px; }

        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: #aaa; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-close-drawer:hover { color: #fff; transform: scale(1.2); }
        
        /* Styles Cartes Résa */
        .res-card { background: #161616; border: 1px solid #333; border-left: 5px solid #ea80fc; padding: 15px; margin-bottom: 12px; border-radius: 8px; }
        .res-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .res-name { color: #fff; font-weight: 900; font-size: 1.1rem; margin: 0; text-transform: uppercase;}
        .res-time { background: #ea80fc; color: #000; padding: 4px 8px; border-radius: 4px; font-size: 0.8rem; font-weight: 900; }
        .service-title { color: #888; border-bottom: 1px solid #333; padding-bottom: 5px; margin-top: 20px; margin-bottom: 15px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}
        
        /* Styles Liste Stats */
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid #222; padding: 12px 0; font-size: 1.1rem; font-weight: bold; align-items: center; }
        .stat-count { background: #ff9800; color: #000; padding: 4px 12px; border-radius: 12px; font-size: 1.1rem; }

        /* Styles Bibliothèque */
        .lib-category { margin-top: 25px; margin-bottom: 15px; color: #00e676; font-size: 1.1rem; text-transform: uppercase; border-bottom: 1px solid #333; padding-bottom: 5px; font-weight: 900;}
        .recipe-btn { display: block; width: 100%; background: #161616; border: 1px solid #333; color: #fff; padding: 15px; margin-bottom: 8px; border-radius: 6px; text-align: left; font-size: 1rem; cursor: pointer; transition: 0.2s; font-weight: bold;}
        .recipe-btn:hover { background: #222; border-color: #00e676; padding-left: 20px; }
        
        /* Modal Visionneuse PDF */
        #pdf-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; }
        .pdf-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 30px; background: #111; border-bottom: 1px solid #333; }
        .pdf-header h2 { margin: 0; color: #00e676; text-transform: uppercase; }
        .btn-close-pdf { background: var(--alert); color: #fff; border: none; padding: 10px 20px; border-radius: 6px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        #pdf-frame { flex: 1; width: 100%; border: none; background: #222; }

    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom: 30px;">KITCHEN DISPLAY SYSTEM</h1>
        <button onclick="initSystem()">DÉMARRER LE SERVICE (ACTIVER SON)</button>
    </div>

    <div id="pdf-modal">
        <div class="pdf-header">
            <h2 id="pdf-title">Recette</h2>
            <button class="btn-close-pdf" onclick="closeRecipe()">FERMER LA RECETTE</button>
        </div>
        <iframe id="pdf-frame" src=""></iframe>
    </div>

    <div id="production-area">
        
        <div id="res-drawer">
            <button class="btn-close-drawer" onclick="closeResDrawer()">✕</button>
            <h2 style="margin-top:30px; color:#ea80fc; font-size: 1.4rem; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase;">📅 PRÉVISIONS</h2>
            <div id="res-list-container"></div>
        </div>

        <div id="stats-drawer">
            <button class="btn-close-drawer" onclick="closeStatsDrawer()">✕</button>
            <h2 style="margin-top:30px; color:#ff9800; font-size: 1.4rem; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase;">📊 TOP 20 DES VENTES</h2>
            <div style="margin-bottom: 25px; background: #111; padding: 15px; border-radius: 8px; border: 1px solid #333;">
                <label style="color:#aaa; font-size:0.8rem; text-transform:uppercase; margin-bottom:8px; display:block; font-weight:bold;">SÉLECTIONNER UNE DATE :</label>
                <input type="date" id="stats-date-picker" style="width:100%; padding:10px; background:#000; color:#ff9800; border:1px solid #444; border-radius: 4px; font-size:1.1rem; font-weight:bold; cursor:pointer;" onchange="renderStatsDrawer(this.value)">
            </div>
            <div id="stats-list-container"></div>
        </div>

        <div id="library-drawer">
            <button class="btn-close-drawer" onclick="closeLibraryDrawer()">✕</button>
            <h2 style="margin-top:30px; color:var(--accent); font-size: 1.4rem; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase;">📖 GRIMOIRE CULINAIRE</h2>
            <p style="color:#aaa; font-size:0.85rem;">Fiches techniques et procédures de dressage.</p>
            <div id="library-container"></div>
        </div>

        <div class="header-container">
            <h2 class="header-title">🔥 EN PRODUCTION <span id="pending-count" style="color:#fff; margin-left: 10px;">0</span></h2>
            <div style="display: flex; gap: 10px;">
                <button class="btn-top" style="color:#ea80fc; border-color:#ea80fc;" onclick="openResDrawer()">📅 RÉSERVATIONS</button>
                <button class="btn-top" style="color:#ff9800; border-color:#ff9800;" onclick="openStatsDrawer()">📊 ARCHIVES PLATS</button>
                <button class="btn-top" style="color:var(--accent); border-color:var(--accent);" onclick="openLibraryDrawer()">📖 BIBLIOTHÈQUE</button>
            </div>
        </div>
        <div class="grid" id="pending-container"></div>
    </div>

    <div id="history-area">
        <h2 class="header-title" style="color:#888; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">✔️ HISTORIQUE IMMÉDIAT</h2>
        <div id="history-container"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        
        let activeOrders = {};
        let previousPendingCount = 0;
        let audioCtx;

        // LA BASE DE DONNÉES DES RECETTES (À personnaliser)
        // Mets ici le chemin exact vers tes PDF sur GitHub (ex: "recettes/burger.pdf")
        const RECIPE_LIBRARY = {
            "Bases & Sauces": [
                { nom: "Sauce Hollandaise", url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" },
                { nom: "Fond de Veau", url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" }
            ],
            "Plats Signatures": [
                { nom: "Burger Tableau", url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" },
                { nom: "Fondue Savoyarde", url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" }
            ],
            "Desserts": [
                { nom: "Tiramisu Maison", url: "https://www.w3.org/WAI/ER/tests/xhtml/testfiles/resources/pdf/dummy.pdf" }
            ]
        };

        function initSystem() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) { audioCtx = new AudioContext(); audioCtx.resume(); }
            } catch (error) {}
            const overlay = document.getElementById('start-overlay');
            if (overlay) overlay.style.display = 'none';
            document.getElementById('stats-date-picker').value = getTodayString();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'new') { 
                osc.type = 'square'; osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1046, now + 0.15);
                gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.3, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'send') { 
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, now);
                gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.5, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            } else if (type === 'undo') { 
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(220, now); osc.frequency.setValueAtTime(110, now + 0.2);
                gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.2, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') {
                activeOrders = msg.activeOrders;
                renderKDS();
                if(document.getElementById('res-drawer').classList.contains('open')) renderResDrawer();
                if(document.getElementById('stats-drawer').classList.contains('open')) renderStatsDrawer();
            }
        };

        // --- GESTION DE LA BIBLIOTHÈQUE ---
        function openLibraryDrawer() {
            // VERROU DE SÉCURITÉ CHEF
            const code = prompt("CODE SÉCURITÉ CHEF :");
            if(code !== "7777") { // Le code chef est 7777
                alert("Accès refusé. Réservé à la direction de cuisine.");
                return;
            }
            document.getElementById('library-drawer').classList.add('open');
            document.getElementById('res-drawer').classList.remove('open'); 
            document.getElementById('stats-drawer').classList.remove('open');
            renderLibrary();
        }
        function closeLibraryDrawer() { document.getElementById('library-drawer').classList.remove('open'); }

        function renderLibrary() {
            const container = document.getElementById('library-container');
            let html = '';
            for (const category in RECIPE_LIBRARY) {
                html += `<div class="lib-category">${category}</div>`;
                RECIPE_LIBRARY[category].forEach(recipe => {
                    html += `<button class="recipe-btn" onclick="openRecipe('${recipe.nom}', '${recipe.url}')">📄 ${recipe.nom}</button>`;
                });
            }
            container.innerHTML = html;
        }

        function openRecipe(name, url) {
            document.getElementById('pdf-title').textContent = name;
            document.getElementById('pdf-frame').src = url;
            document.getElementById('pdf-modal').style.display = 'flex';
        }
        
        function closeRecipe() {
            document.getElementById('pdf-frame').src = "";
            document.getElementById('pdf-modal').style.display = 'none';
        }

        // --- GESTION RÉSERVATIONS ---
        function openResDrawer() { document.getElementById('res-drawer').classList.add('open'); document.getElementById('stats-drawer').classList.remove('open'); document.getElementById('library-drawer').classList.remove('open'); renderResDrawer(); }
        function closeResDrawer() { document.getElementById('res-drawer').classList.remove('open'); }

        function renderResDrawer() {
            const container = document.getElementById('res-list-container');
            if (!container) return;
            let midiHtml = ''; let soirHtml = ''; let countMidi = 0; let countSoir = 0; let coversMidi = 0; let coversSoir = 0;
            let reservations = [];
            for (const tableId in activeOrders) {
                const order = activeOrders[tableId];
                if (order && order.resName) reservations.push({ tableId, ...order });
            }
            reservations.sort((a, b) => (a.resTime || "").localeCompare(b.resTime || ""));

            reservations.forEach(order => {
                let hour = 12; 
                if (order.resTime) { const match = order.resTime.match(/\d+/); if (match) hour = parseInt(match[0], 10); }
                const isSoir = hour >= 17; const nbCovers = parseInt(order.resCovers || order.covers || 1, 10);
                const card = `<div class="res-card"><div class="res-header"><h3 class="res-name">${order.resName}</h3><span class="res-time">${order.resTime}</span></div><div style="color: #ccc; font-size: 0.9rem;">👥 ${nbCovers} couverts <br>📍 Table <span style="color:#ea80fc; font-weight:bold;">${order.tableId.replace('T', '')}</span></div></div>`;
                if (isSoir) { soirHtml += card; countSoir++; coversSoir += nbCovers; } else { midiHtml += card; countMidi++; coversMidi += nbCovers; }
            });

            let finalHtml = '';
            if (countMidi > 0) finalHtml += `<h3 class="service-title">☀️ Service de Midi (${coversMidi} couverts)</h3>${midiHtml}`;
            if (countSoir > 0) finalHtml += `<h3 class="service-title">🌙 Service du Soir (${coversSoir} couverts)</h3>${soirHtml}`;
            if (countMidi === 0 && countSoir === 0) finalHtml = '<div style="color:#555; text-align:center; padding-top:30px;">Aucune réservation.</div>';
            container.innerHTML = finalHtml;
        }

        // --- GESTION DES ARCHIVES 10 ANS ---
        function getTodayString() {
            const d = new Date();
            const year = d.getFullYear(); const month = String(d.getMonth() + 1).padStart(2, '0'); const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function openStatsDrawer() { 
            document.getElementById('stats-drawer').classList.add('open'); 
            document.getElementById('res-drawer').classList.remove('open');
            document.getElementById('library-drawer').classList.remove('open'); 
            if(!document.getElementById('stats-date-picker').value) document.getElementById('stats-date-picker').value = getTodayString();
            renderStatsDrawer(); 
        }
        function closeStatsDrawer() { document.getElementById('stats-drawer').classList.remove('open'); }

        function renderStatsDrawer(selectedDateStr = null) {
            const targetDate = selectedDateStr || document.getElementById('stats-date-picker').value || getTodayString();
            document.getElementById('stats-date-picker').value = targetDate; 
            
            const allStats = JSON.parse(localStorage.getItem('kds_archives_10ans') || '{}');
            const dailyStats = allStats[targetDate] || {};
            const sortedStats = Object.entries(dailyStats).sort((a, b) => b[1] - a[1]).slice(0, 20);
            
            const container = document.getElementById('stats-list-container');
            if (sortedStats.length === 0 || sortedStats[0][1] === 0) {
                container.innerHTML = '<div style="color:#555; text-align:center; padding-top:30px; font-size:1.1rem;">Aucun plat produit.</div>';
                return;
            }
            
            let html = '<div>';
            sortedStats.forEach(([name, count], index) => {
                if(count > 0) {
                    let rankColor = '#fff';
                    if (index === 0) rankColor = '#ffd700'; else if (index === 1) rankColor = '#c0c0c0'; else if (index === 2) rankColor = '#cd7f32'; 
                    html += `<div class="stat-row"><span style="color:${rankColor};"><span style="font-size:0.8rem; margin-right:10px; color:#555;">#${index + 1}</span> ${name.replace(' [WEB]', '')}</span><span class="stat-count">${count}</span></div>`;
                }
            });
            html += '</div>';
            container.innerHTML = html;
        }

        function getCourseName(step) {
            if (step === 1) return "1. Entrées"; if (step === 2) return "2. Plats"; if (step === 3) return "3. Desserts"; return "Direct";
        }

        function renderKDS() {
            const pendingContainer = document.getElementById('pending-container');
            const historyContainer = document.getElementById('history-container');
            pendingContainer.innerHTML = ''; historyContainer.innerHTML = '';
            let currentPendingCount = 0;

            for (const tableId in activeOrders) {
                const order = activeOrders[tableId];
                const myItems = order.items ? order.items.filter(i => i.dest === 'Cuisine' || i.dest === 'Dessert') : [];
                if (myItems.length === 0) continue;

                const isWeb = tableId.includes('WEB');
                const titreTable = isWeb ? tableId : 'Table ' + tableId.replace('T', '');
                const nbCovers = order.covers || 1;

                const pendingItems = myItems.filter(i => !i.done);
                if (pendingItems.length > 0) {
                    currentPendingCount += pendingItems.length;
                    const ticketDiv = document.createElement('div');
                    ticketDiv.className = 'ticket';
                    
                    const grouped = { 1: [], 2: [], 3: [], 0: [] };
                    pendingItems.forEach(i => { grouped[i.step || 0].push(i); });

                    let bodyHtml = '';
                    [1, 2, 3, 0].forEach(step => {
                        if (grouped[step].length > 0) {
                            bodyHtml += `
                                <div class="course-section">
                                    <div class="course-title">${getCourseName(step)}</div>
                                    <ul class="course-items">
                                        ${grouped[step].map(i => {
                                            const name = i.n.replace(' [WEB]', '');
                                            const badge = i.n.includes('[WEB]') ? '<span class="web-badge">WEB</span>' : '';
                                            return `<li><span>${name}</span> ${badge}</li>`;
                                        }).join('')}
                                    </ul>
                                    <button class="btn-send" onclick="modifierStatutCours('${tableId}', ${step}, true)">ENVOYER ${getCourseName(step).split('.')[1] || 'PLATS'}</button>
                                </div>
                            `;
                        }
                    });

                    ticketDiv.innerHTML = `<div class="ticket-header"><div><span>${titreTable}</span><span style="color:#666; font-size:0.9rem; margin-left: 10px;">${order.time}</span></div><span class="ticket-covers">👥 ${nbCovers}p</span></div><div class="ticket-body">${bodyHtml}</div>`;
                    pendingContainer.appendChild(ticketDiv);
                }

                const doneItems = myItems.filter(i => i.done);
                if (doneItems.length > 0) {
                    const historyDiv = document.createElement('div');
                    historyDiv.className = 'history-ticket';
                    
                    const groupedDone = { 1: [], 2: [], 3: [], 0: [] };
                    doneItems.forEach(i => { groupedDone[i.step || 0].push(i); });

                    let historyHtml = `<div class="history-ticket-header"><h3>${titreTable}</h3><span style="color:#555; font-size:0.8rem;">👥 ${nbCovers}p</span></div>`;
                    
                    [1, 2, 3, 0].forEach(step => {
                        if (groupedDone[step].length > 0) {
                            historyHtml += `<div style="margin-bottom: 10px;"><div style="font-size:0.7rem; color:#888; margin-bottom:3px;">${getCourseName(step)}</div><ul class="history-items">${groupedDone[step].map(i => `<li>${i.n.replace(' [WEB]', '')}</li>`).join('')}</ul><button class="btn-undo" onclick="modifierStatutCours('${tableId}', ${step}, false)">↺ ANNULER (ERREUR)</button></div>`;
                        }
                    });
                    
                    historyDiv.innerHTML = historyHtml;
                    historyContainer.prepend(historyDiv);
                }
            }

            if (currentPendingCount > previousPendingCount) { playSound('new'); }
            previousPendingCount = currentPendingCount;
            document.getElementById('pending-count').textContent = currentPendingCount + " Plats";
        }

        async function modifierStatutCours(tableId, step, isDone) {
            const order = activeOrders[tableId];
            if (!order) return;

            if (isDone) playSound('send'); else playSound('undo');

            const today = getTodayString();
            let allStats = JSON.parse(localStorage.getItem('kds_archives_10ans') || '{}');
            if(!allStats[today]) allStats[today] = {};

            order.items.forEach(i => {
                if ((i.dest === 'Cuisine' || i.dest === 'Dessert') && (i.step || 0) === step) {
                    if (isDone && !i.done) { allStats[today][i.n] = (allStats[today][i.n] || 0) + 1; } 
                    else if (!isDone && i.done) { allStats[today][i.n] = Math.max(0, (allStats[today][i.n] || 0) - 1); }
                    i.done = isDone; if(!isDone) i.served = false; 
                }
            });

            localStorage.setItem('kds_archives_10ans', JSON.stringify(allStats));
            if (document.getElementById('stats-drawer').classList.contains('open')) renderStatsDrawer();

            const allDone = order.items.every(i => i.done || i.served);
            if (allDone) {
                order.status = 'ready';
                if (!order.readyPostes) order.readyPostes = [];
                if (!order.readyPostes.includes('Cuisine')) order.readyPostes.push('Cuisine');
            } else {
                order.status = 'pending';
                if (order.readyPostes) order.readyPostes = order.readyPostes.filter(p => p !== 'Cuisine');
            }

            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId, order }) });
        }
    </script>
</body>
</html>
