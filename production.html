<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - CUISINE MASTER ULTIMATE</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 25px 50px; font-size: 1.5rem; font-weight: 900; background: #fff; color: #000; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        /* HEADER UNIQUE SUR UNE SEULE LIGNE */
        .master-header { 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #0a0a0a; 
            padding: 10px 20px; 
            border-bottom: 2px solid var(--gold); 
            gap: 20px;
        }
        
        .stock-banner { 
            font-weight: 900; 
            color: var(--gold); 
            text-transform: uppercase; 
            font-size: 1.1rem; 
            white-space: nowrap; 
        }

        .nav-buttons { display: flex; gap: 8px; }
        
        .btn-nav { 
            background: transparent; 
            border: 1px solid #fff; 
            color: #fff; 
            padding: 8px 15px; 
            border-radius: 4px; 
            cursor: pointer; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 0.75rem; 
            white-space: nowrap;
            transition: 0.2s;
        }
        .btn-nav:hover { background: #fff; color: #000; }
        .btn-nav.gold { border-color: var(--gold); color: var(--gold); }
        .btn-nav.sync { border-color: var(--alert); color: var(--alert); }

        /* ZONE DE PRODUCTION */
        #production-area { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket-wire { border: 1px solid var(--line); border-radius: 8px; padding: 15px; background: #050505; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .tw-header { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; text-align: center; }
        .tw-head-title { background: var(--line); color: #000; font-weight: 900; padding: 5px; font-size: 0.7rem; }
        .tw-head-val { padding: 10px; font-weight: 900; font-size: 1.3rem; border-top: 1px solid var(--line); border-right: 1px solid #333;}
        .tw-section { border: 1px solid #222; border-radius: 4px; padding: 8px; margin-bottom: 5px; }
        .tw-sec-title { font-size: 0.8rem; font-weight: 900; text-transform: uppercase; color: var(--gold); margin-bottom: 5px; }
        .tw-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dashed #333; font-weight: bold; font-size: 1.1rem; }
        .btn-send { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 4px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; }

        /* TIROIRS */
        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .drawer.open { display: flex; flex-direction: column; }
        .btn-close { background: #fff; color: #000; border: none; width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-weight: 900; font-size: 1.2rem; align-self: flex-end; }
        .haccp-nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .haccp-tab { flex: 1; padding: 15px; background: transparent; border: 1px solid #444; color: #aaa; cursor: pointer; font-weight: 900; text-transform: uppercase; }
        .haccp-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
    </style>
</head>
<body>

    <div id="start-overlay"><button onclick="initSystem()">DÉMARRER LE SERVICE</button></div>

    <header class="master-header">
        <div class="stock-banner" id="stock-list">STOCK : PRÊT / VIDE</div>
        <div class="nav-buttons">
            <button class="btn-nav" onclick="openDrawer('recipe-drawer')">📖 RECETTES</button>
            <button class="btn-nav" onclick="openDrawer('staff-drawer')">📅 PLANNING</button>
            <button class="btn-nav" onclick="openDrawer('res-drawer')">⚡ RÉSERVATIONS</button>
            <button class="btn-nav gold" onclick="openDrawer('haccp-drawer')">⚙️ EPACK HACCP</button>
            <button class="btn-nav sync" onclick="location.reload()">🔄 SYNC</button>
        </div>
    </header>

    <div id="production-area">
        <h2 id="pending-count" style="margin-top:0; font-size: 1rem; color: #888;">0 PLATS EN ATTENTE</h2>
        <div class="grid" id="pending-container"></div>
    </div>

    <div id="recipe-drawer" class="drawer"><button class="btn-close" onclick="closeDrawer('recipe-drawer')">✕</button><div id="recipe-content"></div></div>
    <div id="staff-drawer" class="drawer"><button class="btn-close" onclick="closeDrawer('staff-drawer')">✕</button><div id="staff-content"></div></div>
    <div id="res-drawer" class="drawer"><button class="btn-close" onclick="closeDrawer('res-drawer')">✕</button><div id="res-content"></div></div>
    <div id="haccp-drawer" class="drawer">
        <button class="btn-close" onclick="closeDrawer('haccp-drawer')">✕</button>
        <h2 style="color:var(--gold);">⚙️ EPACK HACCP</h2>
        <div class="haccp-nav">
            <button class="haccp-tab active" onclick="switchH(this,'temp')">🌡️ Températures</button>
            <button class="haccp-tab" onclick="switchH(this,'clean')">🧹 Nettoyage</button>
            <button class="haccp-tab" onclick="switchH(this,'recep')">📦 Réception</button>
        </div>
        <div id="h-view-temp"></div>
        <div id="h-view-clean" style="display:none;"></div>
        <div id="h-view-recep" style="display:none;"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let audioCtx = null;

        function initSystem() {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
            document.getElementById('start-overlay').style.display = 'none';
            forceSync();
        }

        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'ORDER_UPDATE') {
                    activeOrders = msg.activeOrders;
                    render();
                }
            } catch(e){}
        };

        async function forceSync() {
            try {
                const res = await fetch('/get-current-state');
                const data = await res.json();
                activeOrders = data.activeOrders;
                render();
            } catch(e){}
        }

        function render() {
            const container = document.getElementById('pending-container'); container.innerHTML = '';
            let countTotal = 0;

            if(activeOrders['GLOBAL_STOCK']) {
                document.getElementById('stock-list').innerHTML = "STOCK : " + activeOrders['GLOBAL_STOCK'].data.map(i => `${i.name}: ${i.qte}`).join(' | ');
            } else { document.getElementById('stock-list').innerText = "STOCK : PRÊT / VIDE"; }

            for (let tid in activeOrders) {
                if(tid.startsWith('GLOBAL_')) continue;
                const o = activeOrders[tid]; if(!o || o.status === 'system') continue;
                const pending = (o.items || []).filter(i => !i.done);
                if (pending.length === 0) continue;
                countTotal += pending.length;

                const div = document.createElement('div'); div.className = 'ticket-wire';
                const grouped = { 1:[], 2:[], 3:[] };
                pending.forEach(i => { 
                    let s = i.step || (i.category === 'Entrées' ? 1 : (i.category === 'Desserts' ? 3 : 2));
                    grouped[s].push(i);
                });

                const renderSec = (title, items, step) => {
                    if(items.length===0) return '';
                    return `<div class="tw-section"><div class="tw-sec-title">${title}</div>` +
                        items.map(i => `<div class="tw-item"><span>${i.n}</span></div>`).join('') + 
                        `<button class="btn-send" onclick="valider('${tid}',${step})">PRÊT ✅</button></div>`;
                };

                div.innerHTML = `
                    <div class="tw-header">
                        <div class="tw-head-title">TABLE</div><div class="tw-head-title">PAX</div><div class="tw-head-title">HEURE</div>
                        <div class="tw-head-val">${tid.replace('WEB_','')}</div><div class="tw-head-val">${o.pax || '1'}</div><div class="tw-head-val">${o.time || '--:--'}</div>
                    </div>
                    ${renderSec('ENTRÉES', grouped[1], 1)} ${renderSec('PLATS', grouped[2], 2)} ${renderSec('DESSERTS', grouped[3], 3)}
                `;
                container.appendChild(div);
            }
            document.getElementById('pending-count').innerText = countTotal + " PLATS EN ATTENTE";
        }

        async function valider(tid, step) {
            const o = activeOrders[tid];
            o.items.forEach(i => { 
                let s = i.step || (i.category === 'Entrées' ? 1 : (i.category === 'Desserts' ? 3 : 2));
                if(s === step) i.done = true; 
            });
            o.status = 'ready';
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:tid, order:o}) });
        }

        function openDrawer(id) { document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        setInterval(forceSync, 4000);
    </script>
</body>
</html>
