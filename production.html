<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - PRODUCTION UNIT</title>
    <style>
        :root { --bg: #050505; --text: #fff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --sub: #888; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        #start-overlay button { padding: 25px 50px; font-size: 1.5rem; font-weight: 900; background: #fff; cursor: pointer; text-transform: uppercase; border: none; }

        /* HEADER EMPIRE - STRUCTURE FORCEE */
        .master-header { 
            position: relative;
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            background: #000; 
            padding: 15px 25px; 
            border-bottom: 3px solid var(--gold); /* TA LIGNE JAUNE */
            min-height: 60px;
        }

        .header-left { font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1rem; }

        /* COMPTE À REBOURS - CENTRE ABSOLU */
        .header-center {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        #pending-counter { 
            font-weight: 900; 
            color: #fff; 
            text-transform: uppercase; 
            font-size: 1.8rem; /* PERCUTANT */
            white-space: nowrap;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .nav-btns { display: flex; gap: 10px; z-index: 2; }
        
        .btn-nav { 
            background: transparent; border: 1px solid #fff; color: #fff; padding: 10px 18px; 
            border-radius: 4px; cursor: pointer; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; 
            transition: 0.2s;
        }
        .btn-nav:hover { background: #fff; color: #000; }
        .btn-nav.gold { border-color: var(--gold); color: var(--gold); }
        .btn-nav.sync { border-color: var(--alert); color: var(--alert); }

        /* GRILLE DE PRODUCTION */
        #production-area { flex: 1; padding: 25px; overflow-y: auto; background-image: radial-gradient(#111 1px, transparent 1px); background-size: 25px 25px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 25px; }
        .ticket { border: 2px solid #fff; border-radius: 12px; padding: 20px; background: #000; border-left: 8px solid #fff; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ticket-head { display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 12px; margin-bottom: 15px; font-weight: 900; font-size: 1.2rem; }
        
        /* TIROIRS */
        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; display: none; padding: 50px; box-sizing: border-box; }
        .drawer.open { display: flex; flex-direction: column; }
    </style>
</head>
<body>

    <div id="start-overlay"><button onclick="initSystem()">LANCER LE SERVICE</button></div>

    <header class="master-header">
        <div class="header-left">CUISINE : <span style="color:var(--gold)">LIVE</span></div>
        
        <div class="header-center">
            <div id="pending-counter">0 PLATS EN ATTENTE</div>
        </div>
        
        <div class="nav-btns">
            <button class="btn-nav" onclick="openDrawer('plan-drawer')">📅 PLANNING</button>
            <button class="btn-nav gold" onclick="openDrawer('haccp-drawer')">⚙️ EPACK HACCP</button>
            <button class="btn-nav sync" onclick="location.reload()">🔄 SYNC</button>
        </div>
    </header>

    <div id="production-area">
        <div class="grid" id="kds-grid"></div>
    </div>

    <div id="plan-drawer" class="drawer">
        <h1 style="color:var(--gold)">📅 PLANNING BRIGADE</h1>
        <div id="plan-content" style="margin-top:20px;"></div>
        <button onclick="closeDrawer()" class="btn-nav" style="margin-top:auto;">FERMER</button>
    </div>

    <div id="haccp-drawer" class="drawer">
        <h1 style="color:var(--gold)">⚙️ RELEVÉ HACCP</h1>
        <div style="text-align:center; margin-top:50px;">
            <input type="number" id="h-temp" value="4.0" step="0.5" style="font-size:4rem; background:none; border:2px solid var(--gold); color:#fff; text-align:center; width:200px; padding:10px;">
            <br><br>
            <button class="btn-nav gold" style="padding:20px 40px; font-size:1.2rem;" onclick="logHaccp()">ENREGISTRER AU REGISTRE</button>
        </div>
        <button onclick="closeDrawer()" class="btn-nav" style="margin-top:auto;">FERMER</button>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let audioCtx = null;

        function initSystem() { 
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            document.getElementById('start-overlay').style.display = 'none'; 
            forceSync(); 
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if(msg.type === 'ORDER_UPDATE') { activeOrders = msg.activeOrders; render(); }
        };

        function render() {
            const grid = document.getElementById('kds-grid'); grid.innerHTML = '';
            let totalPlats = 0;

            for(let tid in activeOrders) {
                if(tid.startsWith('GLOBAL_')) continue;
                const o = activeOrders[tid];
                const pending = (o.items || []).filter(i => !i.done);
                if(pending.length === 0) continue;
                totalPlats += pending.length;

                const div = document.createElement('div'); div.className = 'ticket';
                div.innerHTML = `
                    <div class="ticket-head"><span>${tid}</span> <span>${o.time}</span></div>
                    <div style="margin-bottom:20px;">${pending.map(i => `<div style="padding:8px 0; font-size:1.1rem; border-bottom:1px solid #111;"><b>${i.n}</b></div>`).join('')}</div>
                    <button class="btn-nav" style="width:100%; background:var(--accent); color:#000; border:none; padding:15px; font-size:1rem;" onclick="valider('${tid}')">ENVOYER ✅</button>
                `;
                grid.appendChild(div);
            }
            // MISE À JOUR DU COMPTEUR AU CENTRE - VISIBILITÉ MAXIMUM
            document.getElementById('pending-counter').innerText = totalPlats + (totalPlats > 1 ? " PLATS" : " PLAT") + " EN ATTENTE";
            
            // Alerte visuelle si surcharge
            if(totalPlats > 10) { document.getElementById('pending-counter').style.color = var(--alert); }
            else { document.getElementById('pending-counter').style.color = "#fff"; }
        }

        async function valider(tid) {
            const o = activeOrders[tid]; o.items.forEach(i => i.done = true);
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:tid, order:o}) });
        }

        async function logHaccp() {
            const log = { time: new Date().toLocaleString(), type: 'TEMP', eq: 'Frigo Master', val: document.getElementById('h-temp').value };
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:'HACCP_EVENT', order:{status:'system', data:log}}) });
            alert("Transmis"); closeDrawer();
        }

        function openDrawer(id) { document.getElementById(id).classList.add('open'); if(id==='plan-drawer') renderPlan(); }
        function closeDrawer() { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open')); }
        function renderPlan() {
            const p = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            document.getElementById('plan-content').innerHTML = p.map(s => `<div class="ticket" style="margin-bottom:10px; border-left-color:var(--gold)"><b>${s.name}</b> : ${s.role}</div>`).join('');
        }

        async function forceSync() {
            const res = await fetch('/get-current-state'); const data = await res.json();
            activeOrders = data.activeOrders; render();
        }
        setInterval(forceSync, 5000);
    </script>
</body>
</html>
