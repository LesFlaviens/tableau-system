<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Cuisine</title>
    <style>
        body { font-family: sans-serif; background: #050505; color: white; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .ticket { background: #111; border-left: 10px solid #ff1744; padding: 20px; border-radius: 10px; }
        .btn { width: 100%; padding: 15px; background: #ff1744; border: none; color: white; font-weight: 900; cursor: pointer; margin-top: 15px; text-transform: uppercase; transition: 0.2s;}
        .btn:active { transform: scale(0.95); }
        ul { padding-left: 20px; margin-bottom: 0; }
        li { margin-bottom: 8px; font-size: 1.1rem; }
        .web-badge { background: #00e676; color: #000; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; vertical-align: middle; margin-left: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <h1 style="color:#ff1744; text-transform: uppercase; letter-spacing: 2px;">🔥 CUISINE (PLATS)</h1>
    <div class="grid" id="container"></div>

    <script>
        // Le bouclier HTTPS est intégré ici pour correspondre au nouveau serveur
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') renderCuisine(msg.activeOrders);
        };

        function renderCuisine(orders) {
            const container = document.getElementById('container');
            container.innerHTML = '';
            for (const tableId in orders) {
                const order = orders[tableId];
                // On filtre pour ne garder que ce qui va en Cuisine et qui n'est pas encore terminé
                const plats = order.items.filter(i => i.dest === 'Cuisine' && !i.done);
                
                if (plats.length > 0) {
                    const div = document.createElement('div');
                    div.className = 'ticket';
                    
                    const isWeb = tableId.includes('WEB');
                    const titreTable = isWeb ? tableId : 'Table ' + tableId.replace('T', '');
                    
                    div.innerHTML = `
                        <h2 style="margin-top:0; color:#fff;">${titreTable}</h2>
                        <ul>${plats.map(i => {
                            const cleanName = i.n.replace(' [WEB]', '');
                            const badge = i.n.includes('[WEB]') ? '<span class="web-badge">WEB</span>' : '';
                            return `<li>${cleanName} ${badge}</li>`;
                        }).join('')}</ul>
                        <button class="btn" onclick="validerTicket('${tableId}')">TERMINÉ</button>
                    `;
                    container.appendChild(div);
                }
            }
        }

        async function validerTicket(tableId) {
            await fetch('/mark-ready', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tableId: tableId, poste: 'Cuisine' })
            });
        }
    </script>
</body>
</html>
