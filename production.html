<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --haccp: #00b0ff; --hr: #2979ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 20px 40px; font-size: 1.5rem; font-weight: 900; background: var(--alert); color: #fff; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        
        #production-area { flex: 3; padding: 20px; overflow-y: auto; border-right: 2px solid #333; position: relative;}
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        
        /* TIROIRS */
        .drawer { position: absolute; left: 0; top: 0; width: 450px; height: 100%; background: #0a0a0a; border-right: 2px solid #333; padding: 25px; z-index: 8000; box-sizing: border-box; overflow-y: auto; transform: translateX(-100%); transition: transform 0.3s ease; box-shadow: 15px 0 50px rgba(0,0,0,0.9); }
        .drawer.open { transform: translateX(0); }
        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: #222; border: none; color: #fff; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-weight: bold;}

        /* PLANNING STAFF GRID (DANS TIROIR) */
        .staff-plan-card { background: #161616; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 20px; border-top: 4px solid var(--hr); }
        .staff-plan-name { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; color: var(--hr); margin-bottom: 10px; display: block; }
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 10px; }
        .mini-day { background: #000; padding: 5px 2px; border-radius: 4px; text-align: center; font-size: 0.6rem; }
        .mini-day.off { color: var(--alert); }
        .mini-day.half { color: orange; }
        .leave-balance { display: flex; justify-content: space-between; font-size: 0.8rem; background: #000; padding: 8px; border-radius: 4px; color: #888; }

        .btn-top { background: #1a1a1a; font-weight: bold; border-radius: 4px; padding: 8px 15px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 0.85rem; color:#fff; border: 1px solid transparent;}
        .btn-top:hover { border-color: var(--hr); }

        /* TICKET STYLE */
        .ticket { background: var(--panel); border: 1px solid #333; border-top: 8px solid var(--alert); border-radius: 8px; margin-bottom: 20px; }
        .ticket-header { background: #1a1a1a; padding: 12px; display: flex; justify-content: space-between; font-weight: 900; }
        .btn-send { width: 100%; padding: 15px; background: var(--accent); border: none; color: #000; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>KDS EMPIRE</h1>
        <button onclick="initSystem()">DÉMARRER LE SERVICE</button>
    </div>

    <div id="production-area">
        
        <div id="staff-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('staff-drawer')">✕ FERMER</button>
            <h2 style="margin-top:40px; color:var(--hr); text-transform:uppercase; letter-spacing:1px;">📅 PLANNING ÉQUIPE</h2>
            <div id="staff-planning-container">
                </div>
        </div>

        <div id="gestion-drawer" class="drawer">
             </div>

        <div class="header-container">
            <h2 style="color:var(--alert);">🔥 EN PRODUCTION <span id="pending-count">0</span></h2>
            <div style="display: flex; gap: 10px;">
                <button class="btn-top" style="border-color:var(--hr); color:var(--hr);" onclick="openStaffPlanning()">📅 PLANNING STAFF</button>
                <button class="btn-top" onclick="openDrawer('gestion-drawer')">⚙️ GESTION</button>
            </div>
        </div>
        <div class="grid" id="pending-container"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {};

        function initSystem() { document.getElementById('start-overlay').style.display = 'none'; }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
        function openDrawer(id) { document.getElementById(id).classList.add('open'); }

        // --- LOGIQUE DE LECTURE DU PLANNING (LE PONT RH) ---
        function openStaffPlanning() {
            renderStaffPlanning();
            openDrawer('staff-drawer');
        }

        function renderStaffPlanning() {
            // On vient lire la base de données créée dans rh.html (v9)
            const staff = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            const container = document.getElementById('staff-planning-container');
            const jours = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];

            if(staff.length === 0) {
                container.innerHTML = "<p style='color:#555; text-align:center;'>Aucun planning disponible.</p>";
                return;
            }

            container.innerHTML = staff.map(s => {
                const daysHTML = s.plan.map((p, i) => {
                    let statusLabel = "TRAVAIL";
                    let classN = "";
                    if(p.status === "off") { statusLabel = "OFF"; classN = "off"; }
                    else if(p.status === "off_matin") { statusLabel = "S_SOIR"; classN = "half"; }
                    else if(p.status === "off_soir") { statusLabel = "S_MAT"; classN = "half"; }
                    else if(p.status === "maladie") { statusLabel = "MAL."; classN = "off"; }

                    return `<div class="mini-day ${classN}"><b style="display:block; color:#444;">${jours[i]}</b>${statusLabel}</div>`;
                }).join('');

                return `
                <div class="staff-plan-card">
                    <span class="staff-plan-name">${s.name}</span>
                    <div class="mini-grid">${daysHTML}</div>
                    <div class="leave-balance">
                        <span>Congés (CP) : <b>${s.cp || 0}j</b></span>
                        <span>Contrat : <b>${s.contract}h</b></span>
                    </div>
                </div>`;
            }).join('');
        }

        // --- LOGIQUE KDS CLASSIQUE ---
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') { activeOrders = msg.activeOrders; renderKDS(); }
        };

        function renderKDS() {
            const container = document.getElementById('pending-container');
            container.innerHTML = '';
            let count = 0;
            for (const tableId in activeOrders) {
                const order = activeOrders[tableId];
                const items = (order.items || []).filter(i => !i.done);
                if(items.length === 0) continue;
                count += items.length;
                const ticket = document.createElement('div');
                ticket.className = 'ticket';
                ticket.innerHTML = `<div class="ticket-header"><span>Table ${tableId.replace('T','')}</span><span>${order.time}</span></div>
                                    <div style="padding:15px;">${items.map(i => `<div style="margin-bottom:10px;">• ${i.n}</div>`).join('')}</div>
                                    <button class="btn-send" onclick="markDone('${tableId}')">ENVOYER</button>`;
                container.appendChild(ticket);
            }
            document.getElementById('pending-count').textContent = count;
        }

        async function markDone(tableId) {
            const order = activeOrders[tableId];
            order.items.forEach(i => i.done = true);
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId, order }) });
        }
    </script>
</body>
</html>
