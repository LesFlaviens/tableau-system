<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>TERMINAL CUISINE - Empire COMMAND</title>
    <style>
        :root { --bg: #050505; --accent: #ff1744; --text: #fff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .view-salle { width: 40%; border-right: 2px solid #222; background: #000; position: relative; }
        .view-orders { flex: 1; padding: 25px; overflow-y: auto; background: #080808; }
        .ticket { background: #121212; border-left: 8px solid var(--accent); padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .ticket h3 { margin: 0 0 10px 0; color: var(--accent); font-size: 1.8rem; }
        .ticket ul { font-size: 1.5rem; font-weight: bold; list-style: none; padding: 0; }
        .btn-ready { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: 900; border-radius: 8px; cursor: pointer; margin-top: 15px; text-transform: uppercase; }
    </style>
</head>
<body>
    <div class="view-salle" id="canvas-mirror">
        <div style="padding:20px; color:#444; font-weight:900;">🔥 MIROIR SALLE (CHAUD)</div>
    </div>
    <div class="view-orders">
        <h1 style="color:var(--accent); text-transform:uppercase; letter-spacing:3px;">Bons de Cuisine</h1>
        <div id="zone-tickets"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('order-received', (order) => {
            const plats = order.articles.filter(a => a.includes('[Plat]'));
            if (plats.length > 0) {
                const div = document.createElement('div');
                div.className = 'ticket';
                div.innerHTML = `
                    <h3>${order.table} <span style="font-size:0.8rem; color:#666;">${order.heure}</span></h3>
                    <ul>${plats.map(p => `<li>${p.replace('[Plat] ', '')}</li>`).join('')}</ul>
                    <button class="btn-ready" onclick="this.parentElement.remove()">Prêt en Cuisine</button>
                `;
                document.getElementById('zone-tickets').prepend(div);
            }
        });
    </script>
</body>
</html>
