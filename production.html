<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - SECTEUR PRODUCTION</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        #start-overlay button { padding: 25px 50px; font-size: 1.5rem; font-weight: 900; background: #fff; cursor: pointer; text-transform: uppercase; }
        .master-header { display: flex; align-items: center; justify-content: space-between; background: #0a0a0a; padding: 10px 20px; border-bottom: 2px solid var(--gold); gap: 20px; }
        .secteur-title { font-weight: 900; color: var(--gold); text-transform: uppercase; font-size: 1.1rem; }
        .nav-buttons { display: flex; gap: 8px; }
        .btn-nav { background: transparent; border: 1px solid #fff; color: #fff; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; }
        #production-area { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket-wire { border: 1px solid var(--line); border-radius: 8px; padding: 15px; background: #050505; display: flex; flex-direction: column; gap: 10px; border-left: 5px solid var(--line); }
        .tw-header { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; text-align: center; }
        .tw-head-val { padding: 10px; font-weight: 900; font-size: 1.3rem; border-top: 1px solid var(--line); }
        .btn-send { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 4px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; }
        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; padding: 30px; box-sizing: border-box; overflow-y: auto; flex-direction: column;}
        .drawer.open { display: flex; }
        .h-content { background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 8px; }
        .temp-ctrl { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
        .btn-touch { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); background: transparent; color: #fff; font-size: 2rem; font-weight: 900; cursor: pointer; }
        .temp-val { font-size: 3.5rem; font-weight: 900; color: var(--gold); min-width: 140px; text-align: center; }
        .input-empire { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; width: 100%; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="start-overlay"><button onclick="initSystem()">DÉMARRER PRODUCTION</button></div>
    <header class="master-header">
        <div class="secteur-title">PRODUCTION CUISINE</div>
        <div class="nav-buttons">
            <button class="btn-nav" onclick="openDrawer('res-drawer')">⚡ RÉSERVATIONS</button>
            <button class="btn-nav gold" onclick="openDrawer('haccp-drawer')">⚙️ EPACK HACCP</button>
            <button class="btn-nav" onclick="location.reload()">🔄 SYNC</button>
        </div>
    </header>
    <div id="production-area"><div class="grid" id="pending-container"></div></div>

    <div id="haccp-drawer" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--gold); margin:0;">EPACK HACCP</h2>
            <button onclick="closeDrawer('haccp-drawer')" class="btn-nav">FERMER ✕</button>
        </div>
        <div class="h-content">
            <label>ÉQUIPEMENT :</label>
            <select id="sel-eq" class="input-empire"><option>Frigo Positif 1</option><option>CF Viandes</option></select>
            <div class="temp-ctrl">
                <button class="btn-touch" onclick="adjTemp(-0.5)">-</button>
                <div class="temp-val"><span id="val-temp">4.0</span>°</div>
                <button class="btn-touch" onclick="adjTemp(0.5)">+</button>
            </div>
            <button class="btn-send" onclick="saveTemp()">ENREGISTRER</button>
        </div>
    </div>

    <div id="res-drawer" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--gold); margin:0;">⚡ RÉSERVATIONS LIVE</h2>
            <button onclick="closeDrawer('res-drawer')" class="btn-nav">FERMER ✕</button>
        </div>
        <div id="res-list"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTemp = 4.0; let prevResaCount = 0; let audioCtx = null;

        function initSystem() { 
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
            document.getElementById('start-overlay').style.display = 'none'; 
            forceSync(); 
        }

        // --- SONNERIES DE L'EMPIRE ---
        function playBeep(f, d = 0.2) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination); o.type = 'square';
            o.frequency.setValueAtTime(f, audioCtx.currentTime);
            g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + d);
        }

        function chimeRoyal() {
            // Triade A-Major (Succès)
            [440, 554.37, 659.25].forEach((f, i) => {
                setTimeout(() => playBeep(f, 0.4), i * 150);
            });
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if(msg.type === 'ORDER_UPDATE') {
                // 1. Détection de nouvelle réservation
                if(msg.activeOrders['GLOBAL_RESERVATIONS']) {
                    const resas = msg.activeOrders['GLOBAL_RESERVATIONS'].data;
                    const totalResas = Object.values(resas).flat().length;
                    if(totalResas > prevResaCount && prevResaCount !== 0) {
                        chimeRoyal(); // Alerte Victoire
                    }
                    prevResaCount = totalResas;
                    renderResas(resas);
                }
                
                // 2. Détection de nouvelle commande cuisine
                const newOrders = Object.keys(msg.activeOrders).filter(k => !k.startsWith('GLOBAL_')).length;
                if(newOrders > Object.keys(activeOrders).filter(k => !k.startsWith('GLOBAL_')).length) playBeep(880);
                
                activeOrders = msg.activeOrders; render();
            }
        };

        function renderResas(data) {
            const date = new Date().toISOString().split('T')[0];
            const list = data[date] || [];
            document.getElementById('res-list').innerHTML = list.map(r => `
                <div class="h-content" style="margin-bottom:10px;">
                    <b style="color:var(--gold)">${r.time}</b> — ${r.name} (${r.pax} PAX)
                </div>`).join('') || "Aucune résa aujourd'hui.";
        }

        function render() {
            const container = document.getElementById('pending-container'); container.innerHTML = '';
            for (let tid in activeOrders) {
                if(tid.startsWith('GLOBAL_')) continue;
                const o = activeOrders[tid]; const pending = (o.items || []).filter(i => !i.done);
                if(pending.length === 0) continue;
                const div = document.createElement('div'); div.className = 'ticket-wire';
                div.innerHTML = `<div class="tw-header"><div class="tw-head-val">${tid}</div><div class="tw-head-val">${o.pax||1} PAX</div><div class="tw-head-val">${o.time||''}</div></div>` +
                    pending.map(i => `<div style="padding:10px; border-bottom:1px dashed #222;"><b>${i.n}</b></div>`).join('') +
                    `<button class="btn-send" onclick="valider('${tid}')">PRÊT ✅</button>`;
                container.appendChild(div);
            }
        }

        async function valider(tid) {
            const o = activeOrders[tid]; o.items.forEach(i => i.done = true); o.status = 'ready'; playBeep(440);
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:tid, order:o}) });
        }

        function adjTemp(v) { currentTemp = Math.round((currentTemp + v) * 10) / 10; document.getElementById('val-temp').innerText = currentTemp.toFixed(1); }
        async function saveTemp() {
            const log = { time: new Date().toLocaleString(), type: 'TEMP', eq: document.getElementById('sel-eq').value, val: currentTemp };
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:'HACCP_EVENT', order:{status:'system', data:log}}) });
            alert("✅ Température Transmise");
        }

        function openDrawer(id) { document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
        async function forceSync() {
            const res = await fetch('/get-current-state'); const data = await res.json();
            activeOrders = data.activeOrders;
            if(activeOrders['GLOBAL_RESERVATIONS']) {
                prevResaCount = Object.values(activeOrders['GLOBAL_RESERVATIONS'].data).flat().length;
                renderResas(activeOrders['GLOBAL_RESERVATIONS'].data);
            }
            render();
        }
        setInterval(forceSync, 5000);
    </script>
</body>
</html>
