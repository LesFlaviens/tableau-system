<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - SECTEUR PRODUCTION</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 25px 50px; font-size: 1.5rem; font-weight: 900; background: #fff; color: #000; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        .master-header { display: flex; align-items: center; justify-content: space-between; background: #0a0a0a; padding: 10px 20px; border-bottom: 2px solid var(--gold); gap: 20px; }
        .secteur-title { font-weight: 900; color: var(--gold); text-transform: uppercase; font-size: 1.1rem; white-space: nowrap; }
        .nav-buttons { display: flex; gap: 8px; }
        
        .btn-nav { background: transparent; border: 1px solid #fff; color: #fff; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: 900; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; }
        .btn-nav.gold { border-color: var(--gold); color: var(--gold); }

        #production-area { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket-wire { border: 1px solid var(--line); border-radius: 8px; padding: 15px; background: #050505; display: flex; flex-direction: column; gap: 10px; }
        .tw-header { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; text-align: center; }
        .tw-head-val { padding: 10px; font-weight: 900; font-size: 1.3rem; border-top: 1px solid var(--line); }
        .btn-send { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 4px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase; }

        /* HACCP DRAWER */
        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; padding: 30px; box-sizing: border-box; overflow-y: auto; flex-direction: column;}
        .drawer.open { display: flex; }
        .haccp-nav { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        .h-tab { flex: 1; padding: 15px; background: transparent; border: 1px solid #444; color: #888; cursor: pointer; font-weight: 900; border-radius: 4px; }
        .h-tab.active { border-color: var(--gold); color: #fff; background: #111; }
        
        .h-content { background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 8px; }
        
        /* TACTILE TEMP */
        .temp-ctrl { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 20px 0; }
        .btn-touch { width: 70px; height: 70px; border-radius: 50%; border: 2px solid var(--gold); background: transparent; color: #fff; font-size: 2rem; font-weight: 900; cursor: pointer; }
        .temp-val { font-size: 3.5rem; font-weight: 900; color: var(--gold); min-width: 140px; text-align: center; }

        .input-empire { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; width: 100%; margin-bottom: 10px; box-sizing: border-box; font-weight: bold; }
        .log-list { margin-top: 20px; border-top: 1px solid #222; padding-top: 15px; max-height: 200px; overflow-y: auto; }
        .log-item { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #111; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div id="start-overlay"><button onclick="initSystem()">DÉMARRER LE SERVICE</button></div>

    <header class="master-header">
        <div class="secteur-title">PRODUCTION CUISINE</div>
        <div class="nav-buttons">
            <button class="btn-nav gold" onclick="openHaccp()">⚙️ EPACK HACCP</button>
            <button class="btn-nav" onclick="location.reload()">🔄 SYNC</button>
        </div>
    </header>

    <div id="production-area">
        <div class="grid" id="pending-container"></div>
    </div>

    <div id="haccp-drawer" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <h2 style="color:var(--gold); margin:0;">EPACK HACCP - EMPIRE</h2>
            <button onclick="closeHaccp()" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">FERMER ✕</button>
        </div>

        <div class="haccp-nav">
            <button class="h-tab active" onclick="switchHTab(this, 'temp')">🌡️ TEMPÉRATURES</button>
            <button class="h-tab" onclick="switchHTab(this, 'mat')">⚙️ MATÉRIEL</button>
            <button class="h-tab" onclick="switchHTab(this, 'dlc')">🥩 DLC / PRODUITS</button>
        </div>

        <div id="h-temp" class="h-content">
            <label>SÉLECTIONNER ÉQUIPEMENT :</label>
            <select id="sel-eq" class="input-empire"></select>
            
            <div class="temp-ctrl">
                <button class="btn-touch" onclick="adjTemp(-0.5)">-</button>
                <div class="temp-val"><span id="val-temp">4.0</span>°</div>
                <button class="btn-touch" onclick="adjTemp(0.5)">+</button>
            </div>
            <button class="btn-send" onclick="saveTemp()">ENREGISTRER RELEVÉ</button>
            <div class="log-list" id="log-temp"></div>
        </div>

        <div id="h-mat" class="h-content" style="display:none;">
            <label>AJOUTER UN ÉQUIPEMENT (Ex: Frigo 1) :</label>
            <div style="display:flex; gap:10px;">
                <input type="text" id="new-mat" class="input-empire" placeholder="Nom du matériel...">
                <button class="btn-nav gold" onclick="addMat()">AJOUTER</button>
            </div>
            <div id="mat-list" style="margin-top:20px;"></div>
        </div>

        <div id="h-dlc" class="h-content" style="display:none;">
            <label>NOM DU PRODUIT :</label>
            <input type="text" id="dlc-name" class="input-empire" placeholder="Ex: Entrecôte sous-vide">
            <label>DATE LIMITE (DLC) :</label>
            <input type="date" id="dlc-date" class="input-empire">
            <button class="btn-send" onclick="saveDLC()">LOGUER PRODUIT</button>
            <div class="log-list" id="log-dlc"></div>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTemp = 4.0;
        let materials = JSON.parse(localStorage.getItem('haccp_mat')) || ["Frigo Positif 1", "CF Viandes", "Congélateur"];

        function initSystem() { document.getElementById('start-overlay').style.display = 'none'; syncMat(); renderLogs(); }
        
        // LOGIQUE HACCP
        function openHaccp() { document.getElementById('haccp-drawer').classList.add('open'); }
        function closeHaccp() { document.getElementById('haccp-drawer').classList.remove('open'); }

        function switchHTab(btn, tabId) {
            document.querySelectorAll('.h-tab').forEach(t=>t.classList.remove('active'));
            document.querySelectorAll('.h-content').forEach(c=>c.style.display='none');
            btn.classList.add('active');
            document.getElementById('h-'+tabId).style.display = 'block';
        }

        function adjTemp(v) { currentTemp = Math.round((currentTemp + v) * 10) / 10; document.getElementById('val-temp').innerText = currentTemp.toFixed(1); }

        function syncMat() {
            const sel = document.getElementById('sel-eq');
            const list = document.getElementById('mat-list');
            sel.innerHTML = materials.map(m => `<option value="${m}">${m}</option>`).join('');
            list.innerHTML = materials.map((m, i) => `<div class="log-item"><span>${m}</span><button onclick="delMat(${i})" style="color:red; background:none; border:none;">✕</button></div>`).join('');
            localStorage.setItem('haccp_mat', JSON.stringify(materials));
        }

        function addMat() { const v = document.getElementById('new-mat').value; if(v){materials.push(v); document.getElementById('new-mat').value=''; syncMat();}}
        function delMat(i) { materials.splice(i,1); syncMat(); }

        async function saveTemp() {
            const log = { type:'TEMP', eq: document.getElementById('sel-eq').value, val: currentTemp, time: new Date().toLocaleString() };
            saveLocal('haccp_temp_logs', log);
            await pushHaccp(log);
        }

        async function saveDLC() {
            const name = document.getElementById('dlc-name').value;
            const date = document.getElementById('dlc-date').value;
            if(!name || !date) return;
            const log = { type:'DLC', name, date, time: new Date().toLocaleString() };
            saveLocal('haccp_dlc_logs', log);
            await pushHaccp(log);
        }

        function saveLocal(key, data) {
            let logs = JSON.parse(localStorage.getItem(key)) || [];
            logs.unshift(data); localStorage.setItem(key, JSON.stringify(logs.slice(0,20)));
            renderLogs();
        }

        function renderLogs() {
            const tLogs = JSON.parse(localStorage.getItem('haccp_temp_logs')) || [];
            document.getElementById('log-temp').innerHTML = tLogs.map(l => `<div class="log-item"><span>${l.eq}</span><b>${l.val}°C</b></div>`).join('');
            const dLogs = JSON.parse(localStorage.getItem('haccp_dlc_logs')) || [];
            document.getElementById('log-dlc').innerHTML = dLogs.map(l => `<div class="log-item"><span>${l.name}</span><b>DLC: ${l.date}</b></div>`).join('');
        }

        async function pushHaccp(log) {
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:'HACCP_EVENT', order:{status:'system', data:log}}) });
            alert("✅ Enregistré et Transmis");
        }

        // KDS LOGIC
        ws.onmessage = (e) => { 
            const msg = JSON.parse(e.data);
            if(msg.type === 'ORDER_UPDATE') { activeOrders = msg.activeOrders; renderKDS(); }
        };

        function renderKDS() {
            const container = document.getElementById('pending-container'); container.innerHTML = '';
            for (let tid in activeOrders) {
                if(tid.startsWith('GLOBAL_') || tid === 'HACCP_EVENT') continue;
                const o = activeOrders[tid]; const pending = (o.items || []).filter(i => !i.done);
                if(pending.length === 0) continue;
                const div = document.createElement('div'); div.className = 'ticket-wire';
                div.innerHTML = `<div class="tw-header"><div class="tw-head-val">${tid}</div><div class="tw-head-val">${o.pax||1} PAX</div><div class="tw-head-val">${o.time||''}</div></div>` +
                    pending.map(i => `<div style="padding:10px; border-bottom:1px dashed #222;"><b>${i.n}</b></div>`).join('') +
                    `<button class="btn-send" onclick="valider('${tid}')">ENVOYER ✅</button>`;
                container.appendChild(div);
            }
        }

        async function valider(tid) {
            const o = activeOrders[tid]; o.items.forEach(i => i.done = true); o.status = 'ready';
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:tid, order:o}) });
        }
    </script>
</body>
</html>
