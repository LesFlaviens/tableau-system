<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iCHEF OS - Pass Cuisine</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gold: #d4af37;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #fbbf24;
            --info: #3b82f6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- NAVBAR --- */
        .topbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 100; flex-shrink: 0; }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--gold); margin: 0; letter-spacing: 2px; }
        .badge { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        
        .filters { display: flex; gap: 10px; align-items: center; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none;}
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; text-transform: uppercase; white-space: nowrap; transition: 0.2s;}
        .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .filter-btn:active { transform: scale(0.95); }

        /* --- TICKETS BOARD --- */
        .board { flex: 1; padding: 20px; display: flex; gap: 20px; overflow-x: auto; overflow-y: hidden; align-items: flex-start; scroll-behavior: smooth; }
        .board::-webkit-scrollbar { height: 8px; }
        .board::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .ticket { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; width: 320px; flex-shrink: 0; display: flex; flex-direction: column; max-height: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .ticket.urgent { border-color: var(--danger); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .ticket.timeshift { opacity: 0.6; border-color: var(--warning); border-style: dashed; }
        
        /* HEADER TICKET */
        .t-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; background: rgba(0,0,0,0.2); border-radius: 12px 12px 0 0;}
        .t-table { font-size: 1.2rem; font-weight: 900; color: var(--text-main); margin-bottom: 4px; display: flex; align-items: center; gap: 8px;}
        .t-time { font-size: 0.8rem; font-weight: 700; color: var(--accent); padding: 4px 8px; background: rgba(16, 185, 129, 0.1); border-radius: 6px; }
        .t-time.late { color: var(--danger); background: rgba(239, 68, 68, 0.1); animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .t-meta { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase;}
        
        /* ITEMS TICKET */
        .t-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;}
        .t-body::-webkit-scrollbar { width: 4px; }
        .t-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .t-item { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 6px; }
        .t-item:hover { background: rgba(255,255,255,0.05); }
        .t-qty { font-weight: 900; color: var(--gold); font-size: 1.1rem; min-width: 25px; text-align: center; background: rgba(212, 175, 55, 0.1); padding: 2px 6px; border-radius: 4px;}
        .t-name { font-weight: 600; font-size: 0.95rem; line-height: 1.3; flex: 1;}
        .t-station { font-size: 0.6rem; color: var(--info); border: 1px solid rgba(59, 130, 246, 0.3); padding: 2px 4px; border-radius: 4px; text-transform: uppercase; font-weight: 800; align-self: flex-start; margin-top: 2px;}
        
        .t-item.done { opacity: 0.4; }
        .t-item.done .t-name { text-decoration: line-through; color: var(--text-muted); }
        .t-item.done .t-qty { background: transparent; color: var(--text-muted); }

        /* FOOTER TICKET */
        .t-footer { padding: 15px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.3); border-radius: 0 0 12px 12px;}
        .btn-ready { width: 100%; background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 900; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s;}
        .btn-ready:active { transform: scale(0.97); }
        .btn-ready.waiting { background: var(--warning); color: #000; }

        /* --- EMPTY STATE --- */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; color: var(--text-muted); text-align: center; }
        .empty-state div { font-size: 4rem; margin-bottom: 15px; opacity: 0.5; }
        .empty-state h3 { font-family: var(--font-title); font-size: 1.5rem; margin: 0 0 10px 0; color: var(--gold); }
        
        @media (max-width: 768px) {
            .topbar { flex-direction: column; gap: 15px; align-items: flex-start; padding: 15px;}
            .filters { width: 100%; }
            .board { flex-direction: column; overflow-y: auto; padding: 15px; gap: 15px;}
            .ticket { width: 100%; max-height: none; }
        }
    </style>
</head>
<body>

    <div class="topbar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <h1 class="logo">iCHEF.</h1>
            <span class="badge">Pass Production</span>
            <button class="filter-btn" style="padding: 4px 8px; font-size: 0.65rem;" onclick="window.location.href='chef.html?tenantID=' + tenantID">🔙 Labo</button>
        </div>
        <div class="filters" id="station-filters">
            <button class="filter-btn active" data-station="all" onclick="setStation('all')">Tous les postes</button>
            <button class="filter-btn" data-station="chaud" onclick="setStation('chaud')">🍳 Chaud</button>
            <button class="filter-btn" data-station="froid" onclick="setStation('froid')">🥗 Froid</button>
            <button class="filter-btn" data-station="grill" onclick="setStation('grill')">🔥 Grill</button>
            <button class="filter-btn" data-station="pizza" onclick="setStation('pizza')">🍕 Pizza</button>
            <button class="filter-btn" data-station="dessert" onclick="setStation('dessert')">🍰 Dessert</button>
        </div>
    </div>

    <div class="board" id="board">
        <div class="empty-state">
            <div>👨‍🍳</div>
            <h3>Cuisine Prête</h3>
            <p>En attente des premières commandes...</p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        let currentStation = 'all';
        let activeOrdersData = {};
        let systemSettings = {};

        // SÉCURITÉ DE BASE
        if (!tenantID) window.location.href = 'connexionpartenaire.html';

        // FILTRES DE POSTE
        function setStation(station) {
            currentStation = station;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.station === station) btn.classList.add('active');
            });
            renderBoard();
        }

        // FORMATAGE DU TEMPS
        function formatTimeDiff(timestamp) {
            let diff = Math.floor((Date.now() - timestamp) / 60000); // en minutes
            if (diff < 1) return "À l'instant";
            return `${diff} min`;
        }

        // RENDU KANBAN
        function renderBoard() {
            const board = document.getElementById('board');
            let html = '';
            let hasTickets = false;

            // Convertir l'objet en tableau et trier (les plus anciens en premier)
            let ordersArray = Object.keys(activeOrdersData)
                .filter(k => !k.includes('MASTER') && !k.includes('ARCHIVE') && !k.startsWith('STAFF_'))
                .map(k => ({ id: k, ...activeOrdersData[k] }))
                .filter(o => o.status === 'NOUVELLE COMMANDE' || o.status === 'EN PRÉPARATION' || o.status === 'EN ATTENTE (TIME-SHIFT)')
                .sort((a, b) => a.time - b.time);

            ordersArray.forEach(order => {
                // 1. Filtrer les items selon le poste sélectionné
                let relevantItems = order.items.filter(item => {
                    if(currentStation === 'all') return true;
                    // Si pas de destination définie, on l'affiche partout par sécurité
                    if(!item.dest && !item.station) return true; 
                    return (item.dest === currentStation || item.station === currentStation);
                });

                // Si la commande n'a aucun plat pour ce poste, on ne l'affiche pas
                if (relevantItems.length === 0) return;
                hasTickets = true;

                // 2. Gestion du Time-Shifting (IA Anti-Rush)
                let isTimeShifted = order.timeShifted && order.releaseTime > Date.now();
                let ticketClass = "ticket";
                let timeDisplay = formatTimeDiff(order.time);
                let timeClass = "t-time";

                if (isTimeShifted) {
                    ticketClass += " timeshift";
                    let minLeft = Math.ceil((order.releaseTime - Date.now()) / 60000);
                    timeDisplay = `⏳ En attente (${minLeft}m)`;
                } else {
                    let diffMinutes = Math.floor((Date.now() - order.time) / 60000);
                    if (diffMinutes >= 15) { ticketClass += " urgent"; timeClass += " late"; }
                }

                // 3. Rendu des lignes de commande
                let itemsHtml = relevantItems.map((item, idx) => {
                    let isDone = item.done === true;
                    // Retrouver l'index global de l'item dans la commande d'origine (important pour l'update)
                    let globalIdx = order.items.findIndex(i => i.name === item.name && i.qty === item.qty && i.done === item.done);
                    
                    return `
                    <div class="t-item ${isDone ? 'done' : ''}" onclick="toggleItemDone('${order.id}', ${globalIdx})">
                        <div class="t-qty">${item.qty}</div>
                        <div class="t-name">${item.name}</div>
                        ${item.station && currentStation === 'all' ? `<div class="t-station">${item.station.substring(0,3)}</div>` : ''}
                    </div>`;
                }).join('');

                // 4. Calcul de l'état du ticket
                let allDone = relevantItems.every(i => i.done === true);
                let btnHtml = '';
                
                if (isTimeShifted) {
                    btnHtml = `<button class="btn-ready waiting" disabled>EN ATTENTE...</button>`;
                } else if (allDone) {
                    btnHtml = `<button class="btn-ready" onclick="markOrderReady('${order.id}')">🛎️ BOUCLER LE TICKET</button>`;
                } else {
                    btnHtml = `<button class="btn-ready" style="background: rgba(255,255,255,0.1); color: var(--text-muted);" disabled>EN PRÉPARATION</button>`;
                }

                html += `
                <div class="${ticketClass}">
                    <div class="t-header">
                        <div>
                            <div class="t-table">${order.table.includes('WEB') ? '📱 Web ' + order.table.replace('WEB_', '#') : 'Table ' + order.table}</div>
                            <div class="t-meta">${order.typePaiement || 'Sur place'} • ${order.couverts || order.pax || 2} Pax</div>
                        </div>
                        <div class="${timeClass}">${timeDisplay}</div>
                    </div>
                    <div class="t-body">
                        ${itemsHtml}
                    </div>
                    <div class="t-footer">
                        ${btnHtml}
                    </div>
                </div>`;
            });

            if(!hasTickets) {
                board.innerHTML = `
                <div class="empty-state">
                    <div>👨‍🍳</div>
                    <h3>Cuisine Prête</h3>
                    <p>Poste ${currentStation === 'all' ? 'complet' : currentStation} en attente...</p>
                </div>`;
            } else {
                board.innerHTML = html;
            }
        }

        // --- ACTIONS ---

        async function toggleItemDone(orderId, itemIndex) {
            if(!activeOrdersData[orderId]) return;
            let order = activeOrdersData[orderId];
            
            // Si le ticket est en time-shift, on bloque l'action
            if(order.timeShifted && order.releaseTime > Date.now()) return;

            if (order.status === 'NOUVELLE COMMANDE') order.status = 'EN PRÉPARATION';
            
            order.items[itemIndex].done = !order.items[itemIndex].done;
            
            // Mise à jour visuelle instantanée
            renderBoard();

            // Envoi au serveur
            try {
                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: orderId, order: order })
                });
            } catch (e) { console.error("Erreur réseau"); }
        }

        async function markOrderReady(orderId) {
            if(!activeOrdersData[orderId]) return;
            let order = activeOrdersData[orderId];
            
            // Si c'est une commande Web, on la met en statut PRÊT (Ça fera sonner le téléphone du client)
            // Si c'est une commande Serveur, on peut la passer en "PRÊT" pour qu'il vienne chercher
            order.status = 'PRÊT';

            // Animation visuelle de sortie
            renderBoard();

            // Envoi au serveur
            try {
                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: orderId, order: order })
                });
            } catch (e) { console.error("Erreur réseau"); }
        }

        // --- SYNCHRONISATION WEBSOCKET ---
        const socket = io(SERVER_URL);
        socket.emit('joinTenant', tenantID);

        socket.on('updateState', (state) => {
            if(!state || !state.activeOrders) return;
            
            // Si on a un nouveau ticket non-time-shifted, on fait un petit bip
            let currentCount = Object.keys(activeOrdersData).filter(k => activeOrdersData[k].status === 'NOUVELLE COMMANDE').length;
            let newCount = Object.keys(state.activeOrders).filter(k => state.activeOrders[k].status === 'NOUVELLE COMMANDE').length;
            
            if (newCount > currentCount) {
                try { new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play(); } catch(e){}
            }

            activeOrdersData = state.activeOrders;
            renderBoard();
        });

        // Premier chargement
        async function fetchInitialState() {
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                let state = await r.json();
                if(state && state.activeOrders) {
                    activeOrdersData = state.activeOrders;
                    renderBoard();
                }
            } catch (e) {}
        }

        // Rafraîchissement régulier pour le compteur de temps
        setInterval(renderBoard, 30000); // 30 sec

        fetchInitialState();
    </script>
</body>
</html>
