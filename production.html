<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine Master</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #production-area { flex: 1; padding: 20px; overflow-y: auto; }
        .stock-banner { background: #111; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; gap: 20px; font-weight: 900; color: var(--gold); margin-bottom: 20px; text-transform: uppercase; min-height: 20px;}
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket-wire { border: 1px solid var(--line); border-radius: 8px; padding: 15px; background: #050505; display: flex; flex-direction: column; gap: 10px; border-left: 5px solid var(--line); }
        .tw-header { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; text-align: center; }
        .tw-head-title { background: var(--line); color: #000; font-weight: 900; padding: 5px; font-size: 0.7rem; }
        .tw-head-val { padding: 10px; font-weight: 900; font-size: 1.3rem; border-top: 1px solid var(--line); }
        .tw-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #333; font-weight: bold; font-size: 1.1rem; }
        .btn-send { background: var(--accent); color: #000; border: none; padding: 12px; border-radius: 4px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px; text-transform: uppercase;}
    </style>
</head>
<body>
    <div id="production-area">
        <div class="stock-banner" id="stock-list">STOCK : PRÊT / VIDE</div>
        <div style="margin-bottom: 20px; display:flex; justify-content: space-between; align-items:center;">
            <h2 id="pending-count" style="margin:0; color:var(--sub);">0 PLATS EN ATTENTE</h2>
            <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; padding:5px 10px; cursor:pointer; border-radius:4px;">RAFRAÎCHIR</button>
        </div>
        <div class="grid" id="pending-container"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let audioCtx = null;

        function beep(f) {
            try {
                if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination); o.type = 'square'; o.frequency.value = f;
                g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + 0.2);
            } catch(e){}
        }

        ws.onmessage = (e) => {
            try {
                const d = JSON.parse(e.data);
                if(d.type === 'ORDER_UPDATE') {
                    activeOrders = d.activeOrders;
                    render();
                }
            } catch(err) {}
        };

        async function render() {
            const container = document.getElementById('pending-container');
            container.innerHTML = '';
            let count = 0;

            // Mise à jour du Stock (si inexistant, on met "VIDE")
            if(activeOrders['GLOBAL_STOCK'] && activeOrders['GLOBAL_STOCK'].data) {
                document.getElementById('stock-list').innerHTML = "EN STOCK : " + activeOrders['GLOBAL_STOCK'].data.map(i => `${i.name}: ${i.qte}`).join(' | ');
            } else {
                document.getElementById('stock-list').innerHTML = "STOCK : AUCUNE DONNÉE DU CHEF";
            }

            // Boucle sur les commandes
            for (let tid in activeOrders) {
                if(tid.startsWith('GLOBAL_')) continue;
                const o = activeOrders[tid]; 
                if(!o || o.status === 'system') continue;
                
                const pending = (o.items || []).filter(i => !i.done);
                if (pending.length === 0) continue;
                count += pending.length;

                const div = document.createElement('div'); 
                div.className = 'ticket-wire';
                
                div.innerHTML = `
                    <div class="tw-header">
                        <div class="tw-head-title">TABLE</div><div class="tw-head-title">PAX</div><div class="tw-head-title">HEURE</div>
                        <div class="tw-head-val">${tid.replace('WEB_','')}</div>
                        <div class="tw-head-val">${o.pax || '1'}</div>
                        <div class="tw-head-val">${o.time || '--:--'}</div>
                    </div>
                    <div style="padding:10px">${pending.map(i => `<div class="tw-item"><span>${i.n}</span></div>`).join('')}</div>
                    <button class="btn-send" onclick="valider('${tid}')">ENVOYER TOUT ✅</button>
                `;
                container.appendChild(div);
            }
            document.getElementById('pending-count').innerText = count + " PLATS EN ATTENTE";
        }

        async function valider(tid) {
            const o = activeOrders[tid];
            o.items.forEach(i => i.done = true);
            o.status = 'ready';
            beep(440);
            await fetch('/update-order', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ tableId: tid, order: o }) 
            });
        }

        // Sync forcé au démarrage
        fetch('/get-current-state').then(r=>r.json()).then(d=>{activeOrders=d.activeOrders;render();});
        setInterval(() => fetch('/get-current-state').then(r=>r.json()).then(d=>{activeOrders=d.activeOrders;render();}), 4000);
    </script>
</body>
</html>
