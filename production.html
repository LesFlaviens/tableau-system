<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine Sync</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --web: #00e5ff; --gold: #ffb300; --accent: #00e676; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 25px 50px; font-size: 1.5rem; font-weight: 900; background: #fff; color: #000; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        #production-area { flex: 1; padding: 20px; overflow-y: auto; }
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; }
        .btn-nav { background: transparent; border: 1px solid #fff; color: #fff; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket-wire { border: 1px solid var(--line); border-radius: 8px; padding: 15px; background: #050505; display: flex; flex-direction: column; gap: 10px; }
        .tw-header { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; text-align: center; }
        .tw-head-title { background: var(--line); color: #000; font-weight: 900; padding: 5px; font-size: 0.75rem; }
        .tw-head-val { padding: 8px; font-weight: 900; font-size: 1.2rem; border-top: 1px solid var(--line); }
        .tw-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #333; font-weight: bold; font-size: 1.1rem; }
        .btn-send { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: 900; cursor: pointer; margin-top: 10px;}
        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .drawer.open { display: flex; flex-direction: column; }
        .recipe-card { border: 1px solid #333; padding: 20px; border-radius: 8px; background: #0a0a0a; margin-bottom: 15px; }
    </style>
</head>
<body>
    <div id="start-overlay"><button onclick="initSystem()">DÉMARRER CUISINE</button></div>
    <div id="production-area">
        <div class="nav-bar">
            <button class="btn-nav" onclick="openDrawer('recipe-drawer')">📖 RECETTES</button>
            <button class="btn-nav" style="border-color:red" onclick="safePurge()">🧹 PURGE TICKETS</button>
        </div>
        <div class="grid" id="pending-container"></div>
    </div>

    <div id="recipe-drawer" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
            <h2>📖 GRIMOIRE DU CHEF (SYNC LIVE)</h2>
            <button onclick="closeDrawer()" style="background:#fff; color:#000; border:none; width:45px; height:45px; border-radius:50%; font-weight:900;">✕</button>
        </div>
        <div id="recipe-content"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let audioCtx;

        function initSystem() { 
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
            document.getElementById('start-overlay').style.display = 'none'; 
            forceSync();
        }

        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'ORDER_UPDATE') {
                    // 1. Sync des Recettes
                    if (msg.activeOrders['GLOBAL_RECIPES']) {
                        localStorage.setItem('kds_grimoire_v2', JSON.stringify(msg.activeOrders['GLOBAL_RECIPES'].data));
                        if(document.getElementById('recipe-drawer').classList.contains('open')) renderRecipes();
                    }
                    // 2. Sync des commandes
                    activeOrders = msg.activeOrders;
                    render();
                }
            } catch(e){}
        };

        async function forceSync() {
            try {
                const res = await fetch('/get-current-state');
                const data = await res.json();
                if(data.activeOrders['GLOBAL_RECIPES']) {
                    localStorage.setItem('kds_grimoire_v2', JSON.stringify(data.activeOrders['GLOBAL_RECIPES'].data));
                }
                activeOrders = data.activeOrders;
                render();
            } catch(e){}
        }

        function render() {
            const container = document.getElementById('pending-container'); container.innerHTML = '';
            for (let tid in activeOrders) {
                const o = activeOrders[tid]; if(!o || o.status==='system') continue;
                const pending = (o.items || []).filter(i => !i.done);
                if(pending.length === 0) continue;

                const div = document.createElement('div'); div.className = 'ticket-wire';
                div.innerHTML = `
                    <div class="tw-header"><div class="tw-head-title">TABLE</div><div class="tw-head-title">HEURE</div><div class="tw-head-val">${tid}</div><div class="tw-head-val">${o.time || '--:--'}</div></div>
                    <div style="flex:1">${pending.map(i => `<div class="tw-item"><span>${i.n}</span></div>`).join('')}</div>
                    <button class="btn-send" onclick="valider('${tid}')">ENVOYER TOUT ✅</button>
                `;
                container.appendChild(div);
            }
        }

        async function valider(tid) {
            const o = activeOrders[tid]; o.items.forEach(i => i.done = true); o.status = 'ready';
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: tid, order: o }) });
        }

        function openDrawer(id) { document.getElementById(id).classList.add('open'); renderRecipes(); }
        function closeDrawer() { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open')); }

        function renderRecipes() {
            const recipes = JSON.parse(localStorage.getItem('kds_grimoire_v2')) || [];
            document.getElementById('recipe-content').innerHTML = recipes.map(r => `
                <div class="recipe-card">
                    <h3 style="color:var(--gold); margin-top:0;">${r.nom}</h3>
                    <pre style="white-space:pre-wrap; color:#aaa; font-family:inherit;">${r.content}</pre>
                </div>
            `).join('') || "Aucune recette synchronisée.";
        }

        async function safePurge() { if(confirm("Vider l'écran ?")) { for(let k in activeOrders) { if(k!=='GLOBAL_RECIPES') await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:k, order:null}) }); } } }

        setInterval(forceSync, 5000);
    </script>
</body>
</html>
