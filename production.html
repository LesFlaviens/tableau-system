<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - SECTEUR PRODUCTION</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; }
        #start-overlay button { padding: 20px 40px; font-size: 1.2rem; font-weight: 900; background: #fff; cursor: pointer; text-transform: uppercase; }

        /* BARRE UNIQUE : STOCK + TOUTE LA NAVIGATION */
        .master-header { 
            display: flex; align-items: center; justify-content: space-between; 
            background: #0a0a0a; padding: 10px 20px; border-bottom: 2px solid var(--gold); gap: 15px;
        }
        .secteur-title { font-weight: 900; color: var(--gold); text-transform: uppercase; font-size: 0.9rem; white-space: nowrap; }
        .nav-buttons { display: flex; gap: 6px; }
        
        .btn-nav { 
            background: transparent; border: 1px solid #444; color: #fff; padding: 6px 12px; 
            border-radius: 4px; cursor: pointer; font-weight: 900; text-transform: uppercase; font-size: 0.7rem; 
        }
        .btn-nav.gold { border-color: var(--gold); color: var(--gold); }
        .btn-nav.sync { border-color: var(--alert); color: var(--alert); }

        /* KDS AREA */
        #production-area { flex: 1; padding: 15px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .ticket-wire { border: 1px solid var(--line); border-radius: 6px; padding: 12px; background: #050505; display: flex; flex-direction: column; gap: 8px; }
        .tw-header { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; text-align: center; font-size: 0.8rem; }
        .tw-head-val { padding: 8px; font-weight: 900; border-right: 1px solid #222; }
        .btn-send { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: 900; cursor: pointer; margin-top: 5px; text-transform: uppercase; }

        /* TIROIR HACCP TACTILE INCORPORÉ */
        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; padding: 25px; box-sizing: border-box; overflow-y: auto; flex-direction: column;}
        .drawer.open { display: flex; }
        .temp-ctrl { display: flex; align-items: center; justify-content: center; gap: 20px; margin: 15px 0; }
        .btn-touch { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); background: transparent; color: #fff; font-size: 1.5rem; font-weight: 900; cursor: pointer; }
        .temp-val { font-size: 3rem; font-weight: 900; color: var(--gold); }
        .input-empire { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 4px; width: 100%; margin-bottom: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="start-overlay"><button onclick="initSystem()">DÉMARRER PRODUCTION</button></div>

    <header class="master-header">
        <div class="secteur-title" id="stock-banner">CUISINE : EN ATTENTE</div>
        <div class="nav-buttons">
            <button class="btn-nav" onclick="openDrawer('recipe-drawer')">📖 RECETTES</button>
            <button class="btn-nav" onclick="openDrawer('staff-drawer')">📅 PLANNING</button>
            <button class="btn-nav" onclick="openDrawer('res-drawer')">⚡ RÉSERVATIONS</button>
            <button class="btn-nav gold" onclick="openDrawer('haccp-drawer')">⚙️ EPACK HACCP</button>
            <button class="btn-nav sync" onclick="location.reload()">🔄 SYNC</button>
        </div>
    </header>

    <div id="production-area">
        <div class="grid" id="pending-container"></div>
    </div>

    <div id="haccp-drawer" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
            <h2 style="color:var(--gold); margin:0;">EPACK HACCP TACTILE</h2>
            <button onclick="closeDrawer('haccp-drawer')" class="btn-nav">FERMER ✕</button>
        </div>
        
        <div style="background:#0a0a0a; padding:15px; border-radius:8px; border:1px solid #222;">
            <label style="font-size:0.7rem; color:var(--sub)">ÉQUIPEMENT :</label>
            <select id="sel-eq" class="input-empire">
                <option>Frigo Positif 1</option>
                <option>Chambre Froide Viandes</option>
                <option>Congélateur -18°C</option>
            </select>
            <div class="temp-ctrl">
                <button class="btn-touch" onclick="adjTemp(-0.5)">-</button>
                <div class="temp-val"><span id="val-temp">4.0</span>°</div>
                <button class="btn-touch" onclick="adjTemp(0.5)">+</button>
            </div>
            <button class="btn-send" onclick="saveHaccp('TEMP')">LOGUER TEMPÉRATURE</button>
            <hr style="border:0; border-top:1px solid #222; margin:20px 0;">
            <label style="font-size:0.7rem; color:var(--sub)">TRAÇABILITÉ DLC :</label>
            <input type="text" id="dlc-name" class="input-empire" placeholder="Nom du produit (ex: Saumon)">
            <input type="date" id="dlc-date" class="input-empire">
            <button class="btn-send" style="background:var(--gold)" onclick="saveHaccp('DLC')">LOGUER PRODUIT</button>
        </div>
    </div>

    <div id="recipe-drawer" class="drawer"><button onclick="closeDrawer('recipe-drawer')">✕</button><div id="recipe-content"></div></div>
    <div id="staff-drawer" class="drawer"><button onclick="closeDrawer('staff-drawer')">✕</button><div id="staff-content"></div></div>
    <div id="res-drawer" class="drawer"><button onclick="closeDrawer('res-drawer')">✕</button><div id="res-content"></div></div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTemp = 4.0;

        function initSystem() { document.getElementById('start-overlay').style.display = 'none'; forceSync(); }

        function adjTemp(v) { currentTemp = Math.round((currentTemp + v) * 10) / 10; document.getElementById('val-temp').innerText = currentTemp.toFixed(1); }

        async function saveHaccp(type) {
            const log = {
                time: new Date().toLocaleString(),
                type: type,
                eq: type === 'TEMP' ? document.getElementById('sel-eq').value : document.getElementById('dlc-name').value,
                val: type === 'TEMP' ? currentTemp : null,
                date: type === 'DLC' ? document.getElementById('dlc-date').value : null
            };
            // Télétransmission automatique vers haccp.html via le serveur
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:'HACCP_EVENT', order:{status:'system', data:log}}) });
            alert("✅ Donnée transmise au registre central.");
            closeDrawer('haccp-drawer');
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if(msg.type === 'ORDER_UPDATE') { activeOrders = msg.activeOrders; render(); }
        };

        async function forceSync() {
            const res = await fetch('/get-current-state');
            const data = await res.json();
            activeOrders = data.activeOrders; render();
        }

        function render() {
            const container = document.getElementById('pending-container'); container.innerHTML = '';
            if(activeOrders['GLOBAL_STOCK']) document.getElementById('stock-banner').innerText = "STOCK : " + activeOrders['GLOBAL_STOCK'].data.map(i=>`${i.name}:${i.qte}`).join('|');
            
            for (let tid in activeOrders) {
                if(tid.startsWith('GLOBAL_') || tid === 'HACCP_EVENT') continue;
                const o = activeOrders[tid]; const pending = (o.items || []).filter(i => !i.done);
                if(pending.length === 0) continue;
                const div = document.createElement('div'); div.className = 'ticket-wire';
                div.innerHTML = `<div class="tw-header"><div class="tw-head-val">${tid}</div><div class="tw-head-val">${o.pax||1} PAX</div><div class="tw-head-val">${o.time||''}</div></div>` +
                    pending.map(i => `<div style="padding:5px; border-bottom:1px dashed #222; font-weight:bold;">${i.n}</div>`).join('') +
                    `<button class="btn-send" onclick="valider('${tid}')">PRÊT ✅</button>`;
                container.appendChild(div);
            }
        }

        async function valider(tid) {
            const o = activeOrders[tid]; o.items.forEach(i => i.done = true); o.status = 'ready';
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:tid, order:o}) });
        }

        function openDrawer(id) { document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open')); }

        setInterval(forceSync, 4000);
    </script>
</body>
</html>
