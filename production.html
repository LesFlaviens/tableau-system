<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --haccp: #00b0ff; --hr: #2979ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 20px 40px; font-size: 1.5rem; font-weight: 900; background: var(--alert); color: #fff; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #production-area { flex: 3; padding: 20px; overflow-y: auto; border-right: 2px solid #333; position: relative;}
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .header-title { color: var(--alert); text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        
        .btn-top { background: #1a1a1a; font-weight: bold; border-radius: 4px; padding: 8px 12px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 0.8rem; color:#fff; border: 1px solid transparent;}
        .btn-top:hover { filter: brightness(1.3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket { background: var(--panel); border: 1px solid #333; border-top: 8px solid var(--alert); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .ticket-header { background: #1a1a1a; padding: 15px; font-size: 1.3rem; font-weight: 900; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
        .ticket-covers { background: #333; padding: 4px 10px; border-radius: 6px; font-size: 1rem; color: #fff; }
        .ticket-body { padding: 15px; flex: 1; }
        
        .course-section { margin-bottom: 15px; background: #0a0a0a; border-radius: 6px; overflow: hidden; border: 1px solid #222; }
        .course-title { background: #222; padding: 8px 12px; font-size: 0.8rem; color: #aaa; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .course-items { padding: 10px 12px; list-style: none; margin: 0; font-size: 1.1rem; font-weight: bold; }
        .course-items li { margin-bottom: 8px; display: flex; justify-content: space-between; }
        .btn-send { width: 100%; padding: 15px; background: var(--accent); border: none; color: #000; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: 0.1s; }

        #history-area { flex: 1; background: #0a0a0a; padding: 20px; overflow-y: auto; border-left: 2px solid #333;}
        .history-ticket { background: #111; border: 1px solid #333; border-left: 5px solid #555; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
        .history-items { list-style: none; padding: 0; margin: 0 0 15px 0; color: #666; font-size: 0.9rem; text-decoration: line-through; }
        .btn-undo { width: 100%; padding: 8px; background: transparent; border: 1px solid var(--alert); color: var(--alert); font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        /* TIROIRS */
        .drawer { position: absolute; left: 0; top: 0; width: 450px; height: 100%; background: #0a0a0a; border-right: 2px solid #333; padding: 25px; z-index: 8000; box-sizing: border-box; overflow-y: auto; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: 15px 0 50px rgba(0,0,0,0.9); }
        .drawer.open { transform: translateX(0); }
        .drawer.full { width: 100vw; max-width: 100%; border-right: none; padding: 40px; }

        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: #222; border: 1px solid #444; color: #fff; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; z-index: 100; }
        
        .input-field { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-family: 'Inter', sans-serif; box-sizing: border-box; font-size: 1rem;}
        .btn-action { flex: 1; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; border: none;}

        /* STAFF GRID */
        .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 20px; margin-top: 30px;}
        .hr-card { background: #161616; border: 1px solid #333; border-top: 4px solid var(--hr); padding: 20px; border-radius: 8px; }
        .hr-box { background: #0a0a0a; border: 1px solid #222; padding: 10px; border-radius: 6px; text-align: center; }
        .hr-box label { display: block; font-size: 0.65rem; color: #aaa; text-transform: uppercase; margin-bottom: 5px; font-weight: bold;}
        .hr-box input { width: 90%; background: transparent; border: none; color: #fff; font-size: 1.2rem; font-weight: 900; text-align: center; }

        .haccp-card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 15px;}
        .haccp-log { font-size: 0.85rem; color: #ccc; border-bottom: 1px solid #222; padding: 10px 0; display: flex; justify-content: space-between; }
        .haccp-log.alert { color: var(--alert); font-weight: bold; background: rgba(255,23,68,0.05); }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; }
        .modal-box { background: #111; padding: 30px; border-radius: 8px; border: 2px solid var(--accent); width: 400px; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1>KITCHEN DISPLAY SYSTEM</h1>
        <button onclick="initSystem()">DÉMARRER LE SERVICE</button>
    </div>

    <div id="haccp-settings-modal" class="modal-overlay">
        <div class="modal-box" style="border-color: var(--alert);">
            <h3>⚙️ CONFIGURATION LISTES</h3>
            <div id="config-equip-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 10px;"></div>
            <input type="text" id="new-equip-input" class="input-field" placeholder="Nouveau frigo...">
            <button onclick="addHaccpListItem('equip')" class="btn-action" style="background:var(--haccp); color:#000; width:100%; margin-bottom:20px;">AJOUTER FRIGO</button>
            
            <div id="config-clean-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 10px;"></div>
            <input type="text" id="new-clean-input" class="input-field" placeholder="Nouvelle tâche...">
            <button onclick="addHaccpListItem('clean')" class="btn-action" style="background:var(--accent); color:#000; width:100%;">AJOUTER TÂCHE</button>
            <br><br>
            <button onclick="closeHaccpSettingsModal()" class="btn-action" style="background:#333; color:#fff; width:100%;">FERMER</button>
        </div>
    </div>

    <div id="production-area">
        
        <div id="staff-drawer" class="drawer full">
            <button class="btn-close-drawer" onclick="closeDrawer('staff-drawer')">✕ FERMER PLANNING</button>
            <h2 style="color:var(--hr); font-size: 2rem; border-bottom: 2px solid #333; padding-bottom: 15px; text-transform: uppercase;">👔 GESTION DU PERSONNEL & PLANNING</h2>
            
            <div style="background:#111; padding:20px; border-radius:8px; border:1px solid #333; margin-top: 20px; display: flex; gap: 15px; align-items: center;">
                <span style="color:#fff; font-weight:bold;">NOUVELLE RECRUE :</span>
                <input type="text" id="hr-name" class="input-field" style="margin:0;" placeholder="Nom et Poste">
                <input type="number" id="hr-contract" class="input-field" style="margin:0; width:150px;" placeholder="Contrat (h)">
                <input type="number" id="hr-rate" class="input-field" style="margin:0; width:150px;" placeholder="Taux (€/h)">
                <button onclick="addStaff()" class="btn-action" style="background:var(--hr); color:#fff; width:auto; padding: 12px 30px;">EMBAUCHER</button>
            </div>

            <div id="hr-staff-container" class="staff-grid"></div>
        </div>

        <div id="haccp-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('haccp-drawer')">✕</button>
            <h2 style="color:var(--haccp); margin-top:30px; border-bottom: 1px solid #333; padding-bottom:10px;">🛡️ REGISTRE HACCP</h2>
            
            <button id="btn-config-haccp" onclick="openHaccpSettingsModal()" style="width:100%; padding:10px; margin-bottom:20px; background:transparent; border:1px solid var(--alert); color:var(--alert); cursor:pointer; display:none;">⚙️ CONFIGURER LES LISTES (CHEF)</button>

            <div class="haccp-card" style="border-top: 4px solid var(--haccp);">
                <h3 style="color:var(--haccp); margin:0 0 10px 0; font-size:0.9rem;">❄️ TEMPÉRATURES</h3>
                <input type="text" id="haccp-equip" list="equip-list" class="input-field" placeholder="Équipement...">
                <datalist id="equip-list"></datalist>
                <input type="number" id="haccp-temp" class="input-field" step="0.1" placeholder="Degrés °C">
                <button onclick="saveHaccpLog('Température')" class="btn-action" style="background:var(--haccp); color:#000; width:100%;">ENREGISTRER</button>
            </div>

            <div class="haccp-card" style="border-top: 4px solid var(--accent);">
                <h3 style="color:var(--accent); margin:0 0 10px 0; font-size:0.9rem;">🧹 NETTOYAGE</h3>
                <input type="text" id="haccp-clean" list="clean-list" class="input-field" placeholder="Tâche effectuée...">
                <datalist id="clean-list"></datalist>
                <button onclick="saveHaccpLog('Nettoyage')" class="btn-action" style="background:var(--accent); color:#000; width:100%;">VALIDER</button>
            </div>

            <div class="haccp-card" style="border-top: 4px solid #ea80fc;">
                <h3 style="color:#ea80fc; margin:0 0 10px 0; font-size:0.9rem;">⚠️ INCIDENTS</h3>
                <input type="text" id="haccp-inc" class="input-field" placeholder="Description courte...">
                <button onclick="saveHaccpLog('Incident')" class="btn-action" style="background:#ea80fc; color:#000; width:100%;">SIGNALER</button>
            </div>

            <h3 style="color:#888; font-size:0.8rem; text-transform:uppercase;">Archives (5 ans)</h3>
            <input type="date" id="haccp-date-picker" class="input-field" onchange="renderHaccpLogs(this.value)">
            <div id="haccp-log-container"></div>
        </div>

        <div class="header-container">
            <h2 class="header-title">🔥 PRODUCTION <span id="pending-count" style="color:#fff; margin-left: 10px;">0</span></h2>
            <div style="display: flex; gap: 8px;">
                <button class="btn-top" style="border-color:var(--haccp); color:var(--haccp);" onclick="openDrawer('haccp-drawer')">🛡️ HACCP</button>
                <button class="btn-top" style="border-color:var(--hr); color:var(--hr);" onclick="openStaffWithCode()">👔 STAFF</button>
                <button class="btn-top" style="border-color:var(--accent); color:var(--accent);" onclick="openDrawer('library-drawer')">📖 RECETTES</button>
            </div>
        </div>
        <div class="grid" id="pending-container"></div>
    </div>

    <div id="library-drawer" class="drawer">
        <button class="btn-close-drawer" onclick="closeDrawer('library-drawer')">✕</button>
        <h2 style="color:var(--accent); margin-top:30px;">📖 GRIMOIRE</h2>
        <div id="library-container"></div>
    </div>

    <div id="history-area">
        <h2 class="header-title" style="color:#888; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">✔️ HISTORIQUE</h2>
        <div id="history-container"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let audioCtx;
        const defaultEquips = ["Chambre Froide (+)", "Chambre Froide (-)", "Frigo Prépa", "Tiroirs Ligne"];
        const defaultCleans = ["Sols", "Plans Inox", "Hottes", "Lave-vaisselle"];

        function initSystem() {
            const AudioContext = window.AudioContext || window.webkitAudioContext;
            if (AudioContext) { audioCtx = new AudioContext(); audioCtx.resume(); }
            document.getElementById('start-overlay').style.display = 'none';
            loadHaccpLists();
        }

        function openDrawer(id) { 
            ['res-drawer', 'stats-drawer', 'library-drawer', 'haccp-drawer', 'staff-drawer'].forEach(d => {
                const el = document.getElementById(d); if(el) el.classList.remove('open');
            });
            document.getElementById(id).classList.add('open'); 
            if(id === 'haccp-drawer') renderHaccpLogs();
        }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        // --- GESTION STAFF ---
        function openStaffWithCode() {
            const code = prompt("ACCÈS DIRECTION (Code Chef) :");
            if(code === "7777") { openDrawer('staff-drawer'); renderStaff(); }
            else { alert("Accès refusé."); }
        }

        function getStaff() { return JSON.parse(localStorage.getItem('kds_hr_staff')) || []; }
        function saveStaff(s) { localStorage.setItem('kds_hr_staff', JSON.stringify(s)); renderStaff(); }

        function addStaff() {
            const name = document.getElementById('hr-name').value;
            const contract = parseFloat(document.getElementById('hr-contract').value) || 39;
            const rate = parseFloat(document.getElementById('hr-rate').value) || 12;
            if(!name) return;
            const s = getStaff();
            s.push({ name, contract, rate, overtime: 0, cp: 0, jf: 0, planned: contract });
            saveStaff(s);
            document.getElementById('hr-name').value = '';
        }

        function updateHR(idx, field, val) {
            const s = getStaff();
            const num = parseFloat(val) || 0;
            if(field === 'planned') { s[idx].overtime += (num - s[idx].contract); }
            s[idx][field] = num;
            saveStaff(s);
        }

        function renderStaff() {
            const container = document.getElementById('hr-staff-container');
            const staff = getStaff();
            container.innerHTML = staff.map((s, i) => `
                <div class="hr-card">
                    <div class="hr-header">${s.name} <button onclick="deleteStaff(${i})" style="color:red; background:none; border:none; cursor:pointer;">X</button></div>
                    <div style="font-size:0.8rem; color:#666; margin-bottom:15px;">Contrat: ${s.contract}h | Taux: ${s.rate}€/h</div>
                    <div class="hr-grid">
                        <div class="hr-box"><label>Prévu Semaine</label><input type="number" value="${s.planned}" onchange="updateHR(${i}, 'planned', this.value)"></div>
                        <div class="hr-box"><label>Solde Heures +/-</label><input type="number" value="${s.overtime}" onchange="updateHR(${i}, 'overtime', this.value)"></div>
                        <div class="hr-box"><label>Congés (CP)</label><input type="number" value="${s.cp}" onchange="updateHR(${i}, 'cp', this.value)"></div>
                        <div class="hr-box"><label>Fériés (JF)</label><input type="number" value="${s.jf}" onchange="updateHR(${i}, 'jf', this.value)"></div>
                    </div>
                    ${s.overtime > 0 ? `<div style="color:var(--alert); font-size:0.75rem; margin-top:10px; font-weight:bold;">⚠️ Coût Supp : ${(s.overtime * s.rate).toFixed(2)}€</div>` : ''}
                </div>
            `).join('');
        }
        function deleteStaff(i) { if(confirm("Supprimer ?")) { const s = getStaff(); s.splice(i,1); saveStaff(s); } }

        // --- GESTION HACCP ---
        function loadHaccpLists() {
            const e = JSON.parse(localStorage.getItem('haccp_e')) || defaultEquips;
            const c = JSON.parse(localStorage.getItem('haccp_c')) || defaultCleans;
            document.getElementById('equip-list').innerHTML = e.map(x => `<option value="${x}">`).join('');
            document.getElementById('clean-list').innerHTML = c.map(x => `<option value="${x}">`).join('');
        }

        function saveHaccpLog(type) {
            const today = new Date().toISOString().split('T')[0];
            const time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            let equip = "", val = "", alert = false;
            if(type === 'Température') { equip = document.getElementById('haccp-equip').value; val = document.getElementById('haccp-temp').value + "°C"; if(parseFloat(val)>5) alert=true; }
            else if(type === 'Nettoyage') { equip = document.getElementById('haccp-clean').value; val = "OK ✔️"; }
            else { equip = "Général"; val = document.getElementById('haccp-inc').value; alert=true; }
            
            if(!equip || !val) return;
            let logs = JSON.parse(localStorage.getItem('haccp_archives')) || {};
            if(!logs[today]) logs[today] = [];
            logs[today].unshift({type, equip, val, time, alert});
            localStorage.setItem('haccp_archives', JSON.stringify(logs));
            renderHaccpLogs(today);
        }

        function renderHaccpLogs(date) {
            const d = date || new Date().toISOString().split('T')[0];
            const logs = JSON.parse(localStorage.getItem('haccp_archives')) || {};
            const container = document.getElementById('haccp-log-container');
            container.innerHTML = (logs[d] || []).map(l => `
                <div class="haccp-log ${l.alert ? 'alert' : ''}">
                    <span><b>${l.time}</b> | ${l.type} : ${l.equip}</span>
                    <span>${l.val}</span>
                </div>
            `).join('') || '<p style="text-align:center; color:#444;">Vide.</p>';
        }

        // Configuration listes HACCP
        function openHaccpSettingsModal() { 
            const e = JSON.parse(localStorage.getItem('haccp_e')) || defaultEquips;
            const c = JSON.parse(localStorage.getItem('haccp_c')) || defaultCleans;
            document.getElementById('config-equip-list').innerHTML = e.map((x,i) => `<div class="config-list-item"><span>${x}</span><button onclick="remH(${i},'e')" class="btn-remove-list">X</button></div>`).join('');
            document.getElementById('config-clean-list').innerHTML = c.map((x,i) => `<div class="config-list-item"><span>${x}</span><button onclick="remH(${i},'c')" class="btn-remove-list">X</button></div>`).join('');
            document.getElementById('haccp-settings-modal').style.display='flex'; 
        }
        function closeHaccpSettingsModal() { document.getElementById('haccp-settings-modal').style.display='none'; loadHaccpLists(); }
        function addHaccpListItem(type) {
            const input = document.getElementById(`new-${type}-input`); if(!input.value) return;
            const key = type === 'equip' ? 'haccp_e' : 'haccp_c';
            const list = JSON.parse(localStorage.getItem(key)) || (type === 'equip' ? defaultEquips : defaultCleans);
            list.push(input.value); localStorage.setItem(key, JSON.stringify(list)); input.value=''; openHaccpSettingsModal();
        }
        function remH(i, k) { 
            const key = k === 'e' ? 'haccp_e' : 'haccp_c';
            const list = JSON.parse(localStorage.getItem(key)); list.splice(i,1);
            localStorage.setItem(key, JSON.stringify(list)); openHaccpSettingsModal();
        }

        // --- SYNC KDS ---
        ws.onmessage = (e) => { const msg = JSON.parse(e.data); if (msg.type === 'ORDER_UPDATE') { activeOrders = msg.activeOrders; renderKDS(); } };
        function renderKDS() {
            const container = document.getElementById('pending-container'); container.innerHTML = '';
            let count = 0;
            for (const id in activeOrders) {
                const o = activeOrders[id]; const items = (o.items || []).filter(i => (i.dest==='Cuisine'||i.dest==='Dessert') && !i.done);
                if(items.length === 0) continue; count += items.length;
                const div = document.createElement('div'); div.className = 'ticket';
                div.innerHTML = `<div class="ticket-header"><span>${id.replace('T','Table ')}</span><span class="ticket-covers">👥 ${o.covers||1}p</span></div>
                <div class="ticket-body">${items.map(i => `<div style="padding:10px; border-bottom:1px solid #222; font-weight:bold;">${i.n}</div>`).join('')}
                <button onclick="markDone('${id}')" class="btn-send">ENVOYER TOUT</button></div>`;
                container.appendChild(div);
            }
            document.getElementById('pending-count').textContent = count;
        }
        async function markDone(id) {
            const o = activeOrders[id]; o.items.forEach(i => { if(i.dest==='Cuisine'||i.dest==='Dessert') i.done=true; });
            await fetch('/update-order', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ tableId: id, order: o }) });
        }
        function getCourseName(s) { return s===1?"Entrées":s===2?"Plats":s===3?"Desserts":"Direct"; }
    </script>
</body>
</html>
