<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --haccp: #00b0ff; --hr: #2979ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 20px 40px; font-size: 1.5rem; font-weight: 900; background: var(--alert); color: #fff; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #production-area { flex: 3; padding: 20px; overflow-y: auto; border-right: 2px solid #333; position: relative;}
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .header-title { color: var(--alert); text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        
        .btn-top { background: #1a1a1a; font-weight: bold; border-radius: 4px; padding: 8px 15px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 0.85rem; color:#fff; border: 1px solid transparent;}
        .btn-top:hover { filter: brightness(1.3); border-color: var(--hr); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket { background: var(--panel); border: 1px solid #333; border-top: 8px solid var(--alert); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .ticket-header { background: #1a1a1a; padding: 15px; font-size: 1.3rem; font-weight: 900; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
        .ticket-body { padding: 15px; flex: 1; }
        
        .course-section { margin-bottom: 15px; background: #0a0a0a; border-radius: 6px; overflow: hidden; border: 1px solid #222; }
        .course-title { background: #222; padding: 8px 12px; font-size: 0.8rem; color: #aaa; text-transform: uppercase; font-weight: bold; }
        .course-items { padding: 10px 12px; list-style: none; margin: 0; font-size: 1.1rem; font-weight: bold; }
        
        .btn-send { width: 100%; padding: 15px; background: var(--accent); border: none; color: #000; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; }

        #history-area { flex: 1; background: #0a0a0a; padding: 20px; overflow-y: auto; border-left: 2px solid #333;}
        
        /* TIROIRS */
        .drawer { position: absolute; left: 0; top: 0; width: 480px; height: 100%; background: #0a0a0a; border-right: 2px solid #333; padding: 25px; z-index: 8000; box-sizing: border-box; overflow-y: auto; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: 15px 0 50px rgba(0,0,0,0.9); }
        .drawer.open { transform: translateX(0); }
        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold;}

        /* PLANNING STAFF DESIGN */
        .staff-plan-card { background: #161616; border: 1px solid #333; border-radius: 8px; padding: 15px; margin-bottom: 20px; border-left: 5px solid var(--hr); }
        .staff-plan-name { font-weight: 900; font-size: 1.2rem; text-transform: uppercase; color: #fff; margin-bottom: 10px; display: block; }
        .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin-bottom: 15px; }
        .mini-day { background: #000; padding: 8px 2px; border-radius: 4px; text-align: center; font-size: 0.65rem; border: 1px solid #222; }
        .mini-day b { display: block; color: #555; margin-bottom: 3px; font-size: 0.6rem; }
        .mini-day.is-off { color: var(--alert); border-color: rgba(255, 23, 68, 0.3); }
        .mini-day.is-half { color: #ffa000; }
        .staff-footer { display: flex; justify-content: space-between; font-size: 0.8rem; background: #0a0a0a; padding: 10px; border-radius: 4px; color: #888; border: 1px solid #222;}

        /* HACCP Dashboard */
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 15px; margin-top: 20px; }
        .haccp-card { background: #161616; border: 1px solid #333; padding: 15px; border-radius: 8px; }
        .input-field { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; margin-bottom: 10px; box-sizing: border-box;}
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom: 30px;">KITCHEN DISPLAY SYSTEM</h1>
        <button onclick="initSystem()">DÉMARRER LE SERVICE (SON ACTIF)</button>
    </div>

    <div id="production-area">
        
        <div id="staff-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('staff-drawer')">✕ FERMER</button>
            <h2 style="margin-top:40px; color:var(--hr); text-transform:uppercase; letter-spacing:1px; border-bottom: 1px solid #333; padding-bottom:10px;">📅 PLANNING DE LA SEMAINE</h2>
            <div id="staff-planning-container" style="margin-top:20px;">
                </div>
        </div>

        <div id="gestion-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('gestion-drawer')">✕ FERMER</button>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:40px; border-bottom: 1px solid #333; padding-bottom:10px;">
                <h2 style="color:#fff; font-size: 1.4rem; margin:0; text-transform: uppercase;">🛡️ HYGIÈNE & GESTION</h2>
                <button id="btn-unlock-chef" class="btn-top" style="border-color:#444;" onclick="enableAdminMode()">🔒 CHEF</button>
            </div>

            <div id="chef-secure-zone" style="display:none; margin-top:20px; padding:20px; background:rgba(41, 121, 255, 0.1); border:1px solid var(--hr); border-radius:8px;">
                <button onclick="window.location.href='rh.html'" style="width:100%; padding:15px; background:var(--hr); color:#fff; border:none; border-radius:6px; font-weight:900; cursor:pointer; text-transform:uppercase;">👔 ACCÈS AU BUREAU DU CHEF (RH / COÛTS)</button>
            </div>

            <div class="dashboard-grid">
                <div class="haccp-card" style="border-top: 4px solid var(--haccp);">
                    <h3 style="color:var(--haccp); margin-top:0; font-size:0.9rem; text-transform:uppercase;">❄️ Températures</h3>
                    <input type="text" id="haccp-equip" class="input-field" placeholder="Equipement...">
                    <input type="number" id="haccp-temp" class="input-field" step="0.1" placeholder="Température (°C)">
                    <button onclick="saveHaccpLog('Température')" style="width:100%; padding:10px; background:var(--haccp); border:none; font-weight:bold; cursor:pointer; border-radius:4px;">ENREGISTRER</button>
                </div>
                <div class="haccp-card" style="border-top: 4px solid var(--accent);">
                    <h3 style="color:var(--accent); margin-top:0; font-size:0.9rem; text-transform:uppercase;">🧹 Nettoyage</h3>
                    <input type="text" id="haccp-clean" class="input-field" placeholder="Zone nettoyée...">
                    <button onclick="saveHaccpLog('Nettoyage')" style="width:100%; padding:10px; background:var(--accent); border:none; font-weight:bold; cursor:pointer; border-radius:4px;">VALIDER TÂCHE</button>
                </div>
            </div>
            <div id="haccp-log-container" style="margin-top:20px; background:#111; padding:10px; border-radius:6px; font-size:0.8rem; max-height:300px; overflow-y:auto;"></div>
        </div>

        <div class="header-container">
            <h2 class="header-title">🔥 CUISINE <span id="pending-count" style="color:#fff; margin-left: 10px;">0</span></h2>
            <div style="display: flex; gap: 10px;">
                <button class="btn-top" style="border-color:var(--hr); color:var(--hr);" onclick="openStaffPlanning()">📅 PLANNING</button>
                <button class="btn-top" onclick="openDrawer('gestion-drawer')">⚙️ GESTION</button>
            </div>
        </div>
        <div class="grid" id="pending-container"></div>
    </div>

    <div id="history-area">
        <h2 class="header-title" style="color:#666; font-size:1rem; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">✔️ HISTORIQUE IMMÉDIAT</h2>
        <div id="history-container"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let audioCtx;

        function initSystem() {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
            document.getElementById('start-overlay').style.display = 'none';
            renderHaccpLogs();
        }

        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
        function openDrawer(id) { document.getElementById(id).classList.add('open'); }

        // --- LOGIQUE PLANNING STAFF (LECTURE SEULE) ---
        function openStaffPlanning() {
            renderStaffPlanning();
            openDrawer('staff-drawer');
        }

        function renderStaffPlanning() {
            // Lecture des données partagées avec rh.html (v9)
            const staff = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            const container = document.getElementById('staff-planning-container');
            const jours = ["LUN", "MAR", "MER", "JEU", "VEN", "SAM", "DIM"];

            if(staff.length === 0) {
                container.innerHTML = "<p style='color:#555; text-align:center;'>Aucun planning configuré dans le Bureau du Chef.</p>";
                return;
            }

            container.innerHTML = staff.map(s => {
                const daysHTML = s.plan.map((p, i) => {
                    let label = "PRÉSENT";
                    let classN = "";
                    if(p.status === "off") { label = "OFF"; classN = "is-off"; }
                    else if(p.status === "off_matin") { label = "SOIR"; classN = "is-half"; }
                    else if(p.status === "off_soir") { label = "MATIN"; classN = "is-half"; }
                    else if(p.status === "maladie") { label = "MALADE"; classN = "is-off"; }

                    return `<div class="mini-day ${classN}"><b>${jours[i]}</b>${label}</div>`;
                }).join('');

                return `
                <div class="staff-plan-card">
                    <span class="staff-plan-name">${s.name}</span>
                    <div class="mini-grid">${daysHTML}</div>
                    <div class="staff-footer">
                        <span>Solde Congés : <b>${s.cp || 0} jours</b></span>
                        <span>Contrat : <b>${s.contract}h/sem</b></span>
                    </div>
                </div>`;
            }).join('');
        }

        // --- SÉCURITÉ CHEF ---
        function enableAdminMode() {
            const code = prompt("CODE CHEF :");
            if(code === "7777") {
                document.getElementById('chef-secure-zone').style.display = 'block';
                document.getElementById('btn-unlock-chef').style.color = 'var(--accent)';
                document.getElementById('btn-unlock-chef').textContent = '✅ CHEF ACTIF';
            }
        }

        // --- GESTION HACCP SIMPLIFIÉE ---
        function saveHaccpLog(type) {
            const today = new Date().toISOString().split('T')[0];
            const time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
            let val = type === 'Température' ? document.getElementById('haccp-temp').value + '°C' : 'Effectué ✔️';
            let equip = type === 'Température' ? document.getElementById('haccp-equip').value : document.getElementById('haccp-clean').value;
            
            if(!equip) return alert("Précisez le lieu/appareil");

            let logs = JSON.parse(localStorage.getItem('kds_haccp_archives') || '{}');
            if(!logs[today]) logs[today] = [];
            logs[today].unshift({ type, equip, val, time });
            localStorage.setItem('kds_haccp_archives', JSON.stringify(logs));
            renderHaccpLogs();
        }

        function renderHaccpLogs() {
            const today = new Date().toISOString().split('T')[0];
            const dailyLogs = (JSON.parse(localStorage.getItem('kds_haccp_archives') || '{}'))[today] || [];
            document.getElementById('haccp-log-container').innerHTML = dailyLogs.map(l => `
                <div style="border-bottom:1px solid #222; padding:5px 0;">
                    <b style="color:var(--hr)">${l.time}</b> | ${l.type}: ${l.equip} -> <b>${l.val}</b>
                </div>
            `).join('') || "Aucun relevé aujourd'hui.";
        }

        // --- LOGIQUE KDS STANDART ---
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') { activeOrders = msg.activeOrders; renderKDS(); }
        };

        function renderKDS() {
            const container = document.getElementById('pending-container');
            container.innerHTML = '';
            let count = 0;
            for (const tableId in activeOrders) {
                const order = activeOrders[tableId];
                const items = (order.items || []).filter(i => !i.done && (i.dest==='Cuisine' || i.dest==='Dessert'));
                if(items.length === 0) continue;
                count += items.length;
                const ticket = document.createElement('div');
                ticket.className = 'ticket';
                ticket.innerHTML = `<div class="ticket-header"><span>Table ${tableId.replace('T','')}</span><span>${order.time}</span></div>
                                    <div class="ticket-body">${items.map(i => `<div style="padding:8px; border-bottom:1px solid #222;"><b>${i.n}</b></div>`).join('')}
                                    <button class="btn-send" onclick="markDone('${tableId}')" style="margin-top:15px;">TOUT ENVOYER</button></div>`;
                container.appendChild(ticket);
            }
            document.getElementById('pending-count').textContent = count + " Plats";
        }

        async function markDone(tableId) {
            const order = activeOrders[tableId];
            order.items.forEach(i => { if(i.dest==='Cuisine'||i.dest==='Dessert') i.done = true; });
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId, order }) });
        }
    </script>
</body>
</html>
