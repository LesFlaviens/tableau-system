<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine Master HACCP</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --web: #00e5ff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 20px 40px; font-size: 1.5rem; font-weight: 900; background: #fff; color: #000; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        #production-area { flex: 1; padding: 20px; overflow-y: auto; position: relative; width: 100%; box-sizing: border-box;}
        
        /* NAVIGATION BAR */
        .nav-bar { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; flex-wrap: wrap; }
        .btn-nav { background: transparent; border: 1px solid #fff; color: #fff; padding: 10px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; }
        .btn-nav:hover { background: #fff; color: #000; }
        .btn-nav.gold { border-color: var(--gold); color: var(--gold); }

        .header-container { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .header-title { font-size: 1.8rem; font-weight: 900; text-transform: uppercase; margin: 0; }
        .brand-watermark { font-family: 'Arial', sans-serif; font-style: italic; font-size: 1.2rem; color: #fff; font-weight: bold; opacity: 0.5; }

        /* TICKETS PRODUCTION */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .ticket-wire { border: 1px solid var(--line); border-radius: 8px; padding: 15px; background: #050505; display: flex; flex-direction: column; gap: 10px; }
        .ticket-wire.web-ticket { border-color: var(--web); box-shadow: 0 0 15px rgba(0, 229, 255, 0.2); }
        .tw-header { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; text-align: center; }
        .tw-head-title { background: var(--line); color: #000; font-weight: 900; padding: 5px; font-size: 0.8rem; }
        .tw-head-val { padding: 8px; font-weight: bold; font-size: 1.1rem; border-top: 1px solid var(--line); }
        .tw-section { margin-bottom: 10px; }
        .tw-sec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
        .tw-sec-title { font-size: 0.8rem; font-weight: bold; text-transform: uppercase; color: var(--sub); }
        .tw-sec-box { border: 1px solid #333; border-radius: 4px; padding: 5px; min-height: 30px; }
        .tw-item { display: flex; justify-content: space-between; padding: 5px; border-bottom: 1px dashed #222; font-weight: bold; }
        .qty-badge { font-weight: 900; color: var(--gold); margin-right: 5px; }
        .btn-wire { background: transparent; border: 1px solid var(--line); color: var(--line); padding: 5px 10px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 0.7rem; }
        .btn-wire:active { background: #fff; color: #000; }
        .obs-banner { border: 1px solid #fff; padding: 5px; font-weight: bold; font-size: 0.75rem; text-align: center; background: rgba(255,255,255,0.1); text-transform: uppercase; }

        /* DRAWERS GESTION */
        .drawer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; flex-direction: column; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        .drawer.open { display: flex; }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #fff; padding-bottom: 15px; margin-bottom: 20px; }
        .btn-close { background: transparent; border: 1px solid #fff; color: #fff; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }

        /* HACCP ePACK STYLE */
        .mega-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; }
        .haccp-nav { display: flex; border-bottom: 1px solid #333; margin-bottom: 15px; gap: 5px; }
        .haccp-tab { flex: 1; background: transparent; border: 1px solid #333; color: #aaa; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px 4px 0 0; border-bottom: none; }
        .haccp-tab.active { background: #111; color: var(--gold); border-color: var(--gold); }
        .input-field { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; margin-bottom: 10px; font-weight: bold; box-sizing: border-box; }
        .btn-action { width: 100%; padding: 15px; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; border: 1px solid #fff; background: transparent; color: #fff; }
        .btn-action:hover { background: #fff; color: #000; }
        .haccp-log-card { border: 1px solid #333; padding: 10px; margin-bottom: 8px; border-radius: 4px; font-size: 0.85rem; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a;}
        .checklist-item { display: flex; justify-content: space-between; align-items: center; border: 1px solid #333; padding: 12px; margin-bottom: 8px; border-radius: 4px; background: #0a0a0a;}
        
        /* RECETTE MODAL */
        #recipe-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 20000; flex-direction: column; align-items: center; padding: 40px; box-sizing: border-box; }
        .recipe-paper { background: #000; width: 100%; max-width: 800px; border: 1px solid #fff; padding: 40px; border-radius: 4px; position: relative; overflow-y: auto; }

        @media (max-width: 900px) { .mega-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom: 20px; letter-spacing: 2px;">EMPIRE KDS MASTER</h1>
        <button onclick="initSystem()">Démarrer le Service</button>
    </div>

    <div id="production-area">
        <div class="nav-bar">
            <button class="btn-nav" onclick="openDrawer('history-drawer')">📜 Historique</button>
            <button class="btn-nav" onclick="openDrawer('staff-drawer')">📅 Planning</button>
            <button class="btn-nav" onclick="openDrawer('res-drawer')">⚡ Réservations</button>
            <button class="btn-nav gold" onclick="openHaccpDrawer()">⚙️ ePack HACCP</button>
            <button class="btn-nav" style="border-style: dashed; border-color: #ff1744; color: #ff1744;" onclick="safePurge()">🧹 Purge KDS</button>
        </div>

        <div class="header-container">
            <h2 class="header-title">CUISINE <span id="pending-count" style="font-size: 1rem; color: var(--sub); text-transform: none; margin-left: 15px;">0 plats à envoyer</span></h2>
            <div class="brand-watermark">ichef.ch</div>
        </div>

        <div class="grid" id="pending-container"></div>
    </div>

    <div id="haccp-drawer" class="drawer">
        <div class="drawer-header">
            <h2 style="margin:0; color:var(--gold);">MODULE HACCP CUISINE</h2>
            <button class="btn-close" onclick="closeDrawer('haccp-drawer')">✕</button>
        </div>
        <div class="mega-grid">
            <div style="display:flex; flex-direction:column;">
                <h3 style="text-transform: uppercase; font-size: 1.1rem; color:var(--gold);">TRAÇABILITÉ SANITAIRE</h3>
                <input type="date" id="haccp-date-picker" class="input-field" onchange="renderHaccpLogs()">
                
                <div class="haccp-nav">
                    <button id="tab-temp" class="haccp-tab active" onclick="switchHaccpTab('temp')">🌡️ Temp</button>
                    <button id="tab-clean" class="haccp-tab" onclick="switchHaccpTab('clean')">🧹 Clean</button>
                    <button id="tab-recep" class="haccp-tab" onclick="switchHaccpTab('recep')">📦 Récep</button>
                </div>

                <div id="view-temp" style="display:block;">
                    <div style="border:1px solid #333; padding:15px; border-radius:4px; margin-bottom:15px;">
                        <input type="text" id="haccp-equip" class="input-field" placeholder="Ex: Chambre Froide Viande...">
                        <input type="number" id="haccp-temp" class="input-field" step="0.1" placeholder="Température (°C)">
                        <button onclick="saveHaccpLog('Température')" class="btn-action" style="background:#222;">+ VALIDER RELEVÉ</button>
                    </div>
                    <div id="haccp-temp-list" style="max-height: 300px; overflow-y: auto;"></div>
                </div>

                <div id="view-clean" style="display:none;">
                    <div class="checklist-item"><span>Nettoyage des Sols</span><button class="btn-nav" onclick="saveHaccpLog('Nettoyage', 'Sols Validés')">FAIT</button></div>
                    <div class="checklist-item"><span>Plonge & Inox</span><button class="btn-nav" onclick="saveHaccpLog('Nettoyage', 'Inox Validé')">FAIT</button></div>
                    <div class="checklist-item"><span>Dégraissage Hottes</span><button class="btn-nav" onclick="saveHaccpLog('Nettoyage', 'Hottes Validées')">FAIT</button></div>
                    <div id="haccp-clean-list" style="margin-top:15px; max-height: 250px; overflow-y: auto;"></div>
                </div>

                <div id="view-recep" style="display:none;">
                    <div style="border:1px solid #333; padding:15px; border-radius:4px; margin-bottom:15px;">
                        <input type="text" id="recep-fourn" class="input-field" placeholder="Fournisseur (ex: Métro)">
                        <input type="text" id="recep-prod" class="input-field" placeholder="Produit / Lot">
                        <div style="display:flex; gap:10px;">
                            <button onclick="saveHaccpLog('Réception', 'CONFORME')" class="btn-action" style="border-color:var(--accent); color:var(--accent);">✅ CONFORME</button>
                            <button onclick="saveHaccpLog('Réception', 'REFUSÉ')" class="btn-action" style="border-color:var(--alert); color:var(--alert);">❌ REFUS</button>
                        </div>
                    </div>
                    <div id="haccp-recep-list" style="max-height: 250px; overflow-y: auto;"></div>
                </div>
            </div>

            <div>
                <h3 style="text-transform: uppercase; font-size: 1.1rem;">GRIMOIRE RECETTES</h3>
                <div id="library-container" style="max-height: 600px; overflow-y: auto;"></div>
            </div>

            <div>
                <h3 style="text-transform: uppercase; font-size: 1.1rem;">STATS VENTES</h3>
                <input type="date" id="stats-date-picker" class="input-field" onchange="renderStats()">
                <div id="stats-list-container" style="border: 1px solid #333; padding: 15px; border-radius: 4px; max-height: 600px; overflow-y: auto;"></div>
            </div>
        </div>
    </div>

    <div id="history-drawer" class="drawer">
        <div class="drawer-header"><h2>HISTORIQUE ENVOIS</h2><button class="btn-close" onclick="closeDrawer('history-drawer')">✕</button></div>
        <div id="history-container"></div>
    </div>

    <div id="staff-drawer" class="drawer" style="max-width: 600px;">
        <div class="drawer-header"><h2>PLANNING BRIGADE</h2><button class="btn-close" onclick="closeDrawer('staff-drawer')">✕</button></div>
        <div id="staff-planning-container"></div>
    </div>

    <div id="res-drawer" class="drawer">
        <div class="drawer-header"><h2>PRÉVISIONS RÉSERVES</h2><button class="btn-close" onclick="closeDrawer('res-drawer')">✕</button></div>
        <input type="date" id="kitchen-resa-date" class="input-field" onchange="renderResas()">
        <div id="res-list-container"></div>
    </div>

    <div id="recipe-modal">
        <div class="recipe-paper">
            <button class="btn-close" style="position:absolute; top:20px; right:20px;" onclick="closeRecipeModal()">✕</button>
            <h2 id="modal-recipe-title" style="font-size:2rem; text-transform:uppercase; border-bottom:2px solid #fff; padding-bottom:10px;"></h2>
            <pre id="modal-recipe-content" style="white-space: pre-wrap; font-family: inherit; font-size: 1.1rem; line-height: 1.6; margin-top:20px; color:#ccc;"></pre>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let audioCtx; let previousPendingCount = 0;

        function initSystem() {
            try { const AudioContext = window.AudioContext || window.webkitAudioContext; if (AudioContext) { audioCtx = new AudioContext(); audioCtx.resume(); } } catch (e) {}
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('haccp-date-picker').value = getTodayString();
            document.getElementById('stats-date-picker').value = getTodayString();
            document.getElementById('kitchen-resa-date').value = getTodayString();
        }

        function playSound(type) {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            if (type === 'web') { osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.2); } 
            else { osc.type = 'square'; osc.frequency.setValueAtTime(880, audioCtx.currentTime); }
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime); osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.3);
        }

        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'ORDER_UPDATE') { activeOrders = msg.activeOrders; renderKDS(); }
            } catch(err) {}
        };

        async function forceSync() {
            try { const res = await fetch('/get-current-state'); const data = await res.json(); activeOrders = data.activeOrders || {}; renderKDS(); } catch(e) {}
        }

        function getTodayString() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }

        function openDrawer(id) { document.getElementById(id).classList.add('open'); if(id==='haccp-drawer') { renderHaccpLogs(); renderLibrary(); renderStats(); } if(id==='res-drawer') renderResas(); if(id==='staff-drawer') renderStaff(); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        // --- MOTEUR TICKETS ---
        function renderKDS() {
            const container = document.getElementById('pending-container');
            const histContainer = document.getElementById('history-container');
            container.innerHTML = ''; histContainer.innerHTML = '';
            let currentPendingCount = 0; let hasWebOrder = false;

            for (const tid in activeOrders) {
                if (tid === 'GLOBAL_PLAN' || tid === 'GLOBAL_RESAS') continue;
                const o = activeOrders[tid];
                if (!o || typeof o !== 'object' || o.status === 'system') continue;

                let items = Array.isArray(o.items) ? o.items : [];
                const pending = items.filter(i => i && !i.done);
                const done = items.filter(i => i && i.done);

                if (pending.length > 0) {
                    currentPendingCount += pending.length;
                    if(tid.includes('WEB_')) hasWebOrder = true;
                    const ticketDiv = document.createElement('div');
                    ticketDiv.className = 'ticket-wire' + (tid.includes('WEB_') ? ' web-ticket' : '');
                    
                    const grouped = { 1: [], 2: [], 3: [] };
                    pending.forEach(i => { let s = i.step || (i.category === 'Entrée' ? 1 : i.category === 'Dessert' ? 3 : 2); grouped[s].push(i); });

                    const renderSection = (title, list, step) => {
                        if (list.length === 0) return '';
                        const counts = {}; list.forEach(i => { const n = (i.n || i.name || "Plat").replace(' [WEB]',''); counts[n] = (counts[n] || 0) + 1; });
                        const html = Object.entries(counts).map(([n, q]) => `<div class="tw-item"><span><span class="qty-badge">${q}x</span> ${n}</span></div>`).join('');
                        return `<div class="tw-section"><div class="tw-sec-header"><span class="tw-sec-title">${title}</span><button class="btn-wire" onclick="validerEtape('${tid}', ${step})">✅ ENVOYER</button></div><div class="tw-sec-box">${html}</div></div>`;
                    };

                    ticketDiv.innerHTML = `
                        ${o.observation ? `<div class="obs-banner">${o.observation}</div>` : ''}
                        <div class="tw-header"><div class="tw-head-title">TABLE</div><div class="tw-head-title">HEURE</div><div class="tw-head-val">${tid.replace('WEB_','').replace('T','')}</div><div class="tw-head-val">${o.time || '--:--'}</div></div>
                        ${renderSection('ENTRÉES', grouped[1], 1)}
                        ${renderSection('PLATS', grouped[2], 2)}
                        ${renderSection('DESSERTS', grouped[3], 3)}
                    `;
                    container.appendChild(ticketDiv);
                }

                if (done.length > 0) {
                    const hDiv = document.createElement('div'); hDiv.className = 'ticket-wire'; hDiv.style.opacity = '0.5';
                    hDiv.innerHTML = `<h3>Table ${tid.replace('WEB_','')}</h3>` + done.map(i => `<div>${i.n || i.name} ✅</div>`).join('');
                    histContainer.appendChild(hDiv);
                }
            }
            if (currentPendingCount > previousPendingCount) { playSound(hasWebOrder ? 'web' : 'normal'); }
            previousPendingCount = currentPendingCount;
            document.getElementById('pending-count').innerText = currentPendingCount + " plats à envoyer";
        }

        async function validerEtape(tid, step) {
            const o = activeOrders[tid]; if (!o) return;
            let changed = false;
            o.items.forEach(i => { let s = i.step || (i.category === 'Entrée' ? 1 : i.category === 'Dessert' ? 3 : 2); if (s === step && !i.done) { i.done = true; changed = true; } });
            if (changed) { 
                o.status = 'ready'; 
                await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: tid, order: o }) }); 
            }
        }

        async function safePurge() { if(confirm("Effacer tous les tickets ?")) { for(let k in activeOrders) { if(k!=='GLOBAL_PLAN') await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: k, order: null }) }); } window.location.reload(); } }

        // --- MODULE HACCP EPACK ---
        function switchHaccpTab(t) { 
            document.querySelectorAll('.haccp-tab').forEach(btn => btn.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            ['temp','clean','recep'].forEach(v => document.getElementById('view-'+v).style.display = 'none');
            document.getElementById('view-'+t).style.display = 'block';
        }

        function saveHaccpLog(type, overrideVal = null) {
            let equip = "", val = "";
            if(type === 'Température') {
                equip = document.getElementById('haccp-equip').value; val = document.getElementById('haccp-temp').value + " °C";
                if(!equip || !document.getElementById('haccp-temp').value) return alert("Champs vides.");
            } else if(type === 'Nettoyage') { equip = "Cuisine"; val = overrideVal; }
            else { equip = document.getElementById('recep-fourn').value; val = document.getElementById('recep-prod').value + " (" + overrideVal + ")"; }

            const log = { type, equip, val, time: new Date().toLocaleTimeString('fr-FR') };
            const date = document.getElementById('haccp-date-picker').value;
            let db = JSON.parse(localStorage.getItem('kds_haccp_v2') || '{}');
            if(!db[date]) db[date] = []; db[date].unshift(log);
            localStorage.setItem('kds_haccp_v2', JSON.stringify(db));
            renderHaccpLogs();
        }

        function renderHaccpLogs() {
            const date = document.getElementById('haccp-date-picker').value;
            const logs = (JSON.parse(localStorage.getItem('kds_haccp_v2') || '{}')[date]) || [];
            const renderList = (type, id) => {
                const filtered = logs.filter(l => l.type === type);
                document.getElementById(id).innerHTML = filtered.map(l => `<div class="haccp-log-card"><div><b>${l.equip}</b><br><small>${l.time}</small></div><div>${l.val}</div></div>`).join('') || '<div style="text-align:center;padding:20px;color:#555;">Vide</div>';
            };
            renderList('Température', 'haccp-temp-list'); renderList('Nettoyage', 'haccp-clean-list'); renderList('Réception', 'haccp-recep-list');
        }

        function renderLibrary() {
            const recipes = JSON.parse(localStorage.getItem('kds_grimoire_v2') || '[]');
            document.getElementById('library-container').innerHTML = recipes.map((r, i) => `<button class="btn-action" style="margin-bottom:10px; text-align:left;" onclick="openRecipe(${i})">📄 ${r.nom}</button>`).join('') || 'Grimoire vide.';
        }
        function openRecipe(i) { const r = JSON.parse(localStorage.getItem('kds_grimoire_v2'))[i]; document.getElementById('modal-recipe-title').innerText = r.nom; document.getElementById('modal-recipe-content').innerText = r.content; document.getElementById('recipe-modal').style.display = 'flex'; }
        function closeRecipeModal() { document.getElementById('recipe-modal').style.display = 'none'; }

        function renderStats() {
            const date = document.getElementById('stats-date-picker').value;
            const stats = JSON.parse(localStorage.getItem('kds_archives_v2') || '{}')[date] || {};
            document.getElementById('stats-list-container').innerHTML = Object.entries(stats).map(([n, q]) => `<div class="checklist-item"><span>${n}</span><span style="font-weight:900;">${q}</span></div>`).join('') || 'Aucune vente.';
        }

        function renderResas() {
            const date = document.getElementById('kitchen-resa-date').value;
            const resas = (JSON.parse(localStorage.getItem('empire_reservations') || '{}')[date]) || [];
            document.getElementById('res-list-container').innerHTML = resas.map(r => `<div class="checklist-item"><span><b>${r.time}</b> - ${r.name}</span><span>${r.pax} PAX</span></div>`).join('') || 'Aucune réservation.';
        }

        function renderStaff() {
            const staff = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            document.getElementById('staff-planning-container').innerHTML = staff.map(s => `
                <div style="border:1px solid #333; padding:15px; margin-bottom:15px; border-radius:8px;">
                    <h4 style="margin:0 0 10px 0; color:var(--gold);">${s.name}</h4>
                    <div style="display:grid; grid-template-columns:repeat(7, 1fr); gap:5px;">
                        ${s.plan.map((p, i) => `<div style="font-size:0.6rem; text-align:center; background:#111; padding:5px; border-radius:3px;">D${i+1}<br><b>${p.status==='off'?'OFF':(p.s1||'--')}</b></div>`).join('')}
                    </div>
                </div>
            `).join('') || 'Aucun planning.';
        }

        setInterval(forceSync, 3000);
    </script>
</body>
</html>
