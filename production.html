<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Terminal CUISINE - Empire</title>
    <style>
        :root { --bg: #050505; --accent: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; height: 100vh; }
        .view-orders { flex: 1; padding: 25px; overflow-y: auto; }
        .ticket { background: #121212; border-left: 8px solid var(--accent); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
        .btn-done { width: 100%; padding: 15px; background: var(--accent); border: none; color: white; font-weight: 900; border-radius: 8px; cursor: pointer; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="view-orders">
        <h1 style="color:var(--accent); text-transform:uppercase;">🔥 Bons Cuisine</h1>
        <div id="zone-tickets"></div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        socket.on('order-received', (order) => {
            const plats = order.articles.filter(a => a.includes('[Plat]'));
            if (plats.length > 0) {
                const div = document.createElement('div'); div.className = 'ticket';
                div.innerHTML = `<h3>${order.table}</h3><ul>${plats.map(p => `<li>${p.replace('[Plat] ', '')}</li>`).join('')}</ul><button class="btn-done" onclick="this.parentElement.remove()">TERMINER</button>`;
                document.getElementById('zone-tickets').prepend(div);
            }
        });
    </script>
</body>
</html>
