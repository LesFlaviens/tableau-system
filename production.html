<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine Master</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        #production-area { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket-wire { border: 1px solid var(--line); border-radius: 8px; padding: 15px; background: #050505; display: flex; flex-direction: column; gap: 10px; }
        .tw-header { display: grid; grid-template-columns: 1fr 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; text-align: center; }
        .tw-head-title { background: var(--line); color: #000; font-weight: 900; padding: 5px; font-size: 0.7rem; text-transform: uppercase;}
        .tw-head-val { padding: 10px; font-weight: 900; font-size: 1.3rem; border-top: 1px solid var(--line); border-right: 1px solid #333;}
        .tw-section { margin-bottom: 10px; border: 1px solid #222; border-radius: 4px; padding: 8px; }
        .tw-sec-title { font-size: 0.85rem; font-weight: 900; text-transform: uppercase; color: var(--gold); margin-bottom: 5px;}
        .tw-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px dashed #333; font-weight: bold; font-size: 1.1rem; }
        .btn-send { background: var(--accent); color: #000; border: none; padding: 10px; border-radius: 4px; font-weight: 900; cursor: pointer; width: 100%; margin-top: 10px;}
        .history-btn { background: #333; color: #fff; padding: 10px; border-radius: 4px; border: 1px solid #555; cursor: pointer; }
        .stock-display { position: sticky; top: 0; background: #111; padding: 15px; border-bottom: 2px solid var(--gold); display: flex; gap: 20px; font-weight: 900; z-index: 100; color: var(--gold);}
    </style>
</head>
<body>
    <div id="production-area">
        <div class="stock-display" id="stock-list">PLATS RESTANTS : Chargement...</div>
        <div style="margin: 20px 0; display:flex; gap:10px;">
            <button class="history-btn" onclick="openHistory()">📜 HISTORIQUE / ERREUR HUMAINE</button>
            <h2 id="pending-count" style="margin:0; margin-left:auto;">0 PLATS</h2>
        </div>
        <div class="grid" id="pending-container"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let audioCtx = null; let prevOrderCount = 0;

        async function init() {
            try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){}
            const r = await fetch('/get-current-state'); const d = await r.json(); activeOrders = d.activeOrders; render();
        }

        function beep(freq) {
            if(!audioCtx) return;
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.connect(g); g.connect(audioCtx.destination); o.type = 'square'; o.frequency.value = freq;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime); o.start(); o.stop(audioCtx.currentTime + 0.2);
        }

        ws.onmessage = (e) => {
            const d = JSON.parse(e.data);
            if(d.type === 'ORDER_UPDATE') {
                const newCount = Object.keys(d.activeOrders).length;
                if(newCount > prevOrderCount) beep(880); // BIP AIGU : Arrivée
                activeOrders = d.activeOrders; prevOrderCount = newCount; render();
            }
        };

        function render() {
            const container = document.getElementById('pending-container'); container.innerHTML = '';
            if(activeOrders['GLOBAL_STOCK']) {
                document.getElementById('stock-list').innerHTML = "EN STOCK : " + activeOrders['GLOBAL_STOCK'].data.map(i => `${i.name}: ${i.qte}`).join(' | ');
            }
            
            for (let tid in activeOrders) {
                if(tid.startsWith('GLOBAL_')) continue;
                const o = activeOrders[tid]; if(!o || o.status === 'system') continue;
                const pending = (o.items || []).filter(i => !i.done);
                if (pending.length === 0) continue;

                const div = document.createElement('div'); div.className = 'ticket-wire';
                const grouped = { 1: [], 2: [], 3: [] };
                pending.forEach(i => { let s = i.step || (i.category === 'Entrée' ? 1 : i.category === 'Dessert' ? 3 : 2); grouped[s].push(i); });

                const renderSec = (title, list, step) => {
                    if (list.length === 0) return '';
                    return `<div class="tw-section"><div class="tw-sec-title">${title}</div>` + 
                        list.map(i => `<div class="tw-item"><span>${i.n}</span></div>`).join('') + 
                        `<button class="btn-send" onclick="valider('${tid}',${step})">PRÊT ✅</button></div>`;
                };

                div.innerHTML = `
                    <div class="tw-header">
                        <div class="tw-head-title">TABLE</div><div class="tw-head-title">PAX</div><div class="tw-head-title">HEURE</div>
                        <div class="tw-head-val">${tid.replace('WEB_','')}</div><div class="tw-head-val">${o.pax || '1'}</div><div class="tw-head-val">${o.time || '--:--'}</div>
                    </div>
                    ${renderSec('Entrées', grouped[1], 1)}${renderSec('Plats', grouped[2], 2)}${renderSec('Desserts', grouped[3], 3)}
                `;
                container.appendChild(div);
            }
        }

        async function valider(tid, step) {
            const o = activeOrders[tid];
            o.items.forEach(i => { let s = i.step || (i.category === 'Entrée' ? 1 : i.category === 'Dessert' ? 3 : 2); if(s === step) i.done = true; });
            o.status = 'ready'; beep(440); // BIP GRAVE : Envoi
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: tid, order: o }) });
        }

        function openHistory() {
            const code = prompt("CODE ANNULATION ERREUR (7777) :");
            if(code !== "7777") return alert("Refusé.");
            // Logique pour réactiver un ticket envoyé par erreur
            alert("Mode correction activé. Cliquez sur un ticket dans l'historique (bientôt disponible)");
        }

        init(); setInterval(init, 5000);
    </script>
</body>
</html>
