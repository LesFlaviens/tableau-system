<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --haccp: #00b0ff; --hr: #2979ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 20px 40px; font-size: 1.5rem; font-weight: 900; background: var(--alert); color: #fff; border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #production-area { flex: 3; padding: 20px; overflow-y: auto; border-right: 2px solid #333; position: relative;}
        .header-container { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 20px; }
        .header-title { color: var(--alert); text-transform: uppercase; letter-spacing: 2px; margin: 0; }
        
        .btn-top { background: #1a1a1a; font-weight: bold; border-radius: 4px; padding: 8px 15px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 0.85rem; color:#fff; border: 1px solid transparent;}
        .btn-top:hover { filter: brightness(1.3); }

        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket { background: var(--panel); border: 1px solid #333; border-top: 8px solid var(--alert); border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); display: flex; flex-direction: column; }
        .ticket-header { background: #1a1a1a; padding: 15px; font-size: 1.3rem; font-weight: 900; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center;}
        .ticket-covers { background: #333; padding: 4px 10px; border-radius: 6px; font-size: 1rem; color: #fff; }
        .ticket-body { padding: 15px; flex: 1; }
        
        .course-section { margin-bottom: 15px; background: #0a0a0a; border-radius: 6px; overflow: hidden; border: 1px solid #222; }
        .course-title { background: #222; padding: 8px 12px; font-size: 0.8rem; color: #aaa; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .course-items { padding: 10px 12px; list-style: none; margin: 0; font-size: 1.1rem; font-weight: bold; }
        .course-items li { margin-bottom: 8px; display: flex; justify-content: space-between; }
        
        .btn-send { width: 100%; padding: 15px; background: var(--accent); border: none; color: #000; font-weight: 900; font-size: 1rem; cursor: pointer; text-transform: uppercase; transition: 0.1s; }
        .btn-send:active { transform: scale(0.98); }

        #history-area { flex: 1; background: #0a0a0a; padding: 20px; overflow-y: auto; border-left: 2px solid #333;}
        .history-ticket { background: #111; border: 1px solid #333; border-left: 5px solid #555; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
        .history-ticket-header { display: flex; justify-content: space-between; margin-bottom: 10px; align-items: center; }
        .history-ticket h3 { margin: 0; color: #888; font-size: 1.1rem; }
        .history-items { list-style: none; padding: 0; margin: 0 0 15px 0; color: #666; font-size: 0.9rem; text-decoration: line-through; }
        
        .btn-undo { width: 100%; padding: 10px; background: transparent; border: 1px solid var(--alert); color: var(--alert); font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .btn-undo:hover { background: rgba(255, 23, 68, 0.1); }

        /* TIROIRS */
        .drawer { position: absolute; left: 0; top: 0; width: 450px; height: 100%; background: #0a0a0a; border-right: 2px solid #333; padding: 25px; z-index: 8000; box-sizing: border-box; overflow-y: auto; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: 15px 0 50px rgba(0,0,0,0.9); }
        .drawer.open { transform: translateX(0); }
        
        /* TIROIR GESTION (FULL SCREEN) */
        #gestion-drawer { width: 100vw; max-width: 100%; z-index: 8500; border-right: none; padding: 30px 40px; }

        /* BOUTON FERMER RÉDUIT */
        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: #1a1a1a; border: 1px solid #444; color: #fff; font-size: 0.9rem; font-weight: bold; padding: 8px 20px; border-radius: 6px; cursor: pointer; transition: 0.2s; z-index: 10; text-transform: uppercase;}
        .btn-close-drawer:hover { background: var(--alert); border-color: var(--alert); }
        
        .input-field { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; margin-bottom: 15px; font-family: 'Inter', sans-serif; box-sizing: border-box; font-size: 1rem;}
        .btn-action { flex: 1; padding: 12px; font-weight: bold; border-radius: 6px; cursor: pointer; text-transform: uppercase; transition: 0.2s; border: none;}
        .btn-unlock-chef { background: #1a1a1a; color: #888; border: 1px solid #444; padding: 8px 15px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
        .btn-unlock-chef:hover { color: #fff; border-color: #fff; }

        /* DASHBOARD GRID */
        .dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; margin-top: 15px; }
        .haccp-card { background: #161616; border: 1px solid #333; padding: 20px; border-radius: 8px; }
        .haccp-log { font-size: 0.85rem; color: #ccc; border-bottom: 1px solid #222; padding: 10px 0; display: flex; justify-content: space-between; align-items: center;}
        .haccp-log.alert { color: var(--alert); font-weight: bold; background: rgba(255,23,68,0.05); border-radius: 4px; border-left: 4px solid var(--alert); }

        /* MODALS */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; justify-content: center; align-items: center; flex-direction: column;}
        .modal-box { background: #111; padding: 30px; border-radius: 8px; border: 2px solid var(--accent); width: 400px; max-width: 90%; box-shadow: 0 20px 50px rgba(0,0,0,0.8); max-height: 80vh; overflow-y: auto;}
        .config-list-item { display: flex; justify-content: space-between; background: #222; padding: 8px 12px; margin-bottom: 5px; border-radius: 4px; font-size: 0.9rem; align-items: center;}
        .btn-remove-list { background: transparent; border: none; color: var(--alert); font-weight: bold; cursor: pointer; font-size: 1rem; }

        /* RECETTES */
        .recipe-row { background: #161616; border: 1px solid #333; margin-bottom: 8px; border-radius: 6px; padding: 10px; display: flex; align-items: center;}
        .recipe-btn { background: transparent; border: none; color: #fff; font-size: 1.1rem; cursor: pointer; font-weight: bold; text-align: left; flex: 1;}
        #recipe-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; flex-direction: column; padding: 40px; box-sizing: border-box; align-items: center;}
        .recipe-paper { background: #1a1a1a; width: 100%; max-width: 800px; height: 100%; border-radius: 12px; padding: 40px; box-sizing: border-box; overflow-y: auto; border: 1px solid #333; position: relative; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom: 30px;">KITCHEN DISPLAY SYSTEM</h1>
        <button onclick="initSystem()">DÉMARRER LE SERVICE (ACTIVER SON)</button>
    </div>

    <div id="recipe-modal">
        <div class="recipe-paper">
            <button onclick="closeRecipeModal()" style="position:absolute; top:20px; right:20px; background:var(--alert); color:#fff; border:none; padding:10px 20px; border-radius:6px; font-weight:bold; cursor:pointer;">FERMER</button>
            <h2 id="modal-recipe-title" style="color:var(--accent); font-size:2.5rem; margin-top:0; text-transform:uppercase; border-bottom:2px solid #333; padding-bottom:15px;">Titre</h2>
            <pre id="modal-recipe-content" style="white-space: pre-wrap; font-family: 'Inter', sans-serif; font-size: 1.2rem; line-height: 1.6; color: #ccc;">Contenu</pre>
        </div>
    </div>

    <div id="haccp-settings-modal" class="modal-overlay">
        <div class="modal-box" style="border-color: var(--alert);">
            <h3 style="color:#fff; margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">⚙️ CONFIGURATION DES LISTES</h3>
            <h4 style="color:var(--haccp); margin-bottom: 5px; text-transform: uppercase; font-size: 0.9rem;">❄️ Équipements Froids</h4>
            <div id="config-equip-list" style="margin-bottom: 10px; max-height: 150px; overflow-y: auto;"></div>
            <div style="display:flex; gap:5px; margin-bottom: 25px;">
                <input type="text" id="new-equip-input" class="input-field" style="margin:0;" placeholder="Nouveau frigo...">
                <button onclick="addHaccpListItem('equip')" style="background:var(--haccp); border:none; border-radius:4px; font-weight:bold; padding:0 15px; cursor:pointer; color:#000;">AJOUTER</button>
            </div>
            <h4 style="color:var(--accent); margin-bottom: 5px; text-transform: uppercase; font-size: 0.9rem;">🧹 Tâches de Nettoyage</h4>
            <div id="config-clean-list" style="margin-bottom: 10px; max-height: 150px; overflow-y: auto;"></div>
            <div style="display:flex; gap:5px; margin-bottom: 25px;">
                <input type="text" id="new-clean-input" class="input-field" style="margin:0;" placeholder="Nouvelle tâche...">
                <button onclick="addHaccpListItem('clean')" style="background:var(--accent); border:none; border-radius:4px; font-weight:bold; padding:0 15px; cursor:pointer; color:#000;">AJOUTER</button>
            </div>
            <button onclick="closeHaccpSettingsModal()" style="width:100%; padding:12px; background:#333; color:#fff; font-weight:bold; border:none; border-radius:4px; cursor:pointer;">FERMER ET SAUVEGARDER</button>
        </div>
    </div>

    <div id="production-area">
        
        <div id="res-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('res-drawer')">✕ FERMER</button>
            <h2 style="margin-top:40px; color:#ea80fc; font-size: 1.4rem; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase;">📅 PRÉVISIONS</h2>
            <div id="res-list-container"></div>
        </div>

        <div id="stats-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('stats-drawer')">✕ FERMER</button>
            <h2 style="margin-top:40px; color:#ff9800; font-size: 1.4rem; border-bottom: 1px solid #333; padding-bottom: 10px; text-transform: uppercase;">📊 ARCHIVES PLATS</h2>
            <input type="date" id="stats-date-picker" class="input-field" style="color:#ff9800;" onchange="renderStatsDrawer(this.value)">
            <div id="stats-list-container"></div>
        </div>

        <div id="library-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('library-drawer')">✕ FERMER</button>
            <div style="display:flex; justify-content:space-between; align-items:center; margin-top:40px; border-bottom: 1px solid #333; padding-bottom: 10px;">
                <h2 style="color:var(--accent); font-size: 1.4rem; margin:0; text-transform: uppercase;">📖 GRIMOIRE</h2>
                <button class="btn-unlock-chef" onclick="enableAdminMode('library')">🔒 CHEF</button>
            </div>
            <div id="library-chef-controls" style="display:none; margin-top: 20px;">
                <div style="display:flex; gap:10px; margin-bottom: 20px;">
                    <button class="btn-action" style="background:transparent; border:1px solid var(--accent); color:var(--accent); font-size:0.8rem;" onclick="document.getElementById('import-file').click()">📥 IMPORTER</button>
                    <button class="btn-action" style="background:transparent; border:1px solid #ff9800; color:#ff9800; font-size:0.8rem;" onclick="exportRecipes()">📤 EXPORTER</button>
                </div>
                <input type="file" id="import-file" accept=".json" style="display:none;" onchange="importRecipes(event)">
                <input type="text" id="new-recipe-title" class="input-field" placeholder="Titre de la recette">
                <textarea id="new-recipe-content" class="input-field" style="height:100px;" placeholder="Ingrédients et étapes..."></textarea>
                <button onclick="saveRecipe()" class="btn-action" style="background:var(--accent); color:#000; width:100%; margin-bottom:20px;">SAUVEGARDER</button>
            </div>
            <div id="library-container" style="margin-top:20px;"></div>
        </div>

        <div id="gestion-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeGestionDrawer()">✕ FERMER</button>
            
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; margin-top:20px;">
                <h2 style="color:#fff; font-size: 1.8rem; margin:0; text-transform: uppercase; letter-spacing: 2px;">⚙️ GESTION & HYGIÈNE</h2>
                <button id="btn-unlock-gestion" class="btn-unlock-chef" style="font-size: 1rem;" onclick="enableGestionMode()">🔒 DÉVERROUILLER MODE CHEF</button>
            </div>

            <div id="haccp-entry-controls" class="dashboard-grid">
                <div class="haccp-card" style="border-top: 4px solid var(--haccp);">
                    <h3 style="color:var(--haccp); margin-top:0; border-bottom:1px solid #333; padding-bottom:10px; text-transform:uppercase; font-size:1rem;">❄️ Températures</h3>
                    <input type="text" id="haccp-equip" list="equip-list" class="input-field" placeholder="Ex: Chambre Froide...">
                    <datalist id="equip-list"></datalist>
                    <input type="number" id="haccp-temp" class="input-field" step="0.1" placeholder="Ex: 3.5 (°C)">
                    <button onclick="saveHaccpLog('Température')" class="btn-action" style="background:var(--haccp); color:#000; width:100%;">ENREGISTRER</button>
                </div>

                <div class="haccp-card" style="border-top: 4px solid var(--accent);">
                    <h3 style="color:var(--accent); margin-top:0; border-bottom:1px solid #333; padding-bottom:10px; text-transform:uppercase; font-size:1rem;">🧹 Nettoyage</h3>
                    <input type="text" id="haccp-clean" list="clean-list" class="input-field" placeholder="Ex: Sols, Trancheuse...">
                    <datalist id="clean-list"></datalist>
                    <button onclick="saveHaccpLog('Nettoyage')" class="btn-action" style="background:var(--accent); color:#000; width:100%;">VALIDER</button>
                </div>

                <div class="haccp-card" style="border-top: 4px solid #ea80fc;">
                    <h3 style="color:#ea80fc; margin-top:0; border-bottom:1px solid #333; padding-bottom:10px; text-transform:uppercase; font-size:1rem;">⚠️ Incident / Obs.</h3>
                    <input type="text" id="haccp-inc" class="input-field" placeholder="Ex: Panne frigo...">
                    <button onclick="saveHaccpLog('Incident')" class="btn-action" style="background:#ea80fc; color:#000; width:100%;">SIGNALER</button>
                </div>
            </div>

            <div id="gestion-chef-controls" style="display:none; margin-top: 30px; border-top: 2px solid #333; padding-top: 20px;">
                <div style="display:flex; gap:15px;">
                    <button onclick="window.location.href='rh.html'" style="flex:1; padding:15px; background:var(--hr); color:#fff; border:none; border-radius:8px; font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">
                        👔 ACCÈS AU PLANNING RH (SALAIRES & HEURES)
                    </button>
                    <button onclick="openHaccpSettingsModal()" style="flex:1; padding:15px; background:transparent; border:2px solid var(--alert); color:var(--alert); font-weight:bold; border-radius:8px; cursor:pointer; text-transform:uppercase;">
                        ⚙️ CONFIGURER LES LISTES HACCP
                    </button>
                </div>
            </div>

            <div style="margin-top: 30px; border-top: 2px solid #333; padding-top: 20px;">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 15px;">
                    <h3 style="color:#888; margin:0; font-size: 1.1rem; text-transform: uppercase;">📑 Registre Officiel HACCP</h3>
                    <input type="date" id="haccp-date-picker" class="input-field" style="width: auto; margin:0; color:var(--haccp);" onchange="renderHaccpLogs(this.value)">
                </div>
                <div id="haccp-log-container" style="background: #111; padding: 15px; border-radius: 8px; border: 1px solid #222; max-height: 300px; overflow-y: auto;"></div>
            </div>
        </div>

        <div class="header-container">
            <h2 class="header-title">🔥 EN PRODUCTION <span id="pending-count" style="color:#fff; margin-left: 10px;">0</span></h2>
            <div style="display: flex; gap: 10px;">
                <button class="btn-top" style="border-color:#ea80fc; color:#ea80fc;" onclick="openResDrawer()">📅 RÉSA</button>
                <button class="btn-top" style="border-color:#ff9800; color:#ff9800;" onclick="openStatsDrawer()">📊 PLATS</button>
                <button class="btn-top" style="border-color:var(--accent); color:var(--accent);" onclick="openDrawer('library-drawer', renderLibrary)">📖 RECETTES</button>
                <button class="btn-top" style="background: #222; border-color:#fff; color:#fff;" onclick="openGestionDrawer()">⚙️ GESTION (HACCP / RH)</button>
            </div>
        </div>
        <div class="grid" id="pending-container"></div>
    </div>

    <div id="history-area">
        <h2 class="header-title" style="color:#888; border-bottom: 2px solid #333; padding-bottom: 10px; margin-top:0;">✔️ HISTORIQUE</h2>
        <div id="history-container"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let previousPendingCount = 0; let audioCtx;
        let isChefMode = false; 

        const defaultEquipList = ["Chambre Froide Positive (+)", "Chambre Froide Négative (-)", "Frigo Sous-Bassement", "Tiroirs Réfrigérés Ligne"];
        const defaultCleanList = ["Sols et Siphons", "Plans de travail (Désinfection)", "Hottes et Filtres", "Plonge et Lave-vaisselle"];

        function initSystem() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (AudioContext) { audioCtx = new AudioContext(); audioCtx.resume(); }
            } catch (error) {}
            document.getElementById('start-overlay').style.display = 'none';
            document.getElementById('stats-date-picker').value = getTodayString();
            document.getElementById('haccp-date-picker').value = getTodayString();
            loadHaccpLists();
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            const now = audioCtx.currentTime;
            if (type === 'new') { 
                osc.type = 'square'; osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1046, now + 0.15);
                gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.3, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                osc.start(now); osc.stop(now + 0.3);
            } else if (type === 'send') { 
                osc.type = 'sine'; osc.frequency.setValueAtTime(440, now);
                gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.5, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now); osc.stop(now + 0.4);
            }
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') {
                activeOrders = msg.activeOrders; renderKDS();
                if(document.getElementById('res-drawer').classList.contains('open')) renderResDrawer();
                if(document.getElementById('stats-drawer').classList.contains('open')) renderStatsDrawer();
            }
        };

        function getTodayString() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }
        function getTimeString() { const d = new Date(); return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0'); }

        function closeAllDrawers() { 
            ['res-drawer', 'stats-drawer', 'library-drawer', 'gestion-drawer'].forEach(id => {
                document.getElementById(id).classList.remove('open');
            });
            isChefMode = false;
            if(document.getElementById('library-chef-controls')) document.getElementById('library-chef-controls').style.display = 'none';
            if(document.getElementById('gestion-chef-controls')) document.getElementById('gestion-chef-controls').style.display = 'none';
            if(document.getElementById('btn-unlock-gestion')) document.getElementById('btn-unlock-gestion').style.display = 'block';
        }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
        function openDrawer(id, callback) { closeAllDrawers(); document.getElementById(id).classList.add('open'); if(callback) callback(); }
        
        function enableAdminMode(module) {
            const code = prompt("CODE SÉCURITÉ CHEF (Taper 7777) :");
            if(code === "7777") { 
                isChefMode = true;
                if(module === 'library') {
                    document.getElementById('library-chef-controls').style.display = 'block';
                    renderLibrary();
                }
            } else { alert("Code incorrect."); }
        }

        function openGestionDrawer() { 
            openDrawer('gestion-drawer', () => {
                if(!document.getElementById('haccp-date-picker').value) document.getElementById('haccp-date-picker').value = getTodayString();
                renderHaccpLogs();
            }); 
        }

        function closeGestionDrawer() {
            closeDrawer('gestion-drawer');
            isChefMode = false;
            document.getElementById('gestion-chef-controls').style.display = 'none';
            document.getElementById('btn-unlock-gestion').style.display = 'block';
        }

        function enableGestionMode() {
            const code = prompt("CODE SÉCURITÉ CHEF (Taper 7777) :");
            if(code === "7777") { 
                isChefMode = true;
                document.getElementById('gestion-chef-controls').style.display = 'block';
                document.getElementById('btn-unlock-gestion').style.display = 'none';
            } else { alert("Code incorrect."); }
        }

        function getHaccpLists() {
            return {
                equip: JSON.parse(localStorage.getItem('kds_haccp_equip_list')) || defaultEquipList,
                clean: JSON.parse(localStorage.getItem('kds_haccp_clean_list')) || defaultCleanList
            };
        }

        function loadHaccpLists() {
            const lists = getHaccpLists();
            document.getElementById('equip-list').innerHTML = lists.equip.map(item => `<option value="${item}">`).join('');
            document.getElementById('clean-list').innerHTML = lists.clean.map(item => `<option value="${item}">`).join('');
        }

        function openHaccpSettingsModal() {
            renderHaccpSettingsLists();
            document.getElementById('haccp-settings-modal').style.display = 'flex';
        }

        function closeHaccpSettingsModal() {
            document.getElementById('haccp-settings-modal').style.display = 'none';
            loadHaccpLists(); 
        }

        function renderHaccpSettingsLists() {
            const lists = getHaccpLists();
            document.getElementById('config-equip-list').innerHTML = lists.equip.map((item, idx) => `
                <div class="config-list-item"><span>${item}</span><button class="btn-remove-list" onclick="removeHaccpListItem('equip', ${idx})">X</button></div>
            `).join('');

            document.getElementById('config-clean-list').innerHTML = lists.clean.map((item, idx) => `
                <div class="config-list-item"><span>${item}</span><button class="btn-remove-list" onclick="removeHaccpListItem('clean', ${idx})">X</button></div>
            `).join('');
        }

        function addHaccpListItem(type) {
            const input = document.getElementById(`new-${type}-input`);
            const val = input.value.trim();
            if(!val) return;
            const lists = getHaccpLists();
            lists[type].push(val);
            localStorage.setItem(`kds_haccp_${type}_list`, JSON.stringify(lists[type]));
            input.value = '';
            renderHaccpSettingsLists();
        }

        function removeHaccpListItem(type, index) {
            const lists = getHaccpLists();
            lists[type].splice(index, 1);
            localStorage.setItem(`kds_haccp_${type}_list`, JSON.stringify(lists[type]));
            renderHaccpSettingsLists();
        }

        function saveHaccpLog(type) {
            let val = "", equip = "", alert = false;
            if (type === 'Température') {
                equip = document.getElementById('haccp-equip').value;
                const temp = parseFloat(document.getElementById('haccp-temp').value);
                if(!equip || isNaN(temp)) { window.alert("Champs invalides."); return; }
                val = temp + " °C";
                if (equip.toLowerCase().includes("positive") && temp > 4.0) alert = true;
                if (equip.toLowerCase().includes("négative") && temp > -15.0) alert = true;
                document.getElementById('haccp-equip').value = ''; document.getElementById('haccp-temp').value = '';
            } else if (type === 'Nettoyage') {
                equip = document.getElementById('haccp-clean').value;
                if(!equip) return;
                val = "Validé ✔️";
                document.getElementById('haccp-clean').value = '';
            } else {
                equip = "Général";
                val = document.getElementById('haccp-inc').value;
                if(!val) return;
                alert = true;
                document.getElementById('haccp-inc').value = '';
            }

            const logEntry = { type: type, equip: equip, value: val, time: getTimeString(), alert: alert };
            const today = getTodayString();
            let allLogs = JSON.parse(localStorage.getItem('kds_haccp_archives') || '{}');
            if(!allLogs[today]) allLogs[today] = [];
            allLogs[today].unshift(logEntry); 
            localStorage.setItem('kds_haccp_archives', JSON.stringify(allLogs));
            document.getElementById('haccp-date-picker').value = today;
            renderHaccpLogs(today);
        }

        function renderHaccpLogs(selectedDateStr = null) {
            const targetDate = selectedDateStr || document.getElementById('haccp-date-picker').value || getTodayString();
            document.getElementById('haccp-date-picker').value = targetDate; 
            const allLogs = JSON.parse(localStorage.getItem('kds_haccp_archives') || '{}');
            const dailyLogs = allLogs[targetDate] || [];
            const container = document.getElementById('haccp-log-container');
            
            if(dailyLogs.length === 0) { container.innerHTML = '<div style="color:#555; text-align:center; padding-top:20px;">Aucun enregistrement.</div>'; return; }

            let html = '';
            dailyLogs.forEach(log => {
                const alertClass = log.alert ? 'alert' : '';
                const alertIcon = log.alert ? '⚠️ DANGER: ' : '';
                html += `<div class="haccp-log ${alertClass}"><div><b>${log.type}</b>: ${log.equip} <span style="font-size:0.7rem; color:#888;">(${log.time})</span></div><div>${alertIcon}${log.value}</div></div>`;
            });
            container.innerHTML = html;
        }

        function saveRecipe() {
            const title = document.getElementById('new-recipe-title').value.trim();
            const content = document.getElementById('new-recipe-content').value.trim();
            if(!title || !content) return;
            const recipes = JSON.parse(localStorage.getItem('kds_grimoire_v2') || '[]');
            recipes.push({ nom: title, content: content });
            localStorage.setItem('kds_grimoire_v2', JSON.stringify(recipes));
            document.getElementById('new-recipe-title').value = ''; document.getElementById('new-recipe-content').value = '';
            renderLibrary();
        }

        function renderLibrary() {
            const recipes = JSON.parse(localStorage.getItem('kds_grimoire_v2') || '[]');
            let html = '';
            recipes.forEach((r, idx) => {
                let delBtn = isChefMode ? `<button onclick="deleteRecipe(${idx})" style="background:red; border:none; color:white; border-radius:4px; padding:5px 10px; cursor:pointer;">X</button>` : '';
                html += `<div class="recipe-row"><button class="recipe-btn" onclick="openRecipeModal(${idx})">📄 ${r.nom}</button>${delBtn}</div>`;
            });
            document.getElementById('library-container').innerHTML = html || '<div style="color:#555; text-align:center;">Vide.</div>';
        }

        function deleteRecipe(idx) { if(confirm("Supprimer ?")) { const r = JSON.parse(localStorage.getItem('kds_grimoire_v2')); r.splice(idx, 1); localStorage.setItem('kds_grimoire_v2', JSON.stringify(r)); renderLibrary(); } }
        function openRecipeModal(idx) { const r = JSON.parse(localStorage.getItem('kds_grimoire_v2'))[idx]; document.getElementById('modal-recipe-title').textContent = r.nom; document.getElementById('modal-recipe-content').textContent = r.content; document.getElementById('recipe-modal').style.display = 'flex'; }
        function closeRecipeModal() { document.getElementById('recipe-modal').style.display = 'none'; }
        function exportRecipes() { const blob = new Blob([localStorage.getItem('kds_grimoire_v2')], {type:'application/json'}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download='recettes.json'; a.click(); }
        function importRecipes(e) { const reader = new FileReader(); reader.onload = (ev) => { localStorage.setItem('kds_grimoire_v2', ev.target.result); renderLibrary(); }; reader.readAsText(e.target.files[0]); }

        function openResDrawer() { openDrawer('res-drawer', renderResDrawer); }
        function openStatsDrawer() { openDrawer('stats-drawer', renderStatsDrawer); }

        function renderResDrawer() {
            const container = document.getElementById('res-list-container');
            let reservations = [];
            for (const tableId in activeOrders) { if (activeOrders[tableId] && activeOrders[tableId].resName) reservations.push({ tableId, ...activeOrders[tableId] }); }
            reservations.sort((a, b) => (a.resTime || "").localeCompare(b.resTime || ""));
            container.innerHTML = reservations.map(o => `<div class="res-card"><h3 style="margin:0;">${o.resName} (${o.resTime})</h3><p style="margin:5px 0 0 0; color:#aaa;">Table ${o.tableId.replace('T','')} - 👥 ${o.covers||1}p</p></div>`).join('') || '<div style="color:#555; text-align:center;">Aucune réservation.</div>';
        }

        function renderStatsDrawer(selectedDateStr = null) {
            const targetDate = selectedDateStr || document.getElementById('stats-date-picker').value || getTodayString();
            const allStats = JSON.parse(localStorage.getItem('kds_archives_10ans') || '{}');
            const sortedStats = Object.entries(allStats[targetDate] || {}).sort((a, b) => b[1] - a[1]).slice(0, 20);
            document.getElementById('stats-list-container').innerHTML = sortedStats.map(([n, c], i) => `<div class="stat-row"><span>#${i+1} ${n}</span><span class="stat-count">${c}</span></div>`).join('') || '<div style="color:#555; text-align:center;">Aucun plat produit.</div>';
        }

        function renderKDS() {
            const container = document.getElementById('pending-container'); container.innerHTML = '';
            let currentPendingCount = 0;
            for (const tableId in activeOrders) {
                const order = activeOrders[tableId];
                const items = (order.items || []).filter(i => (i.dest === 'Cuisine' || i.dest === 'Dessert') && !i.done);
                if (items.length === 0) continue;
                currentPendingCount += items.length;
                const div = document.createElement('div'); div.className = 'ticket';
                div.innerHTML = `<div class="ticket-header"><span>${tableId.replace('T','Table ')}</span><span class="ticket-covers">👥 ${order.covers||1}p</span></div>
                <div class="ticket-body">${items.map(i => `<div style="padding:10px; border-bottom:1px solid #222; font-weight:bold;">${i.n}</div>`).join('')}
                <button onclick="markDone('${tableId}')" class="btn-send">TOUT ENVOYER</button></div>`;
                container.appendChild(div);
            }
            if (currentPendingCount > previousPendingCount) playSound('new');
            previousPendingCount = currentPendingCount;
            document.getElementById('pending-count').textContent = currentPendingCount + " Plats";
        }

        async function markDone(tableId) {
            const order = activeOrders[tableId];
            playSound('send');
            const today = getTodayString(); let allStats = JSON.parse(localStorage.getItem('kds_archives_10ans') || '{}'); if(!allStats[today]) allStats[today] = {};
            order.items.forEach(i => { if (i.dest === 'Cuisine' || i.dest === 'Dessert') { if(!i.done) { allStats[today][i.n] = (allStats[today][i.n] || 0) + 1; } i.done = true; } });
            localStorage.setItem('kds_archives_10ans', JSON.stringify(allStats));
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId, order }) });
        }
    </script>
</body>
</html>
