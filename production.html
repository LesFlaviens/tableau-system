<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iCHEF OS - Pass Cuisine</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #111;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gold: #d4af37;
            --accent: #10b981;
            --danger: #ef4444;
            --warning: #fbbf24;
            --info: #3b82f6;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* --- NAVBAR --- */
        .topbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 100; flex-shrink: 0; }
        .logo { font-size: 1.4rem; font-weight: 900; color: var(--gold); margin: 0; letter-spacing: 2px; }
        .badge { background: rgba(212, 175, 55, 0.1); border: 1px solid var(--gold); color: var(--gold); padding: 4px 8px; border-radius: 6px; font-size: 0.7rem; font-weight: 800; text-transform: uppercase; }
        
        .filters { display: flex; gap: 10px; align-items: center; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none;}
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; cursor: pointer; text-transform: uppercase; white-space: nowrap; transition: 0.2s;}
        .filter-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .filter-btn:active { transform: scale(0.95); }

        /* --- TICKETS BOARD --- */
        .board { flex: 1; padding: 20px; display: flex; gap: 20px; overflow-x: auto; overflow-y: hidden; align-items: flex-start; scroll-behavior: smooth; }
        .board::-webkit-scrollbar { height: 8px; }
        .board::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 4px; }

        .ticket { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; width: 320px; flex-shrink: 0; display: flex; flex-direction: column; max-height: 100%; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .ticket.urgent { border-color: var(--danger); box-shadow: 0 0 15px rgba(239, 68, 68, 0.2); }
        .ticket.timeshift { opacity: 0.6; border-color: var(--warning); border-style: dashed; }
        
        /* HEADER TICKET */
        .t-header { padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; background: rgba(0,0,0,0.2); border-radius: 12px 12px 0 0;}
        .t-table { font-size: 1.2rem; font-weight: 900; color: var(--text-main); margin-bottom: 4px; display: flex; align-items: center; gap: 8px;}
        .t-time { font-size: 0.8rem; font-weight: 700; color: var(--accent); padding: 4px 8px; background: rgba(16, 185, 129, 0.1); border-radius: 6px; }
        .t-time.late { color: var(--danger); background: rgba(239, 68, 68, 0.1); animation: blink 2s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .t-meta { font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase;}
        
        /* ITEMS TICKET */
        .t-body { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px;}
        .t-body::-webkit-scrollbar { width: 4px; }
        .t-body::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .t-item { display: flex; align-items: flex-start; gap: 10px; cursor: pointer; transition: 0.2s; padding: 8px; border-radius: 6px; }
        .t-item:hover { background: rgba(255,255,255,0.05); }
        .t-qty { font-weight: 900; color: var(--gold); font-size: 1.1rem; min-width: 25px; text-align: center; background: rgba(212, 175, 55, 0.1); padding: 2px 6px; border-radius: 4px;}
        .t-name { font-weight: 600; font-size: 0.95rem; line-height: 1.3; flex: 1;}
        .t-station { font-size: 0.6rem; color: var(--info); border: 1px solid rgba(59, 130, 246, 0.3); padding: 2px 4px; border-radius: 4px; text-transform: uppercase; font-weight: 800; align-self: flex-start; margin-top: 2px;}
        
        .t-item.done { opacity: 0.4; }
        .t-item.done .t-name { text-decoration: line-through; color: var(--text-muted); }
        .t-item.done .t-qty { background: transparent; color: var(--text-muted); }

        /* FOOTER TICKET */
        .t-footer { padding: 15px; border-top: 1px solid var(--border); background: rgba(0,0,0,0.3); border-radius: 0 0 12px 12px;}
        .btn-ready { width: 100%; background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 8px; font-weight: 900; font-size: 0.95rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.2s;}
        .btn-ready:active { transform: scale(0.97); }
        .btn-ready.waiting { background: var(--warning); color: #000; }

        /* --- EMPTY STATE --- */
        .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; height: 100%; color: var(--text-muted); text-align: center; }
        .empty-state div { font-size: 4rem; margin-bottom: 15px; opacity: 0.5; }
        .empty-state h3 { font-family: var(--font-title); font-size: 1.5rem; margin: 0 0 10px 0; color: var(--gold); }
        
        @media (max-width: 768px) {
            .topbar { flex-direction: column; gap: 15px; align-items: flex-start; padding: 15px;}
            .filters { width: 100%; }
            .board { flex-direction: column; overflow-y: auto; padding: 15px; gap: 15px;}
            .ticket { width: 100%; max-height: none; }
        }


        /* --- BIBLIOTHÈQUE RECETTES (LECTURE SEULE) --- */
        .library-btn { background: rgba(212,175,55,.12); border: 1px solid var(--gold); color: var(--gold); padding: 8px 12px; border-radius: 8px; font-weight: 900; cursor: pointer; white-space: nowrap; }
        .recipe-btn { flex-shrink: 0; border: 1px solid rgba(212,175,55,.45); background: rgba(212,175,55,.10); color: var(--gold); border-radius: 7px; padding: 5px 8px; font-weight: 900; cursor: pointer; }
        .recipe-btn:active, .library-btn:active { transform: scale(.96); }
        .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,.78); z-index: 9999; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-backdrop.open { display: flex; }
        .library-modal { width: min(1000px, 100%); max-height: 92vh; overflow: hidden; display: flex; flex-direction: column; background: #0d0d0d; border: 1px solid rgba(212,175,55,.35); border-radius: 16px; box-shadow: 0 24px 70px rgba(0,0,0,.7); }
        .library-head { padding: 16px 18px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
        .library-title { margin: 0; color: var(--gold); font-size: 1.05rem; font-weight: 900; }
        .close-library { border: 1px solid var(--border); background: rgba(255,255,255,.06); color: #fff; border-radius: 8px; padding: 8px 11px; cursor: pointer; font-weight: 900; }
        .library-tools { padding: 14px 18px; border-bottom: 1px solid var(--border); display: grid; grid-template-columns: auto 1fr; gap: 12px; }
        .library-tabs { display: flex; gap: 8px; }
        .library-tab { border: 1px solid var(--border); background: rgba(255,255,255,.05); color: var(--text-muted); border-radius: 8px; padding: 9px 12px; font-weight: 800; cursor: pointer; }
        .library-tab.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .library-search { width: 100%; min-width: 0; border: 1px solid var(--border); background: #151515; color: #fff; border-radius: 8px; padding: 10px 12px; font: inherit; }
        .library-body { overflow-y: auto; padding: 16px 18px 22px; }
        .recipe-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 12px; }
        .recipe-card { background: #141414; border: 1px solid var(--border); border-radius: 12px; padding: 14px; cursor: pointer; transition: .18s; }
        .recipe-card:hover { border-color: rgba(212,175,55,.55); transform: translateY(-1px); }
        .recipe-card h4 { margin: 0 0 7px; font-size: .95rem; }
        .recipe-meta { color: var(--text-muted); font-size: .74rem; font-weight: 700; }
        .recipe-detail { display: none; }
        .recipe-detail.open { display: block; }
        .back-library { border: 0; background: transparent; color: var(--gold); padding: 0 0 12px; font-weight: 900; cursor: pointer; }
        .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        .detail-section { background: #141414; border: 1px solid var(--border); border-radius: 12px; padding: 14px; }
        .detail-section h4 { color: var(--gold); margin: 0 0 10px; font-size: .85rem; text-transform: uppercase; }
        .detail-section ul, .detail-section ol { margin: 0; padding-left: 20px; }
        .detail-section li { margin-bottom: 7px; }
        .allergen-chip { display: inline-block; border: 1px solid rgba(239,68,68,.45); background: rgba(239,68,68,.12); color: #fecaca; padding: 4px 7px; border-radius: 999px; margin: 3px 4px 3px 0; font-size: .72rem; font-weight: 800; }
        .readonly-note { color: var(--text-muted); font-size: .72rem; margin-top: 8px; }
        .recipe-empty { text-align: center; color: var(--text-muted); padding: 42px 10px; }
        @media (max-width: 768px) {
            .library-tools { grid-template-columns: 1fr; }
            .library-tabs { overflow-x: auto; }
            .detail-grid { grid-template-columns: 1fr; }
            .modal-backdrop { padding: 8px; }
            .library-modal { max-height: 96vh; }
        }

    </style>
</head>
<body>

    <div class="topbar">
        <div style="display: flex; align-items: center; gap: 15px;">
            <h1 class="logo">iCHEF.</h1>
            <span class="badge">Pass Production</span>
            <button class="filter-btn" style="padding: 4px 8px; font-size: 0.65rem;" onclick="window.location.href='chef.html?tenantID=' + tenantID">🔙 Labo</button>
            <button class="library-btn" type="button" onclick="openRecipeLibrary()">📚 Cuisine & Pâtisserie</button>
        </div>
        <div class="filters" id="station-filters">
            <button class="filter-btn active" data-station="all" onclick="setStation('all')">Tous les postes</button>
            <button class="filter-btn" data-station="chaud" onclick="setStation('chaud')">🍳 Chaud</button>
            <button class="filter-btn" data-station="froid" onclick="setStation('froid')">🥗 Froid</button>
            <button class="filter-btn" data-station="grill" onclick="setStation('grill')">🔥 Grill</button>
            <button class="filter-btn" data-station="pizza" onclick="setStation('pizza')">🍕 Pizza</button>
            <button class="filter-btn" data-station="dessert" onclick="setStation('dessert')">🍰 Dessert</button>
        </div>
    </div>

    <div class="board" id="board">
        <div class="empty-state">
            <div>👨‍🍳</div>
            <h3>Cuisine Prête</h3>
            <p>En attente des premières commandes...</p>
        </div>
    </div>



    <div class="modal-backdrop" id="recipe-library" aria-hidden="true">
        <section class="library-modal" role="dialog" aria-modal="true" aria-labelledby="library-title">
            <div class="library-head">
                <div>
                    <h2 class="library-title" id="library-title">📚 Bibliothèque Cuisine & Pâtisserie</h2>
                    <div class="readonly-note">Consultation uniquement — les recettes ne peuvent pas être modifiées depuis le Pass.</div>
                </div>
                <button class="close-library" type="button" onclick="closeRecipeLibrary()">✕</button>
            </div>
            <div class="library-tools" id="library-tools">
                <div class="library-tabs">
                    <button class="library-tab active" type="button" data-library-tab="all" onclick="setLibraryTab('all')">Tout</button>
                    <button class="library-tab" type="button" data-library-tab="cuisine" onclick="setLibraryTab('cuisine')">🍳 Cuisine</button>
                    <button class="library-tab" type="button" data-library-tab="patisserie" onclick="setLibraryTab('patisserie')">🍰 Pâtisserie</button>
                </div>
                <input class="library-search" id="library-search" type="search" placeholder="Rechercher une recette, un ingrédient ou un allergène…" oninput="renderRecipeLibrary()">
            </div>
            <div class="library-body">
                <div id="recipe-list-view"></div>
                <div class="recipe-detail" id="recipe-detail-view"></div>
            </div>
        </section>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        let currentStation = 'all';
        let activeOrdersData = {};
        let systemSettings = {};

        // SÉCURITÉ DE BASE
        if (!tenantID) window.location.href = 'connexionpartenaire.html';

        // FILTRES DE POSTE
        function setStation(station) {
            currentStation = station;
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if(btn.dataset.station === station) btn.classList.add('active');
            });
            renderBoard();
        }

        // FORMATAGE DU TEMPS
        function formatTimeDiff(timestamp) {
            let diff = Math.floor((Date.now() - timestamp) / 60000); // en minutes
            if (diff < 1) return "À l'instant";
            return `${diff} min`;
        }

        // RENDU KANBAN
        function renderBoard() {
            const board = document.getElementById('board');
            let html = '';
            let hasTickets = false;

            // Convertir l'objet en tableau et trier (les plus anciens en premier)
            let ordersArray = Object.keys(activeOrdersData)
                .filter(k => !k.includes('MASTER') && !k.includes('ARCHIVE') && !k.startsWith('STAFF_'))
                .map(k => ({ id: k, ...activeOrdersData[k] }))
                .filter(o => o.status === 'NOUVELLE COMMANDE' || o.status === 'EN PRÉPARATION' || o.status === 'EN ATTENTE (TIME-SHIFT)')
                .sort((a, b) => a.time - b.time);

            ordersArray.forEach(order => {
                // 1. Filtrer les items selon le poste sélectionné
                let relevantItems = order.items.filter(item => {
                    if(currentStation === 'all') return true;
                    // Si pas de destination définie, on l'affiche partout par sécurité
                    if(!item.dest && !item.station) return true; 
                    return (item.dest === currentStation || item.station === currentStation);
                });

                // Si la commande n'a aucun plat pour ce poste, on ne l'affiche pas
                if (relevantItems.length === 0) return;
                hasTickets = true;

                // 2. Gestion du Time-Shifting (IA Anti-Rush)
                let isTimeShifted = order.timeShifted && order.releaseTime > Date.now();
                let ticketClass = "ticket";
                let timeDisplay = formatTimeDiff(order.time);
                let timeClass = "t-time";

                if (isTimeShifted) {
                    ticketClass += " timeshift";
                    let minLeft = Math.ceil((order.releaseTime - Date.now()) / 60000);
                    timeDisplay = `⏳ En attente (${minLeft}m)`;
                } else {
                    let diffMinutes = Math.floor((Date.now() - order.time) / 60000);
                    if (diffMinutes >= 15) { ticketClass += " urgent"; timeClass += " late"; }
                }

                // 3. Rendu des lignes de commande
                let itemsHtml = relevantItems.map((item, idx) => {
                    let isDone = item.done === true;
                    // Retrouver l'index global de l'item dans la commande d'origine (important pour l'update)
                    let globalIdx = order.items.findIndex(i => i.name === item.name && i.qty === item.qty && i.done === item.done);
                    
                    return `
                    <div class="t-item ${isDone ? 'done' : ''}" onclick="toggleItemDone('${order.id}', ${globalIdx})">
                        <div class="t-qty">${item.qty}</div>
                        <div class="t-name">${item.name}</div>
                        <button class="recipe-btn" type="button" title="Voir la recette" onclick="event.stopPropagation(); openRecipeByName(${JSON.stringify(item.name)})">📖</button>
                        ${item.station && currentStation === 'all' ? `<div class="t-station">${item.station.substring(0,3)}</div>` : ''}
                    </div>`;
                }).join('');

                // 4. Calcul de l'état du ticket
                let allDone = relevantItems.every(i => i.done === true);
                let btnHtml = '';
                
                if (isTimeShifted) {
                    btnHtml = `<button class="btn-ready waiting" disabled>EN ATTENTE...</button>`;
                } else if (allDone) {
                    btnHtml = `<button class="btn-ready" onclick="markOrderReady('${order.id}')">🛎️ BOUCLER LE TICKET</button>`;
                } else {
                    btnHtml = `<button class="btn-ready" style="background: rgba(255,255,255,0.1); color: var(--text-muted);" disabled>EN PRÉPARATION</button>`;
                }

                html += `
                <div class="${ticketClass}">
                    <div class="t-header">
                        <div>
                            <div class="t-table">${order.table.includes('WEB') ? '📱 Web ' + order.table.replace('WEB_', '#') : 'Table ' + order.table}</div>
                            <div class="t-meta">${order.typePaiement || 'Sur place'} • ${order.couverts || order.pax || 2} Pax</div>
                        </div>
                        <div class="${timeClass}">${timeDisplay}</div>
                    </div>
                    <div class="t-body">
                        ${itemsHtml}
                    </div>
                    <div class="t-footer">
                        ${btnHtml}
                    </div>
                </div>`;
            });

            if(!hasTickets) {
                board.innerHTML = `
                <div class="empty-state">
                    <div>👨‍🍳</div>
                    <h3>Cuisine Prête</h3>
                    <p>Poste ${currentStation === 'all' ? 'complet' : currentStation} en attente...</p>
                </div>`;
            } else {
                board.innerHTML = html;
            }
        }

        // --- ACTIONS ---

        async function toggleItemDone(orderId, itemIndex) {
            if(!activeOrdersData[orderId]) return;
            let order = activeOrdersData[orderId];
            
            // Si le ticket est en time-shift, on bloque l'action
            if(order.timeShifted && order.releaseTime > Date.now()) return;

            if (order.status === 'NOUVELLE COMMANDE') order.status = 'EN PRÉPARATION';
            
            order.items[itemIndex].done = !order.items[itemIndex].done;
            
            // Mise à jour visuelle instantanée
            renderBoard();

            // Envoi au serveur
            try {
                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: orderId, order: order })
                });
            } catch (e) { console.error("Erreur réseau"); }
        }

        async function markOrderReady(orderId) {
            if(!activeOrdersData[orderId]) return;
            let order = activeOrdersData[orderId];
            
            // Si c'est une commande Web, on la met en statut PRÊT (Ça fera sonner le téléphone du client)
            // Si c'est une commande Serveur, on peut la passer en "PRÊT" pour qu'il vienne chercher
            order.status = 'PRÊT';

            // Animation visuelle de sortie
            renderBoard();

            // Envoi au serveur
            try {
                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: orderId, order: order })
                });
            } catch (e) { console.error("Erreur réseau"); }
        }


        // --- BIBLIOTHÈQUE CUISINE & PÂTISSERIE (LECTURE SEULE) ---
        let libraryTab = 'all';
        let recipeLibrary = [];

        function safeParse(value, fallback = null) {
            try { return value ? JSON.parse(value) : fallback; } catch (e) { return fallback; }
        }

        function normalizeRecipe(raw, department) {
            if (!raw || typeof raw !== 'object') return null;
            const name = raw.name || raw.nom || raw.title || raw.plat || raw.label;
            if (!name) return null;
            const ingredients = raw.ingredients || raw.ingredientList || raw.composition || [];
            const steps = raw.steps || raw.etapes || raw.preparation || raw.instructions || [];
            const allergens = raw.allergens || raw.allergenes || [];
            return {
                id: raw.id || `${department}-${String(name).toLowerCase().replace(/[^a-z0-9]+/gi,'-')}`,
                name,
                department,
                category: raw.category || raw.categorie || (department === 'patisserie' ? 'Pâtisserie' : 'Cuisine'),
                image: raw.image || raw.photo || '',
                ingredients: Array.isArray(ingredients) ? ingredients : [ingredients].filter(Boolean),
                steps: Array.isArray(steps) ? steps : String(steps || '').split(/\n+/).filter(Boolean),
                allergens: Array.isArray(allergens) ? allergens : String(allergens || '').split(',').map(x => x.trim()).filter(Boolean),
                cooking: raw.cooking || raw.cuisson || raw.tempsCuisson || '',
                temperature: raw.temperature || raw.temperatureCuisson || '',
                plating: raw.plating || raw.dressage || '',
                conservation: raw.conservation || '',
                chefTip: raw.chefTip || raw.astuce || raw.conseil || '',
                updatedAt: raw.updatedAt || raw.dateModification || raw.lastUpdate || ''
            };
        }

        function collectRecipes() {
            const sources = [];
            const keys = [
                ['MENU', 'cuisine'], ['RECIPES', 'cuisine'], ['FICHES_TECHNIQUES', 'cuisine'],
                ['MENU_PATISSERIE', 'patisserie'], ['RECIPES_PATISSERIE', 'patisserie'], ['FICHES_PATISSERIE', 'patisserie']
            ];
            keys.forEach(([key, dep]) => {
                const value = safeParse(localStorage.getItem(key), null);
                if (value) sources.push([value, dep]);
            });

            if (systemSettings && typeof systemSettings === 'object') {
                ['menu','recipes','fichesTechniques'].forEach(k => systemSettings[k] && sources.push([systemSettings[k], 'cuisine']));
                ['menuPatisserie','recipesPatisserie','fichesPatisserie'].forEach(k => systemSettings[k] && sources.push([systemSettings[k], 'patisserie']));
            }

            const out = [];
            const walk = (value, dep) => {
                if (Array.isArray(value)) return value.forEach(v => walk(v, dep));
                if (!value || typeof value !== 'object') return;
                const candidate = normalizeRecipe(value, dep);
                if (candidate && (value.ingredients || value.ingredientList || value.composition || value.steps || value.etapes || value.preparation || value.instructions || value.recipe || value.recette)) out.push(candidate);
                Object.values(value).forEach(v => { if (v && typeof v === 'object') walk(v, dep); });
            };
            sources.forEach(([value, dep]) => walk(value, dep));

            const unique = new Map();
            out.forEach(r => unique.set(`${r.department}:${r.name.toLowerCase()}`, r));
            recipeLibrary = Array.from(unique.values()).sort((a,b) => a.name.localeCompare(b.name, 'fr'));
        }

        function openRecipeLibrary() {
            collectRecipes();
            document.getElementById('recipe-library').classList.add('open');
            document.getElementById('recipe-library').setAttribute('aria-hidden', 'false');
            showRecipeList();
            renderRecipeLibrary();
            setTimeout(() => document.getElementById('library-search').focus(), 30);
        }

        function closeRecipeLibrary() {
            document.getElementById('recipe-library').classList.remove('open');
            document.getElementById('recipe-library').setAttribute('aria-hidden', 'true');
        }

        function setLibraryTab(tab) {
            libraryTab = tab;
            document.querySelectorAll('[data-library-tab]').forEach(btn => btn.classList.toggle('active', btn.dataset.libraryTab === tab));
            showRecipeList();
            renderRecipeLibrary();
        }

        function showRecipeList() {
            document.getElementById('recipe-list-view').style.display = 'block';
            document.getElementById('recipe-detail-view').classList.remove('open');
            document.getElementById('library-tools').style.display = 'grid';
        }

        function renderRecipeLibrary() {
            const q = (document.getElementById('library-search').value || '').trim().toLowerCase();
            const rows = recipeLibrary.filter(r => {
                if (libraryTab !== 'all' && r.department !== libraryTab) return false;
                const haystack = [r.name, r.category, ...r.ingredients.map(formatIngredient), ...r.allergens].join(' ').toLowerCase();
                return !q || haystack.includes(q);
            });
            const host = document.getElementById('recipe-list-view');
            if (!rows.length) {
                host.innerHTML = `<div class="recipe-empty">📭 Aucune fiche trouvée.<br><span class="readonly-note">Les recettes créées par le Chef apparaîtront ici automatiquement.</span></div>`;
                return;
            }
            host.innerHTML = `<div class="recipe-grid">${rows.map(r => `
                <article class="recipe-card" onclick="openRecipeDetail('${escapeAttr(r.id)}')">
                    <h4>${escapeHtml(r.name)}</h4>
                    <div class="recipe-meta">${r.department === 'patisserie' ? '🍰 Pâtisserie' : '🍳 Cuisine'} • ${escapeHtml(r.category)}</div>
                    <div class="readonly-note">${r.allergens.length ? '⚠️ ' + r.allergens.length + ' allergène(s)' : 'Aucun allergène renseigné'}</div>
                </article>`).join('')}</div>`;
        }

        function openRecipeByName(name) {
            openRecipeLibrary();
            const normalized = String(name || '').trim().toLowerCase();
            const recipe = recipeLibrary.find(r => r.name.trim().toLowerCase() === normalized)
                || recipeLibrary.find(r => normalized.includes(r.name.trim().toLowerCase()) || r.name.trim().toLowerCase().includes(normalized));
            if (recipe) openRecipeDetail(recipe.id);
            else {
                document.getElementById('library-search').value = name || '';
                renderRecipeLibrary();
            }
        }

        function openRecipeDetail(id) {
            const r = recipeLibrary.find(x => x.id === id);
            if (!r) return;
            document.getElementById('recipe-list-view').style.display = 'none';
            document.getElementById('library-tools').style.display = 'none';
            const host = document.getElementById('recipe-detail-view');
            host.classList.add('open');
            host.innerHTML = `
                <button class="back-library" type="button" onclick="showRecipeList()">← Retour à la bibliothèque</button>
                <h3 style="margin:0 0 6px;">${escapeHtml(r.name)}</h3>
                <div class="recipe-meta" style="margin-bottom:14px;">${r.department === 'patisserie' ? '🍰 Pâtisserie' : '🍳 Cuisine'} • ${escapeHtml(r.category)}</div>
                <div class="detail-grid">
                    <section class="detail-section"><h4>Ingrédients</h4>${renderList(r.ingredients, false)}</section>
                    <section class="detail-section"><h4>Préparation</h4>${renderList(r.steps, true)}</section>
                    <section class="detail-section"><h4>Cuisson & dressage</h4>
                        <p><strong>Temps :</strong> ${escapeHtml(r.cooking || 'Non renseigné')}</p>
                        <p><strong>Température :</strong> ${escapeHtml(r.temperature || 'Non renseignée')}</p>
                        <p><strong>Dressage :</strong> ${escapeHtml(r.plating || 'Non renseigné')}</p>
                    </section>
                    <section class="detail-section"><h4>Allergènes & conservation</h4>
                        <div>${r.allergens.length ? r.allergens.map(a => `<span class="allergen-chip">${escapeHtml(a)}</span>`).join('') : '<span class="recipe-meta">Aucun allergène renseigné</span>'}</div>
                        <p><strong>Conservation :</strong> ${escapeHtml(r.conservation || 'Non renseignée')}</p>
                    </section>
                    <section class="detail-section" style="grid-column:1/-1;"><h4>Conseil du Chef</h4><p>${escapeHtml(r.chefTip || 'Aucun conseil renseigné.')}</p></section>
                </div>
                <div class="readonly-note">🔒 Lecture seule${r.updatedAt ? ' • Dernière mise à jour : ' + escapeHtml(String(r.updatedAt)) : ''}</div>`;
        }

        function renderList(values, ordered) {
            if (!values || !values.length) return '<p class="recipe-meta">Non renseigné</p>';
            const tag = ordered ? 'ol' : 'ul';
            return `<${tag}>${values.map(v => `<li>${escapeHtml(formatIngredient(v))}</li>`).join('')}</${tag}>`;
        }

        function formatIngredient(v) {
            if (v == null) return '';
            if (typeof v === 'string' || typeof v === 'number') return String(v);
            return [v.qty || v.quantity || v.quantite, v.unit || v.unite, v.name || v.nom || v.ingredient].filter(Boolean).join(' ');
        }

        function escapeHtml(value) {
            return String(value ?? '').replace(/[&<>"']/g, ch => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[ch]));
        }
        function escapeAttr(value) { return escapeHtml(value).replace(/`/g, '&#096;'); }

        document.getElementById('recipe-library').addEventListener('click', (e) => {
            if (e.target.id === 'recipe-library') closeRecipeLibrary();
        });
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') closeRecipeLibrary();
        });

        // --- SYNCHRONISATION WEBSOCKET ---
        const socket = io(SERVER_URL);
        socket.emit('joinTenant', tenantID);

        socket.on('updateState', (state) => {
            if(!state || !state.activeOrders) return;
            
            // Si on a un nouveau ticket non-time-shifted, on fait un petit bip
            let currentCount = Object.keys(activeOrdersData).filter(k => activeOrdersData[k].status === 'NOUVELLE COMMANDE').length;
            let newCount = Object.keys(state.activeOrders).filter(k => state.activeOrders[k].status === 'NOUVELLE COMMANDE').length;
            
            if (newCount > currentCount) {
                try { new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3').play(); } catch(e){}
            }

            activeOrdersData = state.activeOrders;
            systemSettings = state.settings || state.systemSettings || systemSettings;
            renderBoard();
        });

        // Premier chargement
        async function fetchInitialState() {
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                let state = await r.json();
                if(state && state.activeOrders) {
                    activeOrdersData = state.activeOrders;
                    systemSettings = state.settings || state.systemSettings || systemSettings;
                    renderBoard();
                }
            } catch (e) {}
        }

        // Rafraîchissement régulier pour le compteur de temps
        setInterval(renderBoard, 30000); // 30 sec

        fetchInitialState();
    </script>
</body>
</html>
