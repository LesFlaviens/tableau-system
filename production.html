<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - Cuisine (Monochrome)</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; }
        
        /* FOND QUADRILLÉ TACTIQUE */
        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text); 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden; 
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
        }
        
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; }
        #start-overlay button { padding: 20px 40px; font-size: 1.5rem; font-weight: 900; background: #fff; color: #000; border: none; border-radius: 4px; cursor: pointer; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        #production-area { flex: 1; padding: 30px; overflow-y: auto; position: relative; width: 100%; box-sizing: border-box;}
        
        /* HEADER ÉPURÉ & SIGNATURE */
        .header-container { position: relative; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 20px; margin-bottom: 30px; }
        .header-title { color: var(--text); font-size: 2rem; font-weight: 900; text-transform: uppercase; margin: 0; display: flex; align-items: center;}
        #pending-count { color: var(--sub); font-weight: 400; font-size: 1.2rem; margin-left: 20px; text-transform: none; }
        
        .brand-watermark { position: absolute; left: 50%; transform: translateX(-50%); font-family: 'Arial', sans-serif; font-style: italic; font-size: 0.9rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; pointer-events: none; }
        
        /* BOUTONS SUPÉRIEURS WIREFRAME */
        .top-nav { display: flex; gap: 15px; }
        .btn-top { 
            background: transparent; 
            border: 1px solid var(--line); 
            color: var(--text); 
            border-radius: 6px; 
            padding: 8px 15px; 
            cursor: pointer; 
            text-transform: uppercase; 
            font-weight: 600;
            font-size: 0.75rem; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 5px;
            transition: 0.2s;
            min-width: 80px;
        }
        .btn-top i { font-size: 1.2rem; font-style: normal; }
        .btn-top:hover { background: #fff; color: #000; }

        /* GRILLE DES TICKETS */
        .grid-wrapper { border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 25px; }
        
        /* DESIGN DU TICKET */
        .ticket-wire { 
            border: 1px solid var(--line); 
            border-radius: 8px; 
            padding: 15px; 
            display: flex; 
            flex-direction: column; 
            gap: 10px; 
            background: #050505;
        }
        
        .tw-header { display: grid; grid-template-columns: 1fr 1fr; border: 1px solid var(--line); border-radius: 4px; overflow: hidden; }
        .tw-head-title { background: var(--line); color: #000; font-weight: 900; text-align: center; padding: 6px; border-right: 1px solid #000; font-size: 0.85rem;}
        .tw-head-title:last-child { border-right: none; }
        .tw-head-val { text-align: center; padding: 10px; font-weight: bold; font-size: 1.1rem; border-top: 1px solid var(--line); border-right: 1px solid var(--line);}
        .tw-head-val:last-child { border-right: none; }

        .tw-section { display: flex; flex-direction: column; }
        .tw-sec-title { font-size: 0.75rem; font-weight: bold; text-transform: uppercase; margin-bottom: 3px; letter-spacing: 1px;}
        .tw-sec-box { border: 1px solid var(--line); min-height: 40px; border-radius: 4px; padding: 5px; display: flex; flex-direction: column; justify-content: center;}
        
        .tw-item { display: flex; justify-content: space-between; border-bottom: 1px dashed rgba(255,255,255,0.3); padding: 4px 2px; font-size: 0.95rem; font-weight: bold;}
        .tw-item:last-child { border-bottom: none; }
        .tw-item.done { text-decoration: line-through; color: var(--sub); }

        .tw-total { display: flex; justify-content: flex-end; align-items: center; gap: 10px; margin-top: 5px; }
        .tw-total span { font-weight: bold; font-size: 0.8rem; }
        .tw-total-val { border: 1px solid var(--line); padding: 5px 25px; border-radius: 4px; font-weight: bold; }

        /* BOUTONS D'ACTION TICKET */
        .tw-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .btn-wire { background: transparent; border: 1px solid var(--line); color: var(--line); padding: 8px; font-weight: bold; cursor: pointer; border-radius: 4px; text-transform: uppercase; font-size: 0.8rem; transition: 0.2s;}
        .btn-wire:hover { background: #fff; color: #000; }
        .btn-wire.send { grid-column: 1 / -1; background: #fff; color: #000; font-weight: 900;}
        .btn-wire.send:active { transform: scale(0.98); }
        .obs-banner { border: 1px solid #fff; padding: 8px; font-weight: bold; font-size: 0.8rem; text-align: center; margin-bottom: -5px; text-transform: uppercase; }

        /* TIROIRS EN NOIR ET BLANC */
        .drawer { position: absolute; left: 0; top: 0; width: 450px; height: 100%; background: #050505; border-right: 1px solid #fff; padding: 30px; z-index: 8000; box-sizing: border-box; overflow-y: auto; transform: translateX(-100%); transition: 0.3s; }
        .drawer.open { transform: translateX(0); }
        #gestion-drawer, #cmd-drawer { width: 100vw; max-width: 100%; z-index: 8500; border-right: none; padding: 40px; }
        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: transparent; border: 1px solid #fff; color: #fff; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; }
        
        .input-field { width: 100%; background: #000; border: 1px solid #fff; color: #fff; padding: 12px; border-radius: 4px; margin-bottom: 15px; font-family: inherit; box-sizing: border-box;}
        .btn-action { padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; border: 1px solid #fff; background: transparent; color: #fff;}
        .btn-action:hover { background: #fff; color: #000;}
        
        /* Listes tiroirs */
        .res-card, .haccp-card, .history-ticket { border: 1px solid #fff; padding: 15px; margin-bottom: 12px; border-radius: 4px; background: #000; }
        .history-ticket h3 { margin: 0 0 10px 0; border-bottom: 1px solid #333; padding-bottom: 5px; }
        .history-items li { margin-bottom: 5px; color: #aaa; }
    </style>
</head>
<body>

    <div id="start-overlay">
        <h1 style="margin-bottom: 30px; text-transform: uppercase; letter-spacing: 2px;">Kitchen Display System</h1>
        <button onclick="initSystem()">Démarrer le Service</button>
    </div>

    <div id="production-area">
        
        <div id="history-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('history-drawer')">✕</button>
            <h2 style="border-bottom: 1px solid #fff; padding-bottom: 10px;">HISTORIQUE</h2>
            <div id="history-container"></div>
        </div>

        <div id="res-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('res-drawer')">✕</button>
            <h2 style="border-bottom: 1px solid #fff; padding-bottom: 10px;">PRÉVISIONS</h2>
            <input type="date" id="kitchen-resa-date" class="input-field" onchange="renderResDrawer()">
            <div id="res-list-container"></div>
        </div>

        <div id="cmd-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('cmd-drawer')">✕</button>
            <h2 style="border-bottom: 1px solid #fff; padding-bottom: 10px;">GESTION DES ACHATS</h2>
            <div style="display:flex; gap:10px;">
                <textarea id="cmd-text" class="input-field" style="height:60px; resize:none;" placeholder="Dictez ou tapez..."></textarea>
                <button onclick="addCommande()" class="btn-action" style="height:60px;">+ AJOUTER</button>
            </div>
            <button onclick="clearCommandes()" class="btn-action" style="width:100%; margin-bottom:20px; border-style:dashed;">PURGER LA LISTE</button>
            <div id="cmd-list-container" style="display: grid; gap: 10px;"></div>
        </div>

        <div class="header-container">
            <h2 class="header-title">GESTION DE LA CUISINE <span id="pending-count">0 plats à envoyer</span></h2>
            <div class="brand-watermark">ichef.ch</div>
            <div class="top-nav">
                <button class="btn-top" onclick="openDrawer('history-drawer')"><i>✓</i> HISTORIQUE</button>
                <button class="btn-top"><i>📅</i> PLANNING</button>
                <button class="btn-top" onclick="openResDrawer()"><i>📅</i> RÉSA</button>
                <button class="btn-top" onclick="openCommandesDrawer()"><i>🛒</i> COURSES</button>
                <button class="btn-top"><i>⚙️</i> HACCP</button>
            </div>
        </div>

        <div class="grid-wrapper">
            <div class="grid" id="pending-container"></div>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let previousPendingCount = 0; let audioCtx;

        function initSystem() {
            try { const AudioContext = window.AudioContext || window.webkitAudioContext; if (AudioContext) { audioCtx = new AudioContext(); audioCtx.resume(); } } catch (error) {}
            document.getElementById('start-overlay').style.display = 'none';
        }

        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination); const now = audioCtx.currentTime;
            if (type === 'new') { osc.type = 'square'; osc.frequency.setValueAtTime(880, now); osc.frequency.setValueAtTime(1046, now + 0.15); gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.3, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3); osc.start(now); osc.stop(now + 0.3); } 
            else if (type === 'send') { osc.type = 'sine'; osc.frequency.setValueAtTime(440, now); gain.gain.setValueAtTime(0, now); gain.gain.linearRampToValueAtTime(0.5, now + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4); osc.start(now); osc.stop(now + 0.4); }
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') {
                activeOrders = msg.activeOrders;
                if (activeOrders['GLOBAL_RESAS'] && activeOrders['GLOBAL_RESAS'].reservations) { localStorage.setItem('empire_reservations', JSON.stringify(activeOrders['GLOBAL_RESAS'].reservations)); }
                renderKDS();
                if(document.getElementById('res-drawer').classList.contains('open')) renderResDrawer();
            }
        };

        window.addEventListener('storage', (e) => { if(e.key === 'empire_reservations') { if(document.getElementById('res-drawer').classList.contains('open')) renderResDrawer(); } });

        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
        function openDrawer(id, callback) { ['res-drawer', 'cmd-drawer', 'history-drawer'].forEach(d => { if(document.getElementById(d)) document.getElementById(d).classList.remove('open'); }); document.getElementById(id).classList.add('open'); if(callback) callback(); }

        // Moteur Résa
        function renderResDrawer() {
            const container = document.getElementById('res-list-container'); const dateInput = document.getElementById('kitchen-resa-date');
            if(!dateInput.value) { const today = new Date(); dateInput.value = today.toISOString().split('T')[0]; }
            const dayResas = (JSON.parse(localStorage.getItem('empire_reservations')) || {})[dateInput.value] || [];
            if(dayResas.length === 0) { container.innerHTML = '<div style="color:#aaa; text-align:center;">Aucune réservation.</div>'; return; }
            let totalPax = 0;
            let html = dayResas.map(r => { totalPax += parseInt(r.pax || 0); return `<div class="res-card"><div style="display:flex; justify-content:space-between; margin-bottom:5px;"><b>${r.time} - ${r.name}</b><span style="border:1px solid #fff; padding:2px 8px; border-radius:4px;">${r.pax}p</span></div>${r.tel ? `<small>${r.tel}</small>` : ''}</div>`; }).join('');
            container.innerHTML = `<div style="margin-bottom:15px; font-size:1.2rem; font-weight:bold;">Total prévisionnel : ${totalPax} couverts</div>` + html;
        }

        // Moteur Commandes
        function addCommande() {
            const text = document.getElementById('cmd-text').value.trim(); if(!text) return;
            const cmds = JSON.parse(localStorage.getItem('kds_commandes_v1')) || [];
            text.split(/\s+et\s+|\s+puis\s+|,|\n/i).forEach(phrase => { if(phrase.trim() !== "") cmds.push({ id: Date.now() + Math.random(), text: phrase.trim(), done: false }); });
            localStorage.setItem('kds_commandes_v1', JSON.stringify(cmds)); document.getElementById('cmd-text').value = ''; renderCommandes();
        }
        function clearCommandes() { if(confirm('Purger la liste ?')) { localStorage.removeItem('kds_commandes_v1'); renderCommandes(); } }
        function renderCommandes() {
            const cmds = JSON.parse(localStorage.getItem('kds_commandes_v1')) || [];
            document.getElementById('cmd-list-container').innerHTML = cmds.length === 0 ? '<div style="color:#aaa; text-align:center;">Liste vide.</div>' : cmds.map(c => `<div class="res-card">${c.text}</div>`).join('');
        }

        // --- LE MOTEUR D'AFFICHAGE "WIREFRAME" ---
        function renderKDS() {
            const pendingContainer = document.getElementById('pending-container');
            const historyContainer = document.getElementById('history-container');
            pendingContainer.innerHTML = ''; historyContainer.innerHTML = '';
            let currentPendingCount = 0;

            for (const tableId in activeOrders) {
                if (tableId === 'GLOBAL_RESAS') continue; 
                
                const order = activeOrders[tableId];
                const myItems = order.ticket ? [...order.ticket.entrees, ...order.ticket.plats, ...order.ticket.desserts] : (order.items || []);
                if (myItems.length === 0) continue;
                
                const titreTable = tableId.includes('WEB') ? tableId : tableId.replace('T', '');
                const pendingItems = myItems.filter(i => !i.done);
                
                // CONSTRUCTION DU TICKET ACTIF
                if (pendingItems.length > 0) {
                    currentPendingCount += pendingItems.length;
                    const ticketDiv = document.createElement('div'); ticketDiv.className = 'ticket-wire';

                    let obsHtml = order.observation ? `<div class="obs-banner">${order.observation}</div>` : '';

                    const grouped = { 1: [], 2: [], 3: [], 0: [] };
                    pendingItems.forEach(i => { grouped[i.step || i.category === 'Entrée' ? 1 : i.category === 'Dessert' ? 3 : 2].push(i); });
                    
                    const renderSection = (title, items) => {
                        return `
                        <div class="tw-section">
                            <div class="tw-sec-title">${title}</div>
                            <div class="tw-sec-box">
                                ${items.length > 0 ? items.map(i => `<div class="tw-item"><span>${(i.n || i.name).replace(' [WEB]', '')}</span></div>`).join('') : '<div style="color:#333; text-align:center; font-size:0.8rem;">-</div>'}
                            </div>
                        </div>`;
                    };

                    ticketDiv.innerHTML = `
                        ${obsHtml}
                        <div class="tw-header">
                            <div class="tw-head-title">TABLE</div>
                            <div class="tw-head-title">HEURE</div>
                            <div class="tw-head-val">${titreTable}</div>
                            <div class="tw-head-val">${order.time}</div>
                        </div>
                        ${renderSection('ENTRÉES', grouped[1])}
                        ${renderSection('PLATS', [...grouped[2], ...grouped[0]])}
                        ${renderSection('DESSERTS', grouped[3])}
                        <div class="tw-total">
                            <span>TOTAL</span>
                            <div class="tw-total-val">${pendingItems.length}</div>
                        </div>
                        <button class="btn-wire send" onclick="modifierStatutCours('${tableId}', 0, true)">VALIDER TICKET</button>
                    `;
                    pendingContainer.appendChild(ticketDiv);
                }

                // TICKET HISTORIQUE
                const doneItems = myItems.filter(i => i.done);
                if (doneItems.length > 0) {
                    const historyDiv = document.createElement('div'); historyDiv.className = 'history-ticket';
                    historyDiv.innerHTML = `
                        <h3>Table ${titreTable}</h3>
                        <ul class="history-items">${doneItems.map(i => `<li>${(i.n || i.name).replace(' [WEB]', '')}</li>`).join('')}</ul>
                        <button class="btn-wire" style="width:100%" onclick="modifierStatutCours('${tableId}', 0, false)">↺ ANNULER</button>
                    `;
                    historyContainer.appendChild(historyDiv);
                }
            }
            if (currentPendingCount > previousPendingCount) { playSound('new'); }
            previousPendingCount = currentPendingCount; document.getElementById('pending-count').textContent = currentPendingCount + " plats à envoyer";
        }

        async function modifierStatutCours(tableId, step, isDone) {
            const order = activeOrders[tableId]; if (!order) return;
            if (isDone) playSound('send');

            const myItems = order.ticket ? [...order.ticket.entrees, ...order.ticket.plats, ...order.ticket.desserts] : (order.items || []);
            myItems.forEach(i => { i.done = isDone; });

            if (myItems.every(i => i.done)) { order.status = 'ready'; } else { order.status = 'pending'; }
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId, order }) });
        }
    </script>
</body>
</html>
