<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TABLEAU DE PRODUCTION - Système Multi-Postes</title>
    <style>
        :root { 
            --bg: #0a0a0a; --card: #161616; --accent: #00e676; 
            --bar: #00b0ff; --cuisine: #ff9100; --dessert: #e040fb; --panel: #121212;
        }
        
        body { margin: 0; padding: 20px; background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .header-controls { display: flex; align-items: center; gap: 15px; }

        .poste-selector { background: #222; border: 2px solid #444; color: #fff; padding: 12px 20px; border-radius: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .poste-selector:hover { border-color: var(--accent); }
        .poste-selector:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 10px rgba(0, 230, 118, 0.3); }

        .btn-history { background: #333; border: 1px solid #555; color: #fff; padding: 12px 20px; border-radius: 8px; font-weight: 900; text-transform: uppercase; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-history:hover { background: #444; border-color: #fff; }

        #orders-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 25px; }
        
        .order-card { background: var(--card); border: 2px solid #333; border-radius: 12px; padding: 20px; display: flex; flex-direction: column; box-shadow: 0 10px 30px rgba(0,0,0,0.5); animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .order-header { display: flex; justify-content: space-between; align-items: center; font-size: 1.8rem; font-weight: 900; margin-bottom: 5px; border-bottom: 1px solid #333; padding-bottom: 10px; }
        
        .item-list { list-style: none; padding: 0; margin: 0 0 25px 0; font-size: 1.2rem; flex-grow: 1; }
        .item-list li { padding: 10px 0; border-bottom: 1px dashed #222; display: flex; justify-content: space-between; align-items: center; }
        
        .dest-tag { font-size: 0.7rem; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; font-weight: bold; letter-spacing: 1px; }
        .tag-Cuisine { background: rgba(255, 145, 0, 0.2); color: var(--cuisine); border: 1px solid var(--cuisine); }
        .tag-Bar { background: rgba(0, 176, 255, 0.2); color: var(--bar); border: 1px solid var(--bar); }
        .tag-Dessert { background: rgba(224, 64, 251, 0.2); color: var(--dessert); border: 1px solid var(--dessert); }

        .step-divider { background: #333; color: var(--accent); padding: 6px 10px; font-size: 0.75rem; font-weight: 900; text-transform: uppercase; margin-top: 15px; border-radius: 4px; letter-spacing: 2px; text-align: center; }

        /* BOUTON INDIVIDUEL PAR PLAT */
        .btn-send-item { background: #222; border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.7rem; transition: 0.2s; }
        .btn-send-item:hover { background: var(--accent); color: #000; }
        .item-done { opacity: 0.5; background: rgba(0, 230, 118, 0.05); padding: 10px !important; border-radius: 6px; border-bottom: none !important; }
        .status-sent { color: var(--accent); font-size: 0.75rem; font-weight: bold; letter-spacing: 1px; }

        .btn-ready { width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 1.1rem; transition: 0.2s; }
        .btn-ready:hover { filter: brightness(1.1); transform: scale(1.02); }

        .empty-state { text-align: center; padding: 150px 20px; color: #333; font-weight: 900; font-size: 2rem; grid-column: 1/-1; text-transform: uppercase; letter-spacing: 5px; }
        .status-dot { width: 12px; height: 12px; background: var(--accent); border-radius: 50%; display: inline-block; margin-right: 10px; box-shadow: 0 0 10px var(--accent); }

        #history-drawer { position: fixed; right: 0; top: 0; width: 450px; height: 100vh; background: var(--panel); border-left: 2px solid #333; padding: 25px; z-index: 7000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -10px 0 40px rgba(0,0,0,0.9); }
        #history-drawer.open { transform: translateX(0); }
        .btn-close-drawer { position: absolute; top: 20px; right: 20px; background: transparent; border: none; color: #aaa; font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-close-drawer:hover { color: #ff1744; transform: scale(1.2); }
        .history-card { background: #000; border: 1px solid #333; border-left: 4px solid #555; padding: 15px; margin-bottom: 15px; border-radius: 6px; }
        .history-card.archived { border-left-color: var(--accent); }
        .history-items { font-size: 0.9rem; color: #aaa; margin: 10px 0; }
        .btn-restore { width: 100%; padding: 10px; background: #ff1744; color: white; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.2s; }
        .btn-restore:hover { background: #d50000; }
    </style>
</head>
<body>

    <header>
        <div style="display:flex; align-items: center; gap: 30px;">
            <h1 style="margin:0; font-size: 1.8rem; letter-spacing: 3px; font-weight: 900;">TABLEAU DE PRODUCTION</h1>
            <div class="header-controls">
                <button class="btn-history" onclick="toggleHistory()">📂 ARCHIVES (<span id="history-count">0</span>)</button>
                <select id="poste-type" class="poste-selector" onchange="renderOrders()">
                    <option value="TOUT">VUE GLOBALE (CHEF)</option>
                    <option value="Cuisine">POSTE CUISINE</option>
                    <option value="Bar">POSTE BAR</option>
                    <option value="Dessert">POSTE DESSERT</option>
                </select>
            </div>
        </div>
        <div style="font-weight: 900; letter-spacing: 1px; color: #555;">
            <span class="status-dot"></span> <span id="poste-name-display">SERVEUR CONNECTÉ</span>
        </div>
    </header>

    <div id="orders-grid"><div class="empty-state">AUCUNE COMMANDE EN ATTENTE</div></div>

    <div id="history-drawer">
        <button class="btn-close-drawer" onclick="toggleHistory()">✕</button>
        <h2 style="margin-top:0; font-size: 1.5rem; border-bottom: 1px solid #333; padding-bottom: 15px;">HISTORIQUE DES ENVOIS</h2>
        <div id="history-list"></div>
    </div>

    <script>
        let currentOrders = {}; let previousOrdersState = {}; let isFirstLoad = true;
        
        const STEP_NAMES = {
            0: "ENVOI DIRECT",
            1: "1er SERVICE : ENTRÉES",
            2: "À SUIVRE : PLATS",
            3: "À SUIVRE : DESSERTS"
        };

        function playNewOrderSound() {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                if (!AudioContext) return;
                const ctx = new AudioContext();
                function playTone(freq, type, startTime, duration) {
                    const osc = ctx.createOscillator(); const gain = ctx.createGain();
                    osc.type = type; osc.frequency.value = freq; osc.connect(gain); gain.connect(ctx.destination);
                    gain.gain.setValueAtTime(0, startTime); gain.gain.linearRampToValueAtTime(0.5, startTime + 0.05); gain.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
                    osc.start(startTime); osc.stop(startTime + duration);
                }
                const now = ctx.currentTime; playTone(1500, 'square', now, 0.15); playTone(1500, 'square', now + 0.2, 0.15); 
            } catch(e) {}
        }

        const ws = new WebSocket(`ws://${window.location.host}`);

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') {
                const newOrders = msg.activeOrders;
                if (!isFirstLoad) {
                    let hasNewOrder = false;
                    for (const tableId in newOrders) {
                        const order = newOrders[tableId];
                        if (order && order.status === 'pending') {
                            let prevOrder = previousOrdersState[tableId];
                            if (!prevOrder || prevOrder.status !== 'pending' || order.items.length > prevOrder.items.length) {
                                hasNewOrder = true;
                            }
                        }
                    }
                    if (hasNewOrder) playNewOrderSound();
                }
                isFirstLoad = false; previousOrdersState = JSON.parse(JSON.stringify(newOrders)); currentOrders = newOrders; renderOrders();
            }
        };

        function toggleHistory() { document.getElementById('history-drawer').classList.toggle('open'); }

        function renderOrders() {
            const grid = document.getElementById('orders-grid');
            const historyList = document.getElementById('history-list');
            const posteSelectionne = document.getElementById('poste-type').value;
            
            document.getElementById('poste-name-display').innerText = `POSTE ACTIF : ${posteSelectionne}`;
            grid.innerHTML = ''; historyList.innerHTML = '';
            let countPending = 0; let countHistory = 0;

            const sortedTableIds = Object.keys(currentOrders).sort();

            for (const tableId of sortedTableIds) {
                const order = currentOrders[tableId];
                if (!order || !order.items) continue;

                // On mappe avec l'index original pour que le cuisinier supprime la bonne ligne dans la base de données
                const itemsWithIndex = order.items.map((it, idx) => ({...it, _idx: idx}));

                const filteredItems = itemsWithIndex.filter(item => {
                    if (posteSelectionne === "TOUT") return true;
                    return item.dest === posteSelectionne;
                });

                if (filteredItems.length === 0) continue;

                const readyPostes = order.readyPostes || [];
                let isReadyForThisPoste = false;
                if (posteSelectionne === "TOUT") isReadyForThisPoste = (order.status === 'ready');
                else isReadyForThisPoste = readyPostes.includes(posteSelectionne);
                if (order.status === 'ready' || order.status === 'addition') isReadyForThisPoste = true;

                const groupedItems = {};
                filteredItems.forEach(i => {
                    const step = i.step || 0;
                    if (!groupedItems[step]) groupedItems[step] = [];
                    groupedItems[step].push(i);
                });

                let itemsHtml = '';
                Object.keys(groupedItems).sort().forEach(step => {
                    itemsHtml += `<div class="step-divider">${STEP_NAMES[step] || "SUITE"}</div>`;
                    itemsHtml += groupedItems[step].map(i => {
                        // RENDU CONDITIONNEL : Envoyé VS En attente
                        if (i.done) {
                            return `
                                <li class="item-done">
                                    <div style="text-decoration: line-through; display:flex; align-items:center; gap:10px;">
                                        <span>${i.n}</span>
                                    </div>
                                    <span class="status-sent">✔️ PRÊT</span>
                                </li>`;
                        } else {
                            return `
                                <li>
                                    <div style="display:flex; align-items:center; gap:10px;">
                                        <span>${i.n}</span>
                                        <span class="dest-tag tag-${i.dest}">${i.dest}</span>
                                    </div>
                                    <button class="btn-send-item" onclick="sendSingleItem('${tableId}', ${i._idx})">ENVOYER</button>
                                </li>`;
                        }
                    }).join('');
                });


                if (order.status === 'pending' && !isReadyForThisPoste) {
                    countPending++;
                    const card = document.createElement('div'); card.className = 'order-card';
                    card.innerHTML = `
                        <div class="order-header"><span>${tableId}</span></div>
                        <ul class="item-list">${itemsHtml}</ul>
                        <button class="btn-ready" onclick="markReady('${tableId}')">TOUT ENVOYER (SIMULTANÉ)</button>
                    `;
                    grid.appendChild(card);
                } 
                else if (isReadyForThisPoste) {
                    countHistory++;
                    const histCard = document.createElement('div'); histCard.className = 'history-card archived';
                    const simpleItemsList = filteredItems.map(i => `- ${i.n}`).join('<br>');
                    histCard.innerHTML = `
                        <div style="display:flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <strong style="font-size: 1.2rem; color: var(--accent);">${tableId}</strong>
                        </div>
                        <div class="history-items">${simpleItemsList}</div>
                        <button class="btn-restore" onclick="restoreOrder('${tableId}')">⚠️ ANNULER L'ENVOI</button>
                    `;
                    historyList.appendChild(histCard);
                }
            }

            document.getElementById('history-count').innerText = countHistory;
            if (countPending === 0) grid.innerHTML = `<div class="empty-state">AUCUN BON : ${posteSelectionne.toUpperCase()}</div>`;
        }

        // FONCTION : ENVOI PLAT PAR PLAT (GRANULAIRE)
        async function sendSingleItem(tableId, itemIndex) {
            const posteSelectionne = document.getElementById('poste-type').value;
            const updatedOrder = JSON.parse(JSON.stringify(currentOrders[tableId]));
            
            // Marque la ligne spécifique comme faite
            updatedOrder.items[itemIndex].done = true;

            // Vérifie si TOUS les plats de CE poste sont terminés
            const posteItems = updatedOrder.items.filter(item => posteSelectionne === "TOUT" || item.dest === posteSelectionne);
            const allDone = posteItems.every(i => i.done);

            if (allDone) {
                // Si tout est fini, le ticket disparait du poste automatiquement
                updatedOrder.readyPostes = updatedOrder.readyPostes || [];
                if (posteSelectionne !== "TOUT" && !updatedOrder.readyPostes.includes(posteSelectionne)) {
                    updatedOrder.readyPostes.push(posteSelectionne);
                }
                const requiredPostes = new Set(updatedOrder.items.map(i => i.dest));
                let fullyDone = true;
                requiredPostes.forEach(p => { if (!updatedOrder.readyPostes.includes(p)) fullyDone = false; });
                if (fullyDone || posteSelectionne === "TOUT") {
                    updatedOrder.status = 'ready';
                }
            }

            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: tableId, order: updatedOrder }) });
        }

        // FONCTION : ENVOI SIMULTANÉ (BOUTON GLOBAL)
        async function markReady(tableId) {
            const posteSelectionne = document.getElementById('poste-type').value;
            const updatedOrder = JSON.parse(JSON.stringify(currentOrders[tableId]));
            
            // Marque TOUS les items du poste en "done = true"
            updatedOrder.items.forEach(i => {
                if (posteSelectionne === "TOUT" || i.dest === posteSelectionne) i.done = true;
            });

            updatedOrder.readyPostes = updatedOrder.readyPostes || [];
            if (posteSelectionne !== "TOUT" && !updatedOrder.readyPostes.includes(posteSelectionne)) { updatedOrder.readyPostes.push(posteSelectionne); }

            const requiredPostes = new Set(updatedOrder.items.map(i => i.dest));
            let allDone = true;
            requiredPostes.forEach(p => { if (!updatedOrder.readyPostes.includes(p)) allDone = false; });

            if (allDone || posteSelectionne === "TOUT") { updatedOrder.status = 'ready'; }

            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: tableId, order: updatedOrder }) });
        }

        // FONCTION : RESTAURATION HISTORIQUE
        async function restoreOrder(tableId) {
            if (confirm(`Voulez-vous replacer le ticket ${tableId} en production sur votre poste ?`)) {
                const posteSelectionne = document.getElementById('poste-type').value;
                const updatedOrder = JSON.parse(JSON.stringify(currentOrders[tableId]));
                
                updatedOrder.status = 'pending'; 
                
                // Démarque les plats comme "non faits"
                updatedOrder.items.forEach(i => {
                    if (posteSelectionne === "TOUT" || i.dest === posteSelectionne) i.done = false;
                });

                if (updatedOrder.readyPostes) {
                    if (posteSelectionne === "TOUT") { updatedOrder.readyPostes = []; } 
                    else { updatedOrder.readyPostes = updatedOrder.readyPostes.filter(p => p !== posteSelectionne); }
                }
                
                await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: tableId, order: updatedOrder }) });
                document.getElementById('history-drawer').classList.remove('open');
            }
        }

        window.onload = () => { document.body.addEventListener('click', function initAudio() { const AudioContext = window.AudioContext || window.webkitAudioContext; if(AudioContext) { const ctx = new AudioContext(); ctx.resume(); } document.body.removeEventListener('click', initAudio); }, { once: true }); };
        window.addEventListener('focus', renderOrders);
    </script>
</body>
</html>
