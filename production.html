<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><title>Empire KDS</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        header { display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 15px; border-bottom: 3px solid var(--gold); }
        .grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; padding: 20px; overflow-y: auto; }
        .ticket { background: #000; border: 2px solid #fff; border-left: 8px solid #fff; padding: 15px; border-radius: 8px; }
    </style>
</head>
<body>
    <header>
        <div>CUISINE : <span style="color:var(--gold)">LIVE</span></div>
        <div id="counter" style="font-size:1.8rem; font-weight:900;">0 PLATS EN ATTENTE</div>
        <div style="text-align:right">
            <button onclick="logHaccp()" style="background:var(--gold); border:none; padding:10px; font-weight:900; cursor:pointer;">⚙️ HACCP</button>
        </div>
    </header>
    <div class="grid" id="kds-grid"></div>
    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {};
        async function autoSync() {
            const res = await fetch('/get-current-state'); const state = await res.json();
            activeOrders = state.activeOrders; render();
        }
        ws.onmessage = () => autoSync();
        function render() {
            const grid = document.getElementById('kds-grid'); grid.innerHTML = '';
            let count = 0;
            for(let tid in activeOrders) {
                if(tid.startsWith('GLOBAL_')) continue;
                const o = activeOrders[tid]; const pending = o.items.filter(i => !i.done);
                if(pending.length === 0) continue;
                count += pending.length;
                const div = document.createElement('div'); div.className = 'ticket';
                div.innerHTML = `<b>${tid}</b><hr>${pending.map(i => `<div>${i.n}</div>`).join('')}<button onclick="valider('${tid}')" style="width:100%; margin-top:10px; background:var(--accent); border:none; padding:10px; font-weight:900;">PRÊT ✅</button>`;
                grid.appendChild(div);
            }
            document.getElementById('counter').innerText = count + " PLATS EN ATTENTE";
        }
        async function valider(tid) {
            const o = activeOrders[tid]; o.items.forEach(i => i.done = true); o.status = 'ready';
            await fetch('/update-order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:tid, order:o})});
        }
        async function logHaccp() {
            const temp = prompt("Température Frigo ?");
            await fetch('/update-order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:'HACCP_EVENT', order:{status:'system', data:{time:new Date().toLocaleTimeString(), val:temp, eq:'FRIGO 1'}}})});
        }
        setInterval(autoSync, 5000);
    </script>
</body>
</html>
