<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Écran Cuisine</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #1a1a1a; color: #ffffff; margin: 0; padding: 20px; }
        h1 { text-align: center; color: #ff4757; text-transform: uppercase; letter-spacing: 2px; }
        #zone-production { display: flex; flex-wrap: wrap; gap: 20px; margin-top: 30px; }
        .ticket-cuisine { background-color: #2f3542; border-left: 6px solid #ff4757; padding: 20px; width: 300px; border-radius: 8px; box-shadow: 0 6px 10px rgba(0,0,0,0.4); }
        .ticket-cuisine h3 { margin-top: 0; color: #ff4757; font-size: 1.5em; border-bottom: 1px solid #444; padding-bottom: 10px; }
        .ticket-cuisine p { color: #a4b0be; font-size: 0.9em; margin-bottom: 15px; }
        .ticket-cuisine ul { padding-left: 20px; font-size: 1.3em; margin: 0; font-weight: bold; }
        .ticket-cuisine li { margin-bottom: 10px; }
    </style>
</head>
<body>
    <h1>🔥 Commandes Cuisine (Chaud)</h1>
    <div id="zone-production"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io(); 
        socket.on('order-received', (order) => {
            const plats = order.articles.filter(article => article.includes('[Plat]'));
            if (plats.length > 0) {
                const zone = document.getElementById('zone-production');
                const ticket = document.createElement('div');
                ticket.className = 'ticket-cuisine';
                const listePlats = plats.map(plat => `<li>${plat.replace('[Plat] ', '')}</li>`).join('');
                ticket.innerHTML = `<h3>${order.table}</h3><p>Heure : ${order.heure}</p><ul>${listePlats}</ul>`;
                zone.insertBefore(ticket, zone.firstChild);
            }
        });
    </script>
</body>
</html>
