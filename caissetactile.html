<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCHEF OS - Caisse Tactile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script>
        // SÉCURITÉ PWA ET MATRICE DES FORFAITS (INCLUANT LE PACK A)
        function getDeviceFingerprint() {
            let deviceId = localStorage.getItem('ichef_device_fingerprint');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('ichef_device_fingerprint', deviceId);
            }
            return deviceId;
        }

        (async function enforceSecurity() {
            const urlParams = new URLSearchParams(window.location.search);
            let tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
            let pin = localStorage.getItem('ichef_master_pin'); 
            
            if(!tenantID) { window.location.href = 'connexionpartenaire.html'; return; }

            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";

            const accessMatrix = {
                'PACK_A': true, 'BUSINESS': true, 'RENTABILITE': true, 'ECO': true, 
                'EMPIRE': true, 'BRIGADE': true, 'BRIGADES': true, 'PREMIUM': true, 'ICHEF_OS': true
            };

            try {
                const res = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID, pin: pin || "0000", deviceId: getDeviceFingerprint() })
                });
                const data = await res.json();

                if(!data.success) {
                    alert("ACCÈS REFUSÉ.");
                    window.location.href = 'connexionpartenaire.html'; return;
                }

                const plan = data.plan ? data.plan.toUpperCase() : 'CHEF';
                if (!accessMatrix[plan]) {
                    alert(`ACCÈS REFUSÉ : Votre forfait (${plan}) n'inclut pas la Caisse Tactile.`);
                    window.location.href = `administration.html?tenantID=${tenantID}`;
                }
            } catch (e) { console.error("Erreur de sécurité", e); }
        })();
    </script>

    <style>
        :root {
            --bg: #050505; --panel: #111; --border: #222;
            --text-main: #fff; --text-muted: #888;
            --gold: #d4af37; --danger: #ef4444; --accent: #3b82f6;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* HEADER */
        .pos-header { position: absolute; top: 0; left: 0; right: 0; height: 60px; background: #000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.2rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .btn-exit { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; }

        /* LAYOUT CAISSE */
        .pos-container { display: flex; width: 100%; margin-top: 60px; height: calc(100vh - 60px); }
        
        /* GAUCHE : PRODUITS */
        .pos-left { flex: 1; display: flex; flex-direction: column; background: var(--bg); border-right: 1px solid var(--border); }
        .category-bar { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: var(--panel); border-bottom: 1px solid var(--border); }
        .cat-btn { background: #000; border: 1px solid var(--border); color: var(--text-main); padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; white-space: nowrap; text-transform: uppercase; }
        .cat-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .cat-btn.custom { background: var(--accent); color: #fff; border-color: var(--accent); }

        .products-grid { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; overflow-y: auto; align-content: flex-start; }
        .product-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; transition: 0.1s; display: flex; flex-direction: column; justify-content: space-between; min-height: 100px; }
        .product-card:active { transform: scale(0.95); border-color: var(--gold); }
        .p-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; }
        .p-price { color: var(--gold); font-weight: 900; font-size: 1.1rem; }

        /* DROITE : TICKET (PANIER) */
        .pos-right { width: 380px; background: var(--panel); display: flex; flex-direction: column; }
        .ticket-header { padding: 15px; border-bottom: 1px solid var(--border); text-align: center; font-weight: 900; letter-spacing: 1px; color: var(--text-muted); }
        
        .ticket-items { flex: 1; overflow-y: auto; padding: 10px; }
        .ticket-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border); }
        .ticket-row:last-child { border-bottom: none; }
        .t-qty { background: #000; padding: 4px 10px; border-radius: 4px; font-weight: bold; color: var(--gold); margin-right: 10px; cursor: pointer;}
        .t-name { flex: 1; font-size: 0.9rem; font-weight: 600; }
        .t-price { font-weight: bold; }
        .t-del { color: var(--danger); background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding-left: 10px; }

        /* RÉSUMÉ COMPTABLE (TVA) */
        .ticket-summary { background: #000; padding: 15px; border-top: 1px solid var(--border); }
        .summary-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        .tva-details { padding: 10px 0; border-top: 1px dashed #333; border-bottom: 1px dashed #333; margin: 10px 0; }
        .total-row { display: flex; justify-content: space-between; font-size: 1.8rem; font-weight: 900; color: var(--gold); margin-top: 10px; }

        /* BOUTONS ENCAISSEMENT */
        .payment-zone { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: var(--panel); }
        .btn-pay { border: none; padding: 15px; border-radius: 8px; font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; }
        .btn-cb { background: #3b82f6; color: #fff; }
        .btn-especes { background: #10b981; color: #fff; }
        .btn-other { grid-column: 1 / -1; background: #333; color: #fff; }

        /* MODAL SAISIE LIBRE */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: var(--panel); padding: 30px; border-radius: 12px; width: 350px; border: 1px solid var(--border); }
        .modal input, .modal select { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 1rem; }
        .modal select { cursor: pointer; color: var(--gold); font-weight: bold; }
        .modal-buttons { display: flex; gap: 10px; }
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-cancel { background: #333; color: #fff; }
        .btn-valid { background: var(--gold); color: #000; }

    </style>
</head>
<body>

    <div class="pos-header">
        <div class="logo">iCHEF <span style="color:#fff;">Caisse</span></div>
        <button class="btn-exit" onclick="window.location.href='administration.html?tenantID=' + tenantID">Retour Accueil</button>
    </div>

    <div class="pos-container">
        <div class="pos-left">
            <div class="category-bar" id="category-bar">
                </div>
            <div class="products-grid" id="products-grid">
                </div>
        </div>

        <div class="pos-right">
            <div class="ticket-header">TICKET EN COURS</div>
            
            <div class="ticket-items" id="ticket-items">
                </div>

            <div class="ticket-summary">
                <div class="summary-row"><span>Total HT</span><span id="total-ht">0.00 €</span></div>
                
                <div class="tva-details" id="tva-details">
                    <div style="font-size: 0.75rem; color: #555; text-align: center;">Aucune TVA à déclarer</div>
                </div>

                <div class="total-row"><span>TTC</span><span id="total-ttc">0.00 €</span></div>
            </div>

            <div class="payment-zone">
                <button class="btn-pay btn-cb" onclick="encaisser('CB')">💳 CB</button>
                <button class="btn-pay btn-especes" onclick="encaisser('ESPECES')">💵 Espèces</button>
                <button class="btn-pay btn-other" onclick="encaisser('TR/AUTRE')">🎟️ Ticket Resto / Autre</button>
            </div>
        </div>
    </div>

    <div class="modal" id="modal-custom">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--gold);">Saisie Manuelle</h3>
            
            <label style="font-size:0.8rem; color:var(--text-muted);">Nom de l'article</label>
            <input type="text" id="custom-name" placeholder="Ex: Menu du Jour, Supplément...">
            
            <label style="font-size:0.8rem; color:var(--text-muted);">Prix TTC (€)</label>
            <input type="number" id="custom-price" step="0.01" placeholder="0.00">
            
            <label style="font-size:0.8rem; color:var(--text-muted);">Taux de TVA légal</label>
            <select id="custom-tva">
                <option value="10">10% (Restauration sur place / Softs)</option>
                <option value="20">20% (Alcools forts / Prestations)</option>
                <option value="5.5">5.5% (Vente à emporter / Eau)</option>
                <option value="0">0% (Exonéré)</option>
            </select>

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeCustomModal()">Annuler</button>
                <button class="btn-valid" onclick="addCustomItem()">Ajouter</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        let menuData = {};
        let currentCategory = "";
        let cart = [];

        // 1. CHARGEMENT DE LA CARTE DEPUIS LE SERVEUR
        async function loadMenu() {
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                let state = await r.json();
                
                let rawCuisine = state.activeOrders?.['MENU_MASTER']?.data || {};
                let rawBar = state.activeOrders?.['MENU_MASTER_BAR']?.data || {};
                
                menuData = { ...rawCuisine, ...rawBar };
                renderCategories();
            } catch(e) { console.error("Erreur chargement menu"); }
        }

        // 2. AFFICHAGE DES CATÉGORIES
        function renderCategories() {
            let catBar = document.getElementById('category-bar');
            let cats = Object.keys(menuData);
            
            let html = `<button class="cat-btn custom" onclick="openCustomModal()">+ Saisie Libre</button>`;
            
            if(cats.length > 0) {
                if(!currentCategory || !cats.includes(currentCategory)) currentCategory = cats[0];
                cats.forEach(c => {
                    let active = c === currentCategory ? 'active' : '';
                    html += `<button class="cat-btn ${active}" onclick="selectCategory('${c}')">${c}</button>`;
                });
            }
            catBar.innerHTML = html;
            renderProducts();
        }

        function selectCategory(cat) {
            currentCategory = cat;
            renderCategories(); // Met à jour l'onglet actif
        }

        // 3. AFFICHAGE DES PRODUITS
        function renderProducts() {
            let grid = document.getElementById('products-grid');
            if(!currentCategory || !menuData[currentCategory]) {
                grid.innerHTML = `<div style="color:#555; text-align:center; width:100%; margin-top:50px;">Aucun produit</div>`;
                return;
            }

            let items = menuData[currentCategory];
            let html = '';
            items.forEach(item => {
                let price = parseFloat(item.price) || 0;
                // Si la TVA n'est pas définie dans la BDD, on met 10% par défaut
                let tva = parseFloat(item.tva) || 10; 
                let cleanName = item.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                html += `
                <div class="product-card" onclick="addToCart('${cleanName}', ${price}, ${tva})">
                    <div class="p-name">${item.name}</div>
                    <div class="p-price">${price.toFixed(2)} €</div>
                </div>`;
            });
            grid.innerHTML = html;
        }

        // 4. MOTEUR DU PANIER ET DE LA TVA
        function addToCart(name, price, tvaRate) {
            let existing = cart.find(i => i.name === name && i.tva === tvaRate);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({ name, price, tva: tvaRate, qty: 1 });
            }
            updateTicket();
        }

        function removeOne(index) {
            cart[index].qty--;
            if(cart[index].qty <= 0) cart.splice(index, 1);
            updateTicket();
        }

        function removeFull(index) {
            cart.splice(index, 1);
            updateTicket();
        }

        function updateTicket() {
            let list = document.getElementById('ticket-items');
            let tvaBox = document.getElementById('tva-details');
            
            let totalTTC = 0;
            let totalHT = 0;
            let tvaTotals = { '5.5': 0, '10': 0, '20': 0, '0': 0 };

            // Construction de la liste visuelle
            list.innerHTML = cart.map((item, idx) => `
                <div class="ticket-row">
                    <div style="display:flex; align-items:center; flex:1;">
                        <span class="t-qty" onclick="removeOne(${idx})">${item.qty}x</span>
                        <span class="t-name">${item.name} <small style="color:#555;">(${item.tva}%)</small></span>
                    </div>
                    <span class="t-price">${(item.price * item.qty).toFixed(2)} €</span>
                    <button class="t-del" onclick="removeFull(${idx})">✖</button>
                </div>
            `).join('');

            // Calcul Comptable Strict
            cart.forEach(item => {
                let ligneTTC = item.price * item.qty;
                totalTTC += ligneTTC;
                
                let rate = item.tva;
                // Formule mathématique exacte : HT = TTC / (1 + (TVA/100))
                let ligneHT = ligneTTC / (1 + (rate / 100));
                let ligneTVA = ligneTTC - ligneHT;

                totalHT += ligneHT;
                if(tvaTotals[rate] !== undefined) tvaTotals[rate] += ligneTVA;
                else tvaTotals[rate] = ligneTVA;
            });

            document.getElementById('total-ttc').innerText = totalTTC.toFixed(2) + " €";
            document.getElementById('total-ht').innerText = totalHT.toFixed(2) + " €";

            // Génération du résumé TVA
            let tvaHtml = '';
            for(let rate in tvaTotals) {
                if(tvaTotals[rate] > 0) {
                    tvaHtml += `<div class="summary-row"><span>TVA ${rate}%</span><span>${tvaTotals[rate].toFixed(2)} €</span></div>`;
                }
            }
            if(tvaHtml === '') tvaHtml = '<div style="font-size: 0.75rem; color: #555; text-align: center;">TVA 0.00 €</div>';
            tvaBox.innerHTML = tvaHtml;
        }

        // 5. SAISIE MANUELLE SÉCURISÉE
        function openCustomModal() { document.getElementById('modal-custom').style.display = 'flex'; }
        function closeCustomModal() { 
            document.getElementById('modal-custom').style.display = 'none'; 
            document.getElementById('custom-name').value = '';
            document.getElementById('custom-price').value = '';
        }

        function addCustomItem() {
            let name = document.getElementById('custom-name').value.trim() || "Saisie Libre";
            let price = parseFloat(document.getElementById('custom-price').value);
            let tva = parseFloat(document.getElementById('custom-tva').value);

            if(isNaN(price) || price <= 0) return alert("Veuillez saisir un prix valide.");

            addToCart(name, price, tva);
            closeCustomModal();
        }

        // 6. ENCAISSEMENT (VIDE LE PANIER)
        function encaisser(methode) {
            if(cart.length === 0) return alert("Le ticket est vide.");
            // Ici on pourrait envoyer la commande validée au serveur pour l'historique comptable
            alert(`✅ Encaissement de ${document.getElementById('total-ttc').innerText} validé en ${methode}.`);
            cart = [];
            updateTicket();
        }

        // Lancement au démarrage
        window.addEventListener('load', loadMenu);
    </script>
</body>
</html>
