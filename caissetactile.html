<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">

    <title>iCHEF OS - Caisse Tactile</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <script>
        // SÉCURITÉ PWA ET MATRICE DES FORFAITS (INCLUANT LE PACK A)
        function getDeviceFingerprint() {
            let deviceId = localStorage.getItem('ichef_device_fingerprint');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('ichef_device_fingerprint', deviceId);
            }
            return deviceId;
        }

        (async function enforceSecurity() {
            const urlParams = new URLSearchParams(window.location.search);
            let tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
            let pin = localStorage.getItem('ichef_master_pin'); 
            
            if(!tenantID) { window.location.href = 'connexionpartenaire.html'; return; }

            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";

            const accessMatrix = {
                'PACK_A': true, 'BUSINESS': true, 'RENTABILITE': true, 'ECO': true, 
                'EMPIRE': true, 'BRIGADE': true, 'BRIGADES': true, 'PREMIUM': true, 'ICHEF_OS': true
            };

            try {
                const res = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID, pin: pin || "0000", deviceId: getDeviceFingerprint() })
                });
                const data = await res.json();

                if(!data.success) {
                    alert("ACCÈS REFUSÉ.");
                    window.location.href = 'connexionpartenaire.html'; return;
                }

                const plan = data.plan ? data.plan.toUpperCase() : 'CHEF';
                if (!accessMatrix[plan]) {
                    alert(`ACCÈS REFUSÉ : Votre forfait (${plan}) n'inclut pas la Caisse Tactile.`);
                    window.location.href = `administration.html?tenantID=${tenantID}`;
                }
            } catch (e) { console.error("Erreur de sécurité", e); }
        })();
    </script>

    <style>
        :root {
            --bg: #050505; --panel: #111; --border: #222;
            --text-main: #fff; --text-muted: #888;
            --gold: #d4af37; --danger: #ef4444; --accent: #3b82f6; --success: #10b981;
        }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; height: 100vh; overflow: hidden; }

        /* HEADER */
        .pos-header { position: absolute; top: 0; left: 0; right: 0; height: 60px; background: #000; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 100; }
        .logo { font-weight: 900; font-size: 1.2rem; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        
        .header-actions { display: flex; gap: 15px; align-items: center; }
        .btn-exit { background: transparent; border: 1px solid var(--border); color: var(--text-muted); padding: 8px 16px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-exit:hover { border-color: var(--text-main); color: var(--text-main); }
        
        .btn-kiosk { border-color: var(--text-muted); color: var(--text-muted); }
        .btn-kiosk:hover { border-color: var(--success); color: var(--success); }

        /* LAYOUT CAISSE */
        .pos-container { display: flex; width: 100%; margin-top: 60px; height: calc(100vh - 60px); }
        
        /* GAUCHE : PRODUITS */
        .pos-left { flex: 1; display: flex; flex-direction: column; background: var(--bg); border-right: 1px solid var(--border); }
        .category-bar { display: flex; gap: 10px; padding: 15px; overflow-x: auto; background: var(--panel); border-bottom: 1px solid var(--border); }
        .category-bar::-webkit-scrollbar { display: none; }
        .cat-btn { background: #000; border: 1px solid var(--border); color: var(--text-main); padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; white-space: nowrap; text-transform: uppercase; transition: 0.2s;}
        .cat-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .cat-btn.custom { background: var(--accent); color: #fff; border-color: var(--accent); }

        .products-grid { padding: 15px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; overflow-y: auto; align-content: flex-start; }
        .product-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 15px; text-align: center; cursor: pointer; transition: 0.1s; display: flex; flex-direction: column; justify-content: space-between; min-height: 100px; position: relative;}
        .product-card:active { transform: scale(0.95); border-color: var(--gold); }
        .p-name { font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; line-height: 1.3;}
        .p-price { color: var(--gold); font-weight: 900; font-size: 1.1rem; }
        .p-tva { font-size: 0.65rem; color: var(--text-muted); position: absolute; bottom: 5px; right: 8px;}

        /* DROITE : TICKET (PANIER) */
        .pos-right { width: 380px; background: var(--panel); display: flex; flex-direction: column; }
        .ticket-header { padding: 15px; border-bottom: 1px solid var(--border); text-align: center; font-weight: 900; letter-spacing: 1px; color: var(--text-muted); }
        
        .ticket-items { flex: 1; overflow-y: auto; padding: 10px; }
        .ticket-items::-webkit-scrollbar { display: none; }
        .ticket-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--border); }
        .ticket-row:last-child { border-bottom: none; }
        .t-qty { background: #000; padding: 4px 10px; border-radius: 4px; font-weight: bold; color: var(--gold); margin-right: 10px; cursor: pointer; transition: 0.2s;}
        .t-qty:active { background: var(--gold); color: #000;}
        .t-name { flex: 1; font-size: 0.9rem; font-weight: 600; line-height: 1.3;}
        .t-price { font-weight: bold; font-size: 1.05rem;}
        .t-del { color: var(--danger); background: transparent; border: none; font-size: 1.2rem; cursor: pointer; padding-left: 10px; }

        /* RÉSUMÉ COMPTABLE (TVA) */
        .ticket-summary { background: #000; padding: 15px; border-top: 1px solid var(--border); }
        .summary-row { display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 5px; }
        .tva-details { padding: 10px 0; border-top: 1px dashed #333; border-bottom: 1px dashed #333; margin: 10px 0; display: flex; flex-direction: column; gap: 4px;}
        .total-row { display: flex; justify-content: space-between; font-size: 1.8rem; font-weight: 900; color: var(--gold); margin-top: 10px; }

        /* BOUTONS ENCAISSEMENT */
        .payment-zone { padding: 15px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; background: var(--panel); }
        .btn-pay { border: none; padding: 15px; border-radius: 8px; font-weight: 900; font-size: 1rem; text-transform: uppercase; cursor: pointer; transition: 0.2s;}
        .btn-pay:active { transform: scale(0.95); }
        .btn-cb { background: #3b82f6; color: #fff; }
        .btn-especes { background: var(--success); color: #fff; }
        .btn-other { grid-column: 1 / -1; background: #333; color: #fff; }

        /* MODAL SAISIE LIBRE */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(5px);}
        .modal-content { background: var(--panel); padding: 30px; border-radius: 12px; width: 350px; border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.5);}
        .modal input { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid var(--border); color: #fff; border-radius: 6px; box-sizing: border-box; font-size: 1rem; outline: none; transition: 0.2s;}
        .modal input:focus { border-color: var(--gold); }
        .modal-buttons { display: flex; gap: 10px; margin-top: 10px;}
        .modal-buttons button { flex: 1; padding: 12px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-cancel { background: #333; color: #fff; }
        .btn-valid { background: var(--gold); color: #000; }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" ondrop="return false;">

    <div id="pwa-strict-lock" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 9999999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif;">
        <img src="logo-ichef.png" alt="Logo iCHEF" style="width: 220px; height: auto; margin-bottom: 20px; filter: drop-shadow(0px 5px 15px rgba(212, 175, 55, 0.4));">
        <h1 style="color: #ffffff; font-size: 1.8rem; font-weight: 800; margin: 0; letter-spacing: 1px; text-transform: uppercase;">iCHEF EMPIRE OS</h1>
        <p style="color: #94a3b8; max-width: 420px; font-size: 0.95rem; margin-top: 12px; margin-bottom: 35px; line-height: 1.6; font-weight: 500;">
            L'accès à la caisse tactile nécessite l'installation de l'application pour empêcher le personnel de naviguer sur le web et masquer la barre URL.
        </p>
        <button id="btn-force-install" style="background: linear-gradient(135deg, #d4af37, #b89626); color: #050505; border: none; padding: 16px 35px; font-size: 1rem; font-weight: 900; border-radius: 10px; cursor: pointer; box-shadow: 0 0 25px rgba(212, 175, 55, 0.25); text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s;">
            📲 TÉLÉCHARGER L'APPLICATION
        </button>
        <button onclick="document.getElementById('pwa-strict-lock').style.display='none'" style="margin-top: 40px; background: transparent; border: 1px solid #64748b; color: #64748b; padding: 10px 20px; border-radius: 8px; font-size: 0.85rem; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;">
            Continuer sur PC/Mac
        </button>
    </div>

    <script>
        let wakeLock = null;
        async function activerModeKiosque() {
            try {
                if (!document.fullscreenElement) await document.documentElement.requestFullscreen();
            } catch (e) { console.log("Plein écran non supporté", e); }
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    console.log('Wake Lock Actif : L\'écran ne s\'éteindra pas.');
                }
            } catch (e) { console.log("Wake Lock erreur", e); }
            let btnKiosk = document.getElementById('btn-kiosk');
            if(btnKiosk) {
                btnKiosk.style.color = "var(--success)";
                btnKiosk.style.borderColor = "var(--success)";
                btnKiosk.innerText = "✓ KIOSQUE ACTIF";
            }
        }
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                try { wakeLock = await navigator.wakeLock.request('screen'); } catch(e){}
            }
        });

        (function() {
            let deferredInstallPrompt = null;
            function verifyImmersion() {
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true || document.referrer.includes('android-app://') || window.location.search.includes('source=pwa') || window.location.href.includes('source=pwa');  
                const lockCurtain = document.getElementById('pwa-strict-lock');
                if (lockCurtain) {
                    if (isStandalone) lockCurtain.style.display = 'none';
                    else lockCurtain.style.display = 'flex';
                }
            }
            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', verifyImmersion);
            else verifyImmersion();

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredInstallPrompt = e;
                const installBtn = document.getElementById('btn-force-install');
                if (installBtn) installBtn.style.display = 'block';
            });
            document.addEventListener('DOMContentLoaded', () => {
                const installBtn = document.getElementById('btn-force-install');
                if (installBtn) {
                    installBtn.addEventListener('click', async () => {
                        if (!deferredInstallPrompt) return;
                        deferredInstallPrompt.prompt();
                        const { outcome } = await deferredInstallPrompt.userChoice;
                        if (outcome === 'accepted') deferredInstallPrompt = null;
                    });
                }
            });
        })();
    </script>

    <div class="modal" id="modal-custom">
        <div class="modal-content">
            <h3 style="margin-top:0; margin-bottom: 20px; color:var(--gold); font-weight:800; letter-spacing: 1px;">SAISIE MANUELLE</h3>
            
            <label style="font-size:0.8rem; color:var(--text-muted); display:block; margin-bottom:5px;">Nom de l'article</label>
            <input type="text" id="custom-name" placeholder="Ex: Menu du Jour, Supplément...">
            
            <label style="font-size:0.8rem; color:var(--text-muted); display:block; margin-bottom:5px;">Prix TTC (€)</label>
            <input type="number" id="custom-price" step="0.01" placeholder="0.00" style="font-size: 1.2rem; font-weight: bold;">
            
            <label style="font-size:0.8rem; color:var(--text-muted); display:block; margin-bottom:5px;">TVA Applicable (%)</label>
            <input type="number" id="custom-tva" step="0.1" min="0" placeholder="Ex: 10" style="border-color: var(--gold); color: var(--gold); font-weight: bold;">

            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeCustomModal()">Annuler</button>
                <button class="btn-valid" onclick="addCustomItem()">Ajouter au ticket</button>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        let menuData = {};
        let currentCategory = "";
        let cart = [];
        
        // Paramètres globaux (pour récupérer les TVA par défaut)
        let systemSettings = { tva: 10, tva2: 20, currency: "€" };

        // 1. CHARGEMENT SYNCHRONISÉ DU CLOUD
        async function loadMenu() {
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                let state = await r.json();
                
                // Récupération des paramètres pour la Devise et la TVA
                if(state.activeOrders && state.activeOrders['SETTINGS_MASTER'] && state.activeOrders['SETTINGS_MASTER'].data) {
                    systemSettings = { ...systemSettings, ...state.activeOrders['SETTINGS_MASTER'].data };
                }
                
                let rawCuisine = state.activeOrders?.['MENU_MASTER']?.data || {};
                let rawBar = state.activeOrders?.['MENU_MASTER_BAR']?.data || {};
                
                menuData = { ...rawCuisine, ...rawBar };
                renderCategories();
            } catch(e) { console.error("Erreur chargement menu Cloud", e); }
        }

        // 2. ONGLET DES CATÉGORIES
        function renderCategories() {
            let catBar = document.getElementById('category-bar');
            let cats = Object.keys(menuData);
            
            let html = `<button class="cat-btn custom" onclick="openCustomModal()">+ Saisie Libre</button>`;
            
            if(cats.length > 0) {
                if(!currentCategory || !cats.includes(currentCategory)) currentCategory = cats[0];
                cats.forEach(c => {
                    let active = c === currentCategory ? 'active' : '';
                    html += `<button class="cat-btn ${active}" onclick="selectCategory('${c}')">${c}</button>`;
                });
            }
            catBar.innerHTML = html;
            renderProducts();
        }

        function selectCategory(cat) {
            currentCategory = cat;
            renderCategories(); 
        }

        // 3. AFFICHAGE DES PRODUITS AVEC LEUR TVA INTÉGRÉE
        function renderProducts() {
            let grid = document.getElementById('products-grid');
            if(!currentCategory || !menuData[currentCategory]) {
                grid.innerHTML = `<div style="color:#555; text-align:center; width:100%; margin-top:50px;">Aucun produit</div>`;
                return;
            }

            let items = menuData[currentCategory];
            let html = '';
            
            items.forEach(item => {
                if(item.hidden) return; // Ne pas afficher les plats masqués
                
                let price = parseFloat(item.price) || 0;
                
                // INTELLIGENCE TVA : On cherche la TVA du plat, sinon on applique la TVA globale 1
                let tvaRate = item.tva !== undefined ? parseFloat(item.tva) : (systemSettings.tva || 10);
                
                // Nettoyage pour que le bouton HTML ne bugge pas
                let cleanName = item.name.replace(/'/g, "\\'").replace(/"/g, '&quot;');
                
                // Gestion de l'affichage [BR] pour la caisse (pour rester propre)
                let displayTitle = item.name.split('[BR]')[0].trim();

                html += `
                <div class="product-card" onclick="addToCart('${cleanName}', ${price}, ${tvaRate})">
                    <div class="p-name">${displayTitle}</div>
                    <div class="p-price">${price.toFixed(2)} ${systemSettings.currency}</div>
                    <div class="p-tva">TVA ${tvaRate}%</div>
                </div>`;
            });
            grid.innerHTML = html;
        }

        // 4. GESTION DU PANIER (LA CALCULATRICE DE COMPTABILITÉ)
        function addToCart(name, price, tvaRate) {
            // Nettoyage du nom pour le ticket s'il contient un [BR]
            let displayName = name.split('[BR]')[0].trim();
            
            let existing = cart.find(i => i.name === displayName && i.tva === tvaRate);
            if(existing) {
                existing.qty++;
            } else {
                cart.push({ name: displayName, price, tva: tvaRate, qty: 1 });
            }
            updateTicket();
        }

        function removeOne(index) {
            cart[index].qty--;
            if(cart[index].qty <= 0) cart.splice(index, 1);
            updateTicket();
        }

        function removeFull(index) {
            cart.splice(index, 1);
            updateTicket();
        }

        function updateTicket() {
            let list = document.getElementById('ticket-items');
            let tvaBox = document.getElementById('tva-details');
            
            let totalTTC = 0;
            let totalHT = 0;
            let tvaTotals = {};

            // AFFICHER LE PANIER
            list.innerHTML = cart.map((item, idx) => `
                <div class="ticket-row">
                    <div style="display:flex; align-items:center; flex:1;">
                        <span class="t-qty" onclick="removeOne(${idx})">${item.qty}x</span>
                        <span class="t-name">${item.name} <small style="color:#555;">(${item.tva}%)</small></span>
                    </div>
                    <span class="t-price">${(item.price * item.qty).toFixed(2)} ${systemSettings.currency}</span>
                    <button class="t-del" onclick="removeFull(${idx})">✖</button>
                </div>
            `).join('');

            // CALCUL STRICT DE LA TVA (Comptabilité française officielle)
            cart.forEach(item => {
                let ligneTTC = item.price * item.qty;
                totalTTC += ligneTTC;
                
                let rate = item.tva;
                // HT = TTC / (1 + (Taux/100))
                let ligneHT = ligneTTC / (1 + (rate / 100));
                let ligneTVA = ligneTTC - ligneHT;

                totalHT += ligneHT;
                
                if(tvaTotals[rate] !== undefined) tvaTotals[rate] += ligneTVA;
                else tvaTotals[rate] = ligneTVA;
            });

            document.getElementById('total-ttc').innerText = totalTTC.toFixed(2) + " " + systemSettings.currency;
            document.getElementById('total-ht').innerText = totalHT.toFixed(2) + " " + systemSettings.currency;

            // AFFICHER LE TABLEAU DE TVA DÉTAILLÉ
            let tvaHtml = '';
            for(let rate in tvaTotals) {
                if(tvaTotals[rate] > 0) {
                    tvaHtml += `<div class="summary-row"><span>TVA ${rate}%</span><span>${tvaTotals[rate].toFixed(2)} ${systemSettings.currency}</span></div>`;
                }
            }
            if(tvaHtml === '') tvaHtml = '<div style="font-size: 0.75rem; color: #555; text-align: center;">Aucune TVA</div>';
            tvaBox.innerHTML = tvaHtml;
        }

        // 5. SAISIE MANUELLE SÉCURISÉE (CHAMP LIBRE)
        function openCustomModal() { 
            // Pré-remplit la TVA avec la TVA par défaut du système pour faire gagner du temps
            document.getElementById('custom-tva').value = systemSettings.tva !== undefined ? systemSettings.tva : 10;
            document.getElementById('modal-custom').style.display = 'flex'; 
        }
        
        function closeCustomModal() { 
            document.getElementById('modal-custom').style.display = 'none'; 
            document.getElementById('custom-name').value = '';
            document.getElementById('custom-price').value = '';
        }

        function addCustomItem() {
            let name = document.getElementById('custom-name').value.trim() || "Saisie Libre";
            let price = parseFloat(document.getElementById('custom-price').value);
            let tva = parseFloat(document.getElementById('custom-tva').value);

            if(isNaN(price) || price <= 0) return alert("Veuillez saisir un prix valide.");
            if(isNaN(tva) || tva < 0) return alert("Veuillez saisir un taux de TVA valide.");

            addToCart(name, price, tva);
            closeCustomModal();
        }

        // 6. ENCAISSEMENT (Et envoi à l'Historique Financier de l'Admin)
        async function encaisser(methode) {
            if(cart.length === 0) return alert("Le ticket est vide.");
            
            let totalTTC = parseFloat(document.getElementById('total-ttc').innerText);
            let totalHT = parseFloat(document.getElementById('total-ht').innerText);
            
            // On re-calcule les totaux TVA pour l'envoi cloud
            let tvaMap = {};
            cart.forEach(item => {
                let ligneTTC = item.price * item.qty;
                let ligneHT = ligneTTC / (1 + (item.tva / 100));
                let ligneTVA = ligneTTC - ligneHT;
                if(tvaMap[item.tva] === undefined) tvaMap[item.tva] = 0;
                tvaMap[item.tva] += ligneTVA;
            });

            const transactionData = {
                source: "Caisse Rapide",
                date: new Date().toISOString(),
                totalTTC: totalTTC,
                totalHT: totalHT,
                tva: tvaMap,
                method: methode,
                items: cart
            };

            try {
                // Envoi de la transaction dans l'historique financier global
                await fetch(`${SERVER_URL}/api/save-transaction`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, transaction: transactionData })
                });
                
                alert(`✅ Encaissement de ${totalTTC.toFixed(2)}${systemSettings.currency} validé en ${methode}.`);
                cart = [];
                updateTicket();
            } catch(e) {
                alert(`❌ Erreur réseau. Encaissement validé localement en ${methode}, mais non synchronisé.`);
                cart = [];
                updateTicket();
            }
        }

        // Lancement au démarrage
        window.addEventListener('load', loadMenu);
        
        // PWA Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js').catch(()=>{});
            });
        }
    </script>
</body>
</html>
