<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <link rel="icon" type="image/png" href="icon-512.png"> 
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0b0f19">
    
    <title>iCHEF - Caisse Tactile</title>

    <script>
        function getDeviceFingerprint() {
            let deviceId = localStorage.getItem('ichef_device_fingerprint');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('ichef_device_fingerprint', deviceId);
            }
            return deviceId;
        }

        (async function enforceSecurity() {
            const urlParams = new URLSearchParams(window.location.search);
            let urlTenantID = urlParams.get('tenantID');
            let storedTenantID = localStorage.getItem('ichef_tenant_id');

            if (urlTenantID && urlTenantID !== storedTenantID) {
                localStorage.removeItem('EMPIRE_GLOBAL_SYNC');
                localStorage.removeItem('ichef_master_pin');
                if (urlTenantID) localStorage.setItem('ichef_tenant_id', urlTenantID);
                storedTenantID = urlTenantID;
            }

            let tenantID = urlTenantID || storedTenantID;
            let pin = localStorage.getItem('ichef_master_pin'); 
            
            if(!tenantID) {
                window.location.href = 'connexionpartenaire.html';
                return;
            }

            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";

            const accessMatrix = {
                'PACK_A': ['admin.html', 'pack-eco.html', 'minipass.html'], 
                'CHEF': ['pack-eco.html'], 
                'ICHEF_OS': ['admin.html', 'pack-eco.html', 'minipass.html'], 
                'ECO': ['admin.html', 'pack-eco.html', 'minipass.html'], 
                'BUSINESS': ['admin.html', 'pack-eco.html', 'minipass.html'], 
                'RENTABILITE': ['admin.html', 'pack-eco.html', 'minipass.html'], 
                'EMPIRE': ['admin.html', 'pack-eco.html', 'minipass.html', 'chef-bar.html', 'chef.html']
            };

            try {
                const res = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, pin: pin || "0000", deviceId: getDeviceFingerprint() })
                });
                const data = await res.json();

                if(!data.success) {
                    alert(data.error || "ACCÈS REFUSÉ (Limite d'écrans atteinte ou compte invalide).");
                    window.location.href = 'connexionpartenaire.html';
                    return;
                }
            } catch (e) { console.error("Erreur de securite reseau", e); }
        })();
    </script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0b0f19; 
            --panel: #151e2e; 
            --border: rgba(255, 255, 255, 0.06); 
            --border-strong: rgba(255, 255, 255, 0.15);
            --text-main: #f8fafc; 
            --text-muted: #94a3b8;
            --gold: #d4af37; 
            --gold-dim: rgba(212, 175, 55, 0.12);
            --accent: #38bdf8; 
            --danger: #ef4444; 
            --success: #10b981;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            --radius-main: 16px;
            --radius-btn: 10px;
        }

        /* BADGE SERVICE AU BAR CLIGNOTANT */
        @keyframes pulseBadge {
            0% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 rgba(56, 189, 248, 0); }
            50% { opacity: 0.8; transform: scale(1.03); box-shadow: 0 0 15px rgba(56, 189, 248, 0.6); }
            100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 rgba(56, 189, 248, 0); }
        }
        #badge-service-bar {
            display: none; 
            background: #38bdf8;
            color: #000000;
            border: none;
            font-weight: 800;
            animation: pulseBadge 2s infinite;
            padding: 8px 14px;
            border-radius: var(--radius-btn);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-right: 10px;
            font-family: 'Inter', sans-serif;
        }

        /* ANIMATION TABLE PRÊTE AU BAR */
        @keyframes pulseReady {
            0% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0.7); border-color: var(--accent); }
            70% { box-shadow: 0 0 0 10px rgba(56, 189, 248, 0); border-color: transparent; }
            100% { box-shadow: 0 0 0 0 rgba(56, 189, 248, 0); border-color: var(--accent); }
        }
        .table-card.ready {
            border-color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
            animation: pulseReady 2s infinite;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; -webkit-font-smoothing: antialiased; padding-top: env(safe-area-inset-top); }

        .topbar { background: var(--panel); border-bottom: 1px solid var(--border); padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; z-index: 40; }
        .topbar-title { font-family: 'Playfair Display', serif; font-size: 1.4rem; color: var(--gold); margin: 0; font-weight: 600; letter-spacing: 1px; }
        
        .topbar-actions { display: flex; gap: 10px; align-items: center; }
        .nav-btn { background: transparent; border: 1px solid var(--border-strong); color: var(--text-main); padding: 8px 16px; border-radius: var(--radius-btn); font-weight: 600; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; transition: 0.2s; letter-spacing: 0.5px; }
        .nav-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(197, 160, 89, 0.05); }

        .caisse-container { flex: 1; display: flex; overflow: hidden; }
        .tables-grid-side { flex: 1.5; padding: 25px; overflow-y: auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 15px; align-content: flex-start; }
        .order-panel-side { width: 400px; background: var(--panel); border-left: 1px solid var(--border); display: flex; flex-direction: column; height: 100%; }

        .table-card { background: var(--panel); border: 1px solid var(--border); border-radius: var(--radius-main); padding: 20px; text-align: center; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 8px; position: relative; }
        .table-card:hover { border-color: var(--gold); transform: translateY(-2px); }
        .table-num { font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700; color: #fff; }
        .table-status { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        .empty-msg { color: var(--text-muted); text-align: center; padding: 60px 20px; font-style: italic; font-size: 0.95rem; margin: auto; }
    </style>
</head>
<body>

    <header class="topbar">
        <div class="topbar-title">iCHEF OS — <span style="color:#fff;">Caisse Tactile</span></div>
        <div class="topbar-actions">
            <button id="badge-service-bar">🍹 SERVICE COMPTOIR ACTIVÉ</button>
            
            <button class="nav-btn" onclick="window.location.href='minipass.html?tenantID=' + tenantID">🖥️ PASS PRODUCTION</button>
            <button class="nav-btn" style="border-color: #f43f5e; color: #f43f5e;" onclick="window.location.href='admin.html?tenantID=' + tenantID">⚙️ ADMIN</button>
        </div>
    </header>

    <div class="caisse-container">
        <div class="tables-grid-side" id="room-grid">
             <div class="empty-msg">Chargement des tables de la salle...</div>
        </div>

        <div class="order-panel-side" id="ticket-panel">
            <div class="empty-msg">Sélectionnez une table pour ouvrir le ticket 🧾</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id') || 'MASTER_STATE';
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        let currentActiveTables = {};
        let isServiceAuBarActive = false; // Variable globale pour savoir si le mode est actif

        async function fetchStateFromCloud() {
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}&_t=${Date.now()}`, { cache: 'no-store' });
                if(r.ok) {
                    let state = await r.json();
                    let aO = state.activeOrders || {};

                    // --- INTELLIGENCE DE RETRAIT COMPTOIR COMPILÉE ---
                    if (aO['SETTINGS_MASTER'] && aO['SETTINGS_MASTER'].data) {
                        let settings = aO['SETTINGS_MASTER'].data;
                        isServiceAuBarActive = settings.serviceAuBar === true;
                        
                        let badgeBar = document.getElementById('badge-service-bar');
                        if (badgeBar) {
                            if (isServiceAuBarActive) {
                                badgeBar.style.display = 'inline-block';
                            } else {
                                badgeBar.style.display = 'none';
                            }
                        }
                    }
                    // -------------------------------------------------

                    currentActiveTables = aO;
                    renderRoomGrid();
                }
            } catch(e) { console.error("Erreur Synchro Cloud Caisse"); }
        }

        function renderRoomGrid() {
            const grid = document.getElementById('room-grid');
            if(!grid) return;

            let html = '';
            let count = 0;

            for(let key in currentActiveTables) {
                if (key.includes('MASTER') || key.includes('ARCHIVE') || key.includes('CATEGORIES') || key.includes('ARCHITECTURE')) continue;
                
                count++;
                let t = currentActiveTables[key];
                let isWeb = key.startsWith('WEB_') || key.startsWith('ORDER_');
                let displayTitle = isWeb ? `📱 WEB ${key.replace('WEB_', '')}` : `TABLE ${key}`;

                // Détection de l'alerte pour les serveurs
                let isReady = (t.status === 'PRÊT');
                let cardClass = (isReady && isServiceAuBarActive) ? 'table-card ready' : 'table-card';
                let statusStyle = isReady ? 'color: var(--accent); font-weight: bold;' : '';

                html += `
                    <div class="${cardClass}" onclick="ouvrirTicket('${key}')">
                        <div class="table-num">${displayTitle}</div>
                        <div class="table-status" style="color:var(--gold); font-weight:bold;">${parseFloat(t.total || 0).toFixed(2)} €</div>
                        <div class="table-status" style="${statusStyle}">${t.status || 'En cours'}</div>
                    </div>
                `;
            }

            if(count === 0) {
                grid.innerHTML = '<div class="empty-msg">Aucune commande active en salle ou sur le Web. ✨</div>';
            } else {
                grid.innerHTML = html;
            }
        }

        function ouvrirTicket(tableId) {
            const panel = document.getElementById('ticket-panel');
            let t = currentActiveTables[tableId];
            if(!t) return;

            // ALERTE POUR LE SERVEUR SI LA COMMANDE ATTEND AU BAR
            let alertHtml = "";
            if (t.status === 'PRÊT' && isServiceAuBarActive) {
                alertHtml = `
                    <div style="background: rgba(56, 189, 248, 0.2); border: 1px solid var(--accent); color: #fff; padding: 15px; margin: 15px 25px; border-radius: 8px; text-align: center; font-weight: bold; text-transform: uppercase; animation: pulseBadge 2s infinite;">
                        🍹 Le client doit venir récupérer sa commande !
                    </div>
                `;
            }

            let itemsHtml = (t.items || []).map(i => `
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed rgba(255,255,255,0.05);">
                    <span>${i.qty || 1}x ${i.n || i.name}</span>
                    <span style="font-weight:bold;">${parseFloat(i.p || i.price || 0).toFixed(2)} €</span>
                </div>
            `).join('');

            panel.innerHTML = `
                <div style="padding:25px; border-bottom:1px solid var(--border); background:rgba(255,255,255,0.01);">
                    <h3 style="margin:0; font-family:'Playfair Display', serif; font-size:1.4rem;">🧾 Ticket : ${tableId}</h3>
                    <small style="color:var(--text-muted);">Mode : ${t.typePaiement || 'Salle'}</small>
                </div>
                ${alertHtml}
                <div style="flex:1; overflow-y:auto; padding:25px;">
                    ${itemsHtml}
                </div>
                <div style="padding:25px; border-top:1px solid var(--border); background:rgba(0,0,0,0.2);">
                    <div style="display:flex; justify-content:space-between; font-size:1.6rem; font-weight:bold; margin-bottom:20px; font-family:'Playfair Display', serif;">
                        <span>Total TTC</span>
                        <span style="color:var(--gold);">${parseFloat(t.total || 0).toFixed(2)} €</span>
                    </div>
                    <button onclick="encaisserTicket('${tableId}')" style="width:100%; background:linear-gradient(135deg, #10b981, #059669); color:#000; border:none; padding:16px; border-radius:10px; font-weight:800; font-size:1rem; cursor:pointer; text-transform:uppercase; letter-spacing:1px;">✔️ Encaisser & Archiver</button>
                </div>
            `;
        }

        async function encaisserTicket(tableId) {
            if(!confirm(`Valider l'encaissement et archiver le ticket de la ${tableId} ?`)) return;

            // Demande de nettoyage de la table sur le serveur
            await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tableId: tableId, order: null })
            });

            document.getElementById('ticket-panel').innerHTML = '<div class="empty-msg">Sélectionnez une table pour ouvrir le ticket 🧾</div>';
            fetchStateFromCloud();
        }

        fetchStateFromCloud();
        setInterval(fetchStateFromCloud, 3000);
    </script>
</body>
</html>
