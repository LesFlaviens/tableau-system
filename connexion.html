<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I CHEF - Connexion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        :root { --bg: #09090b; --panel: #11141d; --border: #2d313a; --gold: #fbbf24; --text: #f9fafb; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); font-size: 1.8rem; margin-top: 0; text-transform: uppercase; letter-spacing: -1px; }
        p { color: #9ca3af; font-size: 0.9rem; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #1c1f26; border: 1px solid var(--border); color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--gold); }
        .btn { background: var(--gold); color: #000; padding: 15px; border-radius: 8px; font-weight: 900; width: 100%; border: none; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); }
        #message { margin-top: 15px; font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

    <div class="card">
        <h1>👑 I CHEF OS</h1>
        <p>Connectez-vous à votre infrastructure.</p>

        <form id="loginForm">
            <input type="text" id="tenantID" placeholder="Identifiant Restaurant (ex: lebistrot)" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <button type="submit" class="btn" id="loginBtn">Entrer dans le système</button>
        </form>
        <div id="message"></div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const msg = document.getElementById('message');
            const tenantID = document.getElementById('tenantID').value;

            btn.innerText = "Authentification...";
            btn.disabled = true;

            try {
                // Vérification de l'état du compte auprès du serveur
                const response = await fetch(`/verify-tenant/${tenantID}`);
                const result = await response.json();

                if (result.success) {
                    msg.style.color = "#4ade80";
                    msg.innerText = `✅ Bienvenue ${result.clientName} ! Ouverture...`;
                    
                    // 👑 LA MÉMOIRE DE L'EMPIRE : Mémorisation de l'identité du restaurant
                    localStorage.setItem('ichef_tenant_id', tenantID);
                    localStorage.setItem('ichef_client_name', result.clientName);

                    // Redirection vers le tableau de bord
                    setTimeout(() => { 
                        window.location.href = '/logiciel.html'; 
                    }, 1500);
                } else {
                    msg.style.color = "#f87171";
                    msg.innerText = "❌ Identifiant inconnu ou abonnement suspendu.";
                    btn.innerText = "Entrer dans le système";
                    btn.disabled = false;
                }
            } catch (err) {
                msg.style.color = "#f87171";
                msg.innerText = "Erreur de communication avec le serveur.";
                btn.innerText = "Entrer dans le système";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
