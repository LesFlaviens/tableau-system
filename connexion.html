<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Empire OS - Authentification</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0a0a">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #030303; --panel: #0a0a0c; --gold: #d4af37; --text: #f9fafb; --border: rgba(255,255,255,0.1); }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            margin: 0; 
            background-image: radial-gradient(circle at 50% 0%, #1a1a1f 0%, transparent 50%);
        }
        
        .login-box { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            padding: 50px 40px; 
            border-radius: 12px; 
            width: 100%; 
            max-width: 420px; 
            text-align: center; 
            box-sizing: border-box; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.8); 
        }
        
        h1 { 
            color: var(--gold); 
            margin-top: 0; 
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 700; 
            letter-spacing: 4px; 
            margin-bottom: 5px;
        }
        
        p {
            color: #666; 
            font-size: 0.85rem; 
            margin-bottom: 40px; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            font-weight: 500;
        }
        
        input { 
            width: 100%; 
            padding: 16px; 
            margin-bottom: 20px; 
            background: var(--bg); 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 6px; 
            font-size: 1rem; 
            box-sizing: border-box; 
            text-align: center; 
            transition: 0.3s;
            text-transform: uppercase;
        }
        
        input:focus { border-color: var(--gold); outline: none; }
        input[type="password"] { font-family: monospace; letter-spacing: 5px; font-size: 1.2rem; text-transform: none; }
        
        .btn { 
            background: var(--gold); 
            color: #000; 
            padding: 16px; 
            font-weight: 700; 
            font-size: 0.95rem;
            border: none; 
            border-radius: 6px; 
            width: 100%; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.3s; 
        }
        
        .btn:hover { background: #fff; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        
        #error-msg { 
            color: var(--gold); 
            margin-top: 20px; 
            font-weight: 500; 
            display: none; 
            background: rgba(212, 175, 55, 0.05); 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid rgba(212, 175, 55, 0.2); 
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>ICHEF</h1>
        <p>Authentification</p>
        
        <input type="text" id="tenantID" placeholder="Identifiant (ex: demo)" autocomplete="off">
        <input type="password" id="pin" placeholder="CODE PIN" autocomplete="off" inputmode="numeric" pattern="[0-9]*">
        
        <button id="login-btn" class="btn" onclick="authenticate()">DÉVERROUILLER</button>
        
        <div id="error-msg"></div>
    </div>

    <script>
        // 🔒 FORÇAGE DE L'URL DU SERVEUR RENDER (POUR ÉVITER LE BUG LOCALHOST)
        const SERVER_URL = "https://tableau-system.onrender.com";

        window.addEventListener('load', () => {
            const urlParams = new URLSearchParams(window.location.search);
            const urlTenant = urlParams.get('tenantID');
            
            if (urlTenant === 'demo') {
                document.getElementById('tenantID').value = "demo";
                document.getElementById('pin').value = "0000";
                setTimeout(() => authenticate(), 800); 
            }
        });

        async function authenticate() {
            const tenantID = document.getElementById('tenantID').value.trim().toLowerCase();
            const pin = document.getElementById('pin').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            if (!tenantID || !pin) {
                errorMsg.innerHTML = "Veuillez saisir l'identifiant et le code PIN.";
                errorMsg.style.borderColor = "var(--gold)";
                errorMsg.style.color = "var(--gold)";
                errorMsg.style.display = 'block';
                return;
            }

            // AFFICHER L'ATTENTE (Très important pour le réveil de Render)
            btn.disabled = true;
            btn.innerText = "CONNEXION...";
            errorMsg.innerHTML = "⏳ Connexion au serveur sécurisé...<br><small style='color:#888;'>(Cela peut prendre 30s au premier lancement)</small>";
            errorMsg.style.borderColor = "#fff";
            errorMsg.style.color = "#fff";
            errorMsg.style.display = 'block';

            try {
                const response = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, pin: pin })
                });
                
                const data = await response.json();

                if (data.success) {
                    errorMsg.innerHTML = "✅ Accès Autorisé ! Redirection...";
                    errorMsg.style.color = "#10b981"; // Vert
                    errorMsg.style.borderColor = "#10b981";
                    
                    localStorage.setItem('ichef_tenant_id', tenantID);
                    localStorage.setItem('ichef_master_pin', pin);
                    
                    setTimeout(() => {
                        window.location.href = `admin.html?tenantID=${tenantID}`; 
                    }, 500);
                } else {
                    errorMsg.innerHTML = "❌ " + (data.error || "Identifiants incorrects.");
                    errorMsg.style.color = "#ef4444"; // Rouge
                    errorMsg.style.borderColor = "#ef4444";
                    btn.disabled = false;
                    btn.innerText = "DÉVERROUILLER";
                }
            } catch (err) {
                console.error("Erreur réseau :", err);
                errorMsg.innerHTML = "⚠️ Connexion au réseau impossible. Vérifiez votre internet ou l'état du serveur.";
                errorMsg.style.color = "#ef4444";
                errorMsg.style.borderColor = "#ef4444";
                btn.disabled = false;
                btn.innerText = "RÉESSAYER";
            }
        }

        document.getElementById('pin').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') authenticate();
        });
        document.getElementById('tenantID').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') document.getElementById('pin').focus();
        });
    </script>
</body>
</html>
