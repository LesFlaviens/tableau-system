<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Portail d'Accès</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --panel: #161616; --gold: #d4af37; --text: #f9fafb; --border: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-box { background: var(--panel); border: 1px solid var(--border); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        h1 { color: var(--gold); margin-top: 0; font-weight: 900; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; font-size: 1rem; box-sizing: border-box; text-align: center; transition: 0.2s;}
        input:focus { border-color: var(--gold); outline: none; }
        .btn { background: var(--gold); color: #000; padding: 15px; font-weight: 900; border: none; border-radius: 8px; width: 100%; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.2s; margin-top: 10px;}
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #error-msg { color: #f87171; margin-top: 15px; font-weight: bold; display: none; background: rgba(248, 113, 113, 0.1); padding: 10px; border-radius: 6px; border: 1px solid #f87171;}
    </style>
</head>
<body>
    <div class="login-box">
        <h1>EMPIRE OS</h1>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 30px;">Authentification & Déploiement</p>
        
        <input type="text" id="tenantID" placeholder="Identifiant Restaurant (ex: lebistrot)" autocomplete="off">
        <input type="password" id="pinCode" placeholder="Code PIN Administrateur" autocomplete="off" maxlength="8">
        
        <button id="login-btn" class="btn" onclick="login()">Autoriser la tablette</button>
        <div id="error-msg"></div>
    </div>

    <script>
        // 🔒 DOUBLE VÉRIFICATION : PIN + LICENCE (FINGERPRINTING)
        async function login() {
            const tenantID = document.getElementById('tenantID').value.trim();
            const pin = document.getElementById('pinCode').value.trim();
            const btn = document.getElementById('login-btn');
            const msg = document.getElementById('error-msg');

            if (!tenantID || !pin) {
                msg.innerText = "Veuillez remplir l'identifiant et le PIN.";
                msg.style.display = 'block';
                return;
            }

            btn.innerText = "Contrôle d'accès...";
            btn.disabled = true;
            msg.style.display = 'none';

            // Fabrication de l'empreinte pour cette tablette
            let deviceID = localStorage.getItem('ichef_device_id');
            if (!deviceID) {
                deviceID = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('ichef_device_id', deviceID);
            }

            try {
                // 🛑 ÉTAPE 1 : Vérification stricte du PIN
                const pinResponse = await fetch('https://tableau-system.onrender.com/api/verify-pin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, pin: pin })
                });
                
                const pinResult = await pinResponse.json();
                
                if (!pinResult.success) {
                    msg.innerText = "Identifiant ou PIN incorrect.";
                    msg.style.display = 'block';
                    btn.innerText = "Autoriser la tablette";
                    btn.disabled = false;
                    document.getElementById('pinCode').value = '';
                    return;
                }

                // 🟢 ÉTAPE 2 : Le PIN est bon, on vérifie si une licence (écran) est disponible
                btn.innerText = "Contrôle de licence...";
                const deviceResponse = await fetch('https://tableau-system.onrender.com/api/register-device', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, deviceID: deviceID })
                });

                const deviceResult = await deviceResponse.json();

                if (deviceResult.success) {
                    // Autorisation accordée
                    localStorage.setItem('ichef_tenant_id', tenantID);
                    localStorage.setItem('ichef_client_name', deviceResult.clientName);
                    
                    btn.style.background = "#4ade80";
                    btn.style.color = "#000";
                    btn.innerText = "Infrastructure Connectée.";
                    
                    // Redirection vers le cœur du logiciel
                    setTimeout(() => { window.location.href = 'logiciel.html'; }, 1000);
                } else {
                    // Blocage (Suspendu ou trop d'écrans)
                    msg.innerText = deviceResult.error || "Accès refusé.";
                    msg.style.display = 'block';
                    btn.innerText = "Autoriser la tablette";
                    btn.disabled = false;
                }
            } catch (error) {
                msg.innerText = "Erreur de connexion au serveur principal.";
                msg.style.display = 'block';
                btn.innerText = "Autoriser la tablette";
                btn.disabled = false;
            }
        }
        
        // Permet de valider l'entrée avec la touche "Entrée" du clavier
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
