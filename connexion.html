<!DOCTYPE html>
<html lang="fr">
<head>
    <script>
          // 🛡️ GARDE DU CORPS iCHEF : CONTRÔLE STRICT DES ACCÈS B2B
        (async function checkAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";
            
            // S'il n'a pas d'ID, on le jette dehors
            if(!tenantID) return window.location.href = 'vitrine.html';

            try {
                const res = await fetch(`${SERVER_URL}/api/check-license?tenantID=${tenantID}`);
                const data = await res.json();
                
                // Si le compte est effacé ou suspendu par toi
                if(!data.success || data.status === 'SUSPENDU') {
                    alert("⛔ LICENCE SUSPENDUE OU INVALIDE.");
                    return window.location.href = 'vitrine.html';
                }

                const plan = data.plan; // 'CHEF', 'BUSINESS', ou 'PREMIUM'
                const currentPage = window.location.pathname.split('/').pop().toLowerCase();

                // Les pages autorisées selon le forfait
                let allowedPages = [];

                if (plan === 'CHEF') {
                    // Pack à 14€ (1 écran)
                    allowedPages = ['administration.html', 'portail-client.html', 'chef.html', 'chef-pastisser.html', 'chef-bar.html'];
                
                } else if (plan === 'BUSINESS') {
                    // Pack à 45€ (5 écrans)
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'menu-pure.html', 'menu-bar.html', 'bar.html'];
                
                } else if (plan === 'PREMIUM') {
                    // Pack à 129€ (50 écrans) -> TOUT EST AUTORISÉ
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'chef.html', 'chef-pastisser.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'bar.html', 'cuisinie.html', 'planning-cuisine.html'];
                }

                // Vérification : si la page actuelle n'est pas dans la liste autorisée de son forfait
                if (currentPage !== '' && !allowedPages.includes(currentPage)) {
                    alert(`⛔ ACCÈS REFUSÉ :\nVotre forfait actuel (${plan}) n'inclut pas ce module.\nVeuillez upgrader votre offre pour y accéder.`);
                    // On le renvoie sur son espace client principal
                    window.location.href = `portail-client.html?tenantID=${tenantID}`;
                }

            } catch(e) {
                console.log("Mode hors-ligne actif. Vérification des accès retardée.");
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Empire OS - Portail d'Accès</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#0a0a0a">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --bg: #0a0a0a; --panel: #161616; --gold: #d4af37; --text: #f9fafb; --border: #333; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; justify-content: center; align-items: center; margin: 0; }
        .login-box { background: var(--panel); border: 1px solid var(--border); padding: 40px; border-radius: 16px; width: 100%; max-width: 400px; text-align: center; box-sizing: border-box; box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h1 { color: var(--gold); margin-top: 0; font-weight: 900; letter-spacing: 2px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; font-size: 1rem; box-sizing: border-box; text-align: center; }
        input:focus { border-color: var(--gold); outline: none; }
        input[type="password"] { font-family: monospace; letter-spacing: 3px; font-size: 1.2rem; }
        .btn { background: var(--gold); color: #000; padding: 15px; font-weight: 900; border: none; border-radius: 8px; width: 100%; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #error-msg { color: #f87171; margin-top: 15px; font-weight: bold; display: none; background: rgba(248, 113, 113, 0.1); padding: 10px; border-radius: 6px; border: 1px solid rgba(248, 113, 113, 0.3); font-size: 0.85rem;}
    </style>
</head>
<body>
    <div class="login-box">
        <h1>EMPIRE OS</h1>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 30px; text-transform: uppercase; letter-spacing: 1px;">Authentification & Déploiement</p>
        
        <input type="text" id="tenantID" placeholder="Identifiant Restaurant (ex: lebistrot)" autocomplete="off">
        <input type="password" id="pin" placeholder="CODE PIN" autocomplete="off">
        
        <button id="login-btn" class="btn" onclick="authenticate()">DÉVERROUILLER LE SYSTÈME</button>
        
        <div id="error-msg">❌ Accès refusé. Vérifiez vos identifiants.</div>
    </div>

    <script>
        // Ton serveur Render
        const SERVER_URL = "https://tableau-system.onrender.com";

        async function authenticate() {
            const tenantID = document.getElementById('tenantID').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const errorMsg = document.getElementById('error-msg');
            const btn = document.getElementById('login-btn');

            if (!tenantID || !pin) {
                errorMsg.innerHTML = "⚠️ Veuillez saisir l'identifiant et le code PIN.";
                errorMsg.style.display = 'block';
                return;
            }

            // Mode chargement
            btn.disabled = true;
            btn.innerText = "CONNEXION EN COURS...";
            errorMsg.style.display = 'none';

            try {
                // Requête de vérification au serveur
                const response = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, pin: pin })
                });
                
                const data = await response.json();

                if (data.success) {
                    // Mémoriser l'accès pour l'appareil du client
                    localStorage.setItem('ichef_master_pin', pin);

                    // ==========================================
                    // 🚀 ROUTEUR STRATÉGIQUE (LE CERVEAU)
                    // ==========================================
                    let plan = (data.plan || 'ECO').toUpperCase();

                    if (plan === 'ECO') {
                        // Redirection vers le hub du Pack Essentiel
                        window.location.href = `pack-eco.html?tenantID=${tenantID}`;
                    } 
                    else if (plan === 'CHEF' || plan === 'BUSINESS' || plan === 'EXCUTIF' || plan === 'PREMIUM') {
                        // Redirection vers le hub du Pack Supérieur (le cockpit IA)
                        window.location.href = `chef.html?tenantID=${tenantID}`;
                    } 
                    else {
                        // Sécurité de repli
                        window.location.href = `pack-eco.html?tenantID=${tenantID}`;
                    }

                } else {
                    // Échec du code PIN
                    errorMsg.innerHTML = "❌ " + (data.error || "Accès refusé.");
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = "DÉVERROUILLER LE SYSTÈME";
                }
            } catch (err) {
                // Erreur de réseau (serveur Render endormi ou injoignable)
                errorMsg.innerHTML = "📡 Connexion au réseau Empire impossible. Réessayez.";
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "DÉVERROUILLER LE SYSTÈME";
            }
        }

        // Permettre la connexion rapide avec la touche Entrée
        document.getElementById('pin').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') authenticate();
        });
    </script>
</body>
</html>
