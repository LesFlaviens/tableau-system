<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - L'infrastructure absolue</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            overflow: hidden; /* Empêche de scroller la page mère */
            background-color: #000;
            
            /* 🚫 BLOQUE LA SÉLECTION DE TEXTE (Anti Copier-Coller) */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* L'Iframe prend tout l'écran, le logiciel Render est à l'intérieur */
        #empire-software {
            width: 100%; 
            height: 100%; 
            border: none;
        }

        /* 🛡️ VITRE TRANSPARENTE POUR FORCER LE PLEIN ÉCRAN AU PREMIER TOUCHER */
        #fullscreen-catcher {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            background: transparent;
            cursor: pointer;
        }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" ondrop="return false;">

    <div id="fullscreen-catcher"></div>

    <iframe id="empire-software" src="https://tableau-system.onrender.com/connexion.html" allow="fullscreen"></iframe>

    <script>
        // 1. 🛡️ ANTI-INSPECTION (Bloque les raccourcis clavier des développeurs)
        document.onkeydown = function(e) {
            if (e.keyCode == 123) return false; // F12
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'I'.charCodeAt(0)) return false; // Ctrl+Shift+I
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'C'.charCodeAt(0)) return false; // Ctrl+Shift+C
            if (e.ctrlKey && e.shiftKey && e.keyCode == 'J'.charCodeAt(0)) return false; // Ctrl+Shift+J
            if (e.ctrlKey && e.keyCode == 'U'.charCodeAt(0)) return false; // Ctrl+U
        };

        // 2. ⛶ PIÈGE PLEIN ÉCRAN (S'active au premier clic/toucher)
        document.getElementById('fullscreen-catcher').addEventListener('click', function() {
            let elem = document.documentElement;
            
            // Force le navigateur en plein écran
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } // Safari
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); } // Edge
            
            // Autodestruction de la vitre pour laisser passer les clics vers le logiciel
            this.style.display = 'none';
        });
    </script>
</body>
</html>
