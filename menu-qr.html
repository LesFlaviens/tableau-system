<!DOCTYPE html>
<html lang="fr">
<head>
  <script>
    // 🛡️ GARDE DU CORPS iCHEF - CONTRÔLE DES ACCÈS
    (async function enforceSecurity() {
        const urlParams = new URLSearchParams(window.location.search);
        let tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
        
        // Si aucun ID, on dégage le visiteur vers le portail
        if(!tenantID) return window.location.href = 'portail-client.html';

        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        // Définition de la matrice des droits d'accès
        const accessMatrix = {
            'CHEF_CUISINE': ['administration.html', 'chef.html', 'portail-client.html'],
            'CHEF_PATISSERIE': ['administration.html', 'chef-patissier.html', 'portail-client.html'],
            'CHEF_BAR': ['administration.html', 'chef-bar.html', 'portail-client.html'],
            
            'RENTABILITE': [
                'administration.html', 'pack-eco.html', 'admin.html', 
                'minipass.html', 'minipass.htm', 'menu-qr.html', 'portail-client.html'
            ],
            
            'BRIGADE': [
                'administration.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 
                'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 
                'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'minipass.htm', 'portail-client.html'
            ]
        };

        try {
            const res = await fetch(`${SERVER_URL}/api/check-license?tenantID=${tenantID}`);
            const data = await res.json();

            if(!data.success || data.status === 'SUSPENDU') {
                alert("⛔ Licence suspendue ou invalide.");
                return window.location.href = 'portail-client.html';
            }

            const currentPlan = data.plan;
            
            // On récupère le nom du fichier actuel (ex: "chef.html") et on le met en minuscules
            let currentPage = window.location.pathname.split('/').pop().toLowerCase();
            if(currentPage === '') currentPage = 'index.html';

            // Vérification de l'autorisation
            const allowedPages = accessMatrix[currentPlan] || [];
            
            if (!allowedPages.includes(currentPage)) {
                // Le couperet tombe
                alert(`🔒 ACCÈS REFUSÉ : Votre licence iChef OS (${currentPlan}) n'inclut pas ce module.\nVeuillez upgrader votre forfait pour y accéder.`);
                window.location.href = `portail-client.html?tenantID=${tenantID}`;
            }

        } catch (e) {
            console.error("Erreur de sécurité réseau", e);
        }
    })();
</script>

    <title>La Carte - Maison d'Exception</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --bg-color: #050505;            
            --text-main: #f5f5f5;   
            --text-muted: #888888;   
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --border-color: #1a1a1a;
            --font-title: 'Cormorant Garamond', serif;
            --font-text: 'Montserrat', sans-serif;
        }
        body { background: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; display: flex; justify-content: center; -webkit-font-smoothing: antialiased; transition: background-color 0.5s, color 0.5s; }
        .kiosk-wrapper { width: 100%; max-width: 1080px; min-height: 100vh; background: var(--bg-color); position: relative; padding-bottom: 120px; }
        header { text-align: center; padding: 60px 20px 40px; border-bottom: 1px solid var(--border-color); }
        .logo-text { font-family: var(--font-title); color: var(--gold); font-size: 3.5rem; font-weight: 300; letter-spacing: 12px; margin: 0; text-transform: uppercase; }
        .subtitle { font-family: var(--font-text); color: var(--text-muted); font-size: 1rem; letter-spacing: 6px; margin-top: 15px; text-transform: uppercase; }
        .menu-container { padding: 40px; }
        .category-section, .tasting-menu-box { position: relative; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); padding: 50px 60px; margin-bottom: 50px; }
        .category-title { font-family: var(--font-title); color: var(--gold); font-size: 2.5rem; font-weight: 300; letter-spacing: 6px; text-align: center; text-transform: uppercase; margin: 0; position: absolute; top: -25px; left: 50%; transform: translateX(-50%); background: var(--bg-color); padding: 0 30px; white-space: nowrap; }
        .tasting-menu-box { text-align: center; }
        .tasting-price { font-family: var(--font-text); font-size: 1.3rem; color: var(--gold); margin-bottom: 40px; letter-spacing: 3px; }
        .tasting-course { font-family: var(--font-title); font-size: 1.8rem; margin-bottom: 25px; font-style: italic; }
        .tasting-course-label { font-family: var(--font-text); font-size: 0.85rem; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 8px; font-style: normal; }
        .menu-item { margin-bottom: 30px; cursor: pointer; padding: 15px; border-radius: 8px; transition: background 0.3s, transform 0.2s; }
        .menu-item:hover { background: rgba(212, 175, 55, 0.05); transform: scale(1.02); }
        .item-row { display: flex; align-items: baseline; margin-bottom: 8px; }
        .item-name { font-family: var(--font-title); font-size: 1.8rem; color: var(--text-main); margin: 0; }
        .item-dots { flex-grow: 1; border-bottom: 2px dotted rgba(255, 255, 255, 0.15); margin: 0 15px; position: relative; top: -8px; }
        .item-price { font-family: var(--font-text); font-size: 1.2rem; color: var(--gold); }
        .item-desc { font-family: var(--font-text); color: var(--text-muted); font-size: 1rem; line-height: 1.6; }
        .add-badge { font-size: 0.7rem; color: var(--bg-color); background: var(--gold); padding: 3px 8px; border-radius: 12px; font-weight: 600; text-transform: uppercase; margin-left: 15px;}
        .loading-screen { text-align: center; padding: 100px 20px; font-size: 2rem; color: var(--gold); font-style: italic; }
        .footer { text-align: center; padding: 40px; color: rgba(255,255,255,0.2); font-size: 0.8rem; text-transform: uppercase; }

        /* PANIER */
        .cart-fab { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 15px 30px; border-radius: 50px; font-weight: 600; text-transform: uppercase; display: none; align-items: center; gap: 10px; cursor: pointer; z-index: 1000; border: none; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); }
        .cart-badge { background: #000; color: var(--gold); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; }
        .cart-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000; display: none; flex-direction: column; align-items: center; justify-content: flex-end; }
        .cart-content { background: var(--bg-color); width: 100%; max-width: 600px; max-height: 85vh; border-top-left-radius: 20px; border-top-right-radius: 20px; border-top: 1px solid var(--gold); padding: 30px 20px; display: flex; flex-direction: column; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .cart-title { font-family: var(--font-title); color: var(--gold); font-size: 2rem; margin: 0;}
        .close-cart { background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .cart-items { flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .cart-item-name { font-family: var(--font-text); font-weight: 500; font-size: 1rem; color: var(--text-main); }
        .cart-controls { display: flex; align-items: center; gap: 15px; background: #000; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border-color);}
        .cart-btn { background: transparent; border: none; color: var(--gold); font-size: 1.2rem; cursor: pointer;}
        .cart-footer { padding-top: 20px; border-top: 1px solid var(--border-color); }
        .cart-total-row { display: flex; justify-content: space-between; font-family: var(--font-title); font-size: 2rem; margin-bottom: 20px; }
        
        .checkout-buttons-container { display: flex; flex-direction: column; gap: 12px; }
        .btn-checkout { width: 100%; border: none; padding: 18px; border-radius: 8px; font-weight: 600; font-size: 1.1rem; text-transform: uppercase; cursor: pointer; transition: transform 0.2s; }
        .btn-checkout:active { transform: scale(0.98); }
        .btn-gold { background: var(--gold); color: #000; }
        .btn-stripe { background: #635bff; color: #fff; }

        @media (max-width: 800px) {
            .menu-container { padding: 20px; }
            .category-section, .tasting-menu-box { padding: 40px 20px; }
            .logo-text { font-size: 2.5rem; }
            .category-title { font-size: 1.8rem; padding: 0 15px; top: -18px; }
            .item-name { font-size: 1.2rem; white-space: normal; }
            .item-dots { display: none; }
            .item-row { flex-direction: column; gap: 5px; }
        }
    </style>
</head>
<body>

    <div class="kiosk-wrapper">
        <header>
            <h1 class="logo-text">NOTRE MAISON</h1>
            <div class="subtitle">La Carte</div>
        </header>

        <div class="menu-container" id="menu-container">
            <div class="loading-screen">Mise à jour des créations du Chef...</div>
        </div>

        <div class="footer">
            Prix nets en <span id="footer-currency">Euros</span> — Service compris<br>
            <span style="font-size: 0.6rem; opacity: 0.5;">Propulsé par I CHEF - Routing KDS Actif</span>
        </div>
    </div>

    <button id="cart-fab" class="cart-fab" onclick="toggleCart()">
        🛒 Ma Commande <div id="cart-badge" class="cart-badge">0</div>
    </button>

    <div id="cart-modal" class="cart-modal" onclick="if(event.target===this) toggleCart()">
        <div class="cart-content">
            <div class="cart-header">
                <h2 class="cart-title">Votre Sélection</h2>
                <button class="close-cart" onclick="toggleCart()">✕</button>
            </div>
            <div id="cart-items" class="cart-items"></div>
            
            <div class="cart-footer">
                <div class="cart-total-row">
                    <span>Total</span>
                    <span id="cart-total-price" style="color: var(--gold);">0.00 €</span>
                </div>
                <div id="checkout-buttons-container" class="checkout-buttons-container"></div>
            </div>
        </div>
    </div>

    <script>
        const fontsToLoad = ['Playfair Display', 'Montserrat', 'Roboto', 'Cinzel', 'Oswald', 'Lato', 'Great Vibes', 'Lora', 'Cormorant Garamond', 'Josefin Sans', 'Nunito', 'PT Serif', 'Merriweather', 'Abril Fatface'];
        const fontLink = document.createElement('link');
        fontLink.rel = 'stylesheet';
        fontLink.href = `https://fonts.googleapis.com/css2?${fontsToLoad.map(f => `family=${f.replace(/ /g, '+')}:wght@400;500;600;900`).join('&')}&display=swap`;
        document.head.appendChild(fontLink);

        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        const tableNum = urlParams.get('table') || 'Non Précisée';
        const paiementStatus = urlParams.get('paiement');
        
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        // 🚨 GESTION RETOUR STRIPE : Feu vert pour la cuisine
        if (paiementStatus === 'ok') { 
            alert("✅ Paiement accepté ! Votre commande part immédiatement en cuisine."); 
            // On valide la commande pour que les PADs l'affichent
            fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`).then(r=>r.json()).then(stateData => {
                if(stateData.activeOrders && stateData.activeOrders[tableNum]) {
                    let order = stateData.activeOrders[tableNum];
                    order.status = "NOUVELLE COMMANDE";
                    fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, { 
                        method: 'POST', headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ tableId: tableNum, order: order }) 
                    });
                }
            });
            window.history.replaceState({}, document.title, window.location.pathname + "?tenantID=" + tenantID + "&table=" + tableNum); 
        }
        if (paiementStatus === 'annule') { 
            alert("❌ Paiement annulé. Vous pouvez réessayer ou commander avec paiement à table."); 
            window.history.replaceState({}, document.title, window.location.pathname + "?tenantID=" + tenantID + "&table=" + tableNum); 
        }

        let currentCurrency = "€"; let currencyName = "Euros";
        let systemSettings = {}; let categoriesMap = []; let currentMenuData = null; let cart = []; let lastDesignHash = "";

        // ⏳ FONCTION UTILITAIRE POUR VÉRIFIER LES CRÉNEAUX HORAIRES MÊME LA NUIT
        function isTimeInSlot(current, start, end) {
            if (!start || !end) return false;
            if (start > end) {
                // Le créneau traverse minuit (ex: 23:00 - 05:00)
                return current >= start || current <= end;
            }
            return current >= start && current <= end;
        }

        async function fetchMenu() {
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}&_t=${Date.now()}`, { cache: 'no-store' });
                let state = await r.json();
                let activeOrders = state.activeOrders || {};
                
                if (activeOrders['SETTINGS_MASTER'] && activeOrders['SETTINGS_MASTER'].data) {
                    systemSettings = activeOrders['SETTINGS_MASTER'].data;
                    
                    // 🛑 MOTEUR DU PILOTE AUTOMATIQUE
                    let isAutoOpen = true;
                    let isManualClosed = (systemSettings.qrActive === false);

                    if (systemSettings.schedule && systemSettings.schedule.auto) {
                        let now = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Paris"}));
                        let currentDay = now.getDay(); 
                        let currentHour = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                        let sched = systemSettings.schedule;

                        if (!sched.days.includes(currentDay)) { isAutoOpen = false; }
                        else {
                            let inMatin = isTimeInSlot(currentHour, sched.matin?.s, sched.matin?.e);
                            let inAprem = isTimeInSlot(currentHour, sched.aprem?.s, sched.aprem?.e);
                            let inSoir  = isTimeInSlot(currentHour, sched.soir?.s,  sched.soir?.e);
                            let inNuit  = isTimeInSlot(currentHour, sched.nuit?.s,  sched.nuit?.e);
                            if (!inMatin && !inAprem && !inSoir && !inNuit) isAutoOpen = false;
                        }
                    }

                    if (isManualClosed || !isAutoOpen) {
                        let motif = isManualClosed ? "suite à une forte affluence" : "car nous sommes en dehors de nos heures de service";
                        let titre = isManualClosed ? "Service Suspendu" : "Service Terminé";
                        let icone = isManualClosed ? "🛎️" : "🕰️";

                        document.getElementById('menu-container').innerHTML = `
                            <div style="text-align:center; padding:100px 20px;">
                                <div style="font-size:4rem; margin-bottom:20px;">${icone}</div>
                                <h2 style="font-family: var(--font-title); font-size:2.5rem; color: var(--gold); letter-spacing: 2px;">${titre}</h2>
                                <p style="font-family: var(--font-text); font-size: 1rem; color: var(--text-muted); line-height: 1.6; margin-top:20px;">
                                    Les commandes en ligne sont temporairement désactivées ${motif}.<br><br>
                                    N'hésitez pas à vous adresser à notre équipe en salle.
                                </p>
                            </div>`;
                        
                        let fab = document.getElementById('cart-fab');
                        if (fab) fab.style.display = 'none';
                        let cartModal = document.getElementById('cart-modal');
                        if (cartModal) cartModal.style.display = 'none';
                        
                        return; 
                    }

                    // 🔥 GESTION DES 4 NIVEAUX DE RUSH 🔥
                    let rushBanner = document.getElementById('rush-banner');
                    if (systemSettings.antiRush === true) {
                        const levels = {
                            1: { text: "10 à 20 min", color: "#10b981" },
                            2: { text: "20 à 30 min", color: "#fbbf24" },
                            3: { text: "30 à 40 min", color: "#f97316" },
                            4: { text: "+ de 40 min", color: "#ef4444" }
                        };
                        let currentRush = levels[systemSettings.rushLevel || 1];

                        if (!rushBanner) {
                            rushBanner = document.createElement('div');
                            rushBanner.id = 'rush-banner';
                            document.body.insertBefore(rushBanner, document.body.firstChild);
                        }
                        rushBanner.style.cssText = `background: ${currentRush.color}; color: #000; text-align: center; padding: 12px; font-weight: 900; font-family: var(--font-text); position: sticky; top: 0; z-index: 9999; text-transform: uppercase; letter-spacing: 1px; font-size:0.85rem;`;
                        rushBanner.innerHTML = `🔥 Forte affluence : Attente estimée ${currentRush.text}`;
                    } else if (rushBanner) { rushBanner.remove(); }

                    if (systemSettings.currency && systemSettings.currency !== currentCurrency) {
                        currentCurrency = systemSettings.currency;
                        currencyName = {"€": "Euros", "CHF": "Francs Suisses", "$": "Dollars", "C$": "Dollars", "£": "Livres", "¥": "Yens"}[currentCurrency] || currentCurrency;
                        document.getElementById('footer-currency').innerText = currencyName;
                        currentMenuData = null; 
                    }
                    if (systemSettings.design) {
                        let designHash = JSON.stringify(systemSettings.design);
                        if(designHash !== lastDesignHash) {
                            document.documentElement.style.setProperty('--bg-color', systemSettings.design.bgColor || '#050505');
                            document.documentElement.style.setProperty('--text-main', systemSettings.design.textColor || '#f5f5f5');
                            if (systemSettings.design.fontFamily) {
                                document.documentElement.style.setProperty('--font-title', systemSettings.design.fontFamily);
                                document.documentElement.style.setProperty('--font-text', systemSettings.design.fontFamily);
                            }
                            lastDesignHash = designHash;
                        }
                    }
                }

                let rawCuisine = activeOrders['MENU_MASTER']?.data || {};
                let rawBar = activeOrders['MENU_MASTER_BAR']?.data || {};
                let rawArchi = activeOrders['MENU_ARCHITECTURE']?.data || {};

                let newMenuData = {};
                for(let cat in rawCuisine) newMenuData[cat] = rawCuisine[cat].map(i => ({...i, destination: 'cuisine'}));
                for(let cat in rawBar) newMenuData[cat] = rawBar[cat].map(i => ({...i, destination: 'bar'}));
                for(let cat in rawArchi) newMenuData[cat] = rawArchi[cat].map(i => ({...i, destination: 'cuisine'}));
                
                for(let cat in newMenuData) if(!newMenuData[cat] || newMenuData[cat].length === 0) delete newMenuData[cat];

                if (Object.keys(newMenuData).length > 0) {
                    if (JSON.stringify(newMenuData) !== JSON.stringify(currentMenuData)) {
                        currentMenuData = newMenuData;
                        categoriesMap = Object.keys(currentMenuData).map(key => ({ id: key, label: key, isTasting: key.toLowerCase().includes('jour') }));
                        renderClientMenu();
                        updateCartUI(); 
                    }
                } else { 
                    currentMenuData = null;
                    document.getElementById('menu-container').innerHTML = '<div class="loading-screen">La carte n\'est pas encore disponible.</div>'; 
                }
            } catch(e) { console.error("Erreur Sync:", e); }
        }

        window.addToCart = function(encodedName, safePrice, dest) {
            let name = decodeURIComponent(encodedName); let price = parseFloat(safePrice) || 0;
            let existing = cart.find(i => i.name === name);
            if (existing) existing.qty++; else cart.push({ name: name, price: price, qty: 1, destination: dest });
            updateCartUI();
            let fab = document.getElementById('cart-fab');
            fab.style.display = 'flex';
            fab.style.transform = 'translateX(-50%) scale(1.1)';
            setTimeout(() => fab.style.transform = 'translateX(-50%) scale(1)', 200);
        };

        window.changeQty = function(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateCartUI();
            if (cart.length === 0) toggleCart();
        };

        function updateCartUI() {
            let isManualClosed = (systemSettings.qrActive === false);
            let isAutoOpen = true;
            if (systemSettings.schedule && systemSettings.schedule.auto) {
                let now = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Paris"}));
                let currentDay = now.getDay(); 
                let currentHour = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                let sched = systemSettings.schedule;
                if (!sched.days.includes(currentDay)) {
                    isAutoOpen = false;
                } else {
                    let inMatin = isTimeInSlot(currentHour, sched.matin?.s, sched.matin?.e);
                    let inAprem = isTimeInSlot(currentHour, sched.aprem?.s, sched.aprem?.e);
                    let inSoir  = isTimeInSlot(currentHour, sched.soir?.s,  sched.soir?.e);
                    let inNuit  = isTimeInSlot(currentHour, sched.nuit?.s,  sched.nuit?.e);
                    if (!inMatin && !inAprem && !inSoir && !inNuit) isAutoOpen = false;
                }
            }
            if (isManualClosed || !isAutoOpen) {
                document.getElementById('cart-fab').style.display = 'none';
                return;
            }

            let totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            let totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            document.getElementById('cart-badge').innerText = totalItems;
            document.getElementById('cart-total-price').innerText = totalPrice.toFixed(2) + ' ' + currentCurrency;
            document.getElementById('cart-fab').style.display = totalItems > 0 ? 'flex' : 'none';
            
            let checkoutContainer = document.getElementById('checkout-buttons-container');
            if(checkoutContainer) {
                let isOnlinePaymentActive = systemSettings.payment && systemSettings.payment.online;
                
                if (isOnlinePaymentActive) {
                    checkoutContainer.innerHTML = `
                        <button class="btn-checkout btn-stripe" onclick="checkout('online')">💳 Payer en ligne (${totalPrice.toFixed(2)} ${currentCurrency})</button>
                        <button class="btn-checkout btn-gold" onclick="checkout('table')">🛎️ Commander (Paiement au serveur)</button>
                    `;
                } else {
                    checkoutContainer.innerHTML = `<button class="btn-checkout btn-gold" onclick="checkout('table')">🛎️ Envoyer en Cuisine</button>`;
                }
            }
            if (document.getElementById('cart-modal').style.display === 'flex') renderCartModal();
        }

        function renderCartModal() {
            const container = document.getElementById('cart-items');
            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div style="flex: 1;"><div class="cart-item-name">${item.name}</div><div style="color:var(--gold);">${(item.price * item.qty).toFixed(2)} ${currentCurrency}</div></div>
                    <div class="cart-controls">
                        <button class="cart-btn" onclick="changeQty(${index}, -1)">−</button>
                        <span style="color:white; width:20px; text-align:center; font-family:var(--font-text); font-weight:bold;">${item.qty}</span>
                        <button class="cart-btn" onclick="changeQty(${index}, 1)">+</button>
                    </div>
                </div>`).join('');
        }

        window.toggleCart = function() {
            const modal = document.getElementById('cart-modal');
            modal.style.display = (modal.style.display === 'flex') ? 'none' : (cart.length > 0 ? 'flex' : 'none');
        };

        window.checkout = async function(mode) {
            if (cart.length === 0) return;
            document.querySelectorAll('.btn-checkout').forEach(btn => { btn.innerText = "Transmission..."; btn.disabled = true; });

            let total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            let isOnlineChoice = (mode === 'online');

            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                let stateData = await r.json();
                let existingOrder = (stateData.activeOrders && stateData.activeOrders[tableNum]) ? stateData.activeOrders[tableNum] : { items: [], total: 0 };
                
                let newItems = cart.map(item => ({ 
                    name: item.name, 
                    price: item.price, 
                    qty: item.qty, 
                    category: item.destination,
                    isSent: true 
                }));
                
                let orderData = { 
                    items: [...(existingOrder.items || []), ...newItems], 
                    total: (existingOrder.total || 0) + total, 
                    time: Date.now(), 
                    table: tableNum, 
                    status: isOnlineChoice ? "EN ATTENTE PAIEMENT" : "NOUVELLE COMMANDE", 
                    typePaiement: isOnlineChoice ? "En Ligne" : "À table", 
                    source: "QR Code" 
                };
                
                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ tableId: tableNum, order: orderData }) 
                });
                
                if (isOnlineChoice) { 
                    let stripeRes = await fetch(`${SERVER_URL}/api/create-checkout`, {
                        method: 'POST', headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ total: total, table: tableNum, tenantID: tenantID })
                    });
                    let stripeData = await stripeRes.json();
                    if(stripeData.url) window.location.href = stripeData.url;
                    else alert("Erreur Paiement : " + stripeData.error);
                } else { 
                    alert("✅ Votre commande a bien été transmise à l'équipe !"); 
                    cart = []; updateCartUI(); toggleCart(); 
                }
            } catch(e) { 
                alert("❌ Erreur réseau. Veuillez prévenir l'équipe."); 
            } finally { 
                updateCartUI(); document.querySelectorAll('.btn-checkout').forEach(btn => btn.disabled = false); 
            }
        };

        function renderTastingMenu(item) {
            let cleanName = item.name ? item.name.replace('🌟 ', '') : "Plat inconnu";
            let mainName = cleanName.includes('[BR]') ? cleanName.split('[BR]')[0].trim() : cleanName;
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
            let encodedName = encodeURIComponent(mainName).replace(/'/g, "%27"); 
            let safePrice = parseFloat(item.price) || 0;
            let dest = item.destination || 'cuisine';
            
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let html = `<div class="tasting-menu-box menu-item" onclick="addToCart('${encodedName}', ${safePrice}, '${dest}')"><h2 class="category-title">${parts[0].trim()}</h2><div class="tasting-price">${priceStr} <span class="add-badge">+ Ajouter</span></div>`;
                let labels = ['Entrée', 'Plat', 'Dessert', 'Fromage / Suite'];
                for(let i = 1; i < parts.length; i++) if (parts[i].trim() !== '') html += `<div class="tasting-course"><span class="tasting-course-label">${labels[i-1]||''}</span>${parts[i].trim()}</div>`;
                return html + `</div>`;
            }
            return `<div class="tasting-menu-box menu-item" onclick="addToCart('${encodedName}', ${safePrice}, '${dest}')"><h2 class="category-title">Menu du Jour</h2><div class="tasting-price">${priceStr} <span class="add-badge">+ Ajouter</span></div><div class="tasting-course">${cleanName}</div></div>`;
        }

        function renderStandardItem(item) {
            let cleanName = item.name ? item.name.replace('🌟 ', '') : "Plat inconnu";
            let mainName = cleanName.includes('[BR]') ? cleanName.split('[BR]')[0].trim() : cleanName;
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
            let encodedName = encodeURIComponent(mainName).replace(/'/g, "%27"); 
            let safePrice = parseFloat(item.price) || 0;
            let dest = item.destination || 'cuisine';
            
            let description = cleanName.includes('[BR]') ? `<div class="item-desc">${cleanName.split('[BR]').slice(1).join('<br>').trim()}</div>` : '';
            return `<div class="menu-item" onclick="addToCart('${encodedName}', ${safePrice}, '${dest}')"><div class="item-row"><div class="item-name">${mainName}</div><div class="item-dots"></div><div class="item-price">${priceStr} <span class="add-badge">+ Ajouter</span></div></div>${description}</div>`;
        }

        function renderClientMenu() {
            const container = document.getElementById('menu-container');
            if (!currentMenuData) return;
            let htmlContent = '';
            categoriesMap.forEach((cat, index) => {
                let items = currentMenuData[cat.id];
                if (items && Array.isArray(items)) {
                    let availableItems = items.filter(item => item.stock !== 0 && item.stock !== "0" && item.hidden !== true);
                    if (availableItems.length > 0) {
                        htmlContent += `<div class="category-section"><h2 class="category-title"><span>${cat.label}</span></h2>`;
                        availableItems.forEach(item => htmlContent += renderStandardItem(item));
                        htmlContent += `</div>`;
                    }
                }
            });
            container.innerHTML = htmlContent || '<div class="loading-screen">Le service est actuellement terminé.</div>';
        }

        fetchMenu(); setInterval(fetchMenu, 3000);
    </script>
</body>
</html>
