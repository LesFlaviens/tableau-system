<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#050505">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>iChef - Carte Digitale</title>
    <style>
        /* 💎 DESIGN iCHEF LUX PREMIUM 💎 */
        :root { 
            --bg: #050505; 
            --panel: rgba(20, 20, 20, 0.6); 
            --border: rgba(255, 255, 255, 0.08); 
            --text-main: #ffffff; 
            --text-muted: #888888; 
            --gold: #d4af37; 
            --alert: #ff4d4d; 
            --blur: blur(15px);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            touch-action: manipulation;
        }

        header { 
            background: rgba(5, 5, 5, 0.85); 
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            padding: 20px 25px; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            z-index: 10;
        }
        .logo-text { color: var(--text-main); font-size: 1.4rem; font-weight: 300; letter-spacing: 4px; margin: 0; text-transform: uppercase;}
        .logo-text span { font-weight: 800; color: var(--gold); }
        .table-badge { color: var(--gold); font-weight: 400; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

        .category-nav { 
            display: flex; 
            overflow-x: auto; 
            background: var(--bg); 
            padding: 15px 20px; 
            gap: 15px; 
            border-bottom: 1px solid var(--border); 
            -webkit-overflow-scrolling: touch;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: transparent; border: 1px solid var(--border); color: var(--text-muted); 
            padding: 8px 20px; border-radius: 30px; font-weight: 500; white-space: nowrap; 
            cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s;
        }
        .cat-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 130px;
            -webkit-overflow-scrolling: touch;
        }
        .item-card { 
            background: transparent;
            border-bottom: 1px solid var(--border);
            padding: 15px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .item-info { display: flex; flex-direction: column; gap: 8px; flex: 1; padding-right: 20px;}
        .item-name { font-weight: 400; font-size: 1.1rem; line-height: 1.3; letter-spacing: 0.5px;}
        .item-price { color: var(--gold); font-weight: 300; font-size: 1rem; letter-spacing: 1px;}
        
        .add-btn { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            font-size: 1.2rem; font-weight: 300; cursor: pointer; transition: 0.2s;
        }
        .add-btn:active { background: var(--gold); color: #000; transform: scale(0.95); }
        .sold-out-badge { color: var(--alert); font-size: 0.7rem; letter-spacing: 1px; text-transform: uppercase; border: 1px solid var(--alert); padding: 4px 10px; border-radius: 20px;}

        .floating-cart { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(212, 175, 55, 0.9); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            color: #000; padding: 15px 25px; border-radius: 30px; 
            font-weight: 600; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: none; justify-content: space-between; align-items: center; width: 85%; max-width: 400px; 
            cursor: pointer; z-index: 100; transition: 0.2s; letter-spacing: 1px;
        }
        .cart-qty-badge { background: #000; color: var(--gold); border-radius: 50%; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; font-size: 0.8rem; font-weight: bold;}

        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.8); z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: flex-end; backdrop-filter: var(--blur); }
        .modal.open { display: flex !important; }
        .cart-box { background: var(--bg); width: 100%; height: 85vh; border-top-left-radius: 30px; border-top-right-radius: 30px; display: flex; flex-direction: column; border-top: 1px solid var(--border);}
        .cart-header { padding: 30px 25px 20px; display: flex; justify-content: space-between; align-items: center;}
        .cart-items-list { padding: 0 25px 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column;}
        .cart-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 20px 0; }
        .cart-qty-controls { display: flex; align-items: center; gap: 15px; border: 1px solid var(--border); border-radius: 30px; padding: 4px 6px;}
        .qty-btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 0 10px;}
        
        .cart-footer { padding: 25px; background: rgba(5,5,5,0.9); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; padding-bottom: env(safe-area-inset-bottom, 25px);}
        .send-order-btn { background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 12px; font-size: 1rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; width: 100%; }

        .loader-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 90000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 1px solid rgba(212, 175, 55, 0.2); border-top: 1px solid var(--gold); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        #success-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 50000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div style="color: var(--text-muted); font-weight: 300; letter-spacing: 3px; font-size: 0.8rem; text-transform: uppercase; margin-top: 20px;">Ouverture de la carte</div>
    </div>

    <header>
        <div class="logo-container">
            <h1 class="logo-text">iCHEF<span>.</span></h1>
            <div class="table-badge" id="header-table">Chargement...</div>
        </div>
    </header>

    <div class="category-nav" id="category-nav"></div>

    <div class="main-content" id="menu-container"></div>

    <div class="floating-cart" id="floating-cart" onclick="openCart()">
        <span style="display: flex; align-items: center; gap: 12px;">
            <div class="cart-qty-badge" id="cart-badge-qty">0</div>
            Ma Sélection
        </span>
        <span id="cart-badge-total" style="font-weight: 800;">0.00 €</span>
    </div>

    <div id="cart-modal" class="modal">
        <div class="cart-box">
            <div class="cart-header">
                <h2 style="margin:0; font-size: 1.1rem; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: var(--gold);">Révision</h2>
                <button style="background:transparent; border:none; color:var(--text-main); font-size:2rem; font-weight: 300;" onclick="closeCart()">×</button>
            </div>
            <div class="cart-items-list" id="cart-items-list"></div>
            <div class="cart-footer">
                <div style="display: flex; justify-content: space-between; font-size: 0.9rem; font-weight: 300; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase;">
                    <span>Total Estimé</span>
                    <span id="cart-total-footer" style="color: var(--text-main); font-weight: 600;">0.00 €</span>
                </div>
                <button class="send-order-btn" onclick="sendOrder()">Envoyer la commande</button>
            </div>
        </div>
    </div>

    <div id="success-screen">
        <div style="font-size: 3rem; margin-bottom: 30px; color: var(--gold);">✨</div>
        <h1 style="color: var(--text-main); font-size: 1.5rem; font-weight: 300; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 2px;">Transmis.</h1>
        <p style="color: var(--text-muted); font-size: 1rem; line-height: 1.6; font-weight: 300;">Votre sélection a été envoyée.<br>Notre équipe arrive dans un instant.</p>
        <button class="send-order-btn" style="margin-top: 50px; background: transparent; color: var(--gold); border: 1px solid var(--gold); width: auto; padding: 15px 30px;" onclick="location.reload()">Retour au menu</button>
    </div>

    <script>
        const SERVER_URL = "https://tableau-system.onrender.com";
        const urlParams = new URLSearchParams(window.location.search);
        const tableNumber = urlParams.get('table') || "SANS_TABLE";

        const API = {
            getState: async () => {
                let r = await fetch(`${SERVER_URL}/get-current-state`);
                if (!r.ok) throw new Error("Erreur");
                return await r.json();
            },
            update: async (key, data) => {
                try { 
                    await fetch(SERVER_URL + '/update-order', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ tableId: key, order: data }) 
                    }); 
                } catch(e) { console.error(e); }
            }
        };

        let globalMenu = [];
        let cart = [];
        let displayedCategories = [];
        let displayedItems = [];
        let currentCategory = "";

        async function initApp() {
            document.getElementById('header-table').innerText = (tableNumber === "SANS_TABLE") ? "CARTE DIGITALE" : "TABLE " + tableNumber;
            
            try {
                const state = await API.getState();
                
                // Connexion directe avec le Chef et le Bar actuels
                let rawCuisine = (state.activeOrders['MENU_MASTER']) ? state.activeOrders['MENU_MASTER'].data : {};
                let rawBar = (state.activeOrders['MENU_MASTER_BAR']) ? state.activeOrders['MENU_MASTER_BAR'].data : {};

                let formatItems = (obj, dest) => {
                    let arr = [];
                    for(let cat in obj) {
                        if(Array.isArray(obj[cat])) {
                            obj[cat].forEach(i => {
                                let course = 2;
                                let cL = cat.toLowerCase();
                                if(dest === 'bar' || cL.includes('boisson') || cL.includes('vin')) course = 0;
                                else if(cL.includes('entree') || cL.includes('entrée')) course = 1;
                                else if(cL.includes('dessert')) course = 3;
                                arr.push({ ...i, category: cat, dest: dest, course: course });
                            });
                        }
                    }
                    return arr;
                };

                globalMenu = [...formatItems(rawCuisine, 'cuisine'), ...formatItems(rawBar, 'bar')];
                displayedCategories = [...new Set(globalMenu.map(i => i.category))];
                
                if (displayedCategories.length > 0) {
                    renderCategoryNav();
                    renderMenuByIndex(0);
                } else {
                    document.getElementById('menu-container').innerHTML = "<div style='text-align:center; color:var(--text-muted); margin-top:50px; font-weight:300;'>Carte en cours de mise à jour.</div>";
                }

                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 600);
            } catch(e) {
                document.getElementById('loader').innerHTML = "<div style='color:var(--gold); font-weight:300; text-align:center;'>Connexion au restaurant...</div>";
            }
        }

        function renderCategoryNav() {
            const nav = document.getElementById('category-nav');
            const catNames = { "menuJour": "Suggestions", "entrees": "Entrées", "plats": "Plats", "desserts": "Desserts", "cocktails": "Bar" };
            
            nav.innerHTML = displayedCategories.map((c, idx) => {
                let displayName = catNames[c] || c;
                return `<button class="cat-btn" id="btn-cat-${idx}" onclick="renderMenuByIndex(${idx})">${displayName}</button>`;
            }).join('');
        }

        function renderMenuByIndex(catIdx) {
            let category = displayedCategories[catIdx];
            currentCategory = category;

            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-cat-${catIdx}`);
            if(activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            const container = document.getElementById('menu-container');
            displayedItems = globalMenu.filter(i => i.category === category);

            container.innerHTML = displayedItems.map((item, idx) => {
                let isSoldOut = (item.stock === 0 || item.stock === "0");
                let price = parseFloat(item.price) || 0;
                
                // Nettoyage absolu des sauts de ligne pour l'affichage
                let cleanName = item.name.replace(/\[BR\]/g, ' ').replace(/\n/g, ' ').replace(/\r/g, '').replace('🌟 ', '').trim();

                return `
                <div class="item-card" style="${isSoldOut ? 'opacity:0.4; filter:grayscale(100%);' : ''}">
                    <div class="item-info">
                        <div class="item-name">${cleanName}</div>
                        <div class="item-price">${price.toFixed(2)} €</div>
                    </div>
                    ${isSoldOut ? '<div class="sold-out-badge">Épuisé</div>' : `<button class="add-btn" onclick="addToCartByIndex(${idx})">+</button>`}
                </div>`;
            }).join('');
        }

        // L'ajout se fait maintenant de façon chirurgicale par INDEX (impossible de crasher avec des apostrophes)
        function addToCartByIndex(idx) {
            let item = displayedItems[idx];
            let price = parseFloat(item.price) || 0;
            let cleanName = item.name.replace(/\[BR\]/g, ' ').replace(/\n/g, ' ').replace(/\r/g, '').replace('🌟 ', '').trim();

            let existing = cart.find(i => i.n === cleanName);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ n: cleanName, p: price, dest: item.dest, course: item.course, qty: 1 });
            }
            updateCartUI();
            if(navigator.vibrate) navigator.vibrate(40);
        }

        function updateCartQty(idx, delta) {
            cart[idx].qty += delta;
            if (cart[idx].qty <= 0) cart.splice(idx, 1);
            updateCartUI();
            if(cart.length > 0) renderCartModal(); else closeCart();
        }

        function updateCartUI() {
            const btn = document.getElementById('floating-cart');
            let totalQty = cart.reduce((acc, i) => acc + i.qty, 0);
            let totalPrice = cart.reduce((acc, i) => acc + (i.p * i.qty), 0);
            document.getElementById('cart-badge-qty').innerText = totalQty;
            document.getElementById('cart-badge-total').innerText = totalPrice.toFixed(2) + " €";
            btn.style.display = cart.length > 0 ? 'flex' : 'none';
        }

        function openCart() { renderCartModal(); document.getElementById('cart-modal').classList.add('open'); }
        function closeCart() { document.getElementById('cart-modal').classList.remove('open'); }

        function renderCartModal() {
            const list = document.getElementById('cart-items-list');
            list.innerHTML = cart.map((item, idx) => `
                <div class="cart-row">
                    <div style="flex:1; padding-right:15px;">
                        <div style="font-weight:400; color:var(--text-main); font-size:1rem; margin-bottom:5px; line-height:1.3;">${item.n}</div>
                        <div style="color:var(--text-muted); font-size:0.9rem;">${(item.p * item.qty).toFixed(2)} €</div>
                    </div>
                    <div class="cart-qty-controls">
                        <button class="qty-btn" onclick="updateCartQty(${idx}, -1)">−</button>
                        <span style="font-weight:600; color:var(--text-main); font-size:1rem; min-width:20px; text-align:center;">${item.qty}</span>
                        <button class="qty-btn" style="color:var(--gold);" onclick="updateCartQty(${idx}, 1)">+</button>
                    </div>
                </div>`).join('');
            document.getElementById('cart-total-footer').innerText = cart.reduce((acc, i) => acc + (i.p * i.qty), 0).toFixed(2) + " €";
        }

        async function sendOrder() {
            document.getElementById('cart-modal').classList.remove('open');
            document.getElementById('loader').style.display = 'flex';
            
            let orderKey = "order_" + Date.now(); 
            let payload = {
                data: {
                    isWeb: true,
                    status: "hold", 
                    time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
                    clientName: "Mobile " + tableNumber,
                    totalStr: cart.reduce((acc, i) => acc + (i.p * i.qty), 0).toFixed(2) + " €",
                    items: cart.map(i => ({
                        id: Date.now() + Math.random(),
                        itemId: Date.now(),
                        n: i.n, p: i.p, qty: i.qty, course: i.course, dest: i.dest, done: false, fired: false, isOffered: false
                    }))
                }
            };

            try {
                await API.update(orderKey, payload);
                await API.update('ALERTS_MASTER', { data: { type: 'RING', message: `📱 WEB T.${tableNumber}`, timestamp: Date.now() } });
                
                document.getElementById('loader').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';
                cart = [];
            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                alert("Erreur réseau.");
            }
        }

        window.onload = initApp;
    </script>
</body>
</html>
