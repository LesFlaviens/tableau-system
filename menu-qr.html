<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Carte - Portail Client</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400;700&family=Merriweather:ital,wght@0,700;1,400&family=Inter:wght@300;500;900&family=Rubik:wght@400;900&family=Monoton&family=Arvo:wght@400;700&family=Libre+Baskerville:wght@700&family=Source+Sans+Pro:wght@400;600&display=swap" rel="stylesheet">
    
    <style id="dynamic-theme-vars">
        :root {
            /* Variables par défaut (Thème Luxe) */
            --bg-color: #050505;
            --text-main: #f8fafc;
            --text-muted: #888888;
            --accent: #d4af37;
            --border-color: #222222;
            --font-head: 'Playfair Display', serif;
            --font-body: 'Montserrat', sans-serif;
            --radius: 0px;
            --shadow: none;
            --glow: none;
        }
    </style>

    <style>
        /* CSS STRUCTUREL COMMUN */
        body { background: var(--bg-color); color: var(--text-main); margin: 0; padding: 0; font-family: var(--font-body); -webkit-font-smoothing: antialiased; padding-bottom: 120px; transition: background 0.5s ease; }
        header { text-align: center; padding: 60px 20px 40px; border-bottom: 1px solid var(--border-color); position: relative; background-size: cover; background-position: center; }
        .header-content { position: relative; z-index: 2; }
        .logo-text { color: var(--accent); font-size: 2.5rem; font-family: var(--font-head); letter-spacing: 4px; text-transform: uppercase; margin: 0; text-shadow: var(--glow); }
        .subtitle { font-size: 0.9rem; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; opacity: 0.8; font-weight: 300; }
        
        .menu-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .category-title { color: var(--accent); font-family: var(--font-head); font-size: 1.8rem; text-align: center; text-transform: uppercase; margin: 50px 0 30px; display: flex; align-items: center; justify-content: center; }
        .category-title::before, .category-title::after { content: ""; flex: 1; height: 1px; background: var(--border-color); margin: 0 15px; }

        .menu-item { margin-bottom: 15px; padding: 20px; border: 1px solid var(--border-color); border-radius: var(--radius); background: rgba(255,255,255,0.02); box-shadow: var(--shadow); transition: transform 0.2s; cursor: pointer; }
        .menu-item:active { transform: scale(0.97); }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; gap: 15px; }
        .item-name-main { font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
        .item-price { font-size: 1.1rem; color: var(--accent); font-weight: 900; text-shadow: var(--glow); }
        .item-desc { color: var(--text-muted); font-size: 0.85rem; margin-top: 8px; line-height: 1.5; font-style: italic; }

        /* PANIER & MODALES */
        #cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-color); border-top: 2px solid var(--accent); padding: 20px; display: flex; justify-content: space-between; align-items: center; z-index: 2000; transform: translateY(100%); transition: transform 0.3s; box-shadow: 0 -10px 30px rgba(0,0,0,0.5); }
        #cart-bar.active { transform: translateY(0); }
        .btn-view-cart { background: var(--accent); color: #000; border: none; padding: 12px 25px; font-weight: 900; border-radius: var(--radius); text-transform: uppercase; }

        /* --- CONFIGURATION DES 6 THÈMES --- */
        
        /* 1. LUXE (Défaut) */
        .theme-luxe { --radius: 0px; }

        /* 2. BISTROT */
        .theme-bistrot { 
            --bg-color: #1a0f0a; --text-main: #fdf5e6; --accent: #e67e22; --border-color: #3d2b1f;
            --font-head: 'Merriweather', serif; --font-body: 'Source Sans Pro', sans-serif; --radius: 8px;
        }

        /* 3. MINIMAL */
        .theme-minimal { 
            --bg-color: #ffffff; --text-main: #111111; --accent: #000000; --border-color: #eeeeee;
            --font-head: 'Inter', sans-serif; --font-body: 'Inter', sans-serif; --radius: 20px;
            --shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        /* 4. NÉON */
        .theme-neon { 
            --bg-color: #0d0221; --text-main: #ffffff; --accent: #00f2ff; --border-color: #1a1a40;
            --font-head: 'Monoton', cursive; --font-body: 'Rubik', sans-serif; --radius: 4px;
            --glow: 0 0 10px #00f2ff;
        }

        /* 5. RUSTIQUE */
        .theme-rustique { 
            --bg-color: #2c2420; --text-main: #f2e8cf; --accent: #a7c957; --border-color: #386641;
            --font-head: 'Arvo', serif; --font-body: 'Arvo', serif; --radius: 12px;
        }

        /* 6. CLASSIQUE */
        .theme-classique { 
            --bg-color: #f4f1de; --text-main: #3d405b; --accent: #e07a5f; --border-color: #d1d1d1;
            --font-head: 'Libre Baskerville', serif; --font-body: 'Source Sans Pro', sans-serif; --radius: 2px;
        }
    </style>
</head>
<body id="body-root" class="theme-luxe">

    <header id="main-header">
        <div class="header-content">
            <h1 class="logo-text" id="header-title">NOTRE CARTE</h1>
            <div id="service-subtitle" class="subtitle">Sélection du moment</div>
        </div>
    </header>

    <div class="menu-container">
        <div id="menu-container">
            <div style="text-align:center; padding:100px; color:var(--accent);">Chargement de l'expérience...</div>
        </div>
    </div>

    <div id="cart-bar">
        <div class="cart-info">
            <span style="font-weight:900; font-size:1.2rem;" id="cart-total-amount">0.00</span> <span id="cur-sym">€</span>
        </div>
        <button class="btn-view-cart" onclick="alert('Envoi commande...')">Commander</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        const SERVER_URL = "https://tableau-system.onrender.com";

        // Moteur de mise à jour des thèmes
        async function fetchMenuAndTheme() {
            try {
                const r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                const state = await r.json();
                const orders = state.activeOrders || {};

                // 1. Application du thème parmi les 6 catégories
                const themeData = orders['THEME_MASTER']?.data || { style: 'luxe' };
                document.getElementById('body-root').className = 'theme-' + themeData.style;
                
                // 2. Réglages de la devise
                const currency = orders['SETTINGS_MASTER']?.data?.currency || "€";
                document.getElementById('cur-sym').innerText = currency;

                // 3. Rendu du menu
                renderMenu(orders, currency);

            } catch(e) { console.log("Sync..."); }
        }

        function renderMenu(orders, currency) {
            const container = document.getElementById('menu-container');
            const menuCuisine = orders['MENU_MASTER']?.data || {};
            const menuBar = orders['MENU_MASTER_BAR']?.data || {};
            
            let html = '';
            
            // On fusionne et affiche par catégories
            [menuCuisine, menuBar].forEach(source => {
                for(let cat in source) {
                    if(source[cat].length === 0) continue;
                    html += `<h2 class="category-title">${cat}</h2>`;
                    source[cat].forEach(item => {
                        if(item.hidden) return;
                        html += `
                            <div class="menu-item">
                                <div class="item-header">
                                    <span class="item-name-main">${item.name.replace('[BR]', '<br>')}</span>
                                    <span class="item-price">${parseFloat(item.price).toFixed(2)} ${currency}</span>
                                </div>
                            </div>
                        `;
                    });
                }
            });

            container.innerHTML = html || '<div style="text-align:center; padding:50px;">La carte est fermée.</div>';
        }

        setInterval(fetchMenuAndTheme, 3000);
        fetchMenuAndTheme();
    </script>
</body>
</html>
