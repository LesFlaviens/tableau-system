<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu & Réservation - EMPIRE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505; --panel: #111111; --border: rgba(255, 255, 255, 0.1); 
            --text-main: #ffffff; --text-muted: #888888; 
            --gold: #d4af37; --gold-dim: rgba(212, 175, 55, 0.15);
            --accent: #10b981; --alert: #ef4444;
            --blur: blur(10px);
        }

        body {
            background-color: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif;
            margin: 0; display: flex; flex-direction: column; height: 100vh;
            -webkit-font-smoothing: antialiased; overflow: hidden;
        }

        /* HEADER FIXE */
        .header {
            background: rgba(5, 5, 5, 0.9); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            padding: 15px 20px; border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .header-title { font-weight: 900; color: var(--gold); font-size: 1.4rem; letter-spacing: 4px; text-transform: uppercase; margin: 0; }
        .table-badge { background: var(--gold-dim); color: var(--gold); padding: 5px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 800; border: 1px solid var(--gold); }

        /* TABS CATÉGORIES (SCROLL HORIZONTAL) */
        .cat-scroll {
            display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px;
            background: var(--bg); border-bottom: 1px solid var(--border);
            -webkit-overflow-scrolling: touch; scrollbar-width: none;
        }
        .cat-scroll::-webkit-scrollbar { display: none; }
        .cat-tab {
            background: transparent; color: var(--text-muted); border: 1px solid var(--border);
            padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600;
            white-space: nowrap; cursor: pointer; transition: 0.3s; text-transform: uppercase; letter-spacing: 1px;
        }
        .cat-tab.active { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 15px var(--gold-dim); }
        .cat-tab.special-resa { border-color: var(--accent); color: var(--accent); }
        .cat-tab.special-resa.active { background: var(--accent); color: #000; box-shadow: 0 0 15px rgba(16, 185, 129, 0.3); }

        /* ZONES PRINCIPALES */
        .main-zone {
            flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px;
        }
        
        /* GRILLE DE PRODUITS */
        .menu-grid {
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; align-content: start;
        }

        /* LA CARTE PRODUIT PREMIUM */
        .item-card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 16px; padding: 15px; display: flex; flex-direction: column;
            justify-content: space-between; position: relative; box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: 0.2s;
        }
        .item-card:active { transform: scale(0.96); border-color: var(--gold); }
        .item-name { font-size: 0.9rem; font-weight: 600; line-height: 1.3; margin-bottom: 8px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .item-price { color: var(--gold); font-weight: 900; font-size: 1.1rem; }
        
        .add-btn {
            position: absolute; bottom: 10px; right: 10px;
            background: var(--gold); color: #000; border: none;
            width: 36px; height: 36px; border-radius: 50%;
            font-size: 1.5rem; font-weight: 300; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 4px 10px var(--gold-dim); transition: 0.2s;
        }
        .add-btn:active { transform: scale(0.8); }
        .sold-out { opacity: 0.4; pointer-events: none; filter: grayscale(100%); }

        /* --- STYLES RESERVATION (Intégrés au Menu) --- */
        .section-title { font-size: 0.9rem; color: var(--text-main); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: var(--border); }
        .pax-selector { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; margin-bottom: 10px; -webkit-overflow-scrolling: touch; scrollbar-width: none;}
        .pax-selector::-webkit-scrollbar { display: none; }
        .pax-btn { flex: 0 0 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-main); font-size: 1.2rem; font-weight: 600; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; }
        .pax-btn.selected { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 15px var(--gold-dim); transform: scale(1.05); }
        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
        .time-btn { background: rgba(255,255,255,0.03); border: 1px solid var(--border); color: var(--text-main); padding: 12px 0; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: 0.3s; text-align: center; }
        .time-btn.selected { background: var(--gold); color: #000; border-color: var(--gold); box-shadow: 0 0 15px var(--gold-dim); }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px; }
        input[type="text"], input[type="tel"], input[type="date"], input[type="time"], input[type="number"], select, textarea { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border: 1px solid var(--border); color: var(--text-main); border-radius: 12px; font-size: 1rem; font-family: 'Inter', sans-serif; box-sizing: border-box; outline: none; transition: 0.3s; appearance: none; }
        input:focus, select:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
        ::-webkit-calendar-picker-indicator { filter: invert(1); cursor: pointer; }
        .flex-row { display: flex; gap: 15px; margin-bottom: 15px; }
        .flex-row > div { flex: 1; margin-bottom: 0; }
        .sub-label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px; display: block;}
        .btn-submit { background: var(--gold); color: #000; border: none; padding: 20px; width: 100%; font-weight: 900; font-size: 1.1rem; border-radius: 12px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; margin-top: 10px; box-shadow: 0 10px 20px var(--gold-dim); }
        .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
        /* ---------------------------------------------------- */

        /* PANIER FLOTTANT EN BAS */
        .floating-cart {
            position: fixed; bottom: 20px; left: 20px; right: 20px;
            background: var(--gold); color: #000; border-radius: 16px;
            padding: 15px 20px; display: none; justify-content: space-between; align-items: center;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4); cursor: pointer; z-index: 1000;
            animation: slideUp 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes slideUp { 0% { transform: translateY(100px); opacity: 0; } 100% { transform: translateY(0); opacity: 1; } }
        .cart-info { font-weight: 900; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; }
        .cart-total { font-weight: 900; font-size: 1.3rem; }

        /* MODALES */
        .modal {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: rgba(0,0,0,0.9); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            z-index: 2000; display: none; flex-direction: column;
        }
        .modal.open { display: flex; }
        .modal-header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .modal-title { color: var(--gold); font-weight: 900; font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 2px;}
        .close-btn { background: transparent; color: var(--text-muted); border: none; font-size: 1rem; font-weight: bold; cursor: pointer; text-transform: uppercase;}
        
        .cart-items-list { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: var(--panel); padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid var(--border); }
        .cart-item-controls { display: flex; align-items: center; gap: 15px; background: rgba(0,0,0,0.5); padding: 5px; border-radius: 8px; border: 1px solid var(--border);}
        .ctrl-btn { background: transparent; color: var(--gold); border: none; font-size: 1.2rem; width: 30px; height: 30px; font-weight: bold; }
        
        .checkout-zone { padding: 20px; background: var(--panel); border-top: 1px solid var(--border); }
        .btn-checkout { background: var(--accent); color: #000; border: none; width: 100%; padding: 20px; font-weight: 900; font-size: 1.2rem; border-radius: 12px; text-transform: uppercase; letter-spacing: 2px; box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3); }

        /* Écran Succès Menu / Réservation */
        #success-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box;}
    </style>
</head>
<body>

    <div class="header">
        <h1 class="header-title">EMPIRE</h1>
        <div class="table-badge" id="table-display">TABLE ?</div>
    </div>

    <!-- TABS SCROLLABLES -->
    <div class="cat-scroll" id="cat-tabs">
        <div style="color:var(--text-muted); padding:10px;">Chargement de la carte...</div>
    </div>

    <!-- ZONE 1 : MENU PRODUITS (Affichée par défaut) -->
    <div class="main-zone menu-grid" id="menu-grid"></div>

    <!-- ZONE 2 : FORMULAIRE DE RÉSERVATION (Cachée par défaut) -->
    <div class="main-zone" id="reservation-view" style="display: none; padding-bottom: 50px;">
        <div class="section-title">👤 Vos Couverts</div>
        <div class="pax-selector">
            <div class="pax-btn selected" onclick="selectPax(this, 1)">1</div>
            <div class="pax-btn" onclick="selectPax(this, 2)">2</div>
            <div class="pax-btn" onclick="selectPax(this, 3)">3</div>
            <div class="pax-btn" onclick="selectPax(this, 4)">4</div>
            <div class="pax-btn" onclick="selectPax(this, 5)">5</div>
            <div class="pax-btn" onclick="selectPax(this, 6)">6</div>
            <div class="pax-btn" onclick="selectPax(this, 7)">7</div>
            <div class="pax-btn" onclick="selectPax(this, 8)">8</div>
        </div>
        <div class="input-group">
            <label>Nombre précis (Groupes) :</label>
            <input type="number" id="res-pax" value="1" min="1" oninput="clearPaxSelection()">
        </div>

        <div class="section-title" style="margin-top: 30px;">📅 Date et Heure</div>
        <div class="flex-row">
            <div class="input-group"><label>Date</label><input type="date" id="res-date" required></div>
            <div class="input-group"><label>Heure exacte</label><input type="time" id="res-time" value="20:00" required oninput="clearTimeSelection()"></div>
        </div>

        <span class="sub-label">Midi :</span>
        <div class="time-grid" style="grid-template-columns: repeat(4, 1fr);">
            <div class="time-btn" onclick="selectTime(this, '12:00')">12:00</div>
            <div class="time-btn" onclick="selectTime(this, '12:30')">12:30</div>
            <div class="time-btn" onclick="selectTime(this, '13:00')">13:00</div>
            <div class="time-btn" onclick="selectTime(this, '13:30')">13:30</div>
        </div>

        <span class="sub-label">Soir :</span>
        <div class="time-grid">
            <div class="time-btn" onclick="selectTime(this, '19:00')">19:00</div>
            <div class="time-btn" onclick="selectTime(this, '19:30')">19:30</div>
            <div class="time-btn selected" onclick="selectTime(this, '20:00')">20:00</div>
            <div class="time-btn" onclick="selectTime(this, '20:30')">20:30</div>
            <div class="time-btn" onclick="selectTime(this, '21:00')">21:00</div>
            <div class="time-btn" onclick="selectTime(this, '21:30')">21:30</div>
        </div>

        <div class="section-title" style="margin-top: 30px;">📝 Vos Informations</div>
        <div class="input-group"><label>Nom et Prénom</label><input type="text" id="res-name" placeholder="Ex: Jean Dupont"></div>
        <div class="input-group"><label>Téléphone</label><input type="tel" id="res-phone" placeholder="06 XX XX XX XX"></div>
        <div class="input-group">
            <label>Occasion (Optionnel)</label>
            <select id="res-event">
                <option value="">-- Réservation Classique --</option>
                <option value="Anniversaire">🎂 Anniversaire</option>
                <option value="Rendez-vous Romantique">🥂 Romantique</option>
                <option value="Repas d'Affaires">💼 Affaires</option>
            </select>
        </div>
        <div class="input-group"><label>Demande spéciale</label><textarea id="res-obs" rows="2" placeholder="Allergies ? Préférences ?"></textarea></div>

        <button class="btn-submit" id="btn-submit-resa" onclick="submitReservation()">Réserver pour la prochaine fois</button>
    </div>

    <!-- PANIER FLOTTANT -->
    <div class="floating-cart" id="floating-cart" onclick="openCart()">
        <div class="cart-info">🛒 <span id="cart-count">0</span> Plat(s)</div>
        <div class="cart-total" id="cart-total">0.00 €</div>
    </div>

    <!-- MODALE PANIER -->
    <div class="modal" id="cart-modal">
        <div class="modal-header">
            <h2 class="modal-title">Votre Commande</h2>
            <button class="close-btn" onclick="closeCart()">✕ Fermer</button>
        </div>
        <div class="cart-items-list" id="cart-items-list"></div>
        <div class="checkout-zone">
            <div style="display:flex; justify-content:space-between; color:var(--text-muted); font-weight:bold; margin-bottom:15px; font-size: 1.2rem;">
                <span>TOTAL :</span>
                <span id="modal-total" style="color:var(--gold); font-size:1.5rem; font-weight:900;">0.00 €</span>
            </div>
            <button class="btn-checkout" id="btn-send-order" onclick="sendOrder()">🚀 ENVOYER EN CUISINE</button>
        </div>
    </div>

    <!-- ÉCRAN SUCCÈS -->
    <div id="success-screen">
        <div style="font-size: 4rem; margin-bottom: 20px;" id="success-emoji">✅</div>
        <h2 style="color:var(--gold); font-size: 2rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 2px;" id="success-title">Envoyé !</h2>
        <p style="color:var(--text-muted); line-height: 1.6; font-size: 1.1rem; max-width: 400px; margin: 0 auto;" id="success-desc">Opération réussie.</p>
        <button style="background:var(--panel); border:1px solid var(--border); color:var(--text-main); padding: 15px 30px; border-radius: 8px; font-weight:bold; margin-top:30px; text-transform:uppercase;" onclick="location.reload()">Retour au Menu</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        const currentTable = urlParams.get('table') || 'WEB';
        const SERVER_URL = "https://tableau-system.onrender.com";

        document.getElementById('table-display').innerText = currentTable;

        let menuData = [];
        let cart = [];
        let currentCat = '';

        // --- INIT DU MENU ---
        async function initMenu() {
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                let state = await r.json();
                let activeOrders = state.activeOrders || {};
                
                let catsCuis = activeOrders['CATEGORIES_CUISINE']?.data || activeOrders['CATEGORIES_CUISINE'] || [];
                let catsBar = activeOrders['CATEGORIES_BAR']?.data || activeOrders['CATEGORIES_BAR'] || [];
                let mCuis = activeOrders['MENU_MASTER']?.data || activeOrders['MENU_MASTER'] || {};
                let mBar = activeOrders['MENU_MASTER_BAR']?.data || activeOrders['MENU_MASTER_BAR'] || {};

                menuData = [];
                catsCuis.forEach(cat => { if(mCuis[cat.id]) menuData.push({ category: cat.label, id: cat.id, items: mCuis[cat.id].map(i => ({...i, dest: 'cuisine'})) }); });
                catsBar.forEach(cat => { if(mBar[cat.id]) menuData.push({ category: "🍸 " + cat.label, id: cat.id, items: mBar[cat.id].map(i => ({...i, dest: 'bar'})) }); });

                renderTabs();
                if (menuData.length > 0) {
                    selectCategory(menuData[0].id);
                }
            } catch (e) {
                document.getElementById('cat-tabs').innerHTML = '<div style="padding:15px; color:var(--alert);">Erreur de connexion.</div>';
            }
        }

        // --- AFFICHAGE TABS (AVEC BOUTON RESERVATION EN PREMIER) ---
        function renderTabs() {
            let tabsHtml = `<button class="cat-tab special-resa" id="tab-resa" onclick="showReservationView()">📅 RÉSERVER UNE TABLE</button>`;
            tabsHtml += menuData.map(cat => `<button class="cat-tab" id="tab-${cat.id}" onclick="selectCategory('${cat.id}')">${cat.category}</button>`).join('');
            document.getElementById('cat-tabs').innerHTML = tabsHtml;
        }

        function showReservationView() {
            currentCat = 'resa';
            document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-resa').classList.add('active');
            
            // On cache la grille du menu, on affiche le form de réservation
            document.getElementById('menu-grid').style.display = 'none';
            document.getElementById('reservation-view').style.display = 'block';
            
            // On cache le panier flottant s'il est affiché pour ne pas gêner
            document.getElementById('floating-cart').style.display = 'none';
        }

        function selectCategory(catId) {
            currentCat = catId;
            document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${catId}`);
            if(activeTab) {
                activeTab.classList.add('active');
                activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            // On réaffiche la grille, on cache le form de réservation
            document.getElementById('reservation-view').style.display = 'none';
            document.getElementById('menu-grid').style.display = 'grid';
            
            // On réaffiche le panier si on a des articles
            if(cart.length > 0) document.getElementById('floating-cart').style.display = 'flex';

            const catData = menuData.find(c => c.id === catId);
            const grid = document.getElementById('menu-grid');
            if (!catData || catData.items.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:30px;">Catégorie vide.</div>';
                return;
            }

            grid.innerHTML = catData.items.map((item, idx) => {
                let isSoldOut = (item.stock === 0);
                let price = parseFloat(item.price || 0).toFixed(2);
                let cleanName = item.name.replace(/\[BR\]/g, ' ');
                let escapedName = cleanName.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                return `
                <div class="item-card ${isSoldOut ? 'sold-out' : ''}" onclick="${isSoldOut ? '' : `addToCart('${escapedName}', ${price}, '${item.dest}')`}">
                    <div class="item-name">${cleanName}</div>
                    <div class="item-price">${price} €</div>
                    ${isSoldOut ? '<span style="color:var(--alert); font-size:0.75rem; font-weight:bold; margin-top:10px;">ÉPUISÉ</span>' : `<button class="add-btn">+</button>`}
                </div>`;
            }).join('');
        }

        // --- GESTION PANIER ET COMMANDE ---
        function addToCart(name, price, dest) {
            let existing = cart.find(i => i.n === name);
            if (existing) existing.qty++;
            else cart.push({ n: name, p: price, dest: dest, qty: 1, course: dest === 'bar' ? 0 : 2 });
            if (navigator.vibrate) navigator.vibrate(50);
            updateCartUI();
        }

        function updateItemQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateCartUI();
            if (cart.length === 0) closeCart();
        }

        function updateCartUI() {
            let total = 0; let count = 0;
            let listHtml = cart.map((item, idx) => {
                total += (item.p * item.qty); count += item.qty;
                return `
                <div class="cart-item">
                    <div style="flex:1;">
                        <div style="font-weight:bold; color:var(--text-main); font-size:1.1rem; margin-bottom:5px;">${item.n}</div>
                        <div style="color:var(--gold); font-weight:900;">${(item.p * item.qty).toFixed(2)} €</div>
                    </div>
                    <div class="cart-item-controls">
                        <button class="ctrl-btn" onclick="updateItemQty(${idx}, -1)">-</button>
                        <span style="font-weight:900; font-size:1.2rem; width:20px; text-align:center;">${item.qty}</span>
                        <button class="ctrl-btn" onclick="updateItemQty(${idx}, 1)">+</button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('cart-items-list').innerHTML = listHtml;
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = total.toFixed(2) + " €";
            document.getElementById('modal-total').innerText = total.toFixed(2) + " €";

            if (count > 0 && currentCat !== 'resa') document.getElementById('floating-cart').style.display = 'flex';
            else document.getElementById('floating-cart').style.display = 'none';
        }

        function openCart() { document.getElementById('cart-modal').classList.add('open'); }
        function closeCart() { document.getElementById('cart-modal').classList.remove('open'); }

        async function sendOrder() {
            if (cart.length === 0) return;
            const btn = document.getElementById('btn-send-order');
            btn.innerText = "⏳ ENVOI EN COURS..."; btn.style.pointerEvents = "none";

            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                let state = await r.json();
                let targetTable = state.activeOrders[currentTable];
                let currentOrderData = targetTable ? (targetTable.data !== undefined ? targetTable.data : targetTable) : { status: 'cooking', items: [], time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), isWeb: true };

                let newItems = cart.map(i => ({
                    id: Date.now() + Math.random(), itemId: Date.now(), n: "📱 " + i.n, p: i.p, qty: i.qty,
                    done: false, dest: i.dest, fired: false, savedToDB: true, course: i.course, seat: 0
                }));

                currentOrderData.items = [...(currentOrderData.items || []), ...newItems];
                currentOrderData.status = 'cooking'; currentOrderData.isWeb = true;
                currentOrderData.totalStr = (cart.reduce((a,b)=>a+(b.p*b.qty),0)).toFixed(2) + ' €';

                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: currentTable, order: { data: currentOrderData } }) });

                closeCart();
                document.getElementById('floating-cart').style.display = 'none';
                document.getElementById('cat-tabs').style.display = 'none';
                document.getElementById('menu-grid').style.display = 'none';
                
                document.getElementById('success-emoji').innerText = "👨‍🍳";
                document.getElementById('success-title').innerText = "Commande en préparation";
                document.getElementById('success-desc').innerText = "Notre équipe prépare votre commande. Vous pourrez régler l'addition auprès de votre serveur.";
                document.getElementById('success-screen').style.display = 'flex';
            } catch (e) {
                alert("Erreur de connexion."); btn.innerText = "🚀 ENVOYER EN CUISINE"; btn.style.pointerEvents = "auto";
            }
        }

        // --- LOGIQUE RÉSERVATION ---
        document.getElementById('res-date').valueAsDate = new Date();
        document.getElementById('res-date').min = new Date().toISOString().split("T")[0];

        function clearPaxSelection() { document.querySelectorAll('.pax-btn').forEach(b => b.classList.remove('selected')); }
        function clearTimeSelection() { document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('selected')); }
        function selectPax(btn, value) { clearPaxSelection(); btn.classList.add('selected'); document.getElementById('res-pax').value = value; }
        function selectTime(btn, value) { clearTimeSelection(); btn.classList.add('selected'); document.getElementById('res-time').value = value; }

        async function submitReservation() {
            const btn = document.getElementById('btn-submit-resa');
            const date = document.getElementById('res-date').value;
            const time = document.getElementById('res-time').value;
            const name = document.getElementById('res-name').value.trim();
            const phone = document.getElementById('res-phone').value.trim();
            const pax = document.getElementById('res-pax').value;
            const eventType = document.getElementById('res-event').value;
            const rawObs = document.getElementById('res-obs').value.trim();

            if (!date || !time || !name || !phone || pax <= 0) return alert("Veuillez renseigner Nom, Téléphone, Couverts et Date.");

            btn.innerText = "Envoi en cours..."; btn.disabled = true;
            let finalObs = eventType ? `[${eventType.toUpperCase()}] ${rawObs}` : rawObs;

            const resaData = {
                id: Date.now(), date: date, time: time, name: name, phone: phone, couverts: pax,
                obs: finalObs.trim(), status: 'pending', timestamp: new Date().toISOString()
            };

            try {
                let response = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                if (!response.ok) throw new Error("Erreur de connexion");
                let state = await response.json();
                
                let resas = [];
                if (state.activeOrders && state.activeOrders['RESERVATIONS_MASTER']) {
                    let rawData = state.activeOrders['RESERVATIONS_MASTER'];
                    if (Array.isArray(rawData)) resas = rawData;
                    else if (rawData.data && Array.isArray(rawData.data)) resas = rawData.data;
                }

                resas.push(resaData);

                let postResponse = await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: 'RESERVATIONS_MASTER', order: { data: resas } })
                });

                if (!postResponse.ok) throw new Error("Erreur serveur");

                document.getElementById('cat-tabs').style.display = 'none';
                document.getElementById('reservation-view').style.display = 'none';
                
                document.getElementById('success-emoji').innerText = "📅";
                document.getElementById('success-title').innerText = "Demande Envoyée";
                document.getElementById('success-desc').innerText = "Notre Maître d'Hôtel a bien reçu votre demande. Vous recevrez une confirmation par SMS très prochainement.";
                document.getElementById('success-screen').style.display = 'flex';
                
            } catch (e) { 
                alert("Erreur de communication. Veuillez réessayer.");
                btn.innerText = "Réserver pour la prochaine fois"; btn.disabled = false;
            }
        }

        initMenu();
    </script>
</body>
</html>
