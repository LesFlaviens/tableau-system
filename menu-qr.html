<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChef - Carte Digitale</title>
    <meta name="theme-color" content="#050505">
    
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        /* 💎 DESIGN iCHEF LUX PREMIUM 💎 */
        :root { 
            --bg: #050505; /* Noir profond luxe */
            --panel: rgba(20, 20, 20, 0.6); /* Verre fumé */
            --border: rgba(255, 255, 255, 0.08); 
            --text-main: #ffffff; 
            --text-muted: #888888; 
            --gold: #d4af37; /* Or luxueux */
            --accent: #d4af37; /* On harmonise sur l'or pour le luxe */
            --alert: #ff4d4d; 
            --blur: blur(15px);
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER LUXE */
        header { 
            background: rgba(5, 5, 5, 0.85); 
            backdrop-filter: var(--blur);
            -webkit-backdrop-filter: var(--blur);
            padding: 20px 25px; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            border-bottom: 1px solid var(--border); 
            z-index: 10;
        }
        .logo-container { display: flex; flex-direction: column; }
        .logo-text { color: var(--text-main); font-size: 1.4rem; font-weight: 300; letter-spacing: 4px; margin: 0; text-transform: uppercase;}
        .logo-text span { font-weight: 800; color: var(--gold); }
        .table-badge { color: var(--gold); font-weight: 400; font-size: 0.75rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }

        /* CATÉGORIES ÉPURÉES */
        .category-nav { 
            display: flex; 
            overflow-x: auto; 
            background: var(--bg); 
            padding: 15px 20px; 
            gap: 15px; 
            border-bottom: 1px solid var(--border); 
            -webkit-overflow-scrolling: touch;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: transparent; border: 1px solid var(--border); color: var(--text-muted); 
            padding: 8px 20px; border-radius: 30px; font-weight: 500; white-space: nowrap; 
            cursor: pointer; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 1px; transition: 0.3s;
        }
        .cat-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(212, 175, 55, 0.05); }

        /* LISTE DES PLATS ÉLÉGANTE */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 130px; /* Espace pour le bouton panier */
            -webkit-overflow-scrolling: touch;
        }
        .item-card { 
            background: transparent;
            border-bottom: 1px solid var(--border);
            padding: 15px 0; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            transition: 0.2s;
        }
        .item-card:last-child { border-bottom: none; }
        .item-info { display: flex; flex-direction: column; gap: 8px; flex: 1; padding-right: 20px;}
        .item-name { font-weight: 400; font-size: 1.1rem; line-height: 1.3; letter-spacing: 0.5px;}
        .item-price { color: var(--gold); font-weight: 300; font-size: 1rem; letter-spacing: 1px;}
        
        .add-btn { 
            background: transparent; border: 1px solid var(--gold); color: var(--gold); 
            width: 36px; height: 36px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            font-size: 1.2rem; font-weight: 300; cursor: pointer; transition: 0.2s; flex-shrink: 0;
        }
        .add-btn:active { background: var(--gold); color: #000; transform: scale(0.9);}
        
        .sold-out-badge { color: var(--alert); font-size: 0.75rem; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; border: 1px solid var(--alert); padding: 4px 10px; border-radius: 20px;}

        /* FLOATING CART BUTTON (GLASSMORPHISM) */
        .floating-cart { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); 
            background: rgba(212, 175, 55, 0.9); backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
            color: #000; padding: 15px 25px; border-radius: 30px; 
            font-weight: 600; font-size: 0.9rem; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            display: none; justify-content: space-between; align-items: center; width: 85%; max-width: 400px; 
            cursor: pointer; z-index: 100; transition: 0.2s; letter-spacing: 1px;
        }
        .floating-cart:active { transform: translateX(-50%) scale(0.95); }
        .cart-qty-badge { background: #000; color: var(--gold); border-radius: 50%; width: 24px; height: 24px; display: flex; justify-content: center; align-items: center; font-size: 0.8rem; font-weight: bold;}

        /* PANIER MODAL (GLISSEMENT) */
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0, 0, 0, 0.8); z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: flex-end; backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur); }
        .modal.open { display: flex !important; animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;}
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .cart-box { background: var(--bg); width: 100%; height: 85vh; border-top-left-radius: 30px; border-top-right-radius: 30px; display: flex; flex-direction: column; box-shadow: 0 -10px 40px rgba(0,0,0,0.5); border-top: 1px solid var(--border);}
        .cart-header { padding: 30px 25px 20px; display: flex; justify-content: space-between; align-items: center;}
        .cart-items-list { padding: 0 25px 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column;}
        
        .cart-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding: 20px 0; }
        .cart-row:last-child { border-bottom: none; }
        .cart-qty-controls { display: flex; align-items: center; gap: 15px; border: 1px solid var(--border); border-radius: 30px; padding: 4px 6px;}
        .qty-btn { background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem; cursor: pointer; padding: 0 10px; font-weight: 300;}
        
        .cart-footer { padding: 25px; background: rgba(5,5,5,0.9); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 20px; padding-bottom: env(safe-area-inset-bottom, 25px);}
        .send-order-btn { background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 12px; font-size: 1rem; font-weight: 600; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; width: 100%; transition: 0.2s;}
        .send-order-btn:active { transform: scale(0.98); background: #b8962e; }

        /* LOADER CHIC */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 90000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 1px solid rgba(212, 175, 55, 0.2); border-top: 1px solid var(--gold); border-radius: 50%; animation: spin 1s cubic-bezier(0.4, 0, 0.2, 1) infinite; margin-bottom: 20px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* SUCCESS SCREEN */
        #success-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 50000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 30px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div style="color: var(--text-muted); font-weight: 300; letter-spacing: 3px; font-size: 0.8rem; text-transform: uppercase;">Ouverture de la carte</div>
    </div>

    <header>
        <div class="logo-container">
            <h1 class="logo-text">iCHEF<span>.</span></h1>
            <div class="table-badge" id="header-table">Installation...</div>
        </div>
    </header>

    <div class="category-nav" id="category-nav">
        </div>

    <div class="main-content" id="menu-container">
        </div>

    <div class="floating-cart" id="floating-cart" onclick="openCart()">
        <span style="display: flex; align-items: center; gap: 12px;">
            <div class="cart-qty-badge" id="cart-badge-qty">0</div>
            Votre Commande
        </span>
        <span id="cart-badge-total" style="font-weight: 800;">0.00 €</span>
    </div>

    <div id="cart-modal" class="modal">
        <div class="cart-box">
            <div class="cart-header">
                <h2 style="margin:0; font-size: 1.2rem; font-weight: 400; letter-spacing: 2px; text-transform: uppercase; color: var(--gold);">Révision</h2>
                <button style="background:transparent; border:none; color:var(--text-main); font-size:2rem; font-weight: 300; cursor:pointer; padding:0;" onclick="closeCart()">×</button>
            </div>
            
            <div class="cart-items-list" id="cart-items-list">
                </div>
            
            <div class="cart-footer">
                <div style="display: flex; justify-content: space-between; font-size: 1rem; font-weight: 300; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase;">
                    <span>Total Estimé</span>
                    <span id="cart-total-footer" style="color: var(--text-main); font-weight: 600;">0.00 €</span>
                </div>
                <button class="send-order-btn" onclick="sendOrder()">Valider la commande</button>
            </div>
        </div>
    </div>

    <div id="success-screen">
        <div style="font-size: 3rem; margin-bottom: 30px; color: var(--gold);">✨</div>
        <h1 style="color: var(--text-main); font-size: 1.5rem; font-weight: 300; margin: 0 0 20px 0; text-transform: uppercase; letter-spacing: 2px;">C'est noté.</h1>
        <p style="color: var(--text-muted); font-size: 1rem; line-height: 1.6; max-width: 300px; font-weight: 300;">Votre sélection a été transmise avec succès.<br><br>Notre équipe s'occupe de vous dans un instant.</p>
        <button class="send-order-btn" style="margin-top: 50px; background: transparent; color: var(--gold); border: 1px solid var(--gold); width: auto; padding: 15px 30px;" onclick="location.reload()">Nouvelle commande</button>
    </div>

    <script>
        const SERVER_URL = "https://tableau-system.onrender.com";

        const API = {
            getState: async () => {
                let r = await fetch(SERVER_URL + '/get-current-state');
                if (!r.ok) throw new Error("Serveur injoignable");
                return await r.json();
            },
            update: async (key, data) => {
                try { 
                    await fetch(SERVER_URL + '/update-order', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ tableId: key, order: data }) 
                    }); 
                } catch(e) { console.error("Erreur Sync:", e); }
            }
        };

        // Extraction des données de l'URL
        const urlParams = new URLSearchParams(window.location.search);
        let tableNumber = urlParams.get('table') || "SANS TABLE";
        document.getElementById('header-table').innerText = (tableNumber === "SANS TABLE") ? "MENU DIGITAL" : "TABLE " + tableNumber;

        let globalMenu = [];
        let currentCategory = '';
        let cart = [];

        async function initApp() {
            try {
                const state = await API.getState();
                let rawCuisine = (state && state.activeOrders && state.activeOrders['MENU_MASTER']) ? state.activeOrders['MENU_MASTER'].data : {};
                let rawBar = (state && state.activeOrders && state.activeOrders['MENU_MASTER_BAR']) ? state.activeOrders['MENU_MASTER_BAR'].data : {};

                // Formatage des données
                let formatItems = (obj, dest) => {
                    let arr = [];
                    for(let cat in obj) {
                        if(Array.isArray(obj[cat])) {
                            obj[cat].forEach(i => {
                                let course = 2; 
                                let cLower = cat.toLowerCase();
                                if(dest === 'bar' || cLower.includes('boisson') || cLower.includes('vin') || cLower.includes('cocktail')) course = 0;
                                else if(cLower.includes('entree') || cLower.includes('entrée')) course = 1;
                                else if(cLower.includes('dessert')) course = 3;

                                arr.push({ ...i, category: cat, dest: dest, course: course });
                            });
                        }
                    }
                    return arr;
                };

                globalMenu = [...formatItems(rawCuisine, 'cuisine'), ...formatItems(rawBar, 'bar')];
                
                let categories = [...new Set(globalMenu.map(i => i.category))];
                
                const priority = ['menuJour', 'entrees', 'plats', 'desserts', 'cocktails', 'vins', 'softs'];
                categories.sort((a, b) => {
                    let idxA = priority.indexOf(a); let idxB = priority.indexOf(b);
                    if(idxA === -1) idxA = 99; if(idxB === -1) idxB = 99;
                    return idxA - idxB;
                });

                if (categories.length > 0) {
                    renderCategoryNav(categories);
                    renderMenu(categories[0]);
                } else {
                    document.getElementById('menu-container').innerHTML = "<div style='text-align:center; color:var(--text-muted); margin-top:50px; font-weight:300; letter-spacing:1px;'>La carte est en cours d'élaboration.</div>";
                }

                setTimeout(() => {
                    document.getElementById('loader').style.opacity = '0';
                    setTimeout(() => document.getElementById('loader').style.display = 'none', 300);
                }, 500);

            } catch(e) {
                document.getElementById('loader').innerHTML = "<div style='color:var(--alert); font-weight:300; font-size:1rem; text-align:center; letter-spacing:1px;'>Connexion au réseau interrompue.</div>";
            }
        }

        function renderCategoryNav(categories) {
            const nav = document.getElementById('category-nav');
            
            const catNames = { 
                "menuJour": "Suggestions", "entrees": "Entrées", "plats": "Plats", 
                "desserts": "Desserts", "cocktails": "Cocktails", "vins": "Vins", "softs": "Softs" 
            };

            nav.innerHTML = categories.map(c => {
                let displayName = catNames[c] || c;
                return `<button class="cat-btn" id="btn-cat-${c}" onclick="renderMenu('${c}')">${displayName}</button>`;
            }).join('');
        }

        function renderMenu(category) {
            currentCategory = category;
            
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-cat-${category}`);
            if(activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            const container = document.getElementById('menu-container');
            let items = globalMenu.filter(i => i.category === category);

            if(items.length === 0) {
                container.innerHTML = "<div style='text-align:center; color:var(--text-muted); margin-top:20px; font-weight:300;'>Aucune suggestion actuellement.</div>";
                return;
            }

            container.innerHTML = items.map(item => {
                let isSoldOut = (item.stock === 0);
                let price = parseFloat(item.price) || 0;
                let cleanName = item.name.replace(/\[BR\]/g, ' ').replace('🌟 ', '');

                let actionHtml = isSoldOut 
                    ? `<div class="sold-out-badge">Indisponible</div>`
                    : `<button class="add-btn" onclick="addToCart('${escapeQuotes(cleanName)}', ${price}, '${item.dest}', ${item.course})">+</button>`;

                return `
                <div class="item-card" style="${isSoldOut ? 'opacity:0.4; filter:grayscale(100%);' : ''}">
                    <div class="item-info">
                        <div class="item-name">${cleanName}</div>
                        <div class="item-price">${price.toFixed(2)} €</div>
                    </div>
                    ${actionHtml}
                </div>`;
            }).join('');
        }

        function escapeQuotes(str) { return str.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        function addToCart(name, price, dest, course) {
            let existing = cart.find(i => i.n === name);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ n: name, p: price, dest: dest, course: course, qty: 1 });
            }
            updateCartUI();
            if(navigator.vibrate) navigator.vibrate(40);
        }

        function updateCartQty(index, delta) {
            let item = cart[index];
            item.qty += delta;
            if (item.qty <= 0) {
                cart.splice(index, 1);
            }
            updateCartUI();
            if(cart.length > 0) renderCartModal(); else closeCart();
            if(navigator.vibrate) navigator.vibrate(30);
        }

        function updateCartUI() {
            const btn = document.getElementById('floating-cart');
            const qtyBadge = document.getElementById('cart-badge-qty');
            const totalBadge = document.getElementById('cart-badge-total');

            if (cart.length === 0) {
                btn.style.display = 'none';
                return;
            }

            let totalQty = 0;
            let totalPrice = 0;
            cart.forEach(i => {
                totalQty += i.qty;
                totalPrice += (i.p * i.qty);
            });

            qtyBadge.innerText = totalQty;
            totalBadge.innerText = totalPrice.toFixed(2) + " €";
            btn.style.display = 'flex';
        }

        function openCart() {
            renderCartModal();
            document.getElementById('cart-modal').classList.add('open');
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('open');
        }

        function renderCartModal() {
            const list = document.getElementById('cart-items-list');
            let totalPrice = 0;

            list.innerHTML = cart.map((item, idx) => {
                totalPrice += (item.p * item.qty);
                return `
                <div class="cart-row">
                    <div style="flex:1; padding-right:15px;">
                        <div style="font-weight:400; color:var(--text-main); font-size:1rem; margin-bottom:5px; line-height:1.3;">${item.n}</div>
                        <div style="color:var(--text-muted); font-weight:300; font-size:0.9rem;">${(item.p * item.qty).toFixed(2)} €</div>
                    </div>
                    <div class="cart-qty-controls">
                        <button class="qty-btn" onclick="updateCartQty(${idx}, -1)">−</button>
                        <span style="font-weight:600; color:var(--text-main); font-size:1rem; min-width:20px; text-align:center;">${item.qty}</span>
                        <button class="qty-btn" style="color:var(--gold);" onclick="updateCartQty(${idx}, 1)">+</button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('cart-total-footer').innerText = totalPrice.toFixed(2) + " €";
        }

        async function sendOrder() {
            if (cart.length === 0) return;

            document.getElementById('cart-modal').classList.remove('open');
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader').innerHTML = `
                <div class="spinner"></div>
                <div style="color: var(--text-muted); font-weight: 300; letter-spacing: 2px; text-transform:uppercase; font-size:0.8rem;">Transmission...</div>
            `;

            let totalPrice = cart.reduce((acc, i) => acc + (i.p * i.qty), 0);
            let orderKey = "order_" + Date.now(); 

            let payload = {
                data: {
                    isWeb: true,
                    status: "hold", 
                    time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
                    clientName: tableNumber === "SANS TABLE" ? "Commande Mobile" : "Table " + tableNumber,
                    totalStr: totalPrice.toFixed(2) + " €",
                    items: cart.map(i => ({
                        id: Date.now() + Math.random(),
                        itemId: Date.now(),
                        n: i.n,
                        p: i.p,
                        qty: i.qty,
                        course: i.course,
                        dest: i.dest,
                        done: false,
                        fired: false, 
                        isOffered: false
                    }))
                }
            };

            try {
                await API.update(orderKey, payload);
                await API.update('ALERTS_MASTER', { data: { type: 'RING', message: `📱 NOUVELLE COMMANDE WEB (Table ${tableNumber})`, timestamp: Date.now() } });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('menu-container').style.display = 'none';
                document.getElementById('category-nav').style.display = 'none';
                document.getElementById('floating-cart').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';

                cart = [];

            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                alert("Erreur réseau. Merci de vous rapprocher d'un serveur.");
            }
        }

        window.onload = initApp;

    </script>
</body>
</html>
