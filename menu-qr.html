<!DOCTYPE html>
<html lang="fr">
<head>
    <script>
        // 🛡️ GARDE DU CORPS iCHEF
        (async function checkAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";
            
            if(!tenantID) return window.location.href = 'portail-client.html';

            try {
                const res = await fetch(`${SERVER_URL}/api/check-license?tenantID=${tenantID}&_t=${Date.now()}`, { cache: 'no-store' });
                const data = await res.json();
                
                if(!data.success || data.status === 'SUSPENDU') {
                    alert("⛔ LICENCE SUSPENDUE OU INVALIDE.");
                    return window.location.href = 'portail-client.html';
                }

                const plan = data.plan ? data.plan.toString().toUpperCase() : '';

                if (plan === 'CHEF' || plan === 'CHEF_CUISINE' || plan === 'CHEF_PATISSIER' || plan === 'CHEF_BAR') {
                    alert(`⛔ ACCÈS REFUSÉ :\nVotre forfait actuel (${plan}) n'inclut pas ce module Menu.\nVeuillez upgrader votre offre pour y accéder.`);
                    try { window.close(); } catch(e) {}
                    setTimeout(() => { window.location.href = `portail-client.html?tenantID=${tenantID}`; }, 100);
                }
            } catch(e) {
                console.log("Mode hors-ligne actif. Vérification des accès retardée.");
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>La Carte - Maison d'Exception</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        /* 🟢 DESIGN HAUTE COUTURE 🟢 */
        :root { 
            --bg-color: #050505;            
            --text-main: #f5f5f5;   
            --text-muted: #888888;   
            --gold: #d4af37;
            --gold-dim: rgba(212, 175, 55, 0.15);
            --border-color: #1a1a1a;
            
            --font-title: 'Cormorant Garamond', serif;
            --font-text: 'Montserrat', sans-serif;
        }
        
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            display: flex;
            justify-content: center;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s, color 0.5s;
        }

        .kiosk-wrapper {
            width: 100%;
            max-width: 1080px; 
            min-height: 100vh;
            background: var(--bg-color);
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            position: relative;
            padding-bottom: 120px; /* Espace pour le panier */
        }

        header { 
            text-align: center; 
            padding: 60px 20px 40px; 
            background: radial-gradient(circle at center, rgba(255,255,255,0.05) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-color);
            position: relative;
        }

        .btn-kiosk {
            position: absolute; top: 20px; right: 20px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 12px;
            border-radius: 4px; font-size: 0.7rem; font-weight: 600; font-family: var(--font-text);
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: 0.3s; z-index: 100;
        }
        .btn-kiosk:hover { color: var(--gold); border-color: var(--gold); background: rgba(212, 175, 55, 0.1); }
        
        .logo-text { font-family: var(--font-title); color: var(--gold); font-size: 3.5rem; font-weight: 300; letter-spacing: 12px; margin: 0; text-transform: uppercase; }
        .subtitle { font-family: var(--font-text); color: var(--text-muted); font-size: 1rem; letter-spacing: 6px; margin-top: 15px; text-transform: uppercase; }
        .menu-container { padding: 40px; }

        .category-section, .tasting-menu-box {
            position: relative; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color);
            padding: 50px 60px; margin-bottom: 50px; opacity: 0; transform: translateY(20px);
            animation: fadeUp 0.8s ease-out forwards; box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        .category-section::before, .tasting-menu-box::before {
            content: ''; position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
            border: 1px solid var(--gold-dim); pointer-events: none;
        }

        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .category-title {
            font-family: var(--font-title); color: var(--gold); font-size: 2.5rem; font-weight: 300; letter-spacing: 6px;
            text-align: center; text-transform: uppercase; margin: 0; position: absolute; top: -25px; left: 50%;
            transform: translateX(-50%); background: var(--bg-color); padding: 0 30px; white-space: nowrap;
        }

        .tasting-menu-box { background: linear-gradient(180deg, rgba(255,255,255,0.02) 0%, transparent 100%); border-color: rgba(212, 175, 55, 0.3); text-align: center; }
        .tasting-menu-box::before { border: 1px solid rgba(212, 175, 55, 0.4); }
        .tasting-price { font-family: var(--font-text); font-size: 1.3rem; color: var(--gold); margin-bottom: 40px; letter-spacing: 3px; }
        .tasting-course { font-family: var(--font-title); font-size: 1.8rem; color: var(--text-main); margin-bottom: 25px; font-style: italic; }
        .tasting-course-label { font-family: var(--font-text); font-size: 0.85rem; color: var(--gold); text-transform: uppercase; letter-spacing: 3px; display: block; margin-bottom: 8px; font-style: normal; }

        /* 🟢 LIGNES DE PLATS CLIQUABLES 🟢 */
        .menu-item { margin-bottom: 30px; position: relative; z-index: 2; cursor: pointer; padding: 15px; border-radius: 8px; transition: background 0.3s, transform 0.2s; }
        .menu-item:last-child { margin-bottom: 0; }
        .menu-item:hover { background: rgba(212, 175, 55, 0.05); transform: scale(1.02); }
        .menu-item:active { transform: scale(0.98); }
        
        .item-row { display: flex; align-items: baseline; margin-bottom: 8px; }
        .item-name { font-family: var(--font-title); font-size: 1.8rem; font-weight: 400; letter-spacing: 1px; color: var(--text-main); margin: 0; white-space: nowrap; }
        .item-dots { flex-grow: 1; border-bottom: 2px dotted rgba(255, 255, 255, 0.15); margin: 0 15px; position: relative; top: -8px; }
        .item-price { font-family: var(--font-text); font-size: 1.2rem; color: var(--gold); font-weight: 400; white-space: nowrap; }
        .item-desc { font-family: var(--font-text); color: var(--text-muted); font-size: 1rem; line-height: 1.6; font-weight: 300; max-width: 90%; }
        .add-badge { font-family: var(--font-text); font-size: 0.7rem; color: var(--bg-color); background: var(--gold); padding: 3px 8px; border-radius: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-left: 15px; opacity: 0.8;}

        .loading-screen { font-family: var(--font-title); text-align: center; padding: 100px 20px; font-size: 2rem; color: var(--gold); font-style: italic; letter-spacing: 2px; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        .footer { text-align: center; padding: 40px; font-family: var(--font-text); color: rgba(255,255,255,0.2); font-size: 0.8rem; border-top: 1px solid var(--border-color); letter-spacing: 2px; text-transform: uppercase; }

        /* 🛒 PANIER FLOTTANT ET MODALE 🛒 */
        .cart-fab {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: var(--gold); color: #000; padding: 15px 30px; border-radius: 50px;
            font-family: var(--font-text); font-weight: 600; font-size: 1rem; text-transform: uppercase;
            letter-spacing: 2px; box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
            display: none; align-items: center; justify-content: center; gap: 10px;
            cursor: pointer; z-index: 1000; transition: transform 0.2s; border: none;
        }
        .cart-fab:active { transform: translateX(-50%) scale(0.95); }
        .cart-badge { background: #000; color: var(--gold); width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }

        .cart-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: flex-end;
        }
        .cart-content {
            background: var(--bg-color); width: 100%; max-width: 600px; max-height: 85vh;
            border-top-left-radius: 20px; border-top-right-radius: 20px; border-top: 1px solid var(--gold);
            padding: 30px 20px; box-sizing: border-box; display: flex; flex-direction: column;
            animation: slideUp 0.3s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .cart-title { font-family: var(--font-title); color: var(--gold); font-size: 2rem; margin: 0; text-transform: uppercase; letter-spacing: 2px;}
        .close-cart { background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }

        .cart-items { flex: 1; overflow-y: auto; padding-right: 10px; margin-bottom: 20px; }
        .cart-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 8px; margin-bottom: 10px; border: 1px solid var(--border-color); }
        .cart-item-name { font-family: var(--font-text); font-weight: 500; font-size: 1rem; color: var(--text-main); }
        .cart-item-price { font-family: var(--font-text); font-weight: 400; color: var(--gold); }
        .cart-controls { display: flex; align-items: center; gap: 15px; background: #000; padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border-color);}
        .cart-btn { background: transparent; border: none; color: var(--gold); font-size: 1.2rem; cursor: pointer; padding: 0 5px;}
        
        .cart-footer { padding-top: 20px; border-top: 1px solid var(--border-color); }
        .cart-total-row { display: flex; justify-content: space-between; font-family: var(--font-title); font-size: 2rem; color: var(--text-main); margin-bottom: 20px; }
        .btn-checkout { width: 100%; background: var(--gold); color: #000; border: none; padding: 18px; border-radius: 8px; font-family: var(--font-text); font-weight: 600; font-size: 1.1rem; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: 0.3s; }
        .btn-checkout:active { transform: scale(0.98); }

        @media (max-width: 800px) {
            .menu-container { padding: 20px; }
            .category-section, .tasting-menu-box { padding: 40px 20px; margin-bottom: 40px; }
            .logo-text { font-size: 2.5rem; }
            .category-title { font-size: 1.8rem; padding: 0 15px; top: -18px; }
            .item-name { font-size: 1.2rem; white-space: normal; }
            .item-dots { display: none; }
            .item-row { flex-direction: column; gap: 5px; }
            .item-price { align-self: flex-start; }
            .tasting-course { font-size: 1.4rem; }
        }
    </style>
</head>
<body>

    <div class="kiosk-wrapper">
        <header>
            <button id="btn-kiosk" class="btn-kiosk">⛶</button>
            <h1 class="logo-text">NOTRE MAISON</h1>
            <div class="subtitle">La Carte</div>
        </header>

        <div class="menu-container" id="menu-container">
            <div class="loading-screen">Mise à jour des créations du Chef...</div>
        </div>

        <div class="footer">
            Prix nets en <span id="footer-currency">Euros</span> — Service compris<br>
            <span style="font-size: 0.6rem; opacity: 0.5; margin-top: 10px; display: block;">Propulsé par I CHEF</span>
        </div>
    </div>

    <button id="cart-fab" class="cart-fab" onclick="toggleCart()">
        🍽️ Ma Commande <div id="cart-badge" class="cart-badge">0</div>
    </button>

    <div id="cart-modal" class="cart-modal" onclick="if(event.target===this) toggleCart()">
        <div class="cart-content">
            <div class="cart-header">
                <h2 class="cart-title">Votre Sélection</h2>
                <button class="close-cart" onclick="toggleCart()">✕</button>
            </div>
            <div id="cart-items" class="cart-items">
                </div>
            <div class="cart-footer">
                <div class="cart-total-row">
                    <span>Total</span>
                    <span id="cart-total-price" style="color: var(--gold);">0.00 €</span>
                </div>
                <button class="btn-checkout" onclick="checkout()">Envoyer en Cuisine</button>
            </div>
        </div>
    </div>

    <script>
        // 🎨 CHARGEMENT DES POLICES
        const fontsToLoad = [
            'Playfair Display', 'Montserrat', 'Roboto', 'Cinzel', 'Oswald', 
            'Lato', 'Great Vibes', 'Lora', 'Cormorant Garamond', 'Josefin Sans', 
            'Nunito', 'PT Serif', 'Merriweather', 'Abril Fatface'
        ];
        const fontLink = document.createElement('link');
        fontLink.rel = 'stylesheet';
        fontLink.href = `https://fonts.googleapis.com/css2?${fontsToLoad.map(f => `family=${f.replace(/ /g, '+')}:wght@400;500;600;900`).join('&')}&display=swap`;
        document.head.appendChild(fontLink);

        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        const tableNum = urlParams.get('table') || 'Non Précisée';
        
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" 
            : "https://tableau-system.onrender.com";

        // VARIABLES GLOBALES
        let currentCurrency = "€";
        let currencyName = "Euros";
        let systemSettings = {}; 
        
        let categoriesMap = [];
        let currentMenuData = null;
        let lastDesignHash = "";

        // 🛒 VARIABLES PANIER
        let cart = [];

        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}&_t=${Date.now()}`, { cache: 'no-store' });
                    if(r.ok) state = await r.json();
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            }
        };

        async function fetchMenu() {
            try {
                const state = await API.getState();
                
                // LECTURE DES PARAMÈTRES
                if (state.activeOrders && state.activeOrders['SETTINGS_MASTER'] && state.activeOrders['SETTINGS_MASTER'].data) {
                    systemSettings = state.activeOrders['SETTINGS_MASTER'].data;
                    
                    if (systemSettings.currency && systemSettings.currency !== currentCurrency) {
                        currentCurrency = systemSettings.currency;
                        let nameMap = {"€": "Euros", "CHF": "Francs Suisses", "$": "Dollars", "C$": "Dollars", "£": "Livres", "¥": "Yens", "MAD": "Dirhams", "CFA": "Francs CFA"};
                        currencyName = nameMap[currentCurrency] || currentCurrency;
                        document.getElementById('footer-currency').innerText = currencyName;
                        currentMenuData = null; 
                    }

                    if (systemSettings.design) {
                        let designHash = JSON.stringify(systemSettings.design);
                        if(designHash !== lastDesignHash) {
                            document.documentElement.style.setProperty('--bg-color', systemSettings.design.bgColor || '#050505');
                            document.documentElement.style.setProperty('--text-main', systemSettings.design.textColor || '#f5f5f5');
                            if (systemSettings.design.fontFamily) {
                                document.documentElement.style.setProperty('--font-title', systemSettings.design.fontFamily);
                                document.documentElement.style.setProperty('--font-text', systemSettings.design.fontFamily);
                            }
                            lastDesignHash = designHash;
                        }
                    }
                }

                // LECTURE DE LA CARTE FUSIONNÉE
                if (state && state.activeOrders && state.activeOrders['MENU_ARCHITECTURE']) {
                    let rawArchitecture = state.activeOrders['MENU_ARCHITECTURE'].data || state.activeOrders['MENU_ARCHITECTURE'];
                    let newDataStr = JSON.stringify(rawArchitecture);
                    
                    if (newDataStr !== JSON.stringify(currentMenuData)) {
                        currentMenuData = JSON.parse(newDataStr);
                        
                        categoriesMap = Object.keys(currentMenuData).map(key => {
                            return { id: key, label: key, isTasting: key.toLowerCase().replace(/[^a-z]/g, '').includes('jour') };
                        });
                        renderClientMenu();
                    }
                } else if (!currentMenuData) {
                    document.getElementById('menu-container').innerHTML = '<div class="loading-screen">La carte n\'est pas encore disponible.</div>';
                }
            } catch(e) { console.error("Erreur de synchronisation:", e); }
        }

        // 🛒 FONCTIONS DU PANIER
        // La fonction decodeURIComponent permet de lire les noms avec apostrophes proprement sans casser le code
        function addToCart(encodedName, priceStr) {
            let name = decodeURIComponent(encodedName);
            let price = parseFloat(priceStr) || 0;
            
            let existing = cart.find(i => i.name === name);
            if (existing) {
                existing.qty++;
            } else {
                cart.push({ name: name, price: price, qty: 1 });
            }
            updateCartUI();
            
            const fab = document.getElementById('cart-fab');
            fab.style.transform = 'translateX(-50%) scale(1.1)';
            setTimeout(() => fab.style.transform = 'translateX(-50%) scale(1)', 200);
        }

        function changeQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) {
                cart.splice(index, 1);
            }
            updateCartUI();
            if (cart.length === 0) toggleCart();
        }

        function updateCartUI() {
            let totalItems = cart.reduce((sum, item) => sum + item.qty, 0);
            let totalPrice = cart.reduce((sum, item) => sum + (item.price * item.qty), 0);
            
            document.getElementById('cart-badge').innerText = totalItems;
            document.getElementById('cart-total-price').innerText = totalPrice.toFixed(2) + ' ' + currentCurrency;
            
            if (totalItems > 0) {
                document.getElementById('cart-fab').style.display = 'flex';
            } else {
                document.getElementById('cart-fab').style.display = 'none';
            }
            
            if (document.getElementById('cart-modal').style.display === 'flex') {
                renderCartModal();
            }
        }

        function renderCartModal() {
            const container = document.getElementById('cart-items');
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px; color:var(--text-muted); font-family:var(--font-text);">Votre commande est vide.</div>';
                return;
            }

            container.innerHTML = cart.map((item, index) => `
                <div class="cart-item">
                    <div style="flex: 1;">
                        <div class="cart-item-name">${item.name}</div>
                        <div class="cart-item-price">${(item.price * item.qty).toFixed(2)} ${currentCurrency}</div>
                    </div>
                    <div class="cart-controls">
                        <button class="cart-btn" onclick="changeQty(${index}, -1)">−</button>
                        <span style="color:var(--text-main); font-weight:bold; font-family:var(--font-text); width:20px; text-align:center;">${item.qty}</span>
                        <button class="cart-btn" onclick="changeQty(${index}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        function toggleCart() {
            const modal = document.getElementById('cart-modal');
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                if (cart.length > 0) {
                    renderCartModal();
                    modal.style.display = 'flex';
                }
            }
        }

        // 🚀 FONCTION D'ENVOI DE LA COMMANDE
        async function checkout() {
            if (cart.length === 0) return;

            const btn = document.querySelector('.btn-checkout');
            btn.innerText = "Transmission...";
            btn.disabled = true;

            let total = cart.reduce((sum, i) => sum + (i.price * i.qty), 0);
            
            let itemsFormattees = cart.map(item => {
                return { n: item.name, p: item.price, qty: item.qty }; 
            });
            
            let isOnlinePayment = systemSettings.payment && systemSettings.payment.online;
            let stripeLink = systemSettings.payment ? systemSettings.payment.stripeLink : "";

            let orderData = {
                items: itemsFormattees,
                total: total,
                time: Date.now(),
                table: tableNum,
                status: isOnlinePayment ? "EN ATTENTE PAIEMENT" : "NOUVELLE COMMANDE",
                typePaiement: isOnlinePayment ? "Stripe" : "À table",
                source: "QR Code"
            };

            let ticketId = `WEB_${tableNum.replace(/\s+/g, '')}_${Math.floor(Math.random() * 10000)}`;

            try {
                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: ticketId, order: orderData })
                });

                if (isOnlinePayment && stripeLink) {
                    alert("Commande enregistrée ! Vous allez être redirigé vers le module de paiement.");
                    window.location.href = stripeLink; 
                } else {
                    alert("✅ Votre commande a bien été envoyée en cuisine !");
                    cart = [];
                    updateCartUI();
                    toggleCart();
                }
            } catch(e) {
                console.error(e);
                alert("❌ Erreur de transmission. Veuillez appeler un serveur.");
            } finally {
                btn.innerText = "Envoyer en Cuisine";
                btn.disabled = false;
            }
        }

        // 🎨 RENDU DES PLATS (ENCODAGE SÉCURISÉ)
        function renderTastingMenu(item) {
            let cleanName = item.name ? item.name.replace('🌟 ', '') : "Plat inconnu";
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
            
            // L'encodage URI permet de passer n'importe quel caractère spécial sans casser le clic !
            let encodedName = encodeURIComponent(cleanName);
            let safePrice = item.price || 0;
            
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let html = `
                <div class="tasting-menu-box menu-item" onclick="addToCart('${encodedName}', '${safePrice}')">
                    <h2 class="category-title">Menu du Jour</h2>
                    <div class="tasting-price">${priceStr} <span class="add-badge">+ Ajouter</span></div>
                `;
                let labels = ['Entrée', 'Plat', 'Dessert', 'Fromage / Suite'];
                parts.forEach((part, index) => {
                    if (part.trim() !== '') {
                        let label = labels[index] || '';
                        html += `<div class="tasting-course"><span class="tasting-course-label">${label}</span>${part.trim()}</div>`;
                    }
                });
                html += `</div>`;
                return html;
            }
            
            return `
            <div class="tasting-menu-box menu-item" onclick="addToCart('${encodedName}', '${safePrice}')">
                <h2 class="category-title">Menu du Jour</h2>
                <div class="tasting-price">${priceStr} <span class="add-badge">+ Ajouter</span></div>
                <div class="tasting-course">${cleanName}</div>
            </div>`;
        }

        function renderStandardItem(item) {
            let cleanName = item.name ? item.name.replace('🌟 ', '') : "Plat inconnu";
            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
            
            let encodedName = encodeURIComponent(cleanName);
            let safePrice = item.price || 0;

            let mainName = cleanName;
            let description = '';

            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                mainName = parts[0].trim();
                description = parts.slice(1).join(' ').trim();
            }

            let descHtml = description ? `<div class="item-desc">${description}</div>` : '';

            return `
            <div class="menu-item" onclick="addToCart('${encodedName}', '${safePrice}')">
                <div class="item-row">
                    <div class="item-name">${mainName}</div>
                    <div class="item-dots"></div>
                    <div class="item-price">${priceStr} <span class="add-badge">+ Ajouter</span></div>
                </div>
                ${descHtml}
            </div>`;
        }

        function renderClientMenu() {
            const container = document.getElementById('menu-container');
            if (!currentMenuData) return;

            let htmlContent = '';

            categoriesMap.forEach((cat, index) => {
                let items = currentMenuData[cat.id];
                
                if (items && Array.isArray(items)) {
                    let availableItems = items.filter(item => item.stock !== 0 && item.stock !== "0" && item.hidden !== true);

                    if (availableItems.length > 0) {
                        if (cat.isTasting) {
                            availableItems.forEach(item => {
                                htmlContent += renderTastingMenu(item);
                            });
                        } 
                        else {
                            htmlContent += `<div class="category-section" style="animation-delay: ${index * 0.15}s;"><h2 class="category-title"><span>${cat.label}</span></h2>`;
                            availableItems.forEach(item => {
                                htmlContent += renderStandardItem(item);
                            });
                            htmlContent += `</div>`;
                        }
                    }
                }
            });

            if (htmlContent === '') htmlContent = '<div class="loading-screen">Le service est actuellement terminé.</div>';
            container.innerHTML = htmlContent;
        }

        fetchMenu();
        setInterval(fetchMenu, 3000);

        document.getElementById('btn-kiosk').addEventListener('click', () => {
            const elem = document.documentElement;
            const btn = document.getElementById('btn-kiosk');
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen(); 
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen(); 
                btn.innerText = "✕";
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                btn.innerText = "⛶";
            }
        });
    </script>
</body>
</html>
