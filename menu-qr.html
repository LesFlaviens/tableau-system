<!DOCTYPE html>
<html lang="fr">
<head>
 <script>
        // 🛡️ GARDE DU CORPS iCHEF : CONTRÔLE STRICT DES ACCÈS B2B
        (async function checkAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";
            
            // S'il n'a pas d'ID, on le jette dehors
            if(!tenantID) return window.location.href = 'vitrine.html';

            try {
                const res = await fetch(`${SERVER_URL}/api/check-license?tenantID=${tenantID}`);
                const data = await res.json();
                
                // Si le compte est effacé ou suspendu
                if(!data.success || data.status === 'SUSPENDU') {
                    alert("⛔ LICENCE SUSPENDUE OU INVALIDE.");
                    return window.location.href = 'vitrine.html';
                }

                const plan = data.plan; // 'CHEF', 'BUSINESS', ou 'PREMIUM'
                const currentPage = window.location.pathname.split('/').pop().toLowerCase();

                // Les pages autorisées selon le forfait
                let allowedPages = [];

                if (plan === 'CHEF') {
                    allowedPages = ['administration.html', 'portail-client.html', 'chef.html', 'chef-patissier.html', 'chef-bar.html'];
                } else if (plan === 'BUSINESS') {
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'menu-pure.html', 'menu-bar.html', 'bar.html', 'chef-bar.html'];
                } else if (plan === 'PREMIUM') {
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'chef.html', 'chef-patissier.html', 'menu-pure.html', 'chef-bar.html', 'bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'cuisinie.html', 'planning-cuisine.html', 'production.html'];
                }

                if (currentPage !== '' && !allowedPages.includes(currentPage)) {
                    alert(`⛔ ACCÈS REFUSÉ :\nVotre forfait actuel (${plan}) n'inclut pas ce module.\nVeuillez upgrader votre offre pour y accéder.`);
                    
                    // Tente de fermer l'onglet (utile s'il a été ouvert via target="_blank")
                    try {
                        window.close();
                    } catch(e) {}
                    
                    // Si l'onglet refuse de se fermer, on le renvoie de force à l'administration
                    setTimeout(() => {
                        window.location.href = `administration.html?tenantID=${tenantID}`;
                    }, 100);
                }

            } catch(e) {
                console.log("Mode hors-ligne actif. Vérification des accès retardée.");
            }
        })();
    </script>

    <style>
        /* 🚫 CACHER LES FLÈCHES DES CHAMPS NOMBRES PARTOUT 🚫 */

        input[type="number"]::-webkit-outer-spin-button {

        /* 🟢 DESIGN DYNAMIQUE (Les valeurs seront écrasées par le JS selon les réglages Admin) 🟢 */

        /* ONGLETS CATÉGORIES */
        .cat-scroll {
            display: flex; gap: 15px; overflow-x: auto; padding: 20px 30px;

        .cat-tab.special-resa { border-color: var(--accent); color: var(--accent); }

        /* ZONES PRINCIPALES */
        .main-zone { flex: 1; overflow-y: auto; padding: 30px; padding-bottom: 120px; }
        
        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 15px; align-content: start;
        }

        /* CARTE PRODUIT */
        .item-card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 12px; padding: 20px; display: flex; justify-content: space-between; align-items: center;
            transition: 0.2s; cursor: pointer;

        .item-card:active { transform: scale(0.98); border-color: var(--gold); }
        .item-info { display: flex; flex-direction: column; gap: 8px; }

        /* PANIER FLOTTANT */
        .floating-cart {

        /* --- STYLES RESERVATION --- */
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; font-weight: 600; margin-bottom: 8px; letter-spacing: 1px; }
        input[type="text"], input[type="tel"], input[type="date"], input[type="time"], input[type="number"], select, textarea { width: 100%; padding: 15px; background: var(--panel); border: 1px solid var(--border); color: var(--text-main); border-radius: 8px; font-size: 1rem; font-family: var(--font-family); box-sizing: border-box; outline: none; transition: 0.3s; color-scheme: dark;}

        .btn-back-menu:hover { background: rgba(255,255,255,0.05); color: inherit; }

        /* MODALE PANIER */
        .modal {

        .modal.open { display: flex; }

        .cart-items-list { flex: 1; overflow-y: auto; padding: 20px; }

        .btn-checkout:active { transform: scale(0.98); }
        .btn-online { background: var(--gold); box-shadow: 0 10px 20px var(--gold-dim); }

        /* Écran Succès */
        #success-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 3000; display: none; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; font-family: var(--font-family);}
    </style>

    <script>
        // --- CONFIGURATION DU SERVEUR ---
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
        ? "http://localhost:10000" 
        : "https://tableau-system.onrender.com";

        // Affichage du numéro de table sur le menu
        document.getElementById('table-display').innerText = "TABLE " + tableLabel.toUpperCase();

        // 🌍 VARIABLE MULTIDEVISE GLOBALE
        let currentCurrency = "€";

        let menuData = [];
        let cart = [];
        let currentCat = '';
        let lastMenuCat = ''; 
        let lastMenuHash = "";
        let lastDesignHash = "";
        
        // 💳 VARIABLE POUR LE LIEN DU RESTAURANT
        let restaurantStripeLink = "";

        const cacheKey = `empire_menu_cache_${tenantID}`;
        let cachedMenuStr = localStorage.getItem(cacheKey);
        
        if (cachedMenuStr) {
            try {
                menuData = JSON.parse(cachedMenuStr);
                lastMenuHash = JSON.stringify(menuData); 
                renderTabs();
                if (menuData.length > 0) selectCategory(menuData[0].id, true);
            } catch(e) {
                console.warn("Cache invalide, attente du serveur.");
            }
        }

        // Fonction utilitaire pour le CSS dynamique
        function shadeColor(color, percent) {
            let R = parseInt(color.substring(1,3),16);
            let G = parseInt(color.substring(3,5),16);
            let B = parseInt(color.substring(5,7),16);

            R = parseInt(R * (100 + percent) / 100);
            G = parseInt(G * (100 + percent) / 100);
            B = parseInt(B * (100 + percent) / 100);

            R = (R<255)?R:255;  
            G = (G<255)?G:255;  
            B = (B<255)?B:255;  

            R = Math.round(R); G = Math.round(G); B = Math.round(B);

            let RR = ((R.toString(16).length==1)?"0"+R.toString(16):R.toString(16));
            let GG = ((G.toString(16).length==1)?"0"+G.toString(16):G.toString(16));
            let BB = ((B.toString(16).length==1)?"0"+B.toString(16):B.toString(16));

            return "#"+RR+GG+BB;
        }

        // 🟢 MOTEUR DE SYNCHRONISATION H24
        async function fetchMenuH24() {
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                let state = await r.json();
                let activeOrders = state.activeOrders || {};
                
                let catsCuis = activeOrders['CATEGORIES_CUISINE']?.data || activeOrders['CATEGORIES_CUISINE'] || [];
                let catsBar = activeOrders['CATEGORIES_BAR']?.data || activeOrders['CATEGORIES_BAR'] || [];
                let mCuis = activeOrders['MENU_MASTER']?.data || activeOrders['MENU_MASTER'] || {};
                let mBar = activeOrders['MENU_MASTER_BAR']?.data || activeOrders['MENU_MASTER_BAR'] || {};

                // 💳 SYNC DES PARAMÈTRES (Paiement + DESIGN)
                let settingsData = activeOrders['SETTINGS_MASTER']?.data || activeOrders['SETTINGS_MASTER'] || {};
                
                // --- PAIEMENT ---
                if (settingsData.payment) {
                    const btnOnline = document.getElementById('btn-pay-online');
                    const btnServer = document.getElementById('btn-pay-server');
                    
                    restaurantStripeLink = settingsData.payment.stripeLink || "";
                    
                    if(btnOnline) {
                        btnOnline.style.display = (settingsData.payment.online && restaurantStripeLink !== "") ? 'block' : 'none';
                    }
                    if(btnServer) btnServer.style.display = settingsData.payment.server ? 'block' : 'none';
                }

                // --- DESIGN DYNAMIQUE TEMPS RÉEL ET DEVISE ---
                if (settingsData.currency && settingsData.currency !== currentCurrency) {
                    currentCurrency = settingsData.currency;
                    lastMenuHash = ""; // Force update to refresh prices
                }

                if (settingsData.design) {
                    let designHash = JSON.stringify(settingsData.design);
                    if (designHash !== lastDesignHash) {
                        document.documentElement.style.setProperty('--bg', settingsData.design.bgColor || '#0a0a0a');
                        document.documentElement.style.setProperty('--panel', shadeColor(settingsData.design.bgColor || '#0a0a0a', 5));
                        document.documentElement.style.setProperty('--border', shadeColor(settingsData.design.bgColor || '#0a0a0a', 15));
                        
                        document.documentElement.style.setProperty('--text-main', settingsData.design.textColor || '#ffffff');
                        document.documentElement.style.setProperty('--text-muted', shadeColor(settingsData.design.textColor || '#ffffff', -40));
                        
                        if (settingsData.design.fontFamily) {
                            document.documentElement.style.setProperty('--font-family', settingsData.design.fontFamily);
                        }
                        lastDesignHash = designHash;
                    }
                }

                // --- MENU & STOCKS ---
                let newMenuData = [];
                catsCuis.forEach(cat => { if(mCuis[cat.id]) newMenuData.push({ category: cat.label, id: cat.id, items: mCuis[cat.id].map(i => ({...i, dest: 'cuisine'})) }); });
                catsBar.forEach(cat => { if(mBar[cat.id]) newMenuData.push({ category: "🍸 " + cat.label, id: cat.id, items: mBar[cat.id].map(i => ({...i, dest: 'bar'})) }); });

                let newHash = JSON.stringify(newMenuData);
                
                if (newHash !== lastMenuHash) {
                    menuData = newMenuData;
                    lastMenuHash = newHash;
                    localStorage.setItem(cacheKey, newHash); 
                    
                    if(document.getElementById('cat-tabs').innerHTML.includes('Chargement')) {
                        renderTabs();
                        if (menuData.length > 0) selectCategory(menuData[0].id);
                    } else {
                        // Rafraîchir la vue actuelle pour appliquer les changements de stock (Épuisé / Disparition)
                        if(currentCat && currentCat !== 'resa') selectCategory(currentCat, true);
                    }
                }
            } catch (e) {
                console.log("Mode hors-ligne ou attente réseau...");
            }
        }

        fetchMenuH24();
        setInterval(fetchMenuH24, 4000); // ⏱️ Rafraîchissement silencieux toutes les 4 secondes

        // --- AFFICHAGE ---
        function renderTabs() {
            let tabsHtml = `<button class="cat-tab special-resa" id="tab-resa" onclick="showReservationView()">📅 RÉSERVER UNE TABLE</button>`;
            tabsHtml += menuData.map(cat => `<button class="cat-tab" id="tab-${cat.id}" onclick="selectCategory('${cat.id}')">${cat.category}</button>`).join('');
            document.getElementById('cat-tabs').innerHTML = tabsHtml;
        }

        function showReservationView() {
            currentCat = 'resa';
            document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-resa').classList.add('active');
            document.getElementById('menu-grid').style.display = 'none';
            document.getElementById('reservation-view').style.display = 'block';
            document.getElementById('floating-cart').style.display = 'none';
        }

        function backToMenu() {
            document.getElementById('reservation-view').style.display = 'none';
            document.getElementById('menu-grid').style.display = 'grid';
            if(cart.length > 0) document.getElementById('floating-cart').style.display = 'flex';

            if (lastMenuCat) {
                selectCategory(lastMenuCat);
            } else if (menuData.length > 0) {
                selectCategory(menuData[0].id);
            } else {
                document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
            }
        }

        function selectCategory(catId, silentUpdate = false) {
            currentCat = catId;
            if (catId !== 'resa') lastMenuCat = catId;

            document.querySelectorAll('.cat-tab').forEach(b => b.classList.remove('active'));
            const activeTab = document.getElementById(`tab-${catId}`);
            if(activeTab) {
                activeTab.classList.add('active');
                if(!silentUpdate) activeTab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            document.getElementById('reservation-view').style.display = 'none';
            document.getElementById('menu-grid').style.display = 'grid';
            if(cart.length > 0) document.getElementById('floating-cart').style.display = 'flex';

            const catData = menuData.find(c => c.id === catId);
            const grid = document.getElementById('menu-grid');
            if (!catData || catData.items.length === 0) {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:30px;">Catégorie vide.</div>';
                return;
            }

            grid.innerHTML = catData.items.map((item) => {
                let isSoldOut = (item.stock !== undefined && item.stock !== null && item.stock !== "" && parseInt(item.stock) === 0);
                
                // 🛑 RÈGLE D'OR : On n'affiche RIEN si c'est masqué par l'admin OU si c'est en rupture (stock = 0)
                if (item.hidden === true || isSoldOut) return '';
                
                let price = parseFloat(item.price || 0).toFixed(2);
                let cleanName = item.name.replace(/\[BR\]/g, ' ');
                let escapedName = cleanName.replace(/'/g, "\\'").replace(/"/g, '&quot;');

                // L'affichage de la carte ne contient plus la notion de quantité ni de bouton épuisé
                return `
                <div class="item-card" onclick="addToCart('${escapedName}', ${price}, '${item.dest}')">
                    <div class="item-info">
                        <span class="item-name">${cleanName}</span>
                        <span class="item-price">${price} ${currentCurrency}</span>
                    </div>
                    <button class="add-btn">+</button>
                </div>`;
            }).join('');

            // Si la catégorie est vide après filtrage des ruptures/masqués
            if (grid.innerHTML.trim() === '') {
                grid.innerHTML = '<div style="grid-column:1/-1; text-align:center; color:var(--text-muted); padding:30px; font-style:italic;">Tous les articles de cette catégorie sont actuellement indisponibles.</div>';
            }
        }

        // --- GESTION PANIER ---
        function addToCart(name, price, dest) {
            let existing = cart.find(i => i.n === name);
            if (existing) existing.qty++;
            else cart.push({ n: name, p: price, dest: dest, qty: 1, course: dest === 'bar' ? 0 : 2 });
            if (navigator.vibrate) navigator.vibrate(50);
            updateCartUI();
        }

        function updateItemQty(index, delta) {
            cart[index].qty += delta;
            if (cart[index].qty <= 0) cart.splice(index, 1);
            updateCartUI();
            if (cart.length === 0) closeCart();
        }

        function updateCartUI() {
            let total = 0; let count = 0;
            let listHtml = cart.map((item, idx) => {
                total += (item.p * item.qty); count += item.qty;
                return `
                <div class="cart-item">
                    <div style="flex:1;">
                        <div style="font-weight:bold; color:var(--text-main); font-size:1.1rem; margin-bottom:5px;">${item.n}</div>
                        <div style="color:var(--gold); font-weight:900;">${(item.p * item.qty).toFixed(2)} ${currentCurrency}</div>
                    </div>
                    <div class="cart-item-controls">
                        <button class="ctrl-btn" onclick="updateItemQty(${idx}, -1)">-</button>
                        <span style="font-weight:900; font-size:1.2rem; width:20px; text-align:center;">${item.qty}</span>
                        <button class="ctrl-btn" onclick="updateItemQty(${idx}, 1)">+</button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('cart-items-list').innerHTML = listHtml;
            document.getElementById('cart-count').innerText = count;
            document.getElementById('cart-total').innerText = total.toFixed(2) + " " + currentCurrency;
            document.getElementById('modal-total').innerText = total.toFixed(2) + " " + currentCurrency;

            if (count > 0 && currentCat !== 'resa') document.getElementById('floating-cart').style.display = 'flex';
            else document.getElementById('floating-cart').style.display = 'none';
        }

        function openCart() { document.getElementById('cart-modal').classList.add('open'); }
        function closeCart() { document.getElementById('cart-modal').classList.remove('open'); }

        // --- 🔒 PROCESSUS DE PAIEMENT STRIPE SÉCURISÉ ---
        async function processPayment(method) {
            if (cart.length === 0) return;

            const btnOnline = document.getElementById('btn-pay-online');
            const btnServer = document.getElementById('btn-pay-server');
            
            btnOnline.disabled = true; 
            btnServer.disabled = true;

            if (method === 'online') {
                btnOnline.innerText = "⏳ REDIRECTION STRIPE...";
                
                // 1. Sauvegarde du panier dans le téléphone du client
                localStorage.setItem('empire_pending_cart_' + tenantID, JSON.stringify(cart));
                localStorage.setItem('empire_pending_table_' + tenantID, tableLabel); // On sauvegarde le label de la table
                
                // 2. Redirection vers Stripe (La commande n'est PAS encore en cuisine)
                window.location.href = restaurantStripeLink; 
            } else {
                // Paiement au serveur : On envoie tout de suite
                btnServer.innerText = "⏳ ENVOI EN CUISINE...";
                await sendOrder(false); 
            }
        }

        // --- 🚀 ENVOI DE LA COMMANDE EN CUISINE ---
        async function sendOrder(isPaidOnline) {
            try {
                let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                let state = await r.json();
                
                // Création d'une commande unique ciblée sur cette table précise
                let orderTableId = `WEB_${tableLabel}`;
                let targetTable = state.activeOrders[orderTableId];
                
                let currentOrderData = targetTable ? (targetTable.data !== undefined ? targetTable.data : targetTable) : { status: 'cooking', items: [], time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), isWeb: true, paid: false };

                let newItems = cart.map(i => ({
                    id: Date.now() + Math.random(), itemId: Date.now(), n: "📱 " + i.n, p: i.p, qty: i.qty,
                    done: false, dest: i.dest, fired: false, savedToDB: true, course: i.course, seat: 0, isSent: true
                }));

                currentOrderData.items = [...(currentOrderData.items || []), ...newItems];
                currentOrderData.status = 'cooking'; 
                currentOrderData.isWeb = true;
                
                if(isPaidOnline) {
                    currentOrderData.paid = true;
                    currentOrderData.typePaiement = "Stripe (En Ligne)";
                }
                
                currentOrderData.totalStr = (cart.reduce((a,b)=>a+(b.p*b.qty),0)).toFixed(2) + ` ${currentCurrency}`;

                // L'ordre d'envoi ciblé avec les bonnes Query Strings
                await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({ tableId: orderTableId, order: { data: currentOrderData } }) 
                });

                // Nettoyage de l'écran
                closeCart();
                document.getElementById('floating-cart').style.display = 'none';
                document.getElementById('cat-tabs').style.display = 'none';
                document.getElementById('menu-grid').style.display = 'none';
                
                // Affichage du succès
                document.getElementById('success-emoji').innerText = isPaidOnline ? "💳" : "👨‍🍳";
                document.getElementById('success-title').innerText = isPaidOnline ? "Paiement Validé !" : "Commande en préparation";
                document.getElementById('success-desc').innerText = isPaidOnline ? "Votre commande est envoyée en cuisine. Régalez-vous !" : "Notre équipe prépare votre commande. Vous pourrez régler l'addition auprès de votre serveur.";
                document.getElementById('success-screen').style.display = 'flex';
                
                // Suppression du panier en attente
                localStorage.removeItem('empire_pending_cart_' + tenantID);
                localStorage.removeItem('empire_pending_table_' + tenantID);

            } catch (e) {
                alert("Erreur de connexion avec la cuisine."); 
                document.getElementById('btn-pay-online').disabled = false;
                document.getElementById('btn-pay-server').disabled = false;
                document.getElementById('btn-pay-online').innerText = "💳 PAYER EN LIGNE";
                document.getElementById('btn-pay-server').innerText = "💁‍♂️ PAYER AU SERVEUR";
            }
        }

        // --- 🕵️ VÉRIFICATION DU RETOUR DE STRIPE ---
        async function checkStripeReturn() {
            const isSuccess = urlParams.get('success');
            
            if (isSuccess === 'true') {
                // Le client revient de Stripe après un paiement réussi !
                let savedCart = localStorage.getItem('empire_pending_cart_' + tenantID);
                let savedTable = localStorage.getItem('empire_pending_table_' + tenantID);
                
                if (savedCart && savedTable === tableLabel) { // Sécurité renforcée : vérifier que c'est la bonne table
                    // On masque le menu pendant l'envoi
                    document.getElementById('menu-grid').innerHTML = '<h2 style="text-align:center; margin-top:50px; color:var(--gold);">Validation de votre paiement... ⏳</h2>';
                    
                    cart = JSON.parse(savedCart);
                    
                    // On envoie la commande en cuisine en déclarant qu'elle est payée
                    await sendOrder(true);
                }
            }
        }

        // On lance la vérification dès que la page s'ouvre
        checkStripeReturn();

        // --- LOGIQUE RÉSERVATION ---
        document.getElementById('res-date').valueAsDate = new Date();
        document.getElementById('res-date').min = new Date().toISOString().split("T")[0];

        async function submitReservation() {
            const btn = document.getElementById('btn-submit-resa');
            const date = document.getElementById('res-date').value;
            const time = document.getElementById('res-time').value;
            const name = document.getElementById('res-name').value.trim();
            const phone = document.getElementById('res-phone').value.trim();
            const pax = document.getElementById('res-pax').value;
            const eventType = document.getElementById('res-event').value;
            const rawObs = document.getElementById('res-obs').value.trim();

            if (!date || !time || !name || !phone || pax <= 0) return alert("Veuillez renseigner Nom, Téléphone, Couverts et Date.");

            btn.innerText = "Envoi en cours..."; btn.disabled = true;
            let finalObs = eventType ? `[${eventType.toUpperCase()}] ${rawObs}` : rawObs;

            const resaData = {
                id: Date.now(), date: date, time: time, name: name, phone: phone, couverts: pax,
                obs: finalObs.trim(), status: 'pending', timestamp: new Date().toISOString()
            };

            try {
                let response = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                if (!response.ok) throw new Error("Erreur");
                let state = await response.json();
                
                let resas = [];
                if (state.activeOrders && state.activeOrders['RESERVATIONS_MASTER']) {
                    let rawData = state.activeOrders['RESERVATIONS_MASTER'];
                    if (Array.isArray(rawData)) resas = rawData;
                    else if (rawData.data && Array.isArray(rawData.data)) resas = rawData.data;
                }

                resas.push(resaData);

                let postResponse = await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: 'RESERVATIONS_MASTER', order: { data: resas } })
                });

                if (!postResponse.ok) throw new Error("Erreur serveur");

                document.getElementById('cat-tabs').style.display = 'none';
                document.getElementById('reservation-view').style.display = 'none';
                
                document.getElementById('success-emoji').innerText = "📅";
                document.getElementById('success-title').innerText = "Demande Envoyée";
                document.getElementById('success-desc').innerText = "Notre Maître d'Hôtel a bien reçu votre demande. Vous recevrez une confirmation par SMS très prochainement.";
                document.getElementById('success-screen').style.display = 'flex';
                
            } catch (e) { 
                alert("Erreur de communication. Veuillez réessayer.");
                btn.innerText = "Réserver pour la prochaine fois"; btn.disabled = false;
            }
        }
    </script>
</body>
