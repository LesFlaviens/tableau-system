<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMPIRE - Menu Digital</title>
    <style>
        /* 💎 DESIGN CLIENT PREMIUM 💎 */
        :root { 
            --bg: #090e17; 
            --panel: #141c2f; 
            --border: rgba(255, 255, 255, 0.05); 
            --border-strong: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; 
            --text-muted: #64748b; 
            --gold: #fbbf24; 
            --accent: #34d399; 
            --alert: #f87171; 
            --shadow-subtle: 0 4px 20px rgba(0, 0, 0, 0.2);
            --shadow-deep: 0 10px 30px rgba(0, 0, 0, 0.8);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* HEADER */
        header { 
            background: rgba(20, 28, 47, 0.95); 
            backdrop-filter: blur(10px);
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between;
            align-items: center; 
            border-bottom: 1px solid var(--border-strong); 
            z-index: 10;
        }
        .logo-text { color: var(--text-main); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; margin: 0; text-transform: uppercase;}
        .logo-text span { color: var(--gold); }
        .table-badge { background: var(--gold); color: #000; padding: 4px 12px; border-radius: 20px; font-weight: 900; font-size: 0.9rem; }

        /* CATÉGORIES */
        .category-nav { 
            display: flex; 
            overflow-x: auto; 
            background: var(--panel); 
            padding: 10px 15px; 
            gap: 10px; 
            border-bottom: 1px solid var(--border-strong); 
            -webkit-overflow-scrolling: touch;
        }
        .category-nav::-webkit-scrollbar { display: none; }
        .cat-btn { 
            background: transparent; border: 1px solid var(--border-strong); color: var(--text-muted); 
            padding: 10px 20px; border-radius: 20px; font-weight: bold; white-space: nowrap; 
            cursor: pointer; text-transform: uppercase; font-size: 0.85rem; transition: 0.2s;
        }
        .cat-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* LISTE DES PLATS */
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            padding-bottom: 120px;
            -webkit-overflow-scrolling: touch;
        }
        .item-card { 
            background: var(--panel); border: 1px solid var(--border); border-radius: 12px; 
            padding: 15px; display: flex; justify-content: space-between; align-items: center; 
            box-shadow: var(--shadow-subtle); transition: 0.2s;
        }
        .item-info { display: flex; flex-direction: column; gap: 5px; flex: 1; padding-right: 15px;}
        .item-name { font-weight: 800; font-size: 1.1rem; line-height: 1.3;}
        .item-desc { color: var(--text-muted); font-size: 0.85rem; line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;}
        .item-price { color: var(--gold); font-weight: 900; font-size: 1.1rem;}
        
        .add-btn { 
            background: var(--bg); border: 2px solid var(--accent); color: var(--accent); 
            width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; 
            font-size: 1.5rem; font-weight: bold; cursor: pointer; transition: 0.2s; flex-shrink: 0;
        }
        .add-btn:active { background: var(--accent); color: #000; transform: scale(0.9);}
        
        .sold-out-badge { background: var(--alert); color: #fff; padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }

        /* FLOATING CART BUTTON */
        .floating-cart { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: var(--accent); color: #000; padding: 15px 30px; border-radius: 30px; 
            font-weight: 900; font-size: 1.1rem; box-shadow: 0 10px 30px rgba(52, 211, 153, 0.4); 
            display: none; justify-content: space-between; align-items: center; width: 90%; max-width: 400px; 
            cursor: pointer; z-index: 100; transition: 0.2s; text-transform: uppercase;
        }
        .floating-cart:active { transform: translateX(-50%) scale(0.95); }
        .cart-qty-badge { background: #000; color: var(--accent); border-radius: 50%; width: 25px; height: 25px; display: flex; justify-content: center; align-items: center; font-size: 0.9rem; }

        /* PANIER MODAL */
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(9, 14, 23, 0.95); z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: flex-end; backdrop-filter: blur(5px); }
        .modal.open { display: flex !important; animation: slideUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1) forwards;}
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .cart-box { background: var(--panel); width: 100%; border-top-left-radius: 24px; border-top-right-radius: 24px; display: flex; flex-direction: column; max-height: 85vh; box-shadow: var(--shadow-deep); border-top: 1px solid var(--border-strong);}
        .cart-header { padding: 20px; border-bottom: 1px solid var(--border-strong); display: flex; justify-content: space-between; align-items: center;}
        .cart-items-list { padding: 20px; overflow-y: auto; flex: 1; display: flex; flex-direction: column; gap: 15px;}
        
        .cart-row { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 15px; }
        .cart-row:last-child { border-bottom: none; padding-bottom: 0; }
        .cart-qty-controls { display: flex; align-items: center; gap: 15px; background: var(--bg); border-radius: 8px; padding: 4px 8px; border: 1px solid var(--border-strong);}
        .qty-btn { background: transparent; border: none; color: var(--text-main); font-size: 1.5rem; font-weight: bold; cursor: pointer; padding: 0 10px;}
        
        .cart-footer { padding: 20px; background: var(--bg); display: flex; flex-direction: column; gap: 15px;}
        .send-order-btn { background: var(--gold); color: #000; border: none; padding: 20px; border-radius: 12px; font-size: 1.2rem; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; box-shadow: 0 4px 15px rgba(251, 191, 36, 0.3); }

        /* LOADER */
        .loader-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 90000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--gold); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* SUCCESS SCREEN */
        #success-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 50000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="loader" class="loader-overlay">
        <div class="spinner"></div>
        <div style="color: var(--gold); font-weight: 900; letter-spacing: 2px;">CHARGEMENT DE LA CARTE...</div>
    </div>

    <header>
        <h1 class="logo-text">iCHEF<span>.CH</span></h1>
        <div class="table-badge" id="header-table">TABLE --</div>
    </header>

    <div class="category-nav" id="category-nav">
        </div>

    <div class="main-content" id="menu-container">
        </div>

    <div class="floating-cart" id="floating-cart" onclick="openCart()">
        <span style="display: flex; align-items: center; gap: 10px;">
            <div class="cart-qty-badge" id="cart-badge-qty">0</div>
            VOIR LA COMMANDE
        </span>
        <span id="cart-badge-total">0.00 €</span>
    </div>

    <div id="cart-modal" class="modal">
        <div class="cart-box">
            <div class="cart-header">
                <h2 style="margin:0; font-size: 1.5rem; color: var(--text-main);">Votre Commande</h2>
                <button style="background:transparent; border:none; color:var(--text-muted); font-size:1.5rem;" onclick="closeCart()">✕</button>
            </div>
            
            <div class="cart-items-list" id="cart-items-list">
                </div>
            
            <div class="cart-footer">
                <div style="display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; color: var(--text-muted);">
                    <span>Total estimé :</span>
                    <span id="cart-total-footer" style="color: var(--text-main);">0.00 €</span>
                </div>
                <button class="send-order-btn" onclick="sendOrder()">Envoyer en Cuisine</button>
            </div>
        </div>
    </div>

    <div id="success-screen">
        <div style="font-size: 5rem; margin-bottom: 20px;">🛎️</div>
        <h1 style="color: var(--gold); font-size: 2rem; font-weight: 900; margin: 0 0 15px 0; text-transform: uppercase;">Commande envoyée</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem; line-height: 1.5; max-width: 400px;">Votre commande a été transmise à notre équipe. <br><br>Elle sera validée par votre serveur d'ici quelques instants.</p>
        <button class="send-order-btn" style="margin-top: 40px; background: var(--panel); color: var(--text-main); border: 1px solid var(--border);" onclick="location.reload()">Nouvelle commande</button>
    </div>

    <script>
        const SERVER_URL = "https://tableau-system.onrender.com";

        const API = {
            getState: async () => {
                let r = await fetch(SERVER_URL + '/get-current-state');
                if (!r.ok) throw new Error("Serveur injoignable");
                return await r.json();
            },
            update: async (key, data) => {
                try { 
                    await fetch(SERVER_URL + '/update-order', { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ tableId: key, order: data }) 
                    }); 
                } catch(e) { console.error("Erreur Sync:", e); }
            }
        };

        // 1. Récupération de la table via l'URL (ex: menu.html?table=12)
        const urlParams = new URLSearchParams(window.location.search);
        let tableNumber = urlParams.get('table') || "EXTÉRIEUR";
        document.getElementById('header-table').innerText = (tableNumber === "EXTÉRIEUR") ? "À EMPORTER" : "TABLE " + tableNumber;

        let globalMenu = [];
        let currentCategory = '';
        let cart = [];

        async function initApp() {
            try {
                const state = await API.getState();
                let rawCuisine = (state && state.activeOrders && state.activeOrders['MENU_MASTER']) ? state.activeOrders['MENU_MASTER'].data : {};
                let rawBar = (state && state.activeOrders && state.activeOrders['MENU_MASTER_BAR']) ? state.activeOrders['MENU_MASTER_BAR'].data : {};

                // Formatage des données
                let formatItems = (obj, dest) => {
                    let arr = [];
                    for(let cat in obj) {
                        if(Array.isArray(obj[cat])) {
                            obj[cat].forEach(i => {
                                // Assignation du bon 'course' pour le routage KDS
                                let course = 2; // Plat par défaut
                                let cLower = cat.toLowerCase();
                                if(dest === 'bar' || cLower.includes('boisson') || cLower.includes('vin') || cLower.includes('cocktail')) course = 0;
                                else if(cLower.includes('entree') || cLower.includes('entrée')) course = 1;
                                else if(cLower.includes('dessert')) course = 3;

                                arr.push({ ...i, category: cat, dest: dest, course: course });
                            });
                        }
                    }
                    return arr;
                };

                globalMenu = [...formatItems(rawCuisine, 'cuisine'), ...formatItems(rawBar, 'bar')];
                
                // Extraire les catégories uniques pour la navigation
                let categories = [...new Set(globalMenu.map(i => i.category))];
                
                // Prioriser l'affichage
                const priority = ['menuJour', 'entrees', 'plats', 'desserts', 'cocktails', 'vins', 'softs'];
                categories.sort((a, b) => {
                    let idxA = priority.indexOf(a); let idxB = priority.indexOf(b);
                    if(idxA === -1) idxA = 99; if(idxB === -1) idxB = 99;
                    return idxA - idxB;
                });

                if (categories.length > 0) {
                    renderCategoryNav(categories);
                    renderMenu(categories[0]);
                } else {
                    document.getElementById('menu-container').innerHTML = "<div style='text-align:center; color:var(--text-muted); margin-top:50px;'>La carte n'est pas encore disponible.</div>";
                }

                document.getElementById('loader').style.display = 'none';

            } catch(e) {
                document.getElementById('loader').innerHTML = "<div style='color:var(--alert); font-weight:900; font-size:1.2rem; text-align:center;'>Connexion au réseau du restaurant impossible.</div>";
            }
        }

        function renderCategoryNav(categories) {
            const nav = document.getElementById('category-nav');
            
            const catNames = { 
                "menuJour": "Suggestions", "entrees": "Entrées", "plats": "Plats", 
                "desserts": "Desserts", "cocktails": "Cocktails", "vins": "Vins", "softs": "Softs" 
            };

            nav.innerHTML = categories.map(c => {
                let displayName = catNames[c] || c;
                return `<button class="cat-btn" id="btn-cat-${c}" onclick="renderMenu('${c}')">${displayName}</button>`;
            }).join('');
        }

        function renderMenu(category) {
            currentCategory = category;
            
            // Mise à jour visuelle des boutons
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            const activeBtn = document.getElementById(`btn-cat-${category}`);
            if(activeBtn) {
                activeBtn.classList.add('active');
                activeBtn.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
            }

            const container = document.getElementById('menu-container');
            let items = globalMenu.filter(i => i.category === category);

            if(items.length === 0) {
                container.innerHTML = "<div style='text-align:center; color:var(--text-muted); margin-top:20px;'>Aucun plat dans cette catégorie.</div>";
                return;
            }

            container.innerHTML = items.map(item => {
                let isSoldOut = (item.stock === 0);
                let price = parseFloat(item.price) || 0;
                let cleanName = item.name.replace(/\[BR\]/g, ' ').replace('🌟 ', '');

                let actionHtml = isSoldOut 
                    ? `<div class="sold-out-badge">ÉPUISÉ</div>`
                    : `<button class="add-btn" onclick="addToCart('${escapeQuotes(cleanName)}', ${price}, '${item.dest}', ${item.course})">+</button>`;

                return `
                <div class="item-card" style="${isSoldOut ? 'opacity:0.5;' : ''}">
                    <div class="item-info">
                        <div class="item-name">${cleanName}</div>
                        <div class="item-price">${price.toFixed(2)} €</div>
                    </div>
                    ${actionHtml}
                </div>`;
            }).join('');
        }

        function escapeQuotes(str) { return str.replace(/'/g, "\\'").replace(/"/g, '&quot;'); }

        function addToCart(name, price, dest, course) {
            let existing = cart.find(i => i.n === name);
            if (existing) {
                existing.qty += 1;
            } else {
                cart.push({ n: name, p: price, dest: dest, course: course, qty: 1 });
            }
            updateCartUI();
            
            // Feedback haptique si mobile
            if(navigator.vibrate) navigator.vibrate(50);
        }

        function updateCartQty(index, delta) {
            let item = cart[index];
            item.qty += delta;
            if (item.qty <= 0) {
                cart.splice(index, 1);
            }
            updateCartUI();
            if(cart.length > 0) renderCartModal(); else closeCart();
        }

        function updateCartUI() {
            const btn = document.getElementById('floating-cart');
            const qtyBadge = document.getElementById('cart-badge-qty');
            const totalBadge = document.getElementById('cart-badge-total');

            if (cart.length === 0) {
                btn.style.display = 'none';
                return;
            }

            let totalQty = 0;
            let totalPrice = 0;
            cart.forEach(i => {
                totalQty += i.qty;
                totalPrice += (i.p * i.qty);
            });

            qtyBadge.innerText = totalQty;
            totalBadge.innerText = totalPrice.toFixed(2) + " €";
            btn.style.display = 'flex';
        }

        function openCart() {
            renderCartModal();
            document.getElementById('cart-modal').classList.add('open');
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('open');
        }

        function renderCartModal() {
            const list = document.getElementById('cart-items-list');
            let totalPrice = 0;

            list.innerHTML = cart.map((item, idx) => {
                totalPrice += (item.p * item.qty);
                return `
                <div class="cart-row">
                    <div style="flex:1;">
                        <div style="font-weight:bold; color:var(--text-main); font-size:1.1rem; margin-bottom:5px;">${item.n}</div>
                        <div style="color:var(--gold); font-weight:900;">${(item.p * item.qty).toFixed(2)} €</div>
                    </div>
                    <div class="cart-qty-controls">
                        <button class="qty-btn" onclick="updateCartQty(${idx}, -1)">-</button>
                        <span style="font-weight:900; color:var(--text-main); font-size:1.2rem; min-width:20px; text-align:center;">${item.qty}</span>
                        <button class="qty-btn" style="color:var(--accent);" onclick="updateCartQty(${idx}, 1)">+</button>
                    </div>
                </div>`;
            }).join('');

            document.getElementById('cart-total-footer').innerText = totalPrice.toFixed(2) + " €";
        }

        async function sendOrder() {
            if (cart.length === 0) return;

            document.getElementById('cart-modal').classList.remove('open');
            document.getElementById('loader').style.display = 'flex';
            document.getElementById('loader').innerHTML = `
                <div class="spinner"></div>
                <div style="color: var(--gold); font-weight: 900; letter-spacing: 2px;">ENVOI EN COURS...</div>
            `;

            let totalPrice = cart.reduce((acc, i) => acc + (i.p * i.qty), 0);

            // Création d'une clé d'ordre FANTÔME (Web Order) pour le Pad Serveur
            let orderKey = "order_" + Date.now(); 

            let payload = {
                data: {
                    isWeb: true,
                    status: "hold", // Apparaîtra en jaune (À Valider) sur le Pad Serveur
                    time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
                    clientName: tableNumber === "EXTÉRIEUR" ? "À Emporter" : "Table " + tableNumber,
                    totalStr: totalPrice.toFixed(2) + " €",
                    items: cart.map(i => ({
                        id: Date.now() + Math.random(),
                        itemId: Date.now(),
                        n: i.n,
                        p: i.p,
                        qty: i.qty,
                        course: i.course,
                        dest: i.dest,
                        done: false,
                        fired: false, // Le serveur devra réclamer (lancer) le plat manuellement
                        isOffered: false
                    }))
                }
            };

            try {
                // On pousse la commande sur le serveur
                await API.update(orderKey, payload);
                
                // On déclenche la sonnerie du Pad Serveur
                await API.update('ALERTS_MASTER', { data: { type: 'RING', message: `📱 NOUVELLE COMMANDE WEB (Table ${tableNumber})`, timestamp: Date.now() } });

                document.getElementById('loader').style.display = 'none';
                document.getElementById('main-content').style.display = 'none';
                document.getElementById('floating-cart').style.display = 'none';
                document.getElementById('success-screen').style.display = 'flex';

                // Nettoyage
                cart = [];

            } catch (e) {
                document.getElementById('loader').style.display = 'none';
                alert("❌ Erreur de réseau. Veuillez réessayer ou appeler un serveur.");
            }
        }

        // Démarrage
        window.onload = initApp;

    </script>
</body>
</html>
