<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>La Carte - Portail Client</title>
    <style id="dynamic-theme-styles">
        /* THEME PAR DÉFAUT (Luxe) */
        :root { 
            --bg-color: #050505;           
            --text-main: #f8fafc;    
            --text-muted: #888888;   
            --accent: #d4af37; 
            --border-color: #222222;
        }
        body { font-family: 'Helvetica Neue', Optima, Arial, sans-serif; }
    </style>
    <style>
        body { 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 120px; /* Espace pour le CTA et Panier */
        }

        /* HEADER MARKETING */
        header { 
            text-align: center; 
            padding: 50px 20px 30px; 
            border-bottom: 1px solid var(--border-color);
            position: relative;
            background-size: cover;
            background-position: center;
        }
        header::before {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, var(--bg-color) 100%);
            z-index: 1;
        }
        
        .header-content { position: relative; z-index: 2; }
        .logo-text { color: var(--accent); font-size: 2rem; font-weight: 300; letter-spacing: 6px; margin: 0; text-transform: uppercase; text-shadow: 0 2px 10px rgba(0,0,0,0.8); }
        .subtitle { color: var(--text-main); font-size: 0.9rem; letter-spacing: 2px; margin-top: 10px; text-transform: uppercase; opacity: 0.8; }
        .promo-sub { color: var(--text-main); font-size: 0.8rem; font-style: italic; margin-top: 5px; opacity: 0.7; }

        .menu-container { max-width: 800px; margin: 0 auto; padding: 20px; }

        /* PLAT STAR (Mise en avant) */
        #star-item-container { display: none; margin-top: 20px; margin-bottom: 40px; animation: fadeUp 0.6s forwards; cursor:pointer;}
        .star-box { border: 1px solid var(--accent); border-radius: 12px; overflow: hidden; background: rgba(255,255,255,0.02); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .star-img { width: 100%; height: 200px; object-fit: cover; border-bottom: 1px solid var(--border-color); }
        .star-content { padding: 20px; text-align: center; }
        .star-badge { background: var(--accent); color: var(--bg-color); font-size: 0.7rem; font-weight: bold; padding: 4px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; display: inline-block; }
        .star-name { font-size: 1.5rem; color: var(--text-main); font-weight: bold; margin: 0 0 10px 0; }
        .star-price { font-size: 1.3rem; color: var(--accent); font-weight: 900; }

        .category-section { margin-top: 40px; margin-bottom: 50px; opacity: 0; transform: translateY(20px); animation: fadeUp 0.6s forwards; }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

        .category-title { color: var(--accent); font-size: 1.5rem; font-weight: 300; letter-spacing: 4px; text-align: center; text-transform: uppercase; margin-bottom: 30px; display: flex; align-items: center; justify-content: center; }
        .category-title::before, .category-title::after { content: ""; flex: 1; height: 1px; background: var(--border-color); margin: 0 15px; }

        .menu-item { margin-bottom: 15px; padding: 15px; border: 1px solid transparent; border-bottom: 1px dashed var(--border-color); cursor: pointer; transition: 0.2s; border-radius: 8px;}
        .menu-item:hover { background: rgba(255,255,255,0.02); border-color: var(--accent); }
        .menu-item:active { transform: scale(0.98); }
        .item-header { display: flex; justify-content: space-between; align-items: baseline; gap: 15px; }
        .item-name-main { font-size: 1.15rem; font-weight: 500; letter-spacing: 1px; color: var(--text-main); margin: 0; line-height: 1.4; }
        .item-price { font-size: 1.1rem; color: var(--accent); font-weight: bold; white-space: nowrap; }
        .item-desc { color: var(--text-muted); font-size: 0.85rem; margin-top: 6px; line-height: 1.5; font-style: italic; display: block; }

        .loading-screen { text-align: center; padding: 100px 20px; color: var(--accent); font-style: italic; letter-spacing: 2px; }
        .footer { text-align: center; padding: 30px; color: var(--text-muted); font-size: 0.8rem; border-top: 1px solid var(--border-color); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 20px;}

        /* BOUTON D'ACTION (CTA) */
        #floating-cta { display: none; position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--accent); color: var(--bg-color); padding: 15px 30px; border-radius: 30px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; text-decoration: none; box-shadow: 0 10px 20px rgba(0,0,0,0.5); z-index: 1000; white-space: nowrap; transition: 0.2s; }
        #floating-cta:active { transform: translateX(-50%) scale(0.95); }

        /* PANIER FLOTTANT */
        #cart-bar { position: fixed; bottom: 0; left: 0; width: 100%; background: rgba(10,10,10,0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--accent); padding: 15px 20px; box-sizing: border-box; display: flex; justify-content: space-between; align-items: center; z-index: 2000; transform: translateY(100%); transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        #cart-bar.active { transform: translateY(0); }
        .cart-info { display: flex; flex-direction: column; }
        .cart-title { color: var(--text-main); font-weight: bold; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px;}
        .cart-total { color: var(--accent); font-size: 1.2rem; font-weight: 900; }
        .btn-view-cart { background: var(--accent); color: #000; border: none; padding: 10px 20px; font-weight: 900; font-size: 1rem; border-radius: 8px; cursor: pointer; text-transform: uppercase; }

        /* MODALE PANIER */
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-color); z-index: 3000; display: none; flex-direction: column; }
        .modal.open { display: flex; }
        .modal-header { padding: 20px; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
        .modal-title { color: var(--accent); font-size: 1.2rem; margin: 0; text-transform: uppercase; letter-spacing: 2px; }
        .btn-close { background: transparent; border: none; color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        
        .cart-items { flex: 1; overflow-y: auto; padding: 20px; }
        .cart-item-row { display: flex; flex-direction: column; border-bottom: 1px dashed var(--border-color); padding-bottom: 15px; margin-bottom: 15px; }
        .cart-item-top { display: flex; justify-content: space-between; align-items: center; }
        .cart-item-name { font-weight: bold; color: var(--text-main); font-size: 1rem; }
        .cart-item-controls { display: flex; align-items: center; gap: 15px; }
        .btn-qty { background: transparent; border: 1px solid var(--accent); color: var(--accent); width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer;}
        .cart-obs-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border-color); color: var(--text-main); padding: 10px; border-radius: 6px; margin-top: 10px; font-size: 0.85rem; outline: none; box-sizing: border-box;}
        .cart-obs-input:focus { border-color: var(--accent); }

        .modal-footer { padding: 20px; border-top: 1px solid var(--border-color); background: rgba(0,0,0,0.5); }
        .btn-send-order { width: 100%; background: var(--accent); color: #000; border: none; padding: 15px; font-size: 1.1rem; font-weight: 900; border-radius: 8px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-send-order:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ÉCRAN DE SUCCÈS */
        #success-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg-color); z-index: 4000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }

        /* --- THEMES SPECIFIQUES --- */
        .theme-bistrot body { font-family: 'Georgia', serif; }
        .theme-bistrot .menu-item { display: flex; align-items: center; gap: 15px; }
        .theme-bistrot .fake-img-round { width: 50px; height: 50px; border-radius: 50%; background: rgba(255,255,255,0.1); flex-shrink: 0; }
        .theme-bistrot .item-info { flex: 1; }
        .theme-bistrot .item-header { display: block; }
        .theme-bistrot .item-price { display: block; font-size: 0.9rem; margin-top: 5px; }
        
        .theme-neon body { font-family: 'Courier New', Courier, monospace; }
        .theme-neon .category-title { text-shadow: 0 0 10px var(--accent); font-weight: 900; }
        .theme-neon .item-price { background: rgba(255,255,255,0.1); padding: 5px 10px; border-radius: 4px; border: 1px solid var(--accent); box-shadow: 0 0 10px rgba(56,189,248,0.2); }
    </style>
</head>
<body id="body-theme">

    <header id="main-header">
        <div class="header-content">
            <h1 class="logo-text" id="header-title">NOTRE CARTE</h1>
            <div id="service-subtitle" class="subtitle">Sélection du moment</div>
            <div id="header-promo" class="promo-sub"></div>
        </div>
    </header>

    <div class="menu-container">
        
        <div id="star-item-container"></div>

        <div id="menu-container">
            <div class="loading-screen">Synchronisation avec l'établissement en cours...</div>
        </div>
    </div>

    <div class="footer">
        Prix nets en <span id="footer-currency">€</span> - tva inclus <br>
        <span style="font-size: 0.6rem; opacity: 0.5;">Propulsé par Empire OS</span>
    </div>

    <a href="#" id="floating-cta">RÉSERVER</a>

    <div id="cart-bar">
        <div class="cart-info">
            <span class="cart-title">Votre Commande</span>
            <span class="cart-total"><span id="cart-total-amount">0.00</span> <span class="currency-symbol">€</span></span>
        </div>
        <button class="btn-view-cart" onclick="openCart()">Voir (<span id="cart-count">0</span>)</button>
    </div>

    <div id="cart-modal" class="modal">
        <div class="modal-header">
            <h2 class="modal-title">Ma Commande</h2>
            <button class="btn-close" onclick="closeCart()">✕</button>
        </div>
        <div class="cart-items" id="cart-items-container">
            </div>
        <div class="modal-footer">
            <div style="display:flex; justify-content:space-between; margin-bottom: 15px; font-weight: bold; font-size: 1.2rem;">
                <span>Total :</span>
                <span style="color:var(--accent);"><span id="modal-total-amount">0.00</span> <span class="currency-symbol">€</span></span>
            </div>
            <button class="btn-send-order" id="btn-send" onclick="sendOrder()">ENVOYER EN CUISINE</button>
        </div>
    </div>

    <div id="success-screen">
        <div style="font-size: 5rem; margin-bottom: 20px;">✅</div>
        <h1 style="color:var(--accent); text-transform: uppercase; letter-spacing: 2px;">Commande envoyée !</h1>
        <p style="color:var(--text-muted); line-height: 1.6; margin-bottom: 30px;">Votre commande est en cours de préparation. Elle arrivera très vite à votre table.</p>
        <button class="btn-view-cart" onclick="closeSuccessScreen()" style="background:transparent; border:1px solid var(--accent); color:var(--accent);">Retour à la carte</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        const tableNumber = urlParams.get('table') || 'W' + Math.floor(Math.random() * 1000); // Génère un faux n° si pas de table
        const SERVER_URL = "https://tableau-system.onrender.com";

        let currentCurrency = "€";
        let lastDataHash = "";
        let currentThemeStyle = "luxe";
        
        let cart = []; // Panier du client

        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                    if(r.ok) state = await r.json();
                    else throw new Error("Erreur réseau");
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            },
            sendOrder: async (payload) => {
                // Sauvegarde Locale instantanée (pour tester sur le même PC)
                let state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                
                if (payload.tableId === 'ALERTS_MASTER') {
                    state.activeOrders['ALERTS_MASTER'] = { data: payload.order.data };
                } else {
                    state.activeOrders[payload.tableId] = payload.order;
                }

                localStorage.setItem('EMPIRE_GLOBAL_SYNC', JSON.stringify(state));
                window.dispatchEvent(new Event('storage')); 

                // Sauvegarde Cloud (pour le vrai téléphone du client)
                try {
                    await fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify(payload)
                    });
                } catch(e) { console.warn("Pas de cloud, mode local actif."); }
            }
        };

        // --- GESTION DU PANIER ---
        function addToCart(itemName, price, dest, isMenuJour = false) {
            let existingItem = cart.find(i => i.n === itemName && !i.isMenuJour && i.obs === "");
            
            if (existingItem) {
                existingItem.qty++;
            } else {
                cart.push({
                    id: Date.now() + Math.random(),
                    itemId: Date.now(),
                    n: itemName,
                    originalName: itemName,
                    p: price,
                    qty: 1,
                    dest: dest,
                    isMenuJour: isMenuJour,
                    obs: "",
                    done: false,
                    fired: false
                });
            }
            updateCartUI();
        }

        function updateCartQty(id, delta) {
            let itemIndex = cart.findIndex(i => i.id === id);
            if (itemIndex > -1) {
                cart[itemIndex].qty += delta;
                if (cart[itemIndex].qty <= 0) {
                    cart.splice(itemIndex, 1);
                }
                updateCartUI();
                renderCartModal();
            }
        }

        function updateItemObs(id, obsText) {
            let item = cart.find(i => i.id === id);
            if (item) item.obs = obsText;
        }

        function updateCartUI() {
            const cartBar = document.getElementById('cart-bar');
            const countEl = document.getElementById('cart-count');
            const totalEl = document.getElementById('cart-total-amount');
            const modalTotalEl = document.getElementById('modal-total-amount');
            const btnSend = document.getElementById('btn-send');
            
            document.querySelectorAll('.currency-symbol').forEach(el => el.innerText = currentCurrency);

            let totalItems = 0;
            let totalPrice = 0;

            cart.forEach(i => {
                totalItems += i.qty;
                totalPrice += (i.p * i.qty);
            });

            countEl.innerText = totalItems;
            totalEl.innerText = totalPrice.toFixed(2);
            modalTotalEl.innerText = totalPrice.toFixed(2);

            if (totalItems > 0) {
                cartBar.classList.add('active');
                btnSend.disabled = false;
            } else {
                cartBar.classList.remove('active');
                btnSend.disabled = true;
                closeCart(); 
            }
        }

        function openCart() {
            renderCartModal();
            document.getElementById('cart-modal').classList.add('open');
        }

        function closeCart() {
            document.getElementById('cart-modal').classList.remove('open');
        }

        function renderCartModal() {
            const container = document.getElementById('cart-items-container');
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align:center; color:var(--text-muted); margin-top:50px;">Votre commande est vide.</div>';
                return;
            }

            container.innerHTML = cart.map(item => `
                <div class="cart-item-row">
                    <div class="cart-item-top">
                        <div class="cart-item-name">${item.n.replace(/\[BR\]/g, ' ')} <span style="color:var(--accent); font-weight:normal; font-size:0.9rem;">(${(item.p * item.qty).toFixed(2)}${currentCurrency})</span></div>
                        <div class="cart-item-controls">
                            <button class="btn-qty" onclick="updateCartQty(${item.id}, -1)">-</button>
                            <span style="font-weight:900;">${item.qty}</span>
                            <button class="btn-qty" onclick="updateCartQty(${item.id}, 1)">+</button>
                        </div>
                    </div>
                    <input type="text" class="cart-obs-input" placeholder="Note (Ex: Sans sel, bien cuit...)" value="${item.obs}" onchange="updateItemObs(${item.id}, this.value)">
                </div>
            `).join('');
        }

        async function sendOrder() {
            if (cart.length === 0) return;
            
            const btnSend = document.getElementById('btn-send');
            btnSend.innerText = "ENVOI EN COURS...";
            btnSend.disabled = true;

            // Déclenchement automatique des plats à l'envoi de la commande Web
            let finalItems = cart.map(i => {
                i.fired = true; 
                i.firedTime = Date.now();
                return i;
            });

            // On va chercher l'existant sur cette table pour fusionner
            let currentTableData = {
                status: 'hold',
                time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
                clientName: 'Client Web',
                isWeb: true,
                items: [],
                totalStr: "0.00 €"
            };

            try {
                const state = await API.getState();
                let orderId = tableNumber.startsWith('order_') ? tableNumber : `order_${tableNumber}`;
                
                if (state.activeOrders && state.activeOrders[orderId]) {
                    let oldData = state.activeOrders[orderId].data || state.activeOrders[orderId];
                    if (oldData.items) currentTableData.items = oldData.items;
                }
                
                // On ajoute les nouveaux plats
                currentTableData.items.push(...finalItems);
                
                // Recalcul du total absolu de la table
                let globalTotal = currentTableData.items.reduce((sum, i) => sum + (parseFloat(i.p||0) * (i.qty||1)), 0);
                currentTableData.totalStr = `${globalTotal.toFixed(2)} ${currentCurrency}`;
                currentTableData.time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}); 
                
                // Envoi Render
                await API.sendOrder({ tableId: orderId, order: { data: currentTableData } });

                // Alerte Klaxon au serveur
                await API.sendOrder({ tableId: 'ALERTS_MASTER', order: { data: { type: 'RING', message: `📱 NOUVELLE COMMANDE WEB (Table ${tableNumber})`, timestamp: Date.now() } } });

                // Succès
                cart = [];
                updateCartUI();
                closeCart();
                document.getElementById('success-screen').style.display = 'flex';
                btnSend.innerText = "ENVOYER EN CUISINE";

            } catch (e) {
                alert("❌ Erreur réseau. La commande n'a pas pu être envoyée.");
                btnSend.innerText = "RÉESSAYER";
                btnSend.disabled = false;
            }
        }

        function closeSuccessScreen() {
            document.getElementById('success-screen').style.display = 'none';
        }

        // --- AFFICHAGE DE LA CARTE INTELLIGENT ---
        window.addEventListener('storage', (e) => {
            if (e.key === 'EMPIRE_GLOBAL_SYNC') {
                fetchMenu();
            }
        });

        async function fetchMenu() {
            try {
                const state = await API.getState();
                let activeOrders = state.activeOrders || {};
                
                // 1. DEVISE
                if (activeOrders['SETTINGS_MASTER'] && activeOrders['SETTINGS_MASTER'].data) {
                    let savedCurrency = activeOrders['SETTINGS_MASTER'].data.currency;
                    if (savedCurrency) {
                        currentCurrency = savedCurrency;
                        let nameMap = {"€": "Euros", "CHF": "Francs Suisses", "$": "Dollars", "C$": "Dollars", "£": "Livres", "¥": "Yens", "MAD": "Dirhams", "CFA": "Francs CFA"};
                        document.getElementById('footer-currency').innerText = nameMap[currentCurrency] || currentCurrency;
                        document.querySelectorAll('.currency-symbol').forEach(el => el.innerText = currentCurrency);
                    }
                }

                // 2. DESIGN STUDIO (THEME)
                let theme = { style: 'luxe', bgColor: '#050505', accentColor: '#d4af37' };
                if (activeOrders['THEME_MASTER'] && activeOrders['THEME_MASTER'].data) {
                    theme = activeOrders['THEME_MASTER'].data;
                }
                applyTheme(theme);

                // 3. MARKETING & UPSELL
                let marketing = { bannerActive: false, ctaActive: false, starActive: false };
                if (activeOrders['MARKETING_MASTER'] && activeOrders['MARKETING_MASTER'].data) {
                    marketing = activeOrders['MARKETING_MASTER'].data;
                }
                applyMarketing(marketing);

                // 4. ROUTING PAR DÉFAUT
                let routing = { activeService: "MIDI", endpoints: { menuQR: { cuisine: true, bar: true } } };
                if (activeOrders['ROUTING_MASTER'] && activeOrders['ROUTING_MASTER'].data) {
                    routing = activeOrders['ROUTING_MASTER'].data;
                }

                // 5. DATA (MENUS DU CHEF ET BARMAN)
                let catCuisine = activeOrders['CATEGORIES_CUISINE']?.data || [];
                let catBar = activeOrders['CATEGORIES_BAR']?.data || [];
                let menuCuisine = activeOrders['MENU_MASTER']?.data || {};
                let menuBar = activeOrders['MENU_MASTER_BAR']?.data || {};

                let currentHash = JSON.stringify({ routing, catCuisine, catBar, menuCuisine, menuBar, currentCurrency, theme, marketing });
                if(currentHash === lastDataHash) return; 
                lastDataHash = currentHash;

                renderClientMenu(routing, catCuisine, catBar, menuCuisine, menuBar, marketing);

            } catch(e) { console.error(e); }
        }

        function applyTheme(theme) {
            currentThemeStyle = theme.style;
            document.getElementById('body-theme').className = 'theme-' + theme.style;
            
            document.documentElement.style.setProperty('--bg-color', theme.bgColor || '#050505');
            document.documentElement.style.setProperty('--accent', theme.accentColor || '#d4af37');
            
            let isLight = parseInt(theme.bgColor.replace('#', ''), 16) > 0xffffff / 2;
            document.documentElement.style.setProperty('--border-color', isLight ? '#dddddd' : '#222222');
            document.documentElement.style.setProperty('--text-main', isLight ? '#111111' : '#f8fafc');
        }

        function applyMarketing(mk) {
            const header = document.getElementById('main-header');
            if (mk.bannerActive && mk.bannerImage) {
                header.style.backgroundImage = `url('${mk.bannerImage}')`;
                header.style.padding = '80px 20px 40px';
            } else {
                header.style.backgroundImage = 'none';
                header.style.padding = '50px 20px 30px';
            }
            document.getElementById('header-title').innerText = (mk.bannerActive && mk.bannerTitle) ? mk.bannerTitle : "NOTRE CARTE";
            document.getElementById('header-promo').innerText = (mk.bannerActive && mk.bannerSub) ? mk.bannerSub : "";

            const cta = document.getElementById('floating-cta');
            if (mk.ctaActive && mk.ctaText && mk.ctaLink) {
                cta.innerText = mk.ctaText;
                cta.href = mk.ctaLink;
                cta.style.display = 'block';
            } else {
                cta.style.display = 'none';
            }
        }

        function formatItemName(rawName) {
            let cleanName = rawName.replace('🌟 ', '');
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let mainName = parts[0].trim();
                let description = parts.slice(1).join(' - ').trim(); 
                return `<div class="item-name-main">${mainName}</div><div class="item-desc">${description}</div>`;
            }
            return `<div class="item-name-main">${cleanName}</div>`;
        }

        function findItemInMenus(itemName, menuCuisine, menuBar) {
            for(let cat in menuCuisine) { let found = menuCuisine[cat].find(i => i.name === itemName); if(found) return found; }
            for(let cat in menuBar) { let found = menuBar[cat].find(i => i.name === itemName); if(found) return found; }
            return null;
        }

        function renderClientMenu(routing, catCuisine, catBar, menuCuisine, menuBar, marketing) {
            const container = document.getElementById('menu-container');
            const starContainer = document.getElementById('star-item-container');
            const subtitle = document.getElementById('service-subtitle');
            
            const serviceNames = { "MATIN": "Petit-Déjeuner", "MIDI": "Déjeuner", "APREM": "Après-Midi / Tea Time", "SOIR": "Dîner" };
            subtitle.innerText = "Service : " + (serviceNames[routing.activeService] || routing.activeService);

            // GESTION DU PLAT STAR
            starContainer.style.display = 'none';
            if (marketing.starActive && marketing.starItemName && marketing.starImage) {
                let starItem = findItemInMenus(marketing.starItemName, menuCuisine, menuBar);
                if (starItem && starItem.stock !== 0 && starItem.stock !== "0" && starItem.hidden !== true) {
                    let escapedName = starItem.name.replace(/'/g, "\\'");
                    starContainer.innerHTML = `
                        <div class="star-box" onclick="addToCart('${escapedName}', ${starItem.price}, 'cuisine')">
                            <img src="${marketing.starImage}" class="star-img">
                            <div class="star-content">
                                <div class="star-badge">Le choix du Chef</div>
                                <h3 class="star-name">${starItem.name.split('[BR]')[0].trim()}</h3>
                                <div class="star-price">${parseFloat(starItem.price).toFixed(2)} ${currentCurrency}</div>
                                <div style="margin-top:10px; font-size:0.8rem; color:var(--text-muted);">👆 Touchez pour ajouter</div>
                            </div>
                        </div>
                    `;
                    starContainer.style.display = 'block';
                }
            }

            let htmlContent = '';

            // 🧠 LE MOTEUR INTELLIGENT DE RENDU 🧠
            // Il lit TOUTES les catégories présentes dans la base de données (même celles non validées par l'Admin)
            // L'Admin ne sert qu'à *restreindre* l'affichage, pas à l'autoriser. L'autorisation est par défaut.
            
            const renderCategoryItems = (menuDict, catConfigList, isBar) => {
                let catKeys = Object.keys(menuDict);
                
                catKeys.forEach((catKey, index) => {
                    let items = menuDict[catKey] || [];
                    if(!Array.isArray(items) || items.length === 0) return;

                    // Cherche la configuration de la catégorie dans l'Admin. Si absente, on crée une permission totale par défaut.
                    let catObj = catConfigList.find(c => c.id === catKey);
                    
                    let categoryRouting = catObj ? (catObj.routing || ['MATIN', 'MIDI', 'APREM', 'SOIR']) : ['MATIN', 'MIDI', 'APREM', 'SOIR'];
                    let categoryTargets = catObj ? (catObj.targets || ['qr', 'pad', 'cuisine', 'bar', 'resto']) : ['qr', 'pad', 'cuisine', 'bar', 'resto'];
                    let catLabel = catObj ? catObj.label : catKey.toUpperCase();
                    
                    let availableItems = items.filter(item => {
                        if (item.stock === 0 || item.stock === "0" || item.hidden === true) return false;
                        if (marketing.starActive && item.name === marketing.starItemName) return false; // Ne pas afficher 2 fois
                        
                        let itemRouting = item.routing || categoryRouting;
                        let itemTarget = item.targets || categoryTargets;
                        
                        // Autorise l'affichage si le service correspond ET si la case 'Portail QR' n'a pas été décochée
                        return itemRouting.includes(routing.activeService) && itemTarget.includes('qr');
                    });

                    if (availableItems.length > 0) {
                        htmlContent += `<div class="category-section" style="animation-delay: ${index * 0.1}s;">`;
                        htmlContent += `<h2 class="category-title" ${isBar ? 'style="opacity:0.8;"' : ''}>${catLabel}</h2>`;

                        availableItems.forEach(item => {
                            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
                            let escapedName = item.name.replace(/'/g, "\\'");
                            let dest = isBar ? 'bar' : 'cuisine';
                            
                            if (currentThemeStyle === 'bistrot') {
                                htmlContent += `
                                <div class="menu-item" onclick="addToCart('${escapedName}', ${item.price}, '${dest}')">
                                    <div class="fake-img-round"></div>
                                    <div class="item-info">
                                        ${formatItemName(item.name)}
                                        <span class="item-price">${priceStr}</span>
                                    </div>
                                </div>`;
                            } else {
                                htmlContent += `
                                <div class="menu-item" onclick="addToCart('${escapedName}', ${item.price}, '${dest}')">
                                    <div class="item-header">
                                        <div style="flex:1;">${formatItemName(item.name)}</div>
                                        <span class="item-price">${priceStr}</span>
                                    </div>
                                </div>`;
                            }
                        });
                        htmlContent += `</div>`;
                    }
                });
            };

            // On lance le rendu pour la cuisine et le bar, si l'Admin global autorise ces sections sur le QR
            if (routing.endpoints.menuQR.cuisine) renderCategoryItems(menuCuisine, catCuisine, false);
            if (routing.endpoints.menuQR.bar) renderCategoryItems(menuBar, catBar, true);

            if (htmlContent === '') htmlContent = '<div class="loading-screen">La carte est actuellement vide ou le service est fermé.</div>';

            container.innerHTML = htmlContent;
        }

        fetchMenu();
        setInterval(fetchMenu, 3000);

    </script>
</body>
</html>
