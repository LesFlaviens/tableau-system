<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChef OS | Réglages</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0a0a0a; --card: #161616; --accent: #FFD700; --text-dim: #888; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 40px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: var(--card); border: 1px solid #333; padding: 30px; border-radius: 12px; text-align: center; }
        h1 { color: var(--accent); font-weight: 800; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin-bottom: 20px; background: #222; border: 1px solid #444; color: white; border-radius: 8px; font-size: 1.2rem; text-align: center; }
        .btn { background: var(--accent); color: black; font-weight: 900; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; text-transform: uppercase; }
        #message { margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>⚙️ RÉGLAGES PIN</h1>
            <p style="color: var(--text-dim);">Définissez le nouveau code secret de votre caisse.</p>
            <input type="password" id="newPin" placeholder="Nouveau code PIN" maxlength="8">
            <button class="btn" onclick="saveNewPin()">Enregistrer le nouveau code</button>
            <div id="message"></div>
            <br>
            <a href="/logiciel.html" style="color: var(--text-dim); text-decoration: none; font-size: 0.9rem;">← Retour à la caisse</a>
        </div>
    </div>

    <script>
        async function saveNewPin() {
            const newPin = document.getElementById('newPin').value;
            const msg = document.getElementById('message');
            const tenantID = localStorage.getItem('ichef_tenant_id');

            if(!newPin) return;

            try {
                const response = await fetch('/api/update-pin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID, newPin })
                });
                const result = await response.json();
                if(result.success) {
                    msg.style.color = "#4ade80";
                    msg.innerText = "✅ Code PIN mis à jour !";
                } else {
                    msg.style.color = "#f87171";
                    msg.innerText = "❌ Erreur serveur.";
                }
            } catch (e) {
                msg.innerText = "❌ Erreur de connexion.";
            }
        }
    </script>
</body>
</html>
