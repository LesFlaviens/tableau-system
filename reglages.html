<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChef OS | Réglages</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #09090b; --card: #11141d; --accent: #fbbf24; --text-dim: #9ca3af; --border-color: #2d313a; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; margin: 0; padding: 40px; }
        .container { max-width: 800px; margin: 0 auto; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; }
        h1 { font-weight: 800; font-size: 2rem; margin: 0; }
        .btn-back { color: var(--text-dim); text-decoration: none; font-weight: 600; border: 1px solid var(--border-color); padding: 10px 15px; border-radius: 8px; transition: 0.2s; }
        .btn-back:hover { color: white; background: rgba(255,255,255,0.05); }
        .card { background: var(--card); border: 1px solid var(--border-color); padding: 30px; border-radius: 16px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        input { width: 100%; padding: 15px; margin-top: 15px; margin-bottom: 20px; background: #000; border: 1px solid #333; color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: 0.2s; }
        input:focus { outline: none; border-color: var(--accent); }
        .btn-submit { background: var(--accent); color: black; font-weight: 900; padding: 15px; border: none; border-radius: 8px; cursor: pointer; width: 100%; text-transform: uppercase; font-size: 1rem; transition: 0.2s; }
        .btn-submit:hover { transform: scale(1.02); }
        #msg-pin { font-weight: bold; margin-top: 15px; text-align: center; padding: 10px; border-radius: 8px; display: none; }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <div>
                <h1>⚙️ Administration</h1>
                <p id="restaurant-name" style="color: var(--text-dim); margin: 5px 0 0 0; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;">ID : Chargement...</p>
            </div>
            <button class="btn-back" onclick="goBack()">Retour au Logiciel</button>
        </div>

        <div class="card">
            <h2 style="margin-top:0; color:var(--accent);">🔒 Sécurité : Code PIN Maître</h2>
            <p style="color: var(--text-dim); font-size: 0.9rem; line-height: 1.5;">Ce code permet de déverrouiller vos écrans de caisse et de production. Choisissez un code sécurisé (4 à 6 chiffres).</p>
            <input type="password" id="new-pin" placeholder="Tapez le nouveau code PIN (ex: 1234)">
            <button class="btn-submit" onclick="updatePin()">Mettre à jour le PIN</button>
            <div id="msg-pin"></div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let currentTenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
        
        // Redirection vers l'URL de production Render
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
        ? "http://localhost:10000" 
        : "https://tableau-system.onrender.com";

        if (!currentTenantID) window.location.href = 'vitrine.html';
        
        document.getElementById('restaurant-name').innerText = "ID : " + currentTenantID;

        // Fonction pour retourner dynamiquement au bon logiciel
        async function goBack() {
            try {
                const licRes = await fetch(`${SERVER_URL}/api/check-license?tenantID=${currentTenantID}`);
                const licData = await licRes.json();
                
                if (licData.plan === 'CHEF') window.location.href = `chef.html?tenantID=${currentTenantID}`;
                else if (licData.plan === 'PREMIUM') window.location.href = `index.html?tenantID=${currentTenantID}`;
                else window.location.href = `pack-eco.html?tenantID=${currentTenantID}`;
            } catch(e) {
                window.location.href = `pack-eco.html?tenantID=${currentTenantID}`;
            }
        }

        // Fonction pour envoyer le nouveau PIN au serveur
        async function updatePin() {
            const newPin = document.getElementById('new-pin').value.trim();
            const msg = document.getElementById('msg-pin');
            msg.style.display = 'block';

            if (!newPin) {
                msg.style.color = "#f87171";
                msg.style.background = "rgba(248, 113, 113, 0.1)";
                msg.innerText = "❌ Veuillez entrer un code PIN.";
                return;
            }

            try {
                const response = await fetch(`${SERVER_URL}/api/update-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: currentTenantID, newPin: newPin })
                });
                
                const result = await response.json();

                if (result.success) {
                    msg.style.color = "#4ade80";
                    msg.style.background = "rgba(74, 222, 128, 0.1)";
                    msg.innerText = "✅ Code PIN mis à jour avec succès.";
                    document.getElementById('new-pin').value = ''; 
                    localStorage.setItem('ichef_master_pin', newPin); // Met à jour le cache local
                } else {
                    msg.style.color = "#f87171";
                    msg.style.background = "rgba(248, 113, 113, 0.1)";
                    msg.innerText = "❌ Erreur : " + (result.error || "Impossible de mettre à jour.");
                }
            } catch (err) {
                msg.style.color = "#f87171";
                msg.style.background = "rgba(248, 113, 113, 0.1)";
                msg.innerText = "📡 Erreur de communication avec le serveur.";
            }
        }
    </script>
    // ... Tout le reste de ton code JavaScript actuel (fonctions, boutons, etc.) ...
        
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {
                    console.log('✅ Moteur iCHEF PWA activé avec succès !', registration.scope);
                })
                .catch(err => {
                    console.error('❌ Erreur de sécurité PWA :', err);
                });
            });
        }
    </script>
</body>
</html>
</body>
</html>
