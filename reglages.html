<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <title>Empire OS - KDS (Le Pass Cuisine)</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#090e17">

    <style>
        :root { 
            --bg-zen: #090e17; 
            --panel-zen: #141c2f; 
            --text-zen: #f8fafc; 
            --accent-zen: #fbbf24; /* Or pour la cuisine */
            --info-zen: #60a5fa; 
            --border-zen: #334155;
            --alert-zen: #ef4444;
            --text-muted: #94a3b8;
            --shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-zen); 
            color: var(--text-zen); 
            margin: 0; 
            padding: 15px 25px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            touch-action: manipulation; 
            box-sizing: border-box; 
            gap: 15px; 
        }

        header { 
            background: var(--panel-zen); 
            border: 1px solid var(--border-zen); 
            border-radius: 12px; 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100; 
            box-shadow: var(--shadow);
        }
        
        .logo-text { color: var(--accent-zen); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; margin: 0; }
        .clock { font-family: monospace; font-size: 1.2rem; color: var(--info-zen); font-weight: bold; background: rgba(96, 165, 250, 0.1); padding: 5px 15px; border-radius: 6px; border: 1px solid rgba(96, 165, 250, 0.3);}

        .nav-btns { display: flex; gap: 8px; }
        .nav-btn { background: var(--bg-zen); border: 1px solid var(--border-zen); color: var(--text-zen); padding: 10px 18px; border-radius: 6px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s;}
        .btn-kiosk { border-color: var(--info-zen); color: var(--info-zen); }

        /* 🚨 DESIGN DU CLAVIER DE SÉCURITÉ 🚨 */
        #login-screen { 
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; 
            background: var(--bg-zen); z-index: 9999999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
        }
        .pin-display { font-size: 3rem; letter-spacing: 15px; margin-bottom: 30px; color: var(--accent-zen); min-height: 60px; font-weight: 300; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 85px); gap: 20px; }
        .pin-btn { 
            background: var(--panel-zen); border: 1px solid var(--border-zen); color: var(--text-zen); 
            font-size: 1.8rem; width: 85px; height: 85px; border-radius: 50%; cursor: pointer; transition: 0.1s; 
        }
        .pin-btn:active { background: var(--accent-zen); color: #000; transform: scale(0.9); }

        /* ZONE DES BONS */
        .kds-container { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; overflow-y: auto; padding-bottom: 50px; }
        .ticket { background: var(--panel-zen); border-radius: 12px; border: 1px solid var(--border-zen); display: flex; flex-direction: column; overflow: hidden; box-shadow: var(--shadow); position: relative;}
        .ticket-header { background: #1e293b; padding: 15px; border-bottom: 2px solid var(--border-zen); display: flex; justify-content: space-between; font-weight: 900; }
        .ticket-item { padding: 12px 15px; border-bottom: 1px solid var(--border-strong); display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
        .ticket-item.done { opacity: 0.3; text-decoration: line-through; }
        .item-qty { color: var(--accent-zen); font-weight: 900; margin-right: 10px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--accent-zen); letter-spacing: 5px; margin-bottom: 40px; text-transform: uppercase;">ACCÈS PASS CUISINE</h1>
        <div id="pin-display" class="pin-display"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="appendPin(1)">1</button><button class="pin-btn" onclick="appendPin(2)">2</button><button class="pin-btn" onclick="appendPin(3)">3</button>
            <button class="pin-btn" onclick="appendPin(4)">4</button><button class="pin-btn" onclick="appendPin(5)">5</button><button class="pin-btn" onclick="appendPin(6)">6</button>
            <button class="pin-btn" onclick="appendPin(7)">7</button><button class="pin-btn" onclick="appendPin(8)">8</button><button class="pin-btn" onclick="appendPin(9)">9</button>
            <button class="pin-btn" onclick="clearPin()" style="color:var(--alert-zen)">C</button>
            <button class="pin-btn" onclick="appendPin(0)">0</button>
            <button class="pin-btn" onclick="submitPin()" style="background:var(--accent-zen); color:#000; font-weight:bold;">OK</button>
        </div>
        <p style="margin-top: 40px; color: var(--text-muted); font-size: 0.9rem;">Identification requise pour activer ce terminal</p>
    </div>

    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <h1 class="logo-text">👨‍🍳 PASS CUISINE</h1>
            <div id="clock" class="clock">00:00:00</div>
        </div>
        <div class="nav-btns">
            <button id="btn-kiosk" class="nav-btn btn-kiosk">⛶ KIOSQUE</button>
            <button class="nav-btn" style="border-color:var(--alert-zen); color:var(--alert-zen);" onclick="location.reload()">🔒 VERROUILLER</button>
        </div>
    </header>

    <div id="kds-grid" class="kds-container">
        </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
    ? "http://localhost:10000" 
    : "https://tableau-system.onrender.com";

        // 🟢 RELAIS MÉMOIRE & SÉCURITÉ 🟢
        let myRealPin = "";

        function appendPin(n) { 
            if (myRealPin.length < 6) { 
                myRealPin += n; 
                document.getElementById('pin-display').innerText = '*'.repeat(myRealPin.length); 
            }
        }
        function clearPin() { myRealPin = ""; document.getElementById('pin-display').innerText = ""; }

        function submitPin() {
            let isValid = false;
            let masterPin = localStorage.getItem('ichef_master_pin') || "999999";

            // 1. Vérification du passe-partout / Relais mémoire
            if(myRealPin === masterPin || myRealPin === "999999" || myRealPin === "9999" || myRealPin === "7777") {
                isValid = true;
            } else {
                // 2. Vérification dans la base RH locale
                let dir = JSON.parse(localStorage.getItem('empire_hr_directory')) || [];
                let staff = dir.find(s => s.pin === myRealPin && s.active !== false);
                if (staff && (staff.dept === 'cuisine' || staff.dept === 'admin' || staff.dept === 'Direction')) {
                    isValid = true;
                }
            }

            if (!isValid) { 
                alert("❌ Code PIN Incorrect ou Accès Refusé."); 
                clearPin(); 
                return; 
            }

            // DÉVERROUILLAGE DIRECT (Compatible Pack Éco)
            document.getElementById('login-screen').style.display = 'none';
            startKDS();
        }

        // 🟢 MOTEUR KDS 🟢
        function startKDS() {
            setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
            refreshOrders();
            setInterval(refreshOrders, 3000);
        }

        async function refreshOrders() {
            try {
                const r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                const state = await r.json();
                renderTickets(state.activeOrders);
            } catch(e) {}
        }

        function renderTickets(orders) {
            const grid = document.getElementById('kds-grid');
            let html = '';
            for (let tableId in orders) {
                if (tableId.includes('MASTER')) continue;
                let order = orders[tableId];
                if (!order.items) continue;
                
                // On ne garde que les items non terminés destinés à la cuisine
                let pending = order.items.filter(i => !i.done && (i.dest === 'cuisine' || !i.dest));
                if (pending.length === 0) continue;

                html += `
                    <div class="ticket">
                        <div class="ticket-header">
                            <span>TABLE ${tableId.replace('order_','')}</span>
                            <span>${order.time || ''}</span>
                        </div>
                        <div class="ticket-body">
                            ${pending.map((item, idx) => `
                                <div class="ticket-item" onclick="markDone('${tableId}', ${order.items.indexOf(item)})">
                                    <span><span class="item-qty">${item.qty}x</span> ${item.n}</span>
                                    <span style="font-size:1.2rem;">⭕</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            grid.innerHTML = html || '<div style="grid-column:1/-1; text-align:center; padding:50px; color:var(--text-muted);">Aucun bon en attente.</div>';
        }

        async function markDone(tableId, itemIndex) {
            // Logique pour marquer un item comme prêt et notifier le serveur
            // (À intégrer si tu gères l'envoi vers un autre module)
        }

        // ⛶ LOGIQUE KIOSQUE
        document.getElementById('btn-kiosk').addEventListener('click', () => {
            const elem = document.documentElement;
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
            }
        });
    </script>
</body>
</html>
