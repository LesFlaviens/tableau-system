<!DOCTYPE html>
<html lang="fr">
<head>
    <script>
    // 🛡️ GARDE DU CORPS iCHEF : CONTRÔLE STRICT DES ACCÈS B2B
        (async function checkAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            const tenantID = urlParams.get('tenantID') || localStorage.getItem('ichef_tenant_id');
            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";
            
            // S'il n'a pas d'ID, on le jette dehors
            if(!tenantID) return window.location.href = 'vitrine.html';

            try {
                const res = await fetch(`${SERVER_URL}/api/check-license?tenantID=${tenantID}`);
                const data = await res.json();
                
                // Si le compte est effacé ou suspendu par toi
                if(!data.success || data.status === 'SUSPENDU') {
                    alert("⛔ LICENCE SUSPENDUE OU INVALIDE.");
                    return window.location.href = 'vitrine.html';
                }

                const plan = data.plan; // 'CHEF', 'BUSINESS', ou 'PREMIUM'
                const currentPage = window.location.pathname.split('/').pop().toLowerCase();

                // Les pages autorisées selon le forfait
                let allowedPages = [];

                if (plan === 'CHEF') {
                    // Pack à 14€ (1 écran)
                    allowedPages = ['administration.html', 'portail-client.html', 'chef.html', 'chef-pastisser.html', 'chef-bar.html'];
                
                } else if (plan === 'BUSINESS') {
                    // Pack à 45€ (5 écrans)
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'menu-pure.html', 'menu-bar.html', 'bar.html'];
                
                } else if (plan === 'PREMIUM') {
                    // Pack à 129€ (50 écrans) -> TOUT EST AUTORISÉ
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'chef.html', 'chef-pastisser.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'bar.html', 'cuisinie.html', 'planning-cuisine.html'];
                }

                // Vérification : si la page actuelle n'est pas dans la liste autorisée de son forfait
                if (currentPage !== '' && !allowedPages.includes(currentPage)) {
                    alert(`⛔ ACCÈS REFUSÉ :\nVotre forfait actuel (${plan}) n'inclut pas ce module.\nVeuillez upgrader votre offre pour y accéder.`);
                    // On le renvoie sur son espace client principal
                    window.location.href = `portail-client.html?tenantID=${tenantID}`;
                }

            } catch(e) {
                console.log("Mode hors-ligne actif. Vérification des accès retardée.");
            }
        })();
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Portail Sécurisé</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            overflow: hidden; /* Empêche de scroller la page mère */
            background-color: #000;
            
            /* 🚫 BLOQUE LA SÉLECTION DE TEXTE (Anti Copier-Coller) */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* L'Iframe prend tout l'écran, le logiciel Render est à l'intérieur */
        #empire-software {
            width: 100%; 
            height: 100%; 
            border: none;
        }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" ondrop="return false;">

    <iframe id="empire-software" src="https://tableau-system.onrender.com/connexion.html" allow="fullscreen"></iframe>

</body>
</html>
