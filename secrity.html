<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#000000">

    <title>Empire OS - Portail Sécurisé</title>
    
    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            overflow: hidden; /* Empêche de scroller la page mère */
            background-color: #000;
            
            /* 🚫 BLOQUE LA SÉLECTION DE TEXTE (Anti Copier-Coller) */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* L'Iframe prend tout l'écran, le logiciel Render est à l'intérieur */
        #empire-software {
            width: 100%; 
            height: 100%; 
            border: none;
        }
    </style>
    
    <script>
        // 🛡️ GARDE DU CORPS iCHEF : CONTRÔLE STRICT DES ACCÈS B2B ET FORFAITS
        (async function checkAccess() {
            const urlParams = new URLSearchParams(window.location.search);
            let urlTenantID = urlParams.get('tenantID');
            let storedTenantID = localStorage.getItem('ichef_tenant_id');

            // 🚨 SÉCURITÉ ANTI-FUITE : Si l'URL demande un nouveau resto, on écrase l'ancien !
            if (urlTenantID && urlTenantID !== storedTenantID) {
                localStorage.removeItem('EMPIRE_GLOBAL_SYNC');
                localStorage.removeItem('ichef_master_pin');
                localStorage.setItem('ichef_tenant_id', urlTenantID);
                storedTenantID = urlTenantID;
            }

            const tenantID = urlTenantID || storedTenantID;
            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";
            
            // S'il n'a pas d'ID, on le jette dehors vers ta page de vente
            if(!tenantID) return window.location.href = 'vitrine.html';

            try {
                const res = await fetch(`${SERVER_URL}/api/check-license?tenantID=${tenantID}`);
                const data = await res.json();
                
                // Si le compte est effacé ou suspendu par toi
                if(!data.success || data.status === 'SUSPENDU') {
                    alert("⛔ LICENCE SUSPENDUE OU INVALIDE.");
                    return window.location.href = 'vitrine.html';
                }

                const plan = data.plan; // 'CHEF', 'BUSINESS', ou 'PREMIUM'
                const currentPage = window.location.pathname.split('/').pop().toLowerCase();

                // Matrice des pages autorisées selon le forfait B2B
                let allowedPages = [];

                if (plan === 'CHEF') {
                    // Pack à 14€ (1 écran)
                    allowedPages = ['administration.html', 'portail-client.html', 'chef.html', 'chef-pastisser.html', 'chef-bar.html', 'index.html', ''];
                
                } else if (plan === 'BUSINESS') {
                    // Pack à 45€ (5 écrans)
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'menu-pure.html', 'menu-bar.html', 'bar.html', 'index.html', ''];
                
                } else if (plan === 'PREMIUM') {
                    // Pack à 129€ (50 écrans) -> TOUT EST AUTORISÉ
                    allowedPages = ['administration.html', 'portail-client.html', 'pack-eco.html', 'admin.html', 'menu-qr.html', 'chef.html', 'chef-pastisser.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'bar.html', 'cuisinie.html', 'planning-cuisine.html', 'index.html', ''];
                }

                // Vérification : si la page actuelle n'est pas dans la liste autorisée de son forfait
                if (!allowedPages.includes(currentPage)) {
                    alert(`⛔ ACCÈS REFUSÉ :\nVotre forfait actuel (${plan}) n'inclut pas ce module.\nVeuillez upgrader votre offre pour y accéder.`);
                    // On le renvoie sur son espace client principal
                    window.location.href = `portail-client.html?tenantID=${tenantID}`;
                }

            } catch(e) {
                console.log("Mode hors-ligne actif. Vérification des accès réseau retardée.");
            }
        })();
    </script>
</head>

<body oncontextmenu="return false;" ondragstart="return false;" ondrop="return false;">

    <div id="pwa-strict-lock" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 9999999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif;">
        
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="110" height="110" style="margin-bottom: 25px;">
            <rect width="512" height="512" rx="100" fill="#0f172a"/>
            <path d="M176 333c0-40 32-67 80-67s80 27 80 67z" fill="#d4af37"/>
            <path d="M160 266c-13-26 5-66 40-66c13 0 32 13 40 26c8-13 27-26 43-26c16 0 35 13 43 26c8-13 27-26 40-26c35 0 53 40 40 66z" fill="#fefefe"/>
            <rect x='176' y='266' width='160' height='22' rx='5' fill='#d4af37'/>
        </svg>

        <h1 style="color: #ffffff; font-size: 1.8rem; font-weight: 800; margin: 0; letter-spacing: 1px; text-transform: uppercase;">iCHEF EMPIRE OS</h1>
        <p style="color: #94a3b8; max-width: 420px; font-size: 0.95rem; margin-top: 12px; margin-bottom: 35px; line-height: 1.6; font-weight: 500;">
            L'accès à ce module nécessite l'installation de l'application. Cela permet de masquer la barre de recherche et de sécuriser l'affichage de l'écran.
        </p>

        <button id="btn-force-install" style="background: linear-gradient(135deg, #d4af37, #b89626); color: #050505; border: none; padding: 16px 35px; font-size: 1rem; font-weight: 900; border-radius: 10px; cursor: pointer; box-shadow: 0 0 25px rgba(212, 175, 55, 0.25); text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s;">
            📲 TÉLÉCHARGER L'APPLICATION
        </button>
    </div>

    <iframe id="empire-software" src="https://tableau-system.onrender.com/connexion.html" allow="fullscreen"></iframe>

    <script>
        // 🔒 VIGILE DE SÉCURITÉ PWA POUR LE LANCEUR IFRAME
        (function() {
            let deferredInstallPrompt = null;

            function verifyImmersion() {
                // Détecte si la fenêtre principale est en mode Application autonome (sans barres Chrome)
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
                                  || window.navigator.standalone === true;
                
                const lockCurtain = document.getElementById('pwa-strict-lock');
                
                if (lockCurtain) {
                    if (isStandalone) {
                        lockCurtain.style.display = 'none'; // Mode App OK -> On affiche l'iframe
                    } else {
                        lockCurtain.style.display = 'flex'; // Mode Web normal -> Blocage total !
                    }
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', verifyImmersion);
            } else {
                verifyImmersion();
            }

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredInstallPrompt = e;
            });

            document.addEventListener('DOMContentLoaded', () => {
                const installBtn = document.getElementById('btn-force-install');
                if (installBtn) {
                    installBtn.addEventListener('click', async () => {
                        if (!deferredInstallPrompt) {
                            alert("ℹ️ iCHEF est déjà installé. Recherchez l'icône de l'application sur votre écran d'accueil ou votre bureau pour lancer le système proprement !");
                            return;
                        }
                        deferredInstallPrompt.prompt();
                        const { outcome } = await deferredInstallPrompt.userChoice;
                        if (outcome === 'accepted') {
                            deferredInstallPrompt = null;
                            alert("✅ Installation réussie ! Lancez l'application iCHEF depuis votre écran pour supprimer définitivement la barre de recherche.");
                        }
                    });
                }
            });

            window.addEventListener('appinstalled', () => {
                deferredInstallPrompt = null;
                verifyImmersion();
            });
        })();
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {
                    console.log('✅ Moteur iCHEF PWA du lanceur activé !', registration.scope);
                })
                .catch(err => {
                    console.error('❌ Erreur PWA lanceur :', err);
                });
            });
        }
    </script>
</body>
</html>
