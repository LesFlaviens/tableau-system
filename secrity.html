<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Portail Sécurisé</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#000000">

    <style>
        body, html {
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%;
            overflow: hidden; /* Empêche de scroller la page mère */
            background-color: #000;
            
            /* 🚫 BLOQUE LA SÉLECTION DE TEXTE (Anti Copier-Coller) */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        /* L'Iframe prend tout l'écran, le logiciel Render est à l'intérieur */
        #empire-software {
            width: 100%; 
            height: 100%; 
            border: none;
        }
    </style>
</head>
<body oncontextmenu="return false;" ondragstart="return false;" ondrop="return false;">

    <iframe id="empire-software" src="https://tableau-system.onrender.com/connexion.html" allow="fullscreen"></iframe>

</body>
</html>
