<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HACCP EMPIRE - Audit Dynamique H24</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; --dept-bg: #1a1a1a; --ordered: #2979ff;}
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* NAVIGATION MODULES */
        .nav-haccp { background: var(--panel); padding: 10px 30px; display: flex; gap: 15px; border-bottom: 1px solid #333; align-items: center; flex-wrap: wrap; }
        .nav-btn { background: transparent; border: 1px solid #333; color: #888; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.8rem;}
        .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255, 179, 0, 0.05); }

        .content { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; }
        .module { display: flex; flex-direction: column; gap: 20px; }
        
        .card { background: var(--panel); border-radius: 8px; padding: 15px; border: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; font-size: 1rem; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
        .status-ok { background: rgba(0, 230, 118, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .status-danger { background: rgba(255, 23, 68, 0.1); color: var(--alert); border: 1px solid var(--alert); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #555; font-size: 0.7rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #111; font-size: 0.9rem; }
        
        .btn-empire { background: var(--gold); color: #000; border: none; padding: 12px 25px; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        
        .btn-rectify { background: #222; color: #ccc; border: 1px solid #444; padding: 5px 10px; font-size: 0.7rem; border-radius: 3px; cursor: pointer; text-transform: uppercase;}
        .signature-audit { font-size: 0.65rem; color: #444; font-style: italic; display: flex; flex-direction: column; gap: 2px;}

        .mic-btn { background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .mic-btn.recording { background: var(--alert); border-color: var(--alert); animation: pulse 1s infinite; }
        .input-with-mic { display: flex; gap: 5px; }
        .input-with-mic input { flex: 1; }
        .export-btn { background: transparent; border: 1px solid var(--ordered); color: var(--ordered); padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.8rem; margin-left: auto; }

        /* MODAL HISTORIQUE */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 50000; display: none; align-items: center; justify-content: center; }
        .modal.open { display: flex !important; }
        .history-box { background: #111; border: 2px solid var(--gold); padding: 25px; border-radius: 8px; width: 600px; max-width: 90%; max-height: 80vh; display: flex; flex-direction: column; }
        #history-content { flex: 1; overflow-y: auto; padding-right: 10px; margin-top: 15px; }
        .history-entry { border-left: 2px solid #333; padding-left: 20px; padding-bottom: 20px; position: relative; }
        .history-entry::before { content: ''; position: absolute; left: -7px; top: 0; width: 12px; height: 12px; background: var(--gold); border-radius: 50%; }
        .history-time { font-size: 0.9rem; color: #888; font-weight: bold; margin-bottom: 6px; display: inline-block; background: #000; padding: 2px 8px; border-radius: 4px; border: 1px solid #333;}
        .history-detail { font-size: 1rem; color: #fff; line-height: 1.4; background: #1a1a1a; padding: 10px; border-radius: 4px; border: 1px solid #222;}

        /* 🟢 LOGIN SCREEN (PORTAIL) */
        #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 60000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dept-choice-btn { background: #111; border: 2px solid #333; border-radius: 12px; padding: 30px; font-size: 1.5rem; font-weight: 900; color: #fff; cursor: pointer; transition: 0.2s; width: 220px; text-align: center; }
        .dept-choice-btn.cuisine { border-color: var(--gold); color: var(--gold); }
        .dept-choice-btn.bar { border-color: #00e5ff; color: #00e5ff; }
        .dept-choice-btn.service { border-color: #2979ff; color: #2979ff; }
        
        .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 20px; }
        .pin-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 1.5rem; font-weight: bold; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; transition: 0.1s; }
        .pin-btn:active { background: var(--gold); color: #000; }
        .pin-display { font-size: 2rem; letter-spacing: 10px; margin-bottom: 20px; color: var(--gold); min-height: 40px;}
    </style>
</head>
<body>

    <audio id="beep-dlc" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <div id="login-screen">
        <h1 style="color:var(--gold); letter-spacing: 3px; margin-bottom: 40px;">HACCP EMPIRE</h1>
        
        <div id="login-step-1" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
            <button class="dept-choice-btn cuisine" onclick="showPinPad('CUISINE')"><div style="font-size: 3rem; margin-bottom: 10px;">🔪</div>CUISINE</button>
            <button class="dept-choice-btn bar" onclick="showPinPad('BAR')"><div style="font-size: 3rem; margin-bottom: 10px;">🍸</div>BAR</button>
            <button class="dept-choice-btn service" onclick="showPinPad('SERVICE')"><div style="font-size: 3rem; margin-bottom: 10px;">🛎️</div>SERVICE</button>
        </div>

        <div id="login-step-2" style="display: none; flex-direction: column; align-items: center;">
            <div id="login-instruction" style="color:#aaa; margin-bottom: 20px; font-size: 1.2rem; font-weight: bold;"></div>
            <div id="pin-display" class="pin-display"></div>
            <div class="pin-pad">
                <button class="pin-btn" onclick="appendPin(1)">1</button><button class="pin-btn" onclick="appendPin(2)">2</button><button class="pin-btn" onclick="appendPin(3)">3</button>
                <button class="pin-btn" onclick="appendPin(4)">4</button><button class="pin-btn" onclick="appendPin(5)">5</button><button class="pin-btn" onclick="appendPin(6)">6</button>
                <button class="pin-btn" onclick="appendPin(7)">7</button><button class="pin-btn" onclick="appendPin(8)">8</button><button class="pin-btn" onclick="appendPin(9)">9</button>
                <button class="pin-btn" onclick="clearPin()" style="background:#333;">C</button><button class="pin-btn" onclick="appendPin(0)">0</button><button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
            </div>
            <button style="margin-top: 30px; background: transparent; border: 1px solid #aaa; color: #aaa; padding: 10px 20px; border-radius: 4px; cursor: pointer;" onclick="backToStep1()">🔙 RETOUR</button>
        </div>
    </div>

    <div class="nav-haccp">
        <button class="nav-btn" style="border-color: var(--alert); color: var(--alert); margin-right: 10px;" onclick="logoutToPortal()">🔒 SORTIR / CHANGER</button>
        
        <div style="font-weight: 900; color: var(--gold); margin-right: 20px; text-transform: uppercase; letter-spacing: 1px;">⚖️ HACCP AUDIT : <span id="current-active-dept" style="color:#fff;">-</span></div>
        <button class="nav-btn active" onclick="showModule('temp')">🌡️ TEMPÉRATURES</button>
        <button class="nav-btn" onclick="showModule('cleaning')">🧼 NETTOYAGE</button>
        <button class="nav-btn" onclick="showModule('trace')">🏷️ TRAÇABILITÉ (DLC)</button>
        <button class="export-btn" onclick="exportToPDF()">📄 EXPORTER PDF</button>
    </div>

    <div class="content" id="print-content">
        <div id="mod-temp" class="module">
            <div class="card hide-on-print">
                <h2 style="margin:0 0 15px 0; font-size: 0.9rem; color: var(--gold); text-transform: uppercase;">NOUVEAU RELEVÉ</h2>
                <div class="grid">
                    <div class="input-group"><label>Équipement</label><input type="text" id="eq-name" placeholder="Ex: Frigo 1..."></div>
                    <div class="input-group"><label>Valeur (°C)</label><input type="number" id="eq-val" step="0.1"></div>
                    <div class="input-group" style="justify-content: flex-end;"><button class="btn-empire" onclick="submitEntry('temp')">Enregistrer</button></div>
                </div>
            </div>
            <div class="card" style="flex:1; overflow:auto;">
                <table>
                    <thead><tr><th>Heure</th><th>Équipement</th><th>Valeur</th><th>Statut</th><th>Audit</th><th class="hide-on-print">Action</th></tr></thead>
                    <tbody id="logs-temp"></tbody>
                </table>
            </div>
        </div>

        <div id="mod-cleaning" class="module" style="display:none;">
            <div class="card hide-on-print">
                <h2 style="margin:0 0 15px 0; font-size: 0.9rem; color: var(--gold); text-transform: uppercase;">PLAN DE NETTOYAGE</h2>
                <div class="grid">
                    <div class="input-group"><label>Zone</label><input type="text" id="clean-zone"></div>
                    <div class="input-group"><label>Observation</label><input type="text" id="clean-obs"></div>
                    <div class="input-group"><label>Statut</label><select id="clean-status"><option value="FAIT">FAIT</option><option value="NON FAIT">NON FAIT</option></select></div>
                    <div class="input-group" style="justify-content: flex-end;"><button class="btn-empire" onclick="submitEntry('cleaning')">Valider</button></div>
                </div>
            </div>
            <div class="card" style="flex:1; overflow:auto;">
                <tbody id="logs-cleaning"></tbody>
            </div>
        </div>

        <div id="mod-trace" class="module" style="display:none;">
            <div class="card hide-on-print">
                <h2 style="margin:0 0 15px 0; font-size: 0.9rem; color: var(--gold); text-transform: uppercase;">DLC</h2>
                <div class="grid">
                    <div class="input-group"><label>Produit</label><input type="text" id="trace-name"></div>
                    <div class="input-group"><label>DLC</label><input type="date" id="trace-dlc"></div>
                    <div class="input-group" style="justify-content: flex-end;"><button class="btn-empire" onclick="submitEntry('trace')">Archiver</button></div>
                </div>
            </div>
            <div class="card" style="flex:1; overflow:auto;">
                <tbody id="logs-trace"></tbody>
            </div>
        </div>
    </div>

    <div id="history-modal" class="modal"><div class="history-box"><div id="history-content"></div><button class="btn-empire" onclick="closeHistory()">FERMER</button></div></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json()).catch(() => ({activeOrders: {}})),
            update: (key, data) => fetch('/update-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: key, order: { data } }) })
        };

        let db = { temp: [], trace: [], cleaning: [] };
        let selectedLoginDept = ""; 
        let currentDept = 'CUISINE'; 
        let currentPin = "";
        const USERS = { "1234": "Serveur", "5678": "Cuisinier", "4321": "Barman", "9999": "Manager" };

        function showPinPad(dept) {
            selectedLoginDept = dept;
            document.getElementById('login-step-1').style.display = 'none';
            document.getElementById('login-step-2').style.display = 'flex';
            document.getElementById('login-instruction').innerText = "IDENTIFICATION : " + dept;
        }

        function backToStep1() {
            document.getElementById('login-step-2').style.display = 'none';
            document.getElementById('login-step-1').style.display = 'flex';
            clearPin();
        }

        // 🟢 FONCTION POUR REVENIR AU PORTAIL DE DÉPART
        function logoutToPortal() {
            document.getElementById('login-screen').style.display = 'flex';
            backToStep1();
        }

        function appendPin(num) { currentPin += num; document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length); }
        function clearPin() { currentPin = ""; document.getElementById('pin-display').innerText = ""; }

        function submitPin() {
            if(USERS[currentPin]) {
                currentDept = selectedLoginDept;
                document.getElementById('current-active-dept').innerText = currentDept;
                document.getElementById('login-screen').style.display = 'none';
                loadAllLogs();
            } else { alert("❌ Code incorrect."); clearPin(); }
        }

        function showModule(id) {
            document.querySelectorAll('.module').forEach(m => m.style.display = 'none');
            document.getElementById('mod-' + id).style.display = 'flex';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function loadAllLogs() {
            const state = await API.getState();
            if(state.activeOrders) {
                db.temp = state.activeOrders['HACCP_TEMP']?.data || [];
                db.trace = state.activeOrders['HACCP_TRACE']?.data || [];
                db.cleaning = state.activeOrders['HACCP_CLEANING']?.data || [];
            }
            renderTempLogs(); renderTraceLogs(); renderCleaningLogs();
        }

        function renderTempLogs() {
            const container = document.getElementById('logs-temp');
            const filtered = db.temp.filter(l => l.dept === currentDept);
            container.innerHTML = filtered.map(l => `<tr><td>${l.time}</td><td>${l.eq}</td><td>${l.val}°C</td><td>${l.status}</td><td>${l.auditTrailOriginal}</td><td><button class="btn-rectify" onclick="showHistory('temp', ${l.id})">HISTO</button></td></tr>`).join('');
        }

        async function submitEntry(type) {
            let entry = { id: Date.now(), time: new Date().toLocaleTimeString('fr-FR'), dept: currentDept, auditTrailOriginal: "Signé par " + USERS[currentPin] };
            if(type === 'temp') { entry.eq = document.getElementById('eq-name').value; entry.val = document.getElementById('eq-val').value; entry.status = entry.val < 5 ? 'OK' : 'ALERTE'; }
            db[type].push(entry);
            await API.update(`HACCP_${type.toUpperCase()}`, db[type]);
            loadAllLogs();
        }

        function showHistory(type, id) { document.getElementById('history-modal').classList.add('open'); }
        function closeHistory() { document.getElementById('history-modal').classList.remove('open'); }
        function exportToPDF() { window.print(); }
    </script>
</body>
</html>
