<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - KDS (Le Pass Cuisine)</title>
    <style>
        :root { 
            --bg-zen: #0f172a; 
            --panel-zen: #1e293b; 
            --text-zen: #f8fafc; 
            --accent-zen: #34d399; 
            --info-zen: #60a5fa; 
            --obs-zen: #fbbf24; 
            --border-zen: #334155;
            --purple-zen: #a78bfa;
            --alert-zen: #ef4444;
            --text-muted: #94a3b8;
            --shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-zen); 
            color: var(--text-zen); 
            margin: 0; 
            padding: 10px 15px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            touch-action: manipulation; 
            box-sizing: border-box; 
            gap: 10px; 
        }

        /* 🟢 CORRECTION : HEADER SUR UNE SEULE LIGNE 🟢 */
        header { 
            background: var(--panel-zen); 
            border: 1px solid var(--border-zen); 
            border-radius: 12px; 
            padding: 10px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100; 
            box-shadow: var(--shadow);
            flex-wrap: nowrap; /* Empêche le retour à la ligne */
            gap: 10px;
        }
        
        .logo-text { color: var(--text-zen); font-size: 1.2rem; font-weight: 900; letter-spacing: 1px; margin: 0; text-transform: uppercase; white-space: nowrap; }
        .clock { font-family: monospace; font-size: 1rem; color: var(--info-zen); font-weight: bold; background: rgba(96, 165, 250, 0.1); padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(96, 165, 250, 0.3); white-space: nowrap; }

        .resa-ticker { background: rgba(167, 139, 250, 0.1); border: 1px solid var(--purple-zen); color: var(--purple-zen); padding: 5px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 900; display: flex; align-items: center; gap: 8px; min-width: 180px; justify-content: center; cursor: pointer; flex-shrink: 0; }

        .nav-btns { display: flex; gap: 6px; flex-wrap: nowrap; overflow-x: auto; -ms-overflow-style: none; scrollbar-width: none; }
        .nav-btns::-webkit-scrollbar { display: none; }
        
        .nav-btn { background: var(--bg-zen); border: 1px solid var(--border-zen); color: var(--text-zen); padding: 8px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; cursor: pointer; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; }
        .nav-btn.active { background: rgba(255,255,255,0.1); border-color: var(--text-zen); box-shadow: inset 0 2px 4px rgba(0,0,0,0.3); }

        .module { display: none; flex: 1; overflow: hidden; }
        .module.active { display: flex; flex-direction: column; }

        .kds-scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        .kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 12px; align-items: start; }

        .ticket { background: var(--panel-zen); border: 1px solid var(--border-zen); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .ticket-header { background: #1e293b; padding: 10px 12px; border-bottom: 2px solid var(--border-zen); display: flex; justify-content: space-between; align-items: center; font-weight: 900; }
        .ticket-table { font-size: 1rem; color: var(--gold); }
        .ticket-time { font-size: 0.75rem; color: #94a3b8; }
        .ticket-obs { background: rgba(251, 191, 36, 0.1); color: var(--obs-zen); padding: 6px 12px; font-size: 0.8rem; font-weight: bold; border-bottom: 1px solid var(--border-zen); }

        .ticket-item { padding: 10px 12px; border-bottom: 1px solid var(--border-zen); display: flex; justify-content: space-between; align-items: center; transition: 0.2s; }
        .ticket-item:last-child { border-bottom: none; }

        .item-details { display: flex; flex-direction: column; gap: 2px; flex: 1;}
        .item-name { font-size: 1rem; font-weight: bold; color: var(--text-zen); }
        .item-qty { color: var(--accent-zen); font-weight: 900; margin-right: 5px; }

        /* 🟢 BADGE QUI MANGE QUOI DANS LE TICKET 🟢 */
        .seat-badge { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 1px 5px; border-radius: 4px; font-size: 0.75rem; font-weight: 900; margin-right: 8px; font-family: monospace; }

        .btn-ready { background: var(--panel-zen); border: 1px solid var(--border-zen); color: var(--text-muted); width: 38px; height: 38px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; cursor: pointer; transition: 0.2s; }
        .ticket-item.done { opacity: 0.25; text-decoration: line-through; }

        .lane-header { font-size: 1.1rem; font-weight: 900; padding: 10px 15px; border-bottom: 2px solid var(--border-zen); margin-bottom: 10px; background: var(--panel-zen); border-radius: 8px; text-transform: uppercase; }
        .lane-entrees { color: #34d399; border-bottom-color: #34d399; }
        .lane-plats { color: #facc15; border-bottom-color: #facc15; }
        .lane-desserts { color: #a78bfa; border-bottom-color: #a78bfa; }

        .fired-static { background-color: rgba(239, 68, 68, 0.08); border-left: 4px solid #ef4444; }
        .fired-late { animation: alert-reclam 1s infinite; border-left: 4px solid #ef4444; }

        @keyframes alert-reclam { 
            0% { background-color: rgba(239, 68, 68, 0.05); } 
            50% { background-color: rgba(239, 68, 68, 0.25); } 
            100% { background-color: rgba(239, 68, 68, 0.05); } 
        }

        .priority-badge { position: absolute; top: -10px; left: -10px; background: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; border: 2px solid var(--text-muted); z-index: 50; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 12px;">
            <h1 class="logo-text">🔥 LE PASS</h1>
            <div id="clock" class="clock">00:00:00</div>
            <div id="resa-ticker" class="resa-ticker" onclick="openResaDetailsModal()">
                <span id="resa-text" class="ticker-text">Sync...</span>
            </div>
        </div>
        <div class="nav-btns">
            <button class="nav-btn active" id="tab-kds" onclick="switchTab('kds')">BONS</button>
            <button class="nav-btn" id="tab-history" onclick="switchTab('history')">HISTO</button>
            <button class="nav-btn" id="tab-menu" onclick="switchTab('menu')">STOCKS</button>
            <button class="nav-btn" id="tab-staff" onclick="switchTab('staff')">STAFF</button>
            <button class="nav-btn" id="tab-recipes" onclick="switchTab('recipes')">RECETTES</button>
            <button class="nav-btn" id="tab-supplier" onclick="switchTab('supplier')">MANQUES</button>
        </div>
    </header>

    <div id="mod-kds" class="module active">
        <div class="kds-scroll-area">
            <div>
                <div class="lane-header lane-entrees">🥗 ENTRÉES</div>
                <div id="kds-grid-1" class="kds-grid"></div>
            </div>
            <div>
                <div class="lane-header lane-plats">🔥 PLATS</div>
                <div id="kds-grid-2" class="kds-grid"></div>
            </div>
            <div>
                <div class="lane-header lane-desserts">🍰 DESSERTS</div>
                <div id="kds-grid-3" class="kds-grid"></div>
            </div>
        </div>
    </div>

    <div id="mod-history" class="module"><div id="history-container"></div></div>
    <div id="mod-menu" class="module"><div id="menu-stock-container"></div></div>
    <div id="mod-staff" class="module"><div id="staff-container"></div></div>
    <div id="mod-recipes" class="module"><div id="recipes-container"></div></div>
    <div id="mod-supplier" class="module"><div id="supplier-list"></div></div>

    <script>
        const API = {
            getState: async () => {
                try {
                    let r = await fetch('https://tableau-system.onrender.com/get-current-state');
                    return r.ok ? await r.json() : { activeOrders: {} };
                } catch(e) { return { activeOrders: {} }; }
            },
            update: async (key, data) => {
                try {
                    await fetch('https://tableau-system.onrender.com/update-order', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ tableId: key, order: data })
                    });
                } catch(e) {}
            }
        };

        let activeOrders = {};
        let reservationsData = [];

        async function refreshKDS() {
            const state = await API.getState();
            if (state && state.activeOrders) {
                activeOrders = state.activeOrders;
                if(activeOrders['RESERVATIONS_MASTER']) reservationsData = activeOrders['RESERVATIONS_MASTER'].data;
                renderKDS();
                updateResaTicker();
            }
        }

        function renderKDS() {
            let lanes = { 1: [], 2: [], 3: [] };
            for (let tableId in activeOrders) {
                if (['MENU_MASTER', 'RESERVATIONS_MASTER', 'STAFF_PLANNING_MASTER', 'RECIPES_MASTER', 'SALES_ARCHIVE_CUISINE', 'ARCHITECTURE'].includes(tableId)) continue;
                
                let order = activeOrders[tableId];
                if (!order || !order.items) continue;

                order.items.filter(i => !i.done).forEach(item => {
                    let lane = item.course || 2;
                    if (!lanes[lane].find(t => t.tableId === tableId)) {
                        lanes[lane].push({ tableId, order, items: order.items.filter(i => !i.done && (i.course === lane || (lane === 2 && i.course === undefined))) });
                    }
                });
            }

            [1, 2, 3].forEach(l => {
                const container = document.getElementById('kds-grid-' + l);
                container.innerHTML = lanes[l].map(ticket => `
                    <div class="ticket">
                        <div class="ticket-header">
                            <span class="ticket-table">TABLE ${ticket.tableId}</span>
                            <span class="ticket-time">${ticket.order.time || ''}</span>
                        </div>
                        ${ticket.order.observations ? `<div class="ticket-obs">⚠️ ${ticket.order.observations}</div>` : ''}
                        <div class="ticket-body">
                            ${ticket.items.map(item => {
                                let realIdx = ticket.order.items.findIndex(i => i.id === item.id);
                                return `
                                <div class="ticket-item ${item.fired ? 'fired-static' : ''}">
                                    <div class="item-details">
                                        <div class="item-name">
                                            <span class="seat-badge">${item.seat || 'T'}</span>
                                            <span class="item-qty">${item.qty}x</span> ${item.n}
                                        </div>
                                        ${item.obs ? `<div style="color:var(--obs-zen); font-size:0.75rem;">${item.obs}</div>` : ''}
                                    </div>
                                    <div class="btn-ready" onclick="markReady('${ticket.tableId}', ${realIdx})">✓</div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `).join('');
            });
        }

        async function markReady(tableId, idx) {
            let order = activeOrders[tableId];
            order.items[idx].done = true;
            await API.update(tableId, order);
            refreshKDS();
        }

        function updateResaTicker() {
            let covers = reservationsData.filter(r => r.date === new Date().toISOString().split('T')[0] && r.status !== 'rejected')
                                         .reduce((sum, r) => sum + (parseInt(r.couverts) || 0), 0);
            document.getElementById('resa-text').innerText = `📅 AUJOURD'HUI : ${covers} COUVERTS`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mod-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
        setInterval(refreshKDS, 3000);
        refreshKDS();
    </script>
</body>
</html>
