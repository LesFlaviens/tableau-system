<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMPIRE OS | KDS PRO</title>
    <style>
        :root { 
            --bg-dark: #0f172a; 
            --header-bg: #1e293b;
            --ticket-bg: #fdfdfd; /* Style papier thermique */
            --ticket-text: #1e293b;
            --accent: #10b981;
            --warn: #f59e0b;
            --danger: #ef4444;
            --border: #334155;
            --muted: #64748b;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg-dark); 
            color: white; 
            margin: 0; padding: 10px;
            height: 100vh; display: flex; flex-direction: column; overflow: hidden;
        }

        /* HEADER ÉPURÉ */
        header { 
            display: flex; justify-content: space-between; align-items: center;
            background: var(--header-bg); padding: 10px 20px; border-radius: 12px;
            margin-bottom: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .logo { font-weight: 900; letter-spacing: -1px; font-size: 1.4rem; color: var(--accent); }
        .clock { font-family: monospace; font-size: 1.3rem; background: #000; padding: 4px 12px; border-radius: 6px; }

        /* RADAR RÉSA COMPACT */
        .resa-ticker { 
            background: rgba(167, 139, 250, 0.15); border: 1px solid #a78bfa;
            padding: 8px 20px; border-radius: 50px; font-weight: 800; cursor: pointer;
        }

        /* GRILLE DE SERVICE */
        .service-container { 
            display: flex; gap: 15px; flex: 1; overflow-x: auto; padding-bottom: 10px;
        }

        .lane { 
            flex: 0 0 350px; background: rgba(255,255,255,0.03); border-radius: 12px;
            display: flex; flex-direction: column; border: 1px solid var(--border);
        }

        .lane-title { 
            padding: 12px; text-align: center; font-weight: 900; text-transform: uppercase;
            font-size: 0.9rem; border-bottom: 2px solid var(--border);
        }

        .lane-entrees { color: #34d399; }
        .lane-plats { color: #fbbf24; }
        .lane-desserts { color: #a78bfa; }

        .ticket-list { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; }

        /* TICKET STYLE "PAPIER" POUR ERGONOMIE */
        .ticket { 
            background: var(--ticket-bg); color: var(--ticket-text);
            border-radius: 6px; overflow: hidden; position: relative;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

        .t-header { 
            background: #e2e8f0; padding: 8px 12px; display: flex; 
            justify-content: space-between; align-items: center; border-bottom: 1px dashed #cbd5e1;
        }

        .t-table { font-weight: 900; font-size: 1.3rem; }
        .t-chrono { 
            font-weight: 700; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem;
            background: var(--accent); color: white;
        }
        
        /* États du chrono */
        .t-chrono.warning { background: var(--warn); }
        .t-chrono.late { background: var(--danger); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        .t-obs { background: #fef3c7; color: #92400e; padding: 6px 12px; font-size: 0.85rem; font-weight: 700; border-bottom: 1px dashed #cbd5e1; }

        /* ITEMS DU BON */
        .t-item { 
            padding: 12px; display: flex; align-items: flex-start; gap: 10px;
            border-bottom: 1px solid #f1f5f9; transition: 0.2s; cursor: pointer;
        }

        .t-qty { 
            font-size: 1.4rem; font-weight: 900; color: #000; min-width: 35px;
            display: flex; justify-content: center; align-items: center;
            background: #f1f5f9; border-radius: 4px; height: 35px;
        }

        .t-name-area { flex: 1; }
        .t-name { font-size: 1.1rem; font-weight: 700; text-transform: uppercase; line-height: 1.1; }
        .t-sub { font-size: 0.85rem; color: var(--danger); font-style: italic; font-weight: 600; }

        .t-item.done { opacity: 0.2; text-decoration: line-through; filter: grayscale(1); }

        /* NAVIGATION BASSE */
        nav { 
            display: flex; gap: 8px; padding-top: 10px; border-top: 1px solid var(--border);
            overflow-x: auto;
        }

        .nav-btn { 
            background: var(--header-bg); border: 1px solid var(--border); color: white;
            padding: 12px 20px; border-radius: 8px; font-weight: 700; cursor: pointer;
            white-space: nowrap; transition: 0.2s; font-size: 0.8rem;
        }

        .nav-btn.active { background: var(--accent); border-color: var(--accent); color: #000; }
        .nav-btn.alert { border-color: var(--danger); color: var(--danger); }

    </style>
</head>
<body>

    <header>
        <div style="display: flex; align-items: center; gap: 15px;">
            <div class="logo">EMPIRE<span style="color:white">KDS</span></div>
            <div id="clock" class="clock">12:45:08</div>
        </div>

        <div class="resa-ticker" onclick="openResaDetailsModal()">
            <span id="resa-text">⏳ MIDI : 42 COUVERTS</span>
        </div>

        <div style="display: flex; gap: 10px;">
            <button class="nav-btn alert" onclick="alertManager()">🚨 APPEL SALLE</button>
            <button class="nav-btn" onclick="toggleFullscreen()">📺 PLEIN ÉCRAN</button>
        </div>
    </header>

    <div class="service-container">
        <div class="lane">
            <div class="lane-title lane-entrees">● ENTRÉES</div>
            <div id="kds-grid-1" class="ticket-list">
                <div class="ticket">
                    <div class="t-header">
                        <span class="t-table">TABLE 12</span>
                        <span class="t-chrono">08:12</span>
                    </div>
                    <div class="t-obs">⚠️ SANS GLUTEN SUR LE TATARE</div>
                    <div class="t-item">
                        <div class="t-qty">2</div>
                        <div class="t-name-area">
                            <div class="t-name">Oeufs Parfaits</div>
                            <div class="t-sub">+ Truffe d'été</div>
                        </div>
                    </div>
                    <div class="t-item">
                        <div class="t-qty">1</div>
                        <div class="t-name-area">
                            <div class="t-name">Tataki Thon</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lane">
            <div class="lane-title lane-plats">● PLATS</div>
            <div id="kds-grid-2" class="ticket-list">
                <div class="ticket">
                    <div class="t-header">
                        <span class="t-table">TABLE 4</span>
                        <span class="t-chrono warning">14:05</span>
                    </div>
                    <div class="t-item">
                        <div class="t-qty">4</div>
                        <div class="t-name-area">
                            <div class="t-name">Filet de Boeuf</div>
                            <div class="t-sub">2 Saignants / 2 Bleus</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="lane">
            <div class="lane-title lane-desserts">● DESSERTS</div>
            <div id="kds-grid-3" class="ticket-list">
                 <div class="ticket">
                    <div class="t-header">
                        <span class="t-table">TABLE 21</span>
                        <span class="t-chrono late">22:45</span>
                    </div>
                    <div class="t-item">
                        <div class="t-qty">1</div>
                        <div class="t-name-area">
                            <div class="t-name">Pavlova Fruits Rouges</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <nav>
        <button class="nav-btn active">📝 LES BONS</button>
        <button class="nav-btn">📜 HISTORIQUE</button>
        <button class="nav-btn">📋 STOCKS (86)</button>
        <button class="nav-btn">📖 RECETTES</button>
        <button class="nav-btn">🛒 MANQUES</button>
        <button class="nav-btn" style="color: #60a5fa;">🛡️ HACCP</button>
    </nav>

    <script>
        // Ta logique JS reste identique, il suffit de mettre à jour 
        // les fonctions RenderKDS pour générer cette nouvelle structure HTML
        
        function updateClock() {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour12:false});
        }
        setInterval(updateClock, 1000);

        // Exemple simple de clic pour barrer (à intégrer dans ta fonction Render)
        document.addEventListener('click', (e) => {
            if(e.target.closest('.t-item')) {
                e.target.closest('.t-item').classList.toggle('done');
            }
        });
    </script>
</body>
</html>
