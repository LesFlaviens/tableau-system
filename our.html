<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - KDS (Le Pass Cuisine)</title>
    <style>
        :root { 
            --bg-zen: #0f172a; 
            --panel-zen: #1e293b; 
            --text-zen: #f8fafc; 
            --accent-zen: #34d399; 
            --info-zen: #60a5fa; 
            --obs-zen: #fbbf24; 
            --border-zen: #334155;
            --purple-zen: #a78bfa;
            --alert-zen: #ef4444;
            --text-muted: #94a3b8;
            --shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg-zen); color: var(--text-zen); margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; box-sizing: border-box; }

        header { background: #0b0f19; border-bottom: 2px solid var(--border-zen); padding: 12px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; margin-bottom: 20px; }
        .logo-text { color: var(--text-zen); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--alert-zen); }
        .clock { font-family: monospace; font-size: 1.2rem; color: var(--info-zen); font-weight: bold; background: rgba(96, 165, 250, 0.1); padding: 5px 15px; border-radius: 4px; }

        .nav-btns { display: flex; gap: 10px; }
        .nav-btn { background: transparent; border: 1px solid var(--border-zen); color: var(--text-zen); padding: 10px 20px; border-radius: 4px; font-size: 0.85rem; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.2s; }
        .nav-btn.active { background: rgba(255,255,255,0.1); border-color: var(--text-zen); color: var(--text-zen); }

        .module { display: none; flex: 1; overflow-y: auto; padding: 0 10px 10px 10px;}
        .module.active { display: flex; flex-direction: column; gap: 20px; }

        .kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; align-items: start; }

        .ticket { background: var(--panel-zen); border: 1px solid var(--border-zen); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }

        .ticket-header { background: #1e293b; padding: 12px 15px; border-bottom: 2px solid var(--border-zen); display: flex; justify-content: space-between; align-items: center; font-weight: 900; font-size: 1.1rem; }
        .ticket-time { font-size: 0.85rem; color: #94a3b8; font-weight: normal; }
        .ticket-obs { background: rgba(251, 191, 36, 0.1); color: var(--obs-zen); padding: 8px 15px; font-size: 0.85rem; font-weight: bold; border-bottom: 1px solid var(--border-zen); }

        .ticket-item { padding: 15px; border-bottom: 1px solid var(--border-zen); display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; }
        .ticket-item:last-child { border-bottom: none; }
        .ticket-item:hover { background: rgba(255,255,255,0.05); }

        .item-details { display: flex; flex-direction: column; gap: 4px; pointer-events: none; flex: 1;}
        .item-name { font-size: 1.1rem; font-weight: bold; color: var(--text-zen); }
        .item-qty { color: var(--accent-zen); font-weight: 900; margin-right: 8px; }
        .item-sub-obs { font-size: 0.8rem; color: var(--obs-zen); font-style: italic; }

        .btn-ready { background: var(--panel-zen); border: 2px solid var(--border-zen); color: var(--text-muted); width: 45px; height: 45px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.4rem; cursor: pointer; transition: 0.2s; pointer-events: auto; z-index: 10;}
        .btn-ready:hover { border-color: var(--accent-zen); color: var(--accent-zen); }
        .btn-ready:active { transform: scale(0.9); }
        
        .ticket-item.done { opacity: 0.3 !important; text-decoration: line-through; pointer-events: none; background: transparent !important; border-left: none !important;}
        .ticket-item.done .btn-ready { background: var(--accent-zen); border-color: var(--accent-zen); color: #000; pointer-events: none; }

        /* 🟢 NOUVEAUX STYLES DE RÉCLAME (STATIQUE ET CLIGNOTANT) 🟢 */
        .reclam-static { 
            background-color: rgba(239, 68, 68, 0.15); 
            border-left: 5px solid #ef4444 !important; 
        }

        @keyframes alert-reclam {
            0% { background-color: rgba(239, 68, 68, 0.05); border-left-color: rgba(239, 68, 68, 0.5); }
            50% { background-color: rgba(239, 68, 68, 0.3); border-left-color: #ef4444; box-shadow: inset 0 0 25px rgba(239, 68, 68, 0.5); }
            100% { background-color: rgba(239, 68, 68, 0.05); border-left-color: rgba(239, 68, 68, 0.5); }
        }
        .reclam-active { 
            animation: alert-reclam 1.2s infinite; 
            border-left: 5px solid #ef4444 !important; 
        }

        .priority-badge { position: absolute; top: -15px; left: -15px; background: #000; width: 40px; height: 40px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; border: 3px solid; z-index: 50; font-size: 1.2rem; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }

        .clickable-title { cursor: pointer; transition: color 0.2s ease; position: relative; padding-right: 30px; display: inline-block; }
        .clickable-title::after { content: "⚠️"; position: absolute; right: 0; top: 50%; transform: translateY(-50%); font-size: 1.1rem; opacity: 0.3; transition: 0.2s; }
        .clickable-title:hover { color: var(--alert-zen); }

        .lane-header { font-size: 1.5rem; font-weight: 900; padding: 10px 20px; border-bottom: 2px solid var(--border-zen); margin-bottom: 15px; margin-top: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; text-transform: uppercase; letter-spacing: 2px;}
        .lane-entrees { color: #34d399; border-bottom-color: #34d399; }
        .lane-plats { color: #facc15; border-bottom-color: #facc15; }
        .lane-desserts { color: #a78bfa; border-bottom-color: #a78bfa; }

        .drag-handle { font-size: 1.5rem; color: var(--border-zen); padding-right: 15px; cursor: grab; touch-action: none; transition: 0.2s; }
        .drag-handle:active { color: var(--obs-zen); cursor: grabbing; }

        .ticket.paused { border: 2px dashed var(--alert-zen); background: rgba(239, 68, 68, 0.05); }
        .ticket.paused .ticket-header { background: rgba(239, 68, 68, 0.2); }
        .ticket.paused .ticket-table { color: var(--alert-zen); }
        .ticket.paused .ticket-item { opacity: 0.4; pointer-events: none; filter: grayscale(100%); }
        .pause-banner { background: var(--alert-zen); color: #fff; text-align: center; font-weight: 900; padding: 8px; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 1px; animation: pulse-pause 2s infinite; }
        @keyframes pulse-pause { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        button, .nav-btn, .ticket-item { position: relative; overflow: hidden; }
        .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-effect-heavy 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94); background-color: rgba(255, 255, 255, 0.5); pointer-events: none; z-index: 9999; }
        @keyframes ripple-effect-heavy { 0% { transform: scale(0); opacity: 1; } 100% { transform: scale(6); opacity: 0; } }

        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15, 23, 42, 0.95); z-index: 20000; display: none; align-items: center; justify-content: center; }
        .modal.open { display: flex !important; }
    </style>
</head>
<body>

    <div id="chef-alert-modal" class="modal">
        <div style="background:var(--panel-zen); padding:35px; border-radius:12px; width: 90%; max-width: 500px; text-align: center; border: 2px solid var(--alert-zen);">
            <h2 style="color:var(--alert-zen); font-size: 2.2rem; margin-top:0; margin-bottom: 30px; text-transform: uppercase;">⚠️ URGENCE TABLE <span id="alert-table-id"></span></h2>
            <button class="nav-btn" style="width:100%; border-color:#ef4444; color:#ef4444; margin-bottom:15px; padding:20px; font-size:1.2rem;" onclick="sendAlertToSalle('🚨 VIENS AU PASSE')">🚨 VIENS AU PASSE</button>
            <button class="nav-btn" style="width:100%; border-color:#f59e0b; color:#f59e0b; margin-bottom:15px; padding:20px; font-size:1.2rem;" onclick="sendAlertToSalle('❓ INFO MANQUANTE (Cuisson/Garniture)')">❓ INFO MANQUANTE</button>
            <button class="nav-btn" style="width:100%; border-color:#ec4899; color:#ec4899; margin-bottom:15px; padding:20px; font-size:1.2rem;" onclick="sendAlertToSalle('❌ RUPTURE DE STOCK')">❌ RUPTURE DE STOCK</button>
            <button class="nav-btn" style="width:100%; border-color:var(--border-zen); color:var(--text-muted); padding:20px; font-size:1.2rem;" onclick="closeAlertModal()">🔙 ANNULER</button>
        </div>
    </div>

    <header>
        <div style="display: flex; align-items: center; gap: 20px;">
            <h1 class="logo-text">🔥 LE PASS PRODUCTION</h1>
            <div id="clock" class="clock">00:00:00</div>
        </div>
        <div class="nav-btns">
            <button class="nav-btn active" id="tab-kds" onclick="switchTab('kds')">📝 LES BONS</button>
            <button class="nav-btn" id="tab-history" onclick="switchTab('history')">📜 HISTO</button>
        </div>
    </header>

    <div id="mod-kds" class="module active">
        <div class="lane-header lane-entrees">🥗 1er ÉTAGE : ENTRÉES</div>
        <div id="kds-grid-1" class="kds-grid" style="margin-bottom: 40px;"></div>
        
        <div class="lane-header lane-plats">🔥 2ème ÉTAGE : PLATS</div>
        <div id="kds-grid-2" class="kds-grid" style="margin-bottom: 40px;"></div>
        
        <div class="lane-header lane-desserts">🍰 3ème ÉTAGE : DESSERTS</div>
        <div id="kds-grid-3" class="kds-grid"></div>
    </div>

    <div id="mod-history" class="module"><div style="color:var(--text-muted); text-align:center; padding:40px;">Historique en cours de développement...</div></div>

    <script>
        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    let url = (window.location.protocol === 'file:') ? 'https://tableau-system.onrender.com/get-current-state' : '/get-current-state';
                    let r = await fetch(url);
                    if(r.ok) state = await r.json();
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            },
            update: async (key, data) => {
                let isOrder = !key.includes('MASTER') && !key.includes('ARCHIVE') && !key.includes('SUPPLIER') && !key.includes('PLANNING') && !key.includes('MENU');
                let payload = isOrder ? data : { data: data };
                
                let state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                if (data === null) delete state.activeOrders[key];
                else state.activeOrders[key] = payload;
                localStorage.setItem('EMPIRE_GLOBAL_SYNC', JSON.stringify(state));
                
                let url = (window.location.protocol === 'file:') ? 'https://tableau-system.onrender.com/update-order' : '/update-order';
                try {
                    await fetch(url, { 
                        method: 'POST', 
                        headers: {'Content-Type': 'application/json'}, 
                        body: JSON.stringify({ tableId: key, order: data === null ? null : payload }) 
                    });
                } catch(e) {}
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'EMPIRE_GLOBAL_SYNC') refreshKDS();
        });

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);

        let activeOrders = {};
        let tableInAlert = null;
        let isDragging = false;
        let dragItemData = null;
        let dragClone = null;

        setInterval(refreshKDS, 2000);

        async function refreshKDS() {
            if (isDragging) return; 
            try {
                const state = await API.getState();
                if (state && state.activeOrders) {
                    activeOrders = state.activeOrders;
                    renderKDS();
                }
            } catch (e) { console.error("Erreur Sync", e); }
        }

        function openAlertModal(tableLabel) {
            tableInAlert = tableLabel;
            document.getElementById('alert-table-id').innerText = tableLabel;
            document.getElementById('chef-alert-modal').classList.add('open');
        }

        function closeAlertModal() {
            tableInAlert = null;
            document.getElementById('chef-alert-modal').classList.remove('open');
        }

        async function sendAlertToSalle(message) {
            if (!tableInAlert) return;
            let order = activeOrders[tableInAlert];
            if (order) {
                order.alerteRouge = message; 
                await API.update(tableInAlert, order, true); 
                renderKDS(); 
            }
            closeAlertModal();
        }

        async function clearAlert(tableId) {
            let order = activeOrders[tableId];
            if (order) {
                order.alerteRouge = null; 
                await API.update(tableId, order, true);
                renderKDS(); 
            }
        }

        function markItemReady(tableId, itemIndex, currentEvent) {
            currentEvent.stopPropagation(); 
            
            let rect = currentEvent.currentTarget.getBoundingClientRect();
            let circle = document.createElement('span');
            circle.style.width = circle.style.height = Math.max(rect.width, rect.height) + 'px';
            circle.style.left = (currentEvent.clientX - rect.left - rect.width/2) + 'px';
            circle.style.top = (currentEvent.clientY - rect.top - rect.height/2) + 'px';
            circle.className = 'ripple';
            currentEvent.currentTarget.appendChild(circle);

            setTimeout(async () => {
                if (!activeOrders[tableId] || !activeOrders[tableId].items[itemIndex]) return;
                
                let item = activeOrders[tableId].items[itemIndex];
                item.done = true; 

                await API.update(tableId, activeOrders[tableId], true);
                renderKDS();
            }, 300);
        }

        function renderKDS() {
            let html1 = '', html2 = '', html3 = '';
            let lanes = { 1: [], 2: [], 3: [] };

            for (let tableId in activeOrders) {
                if (tableId.includes('MASTER') || tableId.includes('ARCHIVE') || tableId.includes('BAR') || tableId.includes('CUISINE') || tableId.includes('ALERTS') || tableId.includes('ARCHITECTURE')) continue;

                let orderData = activeOrders[tableId];
                if (!orderData || !orderData.items) continue;

                let pendingItems = orderData.items.filter(item => !item.done && (!item.dest || item.dest.toLowerCase() !== 'bar'));
                if (pendingItems.length === 0) continue;

                let c1 = pendingItems.filter(i => i.course === 1 || i.course === 0);
                let c2 = pendingItems.filter(i => i.course === 2 || i.course === undefined);
                let c3 = pendingItems.filter(i => i.course === 3);

                let allEntrees = orderData.items.filter(i => (i.course === 1 || i.course === 0) && (!i.dest || i.dest.toLowerCase() !== 'bar'));
                let allPlats = orderData.items.filter(i => (i.course === 2 || i.course === undefined) && (!i.dest || i.dest.toLowerCase() !== 'bar'));

                let hasEntrees = allEntrees.length > 0;
                let entreesServed = hasEntrees && allEntrees.every(i => i.served); 
                
                let hasPlats = allPlats.length > 0;
                let platsServed = hasPlats && allPlats.every(i => i.served);

                let pushToLane = (cList, laneNum) => {
                    if (cList.length === 0) return;
                    
                    let hasFired = cList.some(i => i.fired);
                    let isDirect = (laneNum === 2 && !hasEntrees);
                    let oldestTime = Math.min(...cList.map(i => i.itemId));

                    let priorityLevel = 1;
                    let isSuite = false;

                    if (laneNum === 2 && entreesServed) {
                        priorityLevel = 4; // ⏩ LA SUITE
                        isSuite = true;
                    } else if (laneNum === 3 && platsServed) {
                        priorityLevel = 4; // ⏩ LA SUITE
                        isSuite = true;
                    } else if (hasFired) {
                        priorityLevel = 3; // 🔥 RÉCLAMÉ
                    } else if (isDirect) {
                        priorityLevel = 2; // 🚀 DIRECT
                    }

                    lanes[laneNum].push({
                        tableId: tableId,
                        orderData: orderData,
                        items: cList,
                        priorityLevel: priorityLevel,
                        time: oldestTime,
                        isDirect: isDirect,
                        isSuite: isSuite
                    });
                };

                pushToLane(c1, 1);
                pushToLane(c2, 2);
                pushToLane(c3, 3);
            }

            [1, 2, 3].forEach(laneNum => {
                lanes[laneNum].sort((a, b) => {
                    if (a.priorityLevel !== b.priorityLevel) return b.priorityLevel - a.priorityLevel; 
                    return a.time - b.time; 
                });
            });

            let buildLaneHtml = (laneData, laneNum) => {
                let html = '';
                laneData.forEach((ticket, index) => {
                    let { tableId, orderData, items, priorityLevel, isDirect, isSuite } = ticket;
                    
                    let isWeb = orderData.isWeb || tableId.startsWith('order_');
                    let tableTitle = isWeb ? `🌐 WEB #${orderData.id || tableId.replace('order_','')}` : `TABLE ${tableId}`;
                    let headerStyle = isWeb ? `background: rgba(248, 113, 113, 0.15); border-bottom: 2px solid var(--alert-zen); color: var(--alert-zen);` : ``;

                    let isPaused = orderData.alerteRouge ? true : false;
                    let pausedClass = isPaused ? 'paused' : '';
                    let clickAction = isPaused ? `clearAlert('${tableId}')` : `openAlertModal('${tableId}')`;

                    let tHtml = `<div class="ticket ${pausedClass}">
                        <div class="ticket-header" style="${headerStyle}">
                            <span class="ticket-table clickable-title" onclick="${clickAction}">${tableTitle}</span>
                            <span class="ticket-time" style="${isWeb ? 'color: var(--alert-zen);' : ''}">${orderData.time || ''}</span>
                        </div>`;
                    
                    if (isPaused) {
                        tHtml += `<div class="pause-banner">⚠️ ATTENTE SERVEUR : ${orderData.alerteRouge}</div>`;
                    } else if (orderData.observations && orderData.observations.trim() !== '') {
                        tHtml += `<div class="ticket-obs">⚠️ ${orderData.observations}</div>`;
                    }

                    let rank = index + 1;
                    let badgeColor = priorityLevel === 4 ? '#ec4899' : (priorityLevel === 3 ? 'var(--alert-zen)' : (priorityLevel === 2 ? 'var(--info-zen)' : 'var(--text-muted)'));
                    let badgeShadow = priorityLevel === 4 ? '0 0 10px rgba(236,72,153,0.8)' : (priorityLevel === 3 ? '0 0 10px rgba(239,68,68,0.8)' : (priorityLevel === 2 ? '0 0 10px rgba(96,165,250,0.8)' : 'none'));
                    
                    tHtml += `<div class="priority-badge" style="color: ${badgeColor}; border-color: ${badgeColor}; box-shadow: ${badgeShadow};">${rank}</div>`;

                    items.forEach((item) => {
                        let realIndex = orderData.items.findIndex(i => i.id === item.id);
                        let cleanName = item.n.replace(/\[BR\]/g, ' ').replace(/\n/g, '<br>');
                        let qty = item.qty || 1;
                        
                        let isFired = item.fired === true;
                        let opacityStyle = isFired ? "opacity: 1;" : "opacity: 0.4; background: rgba(255,255,255,0.02); border-left: 4px solid transparent;";
                        let reclamClass = "";
                        let statusBadge = "";

                        // 🟢 LOGIQUE DE CLIGNOTEMENT CORRIGÉE ICI 🟢
                        if (isSuite) {
                            let timeWaiting = item.firedTime ? (Date.now() - item.firedTime) : 0;
                            let isLate = timeWaiting >= 600000;
                            
                            if (isLate) {
                                reclamClass = "reclam-active";
                                statusBadge = `<span style="background:#be185d; color:#fff; font-size:0.7rem; font-weight:900; padding:3px 6px; border-radius:4px; margin-right:6px; vertical-align:middle; text-transform:uppercase; box-shadow: 0 0 8px rgba(190, 24, 93, 0.8);">⏩ SUITE EN RETARD</span>`;
                            } else {
                                reclamClass = "reclam-static"; // Fixe ! Pas de clignotement
                                statusBadge = `<span style="background:#ec4899; color:#fff; font-size:0.7rem; font-weight:900; padding:3px 6px; border-radius:4px; margin-right:6px; vertical-align:middle; text-transform:uppercase; box-shadow: 0 0 8px rgba(236, 72, 153, 0.8);">⏩ LA SUITE</span>`;
                            }
                            opacityStyle = "opacity: 1; background: rgba(236, 72, 153, 0.05);";
                        } else if (isFired) {
                            let timeWaiting = item.firedTime ? (Date.now() - item.firedTime) : 0;
                            let isLate = timeWaiting >= 600000; // 10 minutes en millisecondes
                            
                            if (isLate) {
                                reclamClass = "reclam-active";
                                statusBadge = `<span style="background:#b91c1c; color:#fff; font-size:0.7rem; font-weight:900; padding:3px 6px; border-radius:4px; margin-right:6px; vertical-align:middle; text-transform:uppercase; box-shadow: 0 0 8px rgba(185,28,28,0.8);">🔥 RETARD</span>`;
                            } else {
                                reclamClass = "reclam-static"; // Fixe ! Pas de clignotement
                                statusBadge = `<span style="background:var(--alert-zen); color:#fff; font-size:0.7rem; font-weight:900; padding:3px 6px; border-radius:4px; margin-right:6px; vertical-align:middle; text-transform:uppercase; box-shadow: 0 0 8px rgba(239,68,68,0.8);">🔥 ENVOI</span>`;
                            }
                        } else if (isDirect) {
                            statusBadge = `<span style="background:var(--info-zen); color:#000; font-size:0.7rem; font-weight:900; padding:3px 6px; border-radius:4px; margin-right:6px; vertical-align:middle; text-transform:uppercase; box-shadow: 0 0 8px rgba(96, 165, 250, 0.8);">🚀 DIRECT</span>`;
                            opacityStyle = "opacity: 0.9; background: rgba(96, 165, 250, 0.05); border-left: 4px solid var(--info-zen);";
                        } else {
                            statusBadge = `<span style="background:var(--bg-zen); color:#94a3b8; border:1px solid #94a3b8; font-size:0.6rem; padding:2px 4px; border-radius:4px; margin-right:6px; vertical-align:middle;">À SUIVRE</span>`;
                        }

                        let checkBtn = `<div class="btn-ready" style="${(!isFired && !isDirect && !isSuite) ? 'opacity:0.4;' : ''}" onclick="markItemReady('${tableId}', ${realIndex}, event)">✓</div>`;

                        tHtml += `
                        <div class="ticket-item ${reclamClass}" style="${opacityStyle}">
                            <div class="drag-handle" onmousedown="startTouchDrag(event, '${tableId}', ${item.id})" ontouchstart="startTouchDrag(event, '${tableId}', ${item.id})">☰</div>
                            <div class="item-details">
                                <div>${statusBadge}<span class="item-qty">${qty}x</span><span class="item-name">${cleanName}</span></div>
                                ${item.obs ? `<div class="item-sub-obs">${item.obs}</div>` : ''}
                            </div>
                            ${checkBtn}
                        </div>`;
                    });
                    tHtml += `</div>`;
                    html += tHtml;
                });
                return html;
            };

            html1 = buildLaneHtml(lanes[1], 1);
            html2 = buildLaneHtml(lanes[2], 2);
            html3 = buildLaneHtml(lanes[3], 3);

            let emptyMsg = `<div style="text-align: center; grid-column: 1/-1; color: #64748b; margin-top: 20px; font-size: 1rem; font-style: italic;">Aucun bon en attente dans cette zone.</div>`;
            document.getElementById('kds-grid-1').innerHTML = html1 || emptyMsg;
            document.getElementById('kds-grid-2').innerHTML = html2 || emptyMsg;
            document.getElementById('kds-grid-3').innerHTML = html3 || emptyMsg;
        }

        // 🟢 DRAG & DROP TACTILE 🟢
        function startTouchDrag(e, tableId, itemId) {
            isDragging = true;
            dragItemData = { tableId, itemId };
            let target = e.currentTarget.closest('.ticket-item');
            dragClone = target.cloneNode(true);
            dragClone.style.position = 'fixed';
            dragClone.style.zIndex = '999999';
            dragClone.style.opacity = '0.9';
            dragClone.style.boxShadow = '0 10px 30px rgba(0,0,0,0.8)';
            dragClone.style.pointerEvents = 'none'; 
            dragClone.style.width = target.offsetWidth + 'px';
            dragClone.style.background = 'var(--panel-zen)';
            document.body.appendChild(dragClone);
            moveTouchDrag(e);
        }

        function moveTouchDrag(e) {
            if (!isDragging || !dragClone) return;
            let touch = e.touches ? e.touches[0] : e;
            dragClone.style.left = (touch.clientX - 30) + 'px';
            dragClone.style.top = (touch.clientY - 30) + 'px';
            document.querySelectorAll('.kds-grid').forEach(g => g.classList.remove('drag-over'));
            let dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
            let dropZone = dropTarget ? dropTarget.closest('.kds-grid') : null;
            if(dropZone) dropZone.classList.add('drag-over');
        }

        async function endTouchDrag(e) {
            if (!isDragging || !dragClone) return;
            let touch = e.changedTouches ? e.changedTouches[0] : e;
            dragClone.remove(); dragClone = null; isDragging = false;
            document.querySelectorAll('.kds-grid').forEach(g => g.classList.remove('drag-over'));
            let dropTarget = document.elementFromPoint(touch.clientX, touch.clientY);
            let dropZone = dropTarget ? dropTarget.closest('.kds-grid') : null;

            if (dropZone && dragItemData) {
                let newCourse = 2; 
                if (dropZone.id === 'kds-grid-1') newCourse = 1; 
                if (dropZone.id === 'kds-grid-2') newCourse = 2; 
                if (dropZone.id === 'kds-grid-3') newCourse = 3; 

                let order = activeOrders[dragItemData.tableId];
                if (order && order.items) {
                    let item = order.items.find(i => i.id == dragItemData.itemId);
                    if (item && item.course !== newCourse) {
                        item.course = newCourse;
                        await API.update(dragItemData.tableId, order, true);
                        renderKDS();
                    }
                }
            }
            dragItemData = null;
        }

        document.addEventListener('mousemove', moveTouchDrag);
        document.addEventListener('touchmove', moveTouchDrag, {passive: false});
        document.addEventListener('mouseup', endTouchDrag);
        document.addEventListener('touchend', endTouchDrag);

        function switchTab(tab) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mod-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        document.addEventListener('mousedown', creerEffetTactile);
        document.addEventListener('touchstart', (e) => { if(e.touches.length > 0) creerEffetTactile(e, true); }, {passive: true});
        function creerEffetTactile(e, isTouch = false) {
            let target = e.target.closest('button, .nav-btn, .ticket-item');
            if (!target) return; 
            let circle = document.createElement('span');
            let diameter = Math.max(target.clientWidth, target.clientHeight);
            let radius = diameter / 2;
            let rect = target.getBoundingClientRect();
            let clientX = isTouch ? e.touches[0].clientX : e.clientX;
            let clientY = isTouch ? e.touches[0].clientY : e.clientY;
            circle.style.width = circle.style.height = `${diameter}px`;
            circle.style.left = `${clientX - rect.left - radius}px`;
            circle.style.top = `${clientY - rect.top - radius}px`;
            circle.classList.add('ripple');
            let existingRipple = target.querySelector('.ripple');
            if (existingRipple) existingRipple.remove();
            target.appendChild(circle);
            setTimeout(() => { circle.remove(); }, 500); 
        }

        refreshKDS();
    </script>
</body>
</html>
