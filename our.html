<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iBar - Cockpit Chef Bar</title>
    <style>
        :root { 
            --bg: #0f172a;           
            --panel: #1e293b;        
            --border: #334155;       
            --text-main: #f8fafc;    
            --text-muted: #94a3b8;   
            --gold: #fbbf24;         
            --gold-dim: rgba(251, 191, 36, 0.1);
            --accent: #34d399;       
            --accent-dim: rgba(52, 211, 153, 0.1);
            --alert: #f87171;        
            --alert-dim: rgba(248, 113, 113, 0.1);
            --ordered: #60a5fa;      
        }
        
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .header { background: var(--panel); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .logo { color: var(--gold); font-size: 1.5rem; font-weight: 900; letter-spacing: 2px; }
        
        .sync-status { display: flex; align-items: center; gap: 8px; font-size: 0.75rem; font-weight: bold; }
        .sync-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--alert); }
        .sync-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }

        .container { flex: 1; overflow-y: auto; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
        
        .category-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; }
        .cat-header { background: rgba(0,0,0,0.2); padding: 12px; text-align: center; font-weight: 900; color: var(--gold); border-bottom: 1px solid var(--border); text-transform: uppercase; }
        
        .item-list { flex: 1; padding: 10px; display: flex; flex-direction: column; gap: 8px; max-height: 300px; overflow-y: auto; }
        .menu-item { background: var(--bg); border: 1px solid var(--border); padding: 10px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; }
        
        .add-box { padding: 15px; background: rgba(0,0,0,0.1); border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; }
        input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px; border-radius: 6px; outline: none; }
        input:focus { border-color: var(--gold); }
        
        .btn-add { background: var(--gold); color: #000; border: none; padding: 12px; border-radius: 6px; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .btn-add:active { transform: scale(0.95); }
        .btn-del { background: var(--alert-dim); color: var(--alert); border: none; width: 30px; height: 30px; border-radius: 4px; cursor: pointer; }

        .stock-row { display: flex; gap: 5px; align-items: center; }
        .stock-btn { background: var(--panel); border: 1px solid var(--border); color: #fff; width: 25px; height: 25px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo">IBAR.CH <span style="color:var(--text-muted); font-size:0.8rem; font-weight:normal;">| CHEF BAR</span></div>
        <div class="sync-status">
            <div id="sync-dot" class="sync-dot"></div>
            <span id="sync-text">DÉCONNECTÉ</span>
        </div>
    </div>

    <div class="container" id="categories-grid">
        </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json()),
            update: (data) => fetch('/update-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tableId: 'MENU_MASTER_BAR', order: { data: data } })
            })
        };

        const CATS = {
            cocktails: "🍸 Cocktails",
            mocktails: "🍹 Sans Alcool",
            vins: "🍷 Vins",
            bieres: "🍺 Bières",
            chaudes: "☕ Chaudes",
            froides: "🥤 Froides",
            spiritueux: "🥃 Spiritueux"
        };

        let menuData = { cocktails: [], mocktails: [], vins: [], bieres: [], chaudes: [], froides: [], spiritueux: [] };

        async function load() {
            try {
                const state = await API.getState();
                if (state.activeOrders && state.activeOrders['MENU_MASTER_BAR']) {
                    menuData = state.activeOrders['MENU_MASTER_BAR'].data;
                }
                document.getElementById('sync-dot').classList.add('online');
                document.getElementById('sync-text').innerText = "EN LIGNE";
                render();
            } catch (e) {
                document.getElementById('sync-dot').classList.remove('online');
                document.getElementById('sync-text').innerText = "ERREUR RÉSEAU";
            }
        }

        function render() {
            const grid = document.getElementById('categories-grid');
            grid.innerHTML = '';

            for (let key in CATS) {
                const catDiv = document.createElement('div');
                catDiv.className = 'category-card';
                
                let itemsHtml = (menuData[key] || []).map(item => `
                    <div class="menu-item">
                        <div>
                            <div style="font-weight:bold;">${item.name}</div>
                            <div style="color:var(--accent); font-size:0.8rem;">${parseFloat(item.price).toFixed(2)} €</div>
                        </div>
                        <div class="stock-row">
                            <button class="stock-btn" onclick="changeStock('${key}', ${item.id}, -1)">-</button>
                            <span style="width:20px; text-align:center;">${item.stock || 0}</span>
                            <button class="stock-btn" onclick="changeStock('${key}', ${item.id}, 1)">+</button>
                            <button class="btn-del" onclick="removeItem('${key}', ${item.id})">✕</button>
                        </div>
                    </div>
                `).join('');

                catDiv.innerHTML = `
                    <div class="cat-header">${CATS[key]}</div>
                    <div class="item-list">${itemsHtml || '<div style="text-align:center; color:var(--text-muted); font-size:0.8rem; margin-top:10px;">Vide</div>'}</div>
                    <div class="add-box">
                        <input type="text" id="name-${key}" placeholder="Nom du produit...">
                        <input type="number" id="price-${key}" placeholder="Prix (€)">
                        <input type="number" id="stock-${key}" placeholder="Stock initial">
                        <button class="btn-add" onclick="addItem('${key}')">➕ AJOUTER</button>
                    </div>
                `;
                grid.appendChild(catDiv);
            }
        }

        async function addItem(key) {
            const nameIn = document.getElementById(`name-${key}`);
            const priceIn = document.getElementById(`price-${key}`);
            const stockIn = document.getElementById(`stock-${key}`);

            if (!nameIn.value || !priceIn.value) return alert("Nom et Prix requis !");

            const newItem = {
                id: Date.now(),
                name: nameIn.value.trim(),
                price: parseFloat(priceIn.value),
                stock: parseInt(stockIn.value) || 0,
                dest: 'bar'
            };

            if (!menuData[key]) menuData[key] = [];
            menuData[key].push(newItem);
            
            await API.update(menuData);
            nameIn.value = ''; priceIn.value = ''; stockIn.value = '';
            render();
        }

        async function changeStock(key, id, delta) {
            const item = menuData[key].find(i => i.id === id);
            if (item) {
                item.stock = Math.max(0, (item.stock || 0) + delta);
                await API.update(menuData);
                render();
            }
        }

        async function removeItem(key, id) {
            if (confirm("Supprimer cet article ?")) {
                menuData[key] = menuData[key].filter(i => i.id !== id);
                await API.update(menuData);
                render();
            }
        }

        load();
        // Rafraîchissement automatique toutes les 5 secondes
        setInterval(load, 5000);
    </script>
</body>
</html>
