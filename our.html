<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - KDS (Le Pass Cuisine)</title>
    <style>
        :root { 
            --bg-zen: #0f172a; --panel-zen: #1e293b; --text-zen: #f8fafc; 
            --accent-zen: #34d399; --info-zen: #60a5fa; --obs-zen: #fbbf24; 
            --border-zen: #334155; --purple-zen: #a78bfa; --alert-zen: #ef4444;
            --text-muted: #94a3b8; --shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg-zen); color: var(--text-zen); 
            margin: 0; padding: 10px 15px; height: 100vh; display: flex; flex-direction: column; 
            overflow: hidden; touch-action: manipulation; box-sizing: border-box; gap: 10px; 
        }

        /* 🟢 HEADER STRICTEMENT SUR UNE SEULE LIGNE 🟢 */
        header { 
            background: var(--panel-zen); border: 1px solid var(--border-zen); border-radius: 12px; 
            padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; 
            z-index: 100; box-shadow: var(--shadow); 
            flex-wrap: nowrap !important; /* Force la ligne unique */
            overflow: hidden; gap: 15px;
        }
        
        .header-left { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .logo-text { color: var(--text-zen); font-size: 1.2rem; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; white-space: nowrap; }
        .clock { font-family: monospace; font-size: 1rem; color: var(--info-zen); font-weight: bold; background: rgba(96, 165, 250, 0.1); padding: 5px 10px; border-radius: 6px; border: 1px solid rgba(96, 165, 250, 0.3); white-space: nowrap; }

        .resa-ticker { background: rgba(167, 139, 250, 0.1); border: 1px solid var(--purple-zen); color: var(--purple-zen); padding: 6px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 900; display: flex; align-items: center; gap: 8px; min-width: 180px; justify-content: center; cursor: pointer; flex-shrink: 0; }

        /* 🟢 NAVIGATION SANS RETOUR À LA LIGNE 🟢 */
        .nav-btns { 
            display: flex; gap: 6px; flex-wrap: nowrap !important; 
            overflow-x: auto; scrollbar-width: none; -ms-overflow-style: none; 
        }
        .nav-btns::-webkit-scrollbar { display: none; }
        
        .nav-btn { 
            background: var(--bg-zen); border: 1px solid var(--border-zen); color: var(--text-zen); 
            padding: 10px 15px; border-radius: 6px; font-size: 0.8rem; font-weight: bold; 
            cursor: pointer; text-transform: uppercase; white-space: nowrap; flex-shrink: 0; 
        }
        .nav-btn.active { background: rgba(255,255,255,0.1); border-color: var(--text-zen); color: var(--accent-zen); }

        .module { display: none; flex: 1; overflow: hidden; }
        .module.active { display: flex; flex-direction: column; }

        .kds-scroll-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; padding-bottom: 20px; }
        .kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 12px; align-items: start; margin-top: 10px;}

        .ticket { background: var(--panel-zen); border: 1px solid var(--border-zen); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .ticket-header { background: #1e293b; padding: 10px 12px; border-bottom: 2px solid var(--border-zen); display: flex; justify-content: space-between; align-items: center; font-weight: 900; }
        .ticket-table { font-size: 1.1rem; color: var(--gold); }
        
        .ticket-item { padding: 12px; border-bottom: 1px solid var(--border-zen); display: flex; justify-content: space-between; align-items: center; }
        .item-details { display: flex; flex-direction: column; flex: 1;}
        .item-name { font-size: 1.05rem; font-weight: bold; color: var(--text-zen); }
        .item-qty { color: var(--accent-zen); font-weight: 900; margin-right: 5px; }

        .seat-badge { background: #000; color: var(--gold); border: 1px solid var(--gold); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; font-weight: 900; margin-right: 10px; font-family: monospace; }
        .btn-ready { background: var(--panel-zen); border: 2px solid var(--border-zen); color: var(--text-muted); width: 42px; height: 42px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.3rem; cursor: pointer; flex-shrink: 0; }
        
        .lane-header { font-size: 1.1rem; font-weight: 900; padding: 10px 15px; border-bottom: 3px solid; background: rgba(30, 41, 59, 0.8); border-radius: 8px 8px 0 0; text-transform: uppercase; }
        .lane-entrees { color: #34d399; border-bottom-color: #34d399; }
        .lane-plats { color: #facc15; border-bottom-color: #facc15; }
        .lane-desserts { color: #a78bfa; border-bottom-color: #a78bfa; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <h1 class="logo-text">🔥 LE PASS</h1>
            <div id="clock" class="clock">00:00:00</div>
        </div>

        <div id="resa-ticker" class="resa-ticker">
            <span id="resa-text">CONNECTING...</span>
        </div>

        <div class="nav-btns">
            <button class="nav-btn active" id="tab-kds" onclick="switchTab('kds')">BONS</button>
            <button class="nav-btn" id="tab-history" onclick="switchTab('history')">HISTO</button>
            <button class="nav-btn" id="tab-menu" onclick="switchTab('menu')">STOCKS</button>
            <button class="nav-btn" id="tab-staff" onclick="switchTab('staff')">STAFF</button>
            <button class="nav-btn" id="tab-recipes" onclick="switchTab('recipes')">RECETTES</button>
            <button class="nav-btn" id="tab-supplier" onclick="switchTab('supplier')">MANQUES</button>
        </div>
    </header>

    <div id="mod-kds" class="module active">
        <div class="kds-scroll-area">
            <div><div class="lane-header lane-entrees">🥗 ENTRÉES</div><div id="kds-grid-1" class="kds-grid"></div></div>
            <div><div class="lane-header lane-plats">🔥 PLATS</div><div id="kds-grid-2" class="kds-grid"></div></div>
            <div><div class="lane-header lane-desserts">🍰 DESSERTS</div><div id="kds-grid-3" class="kds-grid"></div></div>
        </div>
    </div>

    <div id="mod-history" class="module"><div style="padding:20px;">Historique...</div></div>
    <div id="mod-menu" class="module"><div style="padding:20px;">Stocks...</div></div>
    <div id="mod-staff" class="module"><div style="padding:20px;">Brigade...</div></div>
    <div id="mod-recipes" class="module"><div style="padding:20px;">Recettes...</div></div>
    <div id="mod-supplier" class="module"><div style="padding:20px;">Manques...</div></div>

    <script>
        const RENDER_URL = 'https://tableau-system.onrender.com';
        let activeOrders = {};
        let reservationsData = [];

        const API = {
            getState: async () => {
                try {
                    const response = await fetch(`${RENDER_URL}/get-current-state`, { cache: "no-store" });
                    if (!response.ok) throw new Error('Offline');
                    return await response.json();
                } catch (e) {
                    console.error("Connection lost...");
                    return null;
                }
            },
            update: async (key, data) => {
                try {
                    await fetch(`${RENDER_URL}/update-order`, {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({ tableId: key, order: data })
                    });
                } catch(e) {}
            }
        };

        async function refreshKDS() {
            const state = await API.getState();
            if (state && state.activeOrders) {
                activeOrders = state.activeOrders;
                if(activeOrders['RESERVATIONS_MASTER']) {
                    reservationsData = activeOrders['RESERVATIONS_MASTER'].data;
                    updateResaTicker();
                }
                renderKDS();
            }
        }

        function renderKDS() {
            const lanes = { 1: [], 2: [], 3: [] };
            for (let tId in activeOrders) {
                if (['MENU_MASTER', 'RESERVATIONS_MASTER', 'STAFF_PLANNING_MASTER', 'RECIPES_MASTER', 'SALES_ARCHIVE_CUISINE', 'ARCHITECTURE'].includes(tId)) continue;
                
                let order = activeOrders[tId];
                if (!order || !order.items) continue;

                [1, 2, 3].forEach(lId => {
                    let itemsInLane = order.items.filter(i => !i.done && (i.course === lId || (lId === 2 && i.course === undefined)));
                    if (itemsInLane.length > 0) lanes[lId].push({ tId, order, items: itemsInLane });
                });
            }

            [1, 2, 3].forEach(l => {
                const container = document.getElementById('kds-grid-' + l);
                container.innerHTML = lanes[l].map(ticket => `
                    <div class="ticket">
                        <div class="ticket-header">
                            <span class="ticket-table">TABLE ${ticket.tId}</span>
                            <span class="ticket-time">${ticket.order.time || ''}</span>
                        </div>
                        <div class="ticket-body">
                            ${ticket.items.map(item => {
                                let realIdx = ticket.order.items.findIndex(i => i.id === item.id);
                                return `
                                <div class="ticket-item">
                                    <div class="item-details">
                                        <div class="item-name">
                                            <span class="seat-badge">${item.seat || 'T'}</span>
                                            <span class="item-qty">${item.qty}x</span> ${item.n}
                                        </div>
                                    </div>
                                    <div class="btn-ready" onclick="markReady('${ticket.tId}', ${realIdx})">✓</div>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>
                `).join('');
            });
        }

        async function markReady(tId, idx) {
            let order = activeOrders[tId];
            order.items[idx].done = true;
            await API.update(tId, order);
            refreshKDS();
        }

        function updateResaTicker() {
            let covers = reservationsData.filter(r => r.date === new Date().toISOString().split('T')[0] && r.status !== 'rejected')
                                         .reduce((sum, r) => sum + (parseInt(r.couverts) || 0), 0);
            document.getElementById('resa-text').innerText = `📅 AUJOURD'HUI : ${covers} COUVERTS`;
        }

        function switchTab(tab) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mod-' + tab).classList.add('active');
            document.getElementById('tab-' + tab).classList.add('active');
        }

        setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR'); }, 1000);
        setInterval(refreshKDS, 3000);
        refreshKDS();
    </script>
</body>
</html>
