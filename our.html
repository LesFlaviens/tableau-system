<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iBar - Cockpit</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --border: #334155; --text-main: #f8fafc; --gold: #fbbf24; --accent: #34d399; --alert: #f87171; }
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .nav-master { background: var(--panel); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); }
        .nav-btn { background: var(--bg); border: 1px solid var(--border); color: #94a3b8; padding: 8px 12px; cursor: pointer; border-radius: 6px; font-weight: bold; }
        .nav-btn.active { border-color: var(--gold); color: var(--gold); }
        .module { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .module.active { display: flex; flex-direction: column; }
        .sync-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--alert); display: inline-block; margin-right: 5px; }
        .sync-dot.online { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
        input, select, textarea { background: var(--bg); border: 1px solid var(--border); color: white; padding: 10px; border-radius: 6px; }
        .add-btn { background: var(--gold); color: black; padding: 15px; border: none; border-radius: 6px; font-weight: 900; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="nav-master">
        <h1 style="color:var(--gold); font-size: 1.2rem; margin:0;">IBAR.CH</h1>
        <div>
            <button class="nav-btn active" onclick="switchTab('menu')">CARTE</button>
            <button class="nav-btn" onclick="switchTab('market')">GRIMOIRE</button>
            <span style="margin-left:15px; font-size:0.8rem;"><span id="sync-dot" class="sync-dot"></span><span id="sync-text">Déco</span></span>
        </div>
    </div>

    <div id="mod-menu" class="module active"><div id="menu-container"></div></div>

    <div id="mod-market" class="module">
        <div style="background:var(--panel); padding:20px; border-radius:10px; border:1px solid var(--border);">
            <h3 style="margin-top:0;">Nouvelle Boisson</h3>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <input type="text" id="m-name" placeholder="Nom...">
                <select id="m-cat">
                    <option value="cocktails">COCKTAILS</option>
                    <option value="bieres">BIÈRES</option>
                    <option value="vins">VINS</option>
                </select>
                <input type="number" id="m-price" placeholder="Prix €">
                <input type="number" id="m-stock" placeholder="Stock">
                <button class="add-btn" onclick="saveRecipe()">🚀 PUBLIER</button>
            </div>
        </div>
    </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json()).catch(() => ({activeOrders:{}})),
            update: (key, data) => fetch('/update-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tableId: key, order: { data: data } })
            })
        };

        let menuData = { cocktails: [], bieres: [], vins: [] };

        function switchTab(t) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.getElementById('mod-' + t).classList.add('active');
        }

        async function saveRecipe() {
            const name = document.getElementById('m-name').value;
            const price = parseFloat(document.getElementById('m-price').value);
            const stock = parseInt(document.getElementById('m-stock').value) || 0;
            const cat = document.getElementById('m-cat').value;

            if(!name || isNaN(price)) return alert("Nom et Prix !");

            if(!menuData[cat]) menuData[cat] = [];
            menuData[cat].unshift({ id: Date.now(), name: "🌟 " + name, price, stock, dest: 'bar' });

            await API.update('MENU_MASTER_BAR', menuData);
            alert("Enregistré !");
            render();
        }

        function render() {
            const cont = document.getElementById('menu-container');
            cont.innerHTML = Object.keys(menuData).map(cat => `
                <div style="margin-bottom:20px;">
                    <h3 style="color:var(--gold); text-transform:uppercase;">${cat}</h3>
                    ${menuData[cat].map(i => `<div style="background:var(--panel); padding:10px; margin:5px; border-radius:5px; display:flex; justify-content:space-between;">
                        <span>${i.name}</span><b>${i.price}€</b>
                    </div>`).join('')}
                </div>
            `).join('');
        }

        async function sync() {
            const state = await API.getState();
            if(state.activeOrders && state.activeOrders['MENU_MASTER_BAR']) {
                menuData = state.activeOrders['MENU_MASTER_BAR'].data;
                document.getElementById('sync-dot').classList.add('online');
                document.getElementById('sync-text').innerText = "EN LIGNE";
                render();
            }
        }

        setInterval(sync, 5000);
        sync();
    </script>
</body>
</html>
