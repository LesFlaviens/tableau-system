<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACCP EMPIRE - IA Scanner & Archives</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; --ordered: #2979ff;}
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        .nav-haccp { background: var(--panel); padding: 10px 20px; display: flex; gap: 10px; border-bottom: 1px solid #333; align-items: center; z-index: 100; }
        .nav-btn { background: transparent; border: 1px solid #333; color: #888; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase;}
        .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255, 179, 0, 0.05); }

        /* BOUTON SCANNER IA */
        .scan-ai-btn { background: var(--ordered); color: #fff; border: none; padding: 10px 20px; border-radius: 4px; font-weight: 900; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 8px; }
        .scan-ai-btn.loading { background: #555; cursor: wait; }

        .pad-link { display: none; padding: 10px 20px; border-radius: 4px; border: 2px solid; font-weight: 900; font-size: 0.8rem; cursor: pointer; background: #000; text-transform: uppercase; }

        .content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .module { display: none; flex-direction: column; gap: 20px; height: 100%; }
        .module.active { display: flex; }
        
        .card { background: var(--panel); border-radius: 8px; padding: 15px; border: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; font-size: 1rem; width: 100%; box-sizing: border-box; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #555; font-size: 0.7rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #111; font-size: 0.85rem; }

        .btn-empire { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        
        /* OVERLAY CHARGEMENT IA */
        #ai-loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loader-bar { width: 200px; height: 4px; background: #222; border-radius: 2px; margin-top: 20px; overflow: hidden; }
        .loader-progress { width: 0%; height: 100%; background: var(--gold); transition: 0.3s; }

        #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 60000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dept-choice-btn { background: #111; border: 2px solid #333; border-radius: 12px; padding: 30px; font-size: 1.3rem; font-weight: 900; color: #fff; cursor: pointer; width: 200px; text-align: center; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 85px); gap: 15px; margin-top: 20px; }
        .pin-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 1.8rem; font-weight: bold; width: 85px; height: 85px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="ai-loader">
        <h2 id="ai-status" style="color:var(--gold);">L'IA ANALYSE L'ÉTIQUETTE...</h2>
        <div class="loader-bar"><div id="ai-progress" class="loader-progress"></div></div>
    </div>

    <div id="login-screen">
        <h1 style="color:var(--gold); letter-spacing: 5px; margin-bottom: 40px; text-align: center;">EMPIRE OS<br><span style="font-size: 0.8rem; color: #555;">SCANNER INTELLIGENT ACTIF</span></h1>
        <div id="login-step-1" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
            <button class="dept-choice-btn" style="border-color: var(--gold); color: var(--gold);" onclick="showPinPad('CUISINE')">🔪 CUISINE</button>
            <button class="dept-choice-btn" style="border-color: #00e5ff; color: #00e5ff;" onclick="showPinPad('BAR')">🍸 BAR</button>
            <button class="dept-choice-btn" style="border-color: #2979ff; color: #2979ff;" onclick="showPinPad('SERVICE')">🛎️ SERVICE</button>
        </div>
        <div id="login-step-2" style="display: none; flex-direction: column; align-items: center;">
            <div id="pin-display" style="font-size: 2.5rem; letter-spacing: 12px; margin-bottom: 20px; color: var(--gold); min-height: 45px;"></div>
            <div class="pin-pad">
                <button class="pin-btn" onclick="addPin(1)">1</button><button class="pin-btn" onclick="addPin(2)">2</button><button class="pin-btn" onclick="addPin(3)">3</button>
                <button class="pin-btn" onclick="addPin(4)">4</button><button class="pin-btn" onclick="addPin(5)">5</button><button class="pin-btn" onclick="addPin(6)">6</button>
                <button class="pin-btn" onclick="addPin(7)">7</button><button class="pin-btn" onclick="addPin(8)">8</button><button class="pin-btn" onclick="addPin(9)">9</button>
                <button class="pin-btn" onclick="clearPin()" style="background:#333;">C</button><button class="pin-btn" onclick="addPin(0)">0</button><button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
            </div>
            <button style="margin-top: 30px; background: transparent; border: 1px solid #444; color: #444; padding: 10px 20px; border-radius: 4px; cursor: pointer;" onclick="location.reload()">🔙 RETOUR</button>
        </div>
    </div>

    <div class="nav-haccp">
        <input type="file" id="ai-file-input" style="display:none" accept="image/*,application/pdf" onchange="processSmartScan(this)">
        <button class="scan-ai-btn" onclick="document.getElementById('ai-file-input').click()">🔍 SCANNER ÉTIQUETTE</button>
        
        <div style="flex-grow: 1;"></div>
        <button class="nav-btn active" id="btn-temp" onclick="showModule('temp')">🌡️ TEMP</button>
        <button class="nav-btn" id="btn-trace" onclick="showModule('trace')">🏷️ DLC</button>
        <button class="nav-btn" id="btn-archive" onclick="showModule('archive')">🗄️ ARCHIVES</button>
        <button class="nav-btn" style="border-color:var(--alert); color:var(--alert);" onclick="location.reload()">🔒 QUITTER</button>
    </div>

    <div class="content">
        <div id="mod-temp" class="module active">
            <div class="card">
                <h2 style="margin:0 0 15px 0; font-size: 0.8rem; color: var(--gold); text-transform: uppercase;">RELEVÉ : <span class="display-dept"></span></h2>
                <div class="grid">
                    <input type="text" id="temp-eq" placeholder="Nom du Frigo / Équipement">
                    <input type="number" id="temp-val" step="0.1" placeholder="Valeur °C">
                    <button class="btn-empire" onclick="saveEntry('temp')">ENREGISTRER</button>
                </div>
            </div>
            <div class="card" style="flex:1; overflow:auto;"><table id="table-temp"></table></div>
        </div>

        <div id="mod-trace" class="module">
            <div class="card">
                <h2 style="margin:0 0 15px 0; font-size: 0.8rem; color: var(--accent); text-transform: uppercase;">TRAÇABILITÉ / DLC : <span class="display-dept"></span></h2>
                <div class="grid">
                    <input type="text" id="trace-name" placeholder="Produit reconnu...">
                    <input type="date" id="trace-dlc">
                    <button class="btn-empire" style="background:var(--accent);" onclick="saveEntry('trace')">ARCHIVER PRODUIT</button>
                </div>
            </div>
            <div class="card" style="flex:1; overflow:auto;"><table id="table-trace"></table></div>
        </div>

        <div id="mod-archive" class="module"><div class="card"><h2>ARCHIVES SÉCURISÉES</h2><p>Historique disponible sur 5 ans.</p></div></div>
    </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json()).catch(() => ({activeOrders: {}})),
            update: (key, data) => fetch('/update-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: key, order: { data } }) })
        };

        let db = { temp: [], trace: [] };
        let currentDept = ""; let pin = "";

        function showPinPad(d) { currentDept = d; document.getElementById('login-step-1').style.display = 'none'; document.getElementById('login-step-2').style.display = 'flex'; }
        function addPin(n) { pin += n; document.getElementById('pin-display').innerText = '*'.repeat(pin.length); }
        function clearPin() { pin = ""; document.getElementById('pin-display').innerText = ""; }

        async function submitPin() {
            if(["1234", "5678", "4321", "9999"].includes(pin)) {
                document.querySelectorAll('.display-dept').forEach(el => el.innerText = currentDept);
                document.getElementById('login-screen').style.display = 'none';
                await load();
            } else { alert("CODE INVALIDE"); clearPin(); }
        }

        // 🟢 FONCTION SCANNER INTELLIGENT (IA OCR)
        async function processSmartScan(input) {
            const file = input.files[0];
            if(!file) return;

            const loader = document.getElementById('ai-loader');
            const progress = document.getElementById('ai-progress');
            loader.style.display = 'flex';

            try {
                // Initialisation Tesseract
                const worker = await Tesseract.createWorker('fra', 1, {
                    logger: m => {
                        if(m.status === 'recognizing text') progress.style.width = (m.progress * 100) + "%";
                    }
                });

                const imageUrl = URL.createObjectURL(file);
                const { data: { text } } = await worker.recognize(imageUrl);
                await worker.terminate();

                const content = text.toLowerCase();
                console.log("Texte extrait :", content);

                // LOGIQUE D'AIGUILLAGE AUTOMATIQUE
                if (content.includes('bœuf') || content.includes('viande') || content.includes('lot') || content.includes('dlc')) {
                    showModule('trace');
                    document.getElementById('trace-name').value = extractName(text);
                    document.getElementById('trace-dlc').value = extractDate(text);
                    alert("✅ ÉTIQUETTE DE VIANDE RECONNUE");
                } else if (content.includes('vin') || content.includes('château') || content.includes('cuvée') || content.includes('vol')) {
                    showModule('trace'); // On peut créer un module vin plus tard
                    document.getElementById('trace-name').value = extractName(text);
                    alert("🍷 ÉTIQUETTE DE VIN RECONNUE");
                } else {
                    alert("❓ Document non catégorisé. Redirection vers DLC par défaut.");
                    showModule('trace');
                }

            } catch (err) {
                alert("Erreur lors de l'analyse : " + err.message);
            } finally {
                loader.style.display = 'none';
                progress.style.width = "0%";
            }
        }

        // Extraire un nom approximatif (Première ligne ou mot en gras)
        function extractName(text) {
            return text.split('\n')[0].substring(0, 30);
        }

        // Extraire une date (Format DD/MM/YY ou YYYY-MM-DD)
        function extractDate(text) {
            const dateRegex = /(\d{2})[\/\-\.](\d{2})[\/\-\.](\d{4}|\d{2})/;
            const match = text.match(dateRegex);
            if (match) {
                let day = match[1], month = match[2], year = match[3];
                if(year.length === 2) year = "20" + year;
                return `${year}-${month}-${day}`;
            }
            return "";
        }

        function showModule(id) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.getElementById('mod-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            const btn = document.getElementById('btn-' + id);
            if(btn) btn.classList.add('active');
        }

        async function load() {
            const state = await API.getState();
            db.temp = state.activeOrders['HACCP_TEMP']?.data || [];
            db.trace = state.activeOrders['HACCP_TRACE']?.data || [];
            renderCurrent();
        }

        function renderCurrent() {
            document.getElementById('table-temp').innerHTML = db.temp.filter(l => l.dept === currentDept).slice(0,10).map(l => `<tr><td>${l.time}</td><td>${l.eq}</td><td>${l.val}°C</td></tr>`).join('');
            document.getElementById('table-trace').innerHTML = db.trace.filter(l => l.dept === currentDept).slice(0,10).map(l => `<tr><td>${l.time}</td><td>${l.name}</td><td>${l.dlc}</td></tr>`).join('');
        }

        async function saveEntry(type) {
            let entry = { id: Date.now(), timestamp: new Date().toISOString(), time: new Date().toLocaleTimeString('fr-FR'), dept: currentDept };
            if(type === 'temp') {
                entry.eq = document.getElementById('temp-eq').value;
                entry.val = document.getElementById('temp-val').value;
                db.temp.unshift(entry);
                await API.update('HACCP_TEMP', db.temp);
            } else {
                entry.name = document.getElementById('trace-name').value;
                entry.dlc = document.getElementById('trace-dlc').value;
                db.trace.unshift(entry);
                await API.update('HACCP_TRACE', db.trace);
            }
            renderCurrent();
            document.querySelectorAll('input').forEach(i => i.value = "");
        }
    </script>
</body>
</html>
