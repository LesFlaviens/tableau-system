<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMPIRE OS - LE PASS CUISINE</title>
    <style>
        :root {
            --bg: #0f172a;
            --column-bg: rgba(30, 41, 59, 0.5);
            --text-main: #f8fafc;
            --gold: #fbbf24;
            --accent: #34d399;
            --alert: #f87171;
            --card-bg: #ffffff;
            --card-text: #0f172a;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Barre de menu Palace - Une seule ligne */
        header {
            background: #1e293b;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--gold);
        }

        .header-left { display: flex; align-items: center; gap: 20px; }
        .logo { font-weight: 900; font-size: 1.5rem; letter-spacing: 2px; color: var(--text-main); }
        .clock { background: #000; padding: 5px 12px; border-radius: 6px; font-family: monospace; font-size: 1.2rem; color: var(--gold); }
        
        .pax-counter {
            background: var(--gold);
            color: #000;
            padding: 6px 15px;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            font-size: 0.9rem;
        }

        .nav-bar { display: flex; gap: 8px; overflow-x: auto; white-space: nowrap; }
        .nav-bar button {
            background: #334155;
            border: 1px solid #475569;
            color: #cbd5e1;
            padding: 8px 15px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
        }
        .nav-bar button.active { background: var(--accent); color: #000; border-color: var(--accent); }

        /* Structure KDS - 3 Colonnes */
        .kds-container {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            padding: 15px;
            flex: 1;
            overflow: hidden;
        }

        .kds-column {
            background: var(--column-bg);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            border: 1px solid #334155;
        }

        .column-header {
            padding: 15px;
            text-align: center;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid transparent;
            font-size: 1.2rem;
        }

        .col-entrees { color: #34d399; border-color: #34d399; }
        .col-plats { color: #fbbf24; border-color: #fbbf24; }
        .col-desserts { color: #a78bfa; border-color: #a78bfa; }

        .tickets-stack {
            flex: 1;
            overflow-y: auto;
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* Style des Bons (Photo 1) */
        .ticket-card {
            background: var(--card-bg);
            color: var(--card-text);
            border-radius: 8px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5);
            overflow: hidden;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .ticket-header {
            background: #f1f5f9;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
        }

        .ticket-table { font-weight: 900; font-size: 1.3rem; }
        .ticket-time { font-weight: bold; color: #64748b; font-size: 0.9rem; }
        .ticket-timer { background: #0f172a; color: #fff; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }

        .ticket-body { padding: 10px 15px; }
        
        .ticket-item {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .item-qty {
            font-weight: 900;
            font-size: 1.2rem;
            min-width: 25px;
        }

        .item-details { flex: 1; }
        .item-name { font-weight: 700; font-size: 1.1rem; text-transform: uppercase; }
        
        /* Badge Siège */
        .seat-badge {
            display: inline-flex;
            justify-content: center;
            align-items: center;
            width: 20px;
            height: 20px;
            background: #0f172a;
            color: #fff;
            border-radius: 50%;
            font-size: 0.7rem;
            margin-right: 8px;
            vertical-align: middle;
        }

        .item-obs { color: var(--alert); font-weight: bold; font-size: 0.85rem; margin-top: 2px; }

        .btn-done {
            background: #f1f5f9;
            border: 1px solid #cbd5e1;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            transition: 0.2s;
        }
        .btn-done:hover { background: var(--accent); color: white; border-color: var(--accent); }

        .status-hold { opacity: 0.6; }
        .status-hold .ticket-header { background: #ffedd5; }

    </style>
</head>
<body>

<header>
    <div class="header-left">
        <div class="logo">🔥 LE PASS</div>
        <div id="clock" class="clock">00:00:00</div>
        <div id="pax-total" class="pax-counter">MIDI : 0 Couverts</div>
    </div>
    <div class="nav-bar">
        <button class="active">📝 LES BONS</button>
        <button onclick="window.location.href='index.html'">📱 PAD SERVEUR</button>
        <button>📜 HISTO</button>
        <button>📦 STOCKS</button>
        <button>🛡️ HACCP</button>
    </div>
</header>

<div class="kds-container">
    <div class="kds-column">
        <div class="column-header col-entrees">🥗 1ER ÉTAGE : ENTRÉES</div>
        <div id="stack-1" class="tickets-stack"></div>
    </div>

    <div class="kds-column">
        <div class="column-header col-plats">🔥 2ÈMÉ ÉTAGE : PLATS</div>
        <div id="stack-2" class="tickets-stack"></div>
    </div>

    <div class="kds-column">
        <div class="column-header col-desserts">🍰 3ÈMÉ ÉTAGE : DESSERTS</div>
        <div id="stack-3" class="tickets-stack"></div>
    </div>
</div>

<script>
    const API_URL = 'https://tableau-system.onrender.com';
    let activeOrders = {};

    async function refreshKDS() {
        try {
            const response = await fetch(`${API_URL}/get-current-state`);
            if (!response.ok) return;
            const state = await response.json();
            activeOrders = state.activeOrders;
            renderKDS();
        } catch (e) { console.error("Erreur Sync:", e); }
    }

    function renderKDS() {
        const stacks = {
            1: document.getElementById('stack-1'),
            2: document.getElementById('stack-2'),
            3: document.getElementById('stack-3')
        };

        // Reset
        Object.values(stacks).forEach(s => s.innerHTML = '');
        let totalPax = 0;

        // On parcourt les tables
        Object.entries(activeOrders).forEach(([tableLabel, order]) => {
            if (!order.items || order.items.length === 0) return;
            if (order.status === 'reserved') return;

            // Compter les couverts
            const matchPax = (order.observations || "").match(/🍽️ (\d+)/);
            if (matchPax) totalPax += parseInt(matchPax[1]);

            // Séparer les items par étage (course)
            const courses = { 1: [], 2: [], 3: [] };
            order.items.forEach(item => {
                if (item.done) return; // Ne pas afficher si déjà servi
                if (courses[item.course]) courses[item.course].push(item);
            });

            // Créer une carte par étage si nécessaire
            [1, 2, 3].forEach(courseId => {
                if (courses[courseId].length > 0) {
                    stacks[courseId].appendChild(createTicketCard(tableLabel, order, courses[courseId]));
                }
            });
        });

        document.getElementById('pax-total').innerText = `SERVICE : ${totalPax} Couverts`;
    }

    function createTicketCard(tableLabel, order, items) {
        const card = document.createElement('div');
        card.className = `ticket-card ${items.every(i => !i.fired) ? 'status-hold' : ''}`;
        
        // Timer
        const startTime = items[0].firedTime || items[0].itemId;
        const waitMin = Math.floor((Date.now() - startTime) / 60000);

        card.innerHTML = `
            <div class="ticket-header">
                <span class="ticket-table">TABLE ${tableLabel}</span>
                <div style="display:flex; gap:10px; align-items:center;">
                    <span class="ticket-time">${order.time || ''}</span>
                    <span class="ticket-timer">${waitMin} min</span>
                </div>
            </div>
            <div class="ticket-body">
                ${items.map(item => `
                    <div class="ticket-item">
                        <div class="item-qty">${item.qty}</div>
                        <div class="item-details">
                            <div class="item-name">
                                ${item.seat ? `<span class="seat-badge">${item.seat}</span>` : '<span class="seat-badge">T</span>'}
                                ${item.n}
                            </div>
                            ${item.obs ? `<div class="item-obs">⚠️ ${item.obs}</div>` : ''}
                        </div>
                        <button class="btn-done" onclick="markItemDone('${tableLabel}', ${item.id})">✓</button>
                    </div>
                `).join('')}
            </div>
        `;
        return card;
    }

    async function markItemDone(tableLabel, itemId) {
        const order = activeOrders[tableLabel];
        const item = order.items.find(i => i.id === itemId);
        if (item) {
            item.done = true;
            await fetch(`${API_URL}/update-order`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ tableId: tableLabel, order: order })
            });
            refreshKDS();
        }
    }

    // Horloge
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR');
    }, 1000);

    // Sync
    setInterval(refreshKDS, 3000);
    refreshKDS();
</script>

</body>
</html>
