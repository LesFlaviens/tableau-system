<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HACCP EMPIRE - Audit & Navigation</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; --dept-bg: #1a1a1a; --ordered: #2979ff;}
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* NAVIGATION PRINCIPALE */
        .nav-haccp { background: var(--panel); padding: 10px 20px; display: flex; gap: 10px; border-bottom: 1px solid #333; align-items: center; flex-wrap: wrap; }
        .nav-btn { background: transparent; border: 1px solid #333; color: #888; padding: 8px 12px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase;}
        .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255, 179, 0, 0.05); }

        /* 🟢 TOUCHES D'ACCÈS DIRECT AUX SERVICES (LES PADS) */
        .pad-link { padding: 8px 15px; border-radius: 4px; border: 2px solid; font-weight: 900; font-size: 0.75rem; cursor: pointer; background: transparent; text-transform: uppercase; transition: 0.2s; }
        .pad-link.cuisine { border-color: var(--gold); color: var(--gold); }
        .pad-link.bar { border-color: #00e5ff; color: #00e5ff; }
        .pad-link.service { border-color: #2979ff; color: #2979ff; }
        .pad-link:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }

        .content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .module { display: flex; flex-direction: column; gap: 20px; }
        .card { background: var(--panel); border-radius: 8px; padding: 15px; border: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; font-size: 1rem; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #555; font-size: 0.7rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #111; font-size: 0.85rem; }
        .btn-empire { background: var(--gold); color: #000; border: none; padding: 12px 25px; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; }

        /* LOGIN SCREEN (PORTAIL QCM) */
        #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 60000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dept-choice-btn { background: #111; border: 2px solid #333; border-radius: 12px; padding: 25px; font-size: 1.3rem; font-weight: 900; color: #fff; cursor: pointer; transition: 0.2s; width: 200px; text-align: center; }
        .dept-choice-btn.cuisine { border-color: var(--gold); color: var(--gold); }
        .dept-choice-btn.bar { border-color: #00e5ff; color: #00e5ff; }
        .dept-choice-btn.service { border-color: #2979ff; color: #2979ff; }
        
        .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 20px; }
        .pin-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 1.5rem; font-weight: bold; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; }
        .pin-display { font-size: 2rem; letter-spacing: 10px; margin-bottom: 20px; color: var(--gold); min-height: 40px;}
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--gold); letter-spacing: 5px; margin-bottom: 40px;">HACCP EMPIRE</h1>
        <div id="login-step-1" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
            <button class="dept-choice-btn cuisine" onclick="showPinPad('CUISINE')">🔪 CUISINE</button>
            <button class="dept-choice-btn bar" onclick="showPinPad('BAR')">🍸 BAR</button>
            <button class="dept-choice-btn service" onclick="showPinPad('SERVICE')">🛎️ SERVICE</button>
        </div>
        <div id="login-step-2" style="display: none; flex-direction: column; align-items: center;">
            <div id="login-instruction" style="color:#aaa; margin-bottom: 20px;">PIN REQUIS</div>
            <div id="pin-display" class="pin-display"></div>
            <div class="pin-pad">
                <button class="pin-btn" onclick="appendPin(1)">1</button><button class="pin-btn" onclick="appendPin(2)">2</button><button class="pin-btn" onclick="appendPin(3)">3</button>
                <button class="pin-btn" onclick="appendPin(4)">4</button><button class="pin-btn" onclick="appendPin(5)">5</button><button class="pin-btn" onclick="appendPin(6)">6</button>
                <button class="pin-btn" onclick="appendPin(7)">7</button><button class="pin-btn" onclick="appendPin(8)">8</button><button class="pin-btn" onclick="appendPin(9)">9</button>
                <button class="pin-btn" onclick="clearPin()" style="background:#333;">C</button><button class="pin-btn" onclick="appendPin(0)">0</button><button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
            </div>
            <button style="margin-top: 20px; background: transparent; border: none; color: #888; cursor: pointer;" onclick="backToStep1()">🔙 Changer de service</button>
        </div>
    </div>

    <div class="nav-haccp">
        <button class="pad-link cuisine" onclick="window.location.href='production.html'">🔪 ALLER CUISINE</button>
        <button class="pad-link bar" onclick="window.location.href='production.html'">🍸 ALLER BAR</button>
        <button class="pad-link service" onclick="window.location.href='gestionnaire.html'">🛎️ ALLER SERVICE</button>
        
        <div style="flex-grow: 1;"></div> <button class="nav-btn active" onclick="showModule('temp')">🌡️ TEMP</button>
        <button class="nav-btn" onclick="showModule('cleaning')">🧼 NETTOYAGE</button>
        <button class="nav-btn" onclick="showModule('trace')">🏷️ DLC</button>
        <button class="nav-btn" style="border-color:var(--alert); color:var(--alert);" onclick="location.reload()">🔒 SORTIR</button>
    </div>

    <div class="content">
        <div id="mod-temp" class="module">
            <div class="card">
                <h2 style="margin:0 0 15px 0; font-size: 0.9rem; color: var(--gold); text-transform: uppercase;">RELEVÉ : <span id="title-dept"></span></h2>
                <div class="grid">
                    <div class="input-group"><label>Équipement</label><input type="text" id="eq-name" placeholder="Frigo..."></div>
                    <div class="input-group"><label>Température (°C)</label><input type="number" id="eq-val" step="0.1"></div>
                    <div class="input-group" style="justify-content: flex-end;"><button class="btn-empire" onclick="submitEntry('temp')">VALIDER</button></div>
                </div>
            </div>
            <div class="card" style="flex:1; overflow:auto;">
                <table>
                    <thead><tr><th>Heure</th><th>Équipement</th><th>Valeur</th><th>Statut</th><th>Audit</th></tr></thead>
                    <tbody id="logs-temp"></tbody>
                </table>
            </div>
        </div>
        
        <div id="mod-cleaning" class="module" style="display:none;"><div class="card"><h2>NETTOYAGE</h2><p>Module actif...</p></div></div>
        <div id="mod-trace" class="module" style="display:none;"><div class="card"><h2>TRAÇABILITÉ</h2><p>Module actif...</p></div></div>
    </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json()).catch(() => ({activeOrders: {}})),
            update: (key, data) => fetch('/update-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: key, order: { data } }) })
        };

        let db = { temp: [], trace: [], cleaning: [] };
        let selectedLoginDept = ""; 
        let currentDept = 'CUISINE'; 
        let currentPin = "";
        const USERS = { "1234": "Serveur", "5678": "Cuisinier", "4321": "Barman", "9999": "Manager" };

        function showPinPad(dept) {
            selectedLoginDept = dept;
            document.getElementById('login-step-1').style.display = 'none';
            document.getElementById('login-step-2').style.display = 'flex';
            document.getElementById('login-instruction').innerText = "IDENTIFICATION : " + dept;
        }

        function backToStep1() {
            document.getElementById('login-step-2').style.display = 'none';
            document.getElementById('login-step-1').style.display = 'flex';
            clearPin();
        }

        function appendPin(num) { currentPin += num; document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length); }
        function clearPin() { currentPin = ""; document.getElementById('pin-display').innerText = ""; }

        function submitPin() {
            if(USERS[currentPin]) {
                currentDept = selectedLoginDept;
                document.getElementById('title-dept').innerText = currentDept;
                document.getElementById('login-screen').style.display = 'none';
                loadAllLogs();
            } else { alert("❌ Code incorrect."); clearPin(); }
        }

        function showModule(id) {
            document.querySelectorAll('.module').forEach(m => m.style.display = 'none');
            document.getElementById('mod-' + id).style.display = 'flex';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
        }

        async function loadAllLogs() {
            const state = await API.getState();
            if(state.activeOrders) {
                db.temp = state.activeOrders['HACCP_TEMP']?.data || [];
            }
            renderTempLogs();
        }

        function renderTempLogs() {
            const container = document.getElementById('logs-temp');
            const filtered = db.temp.filter(l => l.dept === currentDept);
            container.innerHTML = filtered.map(l => `<tr><td>${l.time}</td><td>${l.eq}</td><td>${l.val}°C</td><td>${l.status}</td><td>${l.audit}</td></tr>`).join('');
        }

        async function submitEntry(type) {
            let entry = { id: Date.now(), time: new Date().toLocaleTimeString('fr-FR'), dept: currentDept, audit: "Signé par " + USERS[currentPin] };
            if(type === 'temp') { entry.eq = document.getElementById('eq-name').value; entry.val = document.getElementById('eq-val').value; entry.status = entry.val < 5 ? 'OK' : 'ALERTE'; }
            db[type].push(entry);
            await API.update(`HACCP_${type.toUpperCase()}`, db[type]);
            loadAllLogs();
        }
    </script>
</body>
</html>
