<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>iBar - Cockpit</title>
    <style>
        /* Tes styles restent inchangés */
        :root { --bg: #0f172a; --panel: #1e293b; --border: #334155; --text-main: #f8fafc; --gold: #fbbf24; --accent: #34d399; --alert: #f87171; }
        body { background: var(--bg); color: var(--text-main); font-family: sans-serif; margin: 0; padding: 20px; }
        .header { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
        .sync-dot { width: 12px; height: 12px; border-radius: 50%; background: var(--alert); display: inline-block; }
        .sync-dot.online { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .card { background: var(--panel); border: 1px solid var(--border); padding: 15px; border-radius: 8px; margin-bottom: 10px; }
        input { background: #000; border: 1px solid var(--border); color: #fff; padding: 8px; margin: 5px; border-radius: 4px; }
        button { cursor: pointer; padding: 8px 15px; border-radius: 4px; border: none; font-weight: bold; }
        .btn-add { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div class="header">
        <div style="font-weight: 900; color: var(--gold);">IBAR.CH - CONTRÔLE</div>
        <div>
            <span id="sync-dot" class="sync-dot"></span>
            <span id="sync-text">DÉCONNECTÉ</span>
        </div>
    </div>

    <div id="app-content">
        </div>

    <script>
        // LIAISON TECHNIQUE
        const API_URL = '/get-current-state';
        const UPDATE_URL = '/update-order';
        
        // Structure par défaut si le serveur est vide
        let menuData = {
            cocktails: [], mocktails: [], vins: [], bieres: [], chaudes: [], froides: [], spiritueux: []
        };

        async function synchroniser() {
            try {
                const response = await fetch(API_URL);
                const state = await response.json();
                
                // CORRECTION ICI : Sécurité si MENU_MASTER_BAR n'existe pas encore
                if (state.activeOrders && state.activeOrders['MENU_MASTER_BAR']) {
                    menuData = state.activeOrders['MENU_MASTER_BAR'].data;
                }

                document.getElementById('sync-dot').classList.add('online');
                document.getElementById('sync-text').innerText = "EN LIGNE";
                render();
            } catch (e) {
                console.error("Erreur de connexion:", e);
                document.getElementById('sync-dot').classList.remove('online');
                document.getElementById('sync-text').innerText = "DÉCONNECTÉ";
            }
        }

        async function sauver() {
            try {
                await fetch(UPDATE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tableId: 'MENU_MASTER_BAR',
                        order: { data: menuData }
                    })
                });
                render();
            } catch (e) {
                alert("Erreur lors de la sauvegarde");
            }
        }

        function render() {
            const container = document.getElementById('app-content');
            container.innerHTML = '';

            // Liste des catégories
            const categories = {
                cocktails: "Cocktails", bieres: "Bières", vins: "Vins", 
                mocktails: "Sans Alcool", spiritueux: "Spiritueux",
                chaudes: "Boissons Chaudes", froides: "Boissons Froides"
            };

            for (let key in categories) {
                const div = document.createElement('div');
                div.className = 'card';
                
                let itemsHtml = (menuData[key] || []).map((item, index) => `
                    <div style="display:flex; justify-content:space-between; margin-bottom:5px; background:rgba(0,0,0,0.2); padding:5px;">
                        <span>${item.name} - ${item.price}€ (Stock: ${item.stock})</span>
                        <button onclick="supprimer('${key}', ${index})" style="background:var(--alert); color:#fff; padding:2px 8px;">X</button>
                    </div>
                `).join('');

                div.innerHTML = `
                    <h3 style="margin-top:0; color:var(--gold);">${categories[key]}</h3>
                    <div>${itemsHtml}</div>
                    <hr style="border:0; border-top:1px solid var(--border);">
                    <input type="text" id="n-${key}" placeholder="Nom...">
                    <input type="number" id="p-${key}" placeholder="Prix" style="width:60px;">
                    <input type="number" id="s-${key}" placeholder="Stock" style="width:60px;">
                    <button class="btn-add" onclick="ajouter('${key}')">AJOUTER</button>
                `;
                container.appendChild(div);
            }
        }

        function ajouter(key) {
            const name = document.getElementById(`n-${key}`).value;
            const price = document.getElementById(`p-${key}`).value;
            const stock = document.getElementById(`s-${key}`).value;

            if(!name || !price) return;

            if(!menuData[key]) menuData[key] = [];
            menuData[key].push({
                id: Date.now(),
                name: name,
                price: parseFloat(price),
                stock: parseInt(stock) || 0,
                dest: 'bar'
            });

            sauver();
        }

        function supprimer(key, index) {
            menuData[key].splice(index, 1);
            sauver();
        }

        // Démarrage
        synchroniser();
        setInterval(synchroniser, 5000); // Garde la connexion vivante
    </script>
</body>
</html>
