<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HACCP EMPIRE - Archives & Backup</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; --ordered: #2979ff;}
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        .nav-haccp { background: var(--panel); padding: 10px 20px; display: flex; gap: 10px; border-bottom: 1px solid #333; align-items: center; z-index: 100; }
        .nav-btn { background: transparent; border: 1px solid #333; color: #888; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.75rem; text-transform: uppercase;}
        .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255, 179, 0, 0.05); }

        .pad-link { display: none; padding: 10px 20px; border-radius: 4px; border: 2px solid; font-weight: 900; font-size: 0.8rem; cursor: pointer; background: #000; text-transform: uppercase; }

        .content { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; }
        .module { display: none; flex-direction: column; gap: 20px; height: 100%; }
        .module.active { display: flex; }
        
        /* EXPLORATEUR D'ARCHIVES */
        .archive-explorer { display: grid; grid-template-columns: 250px 1fr; gap: 20px; height: 100%; min-height: 0; }
        .archive-sidebar { background: #0a0a0a; border-radius: 8px; border: 1px solid #222; padding: 15px; overflow-y: auto; }
        .archive-folder { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; color: #aaa; font-size: 0.9rem; }
        .archive-folder:active { color: var(--gold); background: #111; }
        .archive-folder.active { color: var(--gold); font-weight: bold; border-left: 3px solid var(--gold); background: #111; }
        
        .card { background: var(--panel); border-radius: 8px; padding: 15px; border: 1px solid #222; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #555; font-size: 0.7rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #111; font-size: 0.85rem; }

        /* BOUTONS ACTIONS */
        .btn-empire { background: var(--gold); color: #000; border: none; padding: 15px; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; }
        .btn-backup { background: transparent; border: 1px solid var(--accent); color: var(--accent); padding: 10px; border-radius: 4px; font-size: 0.7rem; cursor: pointer; font-weight: bold; }
        
        #login-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 60000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .dept-choice-btn { background: #111; border: 2px solid #333; border-radius: 12px; padding: 30px; font-size: 1.3rem; font-weight: 900; color: #fff; cursor: pointer; width: 200px; text-align: center; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 85px); gap: 15px; margin-top: 20px; }
        .pin-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 1.8rem; font-weight: bold; width: 85px; height: 85px; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="color:var(--gold); letter-spacing: 5px; margin-bottom: 40px;">HACCP EMPIRE</h1>
        <div id="login-step-1" style="display: flex; gap: 20px; flex-wrap: wrap; justify-content: center;">
            <button class="dept-choice-btn" style="border-color: var(--gold); color: var(--gold);" onclick="showPinPad('CUISINE')">🔪 CUISINE</button>
            <button class="dept-choice-btn" style="border-color: #00e5ff; color: #00e5ff;" onclick="showPinPad('BAR')">🍸 BAR</button>
            <button class="dept-choice-btn" style="border-color: #2979ff; color: #2979ff;" onclick="showPinPad('SERVICE')">🛎️ SERVICE</button>
        </div>
        <div id="login-step-2" style="display: none; flex-direction: column; align-items: center;">
            <div id="pin-display" style="font-size: 2.5rem; letter-spacing: 12px; margin-bottom: 20px; color: var(--gold); min-height: 45px;"></div>
            <div class="pin-pad">
                <button class="pin-btn" onclick="addPin(1)">1</button><button class="pin-btn" onclick="addPin(2)">2</button><button class="pin-btn" onclick="addPin(3)">3</button>
                <button class="pin-btn" onclick="addPin(4)">4</button><button class="pin-btn" onclick="addPin(5)">5</button><button class="pin-btn" onclick="addPin(6)">6</button>
                <button class="pin-btn" onclick="addPin(7)">7</button><button class="pin-btn" onclick="addPin(8)">8</button><button class="pin-btn" onclick="addPin(9)">9</button>
                <button class="pin-btn" onclick="clearPin()" style="background:#333;">C</button><button class="pin-btn" onclick="addPin(0)">0</button><button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
            </div>
            <button style="margin-top: 30px; background: transparent; border: 1px solid #444; color: #444; padding: 10px 20px; border-radius: 4px; cursor: pointer;" onclick="location.reload()">🔙 RETOUR</button>
        </div>
    </div>

    <div class="nav-haccp">
        <button id="link-cuisine" class="pad-link" style="border-color: var(--gold); color: var(--gold);" onclick="window.location.href='production.html'">🔪 PAD CUISINE</button>
        <button id="link-bar" class="pad-link" style="border-color: #00e5ff; color: #00e5ff;" onclick="window.location.href='bar.html'">🍸 PAD BAR</button>
        <button id="link-service" class="pad-link" style="border-color: #2979ff; color: #2979ff;" onclick="window.location.href='gestionnaire.html'">🛎️ PAD SERVICE</button>
        
        <div style="flex-grow: 1;"></div>
        <button class="nav-btn active" onclick="showModule('temp')">🌡️ RELEVÉS</button>
        <button class="nav-btn" onclick="showModule('archive')">🗄️ ARCHIVES (5 ANS)</button>
        <button class="nav-btn" style="border-color:var(--alert); color:var(--alert);" onclick="location.reload()">🔒 QUITTER</button>
    </div>

    <div class="content">
        <div id="mod-temp" class="module active">
            <div class="card">
                <h2 style="margin:0 0 15px 0; font-size: 0.8rem; color: var(--gold); text-transform: uppercase;">SESSION : <span class="display-dept"></span></h2>
                <div class="grid">
                    <input type="text" id="temp-eq" placeholder="Équipement...">
                    <input type="number" id="temp-val" step="0.1" placeholder="°C">
                    <button class="btn-empire" onclick="saveEntry()">ENREGISTRER</button>
                </div>
            </div>
            <div class="card" style="flex:1; overflow:auto;"><table id="table-temp"></table></div>
        </div>

        <div id="mod-archive" class="module">
            <div class="archive-explorer">
                <div class="archive-sidebar">
                    <h3 style="color:var(--gold); font-size:0.7rem; text-transform:uppercase;">📂 Dossiers 5 ans</h3>
                    <div id="archive-folders"></div>
                    
                    <div style="margin-top: 30px; padding-top: 20px; border-top: 1px dashed #333;">
                        <p style="font-size:0.65rem; color:#666;">IMPORT EXTERNE :</p>
                        <input type="file" id="upload-archive" style="display:none;" onchange="importArchive(this)">
                        <button class="btn-backup" style="width:100%;" onclick="document.getElementById('upload-archive').click()">📂 CHARGER UN DOSSIER</button>
                    </div>
                </div>
                
                <div class="archive-main">
                    <div class="card" style="height:100%; display:flex; flex-direction:column;">
                        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #333; padding-bottom:10px;">
                            <h3 id="archive-title" style="margin:0; color:var(--ordered); font-size:1rem;">SÉLECTIONNEZ UN MOIS</h3>
                            <button id="btn-download-month" class="btn-backup" style="display:none;" onclick="downloadSelectedMonth()">💾 TÉLÉCHARGER CE MOIS</button>
                        </div>
                        <div id="archive-results" style="flex:1; overflow-y:auto;">
                            <p style="color:#444; text-align:center; margin-top:100px;">Sélectionnez une période à gauche.</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json()).catch(() => ({activeOrders: {}})),
            update: (key, data) => fetch('/update-order', { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: key, order: { data } }) })
        };

        let db = { temp: [] };
        let currentDept = ""; let pin = "";
        let selectedArchiveData = []; // Stockage temporaire pour le téléchargement

        function showPinPad(d) { currentDept = d; document.getElementById('login-step-1').style.display = 'none'; document.getElementById('login-step-2').style.display = 'flex'; }
        function addPin(n) { pin += n; document.getElementById('pin-display').innerText = '*'.repeat(pin.length); }
        function clearPin() { pin = ""; document.getElementById('pin-display').innerText = ""; }

        async function submitPin() {
            if(pin === "1234" || pin === "5678" || pin === "4321" || pin === "9999") {
                document.querySelectorAll('.display-dept').forEach(el => el.innerText = currentDept);
                document.querySelectorAll('.pad-link').forEach(l => l.style.display = 'none');
                document.getElementById('link-' + currentDept.toLowerCase()).style.display = 'block';
                document.getElementById('login-screen').style.display = 'none';
                await load();
                generateFolders();
            } else { alert("PIN FAUX"); clearPin(); }
        }

        function showModule(id) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.getElementById('mod-' + id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            if(event) event.target.classList.add('active');
        }

        async function load() {
            const state = await API.getState();
            db.temp = state.activeOrders['HACCP_TEMP']?.data || [];
            renderCurrent();
        }

        function generateFolders() {
            const container = document.getElementById('archive-folders');
            container.innerHTML = "";
            const months = ["Janvier", "Février", "Mars", "Avril", "Mai", "Juin", "Juillet", "Août", "Septembre", "Octobre", "Novembre", "Décembre"];
            const now = new Date();
            for(let i=0; i < 5; i++) {
                let year = now.getFullYear() - i;
                let h = document.createElement('div'); h.style = "color:#555; font-size:0.8rem; margin:15px 0 5px 0;"; h.innerText = year; container.appendChild(h);
                months.forEach((m, idx) => {
                    let f = document.createElement('div'); f.className = "archive-folder"; f.innerText = "📁 " + m;
                    f.onclick = () => viewArchive(year, idx, m);
                    container.appendChild(f);
                });
            }
        }

        function viewArchive(year, monthIdx, monthName) {
            document.querySelectorAll('.archive-folder').forEach(f => f.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('archive-title').innerText = `${monthName} ${year} - ${currentDept}`;
            
            selectedArchiveData = db.temp.filter(l => {
                const d = new Date(l.timestamp);
                return d.getFullYear() === year && d.getMonth() === monthIdx && l.dept === currentDept;
            });

            const res = document.getElementById('archive-results');
            if(selectedArchiveData.length > 0) {
                document.getElementById('btn-download-month').style.display = 'block';
                res.innerHTML = `<table><thead><tr><th>Date</th><th>Équipement</th><th>°C</th></tr></thead><tbody>` + 
                    selectedArchiveData.map(l => `<tr><td>${new Date(l.timestamp).toLocaleDateString()}</td><td>${l.eq}</td><td>${l.val}°C</td></tr>`).join('') + `</tbody></table>`;
            } else {
                document.getElementById('btn-download-month').style.display = 'none';
                res.innerHTML = `<p style="text-align:center; color:#555; margin-top:50px;">Aucun relevé.</p>`;
            }
        }

        // 🟢 FONCTION TÉLÉCHARGER LE MOIS
        function downloadSelectedMonth() {
            const fileName = `EMPIRE_HACCP_${currentDept}_${document.getElementById('archive-title').innerText.replace(/ /g, '_')}.json`;
            const blob = new Blob([JSON.stringify(selectedArchiveData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = fileName; a.click();
        }

        // 🟢 FONCTION CHARGER/IMPORTER UN DOSSIER
        function importArchive(input) {
            const file = input.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const importedData = JSON.parse(e.target.result);
                    if(Array.isArray(importedData)) {
                        // On fusionne les données importées avec la base existante (sans doublons sur ID)
                        const existingIds = new Set(db.temp.map(x => x.id));
                        importedData.forEach(item => { if(!existingIds.has(item.id)) db.temp.push(item); });
                        
                        await API.update('HACCP_TEMP', db.temp);
                        alert("✅ Dossier chargé et fusionné avec succès !");
                        location.reload();
                    }
                } catch(err) { alert("Erreur : Fichier archive invalide."); }
            };
            reader.readAsText(file);
        }

        function renderCurrent() {
            const table = document.getElementById('table-temp');
            const data = db.temp.filter(l => l.dept === currentDept).slice(0, 10);
            table.innerHTML = `<thead><tr><th>Heure</th><th>Appareil</th><th>°C</th></tr></thead>
                <tbody>${data.map(l => `<tr><td>${l.time}</td><td>${l.eq}</td><td>${l.val}°C</td></tr>`).join('')}</tbody>`;
        }

        async function saveEntry() {
            const eq = document.getElementById('temp-eq').value;
            const val = document.getElementById('temp-val').value;
            if(!eq || !val) return;
            db.temp.unshift({ id: Date.now(), timestamp: new Date().toISOString(), time: new Date().toLocaleTimeString('fr-FR'), dept: currentDept, eq, val, audit: "OK" });
            await API.update('HACCP_TEMP', db.temp);
            document.querySelectorAll('input').forEach(i => i.value = "");
            renderCurrent();
        }
    </script>
</body>
</html>
