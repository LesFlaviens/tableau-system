<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - RH & Palace Planning</title>
    <style>
        :root { 
            --bg: #050505; --panel: #111; --border: #333; --text-main: #f8fafc;
            --gold: #fbbf24; --accent: #34d399; --alert: #f87171;
            --blue: #60a5fa; --purple: #a78bfa; --orange: #f97316;
        }
        
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: var(--panel); border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .brand { font-weight: 900; letter-spacing: 4px; color: var(--gold); text-transform: uppercase; font-size: 1.2rem; }
        
        .nav-btns { display: flex; gap: 10px; }
        .btn-action { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; }
        .btn-action.manager-only { border-color: var(--gold); color: var(--gold); display: none; }
        .btn-return { border-color: var(--alert); color: var(--alert); }

        /* GRID PLANNING */
        .main-container { flex: 1; overflow: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .rh-table { width: 100%; border-collapse: collapse; background: var(--panel); border: 1px solid var(--border); font-size: 0.9rem; }
        .rh-table th, .rh-table td { border: 1px solid var(--border); padding: 12px; text-align: center; }
        .rh-table th { background: #1a1a1a; color: var(--gold); text-transform: uppercase; position: sticky; top: 0; }
        
        .staff-row:hover { background: rgba(255,255,255,0.02); }
        .staff-name { text-align: left !important; font-weight: bold; min-width: 150px; }

        /* CODES COULEURS RH PALACE */
        .status-cell { cursor: pointer; min-width: 80px; transition: 0.2s; font-weight: 900; font-size: 0.7rem; border-radius: 4px; }
        .mode-manager .status-cell:hover { transform: scale(1.05); box-shadow: 0 0 10px rgba(0,0,0,0.5); }
        
        .type-travail { background: rgba(52, 211, 153, 0.1); color: var(--accent); } /* Heures normales */
        .type-maladie { background: rgba(248, 113, 113, 0.2); color: var(--alert); } /* Arrêt Maladie */
        .type-vacances { background: rgba(96, 165, 250, 0.2); color: var(--blue); } /* Vacances */
        .type-accident { background: var(--orange); color: #000; } /* Accident de travail */
        .type-abs-inj { background: #ff0000; color: #fff; } /* Absence injustifiée */
        .type-sup { background: var(--purple); color: #fff; } /* Heures Sup */

        /* MODAL ÉDITION */
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.9); z-index: 10000; display: none; justify-content: center; align-items: center; }
        .modal.open { display: flex; }
        .modal-content { background: var(--panel); border: 2px solid var(--gold); padding: 30px; border-radius: 12px; width: 400px; }
        
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        select, input { background: var(--bg); border: 1px solid var(--border); color: #fff; padding: 12px; border-radius: 6px; outline: none; }

        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 99999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="login-overlay">
        <div class="brand" style="margin-bottom: 30px; font-size: 2rem;">EMPIRE RH</div>
        <div id="pin-display" style="font-size: 2rem; color: var(--gold); margin-bottom: 20px; letter-spacing: 10px;"></div>
        <div style="display: grid; grid-template-columns: repeat(3, 70px); gap: 15px;">
            <button class="btn-action" style="height:70px;" onclick="addPin(1)">1</button>
            <button class="btn-action" style="height:70px;" onclick="addPin(2)">2</button>
            <button class="btn-action" style="height:70px;" onclick="addPin(3)">3</button>
            <button class="btn-action" style="height:70px;" onclick="addPin(4)">4</button>
            <button class="btn-action" style="height:70px;" onclick="addPin(5)">5</button>
            <button class="btn-action" style="height:70px;" onclick="addPin(6)">6</button>
            <button class="btn-action" style="height:70px;" onclick="addPin(7)">7</button>
            <button class="btn-action" style="height:70px;" onclick="addPin(8)">8</button>
            <button class="btn-action" style="height:70px;" onclick="addPin(9)">9</button>
            <button class="btn-action btn-return" style="height:70px;" onclick="clearPin()">C</button>
            <button class="btn-action" style="height:70px;" onclick="addPin(0)">0</button>
            <button class="btn-action" style="height:70px; border-color: var(--accent); color: var(--accent);" onclick="login()">OK</button>
        </div>
    </div>

    <header>
        <div class="brand">Empire Palace Planning</div>
        <div class="nav-btns">
            <button class="btn-action manager-only" onclick="openStaffManager()">➕ AJOUTER COLLABORATEUR</button>
            <button class="btn-action btn-return" onclick="window.location.href='pad-serveur.html'">⬅️ RETOUR SERVICE</button>
        </div>
    </header>

    <div class="main-container">
        <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
            <div style="background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid var(--border);">
                <div style="font-size: 0.7rem; color: var(--text-muted);">EFFECTIF TOTAL</div>
                <div id="stat-total" style="font-size: 1.5rem; font-weight: 900;">150</div>
            </div>
            <div style="background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid var(--alert);">
                <div style="font-size: 0.7rem; color: var(--alert);">ALERTE ABSENCES</div>
                <div id="stat-absent" style="font-size: 1.5rem; font-weight: 900; color: var(--alert);">0</div>
            </div>
            <div style="background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid var(--purple);">
                <div style="font-size: 0.7rem; color: var(--purple);">HEURES SUP. (Mois)</div>
                <div id="stat-sup" style="font-size: 1.5rem; font-weight: 900; color: var(--purple);">0h</div>
            </div>
            <div style="background: var(--panel); padding: 20px; border-radius: 8px; border: 1px solid var(--accent);">
                <div style="font-size: 0.7rem; color: var(--accent);">OPÉRATIONNEL</div>
                <div id="stat-working" style="font-size: 1.5rem; font-weight: 900; color: var(--accent);">100%</div>
            </div>
        </div>

        <div style="overflow-x: auto; background: var(--panel); border-radius: 12px; border: 1px solid var(--border);">
            <table class="rh-table" id="planning-table">
                <thead>
                    <tr id="table-header">
                        <th class="staff-name">Collaborateur</th>
                        </tr>
                </thead>
                <tbody id="planning-body">
                    </tbody>
            </table>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--gold); margin-top: 0;">ÉDITION RH</h2>
            <div id="edit-target-info" style="margin-bottom: 20px; font-weight: bold; border-bottom: 1px solid var(--border); padding-bottom: 10px;"></div>
            
            <div class="form-group">
                <label>Statut de la journée</label>
                <select id="edit-status">
                    <option value="travail">TRAVAIL EFFECTUÉ</option>
                    <option value="repos">REPOS</option>
                    <option value="maladie">ARRÊT MALADIE</option>
                    <option value="vacances">CONGÉS PAYÉS</option>
                    <option value="accident">ACCIDENT DE TRAVAIL</option>
                    <option value="abs_justifie">ABSENCE JUSTIFIÉE</option>
                    <option value="abs_injustifie">ABSENCE INJUSTIFIÉE</option>
                </select>
            </div>

            <div class="form-group">
                <label>Heures effectuées</label>
                <input type="number" id="edit-hours" step="0.5" value="7">
            </div>

            <div class="form-group">
                <label>Heures Sup. (Bonus)</label>
                <input type="number" id="edit-sup" step="0.5" value="0">
            </div>

            <div style="display: flex; gap: 10px; margin-top: 25px;">
                <button class="btn-action" style="flex:1; background: var(--accent); color: #000;" onclick="saveDayEdit()">ENREGISTRER</button>
                <button class="btn-action btn-return" style="flex:1;" onclick="closeModal()">ANNULER</button>
            </div>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://tableau-system.onrender.com";
        let rhData = { staff: [] };
        let currentUserRole = "staff";
        let currentPin = "";
        let selectedStaffId = null;
        let selectedDay = null;

        const PIN_MANAGERS = ["1234", "9999", "2222"]; // Tes codes autorisés

        // 🟢 API CONNEXION RENDER
        const API = {
            sync: async () => {
                try {
                    const r = await fetch(`${RENDER_URL}/get-current-state`);
                    const state = await r.json();
                    if(state.activeOrders['RH_MASTER']) rhData = state.activeOrders['RH_MASTER'].data;
                    renderTable();
                } catch(e) { console.error("RH Sync Error"); }
            },
            save: async () => {
                await fetch(`${RENDER_URL}/update-order`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: 'RH_MASTER', order: {data: rhData} })
                });
                renderTable();
            }
        };

        // 🧠 LOGIQUE PIN & ACCÈS
        function addPin(n) { currentPin += n; document.getElementById('pin-display').innerText = "*".repeat(currentPin.length); }
        function clearPin() { currentPin = ""; document.getElementById('pin-display').innerText = ""; }
        function login() {
            if(PIN_MANAGERS.includes(currentPin)) {
                currentUserRole = "manager";
                document.body.classList.add('mode-manager');
                document.querySelectorAll('.manager-only').forEach(e => e.style.display = 'block');
            }
            document.getElementById('login-overlay').style.display = 'none';
            API.sync();
        }

        // 🏗️ GÉNÉRATION DU PLANNING
        function renderTable() {
            const header = document.getElementById('table-header');
            const body = document.getElementById('planning-body');
            
            // On génère 7 jours (Semaine en cours)
            let daysHtml = '<th class="staff-name">Collaborateur</th>';
            for(let i=1; i<=7; i++) daysHtml += `<th>Jour ${i}</th>`;
            header.innerHTML = daysHtml;

            // Si pas de staff, on en crée un exemple pour le Palace
            if(rhData.staff.length === 0) {
                rhData.staff = [{ id: 1, name: "Flavien (Directeur)", days: {} }];
            }

            body.innerHTML = rhData.staff.map(member => {
                let cells = "";
                for(let i=1; i<=7; i++) {
                    const data = member.days[i] || { status: 'travail', hours: 0, sup: 0 };
                    cells += `<td class="status-cell type-${data.status}" onclick="editDay(${member.id}, ${i})">
                                ${data.status.toUpperCase()}<br>${data.hours}h ${data.sup > 0 ? '(+'+data.sup+')' : ''}
                              </td>`;
                }
                return `<tr class="staff-row"><td class="staff-name">${member.name}</td>${cells}</tr>`;
            }).join('');
            
            updateStats();
        }

        function editDay(staffId, day) {
            if(currentUserRole !== "manager") return;
            selectedStaffId = staffId;
            selectedDay = day;
            const member = rhData.staff.find(s => s.id === staffId);
            document.getElementById('edit-target-info').innerText = `${member.name} - Jour ${day}`;
            document.getElementById('edit-modal').classList.add('open');
        }

        function saveDayEdit() {
            const member = rhData.staff.find(s => s.id === selectedStaffId);
            member.days[selectedDay] = {
                status: document.getElementById('edit-status').value,
                hours: parseFloat(document.getElementById('edit-hours').value) || 0,
                sup: parseFloat(document.getElementById('edit-sup').value) || 0
            };
            API.save();
            closeModal();
        }

        function openStaffManager() {
            const name = prompt("Nom du nouveau collaborateur :");
            if(name) {
                rhData.staff.push({ id: Date.now(), name: name, days: {} });
                API.save();
            }
        }

        function updateStats() {
            document.getElementById('stat-total').innerText = rhData.staff.length;
            // Calcule tes stats ici à la volée...
        }

        function closeModal() { document.getElementById('edit-modal').classList.remove('open'); }

        // Rafraîchissement automatique toutes les 30 sec
        setInterval(API.sync, 30000);
    </script>
</body>
</html>
