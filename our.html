<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMPIRE OS - Portail d'Accès</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; touch-action: manipulation; }
        
        .portal-title { color: var(--gold); letter-spacing: 5px; font-size: 2.5rem; text-transform: uppercase; margin-bottom: 50px; text-align: center; text-shadow: 0 0 15px rgba(255, 179, 0, 0.3); }

        /* 🟢 SECTION CHOIX DU DÉPARTEMENT */
        #dept-section { display: flex; gap: 30px; flex-wrap: wrap; justify-content: center; }
        
        .dept-card { background: var(--panel); border: 2px solid #333; border-radius: 16px; width: 250px; height: 250px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; transition: 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .dept-card:hover, .dept-card:active { border-color: var(--gold); transform: translateY(-10px); box-shadow: 0 15px 30px rgba(255, 179, 0, 0.2); }
        
        .dept-icon { font-size: 5rem; margin-bottom: 20px; }
        .dept-name { font-size: 1.8rem; font-weight: 900; letter-spacing: 2px; }

        /* 🟢 SECTION CODE PIN */
        #pin-section { display: none; flex-direction: column; align-items: center; }
        #pin-title { color: #fff; font-size: 1.5rem; letter-spacing: 2px; margin-bottom: 10px; text-transform: uppercase; }
        
        .pin-display { font-size: 3rem; letter-spacing: 15px; margin-bottom: 30px; color: var(--gold); min-height: 60px; text-align: center; border-bottom: 2px solid #333; width: 200px; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 90px); gap: 20px; }
        
        .pin-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 2rem; font-weight: bold; width: 90px; height: 90px; border-radius: 50%; cursor: pointer; transition: 0.1s; display: flex; justify-content: center; align-items: center;}
        .pin-btn:active { background: var(--gold); color: #000; }
        
        .btn-cancel { margin-top: 40px; background: transparent; border: 2px solid var(--alert); color: var(--alert); padding: 15px 40px; border-radius: 8px; font-size: 1.2rem; cursor: pointer; font-weight: bold; text-transform: uppercase; transition: 0.2s;}
        .btn-cancel:active { background: rgba(255, 23, 68, 0.2); }

    </style>
</head>
<body>

    <h1 class="portal-title">EMPIRE OS</h1>

    <div id="dept-section">
        <div class="dept-card" onclick="selectDept('CUISINE')">
            <div class="dept-icon">🔪</div>
            <div class="dept-name">CUISINE</div>
        </div>
        <div class="dept-card" onclick="selectDept('BAR')">
            <div class="dept-icon">🍸</div>
            <div class="dept-name">BAR</div>
        </div>
        <div class="dept-card" onclick="selectDept('SERVICE')">
            <div class="dept-icon">🛎️</div>
            <div class="dept-name">SERVICE</div>
        </div>
    </div>

    <div id="pin-section">
        <div id="pin-title">CODE D'ACCÈS</div>
        <div id="pin-display"></div>
        
        <div class="pin-pad">
            <button class="pin-btn" onclick="appendPin(1)">1</button>
            <button class="pin-btn" onclick="appendPin(2)">2</button>
            <button class="pin-btn" onclick="appendPin(3)">3</button>
            <button class="pin-btn" onclick="appendPin(4)">4</button>
            <button class="pin-btn" onclick="appendPin(5)">5</button>
            <button class="pin-btn" onclick="appendPin(6)">6</button>
            <button class="pin-btn" onclick="appendPin(7)">7</button>
            <button class="pin-btn" onclick="appendPin(8)">8</button>
            <button class="pin-btn" onclick="appendPin(9)">9</button>
            <button class="pin-btn" onclick="clearPin()" style="background:#333;">C</button>
            <button class="pin-btn" onclick="appendPin(0)">0</button>
            <button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
        </div>

        <button class="btn-cancel" onclick="cancelLogin()">🔙 RETOUR</button>
    </div>

    <script>
        let selectedDept = "";
        let currentPin = "";

        // 🟢 CONFIGURATION DES CODES ET DES REDIRECTIONS
        const PASSWORDS = {
            "SERVICE": ["1234", "9999"], // 1234 pour Serveur, 9999 pour Manager
            "CUISINE": ["5678", "9999"], // 5678 pour Cuisinier, 9999 pour Manager
            "BAR": ["4321", "9999"]      // 4321 pour Barman, 9999 pour Manager
        };

        const REDIRECTS = {
            "SERVICE": "gestionnaire.htlm",
            "CUISINE": "production.htlm",
            "BAR": "production.htlm" // Tu pourras pointer vers bar.htlm si tu as un fichier spécifique
        };

        function selectDept(dept) {
            selectedDept = dept;
            document.getElementById('dept-section').style.display = 'none';
            document.getElementById('pin-section').style.display = 'flex';
            document.getElementById('pin-title').innerText = "IDENTIFICATION : " + dept;
            currentPin = "";
            updatePinDisplay();
        }

        function appendPin(num) {
            currentPin += num;
            updatePinDisplay();
        }

        function clearPin() {
            currentPin = "";
            updatePinDisplay();
        }

        function updatePinDisplay() {
            document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length);
        }

        function cancelLogin() {
            document.getElementById('pin-section').style.display = 'none';
            document.getElementById('dept-section').style.display = 'flex';
            currentPin = "";
            selectedDept = "";
        }

        function submitPin() {
            // Vérification du code selon le département choisi
            if (PASSWORDS[selectedDept].includes(currentPin)) {
                // Sauvegarde le département choisi dans la mémoire pour que la page suivante le sache
                localStorage.setItem('empire_active_dept', selectedDept);
                
                // Redirection vers la bonne page
                window.location.href = REDIRECTS[selectedDept];
            } else {
                alert("❌ CODE INCORRECT POUR LA SECTION : " + selectedDept);
                clearPin();
            }
        }
    </script>
</body>
</html>
