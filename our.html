<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Serveur Master</title>
    <style>
        :root { --bg: #050505; --text: #fff; --sub: #aaa; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --ordered: #2979ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        
        header { 
            background: #000; border-bottom: 2px solid var(--gold); padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .nav-btns { display: flex; gap: 8px; }
        
        .btn-mini { 
            background: transparent; border: 1px solid #fff; color: #fff; padding: 8px 12px; 
            border-radius: 4px; font-size: 0.75rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        .btn-mini.gold { border-color: var(--gold); color: var(--gold); }
        .btn-mini.sync { border-color: var(--alert); color: var(--alert); }

        .floor-plan { flex: 1; position: relative; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; padding: 20px; overflow: auto; }
        .table-obj { position: absolute; background: #000; border: 2px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: 900; color: #fff; cursor: pointer; transition: 0.2s; }
        .table-obj.ordered { border-color: var(--ordered); color: var(--ordered); box-shadow: 0 0 15px rgba(41, 121, 255, 0.4); }
        .table-obj.ready { border-color: var(--accent); color: var(--accent); animation: pulse-ready 1s infinite; box-shadow: 0 0 20px rgba(0, 230, 118, 0.6); }
        @keyframes pulse-ready { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .drawer { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; flex-direction: column; }
        .drawer.open { display: flex; }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; overflow-y: auto; }
        .btn-item { background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 6px; font-weight: bold; text-align: left; display: flex; justify-content: space-between; cursor: pointer; }
        .ticket-view { flex: 0 0 30%; background: #0a0a0a; border-bottom: 1px solid #333; padding: 15px; overflow-y: auto; display: flex; flex-direction: column;}
        .ticket-items-container { flex: 1; overflow-y: auto; }
        .ticket-total { padding-top: 10px; border-top: 2px solid #333; margin-top: 10px; font-size: 1.5rem; font-weight: 900; color: var(--gold); text-align: right; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 20000; display: none; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .modal.open { display: block; }

        .edit-mode .table-obj { cursor: move; border-style: dashed; border-color: #2979ff; }
        #archi-tools { display: none; background: #111; padding: 10px; border-top: 1px solid #333; justify-content: space-between; }
        .edit-mode #archi-tools { display: flex; }

        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 50000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 20px; }
        .pin-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 1.5rem; font-weight: bold; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; }
        .pin-display { font-size: 2rem; letter-spacing: 10px; margin-bottom: 20px; color: var(--gold); min-height: 40px;}
        .item-delete-btn { background: var(--alert); color: #fff; border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 0.7rem;}
        
        #payment-modal, #cancel-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 30000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .pay-btn, .cancel-btn { background: #111; border: 2px solid var(--accent); color: var(--accent); padding: 20px 40px; font-size: 1.5rem; font-weight: 900; border-radius: 8px; cursor: pointer; width: 300px; margin-bottom: 15px; text-transform: uppercase; }
        .pay-btn.cancel, .cancel-btn.abort { border-color: var(--alert); color: var(--alert); }

        #print-area { display: none; }
        @media print {
            body > *:not(#print-area) { display: none !important; }
            #print-area { display: block !important; font-family: monospace; color: #000; }
        }
    </style>
</head>
<body>

    <div id="print-area"></div>

    <div id="payment-modal">
        <h2 id="pay-modal-title" style="color:var(--gold);">ENCAISSEMENT</h2>
        <h3 id="pay-modal-amount" style="color:#fff;">Total: 0.00€</h3>
        <button class="pay-btn" onclick="executePayment('CB')">💳 CARTE BANCAIRE</button>
        <button class="pay-btn" onclick="executePayment('ESPECES')">💶 ESPÈCES</button>
        <button class="pay-btn cancel" onclick="cancelPayment()">❌ ANNULER</button>
    </div>

    <div id="cancel-modal">
        <h2 style="color:var(--alert);">⚠️ ANNULER ?</h2>
        <h3 id="cancel-item-name" style="color:#fff;">Nom du plat</h3>
        <button class="cancel-btn" onclick="executeCancelItem('Erreur')">❌ ERREUR</button>
        <button class="cancel-btn abort" onclick="abortCancelItem()">🔙 RETOUR</button>
    </div>

    <div id="login-screen">
        <h1 style="color:var(--gold);">IDENTIFICATION</h1>
        <div id="pin-display" class="pin-display"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="appendPin(1)">1</button>
            <button class="pin-btn" onclick="appendPin(2)">2</button>
            <button class="pin-btn" onclick="appendPin(3)">3</button>
            <button class="pin-btn" onclick="appendPin(4)">4</button>
            <button class="pin-btn" onclick="appendPin(5)">5</button>
            <button class="pin-btn" onclick="appendPin(6)">6</button>
            <button class="pin-btn" onclick="appendPin(7)">7</button>
            <button class="pin-btn" onclick="appendPin(8)">8</button>
            <button class="pin-btn" onclick="appendPin(9)">9</button>
            <button class="pin-btn" onclick="clearPin()">C</button>
            <button class="pin-btn" onclick="appendPin(0)">0</button>
            <button class="pin-btn" onclick="submitPin()" style="background:var(--accent);">OK</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <div style="font-weight:900;">EMPIRE PAD</div>
            <div id="stock-tag" style="font-size:0.7rem;">● CONNEXION...</div>
            <div id="user-badge" style="font-size:0.8rem; color:var(--gold);">Utilisateur: Aucun</div>
        </div>
        <div class="nav-btns">
            <button id="btn-dashboard" class="btn-mini sync" style="display:none;" onclick="openModal()">DASHBOARD</button>
            <button class="btn-mini gold" onclick="logout()">🔒 LOGOUT</button>
        </div>
    </header>

    <div id="floor-plan" class="floor-plan"></div>

    <div id="order-drawer" class="drawer">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between;">
            <h2 id="table-label">TABLE</h2>
            <button class="btn-mini" onclick="closeOrder()">FERMER ✕</button>
        </div>
        
        <div id="ticket" class="ticket-view">
            <div id="ticket-items" class="ticket-items-container"></div>
            <div id="ticket-total" class="ticket-total">0.00€</div>
        </div>

        <div style="display:flex; gap:5px; padding:10px; background:#0a0a0a;">
            <button class="btn-mini" style="flex:1" onclick="renderMenu('Entrées')">🥗 ENTRÉES</button>
            <button class="btn-mini gold" style="flex:1" onclick="renderMenu('Plats de résistance')">🔥 PLATS</button>
            <button class="btn-mini" style="flex:1; border-color:#ea80fc; color:#ea80fc;" onclick="renderMenu('Desserts')">🍰 DESSERTS</button>
            <button class="btn-mini" style="flex:1; border-color:#00e5ff; color:#00e5ff;" onclick="renderMenu('Boissons')">🍸 BOISSONS</button>
        </div>

        <div id="menu" class="menu-grid"></div>

        <div style="padding:20px; display:flex; gap:10px;">
            <button class="btn-mini gold" style="flex:2; padding:15px;" onclick="sendToKitchen()">🚀 ENVOYER</button>
            <button class="btn-mini sync" style="flex:1; border-color:var(--accent); color:var(--accent);" onclick="openPaymentModal()">💳 PAYER</button>
        </div>
    </div>

    <script>
        let activeOrders = {}; let currentTable = null; let ticketItems = [];
        let currentUser = null; let currentPin = "";
        const USERS = { "1234": { name: "Flavien", role: "Serveur" }, "9999": { name: "Directeur", role: "Manager" } };

        function appendPin(num) { currentPin += num; document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length); }
        function clearPin() { currentPin = ""; document.getElementById('pin-display').innerText = ""; }
        
        function submitPin() {
            if(USERS[currentPin]) {
                currentUser = USERS[currentPin];
                document.getElementById('user-badge').innerText = `Badge: ${currentUser.name}`;
                document.getElementById('login-screen').style.display = 'none';
                renderFloor(); connectEmpireH24();
            } else { alert("PIN Incorrect."); clearPin(); }
        }

        function logout() { location.reload(); }

        let tables = JSON.parse(localStorage.getItem('empire_architecture')) || [ {label:"T1", l:50, t:50, w:80, h:80} ];

        function renderFloor() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                const div = document.createElement('div'); div.className = 'table-obj';
                if(activeOrders[t.label]) div.classList.add('ordered');
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = t.label; div.onclick = () => openOrder(t.label);
                floor.appendChild(div);
            });
        }

        function openOrder(id) {
            currentTable = id; document.getElementById('table-label').innerText = "TABLE " + id;
            ticketItems = (activeOrders[id] && activeOrders[id].items) ? activeOrders[id].items : [];
            renderTicket(); renderMenu('Plats de résistance');
            document.getElementById('order-drawer').classList.add('open');
        }

        // INTEGRATION DES PLATS, DESSERTS ET BOISSONS DANS LE BOUTON
        function renderMenu(category) {
            let items = [];
            if (category === 'Boissons') {
                const barMenu = JSON.parse(localStorage.getItem('kds_bar_menu')) || [];
                items = barMenu.map(b => ({ name: b.name || b.nom, price: b.price || 0, dest: 'bar' }));
            } else {
                const cuisineMenu = JSON.parse(localStorage.getItem('kds_menu')) || [];
                items = cuisineMenu.filter(i => i.category === category).map(i => ({ name: i.name, price: i.price, dest: 'cuisine' }));
            }

            document.getElementById('menu').innerHTML = items.map(i => `
                <div class="btn-item" onclick="addToTicket('${i.name.replace(/'/g, " ")}', ${i.price}, '${i.dest}')">
                    <span>${i.name}</span><span style="color:var(--gold)">${parseFloat(i.price).toFixed(2)}€</span>
                </div>
            `).join('');
        }

        function addToTicket(n, p, dest) {
            ticketItems.push({ id: Date.now(), n, p, dest });
            renderTicket();
        }

        function renderTicket() {
            let total = 0;
            document.getElementById('ticket-items').innerHTML = ticketItems.map((i, idx) => {
                total += parseFloat(i.p);
                return `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #222;">
                    <span>${i.n}</span><span>${parseFloat(i.p).toFixed(2)}€</span>
                    <button class="item-delete-btn" onclick="ticketItems.splice(${idx},1);renderTicket()">X</button>
                </div>`;
            }).join('');
            document.getElementById('ticket-total').innerText = total.toFixed(2) + "€";
        }

        async function sendToKitchen() {
            const order = { items: ticketItems, status: 'pending', time: new Date().toLocaleTimeString() };
            activeOrders[currentTable] = order;
            // Note: Remplacer l'URL par votre endpoint réel
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:currentTable, order}) });
            closeOrder(); renderFloor();
        }

        function openPaymentModal() { document.getElementById('payment-modal').style.display = 'flex'; }
        function cancelPayment() { document.getElementById('payment-modal').style.display = 'none'; }
        function closeOrder() { document.getElementById('order-drawer').classList.remove('open'); }

        function connectEmpireH24() {
            document.getElementById('stock-tag').innerText = "● SYNC ACTIF";
            document.getElementById('stock-tag').style.color = "var(--accent)";
        }
    </script>
</body>
</html>
