<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Serveur Master</title>
    <style>
        :root { --bg: #0f172a; --panel: #1e293b; --border: #334155; --text-main: #f8fafc; --text-muted: #94a3b8; --gold: #fbbf24; --gold-dim: rgba(251, 191, 36, 0.1); --accent: #34d399; --accent-dim: rgba(52, 211, 153, 0.1); --alert: #f87171; --alert-dim: rgba(248, 113, 113, 0.1); --ordered: #60a5fa; --ordered-dim: rgba(96, 165, 250, 0.1); --purple: #a78bfa; --service: #f472b6; --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3); --info-zen: #38bdf8; --digestif: #b45309; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        header { background: var(--bg); border-bottom: 1px solid var(--border); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .nav-btns { display: flex; gap: 6px; }
        .btn-mini { background: var(--bg); border: 1px solid var(--border); color: var(--text-muted); padding: 10px 12px; border-radius: 6px; font-size: 0.75rem; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .btn-mini.gold { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
        #archi-btn-bar { display: none; background: var(--bg); padding: 15px; border-bottom: 1px solid var(--border); justify-content: center; gap: 15px; }
        .edit-mode #archi-btn-bar { display: flex; }
        #room-tabs-container { display: flex; background: var(--panel); overflow-x: auto; padding: 10px 20px; gap: 10px; border-bottom: 1px solid var(--border); }
        .room-tab { padding: 10px 20px; font-weight: bold; border-radius: 6px; border: 1px solid transparent; cursor: pointer; white-space: nowrap; }
        .room-tab.active { background: var(--gold-dim); color: var(--gold); border-color: var(--gold); }
        .floor-plan-wrapper { flex: 1; overflow: auto; background: var(--bg); position: relative; }
        .floor-plan { position: relative; background-image: radial-gradient(var(--border) 1px, transparent 1px); background-size: 30px 30px; width: 2000px; height: 1500px; }
        .table-wrapper { position: absolute; box-sizing: border-box; display: flex; justify-content: center; align-items: center; z-index: 10; }
        .table-obj { position: relative; width: 100%; height: 100%; background: var(--panel); border: 2px solid var(--border); display: flex; justify-content: center; align-items: center; font-weight: bold; border-radius: 8px; box-shadow: var(--shadow); }
        .shape-oval { border-radius: 50%; }
        .drawer { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: var(--bg); z-index: 10000; display: none; flex-direction: column; }
        .drawer.open { display: flex; }
        .drawer-body { display:flex; flex:1; overflow:hidden; }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; padding: 20px; overflow-y: auto; }
        .btn-item { background: var(--panel); border: 1px solid var(--border); color: var(--text-main); padding: 15px; border-radius: 10px; font-weight: bold; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .ticket-view { flex: 0 0 35%; background: var(--panel); border-left: 1px solid var(--border); padding: 20px; overflow-y: auto; display: flex; flex-direction: column; }
        .ticket-total { font-size: 1.8rem; font-weight: 900; color: var(--gold); border-top: 2px solid var(--border); margin-top: 15px; padding-top: 15px; text-align: right; }
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(15,23,42,0.95); z-index: 20000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .modal.open { display: flex; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; }
        .pin-btn { background: var(--panel); border: 1px solid var(--border); color: var(--text-main); width: 80px; height: 80px; border-radius: 50%; font-size: 1.5rem; font-weight: bold; }
        .table-resizer { position: absolute; bottom: -5px; right: -5px; width: 25px; height: 25px; background: var(--gold); border-radius: 50%; cursor: se-resize; display: none; align-items: center; justify-content: center; color: #000; font-size: 12px; }
        .edit-mode .table-resizer { display: flex; }
    </style>
</head>
<body>
    <div id="login-screen" class="modal open">
        <h1 style="color:var(--gold)">EMPIRE OS</h1>
        <div id="pin-display" style="font-size:2rem; letter-spacing:10px; margin-bottom:20px; color:var(--gold)"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="appendPin(1)">1</button><button class="pin-btn" onclick="appendPin(2)">2</button><button class="pin-btn" onclick="appendPin(3)">3</button>
            <button class="pin-btn" onclick="appendPin(4)">4</button><button class="pin-btn" onclick="appendPin(5)">5</button><button class="pin-btn" onclick="appendPin(6)">6</button>
            <button class="pin-btn" onclick="appendPin(7)">7</button><button class="pin-btn" onclick="appendPin(8)">8</button><button class="pin-btn" onclick="appendPin(9)">9</button>
            <button class="pin-btn" onclick="clearPin()">C</button><button class="pin-btn" onclick="appendPin(0)">0</button><button class="pin-btn" style="background:var(--accent);color:#000" onclick="submitPin()">OK</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <div style="font-weight:900; color:var(--gold)">EMPIRE PAD</div>
            <div id="stock-tag" style="font-size:0.7rem; border:1px solid var(--accent); padding:4px 8px; border-radius:4px; margin-left:15px">CONNEXION...</div>
        </div>
        <div class="nav-btns">
            <button class="btn-mini gold" onclick="toggleRushMode()">⚡ RUSH</button>
            <button class="btn-mini" onclick="openAdminCatalog()" id="btn-admin">👑 GESTION</button>
            <button class="btn-mini" onclick="logout()">🔒</button>
        </div>
    </header>

    <div id="archi-btn-bar">
        <button class="btn-mini" onclick="addNewTable()">+ TABLE</button>
        <button class="btn-mini gold" onclick="saveArchitecture()">💾 SAUVER</button>
        <button class="btn-mini" onclick="closeArchiMode()">ANNULER</button>
    </div>

    <div id="room-tabs-container"></div>
    <div class="floor-plan-wrapper"><div id="floor-plan" class="floor-plan"></div></div>

    <div id="order-drawer" class="drawer">
        <div style="padding:20px; display:flex; justify-content:space-between; background:var(--panel)">
            <h2 id="table-label">TABLE</h2>
            <button class="btn-mini" onclick="closeOrder()">FERMER ✕</button>
        </div>
        <div class="drawer-body">
            <div style="flex:1; display:flex; flex-direction:column">
                <div id="cat-bar" style="display:flex; gap:10px; padding:10px; background:var(--panel)">
                    <button class="btn-mini" onclick="renderMenu('Entrées')">ENTRÉES</button>
                    <button class="btn-mini" onclick="renderMenu('Plats')">PLATS</button>
                    <button class="btn-mini" onclick="renderMenu('Desserts')">DESSERTS</button>
                    <button class="btn-mini" onclick="renderMenu('Boissons')">BOISSONS</button>
                </div>
                <div id="menu" class="menu-grid"></div>
            </div>
            <div class="ticket-view">
                <div id="ticket-items" style="flex:1"></div>
                <div id="ticket-total" class="ticket-total">0.00€</div>
                <button class="btn-mini gold" style="width:100%; padding:20px; margin-top:15px" onclick="executeSaveTableState()">🚀 ENVOYER CUISINE</button>
            </div>
        </div>
    </div>

    <script>
        const RENDER_URL = "https://tableau-system.onrender.com";
        let tables = [], rooms = ['Salle Principale'], currentRoom = 'Salle Principale';
        let activeOrders = {}, currentTable = null, ticketItems = [], currentUser = null, currentPin = "";
        let menuCuisine = { entrees: [], plats: [], desserts: [] }, menuBar = { bieres: [], vins: [] }, isArchiMode = false;

        const API = {
            getState: async () => {
                try {
                    const r = await fetch(`${RENDER_URL}/get-current-state`);
                    const data = await r.json();
                    document.getElementById('stock-tag').innerText = "● LIAISON SÉCURISÉE";
                    document.getElementById('stock-tag').style.color = "var(--accent)";
                    return data;
                } catch(e) { 
                    document.getElementById('stock-tag').innerText = "🔴 DÉCONNECTÉ";
                    return { activeOrders: {} }; 
                }
            },
            update: async (key, data) => {
                await fetch(`${RENDER_URL}/update-order`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ tableId: key, order: data })
                });
            }
        };

        function appendPin(n) { currentPin += n; document.getElementById('pin-display').innerText = "*".repeat(currentPin.length); }
        function clearPin() { currentPin = ""; document.getElementById('pin-display').innerText = ""; }
        function submitPin() {
            if(currentPin === "1234" || currentPin === "9999") {
                currentUser = { role: currentPin === "9999" ? "Manager" : "Serveur" };
                document.getElementById('login-screen').classList.remove('open');
                connectEmpireH24();
            } else { alert("Code erroné"); clearPin(); }
        }
        function logout() { currentUser = null; currentPin = ""; document.getElementById('login-screen').classList.add('open'); clearPin(); }

        function renderRooms() {
            const container = document.getElementById('room-tabs-container');
            container.innerHTML = rooms.map(r => `<div class="room-tab ${r === currentRoom ? 'active' : ''}" onclick="currentRoom='${r}';renderRooms();renderFloor();">${r}</div>`).join('');
        }

        function renderFloor() {
            const floor = document.getElementById('floor-plan');
            floor.innerHTML = '';
            tables.filter(t => t.room === currentRoom).forEach(t => {
                const wrapper = document.createElement('div');
                wrapper.className = 'table-wrapper';
                wrapper.style.cssText = `left:${t.l}px;top:${t.t}px;width:${t.w}px;height:${t.h}px;`;
                wrapper.innerHTML = `<div class="table-obj ${t.shape === 'oval' ? 'shape-oval' : ''}" onclick="openOrder('${t.label}')">${t.label}</div><div class="table-resizer" onmousedown="startResize(event, '${t.label}')">↘</div>`;
                floor.appendChild(wrapper);
            });
        }

        function openOrder(label) {
            currentTable = label;
            document.getElementById('table-label').innerText = "TABLE " + label;
            ticketItems = (activeOrders[label] && activeOrders[label].items) ? JSON.parse(JSON.stringify(activeOrders[label].items)) : [];
            renderMenu('Plats');
            renderTicket();
            document.getElementById('order-drawer').classList.add('open');
        }

        function closeOrder() { document.getElementById('order-drawer').classList.remove('open'); currentTable = null; }

        function renderMenu(cat) {
            const container = document.getElementById('menu');
            let items = [];
            if(cat === 'Entrées') items = menuCuisine.entrees;
            else if(cat === 'Plats') items = menuCuisine.plats;
            else if(cat === 'Desserts') items = menuCuisine.desserts;
            else items = [...menuBar.bieres, ...menuBar.vins];

            container.innerHTML = items.map(i => `
                <button class="btn-item" onclick="addToTicket('${i.name}', ${i.price})">
                    <span>${i.name}</span>
                    <span style="color:var(--accent)">${parseFloat(i.price).toFixed(2)}€</span>
                </button>
            `).join('');
        }

        function addToTicket(n, p) {
            ticketItems.push({ id: Date.now(), n, p, qty: 1 });
            renderTicket();
        }

        function renderTicket() {
            let total = 0;
            document.getElementById('ticket-items').innerHTML = ticketItems.map((i, idx) => {
                total += i.p;
                return `<div style="display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid var(--border)">
                    <span>${i.n}</span><span>${parseFloat(i.p).toFixed(2)}€</span>
                </div>`;
            }).join('');
            document.getElementById('ticket-total').innerText = total.toFixed(2) + "€";
        }

        async function executeSaveTableState() {
            if(!currentTable) return;
            await API.update(currentTable, { items: ticketItems, status: 'pending' });
            closeOrder();
        }

        function unlockArchiMode() { isArchiMode = true; document.body.classList.add('edit-mode'); }
        function closeArchiMode() { isArchiMode = false; document.body.classList.remove('edit-mode'); }
        function addNewTable() {
            let id = "T" + (tables.length + 1);
            tables.push({ label: id, l: 100, t: 100, w: 80, h: 80, shape: 'rect', room: currentRoom });
            renderFloor();
        }
        async function saveArchitecture() {
            await API.update('ARCHITECTURE', { rooms, tables });
            alert("Plan Sauvegardé");
            closeArchiMode();
        }

        async function syncData() {
            const state = await API.getState();
            if(state.activeOrders) {
                activeOrders = state.activeOrders;
                if(activeOrders['MENU_MASTER']) menuCuisine = activeOrders['MENU_MASTER'].data;
                if(activeOrders['MENU_MASTER_BAR']) menuBar = activeOrders['MENU_MASTER_BAR'].data;
                if(activeOrders['ARCHITECTURE']) {
                    rooms = activeOrders['ARCHITECTURE'].data.rooms || ['Salle Principale'];
                    tables = activeOrders['ARCHITECTURE'].data.tables || [];
                }
                if(!isArchiMode) { renderRooms(); renderFloor(); }
            }
        }

        function openAdminCatalog() { if(currentUser.role==='Manager') unlockArchiMode(); else alert("Accès refusé"); }
        function connectEmpireH24() { syncData(); setInterval(syncData, 4000); }
    </script>
</body>
</html>
