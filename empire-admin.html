<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>EMPIRE CONTROL PANEL | iCHEF</title>
    <style>
        :root { --gold: #d4af37; --bg: #0a0a0a; --panel: #1a1a1a; --text: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 40px; }
        h1 { letter-spacing: 5px; font-weight: 300; text-transform: uppercase; border-bottom: 1px solid var(--gold); padding-bottom: 20px; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; margin-top: 40px; }
        .res-card { background: var(--panel); border-radius: 15px; padding: 25px; border-left: 5px solid var(--gold); transition: 0.3s; }
        .res-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.5); }
        .status-online { color: #2ecc71; font-size: 0.8rem; text-transform: uppercase; font-weight: bold; }
        .res-name { font-size: 1.5rem; margin: 10px 0; color: var(--gold); }
        .metric { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.9rem; color: #888; }
        .metric span { color: #fff; font-weight: 600; }
        .btn-access { display: inline-block; margin-top: 20px; padding: 10px 20px; border: 1px solid var(--gold); color: var(--gold); text-decoration: none; border-radius: 5px; font-size: 0.8rem; transition: 0.3s; }
        .btn-access:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <h1>Empire Control Center</h1>
    <p style="color: #666;">Surveillance en temps réel de votre réseau de licences iChef.</p>

    <div class="stats-grid" id="empire-grid">
        </div>

    <script>
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
    ? "http://localhost:10000" 
    : "https://tableau-system.onrender.com";

        async function refreshDashboard() {
            try {
                const response = await fetch(`${SERVER_URL}/get-current-state`);
                const state = await response.json();
                const orders = state.activeOrders || {};
                
                // On regroupe les données par restaurant ID
                const restaurants = {};

                Object.keys(orders).forEach(key => {
                    const parts = key.split('_');
                    if (parts.length > 1) {
                        const resID = parts[0];
                        if (!restaurants[resID]) restaurants[resID] = { ordersCount: 0, alerts: 0 };
                        
                        if (key.includes('order_')) restaurants[resID].ordersCount++;
                        if (key.includes('ALERTS')) restaurants[resID].alerts++;
                    }
                });

                renderGrid(restaurants);
            } catch (e) { console.error("Erreur de monitoring", e); }
        }

        function renderGrid(data) {
            const grid = document.getElementById('empire-grid');
            grid.innerHTML = '';

            Object.keys(data).forEach(resID => {
                const info = data[resID];
                grid.innerHTML += `
                    <div class="res-card">
                        <div class="status-online">● Actif</div>
                        <div class="res-name">${resID.toUpperCase()}</div>
                        <div class="metric">Commandes actives : <span>${info.ordersCount}</span></div>
                        <div class="metric">Dernière activité : <span>${new Date().toLocaleTimeString()}</span></div>
                        <div class="metric">Alertes Système : <span>${info.alerts}</span></div>
                        <a href="#" class="btn-access" onclick="alert('Accès sécurisé au serveur de ${resID}')">Prendre la main</a>
                    </div>
                `;
            });
        }

        setInterval(refreshDashboard, 5000);
        refreshDashboard();
    </script>
</body>
</html>
