<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest-staff.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">
    
    <title>Empire OS - Connexion Équipe</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <style>
        /* 💎 DESIGN SOMBRE & ÉLÉGANT (EMPIRE OS) 💎 */
        :root { 
            --bg: #050505; 
            --panel: #0a0a0a; 
            --border: rgba(250, 240, 230, 0.15); 
            --text-main: #FAF0E6; 
            --text-muted: #8A857D; 
            --gold: #C5A059; 
            --gold-dim: rgba(197, 160, 89, 0.15);
            --alert: #D9534F;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            overflow: hidden; 
            background-image: radial-gradient(circle at 50% 0%, var(--panel) 0%, var(--bg) 100%);
            -webkit-tap-highlight-color: transparent;
        }

        .btn-kiosk { 
            position: absolute; top: 20px; right: 20px; background: transparent; 
            border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); 
            padding: 10px 15px; border-radius: 4px; font-size: 0.75rem; 
            font-weight: 600; text-transform: uppercase; cursor: pointer; transition: 0.3s; z-index: 100;
        }
        .btn-kiosk:hover { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

        /* BOUTON RETOUR ADMIN */
        .btn-back {
            position: absolute; top: 20px; left: 20px; background: transparent; 
            border: 1px solid rgba(255,255,255,0.1); color: var(--text-muted); 
            padding: 10px 15px; border-radius: 4px; font-size: 0.75rem; 
            font-weight: 600; text-transform: uppercase; cursor: pointer; transition: 0.3s; z-index: 100;
        }
        .btn-back:hover { border-color: var(--text-main); color: var(--text-main); background: rgba(255,255,255,0.05); }

        .login-card {
            background: rgba(10, 10, 10, 0.8);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 40px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            text-align: center;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .logo-title {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: var(--gold);
            margin: 0 0 5px 0;
            letter-spacing: 3px;
        }

        .logo-subtitle {
            font-size: 0.8rem;
            color: var(--text-muted);
            letter-spacing: 4px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .input-group {
            margin-bottom: 25px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            background: rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 15px;
            border-radius: 6px;
            font-size: 1.1rem;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
            text-align: center;
            letter-spacing: 2px;
        }

        .input-field:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 2px var(--gold-dim);
        }

        .btn-submit {
            background: linear-gradient(135deg, #C5A059, #a3803f);
            color: #000;
            border: none;
            width: 100%;
            padding: 16px;
            font-size: 1rem;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(197, 160, 89, 0.2);
            margin-top: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 55px;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        #error-msg {
            color: var(--alert);
            font-size: 0.85rem;
            margin-top: 15px;
            min-height: 20px;
            font-weight: 500;
            transition: 0.3s;
        }

        .loader {
            display: none;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    </style>
</head>
<body>

    <button class="btn-back" onclick="retourAdmin()" title="Retour au hub principal">🔙 RETOUR ADMIN</button>

    <button id="btn-kiosk" class="btn-kiosk" title="Verrouiller l'écran">⛶ PLEIN ÉCRAN</button>

    <div class="login-card">
        <h1 class="logo-title">iCHEF</h1>
        <div class="logo-subtitle">Portail Équipe</div>

        <div class="input-group">
            <label>Identifiant Restaurant</label>
            <input type="text" id="tenant-id" class="input-field" placeholder="Ex: MONRESTO24" autocomplete="off" autocorrect="off" autocapitalize="characters">
        </div>

        <div class="input-group">
            <label>Code PIN Employé</label>
            <input type="password" id="pin-code" class="input-field" placeholder="••••" pattern="[0-9]*" inputmode="numeric" maxlength="6">
        </div>

        <button class="btn-submit" id="btn-login" onclick="attemptLogin()">
            <span id="btn-text">Se Connecter</span>
            <div id="btn-loader" class="loader"></div>
        </button>

        <div id="error-msg"></div>
    </div>

    <script>
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        // GESTION DU RETOUR
        function retourAdmin() {
            let tenant = document.getElementById('tenant-id').value.trim();
            if(!tenant) tenant = localStorage.getItem('ichef_tenant_id') || "";
            window.location.href = tenant ? `administration.html?tenantID=${tenant}` : `administration.html`;
        }

        // GESTION DU MODE KIOSQUE
        document.getElementById('btn-kiosk').addEventListener('click', async () => {
            const elem = document.documentElement;
            const btn = document.getElementById('btn-kiosk');
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) await elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) await elem.webkitRequestFullscreen(); 
                else if (elem.msRequestFullscreen) await elem.msRequestFullscreen(); 
                btn.innerHTML = "✕ QUITTER";
                btn.style.color = "var(--gold)";
                btn.style.borderColor = "var(--gold)";
            } else {
                if (document.exitFullscreen) await document.exitFullscreen();
                else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
                btn.innerHTML = "⛶ PLEIN ÉCRAN";
                btn.style.color = "var(--text-muted)";
                btn.style.borderColor = "rgba(255,255,255,0.1)";
            }
        });

        // PRÉ-REMPLISSAGE ET GESTION CLAVIER
        window.onload = () => {
            let savedTenant = localStorage.getItem('ichef_tenant_id');
            if (savedTenant) {
                document.getElementById('tenant-id').value = savedTenant;
                document.getElementById('pin-code').focus();
            }
        };

        document.getElementById('pin-code').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') attemptLogin();
        });

        document.getElementById('tenant-id').addEventListener('input', function (e) {
            this.value = this.value.toUpperCase();
        });

        async function attemptLogin() {
            const tenantID = document.getElementById('tenant-id').value.trim().toUpperCase();
            const pin = document.getElementById('pin-code').value.trim();
            const errorBox = document.getElementById('error-msg');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');

            errorBox.innerText = "";

            if (!tenantID || !pin) {
                errorBox.innerText = "Veuillez remplir les deux champs.";
                return;
            }

            // Animation bouton
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            document.getElementById('btn-login').style.pointerEvents = 'none';

            try {
                // 1. PURGE PRÉVENTIVE DES ANCIENNES SESSIONS
                localStorage.removeItem('EMPIRE_GLOBAL_SYNC');
                localStorage.removeItem('ichef_master_pin');
                
                // 2. VÉRIFICATION FORFAIT & SÉCURITÉ SERVEUR
                const resVerify = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, pin: pin })
                });
                const dataVerify = await resVerify.json();

                let isMasterPin = dataVerify.success;

                // 3. RECUPERATION BDD DU RESTAURANT (BRIGADE + PLANNING)
                let rState = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                if (!rState.ok) throw new Error("Restaurant introuvable. Vérifiez l'identifiant.");

                let stateData = await rState.json();
                if (!stateData || Object.keys(stateData).length === 0) throw new Error("Identifiant Restaurant incorrect.");

                let staffList = (stateData.activeOrders && stateData.activeOrders['STAFF_ACCESS']) ? stateData.activeOrders['STAFF_ACCESS'].data : [];
                let timesheets = (stateData.activeOrders && stateData.activeOrders['TIMESHEETS_MASTER']) ? stateData.activeOrders['TIMESHEETS_MASTER'].data : {};

                let targetPage = '';

                if (isMasterPin || pin === "999999" || pin === "9999" || pin === "7777") {
                    // Si c'est le patron, on l'envoie sur le panneau des applications (Hub)
                    targetPage = 'administration.html';
                } else {
                    // 4. VERIFICATION DE L'EMPLOYÉ DANS LA BRIGADE
                    let matchedStaff = staffList.find(s => s.pin === pin);

                    if (!matchedStaff) throw new Error("Code PIN invalide ou introuvable.");
                    if (matchedStaff.active === false) throw new Error("Votre compte est actuellement suspendu.");

                    // 5. LECTURE DU PLANNING POUR AUJOURD'HUI
                    let dailyPoste = matchedStaff.dept; 
                    const today = new Date();
                    const monthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
                    const day = today.getDate();
                    
                    if (timesheets && timesheets[monthStr] && timesheets[monthStr][matchedStaff.id] && timesheets[monthStr][matchedStaff.id][day]) {
                        if (timesheets[monthStr][matchedStaff.id][day].poste) {
                            dailyPoste = timesheets[monthStr][matchedStaff.id][day].poste;
                        }
                    }

                    // 6. AIGUILLAGE INTELLIGENT (Où l'employé doit-il aller ?)
                    if (dailyPoste === 'admin') targetPage = 'administration.html';
                    else if (dailyPoste === 'salle') targetPage = 'pack-eco.html';
                    else if (dailyPoste === 'cuisine') targetPage = 'chef.html';
                    else if (dailyPoste === 'patisserie') targetPage = 'chef-patissier.html';
                    else if (dailyPoste === 'bar') targetPage = 'chef-bar.html';
                    else targetPage = 'pack-eco.html'; // Fallback sécurité
                }

                // 7. INJECTION DES NOUVEAUX DROITS ET REDIRECTION DÉFINITIVE
                localStorage.setItem('ichef_tenant_id', tenantID);
                localStorage.setItem('ichef_master_pin', pin);

                // Simulation d'un chargement fluide
                setTimeout(() => {
                    window.location.href = `${targetPage}?tenantID=${tenantID}`;
                }, 400);

            } catch (error) {
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
                document.getElementById('btn-login').style.pointerEvents = 'auto';
                errorBox.innerText = error.message || "Erreur de connexion réseau.";
                document.getElementById('pin-code').value = '';
                document.getElementById('pin-code').focus();
            }
        }
    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {
                    console.log('✅ Portail PWA activé et synchronisé', registration.scope);
                })
                .catch(err => {
                    console.error('❌ Erreur Service Worker :', err);
                });
            });
        }
    </script>
</body>
</html>
