<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Production Cuisine (KDS)</title>
    <style>
        :root { --bg: #050505; --accent: #ff3d00; --accent-hover: #dd2c00; --alert: #ff1744; --text: #fff; --panel: #111; --sub: #888; --ready: #00e676; --purple: #ea80fc;}
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* HEADER */
        header { background: #0a0a0a; border-bottom: 2px solid #333; padding: 15px 30px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { color: var(--accent); font-size: 2rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 15px;}
        .pulse-icon { animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }

        .top-stats { display: flex; gap: 20px; align-items: center; }
        .stat-badge { background: #161616; border: 1px solid #333; padding: 10px 20px; border-radius: 8px; font-weight: 900; font-size: 1.2rem; display: flex; align-items: center; gap: 10px;}
        .stat-badge span { color: var(--accent); font-size: 1.5rem; }

        /* RADAR RÉSERVATIONS (ANTICIPATION) */
        .radar-bar { background: #111; border-bottom: 1px dashed #333; padding: 15px 30px; display: flex; gap: 20px; align-items: center; flex-shrink: 0; overflow-x: auto; }
        .radar-title { color: var(--purple); font-weight: 900; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; margin-right: 10px; flex-shrink: 0;}
        .radar-item { background: #000; border: 1px solid #333; padding: 8px 15px; border-radius: 6px; font-weight: bold; color: #ccc; font-size: 1rem; white-space: nowrap;}
        .radar-item b { color: #fff; font-size: 1.2rem; margin-right: 5px; }

        /* ZONE DES BONS DE COMMANDE */
        .kds-board { flex: 1; padding: 20px; overflow-x: auto; display: flex; gap: 20px; align-items: flex-start; }
        
        .ticket { background: #161616; border: 2px solid #333; border-top: 5px solid var(--accent); border-radius: 12px; width: 320px; flex-shrink: 0; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s; animation: slideIn 0.3s ease-out;}
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .ticket-header { background: #0a0a0a; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .table-name { font-size: 1.8rem; font-weight: 900; color: #fff; }
        .order-time { color: var(--sub); font-weight: bold; font-size: 1rem; background: #000; padding: 5px 10px; border-radius: 4px; border: 1px solid #222;}

        .ticket-body { padding: 15px; flex: 1; overflow-y: auto; }
        
        .course-group { margin-bottom: 15px; }
        .course-title { font-size: 0.8rem; color: #888; text-transform: uppercase; font-weight: 900; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px dashed #333; padding-bottom: 5px;}
        .course-item { display: flex; justify-content: space-between; font-size: 1.2rem; font-weight: bold; margin-bottom: 8px; color: #ddd; }
        .course-item .qty { color: var(--accent); margin-right: 10px; font-weight: 900; }

        .ticket-actions { padding: 15px; background: #0a0a0a; border-top: 1px solid #333; display: flex; gap: 10px; }
        .btn-action { flex: 1; padding: 15px; border: none; border-radius: 8px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; }
        .btn-action:active { transform: scale(0.95); }
        .btn-ready { background: var(--ready); color: #000; }
        .btn-ready:hover { background: #00c853; box-shadow: 0 0 15px rgba(0, 230, 118, 0.4); }

        /* ÉTAT VIDE */
        .empty-state { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; color: #444; }
        .empty-state h2 { font-size: 2.5rem; margin: 0; text-transform: uppercase; }
        .empty-state p { font-size: 1.2rem; }

    </style>
</head>
<body>

    <header>
        <h1 class="header-title">
            <span class="pulse-icon">🔥</span> PRODUCTION CUISINE
        </h1>
        <div class="top-stats">
            <div class="stat-badge">Bons en cours : <span id="count-tickets">0</span></div>
            <div class="stat-badge">Plats à envoyer : <span id="count-items">0</span></div>
        </div>
    </header>

    <div class="radar-bar" id="radar-bar">
        <div class="radar-title">📅 RADAR DU SERVICE :</div>
        <div id="radar-content" style="display:flex; gap:15px; align-items:center;">
            <div style="color:#555; font-style:italic;">Chargement des prévisions...</div>
        </div>
    </div>

    <div class="kds-board" id="kds-board">
        <div class="empty-state">
            <h2>CUISINE PROPRE</h2>
            <p>En attente de bons de commande...</p>
        </div>
    </div>

    <script>
        // --- SONNERIE DE NOUVEAU BON ---
        const alertSound = new Audio('https://actions.google.com/sounds/v1/alarms/beep_short.ogg');
        let previousTicketCount = 0;

        // --- ECOUTE DU CLOUD (RÉCEPTION DES BONS ET RÉSERVATIONS) ---
        window.addEventListener('storage', function(e) {
            if (e.key === 'empire_kds_queue') {
                renderKDS();
            }
            if (e.key === 'empire_reservations') {
                renderRadar();
            }
        });

        // --- MOTEUR DU RADAR DE RÉSERVATIONS ---
        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function renderRadar() {
            const today = getTodayString();
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            const dayResas = resas[today] || [];
            
            const container = document.getElementById('radar-content');
            
            if (dayResas.length === 0) {
                container.innerHTML = '<div style="color:#555; font-style:italic;">Aucune réservation prévue aujourd\'hui.</div>';
                return;
            }

            let totalPax = 0;
            let compoMap = {};

            dayResas.forEach(r => {
                const pax = parseInt(r.pax) || 0;
                totalPax += pax;
                if(pax > 0) {
                    if(!compoMap[pax]) compoMap[pax] = 0;
                    compoMap[pax]++;
                }
            });

            let html = `<div class="radar-item" style="border-color:var(--purple); color:var(--purple);"><b>${totalPax}</b> Couverts au total</div>`;
            
            Object.keys(compoMap).sort((a,b) => a - b).forEach(paxSize => {
                const qty = compoMap[paxSize];
                html += `<div class="radar-item"><b>${qty}x</b> Table de ${paxSize}</div>`;
            });

            container.innerHTML = html;
        }

        // --- MOTEUR D'AFFICHAGE DES BONS (KDS) ---
        function getQueue() {
            return JSON.parse(localStorage.getItem('empire_kds_queue')) || [];
        }

        function saveQueue(queue) {
            localStorage.setItem('empire_kds_queue', JSON.stringify(queue));
        }

        function markAsReady(orderId) {
            let queue = getQueue();
            // On retire le bon de la file d'attente (la table l'a reçu)
            queue = queue.filter(o => o.id !== orderId);
            saveQueue(queue);
            renderKDS();
        }

        function renderKDS() {
            const queue = getQueue();
            const board = document.getElementById('kds-board');
            
            // Ne garder que les commandes en attente
            const pendingOrders = queue.filter(o => o.status === 'pending');

            // Mise à jour des compteurs du Header
            document.getElementById('count-tickets').textContent = pendingOrders.length;
            
            let totalItems = 0;
            pendingOrders.forEach(o => {
                totalItems += (o.ticket.entrees.length + o.ticket.plats.length + o.ticket.desserts.length);
            });
            document.getElementById('count-items').textContent = totalItems;

            // Sonnerie si nouveau ticket
            if (pendingOrders.length > previousTicketCount) {
                alertSound.play().catch(e => console.log("Auto-play bloqué par le navigateur"));
            }
            previousTicketCount = pendingOrders.length;

            if (pendingOrders.length === 0) {
                board.innerHTML = `
                <div class="empty-state">
                    <h2>CUISINE PROPRE</h2>
                    <p>En attente de bons de commande...</p>
                </div>`;
                return;
            }

            let html = '';

            pendingOrders.forEach(order => {
                // Fonction pour regrouper les articles identiques (ex: 2x Tartare)
                const groupItems = (itemsArray) => {
                    const counts = {};
                    itemsArray.forEach(i => { counts[i.name] = (counts[i.name] || 0) + 1; });
                    return Object.entries(counts).map(([name, qty]) => `
                        <div class="course-item"><span class="qty">${qty}x</span> ${name}</div>
                    `).join('');
                };

                const entreesHtml = order.ticket.entrees.length > 0 ? `
                    <div class="course-group">
                        <div class="course-title">Entrées</div>
                        ${groupItems(order.ticket.entrees)}
                    </div>` : '';

                const platsHtml = order.ticket.plats.length > 0 ? `
                    <div class="course-group">
                        <div class="course-title" style="color:var(--accent);">Plats</div>
                        ${groupItems(order.ticket.plats)}
                    </div>` : '';

                const dessertsHtml = order.ticket.desserts.length > 0 ? `
                    <div class="course-group">
                        <div class="course-title" style="color:var(--purple);">Desserts</div>
                        ${groupItems(order.ticket.desserts)}
                    </div>` : '';

                // On n'affiche pas le ticket s'il n'y a que des boissons (géré par le bar)
                if (order.ticket.entrees.length === 0 && order.ticket.plats.length === 0 && order.ticket.desserts.length === 0) {
                    return; 
                }

                html += `
                <div class="ticket" id="${order.id}">
                    <div class="ticket-header">
                        <div class="table-name">T. ${order.table.replace('T', '')}</div>
                        <div class="order-time">🕒 ${order.time}</div>
                    </div>
                    <div class="ticket-body">
                        ${entreesHtml}
                        ${platsHtml}
                        ${dessertsHtml}
                    </div>
                    <div class="ticket-actions">
                        <button class="btn-action btn-ready" onclick="markAsReady('${order.id}')">ENVOYER ✓</button>
                    </div>
                </div>`;
            });

            board.innerHTML = html;
        }

        // --- DÉMARRAGE INITIAL ---
        renderRadar();
        renderKDS();

        // Check régulier pour synchroniser si localStorage a du mal via iframes
        setInterval(() => {
            const currentQueueStr = JSON.stringify(getQueue());
            if(!window.lastQueueStr || window.lastQueueStr !== currentQueueStr) {
                renderKDS();
                renderRadar();
                window.lastQueueStr = currentQueueStr;
            }
        }, 2000);

    </script>
</body>
</html>
