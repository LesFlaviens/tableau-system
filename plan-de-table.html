<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire - Pad Serveur</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --purple: #ea80fc; --blue: #00b0ff; --warning: #ffb300; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: manipulation; }
        
        /* HEADER ÉPURÉ PAD */
        header { border-bottom: 1px solid #333; padding: 10px 20px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { color: var(--accent); font-size: 1.5rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 10px;}
        .sync-icon { color: var(--blue); font-size: 1rem; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .header-controls { display: flex; gap: 10px; }
        .btn-top { background: #111; font-weight: 900; border-radius: 6px; padding: 12px 15px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 0.9rem; border: 2px solid transparent; color: #fff; }
        .btn-top:active { transform: scale(0.95); }
        .btn-res { border-color: var(--purple); color: var(--purple); }

        /* TABS (SALLES) */
        .zones-bar { display: flex; border-bottom: 1px solid #222; background: #050505; overflow-x: auto;}
        .zone-tab { padding: 12px 20px; font-size: 1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #555; border-right: 1px solid #222; transition: 0.2s; white-space: nowrap; }
        .zone-tab.active { background: var(--accent); color: #000; }

        /* MAIN AREA */
        .main-workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        .floor-plan { flex: 1; position: relative; background: #050505; overflow: hidden; }

        /* TABLES VERROUILLÉES */
        .table-obj { position: absolute; background: #161616; border: 2px solid #555; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); user-select: none; text-align: center; padding: 5px; box-sizing: border-box; transition: 0.1s;}
        .table-obj:active { transform: scale(0.95); background: #222; border-color: var(--accent); }
        .table-badge { position: absolute; top: -8px; right: -8px; background: var(--purple); color: #000; font-size: 0.7rem; padding: 3px 6px; border-radius: 10px; font-weight: 900; border: 2px solid #000; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}

        /* TIROIRS COULISSANTS (DROITE) */
        .drawer { position: absolute; top: 0; right: 0; width: 100%; max-width: 450px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 20px; z-index: 9000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -15px 0 50px rgba(0,0,0,0.8); display: flex; flex-direction: column;}
        .drawer.open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #333; padding-bottom: 15px; flex-shrink: 0;}
        .drawer-title { margin: 0; font-size: 1.5rem; text-transform: uppercase; font-weight: 900; color: #fff; }
        .btn-close-drawer { background: #222; border: none; color: #fff; font-size: 1.2rem; font-weight: bold; cursor: pointer; padding: 8px 15px; border-radius: 6px; }

        /* INPUTS */
        .input-base { background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 1.1rem; margin-bottom: 10px; font-weight: bold;}
        .input-base:focus { border-color: var(--purple); outline: none; }
        
        /* INTERFACE DE COMMANDE (CAISSE) */
        .order-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        .ticket-area { flex: 1; background: #000; border: 1px solid #222; border-radius: 8px; margin-bottom: 15px; padding: 10px; overflow-y: auto; }
        
        .cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; flex-shrink: 0;}
        .btn-cat { background: #161616; border: 1px solid #333; color: #fff; padding: 15px; font-weight: 900; text-transform: uppercase; border-radius: 8px; cursor: pointer; font-size: 1rem; }
        .btn-cat:active { background: #222; border-color: var(--accent); }
        
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-shrink: 0;}
        .btn-send { background: var(--accent); color: #000; padding: 15px; font-weight: 900; text-transform: uppercase; border-radius: 8px; cursor: pointer; font-size: 1.1rem; border: none; }
        .btn-pay { background: var(--blue); color: #000; padding: 15px; font-weight: 900; text-transform: uppercase; border-radius: 8px; cursor: pointer; font-size: 1.1rem; border: none; }

    </style>
</head>
<body>

    <header id="main-header">
        <h1 class="header-title">
            SALLE
            <span class="sync-icon" title="Synchronisation Cloud Active">☁️</span>
        </h1>
        <div class="header-controls">
            <button class="btn-top btn-res" onclick="openDrawer('res-drawer')">📅 RÉSERVATIONS</button>
        </div>
    </header>

    <div class="zones-bar" id="zones-bar"></div>

    <div class="main-workspace">
        
        <div class="floor-plan" id="floor-plan"></div>

        <div id="res-drawer" class="drawer">
            <div class="drawer-header">
                <h2 class="drawer-title" style="color:var(--purple);">RÉSERVATIONS</h2>
                <button class="btn-close-drawer" onclick="closeDrawer('res-drawer')">FERMER</button>
            </div>
            
            <div style="overflow-y: auto; flex: 1; padding-right: 5px;">
                <input type="date" id="res-date-filter" class="input-base" onchange="renderReservations()" style="border-color:var(--purple);">
                
                <button class="btn-top" style="width: 100%; background: var(--purple); color: #000; border: none; margin-bottom: 20px; font-size:1.1rem;" onclick="toggleResForm()">+ NOUVELLE RÉSA</button>
                
                <div id="res-form" style="display:none; background: #111; padding: 15px; border: 1px solid var(--purple); border-radius: 8px; margin-bottom: 20px;">
                    <input type="text" id="res-name" class="input-base" placeholder="Nom du client">
                    <input type="tel" id="res-phone" class="input-base" placeholder="Téléphone">
                    <div style="display: flex; gap: 10px;">
                        <input type="time" id="res-time" class="input-base">
                        <input type="number" id="res-pax" class="input-base" placeholder="Couverts" min="1">
                    </div>
                    <input type="text" id="res-table" class="input-base" placeholder="N° de Table (Optionnel)">
                    <button onclick="saveReservation()" class="btn-top" style="width: 100%; background: var(--accent); color: #000; border: none;">VALIDER & SYNCHRONISER</button>
                </div>
                
                <div id="res-list-container"></div>
            </div>
        </div>

        <div id="order-drawer" class="drawer" style="border-left-color: var(--accent);">
            <div class="drawer-header">
                <h2 class="drawer-title" id="order-table-title" style="color:var(--accent);">TABLE --</h2>
                <button class="btn-close-drawer" onclick="closeDrawer('order-drawer')">RETOUR</button>
            </div>
            
            <div class="order-layout">
                <div class="ticket-area" id="ticket-area">
                    <div style="color:#555; text-align:center; margin-top:20px; font-style:italic;">Table vide. Frapper un article.</div>
                    </div>

                <div class="cat-grid">
                    <button class="btn-cat" onclick="alert('Menu Entrées (À connecter au labo)')">ENTRÉES</button>
                    <button class="btn-cat" onclick="alert('Menu Plats (À connecter au labo)')">PLATS</button>
                    <button class="btn-cat" onclick="alert('Menu Desserts (À connecter au labo)')">DESSERTS</button>
                    <button class="btn-cat" style="border-color:var(--blue);" onclick="alert('Menu Bar (À connecter au labo)')">BOISSONS</button>
                </div>

                <div class="action-grid">
                    <button class="btn-send" onclick="sendToKDS()">🔥 ENVOYER CUISINE</button>
                    <button class="btn-pay" onclick="payTable()">💳 ENCAISSER</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- MOTEUR DE SYNCHRONISATION "CLOUD" (SIMULÉ) ---
        // Ce code écoute les changements faits par les autres tablettes
        window.addEventListener('storage', function(e) {
            if (e.key === 'empire_reservations') {
                renderReservations();
                loadFloorPlan(); // Met à jour les badges 📅 sur les tables
            }
        });

        let currentZoneId = 'z1';
        let currentTableId = null;

        // --- GESTION DES TIROIRS ---
        function openDrawer(drawerId) {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
            document.getElementById(drawerId).classList.add('open');
        }

        function closeDrawer(drawerId) {
            document.getElementById(drawerId).classList.remove('open');
            if(drawerId === 'res-drawer') document.getElementById('res-form').style.display = 'none';
        }

        // --- MOTEUR DE ZONES ---
        function getZones() {
            let zones = JSON.parse(localStorage.getItem('empire_salle_zones'));
            if(!zones || zones.length === 0) {
                zones = [ { id: 'z1', name: 'RESTAURANT' }, { id: 'z2', name: 'TERRASSE' } ];
            }
            return zones;
        }

        function loadZonesUI() {
            const zones = getZones();
            const bar = document.getElementById('zones-bar');
            if(!zones.find(z => z.id === currentZoneId)) currentZoneId = zones[0].id;
            bar.innerHTML = zones.map(z => `<div class="zone-tab ${z.id === currentZoneId ? 'active' : ''}" onclick="switchZone('${z.id}')">${z.name}</div>`).join('');
            loadFloorPlan();
        }

        function switchZone(id) { currentZoneId = id; loadZonesUI(); }

        // --- MOTEUR DU PLAN DE TABLE ---
        function getTables() {
            let tables = JSON.parse(localStorage.getItem('empire_salle_tables'));
            if(!tables || tables.length === 0) {
                tables = [
                    { id: 'T1', zoneId: 'z1', label: 'T1', w: 80, h: 80, t: 100, l: 50, color: '#555', radius: '8px' },
                    { id: 'T2', zoneId: 'z1', label: 'T2', w: 80, h: 80, t: 100, l: 150, color: '#555', radius: '8px' },
                    { id: 'T3', zoneId: 'z1', label: 'T3', w: 80, h: 80, t: 100, l: 250, color: '#555', radius: '8px' }
                ];
            }
            return tables;
        }

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function isTableReservedToday(tableLabel) {
            const today = getTodayString();
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            return (resas[today] || []).some(r => r.table === tableLabel);
        }

        function loadFloorPlan() {
            const floor = document.getElementById('floor-plan');
            const allTables = getTables();
            const currentTables = allTables.filter(t => t.zoneId === currentZoneId);
            
            floor.innerHTML = '';
            currentTables.forEach(t => {
                const label = t.label || t.id;
                const div = document.createElement('div');
                div.className = 'table-obj';
                div.innerHTML = label;
                div.style.width = t.w + 'px';
                div.style.height = t.h + 'px';
                div.style.top = t.t + 'px';
                div.style.left = t.l + 'px';
                div.style.borderColor = t.color;
                div.style.borderRadius = t.radius || '8px';
                
                // Badge de réservation (Cloud Sync)
                if(isTableReservedToday(label)) {
                    div.innerHTML += `<div class="table-badge">📅</div>`;
                    div.style.borderColor = 'var(--purple)'; 
                }

                // Ouverture du Pad de Commande
                div.onclick = function() { openOrderPad(label); };

                floor.appendChild(div);
            });
        }

        // --- MOTEUR DE PRISE DE COMMANDE (LE PAD) ---
        function openOrderPad(tableName) {
            currentTableId = tableName;
            document.getElementById('order-table-title').textContent = "TABLE " + tableName;
            
            // Simulation : vérifier si la table a déjà un ticket ouvert dans le localStorage
            // Pour l'instant, on affiche vide.
            document.getElementById('ticket-area').innerHTML = `<div style="color:#555; text-align:center; margin-top:20px; font-style:italic;">Table ${tableName} ouverte.<br>Prêt à frapper.</div>`;
            
            openDrawer('order-drawer');
        }

        function sendToKDS() {
            if(!currentTableId) return;
            // C'est ici que la magie du Cloud s'opère vers la cuisine
            alert(`🔥 BONS ENVOYÉS EN CUISINE ET AU BAR\n\n(Les écrans de production vont clignoter)`);
            closeDrawer('order-drawer');
        }

        function payTable() {
            if(!currentTableId) return;
            alert(`💳 Redirection vers l'interface de paiement (Espèces, CB, Partage d'addition)...`);
        }

        // --- MOTEUR DES RÉSERVATIONS SYNCHRONISÉES ---
        document.getElementById('res-date-filter').valueAsDate = new Date();

        function toggleResForm() {
            const form = document.getElementById('res-form');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        function saveReservation() {
            const date = document.getElementById('res-date-filter').value;
            const name = document.getElementById('res-name').value.trim();
            const phone = document.getElementById('res-phone').value.trim();
            const time = document.getElementById('res-time').value;
            const pax = document.getElementById('res-pax').value;
            const table = document.getElementById('res-table').value.trim();

            if(!date || !name || !time || !pax) return alert("Remplir Date, Nom, Heure, Pax.");

            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(!resas[date]) resas[date] = [];
            resas[date].push({ id: Date.now(), name, phone, time, pax, table });
            resas[date].sort((a, b) => a.time.localeCompare(b.time));
            
            // LA SAUVEGARDE DÉCLENCHE LA SYNCHRO VERS LES AUTRES PADS
            localStorage.setItem('empire_reservations', JSON.stringify(resas));
            
            document.getElementById('res-name').value = ''; document.getElementById('res-phone').value = '';
            document.getElementById('res-time').value = ''; document.getElementById('res-pax').value = ''; document.getElementById('res-table').value = '';
            toggleResForm(); renderReservations(); loadFloorPlan();
            
            // Petit feedback visuel de synchro
            const icon = document.querySelector('.sync-icon');
            icon.style.color = "var(--accent)";
            setTimeout(() => icon.style.color = "var(--blue)", 1000);
        }

        function deleteReservation(date, id) {
            if(!confirm("Annuler la réservation ?")) return;
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(resas[date]) {
                resas[date] = resas[date].filter(r => r.id !== id);
                localStorage.setItem('empire_reservations', JSON.stringify(resas));
                renderReservations(); loadFloorPlan();
            }
        }

        function renderReservations() {
            const date = document.getElementById('res-date-filter').value;
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            const container = document.getElementById('res-list-container');
            const dayResas = resas[date] || [];

            if(dayResas.length === 0) {
                container.innerHTML = '<div style="margin-top: 20px; color: #555; text-align: center;">Aucune réservation.</div>';
                return;
            }

            container.innerHTML = dayResas.map(r => `
                <div style="background: #111; border: 1px solid #333; border-left: 4px solid var(--purple); padding: 15px; border-radius: 8px; margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size: 1.1rem; font-weight: 900; color: #fff;">${r.time} - ${r.name}</div>
                        <div style="font-size: 0.85rem; color: #aaa;">👥 ${r.pax} Pax | 📍 <span style="color:var(--accent);">${r.table || 'Libre'}</span></div>
                        ${r.phone ? `<div style="font-size: 0.75rem; color: #666; margin-top:4px;">📞 ${r.phone}</div>` : ''}
                    </div>
                    <button onclick="deleteReservation('${date}', ${r.id})" style="background:none; border:none; color:var(--alert); cursor:pointer; font-size:1.5rem; font-weight:bold;">✕</button>
                </div>
            `).join('');
        }

        // INITIALISATION
        loadZonesUI();
        renderReservations();

    </script>
</body>
</html>
