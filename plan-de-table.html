<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire - Pad Serveur</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --purple: #ea80fc; --blue: #00b0ff; --warning: #ffb300; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: manipulation; }
        
        /* HEADER ÉPURÉ PAD */
        header { border-bottom: 1px solid #333; padding: 10px 20px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { color: var(--accent); font-size: 1.5rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 2px; display: flex; align-items: center; gap: 10px;}
        .sync-icon { color: var(--blue); font-size: 1rem; animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
        
        .header-controls { display: flex; gap: 10px; }
        .btn-top { background: #111; font-weight: 900; border-radius: 6px; padding: 12px 15px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 0.9rem; border: 2px solid transparent; color: #fff; }
        .btn-top:active { transform: scale(0.95); }
        .btn-res { border-color: var(--purple); color: var(--purple); }

        /* TABS (SALLES) */
        .zones-bar { display: flex; border-bottom: 1px solid #222; background: #050505; overflow-x: auto;}
        .zone-tab { padding: 12px 20px; font-size: 1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #555; border-right: 1px solid #222; transition: 0.2s; white-space: nowrap; }
        .zone-tab.active { background: var(--accent); color: #000; }

        /* MAIN AREA */
        .main-workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        .floor-plan { flex: 1; position: relative; background: #050505; overflow: hidden; }

        /* TABLES VERROUILLÉES */
        .table-obj { position: absolute; background: #161616; border: 2px solid #555; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); user-select: none; text-align: center; padding: 5px; box-sizing: border-box; transition: 0.1s;}
        .table-obj:active { transform: scale(0.95); background: #222; border-color: var(--accent); }
        .table-badge { position: absolute; top: -8px; right: -8px; background: var(--purple); color: #000; font-size: 0.7rem; padding: 3px 6px; border-radius: 10px; font-weight: 900; border: 2px solid #000; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}
        .table-badge.active-order { background: var(--accent); right: auto; left: -8px; } /* Badge vert si commande en cours */

        /* TIROIRS COULISSANTS (DROITE) */
        .drawer { position: absolute; top: 0; right: 0; width: 100%; max-width: 500px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 20px; z-index: 9000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -15px 0 50px rgba(0,0,0,0.8); display: flex; flex-direction: column;}
        .drawer.open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 15px; flex-shrink: 0;}
        .drawer-title { margin: 0; font-size: 1.5rem; text-transform: uppercase; font-weight: 900; color: #fff; }
        .btn-close-drawer { background: #222; border: none; color: #fff; font-size: 1.2rem; font-weight: bold; cursor: pointer; padding: 8px 15px; border-radius: 6px; }

        /* INPUTS */
        .input-base { background: #000; border: 1px solid #444; color: #fff; padding: 15px; border-radius: 6px; width: 100%; box-sizing: border-box; font-size: 1.1rem; margin-bottom: 10px; font-weight: bold;}
        .input-base:focus { border-color: var(--purple); outline: none; }
        
        /* =========================================================
           INTERFACE DE COMMANDE (CAISSE)
           ========================================================= */
        .order-layout { display: flex; flex-direction: column; flex: 1; overflow: hidden; }
        
        /* TICKET ZONE */
        .ticket-area { flex: 0 0 40%; background: #000; border: 1px solid #222; border-radius: 8px; margin-bottom: 15px; display: flex; flex-direction: column; overflow: hidden; }
        .ticket-list { flex: 1; overflow-y: auto; padding: 10px; }
        .ticket-item { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 1px dashed #222; font-size: 1.1rem; }
        .ticket-item-name { font-weight: bold; color: #fff; flex: 1; }
        .ticket-item-price { color: var(--accent); font-weight: 900; margin-left: 10px; }
        .btn-del-item { background: none; border: none; color: #555; font-size: 1.2rem; font-weight: bold; cursor: pointer; padding: 0 10px; }
        
        .ticket-total { background: #111; padding: 15px; display: flex; justify-content: space-between; align-items: center; border-top: 2px solid #333; }
        .total-label { font-size: 1.2rem; color: #888; font-weight: 900; text-transform: uppercase; }
        .total-amount { font-size: 2rem; color: #fff; font-weight: 900; }

        /* MENU ZONE (CATÉGORIES & BOUTONS PLATS) */
        .menu-area { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        
        .cat-grid { display: flex; gap: 10px; margin-bottom: 15px; flex-shrink: 0; overflow-x: auto; padding-bottom: 5px; }
        .btn-cat { background: #161616; border: 1px solid #333; color: #fff; padding: 12px 15px; font-weight: 900; text-transform: uppercase; border-radius: 8px; cursor: pointer; font-size: 0.9rem; white-space: nowrap; flex: 1;}
        .btn-cat.active { background: #222; border-color: var(--blue); color: var(--blue); }
        
        .items-grid { flex: 1; overflow-y: auto; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; align-content: start; }
        .btn-item { background: #0a0a0a; border: 1px solid #333; border-left: 4px solid var(--accent); color: #fff; padding: 15px; border-radius: 8px; cursor: pointer; text-align: left; display: flex; flex-direction: column; justify-content: center; transition: 0.1s;}
        .btn-item:active { transform: scale(0.96); background: #111; }
        .item-name { font-weight: 900; font-size: 1rem; margin-bottom: 5px; line-height: 1.2; }
        .item-price { color: var(--sub); font-size: 0.9rem; font-weight: bold; }

        /* ACTIONS D'ENVOI */
        .action-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; flex-shrink: 0; margin-top: 15px;}
        .btn-send { background: var(--accent); color: #000; padding: 15px; font-weight: 900; text-transform: uppercase; border-radius: 8px; cursor: pointer; font-size: 1.1rem; border: none; }
        .btn-pay { background: var(--blue); color: #000; padding: 15px; font-weight: 900; text-transform: uppercase; border-radius: 8px; cursor: pointer; font-size: 1.1rem; border: none; }

    </style>
</head>
<body>

    <header id="main-header">
        <h1 class="header-title">
            SALLE
            <span class="sync-icon" title="Synchronisation Cloud Active">☁️</span>
        </h1>
        <div class="header-controls">
            <button class="btn-top btn-res" onclick="openDrawer('res-drawer')">📅 RÉSERVATIONS</button>
        </div>
    </header>

    <div class="zones-bar" id="zones-bar"></div>

    <div class="main-workspace">
        <div class="floor-plan" id="floor-plan"></div>

        <div id="res-drawer" class="drawer">
            <div class="drawer-header">
                <h2 class="drawer-title" style="color:var(--purple);">RÉSERVATIONS</h2>
                <button class="btn-close-drawer" onclick="closeDrawer('res-drawer')">FERMER</button>
            </div>
            <div style="overflow-y: auto; flex: 1; padding-right: 5px;">
                <input type="date" id="res-date-filter" class="input-base" onchange="renderReservations()" style="border-color:var(--purple);">
                <button class="btn-top" style="width: 100%; background: var(--purple); color: #000; border: none; margin-bottom: 20px; font-size:1.1rem;" onclick="toggleResForm()">+ NOUVELLE RÉSA</button>
                <div id="res-form" style="display:none; background: #111; padding: 15px; border: 1px solid var(--purple); border-radius: 8px; margin-bottom: 20px;">
                    <input type="text" id="res-name" class="input-base" placeholder="Nom du client">
                    <input type="tel" id="res-phone" class="input-base" placeholder="Téléphone">
                    <div style="display: flex; gap: 10px;">
                        <input type="time" id="res-time" class="input-base">
                        <input type="number" id="res-pax" class="input-base" placeholder="Couverts" min="1">
                    </div>
                    <input type="text" id="res-table" class="input-base" placeholder="N° de Table (Optionnel)">
                    <button onclick="saveReservation()" class="btn-top" style="width: 100%; background: var(--accent); color: #000; border: none;">VALIDER & SYNCHRONISER</button>
                </div>
                <div id="res-list-container"></div>
            </div>
        </div>

        <div id="order-drawer" class="drawer" style="border-left-color: var(--accent);">
            <div class="drawer-header">
                <h2 class="drawer-title" id="order-table-title" style="color:var(--accent);">TABLE --</h2>
                <button class="btn-close-drawer" onclick="closeDrawer('order-drawer')">RETOUR</button>
            </div>
            
            <div class="order-layout">
                <div class="ticket-area">
                    <div class="ticket-list" id="ticket-list">
                        </div>
                    <div class="ticket-total">
                        <span class="total-label">Total</span>
                        <span class="total-amount" id="ticket-total-amount">0.00 €</span>
                    </div>
                </div>

                <div class="menu-area">
                    <div class="cat-grid">
                        <button class="btn-cat active" id="btn-cat-Entrée" onclick="loadMenuCategory('Entrée')">ENTRÉES</button>
                        <button class="btn-cat" id="btn-cat-Plat" onclick="loadMenuCategory('Plat')">PLATS</button>
                        <button class="btn-cat" id="btn-cat-Dessert" onclick="loadMenuCategory('Dessert')">DESSERTS</button>
                        <button class="btn-cat" id="btn-cat-Boisson" onclick="loadMenuCategory('Boisson')" style="border-color:var(--blue);">BOISSONS</button>
                    </div>
                    <div class="items-grid" id="items-grid">
                        </div>
                </div>

                <div class="action-grid">
                    <button class="btn-send" onclick="sendToKDS()">🔥 ENVOYER CUISINE</button>
                    <button class="btn-pay" onclick="payTable()">💳 ENCAISSER</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // --- DONNÉES DU RESTAURANT ---
        let currentZoneId = 'z1';
        let currentTableId = null;
        let activeTicket = []; // Le ticket en cours pour la table sélectionnée

        // Initialisation de la synchro inter-onglets
        window.addEventListener('storage', function(e) {
            if (e.key === 'empire_reservations') { renderReservations(); loadFloorPlan(); }
            if (e.key === 'empire_recipes') { if(currentTableId) loadMenuCategory('Entrée'); }
        });

        // --- GESTION DES TIROIRS ---
        function openDrawer(drawerId) {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
            document.getElementById(drawerId).classList.add('open');
        }
        function closeDrawer(drawerId) { document.getElementById(drawerId).classList.remove('open'); }

        // --- MOTEUR DE ZONES ---
        function getZones() {
            let zones = JSON.parse(localStorage.getItem('empire_salle_zones'));
            if(!zones || zones.length === 0) zones = [ { id: 'z1', name: 'RESTAURANT' }, { id: 'z2', name: 'TERRASSE' } ];
            return zones;
        }
        function loadZonesUI() {
            const zones = getZones();
            const bar = document.getElementById('zones-bar');
            if(!zones.find(z => z.id === currentZoneId)) currentZoneId = zones[0].id;
            bar.innerHTML = zones.map(z => `<div class="zone-tab ${z.id === currentZoneId ? 'active' : ''}" onclick="switchZone('${z.id}')">${z.name}</div>`).join('');
            loadFloorPlan();
        }
        function switchZone(id) { currentZoneId = id; loadZonesUI(); }

        // --- MOTEUR DU PLAN DE TABLE ---
        function getTables() {
            let tables = JSON.parse(localStorage.getItem('empire_salle_tables'));
            if(!tables || tables.length === 0) {
                tables = [
                    { id: 'T1', zoneId: 'z1', label: 'T1', w: 80, h: 80, t: 100, l: 50, color: '#555', radius: '8px' },
                    { id: 'T2', zoneId: 'z1', label: 'T2', w: 80, h: 80, t: 100, l: 150, color: '#555', radius: '8px' }
                ];
            }
            return tables;
        }

        function isTableReservedToday(tableLabel) {
            const today = new Date().toISOString().split('T')[0];
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            return (resas[today] || []).some(r => r.table === tableLabel);
        }

        function hasActiveOrder(tableLabel) {
            const ticket = JSON.parse(localStorage.getItem('empire_order_' + tableLabel)) || [];
            return ticket.length > 0;
        }

        function loadFloorPlan() {
            const floor = document.getElementById('floor-plan');
            const allTables = getTables();
            const currentTables = allTables.filter(t => t.zoneId === currentZoneId);
            
            floor.innerHTML = '';
            currentTables.forEach(t => {
                const label = t.label || t.id;
                const div = document.createElement('div');
                div.className = 'table-obj';
                div.innerHTML = label;
                div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                div.style.top = t.t + 'px'; div.style.left = t.l + 'px';
                div.style.borderColor = t.color; div.style.borderRadius = t.radius || '8px';
                
                // Badges d'information visuelle
                if(isTableReservedToday(label)) {
                    div.innerHTML += `<div class="table-badge">📅</div>`;
                }
                if(hasActiveOrder(label)) {
                    // La table a un ticket en cours, on la colore et on met un indicateur
                    div.style.borderColor = 'var(--accent)';
                    div.innerHTML += `<div class="table-badge active-order">🍽️</div>`;
                }

                div.onclick = function() { openOrderPad(label); };
                floor.appendChild(div);
            });
        }

        // =========================================================
        // MOTEUR DE CAISSE (PASSERELLE MENU & TICKET)
        // =========================================================

        function openOrderPad(tableName) {
            currentTableId = tableName;
            document.getElementById('order-table-title').textContent = "TABLE " + tableName;
            
            // Charger la mémoire de la table
            activeTicket = JSON.parse(localStorage.getItem('empire_order_' + tableName)) || [];
            renderTicket();
            
            // Charger les plats (Entrées par défaut)
            loadMenuCategory('Entrée');
            
            openDrawer('order-drawer');
        }

        // 1. LIRE LE MENU DU CHEF
        function getChefMenu() {
            let menu = JSON.parse(localStorage.getItem('empire_recipes'));
            // Si le chef n'a pas encore créé de plats, on injecte un menu de démo pour que le serveur puisse travailler
            if(!menu || menu.length === 0) {
                menu = [
                    { id: 1, name: 'Œuf Mayo Truffé', category: 'Entrée', price: 9.00 },
                    { id: 2, name: 'Tartare de Bœuf', category: 'Entrée', price: 14.00 },
                    { id: 3, name: 'Bavette d\'Aloyau', category: 'Plat', price: 24.00 },
                    { id: 4, name: 'Filet de Bar Rôti', category: 'Plat', price: 26.00 },
                    { id: 5, name: 'Mousse au Chocolat', category: 'Dessert', price: 8.00 },
                    { id: 6, name: 'Café Gourmand', category: 'Dessert', price: 10.00 },
                    { id: 7, name: 'Coca-Cola 33cl', category: 'Boisson', price: 4.50 },
                    { id: 8, name: 'Verre de Chablis', category: 'Boisson', price: 7.00 }
                ];
            }
            return menu;
        }

        function loadMenuCategory(categoryName) {
            // Gérer les boutons actifs
            document.querySelectorAll('.btn-cat').forEach(b => b.classList.remove('active'));
            document.getElementById('btn-cat-' + categoryName).classList.add('active');

            const menu = getChefMenu();
            const filteredItems = menu.filter(item => item.category === categoryName);
            
            const grid = document.getElementById('items-grid');
            
            if(filteredItems.length === 0) {
                grid.innerHTML = `<div style="color:#555; grid-column: 1/-1; padding:20px; text-align:center;">Aucun article dans cette catégorie. (À configurer par le Chef)</div>`;
                return;
            }

            // Générer les boutons d'articles
            grid.innerHTML = filteredItems.map(item => {
                // S'assurer que le prix est un nombre exploitable
                const price = parseFloat(item.price || item.sellingPrice || 0).toFixed(2);
                const borderColor = categoryName === 'Boisson' ? 'var(--blue)' : 'var(--accent)';
                return `
                <button class="btn-item" style="border-left-color: ${borderColor};" onclick="addItemToTicket('${item.name.replace(/'/g, "\\'")}', ${price})">
                    <div class="item-name">${item.name}</div>
                    <div class="item-price">${price} €</div>
                </button>
                `;
            }).join('');
        }

        // 2. GESTION DU TICKET
        function addItemToTicket(name, price) {
            activeTicket.push({ id: Date.now(), name: name, price: parseFloat(price) });
            saveTicket();
            renderTicket();
        }

        function removeItemFromTicket(id) {
            activeTicket = activeTicket.filter(item => item.id !== id);
            saveTicket();
            renderTicket();
        }

        function saveTicket() {
            localStorage.setItem('empire_order_' + currentTableId, JSON.stringify(activeTicket));
            loadFloorPlan(); // Rafraîchit le plan pour afficher ou enlever le badge 🍽️
        }

        function renderTicket() {
            const list = document.getElementById('ticket-list');
            let total = 0;

            if(activeTicket.length === 0) {
                list.innerHTML = `<div style="color:#555; text-align:center; margin-top:40px; font-style:italic;">Ticket vide. Frappez un article.</div>`;
                document.getElementById('ticket-total-amount').textContent = "0.00 €";
                return;
            }

            list.innerHTML = activeTicket.map(item => {
                total += item.price;
                return `
                <div class="ticket-item">
                    <button class="btn-del-item" onclick="removeItemFromTicket(${item.id})">✕</button>
                    <div class="ticket-item-name">1x ${item.name}</div>
                    <div class="ticket-item-price">${item.price.toFixed(2)} €</div>
                </div>
                `;
            }).join('');

            document.getElementById('ticket-total-amount').textContent = total.toFixed(2) + " €";
        }

        // 3. ACTIONS DE FIN
        function sendToKDS() {
            if(activeTicket.length === 0) return alert("Le ticket est vide.");
            
            // Simuler l'envoi au KDS (Cuisine/Bar)
            alert(`🔥 BONS ENVOYÉS EN CUISINE ET AU BAR\n\n(Les écrans de production de l'Empire ont reçu la commande de la table ${currentTableId})`);
            
            // On ferme le tiroir, la table reste "Ouverte" (Badge 🍽️) car on n'a pas encore encaissé
            closeDrawer('order-drawer');
        }

        function payTable() {
            if(activeTicket.length === 0) return alert("Le ticket est vide.");
            
            if(confirm(`💰 Encaisser la table ${currentTableId} ?\nTotal : ${document.getElementById('ticket-total-amount').textContent}\n\nCela clôturera la table et videra le ticket.`)) {
                // L'encaissement vide la table
                activeTicket = [];
                saveTicket();
                renderTicket();
                closeDrawer('order-drawer');
                alert("✅ Table encaissée avec succès.");
            }
        }

        // --- MOTEUR DES RÉSERVATIONS (Reste inchangé) ---
        document.getElementById('res-date-filter').valueAsDate = new Date();
        function toggleResForm() { const form = document.getElementById('res-form'); form.style.display = form.style.display === 'none' ? 'block' : 'none'; }
        
        function saveReservation() {
            const date = document.getElementById('res-date-filter').value;
            const name = document.getElementById('res-name').value.trim();
            const phone = document.getElementById('res-phone').value.trim();
            const time = document.getElementById('res-time').value;
            const pax = document.getElementById('res-pax').value;
            const table = document.getElementById('res-table').value.trim();
            if(!date || !name || !time || !pax) return alert("Remplir Date, Nom, Heure, Pax.");
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(!resas[date]) resas[date] = [];
            resas[date].push({ id: Date.now(), name, phone, time, pax, table });
            resas[date].sort((a, b) => a.time.localeCompare(b.time));
            localStorage.setItem('empire_reservations', JSON.stringify(resas));
            document.getElementById('res-name').value = ''; document.getElementById('res-phone').value = '';
            document.getElementById('res-time').value = ''; document.getElementById('res-pax').value = ''; document.getElementById('res-table').value = '';
            toggleResForm(); renderReservations(); loadFloorPlan();
            const icon = document.querySelector('.sync-icon'); icon.style.color = "var(--accent)"; setTimeout(() => icon.style.color = "var(--blue)", 1000);
        }

        function deleteReservation(date, id) {
            if(!confirm("Annuler la réservation ?")) return;
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(resas[date]) {
                resas[date] = resas[date].filter(r => r.id !== id);
                localStorage.setItem('empire_reservations', JSON.stringify(resas));
                renderReservations(); loadFloorPlan();
            }
        }

        function renderReservations() {
            const date = document.getElementById('res-date-filter').value;
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            const container = document.getElementById('res-list-container');
            const dayResas = resas[date] || [];
            if(dayResas.length === 0) { container.innerHTML = '<div style="margin-top: 20px; color: #555; text-align: center;">Aucune réservation.</div>'; return; }
            container.innerHTML = dayResas.map(r => `
                <div style="background: #111; border: 1px solid #333; border-left: 4px solid var(--purple); padding: 15px; border-radius: 8px; margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size: 1.1rem; font-weight: 900; color: #fff;">${r.time} - ${r.name}</div>
                        <div style="font-size: 0.85rem; color: #aaa;">👥 ${r.pax} Pax | 📍 <span style="color:var(--accent);">${r.table || 'Libre'}</span></div>
                        ${r.phone ? `<div style="font-size: 0.75rem; color: #666; margin-top:4px;">📞 ${r.phone}</div>` : ''}
                    </div>
                    <button onclick="deleteReservation('${date}', ${r.id})" style="background:none; border:none; color:var(--alert); cursor:pointer; font-size:1.5rem; font-weight:bold;">✕</button>
                </div>
            `).join('');
        }

        // INITIALISATION
        loadZonesUI();
        renderReservations();

    </script>
</body>
</html>
