<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Tableau de Salle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --purple: #ea80fc; --blue: #00b0ff; --warning: #ffb300; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: none;}
        
        /* HEADER ÉPURÉ */
        header { border-bottom: 1px solid #333; padding: 15px 25px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { color: var(--accent); font-size: 1.8rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(0, 230, 118, 0.2); }
        
        .header-controls { display: flex; gap: 15px; }
        .btn-top { background: #111; font-weight: 900; border-radius: 6px; padding: 12px 20px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 1rem; border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.5); color: #fff; }
        .btn-top:active { transform: scale(0.95); }
        
        .btn-res { border-color: var(--purple); color: var(--purple); }
        .btn-res:hover { background: rgba(234, 128, 252, 0.1); }

        /* TABS (SALLES) DYNAMIQUE */
        .zones-bar { display: flex; border-bottom: 1px solid #222; background: #050505; overflow-x: auto;}
        .zone-tab { padding: 15px 30px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #555; border-right: 1px solid #222; transition: 0.2s; white-space: nowrap; }
        .zone-tab.active { background: var(--accent); color: #000; }

        /* RADAR WOOCOMMERCE & MAIN AREA */
        .main-workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .radar-panel { width: 280px; background: #0a0a0a; border-right: 1px solid #222; padding: 15px; display: flex; flex-direction: column; }
        .radar-title { color: var(--blue); font-size: 0.9rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .radar-list { flex: 1; overflow-y: auto; }
        
        .floor-plan { flex: 1; position: relative; background: #050505; overflow: hidden; }

        /* TIROIR COULISSANT RÉSERVATIONS */
        .drawer { position: absolute; top: 0; right: 0; width: 500px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 30px; z-index: 9000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -15px 0 50px rgba(0,0,0,0.8); }
        .drawer.open { transform: translateX(0); }
        .btn-close-drawer { position: absolute; top: 20px; left: 20px; background: transparent; border: none; color: #aaa; font-size: 2rem; font-weight: bold; cursor: pointer; transition: 0.2s; z-index: 10; line-height: 1; }
        .btn-close-drawer:hover { color: var(--alert); transform: scale(1.1); }

        /* TABLES VERROUILLÉES POUR SERVICE */
        .table-obj { position: absolute; background: #161616; border: 2px solid #555; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); user-select: none; text-align: center; word-break: break-word; padding: 5px; box-sizing: border-box; transition: 0.1s;}
        .table-obj:active { transform: scale(0.95); background: #222; }

    </style>
</head>
<body>

    <header id="main-header">
        <h1 class="header-title">TABLEAU DU SERVICE</h1>
        <div class="header-controls">
            <button class="btn-top btn-res" onclick="openDrawer('res-drawer')">📅 CAHIER RÉSERVATIONS</button>
        </div>
    </header>

    <div class="zones-bar" id="zones-bar">
        </div>

    <div class="main-workspace">
        
        <div class="floor-plan" id="floor-plan"></div>

        <div class="radar-panel">
            <div class="radar-title">🌐 RADAR WOOCOMMERCE</div>
            <div class="radar-list">
                <div style="color:#555; text-align:center; font-size:0.8rem; margin-top:20px; font-style:italic;">En attente de commandes web...</div>
            </div>
        </div>

        <div id="res-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('res-drawer')">✕</button>
            <h2 style="color:var(--purple); margin: 30px 0 20px 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px;">📅 CAHIER DE RÉSERVATIONS</h2>
            
            <div style="background: #161616; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <input type="date" id="res-date-filter" class="btn-top" style="width: 100%; box-sizing: border-box; margin-bottom: 15px; border-color: #444; background: #000; color: #fff;" onchange="renderReservations()">
                <button class="btn-top" style="width: 100%; background: var(--purple); color: #000; border: none;" onclick="toggleResForm()">+ NOUVELLE RÉSERVATION</button>
            </div>
            
            <div id="res-form" style="display:none; background: #0a0a0a; padding: 20px; border: 1px solid var(--purple); border-radius: 8px; margin-bottom: 20px;">
                <input type="text" id="res-name" class="btn-top" placeholder="Nom du client" style="width:100%; margin-bottom:10px; background:#000; border-color:#444; color:#fff;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="time" id="res-time" class="btn-top" style="width:100%; background:#000; border-color:#444; color:#fff;">
                    <input type="number" id="res-pax" class="btn-top" placeholder="Couverts (Pax)" min="1" style="width:100%; background:#000; border-color:#444; color:#fff;">
                </div>
                <input type="text" id="res-table" class="btn-top" placeholder="N° de Table" style="width:100%; margin-bottom: 15px; background:#000; border-color:#444; color:#fff;">
                <button onclick="saveReservation()" class="btn-top" style="width: 100%; background: var(--accent); color: #000; border: none;">VALIDER LA RÉSERVATION</button>
            </div>
            
            <div id="res-list-container"></div>
        </div>

    </div>

    <script>
        // --- GESTION DU TIROIR RÉSERVATIONS ---
        function openDrawer(drawerId) {
            document.getElementById(drawerId).classList.add('open');
        }

        function closeDrawer(drawerId) {
            document.getElementById(drawerId).classList.remove('open');
            document.getElementById('res-form').style.display = 'none';
        }

        // --- MOTEUR DE ZONES (SALLES) ---
        let currentZoneId = 'z1';
        
        function getZones() {
            let zones = JSON.parse(localStorage.getItem('empire_salle_zones'));
            if(!zones || zones.length === 0) {
                // Si aucune configuration architecturale n'existe, on met des salles par défaut
                zones = [
                    { id: 'z1', name: 'RESTAURANT' },
                    { id: 'z2', name: 'TERRASSE' },
                    { id: 'z3', name: 'BAR LOUNGE' }
                ];
            }
            return zones;
        }

        function loadZonesUI() {
            const zones = getZones();
            const bar = document.getElementById('zones-bar');
            
            if(!zones.find(z => z.id === currentZoneId)) currentZoneId = zones[0].id;

            bar.innerHTML = zones.map(z => 
                `<div class="zone-tab ${z.id === currentZoneId ? 'active' : ''}" onclick="switchZone('${z.id}')">${z.name}</div>`
            ).join('');
            
            loadFloorPlan();
        }

        function switchZone(id) {
            currentZoneId = id;
            loadZonesUI();
        }

        // --- MOTEUR DU PLAN DE TABLE (LECTURE SEULE POUR LE SERVICE) ---
        function getTables() {
            let tables = JSON.parse(localStorage.getItem('empire_salle_tables'));
            if(!tables || tables.length === 0) {
                tables = [
                    { id: 'T1', zoneId: 'z1', label: 'T1', w: 80, h: 80, t: 100, l: 150, color: 'var(--accent)', radius: '8px' },
                    { id: 'T2', zoneId: 'z1', label: 'T2', w: 120, h: 80, t: 100, l: 300, color: '#555', radius: '8px' }
                ];
            }
            return tables;
        }

        function loadFloorPlan() {
            const floor = document.getElementById('floor-plan');
            const allTables = getTables();
            const currentTables = allTables.filter(t => t.zoneId === currentZoneId);
            
            floor.innerHTML = '';
            currentTables.forEach(t => {
                const div = document.createElement('div');
                div.className = 'table-obj';
                div.id = 'table-' + t.id;
                div.innerHTML = t.label || t.id;
                div.style.width = t.w + 'px';
                div.style.height = t.h + 'px';
                div.style.top = t.t + 'px';
                div.style.left = t.l + 'px';
                div.style.borderColor = t.color;
                div.style.borderRadius = t.radius || '8px';
                
                // LE CLIC OUVRE LA PRISE DE COMMANDE / ENCAISSEMENT
                div.onclick = function() {
                    takeOrderOrPay(t.label || t.id);
                };

                floor.appendChild(div);
            });
        }

        function takeOrderOrPay(tableName) {
            // C'est ici que tu brancheras ton module de caisse / prise de commande
            alert("🍽️ Ouverture du ticket pour la table : " + tableName + "\n\n(Interface de prise de commande / encaissement à venir)");
        }

        // --- MOTEUR DES RÉSERVATIONS ---
        document.getElementById('res-date-filter').valueAsDate = new Date();

        function toggleResForm() {
            const form = document.getElementById('res-form');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        function saveReservation() {
            const date = document.getElementById('res-date-filter').value;
            const name = document.getElementById('res-name').value.trim();
            const time = document.getElementById('res-time').value;
            const pax = document.getElementById('res-pax').value;
            const table = document.getElementById('res-table').value.trim();

            if(!date || !name || !time || !pax) return alert("Veuillez remplir Date, Nom, Heure et Couverts.");

            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(!resas[date]) resas[date] = [];
            resas[date].push({ id: Date.now(), name, time, pax, table });
            resas[date].sort((a, b) => a.time.localeCompare(b.time));
            localStorage.setItem('empire_reservations', JSON.stringify(resas));
            
            document.getElementById('res-name').value = ''; document.getElementById('res-time').value = '';
            document.getElementById('res-pax').value = ''; document.getElementById('res-table').value = '';
            toggleResForm(); renderReservations();
        }

        function deleteReservation(date, id) {
            if(!confirm("Annuler la réservation ?")) return;
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(resas[date]) {
                resas[date] = resas[date].filter(r => r.id !== id);
                localStorage.setItem('empire_reservations', JSON.stringify(resas));
                renderReservations();
            }
        }

        function renderReservations() {
            const date = document.getElementById('res-date-filter').value;
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            const container = document.getElementById('res-list-container');
            const dayResas = resas[date] || [];

            if(dayResas.length === 0) {
                container.innerHTML = '<div style="margin-top: 20px; color: #555; text-align: center;">Aucune réservation pour cette date.</div>';
                return;
            }

            container.innerHTML = dayResas.map(r => `
                <div style="background: #111; border: 1px solid #333; border-left: 4px solid var(--purple); padding: 15px; border-radius: 8px; margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size: 1.1rem; font-weight: 900; color: #fff;">${r.time} - ${r.name}</div>
                        <div style="font-size: 0.85rem; color: #aaa;">👥 ${r.pax} Pax | 📍 Table: <span style="color:var(--accent); font-weight:bold;">${r.table || 'Non assignée'}</span></div>
                    </div>
                    <button onclick="deleteReservation('${date}', ${r.id})" style="background:none; border:none; color:var(--alert); cursor:pointer; font-size:1.2rem; transition:0.2s;">✕</button>
                </div>
            `).join('');
        }

        // INITIALISATION AU DÉMARRAGE
        loadZonesUI();
        renderReservations();

    </script>
</body>
</html>
