<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Tableau de Salle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --purple: #ea80fc; --blue: #00b0ff; --warning: #ffb300; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: none;}
        
        /* HEADER ÉPURÉ */
        header { border-bottom: 1px solid #333; padding: 15px 25px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
        .header-title { color: var(--accent); font-size: 1.8rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(0, 230, 118, 0.2); }
        
        .header-controls { display: flex; gap: 15px; }
        .btn-top { background: #111; font-weight: 900; border-radius: 6px; padding: 12px 20px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 1rem; border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.5); color: #fff; }
        .btn-top:active { transform: scale(0.95); }
        
        .btn-res { border-color: var(--purple); color: var(--purple); }
        .btn-res:hover { background: rgba(234, 128, 252, 0.1); }

        /* TABS (SALLES) DYNAMIQUE */
        .zones-bar { display: flex; border-bottom: 1px solid #222; background: #050505; overflow-x: auto;}
        .zone-tab { padding: 15px 30px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #555; border-right: 1px solid #222; transition: 0.2s; white-space: nowrap; }
        .zone-tab.active { background: var(--accent); color: #000; }

        /* RADAR WOOCOMMERCE & MAIN AREA */
        .main-workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .radar-panel { width: 280px; background: #0a0a0a; border-right: 1px solid #222; padding: 15px; display: flex; flex-direction: column; }
        .radar-title { color: var(--blue); font-size: 0.9rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .radar-list { flex: 1; overflow-y: auto; }
        
        .floor-plan { flex: 1; position: relative; background: #050505; overflow: hidden; }

        /* TIROIR COULISSANT */
        .drawer { position: absolute; top: 0; right: 0; width: 500px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 30px; z-index: 9000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -15px 0 50px rgba(0,0,0,0.8); }
        .drawer.open { transform: translateX(0); }
        .btn-close-drawer { position: absolute; top: 20px; left: 20px; background: transparent; border: none; color: #aaa; font-size: 2rem; font-weight: bold; cursor: pointer; transition: 0.2s; z-index: 10; line-height: 1; }
        .btn-close-drawer:hover { color: var(--alert); transform: scale(1.1); }

        /* TABLES VERROUILLÉES POUR SERVICE */
        .table-obj { position: absolute; background: #161616; border: 2px solid #555; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 900; font-size: 1.2rem; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); user-select: none; text-align: center; word-break: break-word; padding: 5px; box-sizing: border-box; transition: 0.1s;}
        .table-obj:active { transform: scale(0.95); background: #222; }
        
        .table-badge { position: absolute; top: -8px; right: -8px; background: var(--purple); color: #000; font-size: 0.7rem; padding: 3px 6px; border-radius: 10px; font-weight: 900; border: 2px solid #000; box-shadow: 0 2px 5px rgba(0,0,0,0.5);}

        /* INPUTS */
        .input-base { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-family: 'Inter', sans-serif; font-size: 1rem; margin-bottom: 10px;}
        .input-base:focus { border-color: var(--purple); outline: none; }
        
        .btn-action-large { width: 100%; padding: 20px; border-radius: 8px; font-size: 1.2rem; font-weight: 900; text-transform: uppercase; cursor: pointer; transition: 0.2s; border: none; margin-bottom: 20px; }
        .btn-action-large:active { transform: scale(0.98); }

    </style>
</head>
<body>

    <header id="main-header">
        <h1 class="header-title">TABLEAU DU SERVICE</h1>
        <div class="header-controls">
            <button class="btn-top btn-res" onclick="openDrawer('res-drawer')">📅 CAHIER GÉNÉRAL</button>
        </div>
    </header>

    <div class="zones-bar" id="zones-bar">
        </div>

    <div class="main-workspace">
        
        <div class="floor-plan" id="floor-plan"></div>

        <div class="radar-panel">
            <div class="radar-title">🌐 RADAR WOOCOMMERCE</div>
            <div class="radar-list">
                <div style="color:#555; text-align:center; font-size:0.8rem; margin-top:20px; font-style:italic;">En attente de commandes web...</div>
            </div>
        </div>

        <div id="res-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('res-drawer')">✕</button>
            <h2 style="color:var(--purple); margin: 30px 0 20px 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px;">📅 CAHIER GÉNÉRAL</h2>
            
            <div style="background: #161616; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <input type="date" id="res-date-filter" class="input-base" onchange="renderGlobalReservations()">
            </div>
            
            <div id="res-global-list-container"></div>
        </div>

        <div id="table-action-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('table-action-drawer')">✕</button>
            
            <h2 id="ta-title" style="color:#fff; margin: 30px 0 5px 0; font-size: 2.2rem; text-transform: uppercase; letter-spacing: 2px;">TABLE X</h2>
            <div style="color:var(--sub); font-size: 0.9rem; margin-bottom: 30px; font-weight: bold;">GESTION DU POINT DE VENTE</div>
            
            <button class="btn-action-large" style="background: var(--accent); color: #000;" onclick="takeOrder()">
                🍽️ OUVRIR LA TABLE <span style="font-size:0.8rem; display:block; font-weight:bold; color:#111;">(Prendre une commande)</span>
            </button>

            <hr style="border:none; border-top: 1px solid #333; margin: 30px 0;">

            <h3 style="color:var(--purple); font-size: 1.2rem; text-transform: uppercase; margin-bottom: 15px;">📅 RÉSERVER CETTE TABLE</h3>
            
            <div style="background: #111; padding: 20px; border: 1px solid #222; border-radius: 8px; margin-bottom: 20px;">
                <input type="text" id="ta-res-name" class="input-base" placeholder="Nom du client">
                <input type="tel" id="ta-res-phone" class="input-base" placeholder="Téléphone (Optionnel)">
                <div style="display: flex; gap: 10px;">
                    <input type="date" id="ta-res-date" class="input-base">
                    <input type="time" id="ta-res-time" class="input-base">
                </div>
                <input type="number" id="ta-res-pax" class="input-base" placeholder="Nombre de couverts (Pax)" min="1">
                
                <button onclick="saveTableReservation()" class="btn-top" style="width: 100%; background: var(--purple); color: #000; border: none; margin-top:10px;">VALIDER LA RÉSERVATION</button>
            </div>

            <h3 style="color:#888; font-size: 1rem; text-transform: uppercase; margin-bottom: 10px;">📌 PRÉVUS AUJOURD'HUI SUR CETTE TABLE</h3>
            <div id="ta-res-today-list"></div>

        </div>

    </div>

    <script>
        let currentZoneId = 'z1';
        let currentActiveTableLabel = '';

        // --- GESTION DES TIROIRS ---
        function openDrawer(drawerId) {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
            document.getElementById(drawerId).classList.add('open');
        }

        function closeDrawer(drawerId) {
            document.getElementById(drawerId).classList.remove('open');
        }

        // --- MOTEUR DE ZONES ---
        function getZones() {
            let zones = JSON.parse(localStorage.getItem('empire_salle_zones'));
            if(!zones || zones.length === 0) {
                zones = [
                    { id: 'z1', name: 'RESTAURANT' },
                    { id: 'z2', name: 'TERRASSE' },
                    { id: 'z3', name: 'BAR LOUNGE' }
                ];
            }
            return zones;
        }

        function loadZonesUI() {
            const zones = getZones();
            const bar = document.getElementById('zones-bar');
            if(!zones.find(z => z.id === currentZoneId)) currentZoneId = zones[0].id;

            bar.innerHTML = zones.map(z => 
                `<div class="zone-tab ${z.id === currentZoneId ? 'active' : ''}" onclick="switchZone('${z.id}')">${z.name}</div>`
            ).join('');
            
            loadFloorPlan();
        }

        function switchZone(id) {
            currentZoneId = id;
            loadZonesUI();
        }

        // --- MOTEUR DU PLAN DE TABLE ---
        function getTables() {
            let tables = JSON.parse(localStorage.getItem('empire_salle_tables'));
            if(!tables || tables.length === 0) {
                tables = [
                    { id: 'T1', zoneId: 'z1', label: 'T1', w: 80, h: 80, t: 100, l: 150, color: 'var(--accent)', radius: '8px' },
                    { id: 'T2', zoneId: 'z1', label: 'T2', w: 120, h: 80, t: 100, l: 300, color: '#555', radius: '8px' }
                ];
            }
            return tables;
        }

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
        }

        function isTableReservedToday(tableLabel) {
            const today = getTodayString();
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            const dayResas = resas[today] || [];
            // Cherche si au moins une réservation correspond à cette table aujourd'hui
            return dayResas.some(r => r.table === tableLabel);
        }

        function loadFloorPlan() {
            const floor = document.getElementById('floor-plan');
            const allTables = getTables();
            const currentTables = allTables.filter(t => t.zoneId === currentZoneId);
            
            floor.innerHTML = '';
            currentTables.forEach(t => {
                const label = t.label || t.id;
                const div = document.createElement('div');
                div.className = 'table-obj';
                div.id = 'table-' + t.id;
                div.innerHTML = label;
                div.style.width = t.w + 'px';
                div.style.height = t.h + 'px';
                div.style.top = t.t + 'px';
                div.style.left = t.l + 'px';
                div.style.borderColor = t.color;
                div.style.borderRadius = t.radius || '8px';
                
                // Si réservé aujourd'hui, on ajoute le badge 📅
                if(isTableReservedToday(label)) {
                    div.innerHTML += `<div class="table-badge">📅</div>`;
                    div.style.borderColor = 'var(--purple)'; // Highlight
                }

                // Clic sur la table = Ouvre le panneau de la table
                div.onclick = function() {
                    openTableActionDrawer(label);
                };

                floor.appendChild(div);
            });
        }

        // --- GESTION DU TIROIR DE LA TABLE (ACTION & RÉSA) ---
        function openTableActionDrawer(tableLabel) {
            currentActiveTableLabel = tableLabel;
            
            // Mise à jour de l'UI du tiroir
            document.getElementById('ta-title').textContent = "TABLE " + tableLabel;
            
            // Pré-remplir la date du jour par défaut
            document.getElementById('ta-res-date').value = getTodayString();
            document.getElementById('ta-res-name').value = '';
            document.getElementById('ta-res-phone').value = '';
            document.getElementById('ta-res-time').value = '20:00';
            document.getElementById('ta-res-pax').value = '';

            renderTableSpecificReservations();
            openDrawer('table-action-drawer');
        }

        function takeOrder() {
            alert(`🍽️ Redirection vers le module de Prise de Commande pour la table ${currentActiveTableLabel}... \n\n(L'interface POS va s'ouvrir ici)`);
            // Ici le code pour basculer sur l'écran des menus/articles
        }

        // Enregistrer une réservation depuis la table spécifique
        function saveTableReservation() {
            const date = document.getElementById('ta-res-date').value;
            const name = document.getElementById('ta-res-name').value.trim();
            const phone = document.getElementById('ta-res-phone').value.trim();
            const time = document.getElementById('ta-res-time').value;
            const pax = document.getElementById('ta-res-pax').value;
            const table = currentActiveTableLabel; // Assigne automatiquement la table cliquée

            if(!date || !name || !time || !pax) return alert("Veuillez remplir Date, Nom, Heure et Couverts.");

            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(!resas[date]) resas[date] = [];
            
            resas[date].push({ id: Date.now(), name, phone, time, pax, table });
            resas[date].sort((a, b) => a.time.localeCompare(b.time)); // Tri chronologique
            
            localStorage.setItem('empire_reservations', JSON.stringify(resas));
            
            renderTableSpecificReservations(); // Met à jour la liste dans le tiroir
            loadFloorPlan(); // Met à jour le plan de salle (pour afficher le badge 📅)
            
            // Reset formulaire
            document.getElementById('ta-res-name').value = '';
            document.getElementById('ta-res-phone').value = '';
            document.getElementById('ta-res-pax').value = '';
            
            alert(`✅ Réservation confirmée pour ${name} sur la table ${table}.`);
        }

        // Afficher les réservations d'aujourd'hui uniquement pour CETTE table
        function renderTableSpecificReservations() {
            const today = getTodayString();
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            const dayResas = resas[today] || [];
            
            // Filtre : uniquement la table sélectionnée
            const tableResas = dayResas.filter(r => r.table === currentActiveTableLabel);
            const container = document.getElementById('ta-res-today-list');

            if(tableResas.length === 0) {
                container.innerHTML = '<div style="color: #555; font-style:italic;">Table libre de toute réservation aujourd\'hui.</div>';
                return;
            }

            container.innerHTML = tableResas.map(r => `
                <div style="background: #1a1a1a; border-left: 4px solid var(--purple); padding: 10px; border-radius: 4px; margin-bottom: 8px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size: 1rem; font-weight: 900; color: #fff;">${r.time} - ${r.name}</div>
                        <div style="font-size: 0.8rem; color: #aaa;">👥 ${r.pax} Pax ${r.phone ? '📞 '+r.phone : ''}</div>
                    </div>
                    <button onclick="deleteReservation('${today}', ${r.id}, true)" style="background:none; border:none; color:var(--alert); cursor:pointer; font-weight:bold;">✕</button>
                </div>
            `).join('');
        }

        // --- CAHIER GÉNÉRAL DES RÉSERVATIONS ---
        document.getElementById('res-date-filter').valueAsDate = new Date();

        function deleteReservation(date, id, isFromTableDrawer = false) {
            if(!confirm("Annuler définitivement cette réservation ?")) return;
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(resas[date]) {
                resas[date] = resas[date].filter(r => r.id !== id);
                localStorage.setItem('empire_reservations', JSON.stringify(resas));
                
                if(isFromTableDrawer) {
                    renderTableSpecificReservations();
                } else {
                    renderGlobalReservations();
                }
                loadFloorPlan(); // Met à jour les badges du plan de table
            }
        }

        function renderGlobalReservations() {
            const date = document.getElementById('res-date-filter').value;
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            const container = document.getElementById('res-global-list-container');
            const dayResas = resas[date] || [];

            if(dayResas.length === 0) {
                container.innerHTML = '<div style="margin-top: 20px; color: #555; text-align: center;">Aucune réservation pour cette date.</div>';
                return;
            }

            container.innerHTML = dayResas.map(r => `
                <div style="background: #111; border: 1px solid #333; border-left: 4px solid var(--purple); padding: 15px; border-radius: 8px; margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size: 1.1rem; font-weight: 900; color: #fff;">${r.time} - ${r.name}</div>
                        <div style="font-size: 0.85rem; color: #aaa;">👥 ${r.pax} Pax | 📍 Table: <span style="color:var(--accent); font-weight:bold;">${r.table || 'Non assignée'}</span></div>
                        ${r.phone ? `<div style="font-size: 0.75rem; color: #666; margin-top:4px;">📞 ${r.phone}</div>` : ''}
                    </div>
                    <button onclick="deleteReservation('${date}', ${r.id})" style="background:none; border:none; color:var(--alert); cursor:pointer; font-size:1.2rem; transition:0.2s;">✕</button>
                </div>
            `).join('');
        }

        // INITIALISATION AU DÉMARRAGE
        loadZonesUI();
        renderGlobalReservations();

    </script>
</body>
</html>
