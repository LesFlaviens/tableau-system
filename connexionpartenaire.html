<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCHEF - Connexion Partenaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #0A0A0A;
            --border: rgba(255, 255, 255, 0.1);
            --border-focus: rgba(212, 175, 55, 0.5);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --gold: #D4AF37;
            --alert: #ef4444;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            -webkit-font-smoothing: antialiased;
        }

        .login-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 50px 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            text-align: center;
            box-sizing: border-box;
        }

        .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 2px; margin: 0 0 5px 0; color: var(--text-main); }
        .logo span { color: var(--gold); }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        .input-field {
            width: 100%; padding: 16px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text-main); border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: 0.3s; font-family: inherit;
        }
        .input-field:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 1px var(--border-focus);}
        .input-field::placeholder { color: #475569; text-transform: none; }

        .btn-submit {
            background: var(--text-main); color: var(--bg); border: none; width: 100%; padding: 16px;
            border-radius: 8px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; margin-top: 10px; letter-spacing: 1px;
        }
        .btn-submit:hover { background: var(--gold); }

        .error-msg {
            color: var(--alert); font-size: 0.85rem; margin-top: 15px; font-weight: 600;
            display: none; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; border: 1px solid var(--alert);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1 class="logo"><span>iCHEF.</span> OS</h1>
        <div class="subtitle">Espace Partenaire</div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Identifiant Établissement</label>
                <input type="text" id="tenant-id" class="input-field" placeholder="Ex: bistrot-paris" required autocomplete="off" style="text-transform: uppercase;">
            </div>
            
            <div class="input-group">
                <label>Code PIN Maître (Admin)</label>
                <input type="password" id="tenant-pin" class="input-field" placeholder="••••" required autocomplete="off" style="letter-spacing: 4px; font-weight: bold;">
            </div>

            <div id="error-message" class="error-msg">Identifiant ou PIN incorrect.</div>

            <button type="submit" class="btn-submit" id="btn-login">Connexion Sécurisée</button>
        </form>
    </div>

    <script>
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        // FONCTION DE SÉCURITÉ : Génère une empreinte numérique unique pour cet appareil
        function getDeviceFingerprint() {
            let deviceId = localStorage.getItem('ichef_device_fingerprint');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('ichef_device_fingerprint', deviceId);
            }
            return deviceId;
        }

        // Par sécurité, on purge la mémoire à l'arrivée sur la page de connexion
        window.onload = function() {
            localStorage.removeItem('ichef_tenant_id');
            localStorage.removeItem('ichef_master_pin');
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const tenantInput = document.getElementById('tenant-id').value.trim().toUpperCase();
            const pinInput = document.getElementById('tenant-pin').value.trim();
            const errorMsg = document.getElementById('error-message');
            const btnLogin = document.getElementById('btn-login');

            if (!tenantInput || !pinInput) return;

            btnLogin.disabled = true;
            btnLogin.innerText = "Vérification...";
            errorMsg.style.display = 'none';

            try {
                // Appel STRICT vers le serveur, avec inclusion de la plaque d'immatriculation (deviceId)
                const response = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        tenantID: tenantInput, 
                        pin: pinInput,
                        deviceId: getDeviceFingerprint() 
                    })
                });
                const data = await response.json();

                if (data.success) {
                    // Connexion validée par le cloud, on écrit la mémoire en urgence
                    localStorage.setItem('ichef_tenant_id', tenantInput);
                    localStorage.setItem('ichef_master_pin', pinInput);
                    
                    // DÉLAI DE SÉCURITÉ : Attendre la fin de l'écriture avant de rediriger
                    setTimeout(() => {
                        window.location.href = `administration.html?tenantID=${tenantInput}`;
                    }, 300);
                    
                } else {
                    // Le serveur a refusé : on affiche la raison exacte (ex: Limite d'écrans atteinte)
                    throw new Error(data.error || "Identifiant ou Code PIN incorrect.");
                }
            } catch (error) {
                btnLogin.disabled = false;
                btnLogin.innerText = "Connexion Sécurisée";
                
                // Si l'erreur est liée au PIN, on vide le champ PIN
                if (error.message.toLowerCase().includes("incorrect")) {
                    document.getElementById('tenant-pin').value = ''; 
                }
                
                errorMsg.innerText = error.message;
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
