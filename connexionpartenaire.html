<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCHEF Empire OS - Connexion</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    
    <style>
        body { 
            margin: 0; padding: 0; 
            background: #050505; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; 
            height: 100vh; 
            overflow: hidden;
        }
        
        .login-box { 
            background: #0A0A0A; 
            border: 1px solid #1a1a1a; 
            padding: 40px; 
            border-radius: 16px; 
            text-align: center; 
            width: 90%; max-width: 400px; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.8); 
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 👑 LE STYLE DU LOGO 👑 */
        .login-logo {
            width: 120px;
            height: auto;
            margin-bottom: 15px;
            filter: drop-shadow(0px 5px 15px rgba(212, 175, 55, 0.3)); /* Ombre dorée légère */
        }

        .logo-text { 
            font-family: 'Playfair Display', serif; 
            color: #d4af37; 
            margin-bottom: 5px; 
            font-size: 2.2rem; 
            letter-spacing: 2px;
            font-weight: 600;
        }
        
        .subtitle { 
            color: #888; 
            font-size: 0.9rem; 
            margin-bottom: 35px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: #aaa;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            background: #111; 
            border: 1px solid #333; 
            color: #fff; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 1.1rem; 
            text-align: center; 
            outline: none; 
            transition: 0.3s;
            font-family: 'Inter', sans-serif;
        }
        
        input:focus { border-color: #d4af37; background: #000; box-shadow: 0 0 10px rgba(212, 175, 55, 0.2); }
        
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #d4af37, #b89626); 
            color: #000; 
            border: none; 
            border-radius: 8px; 
            font-size: 1.05rem; 
            font-weight: 800; 
            text-transform: uppercase; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 15px; 
            letter-spacing: 1px;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }
        
        button:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); }
        button:active { transform: scale(0.98); }
        
        .test-badge {
            margin-top: 25px;
            font-size: 0.75rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <img src="icon-512.png" alt="Logo iCHEF" class="login-logo">
        
        <div class="logo-text">iCHEF OS</div>
        <div class="subtitle">Portail Partenaire</div>
        
        <div class="input-group">
            <label>ID Restaurant</label>
            <input type="text" id="tenantID" placeholder="Ex: CHEZMARC" autocomplete="off" autocapitalize="characters">
        </div>
        
        <div class="input-group">
            <label>Code PIN</label>
            <input type="password" id="pinCode" placeholder="••••" autocomplete="off" pattern="[0-9]*" inputmode="numeric">
        </div>
        
        <button id="login-btn" onclick="login()">Se Connecter</button>
        
        <div class="test-badge">Accès Navigateur Déverrouillé 🟢</div>
    </div>

    <script>
        // Générateur d'ID Appareil
        function getDeviceFingerprint() {
            let deviceId = localStorage.getItem('ichef_device_fingerprint');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('ichef_device_fingerprint', deviceId);
            }
            return deviceId;
        }

        // Nettoyer les anciennes sessions si on arrive sur cette page
        window.onload = function() {
            localStorage.removeItem('ichef_tenant_id');
            localStorage.removeItem('ichef_master_pin');
        };

        // Permet de valider avec la touche "Entrée"
        document.getElementById('pinCode').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') login();
        });

        async function login() {
            const tenant = document.getElementById('tenantID').value.trim().toLowerCase();
            const pin = document.getElementById('pinCode').value.trim();
            const btn = document.getElementById('login-btn');

            if(!tenant || !pin) return alert("Veuillez remplir tous les champs.");

            btn.innerText = "Vérification...";
            btn.disabled = true;

            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";

            try {
                const res = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenant, pin: pin, deviceId: getDeviceFingerprint() })
                });
                
                const data = await res.json();
                
                if(data.success) {
                    // Sauvegarde la session
                    localStorage.setItem('ichef_tenant_id', tenant);
                    localStorage.setItem('ichef_master_pin', pin);
                    
                    // Redirige vers le portail
                    window.location.href = `administration.html?tenantID=${tenant}`;
                } else {
                    alert(data.error || "Identifiants incorrects ou limite d'écrans atteinte.");
                    btn.innerText = "Se Connecter";
                    btn.disabled = false;
                }
            } catch(e) {
                alert("Erreur de connexion au serveur. Vérifiez votre réseau.");
                btn.innerText = "Se Connecter";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
