<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCHEF - Connexion Partenaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #0A0A0A;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --gold: #fbbf24;
            --alert: #ef4444;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .login-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 50px 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo { font-size: 2.5rem; font-weight: 900; letter-spacing: 2px; margin: 0 0 5px 0; color: var(--text-main); }
        .logo span { color: var(--gold); }
        .subtitle { color: var(--text-muted); font-size: 0.95rem; margin-bottom: 40px; text-transform: uppercase; letter-spacing: 1px; }

        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }

        .input-field {
            width: 100%; padding: 16px; background: var(--bg); border: 1px solid var(--border);
            color: var(--text-main); border-radius: 8px; font-size: 1rem; box-sizing: border-box; transition: 0.3s;
        }
        .input-field:focus { outline: none; border-color: var(--gold); }

        .btn-submit {
            background: var(--gold); color: #000; border: none; width: 100%; padding: 16px;
            border-radius: 8px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-submit:hover { background: #f59e0b; transform: translateY(-2px); }

        .error-msg {
            color: var(--alert); font-size: 0.85rem; margin-top: 15px; font-weight: 600;
            display: none; background: rgba(239, 68, 68, 0.1); padding: 10px; border-radius: 6px; border: 1px solid var(--alert);
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h1 class="logo"><span>iCHEF.</span> OS</h1>
        <div class="subtitle">Espace Partenaire</div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Identifiant Restaurant</label>
                <input type="text" id="tenant-id" class="input-field" placeholder="Ex: PATEU" required autocomplete="off">
            </div>

            <div id="error-message" class="error-msg">Identifiant ou licence invalide.</div>

            <button type="submit" class="btn-submit" id="btn-login">Se Connecter</button>
        </form>
    </div>

    <script>
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        window.onload = function() {
            localStorage.removeItem('ichef_tenant_id');
        }

        async function handleLogin(event) {
            event.preventDefault();
            
            const tenantInput = document.getElementById('tenant-id').value.trim().toLowerCase();
            const errorMsg = document.getElementById('error-message');
            const btnLogin = document.getElementById('btn-login');

            btnLogin.disabled = true;
            btnLogin.innerText = "Vérification...";

            try {
                // Appel vers le serveur pour vérifier l'existence de la licence
                const response = await fetch(`${SERVER_URL}/api/check-license?tenantID=${tenantInput}`);
                const data = await response.json();

                if (data.success && data.status !== 'SUSPENDU') {
                    // Connexion validée, on envoie vers le centre de commandes
                    localStorage.setItem('ichef_tenant_id', tenantInput);
                    window.location.href = `administration.html?tenantID=${tenantInput}`;
                } else {
                    throw new Error("Compte invalide.");
                }
            } catch (error) {
                btnLogin.disabled = false;
                btnLogin.innerText = "Se Connecter";
                errorMsg.innerText = "Restaurant introuvable ou licence suspendue.";
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
