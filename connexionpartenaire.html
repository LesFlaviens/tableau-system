<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCHEF - Connexion Partenaire</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #050505;
            --panel: #0A0A0A;
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #64748b;
            --gold: #fbbf24;
            --alert: #ef4444;
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        .login-box {
            background: var(--panel);
            border: 1px solid var(--border);
            padding: 50px 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            box-shadow: var(--shadow);
            text-align: center;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 900;
            letter-spacing: 2px;
            margin: 0 0 5px 0;
            color: var(--text-main);
        }
        .logo span {
            color: var(--gold);
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 40px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }

        .input-field {
            width: 100%;
            padding: 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-main);
            border-radius: 8px;
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
            outline: none;
        }

        .input-field:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
        }

        .btn-submit {
            background: var(--gold);
            color: #000;
            border: none;
            width: 100%;
            padding: 16px;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #f59e0b;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(251, 191, 36, 0.3);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .error-msg {
            color: var(--alert);
            font-size: 0.85rem;
            margin-top: 15px;
            font-weight: 600;
            display: none;
            background: rgba(239, 68, 68, 0.1);
            padding: 10px;
            border-radius: 6px;
            border: 1px solid var(--alert);
        }

        .loader {
            display: none;
            margin: 0 auto;
            border: 3px solid rgba(0,0,0,0.1);
            border-top: 3px solid #000;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-box">
        <h1 class="logo"><span>iCHEF.</span> OS</h1>
        <div class="subtitle">Espace Partenaire</div>

        <form id="login-form" onsubmit="handleLogin(event)">
            <div class="input-group">
                <label>Identifiant Restaurant</label>
                <input type="text" id="tenant-id" class="input-field" placeholder="Ex: PATEU" required autocomplete="off" autocorrect="off">
            </div>

            <div class="input-group">
                <label>Mot de passe</label>
                <input type="password" id="password" class="input-field" placeholder="••••••••" required>
            </div>

            <div id="error-message" class="error-msg">Identifiant ou mot de passe incorrect.</div>

            <button type="submit" class="btn-submit" id="btn-login">
                <span id="btn-text">Se Connecter</span>
                <div id="btn-loader" class="loader"></div>
            </button>
        </form>
    </div>

    <script>
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        // Nettoyage de l'ancienne session à l'arrivée sur la page
        window.onload = function() {
            localStorage.removeItem('ichef_tenant_id');
        }

        async function handleLogin(event) {
            event.preventDefault(); // Empêche la page de se rafraîchir
            
            const tenantInput = document.getElementById('tenant-id').value.trim().toLowerCase();
            const passInput = document.getElementById('password').value.trim();
            const errorMsg = document.getElementById('error-message');
            const btnText = document.getElementById('btn-text');
            const btnLoader = document.getElementById('btn-loader');
            const btnLogin = document.getElementById('btn-login');

            if (!tenantInput) return;

            // UI : Mode chargement
            errorMsg.style.display = 'none';
            btnText.style.display = 'none';
            btnLoader.style.display = 'block';
            btnLogin.disabled = true;

            try {
                // 1. On interroge ton serveur Render pour vérifier si ce restaurant existe et s'il est actif
                const response = await fetch(`${SERVER_URL}/api/check-license?tenantID=${tenantInput}`);
                const data = await response.json();

                if (data.success && data.status !== 'SUSPENDU') {
                    // 🟢 CONNEXION RÉUSSIE
                    // On fabrique le badge d'accès officiel
                    localStorage.setItem('ichef_tenant_id', tenantInput);
                    
                    // On téléporte le client vers SON portail d'administration
                    window.location.href = `administration.html?tenantID=${tenantInput}`;
                } else {
                    // 🔴 ÉCHEC : Compte introuvable ou suspendu
                    throw new Error("Compte invalide ou suspendu.");
                }

            } catch (error) {
                // UI : Remettre le bouton à la normale et afficher l'erreur
                btnText.style.display = 'block';
                btnLoader.style.display = 'none';
                btnLogin.disabled = false;
                errorMsg.innerText = "Identifiant introuvable ou compte suspendu.";
                errorMsg.style.display = 'block';
            }
        }
    </script>
</body>
</html>
