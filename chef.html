<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iChef OS - Empire Flavien</title>
    <style>
        /* 💎 DESIGN IVOIRE / GRIS PERLE (PALACE) 💎 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Playfair+Display:ital,wght@0,600;1,400&display=swap');

        :root { 
            --bg: #F7F7F5; --panel: #FFFFFF; --border: #E8E8E3; --border-strong: #D1D1C7; 
            --text-main: #1A1A18; --text-muted: #7A7A75; --gold: #D4AF37; --gold-dim: rgba(212, 175, 55, 0.15); 
            --accent: #10B981; --alert: #EF4444; --slate: #4A5568; --shadow-subtle: 0 4px 20px rgba(0, 0, 0, 0.04);
        }
        
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .nav-master { background: white; padding: 12px 25px; display: flex; gap: 15px; border-bottom: 1px solid var(--border-strong); align-items: center; justify-content: space-between; box-shadow: var(--shadow-subtle); z-index: 100; }
        .logo-text { color: var(--gold); font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;}
        
        .nav-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 8px 16px; cursor: pointer; font-weight: 700; border-radius: 8px; text-transform: uppercase; transition: 0.3s; font-size: 0.8rem; }
        .nav-btn.active { border-color: var(--border-strong); color: var(--gold); background: var(--panel); }
        
        .module { display: none; flex: 1; overflow-y: auto; padding: 25px; width: 100%; box-sizing: border-box; }
        .module.active { display: block; }
        
        .market-layout { display: grid; grid-template-columns: 1.5fr 1fr; gap: 25px; height: calc(100vh - 120px); }
        .menu-category { background: var(--panel); border-radius: 12px; border: 1px solid var(--border); display: flex; flex-direction: column; box-shadow: var(--shadow-subtle); overflow: hidden; margin-bottom: 20px;}
        .category-header { background: #FAFAFA; border-bottom: 1px solid var(--border); padding: 15px 20px; font-weight: 800; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }

        .cost-box { border: 1px solid var(--border-strong); padding: 20px; padding-top: 25px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; background: var(--panel); position: relative; }
        .cost-box-title { position: absolute; top: -14px; left: 15px; background: var(--panel); padding: 4px 12px; font-size: 0.75rem; font-weight: 800; border: 1px solid var(--border-strong); border-radius: 6px; color: var(--slate); text-transform: uppercase;}

        .inv-table { width: 100%; border-collapse: collapse; background: var(--panel); }
        .inv-table th { background: #FAFAFA; padding: 12px; text-align: left; font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; border-bottom: 1px solid var(--border-strong); }
        .inv-table td { padding: 12px; border-bottom: 1px solid var(--border); font-size: 0.9rem; }

        .add-btn { background: var(--slate); color: #fff; border: none; padding: 14px; font-weight: 800; border-radius: 8px; cursor: pointer; text-transform: uppercase; width: 100%; letter-spacing: 1px;}
        .btn-mic { background: var(--bg); border: 1px solid var(--border-strong); padding: 8px; border-radius: 8px; cursor: pointer; }
        input, select, textarea { background: var(--panel); border: 1px solid var(--border-strong); padding: 12px; border-radius: 8px; font-family: 'Inter', sans-serif; outline: none; }
        
        #scanResult { margin-top: 15px; padding: 15px; border-radius: 8px; border: 1px solid var(--border-strong); font-size: 0.85rem; font-family: monospace; white-space: pre-wrap; }
    </style>
</head>
<body>

    <div id="security-overlay" style="position:fixed; top:0; left:0; width:100%; height:100%; background:var(--panel); z-index:9999; display:flex; flex-direction:column; align-items:center; justify-content:center;">
        <h1 class="logo-text" style="font-size:3rem; margin-bottom:20px;">iCHEF OS</h1>
        <input type="password" id="pin-input" placeholder="CODE PIN MAÎTRE" style="text-align:center; font-size:1.5rem; letter-spacing:5px; width:220px; margin-bottom:20px;">
        <button onclick="checkPin()" class="add-btn" style="width:220px; background:var(--gold); color:black;">DÉVERROUILLER</button>
        <p id="error-msg" style="color:var(--alert); display:none; margin-top:20px; font-weight:bold;">PIN INCORRECT</p>
    </div>

    <div class="nav-master">
        <div class="header-brand"><h1 class="logo-text">iCHEF.</h1></div>
        <div class="header-actions">
            <button class="nav-btn active" id="tab-menu" onclick="switchTab('menu')">📋 CARTE</button>
            <button class="nav-btn" id="tab-market" onclick="switchTab('market')">🧪 LABORATOIRE</button>
            <button class="nav-btn" id="tab-inventaire" onclick="switchTab('inventaire')">📦 STOCKS</button>
            <button class="nav-btn" id="tab-stats" onclick="switchTab('stats')">📊 VENTES</button>
            <div id="sync-status" class="sync-status" style="margin-left:10px; font-size:0.7rem; color:var(--text-muted);"><span id="sync-dot" style="display:inline-block; width:8px; height:8px; border-radius:50%; background:red;"></span> <span id="sync-text">OFFLINE</span></div>
        </div>
    </div>

    <div id="mod-menu" class="module active">
        <div id="dynamic-menu-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap:25px;"></div>
    </div>

    <div id="mod-market" class="module">
        <div class="market-layout">
            <div class="menu-category" style="padding:25px; overflow-y:auto;">
                <h3 style="margin-top:0; border-bottom:2px solid var(--gold); padding-bottom:10px;">🧪 CRÉATION DE RECETTE</h3>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:20px;">
                    <div class="cost-box">
                        <div class="cost-box-title">Prot/Féc/Veg</div>
                        <textarea id="market-main-raw" oninput="calcSmartPlate()" placeholder="Ingrédient + Prix (ex: Saumon 28€)"></textarea>
                        <button class="btn-mic" onclick="startVoice('market-main-raw')">🎙️</button>
                        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.85rem;">
                            <span>Poids(g): <input type="number" id="gram-main" value="150" oninput="calcSmartPlate()" style="width:50px;"></span> 
                            <span>Coût: <span id="cost-main">0.00</span>€</span>
                        </div>
                    </div>
                    <div class="cost-box">
                        <div class="cost-box-title">Garniture / Autres</div>
                        <textarea id="market-side-raw" oninput="calcSmartPlate()"></textarea>
                        <div style="display:flex; justify-content:space-between; font-weight:bold; font-size:0.85rem;">
                            <span>Poids(g): <input type="number" id="gram-side" value="100" oninput="calcSmartPlate()" style="width:50px;"></span> 
                            <span>Coût: <span id="cost-side">0.00</span>€</span>
                        </div>
                    </div>
                </div>
                <div style="background:#FAFAFA; padding:20px; border-radius:12px; margin-bottom:20px; display:flex; justify-content:space-between; align-items:center;">
                    <div>REVIENT: <span id="market-total-cost" style="font-weight:900; font-size:1.4rem;">0.00</span>€</div>
                    <div>MARGE: <input type="number" id="market-margin" value="3.5" step="0.1" oninput="calcSmartPlate()" style="width:50px; font-weight:bold;"></div>
                    <div style="color:var(--gold);">IDÉAL: <span id="market-recommended" style="font-weight:900; font-size:1.4rem;">0.00</span>€</div>
                </div>
                <input type="text" id="market-name" placeholder="Nom du Plat" style="width:100%; margin-bottom:10px; font-weight:bold;">
                <input type="number" id="market-price" placeholder="Prix Vente Définitif" style="width:100%; margin-bottom:15px; border:2px solid var(--gold); font-size:1.1rem;">
                <select id="market-category" style="width:100%; margin-bottom:20px;">
                    <option value="plats">🍽️ PLATS</option>
                    <option value="entrees">🥗 ENTRÉES</option>
                    <option value="desserts">🍰 DESSERTS</option>
                </select>
                <button class="add-btn" style="background:var(--gold); color:black;" onclick="saveRecipe()">🚀 ENREGISTRER & PUBLIER</button>
            </div>
            <div id="recipe-catalog">
                <div id="catalog-view" style="display:grid; grid-template-columns:1fr 1fr; gap:15px;"></div>
                <div id="folder-view" style="display:none; background:white; padding:20px; border-radius:12px; border:1px solid var(--border);">
                    <button class="nav-btn active" onclick="closeFolder()" style="margin-bottom:15px;">🔙 RETOUR</button>
                    <h3 id="current-folder-title" style="color:var(--gold);"></h3>
                    <div id="recipes-list" style="display:flex; flex-direction:column; gap:10px;"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="mod-inventaire" class="module">
        <div class="market-layout">
            <div class="menu-category" style="padding:25px; border: 2px solid var(--gold);">
                <h2 style="color:var(--gold); margin-top:0;">📸 SCAN IA (ACHATS)</h2>
                <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display:none;">
                <button class="add-btn" onclick="document.getElementById('cameraInput').click()" style="background:var(--gold); color:black;">📸 SCANNER FACTURE</button>
                <div id="scanResult" style="display:none;"></div>
            </div>
            <div class="menu-category" style="padding:25px;">
                <h2 style="margin-top:0;">📊 MATRICE DE STOCK GLOBAL</h2>
                <div style="overflow-y:auto; max-height:500px;">
                    <table class="inv-table">
                        <thead><tr><th>Cat.</th><th>Produit</th><th>Stock</th><th>Dernier Prix</th><th>Action</th></tr></thead>
                        <tbody id="global-stock-list"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div id="mod-stats" class="module">
        <h2 id="stat-ca" style="font-size:4rem; font-weight:900; color:var(--gold);">0.00 €</h2>
        <div id="top-sales-list"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let tenantID = urlParams.get('tenantID') || 'cheftour';
        const SERVER_URL = "https://tableau-system.onrender.com";

        let menuData = { entrees: [], plats: [], desserts: [] };
        let recipesData = [];
        let stockGlobalData = [];

        // === SYNC & BOOT ===
        async function checkPin() {
            const pin = document.getElementById('pin-input').value;
            try {
                const res = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ tenantID, pin })
                });
                const data = await res.json();
                if(data.success) { document.getElementById('security-overlay').style.display='none'; boot(); }
                else document.getElementById('error-msg').style.display='block';
            } catch(e) { alert("Serveur injoignable"); }
        }

        async function boot() {
            const state = await API.get();
            if(state.activeOrders['INVENTORY_MASTER']) stockGlobalData = state.activeOrders['INVENTORY_MASTER'].data;
            if(state.activeOrders['RECIPES_MASTER']) recipesData = state.activeOrders['RECIPES_MASTER'].data;
            if(state.activeOrders['MENU_MASTER']) menuData = state.activeOrders['MENU_MASTER'].data;
            document.getElementById('sync-dot').style.background = '#10B981';
            document.getElementById('sync-text').innerText = "ONLINE";
            render();
        }

        function render() {
            renderMenu();
            renderRecipes();
            renderStock();
        }

        // === IA SCANNER INTEGRATION ===
        function injecterStockIA(data) {
            data.articles.forEach(art => {
                stockGlobalData.unshift({
                    id: Date.now() + Math.random(),
                    name: art.nom || 'Produit IA',
                    cat: '📦 SCAN IA',
                    qtyStr: art.quantite || '1',
                    lastPrice: (art.prixUnitaire || 0).toFixed(2) + " €",
                    date: new Date().toLocaleDateString()
                });
            });
            renderStock();
            API.save('INVENTORY_MASTER', stockGlobalData);
        }

        document.getElementById('cameraInput').addEventListener('change', async (e) => {
            const file = e.target.files[0]; if(!file) return;
            const resBox = document.getElementById('scanResult');
            resBox.style.display='block'; resBox.innerHTML="⏳ L'IA ANALYSE...";
            
            const reader = new FileReader();
            reader.onloadend = async () => {
                const r = await fetch(`${SERVER_URL}/api/scan-invoice`, {
                    method: 'POST', headers: {'Content-Type':'application/json'},
                    body: JSON.stringify({ imageBase64: reader.result.split(',')[1], mimeType: file.type })
                });
                const d = await r.json();
                if(d.success) { injecterStockIA(d.data); resBox.innerHTML=`✅ EXTRAIT : ${d.data.fournisseur}. Matrice à jour.`; }
                else resBox.innerHTML="❌ ERREUR IA : " + d.error;
            };
            reader.readAsDataURL(file);
        });

        // === CALCULATEUR & SENTINELLE MARGE ===
        function calcSmartPlate() {
            let total = 0;
            ['main', 'side'].forEach(c => {
                let txt = document.getElementById(`market-${c}-raw`).value;
                let price = parseFloat(txt.match(/(\d+(?:\.\d+)?)/)?.[0] || 0);
                let gram = parseFloat(document.getElementById(`gram-${c}`).value) || 100;
                let cost = (price / 1000) * gram;
                document.getElementById(`cost-${c}`).innerText = cost.toFixed(2);
                total += cost;
            });
            document.getElementById('market-total-cost').innerText = total.toFixed(2);
            document.getElementById('market-recommended').innerText = (total * parseFloat(document.getElementById('market-margin').value)).toFixed(2);
        }

        async function saveRecipe() {
            const name = document.getElementById('market-name').value;
            const price = parseFloat(document.getElementById('market-price').value);
            const cost = parseFloat(document.getElementById('market-total-cost').innerText);
            const category = document.getElementById('market-category').value;
            
            if(!name || isNaN(price)) return alert("NOM ET PRIX OBLIGATOIRES");

            // --- SENTINELLE DE RENTABILITÉ IA (70% MIN) ---
            const foodCost = (cost / price) * 100;
            const margin = 100 - foodCost;

            if(margin < 70) {
                const conf = confirm(`🚨 ALERTE RENTABILITÉ : Ta marge est de ${margin.toFixed(1)}%. L'objectif est de 70%. Veux-tu quand même publier ?`);
                if(!conf) return;
            }

            recipesData.unshift({ id:Date.now(), name, price, cost, cat:category, margin: margin.toFixed(1)+'%' });
            if(!menuData[category]) menuData[category] = [];
            menuData[category].unshift({ id:Date.now(), name, price, stock:99 });
            
            await API.save('RECIPES_MASTER', recipesData);
            await API.save('MENU_MASTER', menuData);
            render();
            alert(`✅ "${name}" ENREGISTRÉ (${margin.toFixed(1)}% MARGE)`);
        }

        // === RENDERERS ===
        function renderStock() {
            document.getElementById('global-stock-list').innerHTML = stockGlobalData.map(i => `
                <tr><td>${i.cat}</td><td><b>${i.name}</b></td><td>${i.qtyStr}</td><td>${i.lastPrice}</td><td>✖</td></tr>
            `).join('');
        }

        function renderMenu() {
            document.getElementById('dynamic-menu-grid').innerHTML = Object.keys(menuData).map(cat => `
                <div class="menu-category">
                    <div class="category-header">${cat.toUpperCase()}</div>
                    <div class="item-list" style="padding:15px; display:flex; flex-direction:column; gap:8px;">
                        ${menuData[cat].map(i => `<div style="background:var(--bg); padding:12px; border-radius:8px;"><b>${i.name}</b><br><span style="color:var(--gold); font-weight:800;">${i.price} €</span></div>`).join('')}
                    </div>
                </div>
            `).join('');
        }

        function renderRecipes() {
            const cats = { entrees:'🥗 ENTRÉES', plats:'🍽️ PLATS', desserts:'🍰 DESSERTS' };
            document.getElementById('catalog-view').innerHTML = Object.keys(cats).map(k => `
                <div class="menu-category" style="padding:20px; text-align:center; cursor:pointer;" onclick="openFolder('${k}')">
                    <div style="font-size:1.5rem;">${cats[k].split(' ')[0]}</div>
                    <b>${cats[k].split(' ')[1]}</b><br><small>${recipesData.filter(r=>r.cat===k).length} FICHES</small>
                </div>
            `).join('');
        }

        function openFolder(cat) {
            document.getElementById('catalog-view').style.display='none';
            document.getElementById('folder-view').style.display='block';
            document.getElementById('current-folder-title').innerText = cat.toUpperCase();
            document.getElementById('recipes-list').innerHTML = recipesData.filter(r=>r.cat===cat).map(r=>`
                <div style="background:var(--bg); padding:15px; border-radius:10px; border:1px solid var(--border);"><b>${r.name}</b><br><small>Coût: ${r.cost}€ | Marge: ${r.margin}</small></div>
            `).join('');
        }

        function closeFolder() { document.getElementById('catalog-view').style.display='grid'; document.getElementById('folder-view').style.display='none'; }

        function switchTab(t) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mod-'+t).classList.add('active');
            document.getElementById('tab-'+t).classList.add('active');
        }

        const API = {
            get: async () => (await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`)).json(),
            save: async (k, d) => fetch(`${SERVER_URL}/update-order?tenantID=${tenantID}`, {
                method:'POST', headers:{'Content-Type':'application/json'},
                body: JSON.stringify({ tableId:k, order:{data:d} })
            })
        };

        function startVoice(id) {
            const S = window.SpeechRecognition || window.webkitSpeechRecognition;
            if(!S) return; const r = new S(); r.lang='fr-FR';
            r.onresult = (e) => { document.getElementById(id).value = e.results[0][0].transcript; calcSmartPlate(); };
            r.start();
        }
    </script>
</body>
</html>
