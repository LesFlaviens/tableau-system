<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Le Laboratoire du Chef</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --gold: #ffb300; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-nav:hover { border-color: var(--accent); background: #222; }

        /* TABS SYSTEM */
        .tabs-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab-btn { flex: 1; padding: 18px; background: #111; border: 2px solid #333; color: #888; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; border-radius: 8px; transition: 0.3s; }
        .tab-btn:hover { background: #1a1a1a; color: #ccc; }
        .tab-btn.active-fc { border-color: var(--accent); color: #fff; background: rgba(0, 230, 118, 0.1); }
        .tab-btn.active-supp { border-color: var(--gold); color: #fff; background: rgba(255, 179, 0, 0.1); }

        .view-section { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* MODULE FOOD COST */
        .fc-container { background: var(--panel); border: 1px solid #333; padding: 30px; border-radius: 12px; border-top: 5px solid var(--accent); }
        .ing-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .ing-table th { text-align: left; color: var(--sub); font-size: 0.8rem; padding: 10px; text-transform: uppercase; border-bottom: 1px solid #333;}
        .ing-table td { padding: 8px 5px; }
        .input-fc { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-weight: bold; font-size: 1rem;}
        .input-fc:focus { border-color: var(--accent); outline: none; }
        .line-cost { text-align: right; font-weight: 900; color: var(--accent); font-size: 1.1rem; }

        /* MODULE FOURNISSEURS */
        .supp-container { background: var(--panel); border: 1px solid #333; padding: 30px; border-radius: 12px; border-top: 5px solid var(--gold); }
        .form-add { display: flex; gap: 15px; align-items: flex-end; margin-bottom: 30px; background: #0a0a0a; padding: 20px; border-radius: 8px; border: 1px solid #222; }
        .supp-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 20px; }
        .supp-card { background: #0a0a0a; border: 1px solid #222; padding: 20px; border-radius: 8px; border-left: 4px solid var(--gold); }
        .supp-name { font-size: 1.3rem; font-weight: 900; color: #fff; margin-bottom: 10px; display: block; text-transform: uppercase;}
        .supp-detail { color: #ccc; font-size: 0.9rem; margin-bottom: 5px; }
        .supp-detail b { color: var(--sub); }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color:#fff; margin:0; text-transform:uppercase; letter-spacing:2px;">🔪 LABORATOIRE DU CHEF</h1>
            <p style="color:var(--accent); margin:5px 0 0 0; font-weight: bold;">R&D, FOOD-COST & ACHATS</p>
        </div>
        <div style="display:flex; gap:10px;">
            <button onclick="window.location.href='rh.html'" class="btn-nav" style="border-color:#2979ff; color:#2979ff;">👔 DIRECTION RH</button>
            <button onclick="window.location.href='production.html'" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">🔥 RETOUR CUISINE</button>
        </div>
    </header>

    <div class="tabs-container">
        <button id="btn-tab-FC" class="tab-btn active-fc" onclick="switchView('FC')">📄 CRÉATION & FOOD COST</button>
        <button id="btn-tab-SUPP" class="tab-btn" onclick="switchView('SUPP')">📦 CARNET FOURNISSEURS</button>
    </div>

    <div id="view-FC" class="view-section" style="display: block;">
        <div class="fc-container">
            <h2 style="color:var(--accent); margin-top:0; margin-bottom:20px;">CRÉATEUR DE FICHE TECHNIQUE</h2>
            <input type="text" id="recipe-title" class="input-fc" style="font-size: 1.5rem; margin-bottom: 20px;" placeholder="NOM EXACT DE LA RECETTE OU BASE">
            
            <table class="ing-table">
                <thead>
                    <tr>
                        <th style="width: 40%;">Ingrédient</th>
                        <th>Poids (g) / Vol (ml)</th>
                        <th>Prix Achat (kg/L)</th>
                        <th style="text-align: right;">Coût Ingrédient</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="ingredients-body"></tbody>
            </table>
            
            <button onclick="addIngredientLine()" style="width:100%; padding:15px; background:#222; border:1px dashed #555; color:#fff; cursor:pointer; margin-bottom:20px; font-weight:bold; border-radius:6px;">+ AJOUTER UN INGRÉDIENT</button>
            
            <textarea id="recipe-instructions" class="input-fc" style="height: 120px; margin-bottom: 20px;" placeholder="Instructions de préparation détaillées pour la cuisine..."></textarea>

            <div style="background:#0a0a0a; padding:25px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid #222;">
                <div>
                    <span style="display:block; color:#888; font-size:0.8rem; font-weight:bold; margin-bottom:5px;">COÛT MATIÈRE DE LA PORTION :</span>
                    <span id="total-food-cost" style="font-size:2.5rem; font-weight:900; color:var(--accent);">0.00</span> <span style="font-size:1.5rem; color:#fff;">€</span>
                </div>
                <button onclick="saveRecipeToEmpire()" style="background:var(--accent); color:#000; border:none; padding:15px 40px; border-radius:8px; font-weight:900; font-size:1.1rem; cursor:pointer; text-transform:uppercase;">💾 ENVOYER EN CUISINE (GRIMOIRE)</button>
            </div>
        </div>
    </div>

    <div id="view-SUPP" class="view-section" style="display: none;">
        <div class="supp-container">
            <h2 style="color:var(--gold); margin-top:0; margin-bottom:20px;">RÉPERTOIRE D'ACHATS</h2>
            
            <div class="form-add">
                <div style="flex:2">
                    <label style="font-size:0.7rem; color:var(--sub); text-transform:uppercase; font-weight:bold; display:block; margin-bottom:5px;">Nom du Fournisseur</label>
                    <input type="text" id="supp-name" class="input-fc" placeholder="ex: Boucherie Metzger">
                </div>
                <div style="flex:1">
                    <label style="font-size:0.7rem; color:var(--sub); text-transform:uppercase; font-weight:bold; display:block; margin-bottom:5px;">Catégorie</label>
                    <select id="supp-cat" class="input-fc">
                        <option value="Viande">Viande / Volaille</option>
                        <option value="Marée">Marée / Poisson</option>
                        <option value="Primeur">Primeur (Fruits/Lég.)</option>
                        <option value="BOF">B.O.F (Crèmerie)</option>
                        <option value="Sec">Épicerie Sèche</option>
                        <option value="Boissons">Boissons / Cave</option>
                    </select>
                </div>
                <div style="flex:1">
                    <label style="font-size:0.7rem; color:var(--sub); text-transform:uppercase; font-weight:bold; display:block; margin-bottom:5px;">Contact / Tél</label>
                    <input type="text" id="supp-contact" class="input-fc" placeholder="06 12 34 56 78">
                </div>
                <div style="flex:1">
                    <label style="font-size:0.7rem; color:var(--sub); text-transform:uppercase; font-weight:bold; display:block; margin-bottom:5px;">Jours de Livraison</label>
                    <input type="text" id="supp-days" class="input-fc" placeholder="Lun, Mer, Ven">
                </div>
                <button onclick="addSupplier()" class="btn-nav" style="background:var(--gold); color:#000; border:none; height:45px; font-size:1rem;">+ AJOUTER</button>
            </div>

            <div id="suppliers-list" class="supp-grid"></div>
        </div>
    </div>

    <script>
        function switchView(viewName) {
            document.getElementById('view-FC').style.display = 'none';
            document.getElementById('view-SUPP').style.display = 'none';
            document.getElementById('btn-tab-FC').classList.remove('active-fc');
            document.getElementById('btn-tab-SUPP').classList.remove('active-supp');

            if(viewName === 'FC') {
                document.getElementById('view-FC').style.display = 'block';
                document.getElementById('btn-tab-FC').classList.add('active-fc');
            } else if(viewName === 'SUPP') {
                document.getElementById('view-SUPP').style.display = 'block';
                document.getElementById('btn-tab-SUPP').classList.add('active-supp');
            }
        }

        // --- MODULE FOOD COST ---
        function addIngredientLine() {
            const tbody = document.getElementById('ingredients-body');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="input-fc" placeholder="ex: Filet de Boeuf"></td>
                <td><input type="number" class="input-fc ing-qte" placeholder="200" oninput="calculateFC()"></td>
                <td><input type="number" class="input-fc ing-price" placeholder="25.90" oninput="calculateFC()"></td>
                <td class="line-cost">0.00 €</td>
                <td style="text-align:center;"><button onclick="this.parentElement.parentElement.remove(); calculateFC();" style="background:var(--alert); border:none; color:white; font-weight:bold; border-radius:4px; padding:8px 12px; cursor:pointer;">✕</button></td>
            `;
            tbody.appendChild(tr);
        }

        function calculateFC() {
            let total = 0;
            document.querySelectorAll('#ingredients-body tr').forEach(row => {
                const qte = parseFloat(row.querySelector('.ing-qte').value) || 0;
                const price = parseFloat(row.querySelector('.ing-price').value) || 0;
                const line = (qte / 1000) * price;
                row.querySelector('.line-cost').textContent = line.toFixed(2) + " €";
                total += line;
            });
            document.getElementById('total-food-cost').textContent = total.toFixed(2);
        }

        function saveRecipeToEmpire() {
            const title = document.getElementById('recipe-title').value;
            const instructions = document.getElementById('recipe-instructions').value;
            if(!title) return alert("Veuillez indiquer un nom pour cette recette.");
            
            const cost = document.getElementById('total-food-cost').textContent;
            const fullContent = instructions + "\n\n------------------------\n💡 COÛT MATIÈRE ESTIMÉ : " + cost + " €";

            const recipes = JSON.parse(localStorage.getItem('kds_grimoire_v2')) || [];
            recipes.push({ nom: title + " (" + cost + "€)", content: fullContent });
            localStorage.setItem('kds_grimoire_v2', JSON.stringify(recipes));
            
            alert("✅ Fiche Technique validée et envoyée en cuisine !");
            document.getElementById('recipe-title').value = '';
            document.getElementById('recipe-instructions').value = '';
            document.getElementById('ingredients-body').innerHTML = '';
            addIngredientLine(); calculateFC();
        }

        // --- MODULE FOURNISSEURS ---
        function getSuppliers() { return JSON.parse(localStorage.getItem('kds_suppliers_v1')) || []; }
        function saveSuppliers(supps) { localStorage.setItem('kds_suppliers_v1', JSON.stringify(supps)); renderSuppliers(); }

        function addSupplier() {
            const name = document.getElementById('supp-name').value.trim();
            const cat = document.getElementById('supp-cat').value;
            const contact = document.getElementById('supp-contact').value.trim();
            const days = document.getElementById('supp-days').value.trim();

            if(!name) return alert("Le nom du fournisseur est obligatoire.");

            const supps = getSuppliers();
            supps.push({ id: Date.now(), name, cat, contact, days });
            saveSuppliers(supps);

            document.getElementById('supp-name').value = '';
            document.getElementById('supp-contact').value = '';
            document.getElementById('supp-days').value = '';
        }

        function deleteSupplier(id) {
            if(confirm("Supprimer ce fournisseur ?")) {
                saveSuppliers(getSuppliers().filter(s => s.id !== id));
            }
        }

        function renderSuppliers() {
            const supps = getSuppliers();
            document.getElementById('suppliers-list').innerHTML = supps.map(s => `
                <div class="supp-card">
                    <div style="display:flex; justify-content:space-between;">
                        <span class="supp-name">${s.name}</span>
                        <button onclick="deleteSupplier(${s.id})" style="background:none; border:none; color:#555; cursor:pointer; font-weight:bold;">✕</button>
                    </div>
                    <div class="supp-detail"><b>Catégorie :</b> <span style="color:var(--gold);">${s.cat}</span></div>
                    <div class="supp-detail"><b>Contact :</b> ${s.contact || 'N/A'}</div>
                    <div class="supp-detail"><b>Livraisons :</b> ${s.days || 'N/A'}</div>
                </div>
            `).join('');
        }

        // Init
        addIngredientLine();
        renderSuppliers();
    </script>
</body>
</html>
