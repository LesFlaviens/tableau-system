<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Le Laboratoire du Chef</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --gold: #ffb300; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .module-container { background: var(--panel); border: 1px solid #333; padding: 30px; border-radius: 12px; margin-bottom: 30px;}
        .menu-item-row { display: grid; grid-template-columns: 150px 1fr 100px 50px; gap: 15px; background: #000; padding: 12px; border-radius: 6px; border: 1px solid #222; align-items: center; margin-bottom: 8px;}
        .btn-propulse { width: 100%; padding: 25px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 900; font-size: 1.4rem; cursor: pointer; text-transform: uppercase; margin-top: 30px; box-shadow: 0 0 30px rgba(0, 230, 118, 0.3); }
        .btn-reset { background: var(--alert); color: #fff; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; margin-bottom: 20px;}
        .cat-tag { font-size: 0.7rem; font-weight: 900; padding: 4px 8px; border-radius: 4px; text-transform: uppercase; text-align: center;}
        .tag-entree { background: #2979ff; color: #fff; }
        .tag-plat { background: var(--gold); color: #000; }
        .tag-dessert { background: #e91e63; color: #fff; }

        /* --- STYLES AJOUTÉS POUR L'ÉDITEUR --- */
        .input-base { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-weight: bold; font-size: 1rem; font-family: 'Inter', sans-serif;}
        .input-base:focus { outline: none; border-color: var(--accent); }
        .btn-mic { background: #1a1a1a; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-mic.recording { background: rgba(255,23,68,0.2) !important; border-color: var(--alert) !important; color: var(--alert) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="margin:0; text-transform:uppercase; letter-spacing:2px;">🔪 LE LABORATOIRE DU CHEF</h1>
            <p style="color:var(--gold); margin:5px 0 0 0; font-weight: bold;">ÉDITION DE LA CARTE - 30 RÉFÉRENCES</p>
        </div>
        <div style="display:flex; gap:10px; align-items:center;">
            <div id="sync-status" style="margin-right: 20px; font-weight: 900; font-size: 0.8rem; color: #888;">● CONNEXION...</div>
            <button class="btn-reset" onclick="forceResetMenu()" style="margin:0;">⚠️ RÉINITIALISER LES 30 PLATS</button>
            <a href="production.html" class="btn-nav" style="border-color:var(--alert); color:var(--alert); height: fit-content; margin:0;">🔥 CUISINE</a>
        </div>
    </header>

    <div class="module-container" style="border-top: 4px solid var(--accent);">
        <h2 style="color:var(--accent); margin-top:0;">📝 ÉDITEUR DE FICHES TECHNIQUES (PLATS)</h2>
        
        <div style="display:flex; gap:15px; margin-bottom:15px;">
            <input type="text" id="new-name" class="input-base" style="margin:0; flex:2;" placeholder="Nom du Plat / Entrée / Dessert">
            <select id="new-cat" class="input-base" style="margin:0; flex:1;">
                <option value="Entrées">Entrées</option>
                <option value="Plats de résistance">Plats de résistance</option>
                <option value="Desserts">Desserts</option>
            </select>
            <input type="number" id="new-price" class="input-base" style="margin:0; flex:1;" step="0.5" placeholder="Prix (€)">
        </div>

        <div style="display:flex; gap:15px; margin-bottom:15px;">
            <textarea id="recipe-content" class="input-base" style="height:150px; margin:0; flex:1; resize:none;" placeholder="Rédigez la recette ici, utilisez le micro, ou importez un PDF..."></textarea>
            <div style="display:flex; flex-direction:column; gap:10px;">
                <button id="btn-mic-recipe" class="btn-mic" onclick="toggleDictation()" style="margin:0; flex:1; border-color:var(--alert); color:var(--alert);">🎙️ DICTER</button>
                <button class="btn-mic" onclick="document.getElementById('pdf-upload').click()" style="margin:0; flex:1; border-color:var(--gold); color:var(--gold);">📥 IMPORT PDF</button>
                <button class="btn-mic" onclick="exportToPDF()" style="margin:0; flex:1; border-color:var(--accent); color:var(--accent);">📤 EXPORT PDF</button>
                <input type="file" id="pdf-upload" accept="application/pdf" style="display:none;" onchange="extractTextFromPDF()">
            </div>
        </div>
        <button class="btn-propulse" style="padding: 15px; font-size: 1.1rem; margin-top: 0; background: #222; color: #fff; box-shadow: none;" onclick="addNewRecipeAndSave()">SAUVEGARDER DANS LE LABO</button>
    </div>

    <div class="module-container">
        <h2 style="color:var(--gold); margin-top:0;">VOTRE CARTE ACTUELLE</h2>
        <div id="menu-live-list"></div>
        <button class="btn-propulse" onclick="propulserMenu()">🚀 PROPULSER LES 30 PLATS SUR LE RÉSEAU</button>
    </div>

    <script>
        const defaultMenu = [
            // ENTRÉES (10)
            { name: "Salade César Royale", category: "Entrées", price: 14.50 },
            { name: "Os à Moelle Grillé", category: "Entrées", price: 12.00 },
            { name: "Carpaccio de Bœuf", category: "Entrées", price: 15.00 },
            { name: "Burrata & Tomates Antiques", category: "Entrées", price: 13.50 },
            { name: "Escargots de Bourgogne (x6)", category: "Entrées", price: 12.50 },
            { name: "Tartare de Thon Alizé", category: "Entrées", price: 16.00 },
            { name: "Foie Gras de Canard Maison", category: "Entrées", price: 19.00 },
            { name: "Œuf Parfait aux Morilles", category: "Entrées", price: 14.00 },
            { name: "Velouté de Potiron & Truffe", category: "Entrées", price: 11.00 },
            { name: "Planche de Jambon Ibérique", category: "Entrées", price: 18.00 },
            // PLATS (10)
            { name: "Entrecôte Maturée 300g", category: "Plats de résistance", price: 29.00 },
            { name: "Burger Empire Signature", category: "Plats de résistance", price: 21.00 },
            { name: "Magret de Canard au Miel", category: "Plats de résistance", price: 24.50 },
            { name: "Risotto aux Saint-Jacques", category: "Plats de résistance", price: 26.00 },
            { name: "Filet de Bar à l'Unilatérale", category: "Plats de résistance", price: 25.00 },
            { name: "Souris d'Agneau de 7 Heures", category: "Plats de résistance", price: 27.00 },
            { name: "Linguine à la Truffe Noire", category: "Plats de résistance", price: 23.00 },
            { name: "Côte de Bœuf (pour 2 pers.)", category: "Plats de résistance", price: 68.00 },
            { name: "Tartare de Bœuf au Couteau", category: "Plats de résistance", price: 19.50 },
            { name: "Pavé de Saumon Label Rouge", category: "Plats de résistance", price: 22.00 },
            // DESSERTS (10)
            { name: "Tiramisu Tradition", category: "Desserts", price: 9.00 },
            { name: "Fondant Chocolat Intense", category: "Desserts", price: 10.00 },
            { name: "Crème Brûlée Vanille Bourbon", category: "Desserts", price: 8.50 },
            { name: "Tarte Tatin & Crème d'Isigny", category: "Desserts", price: 9.50 },
            { name: "Café Gourmand de l'Empire", category: "Desserts", price: 11.50 },
            { name: "Profiteroles au Chocolat Chaud", category: "Desserts", price: 10.50 },
            { name: "Cheesecake Citron Vert", category: "Desserts", price: 9.00 },
            { name: "Pavlova aux Fruits Rouges", category: "Desserts", price: 11.00 },
            { name: "Mousse au Chocolat Valrhona", category: "Desserts", price: 8.00 },
            { name: "Assiette de Fromages Affinés", category: "Desserts", price: 12.00 }
        ];

        let menuEmpire = JSON.parse(localStorage.getItem('kds_menu_empire')) || defaultMenu;

        function forceResetMenu() {
            if(confirm("Voulez-vous recharger les 30 plats par défaut ?")) {
                menuEmpire = [...defaultMenu];
                localStorage.setItem('kds_menu_empire', JSON.stringify(menuEmpire));
                renderMenuLive();
            }
        }

        function renderMenuLive() {
            const container = document.getElementById('menu-live-list');
            container.innerHTML = menuEmpire.map((item, idx) => {
                let catClass = item.category === 'Entrées' ? 'tag-entree' : (item.category === 'Desserts' ? 'tag-dessert' : 'tag-plat');
                return `
                <div class="menu-item-row">
                    <div class="cat-tag ${catClass}">${item.category}</div>
                    <span style="font-weight:bold;">${item.name}</span>
                    <input type="number" step="0.5" value="${item.price}" onchange="updatePrice(${idx}, this.value)" style="background:#111; border:1px solid #444; color:var(--accent); font-weight:900; padding:8px; width:80px;">
                    <button onclick="deleteMenuItem(${idx})" style="background:none; border:none; color:var(--alert); cursor:pointer;">✕</button>
                </div>`;
            }).join('');
        }

        function updatePrice(idx, val) { menuEmpire[idx].price = parseFloat(val); localStorage.setItem('kds_menu_empire', JSON.stringify(menuEmpire)); }
        function deleteMenuItem(idx) { menuEmpire.splice(idx, 1); renderMenuLive(); }

        async function propulserMenu() {
            const payload = { tableId: 'GLOBAL_MENU', order: { status: 'system', data: menuEmpire } };
            try {
                const res = await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                if(res.ok) alert("✅ CARTE SYNCHRONISÉE : Tout est à jour.");
            } catch(e) { alert("Erreur."); }
        }

        window.onload = renderMenuLive;

        // ==========================================================
        // AJOUT : CONNEXION H24 7/7 (AUTO-RECONNECT)
        // ==========================================================
        let ws;
        function connectEmpireH24() {
            ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);

            ws.onopen = () => {
                const syncStatus = document.getElementById('sync-status');
                if(syncStatus) {
                    syncStatus.style.color = "var(--accent)";
                    syncStatus.innerText = "● SYNC H24 ACTIF";
                }
            };

            ws.onmessage = (e) => {
                // Le labo édite la carte, mais la ligne H24 reste ouverte
            };

            ws.onclose = () => {
                const syncStatus = document.getElementById('sync-status');
                if(syncStatus) {
                    syncStatus.style.color = "var(--alert)";
                    syncStatus.innerText = "● RECONNEXION...";
                }
                setTimeout(connectEmpireH24, 2500); 
            };
            
            ws.onerror = (err) => { ws.close(); };
        }
        
        connectEmpireH24();

        // ==========================================================
        // AJOUT : SYSTÈME DE CRÉATION DE RECETTES (DICTÉE, IMPORT/EXPORT PDF)
        // ==========================================================
        let recipeRecognition;
        let isRecipeRecording = false;

        function toggleDictation() {
            window.SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!window.SpeechRecognition) return alert("Dictée non supportée par votre navigateur.");
            
            if (!recipeRecognition) {
                recipeRecognition = new SpeechRecognition();
                recipeRecognition.lang = 'fr-FR';
                recipeRecognition.interimResults = true;
                recipeRecognition.onresult = (e) => {
                    let final = '';
                    for (let i = e.resultIndex; i < e.results.length; ++i) {
                        if (e.results[i].isFinal) final += e.results[i][0].transcript + ' ';
                    }
                    if(final) {
                        const textArea = document.getElementById('recipe-content');
                        textArea.value += final;
                    }
                };
                recipeRecognition.onend = () => { document.getElementById('btn-mic-recipe').classList.remove('recording'); isRecipeRecording = false; };
            }

            if (isRecipeRecording) {
                recipeRecognition.stop();
            } else {
                recipeRecognition.start();
                isRecipeRecording = true;
                document.getElementById('btn-mic-recipe').classList.add('recording');
            }
        }

        async function extractTextFromPDF() {
            const file = document.getElementById('pdf-upload').files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = async function() {
                try {
                    const typedarray = new Uint8Array(this.result);
                    const pdf = await pdfjsLib.getDocument(typedarray).promise;
                    let fullText = "";
                    
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const textContent = await page.getTextContent();
                        const text = textContent.items.map(s => s.str).join(' ');
                        fullText += text + "\n\n";
                    }
                    const textArea = document.getElementById('recipe-content');
                    textArea.value += (textArea.value ? '\n\n' : '') + fullText;
                    alert("✅ Fiche technique PDF importée avec succès !");
                } catch(e) {
                    alert("❌ Erreur lors de la lecture du PDF.");
                }
            };
            reader.readAsArrayBuffer(file);
            document.getElementById('pdf-upload').value = '';
        }

        function exportToPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            
            const title = document.getElementById('new-name').value.trim() || 'Fiche_Technique_Plat';
            const content = document.getElementById('recipe-content').value.trim();
            
            if(!content) return alert("La fiche technique est vide, rien à exporter.");

            doc.setFontSize(22);
            doc.text(title, 20, 20);
            
            doc.setFontSize(12);
            const splitText = doc.splitTextToSize(content, 170); // 170mm width limit for A4
            doc.text(splitText, 20, 40);
            
            doc.save(`${title.replace(/\s+/g, '_')}.pdf`);
        }

        async function addNewRecipeAndSave() {
            const name = document.getElementById('new-name').value.trim();
            const cat = document.getElementById('new-cat').value;
            const price = parseFloat(document.getElementById('new-price').value);
            const desc = document.getElementById('recipe-content').value.trim();

            if(!name || isNaN(price)) return alert("Nom du plat et prix obligatoires.");

            // Ajout à la carte existante
            menuEmpire.unshift({ name: name, category: cat, price: price, description: desc });
            
            localStorage.setItem('kds_menu_empire', JSON.stringify(menuEmpire));
            renderMenuLive();

            // Envoi de la mise à jour sur le réseau
            const payload = { tableId: 'GLOBAL_MENU', order: { status: 'system', data: menuEmpire } };
            if (ws && ws.readyState === WebSocket.OPEN) {
                await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            }

            document.getElementById('new-name').value = '';
            document.getElementById('new-price').value = '';
            document.getElementById('recipe-content').value = '';
            
            alert(`✅ Plat "${name}" enregistré et propulsé sur les Pads Serveurs !`);
        }
    </script>
</body>
</html>
