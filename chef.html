<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pass Cuisine (CHEF)</title>
    <style>
        /* 💎 DESIGN ULTRA-PREMIUM & ÉPURÉ 💎 */
        :root { 
            --bg: #090e17; 
            --panel: #141c2f; 
            --border: rgba(255, 255, 255, 0.05); 
            --border-strong: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc; 
            --text-muted: #64748b; 
            --gold: #fbbf24; 
            --accent: #34d399; 
            --alert: #ef4444; 
            --ordered: #60a5fa; 
            --purple: #a78bfa; 
            --orange: #fb923c; 
            --shadow-subtle: 0 4px 20px rgba(0, 0, 0, 0.2);
            --shadow-deep: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        body { 
            font-family: 'Inter', -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            margin: 0; 
            padding: 8px 10px; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            touch-action: manipulation; 
            box-sizing: border-box; 
            gap: 8px; 
            letter-spacing: 0.3px;
        }

        header { 
            background: rgba(20, 28, 47, 0.8); 
            backdrop-filter: blur(10px); 
            border: 1px solid var(--border-strong); 
            border-radius: 10px; 
            padding: 8px 15px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            z-index: 100; 
            box-shadow: var(--shadow-deep);
            flex-wrap: nowrap; 
            overflow-x: auto; 
            gap: 10px;
            flex-shrink: 0;
            width: 100%;
        }
        header::-webkit-scrollbar { display: none; }
        
        .header-left { display: flex; align-items: center; gap: 8px; flex-wrap: nowrap; flex-shrink: 1; }
        
        .logo-text { color: var(--gold); font-size: 1.2rem; font-weight: 900; letter-spacing: 2px; margin: 0; text-transform: uppercase; white-space: nowrap;}
        .clock { font-family: monospace; font-size: 1rem; color: var(--text-main); font-weight: bold; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border-strong); white-space: nowrap;}

        .btn-call-salle { background: rgba(239, 68, 68, 0.1); border: 1px solid var(--alert); color: var(--alert); padding: 5px 12px; border-radius: 6px; font-size: 0.85rem; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: all 0.2s ease; box-shadow: inset 0 0 8px rgba(239, 68, 68, 0.2); white-space: nowrap;}
        .btn-call-salle:hover { background: var(--alert); color: #fff; transform: scale(1.05); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }

        .resa-ticker { background: rgba(167, 139, 250, 0.1); border: 1px solid var(--purple); color: var(--purple); padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-weight: 900; display: flex; align-items: center; gap: 6px; min-width: 180px; justify-content: center; cursor: pointer; transition: transform 0.2s; box-shadow: inset 0 0 8px rgba(0,0,0,0.3); white-space: nowrap;}
        
        .nav-btns { display: flex; gap: 4px; flex-wrap: nowrap; align-items: center; flex-shrink: 1; }
        .nav-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 5px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; cursor: pointer; text-transform: uppercase; transition: all 0.3s ease; display: flex; align-items: center; gap: 4px; white-space: nowrap;}
        .nav-btn:hover { color: var(--text-main); background: rgba(255,255,255,0.03); }
        .nav-btn.active { border-color: var(--border-strong); color: var(--gold); background: var(--panel); box-shadow: var(--shadow-subtle); }

        .module { display: none; flex: 1; overflow: hidden; }
        .module.active { display: flex; flex-direction: column; }

        /* 🚀 ARCHITECTURE KDS "1 PLAT = 1 TICKET" 🚀 */
        #mod-kds { gap: 8px; padding: 2px 0; }
        .lane-wrapper { display: flex; flex-direction: column; flex: 1; min-height: 0; background: rgba(0,0,0,0.2); border: 1px solid var(--border-strong); border-radius: 8px; overflow: hidden; position: relative; }
        
        .timer-floating-badge { position: absolute; right: 15px; top: 4px; z-index: 10; display: flex; align-items: center; gap: 4px; background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border-strong); box-shadow: var(--shadow-subtle); }
        .timer-input { width: 32px; padding: 0px 2px; text-align: center; background: transparent; border: none; font-weight: 900; font-family: inherit; font-size: 0.8rem; color: inherit; -moz-appearance: textfield; }

        .kds-grid { display: flex; flex-wrap: nowrap; overflow-x: auto; overflow-y: auto; gap: 10px; padding: 10px; padding-top: 15px; flex: 1; align-items: flex-start; scroll-behavior: smooth; }
        .kds-grid::-webkit-scrollbar { height: 8px; width: 6px;}
        .kds-grid::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px;}

        /* Ticket compact */
        .ticket { min-width: 220px; max-width: 220px; flex-shrink: 0; background: var(--panel); border: 1px solid var(--border-strong); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: var(--shadow-subtle); transition: transform 0.2s; margin-bottom: 5px; }
        .ticket-header { background: rgba(0,0,0,0.4); padding: 6px 10px; border-bottom: 1px solid var(--border-strong); display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 0.9rem; letter-spacing: 0.5px;}
        .ticket-time { font-size: 0.7rem; color: var(--text-muted); font-weight: bold; background: rgba(255,255,255,0.05); padding: 2px 5px; border-radius: 4px;}
        .ticket-obs { background: rgba(251, 191, 36, 0.1); color: var(--gold); padding: 6px 10px; font-size: 0.75rem; font-weight: bold; border-bottom: 1px solid var(--border-strong); letter-spacing: 0.5px;}
        .ticket-item { padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        
        .item-name { font-size: 0.95rem; font-weight: 700; color: var(--text-main); line-height: 1.2;}
        .item-qty { color: var(--accent); font-weight: 900; margin-right: 6px; font-size: 1rem; background: rgba(52, 211, 153, 0.1); padding: 1px 5px; border-radius: 4px;}
        
        .btn-ready { background: transparent; border: 2px solid var(--border-strong); color: var(--text-muted); width: 30px; height: 30px; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 1rem; cursor: pointer; transition: all 0.2s; z-index: 10;}
        .btn-ready:hover { border-color: var(--accent); color: var(--accent); background: rgba(52, 211, 153, 0.1); }
        
        /* Alertes dynamiques */
        .fired-static { background-color: rgba(239, 68, 68, 0.05) !important; border-left: 3px solid var(--alert) !important; }
        .fired-late { animation: alert-reclam 1.2s infinite; border-left: 4px solid var(--alert) !important; }
        .suite-static { background: linear-gradient(90deg, rgba(167, 139, 250, 0.15) 0%, rgba(30, 41, 59, 0) 100%) !important; border-left: 4px solid var(--purple) !important; }
        .suite-late { animation: alert-suite 1.2s infinite; border-left: 4px solid var(--purple) !important; }

        @keyframes alert-reclam { 0% { background-color: rgba(239, 68, 68, 0.05); } 50% { background-color: rgba(239, 68, 68, 0.2); } 100% { background-color: rgba(239, 68, 68, 0.05); } }
        @keyframes alert-suite { 0% { background-color: rgba(167, 139, 250, 0.05); } 50% { background-color: rgba(167, 139, 250, 0.25); } 100% { background-color: rgba(167, 139, 250, 0.05); } }

        .priority-badge { position: absolute; top: -6px; left: -6px; background: var(--bg); width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; border: 2px solid; z-index: 50; font-size: 0.8rem; box-shadow: var(--shadow-subtle); }
        
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(9, 14, 23, 0.95); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal.open { display: flex !important; }

        .btn-alerte-massive { width: 100%; padding: 15px; margin-bottom: 12px; font-size: 1rem; font-weight: 800; text-transform: uppercase; border-radius: 10px; cursor: pointer; border: 2px solid; transition: all 0.2s; background: var(--bg); color: var(--text-main); }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="recap-modal" class="modal">
        <div style="background:var(--panel); padding:30px; border-radius:16px; width: 700px; max-width: 95%; max-height: 90vh; display: flex; flex-direction: column; border: 1px solid var(--accent); box-shadow: var(--shadow-deep);">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border-strong); padding-bottom: 15px; margin-bottom: 15px;">
                <h2 style="color:var(--accent); font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 1px;">🧮 SYNTHÈSE DE PRODUCTION</h2>
                <button class="nav-btn" style="border-color: var(--border-strong); color: var(--text-muted);" onclick="closeRecapModal()">✕ FERMER</button>
            </div>
            <div id="recap-content" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:15px; padding-right: 5px;"></div>
        </div>
    </div>

    <header>
        <div class="header-left">
            <h1 class="logo-text">🔥 LE PASS</h1>
            <div id="clock" class="clock">00:00:00</div>
            
            <button class="btn-call-salle" onclick="callService()">🛎️ APPEL SALLE</button>
            <button class="nav-btn recap" onclick="openRecapModal()">🧮 RÉCAP' PROD</button>
            
            <div id="resa-ticker" class="resa-ticker">
                <span id="resa-text">Synchronisation Réservations...</span>
            </div>
        </div>
        <div class="nav-btns">
            <button class="nav-btn active" id="tab-kds" onclick="switchTab('kds')">📝 LES BONS</button>
            <button class="nav-btn" id="tab-history" onclick="switchTab('history')">📜 HISTO</button>
            <button class="nav-btn" id="tab-menu" onclick="switchTab('menu')">📋 STOCKS (86)</button>
            <button class="nav-btn" style="border-color: var(--purple); color: var(--purple); background: rgba(167, 139, 250, 0.1);" onclick="window.open('rh.html', '_blank');">👥 GESTION RH</button>
            <button class="nav-btn" onclick="openKdsConfig()"><span style="font-size: 1.2rem;">⚙️</span> CONFIG</button>
        </div>
    </header>

    <div id="mod-kds" class="module active">
        <div class="kds-scroll-area" id="kds-lanes-container"></div>
    </div>

    <div id="mod-history" class="module" style="padding: 20px;">
        <h2 style="color:var(--text-main); margin:0; text-transform: uppercase;">📜 HISTORIQUE DU JOUR</h2>
        <div id="history-container" style="display: flex; flex-direction: column; gap: 15px; flex: 1; overflow-y: auto; margin-top: 20px;"></div>
    </div>

    <div id="mod-menu" class="module" style="padding: 20px; overflow-y: auto;">
        <h2 style="color:var(--text-main); margin:0; text-transform: uppercase;">📋 GESTION DES RUPTURES (86)</h2>
        <div id="menu-stock-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px;"></div>
    </div>

    <script>
        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    let url = (window.location.protocol === 'file:') ? 'https://tableau-system.onrender.com/get-current-state' : '/get-current-state';
                    let r = await fetch(url);
                    if(r.ok) state = await r.json();
                } catch(e) { state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} }; }
                return state;
            },
            update: async (key, data) => {
                let isOrder = !key.includes('MASTER') && !key.includes('ARCHIVE') && !key.includes('SUPPLIER') && !key.includes('PLANNING') && !key.includes('MENU');
                let payload = isOrder ? data : { data: data };
                let state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                if (data === null) delete state.activeOrders[key]; else state.activeOrders[key] = payload;
                localStorage.setItem('EMPIRE_GLOBAL_SYNC', JSON.stringify(state));
                let url = (window.location.protocol === 'file:') ? 'https://tableau-system.onrender.com/update-order' : '/update-order';
                try { await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: key, order: data === null ? null : payload }) }); } catch(e) {}
            }
        };

        let kdsConfig = JSON.parse(localStorage.getItem('empire_kds_config')) || [
            { id: 1, name: "ENTRÉES", color: "#34d399", timer: 15 },
            { id: 2, name: "PLATS", color: "#fbbf24", timer: 20 },
            { id: 3, name: "DESSERTS", color: "#a78bfa", timer: 10 }
        ];
        
        let kdsDirection = localStorage.getItem('empire_kds_direction') || 'ltr';
        let activeOrders = {};
        let menuData = null;

        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour12:false}); 
            if (document.getElementById('mod-kds').classList.contains('active')) renderKDS(); 
        }, 1000);

        setInterval(fetchSystemState, 2500);

        async function fetchSystemState() {
            try {
                const state = await API.getState();
                if (state && state.activeOrders) {
                    activeOrders = state.activeOrders;
                    if (activeOrders['MENU_MASTER']) menuData = activeOrders['MENU_MASTER'].data;
                    if (document.getElementById('mod-menu').classList.contains('active')) renderMenuStock();
                }
            } catch (e) {}
        }

        function buildKdsLanesDOM() {
            const container = document.getElementById('kds-lanes-container');
            if(!container) return;
            let flexDir = kdsDirection === 'rtl' ? 'row-reverse' : 'row';
            container.innerHTML = kdsConfig.map(lane => `
                <div class="lane-wrapper" style="border-top: 4px solid ${lane.color};">
                    <div class="timer-floating-badge" style="color: ${lane.color};">
                        ⏱️ <input type="number" onchange="updateLaneTimerInline(${lane.id}, this.value)" class="timer-input" style="color:${lane.color};" value="${lane.timer}">
                    </div>
                    <div id="kds-grid-${lane.id}" class="kds-grid" style="flex-direction: ${flexDir};"></div>
                </div>
            `).join('');
        }

        function determineCourse(item) {
            if (item.course) return parseInt(item.course);
            let n = (item.n || "").toLowerCase();
            if (/\b(entrée|entree|salade|soupe|planche|tapas)\b/i.test(n)) return 1;
            if (/\b(dessert|glace|gâteau|tarte|tiramisu)\b/i.test(n)) return 3;
            return 2;
        }

        function renderKDS() {
            let lanes = { 1: [], 2: [], 3: [] };
            kdsConfig.forEach(c => lanes[c.id] = []);

            for (let tableId in activeOrders) {
                if (tableId.includes('MASTER') || tableId.includes('ARCHIVE')) continue;
                let orderData = activeOrders[tableId];
                if (!orderData || !orderData.items) continue;

                let pending = orderData.items.filter(i => !i.done && i.dest !== 'bar');
                pending.forEach(item => {
                    let cId = determineCourse(item);
                    if(lanes[cId]) lanes[cId].push({ tableId, orderData, item });
                });
            }

            kdsConfig.forEach(cfg => {
                let grid = document.getElementById(`kds-grid-${cfg.id}`);
                if(!grid) return;
                
                grid.innerHTML = lanes[cfg.id].map((ticket, idx) => {
                    let { tableId, orderData, item } = ticket;
                    let isLate = (Date.now() - (item.firedTime || item.itemId)) > (cfg.timer * 60000);
                    let rowClass = item.fired ? (isLate ? "fired-late" : "fired-static") : "";
                    
                    return `
                    <div class="ticket ${rowClass}">
                        <div class="priority-badge" style="color:var(--gold); border-color:var(--gold);">${idx+1}</div>
                        <div class="ticket-header">
                            <span>T.${tableId}</span>
                            <span class="ticket-time">${orderData.time || ''}</span>
                        </div>
                        <div class="ticket-item">
                            <div class="item-details">
                                <div><span class="item-qty">${item.qty}x</span><span class="item-name">${item.n}</span></div>
                            </div>
                            <div class="btn-ready" onclick="markItemReady('${tableId}', '${item.id}')">✓</div>
                        </div>
                    </div>`;
                }).join('') || `<div style="text-align:center; color:var(--text-muted); width:100%; padding:20px;">Vide</div>`;
            });
        }

        async function markItemReady(tableId, itemId) {
            let order = activeOrders[tableId];
            let item = order.items.find(i => i.id == itemId);
            if(item) {
                item.done = true;
                await API.update(tableId, order);
                renderKDS();
            }
        }

        function renderMenuStock() {
            const container = document.getElementById('menu-stock-container');
            if (!container || !menuData) return;
            let all = [];
            for (let cat in menuData) {
                menuData[cat].forEach(item => all.push({ ...item, cat, stockVal: item.stock || 0 }));
            }
            all.sort((a,b) => a.stockVal - b.stockVal);
            container.innerHTML = all.map(item => `
                <div style="background:var(--panel); border:1px solid ${item.stockVal==0?'var(--alert)':'var(--border)'}; padding:15px; border-radius:12px;">
                    <div style="font-size:0.7rem; color:var(--text-muted);">${item.cat}</div>
                    <div style="font-weight:900; margin-bottom:10px;">${item.name}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button onclick="updateStock86('${item.cat}', ${item.id}, -1)">-</button>
                        <span style="font-size:1.5rem; font-weight:900;">${item.stockVal}</span>
                        <button onclick="updateStock86('${item.cat}', ${item.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStock86(cat, id, delta) {
            let item = menuData[cat].find(x => x.id === id);
            if(item) {
                item.stock = Math.max(0, (item.stock || 0) + delta);
                await API.update('MENU_MASTER', menuData);
                renderMenuStock();
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mod-'+tab).classList.add('active');
            document.getElementById('tab-'+tab).classList.add('active');
        }

        async function callService() {
            await API.update('ALERTS_MASTER', { timestamp: Date.now(), message: "🚨 LE CHEF DEMANDE LA SALLE AU PASSE !" });
            alert("🛎️ Appel envoyé à la salle !");
        }

        async function boot() { 
            buildKdsLanesDOM(); 
            await fetchSystemState(); 
            renderKDS(); 
        }
        boot();
    </script>
</body>

        .module { display: none; flex: 1; overflow: hidden; }
        .module.active { display: flex; flex-direction: column; }

        /* 🚀 ARCHITECTURE KDS "1 PLAT = 1 TICKET" 🚀 */
        #mod-kds { gap: 8px; padding: 2px 0; }
        .lane-wrapper { display: flex; flex-direction: column; flex: 1; min-height: 0; background: rgba(0,0,0,0.2); border: 1px solid var(--border-strong); border-radius: 8px; overflow: hidden; position: relative; }
        
        .timer-floating-badge { position: absolute; right: 15px; top: 4px; z-index: 10; display: flex; align-items: center; gap: 4px; background: var(--bg); padding: 2px 6px; border-radius: 4px; border: 1px solid var(--border-strong); box-shadow: var(--shadow-subtle); }
        .timer-input { width: 32px; padding: 0px 2px; text-align: center; background: transparent; border: none; font-weight: 900; font-family: inherit; font-size: 0.8rem; color: inherit; -moz-appearance: textfield; }

        .kds-grid { display: flex; flex-wrap: nowrap; overflow-x: auto; overflow-y: auto; gap: 10px; padding: 10px; padding-top: 15px; flex: 1; align-items: flex-start; scroll-behavior: smooth; }
        .kds-grid::-webkit-scrollbar { height: 8px; width: 6px;}
        .kds-grid::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 4px;}

        /* Ticket compact */
        .ticket { min-width: 220px; max-width: 220px; flex-shrink: 0; background: var(--panel); border: 1px solid var(--border-strong); border-radius: 8px; display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: var(--shadow-subtle); transition: transform 0.2s; margin-bottom: 5px; }
        .ticket-header { background: rgba(0,0,0,0.4); padding: 6px 10px; border-bottom: 1px solid var(--border-strong); display: flex; justify-content: space-between; align-items: center; font-weight: 800; font-size: 0.9rem; letter-spacing: 0.5px;}
        .ticket-time { font-size: 0.7rem; color: var(--text-muted); font-weight: bold; background: rgba(255,255,255,0.05); padding: 2px 5px; border-radius: 4px;}
        .ticket-obs { background: rgba(251, 191, 36, 0.1); color: var(--gold); padding: 6px 10px; font-size: 0.75rem; font-weight: bold; border-bottom: 1px solid var(--border-strong); letter-spacing: 0.5px;}
        .ticket-item { padding: 8px 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: background 0.2s; }
        
        .item-name { font-size: 0.95rem; font-weight: 700; color: var(--text-main); line-height: 1.2;}
        .item-qty { color: var(--accent); font-weight: 900; margin-right: 6px; font-size: 1rem; background: rgba(52, 211, 153, 0.1); padding: 1px 5px; border-radius: 4px;}
        
        .btn-ready { background: transparent; border: 2px solid var(--border-strong); color: var(--text-muted); width: 30px; height: 30px; border-radius: 6px; display: flex; justify-content: center; align-items: center; font-size: 1rem; cursor: pointer; transition: all 0.2s; z-index: 10;}
        .btn-ready:hover { border-color: var(--accent); color: var(--accent); background: rgba(52, 211, 153, 0.1); }
        
        /* Alertes dynamiques */
        .fired-static { background-color: rgba(239, 68, 68, 0.05) !important; border-left: 3px solid var(--alert) !important; }
        .fired-late { animation: alert-reclam 1.2s infinite; border-left: 4px solid var(--alert) !important; }
        .suite-static { background: linear-gradient(90deg, rgba(167, 139, 250, 0.15) 0%, rgba(30, 41, 59, 0) 100%) !important; border-left: 4px solid var(--purple) !important; }
        .suite-late { animation: alert-suite 1.2s infinite; border-left: 4px solid var(--purple) !important; }

        @keyframes alert-reclam { 0% { background-color: rgba(239, 68, 68, 0.05); } 50% { background-color: rgba(239, 68, 68, 0.2); } 100% { background-color: rgba(239, 68, 68, 0.05); } }
        @keyframes alert-suite { 0% { background-color: rgba(167, 139, 250, 0.05); } 50% { background-color: rgba(167, 139, 250, 0.25); } 100% { background-color: rgba(167, 139, 250, 0.05); } }

        .priority-badge { position: absolute; top: -6px; left: -6px; background: var(--bg); width: 24px; height: 24px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-weight: 900; border: 2px solid; z-index: 50; font-size: 0.8rem; box-shadow: var(--shadow-subtle); }
        
        .modal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(9, 14, 23, 0.95); z-index: 20000; display: none; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal.open { display: flex !important; }

        .btn-alerte-massive { width: 100%; padding: 15px; margin-bottom: 12px; font-size: 1rem; font-weight: 800; text-transform: uppercase; border-radius: 10px; cursor: pointer; border: 2px solid; transition: all 0.2s; background: var(--bg); color: var(--text-main); }
    </style>
</head>
<body>

    <div id="toast-container"></div>

    <div id="recap-modal" class="modal">
        <div style="background:var(--panel); padding:30px; border-radius:16px; width: 700px; max-width: 95%; max-height: 90vh; display: flex; flex-direction: column; border: 1px solid var(--accent); box-shadow: var(--shadow-deep);">
            <div style="display:flex; justify-content:space-between; align-items:center; border-bottom: 1px solid var(--border-strong); padding-bottom: 15px; margin-bottom: 15px;">
                <h2 style="color:var(--accent); font-size: 1.5rem; margin: 0; text-transform: uppercase; letter-spacing: 1px;">🧮 SYNTHÈSE DE PRODUCTION</h2>
                <button class="nav-btn" style="border-color: var(--border-strong); color: var(--text-muted);" onclick="closeRecapModal()">✕ FERMER</button>
            </div>
            <div id="recap-content" style="flex:1; overflow-y:auto; display:flex; flex-direction:column; gap:15px; padding-right: 5px;"></div>
        </div>
    </div>

    <header>
        <div class="header-left">
            <h1 class="logo-text">🔥 LE PASS</h1>
            <div id="clock" class="clock">00:00:00</div>
            
            <button class="btn-call-salle" onclick="callService()">🛎️ APPEL SALLE</button>
            <button class="nav-btn recap" onclick="openRecapModal()">🧮 RÉCAP' PROD</button>
            
            <div id="resa-ticker" class="resa-ticker">
                <span id="resa-text">Synchronisation Réservations...</span>
            </div>
        </div>
        <div class="nav-btns">
            <button class="nav-btn active" id="tab-kds" onclick="switchTab('kds')">📝 LES BONS</button>
            <button class="nav-btn" id="tab-history" onclick="switchTab('history')">📜 HISTO</button>
            <button class="nav-btn" id="tab-menu" onclick="switchTab('menu')">📋 STOCKS (86)</button>
            <button class="nav-btn" style="border-color: var(--purple); color: var(--purple); background: rgba(167, 139, 250, 0.1);" onclick="window.open('rh.html', '_blank');">👥 GESTION RH</button>
            <button class="nav-btn" onclick="openKdsConfig()"><span style="font-size: 1.2rem;">⚙️</span> CONFIG</button>
        </div>
    </header>

    <div id="mod-kds" class="module active">
        <div class="kds-scroll-area" id="kds-lanes-container"></div>
    </div>

    <div id="mod-history" class="module" style="padding: 20px;">
        <h2 style="color:var(--text-main); margin:0; text-transform: uppercase;">📜 HISTORIQUE DU JOUR</h2>
        <div id="history-container" style="display: flex; flex-direction: column; gap: 15px; flex: 1; overflow-y: auto; margin-top: 20px;"></div>
    </div>

    <div id="mod-menu" class="module" style="padding: 20px; overflow-y: auto;">
        <h2 style="color:var(--text-main); margin:0; text-transform: uppercase;">📋 GESTION DES RUPTURES (86)</h2>
        <div id="menu-stock-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 20px;"></div>
    </div>

    <script>
        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    let url = (window.location.protocol === 'file:') ? 'https://tableau-system.onrender.com/get-current-state' : '/get-current-state';
                    let r = await fetch(url);
                    if(r.ok) state = await r.json();
                } catch(e) { state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} }; }
                return state;
            },
            update: async (key, data) => {
                let isOrder = !key.includes('MASTER') && !key.includes('ARCHIVE') && !key.includes('SUPPLIER') && !key.includes('PLANNING') && !key.includes('MENU');
                let payload = isOrder ? data : { data: data };
                let state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                if (data === null) delete state.activeOrders[key]; else state.activeOrders[key] = payload;
                localStorage.setItem('EMPIRE_GLOBAL_SYNC', JSON.stringify(state));
                let url = (window.location.protocol === 'file:') ? 'https://tableau-system.onrender.com/update-order' : '/update-order';
                try { await fetch(url, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ tableId: key, order: data === null ? null : payload }) }); } catch(e) {}
            }
        };

        let kdsConfig = JSON.parse(localStorage.getItem('empire_kds_config')) || [
            { id: 1, name: "ENTRÉES", color: "#34d399", timer: 15 },
            { id: 2, name: "PLATS", color: "#fbbf24", timer: 20 },
            { id: 3, name: "DESSERTS", color: "#a78bfa", timer: 10 }
        ];
        
        let kdsDirection = localStorage.getItem('empire_kds_direction') || 'ltr';
        let activeOrders = {};
        let menuData = null;

        setInterval(() => { 
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour12:false}); 
            if (document.getElementById('mod-kds').classList.contains('active')) renderKDS(); 
        }, 1000);

        setInterval(fetchSystemState, 2500);

        async function fetchSystemState() {
            try {
                const state = await API.getState();
                if (state && state.activeOrders) {
                    activeOrders = state.activeOrders;
                    if (activeOrders['MENU_MASTER']) menuData = activeOrders['MENU_MASTER'].data;
                    if (document.getElementById('mod-menu').classList.contains('active')) renderMenuStock();
                }
            } catch (e) {}
        }

        function buildKdsLanesDOM() {
            const container = document.getElementById('kds-lanes-container');
            if(!container) return;
            let flexDir = kdsDirection === 'rtl' ? 'row-reverse' : 'row';
            container.innerHTML = kdsConfig.map(lane => `
                <div class="lane-wrapper" style="border-top: 4px solid ${lane.color};">
                    <div class="timer-floating-badge" style="color: ${lane.color};">
                        ⏱️ <input type="number" onchange="updateLaneTimerInline(${lane.id}, this.value)" class="timer-input" style="color:${lane.color};" value="${lane.timer}">
                    </div>
                    <div id="kds-grid-${lane.id}" class="kds-grid" style="flex-direction: ${flexDir};"></div>
                </div>
            `).join('');
        }

        function determineCourse(item) {
            if (item.course) return parseInt(item.course);
            let n = (item.n || "").toLowerCase();
            if (/\b(entrée|entree|salade|soupe|planche|tapas)\b/i.test(n)) return 1;
            if (/\b(dessert|glace|gâteau|tarte|tiramisu)\b/i.test(n)) return 3;
            return 2;
        }

        function renderKDS() {
            let lanes = { 1: [], 2: [], 3: [] };
            kdsConfig.forEach(c => lanes[c.id] = []);

            for (let tableId in activeOrders) {
                if (tableId.includes('MASTER') || tableId.includes('ARCHIVE')) continue;
                let orderData = activeOrders[tableId];
                if (!orderData || !orderData.items) continue;

                let pending = orderData.items.filter(i => !i.done && i.dest !== 'bar');
                pending.forEach(item => {
                    let cId = determineCourse(item);
                    if(lanes[cId]) lanes[cId].push({ tableId, orderData, item });
                });
            }

            kdsConfig.forEach(cfg => {
                let grid = document.getElementById(`kds-grid-${cfg.id}`);
                if(!grid) return;
                
                grid.innerHTML = lanes[cfg.id].map((ticket, idx) => {
                    let { tableId, orderData, item } = ticket;
                    let isLate = (Date.now() - (item.firedTime || item.itemId)) > (cfg.timer * 60000);
                    let rowClass = item.fired ? (isLate ? "fired-late" : "fired-static") : "";
                    
                    return `
                    <div class="ticket ${rowClass}">
                        <div class="priority-badge" style="color:var(--gold); border-color:var(--gold);">${idx+1}</div>
                        <div class="ticket-header">
                            <span>T.${tableId}</span>
                            <span class="ticket-time">${orderData.time || ''}</span>
                        </div>
                        <div class="ticket-item">
                            <div class="item-details">
                                <div><span class="item-qty">${item.qty}x</span><span class="item-name">${item.n}</span></div>
                            </div>
                            <div class="btn-ready" onclick="markItemReady('${tableId}', '${item.id}')">✓</div>
                        </div>
                    </div>`;
                }).join('') || `<div style="text-align:center; color:var(--text-muted); width:100%; padding:20px;">Vide</div>`;
            });
        }

        async function markItemReady(tableId, itemId) {
            let order = activeOrders[tableId];
            let item = order.items.find(i => i.id == itemId);
            if(item) {
                item.done = true;
                await API.update(tableId, order);
                renderKDS();
            }
        }

        function renderMenuStock() {
            const container = document.getElementById('menu-stock-container');
            if (!container || !menuData) return;
            let all = [];
            for (let cat in menuData) {
                menuData[cat].forEach(item => all.push({ ...item, cat, stockVal: item.stock || 0 }));
            }
            all.sort((a,b) => a.stockVal - b.stockVal);
            container.innerHTML = all.map(item => `
                <div style="background:var(--panel); border:1px solid ${item.stockVal==0?'var(--alert)':'var(--border)'}; padding:15px; border-radius:12px;">
                    <div style="font-size:0.7rem; color:var(--text-muted);">${item.cat}</div>
                    <div style="font-weight:900; margin-bottom:10px;">${item.name}</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button onclick="updateStock86('${item.cat}', ${item.id}, -1)">-</button>
                        <span style="font-size:1.5rem; font-weight:900;">${item.stockVal}</span>
                        <button onclick="updateStock86('${item.cat}', ${item.id}, 1)">+</button>
                    </div>
                </div>
            `).join('');
        }

        async function updateStock86(cat, id, delta) {
            let item = menuData[cat].find(x => x.id === id);
            if(item) {
                item.stock = Math.max(0, (item.stock || 0) + delta);
                await API.update('MENU_MASTER', menuData);
                renderMenuStock();
            }
        }

        function switchTab(tab) {
            document.querySelectorAll('.module').forEach(m => m.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mod-'+tab).classList.add('active');
            document.getElementById('tab-'+tab).classList.add('active');
        }

        async function callService() {
            await API.update('ALERTS_MASTER', { timestamp: Date.now(), message: "🚨 LE CHEF DEMANDE LA SALLE AU PASSE !" });
            alert("🛎️ Appel envoyé à la salle !");
        }

        async function boot() { 
            buildKdsLanesDOM(); 
            await fetchSystemState(); 
            renderKDS(); 
        }
        boot();
    </script>
</body>
</html>
