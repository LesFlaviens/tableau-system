<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Laboratoire du Chef Master</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --gold: #ffb300; --mercuriale: #2979ff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px); background-size: 30px 30px; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-nav:hover { border-color: var(--accent); background: #222; }

        .tabs-container { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { flex: 1; padding: 15px; background: #111; border: 2px solid #333; color: #888; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 8px; }
        .tab-btn.active { border-color: var(--gold); color: #fff; background: rgba(255, 179, 0, 0.1); }

        .view-section { display: none; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .module-container { background: var(--panel); border: 1px solid #333; padding: 30px; border-radius: 12px; }
        .form-add { display: flex; gap: 10px; margin-bottom: 20px; background: #0a0a0a; padding: 15px; border-radius: 8px; border: 1px solid #222; align-items: flex-end;}
        .input-base { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-weight: bold; }

        .menu-item-row { display: grid; grid-template-columns: 1fr 2fr 100px 100px 50px; gap: 10px; background: #000; padding: 10px; border-radius: 4px; border-bottom: 1px solid #222; align-items: center; margin-bottom: 5px;}
        
        .btn-propulse { width: 100%; padding: 20px; background: var(--accent); color: #000; border: none; border-radius: 8px; font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="margin:0; text-transform:uppercase; letter-spacing:2px;">🔪 LE LABORATOIRE DU CHEF</h1>
            <p style="color:var(--gold); margin:5px 0 0 0; font-weight: bold;">PILOTAGE DE L'EMPIRE 24/7</p>
        </div>
        <div style="display:flex; gap:10px;">
            <a href="rh.html" class="btn-nav" style="border-color:#2979ff; color:#2979ff;">👔 DIRECTION</a>
            <a href="production.html" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">🔥 CUISINE</a>
        </div>
    </header>

    <div class="tabs-container">
        <button class="tab-btn active" onclick="switchTab(this, 'menu-live')">🗂️ GESTION CARTE LIVE</button>
        <button class="tab-btn" onclick="switchTab(this, 'food-cost')">📄 FOOD COST</button>
        <button class="tab-btn" onclick="switchTab(this, 'merc')">🥩 MERCURIALE</button>
    </div>

    <div id="view-menu-live" class="view-section" style="display: block;">
        <div class="module-container">
            <h2 style="color:var(--gold); margin-top:0;">ÉDITION DE LA CARTE RESTAURANT</h2>
            <p style="color:#888;">Toute modification ici sera transmise instantanément au menu client et aux serveurs.</p>
            
            <div class="form-add">
                <div style="flex:1">
                    <label style="font-size:0.7rem; color:#888;">NOM DU PLAT</label>
                    <input type="text" id="m-name" class="input-base" placeholder="ex: Burger Empire">
                </div>
                <div style="flex:1">
                    <label style="font-size:0.7rem; color:#888;">CATÉGORIE</label>
                    <select id="m-cat" class="input-base">
                        <option value="Entrées">Entrées</option>
                        <option value="Plats de résistance">Plats</option>
                        <option value="Desserts">Desserts</option>
                        <option value="Boissons & Bar">Boissons</option>
                    </select>
                </div>
                <div style="width:100px">
                    <label style="font-size:0.7rem; color:#888;">PRIX (€)</label>
                    <input type="number" id="m-price" class="input-base" step="0.50" placeholder="18.00">
                </div>
                <button onclick="addMenuItem()" class="btn-nav" style="background:var(--gold); color:#000; border:none; height:45px;">AJOUTER</button>
            </div>

            <div id="menu-live-list" style="margin-top:20px;">
                </div>

            <button class="btn-propulse" onclick="propulserMenu()">🚀 PROPULSER LA MISE À JOUR SUR TOUT LE RÉSEAU</button>
        </div>
    </div>

    <div id="view-food-cost" class="view-section">
        <div class="module-container"><h2>CALCULS FOOD COST</h2><p>Interface R&D classique.</p></div>
    </div>
    
    <div id="view-merc" class="view-section">
        <div class="module-container"><h2>MERCURIALE INGRÉDIENTS</h2><p>Gestion des prix d'achat.</p></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let menuEmpire = JSON.parse(localStorage.getItem('kds_menu_empire')) || [];

        function switchTab(btn, viewId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.view-section').forEach(v => v.style.display = 'none');
            btn.classList.add('active');
            document.getElementById('view-' + viewId).style.display = 'block';
        }

        function renderMenuLive() {
            const container = document.getElementById('menu-live-list');
            container.innerHTML = menuEmpire.map((item, idx) => `
                <div class="menu-item-row">
                    <b style="color:var(--gold)">${item.category}</b>
                    <span>${item.name}</span>
                    <input type="number" step="0.5" value="${item.price}" onchange="updatePrice(${idx}, this.value)" style="background:#111; border:1px solid #333; color:var(--accent); font-weight:900; padding:5px; width:70px;">
                    <span style="color:var(--sub)">€</span>
                    <button onclick="deleteMenuItem(${idx})" style="background:none; border:none; color:var(--alert); cursor:pointer;">✕</button>
                </div>
            `).join('');
            localStorage.setItem('kds_menu_empire', JSON.stringify(menuEmpire));
        }

        function addMenuItem() {
            const name = document.getElementById('m-name').value;
            const category = document.getElementById('m-cat').value;
            const price = parseFloat(document.getElementById('m-price').value);
            if(!name || isNaN(price)) return;
            menuEmpire.push({ name, category, price, desc: "" });
            renderMenuLive();
        }

        function updatePrice(idx, val) { menuEmpire[idx].price = parseFloat(val); localStorage.setItem('kds_menu_empire', JSON.stringify(menuEmpire)); }
        function deleteMenuItem(idx) { menuEmpire.splice(idx, 1); renderMenuLive(); }

        // LA TÉLÉTRANSMISSION MASTER
        async function propulserMenu() {
            if(!confirm("Mettre à jour tous les écrans du restaurant (Menu client + Serveurs) ?")) return;
            
            const payload = { 
                tableId: 'GLOBAL_MENU', 
                order: { status: 'system', data: menuEmpire } 
            };

            try {
                const res = await fetch('/update-order', { 
                    method: 'POST', 
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload) 
                });
                if(res.ok) alert("✅ EMPIRE SYNCHRONISÉ : La carte est à jour partout.");
            } catch(e) { alert("Erreur de transmission. Vérifiez le serveur."); }
        }

        window.onload = renderMenuLive;
    </script>
</body>
</html>
