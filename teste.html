<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Serveur Master</title>
    <style>
        :root { --bg: #050505; --text: #fff; --sub: #aaa; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: manipulation; }
        
        /* HEADER TOTAL : TOUT SUR UNE LIGNE */
        header { 
            background: #000; border-bottom: 2px solid var(--gold); padding: 10px 20px; 
            display: flex; justify-content: space-between; align-items: center; gap: 15px;
        }
        .header-left { display: flex; align-items: center; gap: 20px; }
        .nav-btns { display: flex; gap: 8px; }
        
        .btn-mini { 
            background: transparent; border: 1px solid #fff; color: #fff; padding: 8px 12px; 
            border-radius: 4px; font-size: 0.75rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
        }
        .btn-mini.gold { border-color: var(--gold); color: var(--gold); }
        .btn-mini.sync { border-color: var(--alert); color: var(--alert); }

        /* PLAN DE SALLE */
        .floor-plan { flex: 1; position: relative; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; padding: 20px; overflow: auto; }
        .table-obj { position: absolute; background: #000; border: 2px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: 900; color: #fff; cursor: pointer; transition: 0.2s; }
        .table-obj.occupied { border-color: var(--alert); color: var(--alert); box-shadow: 0 0 15px rgba(255, 23, 68, 0.4); }
        
        /* CLIGNOTEMENT QUAND PRÊT */
        .table-obj.ready { border-color: var(--accent); color: var(--accent); animation: pulse-ready 1s infinite; box-shadow: 0 0 20px rgba(0, 230, 118, 0.6); }
        @keyframes pulse-ready { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        /* TIROIR COMMANDE */
        .drawer { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; flex-direction: column; }
        .drawer.open { display: flex; }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; overflow-y: auto; }
        .btn-item { background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 6px; font-weight: bold; text-align: left; display: flex; justify-content: space-between; }
        .ticket-view { flex: 0 0 30%; background: #0a0a0a; border-bottom: 1px solid #333; padding: 15px; overflow-y: auto; display: flex; flex-direction: column;}
        .ticket-items-container { flex: 1; overflow-y: auto; }
        
        /* TOTAL ADDITION */
        .ticket-total { padding-top: 10px; border-top: 2px solid #333; margin-top: 10px; font-size: 1.5rem; font-weight: 900; color: var(--gold); text-align: right; }

        /* MODALS INFO */
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 20000; display: none; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .modal.open { display: block; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 10px; cursor: pointer;}

        /* -- MODE ARCHITECTURE -- */
        .edit-mode .table-obj { cursor: move; border-style: dashed; border-color: #2979ff; }
        .edit-mode .table-obj::after {
            content: "⇲"; position: absolute; bottom: 0; right: 0; background: #2979ff; 
            color: #fff; width: 20px; height: 20px; font-size: 14px; display: flex; 
            justify-content: center; align-items: center; cursor: se-resize; border-radius: 4px 0 0 0;
        }
        #archi-tools { display: none; background: #111; padding: 10px; border-top: 1px solid #333; justify-content: space-between; }
        .edit-mode #archi-tools { display: flex; }

        /* --- AJOUTS SÉCURITÉ --- */
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 50000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 20px; }
        .pin-btn { background: #1a1a1a; border: 1px solid #333; color: #fff; font-size: 1.5rem; font-weight: bold; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; transition: 0.1s; }
        .pin-btn:active { background: var(--gold); color: #000; }
        .pin-display { font-size: 2rem; letter-spacing: 10px; margin-bottom: 20px; color: var(--gold); min-height: 40px;}
        .item-delete-btn { background: var(--alert); color: #fff; border: none; padding: 5px 10px; font-weight: bold; cursor: pointer; border-radius: 4px; font-size: 0.7rem;}
        
        /* STYLE POUR L'IMPRESSION (ADDITION) */
        #print-area { display: none; }
        @media print {
            body { height: auto !important; overflow: visible !important; display: block !important; background: #fff !important; color: #000 !important; }
            body > *:not(#print-area) { display: none !important; }
            #print-area { display: block !important; position: relative !important; width: 100% !important; padding: 0 !important; margin: 0 !important; background: #fff !important; color: #000 !important; font-family: monospace; }
            #print-area * { color: #000 !important; text-shadow: none !important; }
        }
    </style>
</head>
<body>

    <div id="print-area"></div>

    <div id="login-screen">
        <h1 style="color:var(--gold); letter-spacing: 3px;">IDENTIFICATION REQUISE</h1>
        <div style="color:#aaa; margin-bottom: 20px;">Entrez votre PIN (Ex: Serveur=1234, Manager=9999)</div>
        <div id="pin-display" class="pin-display"></div>
        <div class="pin-pad">
            <button class="pin-btn" onclick="appendPin(1)">1</button><button class="pin-btn" onclick="appendPin(2)">2</button><button class="pin-btn" onclick="appendPin(3)">3</button>
            <button class="pin-btn" onclick="appendPin(4)">4</button><button class="pin-btn" onclick="appendPin(5)">5</button><button class="pin-btn" onclick="appendPin(6)">6</button>
            <button class="pin-btn" onclick="appendPin(7)">7</button><button class="pin-btn" onclick="appendPin(8)">8</button><button class="pin-btn" onclick="appendPin(9)">9</button>
            <button class="pin-btn" onclick="clearPin()" style="background:#333;">C</button><button class="pin-btn" onclick="appendPin(0)">0</button><button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
        </div>
    </div>

    <header>
        <div class="header-left">
            <div style="font-weight:900; letter-spacing:1px;">EMPIRE PAD</div>
            <div id="stock-tag" style="color:var(--accent); font-weight:900; font-size:0.7rem;">● CONNEXION...</div>
            <div id="user-badge" style="background:#111; padding:5px 10px; border-radius:4px; font-size:0.8rem; color:var(--gold); border:1px solid #333;">Utilisateur: Aucun</div>
        </div>
        <div class="nav-btns">
            <button id="btn-dashboard" class="btn-mini sync" style="display:none;" onclick="openModal('dashboard')">👁️ DASHBOARD DIR.</button>
            <button class="btn-mini" style="border-color: #ea80fc; color: #ea80fc;" onclick="window.open('reservation.html', '_blank')">📅 RÉSA</button>
            <button class="btn-mini" style="border-color: #2979ff; color: #2979ff;" onclick="unlockArchiMode()">🏗️ ARCHI</button>
            <button class="btn-mini gold" onclick="openModal('radar')">⚡ RADAR</button>
            <button class="btn-mini" onclick="openModal('plan')">📅 PLANNING</button>
            <button class="btn-mini gold" onclick="window.open('haccp.html', '_blank')">⚙️ HACCP</button>
            <button class="btn-mini sync" onclick="logout()">🔒 LOGOUT</button>
        </div>
    </header>

    <div id="floor-plan" class="floor-plan"></div>

    <div id="archi-tools">
        <div style="color:#2979ff; font-weight:900;">MODE ÉDITION SALLE ACTIF</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-mini" onclick="addNewTable()">+ NOUVELLE TABLE</button>
            <button class="btn-mini gold" onclick="saveArchitecture()">💾 SAUVEGARDER PLAN</button>
            <button class="btn-mini sync" onclick="closeArchiMode()">QUITTER SANS SAUVER</button>
        </div>
    </div>

    <div id="order-drawer" class="drawer">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h2 id="table-label" style="margin:0;">TABLE</h2>
            <button class="btn-mini" onclick="closeOrder()">FERMER ✕</button>
        </div>
        
        <div style="padding:10px 20px; background:#111; border-bottom:1px solid #333;">
            <input type="text" id="order-obs" placeholder="⚠️ OBSERVATIONS (VIP, Allergies, Cuissons...)" style="width:100%; padding:12px; background:#000; color:var(--alert); border:1px solid #444; border-radius:4px; font-weight:900; box-sizing:border-box;">
        </div>

        <div id="ticket" class="ticket-view">
            <div id="ticket-items" class="ticket-items-container"></div>
            <div id="ticket-total" class="ticket-total">Total: 0.00€</div>
        </div>

        <div style="display:flex; gap:5px; padding:15px 20px; background:#0a0a0a; border-bottom:1px solid #222;">
            <button class="btn-mini" style="flex:1; font-size:0.9rem;" onclick="renderMenu('Entrées')">🥗 ENTRÉES</button>
            <button class="btn-mini gold" style="flex:1; font-size:0.9rem;" onclick="renderMenu('Plats de résistance')">🔥 PLATS</button>
            <button class="btn-mini" style="flex:1; font-size:0.9rem; border-color:#ea80fc; color:#ea80fc;" onclick="renderMenu('Desserts')">🍰 DESSERTS</button>
            <button class="btn-mini" style="flex:1; font-size:0.9rem; border-color:#00e5ff; color:#00e5ff;" onclick="renderMenu('Boissons')">🍸 BOISSONS</button>
        </div>

        <div id="menu" class="menu-grid"></div>
        
        <div style="padding:20px; background:#000; display:flex; gap:10px;">
            <button class="btn-mini gold" style="flex:2; padding:20px; font-size:1rem;" onclick="sendToKitchen()">🚀 ENVOYER (AJOUTER)</button>
            <button class="btn-mini sync" style="flex:1; padding:20px; font-size:1rem; border-color:var(--accent); color:var(--accent);" onclick="processPayment()">💳 ENCAISSER</button>
        </div>
    </div>

    <div id="info-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1 id="modal-title" style="color:var(--gold);">INFO</h1>
            <button class="btn-mini" onclick="closeModal()">FERMER ✕</button>
        </div>
        <div id="modal-body" style="margin-top:30px;"></div>
    </div>

    <audio id="beep-ready" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3" preload="auto"></audio>

    <script>
        // --- DONNÉES GLOBALES ---
        let activeOrders = {}; let currentTable = null; let ticketItems = [];
        let previousOrdersState = {};
        
        // --- INACTIVITÉ (VERROUILLAGE AUTO) ---
        let inactivityTimer;
        const INACTIVITY_LIMIT = 120000; 

        function resetInactivityTimer() {
            clearTimeout(inactivityTimer);
            if(currentUser) inactivityTimer = setTimeout(logout, INACTIVITY_LIMIT);
        }

        ['touchstart', 'click', 'mousemove', 'keypress'].forEach(evt => document.addEventListener(evt, resetInactivityTimer, false));

        // --- LOGIN ---
        let currentUser = null;
        let currentPin = "";
        const USERS = { "1234": { name: "Flavien", role: "Serveur" }, "9999": { name: "Directeur", role: "Manager" } };

        function appendPin(num) { currentPin += num; document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length); resetInactivityTimer(); }
        function clearPin() { currentPin = ""; document.getElementById('pin-display').innerText = ""; resetInactivityTimer(); }
        
        function submitPin() {
            if(USERS[currentPin]) {
                currentUser = USERS[currentPin];
                document.getElementById('user-badge').innerText = `Badge: ${currentUser.name} (${currentUser.role})`;
                document.getElementById('login-screen').style.display = 'none';
                if(currentUser.role === 'Manager') document.getElementById('btn-dashboard').style.display = 'block';
                connectEmpireH24(); resetInactivityTimer();
            } else { alert("❌ PIN Incorrect."); clearPin(); }
        }

        function logout() {
            currentUser = null; currentPin = "";
            document.getElementById('login-screen').style.display = 'flex';
            closeOrder(); closeModal(); closeArchiMode();
            if(ws) ws.close(); clearTimeout(inactivityTimer);
        }

        // --- LOGS ---
        let fraudLog = JSON.parse(localStorage.getItem('empire_fraud_log')) || [];
        function logAction(action, detail, itemsData = null) {
            const time = new Date().toLocaleTimeString('fr-FR');
            fraudLog.unshift({ time, user: currentUser ? currentUser.name : 'Unknown', action, detail, items: itemsData });
            localStorage.setItem('empire_fraud_log', JSON.stringify(fraudLog));
        }

        // --- PLAN ---
        let tables = JSON.parse(localStorage.getItem('empire_architecture')) || [ {label:"T1", l:550, t:500, w:80, h:120} ];

        function renderFloor() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                const div = document.createElement('div'); div.className = 'table-obj';
                if(activeOrders[t.label]) { div.classList.add('occupied'); if(activeOrders[t.label].status === 'ready') div.classList.add('ready'); }
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = t.label; 
                div.onclick = () => openOrder(t.label);
                floor.appendChild(div);
            });
        }

        // --- NETWORK ---
        let ws;
        function connectEmpireH24() {
            ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
            ws.onopen = () => {
                document.getElementById('stock-tag').innerText = "● SYNC H24 ACTIF";
                fetch('/get-current-state').then(r=>r.json()).then(d=>{ activeOrders=d.activeOrders; renderFloor(); });
            };
            ws.onmessage = (e) => {
                const msg = JSON.parse(e.data);
                activeOrders = msg.activeOrders || (msg.state ? msg.state.activeOrders : {});
                renderFloor();
                if (document.getElementById('order-drawer').classList.contains('open')) renderTicket();
            };
        }

        // --- COMMANDES ---
        function openOrder(id) {
            currentTable = id; document.getElementById('table-label').innerText = "TABLE " + id;
            ticketItems = (activeOrders[id] && activeOrders[id].items) ? activeOrders[id].items : [];
            renderTicket(); renderMenu('Plats de résistance');
            document.getElementById('order-drawer').classList.add('open');
        }

        function renderMenu(category) {
            let cuisineMenu = JSON.parse(localStorage.getItem('kds_menu')) || [];
            document.getElementById('menu').innerHTML = cuisineMenu.filter(i => i.category === category).map(i => `
                <div class="btn-item" onclick="addToTicket('${i.name.replace(/'/g, "\\'")}', ${i.price}, 'cuisine')">
                    <span>${i.name}</span><span style="color:var(--gold)">${i.price.toFixed(2)}€</span>
                </div>`).join('');
        }

        function addToTicket(n, p, dest) { ticketItems.push({ id: Date.now()+Math.random(), n, p, done: false, dest: dest }); renderTicket(); }

        // ==========================================================
        // CORRECTION SÉCURITÉ : SUPPRESSION AVEC RAISON OBLIGATOIRE
        // ==========================================================
        function removeTicketItem(index) {
            const item = ticketItems[index];
            
            // On demande obligatoirement la raison
            const raison = prompt(`⚠️ ANNULATION : ${item.n}\nVeuillez saisir la raison de l'annulation (OBLIGATOIRE) :`);
            
            if (raison === null || raison.trim() === "") {
                alert("❌ Action annulée : Vous devez fournir une raison pour supprimer un plat.");
                return; // On arrête tout, le plat reste.
            }

            // Si le plat était déjà envoyé, c'est une alerte de fraude
            if (activeOrders[currentTable] && activeOrders[currentTable].items && activeOrders[currentTable].items.find(i => i.id === item.id)) {
                logAction("ANNULATION PLAT ENVOYÉ", `Table: ${currentTable} | Plat: ${item.n} | RAISON: ${raison}`);
            } else {
                logAction("SUPPRESSION AVANT ENVOI", `Table: ${currentTable} | Plat: ${item.n} | RAISON: ${raison}`);
            }

            ticketItems.splice(index, 1);
            renderTicket();
        }
        
        function renderTicket() {
            let total = 0;
            document.getElementById('ticket-items').innerHTML = ticketItems.map((i, index) => {
                total += i.p;
                const style = i.done ? "text-decoration: line-through; opacity: 0.5;" : "";
                return `<div style="display:flex; justify-content:space-between; align-items:center; padding:8px 0; border-bottom:1px solid #222; ${style}">
                    <span style="flex:1;">${i.n}</span><span style="margin-right:15px;">${i.p.toFixed(2)}€</span>
                    <button class="item-delete-btn" onclick="removeTicketItem(${index})">X</button>
                </div>`;
            }).join('');
            document.getElementById('ticket-total').innerText = `Total: ${total.toFixed(2)}€`;
        }

        async function sendToKitchen() {
            const order = { items: ticketItems, status: 'pending' };
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:currentTable, order}) });
            logAction("ENVOI COMMANDE", `Table: ${currentTable}`, ticketItems);
            closeOrder();
        }

        function closeOrder() { document.getElementById('order-drawer').classList.remove('open'); }
        function openModal(type) { document.getElementById('info-modal').classList.add('open'); }
        function closeModal() { document.getElementById('info-modal').classList.remove('open'); }
    </script>
</body>
</html>
