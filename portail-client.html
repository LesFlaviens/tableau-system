<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChef OS | Configuration du Compte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; 
            --card: #11141d; 
            --accent: #fbbf24; 
            --text-main: #FAF0E6; 
            --text-dim: #9ca3af; 
            --border-color: #2d313a; 
            --success: #10b981; 
            --danger: #ef4444;
        }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
        
        .setup-box { background: var(--card); border: 1px solid var(--border-color); padding: 40px; border-radius: 16px; width: 100%; max-width: 500px; box-shadow: 0 10px 40px rgba(0,0,0,0.5); text-align: center; }
        
        h1 { font-family: 'Playfair Display', serif; color: var(--accent); letter-spacing: 2px; font-size: 2.2rem; margin-top: 0; margin-bottom: 10px; }
        p { color: var(--text-dim); font-size: 0.95rem; line-height: 1.5; margin-bottom: 30px; }
        
        input, select { width: 100%; padding: 15px; background: #000; border: 1px solid var(--border-color); color: white; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: 0.2s; margin-bottom: 15px; font-family: 'Inter', sans-serif;}
        input:focus, select:focus { outline: none; border-color: var(--accent); }
        
        .btn { padding: 15px; border: none; border-radius: 8px; font-weight: 900; font-size: 1rem; cursor: pointer; width: 100%; text-transform: uppercase; transition: 0.2s; background: var(--accent); color: black; margin-top: 10px; }
        .btn:hover { transform: scale(1.02); }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; border: 1px solid #555; }
        
        #success-screen { display: none; }
        .pin-display { font-size: 3rem; font-weight: 900; color: var(--success); letter-spacing: 5px; margin: 20px 0; font-family: monospace; background: rgba(16, 185, 129, 0.1); padding: 15px; border-radius: 8px; border: 1px dashed var(--success); }
    </style>
</head>
<body>

    <div class="setup-box" id="step-1-loading">
        <h1>iCHEF OS</h1>
        <p id="loading-text">Vérification de votre paiement en cours... ⏳</p>
    </div>

    <div class="setup-box" id="step-2-form" style="display: none;">
        <h1>BIENVENUE</h1>
        <p>Paiement confirmé ! ✅<br>Veuillez configurer votre accès administrateur.</p>
        
        <input type="text" id="reg-name" placeholder="Nom de votre Établissement" required>
        
        <input type="text" id="reg-id" placeholder="Choisissez un identifiant (ex: mon-bar-75)" style="text-transform: lowercase;" required title="Sans espaces, lettres et tirets uniquement">
        
        <input type="email" id="reg-email" placeholder="Email du gérant" required>
        
        <select id="reg-plan">
            <option value="CHEF">Licence CHEF PÂTISSIER / BAR (14€)</option>
            <option value="BUSINESS">Licence BUSINESS (45€)</option>
            <option value="PREMIUM" selected>Licence PREMIUM (129€)</option>
        </select>
        
        <button class="btn" id="btn-activate" onclick="activateAccount()">Créer mon infrastructure 🚀</button>
        <p id="error-msg" style="color: var(--danger); font-weight: bold; display: none; margin-top: 15px;"></p>
    </div>

    <div class="setup-box" id="success-screen">
        <h1 style="color: var(--success);">FÉLICITATIONS</h1>
        <p>Votre écosystème iCHEF est prêt. Voici votre <strong>CODE PIN MAÎTRE</strong>. Prenez-le en photo, il vous sera demandé pour déverrouiller vos écrans.</p>
        
        <div class="pin-display" id="generated-pin">----</div>
        
        <button class="btn" onclick="goToAdmin()">Accéder à mon tableau de bord ➔</button>
    </div>

    <script>
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
        ? "http://localhost:10000" 
        : "https://tableau-system.onrender.com";

        const urlParams = new URLSearchParams(window.location.search);
        const session_id = urlParams.get('session_id');
        let currentTenantID = "";

        // Au chargement, on vérifie pourquoi le client est là
        window.onload = () => {
            if (session_id) {
                // Il vient de payer, on affiche le formulaire de création
                document.getElementById('step-1-loading').style.display = 'none';
                document.getElementById('step-2-form').style.display = 'block';
            } else {
                // S'il n'a pas de session_id, il s'est trompé de page.
                const loadingText = document.getElementById('loading-text');
                loadingText.innerHTML = "<span style='color: #ef4444; font-weight:bold;'>⛔ Accès Refusé.</span><br><br>Ce portail est réservé à l'activation des nouveaux comptes après souscription.<br><br><a href='administration.html' style='color: #fbbf24; text-decoration:none; font-weight:bold;'>Se connecter à un compte existant</a>";
            }
        };

        // Fonction pour formater l'ID automatiquement (enlève les espaces)
        document.getElementById('reg-id').addEventListener('input', function(e) {
            this.value = this.value.toLowerCase().replace(/[^a-z0-9-]/g, '-');
        });

        // Activation de la licence
        async function activateAccount() {
            const btn = document.getElementById('btn-activate');
            const errorMsg = document.getElementById('error-msg');
            
            const name = document.getElementById('reg-name').value.trim();
            const id = document.getElementById('reg-id').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const plan = document.getElementById('reg-plan').value;

            if (!name || !id || !email) {
                errorMsg.innerText = "Veuillez remplir tous les champs.";
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerText = "Construction en cours... ⏳";
            errorMsg.style.display = 'none';

            try {
                // On envoie les infos au serveur pour créer la base de données
                const response = await fetch(`${SERVER_URL}/api/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sessionId: session_id, 
                        clientName: name, 
                        tenantID: id, 
                        email: email,
                        plan: plan 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentTenantID = id;
                    
                    // On enregistre les infos dans la tablette du client
                    localStorage.setItem('ichef_tenant_id', id);
                    localStorage.setItem('ichef_master_pin', data.dedicatedPin);

                    // On passe à l'écran de succès
                    document.getElementById('step-2-form').style.display = 'none';
                    document.getElementById('success-screen').style.display = 'block';
                    document.getElementById('generated-pin').innerText = data.dedicatedPin;

                } else {
                    errorMsg.innerText = "❌ Erreur : " + (data.error || "Impossible d'activer le compte.");
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = "Réessayer";
                }
            } catch (err) {
                errorMsg.innerText = "📡 Erreur de connexion au serveur. Réessayez.";
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "Réessayer";
            }
        }

        // Redirection finale
        function goToAdmin() {
            window.location.href = `administration.html?tenantID=${currentTenantID}`;
        }
    </script>
</body>
</html>
