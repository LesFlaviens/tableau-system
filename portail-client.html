<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire OS | Configuration du Compte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; 
            --card: #0A0A0A; 
            --accent: #d4af37; 
            --text-main: #f8fafc; 
            --text-dim: #9ca3af; 
            --border-color: rgba(255, 255, 255, 0.15); 
            --success: #10b981; 
            --danger: #ef4444;
        }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background-image: radial-gradient(circle at 50% 0%, #1a1a1f 0%, transparent 50%);}
        
        .setup-box { background: var(--card); border: 1px solid var(--border-color); padding: 50px 40px; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); text-align: center; box-sizing: border-box; }
        
        h1 { font-family: 'Playfair Display', serif; color: var(--accent); letter-spacing: 4px; font-size: 2.2rem; font-weight: 700; margin-top: 0; margin-bottom: 15px; text-transform: uppercase; }
        p { color: var(--text-dim); font-size: 0.95rem; line-height: 1.6; margin-bottom: 30px; letter-spacing: 1px; text-transform: uppercase; font-weight: 500;}
        
        input { width: 100%; padding: 16px; background: var(--bg); border: 1px solid var(--border-color); color: white; border-radius: 6px; box-sizing: border-box; font-size: 1rem; transition: 0.3s; margin-bottom: 20px; font-family: 'Inter', sans-serif; text-transform: uppercase;}
        input:focus { outline: none; border-color: var(--accent); }
        input::placeholder { text-transform: none; color: #555; }
        
        .btn { padding: 16px; border: none; border-radius: 6px; font-weight: 700; font-size: 0.95rem; cursor: pointer; width: 100%; text-transform: uppercase; letter-spacing: 2px; transition: 0.3s; background: var(--accent); color: black; margin-top: 10px; }
        .btn:hover { background: #fff; }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; border: 1px solid #555; }
        
        .detected-plan { background: rgba(212, 175, 55, 0.05); border: 1px solid rgba(212, 175, 55, 0.3); color: var(--accent); padding: 15px; border-radius: 6px; font-weight: 600; text-transform: uppercase; margin-bottom: 25px; letter-spacing: 1px; font-size: 0.9rem;}

        #success-screen { display: none; }
        .pin-display { font-size: 3rem; font-weight: 900; color: var(--text-main); letter-spacing: 8px; margin: 30px 0; font-family: monospace; background: var(--bg); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); }
    </style>
</head>
<body>

    <div class="setup-box" id="step-1-loading">
        <h1>EMPIRE OS</h1>
        <p id="loading-text" style="color: var(--text-main);">Vérification du paiement en cours...</p>
    </div>

    <div class="setup-box" id="step-2-form" style="display: none;">
        <h1>BIENVENUE</h1>
        <p>Paiement confirmé<br>Configurez votre accès administrateur.</p>
        
        <div class="detected-plan">
            FORFAIT : <span id="display-plan">...</span>
        </div>
        <input type="hidden" id="reg-plan" value="">
        
        <input type="text" id="reg-name" placeholder="Nom de l'établissement" required>
        
        <input type="text" id="reg-id" placeholder="Identifiant (ex: mon-bar-75)" style="text-transform: lowercase;" required title="Sans espaces, lettres et tirets uniquement">
        
        <input type="email" id="reg-email" placeholder="Email du gérant" required>
        
        <input type="tel" id="reg-phone" placeholder="Numéro de téléphone" required>
        
        <button class="btn" id="btn-activate" onclick="activateAccount()">Créer l'infrastructure</button>
        <p id="error-msg" style="color: var(--danger); font-weight: 600; display: none; margin-top: 20px; text-transform: none;"></p>
    </div>

    <div class="setup-box" id="success-screen">
        <h1 style="color: var(--accent);">FÉLICITATIONS</h1>
        <p>Votre écosystème est prêt. Voici votre <strong>CODE PIN MAÎTRE</strong>. Mémorisez-le, il est requis pour déverrouiller vos modules.</p>
        
        <div class="pin-display" id="generated-pin">----</div>
        
        <button class="btn" onclick="goToAdmin()">Accéder au tableau de bord</button>
    </div>

    <script>
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
        ? "http://localhost:10000" 
        : "https://tableau-system.onrender.com";

        const urlParams = new URLSearchParams(window.location.search);
        const session_id = urlParams.get('session_id');
        const urlPlan = urlParams.get('plan') || 'CHEF';
        const urlSpec = urlParams.get('specialite');
        let currentTenantID = "";

        // 🧠 ASSEMBLAGE INTELLIGENT DU FORFAIT (Ex: CHEF + bar = CHEF_BAR)
        let finalDetectedPlan = urlPlan.toUpperCase();
        if (finalDetectedPlan === 'CHEF' && urlSpec) {
            if (urlSpec.toLowerCase() === 'bar') finalDetectedPlan = 'CHEF_BAR';
            if (urlSpec.toLowerCase() === 'patisserie' || urlSpec.toLowerCase() === 'patissier') finalDetectedPlan = 'CHEF_PATISSERIE';
        }

        window.onload = () => {
            if (session_id) {
                // Affichage propre et premium pour le client
                let textAffiche = finalDetectedPlan;
                if(finalDetectedPlan === 'CHEF' || finalDetectedPlan === 'CHEF_CUISINE') textAffiche = 'CHEF CUISINE';
                if(finalDetectedPlan === 'CHEF_BAR') textAffiche = 'CHEF BARMAN';
                if(finalDetectedPlan === 'CHEF_PATISSERIE') textAffiche = 'CHEF PÂTISSIER';

                document.getElementById('display-plan').innerText = textAffiche;
                document.getElementById('reg-plan').value = finalDetectedPlan;

                document.getElementById('step-1-loading').style.display = 'none';
                document.getElementById('step-2-form').style.display = 'block';
            } else {
                const loadingText = document.getElementById('loading-text');
                loadingText.innerHTML = "<span style='color: var(--danger); font-weight:600;'>Accès Refusé.</span><br><br>Ce portail est réservé à l'activation des nouveaux comptes après souscription.<br><br><a href='connexionpartenaire.html' style='color: var(--accent); text-decoration:none; font-weight:600;'>Se connecter à un compte existant</a>";
            }
        };

        document.getElementById('reg-id').addEventListener('input', function(e) {
            this.value = this.value.toLowerCase().replace(/[^a-z0-9-]/g, '-');
        });

        async function activateAccount() {
            const btn = document.getElementById('btn-activate');
            const errorMsg = document.getElementById('error-msg');
            
            const name = document.getElementById('reg-name').value.trim();
            const id = document.getElementById('reg-id').value.trim();
            const email = document.getElementById('reg-email').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const plan = document.getElementById('reg-plan').value;

            if (!name || !id || !email || !phone) {
                errorMsg.innerText = "Veuillez remplir tous les champs.";
                errorMsg.style.display = 'block';
                return;
            }

            if (!/^[a-z0-9-]+$/.test(id)) {
                errorMsg.innerText = "L'identifiant ne doit contenir que des minuscules et des tirets.";
                errorMsg.style.display = 'block';
                return;
            }

            btn.disabled = true;
            btn.innerText = "INITIALISATION...";
            errorMsg.style.display = 'none';

            try {
                const response = await fetch(`${SERVER_URL}/api/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        sessionId: session_id, 
                        clientName: name, 
                        tenantID: id, 
                        email: email,
                        phone: phone,
                        plan: finalDetectedPlan, // Envoi du forfait exactement assemblé (CHEF_BAR)
                        specialite: urlSpec || 'cuisine' 
                    })
                });

                const data = await response.json();

                if (data.success) {
                    currentTenantID = id;
                    
                    localStorage.setItem('ichef_tenant_id', id);
                    localStorage.setItem('ichef_master_pin', data.dedicatedPin);
                    localStorage.setItem('ichef_email', email);
                    localStorage.setItem('ichef_phone', phone);

                    document.getElementById('step-2-form').style.display = 'none';
                    document.getElementById('success-screen').style.display = 'block';
                    document.getElementById('generated-pin').innerText = data.dedicatedPin;

                } else {
                    errorMsg.innerText = "Erreur : " + (data.error || "Impossible d'activer le compte. L'identifiant est peut-être déjà pris.");
                    errorMsg.style.display = 'block';
                    btn.disabled = false;
                    btn.innerText = "CRÉER L'INFRASTRUCTURE";
                }
            } catch (err) {
                errorMsg.innerText = "Erreur de connexion au réseau. Veuillez réessayer.";
                errorMsg.style.display = 'block';
                btn.disabled = false;
                btn.innerText = "CRÉER L'INFRASTRUCTURE";
            }
        }

        function goToAdmin() {
            window.location.href = `administration.html?tenantID=${currentTenantID}`;
        }
    </script>
</body>
</html>
