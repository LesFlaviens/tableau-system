<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, private">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' https://tableau-system.onrender.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; img-src 'self' data:; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; form-action 'self'; upgrade-insecure-requests">

    <title>iCHEF OS | Déploiement Client Sécurisé</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,900;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* --- DESIGN SYSTEM LUXE EMPIRE OS --- */
        :root { 
            --bg-dark: #050505; 
            --panel-bg: rgba(15, 15, 15, 0.7); 
            --gold: #d4af37; 
            --gold-dim: rgba(212, 175, 55, 0.15);
            --text-main: #ffffff; 
            --text-muted: #94a3b8; 
            --border: rgba(255, 255, 255, 0.1); 
            --success: #10b981; 
            --danger: #ef4444;
            --font-title: 'Playfair Display', serif;
            --font-text: 'Montserrat', sans-serif;
        }
        
        body { 
            font-family: var(--font-text); 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            background-image: radial-gradient(circle at 50% 0%, var(--gold-dim) 0%, transparent 60%);
            box-sizing: border-box;
        }
        
        .setup-box { 
            background: var(--panel-bg); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--border); 
            padding: 50px 40px; 
            border-radius: 20px; 
            width: 100%; 
            max-width: 480px; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.8); 
            text-align: center; 
            box-sizing: border-box; 
            transition: all 0.4s ease;
        }
        
        h1 { 
            font-family: var(--font-title); 
            color: var(--gold); 
            letter-spacing: 3px; 
            font-size: 2.2rem; 
            font-weight: 900; 
            margin: 0 0 10px 0; 
            text-transform: uppercase; 
        }
        
        p { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            line-height: 1.6; 
            margin-bottom: 30px; 
            letter-spacing: 1px; 
            text-transform: uppercase; 
            font-weight: 500;
        }
        
        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            color: var(--gold);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input { 
            width: 100%; 
            padding: 16px; 
            background: rgba(0, 0, 0, 0.5); 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
            font-size: 0.95rem; 
            transition: 0.3s; 
            font-family: var(--font-text); 
        }
        input:focus { outline: none; border-color: var(--gold); background: rgba(0,0,0,0.8); }
        input::placeholder { color: #555; font-weight: 300; }
        
        .btn { 
            padding: 18px; 
            border: none; 
            border-radius: 8px; 
            font-weight: 800; 
            font-size: 0.9rem; 
            cursor: pointer; 
            width: 100%; 
            text-transform: uppercase; 
            letter-spacing: 2px; 
            transition: 0.3s; 
            background: var(--gold); 
            color: #000; 
            margin-top: 15px; 
        }
        .btn:hover { background: #fff; transform: translateY(-2px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2); }
        .btn:active { transform: scale(0.98); }
        .btn:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .detected-plan { 
            background: var(--gold-dim); 
            border: 1px dashed var(--gold); 
            color: var(--gold); 
            padding: 15px; 
            border-radius: 8px; 
            font-weight: 700; 
            text-transform: uppercase; 
            margin-bottom: 30px; 
            letter-spacing: 1px; 
            font-size: 0.85rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        #success-screen { display: none; }
        
        .pin-display { 
            font-size: 3.5rem; 
            font-weight: 900; 
            color: var(--text-main); 
            letter-spacing: 12px; 
            margin: 30px 0; 
            font-family: var(--font-title); 
            background: rgba(0,0,0,0.6); 
            padding: 25px 20px 25px 32px; 
            border-radius: 12px; 
            border: 1px solid var(--gold); 
            text-shadow: 0 0 20px rgba(212,175,55,0.4);
        }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid var(--gold);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- ETAPE 1 : VERIFICATION DE PAIEMENT -->
    <div class="setup-box" id="step-1-loading">
        <div class="loader" id="spinner"></div>
        <h1>EMPIRE OS</h1>
        <p id="loading-text" style="color: var(--text-main);">Vérification sécurisée du paiement et du lien d’activation…</p>
    </div>

    <!-- ETAPE 2 : FORMULAIRE DE DEPLOIEMENT -->
    <div class="setup-box" id="step-2-form" style="display: none;">
        <h1>INITIALISATION</h1>
        <p>Paiement vérifié. Configurez votre espace client.</p>
        
        <div class="detected-plan">
            <span>🛡️ Licence :</span>
            <span id="display-plan" style="color: #fff;">...</span>
        </div>
        <input type="hidden" id="reg-plan" value="">
        
        <div class="input-group">
            <label>Nom de l'établissement</label>
            <input type="text" id="reg-name" placeholder="Ex: Le Majestic" required maxlength="120" autocomplete="organization">
        </div>

        <div class="input-group">
            <label>Identifiant Réseau (ID unique)</label>
            <input type="text" id="reg-id" placeholder="ex: majestic-paris" style="text-transform: lowercase;" required minlength="3" maxlength="48" autocomplete="off" title="Sans espaces, lettres et tirets uniquement">
        </div>

        <div class="input-group">
            <label>Email du Gérant (Administrateur)</label>
            <input type="email" id="reg-email" placeholder="direction@domaine.com" required maxlength="254" autocomplete="email">
        </div>

        <div class="input-group">
            <label>Téléphone du gérant</label>
            <input type="tel" id="reg-phone" placeholder="+33 6 00 00 00 00" required maxlength="24" autocomplete="tel">
        </div>
        
        <button class="btn" id="btn-activate" onclick="activateAccount()">Déployer l’écosystème</button>
        <p id="error-msg" style="color: var(--danger); font-weight: 600; display: none; margin-top: 20px; text-transform: none;"></p>
    </div>

    <!-- ETAPE 3 : SUCCES & CODE PIN -->
    <div class="setup-box" id="success-screen">
        <h1 style="color: var(--gold);">SYSTÈME OPÉRATIONNEL</h1>
        <p>Votre base de données privée est instanciée.<br><br>Votre espace client sécurisé est prêt.</p>
        
        <div class="pin-display" id="generated-pin">----</div>
        
        <button class="btn" onclick="goToAdmin()">Ouvrir l’administration</button>
    </div>

    <script>
"use strict";

const SERVER_URL = (["localhost", "127.0.0.1"].includes(window.location.hostname) || window.location.protocol === "file:")
    ? "http://localhost:10000"
    : "https://tableau-system.onrender.com";

const urlParams = new URLSearchParams(window.location.search);
const activationToken = urlParams.get("activation_token") || "";
const sessionId = urlParams.get("session_id") || "";
const claimedPlan = (urlParams.get("plan") || "").toUpperCase();
const claimedSpeciality = (urlParams.get("specialite") || "").toLowerCase();

let currentTenantID = "";
let csrfToken = "";
let verifiedActivation = null;
let activationInProgress = false;

function secureDeviceId() {
    let id = sessionStorage.getItem("ichef_activation_device_id");
    if (!id) {
        id = crypto.randomUUID
            ? crypto.randomUUID()
            : `activation-${Date.now()}-${crypto.getRandomValues(new Uint32Array(1))[0]}`;
        sessionStorage.setItem("ichef_activation_device_id", id);
    }
    return id;
}

async function secureFetch(path, options = {}) {
    const headers = new Headers(options.headers || {});
    headers.set("X-iCHEF-Device", secureDeviceId());
    if (csrfToken) headers.set("X-CSRF-Token", csrfToken);

    const response = await fetch(`${SERVER_URL}${path}`, {
        ...options,
        headers,
        credentials: "include",
        cache: "no-store",
        redirect: "error"
    });

    if (response.status === 401 || response.status === 403) {
        throw new Error("Session d'activation invalide ou expirée.");
    }
    return response;
}

function setError(message) {
    const errorMsg = document.getElementById("error-msg");
    errorMsg.textContent = message;
    errorMsg.style.display = "block";
}

function clearError() {
    const errorMsg = document.getElementById("error-msg");
    errorMsg.textContent = "";
    errorMsg.style.display = "none";
}

function showRefused(message) {
    document.getElementById("spinner").style.display = "none";
    const loadingText = document.getElementById("loading-text");
    loadingText.textContent = message;
    loadingText.style.color = "var(--danger)";
}

function normalizeTenantId(value) {
    return value
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9-]/g, "-")
        .replace(/-+/g, "-")
        .replace(/^-|-$/g, "")
        .slice(0, 48);
}

function validateEmail(email) {
    return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

function validatePhone(phone) {
    return /^\+?[0-9\s().-]{8,24}$/.test(phone);
}

async function audit(action, details = {}) {
    try {
        await secureFetch("/api/audit/events", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action, details, page: "client-activation" })
        });
    } catch (_) {}
}

async function verifyActivationSession() {
    if (!activationToken && !sessionId) {
        showRefused("Accès refusé : lien d’activation manquant.");
        return;
    }

    try {
        const response = await secureFetch("/api/client-activation/verify", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                activationToken,
                sessionId,
                claimedPlan,
                claimedSpeciality
            })
        });

        const data = await response.json();

        if (!response.ok || !data.success || !data.activationValid || data.alreadyUsed) {
            throw new Error(data.error || "Ce lien d’activation est invalide, expiré ou déjà utilisé.");
        }

        verifiedActivation = {
            activationId: data.activationId,
            plan: data.plan,
            speciality: data.speciality,
            customerEmail: data.customerEmail || "",
            expiresAt: data.expiresAt
        };

        csrfToken = data.csrfToken || "";
        document.getElementById("display-plan").textContent = String(data.plan || "LICENCE").replaceAll("_", " ");
        document.getElementById("reg-plan").value = data.plan || "";
        if (data.customerEmail) document.getElementById("reg-email").value = data.customerEmail;

        document.getElementById("step-1-loading").style.display = "none";
        document.getElementById("step-2-form").style.display = "block";

        await audit("CLIENT_ACTIVATION_LINK_VERIFIED", {
            activationId: data.activationId,
            plan: data.plan
        });
    } catch (error) {
        console.error(error);
        showRefused(error.message || "Impossible de vérifier le lien d’activation.");
    }
}

document.getElementById("reg-id").addEventListener("input", function () {
    this.value = normalizeTenantId(this.value);
});

async function activateAccount() {
    if (activationInProgress) return;

    const btn = document.getElementById("btn-activate");
    const name = document.getElementById("reg-name").value.trim();
    const tenantID = normalizeTenantId(document.getElementById("reg-id").value);
    const email = document.getElementById("reg-email").value.trim().toLowerCase();
    const phone = document.getElementById("reg-phone").value.trim();

    clearError();

    if (!verifiedActivation) return setError("Session d’activation non vérifiée.");
    if (!name || !tenantID || !email || !phone) return setError("Veuillez remplir tous les champs.");
    if (name.length < 2 || name.length > 120) return setError("Le nom de l’établissement doit contenir entre 2 et 120 caractères.");
    if (!/^[a-z0-9](?:[a-z0-9-]{1,46}[a-z0-9])?$/.test(tenantID)) {
        return setError("L’identifiant doit contenir 3 à 48 caractères, sans espace, et ne pas commencer ou finir par un tiret.");
    }
    if (!validateEmail(email)) return setError("Adresse email invalide.");
    if (!validatePhone(phone)) return setError("Numéro de téléphone invalide.");

    activationInProgress = true;
    btn.disabled = true;
    btn.textContent = "DÉPLOIEMENT SÉCURISÉ...";

    try {
        const response = await secureFetch("/api/client-activation/activate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
                "Idempotency-Key": verifiedActivation.activationId
            },
            body: JSON.stringify({
                activationId: verifiedActivation.activationId,
                activationToken,
                sessionId,
                clientName: name,
                tenantID,
                email,
                phone
            })
        });

        const data = await response.json();
        if (!response.ok || !data.success) throw new Error(data.error || "Activation refusée.");

        currentTenantID = data.tenantID || tenantID;

        localStorage.removeItem("ichef_master_pin");
        localStorage.removeItem("pin");
        localStorage.setItem("ichef_tenant_id", currentTenantID);

        document.getElementById("step-2-form").style.display = "none";
        document.getElementById("success-screen").style.display = "block";

        const pinDisplay = document.getElementById("generated-pin");
        pinDisplay.textContent = data.oneTimeRecoveryCode || "ENVOYÉ";

        const explanation = document.querySelector("#success-screen p");
        explanation.innerHTML = data.oneTimeRecoveryCode
            ? "Votre espace client a été créé.<br><br>Voici un <strong>CODE DE RÉCUPÉRATION À USAGE UNIQUE</strong>. Conservez-le hors ligne : il ne sera plus affiché."
            : "Votre espace client a été créé.<br><br>Le lien de création du code administrateur a été envoyé à l’adresse email vérifiée.";

        await audit("CLIENT_ACCOUNT_ACTIVATED", {
            activationId: verifiedActivation.activationId,
            tenantID: currentTenantID,
            plan: verifiedActivation.plan
        });
    } catch (error) {
        console.error(error);
        setError(error.message || "Erreur de communication avec le serveur.");
        btn.disabled = false;
        btn.textContent = "DÉPLOYER L’ÉCOSYSTÈME";
        activationInProgress = false;
    }
}

async function goToAdmin() {
    if (!currentTenantID) return;

    try {
        const response = await secureFetch("/api/client-activation/complete", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                activationId: verifiedActivation?.activationId,
                tenantID: currentTenantID
            })
        });

        const data = await response.json();
        if (!response.ok || !data.success) throw new Error(data.error || "Impossible de finaliser l’activation.");

        location.replace(`administration.html?tenantID=${encodeURIComponent(currentTenantID)}`);
    } catch (error) {
        alert(error.message || "Finalisation impossible.");
    }
}

window.addEventListener("pageshow", (event) => {
    if (event.persisted) location.reload();
});

window.addEventListener("load", verifyActivationSession);
</script>
</body>
