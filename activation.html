<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChef OS | Activation du compte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #09090b; --panel: #11141d; --border: #2d313a; --gold: #fbbf24; --text: #f9fafb; --text-muted: #9ca3af; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .activation-box { background: var(--panel); border: 1px solid var(--gold); border-radius: 16px; padding: 40px; width: 100%; text-align: center; box-shadow: 0 10px 30px rgba(251, 191, 36, 0.1); }
        h1 { margin: 0 0 10px 0; font-weight: 900; font-size: 2rem; }
        input { width: 100%; padding: 15px; margin: 10px 0; background: #000; border: 1px solid var(--border); color: white; border-radius: 8px; font-size: 1rem; outline: none; box-sizing: border-box; }
        input:focus { border-color: var(--gold); }
        .btn { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; margin-top: 15px; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); }
        #pin-display { display: none; margin-top: 30px; padding: 20px; border: 2px dashed var(--gold); border-radius: 12px; background: rgba(251, 191, 36, 0.05); }
        .pin-code { font-size: 6rem; font-weight: 900; color: #4ade80; letter-spacing: 10px; margin: 20px 0; }
    </style>
</head>
<body>

    <div class="activation-box" id="step-form">
        <h1 style="color:var(--gold);">Paiement Validé</h1>
        <p style="color:var(--text-muted); margin-bottom:30px;">Initialisez votre infrastructure. Définissez vos identifiants réseau.</p>
        
        <input type="text" id="clientName" placeholder="Nom du Restaurant (ex: Le Petit Chef)">
        <input type="text" id="tenantID" placeholder="ID de connexion court (ex: petitchef)">
        
        <button class="btn" id="btn-activate" onclick="activateEmpire()">Générer ma Licence</button>
        <p id="error-msg" style="color:#f87171; font-weight:bold; margin-top:15px; display:none;"></p>
    </div>

    <div class="activation-box" id="step-success" style="display:none; border-color:#4ade80; box-shadow: 0 10px 30px rgba(74, 222, 128, 0.1);">
        <h1 style="color:#4ade80;">Licence Active</h1>
        <p style="color:var(--text-muted);">Voici votre code PIN Maître généré par nos serveurs. Conservez-le précieusement, il verrouille tout votre système.</p>
        
        <div id="pin-display" style="display:block;">
            <div style="font-size:0.85rem; color:var(--text-muted); text-transform:uppercase; font-weight:bold;">VOTRE CLÉ D'ACCÈS :</div>
            <div class="pin-code" id="final-pin">----</div>
        </div>

        <button class="btn" style="background:#fff;" onclick="window.location.href='vitrine.html'">Accéder à mon terminal</button>
    </div>

    <script>
        // Récupération de la preuve de paiement ET du type de pack depuis l'URL Stripe
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');
        const packAchete = urlParams.get('plan') || 'ECO'; // Par défaut ECO si non précisé dans l'URL Stripe

        if (!sessionId) {
            document.getElementById('step-form').innerHTML = '<h2 style="color:#f87171;">Accès Refusé</h2><p style="color:var(--text-muted);">Aucune transaction sécurisée détectée. Redirection vers la vitrine requise.</p>';
        }

        async function activateEmpire() {
            const clientName = document.getElementById('clientName').value.trim();
            // On force l'ID en minuscules sans espaces ni caractères spéciaux
            let tenantID = document.getElementById('tenantID').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            const btn = document.getElementById('btn-activate');
            const errorMsg = document.getElementById('error-msg');
            
            const SERVER_URL = "https://tableau-system.onrender.com";

            if (!clientName || !tenantID) {
                errorMsg.innerText = "Saisie incomplète. Les deux champs sont obligatoires.";
                errorMsg.style.display = 'block';
                return;
            }

            btn.innerText = "Création de l'infrastructure...";
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                // Requête au serveur pour valider Stripe et créer le compte
                const response = await fetch(`${SERVER_URL}/api/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, clientName, tenantID, plan: packAchete })
                });

                const data = await response.json();

                if (data.success) {
                    // Transition fluide vers l'affichage du PIN
                    document.getElementById('step-form').style.display = 'none';
                    document.getElementById('step-success').style.display = 'block';
                    document.getElementById('final-pin').innerText = data.dedicatedPin;
                } else {
                    errorMsg.innerText = data.error || "Échec de la validation.";
                    errorMsg.style.display = 'block';
                    btn.innerText = "Réessayer";
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "Erreur réseau. Le serveur central ne répond pas.";
                errorMsg.style.display = 'block';
                btn.innerText = "Réessayer";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
