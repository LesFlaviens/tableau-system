<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
    <title>I CHEF - Déploiement de l'Infrastructure</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;900&display=swap');
        :root { --bg: #09090b; --panel: #11141d; --border: #2d313a; --gold: #fbbf24; --text: #f9fafb; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); font-size: 1.8rem; margin-top: 0; text-transform: uppercase; letter-spacing: -1px; }
        p { color: #9ca3af; font-size: 0.9rem; margin-bottom: 30px; }
        input { width: 100%; padding: 15px; margin-bottom: 15px; background: #1c1f26; border: 1px solid var(--border); color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 1rem; }
        input:focus { outline: none; border-color: var(--gold); }
        .btn { background: var(--gold); color: #000; padding: 15px; border-radius: 8px; font-weight: 900; width: 100%; border: none; cursor: pointer; text-transform: uppercase; font-size: 1rem; transition: 0.2s; }
        .btn:hover { transform: scale(1.02); }
        #message { margin-top: 15px; font-weight: bold; font-size: 1rem; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="card">
        <h1>Paiement Validé</h1>
        <p>Configurez les accès de votre restaurant.</p>

        <form id="activationForm">
            <input type="text" id="clientName" placeholder="Nom du Restaurant (ex: Le Bistrot)" required>
            <input type="text" id="tenantID" placeholder="Identifiant de connexion (ex: lebistrot)" required>
            <input type="password" id="password" placeholder="Mot de passe" required>
            <input type="password" id="passwordConfirm" placeholder="Confirmer le mot de passe" required>
            <button type="submit" class="btn" id="submitBtn">Créer mon infrastructure</button>
        </form>
        <div id="message"></div>
    </div>

    <<script>
        // Récupération de la preuve de paiement ET du type de pack depuis l'URL Stripe
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');
        const packAchete = urlParams.get('plan') || 'ECO'; // Par défaut ECO si non précisé

        if (!sessionId) {
            document.getElementById('step-form').innerHTML = '<h2 style="color:#f87171;">Accès Refusé</h2><p style="color:var(--text-muted);">Aucune transaction détectée. Veuillez passer par la vitrine.</p>';
        }

        async function activateEmpire() {
            const clientName = document.getElementById('clientName').value.trim();
            let tenantID = document.getElementById('tenantID').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            const btn = document.getElementById('btn-activate');
            const errorMsg = document.getElementById('error-msg');
            
            const SERVER_URL = "https://tableau-system.onrender.com";

            if (!clientName || !tenantID) {
                errorMsg.innerText = "Veuillez remplir tous les champs.";
                errorMsg.style.display = 'block';
                return;
            }

            btn.innerText = "Création de l'infrastructure...";
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                // Envoi de la requête avec le 'plan' inclus
                const response = await fetch(`${SERVER_URL}/api/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, clientName, tenantID, plan: packAchete })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('step-form').style.display = 'none';
                    document.getElementById('step-success').style.display = 'block';
                    document.getElementById('final-pin').innerText = data.dedicatedPin;
                } else {
                    errorMsg.innerText = data.error || "Erreur de validation.";
                    errorMsg.style.display = 'block';
                    btn.innerText = "Réessayer";
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "Erreur de connexion au serveur central.";
                errorMsg.style.display = 'block';
                btn.innerText = "Réessayer";
                btn.disabled = false;
            }
        }

</html>
