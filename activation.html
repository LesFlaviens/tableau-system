<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iChef OS | Déploiement de l'Infrastructure</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #030303; 
            --panel: #0a0a0a; 
            --border: rgba(255, 255, 255, 0.08); 
            --gold: #D4AF37; 
            --text-main: #ffffff; 
            --text-muted: #737373; 
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
        }

        .activation-box { 
            background: var(--panel); 
            border: 1px solid var(--border); 
            border-radius: 12px; 
            padding: 60px 40px; 
            width: 100%; 
            max-width: 600px; 
            text-align: center; 
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            position: relative;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5rem; 
            margin: 0 0 10px 0; 
            letter-spacing: -1px;
        }

        p { color: var(--text-muted); font-size: 1rem; font-weight: 300; margin-bottom: 40px; }

        input { 
            width: 100%; 
            padding: 18px; 
            margin-bottom: 15px; 
            background: transparent; 
            border: 1px solid var(--border); 
            color: white; 
            border-radius: 4px; 
            font-size: 1rem; 
            outline: none; 
            box-sizing: border-box; 
            transition: 0.3s;
            text-align: center;
        }

        input:focus { border-color: var(--gold); background: rgba(255,255,255,0.02); }

        .btn { 
            width: 100%; 
            padding: 18px; 
            background: var(--text-main); 
            color: var(--bg); 
            border: none; 
            border-radius: 4px; 
            font-weight: 800; 
            font-size: 0.9rem; 
            cursor: pointer; 
            text-transform: uppercase; 
            letter-spacing: 2px;
            margin-top: 20px; 
            transition: 0.3s; 
        }

        .btn:hover { background: var(--gold); transform: translateY(-2px); }

        /* ZONE DU CODE PIN GEANT */
        #pin-display { 
            display: none; 
            margin: 40px 0; 
            padding: 40px; 
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
        }

        .pin-label { 
            font-size: 0.75rem; 
            color: var(--gold); 
            text-transform: uppercase; 
            letter-spacing: 4px; 
            font-weight: 800;
            margin-bottom: 20px;
        }

        .pin-code { 
            font-size: 8rem; 
            font-weight: 900; 
            color: var(--text-main); 
            letter-spacing: 15px; 
            margin: 0;
            font-family: 'Playfair Display', serif;
        }

        #error-msg { 
            color: #ef4444; 
            font-weight: 600; 
            margin-top: 20px; 
            display: none; 
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="activation-box" id="step-form">
        <h1 style="color:var(--gold);">Paiement Confirmé</h1>
        <p>Initialisez votre identité réseau pour générer votre clé d'accès.</p>
        
        <input type="text" id="clientName" placeholder="NOM DE L'ÉTABLISSEMENT">
        <input type="text" id="tenantID" placeholder="IDENTIFIANT RÉSEAU (EX: PALACE01)">
        
        <button class="btn" id="btn-activate" onclick="activateEmpire()">Générer ma Licence</button>
        <p id="error-msg"></p>
    </div>

    <div class="activation-box" id="step-success" style="display:none;">
        <h1>Infrastructure Active.</h1>
        <p>Mémorisez cette clé unique. Elle déverrouille l'intégralité de vos terminaux.</p>
        
        <div id="pin-display" style="display:block;">
            <div class="pin-label">Votre Clé d'Accès Maître</div>
            <div class="pin-code" id="final-pin">----</div>
        </div>

        <button class="btn" id="btn-next" style="background:var(--gold);">Démarrer le Système</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const sessionId = urlParams.get('session_id');
        const packAchete = urlParams.get('plan') || 'ECO'; 

        if (!sessionId) {
            document.getElementById('step-form').innerHTML = '<h1>Accès Refusé</h1><p>Aucune transaction sécurisée détectée.</p>';
        }

        async function activateEmpire() {
            const clientName = document.getElementById('clientName').value.trim();
            let tenantID = document.getElementById('tenantID').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
            const btn = document.getElementById('btn-activate');
            const errorMsg = document.getElementById('error-msg');
            
            const SERVER_URL = "https://tableau-system.onrender.com";

            if (!clientName || !tenantID) {
                errorMsg.innerText = "VEUILLEZ REMPLIR TOUS LES CHAMPS.";
                errorMsg.style.display = 'block';
                return;
            }

            btn.innerText = "DÉPLOIEMENT EN COURS...";
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const response = await fetch(`${SERVER_URL}/api/activate`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ sessionId, clientName, tenantID, plan: packAchete })
                });

                const data = await response.json();

                if (data.success) {
                    // Connexion automatique en mémoire
                    localStorage.setItem('ichef_tenant_id', tenantID);

                    document.getElementById('step-form').style.display = 'none';
                    document.getElementById('step-success').style.display = 'block';
                    document.getElementById('final-pin').innerText = data.dedicatedPin;

                    // Configuration du bouton de démarrage direct
                    document.getElementById('btn-next').onclick = function() {
                        if (packAchete === 'CHEF') {
                            window.location.href = `chef.html?tenantID=${tenantID}`;
                        } else {
                            // Pack 2, 3 et 4 vont sur pack-eco.html
                            window.location.href = `pack-eco.html?tenantID=${tenantID}`;
                        }
                    };
                } else {
                    errorMsg.innerText = data.error || "ÉCHEC DE LA VALIDATION.";
                    errorMsg.style.display = 'block';
                    btn.innerText = "RÉESSAYER";
                    btn.disabled = false;
                }
            } catch (err) {
                errorMsg.innerText = "ERREUR SERVEUR. VEUILLEZ RÉESSAYER.";
                errorMsg.style.display = 'block';
                btn.innerText = "RÉESSAYER";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
