<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Fonctionnalités iChef OS | Commandes QR & NFC pour restaurants</title>
  <meta name="description" content="Découvrez les fonctionnalités iChef OS : commandes QR & NFC, Anti-Rush, pass cuisine, gestion des stocks, fiches techniques, marges, équipes et site web pour restaurants." />

  <style>
    :root {
      --black: #050505;
      --dark: #0d0d0d;
      --gold: #d8b34a;
      --gold-light: #ffe88a;
      --white: #ffffff;
      --cream: #f8f5ef;
      --text: #172039;
      --muted: #687083;
      --border: rgba(216, 179, 74, 0.35);
      --shadow: 0 20px 60px rgba(0,0,0,0.25);
      --radius: 24px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: var(--cream);
      color: var(--text);
      line-height: 1.6;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(1180px, 92%);
      margin: auto;
    }

    /* HEADER */

    header {
      background: #000;
      border-bottom: 1px solid rgba(216,179,74,0.45);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar {
      height: 92px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 30px;
    }

    .logo {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 46px;
      color: var(--gold-light);
      letter-spacing: -2px;
      text-shadow: 0 0 20px rgba(216,179,74,0.45);
    }

    .nav-links {
      display: flex;
      gap: 28px;
      align-items: center;
      color: white;
      font-size: 15px;
    }

    .nav-links a {
      opacity: 0.85;
      transition: 0.25s ease;
    }

    .nav-links a:hover,
    .nav-links .active {
      color: var(--gold-light);
      opacity: 1;
    }

    .header-actions {
      display: flex;
      gap: 14px;
      align-items: center;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 14px 25px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 15px;
      transition: 0.25s ease;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn-outline {
      color: white;
      border: 2px solid var(--gold);
      background: transparent;
      box-shadow: inset 0 0 12px rgba(216,179,74,0.12);
    }

    .btn-outline:hover {
      background: rgba(216,179,74,0.12);
      transform: translateY(-2px);
    }

    .btn-gold {
      background: linear-gradient(135deg, #ffe69a, #d2a637);
      color: #191100;
      border: 2px solid transparent;
      box-shadow: 0 10px 30px rgba(216,179,74,0.3);
    }

    .btn-gold:hover {
      transform: translateY(-2px);
      box-shadow: 0 14px 38px rgba(216,179,74,0.45);
    }

    /* HERO */

    .hero {
      background:
        linear-gradient(90deg, rgba(0,0,0,0.92) 0%, rgba(0,0,0,0.72) 45%, rgba(0,0,0,0.35) 100%),
        url("images/hero-restaurant.jpg");
      background-size: cover;
      background-position: center;
      color: white;
      min-height: 560px;
      display: flex;
      align-items: center;
      border-bottom: 1px solid rgba(216,179,74,0.3);
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      left: -10%;
      bottom: 65px;
      width: 120%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-light), transparent);
      box-shadow: 0 0 25px var(--gold-light);
      transform: rotate(-3deg);
      opacity: 0.75;
    }

    /* CENTRAGE DU HERO */
    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 800px;
      margin: 0 auto;
      padding: 70px 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .eyebrow {
      color: var(--gold-light);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin-bottom: 18px;
      font-size: 14px;
    }

    .hero h1 {
      font-size: clamp(42px, 6vw, 76px);
      line-height: 1.05;
      margin-bottom: 24px;
      letter-spacing: -2px;
    }

    .hero h1 span {
      color: var(--gold-light);
    }

    .hero-subtitle {
      font-size: clamp(21px, 2.5vw, 30px);
      color: var(--gold-light);
      max-width: 640px;
      margin-bottom: 18px;
      line-height: 1.35;
    }

    .hero-text {
      font-size: 19px;
      color: rgba(255,255,255,0.88);
      max-width: 610px;
      margin-bottom: 34px;
    }

    .hero-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center; /* BOUTONS CENTRÉS */
      width: 100%;
    }

    /* INTRO */

    .intro {
      background: white;
      text-align: center;
      padding: 58px 0 42px;
    }

    .intro h2 {
      font-size: clamp(30px, 4vw, 46px);
      color: #111827;
      margin-bottom: 16px;
    }

    .intro p {
      max-width: 920px;
      margin: 0 auto;
      color: #1b2440;
      font-size: 20px;
      font-weight: 700;
    }

    .intro .note {
      margin-top: 24px;
      font-size: 21px;
      font-weight: 400;
      color: #30384d;
    }

    .intro strong {
      color: #e12f2f;
    }

    /* FEATURES */

    .features-section {
      padding: 44px 0 78px;
      background: var(--cream);
    }

    .section-title {
      text-align: center;
      margin-bottom: 38px;
    }

    .section-title h2 {
      font-size: clamp(31px, 4vw, 48px);
      color: #111827;
      margin-bottom: 12px;
    }

    .section-title p {
      color: var(--muted);
      font-size: 18px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .feature-card {
      background: white;
      border: 1px solid rgba(0,0,0,0.08);
      border-radius: var(--radius);
      padding: 28px 24px;
      min-height: 360px;
      box-shadow: 0 10px 35px rgba(0,0,0,0.06);
      transition: 0.25s ease;
      position: relative;
      overflow: hidden;
      display: flex; /* AJOUTÉ POUR LE CENTRAGE DU BOUTON EN BAS */
      flex-direction: column;
    }

    .feature-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(216,179,74,0.12), transparent 40%);
      opacity: 0;
      transition: 0.25s ease;
    }

    .feature-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 50px rgba(0,0,0,0.13);
      border-color: rgba(216,179,74,0.55);
    }

    .feature-card:hover::before {
      opacity: 1;
    }

    .icon {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 20%, #282828, #000);
      border: 1px solid rgba(216,179,74,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold-light);
      font-size: 32px;
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
    }

    .feature-card h3 {
      font-size: 22px;
      line-height: 1.25;
      color: #0f172a;
      margin-bottom: 14px;
      position: relative;
      z-index: 2;
    }

    .feature-card p {
      color: #30384d;
      font-size: 16px;
      margin-bottom: 18px;
      position: relative;
      z-index: 2;
    }

    .feature-card ul {
      list-style: none;
      display: grid;
      gap: 9px;
      margin-bottom: 22px;
      position: relative;
      z-index: 2;
      flex: 1; /* Pousse le bouton vers le bas */
    }

    .feature-card li {
      font-size: 15px;
      color: #263047;
    }

    .feature-card li::before {
      content: "✓";
      color: #111;
      font-weight: 900;
      margin-right: 9px;
    }

    .learn-more {
      color: #a17212;
      font-weight: 700;
      font-size: 15px;
      position: relative;
      z-index: 2;
      display: block; /* BOUTONS CENTRÉS DANS LES CARTES */
      text-align: center;
      margin-top: auto;
      padding-top: 15px;
    }

    .dark-card {
      background: linear-gradient(145deg, #0b0b0b, #1a1a1a);
      color: white;
      border-color: rgba(216,179,74,0.4);
    }

    .dark-card h3 {
      color: white;
      font-size: 25px;
    }

    .dark-list {
      list-style: none;
      display: grid;
      gap: 20px;
      margin-top: 24px;
    }

    .dark-list li {
      color: var(--gold-light);
      font-size: 17px;
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .dark-list li::before {
      content: "";
      display: none;
    }

    /* CTA BANNER */

    .cta-banner {
      background:
        linear-gradient(90deg, #000, #121212),
        radial-gradient(circle at 20% 20%, rgba(216,179,74,0.2), transparent 40%);
      color: white;
      padding: 56px 0;
    }

    /* CENTRAGE DE LA BANNIÈRE DU BAS */
    .cta-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 25px;
    }

    .cta-left {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .target {
      width: 82px;
      height: 82px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--gold-light);
      font-size: 46px;
      flex-shrink: 0;
    }

    .cta-banner h2 {
      color: var(--gold-light);
      font-size: clamp(26px, 3vw, 36px);
      line-height: 1.2;
      margin-bottom: 12px;
    }

    .cta-banner p {
      color: rgba(255,255,255,0.86);
      font-size: 17px;
      max-width: 620px;
      margin: 0 auto;
    }

    .cta-actions {
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      justify-content: center; /* BOUTONS CENTRÉS */
      width: 100%;
    }

    /* TRUST */

    .trust {
      background: white;
      padding: 56px 0;
      text-align: center;
    }

    .trust h2 {
      font-size: 24px;
      margin-bottom: 34px;
      color: #111827;
    }

    .trust-logos {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 22px;
      opacity: 0.65;
    }

    .trust-item {
      padding: 18px 10px;
      border-top: 1px solid rgba(216,179,74,0.55);
      font-family: Georgia, serif;
      font-size: 17px;
      letter-spacing: 1px;
      color: #444;
    }

    .trust-icon {
      font-size: 30px;
      margin-bottom: 8px;
      display: block;
    }

    /* FOOTER */

    footer {
      background: #000;
      color: white;
      padding: 58px 0 22px;
    }

    .footer-grid {
      display: grid;
      grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr;
      gap: 36px;
      margin-bottom: 38px;
    }

    .footer-logo {
      font-family: Georgia, serif;
      font-style: italic;
      font-size: 48px;
      color: var(--gold-light);
      margin-bottom: 16px;
    }

    .footer p,
    footer p {
      color: rgba(255,255,255,0.72);
      font-size: 15px;
    }

    footer h4 {
      margin-bottom: 14px;
      color: white;
      font-size: 17px;
    }

    footer ul {
      list-style: none;
      display: grid;
      gap: 8px;
    }

    footer li,
    footer a {
      color: rgba(255,255,255,0.72);
      font-size: 15px;
    }

    footer a:hover {
      color: var(--gold-light);
    }

    .socials {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .socials a {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    .footer-bottom {
      border-top: 1px solid rgba(255,255,255,0.12);
      padding-top: 20px;
      display: flex;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      color: rgba(255,255,255,0.55);
      font-size: 14px;
    }

    .footer-bottom-links {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    /* RESPONSIVE */

    @media (max-width: 1050px) {
      .nav-links {
        display: none;
      }

      .features-grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .cta-content {
        flex-direction: column;
        align-items: flex-start;
      }

      .trust-logos {
        grid-template-columns: repeat(3, 1fr);
      }

      .footer-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 680px) {
      .navbar {
        height: auto;
        padding: 24px 0;
        flex-direction: column;
      }

      .header-actions {
        flex-direction: column;
        width: 100%;
      }

      .header-actions .btn {
        width: 100%;
      }

      .hero {
        min-height: auto;
      }

      .hero-content {
        padding: 70px 0;
      }

      .hero-buttons .btn {
        width: 100%;
      }

      .features-grid {
        grid-template-columns: 1fr;
      }

      .cta-left {
        flex-direction: column;
        align-items: flex-start;
      }

      .cta-actions,
      .cta-actions .btn {
        width: 100%;
      }

      .trust-logos {
        grid-template-columns: repeat(2, 1fr);
      }

      .footer-grid {
        grid-template-columns: 1fr;
      }

      .footer-bottom {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

  <header>
    <div class="container navbar">
      <a href="/" class="logo">Ichéf</a>

      <nav class="nav-links">
        <a href="https://ichef.ch/">Accueil</a>
        <a href="/fonctionnalites-ichef-os/" class="active">Fonctionnalités</a>
        <a href="/vitrine.html/">Tarifs</a>
        <a href="/contact/">Contact</a>
      </nav>

      <div class="header-actions">
        <a href="tel:+33641437265" class="btn btn-outline bouton-rappel-geo">☎ Être rappelé</a>
        <a href="/connexionpartenaire.html/" class="btn btn-gold">Demander une démo</a>
      </div>
    </div>
  </header>

  <main>

    <section class="hero">
      <div class="container hero-content">
        <div class="eyebrow">Solution restaurant QR & NFC</div>

        <h1>Fonctionnalités <span>iChef OS</span></h1>

        <p class="hero-subtitle">
          Tout ce dont votre établissement a besoin, dans un seul écosystème.
        </p>

        <p class="hero-text">
          iChef OS vous aide à mieux gérer,
