<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offre Exclusive</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 800px;
            padding: 20px;
            text-align: center;
        }
        .video-wrapper {
            position: relative;
            padding-bottom: 56.25%; /* Ratio 16:9 */
            height: 0;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            margin-bottom: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .video-wrapper iframe, .video-wrapper video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }
        .btn-buy {
            background: linear-gradient(135deg, #d4af37, #b89626); /* Or impérial */
            color: #000;
            text-decoration: none;
            display: inline-block;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: 900;
            border-radius: 8px;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.3);
            width: 100%;
            max-width: 400px;
        }
        .btn-buy:hover {
            transform: scale(1.02);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.5);
        }
        .guarantee {
            margin-top: 15px;
            font-size: 0.85rem;
            color: #888;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- Remplacer la source par l'URL de ta vidéo (YouTube, Vimeo, ou fichier MP4 local) -->
        <div class="video-wrapper">
            <video controls autoplay muted playsinline>
                <source src="TON_LIEN_VIDEO_ICI.mp4" type="video/mp4">
                Votre navigateur ne supporte pas la vidéo.
            </video>
        </div>

        <!-- Remplacer TON_LIEN_STRIPE_ICI par ton lien de paiement direct -->
        <a href="TON_LIEN_STRIPE_ICI" class="btn-buy" id="checkout-btn">
            Accéder à l'offre
        </a>
        
        <div class="guarantee">
            🔒 Paiement 100% Sécurisé
        </div>
    </div>

</body>
</html>
