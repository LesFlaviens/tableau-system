<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accès Exclusif</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .container { width: 100%; max-width: 800px; text-align: center; }
        .logo { max-width: 200px; margin-bottom: 30px; }
        .video-wrapper { position: relative; padding-bottom: 56.25%; height: 0; border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); margin-bottom: 30px; border: 1px solid rgba(255, 255, 255, 0.1); background: #000; }
        .video-wrapper video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; }
        .btn-buy { background: linear-gradient(135deg, #d4af37, #b89626); color: #000; text-decoration: none; display: inline-block; padding: 20px 50px; font-size: 1.3rem; font-weight: 900; border-radius: 8px; text-transform: uppercase; letter-spacing: 1px; transition: transform 0.2s, box-shadow 0.2s; box-shadow: 0 10px 25px rgba(212, 175, 55, 0.2); width: 100%; max-width: 400px; box-sizing: border-box; }
        .btn-buy:hover { transform: scale(1.02); box-shadow: 0 15px 35px rgba(212, 175, 55, 0.4); }
        .guarantee { margin-top: 20px; font-size: 0.85rem; color: #888; }
    </style>
</head>
<body>

    <div class="container">
        
        <img src="./logo-ichef.png" alt="iChef" class="logo">

<div class="video-wrapper">
            <video controls playsinline preload="metadata">
                <source src="./video-demo.mp4?v=1" type="video/mp4">
                Votre navigateur ne supporte pas la vidéo.
            </video>
        </div>

        <div class="video-wrapper">
            <video controls playsinline preload="metadata">
                <source src="./pubpouroffre.mp4?v=1" type="video/mp4">
                Votre navigateur ne supporte pas la vidéo.
            </video>
        </div>

        <a href="https://tableau-system.onrender.com/vitrine.html" class="btn-buy" id="checkout-btn">
            Accéder aux offres
        </a>
        
        <div class="guarantee">
            🔒 Paiement 100% Sécurisé
        </div>

    </div>

</body>
</html>
