<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCHEF - Accès Privilège</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;0,700;1,400&family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --bg-dark: #000000;
            --bg-panel: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        /* VERROUILLAGE ÉCRAN (Zéro Scroll) */
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 0%, #151a2a 0%, var(--bg-dark) 70%);
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100dvh; overflow: hidden; 
        }

        /* Container Principal */
        .container { 
            width: 100%; max-width: 420px; height: 100dvh;
            display: flex; flex-direction: column; justify-content: space-between;
            padding: 4vh 25px 3vh 25px;
            animation: fadeIn 1s ease-out;
        }

        .logo { 
            height: 4.5vh; max-height: 40px; margin: 0 auto; object-fit: contain;
        }

        /* Sélecteur de Vidéo (Éditorial) */
        .luxury-tabs {
            display: flex; justify-content: center; gap: 35px;
            margin: 1.5vh 0; position: relative;
        }
        .tab-btn {
            background: none; border: none; color: var(--text-muted);
            font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 2px;
            padding-bottom: 6px; cursor: pointer; transition: color 0.3s;
            position: relative;
        }
        .tab-btn.active { color: var(--gold); }
        .tab-btn::after {
            content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
            width: 0; height: 1px; background-color: var(--gold); transition: width 0.3s ease;
        }
        .tab-btn.active::after { width: 100%; }

        /* Écran Vidéo Épuré */
        .video-container {
            position: relative; width: 100%; aspect-ratio: 16 / 9;
            border-radius: 12px; overflow: hidden; background: var(--bg-panel);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .video-player {
            display: none; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 0.5s;
        }
        .video-player.active { display: block; opacity: 1; }
        
        /* Bouton Play "Pro-actif" (Pulsation) */
        .play-overlay-btn {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 70px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            border: 1px solid rgba(212, 175, 55, 0.8);
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            color: var(--gold); font-size: 1.5rem; padding-left: 5px;
            pointer-events: none; transition: 0.3s;
            animation: pulsePlay 2s infinite cubic-bezier(0.66, 0, 0, 1);
        }
        @keyframes pulsePlay {
            0% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0.6); }
            70% { box-shadow: 0 0 0 20px rgba(212, 175, 55, 0); }
            100% { box-shadow: 0 0 0 0 rgba(212, 175, 55, 0); }
        }

        /* Bouton Agrandir */
        .fullscreen-btn {
            position: absolute; bottom: 12px; right: 12px;
            width: 36px; height: 36px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0, 0, 0, 0.5); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; font-size: 1.2rem;
            cursor: pointer; z-index: 10; transition: 0.2s;
        }
        .fullscreen-btn:active { transform: scale(0.9); background: var(--gold); color: #000; border-color: var(--gold); }

        /* SECTION HISTOIRE */
        .editorial-story {
            display: flex; align-items: center; gap: 20px;
            padding: 2vh 0; border-top: 1px solid rgba(255,255,255,0.05); border-bottom: 1px solid rgba(255,255,255,0.05);
            margin: 1.5vh 0;
        }
        .chef-avatar {
            flex-shrink: 0; width: 85px; height: 85px; border-radius: 50%;
            object-fit: cover; filter: grayscale(10%);
            border: 1px solid rgba(212, 175, 55, 0.4); cursor: pointer;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.15);
            transition: 0.4s ease;
        }
        .chef-avatar:active { transform: scale(0.95); filter: grayscale(0%); }
        
        .story-text-container { display: flex; flex-direction: column; justify-content: center; }
        .story-quote { 
            color: var(--gold); font-family: 'Playfair Display', serif; font-style: italic; 
            font-size: 1.15rem; margin-bottom: 6px; letter-spacing: 0.5px;
        }
        .story-paragraph { color: var(--text-muted); font-size: 0.8rem; line-height: 1.5; margin: 0; font-weight: 300; }

        /* BOUTON D'ACTION (Luxe avec reflet) */
        .btn-premium { 
            position: relative; overflow: hidden;
            background-color: var(--gold); color: #000; 
            text-decoration: none; display: flex; align-items: center; justify-content: center;
            height: 7vh; min-height: 50px; font-size: 1.05rem; font-weight: 800; 
            border-radius: 4px; text-transform: uppercase; letter-spacing: 2px; 
            width: 100%; flex-shrink: 0; transition: background-color 0.3s;
        }
        .btn-premium::after {
            content: ''; position: absolute; top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(to right, rgba(255,255,255,0) 0%, rgba(255,255,255,0.4) 50%, rgba(255,255,255,0) 100%);
            animation: shine 3s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 20% { left: 200%; } 100% { left: 200%; } }
        .btn-premium:active { background-color: #b89626; transform: scale(0.98); }

        /* FOOTER : GARANTIE & CONTACT */
        .footer-area {
            display: flex; flex-direction: column; align-items: center; gap: 8px; margin-top: 2vh;
        }
        .guarantee { 
            font-size: 0.65rem; color: #666; font-weight: 500; 
            display: flex; align-items: center; justify-content: center; gap: 6px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .contact-info {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            font-size: 0.75rem; color: var(--text-muted); font-weight: 400;
        }
        .phone-link {
            color: var(--text-muted); text-decoration: none; transition: 0.2s;
            display: flex; align-items: center; gap: 4px;
        }
        .phone-link:hover, .phone-link:active { color: var(--gold); }
        .divider { color: #333; }

        /* LIGHTBOX PHOTO */
        #lightbox {
            display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100dvh;
            background: rgba(0,0,0,0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            z-index: 9999; flex-direction: column; align-items: center; justify-content: center;
            opacity: 0; transition: opacity 0.4s ease;
        }
        #lightbox.active { display: flex; opacity: 1; }
        #lightbox img {
            max-width: 90vw; max-height: 80vh; border-radius: 8px;
            box-shadow: 0 10px 40px rgba(212, 175, 55, 0.15);
            transform: scale(0.95); transition: transform 0.4s ease;
        }
        #lightbox.active img { transform: scale(1); }
        .close-btn { position: absolute; top: 30px; right: 20px; color: #fff; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="container">
        
        <img src="./logo-ichef.png" alt="iChef" class="logo">

        <div class="luxury-tabs">
            <button class="tab-btn active" onclick="changeVideo(0, this)">Le Concept</button>
            <button class="tab-btn" onclick="changeVideo(1, this)">L'Offre</button>
        </div>

        <div class="video-container" id="video-box">
            <div class="play-overlay-btn" id="play-icon">▶</div>
            <div class="fullscreen-btn" id="fs-btn">⛶</div>
            <video id="vid-0" class="video-player active" playsinline preload="metadata" poster="">
                <source src="./explication.mp4?v=1" type="video/mp4">
            </video>
            <video id="vid-1" class="video-player" playsinline preload="metadata" poster="">
                <source src="./puboffre.mp4?v=1" type="video/mp4">
            </video>
        </div>

        <div class="editorial-story">
            <img src="Capture d'écran 2026-03-13 170357-Photoroom.jpg" id="chef-photo" class="chef-avatar" alt="Flavien Iché">
            
            <div class="story-text-container">
                <div class="story-quote">"Pensé par un chef."</div>
                <p class="story-paragraph">
                    Conçu dans le Chablais d'après mes 20 ans d'expérience. La solution définitive pour maîtriser votre service, augmenter vos ventes et garantir la rentabilité de votre établissement.
                </p>
            </div>
        </div>

        <a href="vitrine.html" class="btn-premium" id="checkout-btn">
            Accéder aux offres
        </a>
        
        <div class="footer-area">
            <div class="guarantee">
                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
                Paiement Sécurisé
            </div>
            <div class="contact-info">
                <a href="tel:+41000000000" class="phone-link">🇨🇭 +41 00 000 00 00</a>
                <span class="divider">|</span>
                <a href="tel:+33000000000" class="phone-link">🇫🇷 +33 0 00 00 00 00</a>
            </div>
        </div>

    </div>

    <div id="lightbox">
        <div class="close-btn" id="close-lb">Fermer</div>
        <img src="" id="lightbox-target" alt="Flavien Iché">
    </div>

    <script>
        // Changement de vidéo (Style Onglets)
        function changeVideo(index, button) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.video-player').forEach(vid => {
                vid.pause();
                vid.classList.remove('active');
                vid.removeAttribute("controls");
            });
            button.classList.add('active');
            const activeVid = document.getElementById(`vid-${index}`);
            activeVid.classList.add('active');
            document.getElementById('play-icon').style.opacity = '1';
        }

        // Lecture Inline et Bouton Plein Écran
        const videoBox = document.getElementById('video-box');
        const playIcon = document.getElementById('play-icon');
        const fsBtn = document.getElementById('fs-btn');

        videoBox.addEventListener('click', function(e) {
            const activeVid = document.querySelector('.video-player.active');
            
            // Si on clique sur le bouton agrandir (⛶)
            if (e.target === fsBtn) {
                if (activeVid.webkitEnterFullscreen) {
                    activeVid.webkitEnterFullscreen(); // iOS
                } else if (activeVid.requestFullscreen) {
                    activeVid.requestFullscreen(); // Android
                }
                activeVid.play();
                playIcon.style.opacity = '0';
                activeVid.setAttribute("controls", "controls");
                return;
            }

            // Si on clique sur le reste de la vidéo (Lecture classique sur place)
            if (activeVid.paused) {
                activeVid.play();
                playIcon.style.opacity = '0';
                activeVid.setAttribute("controls", "controls");
            } else {
                activeVid.pause();
                playIcon.style.opacity = '1';
                activeVid.removeAttribute("controls");
            }
        });

        // Remettre le logo play si on sort du plein écran
        document.querySelectorAll('video').forEach(vid => {
            vid.addEventListener('webkitendfullscreen', () => { vid.pause(); playIcon.style.opacity = '1'; vid.removeAttribute("controls"); });
            vid.addEventListener('fullscreenchange', () => { 
                if (!document.fullscreenElement) { vid.pause(); playIcon.style.opacity = '1'; vid.removeAttribute("controls"); }
            });
        });

        // Lightbox Photo
        const avatar = document.getElementById('chef-photo');
        const lightbox = document.getElementById('lightbox');
        const lightboxTarget = document.getElementById('lightbox-target');

        avatar.addEventListener('click', () => {
            lightboxTarget.src = avatar.src;
            lightbox.classList.add('active');
        });

        document.getElementById('close-lb').addEventListener('click', () => {
            lightbox.classList.remove('active');
        });
        lightbox.addEventListener('click', (e) => {
            if(e.target === lightbox) lightbox.classList.remove('active');
        });
    </script>

</body>
</html>
