<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>iCHEF - Accès Exclusif</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --gold-light: #f9d976;
            --bg-dark: #050505;
            --text-main: #ffffff;
            --text-muted: #94a3b8;
        }

        body { 
            background-color: var(--bg-dark); 
            background-image: radial-gradient(circle at 50% 0%, #151a2a 0%, var(--bg-dark) 60%);
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container { 
            width: 100%; 
            max-width: 700px; 
            text-align: center; 
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .logo { 
            max-width: 180px; 
            margin-bottom: 40px; 
            filter: drop-shadow(0 4px 15px rgba(212, 175, 55, 0.2));
        }

        /* Effet "Glassmorphism" Premium autour des vidéos */
        .video-wrapper { 
            position: relative; 
            padding-bottom: 56.25%; 
            height: 0; 
            border-radius: 20px; 
            overflow: hidden; 
            margin-bottom: 35px; 
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.08); 
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6), 0 0 40px rgba(212, 175, 55, 0.05);
            backdrop-filter: blur(10px);
            transform: translateZ(0);
        }

        .video-wrapper video { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            border-radius: 20px;
        }

        /* Bouton ultra-vendeur */
        .btn-buy { 
            background: linear-gradient(135deg, var(--gold), #b89626); 
            color: #000; 
            text-decoration: none; 
            display: inline-flex; 
            align-items: center;
            justify-content: center;
            padding: 22px 40px; 
            font-size: 1.25rem; 
            font-weight: 900; 
            border-radius: 16px; 
            text-transform: uppercase; 
            letter-spacing: 1.5px; 
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3), inset 0 2px 0 rgba(255, 255, 255, 0.2); 
            width: 100%; 
            max-width: 450px; 
            box-sizing: border-box;
            margin-top: 10px;
        }

        .btn-buy:hover { 
            transform: translateY(-3px) scale(1.02); 
            box-shadow: 0 20px 40px rgba(212, 175, 55, 0.4), inset 0 2px 0 rgba(255, 255, 255, 0.3); 
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
        }

        .btn-buy:active {
            transform: translateY(1px);
        }

        .guarantee { 
            margin-top: 25px; 
            font-size: 0.85rem; 
            color: var(--text-muted); 
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn { 
            from { opacity: 0; transform: translateY(20px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* Séparateur élégant entre les vidéos */
        .separator {
            height: 1px;
            width: 50%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            margin: 0 auto 35px auto;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <img src="./logo-ichef.png" alt="iChef" class="logo">

        <div class="video-wrapper">
            <video controls playsinline preload="metadata" poster="">
                <source src="./explication.mp4?v=1" type="video/mp4">
                Votre navigateur ne supporte pas la vidéo.
            </video>
        </div>

        <div class="separator"></div>

        <div class="video-wrapper">
            <video controls playsinline preload="metadata" poster="">
                <source src="./puboffre.mp4?v=1" type="video/mp4">
                Votre navigateur ne supporte pas la vidéo.
            </video>
        </div>

        <a href="vitrine.html" class="btn-buy" id="checkout-btn">
            Accéder aux offres
        </a>
        
        <div class="guarantee">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect><path d="M7 11V7a5 5 0 0 1 10 0v4"></path></svg>
            Paiement 100% Sécurisé
        </div>

    </div>

</body>
</html>
