<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Tableau de Salle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --purple: #ea80fc; --blue: #00b0ff; --warning: #ffb300; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none;}
        
        /* HEADER ÉPURÉ */
        header { border-bottom: 1px solid #333; padding: 15px 25px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; transition: 0.3s; }
        .header-title { color: var(--accent); font-size: 1.8rem; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 3px; text-shadow: 0 0 10px rgba(0, 230, 118, 0.2); }
        
        .header-controls { display: flex; gap: 15px; }
        .btn-top { background: #111; font-weight: 900; border-radius: 6px; padding: 12px 20px; cursor: pointer; text-transform: uppercase; transition: 0.2s; font-size: 1rem; border: 2px solid transparent; box-shadow: 0 4px 10px rgba(0,0,0,0.5); color: #fff; }
        .btn-top:active { transform: scale(0.95); }
        
        .btn-plan { border-color: #888; color: #ccc; }
        .btn-plan:hover { background: #222; color: #fff; }
        .btn-res { border-color: var(--purple); color: var(--purple); }
        .btn-res:hover { background: rgba(234, 128, 252, 0.1); }
        .btn-admin { border-color: #555; color: #ccc; }
        .btn-admin:hover { background: #222; border-color: var(--warning); color: var(--warning); }

        /* BARRE ARCHITECTURE */
        #archi-toolbar { display: none; background: var(--blue); padding: 15px 25px; justify-content: space-between; align-items: center; color: #000; font-weight: 900; text-transform: uppercase; box-shadow: 0 5px 20px rgba(0, 176, 255, 0.3); }
        .btn-archi-save { background: #000; color: var(--accent); border: 2px solid var(--accent); padding: 10px 20px; border-radius: 6px; font-weight: 900; cursor: pointer; font-size: 1rem; transition: 0.2s;}
        .btn-archi-save:hover { background: #111; }
        .btn-archi-action { background: rgba(0,0,0,0.5); border: 1px solid #000; color: #fff; padding: 10px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s;}
        .btn-archi-action:hover { background: #000; }

        /* TABS (SALLES) DYNAMIQUE */
        .zones-bar { display: flex; border-bottom: 1px solid #222; background: #050505; overflow-x: auto;}
        .zone-tab { padding: 15px 30px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; color: #555; border-right: 1px solid #222; transition: 0.2s; white-space: nowrap; }
        .zone-tab.active { background: var(--accent); color: #000; }

        /* RADAR WOOCOMMERCE & MAIN AREA */
        .main-workspace { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .radar-panel { width: 280px; background: #0a0a0a; border-right: 1px solid #222; padding: 15px; display: flex; flex-direction: column; }
        .radar-title { color: var(--blue); font-size: 0.9rem; font-weight: 900; text-transform: uppercase; margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .radar-list { flex: 1; overflow-y: auto; }
        
        .floor-plan { flex: 1; position: relative; background: #050505; overflow: hidden; transition: background 0.3s; }
        
        /* MODE ARCHITECTURE ACTIF */
        .floor-plan.archi-active { background: radial-gradient(circle, #333 2px, transparent 2px); background-size: 30px 30px; }
        .floor-plan.archi-active .table-obj { border-style: dashed; cursor: grab; animation: pulse-border 2s infinite; }
        .floor-plan.archi-active .table-obj:active { cursor: grabbing; transform: scale(1.05); }
        @keyframes pulse-border { 0% { box-shadow: 0 0 0 0 rgba(0, 176, 255, 0.4); } 70% { box-shadow: 0 0 0 15px rgba(0, 176, 255, 0); } 100% { box-shadow: 0 0 0 0 rgba(0, 176, 255, 0); } }

        /* TIROIRS COULISSANTS (DROITE) */
        .drawer { position: absolute; top: 0; right: 0; width: 500px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 30px; z-index: 9000; box-sizing: border-box; overflow-y: auto; transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.4, 0.0, 0.2, 1); box-shadow: -15px 0 50px rgba(0,0,0,0.8); }
        .drawer.open { transform: translateX(0); }
        .btn-close-drawer { position: absolute; top: 20px; left: 20px; background: transparent; border: none; color: #aaa; font-size: 2rem; font-weight: bold; cursor: pointer; transition: 0.2s; z-index: 10; line-height: 1; }
        .btn-close-drawer:hover { color: var(--alert); transform: scale(1.1); }

        .admin-menu-btn { width: 100%; padding: 18px; margin-bottom: 15px; background: #111; border: 1px solid #333; border-radius: 8px; font-size: 1.1rem; font-weight: 900; text-transform: uppercase; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 15px; transition: 0.2s; color: #fff;}
        .admin-menu-btn:hover { background: #1a1a1a; transform: translateX(5px); }

        /* TABLES */
        .table-obj { position: absolute; background: #222; border: 2px solid #555; color: #fff; display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(0,0,0,0.5); user-select: none; text-align: center; word-break: break-word; padding: 5px; box-sizing: border-box;}

        /* MODALS */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 400px; box-shadow: 0 20px 50px rgba(0,0,0,0.8);}
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; margin-bottom: 5px; font-weight: bold;}
        .input-full { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; font-size: 1rem; box-sizing: border-box;}
        .input-full:focus { border-color: var(--blue); outline: none; }
        
        .zone-manager-list { max-height: 200px; overflow-y: auto; margin-bottom: 15px; border: 1px solid #333; border-radius: 6px; background: #000;}
        .zone-manager-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #222; align-items: center;}

    </style>
</head>
<body>

    <div id="archi-toolbar">
        <div style="display:flex; gap:10px;">
            <button class="btn-archi-action" onclick="addTable()">+ NOUVELLE TABLE</button>
            <button class="btn-archi-action" onclick="openZoneManager()">⚙️ GÉRER LES SALLES</button>
        </div>
        <span id="archi-mode-text">🛠️ MODE ARCHITECTURE : Cliquez sur une table pour la modifier</span>
        <button class="btn-archi-save" onclick="saveArchitecture()">💾 ENREGISTRER LE PLAN ET QUITTER</button>
    </div>

    <header id="main-header">
        <h1 class="header-title">TABLEAU DE SALLE</h1>
        <div class="header-controls">
            <button class="btn-top btn-plan" onclick="openDrawer('plan-drawer')">📅 PLANNING SEMAINE</button>
            <button class="btn-top btn-res" onclick="openDrawer('res-drawer')">📅 CAHIER RÉSERVATIONS</button>
            <button class="btn-top btn-admin" onclick="openAdminDrawer()">🔒 SUPERVISION</button>
        </div>
    </header>

    <div class="zones-bar" id="zones-bar">
        </div>

    <div class="main-workspace">
        
        <div class="floor-plan" id="floor-plan"></div>

        <div class="radar-panel">
            <div class="radar-title">🌐 RADAR WOOCOMMERCE</div>
            <div class="radar-list">
                <div style="color:#555; text-align:center; font-size:0.8rem; margin-top:20px; font-style:italic;">En attente de commandes web...</div>
            </div>
        </div>

        <div id="plan-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('plan-drawer')">✕</button>
            <h2 style="color:#fff; margin: 30px 0 20px 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px;">📅 PLANNING DE L'ÉQUIPE (SALLE)</h2>
            <div id="service-planning-container"></div>
        </div>

        <div id="res-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('res-drawer')">✕</button>
            <h2 style="color:var(--purple); margin: 30px 0 20px 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px;">📅 CAHIER DE RÉSERVATIONS</h2>
            <div style="background: #161616; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px;">
                <input type="date" id="res-date-filter" class="btn-top" style="width: 100%; box-sizing: border-box; margin-bottom: 15px; border-color: #444; background: #000; color: #fff;" onchange="renderReservations()">
                <button class="btn-top" style="width: 100%; background: var(--purple); color: #000; border: none;" onclick="toggleResForm()">+ NOUVELLE RÉSERVATION</button>
            </div>
            <div id="res-form" style="display:none; background: #0a0a0a; padding: 20px; border: 1px solid var(--purple); border-radius: 8px; margin-bottom: 20px;">
                <input type="text" id="res-name" class="btn-top" placeholder="Nom du client" style="width:100%; margin-bottom:10px; background:#000; border-color:#444; color:#fff;">
                <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                    <input type="time" id="res-time" class="btn-top" style="width:100%; background:#000; border-color:#444; color:#fff;">
                    <input type="number" id="res-pax" class="btn-top" placeholder="Pax" min="1" style="width:100%; background:#000; border-color:#444; color:#fff;">
                </div>
                <input type="text" id="res-table" class="btn-top" placeholder="N° de Table" style="width:100%; margin-bottom: 15px; background:#000; border-color:#444; color:#fff;">
                <button onclick="saveReservation()" class="btn-top" style="width: 100%; background: var(--accent); color: #000; border: none;">VALIDER LA RÉSERVATION</button>
            </div>
            <div id="res-list-container"></div>
        </div>

        <div id="admin-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="closeDrawer('admin-drawer')">✕</button>
            <h2 style="color:var(--warning); margin: 30px 0 30px 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px;">⚙️ GESTION DU SERVICE</h2>
            
            <div>
                <button class="admin-menu-btn" style="border-left: 5px solid var(--blue);" onclick="enableArchitecture()">
                    <span>🛠️</span> MODE ARCHITECTURE
                </button>
                
                <button class="admin-menu-btn" style="border-left: 5px solid #fff;" onclick="openDrawer('logs-drawer')">
                    <span>👁️</span> REGISTRE OPÉRATIONS
                </button>
                
                <button class="admin-menu-btn" style="border-left: 5px solid var(--purple); background: rgba(234, 128, 252, 0.1);" onclick="window.location.href='rh.html'">
                    <span style="color:var(--purple);">👔</span> MODIFIER PLANNINGS & CONTRATS (RH)
                </button>

                <button class="admin-menu-btn" style="border-left: 5px solid var(--alert); margin-top: 30px;" onclick="closeDrawer('admin-drawer')">
                    <span style="color:var(--alert);">🔒</span> VERROUILLER SUPERVISION
                </button>
            </div>
        </div>

        <div id="logs-drawer" class="drawer">
            <button class="btn-close-drawer" onclick="openDrawer('admin-drawer')">◀</button>
            <h2 style="color:#fff; margin: 30px 0 20px 0; font-size: 1.8rem; text-transform: uppercase; letter-spacing: 1px;">👁️ REGISTRE DES OPÉRATIONS</h2>
            <div id="logs-container" style="background:#111; border:1px solid #333; border-radius:8px; padding:15px; max-height: 60vh; overflow-y:auto;"></div>
            <button onclick="clearLogs()" style="width:100%; margin-top:20px; padding:10px; background:transparent; border:1px solid #444; color:#888; border-radius:6px; cursor:pointer;">Purger le registre</button>
        </div>

    </div>

    <div id="table-edit-modal" class="modal">
        <div class="modal-content" style="border-top-color: var(--blue);">
            <h2 style="color:var(--blue); margin-top:0;">ÉDITER LA TABLE</h2>
            <input type="hidden" id="edit-table-id">
            
            <div class="input-group">
                <label>Nom / Numéro affiché</label>
                <input type="text" id="edit-table-label" class="input-full">
            </div>
            
            <div style="display:flex; gap:10px;">
                <div class="input-group" style="flex:1;">
                    <label>Largeur (px)</label>
                    <input type="number" id="edit-table-w" class="input-full">
                </div>
                <div class="input-group" style="flex:1;">
                    <label>Hauteur (px)</label>
                    <input type="number" id="edit-table-h" class="input-full">
                </div>
            </div>

            <div class="input-group">
                <label>Arrondi (Pour tables rondes)</label>
                <select id="edit-table-radius" class="input-full">
                    <option value="8px">Standard (Carrée/Rect)</option>
                    <option value="50%">Arrondie (Ovale/Cercle)</option>
                </select>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="deleteTable()" style="flex:1; padding:10px; background:transparent; border:1px solid var(--alert); color:var(--alert); border-radius:6px; cursor:pointer; font-weight:bold;">SUPPRIMER</button>
                <button onclick="saveTableEdit()" style="flex:2; padding:10px; background:var(--blue); border:none; color:#000; border-radius:6px; font-weight:bold; cursor:pointer;">VALIDER</button>
            </div>
        </div>
    </div>

    <div id="zone-manager-modal" class="modal">
        <div class="modal-content" style="border-top-color: #fff;">
            <h2 style="color:#fff; margin-top:0;">GÉRER LES SALLES</h2>
            
            <div class="zone-manager-list" id="zone-manager-list">
                </div>

            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <input type="text" id="new-zone-name" class="input-full" placeholder="Nouvelle salle (ex: Étage)">
                <button onclick="addNewZone()" style="background:var(--accent); color:#000; border:none; padding:0 15px; border-radius:6px; font-weight:bold; cursor:pointer;">AJOUTER</button>
            </div>

            <button onclick="closeZoneManager()" style="width:100%; padding:10px; background:#222; border:none; color:#fff; border-radius:6px; font-weight:bold; cursor:pointer;">FERMER</button>
        </div>
    </div>

    <script>
        let isAdminUnlocked = false;

        // --- GESTION DES TIROIRS ET DU MENU ---
        function openDrawer(drawerId) {
            document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open'));
            document.getElementById(drawerId).classList.add('open');
            if(drawerId === 'plan-drawer') renderServicePlanning();
            if(drawerId === 'logs-drawer') renderLogs();
        }

        function closeDrawer(drawerId) {
            document.getElementById(drawerId).classList.remove('open');
            if(drawerId === 'admin-drawer' || drawerId === 'logs-drawer') isAdminUnlocked = false; 
            if(drawerId === 'res-drawer') document.getElementById('res-form').style.display = 'none';
        }

        function openAdminDrawer() {
            if(!isAdminUnlocked) {
                const code = prompt("🔒 CODE SÉCURITÉ REQUIS (Chef de Salle) :");
                if(code === "8888") {
                    isAdminUnlocked = true;
                    openDrawer('admin-drawer');
                    addLog("Authentification du Chef de Salle (Succès)");
                } else {
                    alert("❌ Code incorrect.");
                    addLog("Tentative de connexion échouée");
                }
            } else {
                openDrawer('admin-drawer');
            }
        }

        // --- MOTEUR DE ZONES (SALLES) ---
        let currentZoneId = 'z1';
        
        function getZones() {
            let zones = JSON.parse(localStorage.getItem('empire_salle_zones'));
            if(!zones || zones.length === 0) {
                zones = [
                    { id: 'z1', name: 'RESTAURANT' },
                    { id: 'z2', name: 'TERRASSE' },
                    { id: 'z3', name: 'BAR LOUNGE' }
                ];
                localStorage.setItem('empire_salle_zones', JSON.stringify(zones));
            }
            return zones;
        }

        function loadZonesUI() {
            const zones = getZones();
            const bar = document.getElementById('zones-bar');
            
            // Sécurité : s'assurer que currentZoneId existe toujours
            if(!zones.find(z => z.id === currentZoneId)) currentZoneId = zones[0].id;

            bar.innerHTML = zones.map(z => 
                `<div class="zone-tab ${z.id === currentZoneId ? 'active' : ''}" onclick="switchZone('${z.id}')">${z.name}</div>`
            ).join('');
            
            loadFloorPlan();
        }

        function switchZone(id) {
            currentZoneId = id;
            loadZonesUI();
        }

        function openZoneManager() {
            renderZoneManagerList();
            document.getElementById('zone-manager-modal').style.display = 'flex';
        }
        function closeZoneManager() { document.getElementById('zone-manager-modal').style.display = 'none'; }

        function renderZoneManagerList() {
            const zones = getZones();
            document.getElementById('zone-manager-list').innerHTML = zones.map(z => `
                <div class="zone-manager-item">
                    <span style="font-weight:bold; color:#fff;">${z.name}</span>
                    ${zones.length > 1 ? `<button onclick="deleteZone('${z.id}', '${z.name}')" style="background:none; border:none; color:var(--alert); cursor:pointer;">✕</button>` : ''}
                </div>
            `).join('');
        }

        function addNewZone() {
            const name = document.getElementById('new-zone-name').value.trim();
            if(!name) return;
            const zones = getZones();
            zones.push({ id: 'z' + Date.now(), name: name });
            localStorage.setItem('empire_salle_zones', JSON.stringify(zones));
            document.getElementById('new-zone-name').value = '';
            renderZoneManagerList();
            loadZonesUI();
        }

        function deleteZone(id, name) {
            if(confirm(`Supprimer la salle "${name}" et toutes ses tables ?`)) {
                let zones = getZones();
                zones = zones.filter(z => z.id !== id);
                localStorage.setItem('empire_salle_zones', JSON.stringify(zones));
                
                // Nettoyer les tables orphelines
                let tables = JSON.parse(localStorage.getItem('empire_salle_tables')) || [];
                tables = tables.filter(t => t.zoneId !== id);
                localStorage.setItem('empire_salle_tables', JSON.stringify(tables));

                renderZoneManagerList();
                loadZonesUI();
            }
        }


        // --- MOTEUR DU PLAN DE TABLE (ARCHITECTURE) ---
        let isArchiMode = false;
        let currentDrag = null;
        let startX = 0, startY = 0;
        let hasMoved = false; // Pour distinguer le clic du drag

        function getTables() {
            let tables = JSON.parse(localStorage.getItem('empire_salle_tables'));
            if(!tables || tables.length === 0) {
                // Default setup pour la z1
                tables = [
                    { id: 'T1', zoneId: 'z1', label: 'T1', w: 80, h: 80, t: 100, l: 150, color: 'var(--accent)', radius: '8px' },
                    { id: 'T2', zoneId: 'z1', label: 'T2', w: 120, h: 80, t: 100, l: 300, color: '#555', radius: '8px' }
                ];
                localStorage.setItem('empire_salle_tables', JSON.stringify(tables));
            }
            return tables;
        }

        function saveTables(tables) {
            localStorage.setItem('empire_salle_tables', JSON.stringify(tables));
        }

        function loadFloorPlan() {
            const floor = document.getElementById('floor-plan');
            const allTables = getTables();
            const currentTables = allTables.filter(t => t.zoneId === currentZoneId);
            
            floor.innerHTML = '';
            currentTables.forEach(t => {
                const div = document.createElement('div');
                div.className = 'table-obj';
                div.id = 'table-' + t.id;
                div.setAttribute('data-id', t.id);
                div.innerHTML = t.label || t.id;
                div.style.width = t.w + 'px';
                div.style.height = t.h + 'px';
                div.style.top = t.t + 'px';
                div.style.left = t.l + 'px';
                div.style.borderColor = t.color;
                div.style.borderRadius = t.radius || '8px';
                
                div.onmousedown = startDrag;
                div.ontouchstart = startDrag;

                floor.appendChild(div);
            });
        }

        function enableArchitecture() {
            isArchiMode = true;
            closeDrawer('admin-drawer'); 
            document.getElementById('main-header').style.display = 'none';
            document.getElementById('archi-toolbar').style.display = 'flex';
            document.getElementById('floor-plan').classList.add('archi-active');
            addLog("Mode Architecture Activé");
        }

        function saveArchitecture() {
            isArchiMode = false;
            document.getElementById('main-header').style.display = 'flex';
            document.getElementById('archi-toolbar').style.display = 'none';
            document.getElementById('floor-plan').classList.remove('archi-active');
            
            // Les positions sont sauvegardées au stopDrag, ici on quitte juste
            addLog("Nouveau plan de salle sauvegardé");
            alert("✅ Plan validé.");
        }

        function addTable() {
            const allTables = getTables();
            const newId = 't_' + Date.now();
            allTables.push({
                id: newId, zoneId: currentZoneId, label: 'New', w: 80, h: 80, t: 50, l: 50, color: '#fff', radius: '8px'
            });
            saveTables(allTables);
            loadFloorPlan();
        }

        // LOGIQUE D'ÉDITION MODAL
        function openTableEdit(id) {
            const t = getTables().find(table => table.id === id);
            if(!t) return;
            
            document.getElementById('edit-table-id').value = t.id;
            document.getElementById('edit-table-label').value = t.label || t.id;
            document.getElementById('edit-table-w').value = t.w;
            document.getElementById('edit-table-h').value = t.h;
            document.getElementById('edit-table-radius').value = t.radius || '8px';
            
            document.getElementById('table-edit-modal').style.display = 'flex';
        }

        function closeTableEdit() { document.getElementById('table-edit-modal').style.display = 'none'; }

        function saveTableEdit() {
            const id = document.getElementById('edit-table-id').value;
            let tables = getTables();
            const index = tables.findIndex(t => t.id === id);
            if(index > -1) {
                tables[index].label = document.getElementById('edit-table-label').value;
                tables[index].w = parseInt(document.getElementById('edit-table-w').value) || 80;
                tables[index].h = parseInt(document.getElementById('edit-table-h').value) || 80;
                tables[index].radius = document.getElementById('edit-table-radius').value;
                saveTables(tables);
                loadFloorPlan();
            }
            closeTableEdit();
        }

        function deleteTable() {
            const id = document.getElementById('edit-table-id').value;
            let tables = getTables();
            tables = tables.filter(t => t.id !== id);
            saveTables(tables);
            loadFloorPlan();
            closeTableEdit();
        }

        // LOGIQUE DRAG AND DROP
        function startDrag(e) {
            if(!isArchiMode) {
                // Utilisation normale du serveur (ouvre la table)
                addLog(`Table ${this.innerHTML} sélectionnée pour commande`);
                return;
            }
            
            hasMoved = false;
            currentDrag = this;
            const rect = currentDrag.getBoundingClientRect();
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            
            startX = clientX - rect.left;
            startY = clientY - rect.top;
            currentDrag.style.zIndex = 1000;
        }

        document.onmousemove = dragAction;
        document.ontouchmove = dragAction;

        function dragAction(e) {
            if(!isArchiMode || !currentDrag) return;
            hasMoved = true;
            
            let clientX = e.type.includes('mouse') ? e.clientX : e.touches[0].clientX;
            let clientY = e.type.includes('mouse') ? e.clientY : e.touches[0].clientY;
            
            const floor = document.getElementById('floor-plan').getBoundingClientRect();
            
            let newLeft = clientX - floor.left - startX;
            let newTop = clientY - floor.top - startY;

            // Magnétisme (30px)
            newLeft = Math.round(newLeft / 30) * 30;
            newTop = Math.round(newTop / 30) * 30;

            if(newLeft < 0) newLeft = 0;
            if(newTop < 0) newTop = 0;

            currentDrag.style.left = newLeft + 'px';
            currentDrag.style.top = newTop + 'px';
        }

        document.onmouseup = stopDrag;
        document.ontouchend = stopDrag;

        function stopDrag() {
            if(!currentDrag || !isArchiMode) return;
            
            if(!hasMoved) {
                // Clic simple en mode archi = Ouvrir l'éditeur
                openTableEdit(currentDrag.getAttribute('data-id'));
            } else {
                // A bougé = Sauvegarder la nouvelle position
                let tables = getTables();
                const id = currentDrag.getAttribute('data-id');
                const tIndex = tables.findIndex(t => t.id === id);
                if(tIndex > -1) {
                    tables[tIndex].l = parseInt(currentDrag.style.left);
                    tables[tIndex].t = parseInt(currentDrag.style.top);
                    saveTables(tables);
                }
            }
            
            currentDrag.style.zIndex = '';
            currentDrag = null;
        }

        // --- AUTRES MOTEURS (LOGS, RESAS, PLANNING) ---
        // (Le code des réservations, logs et planning reste identique à la version précédente)
        // ... [Raccourci visuel : les fonctions addLog, renderReservations, etc. sont inchangées ci-dessous]

        document.getElementById('res-date-filter').valueAsDate = new Date();

        function toggleResForm() {
            const form = document.getElementById('res-form');
            form.style.display = form.style.display === 'none' ? 'block' : 'none';
        }

        function saveReservation() {
            const date = document.getElementById('res-date-filter').value;
            const name = document.getElementById('res-name').value.trim();
            const time = document.getElementById('res-time').value;
            const pax = document.getElementById('res-pax').value;
            const table = document.getElementById('res-table').value.trim();

            if(!date || !name || !time || !pax) return alert("Remplir Date, Nom, Heure, Pax.");

            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(!resas[date]) resas[date] = [];
            resas[date].push({ id: Date.now(), name, time, pax, table });
            resas[date].sort((a, b) => a.time.localeCompare(b.time));
            localStorage.setItem('empire_reservations', JSON.stringify(resas));
            
            document.getElementById('res-name').value = ''; document.getElementById('res-time').value = '';
            document.getElementById('res-pax').value = ''; document.getElementById('res-table').value = '';
            toggleResForm(); renderReservations();
        }

        function deleteReservation(date, id) {
            if(!confirm("Annuler la réservation ?")) return;
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            if(resas[date]) {
                resas[date] = resas[date].filter(r => r.id !== id);
                localStorage.setItem('empire_reservations', JSON.stringify(resas));
                renderReservations();
            }
        }

        function renderReservations() {
            const date = document.getElementById('res-date-filter').value;
            const resas = JSON.parse(localStorage.getItem('empire_reservations')) || {};
            const container = document.getElementById('res-list-container');
            const dayResas = resas[date] || [];

            if(dayResas.length === 0) {
                container.innerHTML = '<div style="margin-top: 20px; color: #555; text-align: center;">Aucune réservation.</div>';
                return;
            }

            container.innerHTML = dayResas.map(r => `
                <div style="background: #111; border: 1px solid #333; border-left: 4px solid var(--purple); padding: 15px; border-radius: 8px; margin-bottom: 10px; display:flex; justify-content:space-between; align-items:center;">
                    <div>
                        <div style="font-size: 1.1rem; font-weight: 900; color: #fff;">${r.time} - ${r.name}</div>
                        <div style="font-size: 0.85rem; color: #aaa;">👥 ${r.pax} Pax | 📍 Table: <span style="color:var(--accent);">${r.table || 'Non assignée'}</span></div>
                    </div>
                    <button onclick="deleteReservation('${date}', ${r.id})" style="background:none; border:none; color:var(--alert); cursor:pointer; font-size:1.2rem;">✕</button>
                </div>
            `).join('');
        }

        function addLog(msg) {
            const logs = JSON.parse(localStorage.getItem('empire_salle_logs')) || [];
            logs.unshift({ time: new Date().toLocaleTimeString('fr-FR'), msg }); 
            if(logs.length > 100) logs.pop(); 
            localStorage.setItem('empire_salle_logs', JSON.stringify(logs));
            if(document.getElementById('logs-drawer').classList.contains('open')) renderLogs();
        }

        function renderLogs() {
            const logs = JSON.parse(localStorage.getItem('empire_salle_logs')) || [];
            const container = document.getElementById('logs-container');
            container.innerHTML = logs.length ? logs.map(l => `<div class="log-entry"><span class="log-time">[${l.time}]</span><span class="log-msg">${l.msg}</span></div>`).join('') : '<div style="color:#555;">Aucune opération.</div>';
        }

        function clearLogs() {
            if(confirm("Purger le registre ?")) { localStorage.removeItem('empire_salle_logs'); renderLogs(); }
        }

        function renderServicePlanning() {
            const allStaff = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            const serviceStaff = allStaff.filter(s => s.dept === 'service');
            const container = document.getElementById('service-planning-container');
            const jours = ["LUN", "MAR", "MER", "JEU", "VEN", "SAM", "DIM"];

            if(serviceStaff.length === 0) {
                container.innerHTML = "<p style='color:#555;'>Aucun personnel de salle configuré.</p>";
                return;
            }

            container.innerHTML = serviceStaff.map(s => {
                const daysHTML = s.plan.map((p, i) => {
                    let content = ""; let classN = "";
                    if (p.status === "off") { content = `<span style="color:#555; font-weight:900; font-size:0.7rem; margin-top:10px;">OFF</span>`; classN = "is-off"; }
                    else if (p.status === "conge") { content = `<span style="color:var(--accent); font-weight:900; font-size:0.7rem; margin-top:10px;">CONGÉ</span>`; }
                    else if (p.status === "maladie") { content = `<span style="color:var(--alert); font-weight:900; font-size:0.65rem; margin-top:10px;">MALADIE</span>`; classN = "is-off"; }
                    else if (p.status === "present") { content = `<div class="shift-time" style="color:#fff;">${p.s1 || '-'}</div><div class="shift-time" style="color:var(--purple); margin-top:4px;">${p.s2 || '-'}</div>`; }
                    else if (p.status === "off_matin") { content = `<div class="shift-time" style="color:#555; text-decoration:line-through;">Matin OFF</div><div class="shift-time" style="color:var(--purple); margin-top:4px;">${p.s2 || '-'}</div>`; classN = "is-half"; }
                    else if (p.status === "off_soir") { content = `<div class="shift-time" style="color:#fff;">${p.s1 || '-'}</div><div class="shift-time" style="color:#555; text-decoration:line-through; margin-top:4px;">Soir OFF</div>`; classN = "is-half"; }
                    return `<div class="mini-day ${classN}"><b>${jours[i]}</b>${content}</div>`;
                }).join('');
                return `<div class="staff-plan-card"><span class="staff-plan-name">${s.name}</span><div class="mini-grid">${daysHTML}</div></div>`;
            }).join('');
        }

        // INITIALISATION
        loadZonesUI();
        renderReservations();
        addLog("Démarrage du système de salle");

    </script>
</body>
</html>
