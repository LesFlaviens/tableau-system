<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Chef de Salle Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050505; --text: #fff; --sub: #aaa; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* BARRE LATERALE : RADAR & QR */
        .sidebar { width: 350px; border-right: 1px solid #333; display: flex; flex-direction: column; background: #0a0a0a; }
        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--gold); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        
        .radar-box { flex: 1; padding: 15px; overflow-y: auto; }
        .res-item { background: #111; border: 1px solid #222; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--gold); }
        
        .qr-section { padding: 20px; background: #000; border-top: 1px solid #333; text-align: center; }
        #qrcode { display: inline-block; padding: 10px; background: #fff; border-radius: 8px; margin-top: 10px; }

        /* CENTRE : PLAN DE SALLE */
        .main-view { flex: 1; position: relative; padding: 20px; overflow: auto; }
        .table-obj { position: absolute; background: #000; border: 2px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; transition: 0.2s; }
        .table-obj.occupied { border-color: var(--alert); color: var(--alert); box-shadow: 0 0 15px rgba(255, 23, 68, 0.3); }

        /* DROITE : DÉTAILS TABLE */
        .details-panel { width: 400px; border-left: 1px solid #333; padding: 25px; background: #0a0a0a; }
        .bill-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px dashed #333; font-weight: bold; }
        .btn-pay { width: 100%; padding: 20px; background: var(--gold); color: #000; border: none; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">⚡ Radar Réservations</div>
        <div id="radar-list" class="radar-box">
            <p style="color:var(--sub); font-size:0.8rem;">En attente de réservations...</p>
        </div>
        <div class="qr-section">
            <div style="font-size:0.7rem; font-weight:900; color:var(--gold); text-transform:uppercase;">Scanner pour Réserver</div>
            <div id="qrcode"></div>
            <p style="font-size:0.6rem; margin-top:10px; color:var(--sub);">Lien : /reservation.html</p>
        </div>
    </div>

    <div class="main-view">
        <div style="color:var(--gold); font-weight:900; margin-bottom:20px; text-transform:uppercase;">Plan de Salle Live</div>
        <div id="floor-plan" style="position:relative; width:1000px; height:800px;"></div>
    </div>

    <div class="details-panel" id="details-view">
        <h2 id="selected-table" style="margin-top:0;">SÉLECTIONNER TABLE</h2>
        <div id="table-content" style="min-height:300px;">
            <p style="color:var(--sub)">Aucune table active.</p>
        </div>
        <div id="total-box" style="display:none;">
            <div style="font-size:2rem; font-weight:900; text-align:right; border-top:2px solid #fff; padding-top:15px;">
                TOTAL: <span id="total-val">0.00</span>€
            </div>
            <button class="btn-pay" onclick="encaissement()">Encaisser (Code 7777)</button>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {};
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [
            {label:"T1", l:550, t:500, w:80, h:120}, {label:"T2", l:550, t:300, w:80, h:120},
            {label:"T3", l:430, t:450, w:80, h:120}, {label:"T4", l:440, t:300, w:80, h:120},
            {label:"T5", l:330, t:430, w:80, h:120}, {label:"T6", l:350, t:300, w:80, h:120},
            {label:"T7", l:150, t:550, w:80, h:120}, {label:"T8", l:120, t:300, w:80, h:120},
            {label:"T9", l:250, t:250, w:80, h:120}, {label:"T10", l:240, t:420, w:80, h:120}
        ];

        // Génération du QR Code
        new QRCode(document.getElementById("qrcode"), {
            text: window.location.origin + "/reservation.html",
            width: 120, height: 120, colorDark : "#000000", colorLight : "#ffffff"
        });

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if(msg.type === 'ORDER_UPDATE') {
                activeOrders = msg.activeOrders;
                renderFloor();
                renderRadar();
                if(currentTableId) selectTable(currentTableId);
            }
        };

        function renderFloor() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                const div = document.createElement('div'); div.className = 'table-obj';
                if(activeOrders[t.label]) div.classList.add('occupied');
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = t.label; div.onclick = () => selectTable(t.label);
                floor.appendChild(div);
            });
        }

        let currentTableId = null;
        function selectTable(id) {
            currentTableId = id;
            document.getElementById('selected-table').innerText = "TABLE " + id;
            const o = activeOrders[id];
            const content = document.getElementById('table-content');
            const totalBox = document.getElementById('total-box');

            if(!o) {
                content.innerHTML = '<p style="color:var(--sub)">Table libre.</p>';
                totalBox.style.display = 'none';
                return;
            }

            let total = 0;
            content.innerHTML = o.items.map(i => {
                total += i.p;
                return `<div class="bill-item"><span>${i.n}</span><span>${i.p.toFixed(2)}€</span></div>`;
            }).join('');
            
            document.getElementById('total-val').innerText = total.toFixed(2);
            totalBox.style.display = 'block';
        }

        function renderRadar() {
            const resData = activeOrders['GLOBAL_RESERVATIONS'] ? activeOrders['GLOBAL_RESERVATIONS'].data : {};
            const today = new Date().toISOString().split('T')[0];
            const list = resData[today] || [];
            
            document.getElementById('radar-list').innerHTML = list.length > 0 ? list.map(r => `
                <div class="res-item">
                    <div style="font-weight:900; color:var(--gold);">${r.time}</div>
                    <div style="font-size:0.9rem;">${r.name.toUpperCase()}</div>
                    <div style="font-size:0.7rem; color:var(--sub);">${r.pax} Personnes</div>
                </div>
            `).join('') : '<p style="color:var(--sub); font-size:0.8rem;">Aucune résa pour aujourd\'hui.</p>';
        }

        async function encaissement() {
            const code = prompt("CODE SÉCURITÉ ENCAISSEMENT :");
            if(code === '7777') {
                await fetch('/update-order', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tableId: currentTableId, order: null })
                });
                alert("TABLE LIBÉRÉE. VENTE ENREGISTRÉE.");
                currentTableId = null;
            } else { alert("CODE INCORRECT."); }
        }

        fetch('/get-current-state').then(r=>r.json()).then(d=>{ activeOrders=d.activeOrders; renderFloor(); renderRadar(); });
        setInterval(() => fetch('/get-current-state').then(r=>r.json()).then(d=>{ activeOrders=d.activeOrders; renderFloor(); renderRadar(); }), 5000);
    </script>
</body>
</html>
