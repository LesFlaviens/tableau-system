<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Chef de Salle</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; --gold: #ffb300; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: none; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        
        header { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; position: relative; background: #000;}
        .header-title { color: var(--text); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; margin: 0; }
        .brand-watermark { position: absolute; left: 50%; transform: translateX(-50%); font-family: 'Arial', sans-serif; font-style: italic; font-size: 1.2rem; color: #fff; font-weight: bold; pointer-events: none; }
        
        .btn-top { background: transparent; border: 1px solid var(--line); color: var(--text); padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.2s; position: relative; white-space: nowrap; }
        .btn-top:active { background: #fff; color: #000; }
        .radar-badge { position: absolute; top: -8px; right: -8px; background: var(--text); color: #000; border-radius: 50%; width: 20px; height: 20px; font-size: 0.75rem; display: flex; justify-content: center; align-items: center; animation: blink 1s infinite; font-weight: bold;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .room-bar { background: #0a0a0a; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 12px 25px; display: flex; gap: 10px; overflow-x: auto; z-index: 999; }
        .room-tab { background: transparent; border: 1px solid var(--sub); color: var(--sub); padding: 8px 25px; border-radius: 20px; font-weight: 900; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; white-space: nowrap; transition: 0.2s; }
        .room-tab.active { background: #fff; color: #000; border-color: #fff; }

        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; padding: 15px; box-sizing: border-box;}
        
        /* ARCHITECTURE & PLAN */
        .floor-plan { flex: 1; position: relative; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: hidden; background: transparent; }
        .table-obj { position: absolute; background: #000; border: 2px solid var(--line); color: var(--text); display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; z-index: 50; font-size: 1.5rem; transition: box-shadow 0.2s; box-sizing: border-box; }
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,23,68,0.1); color: var(--alert); }
        .table-obj.ready { border-color: var(--accent); background: rgba(0,230,118,0.15); color: var(--accent); animation: pulse-border 1.2s infinite; }
        @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 0 rgba(0,230,118,0); } 50% { box-shadow: 0 0 20px rgba(0,230,118,0.8); } }

        .resize-handle { position: absolute; right: -10px; bottom: -10px; width: 30px; height: 30px; background: var(--gold); border-radius: 50%; z-index: 100; box-shadow: 0 0 10px rgba(0,0,0,0.8); border: 2px solid #000; display: none; }
        .is-selected .resize-handle { display: block; }

        #architect-floating-bar { display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid var(--line); border-radius: 8px; padding: 15px; z-index: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.8); align-items: center; gap: 15px; flex-wrap: wrap; justify-content: center; width: max-content; max-width: 90%; }
        
        /* TIROIRS CLASSIQUES */
        .drawer { position: absolute; top: 0; right: 0; height: 100%; width: 100%; max-width: 480px; background: #050505; border-left: 1px solid var(--line); padding: 30px; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; box-sizing: border-box; }
        .drawer.open { transform: translateX(0); }
        #radar-drawer { right: auto; left: 0; border-left: none; border-right: 1px solid var(--line); transform: translateX(-100%); }
        #radar-drawer.open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--line); padding-bottom: 15px; flex-shrink: 0;}
        .btn-close { background: transparent; border: 1px solid var(--line); color: var(--line); width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s;}
        .btn-close:active { background: #fff; color: #000; }

        /* =========================================
           NOUVEL ECRAN DE CAISSE (SPLIT-SCREEN POS)
           ========================================= */
        #caisse-drawer {
            max-width: 100%; flex-direction: row; padding: 20px; gap: 20px; background: var(--bg); border-left: none;
        }

        .pos-left { flex: 6; display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 8px; padding: 20px; background: #0a0a0a; overflow: hidden; }
        .cat-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; flex-shrink: 0; margin-bottom: 10px; border-bottom: 1px solid #333;}
        .cat-tab { padding: 15px 20px; background: #000; border: 1px solid var(--line); border-radius: 4px; font-size: 1rem; color: var(--sub); font-weight: 900; cursor: pointer; text-transform: uppercase; white-space: nowrap; flex: 1; text-align: center;}
        .cat-tab.active { background: #fff; color: #000; border-color: #fff;}
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; overflow-y: auto; align-content: start; padding-right: 5px;}
        .btn-item { background: #000; border: 1px solid var(--sub); color: var(--line); padding: 15px; border-radius: 4px; font-weight: bold; text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100px; font-size: 1.1rem; transition: 0.1s;}
        .btn-item:active { background: #fff; color: #000; transform: scale(0.95);}
        .btn-item span:last-child { color: var(--sub); font-size: 0.9rem; margin-top: 8px; }

        .pos-right { flex: 4; display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 8px; padding: 20px; background: #0a0a0a; overflow: hidden; }
        .ticket-area { flex: 1; background: #000; border: 1px solid var(--line); border-radius: 4px; padding: 15px; overflow-y: auto; margin-bottom: 15px; }
        .obs-input-container { flex-shrink: 0; margin-bottom: 15px; }
        
        .total-section { flex-shrink: 0; display: flex; flex-direction: column; gap: 10px; border-top: 1px solid #333; padding-top: 15px;}
        
        /* FORMULAIRES */
        .input-group { margin-bottom: 15px; }
        .input-label { display: block; color: var(--sub); font-size: 0.8rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .input-field { width: 100%; background: #000; border: 1px solid var(--line); color: var(--text); padding: 12px; border-radius: 4px; font-size: 1.1rem; box-sizing: border-box; font-family: inherit; font-weight: bold; }
        .btn-action { padding: 15px 20px; background: transparent; color: #fff; border: 1px solid #fff; border-radius: 4px; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: 0.2s; white-space: nowrap;}
        .btn-action:active { background: #fff; color: #000; }
        
        .alert-card { border: 1px solid var(--line); padding: 15px; border-radius: 4px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; background: #000;}
        .audit-log { background: #000; border: 1px solid var(--line); padding: 15px; border-radius: 4px; margin-bottom: 10px; font-family: monospace; font-size: 0.9rem; }

        @media (max-width: 800px) {
            .brand-watermark { display: none; }
            #caisse-drawer { flex-direction: column; overflow-y: auto; }
            .pos-left, .pos-right { flex: none; height: auto; min-height: 50vh; }
            .pos-right { order: -1; } /* Ticket en haut sur mobile */
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">CHEF DE SALLE</div>
        <div class="brand-watermark">ichef.ch</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-top" onclick="openDrawer('radar-drawer')">📡 RADAR<div id="radar-badge" class="radar-badge" style="display:none;">0</div></button>
            <button class="btn-top" onclick="openDrawer('resa-drawer')">⚡ RÉSA</button>
            <button class="btn-top" style="border-color:var(--gold); color:var(--gold);" onclick="checkChefSecurity()">🔐 MANAGER</button>
        </div>
    </header>

    <div id="room-bar" class="room-bar"></div>

    <div class="main-workspace">
        <div class="floor-plan" id="floor-plan"></div>

        <div id="architect-floating-bar">
            <span style="color:var(--gold); font-weight:bold; font-size:0.8rem; margin-right:10px;">MODE ARCHITECTE</span>
            <button class="btn-action" onclick="addTable()">+ NOUVELLE TABLE</button>
            <button class="btn-action" onclick="addRoom()">+ NOUVELLE SALLE</button>
            
            <div id="edit-context" style="display:none; align-items:center; gap:10px; border-left:1px solid #333; padding-left:15px; margin-left:5px;">
                <input type="text" id="edit-label" class="input-field" style="margin:0; width:120px; text-align:center;" oninput="updateSelectedLabel(this.value)" placeholder="Nom...">
                <button class="btn-action" onclick="modifySelected('shape')">ROND/CARRÉ</button>
                <button class="btn-action" style="color:var(--alert); border-color:var(--alert);" onclick="modifySelected('delete')">🗑️ TABLE</button>
            </div>
            
            <button class="btn-action" style="color:var(--alert); border-color:var(--alert); margin-left:15px;" onclick="deleteCurrentRoom()">🗑️ SUPPRIMER SALLE</button>
            <button class="btn-action" style="background:#fff; color:#000; margin-left:15px;" onclick="savePlan()">💾 DÉPLOYER LE PLAN</button>
        </div>

        <div id="radar-drawer" class="drawer" style="width: 450px;">
            <div class="drawer-header"><h2 style="margin:0;">ALERTES</h2><button class="btn-close" onclick="closeDrawer('radar-drawer')">✕</button></div>
            <div id="radar-list" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
        </div>

        <div id="caisse-drawer" class="drawer">
            <div class="pos-left">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2 style="margin:0; font-size:1.8rem; color:var(--gold); text-transform:uppercase;">La Carte</h2>
                </div>
                <div class="cat-tabs" id="cat-tabs"></div>
                <div class="menu-grid" id="menu-items"></div>
            </div>

            <div class="pos-right">
                <div class="drawer-header" style="margin-bottom:15px; padding-bottom:10px;">
                    <h2 id="table-title" style="margin:0; font-size:2.2rem; color: #fff;">TABLE</h2>
                    <button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button>
                </div>
                
                <div class="ticket-area" id="ticket-list"></div>
                
                <div class="obs-input-container">
                    <input type="text" id="order-obs" class="input-field" placeholder="⚠️ OBSERVATIONS (Ex: Sans sel, VIP...)">
                </div>
                
                <div class="total-section">
                    <div id="total-val" style="font-size:2.5rem; font-weight:900; text-align:right;">0.00 €</div>
                    <button class="btn-action" style="background:#fff; color:#000;" onclick="sendOrder()">VALIDER ET ENVOYER</button>
                    <button class="btn-action" style="border-style:dashed;" onclick="clearTable()">💳 ENCAISSER / LIBÉRER TABLE</button>
                </div>
            </div>
        </div>
        <div id="resa-drawer" class="drawer" style="width: 400px;">
            <div class="drawer-header"><h2 style="margin:0;">NOUVELLE RÉSA</h2><button class="btn-close" onclick="closeDrawer('resa-drawer')">✕</button></div>
            <div style="flex:1; overflow-y:auto; padding-right:5px;">
                <div class="input-group"><span class="input-label">Date</span><input type="date" id="resa-date" class="input-field"></div>
                <div class="input-group"><span class="input-label">Heure</span><input type="time" id="resa-time" class="input-field" value="20:00"></div>
                <div class="input-group"><span class="input-label">Nom</span><input type="text" id="resa-name" class="input-field"></div>
                <div class="input-group"><span class="input-label">Tél</span><input type="tel" id="resa-tel" class="input-field"></div>
                <div class="input-group"><span class="input-label">Pax</span><input type="number" id="resa-pax" class="input-field" value="2" min="1"></div>
            </div>
            <button class="btn-action" style="background:#fff; color:#000; width:100%;" onclick="saveResa()">SÉCURISER</button>
        </div>

        <div id="audit-drawer" class="drawer" style="width: 500px;">
            <div class="drawer-header"><h2 style="margin:0;">ESPACE MANAGER</h2><button class="btn-close" onclick="closeDrawer('audit-drawer')">✕</button></div>
            
            <div style="border:1px solid var(--gold); padding:20px; border-radius:8px; margin-bottom:30px; background:rgba(255,179,0,0.05);">
                <h3 style="margin-top:0; color:var(--gold);">🛠️ GESTION ARCHITECTURE</h3>
                <p style="font-size:0.9rem; color:#aaa; margin-bottom:15px;">Modifiez le plan de salle tactilement (Salles en onglets, ajout, redimensionnement au doigt).</p>
                <button class="btn-action" style="background:var(--gold); color:#000; border:none; width:100%;" onclick="startEditMode()">ACTIVER LE MODE ARCHITECTE</button>
            </div>

            <h3 style="margin-bottom:10px;">AUDIT FINANCIER</h3>
            <div id="audit-list" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];
        
        let isEditMode = false;
        let savedRooms = JSON.parse(localStorage.getItem('EMPIRE_ROOMS'));
        let rooms = (savedRooms && savedRooms.length > 0) ? savedRooms : [{id: 'r_main', name: 'SALLE PRINCIPALE'}];
        let currentRoomId = rooms[0].id;
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];
        
        let selectedObj = null; let draggedObj = null; let isResizing = false;
        let startX, startY, startW, startH, offsetX, offsetY;

        const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
        document.getElementById('resa-date').value = tmrw.toISOString().split('T')[0];

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE' || msg.type === 'PLAN_UPDATE') {
                activeOrders = msg.activeOrders || activeOrders;
                
                if (activeOrders['GLOBAL_PLAN'] && !isEditMode) {
                    if(activeOrders['GLOBAL_PLAN'].rooms) { 
                        rooms = activeOrders['GLOBAL_PLAN'].rooms; 
                        localStorage.setItem('EMPIRE_ROOMS', JSON.stringify(rooms)); 
                    }
                    if(activeOrders['GLOBAL_PLAN'].tables) { 
                        tables = activeOrders['GLOBAL_PLAN'].tables; 
                        localStorage.setItem('EMPIRE_TABLES', JSON.stringify(tables)); 
                    }
                }
                
                if (!rooms.find(r => r.id === currentRoomId)) currentRoomId = rooms[0].id;
                renderRooms(); renderFloorPlan(); renderRadar(); 
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'empire_recipes' && document.getElementById('caisse-drawer').classList.contains('open')) { renderMenu('Entrée'); }
        });

        async function forceSync() { 
            try { 
                const res = await fetch('/get-current-state'); const data = await res.json(); 
                activeOrders = data.activeOrders; 
                
                if (activeOrders['GLOBAL_PLAN'] && !isEditMode) {
                    if(activeOrders['GLOBAL_PLAN'].rooms) { rooms = activeOrders['GLOBAL_PLAN'].rooms; localStorage.setItem('EMPIRE_ROOMS', JSON.stringify(rooms)); }
                    if(activeOrders['GLOBAL_PLAN'].tables) { tables = activeOrders['GLOBAL_PLAN'].tables; localStorage.setItem('EMPIRE_TABLES', JSON.stringify(tables)); }
                }

                renderRooms(); renderFloorPlan(); renderRadar(); 
            } catch(e) {} 
        }

        function openDrawer(id) { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open')); document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        function renderRooms() {
            const container = document.getElementById('room-bar');
            container.innerHTML = rooms.map(r => `<button class="room-tab ${r.id === currentRoomId ? 'active' : ''}" onclick="switchRoom('${r.id}')">${r.name}</button>`).join('');
        }
        function switchRoom(id) { currentRoomId = id; selectedObj = null; if(isEditMode) document.getElementById('edit-context').style.display = 'none'; renderRooms(); renderFloorPlan(); }

        // --- MOTEUR ARCHITECTE ---
        function checkChefSecurity() {
            const pin = prompt("CODE MANAGER :");
            if (pin === "7777") {
                document.getElementById('audit-list').innerHTML = (JSON.parse(localStorage.getItem('EMP_LOCAL_AUDIT')) || []).map(l => `<div class="audit-log"><div>${l.time}</div><div>${l.action}</div></div>`).join('');
                openDrawer('audit-drawer');
            } else if (pin !== null) { alert("Accès refusé."); }
        }

        function startEditMode() {
            isEditMode = true; selectedObj = null; closeDrawer('audit-drawer');
            document.getElementById('architect-floating-bar').style.display = 'flex';
            document.getElementById('edit-context').style.display = 'none';
            renderRooms(); renderFloorPlan();
        }

        function addRoom() {
            const name = prompt("Nom de la nouvelle salle ? (ex: TERRASSE)");
            if(!name) return;
            const newRoom = { id: 'r_'+Date.now(), name: name.toUpperCase() };
            rooms.push(newRoom); switchRoom(newRoom.id);
        }

        function deleteCurrentRoom() {
            if(rooms.length <= 1) return alert("Impossible. Vous devez avoir au moins une salle.");
            const tablesInRoom = tables.filter(t => t.roomId === currentRoomId);
            if(tablesInRoom.length > 0) return alert("Interdit : Vous devez d'abord supprimer toutes les tables de cette salle.");
            if(!confirm("Êtes-vous sûr de supprimer cet onglet ?")) return;
            rooms = rooms.filter(r => r.id !== currentRoomId);
            switchRoom(rooms[0].id);
        }

        function addTable() {
            let maxNum = 0; tables.forEach(t => { const match = t.label.match(/T(\d+)/i); if(match) maxNum = Math.max(maxNum, parseInt(match[1])); });
            const newObj = { id: Date.now().toString(), label: `T${maxNum + 1}`, l: window.innerWidth/2 - 50, t: window.innerHeight/2 - 150, w: 100, h: 100, shape: 'square', roomId: currentRoomId };
            tables.push(newObj); selectObject(newObj); renderFloorPlan();
        }

        function selectObject(obj) {
            selectedObj = obj; document.getElementById('edit-context').style.display = 'flex';
            document.getElementById('edit-label').value = obj.label; renderFloorPlan();
        }

        function updateSelectedLabel(val) { if(!selectedObj) return; selectedObj.label = val; renderFloorPlan(); }

        function modifySelected(action) {
            if (!selectedObj) return;
            if (action === 'shape') selectedObj.shape = selectedObj.shape === 'round' ? 'square' : 'round';
            if (action === 'delete') { tables = tables.filter(t => t.id !== selectedObj.id); selectedObj = null; document.getElementById('edit-context').style.display = 'none'; }
            renderFloorPlan();
        }

        function savePlan() {
            localStorage.setItem('EMPIRE_TABLES', JSON.stringify(tables));
            localStorage.setItem('EMPIRE_ROOMS', JSON.stringify(rooms));
            fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: 'GLOBAL_PLAN', order: { status: 'system', rooms: rooms, tables: tables } }) });
            isEditMode = false; selectedObj = null; document.getElementById('architect-floating-bar').style.display = 'none';
            renderFloorPlan(); alert("Plan déployé sur tout le réseau !");
        }

        // DRAG & RESIZE TACTILE
        const floorArea = document.getElementById('floor-plan');
        floorArea.addEventListener('pointermove', (e) => {
            if (!isEditMode) return;
            if (isResizing && selectedObj) {
                selectedObj.w = Math.max(60, startW + (e.clientX - startX)); selectedObj.h = Math.max(60, startH + (e.clientY - startY)); renderFloorPlan();
            } else if (draggedObj) {
                const rect = floorArea.getBoundingClientRect(); draggedObj.l = e.clientX - rect.left - offsetX; draggedObj.t = e.clientY - rect.top - offsetY; renderFloorPlan();
            }
        });
        floorArea.addEventListener('pointerup', () => { draggedObj = null; isResizing = false; });
        floorArea.addEventListener('pointerleave', () => { draggedObj = null; isResizing = false; });

        function renderFloorPlan() {
            floorArea.innerHTML = '';
            tables.forEach(t => {
                if(!t.roomId) t.roomId = rooms[0].id; 
                if(t.roomId !== currentRoomId) return; 
                
                const div = document.createElement('div'); div.className = 'table-obj'; 
                if (isEditMode && selectedObj && selectedObj.id === t.id) div.classList.add('is-selected');
                div.style.borderRadius = t.shape === 'round' ? '50%' : '8px';
                
                const order = activeOrders[t.id] || activeOrders[t.label];
                if(order && order.status !== 'system') { const foodReady = order.items.filter(i => i.category !== 'Boisson').length > 0 && order.items.filter(i => i.category !== 'Boisson').every(i => i.done); if (foodReady) div.classList.add('ready'); else div.classList.add('occupied'); }
                
                div.innerHTML = `<span>${t.label}</span>`; div.style.left = t.l + 'px'; div.style.top = t.t + 'px'; div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                
                if (isEditMode) {
                    div.style.border = selectedObj && selectedObj.id === t.id ? '3px solid var(--gold)' : '2px solid var(--line)';
                    const handle = document.createElement('div'); handle.className = 'resize-handle';
                    handle.addEventListener('pointerdown', (e) => { e.stopPropagation(); isResizing = true; selectObject(t); startX = e.clientX; startY = e.clientY; startW = t.w; startH = t.h; });
                    div.appendChild(handle);
                    div.addEventListener('pointerdown', (e) => { e.stopPropagation(); selectObject(t); draggedObj = t; const rect = floorArea.getBoundingClientRect(); offsetX = e.clientX - rect.left - t.l; offsetY = e.clientY - rect.top - t.t; });
                } else { div.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); openCaisse(t.label || t.id); }); }
                floorArea.appendChild(div);
            });
        }
        
        function renderRadar() {
            const container = document.getElementById('radar-list'); let html = ''; let alertsCount = 0;
            for (const tableId in activeOrders) {
                const order = activeOrders[tableId]; if (!order.items || order.items.length === 0) continue;
                const isWeb = tableId.includes('WEB'); const foodItems = order.items.filter(i => i.category !== 'Boisson'); const drinkItems = order.items.filter(i => i.category === 'Boisson');
                const foodReady = foodItems.length > 0 && foodItems.every(i => i.done);
                if (foodReady) { alertsCount++; html += `<div class="alert-card"><b>🔥 CUISINE PRÊTE</b><span style="font-size:1.1rem;">Table : ${tableId.replace('WEB_','')}</span></div>`; }
                const drinksReady = drinkItems.length > 0 && drinkItems.every(i => i.done);
                if (drinksReady && !foodReady) { alertsCount++; html += `<div class="alert-card"><b>🧊 BAR PRÊT</b><span style="font-size:1.1rem;">Table : ${tableId.replace('WEB_','')}</span></div>`; }
                if (isWeb && order.items.every(i => !i.done)) { alertsCount++; html += `<div class="alert-card"><b>🌐 COMMANDE QR</b><span style="font-size:1.1rem;">Table : ${tableId.replace('WEB_','')}</span></div>`; }
            }
            container.innerHTML = html || '<div style="color:#555; text-align:center; padding-top:20px;">Aucune alerte.</div>';
            const badge = document.getElementById('radar-badge'); if (alertsCount > 0) { badge.style.display = 'flex'; badge.textContent = alertsCount; } else { badge.style.display = 'none'; }
        }

        function openCaisse(label) { 
            currentTableId = label; document.getElementById('table-title').innerText = label; 
            currentTicket = activeOrders[label]?.items || []; 
            document.getElementById('order-obs').value = activeOrders[label]?.observation || '';
            renderTicket(); renderMenu('Entrée'); openDrawer('caisse-drawer'); 
        }

        // MOTEUR MENU AVEC DONNEES DE TEST
        function renderMenu(activeCategory = 'Entrée') {
            const testMenu = [
                {name: 'Salade César', price: 12, category: 'Entrée'}, {name: 'Soupe Oignon', price: 9, category: 'Entrée'}, {name: 'Carpaccio Bœuf', price: 14, category: 'Entrée'}, {name: 'Tartare Saumon', price: 15, category: 'Entrée'}, {name: 'Foie Gras', price: 18, category: 'Entrée'}, {name: 'Escargots (x6)', price: 10, category: 'Entrée'}, {name: 'Œufs Mayo', price: 7, category: 'Entrée'}, {name: 'Bruschetta', price: 11, category: 'Entrée'}, {name: 'Saumon Fumé', price: 16, category: 'Entrée'}, {name: 'Salade Chèvre', price: 13, category: 'Entrée'},
                {name: 'Entrecôte 300g', price: 28, category: 'Plat'}, {name: 'Filet de Bar', price: 24, category: 'Plat'}, {name: 'Risotto Truffes', price: 22, category: 'Plat'}, {name: 'Magret Canard', price: 26, category: 'Plat'}, {name: 'Burger Empire', price: 19, category: 'Plat'}, {name: 'Tartare Bœuf', price: 20, category: 'Plat'}, {name: 'Côte de Bœuf', price: 65, category: 'Plat'}, {name: 'Lasagnes', price: 18, category: 'Plat'}, {name: 'Poke Bowl', price: 17, category: 'Plat'}, {name: 'Poulet Rôti', price: 19, category: 'Plat'},
                {name: 'Tiramisu', price: 8, category: 'Dessert'}, {name: 'Fondant Choco', price: 9, category: 'Dessert'}, {name: 'Crème Brûlée', price: 8, category: 'Dessert'}, {name: 'Tarte Citron', price: 7, category: 'Dessert'}, {name: 'Profiteroles', price: 10, category: 'Dessert'}, {name: 'Coupe Glacée', price: 7, category: 'Dessert'}, {name: 'Café Gourmand', price: 11, category: 'Dessert'}, {name: 'Macarons', price: 9, category: 'Dessert'}, {name: 'Éclair Café', price: 6, category: 'Dessert'}, {name: 'Millefeuille', price: 8, category: 'Dessert'}
            ];
            
            let menu = JSON.parse(localStorage.getItem('empire_recipes'));
            if (!menu || menu.length < 5) { menu = testMenu; localStorage.setItem('empire_recipes', JSON.stringify(testMenu)); }

            const categories = ['Entrée', 'Plat', 'Dessert'];
            document.getElementById('cat-tabs').innerHTML = categories.map(cat => `<div class="cat-tab ${cat === activeCategory ? 'active' : ''}" onclick="renderMenu('${cat}')">${cat}</div>`).join('');
            document.getElementById('menu-items').innerHTML = menu.filter(m => (m.category || 'Autre') === activeCategory).map(m => `<div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price}, '${m.category}')"><span>${m.name}</span><span style="color:var(--sub);">${parseFloat(m.price).toFixed(2)}€</span></div>`).join('');
        }

        function addItem(n, p, c) { currentTicket.push({id: Date.now(), n: n, p: p, category: c, done: false}); renderTicket(); }
        function removeItem(targetIndex) { currentTicket.splice(targetIndex, 1); renderTicket(); }

        function renderTicket() {
            const list = document.getElementById('ticket-list'); let total = 0; const itemCounts = {};
            
            currentTicket.forEach((i, idx) => { 
                total += i.p || 0; const name = i.n; 
                if (!itemCounts[name]) itemCounts[name] = { item: i, count: 0, indices: [], price: i.p || 0 }; 
                itemCounts[name].count++; itemCounts[name].indices.push(idx); 
            });
            
            let html = '';
            for (const key in itemCounts) {
                const g = itemCounts[key]; const lastIndex = g.indices[g.indices.length - 1]; const statusIcon = g.item.done ? '✅' : '⏳';
                
                html += `
                <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px dashed rgba(255,255,255,0.2); align-items:center;">
                    <span style="font-weight:bold; font-size:1.1rem; flex:1; display:flex; align-items:center;">
                        <span style="display:inline-block; min-width:30px; font-weight:900; color:#fff;">${g.count}x</span> 
                        <span style="margin-right:6px; font-size:0.8rem;">${statusIcon}</span> 
                        ${key}
                    </span>
                    <span style="font-weight:bold; font-size:1.1rem; display:flex; align-items:center;">
                        ${(g.price * g.count).toFixed(2)}€ 
                        <button onclick="removeItem(${lastIndex})" style="background:transparent; border:1px solid var(--alert); color:var(--alert); border-radius:4px; padding:4px 10px; margin-left:10px; cursor:pointer; font-weight:bold; transition:0.2s;">✕</button>
                    </span>
                </div>`;
            }
            list.innerHTML = html || '<div style="color:#555; text-align:center; padding:40px; font-size:1rem; font-weight:bold; font-style:italic;">-- TICKET VIDE --</div>'; 
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return; 
            const obs = document.getElementById('order-obs').value.trim();
            const order = { table: currentTableId, items: currentTicket, observation: obs, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), status: 'pending' };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('order-obs').value = ''; 
            closeDrawer('caisse-drawer');
        }

        async function clearTable() {
            if(!confirm("Encaisser et libérer cette table ?")) return;
            const totalStr = document.getElementById('total-val').innerText.replace(' €', ''); const total = parseFloat(totalStr);
            if (total > 0) {
                const today = new Date().toISOString().split('T')[0]; const time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                let transacs = JSON.parse(localStorage.getItem('empire_transactions')) || []; transacs.push({ date: today, time: time, table: currentTableId, total: total }); localStorage.setItem('empire_transactions', JSON.stringify(transacs));
            }
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order: { status: 'ready' } }) });
            logAudit(`ENCAISSEMENT - Table ${currentTableId} libérée. Montant: ${totalStr}€`); closeDrawer('caisse-drawer');
        }

        function saveResa() {
            const date = document.getElementById('resa-date').value; const time = document.getElementById('resa-time').value; const name = document.getElementById('resa-name').value.trim(); const pax = document.getElementById('resa-pax').value; const tel = document.getElementById('resa-tel').value.trim();
            if(!date || !name) return alert("Date et Nom obligatoires.");
            let resas = JSON.parse(localStorage.getItem('empire_reservations')) || {}; if(!resas[date]) resas[date] = [];
            resas[date].push({ id: Date.now(), time, name, pax, tel, status: 'confirmed' }); localStorage.setItem('empire_reservations', JSON.stringify(resas));
            if(ws.readyState === WebSocket.OPEN) { fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: 'GLOBAL_RESAS', order: { status: 'system', items: [], reservations: resas } }) }); }
            document.getElementById('resa-name').value = ''; document.getElementById('resa-tel').value = ''; closeDrawer('resa-drawer');
        }

        function logAudit(action) { let logs = JSON.parse(localStorage.getItem('EMP_LOCAL_AUDIT')) || []; logs.unshift({ time: new Date().toLocaleString('fr-FR'), action: action }); if(logs.length > 50) logs.pop(); localStorage.setItem('EMP_LOCAL_AUDIT', JSON.stringify(logs)); }

        forceSync(); setInterval(forceSync, 3000); 
    </script>
</body>
</html>
