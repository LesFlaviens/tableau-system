<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Architecture Dynamique</title>
    <style>
        :root { --bg: #050505; --text: #fff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* Layout */
        .sidebar-left { width: 280px; border-right: 1px solid #333; background: var(--panel); display: flex; flex-direction: column; }
        .viewport { flex: 1; position: relative; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; overflow: hidden; }
        .sidebar-right { width: 320px; border-left: 1px solid #333; padding: 20px; background: var(--panel); display: flex; flex-direction: column; }

        /* Bouton Architecture Top Right */
        #arch-master-btn { position: absolute; top: 20px; right: 20px; z-index: 1000; background: #000; border: 2px solid var(--gold); color: var(--gold); padding: 12px 20px; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        #arch-master-btn.active { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(255, 179, 0, 0.4); }

        /* Menu Flottant Architecture */
        #arch-menu { position: absolute; top: 80px; right: 20px; width: 220px; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 15px; display: none; z-index: 1000; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .arch-section-title { font-size: 0.7rem; color: var(--gold); margin-bottom: 10px; font-weight: 900; letter-spacing: 1px; }

        /* Objets Salle */
        .obj { position: absolute; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; border: 2px solid #555; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .table-obj { background: #000; border-radius: 8px; color: #fff; z-index: 2; }
        .salon-obj { background: rgba(255, 179, 0, 0.05); border: 2px dashed #444; color: #777; z-index: 1; text-transform: uppercase; text-align: center; font-size: 0.8rem; }
        
        .selected { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); z-index: 100 !important; }
        .resizer { position: absolute; bottom: -8px; right: -8px; width: 24px; height: 24px; background: var(--gold); border-radius: 50%; display: none; justify-content: center; align-items: center; color: #000; font-weight: 900; font-size: 14px; }
        .selected .resizer { display: flex; }

        /* Boutons Menu */
        .btn { width: 100%; padding: 10px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; margin-bottom: 8px; font-size: 0.75rem; transition: 0.2s; }
        .btn-add { background: #333; color: #fff; border: 1px solid #444; }
        .btn-add:hover { background: #444; }
        .btn-edit { background: var(--gold); color: #000; }
        .btn-danger { background: #311; color: var(--alert); border: 1px solid var(--alert); }
    </style>
</head>
<body>

    <div class="sidebar-left">
        <div style="padding:20px; border-bottom:1px solid #333; font-weight:900; color:var(--gold);">⚡ EMPIRE RADAR</div>
        <div id="radar-list" style="flex:1; padding:20px; font-size:0.8rem; color:#444;">Aucune réservation...</div>
    </div>

    <div class="viewport" id="floor">
        <button id="arch-master-btn" onclick="toggleArchMode()">🛠️ ARCHITECTURE</button>
        
        <div id="arch-menu">
            <div class="arch-section-title">STRUCTURE</div>
            <button class="btn btn-add" onclick="addObj('table')">+ TABLE</button>
            <button class="btn btn-add" onclick="addObj('salon')">+ ZONE / SALON</button>
            
            <div id="edit-actions" style="display:none; margin-top:15px; padding-top:15px; border-top:1px solid #333;">
                <div class="arch-section-title">MODIFICATION</div>
                <button class="btn btn-edit" onclick="renameObj()">✏️ RECTIFIER TEXTE</button>
                <button class="btn btn-danger" onclick="deleteObj()">🗑️ SUPPRIMER</button>
            </div>
        </div>
    </div>

    <div class="sidebar-right">
        <h2 id="det-title" style="color:var(--gold); margin-top:0;">SÉLECTION</h2>
        <div id="det-content" style="flex:1; color:#666;">Cliquez sur une table pour voir les détails.</div>
        <div style="font-size:1.6rem; font-weight:900; text-align:right; border-top:1px solid #333; padding-top:15px;">
            TOTAL: <span id="total">0.00</span>€
        </div>
        <button class="btn" style="background:var(--accent); color:#000; height:60px; font-size:1rem; margin-top:20px;">🚀 ENVOYER CUISINE</button>
    </div>

    <script>
        let layout = JSON.parse(localStorage.getItem('EMPIRE_LAYOUT')) || [];
        let selectedIdx = null;
        let isArchMode = false;
        let isDragging = false, isResizing = false;
        let startX, startY, startL, startT, startW, startH;

        const floor = document.getElementById('floor');
        const archMenu = document.getElementById('arch-menu');
        const archBtn = document.getElementById('arch-master-btn');

        function save() { localStorage.setItem('EMPIRE_LAYOUT', JSON.stringify(layout)); }

        function toggleArchMode() {
            isArchMode = !isArchMode;
            archBtn.classList.toggle('active', isArchMode);
            archMenu.style.display = isArchMode ? 'block' : 'none';
            if(!isArchMode) { selectedIdx = null; }
            render();
        }

        function addObj(type) {
            const label = type === 'table' ? "T" + (layout.filter(i=>i.type==='table').length + 1) : "ZONE";
            layout.push({ id: Date.now(), type, label, l: 100, t: 100, w: 100, h: 80 });
            selectedIdx = layout.length - 1;
            save(); render();
        }

        function deleteObj() {
            if(selectedIdx !== null) { layout.splice(selectedIdx, 1); selectedIdx = null; save(); render(); }
        }

        function renameObj() {
            if(selectedIdx === null) return;
            const newName = prompt("Rectification du nom :", layout[selectedIdx].label);
            if(newName) { layout[selectedIdx].label = newName; save(); render(); }
        }

        function render() {
            floor.querySelectorAll('.obj').forEach(el => el.remove());
            document.getElementById('edit-actions').style.display = (isArchMode && selectedIdx !== null) ? 'block' : 'none';

            layout.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = `obj ${item.type}-obj ${selectedIdx === idx ? 'selected' : ''}`;
                div.style.left = item.l + 'px'; div.style.top = item.t + 'px';
                div.style.width = item.w + 'px'; div.style.height = item.h + 'px';
                div.innerHTML = `<span>${item.label}</span><div class="resizer">⤡</div>`;

                const handleStart = (e) => {
                    const t = e.touches ? e.touches[0] : e;
                    selectedIdx = idx;
                    
                    if(isArchMode) {
                        if(e.target.className === 'resizer') isResizing = true;
                        else isDragging = true;
                        startX = t.clientX; startY = t.clientY;
                        startL = item.l; startT = item.t;
                        startW = item.w; startH = item.h;
                    } else {
                        // Mode Service : Uniquement sélection pour détails
                        document.getElementById('det-title').innerText = item.label;
                    }
                    render();
                };

                div.onmousedown = handleStart;
                div.ontouchstart = handleStart;
                floor.appendChild(div);
            });
        }

        const handleMove = (e) => {
            if(!isArchMode || (!isDragging && !isResizing)) return;
            const t = e.touches ? e.touches[0] : e;
            const item = layout[selectedIdx];
            const dx = t.clientX - startX; const dy = t.clientY - startY;

            if(isDragging) {
                item.l = Math.round((startL + dx)/10)*10;
                item.t = Math.round((startT + dy)/10)*10;
            } else if(isResizing) {
                item.w = Math.max(50, Math.round((startW + dx)/10)*10);
                item.h = Math.max(50, Math.round((startH + dy)/10)*10);
            }
            const el = floor.querySelectorAll('.obj')[selectedIdx];
            el.style.left = item.l + 'px'; el.style.top = item.t + 'px';
            el.style.width = item.w + 'px'; el.style.height = item.h + 'px';
        };

        const handleEnd = () => {
            if(isDragging || isResizing) { isDragging = false; isResizing = false; save(); render(); }
        };

        window.onmousemove = handleMove; window.ontouchmove = handleMove;
        window.onmouseup = handleEnd; window.ontouchend = handleEnd;

        window.onload = render;
    </script>
</body>
</html>
