<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8"><title>Empire OS - Salle</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050505; --text: #fff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 320px; border-right: 1px solid #333; display: flex; flex-direction: column; background: #000; }
        .viewport { flex: 1; position: relative; overflow: auto; background-image: radial-gradient(#111 1px, transparent 1px); background-size: 30px 30px; }
        .table-obj { position: absolute; background: #000; border: 2px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; transition: 0.3s; }
        .table-obj.occupied { border-color: var(--alert); color: var(--alert); }
        .table-obj.ready { border-color: var(--accent); color: var(--accent); animation: blink 0.8s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .details { width: 400px; border-left: 1px solid #333; padding: 25px; background: #000; }
        .btn { width: 100%; padding: 15px; border-radius: 4px; font-weight: 900; cursor: pointer; border: none; text-transform: uppercase; margin-top: 10px; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div style="padding:20px; border-bottom:2px solid var(--gold); font-weight:900;">⚡ RADAR</div>
        <div id="radar-list" style="flex:1; padding:15px; overflow-y:auto;"></div>
        <div style="padding:20px; text-align:center;"><div id="qrcode"></div></div>
    </div>
    <div class="viewport" id="floor-plan"></div>
    <div class="details">
        <h2 id="table-title">TABLE T...</h2>
        <div id="bill-content" style="flex:1; border-top:1px solid #222; margin-top:15px; padding-top:15px;"></div>
        <div style="font-size:2rem; font-weight:900; text-align:right;">TOTAL: <span id="total-val">0.00</span>€</div>
        <button class="btn" style="background:var(--accent)" onclick="sendOrder()">🚀 ENVOYER CUISINE</button>
        <button class="btn" style="background:var(--gold)" onclick="encaisser()">📑 ENCAISSER (7777)</button>
    </div>
    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}, currentTableId = null, selectedTable = null;
        let tables = JSON.parse(localStorage.getItem('EMPIRE_LAYOUT')) || [{label:"T1", l:100, t:100, w:80, h:120}];

        async function autoSync() {
            const res = await fetch('/get-current-state');
            const state = await res.json();
            activeOrders = state.activeOrders;
            render();
            if(activeOrders['GLOBAL_RESERVATIONS']) renderRadar(activeOrders['GLOBAL_RESERVATIONS'].data);
        }

        ws.onmessage = (e) => { if (JSON.parse(e.data).type === 'ORDER_UPDATE') autoSync(); };
        setInterval(autoSync, 5000);

        function render() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach((t, i) => {
                const div = document.createElement('div'); div.className = 'table-obj';
                const o = activeOrders[t.label];
                if(o) { div.classList.add('occupied'); if(o.status === 'ready') div.classList.add('ready'); }
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = t.label;
                div.onmousedown = (e) => {
                    if(e.altKey) { selectedTable = { i, startX: e.clientX, startY: e.clientY, startL: t.l, startT: t.t }; e.preventDefault(); }
                    else { currentTableId = t.label; render(); }
                };
                floor.appendChild(div);
            });
            if(currentTableId) updatePanel();
        }

        window.onmousemove = (e) => {
            if(!selectedTable) return;
            const t = tables[selectedTable.i];
            t.l = selectedTable.startL + (e.clientX - selectedTable.startX);
            t.t = selectedTable.startT + (e.clientY - selectedTable.startY);
            render();
        };
        window.onmouseup = () => { if(selectedTable) localStorage.setItem('EMPIRE_LAYOUT', JSON.stringify(tables)); selectedTable = null; };

        function updatePanel() {
            document.getElementById('table-title').innerText = "TABLE " + currentTableId;
            const o = activeOrders[currentTableId];
            let total = 0;
            document.getElementById('bill-content').innerHTML = o ? o.items.map(i => { total += i.p; return `<div style="display:flex; justify-content:space-between"><span>${i.n}</span><span>${i.p.toFixed(2)}€</span></div>`}).join('') : 'Libre';
            document.getElementById('total-val').innerText = total.toFixed(2);
        }

        async function encaisser() { if(prompt("CODE:")==='7777') { await fetch('/update-order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:currentTableId, order:null})}); currentTableId=null; } }
        function renderRadar(d) { const today = new Date().toISOString().split('T')[0]; document.getElementById('radar-list').innerHTML = (d[today] || []).map(r => `<div style="padding:10px; border-bottom:1px solid #222;"><b>${r.time}</b> - ${r.name}</div>`).join(''); }
        window.onload = () => { autoSync(); new QRCode(document.getElementById("qrcode"), { text: window.location.origin + "/reservation.html", width: 120, height: 120 }); };
    </script>
</body>
</html>
