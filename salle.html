<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Chef de Salle</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; --gold: #ffb300; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: none; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        
        header { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; position: relative; }
        .header-title { color: var(--text); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; margin: 0; }
        .brand-watermark { position: absolute; left: 50%; transform: translateX(-50%); font-family: 'Arial', sans-serif; font-style: italic; font-size: 1.2rem; color: #fff; font-weight: bold; pointer-events: none; }
        .btn-top { background: transparent; border: 1px solid var(--line); color: var(--text); padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.2s; position: relative; white-space: nowrap; }
        .btn-top:active { background: #fff; color: #000; }
        .radar-badge { position: absolute; top: -8px; right: -8px; background: var(--text); color: #000; border-radius: 50%; width: 20px; height: 20px; font-size: 0.75rem; display: flex; justify-content: center; align-items: center; animation: blink 1s infinite; font-weight: bold;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; padding: 15px; box-sizing: border-box;}
        
        /* PLAN DE SALLE & ARCHITECTURE */
        .floor-plan { flex: 1; position: relative; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: hidden; background: #050505; }
        
        .zone-obj { position: absolute; border: 2px dashed #555; background: rgba(255,255,255,0.02); color: #555; display: flex; align-items: flex-end; justify-content: flex-end; padding: 15px; font-size: 2.5rem; font-weight: 900; text-transform: uppercase; z-index: 10; border-radius: 8px; box-sizing: border-box; cursor: pointer; transition: 0.2s; }
        .table-obj { position: absolute; background: #000; border: 2px solid var(--line); color: var(--text); display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; z-index: 50; font-size: 1.5rem; transition: box-shadow 0.2s; box-sizing: border-box; }
        
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,23,68,0.1); color: var(--alert); }
        .table-obj.ready { border-color: var(--accent); background: rgba(0,230,118,0.15); color: var(--accent); animation: pulse-border 1.2s infinite; }
        @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 0 rgba(0,230,118,0); } 50% { box-shadow: 0 0 20px rgba(0,230,118,0.8); } }

        .drawer { position: absolute; top: 0; right: 0; height: 100%; width: 100%; max-width: 480px; background: #050505; border-left: 1px solid var(--line); padding: 30px; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; box-sizing: border-box; }
        .drawer.open { transform: translateX(0); }
        #radar-drawer { right: auto; left: 0; border-left: none; border-right: 1px solid var(--line); transform: translateX(-100%); }
        #radar-drawer.open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--line); padding-bottom: 15px; }
        .btn-close { background: transparent; border: 1px solid var(--line); color: var(--line); width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        .ticket-area { flex: 1; background: #000; border: 1px solid var(--line); border-radius: 4px; padding: 15px; overflow-y: auto; margin-bottom: 10px; min-height: 150px; }
        .cat-tabs { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; }
        .cat-tab { padding: 10px 15px; background: #000; border: 1px solid var(--line); border-radius: 4px; font-size: 0.85rem; color: var(--sub); font-weight: 900; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .cat-tab.active { background: #fff; color: #000; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; overflow-y: auto; max-height: 250px; padding-right: 5px; }
        .btn-item { background: transparent; border: 1px solid var(--line); color: var(--line); padding: 15px; border-radius: 4px; font-weight: bold; text-align: left; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 80px; font-size: 1rem; transition: 0.1s;}
        .btn-item:active { background: #fff; color: #000; }
        
        .input-group { margin-bottom: 15px; }
        .input-label { display: block; color: var(--sub); font-size: 0.75rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; }
        .input-field { width: 100%; background: #000; border: 1px solid var(--line); color: var(--text); padding: 12px; border-radius: 4px; font-size: 1rem; box-sizing: border-box; font-family: inherit; font-weight: bold; margin-bottom: 10px; }
        .btn-action { width: 100%; padding: 15px; background: transparent; color: #fff; border: 1px solid #fff; border-radius: 4px; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase; transition: 0.2s;}
        .btn-action:active { background: #fff; color: #000; }
        
        .alert-card { border: 1px solid var(--line); padding: 15px; border-radius: 4px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; background: #000;}
        .audit-log { background: #000; border: 1px solid var(--line); padding: 15px; border-radius: 4px; margin-bottom: 10px; font-family: monospace; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">CHEF DE SALLE</div>
        <div class="brand-watermark">ichef.ch</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-top" onclick="openArchitect()">🛠️ ARCHITECTE</button>
            <button class="btn-top" onclick="openDrawer('radar-drawer')">📡 RADAR<div id="radar-badge" class="radar-badge" style="display:none;">0</div></button>
            <button class="btn-top" onclick="openDrawer('resa-drawer')">⚡ RÉSA</button>
            <button class="btn-top" onclick="checkChefSecurity()">🔐 AUDIT</button>
        </div>
    </header>

    <div class="main-workspace">
        <div class="floor-plan" id="floor-plan"></div>

        <div id="architect-drawer" class="drawer" style="width: 400px; z-index: 10500;">
            <div class="drawer-header"><h2 style="margin:0;">🛠️ ARCHITECTURE</h2><button class="btn-close" onclick="closeArchitect()">✕</button></div>
            
            <div style="display:flex; gap:10px; margin-bottom: 20px;">
                <button class="btn-action" style="flex:1;" onclick="addTable()">+ TABLE</button>
                <button class="btn-action" style="flex:1;" onclick="addZone()">+ SALLE</button>
            </div>

            <div id="edit-panel" style="display:none; flex-direction:column; gap:10px; border:1px dashed var(--line); padding:15px; border-radius:8px; margin-bottom:20px;">
                <span style="color:var(--gold); font-size:0.8rem; font-weight:bold; letter-spacing:1px;">ÉLÉMENT SÉLECTIONNÉ</span>
                <input type="text" id="edit-label" class="input-field" oninput="updateSelectedLabel(this.value)" placeholder="Nom...">
                
                <div style="display:flex; gap:10px;">
                    <button class="btn-action" style="font-size:0.9rem; padding:10px;" onclick="modifySelected('w', 20)">+ LARG</button>
                    <button class="btn-action" style="font-size:0.9rem; padding:10px;" onclick="modifySelected('w', -20)">- LARG</button>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="btn-action" style="font-size:0.9rem; padding:10px;" onclick="modifySelected('h', 20)">+ HAUT</button>
                    <button class="btn-action" style="font-size:0.9rem; padding:10px;" onclick="modifySelected('h', -20)">- HAUT</button>
                </div>
                
                <button id="btn-shape" class="btn-action" style="font-size:0.9rem;" onclick="modifySelected('shape')">ROND / CARRÉ</button>
                <button class="btn-action" style="color:var(--alert); border-color:var(--alert); font-size:0.9rem; margin-top:10px;" onclick="modifySelected('delete')">🗑️ SUPPRIMER</button>
            </div>

            <div style="margin-top:auto;">
                <button class="btn-action" style="background:#fff; color:#000; width:100%;" onclick="savePlan()">💾 DÉPLOYER LE PLAN</button>
            </div>
        </div>

        <div id="radar-drawer" class="drawer" style="width: 450px;">
            <div class="drawer-header"><h2 style="margin:0;">ALERTES</h2><button class="btn-close" onclick="closeDrawer('radar-drawer')">✕</button></div>
            <div id="radar-list" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
        </div>

        <div id="caisse-drawer" class="drawer" style="width: 480px;">
            <div class="drawer-header"><h2 id="table-title" style="margin:0; font-size:2rem;">TABLE</h2><button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button></div>
            <div class="ticket-area" id="ticket-list"></div>
            <input type="text" id="order-obs" class="input-field" placeholder="⚠️ OBSERVATIONS CLIENT...">
            <div class="cat-tabs" id="cat-tabs"></div>
            <div class="menu-grid" id="menu-items"></div>
            <div id="total-val" style="font-size:2.2rem; font-weight:900; text-align:right; margin:15px 0;">0.00 €</div>
            <button class="btn-action" style="background:#fff; color:#000;" onclick="sendOrder()">VALIDER LE TICKET</button>
            <button class="btn-action" style="margin-top:10px; border-style:dashed;" onclick="clearTable()">💳 ENCAISSER / LIBÉRER TABLE</button>
        </div>

        <div id="resa-drawer" class="drawer" style="width: 400px;">
            <div class="drawer-header"><h2 style="margin:0;">NOUVELLE RÉSA</h2><button class="btn-close" onclick="closeDrawer('resa-drawer')">✕</button></div>
            <div style="flex:1; overflow-y:auto; padding-right:5px;">
                <div class="input-group"><span class="input-label">Date</span><input type="date" id="resa-date" class="input-field"></div>
                <div class="input-group"><span class="input-label">Heure</span><input type="time" id="resa-time" class="input-field" value="20:00"></div>
                <div class="input-group"><span class="input-label">Nom</span><input type="text" id="resa-name" class="input-field"></div>
                <div class="input-group"><span class="input-label">Tél</span><input type="tel" id="resa-tel" class="input-field"></div>
                <div class="input-group"><span class="input-label">Pax</span><input type="number" id="resa-pax" class="input-field" value="2" min="1"></div>
            </div>
            <button class="btn-action" style="background:#fff; color:#000;" onclick="saveResa()">SÉCURISER</button>
        </div>

        <div id="audit-drawer" class="drawer" style="width: 500px;">
            <div class="drawer-header"><h2 style="margin:0;">AUDIT FINANCIER</h2><button class="btn-close" onclick="closeDrawer('audit-drawer')">✕</button></div>
            <div id="audit-list" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];
        
        // VARIABLES ARCHITECTURE
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [ {id:'T1', l:100, t:100, w:120, h:120, shape:'square', label:'T1'} ];
        let zones = JSON.parse(localStorage.getItem('EMPIRE_ZONES')) || [];
        let isEditMode = false; let selectedObj = null; let objType = null; // 'table' ou 'zone'
        let draggedObj = null; let offsetX = 0; let offsetY = 0;

        const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
        document.getElementById('resa-date').value = tmrw.toISOString().split('T')[0];

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE' || msg.type === 'PLAN_UPDATE') {
                activeOrders = msg.activeOrders || activeOrders;
                if (msg.tables && !isEditMode) { tables = msg.tables; localStorage.setItem('EMPIRE_TABLES', JSON.stringify(tables)); }
                if (msg.zones && !isEditMode) { zones = msg.zones; localStorage.setItem('EMPIRE_ZONES', JSON.stringify(zones)); }
                renderFloorPlan(); renderRadar(); 
            }
        };

        window.addEventListener('storage', (e) => { if (e.key === 'empire_recipes' && document.getElementById('caisse-drawer').classList.contains('open')) { renderMenu('Plat'); } });
        async function forceSync() { try { const res = await fetch('/get-current-state'); const data = await res.json(); activeOrders = data.activeOrders; renderFloorPlan(); renderRadar(); } catch(e) {} }

        function openDrawer(id) { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open')); document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        // ==========================================
        // MOTEUR ARCHITECTE INTÉGRÉ AU TIROIR
        // ==========================================
        function openArchitect() {
            isEditMode = true; selectedObj = null; objType = null;
            document.getElementById('edit-panel').style.display = 'none';
            openDrawer('architect-drawer'); renderFloorPlan();
        }
        function closeArchitect() {
            isEditMode = false; selectedObj = null; objType = null;
            closeDrawer('architect-drawer'); renderFloorPlan();
        }

        function addTable() {
            let maxNum = 0;
            tables.forEach(t => { const match = t.label.match(/T(\d+)/i); if(match) maxNum = Math.max(maxNum, parseInt(match[1])); });
            const newLabel = `T${maxNum + 1}`;
            const newObj = { id: Date.now().toString(), label: newLabel, l: 50, t: 50, w: 100, h: 100, shape: 'square' };
            tables.push(newObj);
            selectObject(newObj, 'table'); renderFloorPlan();
        }

        function addZone() {
            const newObj = { id: 'Z'+Date.now(), label: 'NOUVELLE SALLE', l: 10, t: 10, w: 300, h: 300 };
            zones.push(newObj);
            selectObject(newObj, 'zone'); renderFloorPlan();
        }

        function selectObject(obj, type) {
            selectedObj = obj; objType = type;
            document.getElementById('edit-panel').style.display = 'flex';
            document.getElementById('edit-label').value = obj.label;
            document.getElementById('btn-shape').style.display = type === 'table' ? 'block' : 'none';
            renderFloorPlan();
        }

        function updateSelectedLabel(val) {
            if(!selectedObj) return;
            selectedObj.label = val; renderFloorPlan();
        }

        function modifySelected(action, val) {
            if (!selectedObj) return;
            if (action === 'w') selectedObj.w = Math.max(50, selectedObj.w + val);
            if (action === 'h') selectedObj.h = Math.max(50, selectedObj.h + val);
            if (action === 'shape' && objType === 'table') selectedObj.shape = selectedObj.shape === 'round' ? 'square' : 'round';
            if (action === 'delete') {
                if (objType === 'table') tables = tables.filter(t => t.id !== selectedObj.id);
                if (objType === 'zone') zones = zones.filter(z => z.id !== selectedObj.id);
                selectedObj = null; objType = null; document.getElementById('edit-panel').style.display = 'none';
            }
            renderFloorPlan();
        }

        function savePlan() {
            localStorage.setItem('EMPIRE_TABLES', JSON.stringify(tables));
            localStorage.setItem('EMPIRE_ZONES', JSON.stringify(zones));
            if(ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify({type: 'PLAN_UPDATE', tables: tables, zones: zones})); }
            closeArchitect(); alert("Plan déployé sur le réseau.");
        }

        // DRAG & DROP (Tables et Zones)
        const floorArea = document.getElementById('floor-plan');
        floorArea.addEventListener('pointermove', (e) => {
            if (!isEditMode || !draggedObj) return;
            const rect = floorArea.getBoundingClientRect();
            draggedObj.l = e.clientX - rect.left - offsetX;
            draggedObj.t = e.clientY - rect.top - offsetY;
            renderFloorPlan();
        });
        floorArea.addEventListener('pointerup', () => { draggedObj = null; });
        floorArea.addEventListener('pointerleave', () => { draggedObj = null; });

        function renderFloorPlan() {
            floorArea.innerHTML = '';
            
            // Rendu des ZONES (Salles) en premier pour qu'elles soient en dessous (z-index 10)
            zones.forEach(z => {
                const div = document.createElement('div'); div.className = 'zone-obj';
                div.innerHTML = `<span>${z.label}</span>`;
                div.style.left = z.l + 'px'; div.style.top = z.t + 'px'; div.style.width = z.w + 'px'; div.style.height = z.h + 'px';
                
                if (isEditMode) {
                    div.style.border = selectedObj && selectedObj.id === z.id ? '3px dashed var(--gold)' : '2px dashed #555';
                    div.addEventListener('pointerdown', (e) => {
                        e.stopPropagation(); selectObject(z, 'zone'); draggedObj = z;
                        const rect = floorArea.getBoundingClientRect(); offsetX = e.clientX - rect.left - z.l; offsetY = e.clientY - rect.top - z.t;
                    });
                }
                floorArea.appendChild(div);
            });

            // Rendu des TABLES au dessus (z-index 50)
            tables.forEach(t => {
                const div = document.createElement('div'); div.className = 'table-obj'; div.style.borderRadius = t.shape === 'round' ? '50%' : '8px';
                const order = activeOrders[t.id] || activeOrders[t.label];
                if(order && order.status !== 'system') { const foodReady = order.items.filter(i => i.category !== 'Boisson').length > 0 && order.items.filter(i => i.category !== 'Boisson').every(i => i.done); if (foodReady) div.classList.add('ready'); else div.classList.add('occupied'); }
                div.innerHTML = `<span>${t.label}</span>`; div.style.left = t.l + 'px'; div.style.top = t.t + 'px'; div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                
                if (isEditMode) {
                    div.style.border = selectedObj && selectedObj.id === t.id ? '3px solid var(--gold)' : '2px solid var(--line)';
                    div.addEventListener('pointerdown', (e) => {
                        e.stopPropagation(); selectObject(t, 'table'); draggedObj = t;
                        const rect = floorArea.getBoundingClientRect(); offsetX = e.clientX - rect.left - t.l; offsetY = e.clientY - rect.top - t.t;
                    });
                } else { div.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); openCaisse(t.label || t.id); }); }
                floorArea.appendChild(div);
            });
        }
        // ==========================================

        function renderRadar() {
            const container = document.getElementById('radar-list'); let html = ''; let alertsCount = 0;
            for (const tableId in activeOrders) {
                const order = activeOrders[tableId]; if (!order.items || order.items.length === 0) continue;
                const isWeb = tableId.includes('WEB'); const foodItems = order.items.filter(i => i.category !== 'Boisson'); const foodReady = foodItems.length > 0 && foodItems.every(i => i.done);
                if (foodReady) { alertsCount++; html += `<div class="alert-card"><b>🔥 CUISINE PRÊTE</b><span>Table : ${tableId.replace('WEB_','')}</span></div>`; }
                if (isWeb && order.items.every(i => !i.done)) { alertsCount++; html += `<div class="alert-card"><b>🌐 COMMANDE QR</b><span>Table : ${tableId.replace('WEB_','')}</span></div>`; }
            }
            container.innerHTML = html || '<div style="color:#555; text-align:center;">Aucune alerte.</div>';
            const badge = document.getElementById('radar-badge'); if (alertsCount > 0) { badge.style.display = 'flex'; badge.textContent = alertsCount; } else { badge.style.display = 'none'; }
        }

        function openCaisse(label) { currentTableId = label; document.getElementById('table-title').innerText = label; currentTicket = activeOrders[label]?.items || []; renderTicket(); renderMenu('Plat'); openDrawer('caisse-drawer'); }

        function renderMenu(activeCategory = 'Plat') {
            const menu = JSON.parse(localStorage.getItem('empire_recipes')) || [{name:'Plat Test', price:20, category:'Plat'}];
            const categories = [...new Set(menu.map(item => item.category || 'Autre'))];
            document.getElementById('cat-tabs').innerHTML = categories.map(cat => `<div class="cat-tab ${cat === activeCategory ? 'active' : ''}" onclick="renderMenu('${cat}')">${cat}</div>`).join('');
            document.getElementById('menu-items').innerHTML = menu.filter(m => (m.category || 'Autre') === activeCategory).map(m => `<div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price}, '${m.category}')"><span>${m.name}</span><span>${parseFloat(m.price).toFixed(2)}€</span></div>`).join('');
        }

        function addItem(n, p, c) { currentTicket.push({id: Date.now(), n: n, p: p, category: c, done: false}); renderTicket(); }
        function removeItem(targetIndex) { currentTicket.splice(targetIndex, 1); renderTicket(); }

        function renderTicket() {
            const list = document.getElementById('ticket-list'); let total = 0; const itemCounts = {};
            currentTicket.forEach((i, idx) => { total += i.p || 0; const name = i.n; if (!itemCounts[name]) itemCounts[name] = { item: i, count: 0, indices: [], price: i.p || 0 }; itemCounts[name].count++; itemCounts[name].indices.push(idx); });
            let html = '';
            for (const key in itemCounts) {
                const g = itemCounts[key]; const lastIndex = g.indices[g.indices.length - 1];
                html += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed rgba(255,255,255,0.3); align-items:center;"><span style="font-weight:bold; font-size:1rem; flex:1;"><span style="display:inline-block; min-width:25px; font-weight:900;">${g.count}x</span> ${g.item.done?'✅':'⏳'} ${key}</span><span style="font-weight:bold;">${(g.price * g.count).toFixed(2)}€ <span onclick="removeItem(${lastIndex})" style="border:1px solid #fff; border-radius:4px; padding:2px 8px; margin-left:10px; cursor:pointer;">✕</span></span></div>`;
            }
            list.innerHTML = html || '<div style="color:#555; text-align:center;">Ticket vierge</div>'; document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return; const obs = document.getElementById('order-obs').value.trim();
            const order = { table: currentTableId, items: currentTicket, observation: obs, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), status: 'pending' };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('order-obs').value = ''; closeDrawer('caisse-drawer');
        }

        async function clearTable() {
            if(!confirm("Encaisser et libérer cette table ?")) return;
            const totalStr = document.getElementById('total-val').innerText.replace(' €', ''); const total = parseFloat(totalStr);
            if (total > 0) {
                const today = new Date().toISOString().split('T')[0]; const time = new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
                let transacs = JSON.parse(localStorage.getItem('empire_transactions')) || [];
                transacs.push({ date: today, time: time, table: currentTableId, total: total }); localStorage.setItem('empire_transactions', JSON.stringify(transacs));
            }
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order: { status: 'ready' } }) });
            logAudit(`ENCAISSEMENT - Table ${currentTableId} libérée. Montant: ${totalStr}€`); closeDrawer('caisse-drawer');
        }

        function saveResa() {
            const date = document.getElementById('resa-date').value; const time = document.getElementById('resa-time').value; const name = document.getElementById('resa-name').value.trim(); const pax = document.getElementById('resa-pax').value; const tel = document.getElementById('resa-tel').value.trim();
            if(!date || !name) return alert("Date et Nom obligatoires.");
            let resas = JSON.parse(localStorage.getItem('empire_reservations')) || {}; if(!resas[date]) resas[date] = [];
            resas[date].push({ id: Date.now(), time, name, pax, tel, status: 'confirmed' }); localStorage.setItem('empire_reservations', JSON.stringify(resas));
            if(ws.readyState === WebSocket.OPEN) { fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: 'GLOBAL_RESAS', order: { status: 'system', items: [], reservations: resas } }) }); }
            document.getElementById('resa-name').value = ''; document.getElementById('resa-tel').value = ''; closeDrawer('resa-drawer');
        }

        function logAudit(action) { let logs = JSON.parse(localStorage.getItem('EMP_LOCAL_AUDIT')) || []; logs.unshift({ time: new Date().toLocaleString('fr-FR'), action: action }); if(logs.length > 50) logs.pop(); localStorage.setItem('EMP_LOCAL_AUDIT', JSON.stringify(logs)); }
        function checkChefSecurity() { const pin = prompt("CODE SÉCURITÉ :"); if (pin === "7777") { document.getElementById('audit-list').innerHTML = (JSON.parse(localStorage.getItem('EMP_LOCAL_AUDIT')) || []).map(l => `<div class="audit-log"><div>${l.time}</div><div>${l.action}</div></div>`).join(''); openDrawer('audit-drawer'); } else if (pin !== null) { alert("Accès refusé."); } }

        forceSync(); setInterval(forceSync, 3000); 
    </script>
</body>
</html>
