<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Master - Chef de Salle</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; --gold: #ffb300; --paying: #ffeb3b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: none; }
        header { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: #000; z-index: 1000;}
        .header-title { font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem; margin: 0; color: var(--gold); }
        .stock-bar { background: #111; padding: 10px 25px; display: flex; gap: 20px; border-bottom: 1px solid #333; overflow-x: auto; color: var(--accent); font-weight: 900; font-size: 0.8rem; }
        .floor-plan { flex: 1; position: relative; padding: 15px; border: 1px solid #333; margin: 10px; border-radius: 8px; overflow: hidden; }
        .table-obj { position: absolute; background: #000; border: 2px solid var(--line); display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; border-radius: 8px; color: #fff;}
        .table-obj.occupied { border-color: var(--alert); }
        .table-obj.paying { border-color: var(--paying); }
        @keyframes blink { 0% { background: #000; } 100% { background: var(--accent); color: #000; } }
        .table-obj.ready { animation: blink 0.5s infinite alternate; }
        .drawer { position: fixed; top: 0; right: 0; height: 100%; width: 100%; max-width: 480px; background: #050505; border-left: 1px solid var(--line); padding: 30px; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; box-sizing: border-box; }
        .drawer.open { transform: translateX(0); }
        .btn-action { width: 100%; padding: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; border: 1px solid #fff; background: transparent; color: #fff; border-radius: 4px; margin-bottom: 10px;}
        #facture-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        .facture-paper { background: #fff; color: #000; width: 400px; padding: 25px; font-family: 'Courier New', monospace; border-radius: 4px; }
    </style>
</head>
<body>
    <header>
        <div class="header-title">EMPIRE OS - CHEF DE SALLE</div>
        <button onclick="location.reload()" style="background:none; border:1px solid #fff; color:#fff; padding:8px; border-radius:4px;">🔄 SYNC</button>
    </header>

    <div class="stock-bar" id="stock-display">STOCK : Chargement...</div>

    <div class="floor-plan" id="floor-plan"></div>

    <div id="caisse-drawer" class="drawer">
        <h2 id="table-title">TABLE</h2>
        <div id="pax-selector" style="margin-bottom:15px; display:flex; gap:10px; align-items:center;">
            <span>Nombre de couverts : </span>
            <input type="number" id="current-pax" value="1" min="1" style="width:50px; background:#000; border:1px solid #fff; color:#fff; padding:5px;" onchange="syncServer()">
        </div>
        <div id="ticket-list" style="flex:1; overflow-y:auto; border-bottom:1px solid #333; margin-bottom:15px;"></div>
        <div id="price-display" style="text-align:right; margin-bottom:15px;">
            <div style="font-size:1.5rem; font-weight:900;">RESTE : <span id="remain-val">0.00</span>€</div>
        </div>
        <button class="btn-action" style="background:var(--gold); color:#000;" onclick="ouvrirAddition()">🧾 ADDITION / DIVISION AUTOMATISÉE</button>
        <button class="btn-action" onclick="document.getElementById('caisse-drawer').classList.remove('open')">RETOUR</button>
    </div>

    <div id="facture-modal">
        <div class="facture-paper">
            <h2 style="text-align:center; margin:0;">FACTURE</h2>
            <p id="f-info" style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px;"></p>
            <div id="f-items"></div>
            <div style="border-top:2px solid #000; margin-top:15px; padding-top:10px; font-weight:900; display:flex; justify-content:space-between;">
                <span>TOTAL RESTE</span><span id="f-total">0.00 €</span>
            </div>
            <div id="split-info" style="margin-top:10px; color:blue; font-weight:bold; text-align:center;"></div>
        </div>
        <div style="width:400px; margin-top:20px; display:grid; grid-template-columns:1fr 1fr; gap:10px;">
            <button class="btn-action" style="background:var(--accent); color:#000;" onclick="encaisser(true)">💰 PAYER PART</button>
            <button class="btn-action" style="background:var(--accent); border:2px solid #fff; color:#000;" onclick="encaisser(false)">💳 PAYER TOTAL</button>
            <button class="btn-action" style="grid-column: span 2; background:var(--alert);" onclick="this.parentElement.parentElement.style.display='none'">CORRIGER ERREUR</button>
        </div>
    </header>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTable = null; let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];
        let audioCtx = null;

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') {
                activeOrders = msg.activeOrders;
                renderFloor();
                if(activeOrders['GLOBAL_STOCK']) renderStock(activeOrders['GLOBAL_STOCK'].data);
            }
        };

        function renderStock(data) {
            document.getElementById('stock-display').innerHTML = data.map(i => `<span>${i.name}: ${i.qte}</span>`).join(' | ');
        }

        function renderFloor() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                const div = document.createElement('div'); div.className = 'table-obj';
                const o = activeOrders[t.label];
                if(o) {
                    if(o.status === 'ready') div.classList.add('ready');
                    else if(o.status === 'paying') div.classList.add('paying');
                    else div.classList.add('occupied');
                }
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = `<span>${t.label}</span>`;
                div.onclick = () => openCaisse(t.label);
                floor.appendChild(div);
            });
        }

        function openCaisse(label) {
            currentTable = label; const o = activeOrders[label] || { items:[], paidAmount:0, pax:1 };
            document.getElementById('table-title').innerText = "TABLE " + label;
            document.getElementById('current-pax').value = o.pax || 1;
            renderTicket(o);
            document.getElementById('caisse-drawer').classList.add('open');
            if(o.status === 'ready') { o.status = 'pending'; syncServer(o); }
        }

        function renderTicket(o) {
            const total = (o.items || []).reduce((acc, i) => acc + i.p, 0);
            document.getElementById('ticket-list').innerHTML = (o.items || []).map(i => `<div style="display:flex; justify-content:space-between; padding:5px 0;"><span>${i.n}</span><span>${i.p.toFixed(2)}€</span></div>`).join('');
            document.getElementById('remain-val').innerText = (total - (o.paidAmount || 0)).toFixed(2);
        }

        function ouvrirAddition() {
            const o = activeOrders[currentTable];
            const reste = parseFloat(document.getElementById('remain-val').innerText);
            if(reste <= 0) return;
            document.getElementById('f-info').innerText = "Table " + currentTable + " - " + o.pax + " Couverts";
            document.getElementById('f-total').innerText = reste.toFixed(2) + " €";
            document.getElementById('split-info').innerText = "Division par " + o.pax + " : " + (reste / o.pax).toFixed(2) + " € / personne";
            document.getElementById('facture-modal').style.display = 'flex';
            o.status = 'paying'; syncServer(o);
        }

        async function encaisser(isPart) {
            const code = prompt("CODE SÉCURITÉ PAIEMENT (7777) :");
            if(code !== "7777") return alert("Accès refusé.");
            const o = activeOrders[currentTable];
            const reste = parseFloat(document.getElementById('remain-val').innerText);
            const part = reste / o.pax;
            
            if(isPart) o.paidAmount = (o.paidAmount || 0) + part;
            else o.paidAmount = (o.paidAmount || 0) + reste;

            if(o.paidAmount >= (o.items.reduce((a,b)=>a+b.p, 0)) - 0.05) {
                await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:currentTable, order:null}) });
                document.getElementById('facture-modal').style.display='none';
                document.getElementById('caisse-drawer').classList.remove('open');
            } else {
                await syncServer(o);
                openCaisse(currentTable);
                document.getElementById('facture-modal').style.display='none';
            }
        }

        async function syncServer(orderData = null) {
            const o = orderData || activeOrders[currentTable];
            o.pax = document.getElementById('current-pax').value;
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:currentTable, order:o}) });
        }

        renderFloor(); setInterval(() => fetch('/get-current-state').then(r=>r.json()).then(d=>{activeOrders=d.activeOrders;renderFloor();}), 3000);
    </script>
</body>
</html>
