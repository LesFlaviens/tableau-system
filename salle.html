<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Terminal Salle</title>
    <style>
        :root { --bg: #050505; --accent: #00e676; --alert: #ff1744; --text: #fff; --panel: #111; --blue: #00b0ff; --warning: #ffb300; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: manipulation; user-select: none; }
        
        header { border-bottom: 2px solid #222; padding: 15px; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .header-title { color: var(--accent); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; }

        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; }
        
        /* PLAN DE SALLE */
        .floor-plan { flex: 1; position: relative; background: #050505; z-index: 10; overflow: auto; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; }
        
        .table-obj { 
            position: absolute; background: #161616; border: 2px solid #555; color: #fff; 
            display: flex; flex-direction: column; justify-content: center; align-items: center; 
            font-weight: 900; border-radius: 10px; cursor: pointer; 
            z-index: 5000; box-shadow: 0 5px 15px rgba(0,0,0,0.5); font-size: 1.3rem;
        }
        .table-obj:active { transform: scale(0.95); border-color: var(--accent); }
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,0,0,0.1); }
        .pax-label { font-size: 0.75rem; color: var(--blue); margin-top: 5px; }

        /* RADAR TIROIR */
        #radar-drawer { position: absolute; top: 0; left: 0; width: 320px; height: 100%; background: #080808; border-right: 2px solid var(--blue); transform: translateX(-100%); transition: 0.3s; z-index: 8000; display: flex; flex-direction: column; }
        #radar-drawer.open { transform: translateX(0); }
        .btn-radar-trigger { position: absolute; bottom: 20px; left: 20px; z-index: 7000; background: var(--blue); color: #000; padding: 15px 25px; border-radius: 50px; font-weight: 900; cursor: pointer; box-shadow: 0 5px 15px rgba(0, 176, 255, 0.4); }

        /* TIROIR CAISSE */
        .drawer-caisse { position: absolute; top: 0; right: 0; width: 100%; max-width: 480px; height: 100%; background: #0a0a0a; border-left: 2px solid #333; padding: 25px; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; box-sizing: border-box; }
        .drawer-caisse.open { transform: translateX(0); }

        .ticket-area { flex: 1; background: #000; border: 1px solid #222; border-radius: 10px; padding: 15px; overflow-y: auto; margin-bottom: 15px; }
        .ticket-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #111; font-weight: bold; font-size: 1.1rem; }
        
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; overflow-y: auto; max-height: 300px; padding-right: 5px; }
        .btn-item { background: #161616; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 8px; font-weight: bold; font-size: 1rem; text-align: left; }
        .btn-item:active { background: #333; }
        .btn-send { background: var(--accent); color: #000; padding: 20px; font-weight: 900; border: none; border-radius: 10px; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; width: 100%; }
        
        .cat-tabs { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .cat-tab { padding: 10px 15px; background: #1a1a1a; border: 1px solid #333; border-radius: 6px; font-size: 0.8rem; color: #888; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .cat-tab.active { background: var(--accent); color: #000; border-color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="header-title">EMPIRE OS : SALLE</div>
        <div style="display:flex; gap:10px;">
            <button onclick="window.location.reload(true)" style="background:transparent; border:1px solid #555; color:#fff; padding:8px 15px; border-radius:6px; font-weight:bold; cursor:pointer;">🔄 RAFRAÎCHIR</button>
            <button onclick="window.location.href='gestionnaire.html?key=ICHEF2026'" style="background:#111; border:1px solid var(--warning); color:var(--warning); padding:8px 15px; border-radius:6px; font-weight:bold; cursor:pointer;">🔐 CHEF</button>
        </div>
    </header>

    <div class="main-workspace">
        
        <div class="btn-radar-trigger" onclick="toggleRadar()">🌐 RADAR WEB <span id="radar-badge" style="background:#000; color:#fff; padding:2px 8px; border-radius:10px; font-size:0.7rem; display:none; margin-left:5px;">0</span></div>

        <div id="radar-drawer">
            <div style="padding:20px; border-bottom:1px solid #222; display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0; color:var(--blue);">WEB ORDERS</h3>
                <button onclick="toggleRadar()" style="color:#fff; background:none; border:none; font-size:1.5rem; cursor:pointer;">✕</button>
            </div>
            <div id="radar-list" style="padding:15px; overflow-y:auto;"></div>
        </div>

        <div class="floor-plan" id="floor-plan"></div>

        <div id="caisse-drawer" class="drawer-caisse">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; align-items:center;">
                <h2 id="table-title" style="margin:0; color:var(--accent); font-size:2rem;">TABLE</h2>
                <button onclick="closeCaisse()" style="background:#222; border:none; color:#fff; width:45px; height:45px; border-radius:50%; font-size:1.2rem; cursor:pointer;">✕</button>
            </div>
            <div class="ticket-area" id="ticket-list"></div>
            
            <input type="text" id="order-obs" style="width:100%; background:#111; border:1px solid var(--warning); color:var(--warning); padding:15px; margin-bottom:15px; border-radius:8px; font-weight:bold; box-sizing:border-box;" placeholder="⚠️ OBSERVATIONS (Allergies...)">
            
            <div class="cat-tabs" id="cat-tabs"></div>
            <div class="menu-grid" id="menu-items"></div>
            
            <div id="total-val" style="font-size:2.2rem; font-weight:900; text-align:right; margin:15px 0; color:var(--accent);">0.00 €</div>
            <button class="btn-send" onclick="sendOrder()">🚀 ENVOYER EN PRODUCTION</button>
        </div>
    </div>

    <script>
        let currentTableId = null;
        let currentTicket = [];

        function toggleRadar() { document.getElementById('radar-drawer').classList.toggle('open'); }
        function closeCaisse() { document.getElementById('caisse-drawer').classList.remove('open'); currentTableId = null; }

        // Moteur Radar
        function renderRadar() {
            const queue = JSON.parse(localStorage.getItem('EMPIRE_QUEUE')) || [];
            const web = queue.filter(o => o.id && o.id.toString().startsWith('WEB_'));
            
            const badge = document.getElementById('radar-badge');
            if(web.length > 0) { badge.style.display = 'inline'; badge.innerText = web.length; } 
            else { badge.style.display = 'none'; }

            document.getElementById('radar-list').innerHTML = web.map(o => `
                <div style="background:#111; padding:15px; border-radius:8px; margin-bottom:10px; border-left:4px solid var(--blue);">
                    <b style="color:var(--blue); font-size:1.1rem;">${o.table}</b><br><small style="color:#666;">${o.time}</small>
                </div>`).join('') || '<div style="color:#444; text-align:center; margin-top:20px;">Radar vide</div>';
        }

        // Moteur Plan de Salle (Forcé en boucle pour éviter les bugs)
        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan');
            const tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [{id:'T1', l:100, t:100, w:120, h:120, label:'T1'}];
            const queue = JSON.parse(localStorage.getItem('EMPIRE_QUEUE')) || [];

            // On ne redessine que si nécessaire pour éviter les clignotements
            floor.innerHTML = ''; 

            tables.forEach(t => {
                const div = document.createElement('div');
                div.className = 'table-obj';
                const hasOrder = queue.some(o => o.table === t.label || o.table === t.id);
                if(hasOrder) div.classList.add('occupied');

                div.innerHTML = `<span>${t.label}</span><span class="pax-label">1p</span>`;
                div.style.left = t.l + 'px';
                div.style.top = t.t + 'px';
                div.style.width = t.w + 'px';
                div.style.height = t.h + 'px';

                // LE CLIC INFAILLIBLE
                div.onpointerdown = (e) => {
                    e.preventDefault();
                    e.stopPropagation();
                    openCaisse(t.label || t.id);
                };
                floor.appendChild(div);
            });
        }

        // Boucle de synchro brute force (Toutes les 2 secondes)
        setInterval(() => {
            if(!currentTableId) { renderFloorPlan(); renderRadar(); }
        }, 2000);

        // Moteur de Caisse
        function openCaisse(label) {
            currentTableId = label;
            document.getElementById('table-title').innerText = label;
            currentTicket = JSON.parse(localStorage.getItem('EMP_TMP_'+label)) || [];
            renderTicket();
            renderMenu('Plat');
            document.getElementById('caisse-drawer').classList.add('open');
        }

        function renderMenu(cat) {
            const menu = JSON.parse(localStorage.getItem('empire_recipes')) || [
                {name:'Salade César', price:14, category:'Entrée'},
                {name:'Bavette', price:24, category:'Plat'},
                {name:'Mojito', price:12, category:'Boisson'}
            ];
            const cats = ['Entrée', 'Plat', 'Dessert', 'Boisson'];
            document.getElementById('cat-tabs').innerHTML = cats.map(c => `
                <div class="cat-tab ${c === cat ? 'active' : ''}" onclick="renderMenu('${c}')">${c}s</div>
            `).join('');

            document.getElementById('menu-items').innerHTML = menu.filter(m => m.category === cat).map(m => `
                <div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price}, '${m.category}')">
                    ${m.name}<br><span style="color:var(--accent)">${m.price.toFixed(2)}€</span>
                </div>`).join('');
        }

        function addItem(n, p, c) {
            currentTicket.push({id: Date.now(), name: n, price: p, category: c});
            renderTicket();
            localStorage.setItem('EMP_TMP_'+currentTableId, JSON.stringify(currentTicket));
        }

        function renderTicket() {
            const list = document.getElementById('ticket-list');
            let total = 0;
            list.innerHTML = currentTicket.map((i, idx) => {
                total += i.price;
                return `<div class="ticket-item">
                    <span>1x ${i.name}</span>
                    <span style="color:var(--blue);">${i.price.toFixed(2)}€ <span onclick="removeItem(${idx})" style="color:red; margin-left:15px; cursor:pointer;">✕</span></span>
                </div>`;
            }).join('') || '<div style="color:#333; text-align:center; padding:20px;">Ticket vierge</div>';
            document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        function removeItem(idx) {
            currentTicket.splice(idx, 1);
            renderTicket();
            localStorage.setItem('EMP_TMP_'+currentTableId, JSON.stringify(currentTicket));
        }

        function sendOrder() {
            if(currentTicket.length === 0) return;
            const obs = document.getElementById('order-obs').value.trim();
            const queue = JSON.parse(localStorage.getItem('EMPIRE_QUEUE')) || [];
            
            const ticketStruct = { entrees:[], plats:[], desserts:[], boissons:[] };
            currentTicket.forEach(i => {
                if(i.category === 'Entrée') ticketStruct.entrees.push(i);
                else if(i.category === 'Plat') ticketStruct.plats.push(i);
                else if(i.category === 'Dessert') ticketStruct.desserts.push(i);
                else ticketStruct.boissons.push(i);
            });

            queue.push({
                id: 'ORD_' + Date.now(),
                table: currentTableId,
                time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}),
                ticket: ticketStruct,
                observation: obs,
                status: 'pending'
            });

            localStorage.setItem('EMPIRE_QUEUE', JSON.stringify(queue));
            localStorage.removeItem('EMP_TMP_'+currentTableId);
            document.getElementById('order-obs').value = '';
            
            closeCaisse();
            renderFloorPlan();
            renderRadar();
            alert("COMMANDÉ !");
        }

        // Démarrage initial
        renderFloorPlan();
        renderRadar();
    </script>
</body>
</html>
