<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Serveur</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: manipulation; -webkit-tap-highlight-color: transparent; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        
        header { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 15px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; position: relative; flex-wrap: wrap; gap:10px;}
        .header-title { color: var(--text); font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.2rem; display: flex; align-items: center; margin: 0; }
        .brand-watermark { position: absolute; left: 50%; transform: translateX(-50%); font-family: 'Arial', sans-serif; font-style: italic; font-size: 1.1rem; color: #fff; font-weight: bold; pointer-events: none; }
        .btn-top { background: transparent; border: 1px solid var(--line); color: var(--text); padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.2s; position: relative; white-space: nowrap; flex: 1; text-align: center;}
        .btn-top:active { background: #fff; color: #000; }
        .radar-badge { position: absolute; top: -8px; right: -8px; background: var(--text); color: #000; border-radius: 50%; width: 20px; height: 20px; font-size: 0.75rem; display: flex; justify-content: center; align-items: center; animation: blink 1s infinite; font-weight: bold;}
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

        .main-workspace { display: flex; flex-direction: column; flex: 1; position: relative; overflow: hidden; padding: 15px; box-sizing: border-box; gap: 15px;}
        
        /* SYSTÈME D'ONGLETS POUR LES SALLES */
        .room-tabs { display: flex; gap: 10px; overflow-x: auto; flex-shrink: 0; padding-bottom: 5px;}
        .room-tab { padding: 10px 20px; background: #000; border: 1px solid var(--line); border-radius: 4px; color: var(--sub); font-weight: 900; cursor: pointer; text-transform: uppercase; white-space: nowrap; font-size: 0.9rem; transition: 0.2s;}
        .room-tab.active { background: var(--line); color: #000; }

        /* PLAN DE SALLE (LECTURE SEULE) */
        .floor-plan { flex: 1; position: relative; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: auto; background: #050505; }
        .table-obj { position: absolute; background: #000; border: 2px solid var(--line); color: var(--text); display: flex; flex-direction: column; justify-content: center; align-items: center; font-weight: 900; border-radius: 8px; cursor: pointer; z-index: 50; font-size: 1.5rem; transition: 0.1s; }
        .table-obj:active { transform: scale(0.92); }
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,23,68,0.1); color: var(--alert); }
        .table-obj.ready { border-color: var(--accent); background: rgba(0,230,118,0.15); color: var(--accent); animation: pulse-border 1.2s infinite; }
        @keyframes pulse-border { 0%, 100% { box-shadow: 0 0 0 rgba(0,230,118,0); } 50% { box-shadow: 0 0 20px rgba(0,230,118,0.8); } }

        /* TIROIRS 100% MOBILE */
        .drawer { position: absolute; top: 0; right: 0; height: 100%; width: 100%; max-width: 480px; background: #050505; border-left: 1px solid var(--line); padding: 20px; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; box-sizing: border-box; }
        .drawer.open { transform: translateX(0); }
        #radar-drawer { right: auto; left: 0; border-left: none; border-right: 1px solid var(--line); transform: translateX(-100%); }
        #radar-drawer.open { transform: translateX(0); }
        
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--line); padding-bottom: 15px; }
        .btn-close { background: transparent; border: 1px solid var(--line); color: var(--line); width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        .alert-card { border: 1px solid var(--line); padding: 15px; border-radius: 4px; margin-bottom: 10px; display: flex; flex-direction: column; gap: 8px; background: #000;}
        .alert-title { font-weight: 900; font-size: 1rem; text-transform: uppercase; }

        .ticket-area { flex: 1; background: #000; border: 1px solid var(--line); border-radius: 4px; padding: 15px; overflow-y: auto; margin-bottom: 10px; min-height: 150px; }
        .cat-tabs { display: flex; gap: 8px; margin-bottom: 10px; overflow-x: auto; padding-bottom: 5px; -webkit-overflow-scrolling: touch; }
        .cat-tab { padding: 12px 18px; background: #000; border: 1px solid var(--line); border-radius: 4px; font-size: 0.85rem; color: var(--sub); font-weight: 900; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .cat-tab.active { background: #fff; color: #000; }
        
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; overflow-y: auto; max-height: 35vh; padding-right: 5px; }
        .btn-item { background: transparent; border: 1px solid var(--line); color: var(--line); padding: 15px; border-radius: 4px; font-weight: bold; text-align: left; cursor: pointer; display: flex; flex-direction: column; justify-content: space-between; min-height: 80px; font-size: 1rem; transition: 0.1s;}
        .btn-item:active { background: #fff; color: #000; }
        
        .input-group { margin-bottom: 15px; }
        .input-label { display: block; color: var(--sub); font-size: 0.75rem; text-transform: uppercase; font-weight: bold; margin-bottom: 5px; letter-spacing: 1px;}
        .input-field { width: 100%; background: #000; border: 1px solid var(--line); color: var(--text); padding: 12px; border-radius: 4px; font-size: 1rem; box-sizing: border-box; font-family: inherit; font-weight: bold; margin-bottom: 10px; }
        .btn-action { width: 100%; padding: 20px; background: transparent; color: #fff; border: 1px solid #fff; border-radius: 4px; font-weight: 900; font-size: 1.2rem; cursor: pointer; text-transform: uppercase; transition: 0.2s;}
        .btn-action:active { background: #fff; color: #000; }

        @media (max-width: 400px) {
            .header-title { font-size: 1rem; }
            .brand-watermark { display: none; }
            .btn-top { padding: 10px; font-size: 0.8rem; }
            .btn-item { min-height: 70px; font-size: 0.95rem; }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-title">SERVEUR</div>
        <div class="brand-watermark">ichef.ch</div>
        <div style="display:flex; gap:10px; flex:1; justify-content: flex-end;">
            <button class="btn-top" style="max-width:100px;" onclick="openDrawer('resa-drawer')">📅 RÉSA</button>
            <button class="btn-top" style="max-width:120px;" onclick="openDrawer('radar-drawer')">
                📡 RADAR<div id="radar-badge" class="radar-badge" style="display:none;">0</div>
            </button>
            <button class="btn-top" style="max-width:50px;" onclick="window.location.reload(true)">🔄</button>
        </div>
    </header>

    <div class="main-workspace">
        <div id="room-tabs" class="room-tabs"></div>

        <div class="floor-plan" id="floor-plan"></div>

        <div id="radar-drawer" class="drawer">
            <div class="drawer-header"><h2 style="margin:0; font-size: 1.5rem;">ALERTES</h2><button class="btn-close" onclick="closeDrawer('radar-drawer')">✕</button></div>
            <div id="radar-list" style="flex:1; overflow-y:auto; padding-right:5px;"></div>
        </div>

        <div id="caisse-drawer" class="drawer">
            <div class="drawer-header"><h2 id="table-title" style="margin:0; font-size:2.2rem;">TABLE</h2><button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button></div>
            <div class="ticket-area" id="ticket-list"></div>
            <input type="text" id="order-obs" class="input-field" placeholder="⚠️ OBSERVATIONS CLIENT...">
            <div class="cat-tabs" id="cat-tabs"></div>
            <div class="menu-grid" id="menu-items"></div>
            <div id="total-val" style="font-size:2rem; font-weight:900; text-align:right; margin:15px 0;">0.00 €</div>
            <button class="btn-action" style="background:#fff; color:#000;" onclick="sendOrder()">VALIDER ET ENVOYER</button>
        </div>

        <div id="resa-drawer" class="drawer">
            <div class="drawer-header"><h2 style="margin:0; font-size: 1.5rem;">NOUVELLE RÉSA</h2><button class="btn-close" onclick="closeDrawer('resa-drawer')">✕</button></div>
            <div style="flex:1; overflow-y:auto; padding-right:5px;">
                <div class="input-group"><span class="input-label">Date (Jusqu'à +3 ans)</span><input type="date" id="resa-date" class="input-field"></div>
                <div class="input-group"><span class="input-label">Heure</span><input type="time" id="resa-time" class="input-field" value="20:00"></div>
                <div class="input-group"><span class="input-label">Nom</span><input type="text" id="resa-name" class="input-field"></div>
                <div class="input-group"><span class="input-label">Tél</span><input type="tel" id="resa-tel" class="input-field"></div>
                <div class="input-group"><span class="input-label">Pax</span><input type="number" id="resa-pax" class="input-field" value="2" min="1"></div>
            </div>
            <button class="btn-action" style="background:#fff; color:#000;" onclick="saveResa()">SÉCURISER</button>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];

        // ONGLETS SALLES
        let rooms = JSON.parse(localStorage.getItem('EMPIRE_ROOMS')) || [{id: 'r_main', name: 'SALLE PRINCIPALE'}];
        let currentRoomId = rooms[0].id;

        const tmrw = new Date(); tmrw.setDate(tmrw.getDate() + 1);
        document.getElementById('resa-date').value = tmrw.toISOString().split('T')[0];

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE' || msg.type === 'PLAN_UPDATE') {
                activeOrders = msg.activeOrders || activeOrders;
                if (msg.rooms) { rooms = msg.rooms; localStorage.setItem('EMPIRE_ROOMS', JSON.stringify(rooms)); }
                if (msg.tables) localStorage.setItem('EMPIRE_TABLES', JSON.stringify(msg.tables));
                
                if (!rooms.find(r => r.id === currentRoomId)) currentRoomId = rooms[0].id;
                renderRooms(); renderFloorPlan(); renderRadar(); 
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'empire_recipes' && document.getElementById('caisse-drawer').classList.contains('open')) { renderMenu('Plat'); }
        });

        async function forceSync() { try { const res = await fetch('/get-current-state'); const data = await res.json(); activeOrders = data.activeOrders; renderRooms(); renderFloorPlan(); renderRadar(); } catch(e) {} }

        function openDrawer(id) { document.querySelectorAll('.drawer').forEach(d => d.classList.remove('open')); document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }

        // ==========================================
        // GESTION DES ONGLETS
        // ==========================================
        function renderRooms() {
            const container = document.getElementById('room-tabs');
            container.innerHTML = rooms.map(r => `<div class="room-tab ${r.id === currentRoomId ? 'active' : ''}" onclick="switchRoom('${r.id}')">${r.name}</div>`).join('');
        }

        function switchRoom(id) { currentRoomId = id; renderRooms(); renderFloorPlan(); }

        function saveResa() {
            const date = document.getElementById('resa-date').value; const time = document.getElementById('resa-time').value;
            const name = document.getElementById('resa-name').value.trim(); const pax = document.getElementById('resa-pax').value; const tel = document.getElementById('resa-tel').value.trim();
            if(!date || !name) return alert("Date et Nom obligatoires.");
            let resas = JSON.parse(localStorage.getItem('empire_reservations')) || {}; if(!resas[date]) resas[date] = [];
            resas[date].push({ id: Date.now(), time, name, pax, tel, status: 'confirmed' }); localStorage.setItem('empire_reservations', JSON.stringify(resas));
            if(ws.readyState === WebSocket.OPEN) { fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: 'GLOBAL_RESAS', order: { status: 'system', items: [], reservations: resas } }) }); }
            document.getElementById('resa-name').value = ''; document.getElementById('resa-tel').value = ''; closeDrawer('resa-drawer');
        }

        function renderRadar() {
            const container = document.getElementById('radar-list'); let html = ''; let alertsCount = 0;
            for (const tableId in activeOrders) {
                const order = activeOrders[tableId]; if (!order.items || order.items.length === 0) continue;
                const isWeb = tableId.includes('WEB'); const foodItems = order.items.filter(i => i.category !== 'Boisson'); const drinkItems = order.items.filter(i => i.category === 'Boisson');
                const foodReady = foodItems.length > 0 && foodItems.every(i => i.done);
                if (foodReady) { alertsCount++; html += `<div class="alert-card"><span class="alert-title">🔥 CUISINE PRÊTE</span><span style="font-size:1.2rem; font-weight:bold;">Aller à la Table : ${tableId.replace('WEB_','')}</span></div>`; }
                const drinksReady = drinkItems.length > 0 && drinkItems.every(i => i.done);
                if (drinksReady && !foodReady) { alertsCount++; html += `<div class="alert-card"><span class="alert-title">🧊 BAR PRÊT</span><span style="font-size:1.2rem; font-weight:bold;">Aller à la Table : ${tableId.replace('WEB_','')}</span></div>`; }
                if (isWeb && order.items.every(i => !i.done)) { alertsCount++; html += `<div class="alert-card"><span class="alert-title">🌐 COMMANDE QR</span><span style="font-size:1.2rem; font-weight:bold;">Table : ${tableId.replace('WEB_','')}</span></div>`; }
            }
            container.innerHTML = html || '<div style="color:#555; text-align:center; padding-top:20px;">Aucune alerte.</div>';
            const badge = document.getElementById('radar-badge'); if (alertsCount > 0) { badge.style.display = 'flex'; badge.textContent = alertsCount; } else { badge.style.display = 'none'; }
        }

        function renderFloorPlan() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            const tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];
            tables.forEach(t => {
                if(t.roomId !== currentRoomId) return; // Filtre par Salle Actuelle
                
                const div = document.createElement('div'); div.className = 'table-obj'; div.style.borderRadius = t.shape === 'round' ? '50%' : '8px';
                const order = activeOrders[t.id] || activeOrders[t.label];
                if(order && order.status !== 'system') { const foodReady = order.items.filter(i => i.category !== 'Boisson').length > 0 && order.items.filter(i => i.category !== 'Boisson').every(i => i.done); if (foodReady) div.classList.add('ready'); else div.classList.add('occupied'); }
                div.innerHTML = `<span>${t.label}</span>`; div.style.left = t.l + 'px'; div.style.top = t.t + 'px'; div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                div.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); openCaisse(t.label || t.id); }); floor.appendChild(div);
            });
        }

        function openCaisse(label) { currentTableId = label; document.getElementById('table-title').innerText = label; currentTicket = activeOrders[label]?.items || []; renderTicket(); renderMenu('Plat'); openDrawer('caisse-drawer'); }

        function renderMenu(activeCategory = 'Plat') {
            const menu = JSON.parse(localStorage.getItem('empire_recipes')) || [{name:'Plat Test', price:20, category:'Plat'}];
            const categories = [...new Set(menu.map(item => item.category || 'Autre'))];
            document.getElementById('cat-tabs').innerHTML = categories.map(cat => `<div class="cat-tab ${cat === activeCategory ? 'active' : ''}" onclick="renderMenu('${cat}')">${cat}</div>`).join('');
            document.getElementById('menu-items').innerHTML = menu.filter(m => (m.category || 'Autre') === activeCategory).map(m => `<div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price}, '${m.category}')"><span>${m.name}</span><span>${parseFloat(m.price).toFixed(2)}€</span></div>`).join('');
        }

        function addItem(n, p, c) { currentTicket.push({id: Date.now(), n: n, p: p, category: c, done: false}); renderTicket(); }
        function removeItem(targetIndex) { currentTicket.splice(targetIndex, 1); renderTicket(); }

        function renderTicket() {
            const list = document.getElementById('ticket-list'); let total = 0; const itemCounts = {};
            currentTicket.forEach((i, idx) => { total += i.p || 0; const name = i.n; if (!itemCounts[name]) itemCounts[name] = { item: i, count: 0, indices: [], price: i.p || 0 }; itemCounts[name].count++; itemCounts[name].indices.push(idx); });
            let html = '';
            for (const key in itemCounts) {
                const g = itemCounts[key]; const lastIndex = g.indices[g.indices.length - 1];
                html += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed rgba(255,255,255,0.3); align-items:center;"><span style="font-weight:bold; font-size:1rem; flex:1;"><span style="display:inline-block; min-width:25px; font-weight:900;">${g.count}x</span> ${g.item.done?'✅':'⏳'} ${key}</span><span style="font-weight:bold;">${(g.price * g.count).toFixed(2)}€ <span onclick="removeItem(${lastIndex})" style="border:1px solid #fff; border-radius:4px; padding:2px 8px; margin-left:10px; cursor:pointer;">✕</span></span></div>`;
            }
            list.innerHTML = html || '<div style="color:#555; text-align:center;">Ticket vierge</div>'; document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return; const obs = document.getElementById('order-obs').value.trim();
            const order = { table: currentTableId, items: currentTicket, observation: obs, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), status: 'pending' };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('order-obs').value = ''; closeDrawer('caisse-drawer');
        }

        forceSync(); setInterval(forceSync, 3000); 
    </script>
</body>
</html>
