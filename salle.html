<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Pad Serveur Master</title>
    <style>
        :root { --bg: #050505; --text: #fff; --sub: #aaa; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; touch-action: none; }
        
        /* HEADER TOTAL : TOUT SUR UNE LIGNE HORIZONTALE */
        header { 
            background: #000; border-bottom: 2px solid var(--gold); padding: 12px 20px; 
            display: flex; justify-content: space-between; align-items: center; gap: 10px; z-index: 1000;
        }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .nav-btns { display: flex; gap: 6px; flex-wrap: nowrap; }
        
        .btn-mini { 
            background: transparent; border: 1px solid #fff; color: #fff; padding: 10px 14px; 
            border-radius: 4px; font-size: 0.7rem; font-weight: 900; cursor: pointer; text-transform: uppercase;
            white-space: nowrap; transition: 0.2s;
        }
        .btn-mini.gold { border-color: var(--gold); color: var(--gold); }
        .btn-mini.active { background: var(--gold); color: #000; border-color: var(--gold); }
        .btn-mini.sync { border-color: var(--alert); color: var(--alert); }

        /* PLAN DE SALLE */
        .floor-plan { flex: 1; position: relative; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; overflow: hidden; }
        .table-obj { position: absolute; background: #000; border: 2px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: 900; color: #fff; cursor: pointer; z-index: 2; }
        .table-obj.occupied { border-color: var(--alert); color: var(--alert); box-shadow: 0 0 15px rgba(255, 23, 68, 0.4); }

        /* ARCHI TOOLS */
        .resizer { position: absolute; bottom: -8px; right: -8px; width: 22px; height: 22px; background: var(--gold); border-radius: 50%; display: none; justify-content: center; align-items: center; color: #000; font-size: 12px; z-index: 101; }
        .selected { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold) !important; z-index: 100 !important; }
        .selected .resizer { display: flex; }
        #arch-menu { position: absolute; top: 80px; left: 20px; width: 180px; background: #111; border: 1px solid #333; padding: 15px; border-radius: 4px; display: none; z-index: 2000; }

        /* COMMANDE / MODALS */
        .drawer { position: fixed; top: 0; right: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; flex-direction: column; }
        .drawer.open { display: flex; }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; padding: 15px; overflow-y: auto; }
        .btn-item { background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 6px; font-weight: bold; text-align: left; display: flex; justify-content: space-between; }
        .ticket-view { flex: 0 0 30%; background: #0a0a0a; border-bottom: 1px solid #333; padding: 15px; overflow-y: auto; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 20000; display: none; padding: 40px; box-sizing: border-box; overflow-y: auto; }
        .modal.open { display: block; }
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="header-left">
            <div style="font-weight:900; letter-spacing:1px; color:var(--gold);">EMPIRE PAD</div>
        </div>
        <div class="nav-btns">
            <button class="btn-mini gold" id="arch-master-btn" onclick="toggleArchMode()">🛠️ ARCHI</button>
            <button class="btn-mini gold" onclick="openModal('radar')">⚡ RADAR</button>
            <button class="btn-mini gold" onclick="window.open('haccp.html', '_blank')">⚖️ HACCP</button>
            <button class="btn-mini" onclick="openModal('plan')">📅 PLANNING</button>
            <button class="btn-mini sync" onclick="location.reload()">🔄 SYNC</button>
        </div>
    </header>

    <div id="floor-plan" class="floor-plan">
        <div id="arch-menu">
            <div style="color:var(--gold); font-size:0.6rem; font-weight:900; margin-bottom:10px; text-transform:uppercase;">ÉDITION SALLE</div>
            <button class="btn-mini gold" style="width:100%; margin-bottom:8px;" onclick="addObj('table')">+ TABLE</button>
            <button class="btn-mini" style="width:100%; margin-bottom:8px;" onclick="addObj('salon')">+ ZONE</button>
            <div id="edit-tools" style="display:none; border-top:1px solid #333; padding-top:10px; margin-top:10px;">
                <button class="btn-mini gold" style="width:100%; margin-bottom:8px;" onclick="renameObj()">✏️ NOM</button>
                <button class="btn-mini" style="width:100%; border-color:var(--alert); color:var(--alert);" onclick="deleteObj()">🗑️ SUPPR</button>
            </div>
        </div>
    </div>

    <div id="order-drawer" class="drawer">
        <div style="padding:20px; border-bottom:1px solid #333; display:flex; justify-content:space-between; align-items:center;">
            <h2 id="table-label" style="margin:0;">TABLE</h2>
            <button class="btn-mini" onclick="closeOrder()">FERMER ✕</button>
        </div>
        <div id="ticket" class="ticket-view"></div>
        <div id="menu" class="menu-grid"></div>
        <div style="padding:20px; background:#000;">
            <button class="btn-mini gold" style="width:100%; padding:20px; font-size:1rem;" onclick="sendToKitchen()">🚀 ENVOYER EN CUISINE</button>
        </div>
    </div>

    <div id="info-modal" class="modal">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1 id="modal-title" style="color:var(--gold);">INFO</h1>
            <button class="btn-mini" onclick="closeModal()">FERMER ✕</button>
        </div>
        <div id="modal-body" style="margin-top:30px;"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTable = null; let ticketItems = [];
        let tables = JSON.parse(localStorage.getItem('EMPIRE_LAYOUT')) || [];

        let isArchMode = false, selectedIdx = null;
        let isDragging = false, isResizing = false;
        let startX, startY, startL, startT, startW, startH;

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if(msg.type === 'ORDER_UPDATE') {
                activeOrders = msg.activeOrders;
                renderFloor();
                if(msg.activeOrders['GLOBAL_MENU']) localStorage.setItem('kds_menu', JSON.stringify(msg.activeOrders['GLOBAL_MENU'].data));
            }
        };

        function saveLayout() { localStorage.setItem('EMPIRE_LAYOUT', JSON.stringify(tables)); }

        function toggleArchMode() {
            isArchMode = !isArchMode;
            document.getElementById('arch-master-btn').classList.toggle('active', isArchMode);
            document.getElementById('arch-menu').style.display = isArchMode ? 'block' : 'none';
            if(!isArchMode) selectedIdx = null;
            renderFloor();
        }

        function addObj(type) {
            const label = type === 'table' ? "T" + (tables.filter(i=>i.type==='table').length + 1) : "ZONE";
            tables.push({ label, l: 150, t: 150, w: 100, h: 100, type });
            selectedIdx = tables.length - 1;
            saveLayout(); renderFloor();
        }

        function deleteObj() { if(selectedIdx !== null) { tables.splice(selectedIdx, 1); selectedIdx = null; saveLayout(); renderFloor(); } }

        function renameObj() {
            const n = prompt("Nouveau nom :", tables[selectedIdx].label);
            if(n) { tables[selectedIdx].label = n; saveLayout(); renderFloor(); }
        }

        function renderFloor() {
            const floor = document.getElementById('floor-plan'); 
            floor.querySelectorAll('.table-obj, .salon-obj').forEach(el => el.remove());
            document.getElementById('edit-tools').style.display = (isArchMode && selectedIdx !== null) ? 'block' : 'none';

            tables.forEach((t, idx) => {
                const div = document.createElement('div');
                div.className = (t.type === 'salon' ? 'salon-obj' : 'table-obj') + (selectedIdx === idx ? ' selected' : '');
                if(activeOrders[t.label]) div.classList.add('occupied');
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = `<span>${t.label}</span><div class="resizer">⤡</div>`;
                
                const handleStart = (e) => {
                    const touch = e.touches ? e.touches[0] : e;
                    selectedIdx = idx;
                    if(isArchMode) {
                        if(e.target.className === 'resizer') isResizing = true;
                        else isDragging = true;
                        startX = touch.clientX; startY = touch.clientY;
                        startL = t.l; startT = t.t; startW = t.w; startH = t.h;
                    } else if(t.type === 'table') {
                        openOrder(t.label);
                    }
                    renderFloor();
                };
                div.onmousedown = handleStart; div.ontouchstart = handleStart;
                floor.appendChild(div);
            });
        }

        const handleMove = (e) => {
            if(!isArchMode || (!isDragging && !isResizing)) return;
            const touch = e.touches ? e.touches[0] : e;
            const item = tables[selectedIdx];
            if(isDragging) {
                item.l = Math.round((startL + (touch.clientX - startX))/10)*10;
                item.t = Math.round((startT + (touch.clientY - startY))/10)*10;
            } else if(isResizing) {
                item.w = Math.max(50, Math.round((startW + (touch.clientX - startX))/10)*10);
                item.h = Math.max(50, Math.round((startH + (touch.clientY - startY))/10)*10);
            }
            renderFloor();
        };

        window.onmousemove = handleMove; window.ontouchmove = handleMove;
        window.onmouseup = window.ontouchend = () => { if(isDragging || isResizing) { isDragging = false; isResizing = false; saveLayout(); renderFloor(); } };

        function openOrder(id) {
            currentTable = id; document.getElementById('table-label').innerText = "TABLE " + id;
            ticketItems = activeOrders[id] ? activeOrders[id].items : [];
            renderTicket(); renderMenu();
            document.getElementById('order-drawer').classList.add('open');
        }

        function renderMenu() {
            const menu = JSON.parse(localStorage.getItem('kds_menu')) || [];
            document.getElementById('menu').innerHTML = menu.map(i => `
                <div class="btn-item" onclick="addToTicket('${i.name}', ${i.price})">
                    <span>${i.name}</span><span style="color:var(--gold)">${parseFloat(i.price).toFixed(2)}€</span>
                </div>`).join('');
        }

        function addToTicket(n, p) { ticketItems.push({n, p}); renderTicket(); }
        function renderTicket() {
            document.getElementById('ticket').innerHTML = ticketItems.map(i => `
                <div style="display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid #222;">
                    <span>${i.n}</span><span>${i.p.toFixed(2)}€</span>
                </div>`).join('');
        }

        async function sendToKitchen() {
            const order = { items: ticketItems, time: new Date().toLocaleTimeString(), status:'pending' };
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:currentTable, order}) });
            closeOrder();
        }

        function closeOrder() { document.getElementById('order-drawer').classList.remove('open'); }
        function openModal(t) { document.getElementById('info-modal').classList.add('open'); }
        function closeModal() { document.getElementById('info-modal').classList.remove('open'); }

        setInterval(() => fetch('/get-current-state').then(r=>r.json()).then(d=>{activeOrders=d.activeOrders;renderFloor();}), 5000);
        window.onload = renderFloor;
    </script>
</body>
</html>
