<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire Master - Chef de Salle</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; --gold: #ffb300; --web: #00e5ff; --paying: #ffeb3b; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: none; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        
        header { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; background: #000; z-index: 1000;}
        .header-title { font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem; margin: 0; color: var(--gold); }
        .btn-top { background: transparent; border: 1px solid var(--line); color: var(--text); padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.2s; }
        .btn-top:active { background: #fff; color: #000; }
        
        .room-bar { background: #0a0a0a; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 12px 25px; display: flex; gap: 10px; overflow-x: auto; }
        .room-tab { background: transparent; border: 1px solid var(--sub); color: var(--sub); padding: 8px 25px; border-radius: 20px; font-weight: 900; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .room-tab.active { background: #fff; color: #000; border-color: #fff; }

        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; padding: 15px; box-sizing: border-box;}
        .floor-plan { flex: 1; position: relative; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: hidden; }
        
        /* TABLES ET ALERTES */
        .table-obj { position: absolute; background: #000; border: 2px solid var(--line); display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; z-index: 50; font-size: 1.5rem; transition: 0.1s; border-radius: 8px; color: #fff;}
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,23,68,0.1); color: var(--alert); }
        .table-obj.paying { border-color: var(--paying); color: var(--paying); background: rgba(255, 235, 59, 0.1); }
        
        @keyframes table-ready-blink { 0% { background-color: #000; color: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 transparent; } 100% { background-color: var(--accent); color: #000; border-color: #fff; box-shadow: 0 0 35px var(--accent); } }
        .table-obj.ready { animation: table-ready-blink 0.4s infinite alternate !important; z-index: 999 !important; transform: scale(1.1); border-width: 4px !important;}

        /* TIROIRS */
        .drawer { position: absolute; top: 0; right: 0; height: 100%; width: 100%; max-width: 480px; background: #050505; border-left: 1px solid var(--line); padding: 30px; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; box-sizing: border-box; overflow-y:auto;}
        .drawer.open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--line); padding-bottom: 15px; margin-bottom: 20px;}
        .btn-close { background: transparent; border: 1px solid var(--line); color: var(--line); width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; display: flex; align-items: center; justify-content: center;}

        /* CAISSE MASTER */
        #caisse-drawer { max-width: 100%; flex-direction: row; border-left: none; }
        .pos-left { flex: 6; background: #0a0a0a; padding: 20px; border-radius: 8px; margin-right: 20px; display: flex; flex-direction: column;}
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; overflow-y: auto; flex: 1; }
        .btn-item { background: #000; border: 1px solid #444; padding: 15px; text-align: center; cursor: pointer; font-weight: bold; border-radius: 4px; }
        .pos-right { flex: 4; background: #0a0a0a; padding: 20px; border-radius: 8px; display: flex; flex-direction: column; }
        .ticket-area { flex: 1; overflow-y: auto; border-bottom: 1px solid #333; margin-bottom: 15px; }

        /* FACTURE & SPLIT DYNAMIQUE */
        #facture-modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 20000; flex-direction: column; align-items: center; justify-content: center; }
        #facture-modal.active-modal { display: flex; }
        .facture-paper { background: #fff; color: #000; width: 450px; padding: 30px; font-family: 'Courier New', monospace; border-radius: 4px; }
        .split-box { background: #111; width: 450px; margin-top: 15px; padding: 20px; border-radius: 8px; border: 1px solid var(--gold); }
        .btn-split { background: #000; border: 1px solid #fff; color: #fff; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 1.2rem;}
        .btn-split.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* HACCP ePACK STYLE */
        #gestion-drawer { width: 100vw; max-width: 100%; border-left: none; }
        .mega-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; height: calc(100vh - 200px); }
        .haccp-nav { display: flex; border-bottom: 1px solid #333; margin-bottom: 15px; gap: 5px; }
        .haccp-tab { flex: 1; background: transparent; border: 1px solid #333; color: #aaa; padding: 12px; font-weight: bold; cursor: pointer; text-transform: uppercase; border-radius: 4px 4px 0 0; }
        .haccp-tab.active { background: #111; color: var(--gold); border-color: var(--gold); border-bottom: none; }
        .haccp-log-card { border: 1px solid #333; padding: 10px; margin-bottom: 8px; border-radius: 4px; display: flex; justify-content: space-between; align-items: center; background: #0a0a0a; font-size: 0.85rem;}
        
        .btn-action { width: 100%; padding: 15px; font-weight: 900; cursor: pointer; text-transform: uppercase; border: 1px solid #fff; background: transparent; color: #fff; border-radius: 4px; margin-bottom: 10px;}
        .input-field { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; margin-bottom: 10px; font-weight: bold; box-sizing: border-box; }
        
        @media (max-width: 800px) { #caisse-drawer { flex-direction: column; overflow-y: auto; } .pos-left, .pos-right { flex: none; width: 100%; margin: 0; } .mega-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <header>
        <div class="header-title">CHEF DE SALLE - EMPIRE OS</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-top" onclick="openStaffPlanning()">📅 PLAN</button>
            <button class="btn-top" onclick="openGestionDrawer()">⚙️ HACCP</button>
            <button class="btn-top" style="border-color:var(--gold); color:var(--gold);" onclick="checkChefSecurity()">🔐 MANAGER</button>
        </div>
    </header>

    <div id="room-bar" class="room-bar"></div>
    <div class="main-workspace"><div class="floor-plan" id="floor-plan"></div></div>

    <div id="caisse-drawer" class="drawer">
        <div class="pos-left">
            <h2 style="color:var(--gold); margin-top:0;">LA CARTE</h2>
            <div id="cat-tabs" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto;"></div>
            <div class="menu-grid" id="menu-items"></div>
        </div>
        <div class="pos-right">
            <div class="drawer-header"><h2 id="table-title" style="margin:0;">TABLE</h2><button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button></div>
            <div class="ticket-area" id="ticket-list"></div>
            <div id="total-display" style="text-align:right; margin-bottom:15px;">
                <div style="font-size:0.9rem; color:var(--sub);">DÉJÀ PAYÉ: <span id="paid-val">0.00</span>€</div>
                <div style="font-size:2.5rem; font-weight:900;">RESTE: <span id="remain-val">0.00</span>€</div>
            </div>
            <button class="btn-action" style="background:var(--gold); color:#000; border:none;" onclick="ouvrirAddition()">🧾 ADDITION / SPLIT BILL</button>
            <button class="btn-action" style="background:#fff; color:#000; border:none;" onclick="sendOrder()">VALIDER ENVOI CUISINE</button>
            <button class="btn-action" style="border-style:dashed; color:var(--alert); border-color:var(--alert);" onclick="clearTable()">🗑️ ANNULER / LIBÉRER TABLE</button>
        </div>
    </div>

    <div id="facture-modal">
        <div class="facture-paper">
            <h2 style="text-align:center; margin:0;">ICHEF.CH</h2>
            <p id="f-table" style="text-align:center; border-bottom:1px dashed #000; padding-bottom:10px; font-weight:bold;"></p>
            <div id="f-items" style="max-height: 300px; overflow-y:auto;"></div>
            <div style="border-top:2px solid #000; margin-top:15px; padding-top:10px; font-weight:900; font-size:1.4rem; display:flex; justify-content:space-between;">
                <span>RESTE À PAYER</span><span id="f-remain">0.00 €</span>
            </div>
        </div>
        <div class="split-box">
            <div style="color:var(--gold); margin-bottom:10px; font-weight:bold; text-transform:uppercase;">Diviser le reste par :</div>
            <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:10px; margin-bottom:20px;">
                <button class="btn-split active" onclick="calcSplit(1)">1</button>
                <button class="btn-split" onclick="calcSplit(2)">2</button>
                <button class="btn-split" onclick="calcSplit(3)">3</button>
                <button class="btn-split" onclick="calcSplit(4)">4</button>
            </div>
            <div id="split-result" style="font-size:1.8rem; font-weight:900; text-align:right; margin-bottom:15px; color:var(--accent);">PART : 0.00 €</div>
            <div style="display:flex; gap:10px;">
                <button class="btn-action" style="flex:1; background:var(--accent); color:#000; border:none;" onclick="validerPaiementPartiel()">💰 ENCAISSER PART</button>
                <button class="btn-action" style="flex:1; background:var(--alert); border:none;" onclick="fermerFacture()">RETOUR</button>
            </div>
        </div>
    </div>

    <div id="gestion-drawer" class="drawer">
        <div class="drawer-header"><h2 style="margin:0; color:var(--gold);">DASHBOARD GESTION</h2><button class="btn-close" onclick="closeDrawer('gestion-drawer')">✕</button></div>
        <div class="mega-grid">
            <div>
                <h3 style="text-transform:uppercase; color:var(--gold); font-size:1rem;">ePack HACCP SALLE</h3>
                <input type="date" id="haccp-date" class="input-field" onchange="renderHaccp()">
                <div class="haccp-nav">
                    <button class="haccp-tab active" id="tab-t" onclick="switchH(this,'temp')">🌡️ Temp</button>
                    <button class="haccp-tab" id="tab-c" onclick="switchH(this,'clean')">🧹 Clean</button>
                </div>
                <div id="h-temp">
                    <input type="text" id="h-eq" class="input-field" placeholder="Equipement (ex: Cave à vins)">
                    <input type="number" id="h-val" class="input-field" placeholder="Température °C">
                    <button class="btn-action" onclick="saveH('Température')">Enregistrer Relevé</button>
                    <div id="list-temp" style="margin-top:15px;"></div>
                </div>
                <div id="h-clean" style="display:none;">
                    <button class="btn-action" onclick="saveH('Nettoyage','Sols Salle OK')">Check Sols Salle</button>
                    <button class="btn-action" onclick="saveH('Nettoyage','Bar OK')">Check Comptoir Bar</button>
                    <div id="list-clean" style="margin-top:15px;"></div>
                </div>
            </div>
            <div>
                <h3 style="text-transform:uppercase; color:var(--gold); font-size:1rem;">BRIGADE / PLANNING</h3>
                <div id="staff-planning-container"></div>
            </div>
            <div>
                <h3 style="text-transform:uppercase; color:var(--gold); font-size:1rem;">CHIFFRES / VENTES</h3>
                <input type="date" id="stats-date" class="input-field" onchange="renderStats()">
                <div id="stats-container"></div>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = []; let currentPaid = 0; let splitN = 1;
        let audioCtx = null; let previousStatus = {};

        // INITIALISATION DES DONNEES
        let rooms = JSON.parse(localStorage.getItem('EMPIRE_ROOMS')) || [{id:'r_main', name:'SALLE PRINCIPALE'}];
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];
        let currentRoomId = rooms[0].id;

        // UNLOCK AUDIO
        const unlockAudio = () => { if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} } };
        document.addEventListener('pointerdown', unlockAudio, { once: true });

        ws.onmessage = (e) => {
            try {
                const msg = JSON.parse(e.data);
                if (msg.type === 'ORDER_UPDATE' || msg.type === 'PLAN_UPDATE') {
                    activeOrders = msg.activeOrders || activeOrders;
                    checkAlerts(activeOrders);
                    renderFloorPlan();
                    if (currentTableId && activeOrders[currentTableId]) {
                        currentPaid = activeOrders[currentTableId].paidAmount || 0;
                        currentTicket = activeOrders[currentTableId].items || [];
                        renderTicket();
                    }
                }
            } catch(e){}
        };

        function checkAlerts(newOrders) {
            for(let tid in newOrders) {
                if (!newOrders[tid] || newOrders[tid].status === 'system') continue;
                if (newOrders[tid].status === 'ready' && previousStatus[tid] !== 'ready') { triggerAlert(); }
                previousStatus[tid] = newOrders[tid].status;
            }
        }

        function triggerAlert() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle'; osc.frequency.setValueAtTime(880, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 0.5);
        }

        async function forceSync() { try { const res = await fetch('/get-current-state'); const data = await res.json(); activeOrders = data.activeOrders; renderFloorPlan(); } catch(e) {} }

        function renderRooms() { document.getElementById('room-bar').innerHTML = rooms.map(r => `<button class="room-tab ${r.id===currentRoomId?'active':''}" onclick="currentRoomId='${r.id}';renderRooms();renderFloorPlan();">${r.name}</button>`).join(''); }

        function renderFloorPlan() {
            try {
                const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
                tables.forEach(t => {
                    if(t.roomId !== currentRoomId) return;
                    const div = document.createElement('div'); div.className = 'table-obj';
                    const o = activeOrders[t.label];
                    if(o) {
                        if(o.status==='ready') div.classList.add('ready');
                        else if(o.status==='paying') div.classList.add('paying');
                        else div.classList.add('occupied');
                    }
                    div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                    div.innerHTML = `<span>${t.label}</span>`;
                    div.onclick = () => openCaisse(t.label);
                    floor.appendChild(div);
                });
            } catch(e){}
        }

        function openCaisse(label) {
            currentTableId = label; document.getElementById('table-title').innerText = label;
            const o = activeOrders[label];
            currentTicket = o ? o.items : [];
            currentPaid = o ? (o.paidAmount || 0) : 0;
            if(o && o.status === 'ready') { o.status = 'pending'; syncServer(); }
            renderTicket(); renderMenu('Entrée'); document.getElementById('caisse-drawer').classList.add('open');
        }

        function renderTicket() {
            let total = 0;
            document.getElementById('ticket-list').innerHTML = currentTicket.map((i, idx) => {
                total += i.p;
                return `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222;">
                    <span>${i.n}</span><span>${i.p.toFixed(2)}€ <button onclick="removeItem(${idx})" style="background:none;border:none;color:red;cursor:pointer;">✕</button></span>
                </div>`;
            }).join('');
            document.getElementById('paid-val').innerText = currentPaid.toFixed(2);
            document.getElementById('remain-val').innerText = (total - currentPaid).toFixed(2);
        }

        function renderMenu(cat) {
            const recipes = JSON.parse(localStorage.getItem('empire_recipes')) || [];
            const cats = ['Entrée', 'Plat', 'Dessert', 'Boisson'];
            document.getElementById('cat-tabs').innerHTML = cats.map(c => `<button class="room-tab ${c===cat?'active':''}" onclick="renderMenu('${c}')">${c}</button>`).join('');
            document.getElementById('menu-items').innerHTML = recipes.filter(r => r.category === cat).map(r => `<div class="btn-item" onclick="addItem('${r.name}', ${r.price}, '${r.category}')">${r.name}<br>${r.price}€</div>`).join('');
        }

        function addItem(n, p, c) { currentTicket.push({id:Date.now(), n, p, category:c, done:false}); renderTicket(); }
        function removeItem(idx) { currentTicket.splice(idx, 1); renderTicket(); }

        async function syncServer() {
            const order = { table: currentTableId, items: currentTicket, paidAmount: currentPaid, status: 'pending', time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}) };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            closeDrawer('caisse-drawer');
        }

        function ouvrirAddition() {
            const total = currentTicket.reduce((acc, i) => acc + i.p, 0);
            const reste = total - currentPaid;
            if(reste <= 0) return;
            document.getElementById('f-table').innerText = "TABLE " + currentTableId;
            document.getElementById('f-items').innerHTML = document.getElementById('ticket-list').innerHTML;
            document.getElementById('f-remain').innerText = reste.toFixed(2) + " €";
            calcSplit(1);
            document.getElementById('facture-modal').classList.add('active-modal');
            activeOrders[currentTableId].status = 'paying'; 
            fetch('/update-order', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ tableId: currentTableId, order: activeOrders[currentTableId] }) });
        }

        function calcSplit(n) { 
            splitN = n; 
            const reste = parseFloat(document.getElementById('f-remain').innerText); 
            document.getElementById('split-result').innerText = `PART : ${(reste/n).toFixed(2)} €`;
            document.querySelectorAll('.btn-split').forEach((b, i) => b.classList.toggle('active', i === (n-1)));
        }

        async function validerPaiementPartiel() {
            const total = currentTicket.reduce((acc, i) => acc + i.p, 0);
            const reste = total - currentPaid;
            const part = reste / splitN;
            if(!confirm(`Confirmer encaissement de ${part.toFixed(2)}€ ?`)) return;
            
            currentPaid += part;
            if(currentPaid >= total - 0.05) { 
                await fetch('/update-order', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ tableId: currentTableId, order: null }) });
                fermerFacture(); closeDrawer('caisse-drawer');
            } else {
                activeOrders[currentTableId].paidAmount = currentPaid;
                await fetch('/update-order', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ tableId: currentTableId, order: activeOrders[currentTableId] }) });
                calcSplit(1); renderTicket(); document.getElementById('f-remain').innerText = (total - currentPaid).toFixed(2) + " €";
            }
        }

        async function clearTable() { if(confirm("Libérer cette table ?")) { await fetch('/update-order', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({ tableId: currentTableId, order: null }) }); closeDrawer('caisse-drawer'); } }
        function fermerFacture() { document.getElementById('facture-modal').classList.remove('active-modal'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); currentTableId = null; }
        function openDrawer(id) { document.getElementById(id).classList.add('open'); if(id==='gestion-drawer') renderHaccp(); }

        // MODULE GESTION / HACCP
        function switchH(btn, view) { 
            document.querySelectorAll('.haccp-tab').forEach(t=>t.classList.remove('active')); btn.classList.add('active');
            document.getElementById('h-temp').style.display = view==='temp'?'block':'none';
            document.getElementById('h-clean').style.display = view==='clean'?'block':'none';
        }
        function saveH(type, val=null) {
            const date = document.getElementById('haccp-date').value; if(!date) return;
            const log = { type, eq: val || document.getElementById('h-eq').value, val: val || document.getElementById('h-val').value + '°C', time: new Date().toLocaleTimeString() };
            let db = JSON.parse(localStorage.getItem('kds_haccp') || '{}'); if(!db[date]) db[date]=[]; db[date].unshift(log);
            localStorage.setItem('kds_haccp', JSON.stringify(db)); renderHaccp();
        }
        function renderHaccp() {
            const date = document.getElementById('haccp-date').value; if(!date) return;
            const logs = (JSON.parse(localStorage.getItem('kds_haccp') || '{}')[date]) || [];
            document.getElementById('list-temp').innerHTML = logs.filter(l=>l.type==='Température').map(l=>`<div class="haccp-log-card"><span><b>${l.eq}</b><br><small>${l.time}</small></span><b>${l.val}</b></div>`).join('');
            document.getElementById('list-clean').innerHTML = logs.filter(l=>l.type==='Nettoyage').map(l=>`<div class="haccp-log-card"><span><b>${l.eq}</b><br><small>${l.time}</small></span><b>OK</b></div>`).join('');
        }

        window.onload = () => { 
            document.getElementById('haccp-date').valueAsDate = new Date();
            renderRooms(); renderFloorPlan(); forceSync(); 
        };
        setInterval(forceSync, 3000);
    </script>
</body>
</html>
