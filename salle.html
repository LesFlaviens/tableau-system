<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Command Center</title>
    <style>
        :root { --bg: #050505; --text: #fff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; touch-action: none; }
        
        /* HEADER HORIZONTAL */
        .top-nav { height: 70px; background: var(--panel); border-bottom: 2px solid var(--gold); display: flex; align-items: center; justify-content: space-between; padding: 0 30px; z-index: 1000; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        .nav-left { display: flex; align-items: center; gap: 20px; }
        .nav-right { display: flex; gap: 10px; }
        .logo-empire { font-weight: 900; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; font-size: 1.2rem; }

        /* BOUTONS NAV */
        .nav-btn { background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 10px 18px; font-weight: bold; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 0.75rem; transition: 0.2s; display: flex; align-items: center; gap: 8px; }
        .nav-btn:hover { border-color: var(--gold); }
        .nav-btn.active { background: var(--gold); color: #000; border-color: var(--gold); }

        /* VIEWPORT FULL SCREEN */
        .viewport { flex: 1; position: relative; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; overflow: hidden; cursor: crosshair; }

        /* OBJETS SALLE */
        .obj { position: absolute; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; border: 2px solid #555; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .table-obj { background: #000; border-radius: 8px; color: #fff; z-index: 2; }
        .salon-obj { background: rgba(255, 179, 0, 0.05); border: 2px dashed #444; color: #777; z-index: 1; text-transform: uppercase; text-align: center; font-size: 0.8rem; }
        .selected { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); z-index: 100 !important; }
        .resizer { position: absolute; bottom: -8px; right: -8px; width: 22px; height: 22px; background: var(--gold); border-radius: 50%; display: none; justify-content: center; align-items: center; color: #000; font-size: 12px; }
        .selected .resizer { display: flex; }

        /* PANNEAU DE SÉLECTION FLOTTANT */
        #selection-panel { position: absolute; bottom: 30px; right: 30px; width: 320px; background: var(--panel); border: 1px solid #333; border-radius: 8px; padding: 20px; display: none; z-index: 500; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-top: 3px solid var(--gold); }

        /* MENU ARCHITECTURE FLOTTANT */
        #arch-menu { position: absolute; top: 80px; left: 30px; background: #1a1a1a; border: 1px solid #333; padding: 15px; display: none; border-radius: 4px; z-index: 1000; width: 200px; }
        .btn-block { width: 100%; padding: 10px; margin-bottom: 8px; font-weight: 900; cursor: pointer; border: none; border-radius: 4px; text-transform: uppercase; font-size: 0.7rem; }
    </style>
</head>
<body>

    <header class="top-nav">
        <div class="nav-left">
            <div class="logo-empire">⚡ EMPIRE OS</div>
            <button class="nav-btn" onclick="toggleArchMode()" id="btn-arch">🛠️ Architecture</button>
            <button class="nav-btn" onclick="alert('Radar actif : 0 réservation')">📡 Radar</button>
            <button class="nav-btn" onclick="window.open('haccp.html', '_blank')">⚖️ HACCP</button>
            <button class="nav-btn" onclick="alert('Module Planning bientôt disponible')">📅 Planning</button>
        </div>
        <div class="nav-right" id="arch-status" style="color: #444; font-size: 0.7rem; font-weight: bold;">MODE SERVICE ACTIF</div>
    </header>

    <main class="viewport" id="floor">
        <div id="arch-menu">
            <div style="color:var(--gold); font-size: 0.6rem; font-weight: 900; margin-bottom: 10px;">OUTILS STRUCTURE</div>
            <button class="btn-block" style="background:#333; color:#fff;" onclick="addObj('table')">+ TABLE</button>
            <button class="btn-block" style="background:#333; color:#fff;" onclick="addObj('salon')">+ ZONE / SALON</button>
            <div id="edit-tools" style="display:none; border-top: 1px solid #333; padding-top: 10px; margin-top: 10px;">
                <button class="btn-block" style="background:var(--gold); color:#000;" onclick="renameObj()">✏️ RECTIFIER NOM</button>
                <button class="btn-block" style="background:var(--alert); color:#fff;" onclick="deleteObj()">🗑️ SUPPRIMER</button>
            </div>
        </div>

        <div id="selection-panel">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 id="det-title" style="margin:0; color:var(--gold);">TABLE : --</h3>
                <button onclick="closePanel()" style="background:none; border:none; color:#555; cursor:pointer;">✕</button>
            </div>
            <div id="det-content" style="color:#888; font-size: 0.9rem; margin-bottom:15px;">Ticket vide.</div>
            <div style="font-size: 1.5rem; font-weight: 900; text-align: right; border-top: 1px solid #222; padding-top: 10px;">
                <span id="total">0.00</span>€
            </div>
            <button class="btn-block" style="background:var(--accent); color:#000; padding:15px; margin-top:15px;">🚀 ENVOYER CUISINE</button>
        </div>
    </main>

    <script>
        let layout = JSON.parse(localStorage.getItem('EMPIRE_LAYOUT')) || [];
        let selectedIdx = null, isArchMode = false;
        let isDragging = false, isResizing = false;
        let startX, startY, startL, startT, startW, startH;

        const floor = document.getElementById('floor');

        function save() { localStorage.setItem('EMPIRE_LAYOUT', JSON.stringify(layout)); }

        function toggleArchMode() {
            isArchMode = !isArchMode;
            document.getElementById('btn-arch').classList.toggle('active', isArchMode);
            document.getElementById('arch-menu').style.display = isArchMode ? 'block' : 'none';
            document.getElementById('arch-status').innerText = isArchMode ? "⚠️ MODE ÉDITION" : "MODE SERVICE ACTIF";
            document.getElementById('arch-status').style.color = isArchMode ? "var(--gold)" : "#444";
            if(!isArchMode) { selectedIdx = null; closePanel(); }
            render();
        }

        function addObj(type) {
            const label = type === 'table' ? "T" + (layout.filter(i=>i.type==='table').length + 1) : "ZONE";
            layout.push({ id: Date.now(), type, label, l: 150, t: 150, w: 100, h: 80 });
            selectedIdx = layout.length - 1;
            save(); render();
        }

        function deleteObj() { if(selectedIdx !== null) { layout.splice(selectedIdx, 1); selectedIdx = null; save(); render(); } }

        function renameObj() {
            const newName = prompt("Nouveau nom :", layout[selectedIdx].label);
            if(newName) { layout[selectedIdx].label = newName; save(); render(); }
        }

        function closePanel() { document.getElementById('selection-panel').style.display = 'none'; selectedIdx = null; render(); }

        function render() {
            floor.querySelectorAll('.obj').forEach(el => el.remove());
            document.getElementById('edit-tools').style.display = (isArchMode && selectedIdx !== null) ? 'block' : 'none';
            
            layout.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = `obj ${item.type}-obj ${selectedIdx === idx ? 'selected' : ''}`;
                div.style.left = item.l + 'px'; div.style.top = item.t + 'px';
                div.style.width = item.w + 'px'; div.style.height = item.h + 'px';
                div.innerHTML = `<span>${item.label}</span><div class="resizer">⤡</div>`;

                const handleStart = (e) => {
                    const t = e.touches ? e.touches[0] : e;
                    selectedIdx = idx;
                    if(isArchMode) {
                        if(e.target.className === 'resizer') isResizing = true;
                        else isDragging = true;
                        startX = t.clientX; startY = t.clientY;
                        startL = item.l; startT = item.t;
                        startW = item.w; startH = item.h;
                    } else {
                        document.getElementById('selection-panel').style.display = 'block';
                        document.getElementById('det-title').innerText = item.label;
                    }
                    render();
                };
                div.onmousedown = handleStart; div.ontouchstart = handleStart;
                floor.appendChild(div);
            });
        }

        const handleMove = (e) => {
            if(!isArchMode || (!isDragging && !isResizing)) return;
            const t = e.touches ? e.touches[0] : e;
            const item = layout[selectedIdx];
            if(isDragging) {
                item.l = Math.round((startL + (t.clientX - startX))/10)*10;
                item.t = Math.round((startT + (t.clientY - startY))/10)*10;
            } else if(isResizing) {
                item.w = Math.max(50, Math.round((startW + (t.clientX - startX))/10)*10);
                item.h = Math.max(50, Math.round((startH + (t.clientY - startY))/10)*10);
            }
            const el = floor.querySelectorAll('.obj')[selectedIdx];
            el.style.left = item.l + 'px'; el.style.top = item.t + 'px';
            el.style.width = item.w + 'px'; el.style.height = item.h + 'px';
        };

        window.onmousemove = handleMove; window.ontouchmove = handleMove;
        window.onmouseup = window.ontouchend = () => { if(isDragging || isResizing) { isDragging = false; isResizing = false; save(); render(); } };
        window.onload = render;
    </script>
</body>
</html>
