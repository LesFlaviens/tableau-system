<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Plan de Salle</title>
    <style>
        :root { --bg: #050505; --text: #fff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; user-select: none; }
        
        /* Layout Principal */
        .sidebar { width: 320px; border-right: 1px solid #333; display: flex; flex-direction: column; background: var(--panel); z-index: 10; }
        .viewport { flex: 1; position: relative; overflow: auto; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; }
        .details { width: 350px; border-left: 1px solid #333; padding: 25px; background: var(--panel); z-index: 10; display: flex; flex-direction: column; }

        /* Éléments de la salle */
        .table-obj { position: absolute; background: #000; border: 2px solid #555; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.5); z-index: 2; color: #fff; }
        .salon-obj { position: absolute; background: rgba(255, 179, 0, 0.05); border: 2px dashed #555; border-radius: 4px; display: flex; justify-content: flex-start; align-items: flex-start; padding: 10px; font-weight: bold; color: #777; z-index: 1; text-transform: uppercase; }
        
        /* Statuts de service */
        .table-obj.occupied { border-color: var(--alert); background: rgba(255, 23, 68, 0.1); }
        .table-obj.ready { border-color: var(--accent); background: rgba(0, 230, 118, 0.1); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 20px var(--accent); } }
        
        /* UI Elements */
        .btn { width: 100%; padding: 15px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; margin-top: 10px; transition: 0.2s; }
        .btn:hover { opacity: 0.8; }
        .header-title { padding: 20px; border-bottom: 2px solid var(--gold); font-weight: 900; font-size: 1.2rem; letter-spacing: 1px; text-transform: uppercase; }
        
        #radar-list { flex: 1; padding: 15px; overflow-y: auto; }
        #bill-content { flex: 1; border-top: 1px solid #333; margin-top: 15px; padding-top: 15px; overflow-y: auto; }
        .total-zone { font-size: 1.8rem; font-weight: 900; text-align: right; margin: 20px 0; color: var(--gold); }

        /* --- FENÊTRE MODALE ARCHITECTE --- */
        #architect-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; flex-direction: column; }
        .arch-toolbar { background: var(--panel); padding: 15px 30px; border-bottom: 2px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .arch-tools button { background: #333; color: white; border: 1px solid #555; padding: 10px 15px; margin-right: 10px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .arch-tools button:hover { background: #444; }
        .arch-tools button.danger { background: #5a1010; border-color: var(--alert); }
        .arch-tools button.success { background: var(--gold); color: black; border: none; }
        
        #arch-viewport { flex: 1; position: relative; background-image: radial-gradient(var(--gold) 1px, transparent 1px); background-size: 30px 30px; overflow: auto; cursor: crosshair; }
        .arch-selected { border-color: var(--gold) !important; box-shadow: 0 0 15px rgba(255, 179, 0, 0.5) !important; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header-title">⚡ RADAR & RÉSERVATIONS</div>
        <div id="radar-list">
            <div style="padding:10px; border-bottom:1px solid #333; color:#aaa;">Aucune réservation active</div>
        </div>
        <div style="padding: 20px;">
            <button class="btn" style="background: transparent; border: 1px solid var(--gold); color: var(--gold);" onclick="openArchitect()">🛠️ MODE ARCHITECTE</button>
        </div>
    </div>

    <div class="viewport" id="floor-plan"></div>

    <div class="details">
        <h2 id="table-title" style="margin-top: 0; color: var(--gold);">SÉLECTIONNEZ UNE TABLE</h2>
        <div id="bill-content"><div style="color: #666; text-align: center; margin-top: 50px;">Table libre</div></div>
        <div class="total-zone">TOTAL: <span id="total-val">0.00</span>€</div>
        <button class="btn" style="background: var(--accent); color: black;" onclick="alert('Connecté à la file d\'attente cuisine')">🚀 ENVOYER CUISINE</button>
        <button class="btn" style="background: var(--alert); color: white;" onclick="encaisser()">📑 ENCAISSER</button>
    </div>

    <div id="architect-modal">
        <div class="arch-toolbar">
            <div style="font-size: 1.2rem; font-weight: 900; color: var(--gold);">🛠️ ÉDITEUR D'EMPIRE</div>
            <div class="arch-tools">
                <span id="arch-info" style="color: #888; margin-right: 20px; font-size: 0.9rem;">Glisser: Déplacer | Maj+Glisser: Redimensionner</span>
                <button onclick="archAddElement('table')">+ Ajouter Table</button>
                <button onclick="archAddElement('salon')">+ Ajouter Salon/Zone</button>
                <button onclick="archDeleteSelected()" class="danger">🗑️ Supprimer Sélection</button>
                <button onclick="saveAndCloseArchitect()" class="success">💾 SAUVEGARDER & FERMER</button>
            </div>
        </div>
        <div id="arch-viewport"></div>
    </div>

    <script>
        // --- DONNÉES ET CONNEXION ---
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {};
        let currentTableId = null;
        
        let layoutData = JSON.parse(localStorage.getItem('EMPIRE_LAYOUT')) || [
            { id: "S1", type: "salon", label: "SALON VIP", l: 50, t: 50, w: 300, h: 250 },
            { id: "T1", type: "table", label: "T1", l: 100, t: 100, w: 80, h: 80 },
            { id: "T2", type: "table", label: "T2", l: 200, t: 100, w: 120, h: 80 }
        ];

        window.onload = () => {
            renderServicePlan();
            fetchInitialState();
        };

        // --- WEBSOCKETS (SERVICE) ---
        ws.onopen = () => console.log('Connecté au QG');
        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') { activeOrders = msg.activeOrders; renderServicePlan(); updateSidePanel(); }
        };

        async function fetchInitialState() {
            try {
                const res = await fetch('/get-current-state');
                const state = await res.json();
                activeOrders = state.activeOrders;
                renderServicePlan();
            } catch (e) { console.log("Mode local actif"); }
        }

        // --- MOTEUR DE RENDU (SERVICE UNIQUEMENT) ---
        function renderServicePlan() {
            const floor = document.getElementById('floor-plan');
            floor.innerHTML = '';

            // Trier pour que les salons soient rendus en premier (en-dessous) et les tables par-dessus
            const sortedLayout = [...layoutData].sort((a, b) => (a.type === 'salon' ? -1 : 1));

            sortedLayout.forEach(item => {
                const div = document.createElement('div');
                div.className = item.type === 'salon' ? 'salon-obj' : 'table-obj';
                div.style.left = item.l + 'px'; div.style.top = item.t + 'px';
                div.style.width = item.w + 'px'; div.style.height = item.h + 'px';
                div.innerText = item.label;

                if (item.type === 'table') {
                    const orderData = activeOrders[item.label];
                    if (orderData) {
                        div.classList.add('occupied');
                        if (orderData.status === 'ready') div.classList.add('ready');
                    }
                    div.onclick = () => { currentTableId = item.label; updateSidePanel(); };
                }
                floor.appendChild(div);
            });
        }

        // --- GESTION DU TICKET (DROITE) ---
        function updateSidePanel() {
            if (!currentTableId) return;
            document.getElementById('table-title').innerText = "TABLE : " + currentTableId;
            const orderData = activeOrders[currentTableId];
            const bill = document.getElementById('bill-content');
            
            if (!orderData || !orderData.plats) {
                bill.innerHTML = '<div style="color: #666; text-align: center; margin-top: 50px;">Table libre</div>';
                document.getElementById('total-val').innerText = "0.00";
                return;
            }
            let total = 0, html = '';
            orderData.plats.forEach(p => { total += 15; html += `<div style="display:flex; justify-content:space-between; margin-bottom:10px; color:#ccc;"><span>${p}</span><span>15.00€</span></div>`; });
            bill.innerHTML = html; document.getElementById('total-val').innerText = total.toFixed(2);
        }

        async function encaisser() {
            if (prompt("CODE MANAGER:") === '7777') {
                await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order: null }) });
                currentTableId = null; updateSidePanel();
            }
        }

        // ==========================================
        // MODULE ARCHITECTE (ÉDITION DE LA SALLE)
        // ==========================================
        let archDraftData = [];
        let archSelectedIndex = null;
        let archState = null; // 'drag' ou 'resize'
        let sX, sY, sL, sT, sW, sH;

        function openArchitect() {
            document.getElementById('architect-modal').style.display = 'flex';
            archDraftData = JSON.parse(JSON.stringify(layoutData)); // Copie profonde
            archSelectedIndex = null;
            renderArchitectPlan();
        }

        function saveAndCloseArchitect() {
            layoutData = archDraftData;
            localStorage.setItem('EMPIRE_LAYOUT', JSON.stringify(layoutData));
            document.getElementById('architect-modal').style.display = 'none';
            renderServicePlan();
        }

        function archAddElement(type) {
            const label = prompt(`Nom du ${type} ?`);
            if (!label) return;
            archDraftData.push({
                id: label + Date.now(), type: type, label: label,
                l: 100, t: 100, w: type === 'salon' ? 300 : 80, h: type === 'salon' ? 200 : 80
            });
            archSelectedIndex = archDraftData.length - 1;
            renderArchitectPlan();
        }

        function archDeleteSelected() {
            if (archSelectedIndex !== null) {
                archDraftData.splice(archSelectedIndex, 1);
                archSelectedIndex = null;
                renderArchitectPlan();
            }
        }

        function renderArchitectPlan() {
            const vp = document.getElementById('arch-viewport');
            vp.innerHTML = '';
            
            const sorted = archDraftData.map((item, index) => ({ item, originalIndex: index }))
                                        .sort((a, b) => (a.item.type === 'salon' ? -1 : 1));

            sorted.forEach(({item, originalIndex}) => {
                const div = document.createElement('div');
                div.className = item.type === 'salon' ? 'salon-obj' : 'table-obj';
                div.style.left = item.l + 'px'; div.style.top = item.t + 'px';
                div.style.width = item.w + 'px'; div.style.height = item.h + 'px';
                div.innerText = item.label;
                
                if (archSelectedIndex === originalIndex) div.classList.add('arch-selected');

                div.onmousedown = (e) => {
                    e.stopPropagation();
                    archSelectedIndex = originalIndex;
                    archState = e.shiftKey ? 'resize' : 'drag';
                    sX = e.clientX; sY = e.clientY;
                    sL = item.l; sT = item.t; sW = item.w; sH = item.h;
                    renderArchitectPlan();
                };
                vp.appendChild(div);
            });
        }

        document.getElementById('arch-viewport').onmousedown = () => { archSelectedIndex = null; renderArchitectPlan(); };

        window.onmousemove = (e) => {
            if (document.getElementById('architect-modal').style.display === 'none' || archSelectedIndex === null || !archState) return;
            const item = archDraftData[archSelectedIndex];
            const dx = e.clientX - sX; const dy = e.clientY - sY;

            if (archState === 'drag') {
                item.l = Math.max(0, Math.round((sL + dx) / 10) * 10);
                item.t = Math.max(0, Math.round((sT + dy) / 10) * 10);
            } else if (archState === 'resize') {
                item.w = Math.max(40, Math.round((sW + dx) / 10) * 10);
                item.h = Math.max(40, Math.round((sH + dy) / 10) * 10);
            }
            renderArchitectPlan();
        };

        window.onmouseup = () => { archState = null; };
    </script>
</body>
</html>
