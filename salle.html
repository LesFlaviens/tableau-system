<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Chef de Salle Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050505; --text: #fff; --sub: #aaa; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR GAUCHE : RADAR & QR */
        .sidebar { width: 320px; border-right: 1px solid #333; display: flex; flex-direction: column; background: #000; }
        .sidebar-header { padding: 20px; border-bottom: 2px solid var(--gold); font-weight: 900; text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; }
        .radar-box { flex: 1; padding: 15px; overflow-y: auto; }
        .res-item { background: #111; border: 1px solid #222; padding: 12px; border-radius: 8px; margin-bottom: 10px; border-left: 4px solid var(--gold); cursor: pointer; }
        
        /* CENTRE : PLAN DE SALLE */
        .main-view { flex: 1; position: relative; padding: 20px; overflow: auto; background: #050505; }
        .table-obj { position: absolute; background: #000; border: 2px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; color: #fff; transition: 0.3s; }
        
        /* ÉTATS DES TABLES : FIXE ET CLIGNOTANT */
        .table-obj.occupied { border-color: var(--alert); color: var(--alert); }
        .table-obj.ready { border-color: var(--accent); color: var(--accent); animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        /* DROITE : COMMANDE & INFOS */
        .details-panel { width: 400px; border-left: 1px solid #333; padding: 25px; background: #000; display: flex; flex-direction: column; }
        .nav-quick { display: flex; gap: 5px; margin-bottom: 20px; }
        .btn-nav { flex: 1; background: #111; border: 1px solid #444; color: #fff; padding: 10px; font-size: 0.65rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        
        .order-zone { flex: 1; overflow-y: auto; margin-top: 10px; border-top: 1px solid #222; padding-top: 10px; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 10px; }
        .btn-item { background: #111; border: 1px solid #333; color: #fff; padding: 10px; font-size: 0.75rem; border-radius: 4px; cursor: pointer; }
        
        .btn-action { width: 100%; padding: 15px; background: var(--gold); color: #000; border: none; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; margin-top: 10px; }
        
        /* MODAL PLANNING */
        #planning-drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; padding: 40px; box-sizing: border-box; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header"><span>⚡ RADAR</span> <small id="sync-dot" style="color:var(--accent)">●</small></div>
        <div id="radar-list" class="radar-box"></div>
        <div style="padding:20px; text-align:center; border-top:1px solid #333;">
            <div id="qrcode"></div>
            <p style="font-size:0.6rem; color:var(--gold); margin-top:10px;">SCAN POUR RÉSERVER</p>
        </div>
    </div>

    <div class="main-view">
        <h1 style="color:var(--gold); font-weight:900; margin-bottom:20px; text-transform:uppercase;">EMPIRE OS - CHEF DE SALLE</h1>
        <div id="floor-plan" style="position:relative; width:1000px; height:800px;"></div>
    </div>

    <div class="details-panel">
        <div class="nav-quick">
            <button class="btn-nav" onclick="toggleDrawer('planning')">📅 PLANNING</button>
            <button class="btn-nav" onclick="window.location.href='haccp.html'">⚙️ HACCP</button>
            <button class="btn-nav" onclick="location.reload()">🔄 SYNC</button>
        </div>

        <h2 id="selected-table" style="margin:0; font-size:1.8rem;">SÉLECTIONNER TABLE</h2>
        
        <div class="order-zone" id="order-content">
            <p style="color:var(--sub)">Aucune table active.</p>
        </div>

        <div id="action-zone" style="display:none;">
            <div id="menu-selector" class="menu-grid"></div>
            <div style="font-size:1.5rem; font-weight:900; text-align:right; margin:15px 0;">TOTAL: <span id="total-val">0.00</span>€</div>
            <button class="btn-action" style="background:var(--accent)" onclick="sendOrder()">🚀 ENVOYER CUISINE</button>
            <button class="btn-action" onclick="encaisser()">📑 ENCAISSER (7777)</button>
        </div>
    </div>

    <div id="planning-drawer">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>📅 PLANNING BRIGADE</h2>
            <button class="btn-nav" onclick="toggleDrawer('planning')">FERMER ✕</button>
        </div>
        <div id="planning-list" style="margin-top:20px;"></div>
    </div>

    <script>
        // --- PROTOCOLE DE SYNCHRO EMPIRE 24/7 (TON CODE) ---
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {};
        let currentTableId = null;
        let ticketItems = [];

        async function autoSync() {
            try {
                const response = await fetch('/get-current-state');
                const state = await response.json();
                activeOrders = state.activeOrders;
                
                // Distribution automatique
                if(activeOrders['GLOBAL_PLANNING']) renderPlanning(activeOrders['GLOBAL_PLANNING'].data);
                if(activeOrders['GLOBAL_BLACKLIST']) typeof renderBlacklist === "function" && renderBlacklist(activeOrders['GLOBAL_BLACKLIST'].data);
                if(activeOrders['GLOBAL_MENU']) renderMenu(activeOrders['GLOBAL_MENU'].data);
                if(activeOrders['GLOBAL_RESERVATIONS']) renderRadar(activeOrders['GLOBAL_RESERVATIONS'].data);
                
                if (typeof render === "function") render(); 
            } catch (e) { console.error("Lien interrompu, tentative de reconnexion..."); }
        }

        async function saveStaffToServer(staffList) {
            await fetch('/update-order', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    tableId: 'GLOBAL_PLANNING',
                    order: { status: 'system', data: staffList }
                })
            });
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') {
                activeOrders = msg.activeOrders;
                autoSync(); 
            }
        };

        // --- LOGIQUE SALLE (MAINTENUE) ---
        const tables = [
            {label:"T1", l:550, t:500, w:80, h:120}, {label:"T2", l:550, t:300, w:80, h:120},
            {label:"T3", l:430, t:450, w:80, h:120}, {label:"T4", l:440, t:300, w:80, h:120},
            {label:"T5", l:330, t:430, w:80, h:120}, {label:"T6", l:350, t:300, w:80, h:120},
            {label:"T7", l:150, t:550, w:80, h:120}, {label:"T8", l:120, t:300, w:80, h:120},
            {label:"T9", l:250, t:250, w:80, h:120}, {label:"T10", l:240, t:420, w:80, h:120}
        ];

        function render() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach(t => {
                const div = document.createElement('div'); div.className = 'table-obj';
                const order = activeOrders[t.label];
                if(order) {
                    div.classList.add('occupied');
                    if(order.status === 'ready') div.classList.add('ready');
                }
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = t.label; div.onclick = () => selectTable(t.label);
                floor.appendChild(div);
            });
            if(currentTableId) updateTablePanel();
        }

        function selectTable(id) {
            currentTableId = id;
            const order = activeOrders[id];
            ticketItems = order ? [...order.items] : [];
            updateTablePanel();
        }

        function updateTablePanel() {
            document.getElementById('selected-table').innerText = "TABLE " + currentTableId;
            document.getElementById('action-zone').style.display = 'block';
            renderTicket();
        }

        function renderMenu(menuData) {
            document.getElementById('menu-selector').innerHTML = menuData.map(i => `
                <button class="btn-item" onclick="addItem('${i.name}', ${i.price})">${i.name}<br><small>${i.price}€</small></button>
            `).join('');
        }

        function addItem(n, p) { ticketItems.push({n, p, done: false}); renderTicket(); }

        function renderTicket() {
            let total = 0;
            document.getElementById('order-content').innerHTML = ticketItems.map(i => {
                total += i.p;
                return `<div style="display:flex; justify-content:space-between; padding:5px 0;"><span>${i.n}</span><span>${i.p.toFixed(2)}€</span></div>`;
            }).join('');
            document.getElementById('total-val').innerText = total.toFixed(2);
        }

        async function sendOrder() {
            const order = { items: ticketItems, time: new Date().toLocaleTimeString(), status: 'pending' };
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:currentTableId, order}) });
        }

        async function encaisser() {
            if(prompt("CODE :") === '7777') {
                await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:currentTableId, order:null}) });
                currentTableId = null; document.getElementById('action-zone').style.display = 'none';
            }
        }

        function renderRadar(resData) {
            const today = new Date().toISOString().split('T')[0];
            const list = resData[today] || [];
            document.getElementById('radar-list').innerHTML = list.map(r => `
                <div class="res-item"><b>${r.time}</b> — ${r.name.toUpperCase()} (${r.pax} PAX)</div>
            `).join('') || "Aucune résa.";
        }

        function renderPlanning(pData) {
            document.getElementById('planning-list').innerHTML = pData.map(s => `
                <div style="background:#111; padding:15px; border-radius:8px; margin-bottom:10px;"><b>${s.name}</b> — ${s.role}</div>
            `).join('');
        }

        function toggleDrawer(id) {
            const d = document.getElementById(id + '-drawer');
            d.style.display = d.style.display === 'block' ? 'none' : 'block';
        }

        setInterval(autoSync, 5000);
        window.onload = () => { autoSync(); new QRCode(document.getElementById("qrcode"), { text: window.location.origin + "/reservation.html", width: 100, height: 100 }); };
    </script>
</body>
</html>
