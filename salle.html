<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Chef de Salle Master</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --bg: #050505; --text: #fff; --sub: #aaa; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { display: flex; justify-content: space-between; align-items: center; padding: 15px 25px; background: #000; border-bottom: 2px solid var(--gold); }
        .header-title { font-weight: 900; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; }
        .nav-btns { display: flex; gap: 8px; }
        .btn-nav { background: #111; border: 1px solid #444; color: #fff; padding: 10px 15px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        .viewport { flex: 1; display: flex; overflow: hidden; }

        /* GAUCHE : RADAR */
        .sidebar-left { width: 320px; border-right: 1px solid #333; display: flex; flex-direction: column; background: #000; }
        .radar-list { flex: 1; padding: 15px; overflow-y: auto; }
        .res-item { background: #111; padding: 12px; border-radius: 6px; margin-bottom: 10px; border-left: 4px solid var(--gold); font-size: 0.85rem; }
        .qr-section { padding: 20px; text-align: center; border-top: 1px solid #222; }
        #qrcode { display: inline-block; padding: 10px; background: #fff; border-radius: 4px; }

        /* CENTRE : PLAN DYNAMIQUE */
        .main-plan { flex: 1; position: relative; padding: 20px; overflow: auto; background-image: radial-gradient(#111 1px, transparent 1px); background-size: 30px 30px; }
        .table-obj { position: absolute; background: #000; border: 2px solid #fff; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: 900; color: #fff; cursor: pointer; user-select: none; }
        .table-obj.occupied { border-color: var(--alert); color: var(--alert); }
        .table-obj.ready { border-color: var(--accent); color: var(--accent); animation: blink 0.8s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }

        /* DROITE : DETAIL */
        .sidebar-right { width: 400px; border-left: 1px solid #333; padding: 25px; background: #000; display: flex; flex-direction: column; }
        .order-list { flex: 1; overflow-y: auto; border-top: 1px solid #222; margin-top: 15px; }
        .btn-action { width: 100%; padding: 20px; border-radius: 6px; font-weight: 900; text-transform: uppercase; border: none; cursor: pointer; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="header-title">EMPIRE OS - CHEF DE SALLE</div>
        <div style="color:var(--sub); font-size:0.7rem;">[ALT + GLISSER] POUR MODIFIER LA SALLE</div>
        <div class="nav-btns">
            <button class="btn-nav" onclick="saveLayout()">💾 SAUVER SALLE</button>
            <button class="btn-nav" onclick="location.href='haccp.html'">⚙️ HACCP</button>
            <button class="btn-nav" onclick="location.reload()">🔄 SYNC</button>
        </div>
    </header>

    <div class="viewport">
        <div class="sidebar-left">
            <div style="padding:15px; font-weight:900; border-bottom:1px solid #222;">⚡ RADAR</div>
            <div id="radar-list" class="radar-list"></div>
            <div class="qr-section"><div id="qrcode"></div></div>
        </div>

        <div class="main-plan" id="floor-container">
            <div id="floor-plan" style="position:relative; width:1500px; height:1000px;"></div>
        </div>

        <div class="sidebar-right">
            <h2 id="table-title">TABLE T...</h2>
            <div id="bill-content" class="order-list"></div>
            <div style="font-size:2rem; font-weight:900; text-align:right; margin:20px 0;">TOTAL: <span id="total-val">0.00</span>€</div>
            <button class="btn-action" style="background:var(--gold)" onclick="encaisser()">📑 ENCAISSER (7777)</button>
        </div>
    </div>

    <script>
        // --- PROTOCOLE SYNCHRO 24/7 ---
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null;
        let tables = JSON.parse(localStorage.getItem('EMPIRE_LAYOUT')) || [
            {label:"T1", l:550, t:500, w:80, h:120}, {label:"T2", l:550, t:300, w:80, h:120},
            {label:"T3", l:430, t:450, w:80, h:120}, {label:"T4", l:440, t:300, w:80, h:120},
            {label:"T5", l:330, t:430, w:80, h:120}, {label:"T6", l:350, t:300, w:80, h:120},
            {label:"T7", l:150, t:550, w:80, h:120}, {label:"T8", l:120, t:300, w:80, h:120},
            {label:"T9", l:250, t:250, w:80, h:120}, {label:"T10", l:240, t:420, w:80, h:120}
        ];

        async function autoSync() {
            try {
                const res = await fetch('/get-current-state');
                const state = await res.json();
                activeOrders = state.activeOrders;
                if(activeOrders['GLOBAL_RESERVATIONS']) renderRadar(activeOrders['GLOBAL_RESERVATIONS'].data);
                render();
            } catch (e) { console.log("Reconnexion..."); }
        }

        ws.onmessage = (e) => { const msg = JSON.parse(e.data); if(msg.type === 'ORDER_UPDATE') { activeOrders = msg.activeOrders; autoSync(); } };

        // --- MODE ARCHITECTE (DÉPLACER/RÉTRÉCIR) ---
        let selectedTable = null; let isResizing = false;

        function render() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            tables.forEach((t, index) => {
                const div = document.createElement('div'); div.className = 'table-obj';
                const order = activeOrders[t.label];
                if(order) { div.classList.add('occupied'); if(order.status === 'ready') div.classList.add('ready'); }
                
                div.style.left=t.l+'px'; div.style.top=t.t+'px'; div.style.width=t.w+'px'; div.style.height=t.h+'px';
                div.innerHTML = t.label;
                
                div.onmousedown = (e) => {
                    if(e.altKey) { // Mode Architecte activé par touche ALT
                        selectedTable = { index, startX: e.clientX, startY: e.clientY, startL: t.l, startT: t.t, startW: t.w, startH: t.h };
                        isResizing = (e.offsetX > t.w - 20 && e.offsetY > t.h - 20);
                        e.preventDefault();
                    } else { selectTable(t.label); }
                };
                floor.appendChild(div);
            });
            if(currentTableId) updatePanel();
        }

        window.onmousemove = (e) => {
            if(!selectedTable) return;
            const t = tables[selectedTable.index];
            const dx = e.clientX - selectedTable.startX;
            const dy = e.clientY - selectedTable.startY;
            if(isResizing) { t.w = selectedTable.startW + dx; t.h = selectedTable.startH + dy; }
            else { t.l = selectedTable.startL + dx; t.t = selectedTable.startT + dy; }
            render();
        };

        window.onmouseup = () => { selectedTable = null; };

        function saveLayout() { 
            localStorage.setItem('EMPIRE_LAYOUT', JSON.stringify(tables)); 
            alert("SÉCURISÉ : Configuration de la salle enregistrée."); 
        }

        // --- LOGIQUE MÉTIER ---
        function selectTable(id) { currentTableId = id; updatePanel(); }
        function updatePanel() {
            document.getElementById('table-title').innerText = "TABLE " + currentTableId;
            const o = activeOrders[currentTableId];
            const cont = document.getElementById('bill-content');
            if(!o) { cont.innerHTML = 'Table libre.'; document.getElementById('total-val').innerText = "0.00"; return; }
            let total = 0;
            cont.innerHTML = o.items.map(i => { total += i.p; return `<div style="display:flex; justify-content:space-between; padding:5px 0;"><span>${i.n}</span><span>${i.p.toFixed(2)}€</span></div>`; }).join('');
            document.getElementById('total-val').innerText = total.toFixed(2);
        }

        async function encaisser() { if(prompt("CODE :") === '7777') { await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:currentTableId, order:null}) }); currentTableId = null; } }
        function renderRadar(resData) {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('radar-list').innerHTML = (resData[today] || []).map(r => `<div class="res-item"><b>${r.time}</b> — ${r.name}</div>`).join('') || "Aucune résa.";
        }

        setInterval(autoSync, 5000);
        window.onload = () => { autoSync(); new QRCode(document.getElementById("qrcode"), { text: window.location.origin + "/reservation.html", width: 120, height: 120 }); };
    </script>
</body>
</html>
