<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - Chef de Salle</title>
    <style>
        :root { --bg: #050505; --text: #fff; --line: #fff; --sub: #aaa; --alert: #ff1744; --accent: #00e676; --gold: #ffb300; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; touch-action: none; background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px); background-size: 40px 40px; }
        header { border-bottom: 1px solid rgba(255,255,255,0.2); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; background: #000;}
        .header-title { font-weight: 900; text-transform: uppercase; letter-spacing: 2px; font-size: 1.3rem; margin: 0; }
        .btn-top { background: transparent; border: 1px solid var(--line); color: var(--text); padding: 10px 15px; border-radius: 4px; font-weight: 900; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; transition: 0.2s; white-space: nowrap; }
        .btn-top:active { background: #fff; color: #000; }
        
        .room-bar { background: #0a0a0a; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 12px 25px; display: flex; gap: 10px; overflow-x: auto; }
        .room-tab { background: transparent; border: 1px solid var(--sub); color: var(--sub); padding: 8px 25px; border-radius: 20px; font-weight: 900; font-size: 0.9rem; cursor: pointer; text-transform: uppercase; white-space: nowrap; }
        .room-tab.active { background: #fff; color: #000; border-color: #fff; }

        .main-workspace { display: flex; flex: 1; position: relative; overflow: hidden; padding: 15px; box-sizing: border-box;}
        .floor-plan { flex: 1; position: relative; border: 1px solid rgba(255,255,255,0.3); border-radius: 8px; overflow: hidden; }
        
        .table-obj { position: absolute; background: #000; border: 2px solid var(--line); display: flex; justify-content: center; align-items: center; font-weight: 900; cursor: pointer; z-index: 50; font-size: 1.5rem; transition: 0.1s; box-sizing: border-box; border-radius: 8px;}
        .table-obj.occupied { border-color: var(--alert); background: rgba(255,23,68,0.1); color: var(--alert); }
        
        /* CLIGNOTEMENT HAUTE PRIORITÉ */
        @keyframes table-ready-blink { 
            0% { background-color: #000; color: var(--accent); border-color: var(--accent); box-shadow: 0 0 0 transparent; } 
            100% { background-color: var(--accent); color: #000; border-color: #fff; box-shadow: 0 0 35px var(--accent); } 
        }
        .table-obj.ready { animation: table-ready-blink 0.4s infinite alternate !important; z-index: 99; transform: scale(1.05); }

        .resize-handle { position: absolute; right: -10px; bottom: -10px; width: 30px; height: 30px; background: var(--gold); border-radius: 50%; z-index: 100; box-shadow: 0 0 10px rgba(0,0,0,0.8); border: 2px solid #000; display: none; }
        .is-selected .resize-handle { display: block; }
        #architect-floating-bar { display: none; position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: #000; border: 1px solid var(--line); border-radius: 8px; padding: 15px; z-index: 900; box-shadow: 0 10px 30px rgba(0,0,0,0.8); align-items: center; gap: 15px; flex-wrap: wrap; justify-content: center; }
        
        .drawer { position: absolute; top: 0; right: 0; height: 100%; width: 100%; max-width: 480px; background: #050505; border-left: 1px solid var(--line); padding: 30px; z-index: 10000; transform: translateX(100%); transition: 0.3s; display: flex; flex-direction: column; box-sizing: border-box; }
        .drawer.open { transform: translateX(0); }
        .drawer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--line); padding-bottom: 15px; flex-shrink: 0;}
        .btn-close { background: transparent; border: 1px solid var(--line); color: var(--line); width: 45px; height: 45px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; font-weight: bold; }

        #caisse-drawer { max-width: 100%; flex-direction: row; padding: 20px; gap: 20px; background: var(--bg); border-left: none; }
        .pos-left { flex: 6; display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 8px; padding: 20px; background: #0a0a0a; overflow: hidden; }
        .cat-tabs { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; flex-shrink: 0; margin-bottom: 10px; border-bottom: 1px solid #333;}
        .cat-tab { padding: 15px 20px; background: #000; border: 1px solid var(--line); border-radius: 4px; font-size: 1rem; color: var(--sub); font-weight: 900; cursor: pointer; flex: 1; text-align: center;}
        .cat-tab.active { background: #fff; color: #000; }
        .menu-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; overflow-y: auto; padding-right: 5px;}
        .btn-item { background: #000; border: 1px solid var(--sub); color: var(--line); padding: 15px; border-radius: 4px; font-weight: bold; text-align: center; cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100px; font-size: 1rem;}
        .pos-right { flex: 4; display: flex; flex-direction: column; border: 1px solid var(--line); border-radius: 8px; padding: 20px; background: #0a0a0a; overflow: hidden; }
        .ticket-area { flex: 1; background: #000; border: 1px solid var(--line); border-radius: 4px; padding: 15px; overflow-y: auto; margin-bottom: 15px; }
        .input-field { width: 100%; background: #000; border: 1px solid var(--line); color: var(--text); padding: 12px; border-radius: 4px; font-size: 1.1rem; box-sizing: border-box; font-weight: bold; }
        .btn-action { padding: 15px 20px; background: transparent; color: #fff; border: 1px solid #fff; border-radius: 4px; font-weight: 900; font-size: 1.1rem; cursor: pointer; text-transform: uppercase;}
        
        .step-badge { background: #222; border: 1px solid #555; border-radius: 4px; font-size: 0.75rem; padding: 4px 8px; cursor: pointer; margin-right: 10px; font-weight: bold; width: 70px; text-align: center; display: inline-block;}
        @media (max-width: 800px) { #caisse-drawer { flex-direction: column; overflow-y: auto; } .pos-left, .pos-right { flex: none; height: auto; min-height: 50vh; } .pos-right { order: -1; } }
    </style>
</head>
<body>
    <header>
        <div class="header-title">CHEF DE SALLE</div>
        <div style="display:flex; gap:10px;">
            <button class="btn-top" style="border-color:var(--gold); color:var(--gold);" onclick="checkChefSecurity()">🔐 MANAGER</button>
        </div>
    </header>

    <div id="room-bar" class="room-bar"></div>

    <div class="main-workspace">
        <div class="floor-plan" id="floor-plan"></div>

        <div id="architect-floating-bar">
            <span style="color:var(--gold); font-weight:bold; font-size:0.8rem; margin-right:10px;">MODE ARCHITECTE</span>
            <button class="btn-action" onclick="addTable()">+ NOUVELLE TABLE</button>
            <button class="btn-action" onclick="addRoom()">+ NOUVELLE SALLE</button>
            <div id="edit-context" style="display:none; align-items:center; gap:10px; border-left:1px solid #333; padding-left:15px; margin-left:5px;">
                <input type="text" id="edit-label" class="input-field" style="margin:0; width:120px; text-align:center;" oninput="updateSelectedLabel(this.value)">
                <button class="btn-action" onclick="modifySelected('shape')">ROND/CARRÉ</button>
                <button class="btn-action" style="color:var(--alert); border-color:var(--alert);" onclick="modifySelected('delete')">🗑️ TABLE</button>
            </div>
            <button class="btn-action" style="background:#fff; color:#000; margin-left:15px;" onclick="savePlan()">💾 DÉPLOYER LE PLAN</button>
        </div>

        <div id="caisse-drawer" class="drawer">
            <div class="pos-left">
                <h2 style="margin:0 0 15px 0; font-size:1.8rem; color:var(--gold); text-transform:uppercase;">La Carte</h2>
                <div class="cat-tabs" id="cat-tabs"></div>
                <div class="menu-grid" id="menu-items"></div>
            </div>
            <div class="pos-right">
                <div class="drawer-header" style="margin-bottom:15px; padding-bottom:10px;">
                    <h2 id="table-title" style="margin:0; font-size:2.2rem;">TABLE</h2><button class="btn-close" onclick="closeDrawer('caisse-drawer')">✕</button>
                </div>
                <div class="ticket-area" id="ticket-list"></div>
                <div style="margin-bottom:15px;"><input type="text" id="order-obs" class="input-field" placeholder="⚠️ OBSERVATIONS"></div>
                <div style="display:flex; flex-direction:column; gap:10px;">
                    <div id="total-val" style="font-size:2.5rem; font-weight:900; text-align:right;">0.00 €</div>
                    <button class="btn-action" style="background:#fff; color:#000;" onclick="sendOrder()">VALIDER ET ENVOYER</button>
                    <button class="btn-action" style="border-style:dashed;" onclick="clearTable()">💳 ENCAISSER / LIBÉRER</button>
                </div>
            </div>
        </div>

        <div id="audit-drawer" class="drawer" style="width: 500px;">
            <div class="drawer-header"><h2 style="margin:0;">ESPACE MANAGER</h2><button class="btn-close" onclick="closeDrawer('audit-drawer')">✕</button></div>
            <div style="border:1px solid var(--gold); padding:20px; border-radius:8px; margin-bottom:30px;">
                <h3 style="margin-top:0; color:var(--gold);">🛠️ GESTION ARCHITECTURE</h3>
                <button class="btn-action" style="background:var(--gold); color:#000; border:none; width:100%;" onclick="startEditMode()">ACTIVER MODE ARCHITECTE</button>
            </div>
        </div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}; let currentTableId = null; let currentTicket = [];
        let isEditMode = false;
        let savedRooms = JSON.parse(localStorage.getItem('EMPIRE_ROOMS'));
        let rooms = (savedRooms && savedRooms.length > 0) ? savedRooms : [{id: 'r_main', name: 'SALLE PRINCIPALE'}];
        let currentRoomId = rooms[0].id;
        let tables = JSON.parse(localStorage.getItem('EMPIRE_TABLES')) || [];
        let selectedObj = null; let draggedObj = null; let isResizing = false;
        let startX, startY, startW, startH, offsetX, offsetY;

        // MOTEUR AUDIO (CARILLON)
        let audioCtx = null;
        let previousStatus = {};

        // Déverrouille l'audio à la première touche
        document.addEventListener('pointerdown', () => {
            if (!audioCtx) {
                try { const AudioContext = window.AudioContext || window.webkitAudioContext; audioCtx = new AudioContext(); audioCtx.resume(); } catch(e){}
            }
        }, { once: true });

        function playBell() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(880, audioCtx.currentTime); 
            osc.frequency.setValueAtTime(1108.73, audioCtx.currentTime + 0.1); 
            gain.gain.setValueAtTime(0, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.8, audioCtx.currentTime + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc.start(audioCtx.currentTime); osc.stop(audioCtx.currentTime + 1.5);
        }

        function checkAlerts(newOrders) {
            for(let tid in newOrders) {
                if(newOrders[tid] && newOrders[tid].status === 'ready' && previousStatus[tid] !== 'ready') {
                    playBell(); // SONNERIE
                }
                previousStatus[tid] = newOrders[tid] ? newOrders[tid].status : null;
            }
        }

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE' || msg.type === 'PLAN_UPDATE') {
                activeOrders = msg.activeOrders || activeOrders;
                checkAlerts(activeOrders);
                if (activeOrders['GLOBAL_PLAN'] && !isEditMode) {
                    if(activeOrders['GLOBAL_PLAN'].rooms) { rooms = activeOrders['GLOBAL_PLAN'].rooms; localStorage.setItem('EMPIRE_ROOMS', JSON.stringify(rooms)); }
                    if(activeOrders['GLOBAL_PLAN'].tables) { tables = activeOrders['GLOBAL_PLAN'].tables; localStorage.setItem('EMPIRE_TABLES', JSON.stringify(tables)); }
                }
                if (!rooms.find(r => r.id === currentRoomId)) currentRoomId = rooms[0].id;
                renderRooms(); renderFloorPlan();
            }
        };

        async function forceSync() { try { const res = await fetch('/get-current-state'); const data = await res.json(); activeOrders = data.activeOrders; checkAlerts(activeOrders); renderRooms(); renderFloorPlan(); } catch(e) {} }
        function openDrawer(id) { document.getElementById(id).classList.add('open'); }
        function closeDrawer(id) { document.getElementById(id).classList.remove('open'); }
        function renderRooms() { document.getElementById('room-bar').innerHTML = rooms.map(r => `<button class="room-tab ${r.id === currentRoomId ? 'active' : ''}" onclick="switchRoom('${r.id}')">${r.name}</button>`).join(''); }
        function switchRoom(id) { currentRoomId = id; selectedObj = null; document.getElementById('edit-context').style.display = 'none'; renderRooms(); renderFloorPlan(); }

        function checkChefSecurity() { const pin = prompt("CODE MANAGER :"); if (pin === "7777") { openDrawer('audit-drawer'); } }
        function startEditMode() { isEditMode = true; selectedObj = null; closeDrawer('audit-drawer'); document.getElementById('architect-floating-bar').style.display = 'flex'; document.getElementById('edit-context').style.display = 'none'; renderRooms(); renderFloorPlan(); }
        function addRoom() { const name = prompt("Nom de la salle ?"); if(!name) return; const newRoom = { id: 'r_'+Date.now(), name: name.toUpperCase() }; rooms.push(newRoom); switchRoom(newRoom.id); }
        function addTable() { let maxNum = 0; tables.forEach(t => { const match = t.label.match(/T(\d+)/i); if(match) maxNum = Math.max(maxNum, parseInt(match[1])); }); const newObj = { id: Date.now().toString(), label: `T${maxNum + 1}`, l: 100, t: 100, w: 100, h: 100, shape: 'square', roomId: currentRoomId }; tables.push(newObj); selectObject(newObj); renderFloorPlan(); }
        function selectObject(obj) { selectedObj = obj; document.getElementById('edit-context').style.display = 'flex'; document.getElementById('edit-label').value = obj.label; renderFloorPlan(); }
        function updateSelectedLabel(val) { if(!selectedObj) return; selectedObj.label = val; renderFloorPlan(); }
        function modifySelected(action) { if (!selectedObj) return; if (action === 'shape') selectedObj.shape = selectedObj.shape === 'round' ? 'square' : 'round'; if (action === 'delete') { tables = tables.filter(t => t.id !== selectedObj.id); selectedObj = null; document.getElementById('edit-context').style.display = 'none'; } renderFloorPlan(); }
        function savePlan() { localStorage.setItem('EMPIRE_TABLES', JSON.stringify(tables)); localStorage.setItem('EMPIRE_ROOMS', JSON.stringify(rooms)); fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: 'GLOBAL_PLAN', order: { status: 'system', rooms: rooms, tables: tables } }) }); isEditMode = false; selectedObj = null; document.getElementById('architect-floating-bar').style.display = 'none'; renderFloorPlan(); alert("Plan déployé !"); }

        const floorArea = document.getElementById('floor-plan');
        floorArea.addEventListener('pointermove', (e) => { if (!isEditMode) return; if (isResizing && selectedObj) { selectedObj.w = Math.max(60, startW + (e.clientX - startX)); selectedObj.h = Math.max(60, startH + (e.clientY - startY)); renderFloorPlan(); } else if (draggedObj) { const rect = floorArea.getBoundingClientRect(); draggedObj.l = e.clientX - rect.left - offsetX; draggedObj.t = e.clientY - rect.top - offsetY; renderFloorPlan(); } });
        floorArea.addEventListener('pointerup', () => { draggedObj = null; isResizing = false; });
        floorArea.addEventListener('pointerleave', () => { draggedObj = null; isResizing = false; });

        function renderFloorPlan() {
            floorArea.innerHTML = '';
            tables.forEach(t => {
                if(t.roomId !== currentRoomId) return; 
                const div = document.createElement('div'); div.className = 'table-obj'; 
                if (isEditMode && selectedObj && selectedObj.id === t.id) div.classList.add('is-selected');
                div.style.borderRadius = t.shape === 'round' ? '50%' : '8px';
                const order = activeOrders[t.id] || activeOrders[t.label];
                if(order && order.status !== 'system') { 
                    if (order.status === 'ready') div.classList.add('ready'); // Animation CSS
                    else div.classList.add('occupied'); 
                }
                div.innerHTML = `<span>${t.label}</span>`; div.style.left = t.l + 'px'; div.style.top = t.t + 'px'; div.style.width = t.w + 'px'; div.style.height = t.h + 'px';
                if (isEditMode) { div.style.border = selectedObj && selectedObj.id === t.id ? '3px solid var(--gold)' : '2px solid var(--line)'; const handle = document.createElement('div'); handle.className = 'resize-handle'; handle.addEventListener('pointerdown', (e) => { e.stopPropagation(); isResizing = true; selectObject(t); startX = e.clientX; startY = e.clientY; startW = t.w; startH = t.h; }); div.appendChild(handle); div.addEventListener('pointerdown', (e) => { e.stopPropagation(); selectObject(t); draggedObj = t; const rect = floorArea.getBoundingClientRect(); offsetX = e.clientX - rect.left - t.l; offsetY = e.clientY - rect.top - t.t; });
                } else { div.addEventListener('pointerdown', (e) => { e.preventDefault(); e.stopPropagation(); openCaisse(t.label || t.id); }); }
                floorArea.appendChild(div);
            });
        }

        function openCaisse(label) { 
            currentTableId = label; document.getElementById('table-title').innerText = label; currentTicket = activeOrders[label]?.items || []; document.getElementById('order-obs').value = activeOrders[label]?.observation || '';
            
            // Acquittement de l'alerte
            if(activeOrders[label] && activeOrders[label].status === 'ready') { activeOrders[label].status = 'pending'; fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: label, order: activeOrders[label] }) }); }
            renderTicket(); renderMenu('Entrée'); openDrawer('caisse-drawer'); 
        }

        function renderMenu(activeCategory = 'Entrée') {
            let menu = JSON.parse(localStorage.getItem('empire_recipes')) || [{name: 'Salade', price: 10, category: 'Entrée'}];
            const categories = ['Entrée', 'Plat', 'Dessert'];
            document.getElementById('cat-tabs').innerHTML = categories.map(cat => `<div class="cat-tab ${cat === activeCategory ? 'active' : ''}" onclick="renderMenu('${cat}')">${cat}</div>`).join('');
            document.getElementById('menu-items').innerHTML = menu.filter(m => (m.category || 'Autre') === activeCategory).map(m => `<div class="btn-item" onclick="addItem('${m.name.replace(/'/g, "\\'")}', ${m.price}, '${m.category}')"><span>${m.name}</span><span style="color:var(--sub);">${parseFloat(m.price).toFixed(2)}€</span></div>`).join('');
        }

        function addItem(n, p, c) { let step = c === 'Entrée' ? 1 : c === 'Dessert' ? 3 : 2; currentTicket.push({id: Date.now(), n: n, p: p, category: c, step: step, done: false}); renderTicket(); }
        function removeItem(targetIndex) { currentTicket.splice(targetIndex, 1); renderTicket(); }
        function cycleStep(targetIndex) { let s = currentTicket[targetIndex].step || 1; currentTicket[targetIndex].step = s === 1 ? 2 : s === 2 ? 3 : 1; renderTicket(); }

        function renderTicket() {
            const list = document.getElementById('ticket-list'); let total = 0; const itemCounts = {};
            currentTicket.forEach((i, idx) => { let step = i.step || (i.category === 'Entrée' ? 1 : i.category === 'Dessert' ? 3 : 2); total += i.p || 0; const key = i.n + '_' + step; if (!itemCounts[key]) itemCounts[key] = { item: i, count: 0, indices: [], price: i.p || 0, step: step }; itemCounts[key].count++; itemCounts[key].indices.push(idx); });
            let html = '';
            for (const key in itemCounts) {
                const g = itemCounts[key]; const lastIdx = g.indices[g.indices.length - 1]; const stepName = g.step === 1 ? 'ENTRÉE' : g.step === 2 ? 'PLAT' : 'DESSERT'; const stepColor = g.step === 1 ? '#aaa' : g.step === 2 ? '#fff' : '#ffb300';
                html += `<div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px dashed rgba(255,255,255,0.2); align-items:center;">
                    <span style="font-weight:bold; font-size:1.1rem; flex:1; display:flex; align-items:center;">
                        <span style="display:inline-block; min-width:30px; font-weight:900;">${g.count}x</span> 
                        <button class="step-badge" style="color:${stepColor}; border-color:${stepColor};" onclick="cycleStep(${lastIdx})">${stepName}</button>
                        ${g.item.done ? '✅' : '⏳'} ${g.item.n}
                    </span>
                    <span style="font-weight:bold; font-size:1.1rem; display:flex; align-items:center;">${(g.price * g.count).toFixed(2)}€ <button onclick="removeItem(${lastIdx})" style="background:transparent; border:1px solid var(--alert); color:var(--alert); border-radius:4px; padding:6px 12px; margin-left:15px; cursor:pointer; font-weight:bold;">✕</button></span>
                </div>`;
            }
            list.innerHTML = html || '<div style="color:#555; text-align:center; padding:40px; font-style:italic;">-- TICKET VIDE --</div>'; document.getElementById('total-val').innerText = total.toFixed(2) + " €";
        }

        async function sendOrder() {
            if(currentTicket.length === 0) return; const obs = document.getElementById('order-obs').value.trim();
            const order = { table: currentTableId, items: currentTicket, observation: obs, time: new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'}), status: 'pending' };
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order }) });
            document.getElementById('order-obs').value = ''; closeDrawer('caisse-drawer');
        }
        
        async function clearTable() {
            if(!confirm("Encaisser et libérer cette table ?")) return;
            // On envoie 'order: null' au serveur pour purger complètement la table et éteindre toutes les couleurs
            await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: currentTableId, order: null }) });
            closeDrawer('caisse-drawer');
        }

        forceSync(); setInterval(forceSync, 3000); 
    </script>
</body>
</html>
