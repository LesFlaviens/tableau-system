<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Plan de Salle Pro</title>
    <style>
        :root { --bg: #050505; --text: #fff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; user-select: none; touch-action: none; }
        
        /* Layout Principal */
        .sidebar { width: 320px; border-right: 1px solid #333; display: flex; flex-direction: column; background: var(--panel); z-index: 10; }
        .viewport { flex: 1; position: relative; overflow: auto; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; }
        .details { width: 350px; border-left: 1px solid #333; padding: 25px; background: var(--panel); z-index: 10; display: flex; flex-direction: column; }

        /* Éléments de la salle */
        .table-obj { position: absolute; background: #000; border: 2px solid #555; border-radius: 8px; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; z-index: 2; color: #fff; box-shadow: 0 4px 6px rgba(0,0,0,0.5); }
        .salon-obj { position: absolute; background: rgba(255, 179, 0, 0.05); border: 2px dashed #555; border-radius: 4px; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #777; z-index: 1; text-transform: uppercase; text-align: center; }
        
        .table-obj.occupied { border-color: var(--alert); background: rgba(255, 23, 68, 0.1); }
        .table-obj.ready { border-color: var(--accent); background: rgba(0, 230, 118, 0.1); animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { box-shadow: 0 0 5px var(--accent); } 50% { box-shadow: 0 0 20px var(--accent); } }
        
        .btn { width: 100%; padding: 15px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; margin-top: 10px; }
        .header-title { padding: 20px; border-bottom: 2px solid var(--gold); font-weight: 900; font-size: 1.2rem; }

        /* ARCHITECT MODAL */
        #architect-modal { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 9999; flex-direction: column; }
        .arch-toolbar { background: var(--panel); padding: 10px; border-bottom: 2px solid var(--gold); display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; }
        .arch-tools button { background: #333; color: white; border: 1px solid #555; padding: 12px; border-radius: 4px; font-weight: bold; font-size: 0.8rem; }
        .arch-tools button.success { background: var(--gold); color: black; border: none; }
        .arch-tools button.danger { background: var(--alert); color: white; border: none; }
        
        #arch-viewport { flex: 1; position: relative; background-image: radial-gradient(var(--gold) 1px, transparent 1px); background-size: 30px 30px; overflow: hidden; }
        .arch-selected { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold) !important; z-index: 100 !important; }

        /* Contrôles de taille tactiles sur l'élément sélectionné */
        .resize-handle { position: absolute; bottom: -10px; right: -10px; width: 30px; height: 30px; background: var(--gold); border-radius: 50%; display: none; z-index: 101; justify-content: center; align-items: center; color: black; font-size: 20px; font-weight: 900; }
        .arch-selected .resize-handle { display: flex; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="header-title">⚡ EMPIRE RADAR</div>
        <div id="radar-list" style="flex:1; padding:15px; color:#555;">Système prêt...</div>
        <div style="padding: 20px;">
            <button class="btn" style="background: transparent; border: 1px solid var(--gold); color: var(--gold);" onclick="openArchitect()">🛠️ ARCHITECTE DE SALLE</button>
        </div>
    </div>

    <div class="viewport" id="floor-plan"></div>

    <div class="details">
        <h2 id="table-title" style="color: var(--gold);">TABLE : --</h2>
        <div id="bill-content" style="flex:1; border-top:1px solid #333; padding-top:15px;"></div>
        <div style="font-size: 1.8rem; font-weight: 900; text-align: right; margin-bottom:15px;">TOTAL: <span id="total-val">0.00</span>€</div>
        <button class="btn" style="background: var(--accent); color: #000;" onclick="alert('Envoi cuisine...')">🚀 ENVOYER CUISINE</button>
        <button class="btn" style="background: var(--alert); color: #fff;" onclick="encaisser()">📑 ENCAISSER (7777)</button>
    </div>

    <div id="architect-modal">
        <div class="arch-toolbar">
            <button onclick="archAddElement('table')">+ TABLE AUTO</button>
            <button onclick="archAddElement('salon')">+ ZONE (BAR/CUISINE)</button>
            <button onclick="archRenameSelected()" style="background:#444;">✏️ MODIFIER NOM</button>
            <button onclick="archDeleteSelected()" class="danger">🗑️ SUPPRIMER</button>
            <button onclick="saveAndCloseArchitect()" class="success">💾 SAUVEGARDER L'ARCHITECTURE</button>
        </div>
        <div id="arch-viewport"></div>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {}, currentTableId = null;
        let layoutData = JSON.parse(localStorage.getItem('EMPIRE_LAYOUT')) || [];

        // --- MOTEUR DE RENDU SERVICE ---
        function renderServicePlan() {
            const floor = document.getElementById('floor-plan'); floor.innerHTML = '';
            layoutData.sort((a,b) => a.type === 'salon' ? -1 : 1).forEach(item => {
                const div = document.createElement('div');
                div.className = item.type === 'salon' ? 'salon-obj' : 'table-obj';
                div.style.cssText = `left:${item.l}px; top:${item.t}px; width:${item.w}px; height:${item.h}px;`;
                div.innerText = item.label;
                if(item.type === 'table') div.onclick = () => { currentTableId = item.label; updatePanel(); };
                floor.appendChild(div);
            });
        }

        function updatePanel() {
            document.getElementById('table-title').innerText = "TABLE : " + currentTableId;
            const o = activeOrders[currentTableId];
            document.getElementById('bill-content').innerHTML = o ? o.plats.map(p => `<div>${p}</div>`).join('') : 'Libre';
        }

        // ==========================================
        // SYSTÈME ARCHITECTE TACTILE
        // ==========================================
        let archDraft = [], selIdx = null, archState = null;
        let sX, sY, sL, sT, sW, sH;

        function openArchitect() {
            document.getElementById('architect-modal').style.display = 'flex';
            archDraft = JSON.parse(JSON.stringify(layoutData));
            selIdx = null; renderArch();
        }

        function archAddElement(type) {
            // Calcul auto du numéro pour éviter l'erreur humaine
            let label = "";
            if(type === 'table') {
                const count = archDraft.filter(i => i.type === 'table').length + 1;
                label = prompt("Numéro de table ?", "T" + count);
            } else {
                label = prompt("Nom de la zone ? (BAR, CUISINE, TERRASSE)", "ZONE VIP");
            }
            if(!label) return;

            archDraft.push({ id: Date.now(), type, label, l:100, t:100, w:80, h:80 });
            selIdx = archDraft.length - 1;
            renderArch();
        }

        function archRenameSelected() {
            if(selIdx === null) return alert("Sélectionnez un élément d'abord");
            const newName = prompt("Nouveau nom :", archDraft[selIdx].label);
            if(newName) { archDraft[selIdx].label = newName; renderArch(); }
        }

        function archDeleteSelected() {
            if(selIdx !== null) { archDraft.splice(selIdx, 1); selIdx = null; renderArch(); }
        }

        function renderArch() {
            const vp = document.getElementById('arch-viewport'); vp.innerHTML = '';
            archDraft.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = (item.type === 'salon' ? 'salon-obj' : 'table-obj') + (selIdx === idx ? ' arch-selected' : '');
                div.style.cssText = `left:${item.l}px; top:${item.t}px; width:${item.w}px; height:${item.h}px;`;
                div.innerText = item.label;

                // Handle tactile de redimensionnement
                const handle = document.createElement('div');
                handle.className = 'resize-handle'; handle.innerHTML = '⤡';
                div.appendChild(handle);

                // Événements (Souris + Tactile)
                const startAction = (e) => {
                    e.stopPropagation();
                    selIdx = idx;
                    const touch = e.touches ? e.touches[0] : e;
                    archState = (e.target.className === 'resize-handle') ? 'resize' : 'drag';
                    sX = touch.clientX; sY = touch.clientY;
                    sL = item.l; sT = item.t; sW = item.w; sH = item.h;
                    renderArch();
                };

                div.onmousedown = startAction;
                div.ontouchstart = startAction;

                vp.appendChild(div);
            });
        }

        const moveAction = (e) => {
            if(!archState || selIdx === null) return;
            const touch = e.touches ? e.touches[0] : e;
            const item = archDraft[selIdx];
            const dx = touch.clientX - sX; const dy = touch.clientY - sY;

            if(archState === 'drag') {
                item.l = Math.round((sL + dx)/10)*10;
                item.t = Math.round((sT + dy)/10)*10;
            } else {
                item.w = Math.max(40, Math.round((sW + dx)/10)*10);
                item.h = Math.max(40, Math.round((sH + dy)/10)*10);
            }
            renderArch();
        };

        window.onmousemove = moveAction;
        window.ontouchmove = (e) => { if(archState) { e.preventDefault(); moveAction(e); } };
        window.onmouseup = window.ontouchend = () => { archState = null; };

        function saveAndCloseArchitect() {
            layoutData = archDraft;
            localStorage.setItem('EMPIRE_LAYOUT', JSON.stringify(layoutData));
            document.getElementById('architect-modal').style.display = 'none';
            renderServicePlan();
        }

        window.onload = renderServicePlan;
    </script>
</body>
</html>
