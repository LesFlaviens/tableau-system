<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Salle Dynamic</title>
    <style>
        :root { --bg: #050505; --text: #fff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; height: 100vh; overflow: hidden; touch-action: none; }
        
        .sidebar { width: 300px; border-right: 1px solid #333; display: flex; flex-direction: column; background: var(--panel); z-index: 10; }
        .viewport { flex: 1; position: relative; background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; overflow: hidden; }
        .details { width: 320px; border-left: 1px solid #333; padding: 20px; background: var(--panel); display: flex; flex-direction: column; }

        /* Objets Salle */
        .obj { position: absolute; display: flex; justify-content: center; align-items: center; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); border: 2px solid #555; transition: transform 0.1s; }
        .table-obj { background: #000; border-radius: 8px; color: #fff; z-index: 2; }
        .salon-obj { background: rgba(255, 179, 0, 0.05); border: 2px dashed #444; color: #777; z-index: 1; text-transform: uppercase; }
        
        /* Sélection et Feedback */
        .selected { border-color: var(--gold) !important; box-shadow: 0 0 15px var(--gold); z-index: 100 !important; }
        .occupied { border-color: var(--alert); background: rgba(255, 23, 68, 0.1); }

        /* Outils tactiles sur l'objet sélectionné */
        .resizer { position: absolute; bottom: -10px; right: -10px; width: 30px; height: 30px; background: var(--gold); border-radius: 50%; display: none; justify-content: center; align-items: center; color: #000; font-weight: 900; }
        .selected .resizer { display: flex; }

        /* Boutons */
        .btn { width: 100%; padding: 12px; border-radius: 4px; font-weight: bold; cursor: pointer; border: none; text-transform: uppercase; margin-bottom: 10px; font-size: 0.8rem; }
        .btn-add { background: #222; color: var(--gold); border: 1px solid var(--gold); }
        .btn-action { background: var(--gold); color: #000; }
        .btn-danger { background: #311; color: var(--alert); border: 1px solid var(--alert); }
    </style>
</head>
<body>

    <div class="sidebar">
        <div style="padding:20px; border-bottom:1px solid #333; font-weight:900; color:var(--gold);">⚡ EMPIRE TOOLS</div>
        
        <div style="padding:15px; flex:1;">
            <p style="font-size:0.7rem; color:#666;">ARCHITECTURE (AUTO-SAVE)</p>
            <button class="btn btn-add" onclick="addObj('table')">+ AJOUTER TABLE</button>
            <button class="btn btn-add" onclick="addObj('salon')">+ AJOUTER ZONE (BAR/CUISINE)</button>
            
            <div id="edit-tools" style="display:none; margin-top:20px; padding-top:20px; border-top:1px solid #333;">
                <p style="font-size:0.7rem; color:var(--gold);">ÉLÉMENT SÉLECTIONNÉ</p>
                <button class="btn btn-action" onclick="renameObj()">✏️ RENOMMER / RECTIFIER</button>
                <button class="btn btn-danger" onclick="deleteObj()">🗑️ SUPPRIMER</button>
            </div>
        </div>
        
        <div style="padding:15px; font-size:0.7rem; color:#444; text-align:center;">EMPIRE OS v2.0 - SANS VALIDATION</div>
    </div>

    <div class="viewport" id="floor"></div>

    <div class="details">
        <h2 id="det-title" style="color:var(--gold); margin-top:0;">DÉTAILS</h2>
        <div id="det-content" style="flex:1; color:#888;">Sélectionnez une table pour commander.</div>
        <div style="font-size:1.5rem; font-weight:900; text-align:right; border-top:1px solid #333; padding-top:10px;">
            TOTAL: <span id="total">0.00</span>€
        </div>
        <button class="btn btn-action" style="background:var(--accent); margin-top:15px;">🚀 ENVOYER CUISINE</button>
    </div>

    <script>
        let layout = JSON.parse(localStorage.getItem('EMPIRE_LAYOUT')) || [];
        let selectedIdx = null;
        let isDragging = false, isResizing = false;
        let startX, startY, startL, startT, startW, startH;

        const floor = document.getElementById('floor');

        function save() {
            localStorage.setItem('EMPIRE_LAYOUT', JSON.stringify(layout));
        }

        function addObj(type) {
            const label = type === 'table' ? "T" + (layout.filter(i=>i.type==='table').length + 1) : "ZONE";
            layout.push({ id: Date.now(), type, label, l: 50, t: 50, w: 100, h: 80 });
            selectedIdx = layout.length - 1;
            save();
            render();
        }

        function deleteObj() {
            if(selectedIdx !== null) {
                layout.splice(selectedIdx, 1);
                selectedIdx = null;
                save();
                render();
            }
        }

        function renameObj() {
            if(selectedIdx === null) return;
            const current = layout[selectedIdx];
            const newName = prompt("Rectification (Table ou Zone) :", current.label);
            if(newName) {
                current.label = newName;
                save();
                render();
            }
        }

        function render() {
            floor.innerHTML = '';
            document.getElementById('edit-tools').style.display = selectedIdx !== null ? 'block' : 'none';

            layout.forEach((item, idx) => {
                const div = document.createElement('div');
                div.className = `obj ${item.type}-obj ${selectedIdx === idx ? 'selected' : ''}`;
                div.style.left = item.l + 'px';
                div.style.top = item.t + 'px';
                div.style.width = item.w + 'px';
                div.style.height = item.h + 'px';
                div.innerHTML = `<span>${item.label}</span><div class="resizer">⤡</div>`;

                const handleStart = (e) => {
                    selectedIdx = idx;
                    const t = e.touches ? e.touches[0] : e;
                    if(e.target.className === 'resizer') isResizing = true;
                    else isDragging = true;
                    
                    startX = t.clientX; startY = t.clientY;
                    startL = item.l; startT = item.t;
                    startW = item.w; startH = item.h;
                    render();
                };

                div.onmousedown = handleStart;
                div.ontouchstart = handleStart;
                floor.appendChild(div);
            });
            
            if(selectedIdx !== null) {
                document.getElementById('det-title').innerText = layout[selectedIdx].label;
            }
        }

        const handleMove = (e) => {
            if(!isDragging && !isResizing) return;
            const t = e.touches ? e.touches[0] : e;
            const item = layout[selectedIdx];
            const dx = t.clientX - startX;
            const dy = t.clientY - startY;

            if(isDragging) {
                item.l = Math.round((startL + dx)/10)*10;
                item.t = Math.round((startT + dy)/10)*10;
            } else if(isResizing) {
                item.w = Math.max(50, Math.round((startW + dx)/10)*10);
                item.h = Math.max(50, Math.round((startH + dy)/10)*10);
            }
            // Pas de render complet ici pour la fluidité, juste mise à jour visuelle directe
            const el = floor.children[selectedIdx];
            el.style.left = item.l + 'px'; el.style.top = item.t + 'px';
            el.style.width = item.w + 'px'; el.style.height = item.h + 'px';
        };

        const handleEnd = () => {
            if(isDragging || isResizing) {
                isDragging = false; isResizing = false;
                save(); // Sauvegarde automatique à la fin du mouvement
                render();
            }
        };

        window.onmousemove = handleMove; window.ontouchmove = handleMove;
        window.onmouseup = handleEnd; window.ontouchend = handleEnd;

        window.onload = render;
    </script>
</body>
</html>
