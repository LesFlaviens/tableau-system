<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Registre Empire - HACCP & BLACKLIST</title>
    <style>
        body { background:#050505; color:#fff; font-family:'Inter', sans-serif; padding:30px; }
        h1 { color: #ffb300; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; }
        table { width:100%; text-align:left; border-collapse:collapse; margin-top: 20px; }
        th { border-bottom:2px solid #ffb300; padding: 10px; color: #888; font-size: 0.8rem; }
        td { padding: 12px 10px; border-bottom: 1px solid #222; }
        input { background: #111; border: 1px solid #333; color: white; padding: 10px; border-radius: 4px; width: 250px; }
        button { background: #ffb300; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; margin-left: 10px; }
        #blacklist { margin-top: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .bad-card { background: #1a0505; border: 1px solid #ff1744; padding: 10px; border-radius: 4px; color: #ff1744; font-weight: bold; }
    </style>
</head>
<body>
    <h1>⚖️ REGISTRE LÉGAL HACCP</h1>
    <table>
        <thead>
            <tr><th>HEURE</th><th>ÉQUIPEMENT</th><th>VALEUR</th></tr>
        </thead>
        <tbody id="logs">
            </tbody>
    </table>

    <hr style="margin: 40px 0; border: 0; border-top: 1px solid #333;">

    <h1>🚫 BLACKLIST NO-SHOW</h1>
    <div style="display: flex; align-items: center;">
        <input type="text" id="bad-name" placeholder="NOM À BANNIR">
        <button onclick="addBlack()">BANNIR DÉFINITIVEMENT</button>
    </div>
    
    <div id="blacklist"></div>

    <script>
        let registry = [];

        async function autoSync() {
            try {
                const res = await fetch('/get-current-state');
                const state = await res.json();

                // 1. Gestion des logs HACCP
                if(state.activeOrders['HACCP_EVENT']) {
                    const event = state.activeOrders['HACCP_EVENT'].data;
                    if(!registry.find(l => l.time === event.time)) {
                        registry.unshift(event);
                        const row = `<tr><td>${event.time}</td><td>${event.eq}</td><td>${event.val}°C</td></tr>`;
                        document.getElementById('logs').insertAdjacentHTML('afterbegin', row);
                    }
                }

                // 2. Gestion de la Blacklist
                if(state.activeOrders['GLOBAL_BLACKLIST']) {
                    const list = state.activeOrders['GLOBAL_BLACKLIST'].data;
                    document.getElementById('blacklist').innerHTML = list.map(n => `
                        <div class="bad-card">🚫 ${n.toUpperCase()}</div>
                    `).join('');
                }
            } catch(e) { console.error("Sync Error", e); }
        }

        async function addBlack() {
            const input = document.getElementById('bad-name');
            const name = input.value.trim();
            if(!name) return;

            // Récupérer la liste actuelle pour ajouter le nouveau
            const res = await fetch('/get-current-state');
            const state = await res.json();
            let currentList = state.activeOrders['GLOBAL_BLACKLIST'] ? state.activeOrders['GLOBAL_BLACKLIST'].data : [];
            
            if(!currentList.includes(name)) {
                currentList.push(name);
                await fetch('/update-order', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        tableId: 'GLOBAL_BLACKLIST',
                        order: { data: currentList }
                    })
                });
                input.value = "";
                autoSync();
            }
        }

        // Lancement de la télécommunication H24
        setInterval(autoSync, 5000);
        autoSync();
    </script>
</body>
</html>
