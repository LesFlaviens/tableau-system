<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire KDS - CUISINE PRODUCTION</title>
    <style>
        :root { --bg: #050505; --text: #fff; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .master-header { display: flex; align-items: center; justify-content: space-between; background: #0a0a0a; padding: 10px 20px; border-bottom: 2px solid var(--gold); }
        .nav-btns { display: flex; gap: 10px; }
        .btn-nav { background: transparent; border: 1px solid #fff; color: #fff; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: 900; text-transform: uppercase; font-size: 0.7rem; }
        #production-area { flex: 1; padding: 20px; overflow-y: auto; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 20px; }
        .ticket { border: 1px solid #fff; border-radius: 8px; padding: 15px; background: #000; border-left: 5px solid #fff; }
        .drawer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #050505; z-index: 10000; display: none; padding: 30px; box-sizing: border-box; overflow-y: auto; }
        .drawer.open { display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <header class="master-header">
        <div style="font-weight:900; color:var(--gold);">PRODUCTION EMPIRE</div>
        <div class="nav-btns">
            <button class="btn-nav" onclick="openDrawer('planning-view')">📅 PLANNING</button>
            <button class="btn-nav" onclick="openDrawer('haccp-view')">⚙️ HACCP TACTILE</button>
            <button class="btn-nav" style="border-color:var(--alert);" onclick="location.reload()">🔄 SYNC</button>
        </div>
    </header>

    <div id="production-area"><div class="grid" id="container"></div></div>

    <div id="planning-view" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2>📅 PLANNING BRIGADE</h2><button onclick="closeDrawer()" class="btn-nav">FERMER</button></div>
        <div id="planning-content"></div>
    </div>

    <div id="haccp-view" class="drawer">
        <div style="display:flex; justify-content:space-between; align-items:center;"><h2>⚙️ RELEVÉ HACCP</h2><button onclick="closeDrawer()" class="btn-nav">FERMER</button></div>
        <input type="number" id="h-temp" style="font-size:3rem; width:150px; background:#000; color:var(--gold); border:1px solid var(--gold); text-align:center;" value="4.0" step="0.5">
        <button class="btn-nav" style="background:var(--gold); color:#000; padding:20px; margin-top:20px;" onclick="logHaccp()">ENREGISTRER AU REGISTRE CENTRAL</button>
    </div>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let activeOrders = {};

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if(msg.type === 'ORDER_UPDATE') { activeOrders = msg.activeOrders; render(); }
        };

        function render() {
            const cont = document.getElementById('container'); cont.innerHTML = '';
            for(let tid in activeOrders) {
                if(tid.startsWith('GLOBAL_')) continue;
                const o = activeOrders[tid];
                const pending = (o.items || []).filter(i => !i.done);
                if(pending.length === 0) continue;
                const div = document.createElement('div'); div.className = 'ticket';
                div.innerHTML = `<h3>${tid} - ${o.time}</h3>` + pending.map(i => `<div>- ${i.n}</div>`).join('') + `<button onclick="done('${tid}')" style="width:100%; padding:10px; margin-top:10px; background:var(--accent); border:none; font-weight:900;">PRÊT ✅</button>`;
                cont.appendChild(div);
            }
        }

        async function done(tid) {
            const o = activeOrders[tid]; o.items.forEach(i => i.done = true);
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:tid, order:o}) });
        }

        async function logHaccp() {
            const val = document.getElementById('h-temp').value;
            const log = { time: new Date().toLocaleString(), type: 'TEMP', eq: 'Frigo Master', val: val };
            await fetch('/update-order', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:'HACCP_EVENT', order:{status:'system', data:log}}) });
            alert("Transmis au registre haccp.html");
        }

        function openDrawer(id) { document.getElementById(id).classList.add('open'); if(id==='planning-view') renderPlanning(); }
        function closeDrawer() { document.querySelectorAll('.drawer').forEach(d=>d.classList.remove('open')); }
        function renderPlanning() {
            const p = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            document.getElementById('planning-content').innerHTML = p.map(s => `<div style="padding:10px; border-bottom:1px solid #333;"><b>${s.name}</b> : ${s.role}</div>`).join('');
        }
        setInterval(() => fetch('/get-current-state').then(r=>r.json()).then(d=>{activeOrders=d.activeOrders;render();}), 5000);
    </script>
</body>
</html>
