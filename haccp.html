<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Registre HACCP Automatisé</title>
    <style>
        :root { --bg: #050505; --text: #fff; --panel: #111; --accent: #00e676; --gold: #ffb300; --alert: #ff1744; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; }
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .status-sync { font-size: 0.7rem; color: var(--accent); font-weight: 900; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        
        .haccp-nav { display: flex; background: #0a0a0a; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 20px; border: none; background: transparent; color: #888; font-weight: 900; cursor: pointer; text-transform: uppercase; }
        .nav-btn.active { color: #fff; background: #111; border-bottom: 3px solid var(--gold); }

        .workspace { height: calc(100vh - 120px); overflow-y: auto; padding: 30px; box-sizing: border-box; display: none; }
        .workspace.active { display: block; }

        .audit-header { background: #111; border-left: 5px solid var(--gold); padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-export { background: var(--gold); color: #000; padding: 10px 20px; border-radius: 4px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; }

        .log-table { width: 100%; border-collapse: collapse; background: #0a0a0a; border-radius: 8px; overflow: hidden; }
        .log-table th { text-align: left; color: #666; padding: 15px; border-bottom: 1px solid #333; font-size: 0.7rem; text-transform: uppercase; }
        .log-table td { padding: 15px; border-bottom: 1px solid #111; font-size: 0.85rem; }
        .tag { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; }
        .tag-temp { background: rgba(41, 121, 255, 0.2); color: #2979ff; }
        .tag-dlc { background: rgba(255, 23, 68, 0.2); color: #ff1744; }
        .tag-ok { color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; letter-spacing: 2px;">EMPIRE HACCP <span style="color:var(--gold)">REGISTRY</span></div>
        <div class="status-sync"><div class="dot"></div> TÉLÉTRANSMISSION ACTIVE 24/7</div>
    </header>

    <nav class="haccp-nav">
        <button class="nav-btn active" onclick="switchTab('audit')">⚖️ Registre Direction / Contrôle</button>
        <button class="nav-btn" onclick="switchTab('view')">👁️ Monitoring Secteurs</button>
    </nav>

    <section id="view-audit" class="workspace active">
        <div class="audit-header">
            <div>
                <h2 style="margin:0;">REGISTRE LÉGAL DÉMATÉRIALISÉ</h2>
                <small style="color:var(--sub)">Les données de la cuisine et du bar sont injectées ici en temps réel.</small>
            </div>
            <button class="btn-export" onclick="exportCSV()">📥 Télécharger pour Inspection</button>
        </div>

        <table class="log-table">
            <thead>
                <tr>
                    <th>Horodatage</th>
                    <th>Secteur</th>
                    <th>Type</th>
                    <th>Détail de l'évènement</th>
                    <th>Valeur / État</th>
                    <th>Opérateur</th>
                </tr>
            </thead>
            <tbody id="live-logs">
                </tbody>
        </table>
    </section>

    <section id="view-view" class="workspace">
        <h2 style="color:var(--sub)">VUE MONITORING EN COURS DE DÉVELOPPEMENT...</h2>
    </section>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        
        // Stockage permanent des logs (Preuve légale)
        let masterRegistry = JSON.parse(localStorage.getItem('empire_haccp_master')) || [];

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE' && msg.activeOrders['HACCP_EVENT']) {
                const eventData = msg.activeOrders['HACCP_EVENT'].order.data;
                processHaccpEvent(eventData);
            }
        };

        function processHaccpEvent(event) {
            // Empêcher les doublons par timestamp
            if (masterRegistry.some(l => l.time === event.time && l.eq === event.eq)) return;

            // Injection dans le registre
            masterRegistry.unshift(event);
            
            // On ne garde que les 500 derniers événements pour la performance
            if (masterRegistry.length > 500) masterRegistry.pop();
            
            localStorage.setItem('empire_haccp_master', JSON.stringify(masterRegistry));
            renderRegistry();
        }

        function renderRegistry() {
            const container = document.getElementById('live-logs');
            container.innerHTML = masterRegistry.map(l => `
                <tr>
                    <td style="color:var(--sub)">${l.time}</td>
                    <td><b>CUISINE</b></td>
                    <td><span class="tag ${l.type === 'TEMP' ? 'tag-temp' : 'tag-dlc'}">${l.type}</span></td>
                    <td>${l.eq || l.name}</td>
                    <td class="tag-ok">${l.val ? l.val + '°C' : 'DLC: ' + l.date}</td>
                    <td style="font-size:0.7rem; opacity:0.5;">ID_AUTO_SYNC</td>
                </tr>
            `).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.workspace').forEach(w => w.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + tab).classList.add('active');
            renderRegistry();
        }

        function exportCSV() {
            let csv = "Date;Secteur;Type;Element;Valeur;Statut\n";
            masterRegistry.forEach(l => {
                csv += `${l.time};CUISINE;${l.type};${l.eq || l.name};${l.val || l.date};CONFORME\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `HACCP_EMPIRE_${new Date().toLocaleDateString()}.csv`;
            a.click();
        }

        // Chargement initial au démarrage
        async function loadInitial() {
            const res = await fetch('/get-current-state');
            const data = await res.json();
            if (data.activeOrders['HACCP_EVENT']) {
                processHaccpEvent(data.activeOrders['HACCP_EVENT'].order.data);
            }
            renderRegistry();
        }

        loadInitial();
    </script>
</body>
</html>
