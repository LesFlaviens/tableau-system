<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>HACCP EMPIRE - Audit Dynamique H24</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --accent: #00e676; --alert: #ff1744; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .nav-haccp { background: var(--panel); padding: 10px 30px; display: flex; gap: 15px; border-bottom: 2px solid var(--gold); align-items: center; }
        .nav-btn { background: transparent; border: 1px solid #333; color: #888; padding: 10px 15px; cursor: pointer; font-weight: bold; border-radius: 4px; font-size: 0.8rem;}
        .nav-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(255, 179, 0, 0.05); }

        .content { flex: 1; padding: 25px; overflow-y: auto; display: flex; flex-direction: column; }
        .module { display: flex; flex-direction: column; gap: 20px; }
        
        .card { background: var(--panel); border-radius: 8px; padding: 15px; border: 1px solid #222; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input, select { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 4px; font-size: 1rem; }
        
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: 900; text-transform: uppercase; }
        .status-ok { background: rgba(0, 230, 118, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .status-danger { background: rgba(255, 23, 68, 0.1); color: var(--alert); border: 1px solid var(--alert); animation: pulse 1s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }

        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; color: #555; font-size: 0.7rem; text-transform: uppercase; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 12px 10px; border-bottom: 1px solid #111; font-size: 0.9rem; }
        
        .btn-empire { background: var(--gold); color: #000; border: none; padding: 12px 25px; font-weight: 900; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-size: 0.8rem; }
        
        /* Outils de rectification */
        .btn-rectify { background: #222; color: #ccc; border: 1px solid #444; padding: 5px 10px; font-size: 0.7rem; border-radius: 3px; cursor: pointer; text-transform: uppercase;}
        .signature-audit { font-size: 0.65rem; color: #444; font-style: italic; display: flex; flex-direction: column; gap: 2px;}
        .signature-audit span.rectified { color: var(--gold); }
    </style>
</head>
<body>

    <div class="nav-haccp">
        <div style="font-weight: 900; color: var(--gold); margin-right: 20px; text-transform: uppercase; letter-spacing: 1px;">⚖️ HACCP AUDIT</div>
        <button class="nav-btn active" onclick="showModule('temp')">🌡️ TEMPÉRATURES</button>
        <button class="nav-btn" onclick="showModule('cleaning')">🧼 NETTOYAGE</button>
        <button class="nav-btn" onclick="showModule('trace')">🏷️ TRAÇABILITÉ (DLC)</button>
    </div>

    <div class="content">
        
        <div id="mod-temp" class="module">
            <div class="card">
                <h2 style="margin:0 0 15px 0; font-size: 0.9rem; color: var(--gold); text-transform: uppercase;">NOUVEAU RELEVÉ</h2>
                <div class="grid">
                    <div class="input-group">
                        <label>Équipement</label>
                        <select id="eq-name">
                            <option>FRIGO POSITIF 1</option>
                            <option>FRIGO BOISSONS</option>
                            <option>CONGÉLATEUR CUISINE</option>
                            <option>CHAMBRE FROIDE</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Valeur (°C)</label>
                        <input type="number" id="eq-val" step="0.1" placeholder="Ex: 3.4">
                    </div>
                    <div class="input-group" style="justify-content: flex-end;">
                        <button class="btn-empire" onclick="submitEntry('temp')">Enregistrer le relevé</button>
                    </div>
                </div>
            </div>

            <div class="card" style="flex:1; overflow:auto;">
                <h2 style="margin:0; font-size: 0.8rem; color: #555; text-transform: uppercase; letter-spacing: 1px;">HISTORIQUE DES 24H (AUDIT TEMPS RÉEL)</h2>
                <table>
                    <thead>
                        <tr><th>Heure</th><th>Équipement</th><th>Valeur</th><th>Statut</th><th>Audit Trail (HACCP OS Signature)</th><th>Action</th></tr>
                    </thead>
                    <tbody id="logs-temp"></tbody>
                </table>
            </div>
        </div>

        <div id="mod-trace" class="module" style="display:none;">
            <div class="card">
                <h2 style="margin:0 0 15px 0; font-size: 0.9rem; color: var(--gold); text-transform: uppercase;">NOUVELLE ÉTIQUETTE (DLC)</h2>
                <div class="grid">
                    <div class="input-group">
                        <label>Produit / Ingrédient</label>
                        <input type="text" id="trace-name" placeholder="Ex: Entrecôte Angus">
                    </div>
                    <div class="input-group">
                        <label>Fournisseur & N° Lot</label>
                        <input type="text" id="trace-lot" placeholder="Ex: Transgourmet - L21345">
                    </div>
                    <div class="input-group">
                        <label>Photo de l'étiquette (Tablette Cam)</label>
                        <input type="file" id="trace-img" accept="image/*" capture="camera" style="border:1px solid #222; padding:8px;">
                    </div>
                    <div class="input-group" style="justify-content: flex-end;">
                        <button class="btn-empire" onclick="submitEntry('trace')">ARCHIVER ÉTIQUETTE</button>
                    </div>
                </div>
            </div>

            <div class="card" style="flex:1; overflow:auto;">
                <h2 style="margin:0; font-size: 0.8rem; color: #555; text-transform: uppercase;">REGISTRE DES ÉTIQUETTES (TRAÇABILITÉ)</h2>
                <table>
                    <thead>
                        <tr><th>Heure</th><th>Produit</th><th>Lot / Fournisseur</th><th>Image DLC</th><th>Audit Trail</th><th>Action</th></tr>
                    </thead>
                    <tbody id="logs-trace"></tbody>
                </table>
            </div>
        </div>

    </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json()),
            update: (key, data) => fetch('/update-order', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ tableId: key, order: { data } })
            })
        };

        let db = { temp: [], trace: [] };
        let rectifiedTarget = null; // Pour stocker l'ID de l'entrée en cours de rectification

        function showModule(modId) {
            document.querySelectorAll('.module').forEach(m => m.style.display = 'none');
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('mod-' + modId).style.display = 'flex';
            event.target.classList.add('active');
        }

        // --- MOTEUR DE SOUMISSION UNIQUE (GÈRE NOUVEAU & RECTIFICATION) ---
        async function submitEntry(type) {
            let event = { 
                id: rectifiedTarget || Date.now(), 
                time: new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'})
            };
            let rectifiedText = "";

            if(type === 'temp') {
                const eq = document.getElementById('eq-name').value;
                const val = parseFloat(document.getElementById('eq-val').value);
                if(isNaN(val)) return alert("Température invalide");
                const isCongele = eq.includes('CONGÉL');
                const isCF = eq.includes('CHAMBRE FROIDE') || eq.includes('POSITIF');
                
                event = { ...event, eq, val,
                    status: (isCongele ? val <= -18 : (isCF ? val <= 4 : val <= 8)) ? 'OK' : 'ALERTE'
                };
                if(rectifiedTarget) rectifiedText = ` Rectifié à ${val}°C par Manager ID-${(Math.random()+1).toString(36).substring(7).toUpperCase()}`;
                
                // Reset inputs
                document.getElementById('eq-val').value = "";
            
            } else if (type === 'trace') {
                const name = document.getElementById('trace-name').value.trim();
                const lot = document.getElementById('trace-lot').value.trim();
                const file = document.getElementById('trace-img').files[0];
                if(!name || !lot) return alert("Remplissez Produit et Lot !");
                
                event = { ...event, name, lot, 
                    imgPlaceholder: file ? "IMAGE_ARCHIVÉE" : "PAS_D'IMAGE" 
                };
                
                if(rectifiedTarget) rectifiedText = ` Rectifié (Nom/Lot) par Manager ID-${(Math.random()+1).toString(36).substring(7).toUpperCase()}`;

                // Reset inputs
                document.getElementById('trace-name').value = "";
                document.getElementById('trace-lot').value = "";
                document.getElementById('trace-img').value = "";
            }

            // --- GESTION DE L'ERREUR HUMAINE (RECTIFICATION) ---
            if(rectifiedTarget) {
                // On remplace l'ancienne entrée par la nouvelle
                db[type] = db[type].map(l => {
                    if(l.id === rectifiedTarget) {
                        return { ...l, ...event,
                            auditTrailRectified: `📜 SIGNATURE AUDIT : Horodatage ORIGINAL ${l.time}. ${rectifiedText}`
                        };
                    }
                    return l;
                });
                rectifiedTarget = null; // Reset
            } else {
                // Nouveau relevé
                event.auditTrailOriginal = `📜 SIGNATURE AUDIT : Horodatage ORIGINAL ${event.time}. Signé ID-${(Math.random()+1).toString(36).substring(7).toUpperCase()}`;
                db[type] = [event, ...db[type]].slice(0, 100);
            }

            await API.update(`HACCP_${type.toUpperCase()}`, db[type]);
            loadAllLogs();
        }

        // --- FONCTIONS DE CHARGEMENT ET D'AFFICHAGE ---
        async function loadAllLogs() {
            const state = await API.getState();
            db.temp = (state.activeOrders['HACCP_TEMP'] && state.activeOrders['HACCP_TEMP'].data) || [];
            db.trace = (state.activeOrders['HACCP_TRACE'] && state.activeOrders['HACCP_TRACE'].data) || [];

            renderTempLogs();
            renderTraceLogs();
        }

        function renderTempLogs() {
            const container = document.getElementById('logs-temp');
            container.innerHTML = db.temp.map(l => `
                <tr style="border-left: ${l.status === 'OK' ? '0' : '3px solid var(--alert)'};">
                    <td>${l.time}</td>
                    <td style="font-weight:bold;">${l.eq}</td>
                    <td style="color:${l.status === 'OK' ? 'var(--accent)' : 'var(--alert)'}">${l.val}°C</td>
                    <td><span class="status-badge ${l.status === 'OK' ? 'status-ok' : 'status-danger'}">${l.status}</span></td>
                    <td class="signature-audit">
                        <span>${l.auditTrailOriginal}</span>
                        ${l.auditTrailRectified ? `<span class="rectified">${l.auditTrailRectified}</span>` : ''}
                    </td>
                    <td><button class="btn-rectify" onclick="rectifyTemp('${l.id}')">✏️ Rectifier Error</button></td>
                </tr>
            `).join('');
        }

        function renderTraceLogs() {
            const container = document.getElementById('logs-trace');
            container.innerHTML = db.trace.map(l => `
                <tr>
                    <td>${l.time}</td>
                    <td style="font-weight:bold;">${l.name}</td>
                    <td>${l.lot}</td>
                    <td style="font-size: 0.7rem; color: #444;">[ ${l.imgPlaceholder} ]</td>
                    <td class="signature-audit">
                        <span>${l.auditTrailOriginal}</span>
                        ${l.auditTrailRectified ? `<span class="rectified">${l.auditTrailRectified}</span>` : ''}
                    </td>
                    <td><button class="btn-rectify" onclick="rectifyTrace('${l.id}')">✏️ Rectifier</button></td>
                </tr>
            `).join('');
        }

        // --- FONCTIONS DE DÉCLENCHEMENT DE RECTIFICATION ---
        function rectifyTemp(id) {
            const l = db.temp.find(item => item.id == id); // Conversion ID nécessaire si timestamp
            if(!l) return;
            rectifiedTarget = l.id;
            document.getElementById('eq-name').value = l.eq;
            document.getElementById('eq-val').value = l.val;
            // On scroll vers le haut
            document.getElementById('mod-temp').scrollTop = 0;
            // On change le texte du bouton de soumission
            document.querySelector('#mod-temp .btn-empire').innerText = "VALIDER RECTIFICATION";
        }

        function rectifyTrace(id) {
            const l = db.trace.find(item => item.id == id);
            if(!l) return;
            rectifiedTarget = l.id;
            document.getElementById('trace-name').value = l.name;
            document.getElementById('trace-lot').value = l.lot;
            // On scroll vers le haut
            document.getElementById('mod-trace').scrollTop = 0;
            // On change le texte du bouton de soumission
            document.querySelector('#mod-trace .btn-empire').innerText = "VALIDER RECTIFICATION";
        }

        setInterval(loadAllLogs, 8000);
        loadAllLogs();
    </script>
</body>
</html>
