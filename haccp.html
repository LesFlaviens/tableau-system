<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Registre Empire</title></head>
<body style="background:#050505; color:#fff; font-family:sans-serif; padding:30px;">
    <h1>⚖️ REGISTRE LÉGAL HACCP</h1>
    <table id="logs" style="width:100%; text-align:left; border-collapse:collapse;">
        <tr style="border-bottom:2px solid #ffb300"><th>HEURE</th><th>ÉQUIPEMENT</th><th>VALEUR</th></tr>
    </table>
    <hr>
    <h1>🚫 BLACKLIST NO-SHOW</h1>
    <input type="text" id="bad-name" placeholder="NOM À BANNIR" style="padding:10px;"><button onclick="addBlack()">BANNIR</button>
    <div id="blacklist"></div>
    <script>
        let registry = [];
        async function autoSync() {
            const res = await fetch('/get-current-state'); const state = await res.json();
            if(state.activeOrders['HACCP_EVENT']) {
                const event = state.activeOrders['HACCP_EVENT'].data;
                if(!registry.find(l => l.time === event.time)) {
                    registry.unshift(event);
                    document.getElementById('logs').innerHTML += `<tr><td>${event.time}</td><td>${event.eq}</td><td>${event.val}°C</td></tr>`;
                }
            }
            if(state.activeOrders['GLOBAL_BLACKLIST']) {
                document.getElementById('blacklist').innerHTML = state.activeOrders['GLOBAL_BLACKLIST'].data.map(n => `<div>🚫 ${n}</div>`).join('');
            }
        }
        async function addBlack() {
            const name = document.getElementById('bad-name').value.toUpperCase().trim();
            const res = await fetch('/get-current-state'); const state = await res.json();
            let list = state.activeOrders['GLOBAL_BLACKLIST'] ? state.activeOrders['GLOBAL_BLACKLIST'].data : [];
            if(!list.includes(name)) list.push(name);
            await fetch('/update-order', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({tableId:'GLOBAL_BLACKLIST', order:{status:'system', data:list}})});
        }
        setInterval(autoSync, 5000);
    </script>
</body>
