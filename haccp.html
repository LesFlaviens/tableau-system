<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Registre HACCP & Contrôle Direction</title>
    <style>
        :root { --bg: #050505; --text: #fff; --panel: #111; --accent: #00e676; --gold: #ffb300; --alert: #ff1744; --sub: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow: hidden; }
        header { background: #000; border-bottom: 2px solid var(--gold); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
        .status-sync { font-size: 0.7rem; color: var(--accent); font-weight: 900; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
        .dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 10px var(--accent); }
        
        .haccp-nav { display: flex; background: #0a0a0a; border-bottom: 1px solid #333; }
        .nav-btn { flex: 1; padding: 20px; border: none; background: transparent; color: #888; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .nav-btn.active { color: #fff; background: #111; border-bottom: 3px solid var(--gold); }

        .workspace { height: calc(100vh - 120px); overflow-y: auto; padding: 30px; box-sizing: border-box; display: none; }
        .workspace.active { display: block; }

        .audit-header { background: #111; border-left: 5px solid var(--gold); padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-export { background: var(--gold); color: #000; padding: 10px 20px; border-radius: 4px; font-weight: 900; border: none; cursor: pointer; text-transform: uppercase; }

        .log-table { width: 100%; border-collapse: collapse; background: #0a0a0a; border-radius: 8px; overflow: hidden; }
        .log-table th { text-align: left; color: #666; padding: 15px; border-bottom: 1px solid #333; font-size: 0.7rem; text-transform: uppercase; }
        .log-table td { padding: 15px; border-bottom: 1px solid #111; font-size: 0.85rem; }
        
        .card { background: #111; border: 1px solid #333; padding: 20px; border-radius: 8px; margin-bottom: 20px; }
        .input-empire { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 4px; width: 100%; box-sizing: border-box; }
        .blacklist-item { background: #000; border: 1px solid var(--alert); padding: 15px; border-radius: 6px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: 900; letter-spacing: 2px;">EMPIRE HACCP <span style="color:var(--gold)">REGISTRY</span></div>
        <div class="status-sync"><div class="dot"></div> LIAISON CUISINE ACTIVE 24/7</div>
    </header>

    <nav class="haccp-nav">
        <button id="btn-audit" class="nav-btn active" onclick="switchTab('audit')">⚖️ Registre Légal</button>
        <button id="btn-planning" class="nav-btn" onclick="switchTab('planning')">📅 Lecteur Planning</button>
        <button id="btn-blacklist" class="nav-btn" onclick="switchTab('blacklist')">🚫 Liste Noire</button>
    </nav>

    <section id="view-audit" class="workspace active">
        <div class="audit-header">
            <div>
                <h2 style="margin:0;">AUDIT SANITAIRE EN TEMPS RÉEL</h2>
                <small style="color:var(--sub)">Transcription automatique des relevés de la production.</small>
            </div>
            <button class="btn-export" onclick="exportCSV()">📥 Télécharger Registre CSV</button>
        </div>
        <table class="log-table">
            <thead>
                <tr>
                    <th>Heure</th>
                    <th>Équipement</th>
                    <th>Type</th>
                    <th>Valeur</th>
                    <th>État</th>
                </tr>
            </thead>
            <tbody id="live-logs"></tbody>
        </table>
    </section>

    <section id="view-planning" class="workspace">
        <div class="audit-header"><h2>📅 CONSULTATION DU PLANNING BRIGADE</h2></div>
        <div id="planning-display" class="card"></div>
    </section>

    <section id="view-blacklist" class="workspace">
        <div class="audit-header" style="border-left-color: var(--alert);"><h2>🚫 GESTION DES NO-SHOWS</h2></div>
        <div class="card">
            <input type="text" id="bad-name" placeholder="NOM À BANNIR..." class="input-empire" style="text-transform:uppercase; margin-bottom:10px;">
            <button class="btn-export" style="background:var(--alert); color:#fff; width:100%;" onclick="addToBlacklist()">BANNIR DÉFINITIVEMENT</button>
        </div>
        <div id="blacklist-display"></div>
    </section>

    <script>
        const ws = new WebSocket((window.location.protocol === 'https:' ? 'wss://' : 'ws://') + window.location.host);
        let registry = JSON.parse(localStorage.getItem('empire_haccp_master')) || [];

        ws.onmessage = (e) => {
            const msg = JSON.parse(e.data);
            if (msg.type === 'ORDER_UPDATE') {
                if(msg.activeOrders['HACCP_EVENT']) processEvent(msg.activeOrders['HACCP_EVENT'].order.data);
                if(msg.activeOrders['GLOBAL_BLACKLIST']) renderBlacklist(msg.activeOrders['GLOBAL_BLACKLIST'].data);
            }
        };

        function processEvent(event) {
            if (registry.some(l => l.time === event.time)) return;
            registry.unshift(event);
            if (registry.length > 500) registry.pop();
            localStorage.setItem('empire_haccp_master', JSON.stringify(registry));
            renderRegistry();
        }

        function renderRegistry() {
            document.getElementById('live-logs').innerHTML = registry.map(l => `
                <tr>
                    <td>${l.time}</td>
                    <td><b>${l.eq}</b></td>
                    <td>${l.type}</td>
                    <td style="color:var(--gold)">${l.val}°C</td>
                    <td style="color:var(--accent)">CONFORME ✅</td>
                </tr>`).join('');
        }

        function switchTab(tab) {
            document.querySelectorAll('.workspace').forEach(w => w.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('view-' + tab).classList.add('active');
            document.getElementById('btn-' + tab).classList.add('active');
            if(tab === 'planning') renderPlanning();
            if(tab === 'blacklist') loadBlacklist();
        }

        // PLANNING
        function renderPlanning() {
            const p = JSON.parse(localStorage.getItem('kds_hr_master_v9')) || [];
            document.getElementById('planning-display').innerHTML = p.map(s => `
                <div style="padding:15px; border-bottom:1px solid #222;">
                    <b>${s.name}</b> — <span style="color:var(--gold)">${s.role}</span>
                </div>`).join('') || "Aucun planning détecté.";
        }

        // BLACKLIST
        async function loadBlacklist() {
            const res = await fetch('/get-current-state');
            const data = await res.json();
            renderBlacklist(data.activeOrders['GLOBAL_BLACKLIST'] ? data.activeOrders['GLOBAL_BLACKLIST'].data : []);
        }

        function renderBlacklist(list) {
            document.getElementById('blacklist-display').innerHTML = list.map(name => `
                <div class="blacklist-item">
                    <b style="color:var(--alert)">🚫 ${name}</b>
                    <button onclick="removeBlack('${name}')" style="background:none; border:none; color:var(--sub); cursor:pointer;">Pardonner</button>
                </div>`).join('');
        }

        async function addToBlacklist() {
            const name = document.getElementById('bad-name').value.toUpperCase().trim();
            if(!name) return;
            const res = await fetch('/get-current-state');
            const state = await res.json();
            let list = state.activeOrders['GLOBAL_BLACKLIST'] ? state.activeOrders['GLOBAL_BLACKLIST'].data : [];
            if(!list.includes(name)) {
                list.push(name);
                await fetch('/update-order', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ tableId: 'GLOBAL_BLACKLIST', order: { status: 'system', data: list } }) });
                document.getElementById('bad-name').value = "";
            }
        }

        function exportCSV() {
            let csv = "Heure;Equipement;Type;Valeur;Statut\n";
            registry.forEach(l => { csv += `${l.time};${l.eq};${l.type};${l.val};CONFORME\n`; });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a'); a.href = url; a.download = `REGISTRE_HACCP.csv`; a.click();
        }

        renderRegistry();
    </script>
</body>
</html>
