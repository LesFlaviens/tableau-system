<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Empire OS - BDS Bar (Production)</title>
    <style>
        :root { 
            --bg: #0f172a; --panel: #1e293b; --border: #334155; 
            --text-main: #f8fafc; --text-muted: #94a3b8; 
            --gold: #fbbf24; --accent: #38bdf8; /* Bleu Néon pour le Bar */
            --alert: #f87171; --ordered: #60a5fa;
            --shadow: 0 4px 10px rgba(0,0,0,0.5);
        }
        
        body { background: var(--bg); color: var(--text-main); font-family: 'Inter', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--border); padding-bottom: 15px; margin-bottom: 20px; }
        .header-title { font-size: 2rem; font-weight: 900; color: var(--accent); margin: 0; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(56, 189, 248, 0.3); }
        
        #kds-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; align-items: start; flex: 1; overflow-y: auto; padding-right: 10px; }
        
        /* LE TICKET DU BAR */
        .ticket-card { background: var(--panel); border: 2px solid var(--border); border-radius: 12px; display: flex; flex-direction: column; position: relative; box-shadow: var(--shadow); transition: 0.3s; animation: slideIn 0.3s ease-out; }
        @keyframes slideIn { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .ticket-header { background: rgba(0,0,0,0.2); padding: 15px; border-bottom: 2px solid var(--border); border-radius: 12px 12px 0 0; display: flex; justify-content: space-between; align-items: center; }
        .ticket-table { font-size: 1.5rem; font-weight: 900; color: var(--text-main); }
        .ticket-time { font-size: 1rem; color: var(--text-muted); font-weight: bold; }
        
        /* LE BADGE DE PRIORITÉ FIFO */
        .priority-badge { position: absolute; top: -15px; left: -15px; background: #000; color: var(--alert); width: 50px; height: 50px; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.8rem; font-weight: 900; border: 4px solid var(--alert); box-shadow: 0 4px 15px rgba(248, 113, 113, 0.6); z-index: 50; }
        
        /* STATUTS D'URGENCE */
        .ticket-card.urgent { border-color: var(--alert); box-shadow: 0 0 15px rgba(248, 113, 113, 0.2); }
        .ticket-card.urgent .ticket-header { border-bottom-color: var(--alert); }
        
        .ticket-obs { background: rgba(56, 189, 248, 0.1); color: var(--accent); padding: 10px 15px; font-size: 0.9rem; font-weight: bold; border-bottom: 1px solid var(--border); }
        
        .ticket-items { padding: 10px; display: flex; flex-direction: column; gap: 8px; }
        
        .kds-item { background: var(--bg); border: 1px solid var(--border); padding: 15px; border-radius: 8px; font-size: 1.2rem; font-weight: bold; display: flex; justify-content: space-between; align-items: center; cursor: pointer; transition: 0.2s; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2); }
        .kds-item:active { transform: scale(0.98); }
        .kds-item .qty { color: var(--accent); font-weight: 900; font-size: 1.4rem; min-width: 30px; }
        .kds-item .name { flex: 1; margin-left: 10px; line-height: 1.3; }
        .kds-item .item-obs { font-size: 0.85rem; color: var(--gold); display: block; margin-top: 5px; }
        
        /* ETAT : EN PRÉPARATION VS PRÊT */
        .kds-item.mixing { border-left: 5px solid var(--accent); }
        .kds-item.done { border-color: #4ade80; background: rgba(52, 211, 153, 0.05); color: var(--text-muted); text-decoration: line-through; border-left: 5px solid #4ade80; opacity: 0.6; }
        
        .empty-state { grid-column: 1 / -1; text-align: center; color: var(--border); font-size: 2rem; font-weight: 900; margin-top: 100px; text-transform: uppercase; }

        /* EFFET TACTILE (RIPPLE) */
        .kds-item { position: relative; overflow: hidden; }
        .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 0.4s ease-out; background-color: rgba(56, 189, 248, 0.4); pointer-events: none; }
        @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <h1 class="header-title">🍸 BAR DISPLAY (BDS)</h1>
        <div style="display:flex; gap:15px; align-items:center;">
            <div id="clock" style="font-size:1.5rem; font-weight:900; color:var(--text-main); font-family:monospace;">00:00:00</div>
            <div id="sync-status" style="background:var(--accent-dim); color:var(--accent); padding:8px 15px; border-radius:20px; font-weight:bold; border:1px solid var(--accent); font-size:0.9rem;">● LIAISON ACTIVE</div>
        </div>
    </header>

    <div id="kds-grid">
        </div>

    <script>
        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    if (window.location.protocol !== 'file:') {
                        let r = await fetch('/get-current-state');
                        if(r.ok) state = await r.json();
                    } else throw new Error("Local");
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            },
            update: async (key, data) => {
                let state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                state.activeOrders[key] = data;
                localStorage.setItem('EMPIRE_GLOBAL_SYNC', JSON.stringify(state));
            }
        };

        window.addEventListener('storage', (e) => {
            if (e.key === 'EMPIRE_GLOBAL_SYNC') { refreshKDS(); }
        });

        setInterval(() => { 
            let d = new Date(); 
            document.getElementById('clock').innerText = d.toLocaleTimeString('fr-FR', {hour12:false}); 
        }, 1000);

        setInterval(refreshKDS, 2000);

        let activeOrders = {};

        async function refreshKDS() {
            try {
                const state = await API.getState();
                if (state && state.activeOrders) {
                    activeOrders = state.activeOrders;
                    renderTickets();
                }
            } catch (e) { console.error("Erreur Sync", e); }
        }

        function markItemDone(tableLabel, itemId, currentEvent) {
            // Effet visuel Ripple
            let rect = currentEvent.currentTarget.getBoundingClientRect();
            let circle = document.createElement('span');
            circle.style.width = circle.style.height = Math.max(rect.width, rect.height) + 'px';
            circle.style.left = (currentEvent.clientX - rect.left - rect.width/2) + 'px';
            circle.style.top = (currentEvent.clientY - rect.top - rect.height/2) + 'px';
            circle.className = 'ripple';
            currentEvent.currentTarget.appendChild(circle);

            setTimeout(async () => {
                let order = activeOrders[tableLabel];
                if (order && order.items) {
                    let item = order.items.find(i => i.id === itemId);
                    if (item) {
                        item.done = !item.done; // Bascule l'état (prêt / pas prêt)
                        await API.update(tableLabel, order);
                        refreshKDS();
                    }
                }
            }, 300);
        }

        function renderTickets() {
            let grid = document.getElementById('kds-grid');
            let ticketsData = [];

            // 1. Collecter tous les bons pertinents pour le BAR
            for (let tableId in activeOrders) {
                // Ignore les paramètres système, on ne cherche que les tables
                if (tableId.includes('MASTER') || tableId.includes('ARCHIVE') || tableId.includes('ALERTS') || tableId.includes('ARCHITECTURE')) continue;

                let order = activeOrders[tableId];
                if (order && order.items && order.status !== 'reserved') {
                    // ⚠️ FILTRE STRICT POUR LE BAR : dest === 'bar'
                    let itemsToMix = order.items.filter(i => i.dest === 'bar' && i.fired && !i.done);
                    
                    if (itemsToMix.length > 0) {
                        let oldestFiredTime = Math.min(...itemsToMix.map(i => i.itemId));
                        ticketsData.push({
                            table: tableId,
                            timeStr: order.time,
                            obs: order.observations,
                            items: itemsToMix,
                            priorityTime: oldestFiredTime,
                            fullOrder: order
                        });
                    }
                }
            }

            // 2. MOTEUR FIFO : Trier chronologiquement
            ticketsData.sort((a, b) => a.priorityTime - b.priorityTime);

            if (ticketsData.length === 0) {
                grid.innerHTML = '<div class="empty-state">✅ COMPTOIR CLAIR - AUCUNE BOISSON EN ATTENTE</div>';
                return;
            }

            // 3. Affichage
            let html = '';
            ticketsData.forEach((ticket, index) => {
                let rank = index + 1;
                let isUrgent = rank <= 2; // Les 2 premiers bons sont marqués en urgence visuelle

                let itemsHtml = ticket.items.map(item => {
                    let cleanName = item.n.replace(/\n/g, ' + ');
                    let obsHtml = item.obs ? `<span class="item-obs">⚠️ ${item.obs}</span>` : '';
                    return `
                        <div class="kds-item mixing" onclick="markItemDone('${ticket.table}', ${item.id}, event)">
                            <span class="qty">${item.qty || 1}x</span>
                            <div class="name">
                                ${cleanName}
                                ${obsHtml}
                            </div>
                        </div>
                    `;
                }).join('');

                let tableObsHtml = ticket.obs ? `<div class="ticket-obs">${ticket.obs}</div>` : '';

                html += `
                    <div class="ticket-card ${isUrgent ? 'urgent' : ''}">
                        <div class="priority-badge">${rank}</div>
                        <div class="ticket-header">
                            <span class="ticket-table">${ticket.table.startsWith('order_') ? '🌐 WEB' : 'TABLE ' + ticket.table}</span>
                            <span class="ticket-time">${ticket.timeStr}</span>
                        </div>
                        ${tableObsHtml}
                        <div class="ticket-items">
                            ${itemsHtml}
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
        }

        // Lancement initial
        refreshKDS();
    </script>
</body>
</html>
