<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCHEF - Empire Control</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #050505; 
            --card: #11141d; 
            --accent: #C5A059; 
            --text-main: #FAF0E6; 
            --text-dim: #9ca3af; 
            --border-color: #2d313a; 
            --success: #10b981; 
            --danger: #ef4444;
            --info: #3b82f6;
        }
        
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); margin: 0; padding: 20px; }
        
        header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 30px; }
        h1 { font-family: 'Playfair Display', serif; color: var(--accent); margin: 0; letter-spacing: 2px; }
        
        .dashboard-stats { display: flex; gap: 20px; margin-bottom: 30px; }
        .stat-card { background: var(--card); border: 1px solid var(--border-color); padding: 20px; border-radius: 12px; flex: 1; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: 900; color: var(--accent); }
        .stat-label { font-size: 0.85rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-top: 5px; }

        table { width: 100%; border-collapse: collapse; background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        th, td { padding: 15px 20px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background: #000; color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: rgba(255,255,255,0.02); }

        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; letter-spacing: 0.5px; }
        .badge-premium { background: rgba(197, 160, 89, 0.1); color: var(--accent); border: 1px solid var(--accent); }
        .badge-eco { background: rgba(59, 130, 246, 0.1); color: var(--info); border: 1px solid var(--info); }
        .badge-actif { background: rgba(16, 185, 129, 0.1); color: var(--success); border: 1px solid var(--success); }
        .badge-suspendu { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }

        .pin-code { font-family: monospace; font-size: 1.1rem; color: var(--success); font-weight: bold; letter-spacing: 2px; }
        
        .action-btns { display: flex; gap: 8px; flex-wrap: wrap; }
        .btn { padding: 6px 12px; border: none; border-radius: 6px; font-size: 0.75rem; font-weight: bold; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn:hover { opacity: 0.8; transform: translateY(-1px); }
        .btn-edit { background: var(--info); color: white; }
        .btn-warn { background: #f59e0b; color: black; }
        .btn-danger { background: var(--danger); color: white; }
        .btn-gold { background: var(--accent); color: black; }
    </style>
</head>
<body>

    <header>
        <h1> iCHEF </h1>
        <div style="color: var(--text-dim); font-size: 0.9rem;">Connecté en tant que Super Admin</div>
    </header>

    <div class="dashboard-stats">
        <div class="stat-card">
            <div class="stat-value" id="total-clients">0</div>
            <div class="stat-label">Restaurants Actifs</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="total-premium">0</div>
            <div class="stat-label">Comptes Premium</div>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Établissement</th>
                <th>Contact</th>
                <th>Forfait</th>
                <th>Écrans Actifs / Max</th>
                <th>Code PIN</th>
                <th>Statut</th>
                <th>Actions Admin</th>
            </tr>
        </thead>
        <tbody id="clients-table-body">
            <tr><td colspan="7" style="text-align:center; color: var(--text-dim);">Chargement de ICHEF OS... ⏳</td></tr>
        </tbody>
    </table>

    <script>
        const MASTER_KEY = 'Empire2026';
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" : "https://tableau-system.onrender.com";

        // 📥 CHARGER TOUS LES CLIENTS DEPUIS SERVER.JS
        async function loadEmpireData() {
            try {
                const response = await fetch(`${SERVER_URL}/api/get-all-tenants-admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ masterKey: MASTER_KEY })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    renderTable(data.tenants);
                } else {
                    alert("⛔ Accès Refusé. Clé Maître invalide.");
                }
            } catch (err) {
                document.getElementById('clients-table-body').innerHTML = `<tr><td colspan="7" style="text-align:center; color: var(--danger);">Erreur de connexion au serveur.</td></tr>`;
            }
        }

        // 🎨 AFFICHER LE TABLEAU
        function renderTable(tenants) {
            const tbody = document.getElementById('clients-table-body');
            let html = '';
            let totalPremium = 0;

            tenants.forEach(t => {
                if(t.pack === 'PREMIUM') totalPremium++;

                let badgePack = t.pack === 'PREMIUM' ? 'badge-premium' : 'badge-eco';
                let badgeStatus = t.status === 'ACTIF' ? 'badge-actif' : 'badge-suspendu';
                
                let toggleStatusBtn = t.status === 'ACTIF' 
                    ? `<button class="btn btn-warn" onclick="adminAction('${t.id}', 'suspend')">⏸️ Suspendre</button>`
                    : `<button class="btn btn-gold" onclick="adminAction('${t.id}', 'activate')">▶️ Réactiver</button>`;

                html += `
                    <tr>
                        <td>
                            <strong>${t.name}</strong><br>
                            <span style="font-size:0.75rem; color:var(--text-dim);">ID: ${t.id}</span>
                        </td>
                        <td style="font-size:0.85rem; color:var(--text-dim);">
                            📧 ${t.email}<br>📞 ${t.phone}
                        </td>
                        <td>
                            <span class="badge ${badgePack}">${t.pack}</span><br>
                            <span style="font-size:0.7rem; color:var(--text-dim); text-transform:uppercase;">${t.specialite}</span>
                        </td>
                        <td>
                            <strong style="color: ${t.activeScreens >= t.maxScreens ? 'var(--danger)' : 'var(--success)'};">${t.activeScreens}</strong> / ${t.maxScreens}<br>
                            <button class="btn btn-edit" style="margin-top:5px;" onclick="modifierEcrans('${t.id}', ${t.maxScreens})">✏️ Modifier Limite</button>
                        </td>
                        <td class="pin-code">${t.pin}</td>
                        <td><span class="badge ${badgeStatus}">${t.status}</span></td>
                        <td class="action-btns">
                            <button class="btn btn-edit" onclick="modifierForfait('${t.id}', '${t.pack}')">📦 Changer Pack</button>
                            <button class="btn btn-danger" onclick="adminAction('${t.id}', 'reset_devices')">🔌 Déco. iPads</button>
                            ${toggleStatusBtn}
                            <button class="btn btn-danger" onclick="supprimerClient('${t.id}')">🗑️ Supprimer</button>
                        </td>
                    </tr>
                `;
            });

            tbody.innerHTML = html;
            document.getElementById('total-clients').innerText = tenants.length;
            document.getElementById('total-premium').innerText = totalPremium;
        }

        // ⚙️ FONCTION CENTRALE POUR ENVOYER LES ORDRES AU SERVEUR
        async function adminAction(tenantID, action, extraPayload = {}) {
            try {
                const payload = { masterKey: MASTER_KEY, tenantID, action, ...extraPayload };
                const res = await fetch(`${SERVER_URL}/api/admin-action`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                const data = await res.json();
                if (data.success) {
                    loadEmpireData(); // Recharge le tableau discrètement
                } else {
                    alert("❌ Erreur lors de l'exécution de l'action.");
                }
            } catch (err) { alert("📡 Erreur de connexion au serveur."); }
        }

        // 💻 MODIFIER MANUELLEMENT LA LIMITE D'ÉCRANS
        function modifierEcrans(tenantID, ecranActuel) {
            let newMax = prompt(`Combien d'écrans maximum veux-tu autoriser pour le restaurant ${tenantID} ?\n(Actuellement : ${ecranActuel} écrans)`, ecranActuel);
            if (newMax !== null && newMax.trim() !== "") {
                adminAction(tenantID, 'set_screens', { manualScreens: parseInt(newMax) });
            }
        }

        // 📦 CHANGER LE FORFAIT D'UN CLIENT
        function modifierForfait(tenantID, packActuel) {
            let newPack = prompt(`Modifier le forfait de ${tenantID}.\nTapez l'un des choix exacts : CHEF, ECO, BUSINESS ou PREMIUM\n(Actuellement : ${packActuel})`, packActuel);
            if (newPack !== null && ['CHEF', 'ECO', 'BUSINESS', 'PREMIUM'].includes(newPack.toUpperCase())) {
                adminAction(tenantID, 'set_plan', { newPlan: newPack.toUpperCase() });
            } else if (newPack !== null) {
                alert("Nom de forfait invalide. L'action a été annulée.");
            }
        }

        // 🗑️ SUPPRIMER DÉFINITIVEMENT UN CLIENT
        function supprimerClient(tenantID) {
            let confirmation = confirm(`⚠️ ATTENTION ⚠️\nVeux-tu vraiment détruire définitivement le restaurant ${tenantID} ?\nToutes ses données, factures et menus seront effacés.`);
            if (confirmation) {
                adminAction(tenantID, 'delete');
            }
        }

        // Lancement au démarrage de la page
        loadEmpireData();
    </script>
</body>
</html>
