<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Bureau du Chef (RH & FoodCost)</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 30px; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .nav-btns { display: flex; gap: 10px; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; transition: 0.2s; }
        .btn-nav:hover { background: var(--hr); border-color: #fff; }

        h2 { text-transform: uppercase; letter-spacing: 2px; border-left: 5px solid var(--hr); padding-left: 15px; margin-bottom: 25px; }

        /* SECTION FICHES TECHNIQUES */
        .tech-sheet-creator { background: var(--panel); border: 1px solid #333; border-top: 5px solid var(--accent); padding: 25px; border-radius: 12px; margin-bottom: 50px; }
        .recipe-grid { display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 40px; gap: 10px; margin-bottom: 15px; }
        .input-sheet { background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; }
        .food-cost-result { background: #0a0a0a; padding: 20px; border-radius: 8px; border: 1px solid var(--accent); display: flex; justify-content: space-around; align-items: center; margin-top: 20px; }
        .cost-val { font-size: 1.5rem; font-weight: 900; color: var(--accent); }

        /* SECTION STAFF */
        .staff-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(400px, 1fr)); gap: 20px; }
        .card { background: var(--panel); border: 1px solid #333; border-top: 5px solid var(--hr); padding: 20px; border-radius: 12px; }
        .planning-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; margin: 15px 0; }
        .day-box { text-align: center; background: #000; padding: 5px; border-radius: 4px; }
        .day-input { width: 100%; background: transparent; border: none; color: #fff; text-align: center; font-weight: bold; font-size: 1rem; }
        
        .btn-save { background: var(--accent); color: #000; border: none; padding: 15px 30px; border-radius: 8px; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; margin-top: 20px; }
        .btn-add-line { background: #333; color: #fff; border: none; padding: 10px; border-radius: 6px; cursor: pointer; margin-bottom: 20px; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="margin:0; color:var(--hr);">👔 BUREAU DU CHEF</h1>
            <span style="color:#666; font-weight:bold; text-transform:uppercase;">Gestion RH & Food-Cost Assiette</span>
        </div>
        <div class="nav-btns">
            <a href="production.html" class="btn-nav">🔥 RETOUR CUISINE</a>
            <button class="btn-nav" style="border-color:var(--accent); color:var(--accent);" onclick="syncData()">🔄 SYNCHRONISER EMPIRE</button>
        </div>
    </header>

    <section class="tech-sheet-creator">
        <h2>📄 NOUVELLE FICHE TECHNIQUE & FOOD COST</h2>
        <input type="text" id="recipe-name" class="input-sheet" style="width:100%; font-size:1.5rem; margin-bottom:20px;" placeholder="Nom du Plat (ex: Burger Empire)">
        
        <div id="ingredients-list">
            <div class="recipe-grid">
                <label style="color:#666; font-size:0.7rem; font-weight:bold;">INGRÉDIENT</label>
                <label style="color:#666; font-size:0.7rem; font-weight:bold;">QTE (g/ml)</label>
                <label style="color:#666; font-size:0.7rem; font-weight:bold;">PRIX ACHAT / KG</label>
                <label style="color:#666; font-size:0.7rem; font-weight:bold;">COÛT LIGNE</label>
                <span></span>
            </div>
            </div>
        
        <button class="btn-add-line" onclick="addIngredientLine()">+ AJOUTER UN INGRÉDIENT</button>

        <textarea id="recipe-steps" class="input-sheet" style="width:100%; height:100px; margin-top:10px;" placeholder="Étapes de préparation..."></textarea>

        <div class="food-cost-result">
            <div>COÛT MATIÈRE : <span id="total-food-cost" class="cost-val">0.00</span> €</div>
            <div>PRIX DE VENTE SUGGÉRÉ (30%) : <span id="suggested-price" class="cost-val" style="color:var(--hr);">0.00</span> €</div>
        </div>

        <button class="btn-save" onclick="saveNewRecipe()">💾 VALIDER ET ENVOYER EN CUISINE</button>
    </section>

    <section>
        <h2>👔 ÉQUIPE & PLANNING</h2>
        <div id="staff-container" class="staff-grid"></div>
    </section>

    <script>
        // --- LOGIQUE FOOD COST ---
        function addIngredientLine() {
            const container = document.getElementById('ingredients-list');
            const div = document.createElement('div');
            div.className = 'recipe-grid';
            div.innerHTML = `
                <input type="text" class="input-sheet ing-name" placeholder="ex: Boeuf">
                <input type="number" class="input-sheet ing-qte" placeholder="200" oninput="calcCost()">
                <input type="number" class="input-sheet ing-price" placeholder="15.50" oninput="calcCost()">
                <input type="text" class="input-sheet ing-total" value="0.00 €" readonly>
                <button onclick="this.parentElement.remove(); calcCost();" style="background:none; border:none; color:red; cursor:pointer;">✕</button>
            `;
            container.appendChild(div);
        }

        function calcCost() {
            let total = 0;
            const lines = document.querySelectorAll('#ingredients-list .recipe-grid');
            lines.forEach(line => {
                const qte = parseFloat(line.querySelector('.ing-qte')?.value) || 0;
                const price = parseFloat(line.querySelector('.ing-price')?.value) || 0;
                const lineCost = (qte / 1000) * price;
                if(line.querySelector('.ing-total')) line.querySelector('.ing-total').value = lineCost.toFixed(2) + " €";
                total += lineCost;
            });
            document.getElementById('total-food-cost').textContent = total.toFixed(2);
            document.getElementById('suggested-price').textContent = (total / 0.3).toFixed(2);
        }

        function saveNewRecipe() {
            const name = document.getElementById('recipe-name').value;
            const steps = document.getElementById('recipe-steps').value;
            if(!name) return alert("Nom du plat obligatoire");

            const recipes = JSON.parse(localStorage.getItem('kds_grimoire_v2')) || [];
            recipes.push({
                nom: name,
                content: steps,
                cost: document.getElementById('total-food-cost').textContent + "€"
            });
            localStorage.setItem('kds_grimoire_v2', JSON.stringify(recipes));
            alert("Fiche technique envoyée en production !");
            window.location.reload();
        }

        // --- LOGIQUE RH ---
        function getStaff() { return JSON.parse(localStorage.getItem('kds_hr_staff_master')) || []; }
        function renderStaff() {
            const staff = getStaff();
            const jours = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
            document.getElementById('staff-container').innerHTML = staff.map(s => `
                <div class="card">
                    <div class="staff-name">${s.name}</div>
                    <div class="planning-grid">
                        ${jours.map((j, i) => `<div class="day-box"><label style="font-size:0.6rem; color:#888;">${j}</label>
                        <input type="number" class="day-input" value="${s.planning[i]}" onchange="updateStaffPlan(${s.id}, ${i}, this.value)"></div>`).join('')}
                    </div>
                    <div style="display:flex; justify-content:space-between; font-weight:bold;">
                        <span>SOLDE HEURES : ${s.overtime || 0}h</span>
                        <span style="color:var(--accent);">CONGÉS : ${s.cp || 0}j</span>
                    </div>
                </div>
            `).join('');
        }

        function updateStaffPlan(id, dayIdx, val) {
            const s = getStaff(); const i = s.findIndex(x => x.id === id);
            s[i].planning[dayIdx] = parseFloat(val) || 0;
            localStorage.setItem('kds_hr_staff_master', JSON.stringify(s));
        }

        function syncData() {
            alert("Synchronisation avec les terminaux de production effectuée.");
        }

        // Init
        addIngredientLine();
        renderStaff();
    </script>
</body>
</html>
