<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Matrix Interactive RH</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --warning: #ffa000; --bar: #00e5ff; --purple: #ea80fc; --gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden;}
        
        /* NAVIGATION ET PORTAIL */
        #landing-portal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .portal-planning { width: 90%; max-width: 1200px; height: 60vh; background: var(--panel); border: 2px solid #333; border-radius: 12px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); overflow-y: auto; display: flex; align-items: center; justify-content: center;}
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 400px; border-top: 5px solid var(--hr); text-align: center; }

        /* HUB DIRECTION */
        #director-hub { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .hub-btn { width: 350px; padding: 40px 20px; border-radius: 12px; font-size: 1.5rem; font-weight: 900; cursor: pointer; text-transform: uppercase; border: 2px solid; background: #111; color: #fff; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .hub-btn:hover { transform: translateY(-5px); background: #1a1a1a; }

        /* INTERFACES */
        #hr-interface, #pin-manager-interface { display: none; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; background: var(--bg); z-index: 3000; position: fixed; top: 0; left: 0; width: 100%; }
        header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; padding: 8px 15px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        
        .main-container { display: flex; gap: 15px; flex: 1; overflow: hidden; }
        .staff-sidebar { width: 300px; background: var(--panel); border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; flex-shrink: 0; }
        .month-view { flex: 1; background: var(--panel); border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        
        /* MATRICE GLOBALE INTERACTIVE */
        .global-table { min-width: 100%; border-collapse: collapse; table-layout: fixed; }
        .global-table th, .global-table td { border: 1px solid #222; text-align: center; padding: 0; height: 50px;}
        .global-table th { font-size: 0.6rem; color: var(--sub); background: #1a1a1a; position: sticky; top: 0; z-index: 10;}
        .sticky-col { position: sticky; left: 0; z-index: 11; width: 150px; text-align: left; padding-left: 10px; background: #0a0a0a; border-right: 2px solid #444; }
        
        /* SELECTEUR DANS LA MATRICE */
        .status-select-cell { width: 100%; height: 100%; background: transparent; border: none; color: #fff; font-weight: 900; cursor: pointer; text-align: center; font-size: 0.9rem; appearance: none; -webkit-appearance: none; }
        .status-select-cell:focus { outline: 2px solid var(--hr); background: rgba(255,255,255,0.05); }

        /* COLORS STATUTS */
        .cell-P { background: rgba(0, 230, 118, 0.1); color: var(--accent); }
        .cell-R { background: rgba(255, 255, 255, 0.03); color: #555; }
        .cell-CP { background: rgba(234, 128, 252, 0.1); color: var(--purple); }
        .cell-M { background: rgba(255, 23, 68, 0.1); color: var(--alert); }
        .cell-F { background: rgba(251, 191, 36, 0.1); color: var(--gold); }

        /* STATS BAR */
        .dashboard-stats { display: flex; gap: 10px; background: #000; padding: 10px 20px; border-bottom: 1px solid #333; }
        .stat-box { background: #111; border: 1px solid #333; padding: 8px 15px; border-radius: 6px; text-align: center; flex: 1; }
        .stat-box label { display: block; font-size: 0.55rem; color: var(--sub); text-transform: uppercase; margin-bottom: 3px; font-weight: bold; }
        .stat-box span { font-size: 1.2rem; font-weight: 900; }

        .staff-card { background: #050505; border: 1px solid #222; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; border-left: 4px solid var(--hr);}
        .staff-card.active { background: rgba(41, 121, 255, 0.1); border-color: var(--hr); }
    </style>
</head>
<body>

    <div id="landing-portal">
        <h1 style="color:var(--text); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;">📅 PLANNING GÉNÉRAL STAFF</h1>
        <div class="portal-planning">
            <h2 style="color: var(--sub);">[ VUE LECTURE SEULE ÉQUIPE ]</h2>
        </div>
        <div style="margin-top: 30px;">
            <button class="pay-btn" style="border-color: #f43f5e; color: #f43f5e; background: rgba(244, 63, 94, 0.1); padding: 20px 50px; font-size: 1.3rem; font-weight: bold;" onclick="openDeptSelection()">🔒 ACCÈS DIRECTION</button>
        </div>
    </div>

    <div id="director-hub">
        <h1 style="color:var(--gold); letter-spacing:4px;">👑 CENTRE DE CONTRÔLE</h1>
        <div style="display:flex; gap:20px;">
            <button class="hub-btn" style="border-color:var(--hr);" onclick="openInterface('planning')">
                <span style="font-size:3rem;">🌍</span> MATRICE & PLANNING
            </button>
            <button class="hub-btn" style="border-color:var(--alert);" onclick="openInterface('pins')">
                <span style="font-size:3rem;">🔑</span> CODES STAFF
            </button>
        </div>
        <button onclick="fullLogout()" style="margin-top:40px; background:none; border:1px solid #555; color:#fff; padding:10px 20px; cursor:pointer; border-radius:8px; font-weight:bold;">🔒 QUITTER</button>
    </div>

    <div id="hr-interface">
        <header>
            <div style="display:flex; align-items:center; gap:20px;">
                <h2 id="header-title" style="color:var(--hr); margin:0;">PILOTAGE RH</h2>
                <input type="month" id="month-selector" style="background:#000; border:1px solid var(--hr); color:#fff; padding:6px; border-radius:6px; font-weight:bold;" onchange="loadMonthData()">
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-nav" id="btn-toggle-view" style="border-color:var(--gold); color:var(--gold);" onclick="toggleViewMode()">🌍 VUE GLOBALE MATRICE</button>
                <button class="btn-nav" onclick="backToHub()">🔙 MENU</button>
            </div>
        </header>
        
        <div class="main-container">
            <div class="staff-sidebar">
                <div style="padding:15px; border-bottom:1px solid #333;">
                    <button style="width:100%; padding:12px; background:var(--hr); border:none; color:#fff; font-weight:900; border-radius:6px;">+ NOUVEAU CONTRAT</button>
                </div>
                <div id="staff-list-render" style="flex:1; overflow-y:auto; padding:10px;"></div>
            </div>
            
            <div class="month-view" id="month-view-container">
                <div class="dashboard-stats" id="dashboard-stats-panel">
                    <div class="stat-box"><label>Contrat</label><span id="stat-expected">0h</span></div>
                    <div class="stat-box"><label>Effectuées</label><span id="stat-actual" style="color:var(--accent);">0h</span></div>
                    <div class="stat-box"><label style="color:var(--alert);">Heures Sup.</label><span id="stat-sup" style="color:var(--alert);">0h</span></div>
                    <div class="stat-box"><label>Congés</label><span id="stat-cp" style="color:var(--purple);">0j</span></div>
                    <div class="stat-box"><label>Maladie</label><span id="stat-maladie" style="color:var(--alert);">0j</span></div>
                    <div class="stat-box"><label>Fériés</label><span id="stat-ferie" style="color:var(--gold);">0j</span></div>
                </div>

                <div id="planning-render-zone" class="table-container">
                    </div>
            </div>
        </div>
    </div>

    <div id="dept-modal" class="modal"><div class="modal-content"><h2>SECTION</h2><button onclick="showPinPad('cuisine')">CUISINE</button></div></div>
    <div id="pin-modal" class="modal"><div class="modal-content"><div id="pin-display" class="pin-display"></div><button onclick="submitPin()">OK</button></div></div>

    <script>
        let currentDept = 'cuisine';
        let currentStaffId = null;
        let isGlobalView = true; // On commence par la vue globale (Capture 2)
        const MASTER_PIN = "9999";
        const daysOfWeek = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];

        // BASE DE DONNÉES
        function getDir() { return JSON.parse(localStorage.getItem('empire_hr_directory')) || []; }
        function getTs() { return JSON.parse(localStorage.getItem('empire_hr_timesheets')) || {}; }
        function saveTs(ts) { localStorage.setItem('empire_hr_timesheets', JSON.stringify(ts)); }

        // NAVIGATION
        function openInterface(type) {
            document.getElementById('director-hub').style.display = 'none';
            document.getElementById('hr-interface').style.display = 'flex';
            loadMonthData();
        }

        function toggleViewMode() {
            isGlobalView = !isGlobalView;
            document.getElementById('btn-toggle-view').innerText = isGlobalView ? "👤 VUE DÉTAILLÉE" : "🌍 VUE GLOBALE MATRICE";
            loadMonthData();
        }

        function selectStaff(id) {
            currentStaffId = id;
            isGlobalView = false;
            toggleViewMode(); // Force le rafraîchissement en vue individuelle
        }

        // CHARGEMENT DATA
        function loadMonthData() {
            const monthStr = document.getElementById('month-selector').value || "2026-04";
            const [year, month] = monthStr.split('-');
            const daysInMonth = new Date(year, month, 0).getDate();
            const ts = getTs();
            if(!ts[monthStr]) ts[monthStr] = {};

            const dir = getDir().filter(s => (s.dept || 'cuisine') === currentDept);
            
            // On s'assure que tout le monde a une entrée
            dir.forEach(s => { if(!ts[monthStr][s.id]) ts[monthStr][s.id] = {}; });

            if(isGlobalView) {
                renderGlobalMatrix(year, month, daysInMonth, ts[monthStr], dir);
                document.getElementById('dashboard-stats-panel').style.display = 'none';
            } else {
                renderIndividualPlanning(year, month, daysInMonth, ts[monthStr][currentStaffId]);
                document.getElementById('dashboard-stats-panel').style.display = 'flex';
                updateStats(ts[monthStr][currentStaffId], currentStaffId);
            }
            renderStaffSidebar(dir);
        }

        // RENDU MATRICE INTERACTIVE (CAPTURE 2 AMELIORÉE)
        function renderGlobalMatrix(year, month, daysInMonth, monthData, dir) {
            let html = `<table class="global-table"><thead><tr><th class="sticky-col">ÉQUIPE</th>`;
            for(let d=1; d<=daysInMonth; d++) {
                const dateObj = new Date(year, month-1, d);
                html += `<th>${daysOfWeek[dateObj.getDay()]}<br>${d}</th>`;
            }
            html += `</tr></thead><tbody>`;

            dir.forEach(staff => {
                html += `<tr><td class="sticky-col" onclick="selectStaff(${staff.id})">
                    <div style="font-weight:900;">${staff.name}</div>
                    <div style="font-size:0.6rem; color:var(--sub);">${staff.role}</div>
                </td>`;

                for(let d=1; d<=daysInMonth; d++) {
                    const dayData = monthData[staff.id][d] || {status:'present'};
                    const status = dayData.status;
                    const valDisplay = status === 'present' ? 'P' : status === 'off' ? 'R' : status === 'conge' ? 'CP' : status === 'maladie' ? 'M' : 'F';
                    
                    html += `<td class="cell-${status}">
                        <select class="status-select-cell cell-${status}" onchange="updateStatusGlobal(${staff.id}, ${d}, this.value)">
                            <option value="present" ${status==='present'?'selected':''}>P</option>
                            <option value="off" ${status==='off'?'selected':''}>R</option>
                            <option value="conge" ${status==='conge'?'selected':''}>CP</option>
                            <option value="maladie" ${status==='maladie'?'selected':''}>M</option>
                            <option value="ferie" ${status==='ferie'?'selected':''}>F</option>
                        </select>
                    </td>`;
                }
                html += `</tr>`;
            });

            html += `</tbody></table>`;
            document.getElementById('planning-render-zone').innerHTML = html;
        }

        // UPDATE DEPUIS LA MATRICE
        function updateStatusGlobal(staffId, day, newStatus) {
            const monthStr = document.getElementById('month-selector').value;
            const ts = getTs();
            if(!ts[monthStr][staffId][day]) ts[monthStr][staffId][day] = {s1:'', s2:'', pause:0, obs:''};
            
            ts[monthStr][staffId][day].status = newStatus;
            
            // Logique HCR : Si repos ou congé, on vide les heures
            if(newStatus !== 'present') {
                ts[monthStr][staffId][day].s1 = '';
                ts[monthStr][staffId][day].s2 = '';
                ts[monthStr][staffId][day].pause = 0;
            } else {
                // Heures par défaut si on remet en présent
                ts[monthStr][staffId][day].s1 = '10:00-14:45';
                ts[monthStr][staffId][day].s2 = '18:00-22:45';
                ts[monthStr][staffId][day].pause = 30;
            }
            
            saveTs(ts);
            loadMonthData(); // Rafraîchit la vue
        }

        // RENDU INDIVIDUEL (CAPTURE 3)
        function renderIndividualPlanning(year, month, daysInMonth, staffData) {
            let html = `<table id="timesheet-table"><thead><tr>
                <th>DATE</th><th>ÉTAT</th><th>MATIN</th><th>SOIR</th><th>PAUSE</th><th>NET</th><th>AUDIT</th>
            </tr></thead><tbody>`;

            for(let d=1; d<=daysInMonth; d++) {
                const dateObj = new Date(year, month-1, d);
                const p = staffData[d] || {status:'present', s1:'10:00-14:45', s2:'18:00-22:45', pause:30};
                const h = calculateNet(p);

                html += `<tr>
                    <td><div class="day-label">${daysOfWeek[dateObj.getDay()]}</div><div class="date-label">${d}/${month}</div></td>
                    <td><select class="status-sel" onchange="updateDetail(${d}, 'status', this.value)">
                        <option value="present" ${p.status==='present'?'selected':''}>Présent</option>
                        <option value="off" ${p.status==='off'?'selected':''}>Repos</option>
                        <option value="conge" ${p.status==='conge'?'selected':''}>Congé</option>
                    </select></td>
                    <td><input type="text" class="shift-inp" value="${p.s1}" onchange="updateDetail(${d}, 's1', this.value)"></td>
                    <td><input type="text" class="shift-inp" value="${p.s2}" onchange="updateDetail(${d}, 's2', this.value)"></td>
                    <td><input type="number" class="pause-inp" value="${p.pause}" onchange="updateDetail(${d}, 'pause', this.value)"></td>
                    <td style="font-weight:900; color:var(--hr);">${h.toFixed(1)}h</td>
                    <td style="color:var(--accent); font-size:0.7rem;">✓ Conforme</td>
                </tr>`;
            }
            html += `</tbody></table>`;
            document.getElementById('planning-render-zone').innerHTML = html;
        }

        // HELPERS MATHS
        function calculateNet(p) {
            if(p.status !== 'present') return 0;
            return (parseH(p.s1) + parseH(p.s2)) - (p.pause / 60);
        }

        function parseH(range) {
            if(!range || !range.includes('-')) return 0;
            const t = range.split('-');
            const s = t[0].split(':'), e = t[1].split(':');
            const diff = (parseInt(e[0]) + parseInt(e[1])/60) - (parseInt(s[0]) + parseInt(s[1])/60);
            return diff < 0 ? diff + 24 : diff;
        }

        function updateStats(staffData, id) {
            const staff = getDir().find(s => s.id === id);
            let total = 0, cp = 0, m = 0, f = 0;
            Object.values(staffData).forEach(day => {
                total += calculateNet(day);
                if(day.status === 'conge') cp++;
                if(day.status === 'maladie') m++;
                if(day.status === 'ferie') f++;
            });
            const expected = (staff.contract || 39) * 4.33;
            document.getElementById('stat-expected').innerText = expected.toFixed(1) + 'h';
            document.getElementById('stat-actual').innerText = total.toFixed(1) + 'h';
            document.getElementById('stat-sup').innerText = '+' + Math.max(0, total - expected).toFixed(1) + 'h';
            document.getElementById('stat-cp').innerText = cp + 'j';
            document.getElementById('stat-maladie').innerText = m + 'j';
            document.getElementById('stat-ferie').innerText = f + 'j';
        }

        function renderStaffSidebar(dir) {
            document.getElementById('staff-list-render').innerHTML = dir.map(s => `
                <div class="staff-card ${s.id === currentStaffId ? 'active' : ''}" onclick="selectStaff(${s.id})">
                    <div class="staff-name">${s.name}</div>
                    <div class="staff-role">${s.role} - ${s.contract}h/sem</div>
                </div>
            `).join('');
        }

        function openDeptSelection() { document.getElementById('dept-modal').style.display='flex'; }
        function showPinPad(d) { currentDept = d; document.getElementById('dept-modal').style.display='none'; document.getElementById('pin-modal').style.display='flex'; }
        function submitPin() { document.getElementById('pin-modal').style.display='none'; document.getElementById('landing-portal').style.display='none'; document.getElementById('director-hub').style.display='flex'; loadMonthData(); }
        function fullLogout() { window.location.reload(); }
    </script>
</body>
</html>
