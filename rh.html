<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Direction des Ressources Humaines</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --warning: #ffa000; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; transition: 0.2s; text-transform: uppercase;}
        .btn-nav:hover { border-color: var(--hr); background: #222; }

        /* ASSISTANT DE MODULATION */
        .smart-assistant { background: #111; border: 1px solid var(--hr); border-left: 5px solid var(--hr); border-radius: 12px; padding: 20px; margin-bottom: 25px; display: flex; align-items: center; gap: 30px; }
        .stat-box { flex: 1; text-align: center; }
        .stat-label { display: block; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; font-weight: 900; margin-bottom: 5px; }
        .stat-val { font-size: 1.5rem; font-weight: 900; color: #fff; }
        .stat-suggestion { font-size: 0.9rem; font-weight: bold; color: var(--accent); padding: 15px; border-radius: 8px; background: rgba(0, 0, 0, 0.3); border: 1px solid #333; flex: 2; min-height: 50px; display: flex; align-items: center;}
        
        /* FORMULAIRE EMBAUCHE */
        .form-add { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 25px; display: flex; gap: 15px; align-items: flex-end; }
        .input-lab { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-weight: bold; }
        .input-lab:focus { border-color: var(--hr); outline: none; }
        
        /* DOSSIERS SALARIÉS */
        .staff-folder { background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 25px; border-left: 6px solid var(--hr); }
        .folder-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #222; padding-bottom: 15px; margin-bottom: 15px; }
        .planning-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-card { background: #0a0a0a; border: 1px solid #222; padding: 8px; border-radius: 6px; text-align: center; }
        .day-name { display: block; font-size: 0.65rem; color: var(--sub); text-transform: uppercase; font-weight: 900; margin-bottom: 8px; }
        .status-select { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 4px; border-radius: 4px; font-size: 0.65rem; margin-bottom: 8px; cursor: pointer; }
        .shift-input { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 6px 2px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 0.8rem; margin-bottom: 4px; box-sizing: border-box;}
        .shift-hidden { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        .obs-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid #222; color: #666; font-size: 0.65rem; font-style: italic; margin-top: 8px; box-sizing: border-box; padding: 3px;}
        .obs-input:focus { color: #fff; outline: none; border-color: var(--hr); }
        
        .total-hours { font-size: 1.5rem; font-weight: 900; color: var(--accent); }
        .total-hours.over { color: var(--alert); animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color:var(--hr); margin:0; text-transform:uppercase; letter-spacing:2px;">👔 DIRECTION RH</h1>
            <p style="color:var(--sub); margin:5px 0 0 0; font-weight: bold;">CONTRATS, PLANNINGS & MASSE SALARIALE</p>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-nav" onclick="alert('Module Chef à venir dans chef.html')">🔪 LABO DU CHEF</button>
            <a href="production.html" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">🔥 RETOUR CUISINE</a>
        </div>
    </header>

    <div class="smart-assistant">
        <div class="stat-box">
            <label class="stat-label">Couverts Prévus / Semaine</label>
            <input type="number" id="forecast-covers" style="background:#000; border:1px solid #444; color:var(--hr); font-size:1.5rem; font-weight:900; width:100px; text-align:center; border-radius:6px; padding:5px;" value="150" onchange="updateModulation()">
        </div>
        <div class="stat-box" style="border-left: 1px solid #333; border-right: 1px solid #333;">
            <label class="stat-label">Total Heures Planifiées</label>
            <div id="total-planned-hours" class="stat-val">0.0h</div>
        </div>
        <div class="stat-box">
            <label class="stat-label">Ratio Prod.</label>
            <div id="productivity-ratio" class="stat-val" style="color:var(--hr);">0.0</div>
            <span style="font-size:0.6rem; color:var(--sub);">Couverts / Heure</span>
        </div>
        <div id="smart-advice" class="stat-suggestion">Analyse en cours...</div>
    </div>

    <div class="form-add">
        <div style="flex:2">
            <label style="font-size:0.7rem; color:var(--sub); text-transform:uppercase; font-weight:bold; display:block; margin-bottom:5px;">Nom du Salarié</label>
            <input type="text" id="new-staff-name" class="input-lab" placeholder="ex: Vincent - Chef de Partie">
        </div>
        <div style="flex:1">
            <label style="font-size:0.7rem; color:var(--sub); text-transform:uppercase; font-weight:bold; display:block; margin-bottom:5px;">Contrat (heures)</label>
            <input type="number" id="new-staff-contract" class="input-lab" value="45">
        </div>
        <button class="btn-nav" style="background:var(--hr); border:none; height:45px; flex:1;" onclick="addNewStaff()">+ EMBAUCHER AU PLANNING</button>
    </div>

    <div id="staff-container"></div>

    <script>
        const jours = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];

        function getStaff() { return JSON.parse(localStorage.getItem('kds_hr_master_v9')) || []; }
        function saveStaff(s) { localStorage.setItem('kds_hr_master_v9', JSON.stringify(s)); renderStaff(); updateModulation(); }

        function addNewStaff() {
            const name = document.getElementById('new-staff-name').value.trim();
            const contract = parseFloat(document.getElementById('new-staff-contract').value) || 45;
            if(!name) return;
            const s = getStaff();
            s.push({ 
                id: Date.now(), 
                name, 
                contract, 
                plan: Array(7).fill().map(() => ({ s1: "09:15-14:30", s2: "15:00-22:00", status: "present", obs: "" })) 
            });
            saveStaff(s);
            document.getElementById('new-staff-name').value = '';
        }

        function updateData(id, dayIdx, field, val) {
            const s = getStaff(); const idx = s.findIndex(x => x.id === id);
            s[idx].plan[dayIdx][field] = val;
            saveStaff(s);
        }

        function calculateH(shiftStr) {
            if(!shiftStr || !shiftStr.includes('-')) return 0;
            try {
                const t = shiftStr.split('-');
                const start = new Date(`2026-01-01T${t[0].trim()}:00`);
                const end = new Date(`2026-01-01T${t[1].trim()}:00`);
                let diff = (end - start) / (1000 * 60 * 60);
                return diff < 0 ? diff + 24 : diff;
            } catch(e) { return 0; }
        }

        function updateModulation() {
            const staff = getStaff();
            const forecast = parseFloat(document.getElementById('forecast-covers').value) || 0;
            let totalHours = 0;
            let daysOpen = 0;

            for(let i=0; i<7; i++) {
                let presence = false;
                staff.forEach(s => {
                    const p = s.plan[i];
                    if (p.status !== "off" && p.status !== "maladie") {
                        presence = true;
                        if (p.status === "present") totalHours += (calculateH(p.s1) + calculateH(p.s2));
                        else if (p.status === "off_matin") totalHours += calculateH(p.s2);
                        else if (p.status === "off_soir") totalHours += calculateH(p.s1);
                    }
                });
                if(presence) daysOpen++;
            }

            document.getElementById('total-planned-hours').textContent = totalHours.toFixed(1) + "h";
            const ratio = totalHours > 0 ? (forecast / totalHours).toFixed(2) : 0;
            document.getElementById('productivity-ratio').textContent = ratio;

            const adviceBox = document.getElementById('smart-advice');
            if (totalHours < (daysOpen * 7) && daysOpen > 0) {
                adviceBox.innerHTML = `❌ <b>DANGER :</b> Vous prévoyez d'ouvrir ${daysOpen} jours avec seulement ${totalHours.toFixed(1)}h. C'est impossible pour un service normal.`;
                adviceBox.style.color = "var(--alert)";
            } else if (ratio > 3.5) {
                adviceBox.innerHTML = `⚠️ <b>BURN-OUT :</b> Ratio de ${ratio}. L'équipe va craquer. Rajoutez du staff.`;
                adviceBox.style.color = "var(--warning)";
            } else if (ratio < 1.3 && forecast > 0) {
                adviceBox.innerHTML = `💸 <b>PERTE :</b> Ratio trop bas (${ratio}). Trop de staff pour vos ${forecast} couverts.`;
                adviceBox.style.color = "var(--warning)";
            } else {
                adviceBox.innerHTML = `✅ <b>MODULATION OPTIMALE :</b> Viabilité assurée pour ${daysOpen} jours avec une bonne rentabilité.`;
                adviceBox.style.color = "var(--hr)";
            }
        }

        function renderStaff() {
            const staff = getStaff();
            document.getElementById('staff-container').innerHTML = staff.map(s => {
                let sTotal = 0;
                const days = s.plan.map((p, i) => {
                    let h = 0;
                    if(p.status === "present") h = calculateH(p.s1) + calculateH(p.s2);
                    else if(p.status === "off_matin") h = calculateH(p.s2);
                    else if(p.status === "off_soir") h = calculateH(p.s1);
                    sTotal += h;
                    
                    const isOff = p.status === 'off' || p.status === 'maladie';
                    const isHalf = p.status.includes('off_');
                    
                    return `
                    <div class="day-card" style="border-color:${isOff ? '#333' : (isHalf ? 'var(--warning)' : '#222')}">
                        <span class="day-name">${jours[i]}</span>
                        <select class="status-select" onchange="updateData(${s.id}, ${i}, 'status', this.value)">
                            <option value="present" ${p.status==='present'?'selected':''}>✅ PRÉSENT</option>
                            <option value="off_matin" ${p.status==='off_matin'?'selected':''}>☀️ OFF MAT</option>
                            <option value="off_soir" ${p.status==='off_soir'?'selected':''}>🌙 OFF SOIR</option>
                            <option value="off" ${p.status==='off'?'selected':''}>💤 OFF</option>
                            <option value="maladie" ${p.status==='maladie'?'selected':''}>🤒 MALADIE</option>
                        </select>
                        <div style="display:${isOff ? 'none' : 'block'}">
                            <input type="text" class="shift-input ${p.status === 'off_matin' ? 'shift-hidden' : ''}" value="${p.s1}" onchange="updateData(${s.id}, ${i}, 's1', this.value)">
                            <input type="text" class="shift-input ${p.status === 'off_soir' ? 'shift-hidden' : ''}" value="${p.s2}" style="color:#ea80fc" onchange="updateData(${s.id}, ${i}, 's2', this.value)">
                        </div>
                        <input type="text" class="obs-input" placeholder="Notes (ex: Remplacement)..." value="${p.obs || ''}" onchange="updateData(${s.id}, ${i}, 'obs', this.value)">
                    </div>`;
                }).join('');

                return `
                <div class="staff-folder">
                    <div class="folder-header">
                        <span style="font-weight:900; text-transform:uppercase; color:var(--hr); font-size:1.2rem;">${s.name}</span>
                        <div>
                            <span class="total-hours ${sTotal > s.contract ? 'over' : ''}">${sTotal.toFixed(1)}h <span style="font-size:0.9rem; color:#555;">/ ${s.contract}h</span></span>
                            <button onclick="if(confirm('Supprimer ce dossier définitivement ?')) saveStaff(getStaff().filter(x=>x.id!==${s.id}))" style="background:none; border:none; color:#555; cursor:pointer; font-weight:bold; margin-left:15px; border-left:1px solid #333; padding-left:15px;">EFFACER ✕</button>
                        </div>
                    </div>
                    <div class="planning-grid">${days}</div>
                </div>`;
            }).join('');
        }

        // Init
        renderStaff();
        updateModulation();
    </script>
</body>
</html>
