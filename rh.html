<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Direction RH & Planning</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --warning: #ffa000; --bar: #00e5ff; --purple: #ea80fc; --gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden;}
        
        /* PORTAIL PUBLIC */
        #landing-portal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .portal-planning { width: 90%; max-width: 1200px; height: 60vh; background: var(--panel); border: 2px solid #333; border-radius: 12px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); overflow-y: auto; display: flex; align-items: center; justify-content: center;}
        
        /* MODALES (FORCE PRIORITÉ) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 400px; border-top: 5px solid var(--hr); text-align: center; }

        .input-group { margin-bottom: 15px; text-align: left; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; margin-bottom: 5px; font-weight: bold;}
        .input-full { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 10px; border-radius: 6px; font-size: 1rem; box-sizing: border-box;}

        /* HUB DE DIRECTION */
        #director-hub { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .hub-btn { width: 350px; padding: 40px 20px; border-radius: 12px; font-size: 1.5rem; font-weight: 900; cursor: pointer; text-transform: uppercase; border: 2px solid; background: #111; color: #fff; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .hub-btn:hover { transform: translateY(-5px); background: #1a1a1a; }

        /* PIN PAD */
        .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 20px; justify-content: center; }
        .pin-btn { background: #000; border: 1px solid #444; color: #fff; font-size: 1.5rem; font-weight: bold; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; transition: 0.1s; }
        .pin-btn:active { background: var(--hr); color: #000; }
        .pin-display { font-size: 2.5rem; letter-spacing: 15px; margin-bottom: 10px; color: var(--hr); min-height: 50px; font-weight: bold; text-align: center;}

        /* INTERFACES DE TRAVAIL */
        #hr-interface, #pin-manager-interface { display: none; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; background: var(--bg); z-index: 3000; position: fixed; top: 0; left: 0; width: 100%; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; padding: 8px 15px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; }
        
        .main-container { display: flex; gap: 15px; flex: 1; overflow: hidden; }
        .staff-sidebar { width: 300px; background: var(--panel); border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; }
        .month-view { flex: 1; background: var(--panel); border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        
        .pay-btn { cursor: pointer; border-radius: 8px; font-weight: bold; text-transform: uppercase; transition: 0.2s; border: 2px solid; }
        .pay-btn:active { transform: scale(0.98); }

        .staff-card { background: #050505; border: 1px solid #222; padding: 12px; border-radius: 8px; cursor: pointer; margin-bottom: 8px; border-left: 4px solid var(--hr);}
        .staff-card:hover { background: #111; border-color: #444; }
        .staff-name { font-size: 1rem; font-weight: 900; text-transform: uppercase; color: var(--hr);}
        .staff-role { font-size: 0.7rem; color: var(--sub); text-transform: uppercase; font-weight: bold;}
    </style>
</head>
<body>

    <div id="landing-portal">
        <h1 style="color:var(--text); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;">📅 PLANNING GÉNÉRAL STAFF</h1>
        <div class="portal-planning">
            <h2 style="color: var(--sub);">[ AFFICHAGE DU PLANNING EN LECTURE SEULE ]</h2>
        </div>
        <div style="margin-top: 30px;">
            <button class="pay-btn" style="border-color: #f43f5e; color: #f43f5e; background: rgba(244, 63, 94, 0.1); padding: 20px 50px; font-size: 1.3rem;" onclick="openDeptSelection()">🔒 ACCÈS DIRECTION</button>
        </div>
    </div>

    <div id="dept-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--hr);">SÉLECTION SECTION</h2>
            <button class="pay-btn" style="width:100%; padding:15px; margin-bottom:10px; border-color:var(--accent); color:var(--accent); background:#111;" onclick="showPinPad('cuisine')">🍳 CUISINE</button>
            <button class="pay-btn" style="width:100%; padding:15px; margin-bottom:10px; border-color:var(--purple); color:var(--purple); background:#111;" onclick="showPinPad('service')">🍷 SERVICE</button>
            <button class="pay-btn" style="width:100%; padding:15px; margin-bottom:10px; border-color:var(--bar); color:var(--bar); background:#111;" onclick="showPinPad('bar')">🍸 BAR</button>
            <button onclick="closeDeptSelection()" style="background:transparent; border:none; color:#555; cursor:pointer; text-decoration:underline;">Annuler</button>
        </div>
    </div>

    <div id="pin-modal" class="modal">
        <div class="modal-content">
            <div id="pin-dept-title" style="color:var(--hr); font-weight:900; margin-bottom:10px;">CODE REQUIS</div>
            <div id="pin-display" class="pin-display"></div>
            <div class="pin-pad">
                <button class="pin-btn" onclick="appendPin(1)">1</button><button class="pin-btn" onclick="appendPin(2)">2</button><button class="pin-btn" onclick="appendPin(3)">3</button>
                <button class="pin-btn" onclick="appendPin(4)">4</button><button class="pin-btn" onclick="appendPin(5)">5</button><button class="pin-btn" onclick="appendPin(6)">6</button>
                <button class="pin-btn" onclick="appendPin(7)">7</button><button class="pin-btn" onclick="appendPin(8)">8</button><button class="pin-btn" onclick="appendPin(9)">9</button>
                <button class="pin-btn" onclick="cancelPin()" style="background:var(--alert);">✕</button>
                <button class="pin-btn" onclick="appendPin(0)">0</button>
                <button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
            </div>
        </div>
    </div>

    <div id="director-hub">
        <h1 style="color:var(--gold); letter-spacing:4px;">👑 DIRECTION HUB</h1>
        <p style="color:var(--sub); margin-bottom:30px; text-transform:uppercase;">Département : <span id="hub-dept-display" style="color:var(--hr); font-weight:bold;"></span></p>
        <div style="display:flex; gap:20px;">
            <button class="hub-btn" style="border-color:var(--hr);" onclick="openInterface('planning')">📅 GÉRER LE PLANNING</button>
            <button class="hub-btn" style="border-color:var(--alert);" onclick="openInterface('pins')">🔑 MODIFIER CODES STAFF</button>
        </div>
        <button onclick="fullLogout()" style="margin-top:40px; background:none; border:1px solid #555; color:#fff; padding:10px 20px; cursor:pointer; border-radius:8px;">🔒 QUITTER</button>
    </div>

    <div id="hr-interface">
        <header>
            <h2 id="header-title" style="color:var(--hr); margin:0;">GÉRER LE PLANNING</h2>
            <button class="btn-nav" onclick="backToHub()">🔙 RETOUR HUB</button>
        </header>
        <div class="main-container">
            <div class="staff-sidebar">
                <div style="padding:15px; border-bottom:1px solid #333;">
                    <button onclick="openStaffModal()" style="width:100%; padding:10px; background:var(--hr); border:none; color:#fff; font-weight:bold; cursor:pointer; border-radius:6px;">+ NOUVEAU CONTRAT</button>
                </div>
                <div id="staff-list-render" style="flex:1; overflow-y:auto; padding:10px;">
                    </div>
            </div>
            <div class="month-view">
                <div style="padding:20px; text-align:center; color:#555; flex:1; display:flex; align-items:center; justify-content:center; flex-direction:column; background:#0a0a0a;">
                    <span style="font-size:3rem;">📅</span>
                    <h3>SÉLECTIONNEZ UN EMPLOYÉ À GAUCHE POUR AFFICHER SES HEURES</h3>
                </div>
            </div>
        </div>
    </div>

    <div id="pin-manager-interface">
        <header>
            <h2 style="color:var(--alert); margin:0;">SÉCURITÉ : CODES STAFF</h2>
            <button class="btn-nav" onclick="backToHub()">🔙 RETOUR HUB</button>
        </header>
        <div style="background:var(--panel); border:1px solid #333; border-radius:12px; padding:20px; flex:1; overflow-y:auto;">
            <div id="pin-list-render" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap:15px;">
                </div>
        </div>
    </div>

    <div id="staff-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--hr); margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">CRÉER UN DOSSIER</h2>
            <div class="input-group"><label>Nom complet</label><input type="text" id="new-name" class="input-full" placeholder="ex: Vincent"></div>
            <div class="input-group"><label>Fonction / Poste</label><input type="text" id="new-role" class="input-full" placeholder="ex: Chef de Partie"></div>
            <div class="input-group"><label>Contrat (heures par semaine)</label><input type="number" id="new-contract" class="input-full" value="39"></div>
            
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeStaffModal()" style="flex:1; padding:10px; background:transparent; border:1px solid #555; color:#fff; border-radius:6px; cursor:pointer;">ANNULER</button>
                <button onclick="saveNewStaff()" style="flex:2; padding:10px; border:none; background:var(--hr); color:#fff; border-radius:6px; font-weight:bold; cursor:pointer;">VALIDER</button>
            </div>
        </div>
    </div>

    <script>
        let currentDept = null;
        let currentPin = "";
        const MASTER_PIN = "9999";

        // Moteur de base de données local
        function getDirectory() { return JSON.parse(localStorage.getItem('empire_hr_directory')) || []; }
        function saveDirectory(dir) { localStorage.setItem('empire_hr_directory', JSON.stringify(dir)); }

        // --- NAVIGATION INITIALE ---
        function openDeptSelection() { document.getElementById('dept-modal').style.display = 'flex'; }
        function closeDeptSelection() { document.getElementById('dept-modal').style.display = 'none'; }

        // --- GESTION DU CODE PIN ---
        function showPinPad(dept) {
            currentDept = dept;
            currentPin = "";
            document.getElementById('pin-display').innerText = "";
            document.getElementById('dept-modal').style.display = 'none';
            document.getElementById('pin-modal').style.display = 'flex';
            document.getElementById('pin-dept-title').innerText = "ACCÈS " + dept.toUpperCase();
        }

        function appendPin(n) {
            if(currentPin.length < 4) {
                currentPin += n;
                document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length);
            }
        }

        function cancelPin() {
            document.getElementById('pin-modal').style.display = 'none';
            document.getElementById('landing-portal').style.display = 'flex';
        }

        function submitPin() {
            if(currentPin === MASTER_PIN) {
                document.getElementById('pin-modal').style.display = 'none';
                document.getElementById('landing-portal').style.display = 'none';
                document.getElementById('director-hub').style.display = 'flex';
                document.getElementById('hub-dept-display').innerText = currentDept;
                
                // Précharge les données du département
                refreshViews();
            } else {
                alert("❌ CODE PIN INCORRECT");
                currentPin = "";
                document.getElementById('pin-display').innerText = "";
            }
        }

        // --- GESTION DU HUB ---
        function openInterface(type) {
            document.getElementById('director-hub').style.display = 'none';
            if(type === 'planning') {
                document.getElementById('hr-interface').style.display = 'flex';
            } else {
                document.getElementById('pin-manager-interface').style.display = 'flex';
            }
        }

        function backToHub() {
            document.getElementById('hr-interface').style.display = 'none';
            document.getElementById('pin-manager-interface').style.display = 'none';
            document.getElementById('director-hub').style.display = 'flex';
        }

        function fullLogout() {
            document.getElementById('director-hub').style.display = 'none';
            document.getElementById('landing-portal').style.display = 'flex';
            currentDept = null;
        }

        // --- LOGIQUE RH (NOUVEAU CONTRAT & LISTE) ---
        function openStaffModal() { 
            document.getElementById('new-name').value = '';
            document.getElementById('new-role').value = '';
            document.getElementById('staff-modal').style.display = 'flex'; 
        }
        function closeStaffModal() { document.getElementById('staff-modal').style.display = 'none'; }

        function saveNewStaff() {
            const name = document.getElementById('new-name').value.trim();
            const role = document.getElementById('new-role').value.trim();
            const contract = parseFloat(document.getElementById('new-contract').value) || 39;
            
            if(!name || !role) {
                alert("Erreur : Le nom et la fonction sont obligatoires.");
                return;
            }

            let dir = getDirectory();
            dir.push({ 
                id: Date.now(), 
                name: name, 
                role: role, 
                dept: currentDept, 
                contract: contract, 
                pin: '0000' 
            });
            saveDirectory(dir);
            closeStaffModal();
            refreshViews();
        }

        function deleteStaff(id, name) {
            if(confirm(`Supprimer définitivement le dossier de ${name} ?`)) {
                let dir = getDirectory().filter(s => s.id !== id);
                saveDirectory(dir);
                refreshViews();
            }
        }

        // --- MOTEUR D'AFFICHAGE ---
        function refreshViews() {
            const dir = getDirectory().filter(s => s.dept === currentDept);
            
            // 1. Rendu de la barre latérale (Planning)
            let staffHtml = '';
            if(dir.length === 0) {
                staffHtml = `<div style="text-align:center; color:#555; font-style:italic; margin-top:20px;">Aucun employé dans l'équipe ${currentDept.toUpperCase()}</div>`;
            } else {
                dir.forEach(staff => {
                    staffHtml += `
                    <div class="staff-card">
                        <div style="display:flex; justify-content:space-between;">
                            <span class="staff-name">${staff.name}</span>
                            <button onclick="deleteStaff(${staff.id}, '${staff.name}')" style="background:none; border:none; color:#555; cursor:pointer;">✕</button>
                        </div>
                        <div class="staff-role">${staff.role} - ${staff.contract}h/sem</div>
                    </div>`;
                });
            }
            document.getElementById('staff-list-render').innerHTML = staffHtml;

            // 2. Rendu de l'interface des codes PIN
            let pinHtml = '';
            if(dir.length === 0) {
                pinHtml = `<div style="color:var(--sub); grid-column: 1 / -1;">Aucun compte généré. Allez dans GÉRER LE PLANNING pour créer des profils.</div>`;
            } else {
                dir.forEach(staff => {
                    pinHtml += `
                    <div style="background: #0a0a0a; border: 1px solid #333; padding: 20px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <div style="font-weight: 900; font-size: 1.2rem; text-transform: uppercase;">${staff.name}</div>
                            <div style="font-size: 0.85rem; color: var(--sub); text-transform: uppercase;">${staff.role}</div>
                        </div>
                        <div style="display: flex; gap: 10px; align-items: center;">
                            <input type="text" id="pin-input-${staff.id}" value="${staff.pin}" maxlength="4" style="width: 70px; font-size: 1.5rem; text-align: center; font-weight: 900; background: #000; border: 2px solid #555; color: var(--alert); border-radius: 6px; padding: 5px;">
                            <button onclick="saveStaffPin(${staff.id}, '${staff.name}')" style="background: var(--alert); color: #fff; border: none; padding: 12px 20px; font-weight: bold; border-radius: 6px; cursor: pointer;">SAUVER</button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('pin-list-render').innerHTML = pinHtml;
        }

        // --- GESTION DES CODES PIN ---
        function saveStaffPin(staffId, staffName) {
            const newPin = document.getElementById(`pin-input-${staffId}`).value;
            
            if(!/^\d{4}$/.test(newPin)) {
                alert("❌ Erreur : Le code doit contenir exactement 4 chiffres.");
                return;
            }

            let dir = getDirectory();
            let idx = dir.findIndex(s => s.id === staffId);
            
            if(idx > -1) {
                dir[idx].pin = newPin;
                saveDirectory(dir);
                alert(`✅ Le code d'accès de ${staffName.toUpperCase()} a été mis à jour.`);
            }
        }
    </script>
</body>
</html>
