<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire RH - Gestion & Absences</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --warning: #ffa000; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; transition: 0.2s; }
        .btn-nav:hover { background: #222; border-color: var(--hr); }

        /* FORMULAIRE EMBAUCHE */
        .form-add { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 30px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.7rem; color: var(--sub); text-transform: uppercase; font-weight: bold; }
        .main-input { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; font-size: 0.9rem; }

        /* DOSSIERS SALARIÉS */
        .staff-folder { background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 25px; margin-bottom: 40px; border-left: 8px solid var(--hr); }
        .folder-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        
        /* PLANNING GRID */
        .planning-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 20px; }
        .day-card { background: #0a0a0a; border: 1px solid #222; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .day-card.status-absent { border-color: var(--alert); background: rgba(255, 23, 68, 0.05); }
        .day-name { display: block; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; font-weight: 900; margin-bottom: 10px; text-align: center;}
        
        .status-select { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 5px; border-radius: 4px; font-size: 0.75rem; margin-bottom: 10px; cursor: pointer; }
        .shift-input { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px 2px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 0.85rem; margin-bottom: 5px; box-sizing: border-box;}
        
        .obs-input { width: 100%; background: #111; border: none; border-bottom: 1px solid #333; color: #888; font-size: 0.7rem; padding: 5px; box-sizing: border-box; font-style: italic; margin-top: 10px;}
        .obs-input:focus { color: #fff; border-color: var(--hr); outline: none;}

        /* COMPTEUR FINAL */
        .total-bar { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px 25px; border-radius: 8px; border: 1px solid #222; }
        .total-hours { font-size: 1.8rem; font-weight: 900; }
        .total-hours.over-limit { color: var(--alert); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }

        .btn-del { color: #444; background: none; border: none; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase;}
        .btn-del:hover { color: var(--alert); }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color:var(--hr); margin:0; text-transform:uppercase; letter-spacing:2px;">👔 BUREAU RH & ABSENCES</h1>
            <p style="color:var(--sub); margin:5px 0 0 0; font-weight: bold;">PILOTAGE DE LA BRIGADE & JUSTIFICATIFS</p>
        </div>
        <a href="production.html" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">🔥 QUITTER BUREAU</a>
    </header>

    <div class="form-add">
        <div class="input-group">
            <label>Nom du Salarié</label>
            <input type="text" id="hr-name" class="main-input" placeholder="ex: Flavien">
        </div>
        <div class="input-group">
            <label>Contrat</label>
            <select id="hr-type" class="main-input">
                <option value="CDI">CDI</option>
                <option value="CDD">CDD</option>
                <option value="Apprenti">Apprenti</option>
                <option value="Extra">Extra</option>
            </select>
        </div>
        <div class="input-group">
            <label>Heures/Sem.</label>
            <input type="number" id="hr-contract" class="main-input" value="45">
        </div>
        <div class="input-group">
            <label>Taux (%)</label>
            <input type="number" id="hr-rate" class="main-input" value="100">
        </div>
        <button class="btn-nav" style="background:var(--hr); border:none; height:45px;" onclick="addStaff()">+ CRÉER LE DOSSIER</button>
    </div>

    <div id="staff-container"></div>

    <script>
        const jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];

        function getStaff() { return JSON.parse(localStorage.getItem('kds_hr_master_v6')) || []; }
        function saveStaff(s) { localStorage.setItem('kds_hr_master_v6', JSON.stringify(s)); renderStaff(); }

        function addStaff() {
            const name = document.getElementById('hr-name').value;
            const type = document.getElementById('hr-type').value;
            const contract = parseFloat(document.getElementById('hr-contract').value) || 45;
            const rate = parseFloat(document.getElementById('hr-rate').value) || 100;
            
            if(!name) return;
            const s = getStaff();
            s.push({
                id: Date.now(), name, type, contract, rate,
                plan: Array(7).fill().map(() => ({ 
                    s1: "09:15-14:30", 
                    s2: "15:00-22:00", 
                    status: "present", 
                    obs: "" 
                }))
            });
            saveStaff(s);
            document.getElementById('hr-name').value = '';
        }

        function updateData(id, dayIdx, field, val) {
            const s = getStaff(); 
            const idx = s.findIndex(x => x.id === id);
            s[idx].plan[dayIdx][field] = val;
            saveStaff(s);
        }

        function calculateH(shiftStr) {
            if(!shiftStr || !shiftStr.includes('-')) return 0;
            try {
                const t = shiftStr.split('-');
                const start = new Date(`2026-01-01T${t[0].trim()}:00`);
                const end = new Date(`2026-01-01T${t[1].trim()}:00`);
                let diff = (end - start) / (1000 * 60 * 60);
                return diff < 0 ? diff + 24 : diff;
            } catch(e) { return 0; }
        }

        function deleteStaff(id) { if(confirm("Supprimer définitivement ce dossier ?")) { const s = getStaff().filter(x => x.id !== id); saveStaff(s); } }

        function renderStaff() {
            const staff = getStaff();
            const container = document.getElementById('staff-container');
            container.innerHTML = staff.map(s => {
                let totalWeek = 0;
                const daysHTML = s.plan.map((p, i) => {
                    const h = (p.status === "present") ? (calculateH(p.s1) + calculateH(p.s2)) : 0;
                    totalWeek += h;
                    const isAbsent = p.status !== 'present' && p.status !== 'off';

                    return `
                    <div class="day-card ${isAbsent ? 'status-absent' : ''}">
                        <span class="day-name">${jours[i]}</span>
                        
                        <select class="status-select" onchange="updateData(${s.id}, ${i}, 'status', this.value)">
                            <option value="present" ${p.status === 'present' ? 'selected' : ''}>✅ PRÉSENT</option>
                            <option value="off" ${p.status === 'off' ? 'selected' : ''}>💤 JOUR OFF</option>
                            <option value="maladie" ${p.status === 'maladie' ? 'selected' : ''}>🤒 MALADIE</option>
                            <option value="accident" ${p.status === 'accident' ? 'selected' : ''}>⚠️ ACCIDENT TRAVAIL</option>
                            <option value="conge" ${p.status === 'conge' ? 'selected' : ''}>🏖️ CONGÉ PAYÉ</option>
                            <option value="injustifie" ${p.status === 'injustifie' ? 'selected' : ''}>❌ ABS. INJUSTIFIÉE</option>
                        </select>

                        <div style="display:${p.status === 'present' ? 'block' : 'none'}">
                            <input type="text" class="shift-input" value="${p.s1}" onchange="updateData(${s.id}, ${i}, 's1', this.value)">
                            <input type="text" class="shift-input" value="${p.s2}" style="color:#ea80fc" onchange="updateData(${s.id}, ${i}, 's2', this.value)">
                        </div>

                        <input type="text" class="obs-input" placeholder="Observations..." value="${p.obs || ''}" onchange="updateData(${s.id}, ${i}, 'obs', this.value)">
                    </div>`;
                }).join('');

                const isOver = totalWeek > s.contract;

                return `
                <div class="staff-folder">
                    <div class="folder-header">
                        <div>
                            <span style="font-size:1.5rem; font-weight:900; text-transform:uppercase;">${s.name}</span>
                            <div style="margin-top:5px;">
                                <span style="background:#222; color:var(--hr); padding:3px 10px; border-radius:4px; font-weight:bold; font-size:0.8rem;">${s.type}</span>
                                <span style="margin-left:10px; color:var(--sub); font-weight:bold; font-size:0.8rem;">CONTRAT: ${s.contract}H (${s.rate}%)</span>
                            </div>
                        </div>
                        <button class="btn-del" onclick="deleteStaff(${s.id})">EFFACER DOSSIER ✕</button>
                    </div>

                    <div class="planning-grid">${daysHTML}</div>

                    <div class="total-bar">
                        <div style="color:var(--sub); font-weight:bold; text-transform:uppercase; font-size:0.7rem;">Consommation réelle d'heures :</div>
                        <div class="total-hours ${isOver ? 'over-limit' : ''}">
                            ${totalWeek.toFixed(2)}H / ${s.contract}H
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        renderStaff();
    </script>
</body>
</html>
