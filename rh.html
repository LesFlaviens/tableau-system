<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire RH - Cockpit Planning</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; transition: 0.2s; cursor: pointer;}
        .btn-nav:hover { border-color: var(--hr); background: #222; }

        /* TABLEAU PLANNING STYLE PRO */
        .planning-container { width: 100%; overflow-x: auto; background: var(--panel); border-radius: 12px; border: 1px solid #333; }
        table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        th { background: #1a1a1a; padding: 15px; text-align: center; border-bottom: 2px solid #333; color: var(--sub); font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px;}
        td { border-bottom: 1px solid #222; padding: 10px; }
        
        .staff-cell { background: #0a0a0a; position: sticky; left: 0; min-width: 180px; z-index: 2; border-right: 2px solid #333; }
        .staff-info-name { font-weight: 900; font-size: 1rem; color: #fff; display: block;}
        .staff-info-contract { font-size: 0.7rem; color: var(--hr); font-weight: bold;}

        .shift-input { width: 90%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px; border-radius: 4px; text-align: center; font-weight: bold; font-size: 0.85rem; margin-bottom: 5px; }
        .shift-input:focus { border-color: var(--hr); outline: none; }
        .pause-input { width: 50px; background: transparent; border: 1px solid #222; color: #666; font-size: 0.7rem; text-align: center; border-radius: 4px; }

        .total-cell { background: #0a0a0a; font-weight: 900; text-align: center; font-size: 1.1rem; border-left: 2px solid #333;}
        .alert-ovt { color: var(--alert); animation: blink 2s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        /* MODAL AJOUT */
        .form-add { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 30px; display: flex; gap: 15px; align-items: flex-end; }
        .main-input { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; font-size: 0.9rem; flex: 1; }
        .btn-action { background: var(--hr); color: #fff; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; }

        .counter-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .counter-box { background: #0a0a0a; padding: 10px; border-radius: 6px; text-align: center; border: 1px solid #222; }
        .counter-box label { display: block; font-size: 0.6rem; color: var(--sub); text-transform: uppercase; margin-bottom: 5px; }
        .counter-box input { background: transparent; border: none; color: #fff; text-align: center; width: 100%; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color:var(--hr); margin:0; text-transform:uppercase; letter-spacing:2px;">👔 EMPIRE PLANNING (FAVUR-LIKE)</h1>
            <p style="color:var(--sub); margin:5px 0 0 0; font-size: 0.8rem; font-weight: bold;">CONTRÔLE TOTAL DES FLUX RH</p>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-nav" onclick="exportPlanning()">📤 EXPORT COMPTA</button>
            <a href="production.html" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">🔥 SORTIE</a>
        </div>
    </header>

    <div class="form-add">
        <input type="text" id="hr-name" class="main-input" placeholder="Nom du salarié">
        <input type="number" id="hr-contract" class="main-input" placeholder="Contrat (ex: 39)">
        <input type="number" id="hr-rate" class="main-input" placeholder="Taux (€/h)">
        <button class="btn-action" onclick="addStaff()">+ NOUVEAU SALARIÉ</button>
    </div>

    <div class="planning-container">
        <table>
            <thead>
                <tr>
                    <th class="staff-cell">Équipe</th>
                    <th>Lundi</th>
                    <th>Mardi</th>
                    <th>Mercredi</th>
                    <th>Jeudi</th>
                    <th>Vendredi</th>
                    <th>Samedi</th>
                    <th>Dimanche</th>
                    <th class="total-cell">Total Net</th>
                    <th>Compteurs</th>
                </tr>
            </thead>
            <tbody id="planning-body">
                </tbody>
        </table>
    </div>

    <script>
        const jours = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];

        function getStaff() { return JSON.parse(localStorage.getItem('kds_hr_master_v3')) || []; }
        function saveStaff(s) { localStorage.setItem('kds_hr_master_v3', JSON.stringify(s)); renderPlanning(); }

        function addStaff() {
            const name = document.getElementById('hr-name').value;
            const contract = parseFloat(document.getElementById('hr-contract').value) || 35;
            const rate = parseFloat(document.getElementById('hr-rate').value) || 12;
            if(!name) return;
            const s = getStaff();
            s.push({
                id: Date.now(), name, contract, rate,
                overtime: 0, cp: 0, jf: 0,
                shifts: Array(7).fill("08:00-16:00"), // Shift par défaut
                pauses: Array(7).fill(30) // 30 min par jour
            });
            saveStaff(s);
            document.getElementById('hr-name').value = '';
        }

        function updateShift(staffId, dayIdx, val) {
            const s = getStaff(); const idx = s.findIndex(x => x.id === staffId);
            s[idx].shifts[dayIdx] = val;
            saveStaff(s);
        }

        function updatePause(staffId, dayIdx, val) {
            const s = getStaff(); const idx = s.findIndex(x => x.id === staffId);
            s[idx].pauses[dayIdx] = parseInt(val) || 0;
            saveStaff(s);
        }

        function updateRH(id, field, val) {
            const s = getStaff(); const idx = s.findIndex(x => x.id === id);
            s[idx][field] = parseFloat(val) || 0;
            saveStaff(s);
        }

        function calculateHours(shiftStr, pauseMin) {
            try {
                const times = shiftStr.split('-');
                if(times.length !== 2) return 0;
                const start = new Date(`2026-01-01T${times[0].trim()}:00`);
                const end = new Date(`2026-01-01T${times[1].trim()}:00`);
                let diff = (end - start) / (1000 * 60 * 60); // Heures décimales
                if (diff < 0) diff += 24; // Gestion des shifts de nuit
                return Math.max(0, diff - (pauseMin / 60));
            } catch(e) { return 0; }
        }

        function deleteStaff(id) { if(confirm("Supprimer ce compte définitivement ?")) { const s = getStaff().filter(x => x.id !== id); saveStaff(s); } }

        function renderPlanning() {
            const staff = getStaff();
            const body = document.getElementById('planning-body');
            body.innerHTML = staff.map(s => {
                let totalWeek = 0;
                const dayHTML = s.shifts.map((shift, i) => {
                    const h = calculateHours(shift, s.pauses[i]);
                    totalWeek += h;
                    return `<td>
                        <input type="text" class="shift-input" value="${shift}" onchange="updateShift(${s.id}, ${i}, this.value)">
                        <div style="display:flex; align-items:center; justify-content:center; gap:5px;">
                            <span style="font-size:0.6rem; color:#555;">Pause:</span>
                            <input type="number" class="pause-input" value="${s.pauses[i]}" onchange="updatePause(${s.id}, ${i}, this.value)">
                        </div>
                    </td>`;
                }).join('');

                const isOver = totalWeek > s.contract;
                const cost = (totalWeek * s.rate).toFixed(2);

                return `
                <tr>
                    <td class="staff-cell">
                        <span class="staff-info-name">${s.name}</span>
                        <span class="staff-info-contract">${s.contract}H/SEM • ${s.rate}€/H</span>
                        <button onclick="deleteStaff(${s.id})" style="background:none; border:none; color:#333; cursor:pointer; font-size:0.6rem;">[SUPPRIMER]</button>
                    </td>
                    ${dayHTML}
                    <td class="total-cell ${isOver ? 'alert-ovt' : ''}">
                        ${totalWeek.toFixed(2)}h
                        <div style="font-size:0.6rem; color:var(--accent);">${cost}€ coût</div>
                    </td>
                    <td>
                        <div class="counter-grid">
                            <div class="counter-box"><label>Supp</label><input type="number" step="0.5" value="${s.overtime}" onchange="updateRH(${s.id}, 'overtime', this.value)"></div>
                            <div class="counter-box"><label>CP</label><input type="number" value="${s.cp}" onchange="updateRH(${s.id}, 'cp', this.value)"></div>
                            <div class="counter-box"><label>JF</label><input type="number" value="${s.jf}" onchange="updateRH(${s.id}, 'jf', this.value)"></div>
                        </div>
                    </td>
                </tr>`;
            }).join('');
        }

        function exportPlanning() {
            const blob = new Blob([JSON.stringify(getStaff(), null, 2)], { type: 'application/json' });
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'export_empire_planning.json'; a.click();
        }

        renderPlanning();
    </script>
</body>
</html>
