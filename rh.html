<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Direction des Ressources Humaines</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --warning: #ffa000; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box;}
        
        header { border-bottom: 2px solid #333; padding-bottom: 15px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;}
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; transition: 0.2s; text-transform: uppercase;}
        .btn-nav:hover { border-color: var(--hr); background: #222; }

        .main-container { display: flex; gap: 20px; flex: 1; overflow: hidden; }

        /* PANNEAU GAUCHE : LISTE DU STAFF */
        .staff-sidebar { width: 350px; background: var(--panel); border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .sidebar-header { padding: 20px; border-bottom: 1px solid #333; background: #0a0a0a; }
        .staff-list { flex: 1; overflow-y: auto; padding: 10px; }
        
        .staff-card { background: #161616; border: 1px solid #222; padding: 15px; border-radius: 8px; margin-bottom: 10px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
        .staff-card:hover { background: #1a1a1a; border-color: #444; }
        .staff-card.active { border-left-color: var(--hr); background: rgba(41, 121, 255, 0.05); border-right: 1px solid var(--hr); border-top: 1px solid var(--hr); border-bottom: 1px solid var(--hr);}
        
        .staff-name { font-size: 1.1rem; font-weight: 900; color: #fff; text-transform: uppercase; margin-bottom: 5px; }
        .staff-role { font-size: 0.7rem; color: var(--hr); text-transform: uppercase; font-weight: bold; margin-bottom: 10px;}
        .counters { display: flex; justify-content: space-between; font-size: 0.75rem; background: #000; padding: 8px; border-radius: 4px; border: 1px solid #222; }
        .counter-val.positive { color: var(--accent); font-weight: bold; }
        .counter-val.negative { color: var(--alert); font-weight: bold; }

        /* PANNEAU DROIT : FEUILLE DE TEMPS MENSUELLE */
        .month-view { flex: 1; background: var(--panel); border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; overflow: hidden; }
        .month-header { padding: 20px; border-bottom: 1px solid #333; background: #0a0a0a; display: flex; justify-content: space-between; align-items: center; }
        .month-selector { background: #000; border: 1px solid var(--hr); color: #fff; padding: 10px; border-radius: 6px; font-size: 1.1rem; font-weight: bold; font-family: 'Inter'; cursor: pointer;}
        
        .stats-bar { display: flex; gap: 20px; }
        .stat-box { background: #111; border: 1px solid #333; padding: 10px 20px; border-radius: 8px; text-align: center; }
        .stat-box label { display: block; font-size: 0.6rem; color: var(--sub); text-transform: uppercase; margin-bottom: 5px; font-weight: bold; }
        .stat-box span { font-size: 1.3rem; font-weight: 900; }

        .table-container { flex: 1; overflow-y: auto; padding: 0; }
        table { width: 100%; border-collapse: collapse; }
        th { position: sticky; top: 0; background: #1a1a1a; padding: 12px; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; border-bottom: 2px solid #333; z-index: 10;}
        td { padding: 8px 12px; border-bottom: 1px solid #222; text-align: center; vertical-align: middle; }
        tr:hover { background: #161616; }
        tr.weekend { background: rgba(255, 255, 255, 0.02); }

        .day-label { font-weight: 900; font-size: 0.9rem; }
        .date-label { font-size: 0.7rem; color: var(--sub); }
        
        .status-sel { background: #000; color: #fff; border: 1px solid #444; padding: 6px; border-radius: 4px; font-size: 0.8rem; font-weight: bold; cursor: pointer; width: 130px; }
        .status-sel:focus { border-color: var(--hr); outline: none; }
        
        .shift-inp { background: #000; border: 1px solid #333; color: var(--accent); padding: 6px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 0.85rem; width: 95px;}
        .shift-inp:disabled { opacity: 0.3; color: #666; border-color: #222; }
        
        .obs-inp { background: transparent; border: none; border-bottom: 1px dashed #444; color: #aaa; font-style: italic; font-size: 0.8rem; width: 90%; padding: 4px;}
        .obs-inp:focus { outline: none; color: #fff; border-bottom-color: var(--hr); }

        .day-total { font-weight: 900; color: var(--hr); font-size: 1rem; }

        /* MODAL AJOUT STAFF */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9000; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 400px; border-top: 5px solid var(--hr); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; margin-bottom: 5px; font-weight: bold;}
        .input-full { width: 100%; background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; font-size: 1rem; box-sizing: border-box;}
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color:var(--hr); margin:0; text-transform:uppercase; letter-spacing:2px;">👔 DIRECTION RH : LIVRE DE PAIE</h1>
            <p style="color:var(--sub); margin:5px 0 0 0; font-weight: bold;">GESTION DES CONTRATS & POINTAGE MENSUEL</p>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-nav" style="border-color:var(--accent); color:var(--accent);" onclick="closeMonth()">🔒 CLÔTURER LE MOIS (ARCHIVER)</button>
            <a href="production.html" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">🔥 RETOUR CUISINE</a>
        </div>
    </header>

    <div class="main-container">
        
        <div class="staff-sidebar">
            <div class="sidebar-header">
                <button onclick="openStaffModal()" style="width:100%; padding:12px; background:var(--hr); color:#fff; border:none; border-radius:6px; font-weight:900; cursor:pointer; text-transform:uppercase;">+ EMBAUCHER (NOUVEAU DOSSIER)</button>
            </div>
            <div class="staff-list" id="staff-list-container">
                </div>
        </div>

        <div class="month-view" id="month-view-container" style="display: none;">
            <div class="month-header">
                <input type="month" id="month-selector" class="month-selector" onchange="loadMonthData()">
                
                <div class="stats-bar">
                    <div class="stat-box">
                        <label>Heures Contrat (Mois)</label>
                        <span id="stat-expected" style="color:var(--sub);">0.0h</span>
                    </div>
                    <div class="stat-box">
                        <label>Heures Pointées</label>
                        <span id="stat-actual" style="color:#fff;">0.0h</span>
                    </div>
                    <div class="stat-box" style="border-color:var(--hr);">
                        <label>Bilan Mensuel (+/-)</label>
                        <span id="stat-diff" style="color:var(--hr);">0.0h</span>
                    </div>
                </div>
            </div>
            
            <div class="table-container">
                <table id="timesheet-table">
                    <thead>
                        <tr>
                            <th style="width: 80px;">Date</th>
                            <th style="width: 150px;">État (Présence)</th>
                            <th>Matin (S1)</th>
                            <th>Soir (S2)</th>
                            <th style="width: 80px;">Total</th>
                            <th>Observations RH / Motifs</th>
                        </tr>
                    </thead>
                    <tbody id="timesheet-body">
                        </tbody>
                </table>
            </div>
        </div>

        <div id="empty-state" style="flex:1; display:flex; justify-content:center; align-items:center; color:#555; font-size:1.2rem; font-weight:bold; border:1px dashed #333; border-radius:12px;">
            SÉLECTIONNEZ UN SALARIÉ POUR AFFICHER SON POINTAGE
        </div>

    </div>

    <div id="staff-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--hr); margin-top:0; border-bottom:1px solid #333; padding-bottom:10px;">CRÉER UN DOSSIER</h2>
            <div class="input-group"><label>Nom complet</label><input type="text" id="new-name" class="input-full" placeholder="ex: Vincent"></div>
            <div class="input-group"><label>Fonction / Poste</label><input type="text" id="new-role" class="input-full" placeholder="ex: Chef de Partie"></div>
            <div style="display:flex; gap:10px;">
                <div class="input-group" style="flex:1;"><label>Contrat (h/sem)</label><input type="number" id="new-contract" class="input-full" value="45"></div>
                <div class="input-group" style="flex:1;"><label>Taux Horaire (€)</label><input type="number" step="0.5" id="new-rate" class="input-full" value="15.0"></div>
            </div>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="closeStaffModal()" style="flex:1; padding:12px; background:transparent; border:1px solid #555; color:#fff; border-radius:6px; cursor:pointer;">ANNULER</button>
                <button onclick="saveNewStaff()" style="flex:2; padding:12px; background:var(--hr); border:none; color:#fff; border-radius:6px; font-weight:bold; cursor:pointer;">VALIDER L'EMBAUCHE</button>
            </div>
        </div>
    </div>

    <script>
        // --- BASE DE DONNÉES EMPIRE RH ---
        // Clé 1 : staff_directory (Liste inaltérable du personnel avec compteurs)
        // Clé 2 : staff_timesheets (Planning mensuel : YYYY-MM -> ID -> Days)
        
        let currentStaffId = null;
        const daysOfWeek = ["Dim", "Lun", "Mar", "Mer", "Jeu", "Ven", "Sam"];

        function init() {
            const today = new Date();
            document.getElementById('month-selector').value = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2, '0')}`;
            renderStaffList();
        }

        // --- GESTION DU PERSONNEL (FICHE MAÎTRE) ---
        function getDirectory() { return JSON.parse(localStorage.getItem('empire_hr_directory')) || []; }
        function saveDirectory(dir) { localStorage.setItem('empire_hr_directory', JSON.stringify(dir)); renderStaffList(); }

        function openStaffModal() { document.getElementById('staff-modal').style.display = 'flex'; }
        function closeStaffModal() { document.getElementById('staff-modal').style.display = 'none'; }
        
        function saveNewStaff() {
            const name = document.getElementById('new-name').value.trim();
            const role = document.getElementById('new-role').value.trim();
            const contract = parseFloat(document.getElementById('new-contract').value) || 45;
            const rate = parseFloat(document.getElementById('new-rate').value) || 15;
            if(!name || !role) return alert("Nom et Fonction requis.");

            const dir = getDirectory();
            dir.push({
                id: Date.now(), name, role, contract, rate,
                balanceHours: 0, balanceCP: 0, balanceJF: 0
            });
            saveDirectory(dir);
            closeStaffModal();
        }

        function deleteStaff(id, name) {
            if(confirm(`Archiver définitivement le dossier de ${name} ?`)) {
                saveDirectory(getDirectory().filter(s => s.id !== id));
                if(currentStaffId === id) {
                    currentStaffId = null;
                    document.getElementById('month-view-container').style.display = 'none';
                    document.getElementById('empty-state').style.display = 'flex';
                }
            }
        }

        function renderStaffList() {
            const dir = getDirectory();
            document.getElementById('staff-list-container').innerHTML = dir.map(s => {
                const balClass = s.balanceHours >= 0 ? 'positive' : 'negative';
                const balSign = s.balanceHours > 0 ? '+' : '';
                return `
                <div class="staff-card ${s.id === currentStaffId ? 'active' : ''}" onclick="selectStaff(${s.id})">
                    <div style="display:flex; justify-content:space-between;">
                        <span class="staff-name">${s.name}</span>
                        <button onclick="event.stopPropagation(); deleteStaff(${s.id}, '${s.name}')" style="background:none; border:none; color:#555; cursor:pointer;">✕</button>
                    </div>
                    <div class="staff-role">${s.role} - ${s.contract}h/sem</div>
                    <div class="counters">
                        <span>Solde Heures: <b class="counter-val ${balClass}">${balSign}${s.balanceHours.toFixed(1)}h</b></span>
                        <span>CP: <b>${s.balanceCP}j</b></span>
                    </div>
                </div>`;
            }).join('');
            
            // Mise à jour synchro KDS (Format réduit pour la cuisine)
            const kdsSync = dir.map(s => ({ name: s.name, contract: s.contract, cp: s.balanceCP, plan: Array(7).fill({status:'present'}) }));
            localStorage.setItem('kds_hr_master_v9', JSON.stringify(kdsSync));
        }

        function selectStaff(id) {
            currentStaffId = id;
            document.getElementById('empty-state').style.display = 'none';
            document.getElementById('month-view-container').style.display = 'flex';
            renderStaffList(); // Actualise l'état visuel "active"
            loadMonthData();
        }

        // --- GESTION DU POINTAGE MENSUEL ---
        function getTimesheets() { return JSON.parse(localStorage.getItem('empire_hr_timesheets')) || {}; }
        function saveTimesheets(ts) { localStorage.setItem('empire_hr_timesheets', JSON.stringify(ts)); }

        function loadMonthData() {
            if(!currentStaffId) return;
            const monthStr = document.getElementById('month-selector').value; // ex: "2026-03"
            const [year, month] = monthStr.split('-');
            const daysInMonth = new Date(year, month, 0).getDate();
            
            const ts = getTimesheets();
            if(!ts[monthStr]) ts[monthStr] = {};
            if(!ts[monthStr][currentStaffId]) {
                // Initialisation du mois avec les shifts par défaut (Matin & Soir)
                ts[monthStr][currentStaffId] = {};
                for(let i=1; i<=daysInMonth; i++) {
                    ts[monthStr][currentStaffId][i] = { status: 'present', s1: '09:15-14:30', s2: '15:00-22:00', obs: '' };
                }
                saveTimesheets(ts);
            }
            renderTimesheet(year, month, daysInMonth, ts[monthStr][currentStaffId]);
        }

        function updateDay(day, field, val) {
            const monthStr = document.getElementById('month-selector').value;
            const ts = getTimesheets();
            ts[monthStr][currentStaffId][day][field] = val;
            saveTimesheets(ts);
            loadMonthData(); // Re-render pour calculs totaux
        }

        function calculateH(shiftStr) {
            if(!shiftStr || !shiftStr.includes('-')) return 0;
            try {
                const t = shiftStr.split('-');
                const start = new Date(`2026-01-01T${t[0].trim()}:00`);
                const end = new Date(`2026-01-01T${t[1].trim()}:00`);
                let diff = (end - start) / (1000 * 60 * 60);
                return diff < 0 ? diff + 24 : diff;
            } catch(e) { return 0; }
        }

        function renderTimesheet(year, month, daysInMonth, monthData) {
            const tbody = document.getElementById('timesheet-body');
            let html = '';
            let totalHoursActual = 0;

            for(let d=1; d<=daysInMonth; d++) {
                const dateObj = new Date(year, month-1, d);
                const dayOfWeek = dateObj.getDay();
                const isWeekend = (dayOfWeek === 0 || dayOfWeek === 6);
                const dayName = daysOfWeek[dayOfWeek];
                
                const data = monthData[d];
                
                // Calcul journalier
                let hDay = 0;
                if(data.status === 'present') hDay = calculateH(data.s1) + calculateH(data.s2);
                else if(data.status === 'off_matin') hDay = calculateH(data.s2);
                else if(data.status === 'off_soir') hDay = calculateH(data.s1);
                
                totalHoursActual += hDay;

                const disableS1 = (data.status !== 'present' && data.status !== 'off_soir');
                const disableS2 = (data.status !== 'present' && data.status !== 'off_matin');
                const isOffDay = (data.status === 'off' || data.status === 'maladie' || data.status === 'conge');

                html += `
                <tr class="${isWeekend ? 'weekend' : ''}" style="${isOffDay ? 'opacity:0.6;' : ''}">
                    <td>
                        <span class="day-label">${dayName}</span><br>
                        <span class="date-label">${String(d).padStart(2,'0')}/${month}</span>
                    </td>
                    <td>
                        <select class="status-sel" style="border-color:${isOffDay ? '#444' : 'var(--hr)'}" onchange="updateDay(${d}, 'status', this.value)">
                            <option value="present" ${data.status==='present'?'selected':''}>✅ PRÉSENT</option>
                            <option value="off_matin" ${data.status==='off_matin'?'selected':''}>☀️ OFF MATIN</option>
                            <option value="off_soir" ${data.status==='off_soir'?'selected':''}>🌙 OFF SOIR</option>
                            <option value="off" ${data.status==='off'?'selected':''}>💤 OFF</option>
                            <option value="conge" ${data.status==='conge'?'selected':''}>🏖️ CONGÉ PAYÉ</option>
                            <option value="maladie" ${data.status==='maladie'?'selected':''}>🤒 MALADIE / ABS</option>
                        </select>
                    </td>
                    <td><input type="text" class="shift-inp" value="${data.s1}" ${disableS1 ? 'disabled' : ''} onchange="updateDay(${d}, 's1', this.value)"></td>
                    <td><input type="text" class="shift-inp" value="${data.s2}" ${disableS2 ? 'disabled' : ''} onchange="updateDay(${d}, 's2', this.value)"></td>
                    <td class="day-total">${hDay > 0 ? hDay.toFixed(1)+'h' : '-'}</td>
                    <td><input type="text" class="obs-inp" placeholder="Motif, retard..." value="${data.obs}" onchange="updateDay(${d}, 'obs', this.value)"></td>
                </tr>`;
            }
            tbody.innerHTML = html;

            // Calcul de la différence par rapport au contrat
            const staffData = getDirectory().find(s => s.id === currentStaffId);
            // Attendu mensuel = (Heures Hebdo / 7) * Nbr jours dans le mois (Calcul ultra précis)
            const expectedHours = (staffData.contract / 7) * daysInMonth;
            const diff = totalHoursActual - expectedHours;

            document.getElementById('stat-expected').textContent = expectedHours.toFixed(1) + "h";
            document.getElementById('stat-actual').textContent = totalHoursActual.toFixed(1) + "h";
            
            const diffEl = document.getElementById('stat-diff');
            diffEl.textContent = (diff > 0 ? '+' : '') + diff.toFixed(1) + "h";
            diffEl.style.color = diff > 0 ? 'var(--alert)' : (diff < -5 ? 'var(--warning)' : 'var(--accent)');
        }

        // --- CLÔTURE MENSUELLE ---
        function closeMonth() {
            if(!currentStaffId) return alert("Sélectionnez d'abord un employé à clôturer.");
            const monthStr = document.getElementById('month-selector').value;
            
            if(confirm(`Êtes-vous sûr de vouloir clôturer le mois de ${monthStr} pour cet employé ? Les heures supplémentaires seront transférées dans son solde global.`)) {
                const diff = parseFloat(document.getElementById('stat-diff').textContent);
                
                const dir = getDirectory();
                const idx = dir.findIndex(s => s.id === currentStaffId);
                
                // On ajoute la différence au compteur global de l'employé
                dir[idx].balanceHours += diff;
                saveDirectory(dir);
                
                alert(`Mois clôturé ! ${diff > 0 ? '+'+diff.toFixed(1) : diff.toFixed(1)}h transférées dans le solde de ${dir[idx].name}.`);
            }
        }

        init();
    </script>
</body>
</html>
