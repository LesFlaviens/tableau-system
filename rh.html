<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Direction RH & Planning</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --alert: #ff1744; --text: #fff; --panel: #111; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        header { border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; transition: 0.2s; }
        .btn-nav:hover { background: #333; border-color: var(--hr); }
        .dashboard-grid { display: grid; grid-template-columns: 1fr; gap: 25px; }
        .card { background: var(--panel); border: 1px solid #333; border-top: 5px solid var(--hr); padding: 20px; border-radius: 12px; }
        .planning-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 20px; background: #000; padding: 15px; border-radius: 8px; }
        .day-box { text-align: center; }
        .day-label { display: block; font-size: 0.7rem; color: #888; text-transform: uppercase; font-weight: 900; margin-bottom: 5px; }
        .day-input { width: 100%; background: #111; border: 1px solid #333; color: #fff; padding: 10px 5px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 1.1rem; }
        .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .stat-box { background: #0a0a0a; border: 1px solid #222; padding: 10px; border-radius: 6px; text-align: center; }
        .stat-box label { display: block; font-size: 0.6rem; color: #aaa; text-transform: uppercase; margin-bottom: 3px; font-weight: bold; }
        .stat-box span { font-size: 1.3rem; font-weight: 900; color: #fff; }
        .form-add { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 30px; display: flex; gap: 15px; align-items: flex-end; }
        .main-input { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; font-size: 1rem; flex: 1; }
        .btn-action { background: var(--hr); color: #fff; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 900; cursor: pointer; text-transform: uppercase; }
    </style>
</head>
<body>
    <header>
        <h1 style="color:var(--hr); margin:0; text-transform:uppercase;">👔 PLANNING RH</h1>
        <a href="production.html" class="btn-nav">🔥 RETOUR CUISINE</a>
    </header>

    <div class="form-add">
        <input type="text" id="hr-name" class="main-input" placeholder="Nom du Salarié">
        <input type="number" id="hr-contract" class="main-input" placeholder="Contrat (h)">
        <input type="number" id="hr-rate" class="main-input" placeholder="Taux (€/h)">
        <button class="btn-action" onclick="addStaff()">AJOUTER</button>
    </div>

    <div id="hr-staff-container" class="dashboard-grid"></div>

    <script>
        const jours = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
        function getStaff() { return JSON.parse(localStorage.getItem('kds_hr_staff_master')) || []; }
        function saveStaff(s) { localStorage.setItem('kds_hr_staff_master', JSON.stringify(s)); renderStaff(); }

        function addStaff() {
            const name = document.getElementById('hr-name').value;
            const contract = parseFloat(document.getElementById('hr-contract').value) || 35;
            const rate = parseFloat(document.getElementById('hr-rate').value) || 12;
            if(!name) return;
            const s = getStaff();
            s.push({ id: Date.now(), name, contract, rate, overtime: 0, cp: 0, jf: 0, planning: [0,0,0,0,0,0,0] });
            saveStaff(s);
            document.getElementById('hr-name').value = '';
        }

        function updateDay(id, dayIdx, val) {
            const s = getStaff(); const i = s.findIndex(x => x.id === id);
            s[i].planning[dayIdx] = parseFloat(val) || 0;
            saveStaff(s);
        }

        function updateRH(id, field, val) {
            const s = getStaff(); const i = s.findIndex(x => x.id === id);
            s[i][field] = parseFloat(val) || 0;
            saveStaff(s);
        }

        function renderStaff() {
            const staff = getStaff();
            document.getElementById('hr-staff-container').innerHTML = staff.map(s => {
                const total = s.planning.reduce((a,b)=>a+b, 0);
                const diff = total - s.contract;
                return `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:15px;">
                        <span class="staff-name">${s.name}</span>
                        <span style="color:#666; font-size:0.8rem;">Contrat: ${s.contract}h | ${s.rate}€/h</span>
                    </div>
                    <div class="planning-grid">
                        ${jours.map((j, i) => `<div class="day-box"><label class="day-label">${j}</label><input type="number" class="day-input" value="${s.planning[i]}" onchange="updateDay(${s.id}, ${i}, this.value)"></div>`).join('')}
                    </div>
                    <div class="stat-grid">
                        <div class="stat-box"><label>Total Sem.</label><span style="color:${diff>0?'var(--alert)':'#00e676'}">${total}h</span></div>
                        <div class="stat-box"><label>Heures Supp.</label><input type="number" class="day-input" value="${s.overtime}" onchange="updateRH(${s.id}, 'overtime', this.value)"></div>
                        <div class="stat-box"><label>Congés (CP)</label><input type="number" class="day-input" value="${s.cp}" onchange="updateRH(${s.id}, 'cp', this.value)"></div>
