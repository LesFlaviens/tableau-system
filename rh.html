<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire RH - Cockpit Stratégique</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --half: #ffa000; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; transition: 0.2s; }
        .btn-nav:hover { background: #222; border-color: var(--hr); }

        /* FORMULAIRE EMBAUCHE */
        .form-add { background: #111; border: 1px solid #333; padding: 20px; border-radius: 12px; margin-bottom: 30px; display: grid; grid-template-columns: 2fr 1fr 1fr 1fr 1fr; gap: 15px; align-items: flex-end; }
        .input-group { display: flex; flex-direction: column; gap: 5px; }
        .input-group label { font-size: 0.7rem; color: var(--sub); text-transform: uppercase; font-weight: bold; }
        .main-input { background: #000; border: 1px solid #444; color: #fff; padding: 12px; border-radius: 6px; font-size: 0.9rem; }

        /* DOSSIERS SALARIÉS */
        .staff-folder { background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 25px; margin-bottom: 40px; border-left: 8px solid var(--hr); position: relative;}
        .folder-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 15px; }
        
        /* PLANNING GRID */
        .planning-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 10px; margin-bottom: 20px; }
        .day-card { background: #0a0a0a; border: 1px solid #222; padding: 10px; border-radius: 8px; transition: 0.3s; }
        .day-card.status-half { border-color: var(--half); background: rgba(255, 160, 0, 0.05); }
        .day-card.status-off { border-color: var(--alert); background: rgba(255, 23, 68, 0.05); }
        .day-name { display: block; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; font-weight: 900; margin-bottom: 10px; text-align: center;}
        
        .status-select { width: 100%; background: #1a1a1a; color: #fff; border: 1px solid #333; padding: 5px; border-radius: 4px; font-size: 0.7rem; margin-bottom: 10px; cursor: pointer; font-weight: bold;}
        .shift-input { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 8px 2px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 0.8rem; margin-bottom: 5px; box-sizing: border-box;}
        .shift-hidden { opacity: 0.2; pointer-events: none; filter: grayscale(1); }
        
        .obs-input { width: 100%; background: #111; border: none; border-bottom: 1px solid #333; color: #888; font-size: 0.7rem; padding: 5px; box-sizing: border-box; font-style: italic; margin-top: 10px;}

        /* COMPTEUR FINAL */
        .total-bar { display: flex; justify-content: space-between; align-items: center; background: #000; padding: 15px 25px; border-radius: 8px; border: 1px solid #222; }
        .total-hours { font-size: 1.8rem; font-weight: 900; }
        .total-hours.over-limit { color: var(--alert); animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .btn-del { color: #444; background: none; border: none; cursor: pointer; font-weight: bold; font-size: 0.7rem; text-transform: uppercase;}
        .btn-del:hover { color: var(--alert); }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color:var(--hr); margin:0; text-transform:uppercase; letter-spacing:2px;">👔 BUREAU RH EMPIRE</h1>
            <p style="color:var(--sub); margin:5px 0 0 0; font-weight: bold;">FLEXIBILITÉ SHIFTS & DEMI-OFFS</p>
        </div>
        <div style="display:flex; gap:10px;">
            <button class="btn-nav" onclick="exportJSON()">📤 EXPORT COMPTA</button>
            <a href="production.html" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">🔥 RETOUR CUISINE</a>
        </div>
    </header>

    <div class="form-add">
        <div class="input-group">
            <label>Prénom / Nom</label>
            <input type="text" id="hr-name" class="main-input" placeholder="ex: Flavien">
        </div>
        <div class="input-group">
            <label>Type Contrat</label>
            <select id="hr-type" class="main-input">
                <option value="CDI">CDI</option>
                <option value="CDD">CDD</option>
                <option value="Apprenti">Apprenti</option>
                <option value="Extra">Extra</option>
            </select>
        </div>
        <div class="input-group">
            <label>Heures Contrat</label>
            <input type="number" id="hr-contract" class="main-input" value="45">
        </div>
        <div class="input-group">
            <label>Salaire/h ou Taux %</label>
            <input type="number" id="hr-rate" class="main-input" value="100">
        </div>
        <button class="btn-nav" style="background:var(--hr); border:none; height:45px;" onclick="addStaff()">+ NOUVEAU DOSSIER</button>
    </div>

    <div id="staff-container"></div>

    <script>
        const jours = ["Lundi", "Mardi", "Mercredi", "Jeudi", "Vendredi", "Samedi", "Dimanche"];

        function getStaff() { return JSON.parse(localStorage.getItem('kds_hr_master_v7')) || []; }
        function saveStaff(s) { localStorage.setItem('kds_hr_master_v7', JSON.stringify(s)); renderStaff(); }

        function addStaff() {
            const name = document.getElementById('hr-name').value;
            const type = document.getElementById('hr-type').value;
            const contract = parseFloat(document.getElementById('hr-contract').value) || 45;
            const rate = parseFloat(document.getElementById('hr-rate').value) || 100;
            
            if(!name) return;
            const s = getStaff();
            s.push({
                id: Date.now(), name, type, contract, rate,
                plan: Array(7).fill().map(() => ({ 
                    s1: "09:15-14:30", 
                    s2: "15:00-22:00", 
                    status: "present", 
                    obs: "" 
                }))
            });
            saveStaff(s);
            document.getElementById('hr-name').value = '';
        }

        function updateData(id, dayIdx, field, val) {
            const s = getStaff(); 
            const idx = s.findIndex(x => x.id === id);
            s[idx].plan[dayIdx][field] = val;
            saveStaff(s);
        }

        function calculateH(shiftStr) {
            if(!shiftStr || !shiftStr.includes('-')) return 0;
            try {
                const t = shiftStr.split('-');
                const start = new Date(`2026-01-01T${t[0].trim()}:00`);
                const end = new Date(`2026-01-01T${t[1].trim()}:00`);
                let diff = (end - start) / (1000 * 60 * 60);
                return diff < 0 ? diff + 24 : diff;
            } catch(e) { return 0; }
        }

        function deleteStaff(id) { if(confirm("Supprimer ce dossier ?")) { const s = getStaff().filter(x => x.id !== id); saveStaff(s); } }

        function renderStaff() {
            const staff = getStaff();
            const container = document.getElementById('staff-container');
            container.innerHTML = staff.map(s => {
                let totalWeek = 0;
                const daysHTML = s.plan.map((p, i) => {
                    let hDay = 0;
                    if (p.status === "present") hDay = calculateH(p.s1) + calculateH(p.s2);
                    else if (p.status === "off_matin") hDay = calculateH(p.s2);
                    else if (p.status === "off_soir") hDay = calculateH(p.s1);
                    
                    totalWeek += hDay;

                    const isHalf = p.status === 'off_matin' || p.status === 'off_soir';
                    const isOff = p.status === 'off';
                    const cardClass = isHalf ? 'status-half' : (isOff || p.status !== 'present' ? 'status-off' : '');

                    return `
                    <div class="day-card ${cardClass}">
                        <span class="day-name">${jours[i]}</span>
                        
                        <select class="status-select" onchange="updateData(${s.id}, ${i}, 'status', this.value)">
                            <option value="present" ${p.status === 'present' ? 'selected' : ''}>✅ PRÉSENT</option>
                            <option value="off_matin" ${p.status === 'off_matin' ? 'selected' : ''}>☀️ OFF MATIN</option>
                            <option value="off_soir" ${p.status === 'off_soir' ? 'selected' : ''}>🌙 OFF SOIR</option>
                            <option value="off" ${p.status === 'off' ? 'selected' : ''}>💤 JOUR OFF</option>
                            <option value="maladie" ${p.status === 'maladie' ? 'selected' : ''}>🤒 MALADIE</option>
                            <option value="accident" ${p.status === 'accident' ? 'selected' : ''}>⚠️ ACCIDENT</option>
                        </select>

                        <div style="display:${(p.status === 'present' || isHalf) ? 'block' : 'none'}">
                            <input type="text" class="shift-input ${p.status === 'off_matin' ? 'shift-hidden' : ''}" 
                                   value="${p.s1}" onchange="updateData(${s.id}, ${i}, 's1', this.value)">
                            
                            <input type="text" class="shift-input ${p.status === 'off_soir' ? 'shift-hidden' : ''}" 
                                   style="color:#ea80fc" value="${p.s2}" onchange="updateData(${s.id}, ${i}, 's2', this.value)">
                        </div>

                        <input type="text" class="obs-input" placeholder="Notes..." value="${p.obs || ''}" onchange="updateData(${s.id}, ${i}, 'obs', this.value)">
                    </div>`;
                }).join('');

                const isOver = totalWeek > s.contract;

                return `
                <div class="staff-folder">
                    <div class="folder-header">
                        <div>
                            <span style="font-size:1.5rem; font-weight:900; text-transform:uppercase;">${s.name}</span>
                            <div style="margin-top:5px;">
                                <span style="color:var(--hr); font-weight:bold;">${s.type}</span>
                                <span style="margin-left:15px; color:var(--sub); font-size:0.8rem;">BASE: ${s.contract}H/sem</span>
                            </div>
                        </div>
                        <button class="btn-del" onclick="deleteStaff(${s.id})">SUPPRIMER ✕</button>
                    </div>

                    <div class="planning-grid">${daysHTML}</div>

                    <div class="total-bar">
                        <div style="color:var(--sub); font-weight:bold; font-size:0.7rem;">TOTAL RÉEL SEMAINE :</div>
                        <div class="total-hours ${isOver ? 'over-limit' : ''}">
                            ${totalWeek.toFixed(2)}H <span style="font-size:1rem; color:#444;">/ ${s.contract}H</span>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function exportJSON() {
            const data = localStorage.getItem('kds_hr_master_v7');
            const blob = new Blob([data], {type: 'application/json'});
            const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'empire_rh_export.json'; a.click();
        }

        renderStaff();
    </script>
</body>
</html>
