<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire RH - Cockpit de Modulation</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --warning: #ffa000; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; }

        /* BARRE D'AIDE À LA MODULATION (L'ASSISTANT) */
        .smart-assistant { background: #111; border: 2px solid var(--hr); border-radius: 12px; padding: 20px; margin-bottom: 30px; display: flex; align-items: center; gap: 30px; box-shadow: 0 0 20px rgba(41, 121, 255, 0.1); }
        .stat-box { flex: 1; text-align: center; }
        .stat-label { display: block; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; font-weight: 900; margin-bottom: 5px; }
        .stat-val { font-size: 1.5rem; font-weight: 900; color: #fff; }
        .stat-suggestion { font-size: 0.9rem; font-weight: bold; color: var(--accent); margin-top: 10px; padding: 10px; border-radius: 6px; background: rgba(0, 230, 118, 0.1); border: 1px solid rgba(0, 230, 118, 0.2); }

        /* TABS */
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { flex: 1; padding: 12px; background: #111; border: 1px solid #333; color: #888; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 8px; }
        .tab-btn.active { border-color: var(--hr); color: #fff; background: #1a1a1a; }

        .section-content { display: none; }
        .section-content.active { display: block; }

        /* PLANNING GRID */
        .staff-folder { background: var(--panel); border: 1px solid #333; border-radius: 12px; padding: 20px; margin-bottom: 25px; border-left: 6px solid var(--hr); }
        .planning-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-top: 15px; }
        .day-card { background: #0a0a0a; border: 1px solid #222; padding: 8px; border-radius: 6px; text-align: center; }
        .day-name { display: block; font-size: 0.6rem; color: var(--sub); text-transform: uppercase; font-weight: 900; margin-bottom: 5px; }
        
        .status-select { width: 100%; background: #111; color: #fff; border: 1px solid #333; padding: 4px; border-radius: 4px; font-size: 0.65rem; margin-bottom: 5px; }
        .shift-input { width: 100%; background: #000; border: 1px solid #333; color: var(--accent); padding: 5px; text-align: center; border-radius: 4px; font-weight: bold; font-size: 0.75rem; margin-bottom: 3px; }

        .total-hours { font-size: 1.2rem; font-weight: 900; color: var(--accent); }
        .total-hours.over { color: var(--alert); }

        .input-mini { background: #000; border: 1px solid #444; color: var(--accent); padding: 5px; border-radius: 4px; font-weight: 900; width: 80px; text-align: center; font-size: 1.2rem;}
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color:var(--hr); margin:0; text-transform:uppercase; letter-spacing:2px;">👔 BUREAU RH & MODULATION</h1>
            <p style="color:var(--sub); margin:5px 0 0 0; font-weight: bold;">OPTIMISATION DE LA MASSE SALARIALE</p>
        </div>
        <a href="production.html" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">🔥 RETOUR CUISINE</a>
    </header>

    <div class="smart-assistant">
        <div class="stat-box">
            <label class="stat-label">Couverts Prévus (Semaine)</label>
            <input type="number" id="forecast-covers" class="input-mini" value="150" onchange="updateModulation()">
        </div>
        <div class="stat-box" style="border-left: 1px solid #333; border-right: 1px solid #333;">
            <label class="stat-label">Heures Planifiées</label>
            <div id="total-planned-hours" class="stat-val">0.0h</div>
        </div>
        <div class="stat-box">
            <label class="stat-label">Ratio Productivité</label>
            <div id="productivity-ratio" class="stat-val" style="color:var(--accent);">0.0</div>
            <span style="font-size:0.6rem; color:var(--sub);">Couverts / Heure</span>
        </div>
        <div id="smart-advice" class="stat-suggestion" style="flex: 2;">
            L'assistant analyse vos données...
        </div>
    </div>

    <div class="tabs">
        <button class="tab-btn active">👔 Planning & Modulation</button>
        <button class="tab-btn" onclick="openFoodCost()">📄 Laboratoire Food Cost</button>
    </div>

    <div id="staff-container"></div>
    <button onclick="addNewStaff()" class="btn-nav" style="margin-top: 10px; background:var(--hr); border:none; width:100%; padding:15px;">+ AJOUTER UN SALARIÉ AU PLANNING</button>

    <script>
        const jours = ["Lun", "Mar", "Mer", "Jeu", "Ven", "Sam", "Dim"];
        const RATIO_CIBLE = 2.5; // Cible : 2.5 couverts produits par heure de travail

        function getStaff() { return JSON.parse(localStorage.getItem('kds_hr_master_v8')) || []; }
        function saveStaff(s) { localStorage.setItem('kds_hr_master_v8', JSON.stringify(s)); renderStaff(); updateModulation(); }

        function addNewStaff() {
            const name = prompt("Nom du salarié :"); if(!name) return;
            const s = getStaff();
            s.push({ id: Date.now(), name, contract: 45, plan: Array(7).fill().map(() => ({ s1: "09:15-14:30", s2: "15:00-22:00", status: "present" })) });
            saveStaff(s);
        }

        function updateData(id, dayIdx, field, val) {
            const s = getStaff(); const idx = s.findIndex(x => x.id === id);
            s[idx].plan[dayIdx][field] = val;
            saveStaff(s);
        }

        function calculateH(shiftStr) {
            if(!shiftStr || !shiftStr.includes('-')) return 0;
            const t = shiftStr.split('-');
            const start = new Date(`2026-01-01T${t[0].trim()}:00`);
            const end = new Date(`2026-01-01T${t[1].trim()}:00`);
            let diff = (end - start) / (1000 * 60 * 60);
            return diff < 0 ? diff + 24 : diff;
        }

        function updateModulation() {
            const staff = getStaff();
            const forecast = parseFloat(document.getElementById('forecast-covers').value) || 0;
            let totalHours = 0;

            staff.forEach(s => {
                s.plan.forEach(p => {
                    if (p.status === "present") totalHours += (calculateH(p.s1) + calculateH(p.s2));
                    else if (p.status === "off_matin") totalHours += calculateH(p.s2);
                    else if (p.status === "off_soir") totalHours += calculateH(p.s1);
                });
            });

            document.getElementById('total-planned-hours').textContent = totalHours.toFixed(1) + "h";
            const ratio = totalHours > 0 ? (forecast / totalHours).toFixed(2) : 0;
            document.getElementById('productivity-ratio').textContent = ratio;

            const adviceBox = document.getElementById('smart-advice');
            const idealHours = forecast / RATIO_CIBLE;
            const diff = totalHours - idealHours;

            if (diff > 5) {
                adviceBox.innerHTML = `⚠️ <b>SUR-EFFECTIF :</b> Vous avez ${diff.toFixed(1)}h de trop. Proposez des demi-offs ou réduisez les mises en place.`;
                adviceBox.style.borderColor = "var(--alert)"; adviceBox.style.color = "var(--alert)";
            } else if (diff < -5) {
                adviceBox.innerHTML = `📢 <b>SOUS-EFFECTIF :</b> Il manque ${Math.abs(diff).toFixed(1)}h pour assurer le service. Rappelez un extra !`;
                adviceBox.style.borderColor = "var(--warning)"; adviceBox.style.color = "var(--warning)";
            } else {
                adviceBox.innerHTML = `✅ <b>MODULATION OPTIMALE :</b> Votre masse salariale est parfaitement alignée avec vos ${forecast} couverts.`;
                adviceBox.style.borderColor = "var(--accent)"; adviceBox.style.color = "var(--accent)";
            }
        }

        function renderStaff() {
            const staff = getStaff();
            document.getElementById('staff-container').innerHTML = staff.map(s => {
                let sTotal = 0;
                const days = s.plan.map((p, i) => {
                    let h = 0;
                    if(p.status === "present") h = calculateH(p.s1) + calculateH(p.s2);
                    else if(p.status === "off_matin") h = calculateH(p.s2);
                    else if(p.status === "off_soir") h = calculateH(p.s1);
                    sTotal += h;
                    return `
                    <div class="day-card">
                        <span class="day-name">${jours[i]}</span>
                        <select class="status-select" onchange="updateData(${s.id}, ${i}, 'status', this.value)">
                            <option value="present" ${p.status==='present'?'selected':''}>✅ PRÉSENT</option>
                            <option value="off_matin" ${p.status==='off_matin'?'selected':''}>☀️ OFF MAT</option>
                            <option value="off_soir" ${p.status==='off_soir'?'selected':''}>🌙 OFF SOIR</option>
                            <option value="off" ${p.status==='off'?'selected':''}>💤 OFF</option>
                        </select>
                        <div style="display:${p.status==='off'?'none':'block'}">
                            <input type="text" class="shift-input" value="${p.s1}" onchange="updateData(${s.id}, ${i}, 's1', this.value)">
                            <input type="text" class="shift-input" value="${p.s2}" onchange="updateData(${s.id}, ${i}, 's2', this.value)">
                        </div>
                    </div>`;
                }).join('');

                return `
                <div class="staff-folder">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                        <span style="font-weight:900; text-transform:uppercase; color:var(--hr);">${s.name}</span>
                        <span class="total-hours ${sTotal > s.contract ? 'over' : ''}">${sTotal.toFixed(1)}h / ${s.contract}h</span>
                    </div>
                    <div class="planning-grid">${days}</div>
                </div>`;
            }).join('');
        }

        function openFoodCost() { alert("Le laboratoire Food-Cost est accessible via l'onglet dédié."); }

        renderStaff();
        updateModulation();
    </script>
</body>
</html>
