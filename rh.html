<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Bureau du Chef</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; }

        /* TABS SYSTEM */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { flex: 1; padding: 15px; background: #111; border: 1px solid #333; color: #888; font-weight: 900; cursor: pointer; text-transform: uppercase; border-radius: 8px; transition: 0.2s; }
        .tab-btn.active { border-color: var(--hr); color: #fff; background: #1a1a1a; box-shadow: 0 0 15px rgba(41, 121, 255, 0.2); }

        .section-content { display: none; }
        .section-content.active { display: block; }

        /* FOOD COST TABLE */
        .lab-container { background: var(--panel); border: 1px solid #333; padding: 25px; border-radius: 12px; }
        .ing-table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        .ing-table th { text-align: left; color: var(--sub); font-size: 0.7rem; padding: 10px; text-transform: uppercase; }
        .input-lab { background: #000; border: 1px solid #333; color: #fff; padding: 10px; border-radius: 6px; width: 100%; font-weight: bold; }
        
        /* RH PLANNING TABLE */
        .planning-container { background: var(--panel); border: 1px solid #333; border-radius: 12px; overflow-x: auto; }
        table.plan-table { width: 100%; border-collapse: collapse; min-width: 1200px; }
        .plan-table th { background: #1a1a1a; padding: 15px; color: var(--sub); font-size: 0.7rem; text-transform: uppercase; border-bottom: 2px solid #333; }
        .plan-table td { border-bottom: 1px solid #222; padding: 10px; text-align: center; vertical-align: top; }
        
        .staff-name { font-weight: 900; color: var(--hr); text-align: left !important; padding-left: 15px; border-right: 2px solid #333; }
        
        /* SHIFT INPUTS */
        .shift-group { display: flex; flex-direction: column; gap: 5px; align-items: center; }
        .time-input { background: #000; border: 1px solid #333; color: var(--accent); padding: 5px; border-radius: 4px; width: 85px; text-align: center; font-size: 0.8rem; font-weight: bold; }
        .off-btn { background: #222; border: 1px solid #444; color: #666; padding: 5px; border-radius: 4px; font-size: 0.6rem; cursor: pointer; width: 100%; }
        .off-btn.active { background: var(--alert); color: #fff; border-color: var(--alert); }

        .total-h { font-weight: 900; color: var(--accent); font-size: 1.1rem; border-left: 2px solid #333; }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color:var(--hr); margin:0; text-transform:uppercase; letter-spacing:2px;">👔 BUREAU DU CHEF</h1>
            <p style="color:var(--sub); margin:5px 0 0 0; font-weight: bold;">PILOTAGE EMPIRE : RENTABILITÉ & ÉQUIPE</p>
        </div>
        <a href="production.html" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">🔥 RETOUR CUISINE</a>
    </header>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('lab')">📄 Laboratoire Food Cost</button>
        <button class="tab-btn" onclick="openTab('rh')">👔 Commandement RH</button>
    </div>

    <div id="lab" class="section-content active">
        <div class="lab-container">
            <h2 style="margin-top:0;">CRÉATION FICHE TECHNIQUE PRÉCISION 0.01€</h2>
            <input type="text" id="recipe-title" class="input-lab" style="font-size: 1.5rem; margin-bottom: 20px;" placeholder="NOM DU PLAT">
            
            <table class="ing-table">
                <thead>
                    <tr>
                        <th style="width: 40%;">Ingrédient</th>
                        <th>Poids (g) / Vol (ml)</th>
                        <th>Prix Achat (kg/L)</th>
                        <th style="text-align: right;">Coût</th>
                        <th></th>
                    </tr>
                </thead>
                <tbody id="ingredients-body"></tbody>
            </table>
            <button onclick="addIngredientLine()" style="width:100%; padding:10px; background:#222; border:1px dashed #555; color:#fff; cursor:pointer; margin-bottom:20px;">+ AJOUTER LIGNE</button>
            
            <div style="background:#0a0a0a; padding:20px; border-radius:8px; display:flex; justify-content:space-between; align-items:center; border:1px solid #222;">
                <div>COÛT MATIÈRE : <span id="total-cost" style="font-size:2rem; font-weight:900; color:var(--accent);">0.00</span> €</div>
                <button onclick="saveRecipeToEmpire()" style="background:var(--accent); color:#000; border:none; padding:15px 30px; border-radius:8px; font-weight:900; cursor:pointer; text-transform:uppercase;">💾 ENVOYER EN PRODUCTION</button>
            </div>
        </div>
    </div>

    <div id="rh" class="section-content">
        <div class="planning-container">
            <table class="plan-table">
                <thead>
                    <tr>
                        <th class="staff-name">Salarié</th>
                        <th>Lundi</th><th>Mardi</th><th>Mercredi</th><th>Jeudi</th><th>Vendredi</th><th>Samedi</th><th>Dimanche</th>
                        <th class="total-h">Total Semaine</th>
                    </tr>
                </thead>
                <tbody id="planning-body"></tbody>
            </table>
        </div>
        <button onclick="addNewStaff()" class="btn-nav" style="margin-top: 20px; background:var(--hr); border:none;">+ EMBAUCHER NOUVEAU STAFF</button>
    </div>

    <script>
        // NAVIGATION
        function openTab(id) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.section-content').forEach(c => c.classList.remove('active'));
            event.currentTarget.classList.add('active');
            document.getElementById(id).classList.add('active');
        }

        // --- FOOD COST LOGIC ---
        function addIngredientLine() {
            const tbody = document.getElementById('ingredients-body');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="input-lab ing-name" placeholder="ex: Filet de Boeuf"></td>
                <td><input type="number" class="input-lab ing-qte" placeholder="200" oninput="calculate()"></td>
                <td><input type="number" class="input-lab ing-price" placeholder="25.90" oninput="calculate()"></td>
                <td style="text-align:right; font-weight:900; color:var(--accent);" class="line-cost">0.00 €</td>
                <td><button onclick="this.parentElement.parentElement.remove(); calculate();" style="background:none; border:none; color:var(--alert); cursor:pointer;">✕</button></td>
            `;
            tbody.appendChild(tr);
        }

        function calculate() {
            let total = 0;
            document.querySelectorAll('#ingredients-body tr').forEach(row => {
                const qte = parseFloat(row.querySelector('.ing-qte').value) || 0;
                const price = parseFloat(row.querySelector('.ing-price').value) || 0;
                const line = (qte / 1000) * price;
                row.querySelector('.line-cost').textContent = line.toFixed(2) + " €";
                total += line;
            });
            document.getElementById('total-cost').textContent = total.toFixed(2);
        }

        function saveRecipeToEmpire() {
            const title = document.getElementById('recipe-title').value;
            if(!title) return alert("Nom du plat requis");
            let recipes = JSON.parse(localStorage.getItem('kds_grimoire_v2')) || [];
            recipes.push({ nom: title + " (" + document.getElementById('total-cost').textContent + "€)", content: "Fiche crée au bureau le " + new Date().toLocaleDateString() });
            localStorage.setItem('kds_grimoire_v2', JSON.stringify(recipes));
            alert("Fiche transmise en cuisine !");
            location.reload();
        }

        // --- RH PLANNING LOGIC (Split Shifts & OFF) ---
        function getStaff() { return JSON.parse(localStorage.getItem('kds_hr_master_v4')) || []; }
        function saveStaff(s) { localStorage.setItem('kds_hr_master_v4', JSON.stringify(s)); renderPlanning(); }

        function addNewStaff() {
            const name = prompt("Nom du salarié :");
            if(!name) return;
            const s = getStaff();
            s.push({ 
                id: Date.now(), 
                name: name, 
                plan: Array(7).fill({ s1: "08:00-15:00", s2: "", off: false }) 
            });
            saveStaff(s);
        }

        function toggleOff(staffId, dayIdx) {
            const s = getStaff();
            const idx = s.findIndex(x => x.id === staffId);
            s[idx].plan[dayIdx].off = !s[idx].plan[dayIdx].off;
            saveStaff(s);
        }

        function updateShift(staffId, dayIdx, slot, val) {
            const s = getStaff();
            const idx = s.findIndex(x => x.id === staffId);
            s[idx].plan[dayIdx][slot] = val;
            saveStaff(s);
        }

        function calcH(shiftStr) {
            if(!shiftStr || !shiftStr.includes('-')) return 0;
            const t = shiftStr.split('-');
            const start = new Date(`2026-01-01T${t[0].trim()}:00`);
            const end = new Date(`2026-01-01T${t[1].trim()}:00`);
            let diff = (end - start) / (1000 * 60 * 60);
            return diff < 0 ? diff + 24 : diff;
        }

        function renderPlanning() {
            const staff = getStaff();
            document.getElementById('planning-body').innerHTML = staff.map(s => {
                let totalWeek = 0;
                const days = s.plan.map((p, i) => {
                    const h = p.off ? 0 : (calcH(p.s1) + calcH(p.s2));
                    totalWeek += h;
                    return `<td>
                        <div class="shift-group" style="display:${p.off ? 'none' : 'flex'}">
                            <input type="text" class="time-input" value="${p.s1}" placeholder="Matin" onchange="updateShift(${s.id}, ${i}, 's1', this.value)">
                            <input type="text" class="time-input" value="${p.s2}" placeholder="Soir" onchange="updateShift(${s.id}, ${i}, 's2', this.value)">
                        </div>
                        <button class="off-btn ${p.off ? 'active' : ''}" onclick="toggleOff(${s.id}, ${i})">${p.off ? 'JOUR OFF' : 'PASSER EN OFF'}</button>
                    </td>`;
                }).join('');

                return `<tr>
                    <td class="staff-name">${s.name}</td>
                    ${days}
                    <td class="total-h">${totalWeek.toFixed(1)}h</td>
                </tr>`;
            }).join('');
        }

        // Init
        addIngredientLine();
        renderPlanning();
    </script>
</body>
</html>
