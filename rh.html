<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire OS - Direction RH</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; --warning: #ffa000; --bar: #00e5ff; --purple: #ea80fc; --gold: #fbbf24; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; flex-direction: column; height: 100vh; box-sizing: border-box; overflow: hidden;}
        
        /* PORTAIL PUBLIC */
        #landing-portal { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .portal-planning { width: 90%; max-width: 1200px; height: 60vh; background: var(--panel); border: 2px solid #333; border-radius: 12px; padding: 20px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); overflow-y: auto; display: flex; align-items: center; justify-content: center;}
        
        /* MODALES (FORCE PRIORITÉ) */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: #111; padding: 30px; border-radius: 12px; border: 1px solid #333; width: 400px; border-top: 5px solid var(--hr); text-align: center; }

        /* HUB DE DIRECTION */
        #director-hub { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: var(--bg); z-index: 2000; flex-direction: column; align-items: center; justify-content: center; }
        .hub-btn { width: 350px; padding: 40px 20px; border-radius: 12px; font-size: 1.5rem; font-weight: 900; cursor: pointer; text-transform: uppercase; border: 2px solid; background: #111; color: #fff; transition: 0.2s; display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .hub-btn:hover { transform: translateY(-5px); background: #1a1a1a; }

        /* PIN PAD */
        .pin-pad { display: grid; grid-template-columns: repeat(3, 80px); gap: 15px; margin-top: 20px; justify-content: center; }
        .pin-btn { background: #000; border: 1px solid #444; color: #fff; font-size: 1.5rem; font-weight: bold; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; transition: 0.1s; }
        .pin-btn:active { background: var(--hr); color: #000; }
        .pin-display { font-size: 2.5rem; letter-spacing: 15px; margin-bottom: 10px; color: var(--hr); min-height: 50px; font-weight: bold; text-align: center;}

        /* INTERFACES DE TRAVAIL */
        #hr-interface, #pin-manager-interface { display: none; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; background: var(--bg); z-index: 3000; position: fixed; top: 0; left: 0; width: 100%; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; padding: 8px 15px; border-radius: 8px; font-weight: bold; border: 1px solid #444; cursor: pointer; }
        
        .main-container { display: flex; gap: 15px; flex: 1; overflow: hidden; }
        .staff-sidebar { width: 300px; background: var(--panel); border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; }
        .month-view { flex: 1; background: var(--panel); border: 1px solid #333; border-radius: 12px; display: flex; flex-direction: column; }
        
        .pay-btn { cursor: pointer; border-radius: 8px; font-weight: bold; text-transform: uppercase; transition: 0.2s; border: 2px solid; }
        .pay-btn:active { transform: scale(0.98); }
    </style>
</head>
<body>

    <div id="landing-portal">
        <h1 style="color:var(--text); letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px;">📅 PLANNING GÉNÉRAL STAFF</h1>
        <div class="portal-planning">
            <h2 style="color: var(--sub);">[ AFFICHAGE DU PLANNING EN LECTURE SEULE ]</h2>
        </div>
        <div style="margin-top: 30px;">
            <button class="pay-btn" style="border-color: #f43f5e; color: #f43f5e; background: rgba(244, 63, 94, 0.1); padding: 20px 50px; font-size: 1.3rem;" onclick="openDeptSelection()">🔒 ACCÈS DIRECTION</button>
        </div>
    </div>

    <div id="dept-modal" class="modal">
        <div class="modal-content">
            <h2 style="color:var(--hr);">SÉLECTION SECTION</h2>
            <button class="pay-btn" style="width:100%; padding:15px; margin-bottom:10px; border-color:var(--accent); color:var(--accent); background:#111;" onclick="showPinPad('cuisine')">🍳 CUISINE</button>
            <button class="pay-btn" style="width:100%; padding:15px; margin-bottom:10px; border-color:var(--purple); color:var(--purple); background:#111;" onclick="showPinPad('service')">🍷 SERVICE</button>
            <button class="pay-btn" style="width:100%; padding:15px; margin-bottom:10px; border-color:var(--bar); color:var(--bar); background:#111;" onclick="showPinPad('bar')">🍸 BAR</button>
            <button onclick="closeDeptSelection()" style="background:transparent; border:none; color:#555; cursor:pointer; text-decoration:underline;">Annuler</button>
        </div>
    </div>

    <div id="pin-modal" class="modal">
        <div class="modal-content">
            <div id="pin-dept-title" style="color:var(--hr); font-weight:900; margin-bottom:10px;">CODE REQUIS</div>
            <div id="pin-display" class="pin-display"></div>
            <div class="pin-pad">
                <button class="pin-btn" onclick="appendPin(1)">1</button><button class="pin-btn" onclick="appendPin(2)">2</button><button class="pin-btn" onclick="appendPin(3)">3</button>
                <button class="pin-btn" onclick="appendPin(4)">4</button><button class="pin-btn" onclick="appendPin(5)">5</button><button class="pin-btn" onclick="appendPin(6)">6</button>
                <button class="pin-btn" onclick="appendPin(7)">7</button><button class="pin-btn" onclick="appendPin(8)">8</button><button class="pin-btn" onclick="appendPin(9)">9</button>
                <button class="pin-btn" onclick="cancelPin()" style="background:var(--alert);">✕</button>
                <button class="pin-btn" onclick="appendPin(0)">0</button>
                <button class="pin-btn" onclick="submitPin()" style="background:var(--accent); color:#000;">OK</button>
            </div>
        </div>
    </div>

    <div id="director-hub">
        <h1 style="color:var(--gold); letter-spacing:4px;">👑 DIRECTION HUB</h1>
        <div style="display:flex; gap:20px;">
            <button class="hub-btn" style="border-color:var(--hr);" onclick="openInterface('planning')">📅 GÉRER LE PLANNING</button>
            <button class="hub-btn" style="border-color:var(--alert);" onclick="openInterface('pins')">🔑 MODIFIER CODES STAFF</button>
        </div>
        <button onclick="fullLogout()" style="margin-top:40px; background:none; border:1px solid #555; color:#fff; padding:10px 20px; cursor:pointer; border-radius:8px;">🔒 QUITTER</button>
    </div>

    <div id="hr-interface">
        <header>
            <h2 id="header-title">GÉRER LE PLANNING</h2>
            <button class="btn-nav" onclick="backToHub()">🔙 RETOUR HUB</button>
        </header>
        <div class="main-container">
            <div class="staff-sidebar">
                <div style="padding:15px; border-bottom:1px solid #333;"><button style="width:100%; padding:10px; background:var(--hr); border:none; color:#fff; font-weight:bold;">+ NOUVEAU CONTRAT</button></div>
                <div id="staff-list-render" style="flex:1; overflow-y:auto; padding:10px;"></div>
            </div>
            <div class="month-view">
                <div style="padding:20px; text-align:center; color:#555;">[ Zone de modification du planning ]</div>
            </div>
        </div>
    </div>

    <div id="pin-manager-interface">
        <header>
            <h2 style="color:var(--alert);">SÉCURITÉ : CODES STAFF</h2>
            <button class="btn-nav" onclick="backToHub()">🔙 RETOUR HUB</button>
        </header>
        <div id="pin-list-render" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap:15px; padding:20px;">
            </div>
    </div>

    <script>
        let currentDept = null;
        let currentPin = "";
        const MASTER_PIN = "9999";

        // --- NAVIGATION INITIALE ---
        function openDeptSelection() {
            document.getElementById('dept-modal').style.display = 'flex';
        }
        function closeDeptSelection() {
            document.getElementById('dept-modal').style.display = 'none';
        }

        // --- GESTION DU CODE PIN ---
        function showPinPad(dept) {
            currentDept = dept;
            currentPin = "";
            document.getElementById('pin-display').innerText = "";
            document.getElementById('dept-modal').style.display = 'none';
            document.getElementById('pin-modal').style.display = 'flex';
            document.getElementById('pin-dept-title').innerText = "ACCÈS " + dept.toUpperCase();
        }

        function appendPin(n) {
            if(currentPin.length < 4) {
                currentPin += n;
                document.getElementById('pin-display').innerText = '*'.repeat(currentPin.length);
            }
        }

        function cancelPin() {
            document.getElementById('pin-modal').style.display = 'none';
            document.getElementById('landing-portal').style.display = 'flex';
        }

        function submitPin() {
            if(currentPin === MASTER_PIN) {
                document.getElementById('pin-modal').style.display = 'none';
                document.getElementById('landing-portal').style.display = 'none';
                document.getElementById('director-hub').style.display = 'flex';
            } else {
                alert("❌ CODE PIN INCORRECT");
                currentPin = "";
                document.getElementById('pin-display').innerText = "";
            }
        }

        // --- GESTION DU HUB ---
        function openInterface(type) {
            document.getElementById('director-hub').style.display = 'none';
            if(type === 'planning') {
                document.getElementById('hr-interface').style.display = 'flex';
            } else {
                document.getElementById('pin-manager-interface').style.display = 'flex';
            }
        }

        function backToHub() {
            document.getElementById('hr-interface').style.display = 'none';
            document.getElementById('pin-manager-interface').style.display = 'none';
            document.getElementById('director-hub').style.display = 'flex';
        }

        function fullLogout() {
            document.getElementById('director-hub').style.display = 'none';
            document.getElementById('landing-portal').style.display = 'flex';
            currentDept = null;
        }
    </script>
</body>
</html>
