<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Empire - Bureau du Chef (RH & FoodCost)</title>
    <style>
        :root { --bg: #050505; --hr: #2979ff; --accent: #00e676; --alert: #ff1744; --panel: #111; --text: #fff; --sub: #888; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; }
        
        header { border-bottom: 2px solid #333; padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .btn-nav { background: #1a1a1a; color: #fff; text-decoration: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #444; transition: 0.2s; cursor: pointer; display: inline-block;}
        .btn-nav:hover { border-color: var(--hr); background: #222; }

        h2 { text-transform: uppercase; letter-spacing: 2px; border-left: 5px solid var(--accent); padding-left: 15px; margin: 40px 0 20px 0; color: #fff; }

        /* SECTION LABORATOIRE FOOD COST */
        .lab-container { background: var(--panel); border: 1px solid #333; border-top: 5px solid var(--accent); padding: 30px; border-radius: 12px; margin-bottom: 50px; }
        .recipe-header-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        .ing-table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        .ing-table th { text-align: left; color: var(--sub); font-size: 0.7rem; padding: 10px; text-transform: uppercase; }
        .ing-table td { padding: 5px; }

        .input-lab { background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 6px; width: 100%; box-sizing: border-box; font-weight: bold; }
        .input-lab:focus { border-color: var(--accent); outline: none; }
        .input-readonly { background: transparent; border: none; color: var(--accent); font-size: 1.1rem; font-weight: 900; text-align: right; }

        .btn-add-ing { background: #222; color: #fff; border: 1px dashed #555; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-add-ing:hover { background: #333; border-color: var(--accent); }

        .result-bar { background: #0a0a0a; border-radius: 8px; padding: 25px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; border: 1px solid #222; }
        .result-item { text-align: center; }
        .result-item label { display: block; font-size: 0.7rem; color: var(--sub); text-transform: uppercase; margin-bottom: 10px; }
        .result-item span { font-size: 2rem; font-weight: 900; color: var(--accent); }

        /* SECTION PLANNING (FAVUR STYLE) */
        .planning-container { width: 100%; overflow-x: auto; background: var(--panel); border-radius: 12px; border: 1px solid #333; }
        table.plan-table { width: 100%; border-collapse: collapse; min-width: 1000px; }
        .plan-table th { background: #1a1a1a; padding: 15px; color: var(--sub); font-size: 0.7rem; text-transform: uppercase; }
        .plan-table td { border-bottom: 1px solid #222; padding: 10px; text-align: center; }
        .staff-name { font-weight: 900; color: var(--hr); text-align: left !important; }

        .shift-input { background: #000; border: 1px solid #333; color: var(--hr); padding: 8px; border-radius: 4px; text-align: center; width: 100px; font-weight: bold; }
        .total-h { font-weight: 900; color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div>
            <h1 style="color:var(--hr); margin:0; text-transform:uppercase; letter-spacing:2px;">👔 BUREAU DU CHEF</h1>
            <p style="color:var(--sub); margin:5px 0 0 0; font-weight: bold;">STRATÉGIE, FOOD-COST & PLANNING</p>
        </div>
        <div style="display:flex; gap:10px;">
            <a href="production.html" class="btn-nav" style="border-color:var(--alert); color:var(--alert);">🔥 QUITTER BUREAU</a>
        </div>
    </header>

    <section class="lab-container">
        <h2>📄 LABORATOIRE FICHES TECHNIQUES (PRÉCISION 0.01€)</h2>
        
        <div class="recipe-header-grid">
            <input type="text" id="recipe-title" class="input-lab" style="font-size: 1.5rem;" placeholder="NOM DU PLAT / PRÉPARATION">
            <select id="recipe-cat" class="input-lab">
                <option value="Plats">Plats</option>
                <option value="Entrées">Entrées</option>
                <option value="Desserts">Desserts</option>
                <option value="Bases & Sauces">Bases & Sauces</option>
            </select>
        </div>

        <table class="ing-table">
            <thead>
                <tr>
                    <th style="width: 40%;">Ingrédient</th>
                    <th>Poids / Vol (g ou ml)</th>
                    <th>Prix Achat (kg ou L)</th>
                    <th style="text-align: right;">Coût Portion</th>
                    <th style="width: 50px;"></th>
                </tr>
            </thead>
            <tbody id="ingredients-body">
                </tbody>
        </table>

        <button class="btn-add-ing" onclick="addIngredientLine()">+ AJOUTER UN INGRÉDIENT</button>

        <textarea id="recipe-instructions" class="input-lab" style="height: 100px; margin-bottom: 30px;" placeholder="Méthode de préparation / Dressage..."></textarea>

        <div class="result-bar">
            <div class="result-item">
                <label>Coût Matière Total</label>
                <span id="total-cost">0.00</span><small> €</small>
            </div>
            <div class="result-item">
                <label>Prix de vente conseillé (TVA inc.)</label>
                <span id="suggested-price" style="color:var(--hr);">0.00</span><small> €</small>
            </div>
            <div class="result-item">
                <button onclick="saveRecipeToEmpire()" style="background:var(--accent); border:none; padding:15px; border-radius:8px; width:100%; font-weight:900; cursor:pointer; text-transform:uppercase;">💾 ENVOYER EN CUISINE</button>
            </div>
        </div>
    </section>

    <section>
        <h2>👔 PLANNING HEBDOMADAIRE (FAVUR STYLE)</h2>
        <div class="planning-container">
            <table class="plan-table">
                <thead>
                    <tr>
                        <th style="text-align: left; padding-left: 20px;">Salarié</th>
                        <th>Lun</th><th>Mar</th><th>Mer</th><th>Jeu</th><th>Ven</th><th>Sam</th><th>Dim</th>
                        <th>Total</th>
                    </tr>
                </thead>
                <tbody id="planning-body">
                    </tbody>
            </table>
        </div>
        <button onclick="addNewStaff()" class="btn-nav" style="margin-top: 20px; background:var(--hr); border:none;">+ EMBAUCHER NOUVEAU STAFF</button>
    </section>

    <script>
        // --- LOGIQUE FOOD COST CHIRURGICALE ---
        function addIngredientLine() {
            const tbody = document.getElementById('ingredients-body');
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><input type="text" class="input-lab ing-name" placeholder="ex: Filet de Boeuf"></td>
                <td><input type="number" class="input-lab ing-qte" placeholder="200" oninput="calculateSurgical()"></td>
                <td><input type="number" class="input-lab ing-price" placeholder="25.90" oninput="calculateSurgical()"></td>
                <td><input type="text" class="input-readonly ing-total" value="0.00 €" readonly></td>
                <td><button onclick="this.parentElement.parentElement.remove(); calculateSurgical();" style="background:none; border:none; color:var(--alert); cursor:pointer; font-weight:bold;">✕</button></td>
            `;
            tbody.appendChild(tr);
        }

        function calculateSurgical() {
            let grandTotal = 0;
            const lines = document.querySelectorAll('#ingredients-body tr');
            
            lines.forEach(line => {
                const qte = parseFloat(line.querySelector('.ing-qte').value) || 0;
                const priceKg = parseFloat(line.querySelector('.ing-price').value) || 0;
                
                // Calcul : (Grammes / 1000) * Prix au Kilo
                const lineCost = (qte / 1000) * priceKg;
                line.querySelector('.ing-total').value = lineCost.toLocaleString('fr-FR', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + " €";
                grandTotal += lineCost;
            });

            document.getElementById('total-cost').textContent = grandTotal.toFixed(2);
            // Calcul prix de vente suggéré (Coût matière représente 25% du prix TTC pour être large)
            const suggested = (grandTotal / 0.25);
            document.getElementById('suggested-price').textContent = suggested.toFixed(2);
        }

        function saveRecipeToEmpire() {
            const title = document.getElementById('recipe-title').value.trim();
            const content = document.getElementById('recipe-instructions').value.trim();
            const cost = document.getElementById('total-cost').textContent;

            if(!title || !content) { alert("Le titre et les instructions sont obligatoires !"); return; }

            // On récupère les recettes de la cuisine
            let recipes = JSON.parse(localStorage.getItem('kds_grimoire_v2')) || [];
            recipes.push({
                nom: title + " (" + cost + "€/port.)",
                content: content + "\n\n--- FICHE TECHNIQUE ---\nCoût de revient : " + cost + " €",
                date: new Date().toLocaleDateString('fr-FR')
            });

            localStorage.setItem('kds_grimoire_v2', JSON.stringify(recipes));
            alert("✅ TRANSMISSION RÉUSSIE : La fiche est disponible sur les tablettes de cuisine.");
            location.reload();
        }

        // --- LOGIQUE PLANNING FAVUR ---
        function getStaff() { return JSON.parse(localStorage.getItem('kds_hr_master_v3')) || []; }
        function saveStaff(s) { localStorage.setItem('kds_hr_master_v3', JSON.stringify(s)); renderPlanning(); }

        function addNewStaff() {
            const name = prompt("Nom et Poste :");
            if(!name) return;
            const s = getStaff();
            s.push({ id: Date.now(), name: name, contract: 40, shifts: Array(7).fill("08:00-16:00") });
            saveStaff(s);
        }

        function updateShift(id, dayIdx, val) {
            const s = getStaff(); const idx = s.findIndex(x => x.id === id);
            s[idx].shifts[dayIdx] = val;
            saveStaff(s);
        }

        function calculateHours(shiftStr) {
            try {
                const parts = shiftStr.split('-');
                if(parts.length !== 2) return 0;
                const start = new Date(`2026-01-01T${parts[0].trim()}:00`);
                const end = new Date(`2026-01-01T${parts[1].trim()}:00`);
                let diff = (end - start) / (1000 * 60 * 60);
                return diff < 0 ? diff + 24 : diff;
            } catch(e) { return 0; }
        }

        function renderPlanning() {
            const staff = getStaff();
            const container = document.getElementById('planning-body');
            container.innerHTML = staff.map(s => {
                let weekTotal = 0;
                const cells = s.shifts.map((shift, i) => {
                    weekTotal += calculateHours(shift);
                    return `<td><input type="text" class="shift-input" value="${shift}" onchange="updateShift(${s.id}, ${i}, this.value)"></td>`;
                }).join('');
                
                return `<tr>
                    <td class="staff-name">${s.name}</td>
                    ${cells}
                    <td class="total-h">${weekTotal.toFixed(1)}h</td>
                </tr>`;
            }).join('');
        }

        // Init
        addIngredientLine();
        renderPlanning();
    </script>
</body>
</html>
