<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-512.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#050505">

    <title>iCHEF OS - Configuration de votre Écosystème</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">

    <style>
        /* --- DESIGN SYSTEM LUXE iCHEF --- */
        :root { 
            --bg: #050505; 
            --panel: #0A0A0A; 
            --gold: #d4af37; 
            --gold-light: #f3e5ab;
            --text: #ffffff; 
            --muted: #888888; 
            --border: rgba(255, 255, 255, 0.08); 
            --accent: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Montserrat', sans-serif;
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            overflow-y: auto; overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
        }

        /* --- BARRE DE RETOUR SUPÉRIEURE --- */
        .top-bar {
            width: 100%; max-width: 550px; padding: 20px; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0;
        }
        .btn-back {
            background: transparent; border: 1px solid var(--border); color: var(--muted);
            padding: 8px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; text-decoration: none; transition: 0.3s;
        }
        .btn-back:hover { border-color: var(--gold); color: var(--gold); }

        /* --- CONTENEUR DU PORTAIL --- */
        .onboarding-box { 
            background: var(--panel); border: 1px solid var(--border); padding: 45px 40px; 
            border-radius: 24px; text-align: center; width: 90%; max-width: 550px; 
            box-shadow: 0 25px 60px rgba(0,0,0,0.8); margin-bottom: 40px;
            animation: containerFade 0.6s ease-out;
        }

        @keyframes containerFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        .logo { height: 40px; margin-bottom: 20px; filter: drop-shadow(0px 4px 10px rgba(212, 175, 55, 0.2)); }
        
        h1 { font-family: 'Playfair Display', serif; color: var(--gold); font-size: 1.8rem; margin: 0 0 8px 0; font-weight: 700; letter-spacing: 0.5px; }
        .subtitle { color: var(--muted); font-size: 0.85rem; line-height: 1.5; margin-bottom: 35px; font-weight: 400; }

        /* --- FORMULAIRE ET CHAMPS PREMIUM --- */
        .input-wrapper { margin-bottom: 22px; text-align: left; }
        .input-wrapper label { display: block; color: #666; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1.5px; font-weight: 800; margin-bottom: 8px; }
        
        input, select, textarea { 
            width: 100%; background: #000; border: 1px solid var(--border); color: #fff; 
            padding: 16px; border-radius: 10px; font-size: 0.95rem; outline: none; transition: 0.3s; 
            box-sizing: border-box; font-family: 'Montserrat', sans-serif;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--gold); box-shadow: 0 0 12px rgba(212, 175, 55, 0.15); }
        
        /* Flèche personnalisée pour les menus déroulants */
        select { 
            appearance: none; cursor: pointer;
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23d4af37%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E"); 
            background-repeat: no-repeat; background-position: right 20px top 50%; background-size: 12px auto; 
        }

        .tenant-preview { font-size: 0.75rem; color: #555; margin-top: 8px; font-style: italic; }

        /* --- BOUTON DE SOUMISSION --- */
        .btn-submit {
            width: 100%; padding: 18px; background: linear-gradient(135deg, var(--gold), #b89626); color: #000; border: none;
            border-radius: 10px; font-weight: 800; font-size: 0.95rem; letter-spacing: 1px; text-transform: uppercase;
            cursor: pointer; transition: 0.3s; margin-top: 15px; box-shadow: 0 8px 25px rgba(212, 175, 55, 0.2);
        }
        .btn-submit:hover { filter: brightness(1.1); transform: translateY(-2px); box-shadow: 0 12px 30px rgba(212, 175, 55, 0.4); }
        .btn-submit:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }

        /* --- ZONE DE FEEDBACK NETTE --- */
        #p-message {
            display: none; margin-top: 20px; font-size: 0.85rem; font-weight: 600; text-align: center; padding: 14px; border-radius: 10px; border: 1px solid;
        }

        @media (max-width: 768px) {
            .onboarding-box { padding: 30px 20px; border-radius: 16px; border: none; background: transparent; box-shadow: none; }
            body { background-image: radial-gradient(circle at 50% 0%, rgba(212, 175, 55, 0.08) 0%, transparent 80%); justify-content: flex-start; }
            .top-bar { padding-top: 30px; }
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <a href="vitrine.html" class="btn-back">← Vitrine</a>
        <img src="logo-ichef.png" onerror="this.style.display='none'" alt="iCHEF Logo" style="height: 25px;">
    </div>

    <div class="onboarding-box">
        <h1>Configurez votre Écosystème</h1>
        <div class="subtitle">Remplissez les détails de votre établissement. Notre pôle technique préparera votre architecture système sous 24 heures.</div>

        <div class="partner-form">
            
            <div class="input-wrapper">
                <label>Nom de l'établissement</label>
                <input type="text" id="p-resto" placeholder="Ex: Le Palace Impérial" onkeyup="generateTenantPreview()" autocomplete="off">
                <div class="tenant-preview">
                    Votre futur identifiant d'accès : <strong id="p-tenant-preview" style="color: var(--gold);">lepalaceimperial</strong>
                </div>
            </div>

            <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                <div class="input-wrapper" style="flex: 1; min-width: 200px;">
                    <label>Téléphone direct du gérant</label>
                    <input type="tel" id="p-phone" placeholder="Ex: +33 6 12 34 56 78">
                </div>
                <div class="input-wrapper" style="flex: 1; min-width: 200px;">
                    <label>Adresse Email professionnelle</label>
                    <input type="email" id="p-email" placeholder="gérant@monetablissement.com">
                </div>
            </div>

            <div class="input-wrapper">
                <label>Type de structure</label>
                <select id="p-type" onchange="togglePartnerFields()">
                    <option value="" disabled selected>Choisissez votre profil...</option>
                    <option value="restaurant">🍽️ Restaurant / Bar / Brasserie / Club</option>
                    <option value="hotel">🏨 Hôtel / Palace (Seul)</option>
                    <option value="hotel-resto">🏨+🍽️ Complexe Hôtelier & Restaurant</option>
                    <option value="kiosque">🥡 Kiosque / Fast-Food / Vente à emporter</option>
                </select>
            </div>

            <div id="block-hotel" style="display: none; gap: 15px; width: 100%;">
                <div class="input-wrapper" style="flex: 1;">
                    <label>Classification de prestige</label>
                    <select id="p-hotel-stars">
                        <option value="Non classé">Non classé</option>
                        <option value="1 à 3 Étoiles">Standard (1★ à 3★)</option>
                        <option value="4 Étoiles">Haut de gamme (4★)</option>
                        <option value="5 Étoiles">Luxe (5★)</option>
                        <option value="Palace">Prestige / Palace</option>
                    </select>
                </div>
                <div class="input-wrapper" style="flex: 1;">
                    <label>Nombre de chambres / suites</label>
                    <input type="number" id="p-hotel-rooms" placeholder="Ex: 60">
                </div>
            </div>

            <div id="block-resto" style="display: none; width: 100%;">
                <div style="display: flex; gap: 15px; flex-wrap: wrap; width: 100%;">
                    <div class="input-wrapper" style="flex: 1; min-width: 200px;">
                        <label>Style d'exploitation</label>
                        <select id="p-resto-style">
                            <option value="Traditionnel / Bistrot / Brasserie">Traditionnel / Bistrot / Brasserie</option>
                            <option value="Gastronomique / Haute-Cuisine">Gastronomique / Haute-Cuisine</option>
                            <option value="Street-Food / Fast-Food / Snack">Street-Food / Fast-Food / Snack</option>
                            <option value="Bar à thèmes / Tapas / Lounge / Club">Bar à thèmes / Tapas / Lounge / Club</option>
                        </select>
                    </div>
                    <div class="input-wrapper" style="flex: 1; min-width: 200px;">
                        <label>Capacité totale (Couverts)</label>
                        <input type="number" id="p-resto-seats" placeholder="Ex: 85">
                    </div>
                </div>
                <div class="input-wrapper">
                    <label>Déploiement des Zones de service</label>
                    <input type="text" id="p-resto-zones" placeholder="Ex: Salle principale, Grande terrasse, Room Service, Bar...">
                </div>
            </div>

            <div class="input-wrapper">
                <label>Vos objectifs opérationnels</label>
                <textarea id="p-projet" rows="3" placeholder="Ex: Je souhaite fluidifier mon coup de feu en terrasse, masquer les plats en cas de rush cuisine, et augmenter les ventes additionnelles..."></textarea>
            </div>

            <button id="p-submit-btn" class="btn-submit">🚀 Déployer mon infrastructure</button>
            
            <div id="p-message"></div>
        </div>
    </div>

    <script>
        // Lien direct avec ton moteur backend
        const BACKEND_URL = "https://tableau-system.onrender.com";

        // Détection dynamique du type de structure pour adapter l'affichage
        function togglePartnerFields() {
            const type = document.getElementById('p-type').value;
            const blockHotel = document.getElementById('block-hotel');
            const blockResto = document.getElementById('block-resto');

            blockHotel.style.display = (type === 'hotel' || type === 'hotel-resto') ? 'flex' : 'none';
            blockResto.style.display = (type === 'restaurant' || type === 'hotel-resto' || type === 'kiosque') ? 'block' : 'none';
        }

        // Nettoyage intelligent du nom pour la prévisualisation de l'identifiant
        function generateTenantPreview() {
            const restoName = document.getElementById('p-resto').value;
            let generatedId = restoName.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, "").toLowerCase();
            document.getElementById('p-tenant-preview').innerText = generatedId || "lepalaceimperial";
        }

        // Branchement du bouton et envoi sécurisé à Render
        document.getElementById('p-submit-btn').addEventListener('click', async () => {
            const resto = document.getElementById('p-resto').value.trim();
            const phone = document.getElementById('p-phone').value.trim();
            const email = document.getElementById('p-email').value.trim();
            const btn = document.getElementById('p-submit-btn');
            const msgBox = document.getElementById('p-message');

            const pType = document.getElementById('p-type').value;
            const pStars = document.getElementById('p-hotel-stars').value;
            const pRooms = document.getElementById('p-hotel-rooms').value;
            const pStyle = document.getElementById('p-resto-style').value;
            const pSeats = document.getElementById('p-resto-seats').value;
            const pZones = document.getElementById('p-resto-zones').value;
            const pProjet = document.getElementById('p-projet').value.trim();

            const tenantID = resto.normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-zA-Z0-9]/g, "").toLowerCase();

            if(!resto || !phone || !email || !pType) {
                msgBox.innerHTML = "⚠️ Veuillez spécifier le nom, le contact et le type d'établissement.";
                msgBox.style.color = "var(--danger)";
                msgBox.style.background = "rgba(239, 68, 68, 0.1)";
                msgBox.style.borderColor = "var(--danger)";
                msgBox.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.innerText = "CRÉATION DE L'ÉCOSYSTÈME...";
            msgBox.innerHTML = "📡 Initialisation des modules iCHEF OS en cours...";
            msgBox.style.color = "var(--gold)";
            msgBox.style.background = "rgba(212, 175, 55, 0.1)";
            msgBox.style.borderColor = "var(--gold)";
            msgBox.style.display = "block";

            try {
                const response = await fetch(`${BACKEND_URL}/api/nouvelle-demande-demo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, restaurant: resto, phone: phone, email: email })
                });

                const data = await response.json();

                if(data.success) {
                    btn.style.background = "#10b981";
                    btn.style.color = "#000";
                    btn.innerText = "✅ APPLI PRÊTE";
                    msgBox.innerHTML = "✨ Environnement pré-généré avec succès ! Votre demande est sur la table de supervision. Flavien Iché ou un ingénieur de brigade vous appellera sous 24h pour activer vos puces NFC.";
                    msgBox.style.color = "#10b981";
                    msgBox.style.background = "rgba(16, 185, 129, 0.1)";
                    msgBox.style.borderColor = "#10b981";
                } else {
                    msgBox.innerHTML = "❌ Erreur : Cet identifiant d'établissement est déjà réservé.";
                    msgBox.style.color = "var(--danger)";
                    msgBox.style.background = "rgba(239, 68, 68, 0.1)";
                    msgBox.style.borderColor = "var(--danger)";
                    btn.disabled = false;
                    btn.innerText = "RÉESSAYER";
                }
            } catch(err) {
                msgBox.innerHTML = "⚠️ Échec de connexion réseau. Notre serveur se réveille, veuillez réemployer le bouton.";
                msgBox.style.color = "var(--warning)";
                msgBox.style.background = "rgba(251, 191, 36, 0.1)";
                msgBox.style.borderColor = "var(--warning)";
                btn.disabled = false;
                btn.innerText = "RÉESSAYER";
            }
        });
    </script>
</body>
</html>
