<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#050505">
    
    <title>Le Bar - Notre Sélection</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Amatic+SC&family=Anton&family=Arvo&family=Bebas+Neue&family=Bitter&family=Bodoni+Moda&family=Caveat&family=Cinzel&family=Cormorant+Garamond&family=Crimson+Text&family=Dancing+Script&family=EB+Garamond&family=Fira+Sans&family=Great+Vibes&family=Inter:wght@400;600&family=Jost&family=Lato&family=Libre+Baskerville&family=Lobster&family=Lora&family=Merriweather&family=Montserrat:wght@400;600&family=Noto+Serif&family=Nunito&family=Open+Sans&family=Oswald&family=PT+Serif&family=Pacifico&family=Playfair+Display:wght@400;600&family=Poppins:wght@400;600&family=Quicksand&family=Raleway&family=Righteous&family=Roboto&family=Rubik&family=Satisfy&family=Ubuntu&family=Work+Sans&family=Zilla+Slab&display=swap" rel="stylesheet">

    <style>
        /* 🟢 DESIGN LUXE ÉPURÉ (Variables dynamiques) 🟢 */
        :root { 
            --bg-color: #050505;            
            --text-main: #f8fafc;   
            --text-muted: #888888;   
            --gold: #d4af37;         
            --accent: #38bdf8; /* Touche subtile pour le bar */
            --border-color: #222222;
            --font-title: 'Playfair Display', serif;
            --font-text: 'Inter', sans-serif;
        }
        
        body { 
            font-family: var(--font-text); 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
            transition: background-color 0.5s, color 0.5s; 
            display: flex;
            justify-content: center;
        }

        .kiosk-wrapper { width: 100%; max-width: 800px; min-height: 100vh; background: var(--bg-color); position: relative; padding-bottom: 120px; }

        /* En-tête de la carte */
        header { 
            text-align: center; 
            padding: 50px 20px 30px; 
            border-bottom: 1px solid var(--border-color);
            position: relative;
            background-position: center;
            background-size: cover;
        }
        
        .header-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(transparent, var(--bg-color, #050505)); display: none; z-index: 1; }


        /* ⛶ BOUTON KIOSQUE DISCRET ⛶ */
        .btn-kiosk {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.3s;
            z-index: 100;
        }
        .btn-kiosk:hover {
            color: var(--gold);
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.1);
        }
        
        .logo-text { 
            color: var(--gold); 
            font-family: var(--font-title);
            font-size: 2.5rem; 
            font-weight: 600; 
            letter-spacing: 6px; 
            margin: 0; 
            text-transform: uppercase; 
            position: relative; 
            z-index: 2;
        }
        
        .subtitle {
            color: var(--text-muted);
            font-family: var(--font-text);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
            position: relative; 
            z-index: 2;
        }

        /* Navigation Rapide */
        .nav-categories {
            display: flex;
            overflow-x: auto;
            padding: 15px 20px;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(5,5,5,0.95);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .nav-categories::-webkit-scrollbar { display: none; }
        
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            transition: color 0.3s;
        }
        .nav-link:active, .nav-link.active { color: var(--gold); }

        /* Conteneur principal */
        .menu-container {
            padding: 40px 20px;
        }

        /* Section de catégorie */
        .category-section {
            position: relative; 
            background: rgba(0,0,0,0.3); 
            border: 1px solid var(--border-color); 
            padding: 50px 30px; 
            margin-bottom: 50px; 
            border-radius: 12px;
        }

        .category-title {
            color: var(--gold);
            font-family: var(--font-title);
            font-size: 1.8rem;
            font-weight: 400;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
            margin: 0; 
            position: absolute; 
            top: -20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background: var(--bg-color); 
            padding: 0 20px; 
            white-space: nowrap;
        }

        /* Style d'une boisson */
        .menu-item {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }
        .menu-item.sold-out { opacity: 0.4; filter: grayscale(100%); }
        .menu-item.sold-out .item-name-main { text-decoration: line-through; color: #ff4757; }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 15px;
        }

        .item-name-main {
            font-family: var(--font-title);
            font-size: 1.25rem;
            font-weight: 600;
            letter-spacing: 1px;
            color: var(--text-main);
            margin: 0;
            line-height: 1.4;
        }

        .item-price {
            font-family: var(--font-text);
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: bold;
            white-space: nowrap;
        }

        .item-desc {
            font-family: var(--font-text);
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 6px;
            line-height: 1.5;
            font-style: italic;
            display: block;
        }

        .loading-screen {
            text-align: center;
            padding: 100px 20px;
            color: var(--gold);
            font-style: italic;
            letter-spacing: 2px;
            font-family: var(--font-title);
            font-size: 1.2rem;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>

    <script>
        // 1. SÉCURITÉ : Générateur d'empreinte numérique
        function getDeviceFingerprint() {
            let deviceId = localStorage.getItem('ichef_device_fingerprint');
            if (!deviceId) {
                deviceId = 'device_' + Math.random().toString(36).substr(2, 9) + '_' + Date.now();
                localStorage.setItem('ichef_device_fingerprint', deviceId);
            }
            return deviceId;
        }

        // 2. GARDE DU CORPS SECURITE UNIVERSEL (VERSION ISOLATION STRICTE 🔒)
        (async function enforceSecurity() {
            const urlParams = new URLSearchParams(window.location.search);
            let urlTenantID = urlParams.get('tenantID');
            let storedTenantID = localStorage.getItem('ichef_tenant_id');

            // 🚨 SÉCURITÉ ANTI-FUITE
            if (urlTenantID && urlTenantID !== storedTenantID) {
                localStorage.removeItem('EMPIRE_GLOBAL_SYNC');
                localStorage.removeItem('ichef_master_pin');
                localStorage.setItem('ichef_tenant_id', urlTenantID);
                storedTenantID = urlTenantID;
            }

            let tenantID = urlTenantID || storedTenantID;
            let pin = localStorage.getItem('ichef_master_pin'); 
            
            if(!tenantID) {
                window.location.href = 'connexionpartenaire.html';
                return;
            }

            const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
                ? "http://localhost:10000" : "https://tableau-system.onrender.com";

            const accessMatrix = {
                'CHEF': ['chef.html', 'administration.html'],
                'CHEF_CUISINE': ['chef.html', 'administration.html'],
                'PATISSIER': ['chef-patissier.html', 'administration.html'],
                'CHEF_PATISSERIE': ['chef-patissier.html', 'administration.html'],
                'BAR': ['chef-bar.html', 'administration.html'],
                'CHEF_BAR': ['chef-bar.html', 'administration.html'],
                'ICHEF_OS': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'ECO': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'BUSINESS': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'RENTABILITE': ['admin.html', 'pack-eco.html', 'minipass.html', 'menu-qr.html', 'administration.html'],
                'EMPIRE': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html', 'production.html', 'chef-production.html'],
                'BRIGADE': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html', 'production.html', 'chef-production.html'],
                'BRIGADES': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html', 'production.html', 'chef-production.html'],
                'PREMIUM': ['admin.html', 'pack-eco.html', 'menu-qr.html', 'chef.html', 'menu-pure.html', 'chef-bar.html', 'menu-bar.html', 'rh.html', 'haccp.html', 'reservation.html', 'minipass.html', 'chef-patissier.html', 'administration.html', 'production.html', 'chef-production.html']
            };

            try {
                const res = await fetch(`${SERVER_URL}/api/verify-pin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ tenantID: tenantID, pin: pin || "0000", deviceId: getDeviceFingerprint() })
                });
                const data = await res.json();

                if(!data.success) {
                    alert(data.error || "ACCÈS REFUSÉ.");
                    window.location.href = 'connexionpartenaire.html';
                    return;
                }

                const currentPlan = data.plan ? data.plan.toUpperCase() : 'CHEF';
                let currentPage = window.location.pathname.split('/').pop().toLowerCase();
                if(currentPage === '') currentPage = 'index.html';

                const allowedPages = accessMatrix[currentPlan] || [];
                if (!allowedPages.includes(currentPage)) {
                    alert(`ACCÈS REFUSÉ : Votre forfait (${currentPlan}) n'inclut pas ce module.`);
                    window.location.href = `administration.html?tenantID=${tenantID}`;
                }
            } catch (e) { console.error("Erreur de sécurité réseau", e); }
        })();
    </script>
</head>

<body oncontextmenu="return false;" ondragstart="return false;" ondrop="return false;">

    <div id="pwa-strict-lock" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #050505; z-index: 9999999; flex-direction: column; justify-content: center; align-items: center; text-align: center; padding: 20px; box-sizing: border-box; font-family: system-ui, -apple-system, sans-serif;">
        <img src="logo-ichef.png" alt="Logo iCHEF" style="width: 220px; height: auto; margin-bottom: 20px; filter: drop-shadow(0px 5px 15px rgba(212, 175, 55, 0.4));">

        <p style="color: #94a3b8; max-width: 420px; font-size: 0.95rem; margin-top: 12px; margin-bottom: 35px; line-height: 1.6; font-weight: 500;">
            L'accès à ce module nécessite l'installation de l'application. Cela permet de masquer la barre de recherche et de sécuriser la caisse.
        </p>
        <button id="btn-force-install" style="background: linear-gradient(135deg, #d4af37, #b89626); color: #050505; border: none; padding: 16px 35px; font-size: 1rem; font-weight: 900; border-radius: 10px; cursor: pointer; box-shadow: 0 0 25px rgba(212, 175, 55, 0.25); text-transform: uppercase; letter-spacing: 0.5px; transition: all 0.2s;">
            📲 TÉLÉCHARGER L'APPLICATION
        </button>
    </div>

    <script>
        // 🔒 VIGILE DE SÉCURITÉ PWA
        (function() {
            let deferredInstallPrompt = null;

            function verifyImmersion() {
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches 
                                  || window.navigator.standalone === true 
                                  || document.referrer.includes('android-app://');
                
                const lockCurtain = document.getElementById('pwa-strict-lock');
                if (lockCurtain) {
                    if (isStandalone) lockCurtain.style.display = 'none';
                    else lockCurtain.style.display = 'flex';
                }
            }

            if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', verifyImmersion);
            else verifyImmersion();

            window.addEventListener('beforeinstallprompt', (e) => {
                e.preventDefault();
                deferredInstallPrompt = e;
            });

            document.addEventListener('DOMContentLoaded', () => {
                const installBtn = document.getElementById('btn-force-install');
                if (installBtn) {
                    installBtn.addEventListener('click', async () => {
                        if (!deferredInstallPrompt) {
                            alert("ℹ️ iCHEF est déjà installé sur cet appareil. Recherchez l'icône sur votre bureau pour lancer le module !");
                            return;
                        }
                        deferredInstallPrompt.prompt();
                        const { outcome } = await deferredInstallPrompt.userChoice;
                        if (outcome === 'accepted') {
                            deferredInstallPrompt = null;
                            alert("✅ Application configurée ! Fermez cet onglet et lancez iCHEF depuis votre écran d'accueil.");
                        }
                    });
                }
            });

            window.addEventListener('appinstalled', () => {
                deferredInstallPrompt = null;
                verifyImmersion();
            });
        })();
    </script>
    
    <div class="kiosk-wrapper">
        <header id="menu-header">
            <button id="btn-kiosk" class="btn-kiosk">⛶</button>
            <div class="header-overlay"></div>
            <h1 class="logo-text">LE BAR</h1>
            <div class="subtitle">Notre Sélection</div>
        </header>

        <div class="nav-categories" id="nav-categories"></div>

        <div class="menu-container" id="menu-container">
            <div class="loading-screen">Chargement de la carte du Bar...</div>
        </div>

        <div class="footer">
            Prix nets en <span id="footer-currency">Euros</span> - Service compris<br>
            <span style="font-size: 0.6rem; opacity: 0.5;">Propulsé par Empire OS</span>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        
        const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
            ? "http://localhost:10000" 
            : "https://tableau-system.onrender.com";

        // 🌍 VARIABLE MULTIDEVISE GLOBALE
        let currentCurrency = "€";
        let currencyName = "Euros";

        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}&_t=${Date.now()}`);
                    if(r.ok) state = await r.json();
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            }
        };

        const categoriesMap = [
            { id: 'cocktails', label: 'Cocktails', icon: '🍸' },
            { id: 'vins', label: 'Vins & Bulles', icon: '🍷' },
            { id: 'bieres', label: 'Bières', icon: '🍺' },
            { id: 'spiritueux', label: 'Spiritueux', icon: '🥃' },
            { id: 'chaudes', label: 'Boissons Chaudes', icon: '☕' },
            { id: 'froides', label: 'Softs & Eaux', icon: '🥤' }
        ];

        let currentMenuData = null;
        let lastDesignHash = "";

        function isTimeInSlot(current, start, end) {
            if (!start || !end) return false;
            if (start > end) { return current >= start || current <= end; }
            return current >= start && current <= end;
        }

        async function fetchMenu() {
            try {
                const state = await API.getState();
                
                // 🎨 LECTURE DE LA DEVISE, DES HORAIRES ET DU DESIGN SAAS
                if (state.activeOrders && state.activeOrders['SETTINGS_MASTER'] && state.activeOrders['SETTINGS_MASTER'].data) {
                    let settings = state.activeOrders['SETTINGS_MASTER'].data;
                    
                    // Gestion de la devise
                    if (settings.currency && settings.currency !== currentCurrency) {
                        currentCurrency = settings.currency;
                        let nameMap = {"€": "Euros", "CHF": "Francs Suisses", "$": "Dollars", "C$": "Dollars", "£": "Livres", "¥": "Yens", "MAD": "Dirhams", "CFA": "Francs CFA"};
                        currencyName = nameMap[currentCurrency] || currentCurrency;
                        document.getElementById('footer-currency').innerText = currencyName;
                        currentMenuData = null; // Force le rafraîchissement
                    }

                    // 🛑 MOTEUR DU PILOTE AUTOMATIQUE (4 SERVICES)
                    let isAutoOpen = true;
                    let isManualClosed = (settings.qrActive === false);

                    if (settings.schedule && settings.schedule.auto) {
                        let now = new Date(new Date().toLocaleString("en-US", {timeZone: "Europe/Paris"}));
                        let currentDay = now.getDay(); 
                        let currentHour = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
                        let sched = settings.schedule;

                        if (!sched.days.includes(currentDay)) { isAutoOpen = false; }
                        else {
                            let inMatin = isTimeInSlot(currentHour, sched.matin?.s, sched.matin?.e);
                            let inMidi  = isTimeInSlot(currentHour, sched.midi?.s, sched.midi?.e);
                            let inAprem = isTimeInSlot(currentHour, sched.aprem?.s, sched.aprem?.e);
                            let inSoir  = isTimeInSlot(currentHour, sched.soir?.s,  sched.soir?.e);
                            if (!inMatin && !inMidi && !inAprem && !inSoir) isAutoOpen = false;
                        }
                    }

                    if (isManualClosed || !isAutoOpen) {
                        let motif = isManualClosed ? "suite à une forte affluence" : "car nous sommes en dehors de nos heures de service";
                        let titre = isManualClosed ? "Bar Suspendu" : "Fermé";
                        let icone = isManualClosed ? "🛎️" : "🕰️";

                        document.getElementById('nav-categories').style.display = 'none';
                        document.getElementById('menu-container').innerHTML = `
                            <div style="text-align:center; padding:100px 20px;">
                                <div style="font-size:4rem; margin-bottom:20px;">${icone}</div>
                                <h2 style="font-family: var(--font-title); font-size:2rem; color: var(--gold); letter-spacing: 2px; text-transform:uppercase;">${titre}</h2>
                                <p style="font-family: var(--font-text); font-size: 1rem; color: var(--text-muted); line-height: 1.6; margin-top:20px;">
                                    La consultation de la carte du bar est désactivée ${motif}.<br><br>
                                </p>
                            </div>`;
                        return; 
                    } else {
                        document.getElementById('nav-categories').style.display = 'flex';
                    }

                    // 🎨 SYMBIOSE DESIGN SÉPARÉE
                    if (settings.design) {
                        let designHash = JSON.stringify(settings.design);
                        if(designHash !== lastDesignHash) {
                            document.documentElement.style.setProperty('--bg-color', settings.design.bgColor || '#050505');
                            document.documentElement.style.setProperty('--text-main', settings.design.textColor || '#ffffff');
                            
                            if (settings.design.btnColor) {
                                document.documentElement.style.setProperty('--gold', settings.design.btnColor);
                            }
                            if (settings.design.font) {
                                document.documentElement.style.setProperty('--font-text', settings.design.font);
                            }
                            if (settings.design.titleFont) {
                                document.documentElement.style.setProperty('--font-title', settings.design.titleFont);
                            }
                            if (settings.design.titleColor) {
                                let logoText = document.querySelector('.logo-text');
                                if(logoText) logoText.style.color = settings.design.titleColor;
                            }

                            // Application de la Bannière d'image de fond
                            let headerEl = document.getElementById('menu-header');
                            let overlayEl = headerEl?.querySelector('.header-overlay');
                            if (headerEl && settings.design.bannerUrl) {
                                headerEl.style.backgroundImage = `url('${settings.design.bannerUrl}')`;
                                if (overlayEl) {
                                    overlayEl.style.display = 'block';
                                    overlayEl.style.background = `linear-gradient(transparent, ${settings.design.bgColor || '#050505'})`;
                                }
                            } else if (headerEl) {
                                headerEl.style.backgroundImage = 'none';
                                if (overlayEl) overlayEl.style.display = 'none';
                            }
                            
                            lastDesignHash = designHash;
                        }
                    }
                }

                // 🟢 LECTURE DE LA CARTE DU BAR
                if (state && state.activeOrders && state.activeOrders['MENU_MASTER_BAR']) {
                    let newDataStr = JSON.stringify(state.activeOrders['MENU_MASTER_BAR'].data);
                    
                    if (newDataStr !== JSON.stringify(currentMenuData)) {
                        currentMenuData = JSON.parse(newDataStr);
                        renderClientMenu();
                    }
                } else if (!currentMenuData) {
                    document.getElementById('menu-container').innerHTML = '<div class="loading-screen">La carte n\'est pas encore disponible.</div>';
                }
            } catch(e) {
                console.error(e);
            }
        }

        function formatItemName(rawName) {
            let cleanName = rawName.replace('🌟 ', '');
            
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let mainName = parts[0].trim();
                let description = parts.slice(1).join(' - ').trim(); 
                return `<div class="item-name-main">${mainName}</div><div class="item-desc">${description}</div>`;
            }
            
            return `<div class="item-name-main">${cleanName}</div>`;
        }

        function renderClientMenu() {
            const container = document.getElementById('menu-container');
            const nav = document.getElementById('nav-categories');
            
            if (!currentMenuData) return;

            let htmlContent = '';
            let navHtml = '';

            categoriesMap.forEach((cat, index) => {
                let items = currentMenuData[cat.id];
                
                if (items && Array.isArray(items)) {
                    let availableItems = items.filter(item => item.hidden !== true);

                    if (availableItems.length > 0) {
                        navHtml += `<a href="#section-${cat.id}" class="nav-link">${cat.label}</a>`;

                        htmlContent += `
                        <div class="category-section" id="section-${cat.id}" style="animation-delay: ${index * 0.1}s;">
                            <h2 class="category-title">${cat.icon} ${cat.label}</h2>
                        `;

                        availableItems.forEach(item => {
                            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
                            let formattedHtml = formatItemName(item.name);
                            let isSoldOut = (item.stock === 0 || item.stock === "0");
                            let soldOutClass = isSoldOut ? 'sold-out' : '';

                            htmlContent += `
                            <div class="menu-item ${soldOutClass}">
                                <div class="item-header">
                                    <div style="flex:1;">${formattedHtml}</div>
                                    <span class="item-price">${priceStr}</span>
                                </div>
                            </div>
                            `;
                        });

                        htmlContent += `</div>`;
                    }
                }
            });

            if (htmlContent === '') {
                htmlContent = '<div class="loading-screen">Le bar est actuellement fermé.</div>';
            }

            nav.innerHTML = navHtml;
            container.innerHTML = htmlContent;

            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        fetchMenu();
        setInterval(fetchMenu, 3000);

        // ⛶ LOGIQUE DU MODE KIOSQUE
        document.getElementById('btn-kiosk').addEventListener('click', () => {
            const elem = document.documentElement;
            const btn = document.getElementById('btn-kiosk');
            if (!document.fullscreenElement) {
                if (elem.requestFullscreen) elem.requestFullscreen();
                else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen(); 
                else if (elem.msRequestFullscreen) elem.msRequestFullscreen(); 
                btn.innerText = "✕";
            } else {
                if (document.exitFullscreen) document.exitFullscreen();
                else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
                btn.innerText = "⛶";
            }
        });

    </script>

    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./service-worker.js')
                .then(registration => {
                    console.log('✅ Moteur iCHEF PWA activé avec succès !', registration.scope);
                })
                .catch(err => {
                    console.error('❌ Erreur de sécurité PWA :', err);
                });
            });
        }
    </script>
</body>
</html>
