<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Le Bar - Notre Sélection</title>
    <style>
        /* 🟢 DESIGN LUXE ÉPURÉ (Noir & Or/Bleu Nuit) 🟢 */
        :root { 
            --bg-color: #050505;           
            --text-main: #f8fafc;    
            --text-muted: #888888;   
            --gold: #d4af37;         
            --accent: #38bdf8; /* Touche subtile pour le bar */
            --border-color: #222222;
        }
        
        body { 
            font-family: 'Helvetica Neue', Optima, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main); 
            margin: 0; 
            padding: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* En-tête de la carte */
        header { 
            text-align: center; 
            padding: 50px 20px 30px; 
            border-bottom: 1px solid var(--border-color);
            background: linear-gradient(to bottom, #0a0f16 0%, var(--bg-color) 100%);
        }
        
        .logo-text { 
            color: var(--gold); 
            font-size: 2rem; 
            font-weight: 300; 
            letter-spacing: 6px; 
            margin: 0; 
            text-transform: uppercase; 
        }
        
        .subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            letter-spacing: 2px;
            margin-top: 10px;
            text-transform: uppercase;
        }

        /* Navigation Rapide */
        .nav-categories {
            display: flex;
            overflow-x: auto;
            padding: 15px 20px;
            gap: 20px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(0,0,0,0.8);
            position: sticky;
            top: 0;
            z-index: 100;
            backdrop-filter: blur(10px);
        }
        
        .nav-categories::-webkit-scrollbar { display: none; }
        
        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            white-space: nowrap;
            transition: color 0.3s;
        }
        .nav-link:active, .nav-link.active { color: var(--gold); }

        /* Conteneur principal */
        .menu-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            padding-bottom: 100px;
        }

        /* Section de catégorie */
        .category-section {
            margin-top: 40px;
            margin-bottom: 50px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeUp 0.6s forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .category-title {
            color: var(--gold);
            font-size: 1.5rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-align: center;
            text-transform: uppercase;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .category-title::before, .category-title::after {
            content: "";
            flex: 1;
            height: 1px;
            background: var(--border-color);
            margin: 0 15px;
        }

        /* Style d'une boisson */
        .menu-item {
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
        }
        
        .menu-item:last-child {
            border-bottom: none;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 15px;
        }

        .item-name-main {
            font-size: 1.15rem;
            font-weight: 500;
            letter-spacing: 1px;
            color: var(--text-main);
            margin: 0;
            line-height: 1.4;
        }

        .item-price {
            font-size: 1.1rem;
            color: var(--gold);
            font-weight: bold;
            white-space: nowrap;
        }

        .item-desc {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 6px;
            line-height: 1.5;
            font-style: italic;
            display: block;
        }

        .loading-screen {
            text-align: center;
            padding: 100px 20px;
            color: var(--gold);
            font-style: italic;
            letter-spacing: 2px;
        }

        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <h1 class="logo-text">LE BAR</h1>
        <div class="subtitle">Notre Sélection</div>
    </header>

    <div class="nav-categories" id="nav-categories">
        </div>

    <div class="menu-container" id="menu-container">
        <div class="loading-screen">Chargement de la carte du Bar...</div>
    </div>

    <div class="footer">
        Prix nets en <span id="footer-currency">Euros</span> - Service compris<br>
        <span style="font-size: 0.6rem; opacity: 0.5;">Propulsé par I CHEF</span>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const tenantID = urlParams.get('tenantID') || 'MASTER_STATE';
        
        // 🚀 CONNEXION À TON SERVEUR RENDER ICI 🚀
      const SERVER_URL = (window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1" || window.location.protocol === "file:") 
    ? "http://localhost:10000" 
    : "https://tableau-system.onrender.com";

        // 🌍 VARIABLE MULTIDEVISE GLOBALE
        let currentCurrency = "€";
        let currencyName = "Euros";

        const API = {
            getState: async () => {
                let state = { activeOrders: {} };
                try {
                    let r = await fetch(`${SERVER_URL}/get-current-state?tenantID=${tenantID}`);
                    if(r.ok) state = await r.json();
                } catch(e) {
                    state = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC')) || { activeOrders: {} };
                }
                return state;
            }
        };

        const categoriesMap = [
            { id: 'cocktails', label: 'Cocktails', icon: '🍸' },
            { id: 'vins', label: 'Vins & Bulles', icon: '🍷' },
            { id: 'bieres', label: 'Bières', icon: '🍺' },
            { id: 'spiritueux', label: 'Spiritueux', icon: '🥃' },
            { id: 'chaudes', label: 'Boissons Chaudes', icon: '☕' },
            { id: 'froides', label: 'Softs & Eaux', icon: '🥤' }
        ];

        let currentMenuData = null;

        async function fetchMenu() {
            try {
                const state = await API.getState();
                
                // 🌍 LECTURE DE LA DEVISE SAAS
                if (state.activeOrders && state.activeOrders['SETTINGS_MASTER'] && state.activeOrders['SETTINGS_MASTER'].data) {
                    let savedCurrency = state.activeOrders['SETTINGS_MASTER'].data.currency;
                    if (savedCurrency && savedCurrency !== currentCurrency) {
                        currentCurrency = savedCurrency;
                        // Traduction esthétique pour le bas de page
                        let nameMap = {"€": "Euros", "CHF": "Francs Suisses", "$": "Dollars", "C$": "Dollars", "£": "Livres", "¥": "Yens", "MAD": "Dirhams", "CFA": "Francs CFA"};
                        currencyName = nameMap[currentCurrency] || currentCurrency;
                        document.getElementById('footer-currency').innerText = currencyName;
                        currentMenuData = null; // Force le rafraîchissement
                    }
                }

                // 🟢 LECTURE DE LA CARTE DU BAR
                if (state && state.activeOrders && state.activeOrders['MENU_MASTER_BAR']) {
                    let newDataStr = JSON.stringify(state.activeOrders['MENU_MASTER_BAR'].data);
                    
                    if (newDataStr !== JSON.stringify(currentMenuData)) {
                        currentMenuData = JSON.parse(newDataStr);
                        renderClientMenu();
                    }
                } else if (!currentMenuData) {
                    document.getElementById('menu-container').innerHTML = '<div class="loading-screen">La carte n\'est pas encore disponible.</div>';
                }
            } catch(e) {
                console.error(e);
            }
        }

        function formatItemName(rawName) {
            let cleanName = rawName.replace('🌟 ', '');
            
            // Si le barman a utilisé [BR] pour mettre une description du cocktail/vin
            if (cleanName.includes('[BR]')) {
                let parts = cleanName.split('[BR]');
                let mainName = parts[0].trim();
                let description = parts.slice(1).join(' - ').trim(); // Joindre le reste en description
                return `<div class="item-name-main">${mainName}</div><div class="item-desc">${description}</div>`;
            }
            
            return `<div class="item-name-main">${cleanName}</div>`;
        }

        function renderClientMenu() {
            const container = document.getElementById('menu-container');
            const nav = document.getElementById('nav-categories');
            
            if (!currentMenuData) return;

            let htmlContent = '';
            let navHtml = '';

            categoriesMap.forEach((cat, index) => {
                let items = currentMenuData[cat.id];
                
                // Filtre des ruptures de stock
                if (items && Array.isArray(items)) {
                    let availableItems = items.filter(item => item.stock !== 0 && item.stock !== "0");

                    if (availableItems.length > 0) {
                        navHtml += `<a href="#section-${cat.id}" class="nav-link">${cat.label}</a>`;

                        htmlContent += `
                        <div class="category-section" id="section-${cat.id}" style="animation-delay: ${index * 0.1}s;">
                            <h2 class="category-title">${cat.icon} ${cat.label}</h2>
                        `;

                        availableItems.forEach(item => {
                            // 🌍 Utilisation de currentCurrency au lieu de €
                            let priceStr = parseFloat(item.price) > 0 ? `${parseFloat(item.price).toFixed(2)} ${currentCurrency}` : '';
                            let formattedHtml = formatItemName(item.name);

                            htmlContent += `
                            <div class="menu-item">
                                <div class="item-header">
                                    <div style="flex:1;">${formattedHtml}</div>
                                    <span class="item-price">${priceStr}</span>
                                </div>
                            </div>
                            `;
                        });

                        htmlContent += `</div>`;
                    }
                }
            });

            if (htmlContent === '') {
                htmlContent = '<div class="loading-screen">Le bar est actuellement fermé.</div>';
            }

            nav.innerHTML = navHtml;
            container.innerHTML = htmlContent;

            document.querySelectorAll('.nav-link').forEach(link => {
                link.addEventListener('click', function(e) {
                    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
                    this.classList.add('active');
                });
            });
        }

        // Lancement et rafraîchissement auto
        fetchMenu();
        setInterval(fetchMenu, 3000);

    </script>
</body>
</html>
