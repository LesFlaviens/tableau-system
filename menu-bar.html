<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ichef.ch - La Carte</title>
    <style>
        :root { --bg: #050505; --gold: #ffb300; --panel: #111; }
        body { background: var(--bg); color: #fff; font-family: 'Inter', sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        /* HEADER ÉPURÉ LIGNE DE LUXE */
        .header { background: transparent; padding: 30px 20px; display: flex; flex-direction: column; align-items: center; border-bottom: 1px solid #222; }
        .logo-img { height: 60px; filter: drop-shadow(0px 4px 10px rgba(0,0,0,0.8)); margin-bottom: 10px; }
        .brand-name { color: var(--gold); font-size: 2.5rem; font-weight: 900; letter-spacing: 4px; margin: 0; text-transform: uppercase; }
        .subtitle { font-size: 0.9rem; color: #555; letter-spacing: 3px; margin-top: 5px; text-transform: uppercase; }

        /* INDICATEUR DE SYNCHRONISATION DISCRET */
        .sync-status { position: absolute; top: 15px; right: 15px; display: flex; align-items: center; gap: 8px; font-size: 0.6rem; color: #444; text-transform: uppercase; font-weight: bold; letter-spacing: 1px;}
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #ff1744; }
        .sync-dot.online { background: #00e676; box-shadow: 0 0 5px #00e676; }

        /* STRUCTURE DU MENU */
        .menu-container { flex: 1; padding: 40px 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px; max-width: 1400px; margin: 0 auto; width: 100%; box-sizing: border-box; }
        
        .menu-section { display: flex; flex-direction: column; }
        .section-title { font-size: 1.8rem; color: var(--gold); text-align: center; font-weight: 900; letter-spacing: 2px; margin-bottom: 25px; text-transform: uppercase; border-bottom: 1px dashed #333; padding-bottom: 10px; }
        
        .item-list { display: flex; flex-direction: column; gap: 15px; }
        .menu-item { display: flex; justify-content: space-between; align-items: baseline; }
        .item-name { font-size: 1.1rem; font-weight: bold; color: #eee; flex: 1; }
        .item-dots { flex: 1; border-bottom: 1px dotted #444; margin: 0 15px; position: relative; top: -5px; }
        .item-price { font-size: 1.1rem; color: var(--gold); font-weight: 900; }
    </style>
</head>
<body>

    <div class="sync-status"><div id="sync-dot" class="sync-dot"></div> <span id="sync-text">Hors ligne</span></div>

    <div class="header">
        <img src="logo.png" alt="iChef Logo" class="logo-img" onerror="this.style.display='none';">
        <h1 class="brand-name">ichef.ch</h1>
        <div class="subtitle">La Carte</div>
    </div>

    <div class="menu-container">
        <div class="menu-section">
            <div class="section-title">Entrées</div>
            <div class="item-list" id="list-entrees">
                <div style="text-align:center; color:#555;">Chargement de la carte...</div>
            </div>
        </div>

        <div class="menu-section">
            <div class="section-title">Plats</div>
            <div class="item-list" id="list-plats">
                <div style="text-align:center; color:#555;">Chargement de la carte...</div>
            </div>
        </div>

        <div class="menu-section">
            <div class="section-title">Desserts</div>
            <div class="item-list" id="list-desserts">
                <div style="text-align:center; color:#555;">Chargement de la carte...</div>
            </div>
        </div>
    </div>

    <script>
        const API = {
            getState: () => fetch('/get-current-state').then(r => r.json())
        };

        // Données de secours exactes au cas où le serveur serait totalement vide (10/10/10)
        const DEFAULT_MENU = {
            entrees: [
                { id: 1, name: "Œuf Parfait aux Champignons", price: 12 }, { id: 2, name: "Foie Gras Maison", price: 18 },
                { id: 3, name: "Carpaccio de Bœuf", price: 14 }, { id: 4, name: "Tartare de Saumon", price: 15 },
                { id: 5, name: "Velouté de Butternut", price: 10 }, { id: 6, name: "Salade César iChef", price: 13 },
                { id: 7, name: "Escargots de Bourgogne (x6)", price: 11 }, { id: 8, name: "Ceviche de Saint-Jacques", price: 17 },
                { id: 9, name: "Os à Moelle Rôti", price: 12 }, { id: 10, name: "Burrata Truffée", price: 16 }
            ],
            plats: [
                { id: 11, name: "Filet de Bœuf façon Rossini", price: 32 }, { id: 12, name: "Magret de Canard au Miel", price: 26 },
                { id: 13, name: "Risotto aux Truffes", price: 24 }, { id: 14, name: "Saumon Unilatéral", price: 22 },
                { id: 15, name: "Burger iChef Signature", price: 21 }, { id: 16, name: "Suprême de Volaille Jaune", price: 20 },
                { id: 17, name: "Côte de Veau aux Morilles", price: 34 }, { id: 18, name: "Bar Rôti au Thym", price: 28 },
                { id: 19, name: "Tartare de Bœuf Charolais", price: 20 }, { id: 20, name: "Pluma Ibérique", price: 27 }
            ],
            desserts: [
                { id: 21, name: "Mi-cuit Chocolat Noir", price: 10 }, { id: 22, name: "Tarte Citron Meringuée", price: 9 },
                { id: 23, name: "Crème Brûlée Vanille", price: 8 }, { id: 24, name: "Tiramisu au Café", price: 9 },
                { id: 25, name: "Pavlova Fruits Rouges", price: 11 }, { id: 26, name: "Café Gourmand iChef", price: 12 },
                { id: 27, name: "Baba au Rhum", price: 10 }, { id: 28, name: "Mousse au Chocolat", price: 7 },
                { id: 29, name: "Profiteroles Maison", price: 11 }, { id: 30, name: "Assiette de Fromages", price: 14 }
            ]
        };

        let menuData = { entrees: [], plats: [], desserts: [] };

        // 🟢 DÉMARRAGE ET LECTURE CONTINUE (Toutes les 5 secondes)
        async function bootSystem() {
            await pullMenu();
            setInterval(pullMenu, 5000); 
        }

        async function pullMenu() {
            try {
                const state = await API.getState();
                
                // Si le Cerveau (chef.html) a envoyé des données, on les prend. Sinon on prend le défaut.
                if (state.activeOrders && state.activeOrders['MENU_MASTER']) {
                    menuData = state.activeOrders['MENU_MASTER'].data;
                } else {
                    menuData = DEFAULT_MENU;
                }
                
                document.getElementById('sync-dot').classList.add('online');
                document.getElementById('sync-text').innerText = "Sync OK";
                
                renderMenu();
            } catch (error) {
                document.getElementById('sync-dot').classList.remove('online');
                document.getElementById('sync-text').innerText = "Hors ligne";
                // En cas de coupure internet, on garde ce qu'on a déjà à l'écran
                if (menuData.entrees.length === 0) {
                    menuData = DEFAULT_MENU;
                    renderMenu();
                }
            }
        }

        function renderMenu() {
            ['entrees', 'plats', 'desserts'].forEach(category => {
                const listEl = document.getElementById(`list-${category}`);
                
                if (menuData[category] && menuData[category].length > 0) {
                    listEl.innerHTML = menuData[category].map(item => `
                        <div class="menu-item">
                            <span class="item-name">${item.name}</span>
                            <div class="item-dots"></div>
                            <span class="item-price">${parseFloat(item.price).toFixed(2)} €</span>
                        </div>
                    `).join('');
                } else {
                    listEl.innerHTML = `<div style="text-align:center; color:#444; font-style:italic;">Aucun plat disponible</div>`;
                }
            });
        }

        // Lancement
        bootSystem();
    </script>
</body>
</html>
