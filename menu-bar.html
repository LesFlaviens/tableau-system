<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iBar - Carte des Boissons</title>
    <style>
        :root { 
            --bg: #0f172a;           
            --panel: #1e293b;        
            --border: #334155;       
            --text-main: #f8fafc;    
            --gold: #fbbf24;         
            --accent: #34d399;       
            --alert: #f87171;        
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5);
        }
        
        body { 
            background: var(--bg); 
            color: var(--text-main); 
            font-family: 'Inter', sans-serif; 
            margin: 0; 
            padding: 0;
            padding-bottom: 50px;
        }

        header {
            background: var(--panel);
            padding: 20px;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        h1 {
            margin: 0;
            color: var(--gold);
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            font-size: 2rem;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            margin-left: 10px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(1.2); }
            100% { opacity: 1; transform: scale(1); }
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }

        .category-section {
            margin-top: 40px;
        }

        .category-title {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--text-main);
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .items-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 15px;
        }

        .menu-item {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow);
            transition: transform 0.2s;
        }

        .menu-item:hover {
            transform: translateY(-2px);
            border-color: #475569;
        }

        .menu-item.sold-out {
            opacity: 0.5;
            border-color: var(--alert);
        }

        .item-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .item-name {
            font-size: 1.1rem;
            font-weight: bold;
        }

        .sold-badge {
            background: var(--alert);
            color: white;
            font-size: 0.75rem;
            font-weight: 900;
            padding: 2px 8px;
            border-radius: 4px;
            display: inline-block;
            width: fit-content;
            margin-top: 5px;
        }

        .item-price {
            font-size: 1.3rem;
            font-weight: 900;
            color: var(--accent);
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 50px;
            font-size: 1.2rem;
            font-style: italic;
        }
    </style>
</head>
<body>

    <header>
        <h1>LA CARTE <span class="status-dot" title="Synchronisation en direct"></span></h1>
    </header>

    <div class="container" id="menu-board">
        <div class="empty-state">Connexion à l'Empire en cours...</div>
    </div>

    <script>
        const CAT_NAMES = {
            "cocktails": "🍸 Cocktails Signature",
            "mocktails": "🍹 Créations Sans Alcool",
            "vins": "🍷 Vins au Verre & Bouteilles",
            "bieres": "🍺 Bières Pression & Artisanales",
            "chaudes": "☕ Boissons Chaudes",
            "froides": "🥤 Boissons Fraîches",
            "spiritueux": "🥃 Spiritueux & Digestifs"
        };

        // Fonction d'écoute : Va chercher la donnée dans le "Cerveau"
        async function fetchLiveMenu() {
            try {
                let response = await fetch('/get-current-state');
                if (response.ok) {
                    let state = await response.json();
                    
                    // Si le dossier du Bar existe et contient de la donnée
                    if (state.activeOrders && state.activeOrders['MENU_MASTER_BAR']) {
                        renderBoard(state.activeOrders['MENU_MASTER_BAR'].data);
                    }
                }
            } catch (e) {
                // En cas de perte de réseau, tente de lire la sauvegarde locale
                let localState = JSON.parse(localStorage.getItem('EMPIRE_GLOBAL_SYNC'));
                if (localState && localState.activeOrders && localState.activeOrders['MENU_MASTER_BAR']) {
                    renderBoard(localState.activeOrders['MENU_MASTER_BAR'].data);
                }
            }
        }

        // Fonction d'affichage : Construit la carte visuellement
        function renderBoard(menuData) {
            let html = '';
            let hasItems = false;

            for (let catKey in CAT_NAMES) {
                let items = menuData[catKey];
                
                // N'affiche la catégorie que s'il y a des boissons dedans
                if (items && items.length > 0) {
                    hasItems = true;
                    html += `
                        <div class="category-section">
                            <div class="category-title">${CAT_NAMES[catKey]}</div>
                            <div class="items-grid">
                    `;

                    items.forEach(item => {
                        // Détecte si le stock est tombé à 0
                        let isSoldOut = (item.stock === 0);
                        let cleanName = item.name.replace('🌟', '').trim(); // Nettoie l'étoile visuelle

                        html += `
                            <div class="menu-item ${isSoldOut ? 'sold-out' : ''}">
                                <div class="item-info">
                                    <span class="item-name">${cleanName}</span>
                                    ${isSoldOut ? '<span class="sold-badge">ÉPUISÉ</span>' : ''}
                                </div>
                                <div class="item-price">${parseFloat(item.price).toFixed(2)} €</div>
                            </div>
                        `;
                    });

                    html += `</div></div>`;
                }
            }

            if (!hasItems) {
                html = `<div class="empty-state">La carte est en cours de préparation par le Barman.</div>`;
            }

            document.getElementById('menu-board').innerHTML = html;
        }

        // Lance la lecture en direct toutes les 3 secondes
        setInterval(fetchLiveMenu, 3000);
        
        // Premier chargement immédiat
        fetchLiveMenu();
    </script>
</body>
</html>
